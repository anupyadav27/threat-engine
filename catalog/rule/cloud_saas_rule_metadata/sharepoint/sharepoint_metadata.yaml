  - rule_id: sharepoint.cis.5.auditable_events_and_diagnostic_tracking_settings
    title: "Ensure that auditable events and diagnostic tracking settings within the SharePoint system is consistent with the organization's security plans"
    severity: high
    category: cloud_saas
    tech_type: sharepoint
    automation_type: manual
    cis_benchmark: "CIS_SHAREPOINT 2019_v1.0.0"
    cis_version: "2019_v1.0.0"
    cis_control: "5.1"
    cis_section: "5"
    profile_applicability: "Level 1"
    description: >
      SharePoint must allow designated organizational personnel to select which
      auditable events are to be audited by specific components of the system.
    rationale: >
      Audit records can be generated from various components within the information
      system, such as network interfaces, hard disks, modems, etc. From an
      application perspective, certain specific application functionalities may be
      audited as well. The list of audited events is the set of events for which
      audits are to be generated. This set of events is typically a subset of the
      list of all events for which the system is capable of generating audit records
      (i.e., auditable events, time stamps, source and destination addresses,
      user/process identifiers, event descriptions, success/fail indications,
      filenames involved, and access control or flow control rules invoked).
      Organizations may define the organizational personnel accountable for
      determining which application components shall provide auditable events.
    audit_procedure: >
      Navigate to Central Administration. 1. Click Monitoring. 2. Click Configure
      Diagnostic Logging. Validate that the selected event categories and trace
      levels match those defined by the organization's system security plan. If the
      selected event categories/trace levels are inconsistent with those defined in
      the organization's system security plan, this is a finding. 63 | P a g e
    remediation: >
      Navigate to Central Administration. 1. Click Monitoring. 2. Click Configure
      Diagnostic Logging. Configure the event categories and trace levels to match
      those defined by the organization's system security plan.
