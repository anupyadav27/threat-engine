  - rule_id: docker.cis.3.the_containerd_socket_file_permissions_are_set_to
    title: "Ensure that the Containerd socket file permissions are set to 660 or more restrictively"
    severity: medium
    automation_type: automated
    cis_control: '3.24'
    cis_section: '3'
    profile_applicability: ""
    scope: docker.section_3.the_containerd_socket_file_permissions_are_set_to
    assertion:
      field: value
      operator: equals
      expected: "true"
    remediation: >
      You should execute the command below. chmod 660
      /run/containerd/containerd.sock This sets the file permissions of the
      Containerd socket file to 660. Default Value: By default, the permissions for
      the Containerd socket file is correctly set to 660. CIS Controls:
    compliance:
      - cis_docker_v1_8_0_3_24


