tech_type: docker
category: container
cis_benchmark: CIS Docker v1.8.0
cis_section: '3'

rules:

  - rule_id: docker.cis.3.the_docker_service_file_ownership_is_set_to_root
    title: "Ensure that the docker.service file ownership is set to root:root"
    severity: medium
    automation_type: automated
    cis_control: '3.1'
    cis_section: '3'
    profile_applicability: ""
    scope: docker.section_3.the_docker_service_file_ownership_is_set_to_root
    assertion:
      field: value
      operator: equals
      expected: "true"
    remediation: >
      
    compliance:
      - cis_docker_v1_8_0_3_1

  - rule_id: docker.cis.3.docker_service_file_permissions_are_appropriately
    title: "Ensure that docker.service file permissions are appropriately set"
    severity: medium
    automation_type: automated
    cis_control: '3.2'
    cis_section: '3'
    profile_applicability: ""
    scope: docker.section_3.docker_service_file_permissions_are_appropriately
    assertion:
      field: value
      operator: equals
      expected: "true"
    remediation: >
      Step 1 : Find out the file location: systemctl show -p FragmentPath
      docker.service Step 2 : If the file does not exist, this recommendation is not
      applicable. If the file exists, execute the command below including the
      correct file path to set the file permissions to 644. For example, chmod 644
      /usr/lib/systemd/system/docker.service Default Value: This file may not be
      present on the system. In that case, this recommendation is not applicable. By
      default, if the file is present, the file permissions are correctly set to
      644. References: 1. https://docs.docker.com/articles/systemd/ CIS Controls:
    compliance:
      - cis_docker_v1_8_0_3_2

  - rule_id: docker.cis.3.docker_socket_file_ownership_is_set_to_root_root
    title: "Ensure that docker.socket file ownership is set to root:root"
    severity: medium
    automation_type: automated
    cis_control: '3.3'
    cis_section: '3'
    profile_applicability: ""
    scope: docker.section_3.docker_socket_file_ownership_is_set_to_root_root
    assertion:
      field: value
      operator: equals
      expected: "true"
    remediation: >
      
    compliance:
      - cis_docker_v1_8_0_3_3

  - rule_id: docker.cis.3.docker_socket_file_permissions_are_set_to_644_or
    title: "Ensure that docker.socket file permissions are set to 644 or more restrictive"
    severity: medium
    automation_type: automated
    cis_control: '3.4'
    cis_section: '3'
    profile_applicability: ""
    scope: docker.section_3.docker_socket_file_permissions_are_set_to_644_or
    assertion:
      field: value
      operator: equals
      expected: "true"
    remediation: >
      Step 1 : Find out the file location: systemctl show -p FragmentPath
      docker.socket Step 2 : If the file does not exist, this recommendation is not
      applicable. If the file does exist, you should execute the command below,
      including the correct file path to set the file permissions to 644. For
      example, chmod 644 /usr/lib/systemd/system/docker.socket Default Value: This
      file may not be present on the system and in that case, this recommendation is
      not applicable. By default, if the file is present, the permissions should be
      set to 644 or more restrictively. References: 1.
      https://docs.docker.com/engine/reference/commandline/dockerd/#bind-docker-to-
      another-hostport-or-a-unix-socket 2. https://github.com/YungSang/fedora-
      atomic- packer/blob/master/oem/docker.socket 3.
      http://daviddaeschler.com/2014/12/14/centos-7rhel-7-and-docker-containers-on-
      boot/ CIS Controls:
    compliance:
      - cis_docker_v1_8_0_3_4

  - rule_id: docker.cis.3.the_etc_docker_directory_ownership_is_set_to_root
    title: "Ensure that the /etc/docker directory ownership is set to root:root"
    severity: medium
    automation_type: automated
    cis_control: '3.5'
    cis_section: '3'
    profile_applicability: ""
    scope: docker.section_3.the_etc_docker_directory_ownership_is_set_to_root
    assertion:
      field: value
      operator: equals
      expected: "true"
    remediation: >
      
    compliance:
      - cis_docker_v1_8_0_3_5

  - rule_id: docker.cis.3.etc_docker_directory_permissions_are_set_to_755
    title: "Ensure that /etc/docker directory permissions are set to 755 or more restrictively"
    severity: medium
    automation_type: automated
    cis_control: '3.6'
    cis_section: '3'
    profile_applicability: ""
    scope: docker.section_3.etc_docker_directory_permissions_are_set_to_755
    assertion:
      field: value
      operator: equals
      expected: "true"
    remediation: >
      You should run the following command: chmod 755 /etc/docker This sets the
      permissions for the directory to 755. Default Value: By default, the
      permissions for this directory are set to 755. References: 1.
      https://docs.docker.com/engine/security/https/ CIS Controls:
    compliance:
      - cis_docker_v1_8_0_3_6

  - rule_id: docker.cis.3.the_docker_socket_file_ownership_is_set_to_root
    title: "Ensure that the Docker socket file ownership is set to root:docker"
    severity: medium
    automation_type: automated
    cis_control: '3.15'
    cis_section: '3'
    profile_applicability: ""
    scope: docker.section_3.the_docker_socket_file_ownership_is_set_to_root
    assertion:
      field: value
      operator: equals
      expected: "true"
    remediation: >
      
    compliance:
      - cis_docker_v1_8_0_3_15

  - rule_id: docker.cis.3.the_docker_socket_file_permissions_are_set_to_660
    title: "Ensure that the Docker socket file permissions are set to 660 or more restrictively"
    severity: medium
    automation_type: automated
    cis_control: '3.16'
    cis_section: '3'
    profile_applicability: ""
    scope: docker.section_3.the_docker_socket_file_permissions_are_set_to_660
    assertion:
      field: value
      operator: equals
      expected: "true"
    remediation: >
      You should execute the command below. chmod 660 /var/run/docker.sock This sets
      the file permissions of the Docker socket file to 660. Default Value: By
      default, the permissions for the Docker socket file is correctly set to 660.
      References: 1.
      https://docs.docker.com/engine/reference/commandline/dockerd/#daemon- socket-
      option 2. https://docs.docker.com/engine/reference/commandline/dockerd/#bind-
      docker-to- another-hostport-or-a-unix-socket CIS Controls:
    compliance:
      - cis_docker_v1_8_0_3_16

  - rule_id: docker.cis.3.the_containerd_socket_file_ownership_is_set_to
    title: "Ensure that the Containerd socket file ownership is set to root:root"
    severity: medium
    automation_type: automated
    cis_control: '3.23'
    cis_section: '3'
    profile_applicability: ""
    scope: docker.section_3.the_containerd_socket_file_ownership_is_set_to
    assertion:
