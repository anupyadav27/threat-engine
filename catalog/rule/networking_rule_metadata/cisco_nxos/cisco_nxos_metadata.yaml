  - rule_id: cisco_nxos.cis.1.configure_password_encryption
    title: "Configure Password Encryption"
    severity: medium
    category: networking
    tech_type: cisco_nxos
    automation_type: manual
    cis_benchmark: "CIS_CISCO_NXOS v1.2.0"
    cis_version: "v1.2.0"
    cis_control: "1.4.2"
    cis_section: "1"
    profile_applicability: ""
    description: >
      You can enable strong, reversible 128-bit Advanced Encryption Standard (AES)
      password encryption, also known as type-6 encryption. To start using type-6
      encryption, you must enable the AES password encryption feature and configure
      a master encryption key, which is used to encrypt and decrypt passwords. After
      you enable AES password encryption and configure a master key, all existing
      and newly created clear- text passwords for supported applications (currently
      RADIUS and TACACS+) are stored in type-6 encrypted format, unless you disable
      type-6 password encryption. You can also configure Cisco NX-OS to convert all
      existing weakly encrypted passwords to type- 6 encrypted passwords.
    rationale: >
      Encryption is a good way to protect data that will be used later. Encrypted
      data can later be decrypted to its original value. Although encrypting
      passwords protects them, typically, an application uses the same encryption
      key for storing all user passwords. Impact: Encryption of passwords is used to
      protect it from being sent over the wire cleartext. By applying encryption you
      are making it more difficult for an adversary to gain access to your
      device/network
    audit_procedure: >
      switch(config)# show encryption service stat
    remediation: >
      Configure a master key to be used with the AES password encryption feature.
      The key can contain between 16 and 32 alphanumeric characters switch# key
