  - rule_id: cisco_nxos.cis.3.configure_bgp_authentication
    title: "Configure BGP Authentication"
    severity: medium
    category: networking
    tech_type: cisco_nxos
    automation_type: manual
    cis_benchmark: "CIS_CISCO_NXOS v1.2.0"
    cis_version: "v1.2.0"
    cis_control: "3.1.2.3"
    cis_section: "3"
    profile_applicability: ""
    description: >
      BGP is a usually configured as a point-to-point / unicast protocol.
      Configuring authentication as part of the neighbor configuration adds an
      additional layer of security to the conversation.
    rationale: >
      Impact: Configuring authentication adds an MD5 hash to the neighbor
      negotiation that occurs between two BGP peers. An authentication failure would
      indicate either a misconfiguration, or possibly an attacker mounting an
      impersonation attack, masquerading as the BGP peer (possibly by ARP cache
      poisoning attack) and attempting to then peer up with incorrect credentials.
    audit_procedure: >
      The 'show running-confguration bgp' command will list the entire BGP
      configuration. Ensure that the 'password' command is present in each neighbor
      stanza. switch# sho run bgp !Command: show running-config bgp !Running
      configuration last done at: Wed May 20 13:52:03 2020 !Time: Wed May 20
      13:54:17 2020 version 9.3(3) Bios:version feature bgp router bgp 65520 router-
      id 10.10.10.10 neighbor 10.10.10.11 remote-as 65521 log-neighbor-changes
      password 3 34a1d2277d4f4cc9e9fa97b9d4434019f46f16ae96bb54a3 address-family
      ipv4 unicast
    remediation: >
      For each BGP neighbor, add the 'password' command to the matching stanza, with
      a long and complex string. Note that the same password must be used on the
      matching peer. Different passwords should be used for each peer.
      switch(config)# router bgp 65520 switch(config-router)# neigh 10.10.10.11
      switch(config-router-neighbor)# password ? 0 Specifies an UNENCRYPTED neighbor
      password will follow 3 Specifies an 3DES ENCRYPTED neighbor password will
      follow 7 Specifies a Cisco type 7 ENCRYPTED neighbor password will follow LINE
      The UNENCRYPTED (cleartext) neighbor password switch(config-router-neighbor)#
      password somelongcomplexstring Default Value: By default, BGP authentication
      is not enabled. References: 1.
      https://www.cisco.com/c/en/us/td/docs/switches/datacenter/sw/4_2/nx-
      os/unicast/configuration/guide/l3_cli_nxos/l3_advbgp.html#wp1066903
