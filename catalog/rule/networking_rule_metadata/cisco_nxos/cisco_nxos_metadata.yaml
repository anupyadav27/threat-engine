  - rule_id: cisco_nxos.cis.1.restrict_access_to_vty_sessions
    title: "Restrict Access to VTY Sessions"
    severity: medium
    category: networking
    tech_type: cisco_nxos
    automation_type: manual
    cis_benchmark: "CIS_CISCO_NXOS v1.2.0"
    cis_version: "v1.2.0"
    cis_control: "1.2.1"
    cis_section: "1"
    profile_applicability: ""
    description: >
      Restrict Management Access to trusted management stations and VLANs.
    rationale: >
      Exposing the management interface too broadly exposes that interface to MiTM
      (Monkey in the Middle) attacks as well as to credential stuffing attacks. The
      question 'should your receptionist have access to your core switch?' usually
      illustrates the need for this if there are any disagreements. Impact: Not
      restricting access to the management interface has several risks: • exposes
      your interface to credential stuffing attacks from commodity malware (such as
      Mirai) • highlights your device as missing simple security remediations to
      even simple scans. This invites other attacks in addition to credential
      stuffing.
    audit_procedure: >
      Perform the following to determine if the ACL is set: Verify that you see an
      access-class defined: switch# sho run | section vty Next, display the access-
      list to verify that it is appropriate for your organization: switch# sho run
      <Access-Class name>
    remediation: >
      Create an access-list that defines the various trusted subnets and/or
      stations: switch(config)# ip access-list ACL-MGT switch(config-acl)# remark
      access-class ACL switch(config-acl)# permit ip 192.168.12.0/24 any
      switch(config-acl)# deny ip any any log It is suggested that all ACLs are
      commented to help self-document the configuration. The last line in the ACL
      should read deny ip any any log to record all attempts to reach the management
      interface from unauthorized stations. Apply the Access-Class to the VTY
      interface: switch(config)# line vty switch(config-line)# access-class ACL-MGT
      in Default Value: No access-class is applied by default
    references: >
      
    impact: >
      
    compliance_mappings:
      cis:
        - "CIS_CISCO_NXOS_v1_2_0_1_2_1"
      nist_800_53: []
      soc2: []
      pci_dss: []
    source_unique_id: "cis_cisco_nxos_v1_2_0_1_2_1"
    metadata_source: generated
    generated_by: generate_tech_rules

  - rule_id: cisco_nxos.cis.1.configure_ip_blocking_on_failed_logins
    title: "Configure IP Blocking on Failed Logins"
    severity: medium
    category: networking
    tech_type: cisco_nxos
    automation_type: manual
    cis_benchmark: "CIS_CISCO_NXOS v1.2.0"
    cis_version: "v1.2.0"
    cis_control: "1.2.2"
    cis_section: "1"
    profile_applicability: ""
    description: >
      After a configured number of failed logins in a set window, offending IP
      addresses should be blocked from login for a configured amount of time.
    rationale: >
      This effectively makes brute force attacks much less practical, slowing
      automated processes from a rate of multiple attempts per second to per minute
      ranges. Impact: Not only does this effectively impede brute force or
      dictionary login attacks, but logs them as such. In addition, enabling this
      command limits login attempts to once per second, rather than as fast as the
      device can process them.
    audit_procedure: >
      For version 7.x: switch# show login No Quiet-Mode access list has been
      configured, default ACL will be applied. Switch is enabled to watch for login
      Attacks. If more than 5 login failures occur in 120 seconds or less, logins
      will be disabled for 120 seconds. Switch presently in Normal-Mode. Current
      Watch Window remaining time 62 seconds. Present login failure count 0. or:
      switch # sho run | i block-for login block-for 120 attempts 5 within 120 For
      version NX-OS 9.x: switch # sho system login If more than 5 login failures
      occur in 120 seconds or less, logins will be disabled for 120 seconds. No
      Quiet-Mode access list has been configured,default ACL will be applied Switch
      is enabled to watch for login Attacks or: switch # sho run | i block-for
      system login block-for 120 attempts 5 within 120
    remediation: >
      This configuration consists of: • A 'watch' time window (in seconds) • the
      number of failed attempts to trigger on • the amount of time (in seconds) to
      block further login attempts from that IP address For NX-OS 7.x: login block-
      for <block time window> attempts <fail count> within <detect time window> for
      instance: login block-for 120 attempts 5 within 120 For NX-OS 9.x: system
      login block-for <block time window> attempts <fail count> within <detect time
      window> for instance: system login block-for 120 attempts 5 within 120 Any
      values at all will thwart most brute force or dictionary attacks. Default
      Value: By default this feature is not configured References: 1.
      https://www.cisco.com/c/en/us/td/docs/ios-
      xml/ios/sec_usr_cfg/configuration/xe- 16-12/sec-usr-cfg-xe-16-12-book/sec-
      login-enhance.html
    references: >
      
    impact: >
      
    compliance_mappings:
      cis:
        - "CIS_CISCO_NXOS_v1_2_0_1_2_2"
      nist_800_53: []
      soc2: []
      pci_dss: []
    source_unique_id: "cis_cisco_nxos_v1_2_0_1_2_2"
