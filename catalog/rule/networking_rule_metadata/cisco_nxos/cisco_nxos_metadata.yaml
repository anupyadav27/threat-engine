  - rule_id: cisco_nxos.cis.1.configure_snmpv3
    title: "Configure SNMPv3"
    severity: medium
    category: networking
    tech_type: cisco_nxos
    automation_type: automated
    cis_benchmark: "CIS_CISCO_NXOS v1.2.0"
    cis_version: "v1.2.0"
    cis_control: "1.9.1"
    cis_section: "1"
    profile_applicability: ""
    description: >
      The Simple Network Management Protocol (SNMP) is an application-layer protocol
      that provides a message format for communication between SNMP managers and
      agents. SNMP provides a standardized framework and a common language used for
      the monitoring and management of devices in a network. SNMPv3 provides secure
      access to devices by a combination of authenticating and encrypting frames
      over the network.
    rationale: >
      SNMPv3 provides for both security models and security levels. A security model
      is an authentication strategy that is set up for a user and the role in which
      the user resides. A security level is the permitted level of security within a
      security model. A combination of a security model and a security level
      determines which security mechanism is employed when handling an SNMP packet.
      Impact: SNMPv3 provides security features such as: • Message Integrity -
      Ensures that a packet has not be tampered with • Authentication - Determines
      message is from a valid source • Encryption - Scrambles the packet content to
      prevent being seen by unauthorized sources. SNMPv2 does not provide any of
      these features, as SNMPv2 is a cleartext protocol that exposes the community
      string in each exchange of information.
    audit_procedure: >
      To audit the SNMPv3 configuration, use the 'show run snmp' command. Ensure
      that: Ensure that SNMP version 3 is set switch# sho run snmp | i version
      version 9.3(3) Bios:version snmp-server host 1.2.3.4 traps version 3 priv
      <SNMPv3_UserName> Ensure that SNMPv3 encryption is enforced globally for all
      users: switch# sho run snmp | i global snmp-server globalEnforcePriv Ensure
      that SNMP Users have appropriate access levels: switch# sho run snmp | i user
      snmp-server user SNMPv3_UserName network-admin auth sha
      0x12624c4dcb90cffeb43a1177324f547d priv 0x12624c4dcb90cffeb43a1177324f547d
      localizedkey SNMP version 2 is NOT set - 'show run snmp | i community' should
      not return any statements (failed audit shown below) switch# sho run snmp | i
      community snmp-server community asdf group network-operator snmp-server
      community <SomeComplexString> group network-operator snmp-server community
      asdfasdfasf group network-operator
    remediation: >
      Create SNMPv3 Users (and groups if needed). Ensure that SHA hashes are used
      rather than MD5. Also ensure that appropriate authorization levels are set
      ('network- admin' is shown below): switch(config)#snmp-server user
      SNMPv3_UserName network-admin auth sha 0x12624c4dcb90cffeb43a1177324f547d priv
      0x12624c4dcb90cffeb43a1177324f547d localizedkey To set SNMP to version 3, add
      the 'version' parameter to the snmp-server command (note that SNMPv3 users and
      groups need to be configured first): switch(config)# snmp-server host 1.2.3.4
      traps version 3 priv <SNMPv3_UserName> To enforce encryption for all SNMPv3
      Users. This can be done by individual user, but it's recommended to enforce it
      globally: switch(config)# snmp-server globalEnforcePriv Default Value: Not
      Configured References: 1.
      https://www.cisco.com/c/en/us/td/docs/switches/datacenter/nexus9000/sw/6-
      x/system_management/configuration/guide/b_Cisco_Nexus_9000_Series_NX-
      OS_System_Management_Configuration_Guide/sm_9snmp.html?form=MG0AV3
    references: >
      
    impact: >
      
    compliance_mappings:
      cis:
        - "CIS_CISCO_NXOS_v1_2_0_1_9_1"
