  - rule_id: cisco_nxos.cis.1.if_snmpv2_is_in_use_use_a_complex_community_string
    title: "If SNMPv2 is in use, use a Complex Community String"
    severity: medium
    category: networking
    tech_type: cisco_nxos
    automation_type: manual
    cis_benchmark: "CIS_CISCO_NXOS v1.1.0"
    cis_version: "v1.1.0"
    cis_control: "1.5.1"
    cis_section: "1"
    profile_applicability: ""
    description: >
      SNMP v2 while similar to v1 aside from adding support for 64 bit counters and
      the ability to use complex strings.
    rationale: >
      Utilizing complex strings with SNMPv2 is no different then using complex
      passwords. By using the complex string you are making it more difficult for an
      attacker to guess the string. Strings should not contain dictionary words or
      rely on 'l33t-speak' spelling. Keep in mind that SNMPv2 is a clear-text
      protocol, so is subject to interception. This means that these strings are
      passed in clear-text during SNMPv2 operations, so can be 'harvested' by a
      well-positioned attacker. Also SNMP results are susceptible to capture or
      modification in transit.
    audit_procedure: >
      switch(config)# sho snmp community Community Group / Access context acl_filter
      _________ ______________ _______ __________ <SomeComplexString> network-
      operator
    remediation: >
      switch(config)# snmp-server community <SomeComplexString> ro
