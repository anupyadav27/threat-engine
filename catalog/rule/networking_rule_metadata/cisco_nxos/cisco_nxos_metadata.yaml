  - rule_id: cisco_nxos.cis.1.disable_ipxe_pre_boot_execution_environment
    title: "Disable iPXE (Pre-boot eXecution Environment)"
    severity: medium
    category: networking
    tech_type: cisco_nxos
    automation_type: automated
    cis_benchmark: "CIS_CISCO_NXOS v1.2.0"
    cis_version: "v1.2.0"
    cis_control: "1.7.2"
    cis_section: "1"
    profile_applicability: ""
    description: >
      iPXE allows a NX-OS device to boot from the network, usually using HTTP.
    rationale: >
      This method allows the switch bootup image to be controlled centrally, often
      using DHCP services. Impact: The risks of using this boot method are obvious.
      First, DHCP is a broadcast request, so any host (including a malicious host)
      can provide the DHCP response - the first response 'wins'. This means that a
      malicious actor can control operating system being booted on the switch. In
      addition, the HTTP protocol is clear-text, so is susceptible to modification
      in transit by an attacker. This is a less likely attack however, as the NX-OS
      boot sequence has multiple checks in place to verify the validity of the OS,
      and all most succeed for the boot sequence to proceed.
    audit_procedure: >
      The 'show boot order' command can be used to view if PXE is configured or not.
      In this example, the running config has PXE configured (audit fail): switch#
      sho boot order Current Boot Order: BootOrder = PXE boot first, follow by
      Bootflash if netboot failed Boot Order on next reload: BootOrder = PXE boot
      first, follow by Bootflash if netboot failed This example shows the default -
      no boot order set, so the system boots from the bootflash image only (audit
      success): CISNXOS9# show boot order Current Boot Order: BootOrder = Bootflash
      only Boot Order on next reload: Boot Order is not set. So, Bootflash is
      default This example shows the values for a bootflash boot explicitly set
      (also audit success): switch(config)# sho boot order Current Boot Order:
      BootOrder = Bootflash only Boot Order on next reload: BootOrder = Bootflash
      only An easier programmatic audit would be to query the running or saved
      configuration directly, using: switch# sho run | i 'boot order' boot order
      bootflash An audit fail will include the keyword 'pxe', and audit pass will
      not. So adding that: switch# sho run | i 'boot order' | grep pxe A blank line
      indicates audit success, a returned line will include 'pxe' so would indicate
      an audit failure.
    remediation: >
      Setting the boot order explicity to 'bootflash' will remediate a PXE
      configured device. switch(config)# boot order bootflash You can also 'no' the
      current boot order line to revert to the default setting. For instance, to
      remove the configuration line 'boot order pxe bootflash' command, use
      switch(config)# no boot order pxe bootflash Default Value: By default the boot
      order is 'bootflash' only. This default configuration will not show in the
      configuration. However, entering any valid 'boot order' in the configuration
      will result it that order being explicit in the configuration, so entering
      'boot order bootflash' will result in that showing in the configuration.
    references: >
      
    impact: >
      
    compliance_mappings:
      cis:
        - "CIS_CISCO_NXOS_v1_2_0_1_7_2"
      nist_800_53: []
      soc2: []
      pci_dss: []
    source_unique_id: "cis_cisco_nxos_v1_2_0_1_7_2"
    metadata_source: generated
    generated_by: generate_tech_rules

  - rule_id: cisco_nxos.cis.1.set_ssh_key_modulus_length
    title: "Set SSH Key Modulus Length"
    severity: medium
    category: networking
    tech_type: cisco_nxos
    automation_type: manual
    cis_benchmark: "CIS_CISCO_NXOS v1.2.0"
    cis_version: "v1.2.0"
    cis_control: "1.7.3"
    cis_section: "1"
    profile_applicability: ""
    description: >
      SSH sessions are encrypted using a key unique to the host (in this case the
      NX-OS switch). It is recommended that this key be 2048 bytes long or longer.
    rationale: >
      While attacking encryption algorithms is not practical for commodity malware,
      it definitely is possible. As remediation is so easily done it is definitely
      recommended. Impact: Implementing this feature requires the deletion of the
      existing (default) ssh keys, which are 1024 bytes in length. This means that
      this change must be implemented using some other access method, such as using
      the console port or a temporary telnet session (be sure to disable telnet
      after remediation if this method is used)
    audit_procedure: >
      switch# sho ssh key | i bitcount bitcount:1024 bitcount: 0
    remediation: >
      Again, this must be implemented using an out-of-band (ie - not ssh) method.
      switch(config)# no feature ssh switch(config)# ssh key rsa 2048 force
      switch(config)# feature ssh Default Value: The default SSH key is an RSA key
      of 1024 bytes in length.
