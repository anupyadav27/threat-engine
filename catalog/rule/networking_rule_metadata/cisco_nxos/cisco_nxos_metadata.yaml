  - rule_id: cisco_nxos.cis.1.limit_ssh_login_attempts_to_3_or_less
    title: "Limit SSH Login Attempts to 3 or less"
    severity: medium
    category: networking
    tech_type: cisco_nxos
    automation_type: automated
    cis_benchmark: "CIS_CISCO_NXOS v1.2.0"
    cis_version: "v1.2.0"
    cis_control: "1.2.3"
    cis_section: "1"
    profile_applicability: ""
    description: >
      After a configured number of failed password attempts, an SSH session
      terminate. The default configuration for this is 3 failed attempts. CIS
      recommends using the default configuration for this setting.
    rationale: >
      This setting makes brute force and dictionary attacks against SSH more
      difficult. Impact: The default setting of 3 failed attempts is appropriate and
      does not need to be changed. However, in this default configuration this
      setting does not appear in the running or saved configuration. If it is
      important that this setting shows in the configuration this value can be
      modified.
    audit_procedure: >
      switch# sho running-config security all | i 'ssh login-attempts' ssh login-
      attempts 3
    remediation: >
      switch(config)# ssh login attempts 3 Default Value: By default, after 3 failed
      login attempts in an SSH session, that session is terminated. References: 1.
      https://www.cisco.com/c/en/us/td/docs/switches/datacenter/nexus9000/sw/93x/se
      curity/configuration/guide/b-cisco-nexus-9000-nx-os-security-configuration-
      guide- 93x.html
    references: >
      
    impact: >
      
