  - rule_id: cisco_nxos.cis.3.log_ospf_adjacency_changes
    title: "Log OSPF Adjacency Changes"
    severity: medium
    category: networking
    tech_type: cisco_nxos
    automation_type: manual
    cis_benchmark: "CIS_CISCO_NXOS v1.2.0"
    cis_version: "v1.2.0"
    cis_control: "3.1.3.3"
    cis_section: "3"
    profile_applicability: ""
    description: >
      Logging changes to the BGP peering relationships is recommended.
    rationale: >
      Any logged changes in a routing peer relationship will in the best case
      indicate a service issue due to standard operational issues (connectivity
      issues and so on) or in the worst case, could indicate malicious activity
      attempting to subvert the peering relationship and/or the routing table.
      Impact: Errors on adjacency relationships are a common early warning message
      in attacks on routers. If successful, a malicious actor can advertise bogus
      routes to valid hosts or networks, allowing the interception and modification
      of traffic intended for those hosts or subnets. For this reason it is
      important that OSPF endpoints alert on any interruptions in adjacency.
    audit_procedure: >
      The 'show running-config OSPF' command will list out the full OSPF
      configuration. Ensure that the 'log-adjacency-changes' command is present. It
      is globally applied to all adjacencies. switch# sho run ospf | i log-adjacency
      log-adjacency-changes Log entries for adjacencies being established are shown
      below. Configuring any syslog servers or SIEM to alert on the keyword
      'ADJCHANGE' is recommended. 2020 May 22 10:34:28 CISNXOS9 %OSPF-5-ADJCHANGE:
      ospf-10 [10184] Nbr 10.10.10.11 on Vlan1 went EXSTART 2020 May 22 10:34:28
      CISNXOS9 %OSPF-5-ADJCHANGE: ospf-10 [10184] Nbr 10.10.10.11 on Vlan1 went FULL
      Log entries for adjacencies being dropped are shown below: 2020 May 22
      10:32:04 CISNXOS9 %OSPF-5-ADJCHANGE: ospf-10 [10184] Nbr 10.10.10.11 on Vlan1
      went DOWN
    remediation: >
      Enabling the logging of adjacencies is a single line in the OSPF process
      section. It is globally applied to all OSPF neighbors. switch(config)# router
      ospf <Process tag> switch(config-router)# log-adjacency-changes Default Value:
      By default changes in OSPF adjacencies are not logged.
    references: >
      
    impact: >
      
    compliance_mappings:
      cis:
        - "CIS_CISCO_NXOS_v1_2_0_3_1_3_3"
      nist_800_53: []
      soc2: []
      pci_dss: []
