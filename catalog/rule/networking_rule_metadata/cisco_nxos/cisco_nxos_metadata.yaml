  - rule_id: cisco_nxos.cis.3.configure_eigrp_log_adjacency_changes
    title: "Configure EIGRP log-adjacency-changes"
    severity: medium
    category: networking
    tech_type: cisco_nxos
    automation_type: manual
    cis_benchmark: "CIS_CISCO_NXOS v1.2.0"
    cis_version: "v1.2.0"
    cis_control: "3.1.1.3"
    cis_section: "3"
    profile_applicability: ""
    description: >
      Logging changes to the EIGRP peering relationships is recommended. This
      setting is enabled by default.
    rationale: >
      Any logged changes in a routing peer relationship will in the best case
      indicate a service issue due to standard operational issues (connectivity
      issues and so on) or in the worst case, could indicate malicious activity
      attempting to subvert the peering relationship and/or the routing table.
      Impact: Errors on adjacency relationships are a common early warning message
      in attacks on routers. If successful, a malicious actor can advertise bogus
      routes to valid hosts or networks, allowing the interception and modification
      of traffic intended for those hosts or subnets. For this reason it is
      important that EIGRP endpoints alert on any interruptions in adjacency.
    audit_procedure: >
      By default EIGRP adjacency changes are logged, and this does not show in the
      configuration. Audit pass (no output): switch# sho run eigrp | i adjacency
      Audit failure (logging is disabled, as shown in the output): switch# sho run
      eigrp | i adjacency no log-adjacency-changes Log entries of adjacency changes
      being formed and dropped are shown below. Logging servers and SIEMs should be
      configured to alert on the keyword 'NBRCHANGE': 2020 May 22 18:47:32 switch
      %EIGRP-5-NBRCHANGE_DUAL: eigrp-10 [3857] (default-base) IP-EIGRP(0) 10:
      Neighbor 10.10.10.11 (Vlan1) is up: new adjacency 2020 May 22 18:48:07 switch
      %EIGRP-5-NBRCHANGE_DUAL: eigrp-10 [3857] (default-base) IP-EIGRP(0) 10:
      Neighbor 10.10.10.11 (Vlan1) is down: holding time expired
    remediation: >
      By default EIGRP adjacency changes are logged, and this does not show in the
      configuration. If however it is disabled, it can be re-enabled as shown below.
      switch(config)# router eigrp <eigrp process tag> switch(config-router)# log-
      adjacency-changes Default Value: By default logging of eigrp adjacency changes
      is enabled.
    references: >
      
    impact: >
      
    compliance_mappings:
      cis:
        - "CIS_CISCO_NXOS_v1_2_0_3_1_1_3"
      nist_800_53: []
      soc2: []
      pci_dss: []
    source_unique_id: "cis_cisco_nxos_v1_2_0_3_1_1_3"
