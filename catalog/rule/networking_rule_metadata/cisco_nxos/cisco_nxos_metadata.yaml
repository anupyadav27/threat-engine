  - rule_id: cisco_nxos.cis.1.configure_at_least_2_external_ntp_servers
    title: "Configure at least 2 external NTP Servers"
    severity: medium
    category: networking
    tech_type: cisco_nxos
    automation_type: manual
    cis_benchmark: "CIS_CISCO_NXOS v1.2.0"
    cis_version: "v1.2.0"
    cis_control: "1.6.1"
    cis_section: "1"
    profile_applicability: ""
    description: >
      Accurate time is a critical piece of security infrastructure. Without accurate
      time on all infrastructure, it is complex or even impossible to correlate
      events from multiple sources to get an accurate view of a security incident or
      technical issue. Using multiple sources gives redundancy in time sources. In
      most infrastructures, for efficiency only a small subset of devices (often a
      redundant pair of routers or switches) will use redundant external time
      sources. All other infrastructure will then synchronize time from them. This
      also means that any perimeter firewalls can be configured to limit NTP
      requests to the public internet to just those sources and destinations. The
      exception would of course be if the organization has an on-premise, internal
      atomic or GPS based network time source. Even in those situations an tiered
      NTP infrastructure is generally recommended on the internal network.
    rationale: >
      Accurate time is a critical piece of security infrastructure. Without accurate
      time on all infrastructure, it is complex or even impossible to correlate
      events from multiple sources to get an accurate view of a security incident or
      technical issue. Also, without accurate time authentication issues can arise.
      If an attacker can influence the NTP traffic, it is possible to 'back-date'
      NTP responses to permit the use of older certificates, or 'forward-date' NTP
      responses to invalidate any certificates in use on the device. Using multiple
      sources gives redundancy in time sources. If a management network is in use in
      the infrastructure, using the management VRF to source time can help to
      protect NTP response traffic from tampering. It is key to set an NTP source
      interface, so that any perimeter devices can be configured to permit NTP
      requests from those IP addresses, and to restrict NTP requests to a list of
      authorized IP addresses. Be sure that this is a 'reliable' interface. In many
      cases this means using a loopback interface, so that any of several interfaces
      can be used to route the request to the NTP server. If a non-loopback
      interface is used, understand that if that interface is in a down state then
      NTP requests will not be sent. Impact: Accurate time is a critical piece of
      security infrastructure. Without accurate time on all infrastructure, it is
      complex or even impossible to correlate events from multiple sources to get an
      accurate view of a security incident or technical issue.
    audit_procedure: >
      The 'show running-config ntp' command will list all configured NTP servers.
      Note that the IP addresses are for demonstrations purposes only, production
      configurations will likely vary. switch(config)# sho run ntp !Command: show
      running-config ntp !Running configuration last done at: Sat Apr 25 10:40:55
      2020 !Time: Sat Apr 25 10:41:01 2020 version 9.3(3) Bios:version ntp server
      13.86.101.172 use-vrf management ntp server 132.163.97.6 use-vrf management
      ntp server 132.246.11.231 use-vrf management ntp source-interface loopback1
      NTP default commands which are not explicitly configured can be displayed by
      using the 'show running-config ntp all' command. switch(config)# sho running-
      config ntp all !Command: show running-config ntp all !Running configuration
      last done at: Sat Apr 25 11:31:43 2020 !Time: Sat Apr 25 11:33:44 2020 version
      9.3(3) Bios:version ntp server 13.86.101.172 use-vrf management ntp server
      132.163.97.6 use-vrf management ntp server 132.246.11.231 use-vrf management
      ntp source-interface loopback1 feature ntp no ntp allow private no ntp allow
      control no ntp passive clock format 24-hours
    remediation: >
      If the default VRF is used (note that the IP addresses are for demonstrations
      purposes only, production configurations will likely vary): switch(config)#ntp
      server 13.86.101.172 use-vrf default switch(config)#ntp server 132.163.97.6
      use-vrf default switch(config)#ntp server 132.246.11.231 use-vrf default
      switch(config)#ntp source-interface loopback1 If a management VRF is used:
      switch(config)#ntp server 13.86.101.172 use-vrf management switch(config)#ntp
      server 132.163.97.6 use-vrf management switch(config)#ntp server
      132.246.11.231 use-vrf management switch(config)#ntp source-interface
      loopback1 Default Value: NTP settings are not in the default confguration,
      they must be added. If a source VRF is not specified, the default VRF is used
      If a source interface is not specified, the interface that is topologically
      closest to the NTP service is used.
    references: >
      
    impact: >
      
