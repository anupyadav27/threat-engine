  - rule_id: cisco_nxos.cis.1.enable_password_complexity_requirements_for_local
    title: "Enable Password Complexity Requirements for Local Credentials"
    severity: medium
    category: networking
    tech_type: cisco_nxos
    automation_type: automated
    cis_benchmark: "CIS_CISCO_NXOS v1.2.0"
    cis_version: "v1.2.0"
    cis_control: "1.4.1"
    cis_section: "1"
    profile_applicability: ""
    description: >
      While configuring a back-end authentication store is the recommended
      configuration, at least one local administrative account must be configured.
      For this reason, ensuring a minimum bar for password strength for all local
      administrative accounts is important. Enabling this setting enforces passwords
      that conform to the following rules: • At least eight characters long • Does
      not contain many consecutive characters (such as 'abcd') • Does not contain
      many repeating characters (such as 'aaabbb') • Does not contain dictionary
      words • Does not contain proper names • Contains both uppercase and lowercase
      characters • Contains numbers
    rationale: >
      While in ideal conditions local credentials won't be used, there are many
      scenarios (such as deployed on a purely public network or on an air gapped
      network) where this is the only option. Even if a back-end authentication
      source is used, if that service is not available the fall-back authentication
      is often to local credentials. Impact: Having a simple password (for instance,
      based on a dictionary word) for administrative credentials makes that account
      susceptible to credential stuffing attacks. Even if using a back-end
      credential store such as TACACS+ or RADIUS, an attacker can drill down to the
      local credentials by taking the back-end service offline.
    audit_procedure: >
      A simple 'show' command audits the state of this setting: switch# show
      password strength-check Password strength check is enabled
    remediation: >
      A single command enables this: switch(config)# password strength-check Default
      Value: Password strength checking is enabled by default. When enabled, this
      setting does not appear in the configuration. When enabled, the password
      strength settings are: • At least eight characters long • Does not contain
      many consecutive characters (such as 'abcd') • Does not contain many repeating
      characters (such as 'aaabbb') • Does not contain dictionary words • Does not
      contain proper names • Contains both uppercase and lowercase characters •
      Contains numbers Additional Information:
      https://www.cisco.com/c/en/us/td/docs/switches/datacenter/sw/4_0/nx-
      os/security/configuration/guide/sec_nx-os_config/sec_rbac.html#wp1314939
    references: >
      
    impact: >
      
    compliance_mappings:
      cis:
        - "CIS_CISCO_NXOS_v1_2_0_1_4_1"
      nist_800_53: []
