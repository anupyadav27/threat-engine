  - rule_id: cisco_nxos.cis.1.exec_timeout_for_console_sessions_is_set_for_less
    title: "Ensure Exec Timeout for Console Sessions is set for less than 10"
    severity: medium
    category: networking
    tech_type: cisco_nxos
    automation_type: automated
    cis_benchmark: "CIS_CISCO_NXOS v1.2.0"
    cis_version: "v1.2.0"
    cis_control: "1.2.4"
    cis_section: "1"
    profile_applicability: ""
    description: >
      Verify device is configured to automatically disconnect console sessions after
      a defined maximum session time, set in minutes.
    rationale: >
      This prevents unauthorized users from misusing abandoned sessions. For
      example, if the network administrator disconnects leaving a console session
      open, that session will remain open (in the same state and privilege level)
      for the next person who connects a console cable to the device. A shorter
      timeout is usually desired, but this can be extended for longer-running
      operations such as debug sessions or NX-OS updates. This is not an idle timer,
      it is the maximum length of a session. This is a key difference that should be
      taken into account when determining the best value for your organization and
      your work habits.
    audit_procedure: >
      switch# sho run | b console line console exec-timeout 10
    remediation: >
      switch(config)# line console switch(config)# exec-timeout 10 Default Value:
