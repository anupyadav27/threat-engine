  - rule_id: cisco_nxos.cis.3.configure_fcoe_zoning
    title: "Configure FCoE Zoning"
    severity: medium
    category: networking
    tech_type: cisco_nxos
    automation_type: manual
    cis_benchmark: "CIS_CISCO_NXOS v1.2.0"
    cis_version: "v1.2.0"
    cis_control: "3.5.2"
    cis_section: "3"
    profile_applicability: ""
    description: >
      Cisco uses a construction called a 'VSAN' (analagous to a VLAN) which is used
      to restrict access between hosts and SAN resources. In restrictive cases, a
      typical VSAN will include two entries for the two host FCoE interfaces, and
      two entries for the SAN Controller interfaces (usually an FCoE SAN will have
      at least two). In the most restrictive case, the FCOE infrastructure will be
      split into two fabrics, and zones can hold as few as 2 entries (one for the
      host and one for the SAN controller on that fabric).
    rationale: >
      Impact: This configuration limits the reconnaissance available to a
      compromised or malicious host. Without configuring Zoning, a compromised host
      can collect the FCoE information from all other hosts in the same VSAN. It can
      then use that information to impersonate any of these hosts, and access their
      respective LUNs (unless some other control prevents that). Note that in
      Virtualized environments and in most Cluster architectures, multiple
      hypervisor hosts will access the a common set of LUNs on the SAN. In these
      situations the VSAN can have significantly more members (all host interfaces
      as well as all target SAN controller interfaces), since the reconnaissance and
      impersonation risks are somewhat lessened - you would need a compromised
      hypervisor to attack another hypervisor. While this risk is non-zero, it is
      understood that hypervisors typically (hopefully) have more strict protections
      than many other physical hosts. In addition, risk occurs if different server
      operating systems are in play. The most common issue is that if a Windows host
      can mount a volume that is partitioned for Linux or VMware ESXi, Windows will
      ask a logged in administrator for permission to 'sign' that volume. If the
      administrator selects 'Yes', then that volume will no longer be readable by
      the Linux or ESXi host(s). At a minimum, hypervisors should not share a zone
      with other physical hosts. Physical hosts should not share zones with each
      other. Hosts with different operating systems or incompatible filesystems
      should never share the same zone. In the best case, the 'one host / one SAN
      controller / one zone' rule is the safest approach.
    audit_procedure: >
      switch# sho vsan 101 vsan 101 information name:HOST_X_SAN_Y state:active
      interoperability mode:default loadbalancing:src-id/dst-id/oxid operational
      state:down switch# sho vsan membership vsan 1 interfaces: vsan 100 interfaces:
      vsan 101 interfaces: vfc1001 vfc1002 vsan 4079(evfp_isolated_vsan) interfaces:
      vsan 4094(isolated_vsan) interfaces: switch# sho int vfc 1001 vfc1001 is down
      (Administratively down) Bound MAC is 00:01:0b:00:00:02 Hardware is Ethernet
      Port WWN is 23:e8:8c:60:4f:a6:29:bf Admin port mode is F, trunk mode is on
      snmp link state traps are enabled Port vsan is 101 1 minute input rate 0
      bits/sec, 0 bytes/sec, 0 frames/sec 1 minute output rate 0 bits/sec, 0
      bytes/sec, 0 frames/sec 0 frames input, 0 bytes 0 discards, 0 errors 0 frames
      output, 0 bytes 0 discards, 0 errors last clearing of 'show interface'
      counters never switch# sho fcoe database
      -----------------------------------------------------------------------------
      -- INTERFACE FCID PORT NAME MAC ADDRESS
      -----------------------------------------------------------------------------
      --
    remediation: >
      Create a VSAN. Give it a meaningful name switch(config-if)# vsan database
      switch(config-vsan-db)# vsan 101 switch(config-vsan-db)# vsan 101 name
      HOST_X_SAN_Y Create Virtual Fiber Channel Interfaces. switch(config)#
      interface vfc 1001 switch(config-if)# bind mac-address 00:01:0b:00:00:02
      switch(config-if)# int vfc 1002 switch(config-if)# bind mac-address
      00:01:0b:00:00:08 switch(config)# int vfc 1003 switch(config-if)# bind
      interface e 1/4 Add VFC interfaces to the VSAN switch(config-if)# vsan
      database switch(config-vsan-db)# vsan 101 interface vfc 1001 switch(config-
      vsan-db)# vsan 101 interface vfc 1002 switch(config-vsan-db)# vsan 101
      interface vfc 1003 Default Value: By default, if FCoE is not enabled. If FCoE
      is enabled and configured, if a single VSAN is configured all FCoE devices
      have access to all other FCOE devices.
    references: >
      
    impact: >
      
    compliance_mappings:
      cis:
        - "CIS_CISCO_NXOS_v1_2_0_3_5_2"
      nist_800_53: []
      soc2: []
      pci_dss: []
