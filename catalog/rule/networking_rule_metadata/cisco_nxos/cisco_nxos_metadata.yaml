  - rule_id: cisco_nxos.cis.3.authenticate_ospf_peers_with_md5_authentication
    title: "Authenticate OSPF peers with MD5 authentication keys"
    severity: medium
    category: networking
    tech_type: cisco_nxos
    automation_type: manual
    cis_benchmark: "CIS_CISCO_NXOS v1.2.0"
    cis_version: "v1.2.0"
    cis_control: "3.1.3.2"
    cis_section: "3"
    profile_applicability: ""
    description: >
      If OSPF is configured, peers can be authenticated using keys. This is not
      configured by default. If configured, MD5 hashes are recommended as the
      authentication mechanism. MD5 is the best option for multi-vendor support, and
      is also the best cryptographic option available in the OSPF standard.
    rationale: >
      Impact: Because OSPF is a multicast protocol, any device can advertise OSPF
      capabilities and routes, and by default all connected OSPF devices will honor
      those advertisements. This means that a malicious actor can advertise bogus
      routes to valid hosts or networks, allowing the interception and modification
      of traffic intended for those hosts or subnets. For this reason it is
      important that OSPF endpoints authenticate to each other, ensuring that only
      valid routers can participate in the exchange of routes.
    audit_procedure: >
      The 'show running-configuration ospf' lists the entire OSPF configuration. For
      all interfaces that face peers, ensure that these two commands are in place:
      interface <interfacename> ip ospf authentication message-digest ip ospf
      authentication key-chain <OSPF Key-Chain name> Each OSPF routeable interface
      should either have authentication configured or be configured as an OSPF
      passive interface. switch(config-if)# sho run ospf !Command: show running-
      config ospf !Running configuration last done at: Wed May 20 14:39:55 2020
      !Time: Wed May 20 14:43:02 2020 version 9.3(3) Bios:version feature ospf
      router ospf 10 router-id 10.10.10.10 interface Vlan1 ip ospf authentication
      message-digest ip ospf authentication key-chain OSPFKeyChain ip router ospf 10
      area 0.0.0.0
    remediation: >
      For each OSPF routeable interface, set the message-digest authentication
      method, and assign the appropriate keychain. Each OSPF routeable interface
      should either have authentication configured or be configured as an OSPF
      passive interface. switch(config)# interface Vlan1 switch(config-int)# ip ospf
      authentication message-digest switch(config-int)# ip ospf authentication key-
      chain <OSPF Key Chain> Default Value: By default, OSPF authentication is not
      enabled by default.
    references: >
      
    impact: >
      
    compliance_mappings:
      cis:
        - "CIS_CISCO_NXOS_v1_2_0_3_1_3_2"
      nist_800_53: []
      soc2: []
      pci_dss: []
    source_unique_id: "cis_cisco_nxos_v1_2_0_3_1_3_2"
