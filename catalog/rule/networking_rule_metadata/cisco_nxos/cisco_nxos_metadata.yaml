  - rule_id: cisco_nxos.cis.1.disable_power_on_auto_provisioning_poap
    title: "Disable Power on Auto Provisioning (POAP)"
    severity: medium
    category: networking
    tech_type: cisco_nxos
    automation_type: automated
    cis_benchmark: "CIS_CISCO_NXOS v1.2.0"
    cis_version: "v1.2.0"
    cis_control: "1.7.1"
    cis_section: "1"
    profile_applicability: ""
    description: >
      PowerOn Auto Provisioning (POAP) allows the switch to be auto-provisioned at
      the time of power-on. This can be extremely useful in a tightly controlled
      environment, with a solid 'network as code' mindset and dev-ops procedures in
      place for network operations.
    rationale: >
      Impact: Without solid procedures and a well-controlled environment, POAP
      provides a malicious actor the ability to compromise a switch as it is being
      deployed out of the box. This 'day 0' approach to compromising gives the
      attacker control of the switch from the start - it can be difficult to detect
      that this has occurred, and may require physical access to gain control back.
    audit_procedure: >
      The 'show boot' statement will show the status of POAP in both the running and
      saved configuration (successful audit criteria shown): switch# sho boot
      Current Boot Variables: sup-1 NXOS variable = bootflash:/nxos.9.3.3.bin Boot
      POAP Disabled Boot Variables on next reload: sup-1 NXOS variable =
      bootflash:/nxos.9.3.3.bin Boot POAP Disabled Alternatively, the command can be
      parsed from the running or startup config (failed audit criteria shown). Note
      that POAP is not enabled by default, and if disabled does not show in either
      the running or startup configuration: switch# sho run | i poap boot poap
      enable switch# sho start | i poap boot poap enable
    remediation: >
      To disable POAP, use the command: switch(config)# no boot poap enable Default
      Value: POAP is not enabled by default. The 'boot poap' configuration line does
      not show in the running or startup configuration if it is disabled, only if it
      is enabled. References: 1.
      https://tools.cisco.com/security/center/content/CiscoSecurityAdvisory/cisco-
      sa- 20190306-info-poap
