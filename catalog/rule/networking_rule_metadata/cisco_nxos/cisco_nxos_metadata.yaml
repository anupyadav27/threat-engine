  - rule_id: cisco_nxos.cis.3.disable_proxy_arp_on_all_layer_3_interfaces
    title: "Disable Proxy ARP on all Layer 3 Interfaces"
    severity: medium
    category: networking
    tech_type: cisco_nxos
    automation_type: automated
    cis_benchmark: "CIS_CISCO_NXOS v1.2.0"
    cis_version: "v1.2.0"
    cis_control: "3.2.3"
    cis_section: "3"
    profile_applicability: ""
    description: >
      Proxy ARP is the technique in which one host, usually a router, answers ARP
      requests intended for another machine on a different network segment (vlan or
      subnet). By faking its identity, the router accepts responsibility for routing
      packets to the real destination.
    rationale: >
      
    audit_procedure: >
      Since Proxy ARP should be disabled on all routed interfaces, and if disabled
      it does not show in the configuration, any occurence of the keyword 'proxy-
      arp' in the configuration is an audit failure for this check: switch# Show
      running-config | inc proxy-arp More completely, an interface state can be
      viewed, filtering only for Proxy ARP settings (note that the case of the word
      'proxy' varies, so the 'P' is removed from the filter): switch# sho ip int
      vlan 1 | i roxy IP proxy ARP : disabled IP Local Proxy ARP : disabled Or to
      quickly view the Proxy ARP status of all interfaces: switch# sho ip int | i
      roxy IP proxy ARP : disabled IP Local Proxy ARP : disabled IP proxy ARP :
      disabled IP Local Proxy ARP : disabled In these last two examples, the desired
      state is that all entries should be 'disabled'. The presence of the word
      'enabled' is an audit failure.
    remediation: >
      Proxy ARP is disabled on all interfaces by default, and that configuration
      does not appear in the running or saved configuration. Proxy ARP only appears
      in the configuration if it is enabled (which is not desired in most cases). To
      disable this on an interface if it is enabled: switch(config-if)# no ip proxy-
      arp for instance: switch(config)# int vlan 9 switch(config-if)# no ip proxy-
      arp Default Value: By default the Proxy ARP feature is disabled on all IP
      Interfaces. This desired and default setting does not appear in the
      configuration. This default setting does not appear in the running or saved
      configurations.
    references: >
      
