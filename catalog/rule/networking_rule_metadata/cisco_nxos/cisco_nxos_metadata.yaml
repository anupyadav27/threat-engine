  - rule_id: cisco_nxos.cis.1.set_the_maximum_number_of_vty_sessions
    title: "Set the Maximum Number of VTY Sessions"
    severity: medium
    category: networking
    tech_type: cisco_nxos
    automation_type: automated
    cis_benchmark: "CIS_CISCO_NXOS v1.2.0"
    cis_version: "v1.2.0"
    cis_control: "1.2.6"
    cis_section: "1"
    profile_applicability: ""
    description: >
      This sets the maximum number of remote administrative sessions, which in most
      environments means the maximum number of SSH sessions.
    rationale: >
      This setting prevents an attacker from a resource-exhaustion attack using
      protocol such as SSH. If there is no limit, an attacker could simply create
      SSH sessions and leave them in place until the NX-OS host resources (memory)
      would be exhausted. This is not a practical attack against NX-OS however, as
      the default value for this setting is 32, and the maximum is only 64. Setting
      this value to something other than the default (32) ensures that it shows in
      the configuration, so that administrators understand what this value is both
      during regular administration or during an attack. Impact: Whatever this value
      is set to, an attacker can exhaust all SSH sessions so that a legitimate
      administrator cannot connect remotely. This is a reasonable thing for an
      attacker to do if they have an attack in progress and want to deny
      administrators access to the NX-OS platform, which they may need to do to
      thwart an in-progress attack.
    audit_procedure: >
      switch# sho run | b vty line vty exec-timeout 10 session-limit 16
    remediation: >
      switch(config)# line vty switch(config)# session-limit 16 Default Value: The
      default value for this setting is 32 sessions. If set to this value, the
      setting is not shown in the running or saved configuration.
    references: >
      
