  - rule_id: cisco_nxos.cis.3.if_vlan_interfaces_have_ip_addreses_configure
    title: "If VLAN interfaces have IP addreses, configure anti spoofing / ingress filtering protections"
    severity: medium
    category: networking
    tech_type: cisco_nxos
    automation_type: manual
    cis_benchmark: "CIS_CISCO_NXOS v1.2.0"
    cis_version: "v1.2.0"
    cis_control: "3.1.4.1"
    cis_section: "3"
    profile_applicability: ""
    description: >
      If VLAN interfaces have IP addresses, it is important that anti-spoofing
      protections are in place, to prevent an attacker from spoofing an address that
      is illegal on that inbound interface.
    rationale: >
      If an attacker is allowed to 'spoof' addresses to the point that packets are
      permitted to arrive on the incorrect interface, it becomes possible for an
      attacker to spoof their trust level from a network point of view, for instance
      to source 'inside' addresses from an 'outside' interface. Impact: The URPF
      feature uses the same tables as the routing protocol, so the CPU impact of
      configuring this feature is low. However, logging of high volume URPF attacks
      (or URPF misconfigurations) can result in: • higher CPU impacts on the switch
      • as higher network utilization on the path to the logging server • higher
      disk utilization on the logging server • higher cpu utilization on the logging
      server Because of this, URPF events, especially in higher volumes should be
      configured to generate a high priority alert in your logging server or SIEM.
    audit_procedure: >
      The 'show run ip' command will show all IP interfaces as well as their URPF
      settings. All non-loopback interfaces that have IP addresses should have URPF
      configured (ip verify unicast source). switch# sho run ip !Command: show
      running-config ip !Running configuration last done at: Sun May 17 13:32:08
      2020 !Time: Sun May 17 13:36:49 2020 version 9.3(3) Bios:version vrf context
      management ip route 0.0.0.0/0 10.17.8.2 ip route 0.0.0.0/0 192.168.122.1
      interface Vlan1 ip address 10.10.10.10/24 ip verify unicast source reachable-
      via rx
    remediation: >
      Apply the command 'ip verify unicast source reachable-via rx' to all VLAN
      interfaces that have IP addresses. This forces the check to verify that the
      packet is arriving on the correct interface. The command variant 'ip verify
      unicast source reachable-via any' is not recommended, as it only filters for
      valid IP addresses. If the device has a default route, then this command
      variant has no affect. switch(config)# interface Vlan X switch(config-if)# ip
      verify unicast source reachable-via rx Default Value: By default, unicast
      reverse forwarding protections are not enabled
    references: >
      
    impact: >
      
    compliance_mappings:
      cis:
        - "CIS_CISCO_NXOS_v1_2_0_3_1_4_1"
      nist_800_53: []
      soc2: []
      pci_dss: []
    source_unique_id: "cis_cisco_nxos_v1_2_0_3_1_4_1"
