  - rule_id: cisco_nxos.cis.1.if_snmpv2_is_in_use_set_restrictions_on_access
    title: "If SNMPv2 is in use, set Restrictions on Access"
    severity: medium
    category: networking
    tech_type: cisco_nxos
    automation_type: manual
    cis_benchmark: "CIS_CISCO_NXOS v1.1.0"
    cis_version: "v1.1.0"
    cis_control: "1.5.2"
    cis_section: "1"
    profile_applicability: ""
    description: >
      NX-OS allows administrators to restrict SNMPv2 access to known management
      stations, usually servers with an NMS (Network Management System) installed.
      It is recommended that only known NMS servers have access to SNMPv2 functions
      on network infrastructure. While SNMP is not enabled by default on the NX-OS
      platform, historically the SNMP strings of 'public' (for read-only access) and
      'private' (for read- write access) have been used. These well-known values
      should never be configured.
    rationale: >
      Since SNMPv2 is a clear-text UDP protocol, this combination means that even
      this precaution still exposes this traffic to spoofing, eavesdropping and in-
      flight modification attacks. It also means that the switch can be used as a
      DDOS amplification host if the NMS server's IP address is known. For all of
      these reasons, the best recommendation is in fact to disable SNMPv2 and use
      SNMPv3. Proceed with this recommendation only if you must use SNMPv2 for some
      reason. Impact: If SNMPv2 is configured, not restricting access to SNMPv2
      allows an attacker to launch a dictionary and/or a brute force attack to
      compromise the SNMPv2 community string. This would then give the attacker the
      ability to collect key information from the target switch, including it's
      version, interface status and configuration parameters.
    audit_procedure: >
      The 'show snmp community' command will show all configured community strings
      and their applied ACLs: switch(config)# sho snmp community Community Group /
      Access context acl_filter _________ ______________ _______ __________
      somecomplexstring network-operator ACL mapped: ipv4:ACL- IPV4-SNMPv2 To show
      the exact and complete configuration commands, use 'show running-
      configuration snmp': switch# show run snmp !Command: show running-config snmp
      !Running configuration last done at: Thu Apr 30 21:47:03 2020 !Time: Thu Apr
      30 21:48:48 2020 version 9.3(3) Bios:version snmp-server community
      somecomplexstring group network-operator snmp-server community
      somecomplexstring use-ipv4acl ACL-IPV4-SNMPv2 Finally, to show the ACL, use
      the 'show access-list' command: switch# show access-lists ACL-IPV4-SNMPv2 IP
      access list ACL-IPV4-SNMPv2 10 permit udp 1.2.3.4/32 3.4.5.6/32 eq snmp 20
      permit udp 1.2.3.8/2 3.4.5.6/32 eq snmp 30 deny ip any any log
    remediation: >
      Create the ACL: switch(config)# ip access-list ACL-IPV4-SNMPv2 switch(config-
      acl)# permit udp 1.2.3.4/2 1.2.3.6/32 eq 161 switch(config-acl)# deny ip any
      any log Then apply the ACL to the configured SNMP Community. The snmp-server
      community must be configured before applying the ACL. switch(config)# snmp-
      server community <somecomplexstring> ro switch(config)# snmp-server community
      <somecomplexstring> use-ipv4acl ACL- IPV4-SNMPV2 For IPv6, the parameter 'use-
      ipv6acl' would be used instead. Note that either an IPv4 OR an IPv6 ACL can be
      applied to a given SNMP community string, not both. In releases prior to Cisco
      NX-OS Release 7.0(3)I4(1), this CLI command includes use- acl rather than use-
      ipv4acl. Default Value: By default SNMP is not configured on NX-OS platforms.
    references: >
      
    impact: >
      
    compliance_mappings:
      cis:
        - "CIS_CISCO_NXOS_v1_1_0_1_5_2"
      nist_800_53: []
      soc2: []
      pci_dss: []
