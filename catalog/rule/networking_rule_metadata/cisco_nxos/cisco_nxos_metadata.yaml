    description: >
      If local time zones are configured on network infrastructure, it is important
      to also configure the time 'shift' that occurs as a result of Daylight Savings
      Time.
    rationale: >
      Impact: If local time zones are configured on network infrastructure, it is
      usually to simplify relating reported end-user issues back to local time
      entries in the logs. So if local time zones are configured and used in this
      manner, it becomes important to also configure the time 'shift' that occurs as
      a result of Daylight Savings Time (or 'summer-time' on the Cisco CLI)
    audit_procedure: >
      switch(config)# sho run | i summer-time clock summer-time EDT 2 Sun Mar 02:00
      1 Sun Nov 02:00 60
    remediation: >
      In most cases, just the name of the DST timezone name is sufficient. NX-OS
      assumes 1 hour offset, using the United States dates for DST. switch(config)#
      clock summer-time <DST Timezone Name> for example: switch(config)# clock
      summer-time EDT If a full definition of the change is needed, it can certainly
      be set: switch(config)# clock summer-time <DST Timezone Name> <day1> <month1>
      <time1> <day2> <month2> <time2> <offset in minutes> where: • day1, month1,
      time1 define the start of the DST period • day2, month2, time2 define the end
      of the DST period Default Value: By default, summer-time (Daylight Savings
      Time) is not configured. If the summer-time start and stop dates are not
      specified, then the US standard dates are used: start = 2 Sun Mar 02:00 stop =
      1 Sun Nov 02:00 60
