  - rule_id: cisco_nxos.cis.3.configure_eigrp_passive_interfaces_for_interfaces
    title: "Configure EIGRP Passive interfaces for interfaces that do not have peers"
    severity: medium
    category: networking
    tech_type: cisco_nxos
    automation_type: manual
    cis_benchmark: "CIS_CISCO_NXOS v1.2.0"
    cis_version: "v1.2.0"
    cis_control: "3.1.1.2"
    cis_section: "3"
    profile_applicability: ""
    description: >
      EIGRP both listens on and advertises on all interfaces that have IPs in
      subnets that are defined as 'networks' in the EIGRP configuration. Ensure that
      interfaces that do not 'face' an EIGRP peer are set to passive.
    rationale: >
      If an interface is set to 'passive', then EIGRP will not advertise out of that
      interface or listen on that interface for EIGRP neighbors. By default, all
      interfaces advertise via multicast to solicit EIGRP neighbors, and also listen
      for neighbor advertisements. Impact: If an interface is set to the default (ie
      - not passive), then an attacker can pose as an EIGRP peer, either to collect
      EIGRP information from advertisements or to inject bogus routes into the
      table. Bogus routes can then be used to DOS that subnet, or to intercept
      traffic to or from that subnet either to eavesdrop on conversations or to
      modify data in transit. Quite often the goal of an attack of this type is to
      collect login credentials from a malicious copy of the target website.
    audit_procedure: >
      The 'show running-config eigrp' command will list the entire EIGRP
      configuration. Passive interfaces are listed individually - in this example,
      interface VLAN 1 is passive switch# sho run eigrp !Command: show running-
      config eigrp !Running configuration last done at: Wed May 20 14:13:17 2020
      !Time: Wed May 20 14:17:22 2020 version 9.3(3) Bios:version feature eigrp
      router eigrp 10 address-family ipv4 unicast authentication mode md5
      authentication key-chain <key-chain-name> interface Vlan1 ip passive-interface
      eigrp 10
    remediation: >
      If some IP interfaces have peers and some do not, set the ones with no peers
      to 'passive' switch(config-if)# int vlan 1 switch(config-if)# ip passive-
      interface eigrp <EIGRP process number> Default Value: By default, passive
      interfaces are not configured.
    references: >
      
