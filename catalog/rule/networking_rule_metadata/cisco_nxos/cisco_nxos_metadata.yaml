  - rule_id: cisco_nxos.cis.3.if_possible_limit_the_bgp_routes_accepted_from
    title: "If Possible, Limit the BGP Routes Accepted from Peers"
    severity: medium
    category: networking
    tech_type: cisco_nxos
    automation_type: manual
    cis_benchmark: "CIS_CISCO_NXOS v1.2.0"
    cis_version: "v1.2.0"
    cis_control: "3.1.2.2"
    cis_section: "3"
    profile_applicability: ""
    description: >
      Once a BGP relationship is established, the BGP process will accept routes
      from any connected peers and consider those routes to be valid. For this
      reason, especially in ISP or other carrier situations, it is important that
      only routes that are valid for any particular peer are accepted for that peer.
    rationale: >
      Impact: Without configuring route filtering, any route advertised by any BGP
      peer is considered valid. For this reason, especially in carrier or ISP
      situations it is important that route filtering be configured. Without
      filtering, a misconfigured or compromised peer can easily advertise entire
      subnets that should be routed elsewhere, either routing them to nul or
      receiving traffic to the compromised subnet for for interception or
      modification, then forwarding it on to it's final destination.
    audit_procedure: >
      'Show run bgp' will show a summary of the BGP configuration. In this case, we
      are looking for the inbound route-map statement (the last line in this
      example): switch# sho run bgp !Command: show running-config bgp !Running
      configuration last done at: Tue May 19 17:08:35 2020 !Time: Tue May 19
      17:14:14 2020 version 9.3(3) Bios:version feature bgp router bgp 65520 router-
      id 10.10.10.10 address-family ipv4 unicast network 10.10.10.0/24 neighbor
      10.10.10.11 remote-as 65521 address-family ipv4 unicast route-map route-map
      RM_BGP_PEERNAME_IN in Showing the route-map displays the prefix list, which
      defines what subnets are permitted: switch# sho route-map RM_BGP_PEERNAME_IN
      route-map RM_BGP_PEERNAME_IN, permit, sequence 10 Match clauses: ip address
      prefix-lists: PL_PEERNAME_PERMIT_SUBNETS Set clauses: Finally, to display the
      prefixes: switch# show ip prefix-list PL_PEERNAME_PERMIT_SUBNETS ip prefix-
      list PL_PEERNAME_PERMIT_SUBNETS: 2 entries seq 5 permit 10.11.11.0/24 seq 10
      permit 10.11.12.0/24
    remediation: >
      First, define the subnets that will be permitted from the peer PEERNAME (use
      descriptive, self documenting names in NX-OS constructions where possible).
      Note that any subnets not listed as permitted are by default denied (there is
      an implicit 'deny all' at the bottom of the list) switch(config)# ip prefix-
      list PL_PEERNAME_PERMIT_SUBNETS description Permitted Subnets from Peer
      PEERNAME switch(config)# ip prefix-list PL_PEERNAME_PERMIT_SUBNETS permit
      10.11.11.0/24 switch(config)# ip prefix-list PL_PEERNAME_PERMIT_SUBNETS permit
      10.11.12.0/24 In this example above, only 'permits' are defined. Deny lines
      are also allowed - refusing routes that are not accepted (for instance 'bogon'
      or 'martian' subnets), and may be more important in some situations, for
      example if this switch is accepting routes from the public internet. (note
      that this is not typical deployment scenario for an NX-OS switch) Next, create
      the route-map, will will apply that list: switch(config)# route-map
      RM_BGP_PEERNAME_IN permit 10 switch(config-route-map)# match ip address
      prefix-list PL_PEERNAME_PERMIT_SUBNETS Finally, within the BGP configuration,
      apply that route-map to the BGP peer definition. Note that the 'in' keyword
      denotes inbound (accepted) information.: switch(config)# router bgp 65520
      switch(config-router)# router-id 10.10.10.10 switch(config-router)# address-
      family ipv4 unicast switch(config-router-af)# network 10.10.10.0/24
      switch(config-router-af)# neighbor 10.10.10.11 switch(config-router-neighbor)#
      remote-as 65521 switch(config-router-neighbor)# address-family ipv4 unicast
      switch(config-router-neighbor-af)# route-map RM_BGP_PEERNAME_IN in Default
      Value: BGP filtering is not enabled by default. By default, all routes
      received from defined peers are accepted as valid. References: 1.
      https://www.cisco.com/c/en/us/td/docs/switches/datacenter/sw/4_2/nx-
      os/unicast/configuration/guide/l3_cli_nxos/l3_bgp.html
