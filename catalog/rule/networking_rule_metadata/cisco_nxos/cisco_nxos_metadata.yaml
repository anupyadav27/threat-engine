  - rule_id: cisco_nxos.cis.3.configure_eigrp_authentication_on_all_eigrp
    title: "Configure EIGRP Authentication on all EIGRP Routing Devices"
    severity: medium
    category: networking
    tech_type: cisco_nxos
    automation_type: manual
    cis_benchmark: "CIS_CISCO_NXOS v1.2.0"
    cis_version: "v1.2.0"
    cis_control: "3.1.1.1"
    cis_section: "3"
    profile_applicability: ""
    description: >
      You can configure authentication between neighbors for EIGRP
    rationale: >
      You can configure EIGRP authentication for the EIGRP process or for individual
      interfaces. Interface EIGRP authentication configuration overrides the EIGRP
      process- level authentication configuration. Because EIGRP is a multicast
      protocol, any device can advertise EIGRP capabilities and routes, and by
      default all connected EIGRP devices will honor those advertisements. This
      means that a malicious actor can advertise bogus routes to valid hosts or
      networks, allowing the interception and modification of traffic intended for
      those hosts or subnets. For this reason it is important that EIGRP endpoints
      authenticate to each other, ensuring that only valid routers can participate
      in the exchange of routes.
    audit_procedure: >
      The 'show running-configuration eigrp' command will show all of the EIGRP
      configuration, ensure that in the main EIGRP address-family section (whether
      that is ipv4 or ipv6) has both 'authentication mode md5' set, and the
      appropriate key-chain assigned switch(config-if)# sho run eigrp !Command: show
      running-config eigrp !Running configuration last done at: Wed May 20 14:39:55
      2020 !Time: Wed May 20 14:48:11 2020 version 9.3(3) Bios:version feature eigrp
      router eigrp 10 address-family ipv4 unicast passive-interface default
      authentication mode md5 authentication key-chain <EIGRP key-chain name>
      interface Vlan1 no ip passive-interface eigrp 10
    remediation: >
      Ensure that you have enabled the EIGRP feature. Ensure that all neighbors for
      an EIGRP process share the same authentication configuration, including the
      shared authentication key. Create the key-chain for this authentication
      configuration. See the Cisco NX-OS Security Configuration Guide. Ensure that
      you are in the correct VDC (or use the switchto vdc command) Configure
      authentication: switch(config)# router eigrp [instance-tag] switch(config-
      router)# address-family {ipv4 | ipv6} unicast switch(config-router)#
      authentication key-chain [key-chain] switch(config-router)# authentication
      mode md5 Next assign the interface: switch(config)# interface [interface-type
      slot/port] switch(config-if)# router eigrp [instance-tag] switch(config-if)#
      authentication key-chain eigrp [instance-tag key-chain] switch(config-if)#
      authentication mode eigrp [instance-tag] md5 Every EIGRP routeable interface
      should be set to either passive-interface, or be configured with
      authentication keys. Default Value: EIGRP is not configured by default If
      configured, EIGRP authentication is not configured by default. By default, if
      configured, EIGRP both advertises on and listens on all interfaces that fall
      into the subnets defined in the 'network' statements. References: 1.
      https://www.cisco.com/c/en/us/td/docs/switches/datacenter/sw/4_2/nx-
      os/unicast/configuration/guide/l3_cli_nxos/l3_eigrp.html#wp1075849 Additional
      Information: For EIGRP environments only
    references: >
      
    impact: >
      
