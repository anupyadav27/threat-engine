    cis_version: "v1.2.0"
    cis_control: "3.2.4"
    cis_section: "3"
    profile_applicability: ""
    description: >
      An IP directed broadcast is an IP packet whose destination address is a valid
      broadcast address for an IP subnet, but which originates from a node that is
      not itself a part of that destination subnet.
    rationale: >
      Directed broadcasts can be abused in several ways: • a volumetric DOS attack
      against the NX-OS switch itself, the sent volume of data can be much larger
      than the received request • a volumetric DOS attack against a third party
      (often called a 'smurf attack') • a single-packet reconnaissance of a local
      subnet We recommend that you disable the ip directed-broadcast command on any
      interface where they are not required for some reason.
    audit_procedure: >
      switch# show running-config | beg [int or vlan]
    remediation: >
      switch(config-if)# no ip directed-broadcast References: 1.
