  - rule_id: cisco_nxos.cis.3.use_unicast_routing_protocols_only
    title: "Use Unicast Routing Protocols Only"
    severity: medium
    category: networking
    tech_type: cisco_nxos
    automation_type: manual
    cis_benchmark: "CIS_CISCO_NXOS v1.2.0"
    cis_version: "v1.2.0"
    cis_control: "3.1.4.3"
    cis_section: "3"
    profile_applicability: ""
    description: >
      Unicast routing protocols describe the destination routing peers by IP
      address. Multicast and Broadcast based routing protocols will discover routing
      neighbors dynamically. Because of this discovery process, a malicious actor
      can much more easily establish a peering relationship and hijack the routing
      protocol.
    rationale: >
      While most routing protocols can be configured with authentication, multicast
      and broadcast routing protocols have an inherent weakness in their 'trust' of
      any neighbor that advertises or will answer an advertisment. Impact: In
      multicast and broadcast routing protocols, the router (in this case the NX-OS
      device) will advertise its presence to all devices on a subnet, soliciting
      other routers using that same protocol. In that situation, an attacker can
      simply reply to those advertisements and establish a peering relationship. At
      that point the attacker can inject any route desired, so that traffic for that
      destination will route through the malicious router, putting the attacker in a
      'monkey in the middle' position, able to eavesdrop on or change any traffic to
      or from that destination, then forward it on. Tools such as scapy have well-
      established attack scripts for most broadcast or multicast routing protocols.
    audit_procedure: >
      In practice, this typically means 'do not use RIP or EIGRP, OSPF in their
      default configuration, use unicast only' In order to audit for this, check for
      the 'multicast group' keyword for each configured routing protocol. Note that
      there is in some cases a '-' character in this keyword, also that the word
      'multicast' does not have consistent upper/lower case from protocol to
      protocol. For these reasons it is recommended to filter by the phrase
      'ulticast' switch#show ip <routing protocol> | i ulticast for instance:
      switch# sho ip rip | i ulticast RIP port 520, multicast-group 224.0.0.9
      switch# sho ip eigrp | i ulticast IP proto: 88 Multicast group: 224.0.0.10
      (note again the inconsistency in upper/lower case in the 'multicast group'
      keywords)
    remediation: >
      Configure unicast routing only, for instance BGP.
    references: >
      
    impact: >
      
    compliance_mappings:
      cis:
        - "CIS_CISCO_NXOS_v1_2_0_3_1_4_3"
      nist_800_53: []
      soc2: []
      pci_dss: []
    source_unique_id: "cis_cisco_nxos_v1_2_0_3_1_4_3"
    metadata_source: generated
