  - rule_id: cisco_nxos.cis.3.disable_icmp_redirects_on_all_layer_3_interfaces
    title: "Disable ICMP Redirects on all Layer 3 Interfaces"
    severity: medium
    category: networking
    tech_type: cisco_nxos
    automation_type: automated
    cis_benchmark: "CIS_CISCO_NXOS v1.2.0"
    cis_version: "v1.2.0"
    cis_control: "3.2.2"
    cis_section: "3"
    profile_applicability: ""
    description: >
      A redirect packet basically informs the host that there is a better way to get
      to the destination host or network. This route is then cached on the (victim)
      host. For instance, if the default gateway of a host is the NX-OS switch, and
      the victim host sends a packet to an internet or WAN IP, the NX-OS switch will
      inform the host that the firewall or WAN router will be a better path. If at
      some future time, if that firewall or WAN router should fail and trigger a
      routing change, the route to that failed device will persist in the victim
      host. This scenario is only in play if the NX-OS device is the gateway for the
      victim host, and the Firewall or WAN router (or other next hop device) is also
      on the same subnet as the victim host. Also, if the next hop device handles
      its own failover (for instance, using HSRP), there is no routing change, so
      the 'redirect' issue will not be a problem. This situation is generally a
      problem only if the path to the destination is handled by a 'next hop'
      mechanism, for instance by a routing protocol or a local route-map, and a
      backup path exists. In this situation, the route to the target will fail, the
      route will change to the backup path, and the victim will cache the old route
      for minutes or hours after the failure.
    rationale: >
      
    audit_procedure: >
      switch# show running-config [layer 3 int] For instance, this shows an audit
      success (redirects disabled) CISNXOS9# sho run int vlan 9 !Command: show
      running-config interface Vlan9 !Running configuration last done at: Sun Jun 21
      13:53:16 2020 !Time: Sun Jun 21 13:53:21 2020 version 9.3(3) Bios:version
      interface Vlan9 no ip redirects ip address 10.99.99.99/24 This shows an audit
      failure (no display, so the default of 'redirects enabled' is active) switch#
      sho run int vlan 9 !Command: show running-config interface Vlan9 !Running
      configuration last done at: Sun Jun 21 13:49:56 2020 !Time: Sun Jun 21
      13:50:45 2020 version 9.3(3) Bios:version interface Vlan9 ip address
      10.99.99.99/24
    remediation: >
      It is recommended that you perform this task on all Layer 3 Interfaces which
      have both a primary and a backup routed path to any destination. In
      particular, the next hop will need to be in the same subnet as the potential
      victim hosts. The corollary to this is that if the network is architected such
      that all layer 3 egress paths are on dedicated or 'point to point' segments
      (with no other hosts on those segments), then the ip redirect issue will never
      arise. switch(config-if) no ip redirects switch(config)# Default Value: IP
      redirects are enabled by default, and do not appear in the configuration. The
      desired value is 'no ip redirects', which will appear in the configuration.
      References: 1. https://www.cisco.com/c/en/us/support/docs/ios-nx-os-
      software/nx-os- software/213841-understanding-icmp-redirect-
      messages.html#anc17
    references: >
      
    impact: >
      
    compliance_mappings:
      cis:
        - "CIS_CISCO_NXOS_v1_2_0_3_2_2"
      nist_800_53: []
      soc2: []
      pci_dss: []
    source_unique_id: "cis_cisco_nxos_v1_2_0_3_2_2"
