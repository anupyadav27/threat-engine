  - rule_id: cisco_nxos.cis.3.configure_storm_control
    title: "Configure Storm Control"
    severity: medium
    category: networking
    tech_type: cisco_nxos
    automation_type: manual
    cis_benchmark: "CIS_CISCO_NXOS v1.2.0"
    cis_version: "v1.2.0"
    cis_control: "3.3.2"
    cis_section: "3"
    profile_applicability: ""
    description: >
      Traffic storm control (also called traffic suppression) allows you to monitor
      the levels of the incoming broadcast, multicast, and unicast traffic over a
      3.9-millisecond interval. During this interval, the traffic level, which is a
      percentage of the total available bandwidth of the port, is compared with the
      traffic storm control level that you configured. When the ingress traffic
      reaches the traffic storm control level that is configured on the port,
      traffic storm control drops the traffic until the interval ends.
    rationale: >
      When the traffic exceeds the configured level, you can configure traffic storm
      control to perform the following optional corrective actions : Shut down—When
      ingress traffic exceeds the traffic storm control level that is configured on
      a port, traffic storm control puts the port into the error-disabled state. To
      reenable this port, you can use either the shutdown and no shutdown options on
      the configured interface, or the error-disable detection and recovery feature.
      You are recommended to use the errdisable recovery cause storm-control command
      for error- disable detection and recovery along with the errdisable recovery
      interval command for defining the recovery interval. The interval can range
      between 30 and 65535 seconds. Trap—You can configure traffic storm control to
      generate an SNMP trap when ingress traffic exceeds the configured traffic
      storm control level. The SNMP trap action is enabled by default. However,
      storm control traps are not rate-limited by default. You can control the
      number of traps generated per minute by using the snmp-server enable traps
      storm-control trap-rate command. Impact: This configuration is normally non-
      impactful - host network interfaces operating normally do not broadcast at the
      levels that are normally set in this command. This command is primarily meant
      to protect the switch and more importantly other hosts in a broadcast domain
      (VLAN) from a network interface that is malfunctioning, either due to a
      hardware failure or a driver problem. Note however that this protection can
      prevent some malicious activity, for instance VLAN wide DOS attacks, higher
      volume ARP Cache Poisoning attacks and CAM Table overflow attacks.
    audit_procedure: >
      The storm control levels and measurement methods will vary depending on normal
      traffic in your environment. Normally the action should be 'shutdown', unless
      the values are in the process of being determined (in which case this is
      normally set to 'trap'). If measuring in percent, remember that these are
      usually 10Gbps or faster interfaces. The 'show running-config interface'
      command will display the storm control parameters on one or several interfaces
      To show for one interface: switch# sho run interface e1/6 !Command: show
      running-config interface Ethernet1/6 !Running configuration last done at: Thu
      May 21 12:25:37 2020 !Time: Thu May 21 12:26:10 2020 version 9.3(3)
      Bios:version interface Ethernet1/6 storm-control broadcast level pps 1000
      storm-control multicast level pps 1000 storm-control action shutdown To show
      for all Ethernet interfaces: switch# sho run interface e1/1 - 48 To show for
      all interfaces (which will then include port-channels): switch# sho run
      interface
    remediation: >
      To set the broadcast limit in percent (multicast limit shown): switch(config)#
      interface ethernet 1/1 switch(config)# storm-control multicast level 10 or to
      set in packets per second (broadcast limit shown) switch(config)# storm-
      control broadcast level pps 8000 Configure to send SNMP trap if a broadcast
      limit is exceeded switch(config-if)# storm-control action trap or to place an
      interface into an ERR-DISABLE state if a broadcast limit is exceeded:
      switch(config-if)# storm-control action disable Default Value: not enabled
      References: 1.
      https://www.cisco.com/c/en/us/td/docs/switches/datacenter/nexus9000/sw/6-
      x/security/configuration/guide/b_Cisco_Nexus_9000_Series_NX-
      OS_Security_Configuration_Guide/b_Cisco_Nexus_9000_Series_NX-
      OS_Security_Configuration_Guide_chapter_010000.html
    references: >
      
    impact: >
      
    compliance_mappings:
      cis:
        - "CIS_CISCO_NXOS_v1_2_0_3_3_2"
      nist_800_53: []
      soc2: []
      pci_dss: []
    source_unique_id: "cis_cisco_nxos_v1_2_0_3_3_2"
