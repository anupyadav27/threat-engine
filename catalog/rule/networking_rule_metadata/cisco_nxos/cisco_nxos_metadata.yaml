  - rule_id: cisco_nxos.cis.3.configure_lldp
    title: "Configure LLDP"
    severity: medium
    category: networking
    tech_type: cisco_nxos
    automation_type: manual
    cis_benchmark: "CIS_CISCO_NXOS v1.2.0"
    cis_version: "v1.2.0"
    cis_control: "3.4.1"
    cis_section: "3"
    profile_applicability: ""
    description: >
      LLDP is a discovery protocol that transmits information about the capabilities
      and current status of a device and its interfaces. LLDP devices use the
      protocol to solicit information only from other LLDP devices. You can use LLDP
      to discover and view information about many devices that are directly attached
      to the switch. In many situations LLDP is required for normal operation (for
      instance for auto- provisioning, or for network configuration of VOIP handsets
      or Wireless Access Points). LLDP advertises potentially sensitive information,
      including the current version of NX- OS. For this reason it is recommended
      that LLDP be disabled or restricted to receive- only on any link that links to
      equipment not owned by your organization. In more sensitive environments, in
      particular in carrier or cloud services environments (where the majority of
      the endpoints are customer controlled hosts), it is recommended to disable
      LLDP entirely.
    rationale: >
      To permit the discovery of non-Cisco devices, the switch also supports the
      Link Layer Discovery Protocol (LLDP), a vendor-neutral device discovery
      protocol that is defined in the IEEE 802.1ab standard. LLDP allows network
      devices to advertise information about themselves to other devices on the
      network. This protocol runs over the data-link layer, which allows two systems
      running different network layer protocols to learn about each other. LLDP
      advertises potentially sensitive information, including the current version of
      NX- OS and exposed IP addresses. This information can be used by a malicious
      actor to identify which vulnerabilities exist on the device, and from there
      which exploits might be most effective to compromise it. For this reason,
      enabling LLDP is generally not recommended except for troubleshooting or
      network discovery purposes. In particular, any ports connected to service
      provider gear, or any system not owned by your organization should have LLDP
      explicitly disabled. In more sensitive environments, disable LLDP globally.
    audit_procedure: >
      To show the global LLDP configuration switch# sho run lldp !Command: show
      running-config lldp !Running configuration last done at: Tue May 19 16:19:19
      2020 !Time: Tue May 19 16:33:51 2020 version 9.3(3) Bios:version feature lldp
      To show the LLDP status for all interfaces: switch# sho lldp all Interface
      Information: Eth1/8 Enable (tx/rx/dcbx): Y/Y/Y Interface Information: Eth1/7
      Enable (tx/rx/dcbx): Y/Y/Y Interface Information: Eth1/6 Enable (tx/rx/dcbx):
      Y/Y/Y To show connected LLDP capable devices (neighbors): switch# sho lldp
      neighbors Capability codes: (R) Router, (B) Bridge, (T) Telephone, (C) DOCSIS
      Cable Device (W) WLAN Access Point, (P) Repeater, (S) Station, (O) Other
      Device ID Local Intf Hold-time Capability Port ID 0050.56c0.0001 mgmt0 3601
      0050.56c0.0001 0050.56c0.0003 Eth1/1 3601 0050.56c0.0003 In many environments,
      LLDP is required. For instance, LLDP send and receive is often required in
      workstation switches to facilitate the registration of VOIP telephones.
    remediation: >
      To enable the LLDP feature, then enable LLDP: switch(config)# feature lldp To
      disable LLDP globally: switch(config)# no feature lldp To disable LLDP on a
      specific interface - note that transmit and receive capabilities are
      controlled independently. While in many cases LLDP is not required at all,
      often only LLDP receive is needed for correct operation.: switch(config)# int
      Ethernet x/y switch(config-if)# no lldp transmit switch(config-if)# no lldp
