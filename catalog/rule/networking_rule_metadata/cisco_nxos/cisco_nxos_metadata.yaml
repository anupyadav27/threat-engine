  - rule_id: cisco_nxos.cis.3.configure_bgp_to_log_neighbor_changes
    title: "Configure BGP to Log Neighbor Changes"
    severity: medium
    category: networking
    tech_type: cisco_nxos
    automation_type: manual
    cis_benchmark: "CIS_CISCO_NXOS v1.2.0"
    cis_version: "v1.2.0"
    cis_control: "3.1.2.1"
    cis_section: "3"
    profile_applicability: ""
    description: >
      Logging changes to the BGP peering relationships is recommended. Any logged
      changes will in the best case indicate a service issue due to standard
      operational issues (connectivity issues and so on) or in the worst case, could
      indicate malicious activity attempting to subvert the peering relationship
      and/or the routing table.
    rationale: >
      
    audit_procedure: >
      The 'show running-config bgp' command will list out the full BGP
      configuration. For each BGP neighbor stanza, ensure that the 'log-neighbor-
      changes' command is present. switch# sho run bgp !Command: show running-config
      bgp !Running configuration last done at: Wed May 20 11:47:06 2020 !Time: Wed
      May 20 11:47:10 2020 version 9.3(3) Bios:version feature bgp router bgp 65520
      router-id 10.10.10.10 neighbor 10.10.10.11 remote-as 65521 log-neighbor-
      changes Logging events triggered by BGP sessions being established or dropped
      are shown below. The keyword 'BGP-5-ADJCHANGE', or just 'ADJCHANGE' should be
      configured in any logging or SIEM platform to generate an alert. switch# sho
      logging | i ADJCHANGE 2020 May 20 11:54:18 CISNXOS9 %BGP-5-ADJCHANGE: bgp-
      [7984] (default) neighbor 10.10.10.11 Up 2020 May 20 13:08:15 CISNXOS9
      %BGP-5-ADJCHANGE: bgp- [7984] (default) neighbor 10.10.10.11 Down - sent:
      holdtimer expired error
    remediation: >
      In each 'neigbor' stanza of the BGP configuration, add the command 'log-
      neighbor- changes' switch(config)# router bgp <asn> switch(config-router)#
      router-id <local ip, preferably a loopback> switch(config-router)# neighbor
      <neighbor ip address> switch(config-router-neighbor)# remote-as <neighbor asn>
      switch(config-router-neighbor)# log-neighbor-changes In addition, the events
      below should be configured in any log or SIEM solution to generate an alert
      for investigation. A good keyword to alert on is 'ADJCHANGE' 2020 May 20
      11:54:18 CISNXOS9 %BGP-5-ADJCHANGE: bgp- [7984] (default) neighbor 10.10.10.11
      Up 2020 May 20 13:08:15 CISNXOS9 %BGP-5-ADJCHANGE: bgp- [7984] (default)
      neighbor 10.10.10.11 Down - sent: holdtimer expired error Default Value: Not
      enabled References: 1.
      https://www.cisco.com/c/en/us/td/docs/switches/datacenter/sw/4_2/nx-
      os/unicast/configuration/guide/l3_cli_nxos/l3_bgp.html
