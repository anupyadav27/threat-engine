  - rule_id: cisco_nxos.cis.3.configure_cdp
    title: "Configure CDP"
    severity: medium
    category: networking
    tech_type: cisco_nxos
    automation_type: manual
    cis_benchmark: "CIS_CISCO_NXOS v1.2.0"
    cis_version: "v1.2.0"
    cis_control: "3.4.2"
    cis_section: "3"
    profile_applicability: ""
    description: >
      The Cisco Discovery Protocol (CDP) is a media-independent and protocol-
      independent protocol that runs on all Cisco-manufactured equipment including
      routers, bridges, access and communication servers, and switches. You can use
      CDP to discover and view information about all the Cisco devices that are
      directly attached to the device. Each device that you configure for CDP sends
      periodic advertisements to a multicast address. Each device advertises at
      least one address at which it can receive SNMP messages. The advertisements
      also contain hold-time information, which indicates the length of time that a
      receiving device should hold CDP information before removing it. You can
      configure the advertisement or refresh timer and the hold timer. CDP
      advertises potentially sensitive information, including the current version of
      NX- OS. For this reason it is recommended that CDP be disabled on any link
      that links to equipment not owned by your organization. In more sensitive
      environments, in particular in carrier or cloud services environments (where
      the majority of the endpoints are customer controlled hosts), it is
      recommended to disable CDP entirely
    rationale: >
      CDP advertises potentially sensitive information, including the current
      version of NX- OS. This information can be used by a malicious actor to
      identify which vulnerabilities exist on the device, and from there which
      exploits might be most effective to compromise it. For this reason, enabling
      CDP is generally not recommended except for troubleshooting or network
      discovery purposes. In particular, any ports connected to service provider
      gear, or any system not owned by your organization should have CDP explicitly
      disabled. In more sensitive environments, disable CDP globally.
    audit_procedure: >
      To show all CDP definitions, for all interfaces: switch# sho cdp all To show
      CDP status for any single interface: switch# sho cdp interface Ethernet x/y
      Ethernetx/y is up CDP disabled globally CDP enabled on interface Refresh time
      is 60 seconds Hold time is 180 seconds
    remediation: >
      Enabling CDP Globally switch(config)# cdp enable Enabling on one interface
      switch(config)# int Ethernet x/y switch(config-if)# cdp enable To disable CDP
      globally: switch(config-if)# no cdp enable To disable CDP on one interface
      only: switch(config)# int Ethernet x/y switch(config-if)# no cdp enable
      Default Value: CDP is enabled by default, and is enabled on all interfaces by
      default. References: 1.
      https://www.cisco.com/c/en/us/td/docs/switches/datacenter/nexus9000/sw/7-
      x/system_management/configuration/guide/b_Cisco_Nexus_9000_Series_NX-
      OS_System_Management_Configuration_Guide_7x/b_Cisco_Nexus_9000_Seri es_NX-
      OS_System_Management_Configuration_Guide_7x_chapter_0101.html
    references: >
      
