  - rule_id: cisco_nxos.cis.3.create_and_use_a_single_loopback_address_for
    title: "Create and use a single Loopback Address for Routing Protocol Peering"
    severity: medium
    category: networking
    tech_type: cisco_nxos
    automation_type: manual
    cis_benchmark: "CIS_CISCO_NXOS v1.2.0"
    cis_version: "v1.2.0"
    cis_control: "3.1.4.2"
    cis_section: "3"
    profile_applicability: ""
    description: >
      The use of a loopback interface is recommended for use in all routing
      protocols. This recommendation describes the configuration of the loopback
      interface. Routing protocol specific configurations are described under the
      respective routing protocols.
    rationale: >
      Loopback interfaces are always up, and so are not dependent on physical
      interface link state issues (cabling or other link issues for instance). This
      means traffic sourced from a loopback interface can take any valid path to
      establish a routing relationship or to route traffic. Loopback interfaces by
      their nature cannot 'flap' (toggle between up and down states). Depending on
      the error condition, most physical interfaces are susceptible to interface
      flapping. Impact: Using a loopback interface makes a routing device much less
      susceptible to intermittent or permanent interface failures.
    audit_procedure: >
      switch# sho ip int brief | i Lo Lo0 10.11.11.1 protocol-up/link-up/admin-up
    remediation: >
      Creating the loopback interface is a simple process. Addressing the loopback,
      in particular computing the subnet mask will vary by the organization and
      application. Often smaller subnets can be used for loopbacks, depending on how
      many potential peers are possible. switch(config)# int loopback 0
      switch(config-if)# ip address 10.11.11.1 255.255.255.252 In order to use the
      loopback interface (rather than the closest interface to the routing peer), it
      must be explicitly configured in the routing protocol. This is described in
      the recommendations for each respective routing protocol. Default Value: By
      default no loopback interfaces are created on NX-OS devices.
    references: >
      
    impact: >
      
    compliance_mappings:
      cis:
        - "CIS_CISCO_NXOS_v1_2_0_3_1_4_2"
      nist_800_53: []
      soc2: []
      pci_dss: []
