  - rule_id: cisco_nxos.cis.1.log_all_successful_and_failed_administrative
    title: "Log all Successful and Failed Administrative Logins"
    severity: medium
    category: networking
    tech_type: cisco_nxos
    automation_type: automated
    cis_benchmark: "CIS_CISCO_NXOS v1.2.0"
    cis_version: "v1.2.0"
    cis_control: "1.5.2"
    cis_section: "1"
    profile_applicability: ""
    description: >
      By default failed logins are logged, but successful logins are not logged.
      This makes any configuration changes or successful malicious activity
      difficult to correctly attribute.
    rationale: >
      Logging of all device login attempts allows the security team to investigate
      all login attempts and successful logins as needed. In some organizations and
      for some switches, even successful logins will be configured to generate an
      alert that must be compared against authorized changes or assigned tickets.
      Without logging both successful and failed logins, several important
      components of any investigation may not be easily available for any subsequent
      investigation or analysis (userids, source IP addresses, login times and so
      on). Impact: Not logging successful logins means that unauthorized commands
      changes will be more difficult to attribute to the right person (though
      changes are logged with the login name by default on NX-OS). It also means
      that otherwise suspicious but successful logins (either because of the time of
      login, the source IP or other indicator) are not logged for further
      investigation. Not logging unsuccessful logins means that brute force login
      attempts are not properly logged.
    audit_procedure: >
      switch# sho logging level authpriv Facility Default Severity Current Session
      Severity -------- ---------------- ------------------------ authpriv 3 5
      0(emergencies) 1(alerts) 2(critical) 3(errors) 4(warnings) 5(notifications)
      6(information) 7(debugging)
    remediation: >
      switch(config)# login level authpriv 5 Default Value: By default failed logins
      are logged and successful logins are not logged. Additional Information: The
      methods in this recommendation are applicable to all NX-OS platforms. Some
      platforms will also support 'login on-success' and 'login on-failure'
      commands, but because of inconsistent support the use of these commands are
      not recommended.
