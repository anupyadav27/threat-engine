rules:

  - rule_id: cisco_nxos.cis.1.configure_aaa_authentication_tacacs_if_applicable
    title: "Configure AAA Authentication - TACACS if applicable"
    severity: medium
    category: networking
    tech_type: cisco_nxos
    automation_type: automated
    cis_benchmark: "CIS_CISCO_NXOS v1.2.0"
    cis_version: "v1.2.0"
    cis_control: "1.1.1.1"
    cis_section: "1"
    profile_applicability: ""
    description: >
      TACACS+ is an authentication protocol that Cisco NX-OS devices can use for
      authentication of management users against a remote AAA server. These
      management users can access the Cisco NX-OS device through any protocol and
      use this back-end authentication. Using a central authentication store (such
      as Active Directory) ensures that all administrative actions are tied to named
      users, making the tracking of changes much easier. It also makes tracking
      compromised accounts and malicious activities much easier.
    rationale: >
      Central authentication is key as it minimizes the effort in managing named
      user accounts. Keeping local admin accounts opens the door to all the issues
      inherent in shared accounts, namely: • Errors in implementation being done by
      generic admin accounts, which can then be denied by all. • Shared credentials
      staying unchanged when administrative staff leave the organization or change
      roles. • Giving malicious actors the ability to recover shared credentials
      from saved device backups In many organizations TACACS+ is preferred over
      RADIUS when TACACS+ is supported by the AAA server and network device. This is
      because (with additional work) TACACS+ also supports command authorization,
      restricting specific users to the command set that they can use on the device.
      However, TACACS+ started as a Cisco centric protocol, so is not as widely
      supported by other vendors in comparison to RADIUS. In addition, RADIUS use is
      much more widespread (primarily for secure wireless authentication), so is
      often already in place. Finally, command authorization is a complex endeavor
      and is very rarely implemented because of that, so the main advantage of
      TACACS+ is very often not realized. Impact: Implementing TACACS+ (or any
      central authentication solution) ensures that only named users are allowed to
      gain an administrative session to the device. This allows: • Tracking of all
      changes to named users • Simplification of reconciling changes to a change
      management process • Off-loading password change cycles and password
      complexity requirements to that central authentication store • Simplification
      of removing admin access as administrators leave the organization or change
      their roles in the organization
    audit_procedure: >
      'Show running-config tacacs+' will show the basic TACACS+ configuration. • The
      tacacs+ feature should be enabled • Two or more TACACS+ servers should be
      defined • Two or more TACACS+ servers should be in the TACACS+ server group
      switch(config)#sho run tacacs !Command: show running-config tacacs+ !Running
      configuration last done at: Mon Apr 13 05:14:30 2020 !Time: Mon Apr 13
      05:14:35 2020 version 9.3(3) Bios:version feature tacacs+ tacacs-server host
      3.4.5.6 key 7 'vkqjcet' tacacs-server host 4.5.6.7 key 7 'vkqjgtcjjnod' aaa
      group server tacacs+ TACACSGROUP server 3.4.5.6 server 4.5.6.7 for more
      detail, use 'show run tacacs all' switch(config)# show run tacacs all
      !Command: show running-config tacacs+ all !Running configuration last done at:
      Mon Apr 13 05:15:05 2020 !Time: Mon Apr 13 05:15:38 2020 version 9.3(3)
      Bios:version feature tacacs+ no ip tacacs source-interface tacacs-server test
      username test password 7 wawy idle-time 0 tacacs-server timeout 5 tacacs-
      server deadtime 0 tacacs-server host 3.4.5.6 key 7 'vkqjcet' port 49 tacacs-
      server host 4.5.6.7 key 7 'vkqjgtcjjnod' port 49 tacacs-server host 3.4.5.6
      test username test password 7 wawy idle-time 0 tacacs-server host 4.5.6.7 test
      username test password 7 wawy idle-time 0 aaa group server tacacs+ TACACSGROUP
      server 3.4.5.6 server 4.5.6.7 use-vrf default no source-interface Finally,
      verify that the aaa authentication list includes TACACS for both the default
      and console access: # show run aaa !Command: show running-config aaa !Running
      configuration last done at: Mon Apr 13 05:15:05 2020 !Time: Mon Apr 13
      05:16:11 2020 version 9.3(3) Bios:version aaa authentication login default
      group TACACSGROUP local aaa authentication login console group TACACSGROUP
      local no aaa user default-role login on-success log
    remediation: >
      First, enable TACACS+ in NX-OS switch(config)#feature tacacs+ Next, define two
      or more TACACS+ servers: switch(config)#tacacs-server host 3.4.5.6 key somekey
      switch(config)#tacacs-server host 4.5.6.7 key someotherkey define the aaa
      group for TACACS+: switch(config)#aaa group server tacacs+ TACACSGROUP server
      3.4.5.6 server 4.5.6.7 Finally, create the aaa authentication list for both
      console and default access: switch(config)#aaa authentication login default
      group TACACSGROUP local switch(config)#aaa authentication login console group
      TACACSGROUP local It is common to include 'local' as the last entry in the
      list, to allow access to administer the device even if the RADIUS server is
      offline. Note that while this ensures access in the case of the device or the
      RADIUS server being offline, it also means that if an attacker can DOS the
      RADIUS Servers, they can authenticate locally as well. Default Value: By
      default TACACS+ is not implemented References: 1.
      https://www.cisco.com/c/m/en_us/techdoc/dc/reference/cli/nxos/commands/fund/
      show-running-config.html
    references: >
      
    impact: >
      
    compliance_mappings:
      cis:
        - "CIS_CISCO_NXOS_v1_2_0_1_1_1_1"
      nist_800_53: []
      soc2: []
      pci_dss: []
    source_unique_id: "cis_cisco_nxos_v1_2_0_1_1_1_1"
