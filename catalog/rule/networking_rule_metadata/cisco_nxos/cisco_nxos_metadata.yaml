  - rule_id: cisco_nxos.cis.1.configure_a_time_zone
    title: "Configure a Time Zone"
    severity: medium
    category: networking
    tech_type: cisco_nxos
    automation_type: automated
    cis_benchmark: "CIS_CISCO_NXOS v1.2.0"
    cis_version: "v1.2.0"
    cis_control: "1.6.2"
    cis_section: "1"
    profile_applicability: ""
    description: >
      Timezones are a source of contention in larger corporations. On one hand, if
      infrastructure is configured with time consistent with the local timezone,
      then it is simpler to co-relate end-user symptoms and logs on end-user
      equipment with logs from network equipment. On the other hand, in
      organizations that span multiple time zones, configuring local time can make
      it easy to mis-match log entries from gear in different time zones. In some
      organizations, the solution is to post both local and UTC time in all log
      entries. In other organizations, all gear is configured for one timezone
      (either UTC or 'head office time'). The important thing is to have a standard
      for time zone, and to configure it consistently across all hosts and
      infrastructure equipment.
    rationale: >
      Impact: Not having a consistent time zone policy across all hosts and
      infrastructure means that when dealing with a security incident or technical
      issue, it becomes very easy to mis- match logs as affected hosts span multiple
      time zones.
    audit_procedure: >
      To show the current timezone, show the running configuration and filter for
      the word 'timezone'. switch(config)# sho run | i timezone clock timezone EST
      -5 0
    remediation: >
      To set the timezone, define the timezone name, the offset in hours, then the
      offset in seconds. The example below shows EST (Offset of -5 hours, zero
      seconds). switch(config)# clock timezone EST -5 0 Default Value: By default
      UTC is set
    references: >
      
    impact: >
      
    compliance_mappings:
      cis:
        - "CIS_CISCO_NXOS_v1_2_0_1_6_2"
      nist_800_53: []
      soc2: []
      pci_dss: []
