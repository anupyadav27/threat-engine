  - rule_id: cisco_nxos.cis.1.configure_snmp_source_interface_for_traps
    title: "Configure SNMP Source Interface for Traps"
    severity: medium
    category: networking
    tech_type: cisco_nxos
    automation_type: manual
    cis_benchmark: "CIS_CISCO_NXOS v1.1.0"
    cis_version: "v1.1.0"
    cis_control: "1.5.5"
    cis_section: "1"
    profile_applicability: ""
    description: >
      The administrator can configure SNMP to the interfaces source IP address for
      notifications
    rationale: >
      By using a source interface the administrator can ensure that the source IP of
      SNMP traps does not change as the network topology changes. For instance, if a
      link fails or is reconfigured, and a different IP address is now topologically
      'closer' to the SNMP trap server. There are a few typical candidates for an
      SNMP source IP address: • A loopback address, as loopbacks are always up, and
      can then route over any transit interface. • The MGMT 0 address, as that
      provides an out-of-band path to the SNMP server. SNMP traffic volume will not
      affect traffic volumes, and SNMP cannot be 'starved' for bandwidth by
      production traffic. If the entire path is out-of-band, this also provides
      excellent protection from eavesdropping by malicious actors that may be on the
      'production data side' of the switch. • A combination of the two (this is less
      common) - for instance a loopback address in the management VRF
    audit_procedure: >
      There are two typical commands to show the snmp source-interface
      configuration. The first shows only the explicit definitions for traps and
      informs: switch# sho snmp source-interface
      -------------------------------------------------------------------
      Notification source-interface
      ------------------------------------------------------------------- trap mgmt0
      inform mgmt0
      ------------------------------------------------------------------- or, more
      completely, use the 'show running-config snmp' command, and filter for the
      keyword 'source': switch# sho run snmp | i source snmp-server source-interface
      traps mgmt0 snmp-server source-interface informs mgmt0 snmp-server host
      1.2.3.4 source-interface loopback0
    remediation: >
      switch(config)# snmp-server host 1.2.3.4 source-interface mgmt 0 or
      switch(config)# snmp-server host 1.2.3.4 source-interface loopback 0 SNMP
      Server traps or informs: switch(config)# snmp-server source-interface traps
      loopback 0 switch(config)# snmp-server source-interface informs loopback 0 or
      switch(config)# snmp-server source-interface traps mgmt 0 switch(config)#
      snmp-server source-interface informs mgmt 0 Default Value: Not configured. By
      default SNMP traffic is sourced from the layer 3 interface that is
      topologically closest to the configured SNMP server References: 1.
      https://www.cisco.com/c/en/us/td/docs/switches/datacenter/nexus9000/sw/6-
      x/system_management/configuration/guide/b_Cisco_Nexus_9000_Series_NX-
      OS_System_Management_Configuration_Guide/sm_9snmp.html#task_01A4812
      3BA9B420A94E5780F5EF74C6E
    references: >
      
    impact: >
      
