  - rule_id: cisco_nxos.cis.3.set_interfaces_with_no_peers_to_passive_interface
    title: "Set Interfaces with no Peers to Passive-Interface"
    severity: medium
    category: networking
    tech_type: cisco_nxos
    automation_type: manual
    cis_benchmark: "CIS_CISCO_NXOS v1.2.0"
    cis_version: "v1.2.0"
    cis_control: "3.1.3.1"
    cis_section: "3"
    profile_applicability: ""
    description: >
      By default, OSPF will advertise via multicast to solicit peers, and will
      listen for neighbor / peer advertisements on all OSPF configured interfaces.
    rationale: >
      If an interface is set to 'passive', then EIGRP will not advertise out of that
      interface or listen on that interface for EIGRP neighbors. I will however
      still advertise the networks associated with that interface to peers on other
      interfaces. By default, all interfaces advertise via multicast to solicit OSPF
      neighbors, and also listen for neighbor advertisements. Impact: If an
      interface is set to the default (ie - not passive), then an attacker can pose
      as an OSPF peer, either to collect OSPF information from advertisements or to
      inject bogus routes into the table. Bogus routes can then be used to DOS that
      subnet, or to intercept traffic to or from that subnet either to eavesdrop on
      conversations or to modify data in transit. Quite often the goal of an attack
      of this type is to collect login credentials from a malicious copy of the
      target website.
    audit_procedure: >
      The 'show running-configuration ospf' command will list the complete OSPF
      configuration. For all interfaces that do not have facing peers, ensure that
      those interfaces have the 'ip ospf passive-interface' set. Every routeable
      interface should be set to either passive-interface, or be configured with
      authentication keys. switch# sho running-config ospf !Command: show running-
      config ospf !Running configuration last done at: Wed May 20 14:24:49 2020
      !Time: Wed May 20 14:26:46 2020 version 9.3(3) Bios:version feature ospf
      router ospf 10 router-id 10.10.10.10 interface Vlan1 ip ospf passive-interface
      ip router ospf 10 area 0.0.0.0
    remediation: >
      For each routeable interface, if there is no facing peer on that interface set
      that interface to passive with the 'ip ospf passive-interface' configuration
      command. Every routeable interface should be set to either passive-interface,
      or be configured with authentication keys. switch(config)# int vlan 1
      switch(config-if)# ip router ospf 10 area 0 switch(config-if)# ip ospf
      passive-interface Default Value: By default, passive interfaces are not
      configured - no OSPF configured interfaces are set to passive. This means that
      OSPF will advertise via multicast to solicit peers, and will listen for
      neighbor / peer advertisements on all OSPF configured interfaces.
    references: >
      
    impact: >
      
    compliance_mappings:
      cis:
        - "CIS_CISCO_NXOS_v1_2_0_3_1_3_1"
      nist_800_53: []
      soc2: []
      pci_dss: []
    source_unique_id: "cis_cisco_nxos_v1_2_0_3_1_3_1"
