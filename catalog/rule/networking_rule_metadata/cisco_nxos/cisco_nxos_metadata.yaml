  - rule_id: cisco_nxos.cis.3.basic_fiber_channel_configuration
    title: "Basic Fiber Channel Configuration"
    severity: medium
    category: networking
    tech_type: cisco_nxos
    automation_type: manual
    cis_benchmark: "CIS_CISCO_NXOS v1.2.0"
    cis_version: "v1.2.0"
    cis_control: "3.5.1"
    cis_section: "3"
    profile_applicability: ""
    description: >
      Fibre Channel over Ethernet (FCoE) encapsulation allows a physical Ethernet
      cable to carry standard Fibre Channel traffic within Ethernet frames. In Cisco
      Nexus devices, an FCoE-capable physical Ethernet interface can carry traffic
      for one virtual Fibre Channel (vFC) interface. If FCoE functionality is not
      required, this functionality should be disabled. Note also that this is a
      licensed feature, so is not available without a purchased license.
    rationale: >
      
    audit_procedure: >
      switch# sho interface fcoe Ethernet1/1 is FCoE down Ethernet1/2 is FCoE UP
      Ethernet1/3 is FCoE down Ethernet1/4 is FCoE down Displays basic FCoE status
      switch# sho fcoe Global FCF details FCF-MAC is 8c:60:4f:a6:29:60 FC-MAP is
      0e:fc:00 FCF Priority is 128 FKA Advertisement period for FCF is 8 seconds
      Displays full FCoE database: switch# show fcoe database Displays the FCoE
      settings for an interface or all interfaces. switch# show interface [interface
      number] fcoe Displays LLDP configuration. switch# show lldp neighbors
    remediation: >
      Enable the FCoE feature globally on the switch: switch(config)# feature fcoe
      FC license checked out successfully fc_plugin extracted successfully FC plugin
      loaded successfully FCoE manager enabled successfully FC enabled on all
      modules successfully Warning: Ensure class-fcoe is included in qos policy-maps
      of all types Enable FCoE on a specific port (not required on all models):
      switch(config)# interface ethernet x/y switch(config-if)# fcoe mode on set the
      priority flow mode on a specific port: switch(config-if)# priority-flow-
      control mode auto FCoE also requires the DCBX (Data Center Bridging Exchange)
      protocol, which is used to negotiate capabilities between the FCOE endpoints.
      DCBX is an extension of LLDP, and LLDP is enabled globally and on all
      interfaces by default. If LLDP is disabled on any particular interface, it can
      be re-enabled as: switch(config-if)# int Ethernet x/y switch(config-if)# lldp
      transmit switch(config-if)# lldp receive Default Value: The FCoE feature is
      not enabled by default. LLDP is enabled globally and on all interfaces by
      default, so if FCoE is enabled then DCBX is enabled by default
    references: >
      
    impact: >
      
