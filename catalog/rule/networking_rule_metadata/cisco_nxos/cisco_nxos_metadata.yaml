  - rule_id: cisco_nxos.cis.1.configure_aaa_authentication_local_ssh_keys
    title: "Configure AAA Authentication - Local SSH keys"
    severity: medium
    category: networking
    tech_type: cisco_nxos
    automation_type: automated
    cis_benchmark: "CIS_CISCO_NXOS v1.2.0"
    cis_version: "v1.2.0"
    cis_control: "1.1.1.2"
    cis_section: "1"
    profile_applicability: ""
    description: >
      Using the client's public key to authenticate their SSH sessions circumvents
      the need for using passwords for an administrative login to the switch.
    rationale: >
      This is primarily an ease-of-use feature. It means that the administrators
      don't need to remember or key in passwords. It also can be used to
      significantly improve the security of any scripts or API calls that might use
      SSH. Impact: There are pros and cons to this approach. Pro: • Scripts and API
      calls that use SSH no longer need to have credentials embedded in them. While
      this can be done securely (using password vaults for instance), all to often
      the credentials are in clear-text, in the code or in an input file. • This is
      popular with network administrators, as they no longer need to key in
      passwords, or 'grab' their password from a password manager application. • It
      means that administrators can no longer configure easy to guess passwords.
      Con: • The private half of the PKI exchange (client side) can be available if
      the administrator's workstation or account is compromised • An inventory of
      SSH hosts that use key based authentication needs to be maintained if this
      approach is used. This is so that if a key needs to be replaced or deleted,
      the list of hosts that need to be updated is easily accessed. This can be time
      sensitive if an administrator has left the organization, or if a laptop is
      lost or stolen. Even if this is just due to regular hardware replacement or a
      policy that expires keys at regular intervals, missing a device can be a 'time
      bomb' that is often not found until the worst possible moment Normally the
      best recommendation is to use a back-end authentication source (such as AD),
      with RADIUS or TACACS+ as the authentication protocol. The back end directory
      can then enforce whatever complexity or password change requirements are
      needed. In particular if an administrator leaves the organization or changes
      departments, those situations can be managed by changing AD Group membership
      or by disabling the account in question.
    audit_procedure: >
      To list the status of one user account: switch# sho user-account rvadmin
      user:rvadmin this user account has no expiry date roles:network-operator
      network-admin ssh public key: ssh-rsa
      AAAAB3NzaC1yc2EAAAABIwAAAIEAy19oF6QaZl9G+3f1XswK
      3OiW4H7YyUyuA50rv7gsEPjhOBYmsi6PAVKui1nIf/DQhum+lJNqJP/eLowb7ubO+lVKRXFY/G+lJ
      NIQ W3g9igG30c6k6+XVn+NjnI1B7ihvpVh7dLddMOXwOnXHYshXmSiH3UD/vKyziEh5S4Tplx8=
      To list all users that have SSH key authentication: switch# sho run | i sshkey
      username rvadmin sshkey ssh-rsa
      AAAAB3NzaC1yc2EAAAABIwAAAIEAy19oF6QaZl9G+3f1XswK
      3OiW4H7YyUyuA50rv7gsEPjhOBYmsi6PAVKui1nIf/DQhum+lJNqJP/eLowb7ubO+lVKRXFY/G+lJ
      NIQ W3g9igG30c6k6+XVn+NjnI1B7ihvpVh7dLddMOXwOnXHYshXmSiH3UD/vKyziEh5S4Tplx8=
    remediation: >
      • Create the client's SSH public and private keys. The keys must be in OpenSSH
      format for the NX-OS switch to interpret them correctly. Use either RSA or DSA
      algorithms, and be sure to specify enough bits for entropy (2048 minimum, more
      is of course better) • Upload the client's SSH public key, and store it on the
      bootflash of the switch. • Be sure that the file has a meaningful name, often
      the users's initials and the key algorithm (RSA or DSA) is in the filename.
      This makes it easier to remove or replace that file as keys are expired out,
      workstations migrate or administrators leave the organization. • To enable
      key-based authentication for one local user (for instance, Davey Jones), enter
      the command: switch(config)# username djadmin sshkey file bootflash:dj_rsa.pub
      Alternatively, the ssh key can be defined in the username configuration line:
      switch(config)# username djadmin sshkey ssh-rsa
      AAAAB3NzaC1yc2EAAAABIwAAAIEAy19oF6QaZl9G+3f1XswK3OiW4H7YyUyuA50rv7gsEPjhOBYms
      i6PAVKui1nIf/DQhum+lJNqJP/eLowb7ubO+lVKRXFY/G+lJNIQW3g9igG30c6k6+XVn+NjnI1B7i
      hvpVh7dLddMOXwOnXHYshXmSiH3UD/vKyziEh5S4Tplx8= The file based method is
      usually preferred, as they keys can be changed without modifying the
      configuration of the switch. Also, the keys are not stored in any archived
      copy of the configuration. Note that the username and file name will vary
      depending on your organization's policies, procedures and standards Default
      Value: Per-user SSH keys are not created or defined by default.
    references: >
      
    impact: >
      
    compliance_mappings:
      cis:
        - "CIS_CISCO_NXOS_v1_2_0_1_1_1_2"
      nist_800_53: []
      soc2: []
      pci_dss: []
    source_unique_id: "cis_cisco_nxos_v1_2_0_1_1_1_2"
    metadata_source: generated
    generated_by: generate_tech_rules

  - rule_id: cisco_nxos.cis.1.configure_aaa_authentication_radius_if_applicable
    title: "Configure AAA Authentication - RADIUS if applicable"
    severity: medium
    category: networking
    tech_type: cisco_nxos
    automation_type: automated
    cis_benchmark: "CIS_CISCO_NXOS v1.2.0"
    cis_version: "v1.2.0"
    cis_control: "1.1.1.3"
    cis_section: "1"
    profile_applicability: ""
    description: >
      RADIUS is an authentication protocol that Cisco NX-OS devices can use for
      authentication of management users against a remote AAA server. These
      management users can access the Cisco NX-OS device through any protocol and
      use this back-end authentication. Using a central authentication store (such
      as Active Directory) ensures that all administrative actions are tied to named
      users, making the tracking of changes much easier. It also makes tracking
      compromised accounts and malicious activities much easier.
    rationale: >
      Central authentication is key as it minimizes the effort in managing named
      user accounts. Keeping local admin accounts opens the door to all the issues
      inherent in shared accounts, namely: • Errors in implementation being done by
      generic admin accounts, which can then be denied by all. • Shared credentials
      staying unchanged when administrative staff leave the organization or change
      roles. • Giving malicious actors the ability to recover shared credentials
      from saved device backups RADIUS is the most widely used protocol for this
      purpose, since it is a requirement for secure wireless authentication (EAP-
      TLS). Just as important, RADIUS is much better supported by most non-Cisco
      vendors for back-end authentication. Impact: Implementing RADIUS (or any
      central authentication solution) ensures that only named users are allowed to
      gain an administrative session to the device. This allows: • Tracking of all
      changes to named users • Simplification of reconciling changes to a change
      management process • Off-loading password change cycles and password
      complexity requirements to that central authentication store • Simplification
      of removing admin access as administrators leave the organization or change
      their roles in the organization
    audit_procedure: >
      'show running-config radius' will show all radius definitions. Two or more
      RADIUS servers must be defined, as well as the RADIUS server group:
      switch(config)# sho running-config radius !Command: show running-config radius
      !Running configuration last done at: Mon Apr 13 05:02:06 2020 !Time: Mon Apr
      13 05:07:21 2020 version 9.3(3) Bios:version radius-server host 3.4.5.6 key 7
      'vkqjcet' authentication accounting radius-server host 4.5.6.7 key 7
      'vkqjgtcjjnod' authentication accounting aaa group server radius RADIUSGROUP
      server 3.4.5.6 server 4.5.6.7 'Show running-config radius all' will give more
      detail if required: switch# show run radius all !Command: show running-config
      radius all !Running configuration last done at: Mon Apr 13 05:02:06 2020
      !Time: Mon Apr 13 05:10:12 2020 version 9.3(3) Bios:version radius-server test
      username test password 7 wawy idle-time 0 radius-server timeout 5 radius-
      server retransmit 1 radius-server deadtime 0 radius-server host 3.4.5.6 key 7
      'vkqjcet' auth-port 1812 acct-port 1813 authent ication accounting timeout 5
      retransmit 1 radius-server host 4.5.6.7 key 7 'vkqjgtcjjnod' auth-port 1812
      acct-port 1813 au thentication accounting timeout 5 retransmit 1 radius-server
      host 3.4.5.6 test username test password 7 wawy idle-time 0 radius-server host
      4.5.6.7 test username test password 7 wawy idle-time 0 aaa group server radius
      radius server 3.4.5.6 server 4.5.6.7 deadtime 0 use-vrf default no source-
      interface aaa group server radius RADIUSGROUP server 3.4.5.6 server 4.5.6.7
      deadtime 0 use-vrf default no source-interface no ip radius source-interface
      'Show running-config aaa' will display the authentication lists. RADIUS should
      appear first in the authentication list for both default and console access:
      switch# sho run aaa !Command: show running-config aaa !Running configuration
      last done at: Mon Apr 13 05:02:06 2020 !Time: Mon Apr 13 05:08:25 2020 version
      9.3(3) Bios:version aaa authentication login default group RADIUSGROUP local
      aaa authentication login console group RADIUSGROUP local no aaa user default-
      role login on-success log
    remediation: >
      First define two or more RADIUS Servers switch(config)#radius-server host
      3.4.5.6 key somekey authentication accounting switch(config)#radius-server
      host 4.5.6.7 key someotherkey authentication accounting Then create an AAA
      group for RADIUS switch(config)# aaa group server radius RADIUSGROUP server
      3.4.5.6 server 4.5.6.7 Finally, create the authentication lists in the correct
      order - to be effective the RADIUS group needs to appear first in the list.
      Both the default and console access should be secured in the same way:
      switch(config)# aaa authentication login default group RADIUSGROUP local
      switch(config)# aaa authentication login console group RADIUSGROUP local It is
      common to include 'local' as the last entry in the list, to allow access to
      administer the device even if the RADIUS server is offline. Note that while
      this ensures access in the case of the device or the RADIUS server being
      offline, it also means that if an attacker can DOS the RADIUS Servers, they
      can authenticate locally as well. Default Value: By default RADIUS is not
      implemented References: 1.
      https://www.cisco.com/c/m/en_us/techdoc/dc/reference/cli/nxos/commands/fund/
      show-running-config.html
    references: >
      
    impact: >
      
    compliance_mappings:
      cis:
        - "CIS_CISCO_NXOS_v1_2_0_1_1_1_3"
      nist_800_53: []
      soc2: []
      pci_dss: []
    source_unique_id: "cis_cisco_nxos_v1_2_0_1_1_1_3"
