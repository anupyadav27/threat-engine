  - rule_id: cisco_nxos.cis.2.configure_control_plane_policing
    title: "Configure Control Plane Policing"
    severity: medium
    category: networking
    tech_type: cisco_nxos
    automation_type: manual
    cis_benchmark: "CIS_CISCO_NXOS v1.2.0"
    cis_version: "v1.2.0"
    cis_control: "2.1.1"
    cis_section: "2"
    profile_applicability: ""
    description: >
      Control Plane Policing is used to create a set of policies governing specific
      traffic. Normally this limits the volume and type of traffic that can be
      directed to the IP addresses on the device, as this traffic normally must be
      handled in process mode by the switch CPU. For instance, limiting the volume
      of ICMP traffic that can be sent to a device IP will both limit the CPU impact
      of that traffic and also limit the bandwidth that this traffic can take. With
      10GB and faster interfaces available, both of these considerations are
      important.
    rationale: >
      You must configure control plane class maps for control plane policies. You
      can classify traffic by matching packets based on existing ACLs. The permit
      and deny ACL keywords are ignored in the matching. You can configure policies
      for IP version 4 (IPv4) and IP version 6 (IPv6) packets. Impact: Configuring
      Control Plane Policing both limits the impact of traffic (either diagnostic or
      malicious traffic) on the CPU and interfaces of the device. It also limits the
      impact of this traffic on available bandwidth - it can't restrict how much
      traffic is sent, but it certainly limits how much is processed, so by that
      limits the volume of reply traffic. In many DOS attacks, ideally the attacker
      wants the volume of the reply traffic to exceed the traffic sent - getting the
      victim to 'amplify' the attack is almost always a desired goal of the
      attacker. This DOS attack can then be directed to a third 'victim' host by the
      use of spoofing, or the DOS attack may be just against the vulnerable device
      or host (in this case the NX-OS switch)
