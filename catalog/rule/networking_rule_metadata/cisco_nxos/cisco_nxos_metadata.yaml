  - rule_id: cisco_nxos.cis.4.configure_a_remote_backup_schedule
    title: "Configure a Remote Backup Schedule"
    severity: medium
    category: networking
    tech_type: cisco_nxos
    automation_type: manual
    cis_benchmark: "CIS_CISCO_NXOS v1.2.0"
    cis_version: "v1.2.0"
    cis_control: "4.2"
    cis_section: "4"
    profile_applicability: ""
    description: >
      NX-OS can be configured to initiate remote backups using scheduled jobs. This
      recommendation can also be satisfied (and likely satisfied better) using a
      host based backup tool, using SSH or SCP.
    rationale: >
      Remote backups are preferred over local backups, as an attacker that has
      compromised a device also has full access to any locally stored files (which
      local backups are). In that situation, an attacker can modify or delete the
      stored backups, impeding any recovery or remediation efforts. Impact: A host-
      based backup solution is preferred over one implemented locally. Locally
      configured backups have several security issues. By protocol, they are: • TFTP
      - cleartext, which is susceptible to interception or modification over the
      wire and the target filesystem allows unauthenticated writes (and usually
      unauthenticated reads) • FTP or HTTP - cleartext, which is susceptible to
      interception or modification over the wire. Credentials are embedded in the
      job configuration • HTTPS, SCP, SFTP: encrypted, but credentials are still
      embedded in the job configuration
    audit_procedure: >
      switch# sho scheduler config
    remediation: >
      Note that this first example job uses tftp for backups. The risk here is that
      the backup is sent in clear-text, so can be intercepted and/or modified in
      transit. switch(config)# Scheduler job name [backup-cfg] switch(config-
      job)copy running-config tftp://1.2.3.4/$(SWITCHNAME)- cfg.$(TIMESTAMP) vrf
      management This example job uses SCP. The risk here is that the credentials
      need to be embedded in the configuration, so can be recovered if the backup
      repository is compromised. As this is true for all local passwords, the risk
      may be deemed low in some organizations. switch(config)# scheduler aaa-
      authentication username <username> password <some complex password>
      switch(config)# Scheduler job name <backup-cfg> switch(config-job)copy
      running-config scp://1.2.3.4/$(SWITCHNAME)- cfg.$(TIMESTAMP) vrf management
      Whatever the protocol, set timetable for this backup switch(config)# scheduler
      schedule name [backups] switch(config-schedule)# schedule name [backups]
      switch(config-schedule)# job name <backup-cfg> switch(config-schedule)# time
      weekly [day 00:00] While this can certainly work, if the backup server IP
      should ever change, the effort to fix this across multiple switches can be
      both error-prone and time-intensive. It is normally recommended to backup
      configurations from the backup server to the NX-OS switch over SSH or SCP,
      rather than from the switch to the host. As this config (host to switch)
      resides on the remote host, it cannot be audited from the switch.
    references: >
      
    impact: >
      
    compliance_mappings:
      cis:
        - "CIS_CISCO_NXOS_v1_2_0_4_2"
      nist_800_53: []
      soc2: []
      pci_dss: []
    source_unique_id: "cis_cisco_nxos_v1_2_0_4_2"
    metadata_source: generated
    generated_by: generate_tech_rules

  - rule_id: cisco_nxos.cis.4.configure_alerts_on_all_configuration_changes
    title: "Configure Alerts on all Configuration Changes"
    severity: medium
    category: networking
    tech_type: cisco_nxos
    automation_type: manual
    cis_benchmark: "CIS_CISCO_NXOS v1.2.0"
    cis_version: "v1.2.0"
    cis_control: "4.3"
    cis_section: "4"
    profile_applicability: ""
    description: >
      This is not easily implemented directly on the switch. Changes should ideally
      be backed up remotely, and a 'diff' process to highlight any changes in
      successive configurations is a good process to implement.
    rationale: >
      Change Control processes are ubiquitous in the industry. Especially with a
      text-based configuration such as most network devices have, it is easy to
      extract the exact changes from one version of the saved or running
      configuration to the next. This can then be correlated back to the change
      control process, to see: • Did any and all approved changes get executed? •
      Did any unapproved changes get executed? • Relating this back to the syslogs
      created by named user logins, did the change happen within the correct window?
      • Also relating back to the syslogs created by named user logins, did the
      correct person make the change? (see the AAA section, and named administrative
      users) • Is there a pattern of any one or more administrators making
      unapproved or outside of window changes? Impact: A formal change control
      process can manage conflicts in changes nicely, especially between disparate
      sections of the infrastructure. For instance, the situation where 'a server
      upgrade failed because the firewall changes interrupted the VPN session' is
      much less likely to occur if all changes are reviewed in advance. In addition,
      changes made without planning tend to result in the 'testing in prod'
      scenario, ending up with a much higher ratio of service interruptions.
    audit_procedure: >
      This should be an automated process running on the host that is the repository
      for daily backups. An assessment should be made on that host.
    remediation: >
      This is not a process that typically runs on the switch, there is no on-switch
      remediation. Default Value: None.
    references: >
      
    impact: >
      
    compliance_mappings:
      cis:
        - "CIS_CISCO_NXOS_v1_2_0_4_3"
      nist_800_53: []
      soc2: []
      pci_dss: []
    source_unique_id: "cis_cisco_nxos_v1_2_0_4_3"
