  - rule_id: cisco_nxos.cis.1.vty_line_authentication
    title: "vty line authentication"
    severity: medium
    category: networking
    tech_type: cisco_nxos
    automation_type: automated
    cis_benchmark: "CIS_CISCO_NXOS v1.2.0"
    cis_version: "v1.2.0"
    cis_control: "1.1.2.1"
    cis_section: "1"
    profile_applicability: ""
    description: >
      Authenticate management access to the network devices. Typically a central
      authentication store combined with a fallback mechanism should be implemented
      to allow emergency access, in case the central authentication servers are not
      available.
    rationale: >
      Management access to network devices must be authenticated. The default under
      AAA (local or network) is to require users to log in using a valid user name
      and password. This rule applies for both local and network AAA. Fallback mode
      should also be enabled to allow emergency access to the router or switch in
      the event that the AAA server was unreachable. Impact: If no authentication is
      implemented, any user with network reachability to the management interface
      can access network devices and change their configuration.
    audit_procedure: >
      Check if the login authentication is defined: switch# show run | i
      authentication aaa authentication login default group <servergroup> If no
      result is shown it means the default (local authentication) is in place.
    remediation: >
      Configure central authentication for vty lines as follows: aaa authentication
      login default group <servergroup> Default Value: By default local
      authentication is configured: switch# show run all | i 'aaa authentication
      login' aaa authentication login default local aaa authentication login console
      local aaa authentication login default fallback error local aaa authentication
      login console fallback error local References: 1.
      https://www.cisco.com/c/en/us/td/docs/dcn/nx-
      os/nexus9000/102x/configuration/Security/cisco-nexus-9000-nx-os-security-
      configuration-guide-102x/m-configuring-aaa.html
    references: >
      
    impact: >
      
    compliance_mappings:
      cis:
        - "CIS_CISCO_NXOS_v1_2_0_1_1_2_1"
      nist_800_53: []
      soc2: []
      pci_dss: []
    source_unique_id: "cis_cisco_nxos_v1_2_0_1_1_2_1"
