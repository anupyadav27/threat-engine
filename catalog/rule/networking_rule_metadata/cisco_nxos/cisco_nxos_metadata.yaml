  - rule_id: cisco_nxos.cis.1.set_password_lifetime_warning_time_and_grace_time
    title: "Set password lifetime, warning time and grace time for local credentials"
    severity: medium
    category: networking
    tech_type: cisco_nxos
    automation_type: automated
    cis_benchmark: "CIS_CISCO_NXOS v1.2.0"
    cis_version: "v1.2.0"
    cis_control: "1.4.3"
    cis_section: "1"
    profile_applicability: ""
    description: >
      NX-OS has commands to adjust the permitted lifetime of passphrases for local
      credentials, as well as the 'warning time' before expiry and the 'grace time'
      after expiry. If local credentials are in use, it is recommended that these be
      set to a value appropriate to the organization. Note that these timers cannot
      be set for the 'admin' credential.
    rationale: >
      Regularly changing passwords helps mitigate the risks associated with
      compromised credentials, as passwords can be compromised through various means
      such as phishing attacks, data breaches, or being shared inadvertently. Even
      if your password is strong, it might still be leaked in a data breach from
      another service, so regularly changing passwords reduces the impact of such
      leaks by ensuring compromised passwords eventually become outdated.
      Additionally, regular password changes encourage users to maintain good
      security hygiene, serving as a reminder to choose strong, unique passwords and
      avoid reusing old ones. Many organizations have policies and compliance
      requirements that mandate regular password changes, and adhering to these
      policies ensures that security standards are met and reduces the risk of non-
      compliance penalties. Finally, if an attacker gains access to an account, they
      can maintain access for an extended period if the password is never changed.
      Regularly changing passwords helps disrupt such long-term unauthorized access.
      In accordance with CIS password guidance it is recommended that you change the
      passphrase every 365 days or less. Impact: If local credentials are in regular
      use, it is recommended that a reasonable (non default) value be set for the
      passphrase timer values. The default of an infinite lifetime is of course not
      appropriate. Previous guidance of password changes on 30 or 60 day cycles
      however is also not appropriate if complex passwords are used and enforced.
      Some middle ground should be set - for instance, a password change cycle on a
      6 or 12 month rotation is often easy to track. This entire discussion
      illustrates clearly why it is most often advisable to use a back-end
      authentication source for credential storage. In an organization that has
      multiple switches and other infrastructure, setting a password rotation is a
      recipe that has the risk of missing or entirely forgetting the change date, or
      of missing one or more devices in the change procedure. Since password
      recovery after the grace period involves a reboot of the entire switch, this
      end result is undesirable in the extreme. The best recommendation is to set a
      long, complex password for any local administrative accounts, then use a back-
      end authentication source, so that these local accounts are only used in the
      event that the back-end authentication source is not reachable.
    audit_procedure: >
      To show the passphrase timers set per-user: switch# sho username <local
      userid> passphrase timevalues Last passphrase change(Y-M-D): 2020-04-30
      Passphrase lifetime: 99999 days after last passphrase change Passphrase
      warning time starts: 14 days before passphrase lifetime Passphrase Gracetime
      ends: 3 days after passphrase lifetime To show the global defaults for
      passphrase timers: switch# show userpassphrase timevalues passphrase default
      warningtime (in days): 10 passphrase default gracetime (in days): 10
      passphrase default lifetime (in days): 180 To show both the global defaults as
      well as the settings for all local users: switch# sho run | i passphrase
      username asdf passphrase lifetime 99999 warntime 14 gracetime 3 username test
      passphrase lifetime 180 warntime 10 gracetime 10 userpassphrase default-
      warntime 10 userpassphrase default-gracetime 10 userpassphrase default-
      lifetime 180
    remediation: >
      To set passphrase timers globally: switch(config)# userpassphrase default-
      warntime <days> switch(config)# userpassphrase default-gracetime <days>
      switch(config)# userpassphrase default-lifetime <days> example:
      switch(config)# userpassphrase default-warntime 10 switch(config)#
      userpassphrase default-gracetime 10 switch(config)# userpassphrase default-
      lifetime 365 To set passphrase time values per-user: switch(config)# username
      <userid> passphrase lifetime <days> warntime <time in days> gradetime <time in
      days> example switch(config)# username test passphrase lifetime 365 warntime
      10 gracetime 10 Default Value: By default, the passphrase time values per-user
      are: • Lifetime: 99999 (this value indicates no expiry, or an infinite
      lifetime) • Gracetime: 3 days • Warntime: 14 days By default, there are no
      global default values set, they are assigned per local user as the local
      accounts are created. By default the 'admin' account does not have any
      associated timers, and these values cannot be set for this account.
    references: >
      
    impact: >
      
    compliance_mappings:
      cis:
        - "CIS_CISCO_NXOS_v1_2_0_1_4_3"
      nist_800_53: []
      soc2: []
      pci_dss: []
    source_unique_id: "cis_cisco_nxos_v1_2_0_1_4_3"
    metadata_source: generated
    generated_by: generate_tech_rules

  - rule_id: cisco_nxos.cis.1.set_password_length_for_local_credentials
    title: "Set password length for local credentials"
    severity: medium
    category: networking
    tech_type: cisco_nxos
    automation_type: automated
    cis_benchmark: "CIS_CISCO_NXOS v1.2.0"
    cis_version: "v1.2.0"
    cis_control: "1.4.4"
    cis_section: "1"
    profile_applicability: ""
    description: >
      Password length should be set to some value that makes compromising any
      captured hashed difficult. This generally means that the maximum value of 127
      should never be changed, and that the minimum value, which defaults to 8,
      should always be increased. Typical values for minimum passphrase length of
      administrative users are generally 20 characters or longer (values of 30 or 32
      are often seen). A specific value is not recommended, since then a savvy
      attacker may start their attack with 'only passwords of the exact length
      recommended in the CIS benchmark', which would reduce their attack time.
    rationale: >
      Passwords are stored in a non-reversible, hashed and salted format. If an
      attacker should 'harvest' a password hash, it is of course hashed in a non-
      reversible format - however, it can be decoded using dictionary and/or brute-
      force attacks using tools such as hashcat or John the Ripper (JtR). The single
      best obstacle to an attack of this type is password length - the longer the
      password the more difficult it is to decode. Since the default password hash
      schema on the NX-OS version 9 platform is MD5, it's recommended that the
      password length be set to (and enforced at) some longer value, for instance
      24, 32 or even longer values. CIS recommends a minimum length of 16 for
      passphrases. This discussion actually illustrates why the best recommendation
      is to not use local credentials at all, but rather to use a back-end
      authentication source (using RADIUS or TACACS+). In this scenario, local
      administrative accounts are only used if the back-end authentication source is
      unavailable. This makes any compromised local credentials much harder to use,
      a successful attack would have to also take back end authentication sources
      offline (or make them otherwise unavailable). Impact: Not setting a maximum
      value leaves administrators with the freedom to set short passwords. If a
      stored configuration file is collected by an attacker (perhaps from a file
      share), this means that any password hashes in the stored configuration will
      be more likely to be 'cracked', giving the attacker the unencrypted credential
      to the target switch.
    audit_procedure: >
      The 'show userpassphrase length' command will display the minimum and maximum
      password length values. switch# sho userpassphrase length Minimum passphrase
      length : 20 Maximum passphrase length : 127 Alternatively, the single
      resulting configuration command can be displayed: switch# sho run | i min-
      length userpassphrase min-length 20 max-length 127
    remediation: >
      Passphrase length values can only be set globally, not per-local user
      switch(config)# userpassphrase min-length <minimum passphrase length>
      switch(config)# userpassphrase max-length <maximum passphrase length> or in a
      single command: userpassphrase min-length max-length example: switch(config)#
      userpassphrase min-length 20 switch(config)# userpassphrase max-length 127 Or
      in a single command: switch(config)# userpassphrase min-length 20 max-length
      127 Default Value: The default minimum passphrase length is 8. This has
      possible values between 8 and 127. The default maximum passphrase length is
      127. This has possible values between 80 and 127.
    references: >
      
    impact: >
      
    compliance_mappings:
