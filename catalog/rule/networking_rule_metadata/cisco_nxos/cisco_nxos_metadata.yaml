  - rule_id: cisco_nxos.cis.1.enable_fips_mode
    title: "Enable FIPS Mode"
    severity: medium
    category: networking
    tech_type: cisco_nxos
    automation_type: manual
    cis_benchmark: "CIS_CISCO_NXOS v1.2.0"
    cis_version: "v1.2.0"
    cis_control: "1.8.1"
    cis_section: "1"
    profile_applicability: ""
    description: >
      FIPS mode in NX-OS refers to the Federal Information Processing Standards
      (FIPS) 140-2 compliance mode. FIPS 140-2 is a U.S. government standard that
      specifies security requirements for cryptographic modules. When FIPS mode is
      enabled on NX- OS devices, it ensures that the cryptographic functions and
      processes adhere to these stringent security standards.
    rationale: >
      Enabling FIPS mode in NX-OS is important for several reasons: 1. Compliance
      with Government Standards: FIPS 140-2 is a U.S. government standard that
      specifies security requirements for cryptographic modules. Enabling FIPS mode
      ensures that your device complies with these stringent security standards,
      which is often a requirement for government and regulated industries. 2.
      Enhanced Security: FIPS mode enforces the use of FIPS-approved cryptographic
      algorithms and modules. This ensures that only secure and validated
      cryptographic functions are used, reducing the risk of vulnerabilities and
      attacks. 3. Self-Tests and Error Handling: FIPS mode includes self- tests and
      error handling mechanisms. The device performs power-up self-tests and
      conditional self-tests to verify the proper functioning of cryptographic
      modules. If any self-test fails, the device logs a system message and enters
      an error state, ensuring that any issues are promptly detected and addressed.
      4. Trust and Assurance: Enabling FIPS mode provides assurance to users and
      stakeholders that the device meets high security standards. This can be
      particularly important in environments where data security and integrity are
      critical. Impact: Enabling FIPS mode may cause some performance overhead
      because of the extra processing required. Additionally, it limits the range of
      available algorithms, meaning that some non-FIPS protocols and algorithms
      might be restricted or disabled. To ensure compliance with FIPS standards,
      certain configuration options and features may also be limited.
    audit_procedure: >
      switch#show fips status FIPS mode is enabled
    remediation: >
      switch(config)#fips mode enable References: 1.
      https://www.cisco.com/c/en/us/td/docs/switches/datacenter/nexus7000/sw/securit
      y/config/cisco_nexus7000_security_config_guide_8x/configuring_fips.html#:~:tex
      t=NX%2DOS%20devices.- ,Enabling%20FIPS%20Mode,Disabling%20FIPS%20Mode
      Additional Information: This setting has potential to impact systems if they
      are not in compliance. Ensure proper steps are taken before enabling this
      feature
    references: >
      
    impact: >
      
    compliance_mappings:
      cis:
        - "CIS_CISCO_NXOS_v1_2_0_1_8_1"
      nist_800_53: []
