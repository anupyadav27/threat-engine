rules:

  - rule_id: cisco_ios_xr.cis.1.tacacs
    title: "TACACS+"
    severity: medium
    category: networking
    tech_type: cisco_ios_xr
    automation_type: automated
    cis_benchmark: "CIS_CISCO_IOS_XR 7.x_v1.0.1"
    cis_version: "7.x_v1.0.1"
    cis_control: "1.1.1.1"
    cis_section: "1"
    profile_applicability: "Level 2"
    description: >
      Cisco IOS XR devices can use the TACACS+ protocol to communicate with a
      central AAA server. Using a central authentication store ensures that all
      administrative actions are tied to named users, making the tracking of changes
      much easier. It also makes tracking compromised accounts and malicious
      activities much easier.
    rationale: >
      Central authentication is key as it minimizes the effort in managing named
      user accounts. Keeping local admin accounts opens the door to all the issues
      inherent in shared accounts, namely: • Errors in implementation being done by
      generic admin accounts, which can then be denied by all. • Shared credentials
      staying unchanged when administrative staff leave the organization or change
      roles. • Giving malicious actors the ability to recover shared credentials
      from saved device backups Impact: Implementing TACACS+ (or any central
      authentication solution) ensures that only named users are allowed to gain an
      administrative session to the device. This allows: • Tracking of all changes
      to named users • Simplification of reconciling changes to a change management
      process • Off-loading password change cycles and password complexity
      requirements to that central authentication store • Simplification of removing
      admin access as administrators leave the organization or change their roles in
      the organization
    audit_procedure: >
      'show run aaa' shows all hierarchic configuration on a single line with the
      hierarchy prepended. Two or more TACACS servers must be defined, and they must
      be referenced by a aaa group: IOSXR#sh run aaa ! tacacs-server host 1.1.1.1
      port 49 key 7 070C285F4D06 ! tacacs-server host 1.1.1.2 port 49 key 7
      00071A150754 ! aaa group server tacacs+ TAC server 1.1.1.1 server 1.1.1.2
    remediation: >
      For complete instructions how to configure AAA please refer to the
      configuration guide. Below you can find some minimum config snippets to
      implement a radius or tacacs+ server group. IOSXR(config)#tacacs-server host
      {tacacs_ip_address} port 49 IOSXR(config-tacacs-host)#key {tacacs_key}
      IOSXR(config)#aaa group server tacacs+ {tacacs_group_name} IOSXR(config-sg-
      tacacs)#server {tacacs_ip_address} Default Value: By default no aaa groups are
      implemented. References: 1.
      https://www.cisco.com/c/en/us/td/docs/routers/asr9000/software/asr9k-r7-
      5/system-security/configuration/guide/b-system-security-cg-asr9000-
      75x/configuring-aaa-services.html
    references: >
      1. https://www.cisco.com/c/en/us/td/docs/routers/asr9000/software/asr9k-r7-
      5/system-security/configuration/guide/b-system-security-cg-asr9000-
      75x/configuring-aaa-services.html
    impact: >
      Implementing TACACS+ (or any central authentication solution) ensures that
      only named users are allowed to gain an administrative session to the device.
      This allows: • Tracking of all changes to named users • Simplification of
      reconciling changes to a change management process • Off-loading password
      change cycles and password complexity requirements to that central
      authentication store • Simplification of removing admin access as
      administrators leave the organization or change their roles in the
      organization
    compliance_mappings:
      cis:
        - "CIS_CISCO_IOS_XR_7_x_v1_0_1_1_1_1_1"
      nist_800_53: []
      soc2: []
      pci_dss: []
    source_unique_id: "cis_cisco_ios_xr_7_x_v1_0_1_1_1_1_1"
    metadata_source: generated
    generated_by: generate_tech_rules

