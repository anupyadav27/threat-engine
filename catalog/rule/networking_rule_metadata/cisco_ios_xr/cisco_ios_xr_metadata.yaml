  - rule_id: cisco_ios_xr.cis.1.disable_cdp
    title: "Disable CDP"
    severity: high
    category: networking
    tech_type: cisco_ios_xr
    automation_type: manual
    cis_benchmark: "CIS_CISCO_IOS_XR 7.x_v1.0.1"
    cis_version: "7.x_v1.0.1"
    cis_control: "1.3.1"
    cis_section: "1"
    profile_applicability: "Level 1"
    description: >
      Disable Cisco Discovery Protocol (CDP) service at device level.
    rationale: >
      The Cisco Discovery Protocol is a proprietary protocol that Cisco devices use
      to identify each other on a LAN segment. It is useful only in network
      monitoring and troubleshooting situations but is considered a security risk
      because of the amount of information provided from queries. In addition, there
      have been published denial-of- service (DoS) attacks that use CDP. CDP should
      be completely disabled unless necessary. Impact: To reduce the risk of
      unauthorized access, organizations should implement a security policy
      restricting network protocols and explicitly require disabling all insecure or
      unnecessary protocols.
    audit_procedure: >
      Perform the following to determine if CDP is enabled: Verify the result shows
      'CDP is not enabled' IOSXR#show cdp
    remediation: >
      Disable Cisco Discovery Protocol (CDP) service globally. IOSXR(config)#no cdp
      Default Value: Enabled on all platforms except the Cisco 10000 Series Edge
      Services Router References: 1.
      https://www.cisco.com/en/US/docs/ios_xr_sw/iosxr_r3.7/system_management/co
      mmand/reference/yr37cdp.html
    references: >
      1. https://www.cisco.com/en/US/docs/ios_xr_sw/iosxr_r3.7/system_management/co
      mmand/reference/yr37cdp.html
    impact: >
      To reduce the risk of unauthorized access, organizations should implement a
      security policy restricting network protocols and explicitly require disabling
      all insecure or unnecessary protocols.
    compliance_mappings:
      cis:
        - "CIS_CISCO_IOS_XR_7_x_v1_0_1_1_3_1"
      nist_800_53: []
      soc2: []
      pci_dss: []
