  - rule_id: cisco_ios_xr.cis.1.console_authentication
    title: "console authentication"
    severity: high
    category: networking
    tech_type: cisco_ios_xr
    automation_type: automated
    cis_benchmark: "CIS_CISCO_IOS_XR 7.x_v1.0.1"
    cis_version: "7.x_v1.0.1"
    cis_control: "1.1.2.1"
    cis_section: "1"
    profile_applicability: "Level 1"
    description: >
      Authenticate management access to the network devices. Typically a central
      authentication store combined with a fallback mechanism should be implemented
      to allow emergency access, in case the central authentication servers are not
      available.
    rationale: >
      Management access to network devices must be authenticated. The default under
      AAA (local or network) is to require users to log in using a valid user name
      and password. This rule applies for both local and network AAA. Fallback mode
      should also be enabled to allow emergency access to the router or switch in
      the event that the AAA server was unreachable. Impact: If no authentication is
      implemented, any user with network reachability to the management interface
      can access network devices and change their configuration.
    audit_procedure: >
      The console doesn't have any line pool. The console is configured directly:
      IOSXR#show run formal | i 'login authentication' line console login
      authentication default Verify an authentication list is defined and optionally
      references the aaa group that was created in the prerequisites: IOSXR#show run
      formal | i 'aaa authentication login' aaa authentication login default group
      {tacacs_group|radius_group} local If a group is referenced above in the
      authentication list, verify that group is defined: IOSXR#r#show run formal | i
      'aaa group server' aaa group server tacacs+ {tacacs_group|radius_group}
    remediation: >
      Configure an authentication list that references the AAA group that was
      created in the prerequisites. AAA lists are prioritized list of databases. If
      the system is unable to use a database, it automatically rolls over to the
      next database on the list. If the authentication, authorization, or accounting
      request is rejected by any database, the rollover does not occur and the
      request is rejected. It is common to include 'local' as the last entry in the
      list, to allow access to manage the device even if all servers from the AAA
      group are unavailable. Note that it also means that if an attacker can DoS the
      AAA Servers, they can start to try authenticate locally as well. Hence, always
      ensure to use strong passwords for local users. IOSXR(config)#aaa
      authentication login default group {tacacs_group|radius_group} local Above
      configuration authenticates first against a central aaa group and uses local
      user accounts as fallback. Ensure the above list is referenced under the line
      templates: IOSXR(config)#line console login authentication default Ensure the
      vty pool references the above line template: IOSXR(config)#vty-pool default 0
      4 line-template default Default Value: By default IOS XR authenticates against
      the local user database. However, there is no way to show the default
      configuration. We follow the principle 'explicit is better than implicit' and
      recommend to configure the authentication explicitly. References: 1.
      https://www.cisco.com/c/en/us/td/docs/routers/asr9000/software/asr9k-r7-
      5/system-security/configuration/guide/b-system-security-cg-asr9000-
      75x/configuring-aaa-services.html
    references: >
      1. https://www.cisco.com/c/en/us/td/docs/routers/asr9000/software/asr9k-r7-
      5/system-security/configuration/guide/b-system-security-cg-asr9000-
      75x/configuring-aaa-services.html
    impact: >
      If no authentication is implemented, any user with network reachability to the
      management interface can access network devices and change their
      configuration.
    compliance_mappings:
      cis:
        - "CIS_CISCO_IOS_XR_7_x_v1_0_1_1_1_2_1"
      nist_800_53: []
      soc2: []
      pci_dss: []
    source_unique_id: "cis_cisco_ios_xr_7_x_v1_0_1_1_1_2_1"
    metadata_source: generated
    generated_by: generate_tech_rules

