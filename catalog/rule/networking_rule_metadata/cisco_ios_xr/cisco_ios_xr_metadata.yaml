  - rule_id: cisco_ios_xr.cis.1.enable_aes_password_encryption
    title: "Enable AES Password Encryption"
    severity: medium
    category: networking
    tech_type: cisco_ios_xr
    automation_type: manual
    cis_benchmark: "CIS_CISCO_IOS_XR 7.x_v1.0.1"
    cis_version: "7.x_v1.0.1"
    cis_control: "1.8.1"
    cis_section: "1"
    profile_applicability: "Level 2"
    description: >
      You can enable strong, reversible 128-bit Advanced Encryption Standard (AES)
      password encryption, also known as type-6 encryption. To start using type-6
      encryption, you must enable the AES password encryption feature and configure
      a master encryption key, which is used to encrypt and decrypt passwords. After
      you enable AES password encryption and configure a master key, all existing
      and newly created clear- text passwords for supported applications are stored
      in type-6 encrypted format
    rationale: >
      Encryption of passwords is used to protect it from being sent over the wire
      cleartext or being accidentally exposed when sharing device configurations
      with third parties. By applying encryption you are making it more difficult
      for an adversary to gain access to your device/network. Impact: Make sure to
      store your master in a secure place and test your emergency backup/restore
      procedures. Without the masterkey all passwords of supported type6
      applications will need to be re-entered manually upon config restore from
      backup.
    audit_procedure: >
      Just verifying the running configuration might not be sufficient because it
      could be that no masterkey has been set. IOSXR# show run formal | i password6
      password6 encryption aes Use the following show command to see if encryption
      is enabled and functional. Only when all three status are 'Enabled' the
      feature is fully working. IOSXR#show type6 server Server detail information:
      ============================================= AES config State : Enabled
      Masterkey config State : Enabled Type6 feature State : Enabled Master key
      Inprogress : No Verify Type 6 trace server details.
    remediation: >
      Define a password encryption key IOSXR#key config-key password-encryption New
      password Requirements: Min-length 6, Max-length 64 Characters restricted to
      [A-Z][a-z][0-9] Enter new key : Enter confirm key : Master key operation is
      started in background Enable aes config password encryption /* Enable Type 6
      password encryption */ IOSXR# configure IOSXR(config)#password6 encryption aes
      IOSXR(config)#commit Default Value: type 6 aes password encryption is
      disabled. References: 1.
      https://www.cisco.com/c/en/us/td/docs/routers/asr9000/software/asr9k-r7-
      9/system-security/configuration/guide/b-system-security-cg-asr9000-
      79x/implementing-type-6-password-encryption.html
    references: >
      1. https://www.cisco.com/c/en/us/td/docs/routers/asr9000/software/asr9k-r7-
      9/system-security/configuration/guide/b-system-security-cg-asr9000-
      79x/implementing-type-6-password-encryption.html
    impact: >
      Make sure to store your master in a secure place and test your emergency
      backup/restore procedures. Without the masterkey all passwords of supported
      type6 applications will need to be re-entered manually upon config restore
      from backup.
