  - rule_id: cisco_ios_xr.cis.1.set_modulus_to_greater_than_or_equal_to_2048_for
    title: "Set 'modulus' to greater than or equal to 2048 for 'crypto key generate rsa'"
    severity: high
    category: networking
    tech_type: cisco_ios_xr
    automation_type: manual
    cis_benchmark: "CIS_CISCO_IOS_XR 7.x_v1.0.1"
    cis_version: "7.x_v1.0.1"
    cis_control: "1.2.2"
    cis_section: "1"
    profile_applicability: "Level 1"
    description: >
      Use this command to generate RSA key pairs for your Cisco device. RSA keys are
      generated in pairs--one public RSA key and one private RSA key.
    rationale: >
      An RSA key pair is a prerequisite for setting up SSH and should be at least
      2048 bits. NOTE: IOS does NOT display the modulus bit value in the Audit
      Procedure. Impact: Organizations should plan and implement enterprise network
      cryptography and generate an appropriate RSA key pairs, such as 'modulus',
      greater than or equal to 2048.
    audit_procedure: >
      Perform the following to determine if the RSA key pair is configured: IOSXR#sh
      crypto key mypubkey rsa Wed Jul 19 18:09:46.009 UTC Key label: the_default
      Type : RSA General purpose Size : 2048 Created : 16:25:09 UTC Wed Jul 19 2023
    remediation: >
      Generate an RSA key pair for the router. IOSXR#crypto key generate rsa
      general-keys Wed Jul 19 18:10:51.633 UTC The name for the keys will be:
      the_default % You already have keys defined for the_default Do you really want
      to replace them? [yes/no]: yes Choose the size of the key modulus in the range
      of 512 to 4096 for your General Purpose Keypair. Choosing a key modulus
      greater than 512 may take a few minutes. How many bits in the modulus [2048]:
      Generating RSA keys ... Done w/ crypto generate keypair [OK] Default Value:
      RSA key pairs do not exist. References: 1.
      https://www.cisco.com/c/en/us/td/docs/routers/crs/software/crs_r6-
      1/security/configuration/guide/b-syssec-cg-crs-61x.html
    references: >
      1. https://www.cisco.com/c/en/us/td/docs/routers/crs/software/crs_r6-
      1/security/configuration/guide/b-syssec-cg-crs-61x.html
    impact: >
      Organizations should plan and implement enterprise network cryptography and
      generate an appropriate RSA key pairs, such as 'modulus', greater than or
      equal to 2048.
    compliance_mappings:
