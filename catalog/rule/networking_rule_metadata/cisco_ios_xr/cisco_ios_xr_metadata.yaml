    impact: >
      Unicast Reverse Path Forwarding (URPF) is a mechanism for validating the
      source IP address of packets received on a router. A router configured with
      URPF performs a reverse path lookup in the FIB table tovalidate the presence
      of the source IP address. If the source IP address is listed in the table,
      then it indicatesthat the source is reachable and valid. If source IP address
      cannot be located in the FIB table, the packet istreated as malicious by the
      router and discarded.
