  - rule_id: cisco_ios_xr.cis.1.exec_accounting
    title: "exec accounting"
    severity: high
    category: networking
    tech_type: cisco_ios_xr
    automation_type: automated
    cis_benchmark: "CIS_CISCO_IOS_XR 7.x_v1.0.1"
    cis_version: "7.x_v1.0.1"
    cis_control: "1.1.4.1"
    cis_section: "1"
    profile_applicability: "Level 1"
    description: >
      The router reports user activity to the TACACS+ or RADIUS security server in
      the form of accounting records. Each accounting record contains accounting AV
      pairs and is stored on the security server.
    rationale: >
      Authentication, authorization and accounting (AAA) systems provide an
      authoritative source for managing and monitoring access for devices.
      Centralizing control improves consistency of access control, the services that
      may be accessed once authenticated and accountability by tracking services
      accessed. Additionally, centralizing access control simplifies and reduces
      administrative costs of account provisioning and de- provisioning, especially
      when managing a large number of devices. AAA Accounting provides a management
      and audit trail for user and administrative sessions through TACACS+. Impact:
      Enabling 'aaa accounting exec' records each new exec session on the router and
      sends it to the accounting servers and enables organizations to monitor and
      analyze the activity. Command accounting is not supported for commands that
      are executed using Netconf, XML or GRPC.
    audit_procedure: >
      Make sure an accounting list is defined and that same list (called 'default'
      in the example below) is referenced by the line templates. IOSXR#show run aaa
      aaa accounting exec default start-stop group {tacacs_group|radius_group} line
      console accounting exec default line default accounting exec default If not
      the 'line default' template is used, make sure the correct line template is
      associated with the vty-pool.
    remediation: >
      Configure an accounting list which for example includes the tacacs+ or radius
      server group, which was defined in the prerequisites or local or both:
      IOSXR(config)#aaa accounting exec default start-stop group
      {tacacs_group|radius_group} IOSXR(config)#line console accounting exec default
      IOSXR(config)#line default accounting exec default Note: exec accounting
      doesn't support the 'local' / syslog target. Default Value: No accounting is
      configured. References: 1.
      https://www.cisco.com/c/en/us/td/docs/routers/asr9000/software/asr9k-r7-
      5/system-security/configuration/guide/b-system-security-cg-asr9000-
      75x/configuring-aaa-services.html Additional Information: For minimal
      accounting, include the stop-only keyword to send a “stop accounting” notice
      at the end of the requested user process. For more accounting, you can include
      the start-stop keyword, so that the external AAA server sends a “start
      accounting” notice at the beginning of the requested process and a “stop
      accounting” notice at the end of the process. Command accounting with a method
      as local, enables the logging of commands executed by all users as syslog
      messages. This feature can be enabled or disabled only by users who have AAA
      write permissions. Once enabled, all the commands that are executed by all
      users can be viewed from the output of the show logging command.
    references: >
      1. https://www.cisco.com/c/en/us/td/docs/routers/asr9000/software/asr9k-r7-
      5/system-security/configuration/guide/b-system-security-cg-asr9000-
      75x/configuring-aaa-services.html Additional Information: For minimal
      accounting, include the stop-only keyword to send a “stop accounting” notice
      at the end of the requested user process. For more accounting, you can include
      the start-stop keyword, so that the external AAA server sends a “start
      accounting” notice at the beginning of the requested process and a “stop
      accounting” notice at the end of the process. Command accounting with a method
      as local, enables the logging of commands executed by all users as syslog
      messages. This feature can be enabled or disabled only by users who have AAA
      write permissions. Once enabled, all the commands that are executed by all
      users can be viewed from the output of the show logging command.
    impact: >
      Enabling 'aaa accounting exec' records each new exec session on the router and
      sends it to the accounting servers and enables organizations to monitor and
      analyze the activity. Command accounting is not supported for commands that
      are executed using Netconf, XML or GRPC.
    compliance_mappings:
      cis:
