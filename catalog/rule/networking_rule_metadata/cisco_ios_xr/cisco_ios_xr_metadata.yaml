  - rule_id: cisco_ios_xr.cis.3.urpf
    title: "URPF"
    severity: medium
    category: networking
    tech_type: cisco_ios_xr
    automation_type: manual
    cis_benchmark: "CIS_CISCO_IOS_XR 7.x_v1.0.1"
    cis_version: "7.x_v1.0.1"
    cis_control: "3.1"
    cis_section: "3"
    profile_applicability: "Level 2"
    description: >
      Enable Unicast reverse path forwarding to prevent IP speeofing attacks.
    rationale: >
      Impact: Unicast Reverse Path Forwarding (URPF) is a mechanism for validating
      the source IP address of packets received on a router. A router configured
      with URPF performs a reverse path lookup in the FIB table tovalidate the
      presence of the source IP address. If the source IP address is listed in the
      table, then it indicatesthat the source is reachable and valid. If source IP
      address cannot be located in the FIB table, the packet istreated as malicious
      by the router and discarded.
    audit_procedure: >
      Verify the appropriate key chain and mode are set on the appropriate
      interface(s) IOSXR#sh run interface mgmtEth 0/RP0/CPU0/0 Wed Jul 19
      22:37:55.238 UTC interface MgmtEth0/RP0/CPU0/0 cdp ipv4 address dhcp ipv4
      verify unicast source reachable-via rx
    remediation: >
      Configure the Interface with the RIPv2 key chain. IOSXR(config)#int
      {interface} IOSXR(config-if)#ipv4 verify unicast source reachable-via rx
      Default Value: Not set References: 1.
