  - rule_id: cisco_ios_xr.cis.1.local_users_groups_and_tasks
    title: "Local users, groups and tasks"
    severity: medium
    category: networking
    tech_type: cisco_ios_xr
    automation_type: manual
    cis_benchmark: "CIS_CISCO_IOS_XR 7.x_v1.0.1"
    cis_version: "7.x_v1.0.1"
    cis_control: "1.1.5"
    cis_section: "1"
    profile_applicability: "Level 2"
    description: >
      To provide controlled access to the XR and System Admin configurations on the
      router, user profiles are created with assigned privileges. The privileges are
      specified using command rules and data rules. The authentication,
      authorization, and accounting (aaa) commands are used for the creation of
      users, groups, command rules, and data rules. The aaa commands are also used
      for changing the disaster-recovery password.
    rationale: >
      IOS-XR has a very strong embedded mechanism to do user authentication and
      authorization. While XR does not have the concept of privilege-levels as what
      IOS had, the embedded user task group management is extremely strong allow for
      the creation of different task groups. Impact: Default task-groups The
      following task-groups are predefined in IOS-XR root-system: Root system users
      root-lr: Root logical router users netadmin: Network administrators sysadmin:
      System administrators operator: Operators performing day-to-day activities
      cisco-support: highest level of privilege allowing lowest level access
    audit_procedure: >
      'show run aaa' shows all hierarchic configuration on a single line with the
      hierarchy prepended. IOSXR#sh run aaa taskgroup TASKGROUP task read bgp !
      usergroup XRGROUP taskgroup TASKGROUP ! username cisco group root-lr group
      cisco-support secret 10
      $6$O51Wr/lUsR6S5r/.$.qUOapiguyRPwNwix3FVwc9APW3WvrhZv84z0F7cM0zxcyCiXwQ45YuX/
      p/jDXb4cS7bTxemvGK73giBtJHoj. ! username USER1 group XRGROUP secret 10
      $6$cTTjN1rrPqxaBN1.$jq8GqQ.hSwZXb72YxgTCPgm3kZ2MT51FAlXcJDN54l/vY9TNa8Nob6cyY
      tT4vT4Y9wjtH9R7aK3KmUgwjR5pz0 !
    remediation: >
      The commands below will enable authorizarion for a user.
      IOSXR(config)#taskgroup {task_group} task read {task} IOSXR(config)#usergroup
      {user_group} taskgroup {task_group} IOSXR(config)#username {username}
      IOSXR(config-un)#secret {password} IOSXR(config-un)#group {user_group} Default
      Value: By default no aaa groups are implemented. References: 1.
      https://www.cisco.com/c/en/us/td/docs/iosxr/ncs5000/system-setup/62x/b-
      system-setup-cg-ncs5000-62x/b-system-setup-cg-ncs5000-
      62x_chapter_0101.html#id_134674 2. https://community.cisco.com/t5/service-
      providers-knowledge-base/asr9000-xr- using-task-groups-and-understanding-priv-
      levels-and/ta-p/3109596
    references: >
      1. https://www.cisco.com/c/en/us/td/docs/iosxr/ncs5000/system-setup/62x/b-
      system-setup-cg-ncs5000-62x/b-system-setup-cg-ncs5000-
      62x_chapter_0101.html#id_134674 2. https://community.cisco.com/t5/service-
      providers-knowledge-base/asr9000-xr- using-task-groups-and-understanding-priv-
      levels-and/ta-p/3109596
    impact: >
      Default task-groups The following task-groups are predefined in IOS-XR root-
      system: Root system users root-lr: Root logical router users netadmin: Network
      administrators sysadmin: System administrators operator: Operators performing
      day-to-day activities cisco-support: highest level of privilege allowing
      lowest level access
