  - rule_id: cisco_ios_xr.cis.1.configure_a_password_policy
    title: "Configure a Password Policy"
    severity: medium
    category: networking
    tech_type: cisco_ios_xr
    automation_type: manual
    cis_benchmark: "CIS_CISCO_IOS_XR 7.x_v1.0.1"
    cis_version: "7.x_v1.0.1"
    cis_control: "1.8.3"
    cis_section: "1"
    profile_applicability: "Level 2"
    description: >
      Because passwords are stored only in revertible type 7 format, please consider
      not applying this recommendation and using secrets instead. This only applies
      if you absolutely need to configure 'password' instead of 'secret' for local
      users. Cisco IOS XR Software introduces advanced AAA password strengthening
      policy and security mechanism to store, retrieve and provide rules or policy
      to specify user passwords. This password policy is applicable only for local
      users, and not for remote users whose profile information are stored in a
      third party AAA server.
    rationale: >
      Strong passwords are important because they help prevent unauthorized access
      to devices and the network. Even if a central authentication source is used,
      if that service is not available the fall-back authentication is often to
      local credentials. At least one local administrator user must be present on
      the device. Impact: This policy is not applicable to secrets of the user. If
      both secret and password are configured for a user, then secret takes
      precedence, and password security policy does not have any effect on
      authentication or change of password for such users.
    audit_procedure: >
      IOSXR#sh run aaa aaa password-policy {password_policy} lifetime months 3 max-
      length 25 min-length 18 lockout-time days 1 min-char-change 5 authen-max-
      attempts 3 ! username {local_username} group root-lr group cisco-support
      secret {local_password} The policy is only in effect when it is also applied
      under a 'username' section.
    remediation: >
      Use the following configuration to enable a password policy. Choose values
      according to established guidelines of your organization. IOSXR# configure
      IOSXR(config)#aaa password-policy {password_policy} IOSXR(config-aaa)#min-
      length 8 IOSXR(config-aaa)#max-length 25 IOSXR(config-aaa)#lifetime months 3
      IOSXR(config-aaa)#min-char-change 5 IOSXR(config-aaa)#authen-max-attempts 3
      IOSXR(config-aaa)#lockout-time days 1 IOSXR(config)#username {local_username}
      password-policy {password_policy} password 0 {local_password}
      IOSXR(config)#commit Default Value: By default no password policy is enabled.
      References: 1.
      https://www.cisco.com/c/en/us/td/docs/routers/asr9000/software/asr9k-r6-
      5/system-security/configuration/guide/b-system-security-cg-asr9000-65x/b-
      system-security-cg-asr9000-71x_chapter_010.html
    references: >
      1. https://www.cisco.com/c/en/us/td/docs/routers/asr9000/software/asr9k-r6-
      5/system-security/configuration/guide/b-system-security-cg-asr9000-65x/b-
      system-security-cg-asr9000-71x_chapter_010.html
    impact: >
      This policy is not applicable to secrets of the user. If both secret and
      password are configured for a user, then secret takes precedence, and password
      security policy does not have any effect on authentication or change of
      password for such users.
