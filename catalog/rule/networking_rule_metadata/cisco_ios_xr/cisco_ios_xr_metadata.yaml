  - rule_id: cisco_ios_xr.cis.1.disable_tcp_and_udp_small_servers
    title: "Disable TCP and UDP small servers"
    severity: high
    category: networking
    tech_type: cisco_ios_xr
    automation_type: manual
    cis_benchmark: "CIS_CISCO_IOS_XR 7.x_v1.0.1"
    cis_version: "7.x_v1.0.1"
    cis_control: "1.3.2"
    cis_section: "1"
    profile_applicability: "Level 1"
    description: >
      TCP and UDP small servers are servers (daemons, in Unix parlance) that run in
      the router which are useful for diagnostics.
    rationale: >
      TCP Small Servers The TCP small servers are: Echo: Echoes back whatever you
      type through the telnet x.x.x.x echo command. Chargen: Generates a stream of
      ASCII data. Use the telnet x.x.x.x chargen command. Discard: Throws away
      whatever you type. Use the telnet x.x.x.x discard command. Daytime: Returns
      system date and time, if it is correct. It is correct if you run Network Time
      Protocol (NTP), or have set the date and time manually from the exec level.
      Use the telnet x.x.x.x daytime command. Replace x.x.x.x with the IP address of
      your router. Most routers inside Cisco run the small servers. UDP Small
      Servers The UDP small servers are: Echo: Echoes the payload of the datagram
      you send. Discard: Silently pitches the datagram you send. Chargen: Pitches
      the datagram you send, and responds with a 72-character string of ASCII
      characters terminated with a CR+LF. Notes: Almost all Unix boxes support the
      small servers listed above. The router also offers finger service and async
      line bootp service, which you can independently turn off with the
      configuration global commands no service finger and no ip bootp server,
      respectively. Impact: TBC
    audit_procedure: >
      Perform the following to determine if the feature is enabled: Verify a command
      string result returns IOSXR#show run | incl small service ipv4 tcp-small-
      servers max-servers 10 service ipv4 udp-small-servers max-servers 10
    remediation: >
      Disable TCp and UDP small services IOSXR(config)#no service ipv4 tcp-small-
      servers max-servers 10 IOSXR(config)#no service ipv4 udp-small-servers max-
      servers 10 IOSXR(config)#commit Default Value: Disabled by default.
      References: 1.
      https://www.cisco.com/c/en/us/td/docs/routers/xr12000/software/xr12k_r4-
      3/addr_serv/command/reference/b_ipaddr_cr43xr12k/b_ipaddr_cr42xr12k_chapt
      er_01010.html
    references: >
