  - rule_id: cisco_ios_xr.cis.1.disable_telnet_access
    title: "Disable Telnet Access"
    severity: high
    category: networking
    tech_type: cisco_ios_xr
    automation_type: automated
    cis_benchmark: "CIS_CISCO_IOS_XR 7.x_v1.0.1"
    cis_version: "7.x_v1.0.1"
    cis_control: "1.6.1"
    cis_section: "1"
    profile_applicability: "Level 1"
    description: >
      Telnet is a clear-text administrative protocol. As such, both the credentials
      used to establish the session and all commands and data within the session are
      readable in clear-text, so can be intercepted or modified by an attacker
    rationale: >
      Telnet doesn't natively support encryption or message integrity checks. Hence,
      any transmitted information (including credentials) is exposed to an attacker
      that gains access to the communication. Furthermore communication could be
      intercepted and modified by a man-in-the-middle attacker. Impact: Ensure you
      have already configured an alternative management access to the device before
      disabling telnet access. Otherwise you might be locked out of the device with
      no management access.
    audit_procedure: >
      Check the vty pools in use: show run formal | i vty-pool vty-pool default 0 4
      line-template default line-template is 'default', multiple vty-pools might
      exist, check each. check the corresponding line template: show run formal | i
      'line default' line default exec-timeout ... ... line default transport input
      ssh Check if line default transport input ssh or line default transport input
      none is present.
    remediation: >
      It's recommended to restrict VTYs to SSH for management access and not allow
      this device to SSH to other devices: vty-pool default 0 4 line-template
      default line default transport input ssh transport output none Default Value:
      By default both telnet and ssh access are enabled.
    references: >
      
    impact: >
      Ensure you have already configured an alternative management access to the
      device before disabling telnet access. Otherwise you might be locked out of
      the device with no management access.
    compliance_mappings:
      cis:
        - "CIS_CISCO_IOS_XR_7_x_v1_0_1_1_6_1"
      nist_800_53: []
      soc2: []
      pci_dss: []
