  - rule_id: cisco_ios_xr.cis.1.restrict_vty_access
    title: "Restrict VTY Access"
    severity: high
    category: networking
    tech_type: cisco_ios_xr
    automation_type: manual
    cis_benchmark: "CIS_CISCO_IOS_XR 7.x_v1.0.1"
    cis_version: "7.x_v1.0.1"
    cis_control: "1.6.2"
    cis_section: "1"
    profile_applicability: "Level 1"
    description: >
      VTY access can be restricted via access-lists to limit from which the source
      addresses a management session to the device can be established.
    rationale: >
      VTY ACLs control what addresses may attempt to log in to the router.
      Configuring VTY lines to use an ACL, restricts the sources where a user can
      manage the device. You should limit the specific host(s) and or network(s)
      authorized to connect to and configure the device, via an approved protocol,
      to those individuals or systems authorized to administer the device. For
      example, you could limit access to specific hosts, so that only network
      managers can configure the devices only by using specific network management
      workstations. Make sure you configure all VTY lines to use the same ACL.
      Impact: You can potentially lock yourself out, we recommend using commit
      confirmed when implementing the changes. Using VTY lines without access-lists
      opens up the attack surface because any source IP can establish a connection
      to the device. This could be exploited by an attacker to create DoS condition.
    audit_procedure: >
      Check the vty pools in use: show run formal | i vty-pool vty-pool default 0 4
      line-template default line-template is 'default', multiple vty-pools might
      exist, check each. check the corresponding line template: show run formal | i
      'line default access' line default access-class ingress {ssh_access-list}
      Check if ACLs are applied to SSH server: show run formal | i 'ssh.*access' ssh
      server vrf default ipv4 access-list {ssh_access-list} Audit fails if access-
      is not in any of the outputs.
    remediation: >
      Define ACLs which match the allowed sources. To restrict access of incoming or
      outgoing connections over IPv4 and IPv6, the IPv4 access list and IPv6 access
      list must share the same name: ipv4 access-list ACL-VTY-IN 10 permit ipv4
      192.168.1.0/24 any 1000 deny ipv4 any any log icmp-off ipv6 access-list ACL-
      VTY-IN 10 permit ipv6 2001:db8::/64 any 1000 deny any any log icmp-off Apply
      the ACL on the line template: vty-pool default 0 4 line-template default line
      default access-class ingress ACL-VTY-IN Alternatively you can implement
      restrictions on the SSH Server which allows both IPv4 and IPv6. Note that SSH
      could be also used for Netconf, so the ACL might need to include additional
      sources which do not apply for VTY access only. ssh server ipv4 access-list
      ACL-VTY-IN ipv6 access-list ACL-VTY-IN Default Value: No access restrictions
      are in place by default.
    references: >
      
    impact: >
      You can potentially lock yourself out, we recommend using commit confirmed
      when implementing the changes. Using VTY lines without access-lists opens up
      the attack surface because any source IP can establish a connection to the
      device. This could be exploited by an attacker to create DoS condition.
    compliance_mappings:
      cis:
        - "CIS_CISCO_IOS_XR_7_x_v1_0_1_1_6_2"
      nist_800_53: []
      soc2: []
      pci_dss: []
