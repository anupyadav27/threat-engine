  - rule_id: cisco_ios_xr.cis.1.set_seconds_for_ssh_timeout_for_60_seconds_or_less
    title: "Set 'seconds' for 'ssh timeout' for 60 seconds or less"
    severity: high
    category: networking
    tech_type: cisco_ios_xr
    automation_type: automated
    cis_benchmark: "CIS_CISCO_IOS_XR 7.x_v1.0.1"
    cis_version: "7.x_v1.0.1"
    cis_control: "1.2.3"
    cis_section: "1"
    profile_applicability: "Level 1"
    description: >
      The time interval that the router waits for the SSH client to respond before
      disconnecting an uncompleted login attempt.
    rationale: >
      This reduces the risk of an administrator leaving an authenticated session
      logged in for an extended period of time. CIS Recommends 60 seconds or less.
      Impact: Organizations should implement a security policy requiring minimum
      timeout settings for all network administrators and enforce the policy through
      the 'ip ssh timeout' command.
    audit_procedure: >
      Perform the following to determine if the SSH timeout is configured: Verify
      the timeout is configured properly. IOSXR#sh running-config ssh timeout Wed
      Jul 19 18:13:59.732 UTC ssh timeout 53
    remediation: >
      Configure the SSH timeout IOSXR(config)#ssh timeout {ssh_timeout} Default
      Value: SSH in not enabled by default. When SSH is enabled and no value is
      configured, the default value of 30 seconds is used. The range is from 5 to
      120. References: 1.
      https://www.cisco.com/c/en/us/td/docs/routers/crs/software/crs_r6-
      1/security/configuration/guide/b-syssec-cg-crs-61x.html Additional
      Information: This cannot exceed 120 seconds.
    references: >
      1. https://www.cisco.com/c/en/us/td/docs/routers/crs/software/crs_r6-
      1/security/configuration/guide/b-syssec-cg-crs-61x.html Additional
      Information: This cannot exceed 120 seconds.
    impact: >
      Organizations should implement a security policy requiring minimum timeout
      settings for all network administrators and enforce the policy through the 'ip
      ssh timeout' command.
