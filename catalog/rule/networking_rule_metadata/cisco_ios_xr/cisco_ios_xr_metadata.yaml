  - rule_id: cisco_ios_xr.cis.2.set_the_ntp_trusted_key
    title: "Set the 'ntp trusted-key'"
    severity: medium
    category: networking
    tech_type: cisco_ios_xr
    automation_type: manual
    cis_benchmark: "CIS_CISCO_IOS_XR 7.x_v1.0.1"
    cis_version: "7.x_v1.0.1"
    cis_control: "2.2.1.3"
    cis_section: "2"
    profile_applicability: "Level 2"
    description: >
      Ensure you authenticate the identity of a system to which Network Time
      Protocol (NTP) will synchronize
    rationale: >
      This authentication function provides protection against accidentally
      synchronizing the system to another system that is not trusted, because the
      other system must know the correct authentication key. Impact: Organizations
      should establish three Network Time Protocol (NTP) hosts to set consistent
      time across the enterprise. Enabling the 'ntp trusted-key' command enforces
      encrypted authentication between NTP hosts.
    audit_procedure: >
      From the command prompt, execute the following commands:
      RP/0/RP0/CPU0:IOSXR#sh run ntp Wed Jul 19 22:08:20.188 UTC ntp authentication-
      key 1 md5 encrypted 130404160A1F authenticate trusted-key 1 server 1.1.1.1 key
      1 The above command should return any NTP server(s) configured with encryption
      keys. This value should be the same as the total number of servers configured
      as tested in.
    remediation: >
      Configure the NTP trusted key using the following command IOSXR(config)#ntp
      trusted-key {ntp_key_id} Default Value: Authentication of the identity of the
      system is disabled. References: 1. http://www.cisco.com/en/US/docs/ios-
      xml/ios/bsm/command/bsm-cr- n1.html#GUID-89CA798D-0F12-4AE8-B382-DE10CBD261DB
    references: >
      1. http://www.cisco.com/en/US/docs/ios-xml/ios/bsm/command/bsm-cr-
      n1.html#GUID-89CA798D-0F12-4AE8-B382-DE10CBD261DB
    impact: >
      Organizations should establish three Network Time Protocol (NTP) hosts to set
      consistent time across the enterprise. Enabling the 'ntp trusted-key' command
      enforces encrypted authentication between NTP hosts.
    compliance_mappings:
      cis:
        - "CIS_CISCO_IOS_XR_7_x_v1_0_1_2_2_1_3"
      nist_800_53: []
      soc2: []
