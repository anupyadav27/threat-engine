    metadata_source: generated
    generated_by: generate_tech_rules

  - rule_id: cisco_ios_xr.cis.1.exec_timeout_for_console_sessions_is_set
    title: "Ensure Exec Timeout for Console Sessions is set"
    severity: high
    category: networking
    tech_type: cisco_ios_xr
    automation_type: automated
    cis_benchmark: "CIS_CISCO_IOS_XR 7.x_v1.0.1"
    cis_version: "7.x_v1.0.1"
    cis_control: "1.6.3"
    cis_section: "1"
    profile_applicability: "Level 1"
    description: >
      Verify device is configured to automatically disconnect console sessions after
      a defined maximum session time, set in minutes. Note there are 3 different
      timeout values: • absolute-timeout: terminate the connection after the
      specified time has elapsed, regardless of whether the connection is being used
      at the time of termination. • exec-timeout: If no user input is detected
      during the interval, the EXEC facility returns the terminal to the idle state
      and disconnects the incoming session • session-timeout: Traditionally the VTY
      can be used for other features than EXEC (CLI), e.g. terminal server, PAD,
      async lines etc. The session-timeout applies to any sessions running
      to/through the router on VTY. Use the session-timeout command to set the
      interval that the Cisco IOS XR software waits for traffic before closing the
      connection to a remote device and returning the terminal to an idle state. For
      management access we need to configure the exec-timeout.
    rationale: >
      This prevents unauthorized users from misusing abandoned sessions. For
      example, if the network administrator disconnects leaving a console session
      open, that session will remain open (in the same state and privilege level)
      for the next person who connects a console cable to the device. A shorter
      timeout is usually desired, but this can be extended for longer-running
      operations such as debug sessions or software upgrades. Impact: 10 minutes is
      the default exec-timeout for many Cisco Network Operating systems. You should
      determine the best value for your organization and your work habits.
    audit_procedure: >
      Check if the exec timeout on the console is configured: show run formal | i
      'console exec' line console exec-timeout 10 0 Audit fails if value is not in
      accordance with your organization standards. If not configured, the default
      value of 10 minutes applies.
    remediation: >
      vty-pool default 0 4 line-template default line default exec-timeout 10 0
      Default Value: When nothing is configured, the default is 10 minutes.
      References: 1.
      https://www.cisco.com/en/US/docs/ios_xr_sw/iosxr_r3.7/system_management/co
      mmand/reference/yr37term.pdf
    references: >
      1. https://www.cisco.com/en/US/docs/ios_xr_sw/iosxr_r3.7/system_management/co
      mmand/reference/yr37term.pdf
    impact: >
      10 minutes is the default exec-timeout for many Cisco Network Operating
      systems. You should determine the best value for your organization and your
      work habits.
    compliance_mappings:
      cis:
        - "CIS_CISCO_IOS_XR_7_x_v1_0_1_1_6_3"
      nist_800_53: []
      soc2: []
      pci_dss: []
