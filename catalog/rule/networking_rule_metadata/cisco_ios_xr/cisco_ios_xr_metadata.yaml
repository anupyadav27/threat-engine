  - rule_id: cisco_ios_xr.cis.1.post_authentication_banner
    title: "Post-authentication Banner"
    severity: high
    category: networking
    tech_type: cisco_ios_xr
    automation_type: automated
    cis_benchmark: "CIS_CISCO_IOS_XR 7.x_v1.0.1"
    cis_version: "7.x_v1.0.1"
    cis_control: "1.7.2"
    cis_section: "1"
    profile_applicability: "Level 1"
    description: >
      A post-authentication banner is displayed to the user after a successful
      login. It can also serve as a legal notice to authorized users of the
      equipment to notify them of any logging that may be configured. This banner is
      not appropriate to notify unauthorized users of any penalties to accessing the
      device, because after successful login corresponding laws might have already
      been violated. A post-authentication banner can often also hold asset-specific
      information, such as: • The primary technical contacts for the equipment •
      Location or environment information - for instance the street address or rack
      number or production / test / lab environment • The purchase date • The asset
      tag information for the device • Any upstream circuit numbers • Carrier or ISP
      support phone numbers • Any other asset-specific information that may be
      important to the organization
    rationale: >
      Post-authentication banners can be used to reduce the risk of human error. For
      example by highlighting the current environment (Production or Lab). Impact:
      Organizations provide appropriate notice(s) and warning(s) to persons
      accessing their networks by using a 'banner-text'.
    audit_procedure: >
      Show the running configuration with a 'b' filter to 'begin' the listing at the
      found string IOSXR#show run banner If the command does not return a result,
      the banner is not enabled.
