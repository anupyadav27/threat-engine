  - rule_id: cisco_ios_xr.cis.1.set_username_secret_for_all_local_users
    title: "Set username secret for all local users"
    severity: high
    category: networking
    tech_type: cisco_ios_xr
    automation_type: manual
    cis_benchmark: "CIS_CISCO_IOS_XR 7.x_v1.0.1"
    cis_version: "7.x_v1.0.1"
    cis_control: "1.8.2"
    cis_section: "1"
    profile_applicability: "Level 1"
    description: >
      A root-system user with a normal password will not be authenticated because
      the normal password is two-way encrypted and poses a security risk because the
      password information is stored in the flash disk, which can be easily
      decrypted. Secrets are one- way encrypted and cannot be easily reverted
      without brute-forcing. If both secret and password are configured for a user,
      then secret takes precedence, and password security policy does not have any
      effect on authentication or change of password for such users.
    rationale: >
      Secrets use a one-way cryptographic hash. Impact: Typically the username and
      secret are defined during initial setup. Make sure to use strong passwords or
      update it later accordingly.
    audit_procedure: >
      The following command is used to show all local users: IOSXR# show run
      username username {local_username} group root-lr group cisco-support secret
      {local_password}
    remediation: >
      IOSXR# configure IOSXR(config)#username {local_username} IOSXR(config)#secret
      {local_password} commit Default Value: At least one user must be defined
      during initial setup via console. References: 1.
      https://www.cisco.com/c/en/us/td/docs/routers/asr9000/software/asr9k-r6-
      5/system-security/configuration/guide/b-system-security-cg-asr9000-65x/b-
      system-security-cg-asr9000-71x_chapter_010.html#concept_js2_ll3_jmb
    references: >
      1. https://www.cisco.com/c/en/us/td/docs/routers/asr9000/software/asr9k-r6-
      5/system-security/configuration/guide/b-system-security-cg-asr9000-65x/b-
      system-security-cg-asr9000-71x_chapter_010.html#concept_js2_ll3_jmb
    impact: >
      Typically the username and secret are defined during initial setup. Make sure
      to use strong passwords or update it later accordingly.
