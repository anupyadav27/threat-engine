  - rule_id: cisco_ios_xr.cis.1.management_plane_protection
    title: "Management plane protection"
    severity: medium
    category: networking
    tech_type: cisco_ios_xr
    automation_type: automated
    cis_benchmark: "CIS_CISCO_IOS_XR 7.x_v1.0.1"
    cis_version: "7.x_v1.0.1"
    cis_control: "1.9"
    cis_section: "1"
    profile_applicability: "Level 2"
    description: >
      The Management Plane Protection (MPP) feature provides the capability to
      restrict the interfaces on which network management packets are allowed to
      enter a device. The MPP feature allows a network operator to designate one or
      more router interfaces as management interfaces. The MPP protection feature,
      as well as all the management protocols under MPP, are disabled by default.
      When you configure an interface as either out-of-band or inband, it
      automatically enables MPP. Consequently, this enablement extends to all the
      protocols under MPP. If MPP is disabled and a protocol is activated, all
      interfaces can pass traffic. When MPP is enabled with an activated protocol,
      the only default management interfaces allowing management traffic are the
      route processor (RP) and standby route processor (SRP) Ethernet interfaces.
      You must manually configure any other interface for which you want to enable
      MPP as a management interface.
    rationale: >
      This is part of the MPP setup. Impact: The following restrictions are listed
      for implementing Management Plane Protection (MPP): Currently, MPP does not
      keep track of the denied or dropped protocol requests. MPP configuration does
      not enable the protocol services. MPP is responsible only for making the
      services available on different interfaces. The protocols are enabled
      explicitly. Management requests that are received on inband interfaces are not
      necessarily acknowledged there. Both Route Processor (RP) and distributed
      route processor (DRP) Ethernet interfaces are by default out-of-band
      interfaces and can be configured under MPP. The changes made for the MPP
      configuration do not affect the active sessions that are established before
      the changes. Currently, MPP controls only the incoming management requests for
      protocols, such as TFTP, Telnet, Simple Network Management Protocol (SNMP),
      Secure Shell (SSH), XML , HTTP and Netconf. MPP does not support MIB.
    audit_procedure: >
      Verify the appropriate management plane protection configuration. IOSXR#sh run
      control-plane Wed Jul 19 23:25:11.297 UTC control-plane management-plane
      inband interface Loopback1 allow SSH peer address ipv4 1.1.1.1 ! ! ! out-of-
      band interface MgmtEth0/RP0/CPU0/0 allow SSH peer address ipv4 1.1.1.1
    remediation: >
      Configure the management plane so that only certain protocols connectced to
      certain interfaces can access this IOS-XR device. IOSXR(config)#control-plane
      IOSXR(config-ctrl)#management-plane IOSXR(config-mpp)#inband IOSXR(config-mpp-
      inband)#interface {interface} allow {protocol} peer address ipv4 {IP_address}
      IOSXR(config-mpp)#out-of-band IOSXR(config-mpp-outband)#interface {interface}
      allow {protocol} peer address ipv4 {IP_address} Default Value: Not set
      References: 1.
      https://www.cisco.com/c/en/us/td/docs/routers/crs/software/crs_r5-
      3/security/configuration/guide/b-syssec-cg53x-crs/b-syssec-cg53x-
      crs_chapter_0110.html 2 Control Plane The control plane covers monitoring,
      route table updates, and generally the dynamic operation of the router.
      Services, settings, and data streams that support and document the operation,
      traffic handling, and dynamic status of the router. Examples of control plane
      services include: logging (e.g. Syslog), routing protocols, status protocols
      like CDP and HSRP, network topology protocols like STP, and traffic security
      control protocols like IKE. Network control protocols like ICMP, NTP, ARP, and
      IGMP directed to or sent by the router itself also fall into this area. 2.1
      Routing protocols A routing protocol specifies how routers communicate with
      each other to distribute information that enables them to select routes
      between nodes on a computer network. Enable routing authentication so that
      they only accept updates from trusted systems. 2.1.1 EIGRP The Enhanced
      Interior Gateway Routing Protocol (EIGRP) is an enhanced version of IGRP
      developed by Cisco. EIGRP uses distance vector routing technology, which
      specifies that a router need not know all the router and link relationships
      for the entire network. Each router advertises destinations with a
      corresponding distance and upon receiving routes, adjusts the distance and
      propagates the information to neighboring routes.
    references: >
      1. https://www.cisco.com/c/en/us/td/docs/routers/crs/software/crs_r5-
      3/security/configuration/guide/b-syssec-cg53x-crs/b-syssec-cg53x-
      crs_chapter_0110.html 2 Control Plane The control plane covers monitoring,
      route table updates, and generally the dynamic operation of the router.
      Services, settings, and data streams that support and document the operation,
      traffic handling, and dynamic status of the router. Examples of control plane
      services include: logging (e.g. Syslog), routing protocols, status protocols
      like CDP and HSRP, network topology protocols like STP, and traffic security
      control protocols like IKE. Network control protocols like ICMP, NTP, ARP, and
      IGMP directed to or sent by the router itself also fall into this area. 2.1
      Routing protocols A routing protocol specifies how routers communicate with
      each other to distribute information that enables them to select routes
      between nodes on a computer network. Enable routing authentication so that
      they only accept updates from trusted systems. 2.1.1 EIGRP The Enhanced
      Interior Gateway Routing Protocol (EIGRP) is an enhanced version of IGRP
      developed by Cisco. EIGRP uses distance vector routing technology, which
      specifies that a router need not know all the router and link relationships
      for the entire network. Each router advertises destinations with a
      corresponding distance and upon receiving routes, adjusts the distance and
      propagates the information to neighboring routes.
    impact: >
      The following restrictions are listed for implementing Management Plane
      Protection (MPP): Currently, MPP does not keep track of the denied or dropped
      protocol requests. MPP configuration does not enable the protocol services.
      MPP is responsible only for making the services available on different
      interfaces. The protocols are enabled explicitly. Management requests that are
      received on inband interfaces are not necessarily acknowledged there. Both
      Route Processor (RP) and distributed route processor (DRP) Ethernet interfaces
      are by default out-of-band interfaces and can be configured under MPP. The
      changes made for the MPP configuration do not affect the active sessions that
      are established before the changes. Currently, MPP controls only the incoming
      management requests for protocols, such as TFTP, Telnet, Simple Network
      Management Protocol (SNMP), Secure Shell (SSH), XML , HTTP and Netconf. MPP
      does not support MIB.
