  - rule_id: cisco_ios_xr.cis.2.key_chains
    title: "Key chains"
    severity: medium
    category: networking
    tech_type: cisco_ios_xr
    automation_type: automated
    cis_benchmark: "CIS_CISCO_IOS_XR 7.x_v1.0.1"
    cis_version: "7.x_v1.0.1"
    cis_control: "2.1.6"
    cis_section: "2"
    profile_applicability: "Level 2"
    description: >
      Keychain management is a common method of authentication to configure shared
      secrets on all entities that exchange secrets such as keys, before
      establishing trust with each other. Routing protocols and network management
      applications on Cisco IOS XR software often use authentication to enhance
      security while communicating with peers.
    rationale: >
      The keychain by itself has no relevance; therefore, it must be used by an
      application that needs to communicate by using the keys (for authentication)
      with its peers. The keychain provides a secure mechanism to handle the keys
      and rollover based on the lifetime. Border Gateway Protocol (BGP), Open
      Shortest Path First (OSPF), and Intermediate System-to-Intermediate System
      (IS-IS) use the keychain to implement a hitless key rollover for
      authentication. BGP uses TCP authentication, which enables the authentication
      option and sends the Message Authentication Code (MAC) based on the
      cryptographic algorithm configured for the keychain. Impact: This allows the
      configuration of routing protocol authentication to be made earier.
    audit_procedure: >
      IOSXR#sh run key chain Wed Jul 19 21:02:23.744 UTC key chain CHAIN key 1 key-
      string password 1511021F0725 !
    remediation: >
      IOSXR(config)#key chain {key_chain_name} IOSXR(config-CHAIN)#key {key_id}
      IOSXR(config-CHAIN-1)#key-string {key_string} Default Value: By default no key
      strings are configured References: 1.
