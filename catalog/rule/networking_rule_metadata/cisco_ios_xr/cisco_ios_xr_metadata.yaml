  - rule_id: cisco_ios_xr.cis.1.configure_authorization
    title: "Configure Authorization"
    severity: medium
    category: networking
    tech_type: cisco_ios_xr
    automation_type: automated
    cis_benchmark: "CIS_CISCO_IOS_XR 7.x_v1.0.1"
    cis_version: "7.x_v1.0.1"
    cis_control: "1.1.3.1"
    cis_section: "1"
    profile_applicability: "Level 2"
    description: >
      Command authorization allows restricting specific users to specific command
      sets that they can use on the device. Command authorization is a complex
      endeavor and is very rarely implemented. Usually, the TACACS+ protocol is used
      with a central AAA server.
    rationale: >
      Command authorization allows the implementation of fine-grained role-based
      access control concepts. Impact: Prevent users from issuing certain commands.
    audit_procedure: >
      Check which line template is referenced by the vty-pools IOSXR#show run formal
      | i 'vty-pool' vty-pool default 0 4 line-template default Check the
      relationship between line template in use and the aaa list: IOSXR##show run
      formal | i 'authorization' line console authorization commands default line
      default authorization commands default Verify an authentication list is
      defined and optionally references the aaa group that was created in the
      prerequisites: IOSXR#show run formal | i 'aaa authorization' aaa authorization
      commands default group {tacacs_group} none
    remediation: >
      Currently CIS makes no recommendations how to implement command authorization.
      Roles and access-privileges should be defined in collaboration with your
      operations and security teams. Default Value: By default command authorization
      is not enabled. References: 1.
      https://www.cisco.com/c/en/us/td/docs/routers/asr9000/software/asr9k-r7-
      5/system-security/configuration/guide/b-system-security-cg-asr9000-
      75x/configuring-aaa-services.html Additional Information: Commands
      authorization—Applies to the EXEC mode mode commands a user issues. Command
      authorization attempts authorization for all EXEC mode mode commands. Note
      “Command” authorization is distinct from “task-based” authorization, which is
      based on the task profile established during authentication. EXEC mode
      authorization—Applies authorization for starting EXEC mode session. So either
      a user is allowed to start an 'exec' session (usually this is equivalent to
      opening a vty line) or not. The Cisco IOS XR software supports the following
      methods for authorization: • none : The router does not request authorization
      information; authorization is not performed over this line or interface. •
      local : Uses local database for authorization; Authorizes any command if user
      is authenticated locally. • group [radius|tacacs+] : use all configured radius
      or tacacs servers 1.1.4 Accounting The AAA accounting feature allows the
      services that users are accessing and the amount of network resources that
      users are consuming to be tracked. When AAA accounting is enabled, the network
      access server reports user activity to the TACACS+ or RADIUS security server
      (depending on which security method is implemented) in the form of accounting
      records. Each accounting record contains accounting attribute-value (AV) pairs
      and is stored on the security server. This data can then be analyzed for
      network management, client billing, and auditing.
    references: >
      1. https://www.cisco.com/c/en/us/td/docs/routers/asr9000/software/asr9k-r7-
      5/system-security/configuration/guide/b-system-security-cg-asr9000-
      75x/configuring-aaa-services.html Additional Information: Commands
