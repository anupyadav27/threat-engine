      login occurs. This banner is useful for sending messages that affect all users
      (such as impending system shutdowns). This banner can also be used to notify
      unauthorized users of any penalties to accessing the device, or any logging
      that may be configured.
    rationale: >
      Network banners are electronic messages that provide notice of legal rights to
      users of computer networks. From a legal standpoint, banners have following
      primary functions. • Banners may be used to generate consent to real-time
      monitoring under ECPA Title III. • Banners may be used to generate consent to
      the retrieval of stored files and records pursuant to ECPA. • in the case of
      government networks, banners may eliminate any Fourth Amendment 'reasonable
      expectation of privacy' that government employees or other users might
      otherwise retain in their use of the government's network under O'Connor v.
      Ortega, 480 U.S. 709 (1987). • In the case of a non-government network,
      banners may establish a system administrator's 'common authority' to consent
      to a law enforcement search pursuant to United States v. Matlock, 415 U.S. 164
      (1974).' (US Department of Justice APPENDIX A: Sample Network Banner Language)
      In your country different laws might apply. Please consult with your corporate
      legal team to assess the exact legal context and rules for banners. Impact:
      Organizations provide appropriate legal notice(s) and warning(s) to persons
      accessing their networks by using a 'banner-text'.
    audit_procedure: >
      Show the running configuration banners: IOSXR#show run banner If the command
      does not return a result, the banner is not enabled.
    remediation: >
      Configure a login banner as shown below. The delimiter character shown is a
      '^', but any character can serve as a delimiter. IOSXR(config)# banner login ^
      {login_banner} ^ Default Value: No login or motd banner is set by default.
      Additional Information: On IOS XR the sequence of banners is as follows (for
      SSH login, might differ for telnet): 1. motd banner (shown before
      authentication) 2. login banner (shown after motd, before authentication) 3.
      exec banner (shown after successful authentication) We recommend using the
      'login' banner (for consistency with IOS XE). But motd banner can also be used
      instead.
