  - rule_id: cisco_ios_xr.cis.1.set_ip_address_for_logging_host
    title: "Set IP address for 'logging host'"
    severity: high
    category: networking
    tech_type: cisco_ios_xr
    automation_type: automated
    cis_benchmark: "CIS_CISCO_IOS_XR 7.x_v1.0.1"
