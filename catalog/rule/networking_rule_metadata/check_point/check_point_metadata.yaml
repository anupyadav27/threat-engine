      rules in the Firewall Rule Base. Other than the rules defined by the
      administrator, The Check Point Security Gateway also creates Implied Rules,
      which are defined in the Firewall Global Properties. The Check Point Security
      Gateway places the implied rules first, last, or before last in the Firewall
      Rule Base. The administrator can decide whether or not to log implied rules. •
      First > The Implicit rule will be placed before the explicit rules. • Last >
      The Implicit rule will be placed after the explicit rules. • Before Last > The
      Implicit rule will be placed before the last explicit rule.
    audit_procedure: >
      Verify Accept Accept Domain Name over TCP (Zone Transfer) under Global
      Properties is not enabled. SmartConsole > Gateways & Servers > select each
      Gateway > Firewall Veiry Accept Accept Domain Name over TCP (Zone Transfer) is
