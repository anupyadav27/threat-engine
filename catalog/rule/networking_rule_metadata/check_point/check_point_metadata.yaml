      is more relevant to those who are viewing it.
    rationale: >
      Having a correct time set on the device is important for two main reasons. The
      first reason is that digital certificates compare this time to the range
      defined by their Valid From and Valid To fields to define a specific validity
      period. The second reason is to have relevant time stamps when logging
      information. Whether you are sending messages to a Syslog server, sending
      messages to an SNMP monitoring station, or performing packet captures,
      timestamps have little usefulness if you cannot be certain of their accuracy.
    audit_procedure: >
