  - rule_id: check_point.cis.1.password_complexity_is_set_to_3
    title: "Ensure Password Complexity is set to 3"
    severity: high
    category: networking
    tech_type: check_point
    automation_type: automated
    cis_benchmark: "CIS_CHECK_POINT v1.1.0"
    cis_version: "v1.1.0"
    cis_control: "1.3"
    cis_section: "1"
    profile_applicability: "Level 1"
    description: >
      This checks all new passwords to ensure that they meet basic requirements for
      strong passwords. The required number of character types are: Upper case
      alphabetic (A-Z), Lower case alphabetic (a-z), Digits (0-9), Other (everything
      else). A value of '1' effectively disables this check. Changes to this setting
      do not affect existing passwords.
    rationale: >
      Password complexity recommendations are derived from the USGCB (United States
      Government Configuration Baseline), Common Weakness Enumeration, and
      benchmarks published by the CIS (Center for Internet Security). Password
      complexity adds entropy to a password, in comparison to a simple password of
      the same length. A complex password is more difficult to attack, either
      directly against administrative interfaces or cryptographically, against
      captured password hashes. However, making a password of greater length will
      generally have a greater impact in this regard, in comparison to making a
      shorter password more complex.
    audit_procedure: >
      Run the following command to verify the Password Complexity. CLI: Hostname>
      show password-controls complexity Password Complexity 3 GUI: Navigate to User
      Management > Password Policy > Password Complexity: Ensure '3 - Require three
      character types' checked.
    remediation: >
      Run the following command to set the password-controls complexity setting.
      CLI: Hostname>set password-controls complexity 3 16 | P a g e GUI: Navigate to
      User Management > Password Policy > Password Complexity: checked the '3 -
      Require three character types' setting. Default Value: 2
    references: >
      
    impact: >
      
    compliance_mappings:
      cis:
        - "CIS_CHECK_POINT_v1_1_0_1_3"
      nist_800_53: []
      soc2: []
      pci_dss: []
    source_unique_id: "cis_check_point_v1_1_0_1_3"
    metadata_source: generated
    generated_by: generate_tech_rules

  - rule_id: check_point.cis.1.check_for_password_reuse_is_selected_and_history
    title: "Ensure Check for Password Reuse is selected and History Length is set to 12 or more"
    severity: high
    category: networking
    tech_type: check_point
    automation_type: automated
    cis_benchmark: "CIS_CHECK_POINT v1.1.0"
    cis_version: "v1.1.0"
    cis_control: "1.4"
    cis_section: "1"
    profile_applicability: "Level 1"
    description: >
      Check for reuse of passwords. When a user's password is changed, the new
      password is checked against the recent passwords for the user. An identical
      password is not allowed. The number of passwords kept in the record is set by
      History length. Does not apply to SNMP passwords. Enables or disables password
      history checking and password history recording, for all users.
    rationale: >
      The longer a user uses the same password, the greater the chance that an
      attacker can determine the password through brute force attacks. Also, any
      accounts that may have been compromised will remain exploitable for as long as
      the password is left unchanged. If password changes are required but password
      reuse is not prevented, or if users continually reuse a small number of
      passwords, the effectiveness of a good password policy is greatly reduced.
      While current guidance emphasizes password length above frequent password
      changes, not enforcing password re-use guidance adds the temptation of using a
      small pool of passwords, which can make an attacker's job easier across an
      entire infrastructure.
    audit_procedure: >
      Run the following command to verify the Check for Password Reuse and History
      Length setting. CLI: Hostname> show password-controls history-checking
      Password History Checking on Hostname> show password-controls history-length
      Password History Length 12 GUI: Navigate to User Management > Password Policy
      > Password History: Ensure 'Check for Password Reuse' is checked. Navigate to
      User Management > Password Policy > Password History: Ensure 'History Length'
      is set to 12 or more. 18 | P a g e
    remediation: >
      Run the following command to set tie history-checking setting. CLI:
      Hostname>set password-controls history-checking on Hostname>set password-
      controls history-length 12 GUI: Navigate to User Management > Password Policy
      > Password History: checked the 'Check for Password Reuse' setting. Navigate
      to User Management > Password Policy > Password History: Set 'History Length'
      is set to 12 or more. Default Value: Selected
    references: >
      
    impact: >
      
    compliance_mappings:
      cis:
        - "CIS_CHECK_POINT_v1_1_0_1_4"
      nist_800_53: []
      soc2: []
      pci_dss: []
    source_unique_id: "cis_check_point_v1_1_0_1_4"
    metadata_source: generated
    generated_by: generate_tech_rules

  - rule_id: check_point.cis.1.password_expiration_is_set_to_90_days
    title: "Ensure Password Expiration is set to 90 days"
    severity: high
    category: networking
    tech_type: check_point
    automation_type: automated
    cis_benchmark: "CIS_CHECK_POINT v1.1.0"
    cis_version: "v1.1.0"
    cis_control: "1.5"
    cis_section: "1"
    profile_applicability: "Level 1"
    description: >
      The number of days for which a password is valid. After that time, the
      password expires. The count starts when the user changes their passwords.
      Users are required to change an expired password the next time they log in. If
      set to never, passwords do not expire. Does not apply to SNMP users.
    rationale: >
      The window of opportunity for an attacker to leverage compromised credentials
      or successfully compromise credentials via an online brute force attack is
      limited by the age of the password. Therefore, reducing the maximum age of a
      password also reduces an attacker's window of opportunity.
    audit_procedure: >
      Run the following command to verify the Password Expiration setting. CLI:
      Hostname> show password-controls password-expiration Password Expiration
      Lifetime 90 GUI: Navigate to User Management > Password Policy > Mandatory
      Password Changes: Password Expiration: Ensure 'Password expires after' is
      checked and set to 90 or less.
    remediation: >
      Run the following command to set the history-length setting. CLI: Hostname>set
      password-controls history-length 90 GUI: Navigate to User Management >
      Password Policy > Mandatory Password Changes: Password Expiration: Set
      'Password expires after' setting to 90 or less 20 | P a g e Default Value:
      Password never expire
    references: >
      
    impact: >
      
    compliance_mappings:
      cis:
        - "CIS_CHECK_POINT_v1_1_0_1_5"
      nist_800_53: []
      soc2: []
      pci_dss: []
    source_unique_id: "cis_check_point_v1_1_0_1_5"
    metadata_source: generated
    generated_by: generate_tech_rules

  - rule_id: check_point.cis.1.warn_users_before_password_expiration_is_set_to_7
    title: "Ensure Warn users before password expiration is set to 7 days"
    severity: high
    category: networking
    tech_type: check_point
    automation_type: automated
    cis_benchmark: "CIS_CHECK_POINT v1.1.0"
    cis_version: "v1.1.0"
    cis_control: "1.6"
    cis_section: "1"
    profile_applicability: "Level 1"
    description: >
      The number of days before the password expires that the user starts getting
      warned they will have to change it. A user that does not log in will not see
      the warning.
    rationale: >
      Providing an advance warning that a password will be expiring gives users time
      to think of a secure password. Users caught unaware may choose a simple
      password or write it down where it may be discovered.
    audit_procedure: >
      Run the following command to verify the warn users before Password Expiration
      x days setting. CLI: Hostname> show password-controls expiration-warning-days
      Password Expiration Warning Days 7 GUI: Navigate to User Management > Password
      Policy > Mandatory Password Changes Ensure 'Warn users before password
      expiration' is set to 7 days or less.
    remediation: >
      Run the following command to set the expiration-warning-days setting. CLI:
      Hostname>set password-controls expiration-warning-days 7 GUI: Navigate to User
      Management > Password Policy > Mandatory Password Changes Set 'Warn users
      before password expiration' is set to 7 days or less. 22 | P a g e Default
      Value: 7 days
