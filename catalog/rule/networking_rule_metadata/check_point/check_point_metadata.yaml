  - rule_id: check_point.cis.3.automatic_arp_configuration_nat_is_enabled
    title: "Ensure Automatic ARP Configuration NAT is enabled"
    severity: medium
    category: networking
    tech_type: check_point
    automation_type: automated
    cis_benchmark: "CIS_CHECK_POINT v1.1.0"
    cis_version: "v1.1.0"
    cis_control: "3.19"
    cis_section: "3"
    profile_applicability: "Level 2"
    description: >
      Proxy ARP is a mechanism that allows the configuration of a Gateway to respond
      to ARP requests on behalf of other hosts.
    rationale: >
      Automatic ARP configuration ensures that ARP requests for a translated (NATed)
      machine, network or address range are answered by the Check Point Security
      Gateway. This option removes the requirement for manual ARP configuration for
      automatic NAT rules (using the arp command in Unix or the local.arp file in
      Windows). The command fw ctl arp displays the ARP proxy table on Check Point
      Security Gateways that run on Windows. On Unix, use the arp -a command.
    audit_procedure: >
      Verify Automatic ARP Configuration NAT under Global Properties is enabled.
      SmartConsole > Gateways & Servers > select each Gateway > NAT - Network
      Address Translation Verify Automatic ARP Configuration NAT is checked.
    remediation: >
      Go to the following path and Configured the Automatic ARP Configuration NAT.
      SmartConsole > Gateways & Servers > select each Gateway > NAT - Network
      Address Translation Unchecked the Automatic ARP Configuration NAT
