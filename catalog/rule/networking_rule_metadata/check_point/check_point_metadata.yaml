  - rule_id: check_point.cis.3.allow_bi_directional_nat_is_enabled
    title: "Ensure Allow bi-directional NAT is enabled"
    severity: medium
    category: networking
    tech_type: check_point
    automation_type: automated
    cis_benchmark: "CIS_CHECK_POINT v1.1.0"
    cis_version: "v1.1.0"
    cis_control: "3.18"
    cis_section: "3"
    profile_applicability: "Level 2"
    description: >
      Allow bi-directional NAT applies to automatic NAT rules in the NAT Rule Base
      and allows two automatic NAT rules to match a connection. Without
      Bidirectional NAT, only one automatic NAT rule can match a connection.
    rationale: >
      When NAT is defined for a network object, an automatic NAT rule is generated
      which performs the required translation. If there are two such objects and one
      is the source of a connection and the other the destination, then without
      Bidirectional NAT, only one of these objects will be translated, because only
      one of the automatically generated NAT rules will be applied, and so a
      connection between the two objects will only be allowed in one direction. With
      Bidirectional NAT, both automatic NAT rules are applied, and both objects will
      be translated, so connections between the two objects will be allowed in both
      directions.
    audit_procedure: >
      Verify Allow bi-directional NAT under Global Properties is enabled.
      SmartConsole > Gateways & Servers > select each Gateway > NAT - Network
      Address Translation Verify Allow bi-directional NAT is checked.
    remediation: >
      Go to the following path and Configured the Allow bi-directional NAT.
      SmartConsole > Gateways & Servers > select each Gateway > NAT - Network
      Address Translation Unchecked the Allow bi-directional NAT 111 | P a g e
    references: >
      
    impact: >
      
