  - rule_id: check_point.cis.3.enable_the_firewall_stealth_rule
    title: "Enable the Firewall Stealth Rule"
    severity: medium
    category: networking
    tech_type: check_point
    automation_type: automated
    cis_benchmark: "CIS_CHECK_POINT v1.1.0"
    cis_version: "v1.1.0"
    cis_control: "3.1"
    cis_section: "3"
    profile_applicability: "Level 2"
    description: >
      Create a rule to drop Any Service from Any Source or Any VPN that attempts to
      connect to the gateway.
    rationale: >
      The stealth rule will limit access to the gateway to the control and service
      connections enabled as part of the design. As such, it is very important to
      enable access to the gateway as its role changes, for example, become a client
      VPN gateway. Another common example is enabling Client Authentication. If
      ports TCP 259 and 900 are not opened (or if you change the ports in the conf
      file), access will not work. Organizations with many Check Point gateways may
      want to document each gateway and the Check Point services it is intended and
      configured to accept.
    audit_procedure: >
      Login to the Management Server via SmartConsole and create or edit the stealth
      rule and make sure it is on top of all rules and only allowed sources and
