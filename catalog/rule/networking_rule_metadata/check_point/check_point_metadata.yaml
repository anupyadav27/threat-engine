  - rule_id: check_point.cis.2.snmp_version_is_set_to_v3_only
    title: "Ensure SNMP version is set to v3-Only"
    severity: high
    category: networking
    tech_type: check_point
    automation_type: automated
    cis_benchmark: "CIS_CHECK_POINT v1.1.0"
    cis_version: "v1.1.0"
    cis_control: "2.2.2"
    cis_section: "2"
    profile_applicability: "Level 1"
    description: >
      Sets the SNMP v3.
    rationale: >
      SNMP Version 3 provides security enhancements that are not available in SNMP
      Version 1 or SNMP Version 2c. SNMP Versions 1 and 2c transmit data between the
      SNMP server and SNMP agent in clear text. SNMP Version 3 adds authentication
      and privacy options to secure protocol operations. For configuration purposes,
      the authentication and privacy options are grouped together into security
      models. Security models apply to users and groups, and are divided into the
      following three types: •NoAuthPriv—No Authentication and No Privacy, which
      means that no security is applied to messages. •AuthNoPriv— Authentication but
      No Privacy, which means that messages are authenticated. •AuthPriv—
      Authentication and Privacy, which means that messages are authenticated and
      encrypted. It is recommended that packets should be authenticated and
      encrypted
    audit_procedure: >
      Run the following command to check whether the SNMP agent-version v3-only is
      configured CLI: Hostname> show snmp agent-version v3-Only GUI: Navigate to
      System Management > SNMP > SNMP General Settings Verify version is set to
      v3-Only.
    remediation: >
      Run the following command to configure the SNMP agent-version v3-only CLI:
      Hostname> set snmp agent-version v3-Only 58 | P a g e GUI: Navigate to System
      Management > SNMP > Select V3-Only in Version Default Value: Not Configured
    references: >
      
    impact: >
      
    compliance_mappings:
      cis:
        - "CIS_CHECK_POINT_v1_1_0_2_2_2"
      nist_800_53: []
      soc2: []
      pci_dss: []
    source_unique_id: "cis_check_point_v1_1_0_2_2_2"
