    cis_section: "1"
    profile_applicability: "Level 1"
    description: >
      A palindrome is a sequence of letters, numbers, or characters that can be read
      the same in each direction. racecar, bob, and noon are some of the famous
      examples of Palindrome.
    rationale: >
      The Palindrome words are high on wordlists which are used before any brute-
      force attacks, and it's simpler to crack using the password cracking tools.
    audit_procedure: >
      Run the following command to verify the Disallow Palindrome setting. CLI:
      Hostname> show password-controls palindrome-check Password Palindrome Check on
      GUI: Navigate to User Management > Password Policy Ensure Disallow Palindrome
      setting is checked.
    remediation: >
      Run the following command to set the palindrome-check setting. CLI:
      Hostname>set password-controls palindrome-check on GUI: Navigate to User
      Management > Password Policy Ensure 'Disallow Palindrome' is checked. Default
      Value: Selected 14 | P a g e
