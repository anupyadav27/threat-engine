  - rule_id: check_point.cis.3.accept_icmp_requests_is_not_enabled
    title: "Ensure Accept ICMP Requests is not enabled"
    severity: medium
    category: networking
    tech_type: check_point
    automation_type: automated
    cis_benchmark: "CIS_CHECK_POINT v1.1.0"
    cis_version: "v1.1.0"
    cis_control: "3.17"
    cis_section: "3"
    profile_applicability: "Level 2"
    description: >
      The 'Accept ICMP requests' is a global property setting which is used to allow
      the ICMP requests from any location. ICMP is used to send control messages
      (for example, ping, destination unreachable, source quench, route change) to
      other systems. These rules are considered as rule zero which are executed
      before any user-defined rules.
    rationale: >
      If this rule is enabled, it allows the echo requests, timestamp requests,
      information requests, and mask requests. This can be used by a malicious user
      to create a denial of service condition by flooding the network with broadcast
      echo requests and revealing mask request information. The security policy is
      made up of rules in the Firewall Rule Base. Other than the rules defined by
      the administrator, The Check Point Security Gateway also creates Implied
      Rules, which are defined in the Firewall Global Properties. The Check Point
      Security Gateway places the implied rules first, last, or before last in the
      Firewall Rule Base. The administrator can decide whether or not to log implied
      rules. • First > The Implicit rule will be placed before the explicit rules. •
      Last > The Implicit rule will be placed after the explicit rules. • Before
      Last > The Implicit rule will be placed before the last explicit rule.
    audit_procedure: >
      Verify Accept Accept ICMP Requests under Global Properties is not enabled.
      SmartConsole > Gateways & Servers > select each Gateway > Firewall Verify
      Accept Accept ICMP Requests is unchecked.
    remediation: >
      Go to the following path and Configured the Accept Accept ICMP Requests.
      SmartConsole > Gateways & Servers > select each Gateway > Firewall Unchecked
      the Accept Accept ICMP Requests 110 | P a g e
