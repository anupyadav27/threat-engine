  - rule_id: check_point.cis.2.client_authentication_is_secured
    title: "Ensure Client Authentication is secured."
    severity: high
    category: networking
    tech_type: check_point
    automation_type: automated
    cis_benchmark: "CIS_CHECK_POINT v1.1.0"
    cis_version: "v1.1.0"
    cis_control: "2.5.3"
    cis_section: "2"
    profile_applicability: "Level 1"
    description: >
      Client Authentication allows a user and device to authenticate to the firewall
      and inherit pre-configured firewall rules for a set amount of time. By
      default, these connections are unencrypted yet can travel over unsecured
      networks. It is recommended that all Client Authentication connections be made
      using the HTTPS configuration. This both uniquely identifies the gateway and
      keeps the authentication credentials from being copied when going over the
      network.
    rationale: >
      The Client Authentication is used to authenticate a user or device to the
      firewall and by default, it works on HTTP port 900 and telnet port 259. The
      setting is stored in $FWDIR/conf/fwauthd.conf file. HTTP and telnet both are
      non-secure plaintext protocol and there is a number of published
      vulnerabilities, including the possibility of information disclosure and
      unauthorized access to the host system, which could permit sensitive data to
      be compromised. HTTPS configuration for all Client Authentication connections
      helps in identifying the gateway and keeps the authentication credentials from
      being copied when passes through the network.
    audit_procedure: >
      Verify telnet is disabled for Client Authentication. Verify following lines
      are commented out or not present in $FWDIR/conf/fwauthd.conf file. 259 fwssd
      in.aclientd wait 259 Verify Secure HTTP is used for Client Authentication.
      Verify following lines have SSL setting enabled in $FWDIR/conf/fwauthd.conf.
      900 fwssd in.ahclientd wait 900 ssl:defaultCert 77 | P a g e
    remediation: >
      Comment out or remove the following line from $FWDIR/conf/fwauthd.conf file,
      or disable the telnet service listening on port 259 by default, write a rule
      that prevents connections to the daemon in the rulebase. #259 fwssd
      in.aclientd wait 259 Edit the following line to include SSL setting in
      $FWDIR/conf/fwauthd.conf file. 900 fwssd in.ahclientd wait 900 ssl:defaultCert
      Default Value: 259 fwssd in.aclientd wait 259 900 fwssd in.ahclientd wait 900
    references: >
      
    impact: >
      
    compliance_mappings:
      cis:
        - "CIS_CHECK_POINT_v1_1_0_2_5_3"
      nist_800_53: []
      soc2: []
      pci_dss: []
    source_unique_id: "cis_check_point_v1_1_0_2_5_3"
    metadata_source: generated
    generated_by: generate_tech_rules

