  - rule_id: check_point.cis.1.allow_access_again_after_time_is_set_to_300_or
    title: "Ensure Allow access again after time is set to 300 or more seconds"
    severity: high
    category: networking
    tech_type: check_point
    automation_type: automated
    cis_benchmark: "CIS_CHECK_POINT v1.1.0"
    cis_version: "v1.1.0"
    cis_control: "1.13"
    cis_section: "1"
    profile_applicability: "Level 1"
    description: >
      Allow access again after a user has been locked out (due to failed login
      attempts). The user is allowed access after the configured time if there have
      been no login attempts during that time). This setting only takes effect if
      Deny access after failed login attempts is selected.
    rationale: >
      Users can accidentally lock themselves out of their accounts if they mistype
      their password multiple times. To reduce the chance of such accidental
      lockouts, the Allow access again after time setting determines the number of
      seconds that must elapse before the counter that tracks failed logon attempts
      and triggers lockouts is reset to 0.
    audit_procedure: >
      Run the following command to verify the Allow access again after time setting.
      CLI: Hostname> show password-controls deny-on-fail allow-after Unlock User
      After Seconds 300 GUI: Navigate to User Management > Password Policy > Deny
      Access After Failed Login Attempts: Ensure 'Allow access again after time' is
