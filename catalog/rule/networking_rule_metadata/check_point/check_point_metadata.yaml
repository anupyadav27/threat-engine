  - rule_id: check_point.cis.1.maximum_number_of_failed_attempts_allowed_is_set
    title: "Ensure Maximum number of failed attempts allowed is set to 5 or fewer"
    severity: high
    category: networking
    tech_type: check_point
    automation_type: automated
    cis_benchmark: "CIS_CHECK_POINT v1.1.0"
    cis_version: "v1.1.0"
    cis_control: "1.12"
    cis_section: "1"
    profile_applicability: "Level 1"
    description: >
      This only takes effect if Deny access after failed attempts is enabled. The
      number of failed login attempts that a user is allowed before being locked
      out. After making that many successive failed attempts, future attempts will
      fail. When one login attempt succeeds, counting of failed attempts stops, and
      the count is reset to zero.
    rationale: >
      Repeated failed login attempts could either be a valid user who has forgotten
      the password, or a malicious attempt to gain access to the system. For this
      reason, this setting should be as restrictive as possible to mitigate brute
      force attack attempts to discover a user's password.
    audit_procedure: >
      Run the following command to verify the Deny access after failed login
      attempts setting. CLI: Hostname> show password-controls deny-on-fail failures-
      allowed Maximum Failed Attempts 5 GUI: Navigate to User Management > Password
      Policy > Deny Access After Failed Login Attempts: Ensure ' Maximum number of
      failed attempts allowed is set to' is set to 5or fewer.
    remediation: >
      Run the following command to set the deny-on-fail failures-allowed setting.
      CLI: Hostname>set password-controls deny-on-fail failures-allowed 5 34 | P a g
      e GUI: Navigate to User Management > Password Policy > Deny Access After
      Failed Login Attempts: checked and set ' Maximum number of failed attempts
      allowed is set to' setting to 5 or fewer. Default Value: 10 References: 1.
      https://sc1.checkpoint.com/documents/R76/CP_R76_Gaia_WebAdmin/73101.htm
      #o94478 Notes: Looking for input regarding a value for this recommendation.
      Note from checkpoint documentation.... Warning: Enabling this leaves you open
      to a 'denial of service' -- if an attacker issues unsuccessful login attempts
      often enough you will be locked out. Please consider the advantages and
      disadvantages of this option, in light of your security policy, before
      enabling it.
    references: >
