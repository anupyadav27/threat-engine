  - rule_id: check_point.cis.1.lockout_users_after_password_expiration_is_set_to
    title: "Ensure Lockout users after password expiration is set to 1"
    severity: high
    category: networking
    tech_type: check_point
    automation_type: automated
    cis_benchmark: "CIS_CHECK_POINT v1.1.0"
    cis_version: "v1.1.0"
    cis_control: "1.7"
    cis_section: "1"
    profile_applicability: "Level 1"
    description: >
      Lockout users after password expiration. After a user's password has expired,
      they have this number of days to log in and change it. If they do change their
      password within that number of days they will be unable to log in: They are
      locked out. A value of never allows the user to wait as long as they want to
      change their password.
    rationale: >
      User accounts and their passwords are the front-line of defense against
      malicious users gaining access to critical systems and data. Just as important
      as ensuring strong passwords are used and changed regularly, unused accounts
      should be closely monitored and disabled, whenever possible. Inactive accounts
      could become targets of brute force or dictionary attacks to gain access to
      the network and critical data/devices attached to it.
    audit_procedure: >
      Run the following command to verify the lockout users after x days setting.
      CLI: Hostname> show password-controls expiration-lockout-days Password
      Expiration Lockout Days 1 GUI: Navigate to User Management > Password Policy >
      Mandatory Password Changes > Lockout users after password expiration: Ensure
      'Lockout user after' is checked and set to 1 day.
    remediation: >
      Run the following command to set the expiration-lockout-days setting. CLI:
      Hostname>set password-controls expiration-lockout-days 1 24 | P a g e GUI:
      Navigate to User Management > Password Policy > Mandatory Password Changes >
      Lockout users after password expiration: Checked 'Lockout user after' setting
      and set to 1 day. Default Value: Never lockout users after password expires
    references: >
      
    impact: >
      
    compliance_mappings:
      cis:
        - "CIS_CHECK_POINT_v1_1_0_1_7"
      nist_800_53: []
      soc2: []
      pci_dss: []
    source_unique_id: "cis_check_point_v1_1_0_1_7"
    metadata_source: generated
    generated_by: generate_tech_rules

  - rule_id: check_point.cis.1.deny_access_to_unused_accounts_is_selected
    title: "Ensure Deny access to unused accounts is selected"
    severity: high
    category: networking
    tech_type: check_point
    automation_type: automated
    cis_benchmark: "CIS_CHECK_POINT v1.1.0"
    cis_version: "v1.1.0"
    cis_control: "1.8"
    cis_section: "1"
    profile_applicability: "Level 1"
    description: >
      Deny access to unused accounts. If there has been no successful login attempt
      in a set period of time, the user is locked out and cannot log in.
    rationale: >
      User accounts that have been unused for over a given period of time can be
      automatically disabled. Unused accounts pose a threat to system security since
      the users are not logging in to notice failed login attempts or other
      anomalies
    audit_procedure: >
      Run the following command to verify the Deny access to unused accounts
      setting. CLI: Hostname> show password-controls deny-on-nonuse enable Deny
      Access to Unused Accounts on GUI: Navigate to User Management > Password
      Policy > Deny access to unused accounts: Ensure 'Deny access to unused
      accounts' is checked.
    remediation: >
      Run the following command to set the deny-on-nonuse setting. CLI: Hostname>set
      password-controls deny-on-nonuse enable on GUI: Navigate to User Management >
      Password Policy > Deny access to unused accounts: Checked the 'Deny access to
      unused accounts' setting. Default Value: Not Selected 26 | P a g e
    references: >
      
    impact: >
      
    compliance_mappings:
