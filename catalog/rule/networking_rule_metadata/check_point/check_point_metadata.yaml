      These settings enable the use of primary and secondary NTP servers to provide
      redundancy in case of a failure involving the primary NTP server.
    rationale: >
      NTP enables the device to maintain accurate time and date when receiving
      updates from a reliable NTP server. Accurate timestamps are critical when
      correlating events with other systems, troubleshooting, or performing
      investigative work. Logs and certain cryptographic functions, such as those
      utilizing certificates, rely on accurate time and date parameters. In
      addition, rules referencing a Schedule object will not function as intended if
      the device’s time and date are incorrect. For additional security,
      authenticated NTP can be utilized. If Symmetric Key authentication is
      selected, only SHA1 should be used, as MD5 is considered severely compromised.
    audit_procedure: >
      Run the following command to check the status of NTP. CLI: Hostname> show ntp
      active Yes Run the following command to verify the IP address is configured
      for Primary and Secondary NTP server. Hostname> show ntp servers IP Address
      Type Version ------------ ------- --------------- 10.10.22.124 Primary 3
      192.169.1.238 Secondary 3 64 | P a g e GUI: Navigate to System Management >
      Time > Set Time and Date Verify Set Time and Date automatically using Network
      Time Protocol (NTP) option is checked and Primary NTP server and secondary NTP
      server address is configured.
    remediation: >
      Run the following command to enable the NTP and configure the Primary &
      Secondary NTP server. CLI: Hostname> set ntp active on Hostname> set ntp
      server primary ntpserver.time.com version 3 Hostname> set ntp server primary
      10.22.13.33 version 3 GUI: System Management > Time > Set Time and Date >
      Checked Set Time and Date automatically using Network Time Protocol (NTP) and
      configured the Primary NTP Server and Secondary NTP server Default Value: No
    references: >
      
