  - rule_id: check_point.cis.1.minimum_password_length_is_set_to_14_or_higher
    title: "Ensure Minimum Password Length is set to 14 or higher"
    severity: high
    category: networking
    tech_type: check_point
    automation_type: automated
    cis_benchmark: "CIS_CHECK_POINT v1.1.0"
    cis_version: "v1.1.0"
    cis_control: "1.1"
    cis_section: "1"
    profile_applicability: "Level 1"
    description: >
      Defines the minimum length a password can be. The minimum number of characters
      of a password that is to be allowed for users or SNMP users. Does not apply to
      passwords that have already been set.
    rationale: >
      Password length has been found to be a primary factor in characterizing
      password strength. Passwords that are too short yield to brute force attacks
      as well as to dictionary attacks using words and commonly chosen passwords.
    audit_procedure: >
      Run the following command to verify the Minimum Password Length. CLI:
      Hostname>show password-controls min-password-length Minimum Password Length 14
      GUI: Navigate to User Management > Password Policy Ensure Minimum Password
      Length is set to 14 or higher.
    remediation: >
      Run the following command to set the min-password-length setting. CLI:
      Hostname>set password-controls min-password-length 14 GUI: Navigate to User
      Management > Password Policy Ensure 'Minimum Password Length' is set to 14 or
      higher. 12 | P a g e Default Value: 6
