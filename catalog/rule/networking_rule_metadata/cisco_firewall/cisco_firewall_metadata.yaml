  - rule_id: cisco_firewall.cis.1.password_policy_is_enabled
    title: "Ensure 'Password Policy' is enabled"
    severity: high
    category: networking
    tech_type: cisco_firewall
    automation_type: manual
    cis_benchmark: "CIS_CISCO_FIREWALL v4.1.0"
    cis_version: "v4.1.0"
    cis_control: "1.1.5"
    cis_section: "1"
    profile_applicability: "Level 1"
    description: >
      Enforces the Enterprise Password Policy by setting compliant local password
      requirements for the security appliance
    rationale: >
      The password policy helps to prevent unauthorized accesses by enforcing the
      password for more complexity and making them difficult to be guessed. This
      applies to the local database.
    audit_procedure: >
      • Step 1: Run the following to determine whether the password-policy is set
      hostname#show run password-policy Example: Asa#sh run password-policy
      password-policy minimum-length 8 password-policy minimum-numeric 1 Here the
      password-policy is configured for the passwords to have at least 8 characters
      and to contain at least a number • Step 2: If an output is displayed, the
      system is compliant. If not, it is a finding.
    remediation: >
      • Step 1: Run the following to set the password lifetime in days to less than
      or equal to 180 hostname(config)#password-policy lifetime 30 19 | P a g e •
      Step 2: Run the following to set the minimum number of characters that must be
      changed between the old and the new passwords, to be to be greater than or
      equal to 14 hostname(config)#password-policy minimum-changes 14 • Step 3: Run
      the following to set the minimum number of upper case characters in the
      password, to be to be greater than or equal to 1 hostname(config)#password-
      policy minimum-uppercase 1 • Step 4: Run the following to set the minimum
      number of lower case characters in the password, to be to be greater than or
      equal to 1 hostname(config)#password-policy minimum-lowercase 1 • Step 5: Run
      the following to set the minimum number of numeric characters in the password,
      to be greater than or equal to 1 hostname(config)#password-policy minimum-
      numeric 1 • Step 6: Run the following to set the minimum number of special
      characters in the password, to be greater than or equal to 1
      hostname(config)#password-policy minimum-special 1 • Step 7: Run the following
      to set the password minimum length, to be greater than or equal to 14
      hostname(config)#password-policy minimum-length 14 Default Value: Password
      policy is disabled by default. The following are default values: password-
      policy lifetime 0 password-policy minimum-changes 0 password-policy minimum-
      length 3 password-policy minimum-uppercase 0 password-policy minimum-
      lowercase 0 password-policy minimum-numeric 0 password-policy minimum-special
      0 References: 1.
      http://www.cisco.com/c/en/us/td/docs/security/asa/asa91/configuration/genera
      l/asa_91_general_config/admin_management.html 20 | P a g e 1.2 Device
      Management Sets the security appliance device name 21 | P a g e
    references: >
      1.
      http://www.cisco.com/c/en/us/td/docs/security/asa/asa91/configuration/genera
      l/asa_91_general_config/admin_management.html 20 | P a g e 1.2 Device
      Management Sets the security appliance device name 21 | P a g e
    impact: >
      
    compliance_mappings:
      cis:
        - "CIS_CISCO_FIREWALL_v4_1_0_1_1_5"
      nist_800_53: []
      soc2: []
      pci_dss: []
    source_unique_id: "cis_cisco_firewall_v4_1_0_1_1_5"
    metadata_source: generated
    generated_by: generate_tech_rules

