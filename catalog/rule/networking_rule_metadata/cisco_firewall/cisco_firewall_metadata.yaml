  - rule_id: cisco_firewall.cis.3.threat_detection_statistics_is_set_to_tcp
    title: "Ensure 'threat-detection statistics' is set to 'tcp-intercept'"
    severity: high
    category: networking
    tech_type: cisco_firewall
    automation_type: manual
    cis_benchmark: "CIS_CISCO_FIREWALL v4.1.0"
    cis_version: "v4.1.0"
    cis_control: "3.6"
    cis_section: "3"
    profile_applicability: "Level 1"
    description: >
      Enables threat detection statistics for attacks blocked by the TCP Intercept
      function
    rationale: >
      The TCP Intercept function helps protecting the network and particularly
      servers against DOS attacks. When the maximum count of allowed connections is
      reached, through the TCP Intercept function, the firewall will no longer allow
      connection to the impacted server and will act as a proxy to the attack server
      until a valid traffic is received. Enabling statistics can help to prevent the
      attacks at the earliest stage possible upstream.
    audit_procedure: >
      • Step 1: Run the following to check whether TCP Intercept threat detection
      statistics is enabled hostname# sh run all threat-detection | in tcp-intercept
      Example: fw-4-dmz# sh run all threat-detection | in tcp-intercept threat-
      detection statistics tcp-intercept rate-interval 30 burst-rate 400 average-
      rate 200 • Step 2: If an output is displayed, the system is compliant. If not,
      it is a finding.
    remediation: >
      Run the following to enable threat detection statistics for TCP Intercept
      hostname(config)# threat-detection statistics tcp-intercept 172 | P a g e
      Default Value: Not enable by default References: 1.
      http://www.cisco.com/c/en/us/td/docs/security/asa/asa82/configuration/guide/
