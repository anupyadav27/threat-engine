      <new_image_location> and the MD5 checksum <md5_checksum> from the Cisco.com
      Website • Step 2: Run the following command to verify that the MD5 checksum
      value of the new image matches the one provided on the Cisco.com Website
      hostname#verify <new_image_location> <md5_checksum> Example: Asa-fw# verify
      disk0:asa803-6-k8.bin 76b5448039e642099334abbfec5a8705 Verifying file
      integrity of disk0:/asa803-6-k8.bin!!!!!!!!!!!!!!!!!!
      !!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!! <lines
      omitted> !!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!
      !!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!Done! Verified
      (disk0:/asa803-6-k8.bin) = 76b5448039e642099334abbfec5a8705 The new image
      location is disk0:asa803-6-k8.bin 29 | P a g e • Step 3: If the message '
      Verified ' appears at the end of the output, the new image is valid. If
