    rationale: >
      Sometimes, manipulating software from downloading them from the Cisco.com
      website to uploading them in the security appliance can modify the software,
      mostly when the copy has not been properly performed or the software has
      transited into malware infected machines. For an upgrade to be performed
      without downtime, the image integrity should be verified.
    audit_procedure: >
