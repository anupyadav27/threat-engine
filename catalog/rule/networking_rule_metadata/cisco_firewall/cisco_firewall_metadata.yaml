  - rule_id: cisco_firewall.cis.2.dns_guard_is_enabled
    title: "Ensure 'DNS Guard' is enabled"
    severity: high
    category: networking
    tech_type: cisco_firewall
    automation_type: manual
    cis_benchmark: "CIS_CISCO_FIREWALL v4.1.0"
    cis_version: "v4.1.0"
    cis_control: "2.3"
    cis_section: "2"
    profile_applicability: "Level 1"
    description: >
      Enables the protection against DNS cache poisoning attacks
    rationale: >
      A DNS cache is poisoned when it contains incorrect entries that redirect
      traffic to an attacker website. When the DNS queries performed towards
      legitimate DNS servers, attackers can spoof the Identifier of the DNS header
      along with the DNS caching server UDP port in order to provide a reply as from
      an authoritative DNS server. The DNS Guard function helps eliminating
      subsequent replies coming after the authoritative server reply.
    audit_procedure: >
      • Step 1: Run the following to determine if the DNS Guard is enabled.
      hostname# show running-config dns-guard Example: asa-dmz1# show running-config
      dns-guard dns-guard • Step 2: If an output is displayed, the system is
      compliant. If not it is a finding.
    remediation: >
      Run the following command to enable the DNS Guard function. hostname(config)#
      dns-guard Default Value: The function is disabled for the related software
      versions 155 | P a g e References: 1.
      http://www.cisco.com/c/en/us/td/docs/security/asa/asa-command-reference/A-
      H/cmdref1/d3.html 156 | P a g e
