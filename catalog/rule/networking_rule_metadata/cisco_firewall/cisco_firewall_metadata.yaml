  - rule_id: cisco_firewall.cis.3.ip_verify_is_set_to_reverse_path_for_untrusted
    title: "Ensure 'ip verify' is set to 'reverse-path' for untrusted interfaces"
    severity: high
    category: networking
    tech_type: cisco_firewall
    automation_type: manual
    cis_benchmark: "CIS_CISCO_FIREWALL v4.1.0"
    cis_version: "v4.1.0"
    cis_control: "3.7"
    cis_section: "3"
    profile_applicability: "Level 1"
    description: >
      Enables the unicast Reverse-Path Forwarding (uRPF) on untrusted interfaces.
    rationale: >
      The unicast Reverse-Path Forwarding(uRPF) enabled on an interface ensures that
      for a packet received on an interface, the security appliance checks the
      routing table to make sure that the same interface is used to get back to the
      source IP address. If it is not the case, the packet will be dropped. This
      should be enabled by default on untrusted interfaces in order to prevent
      attackers from spoofing internal IP addresses. For the other internal
      interfaces, the uRPF should be enabled if there is no case of asymmetric
      routing for which the path to send a packet to the source IP address is
      different of the path from which the packet is received.
    audit_procedure: >
      • Step 1: Acquire the name of the untrusted interface <interface_name> • Step
      2: Run the following command to check if the uRPF is enabled on the interface
      hostname# sh run ip verify reverse-path interface <interface_name> Example:
      Asa-fw#sh run ip verify reverse-path interface Outside ip verify reverse-path
      interface Outside • Step 3: If there is no output displayed, the system is not
      compliant. It is a finding.
    remediation: >
      • Step 1: Acquire the name of the untrusted interface <interface_name> • Step
      2: Run the following command to enable protection against IP spoofing 174 | P
      a g e hostname(config)# ip verify reverse-path interface <interface_name>
      Default Value: Disabled by default References: 1.
      http://www.cisco.com/en/US/docs/security/asa/asa90/command/reference/i3.ht
      ml#wp1915749 175 | P a g e
    references: >
      1. http://www.cisco.com/en/US/docs/security/asa/asa90/command/reference/i3.ht
      ml#wp1915749 175 | P a g e
