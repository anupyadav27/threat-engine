    rationale: >
      Given that the network may be prone to sniffing, the HTTP access to the
      security appliance must be secured with SSL or TLS protocols. The latest
      version of SSL that is SSL v3 is now inclined to many vulnerabilities and
      systems should use at least TLS 1.0 as SSL server version.
