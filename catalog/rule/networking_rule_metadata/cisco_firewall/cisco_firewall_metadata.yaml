      source
    rationale: >
      The software image being a code can be vulnerable to many attacks such as
      malicious code injection in the software, the modification of the code
      installed in the ROM. In order to ensure that the image running is from a
      trusted source, the image is digitally signed and its certificate should be
      verified.
    audit_procedure: >
