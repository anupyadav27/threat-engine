  - rule_id: cisco_firewall.cis.1.failover_is_enabled
    title: "Ensure 'Failover' is enabled"
    severity: high
    category: networking
    tech_type: cisco_firewall
    automation_type: manual
    cis_benchmark: "CIS_CISCO_FIREWALL v4.1.0"
    cis_version: "v4.1.0"
    cis_control: "1.2.3"
    cis_section: "1"
    profile_applicability: "Level 1"
    description: >
      Enables failover between the security appliance and another security appliance
      in order to achieve high availability
    rationale: >
      Enabling failover helps to meet the availability requirement of the security
      CIA (Confidentiality - Integrity - Availability) triad, ensuring a physical
      and logical redundancy of firewalls in order to avoid service disruption
      should the security appliance or its component fails. It requires to identical
      systems in hardware and software version connected through a failover and a
      state links.
    audit_procedure: >
      • Step 1: Run the following to check if failover is enabled hostname#sh run
      failover | grep -v no Example: Asa-fw# sh run failover | grep -v no failover
      failover lan unit secondary failover lan interface fointerface
      GigabitEthernet0/0 failover link fointerface GigabitEthernet0/0 failover
      interface ip fointerface 10.0.0.1 255.0.0.0 standby 10.0.0.2 • Step 2: If an
      output is displayed, the system is compliant. If not, it is a finding.
    remediation: >
      Follow the steps below to enable active/standby failover. The commands are run
      in the system execution space 25 | P a g e • Step 1: For each appliance,
      identify the failover link physical interface <failover_interface_physical>
      and assign it a name <failover_interface_name> and IP address
      <failover_interface_ip> and subnet mask <failover_interface_mask>. Identify
      the other device IP address for each appliance as <peer_failover_ip> • Step 2:
      For each appliance, identify the state link physical interface
      <state_interface_physical> and assign it a name <state_interface_name> and IP
      address <state_interface_ip> and subnet mask <state_interface_mask>. Identify
      the other device IP address for each appliance as <peer_state_ip> • Step 3:
      Run the following on the Active device to set it as primary node
      hostname(config)#failover lan unit primary • Step 4: Run the following on the
      Standby device to set it as secondary node hostname(config)#failover lan unit
      secondary • Step 5: Run the following on both security appliances
      hostname(config)#failover lan interface <failover_interface_name>
      <failover_interface_physical> hostname(config)#failover interface ip
      <failover_interface_name> <failover_interface_ip> <failover_interface_mask>
      standby <peer_failover_ip> hostname(config)#interface
      <failover_interface_physical> hostname(config-if)#no shutdown
      hostname(config)#failover link <state_interface_name>
      <state_interface_physical> hostname(config)#failover interface ip
      <state_interface_name> <state_interface_ip> <state_interface_mask> standby
      <peer_state_ip> hostname(config)#interface <state_interface_physical>
      hostname(config-if)#no shutdown hostname(config)#failover
      hostname(config)#write memory Default Value: Disabled by default References:
      1.
      http://www.cisco.com/c/en/us/td/docs/security/asa/asa91/configuration/genera
      l/asa_91_general_config/ha_failover.html 26 | P a g e
    references: >
      1.
      http://www.cisco.com/c/en/us/td/docs/security/asa/asa91/configuration/genera
      l/asa_91_general_config/ha_failover.html 26 | P a g e
    impact: >
      
    compliance_mappings:
      cis:
        - "CIS_CISCO_FIREWALL_v4_1_0_1_2_3"
      nist_800_53: []
      soc2: []
      pci_dss: []
    source_unique_id: "cis_cisco_firewall_v4_1_0_1_2_3"
    metadata_source: generated
    generated_by: generate_tech_rules

  - rule_id: cisco_firewall.cis.1.unused_interfaces_is_disable
    title: "Ensure 'Unused Interfaces' is disable"
    severity: high
    category: networking
    tech_type: cisco_firewall
    automation_type: manual
    cis_benchmark: "CIS_CISCO_FIREWALL v4.1.0"
    cis_version: "v4.1.0"
    cis_control: "1.2.4"
    cis_section: "1"
    profile_applicability: "Level 1"
    description: >
      Disables the unused interfaces
    rationale: >
      Shutting down the unused interfaces is a complement to physical security. In
      fact, an attacker connecting physically to an unused port of the security
      appliance can use the interface to gain access to the device if the relevant
      interface has not been disabled and the source restriction to management
      access is not enabled.
    audit_procedure: >
      • Step 1: Run the following command to check if there are unsused ports that
      have not been disabled. hostname#sh int ip brief | in __down Example: This
      first command lists all the interfaces Corp-FW# show int ip brief Interface
      IP-Address OK? Method Status Protocol GigabitEthernet0/1 unassigned YES unset
      up up GigabitEthernet0/1.201 172.16.61.1 YES CONFIG up up
      GigabitEthernet0/1.202 172.16.62.171 YES CONFIG up up GigabitEthernet1/0
      unassigned YES unset administratively down down GigabitEthernet1/1 unassigned
      YES unset administratively down down GigabitEthernet1/2 unassigned YES unset
      down down GigabitEthernet1/3 192.168.1.11 YES manual up up 27 | P a g e This
      second command is the audit command which looks for unused interfaces that are
      not disabled Corp-FW#sh int ip brief | in __down GigabitEthernet1/2 unassigned
      YES unset down down Here, the interface GigabitEthernet1/2 is unused but not
      shutdown since the status is 'down' instead of being 'administratively down' •
      Step 2: If there is no output displayed, the system is compliant. If not, it
      is a finding.
    remediation: >
      • Step 1: Identify the physical name <interface_physical_name> of the unused
      interfaces that are not disabled • Step 2: For each of the identified
      interfaces, run the following command Hostname(config)#interface
      <interface_physical_name> Hostname(config-if)#shutdown References: 1.
      http://www.cisco.com/c/en/us/td/docs/security/asa/asa72/configuration/guide/
      conf_gd/int5505.html 28 | P a g e 1.3 Image security Verifies the integrity
      and authenticity of the image
    references: >
      1.
      http://www.cisco.com/c/en/us/td/docs/security/asa/asa72/configuration/guide/
      conf_gd/int5505.html 28 | P a g e 1.3 Image security Verifies the integrity
      and authenticity of the image
    impact: >
      
    compliance_mappings:
      cis:
        - "CIS_CISCO_FIREWALL_v4_1_0_1_2_4"
      nist_800_53: []
      soc2: []
      pci_dss: []
    source_unique_id: "cis_cisco_firewall_v4_1_0_1_2_4"
    metadata_source: generated
    generated_by: generate_tech_rules

