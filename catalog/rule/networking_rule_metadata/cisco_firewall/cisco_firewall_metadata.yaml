    profile_applicability: "Level 1"
    description: >
      Determines the size of the local buffer in which the logs are stored so that
      they can be checked by the administrator.
    rationale: >
      The internal log buffer serves as a temporary storage location. New messages
      are appended to the end of the list. When the buffer is full, that is, when
      the buffer wraps, old messages are overwritten as new messages are generated.
      The internal log buffer allows the administrator performing a health check on
      the system to locally have the last logs generated.
    audit_procedure: >
      • Step 1: Run the following to verify the required buffer size is configured:
      hostname# sh run logging | in buffer-size.524288 The output should look like
      logging buffer-size 524288 Example: Asa# sh run | in buffer-size.524288
      logging buffer-size 524288 • Step 2: If an output is displayed, the system is
      compliant. If not, there is a finding.
    remediation: >
      127 | P a g e • Step 1: Run the following command to set the logging buffer-
      size to 524288 The size is in bytes and is to be chosen between 4096 and
      1048576 bytes hostname(config)# logging buffer-size 524288 Default Value: The
      default size is 4kB. References: 1.
