  - rule_id: cisco_firewall.cis.3.dos_protection_is_enabled_for_untrusted_interfaces
    title: "Ensure DOS protection is enabled for untrusted interfaces"
    severity: high
    category: networking
    tech_type: cisco_firewall
    automation_type: manual
    cis_benchmark: "CIS_CISCO_FIREWALL v4.1.0"
    cis_version: "v4.1.0"
    cis_control: "3.5"
    cis_section: "3"
    profile_applicability: "Level 1"
    description: >
      Determines the maximum connections, maximum embryonic connections, maximum
      connections per client and maximum embryonic connections per client that can
      be accepted on the outside interface
    rationale: >
      Limiting the number of connections protects from a DoS attack. The ASA uses
      the per-client limits and the embryonic connection limits to trigger TCP
      Intercept, which protects inside systems from a DoS attack perpetrated by
      flooding an interface with TCP SYN packets. An embryonic connection is a
      connection request that has not finished the necessary handshake between
      source and destination. TCP Intercept uses the SYN cookies algorithm to
      prevent TCP SYN-flooding attacks. A SYN-flooding attack consists of a series
      of SYN packets usually originating from spoofed IP addresses. The constant
      flood of SYN packets keeps the server SYN queue full, which prevents it from
      servicing connection requests.
    audit_procedure: >
      • Step 1: Run the following to determine whether the DOS protection is enabled
      hostname#sh run policy-map | i set.connection The output should look like: set
      connection connection_type max_value The example below gives the values for
      maximum connections, maximum embryonic connections, maximum connections per
      client and maximum embryonic connections per client Asa#sh run policy-map | i
      set.connection set connection conn-max 9500 set connection embryonic-conn-max
      5000 170 | P a g e set connection per-client-embryonic-max 100 set connection
      per-client-max 75 • Step 2: If an output is displayed, the system is
      compliant. If not, there is a finding.
    remediation: >
      • Step 1: Acquire the enterprise standard values for maximum connections,
      maximum embryonic connections, maximum connections per client and maximum
      embryonic connections per client • Step 2: Run the following to configure the
      class to identify the traffic on which DOS protection should be performed.
      hostname(config)# class-map <class_name> hostname(config-cmap)# match any Step
      3: Run the following to configure the policy that will determine the maximum
      connections to be applied on the class previously configured hostname(config)#
      policy-map <policy_name> hostname(config-pmap)# class <class_name>
      hostname(config-pmap-c)# set connection conn-max <enterprise_max_number>
      hostname(config-pmap-c)# set connection embryonic-conn-max
      <enterprise_max_number> hostname(config-pmap-c)# set connection per-client-
      embryonic-max <enterprise_max_number> hostname(config-pmap-c)# set connection
      per-client-max <enterprise_max_number> The enterprise_max_number parameter is
      to be taken between 0 and 65535. • Step 4: Run the following to apply the
      policy previously configured on the untrusted hostname(config-pmap-c)#
      service-policy <policy_name> interface <untrusted_interface_name> Default
      Value: The default maximum value is 0 meaning there is no limitation
      References: 1.
      http://www.cisco.com/c/en/us/td/docs/security/asa/asa82/configuration/guide/
      config/conns_connlimits.html 171 | P a g e
    references: >
      1.
      http://www.cisco.com/c/en/us/td/docs/security/asa/asa82/configuration/guide/
      config/conns_connlimits.html 171 | P a g e
    impact: >
      
    compliance_mappings:
      cis:
