  - rule_id: cisco_firewall.cis.1.aaa_local_authentication_max_failed_attempts_is
    title: "Ensure 'aaa local authentication max failed attempts' is set to less than or equal to '3'"
    severity: high
    category: networking
    tech_type: cisco_firewall
    automation_type: manual
    cis_benchmark: "CIS_CISCO_FIREWALL v4.1.0"
    cis_version: "v4.1.0"
    cis_control: "1.4.1.1"
    cis_section: "1"
    profile_applicability: "Level 1"
    description: >
      Limits the maximum number of times a local user can enter a wrong password
      before being locked out
    rationale: >
      Limiting the number of failed authentication attempts is a prevention and
      safeguard against brute force and dictionary attacks on systems. The
      implementation of the aaa local authentication max failed attempts helps to
      limit the number of consecutive failed login attempts when the AAA
      authentication scheme through the local database is used as method.
    audit_procedure: >
      • Step 1: Acquire the enterprise standard maximum value (enterprise_max_value)
      for local authentication failed attempts • Step 2: Run the following to
      determine whether the standard value is configured. hostname#sh run aaa | in
      max-fail 3 The output should look like aaa local authentication attempts max-
      fail 3 Example: Asa#sh run aaa | in max-fail.3 aaa local authentication
      attempts max-fail 3 34 | P a g e Here the max-fail attempts is 3 and it is
      configured • Step 3: If an output is displayed, the system is compliant. If
      not, it is a finding.
    remediation: >
      Run the following to configure the maximum number of consecutive local login
      failures to be less than or equal to 3 hostname(config)# aaa local
      authentication attempts max-fail 3 Default Value: The aaa local authentication
      max login attempts is disabled by default References: 1.
      http://www.cisco.com/c/en/us/td/docs/security/asa/asa82/command/reference
      /cmd_ref/a1.html#wp1557629 Notes: The feature does not affect the privilege
