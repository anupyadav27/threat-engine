      Software version 9.x, run the following to check that AES 256 algorithm is
      enabled hostname#sh run ssl | in custom_'AES256-SHA'$ Example: Corp_fw#sh run
      ssl | in custom_'AES256-SHA'$ ssl cipher tlsv1 custom 'AES256-SHA' • Step 2:
      If an output is displayed, the system is compliant. If not, it is a finding.
