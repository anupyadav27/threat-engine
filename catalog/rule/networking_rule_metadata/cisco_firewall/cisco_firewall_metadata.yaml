    tech_type: cisco_firewall
    automation_type: manual
    cis_benchmark: "CIS_CISCO_FIREWALL v4.1.0"
    cis_version: "v4.1.0"
    cis_control: "1.11.5"
    cis_section: "1"
    profile_applicability: "Level 1"
    description: >
      Sets a SNMP community string different from the default one
    rationale: >
      The SNMP community string is a key used both by the security appliance and the
      NMS server. The security appliance accepts or rejects the requests from the
      NMS is a valid key is submitted. From version 8.2(1) and above, for each
      community string, there are two SNMP server groups created, one for version 1
      and another for version 2C. The default SNMP community string is public and
      can be used by an attacker to collect unauthorized information from the ASA
      and hence should be changed.
    audit_procedure: >
      • Step 1: Run the following command to check whether the default SNMP
      community string is configured hostname# show snmp-server group | in _public
      Example: Corp-FW# show snmp-server group groupname: public security model:v1
      readview : <no readview specified> writeview: <no writeview specified>
      notifyview: <no readview specified> row status: active groupname: public
      security model:v2c readview : <no readview specified> writeview: <no writeview
      specified> notifyview: *<no readview specified> row status: active Corp-
      FW#show snmp-server group | in _public groupname: public security model:v1
      groupname: public security model:v2c 144 | P a g e • Step 2: If an output is
      displayed, the system is not compliant, it is a finding.
    remediation: >
