  - rule_id: cisco_firewall.cis.1.snmp_traps_is_enabled
    title: "Ensure 'SNMP traps' is enabled"
    severity: high
    category: networking
    tech_type: cisco_firewall
    automation_type: manual
    cis_benchmark: "CIS_CISCO_FIREWALL v4.1.0"
    cis_version: "v4.1.0"
    cis_control: "1.11.4"
    cis_section: "1"
    profile_applicability: "Level 1"
    description: >
      Enables SNMP traps to be sent to the NMS
    rationale: >
      The purpose of the SNMP service is to monitor in real time the events
      occurring on systems in order to meet the security requirement of availability
      of systems and services. The traps are SNMP notifications sent to the NMS and
      should be enabled in order to be sent and processed by the NMS. The NMS will
      then provide a comprehensive aggregation and reporting of events generated,
      thus helping administrator.
