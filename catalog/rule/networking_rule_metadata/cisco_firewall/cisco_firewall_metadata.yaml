    profile_applicability: "Level 1"
    description: >
      Limits the access to the privileged EXEC mode
    rationale: >
      When a user is placed in the privileged EXEC mode, valuable information can be
      obtained. The AAA authorization exec enforces the segregation of users rights
      so that only authorized users can get access to the privileged EXEC mode. Once
      this feature is enabled, the user rights are provided by the authentication
      servers mentioned in the AAA authentication console and AAA authentication
      enable schemes.
    audit_procedure: >
      • Step 1: Run the following to determine whether the AAA authentication exec
      is enabled. hostname# sh run aaa authorization | in exec Example: datacenter-
      asa# sh run aaa authorization | in exec aaa authorization exec authentication-
      server • Step 2: If an output is displayed, the system is compliant. If not,
      it is a finding.
    remediation: >
      Run the following to enable the AAA authorization exec hostname(config)# aaa
      authorization exec authentication-server 59 | P a g e Default Value: Not
      enabled References: 1.
      http://www.cisco.com/c/en/us/td/docs/security/asa/asa82/command/reference
      /cmd_ref/a1.html 60 | P a g e 1.4.5 AAA Accounting Defines the AAA accounting
      rules 61 | P a g e
