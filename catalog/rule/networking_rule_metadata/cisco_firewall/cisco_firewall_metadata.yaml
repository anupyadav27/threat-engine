  - rule_id: cisco_firewall.cis.1.host_name_is_set
    title: "Ensure 'Host Name' is set"
    severity: high
    category: networking
    tech_type: cisco_firewall
    automation_type: manual
    cis_benchmark: "CIS_CISCO_FIREWALL v4.1.0"
    cis_version: "v4.1.0"
    cis_control: "1.2.2"
    cis_section: "1"
    profile_applicability: "Level 1"
    description: >
      Changes the device default hostname
    rationale: >
      The device hostname plays an important role in asset inventory and
      identification as a security requirement, but also in the public keys and
      certificate deployments as well as when correlating logs from different
      systems during an incident handling.
    audit_procedure: >
      • Step 1: Run the following to check whether the default name is changed
      hostname# sh run hostname | e _ciscoasa_|_asa The output should look like:
      hostnamem name_of_device where the name_of_device is not the default one.
      Example: Datacenter-asa-1# sh run hostname | e _ciscoasa_|_asa_ hostname
      Datacenter-asa-1 Here the hostname is Datacenter-asa-1 • Step 2: If an output
      is displayed, the system is compliant. If not it is a finding.
    remediation: >
      • Step 1: Acquire the enterprise naming convention to build the name_of_device
      • Step 2: Run the following to configure the device hostname 23 | P a g e
      hostname(config)#hostname <name_of_device> Default Value: The default value
      depends on the platform, but generally is ciscoasa References: 1.
      http://www.cisco.com/c/en/us/td/docs/security/asa/asa84/configuration/guide/
      asa_84_cli_config/basic_hostname_pw.html 24 | P a g e
    references: >
