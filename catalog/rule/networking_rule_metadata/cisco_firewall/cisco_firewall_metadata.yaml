  - rule_id: cisco_firewall.cis.3.explicit_deny_in_access_lists_is_configured
    title: "Ensure explicit deny in access lists is configured correctly"
    severity: high
    category: networking
    tech_type: cisco_firewall
    automation_type: manual
    cis_benchmark: "CIS_CISCO_FIREWALL v4.1.0"
    cis_version: "v4.1.0"
    cis_control: "3.12"
    cis_section: "3"
    profile_applicability: "Level 1"
    description: >
      Ensures that each access-list has an explicit deny statement
    rationale: >
      Configuring an explicit deny entry, with log option, at the end of access
      control lists enables monitoring and troubleshooting traffic flows that have
      been denied. Logging these events can provide an effective record to
      troubleshoot issues and attacks.
    audit_procedure: >
      • Step 1: Run the following command to determine the access-list that are
      applied to interfaces hostname# sh run access-group Example: Asa-fw#sh run
      access-group access-group inside_acl in interface Inside access-group web_acl
      in interface Web access-group dmz1_acl in interface Dmz1 access-group
      outside_acl in interface Outside access-group finance_acl in interface Finance
      • Step 2: Run the following to check if explicit deny is configured
      hostname#sh run access-list | in deny.ip.any.any Example: Asa-fw#sh run
      access-list | in deny.ip.any.any access-list outside_acl extended deny ip any
      any log access-list web_acl extended deny ip any any log access-list
      finance_acl extended deny ip any any log • Step 3: If all the access-lists
      listed in step 1 are present in step 2, the system is compliant. If not it is
      a finding. 185 | P a g e
    remediation: >
      • Step 1: Acquire the name <access-list_name> of the access-list that is not
      compliant from the audit procedure • Step 2: Run the following to configure
      the explicit deny. hostname(config)#<access-list_name> extended deny ip any
      any log The statement will be placed at the end of the access-list Default
