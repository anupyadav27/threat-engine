  - rule_id: cisco_firewall.cis.3.packet_fragments_are_restricted_for_untrusted
    title: "Ensure packet fragments are restricted for untrusted interfaces"
    severity: high
    category: networking
    tech_type: cisco_firewall
    automation_type: manual
    cis_benchmark: "CIS_CISCO_FIREWALL v4.1.0"
    cis_version: "v4.1.0"
    cis_control: "3.3"
    cis_section: "3"
    profile_applicability: "Level 1"
    description: >
      Sets the security appliance to drop fragmented packets received on the
      untrusted interface.
    rationale: >
      Attackers use fragmentation to evade security systems such as firewalls or IPS
      because the checks are usually performed on the first fragment. They can then
      put malicious payload in the other fragments to perform DoS against internal
      systems. Disabling the fragmentation on the security appliance implies
      changing its default behavior from accepting up to 24 fragments in a packet to
      accepting only 1 fragment in a packet. In other words, it implies accepting
      only non fragmented packets.
    audit_procedure: >
      • Step 1: Acquire the name of the untrusted interface <interface_name> • Step
      2: Run the following to check if fragmentation is disabled on the interface
      hostname# sh run fragment <interface_name> | in chain_1_ Example: Asa-fw#sh
      run fragment Outside | in chain_1_ fragment chain 1 Outside The Outside
      interface is configured to deny fragments. • Step 3: If an output is
      displayed, the system is compliant. If not, it is a finding. 166 | P a g e
    remediation: >
      • Step 1: Acquire the name of the untrusted interface <interface_name> • Step
      2: Run the following command to deny fragments on the interface.
      hostname(config)#fragment chain 1 <interface_name> Default Value: The default
      value for the fragment chain is 24. References: 1.
      http://www.cisco.com/en/US/docs/security/asa/asa90/command/reference/f2.ht
      ml#wp2019322 167 | P a g e
    references: >
      1. http://www.cisco.com/en/US/docs/security/asa/asa90/command/reference/f2.ht
      ml#wp2019322 167 | P a g e
