  - rule_id: cisco_firewall.cis.3.dns_services_are_configured_correctly
    title: "Ensure DNS services are configured correctly"
    severity: high
    category: networking
    tech_type: cisco_firewall
    automation_type: manual
    cis_benchmark: "CIS_CISCO_FIREWALL v4.1.0"
    cis_version: "v4.1.0"
    cis_control: "3.1"
    cis_section: "3"
    profile_applicability: "Level 1"
    description: >
      Sets DNS server(s) to be used by the appliance to perform DNS queries
    rationale: >
      The security appliance may perform DNS queries in order to achieve URL
      filtering or threat protection against Botnet traffic.
    audit_procedure: >
      • Step 1: Run the following to determine whether DNS lookup is enabled.
      hostname#sh run | in domain-lookup The output should look like: hostname#dns
      domain-lookup <interface_name> where interface_name is the name of the
      interface connected to the DNS server Example: asa_dmz#sh run | in domain-
      lookup dns domain-lookup outside Here the dns lookup is enabled and outside
      interface connects to DNS server • Step 2: If an output is displayed, go to
      step 3. If not, it is a finding and the remediation procedure should be
      applied. • Step 3: Acquire the enterprise authorized DNS servers' IP addresses
      <dns_ip_address> and for each of them, run the following command to determine
      if the DNS server has been configured. hostname#sh run | i name-
      server_<dns_ip_address> The output should look like: 162 | P a g e dns name-
      server <em><dns_ip_address></em> Example: asa_dmz#sh run | in name-
      server_8.8.8.8 dns name-server 8.8.8.8 asa_dmz#sh run | in name-
      server_10.1.1.254 dns name-server 10.1.1.254 Here the configured DNS servers
      are 8.8.8.8 and 10.1.1.254 • Step 4: If an output is displayed, the system is
      compliant. If not it is a finding.
    remediation: >
