  - rule_id: cisco_firewall.cis.1.known_default_accounts_do_not_exist
    title: "Ensure known default accounts do not exist"
    severity: high
    category: networking
    tech_type: cisco_firewall
    automation_type: manual
    cis_benchmark: "CIS_CISCO_FIREWALL v4.1.0"
    cis_version: "v4.1.0"
    cis_control: "1.4.1.3"
    cis_section: "1"
    profile_applicability: "Level 1"
    description: >
      Deletes the known default accounts configured
    rationale: >
      In order to attempt access to known devices' platforms, attackers use the
      available database of the known default accounts for each platform or
      Operating System. The known default accounts are often (without limiting to)
      the following: 'root', 'asa', 'admin', 'cisco', 'pix'. When the attacker has
      discovered that a default account is enabled on a system, the work of
      attempting to access to the device will be half done given that the remaining
      part will be on guessing the password and risks for devices to be intruded are
      very high. It is a best practice to use Enterprise customized administrative
      accounts.
    audit_procedure: >
      • Step 1: Run the following to determine whether a known default account is
      available. hostname#show running-config username | in
      _admin_|_asa_|_cisco_|_pix_|_root_ The output should look like: username
      <known_default_account> password xxxxxxx encrypted Example: Asa-fw-1#show
      running-config username | in _admin_|_asa_|_cisco_|_pix_|_root_ username admin
      password 3USUcOPFUiMCO4Jk encrypted privilege 15 Here the known default
      account is admin. • Step 2: If there is no output displayed, the system is
      compliant. If not, it is a finding. 38 | P a g e
    remediation: >
      • Step 1: Acquire the Enterprise customized administrative account
      <customized_admin_account> and password <admin_password> • Step 2: Run the
      following to create the customized administrative account as well as the
      required privilege level <privilege_level> hostname(config)#username
      <customized_admin_account> password <admin_password> privilege
      <privilege_level> • Step 3: Run the following to delete the known default
      accounts identified during the audit hostname(config)# no username
      <known_default_account> Default Value: The default username used for the first
      SSH connection or aaa authentication telnet console is asa but for versions
      from 8.4(2) and above, there is no default username References: 1.
      http://www.cisco.com/c/en/us/td/docs/ios/12_2/security/command/reference/f
      secur_r/srfpass.html 39 | P a g e 1.4.2 Remote AAA servers Sets the AAA
      servers for remote authentication
    references: >
      1. http://www.cisco.com/c/en/us/td/docs/ios/12_2/security/command/reference/f
      secur_r/srfpass.html 39 | P a g e 1.4.2 Remote AAA servers Sets the AAA
      servers for remote authentication
    impact: >
      
