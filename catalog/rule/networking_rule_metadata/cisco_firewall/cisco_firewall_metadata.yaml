    automation_type: manual
    cis_benchmark: "CIS_CISCO_FIREWALL v4.1.0"
    cis_version: "v4.1.0"
    cis_control: "3.4"
    cis_section: "3"
    profile_applicability: "Level 1"
    description: >
      Enables the inspection of an application that is not in the default global
      policy application inspection
    rationale: >
      By default, the ASA configuration includes a policy that matches all default
      application inspection traffic and applies certain inspections to the traffic
      on all interfaces (global policy). Not all inspections are enabled by default.
      The default policy can be edited in order to enable inspection for a specific
      application that is not by default included in it.
    audit_procedure: >
      Step 1: Run the following to determine whether the protocol <protocol_name> to
      be inspected is included in the default policy hostname#sh run policy-map | in
      __inspect.<protocol_name> The output should look like: inspect protocol_name
      The example below confirms that the FTP protocol is inspected Asa# sh run
      policy-map | in __inspect.ftp inspect ftp • Step 2: If an output is displayed,
      the system is compliant. If not, there is a finding.
    remediation: >
      Run the following to enable the inspection of the protocol: 168 | P a g e
      hostname(config)# policy-map global_policy hostname(config-pmap)# class
      inspection_default hostname(config-pmap-c)# inspect <protocol_name>
      hostname(config-pmap-c)# exit hostname(config-pmap)# exit
      hostname(config)#service-policy global_policy global Default Value: The
      default policy configuration includes the following commands to inspect
      applications: class-map inspection_default match default-inspection-traffic
      policy-map type inspect dns preset_dns_map parameters message-length maximum
      512 policy-map global_policy class inspection_default inspect dns
      preset_dns_map inspect ftp inspect h323 h225 inspect h323 ras inspect ip-
      options inspect rsh inspect rtsp inspect esmtp inspect sqlnet inspect skinny
      inspect sunrpc inspect xdmcp inspect sip inspect netbios inspect tftp service-
      policy global_policy global References: 1.
