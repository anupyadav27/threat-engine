  - rule_id: cisco_firewall.cis.1.tacacs_radius_is_configured_correctly
    title: "Ensure 'TACACS+/RADIUS' is configured correctly"
    severity: high
    category: networking
    tech_type: cisco_firewall
    automation_type: manual
    cis_benchmark: "CIS_CISCO_FIREWALL v4.1.0"
    cis_version: "v4.1.0"
    cis_control: "1.4.2.1"
    cis_section: "1"
    profile_applicability: "Level 1"
    description: >
      Specifies the AAA server-group and each individual server using the TACACS+ or
      RADIUS protocol
    rationale: >
      Authentication, authorization and accounting (AAA) scheme provide an
      authoritative source for managing and monitoring access for devices. Many
      protocols are supported for the communication between the systems and the AAA
      servers: http-form, kerberos, ldap, nt, radius, sdi, tacacs+.
    audit_procedure: >
      • Step 1: Acquire the enterprise standard protocol (protocol_name) for
      authentication (TACACS+ or RADIUS) • Step 2: Perform the following to
      determine if the AAA server-group is configured with the required protocol
      hostname#sh run aaa-server | i protocol.<protocol_name> The output should look
      like: aaa-server server_group_name protocol protocol_name Example: Asa#sh run
      aaa-server | i protocol.tacacs+ aaa-server cisco_tacacs protocol tacacs+ Here
      the the protocol_name is tacacs+ and server_group_name is cisco_tacacs 40 | P
      a g e • Step 3: If an output is displayed, go to the step 4. If not, it is a
      finding and the remediation procedure should be applied. • Step 4: Perform the
      following to determine if there is at least an AAA server configured for the
      server group <server_group_name> identified in step 2 hostname#sh run aaa-
      server <server_group_name> | i host The output should look like: aaa-server
      server_group_name (interface_name) host server_ip_address Example: Asa#sh run
      aaa-server cisco_tacacs | i host aaa-server cisco_tacacs (MGMT) host
      192.16.0.223 Here the server_group_name is cisco_tacacs, the interface_name is
      MGMT and the server_ip_address is 192.168.0.223 • Step 5: If an output is
      displayed, the system is compliant. If not, it is a finding and the
      remediation procedure should be applied.
    remediation: >
      • Step 1: Acquire the enterprise standard protocol (protocol_name) for
      authentication (TACACS+ or RADIUS) • Step 2: Run the following to configure
      the AAA server-group for the required protocol hostname(config)#aaa-server
      <server-group_name> protocol <protocol_name> • Step 3: Run the following to
      configure the AAA server: hostname(config)#aaa-server <server-group_name>
      (<interface_name>) host <aaa- server_ip> <shared_key> server-group_name: the
      above server-group configured interface_name: the network interface from which
      the AAA server will be accessed 41 | P a g e aaa-server_ip: the IP address of
      the AAA server shared_key: the TACACS+ or RADIUS shared key Default Value: The
      AAA server configuraton is by default disabled References: 1.
      http://www.cisco.com/en/US/docs/security/asa/asa90/command/reference/a1.h
      tml#wp1596656 42 | P a g e 1.4.3 AAA authentication Defines the AAA
      authentication rules 43 | P a g e
    references: >
      1. http://www.cisco.com/en/US/docs/security/asa/asa90/command/reference/a1.h
      tml#wp1596656 42 | P a g e 1.4.3 AAA authentication Defines the AAA
      authentication rules 43 | P a g e
    impact: >
      
