  - rule_id: cisco_firewall.cis.1.ssh_source_restriction_is_set_to_an_authorized_ip
    title: "Ensure 'SSH source restriction' is set to an authorized IP address"
    severity: high
    category: networking
    tech_type: cisco_firewall
    automation_type: manual
    cis_benchmark: "CIS_CISCO_FIREWALL v4.1.0"
    cis_version: "v4.1.0"
    cis_control: "1.6.1"
    cis_section: "1"
    profile_applicability: "Level 1"
    description: >
      Determines the client IP addresses that are allowed to connect to the security
      appliance through SSH
    rationale: >
      One key element of securing the network is the security of management access
      to the infrastructure devices. It is critical to establish the appropriate
      controls in order to prevent unauthorized access to infrastructure devices.
      One of them is permitting only authorized originators to attempt device
      management access. This ensures that the processing of access requests is
      restricted to an authorized source IP address, thus reducing the risk of
      unauthorized access and the exposure to other attacks, such as brute force,
      dictionary, or DoS attacks.
    audit_procedure: >
      • Step 1: Run the following to verify if ssh access source restriction is
      enabled: hostname# sh run ssh | i ssh_[0-9]|[0-9]|[0-9] The output should look
      like ssh source_ip source_netmask interface_name Example: Asa#sh run ssh | i
      ssh_[0-9]|[0-9]|[0-9] ssh 192.168.0.0 255.255.255.0 mgmt Here the source_ip
      value is 192.168.0.0, the source_netmask 255.255.255.0 and the interface_name
      is mgmt 80 | P a g e • Step 2: If an output is displayed, the system is
      compliant. If not, it is a finding.
    remediation: >
      Run the following to enable SSH access source restriction hostname(config)#ssh
      <source_ip> <source_netmask> <interface_name> References: 1.
      http://www.cisco.com/c/en/us/td/docs/security/asa/asa91/configuration/genera
      l/asa_91_general_config/admin_management.html 81 | P a g e
