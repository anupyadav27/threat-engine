  - rule_id: cisco_firewall.cis.1.snmp_server_group_is_set_to_v3_priv
    title: "Ensure 'snmp-server group' is set to 'v3 priv'"
    severity: high
    category: networking
    tech_type: cisco_firewall
    automation_type: manual
    cis_benchmark: "CIS_CISCO_FIREWALL v4.1.0"
    cis_version: "v4.1.0"
    cis_control: "1.11.1"
    cis_section: "1"
    profile_applicability: "Level 1"
    description: >
      Sets the SNMP v3 group with authentication and privacy
    rationale: >
      SNMP Version 3 provides security enhancements that are not available in SNMP
      Version 1 or SNMP Version 2c. SNMP Versions 1 and 2c transmit data between the
      SNMP server and SNMP agent in clear text. SNMP Version 3 adds authentication
      and privacy options to secure protocol operations. For configuration purposes,
      the authentication and privacy options are grouped together into security
      models. Security models apply to users and groups, and are divided into the
      following three types: •NoAuthPriv—No Authentication and No Privacy, which
      means that no security is applied to messages. •AuthNoPriv—Authentication but
      No Privacy, which means that messages are authenticated.
      •AuthPriv—Authentication and Privacy, which means that messages are
      authenticated and encrypted. It is recommended that packets should be
      authenticated and encrypted
    audit_procedure: >
      • Step 1: Run the following to check if the SNMP group includes packet
      authentication and encryption hostname# sh run snmp-server group | i v3.priv
      The output should look like: 136 | P a g e snmp-server group <group_name> v3
      priv Example: sa# sh run snmp-server group | i v3.priv snmp-server group v3
      asagroup priv Here the SNMP v3 group name is asagroup. The keyword 'priv'
      ensures that the SNMP packets will be authenticated and encrypted • Step 2: If
      an output is displayed, the system is compliant. If not, there is a finding.
    remediation: >
      Run the following to configure the SNMP v3 group. hostname(config)# snmp-
      server group <group_name> v3 priv References: 1.
      http://www.cisco.com/c/en/us/td/docs/security/asa/asa90/configuration/guide/
      asa_90_cli_config/monitor_snmp.html#37189 137 | P a g e
    references: >
      1.
      http://www.cisco.com/c/en/us/td/docs/security/asa/asa90/configuration/guide/
      asa_90_cli_config/monitor_snmp.html#37189 137 | P a g e
    impact: >
      
    compliance_mappings:
      cis:
        - "CIS_CISCO_FIREWALL_v4_1_0_1_11_1"
      nist_800_53: []
      soc2: []
