rules:

  - rule_id: cisco_firewall.cis.1.logon_password_is_set
    title: "Ensure 'Logon Password' is set"
    severity: high
    category: networking
    tech_type: cisco_firewall
    automation_type: manual
    cis_benchmark: "CIS_CISCO_FIREWALL v4.1.0"
    cis_version: "v4.1.0"
    cis_control: "1.1.1"
    cis_section: "1"
    profile_applicability: "Level 1"
    description: >
      Changes the default login password.
    rationale: >
      The login password is used for Telnet and SSH connections. The default device
      configuration does not require any strong user authentication enabling
      unfettered access to an attacker that can reach the device. A user can enter
      the default password and just press the Enter key at the Password prompt to
      login to the device. Setting the login password causes the device to enforce
      use of a strong password to access user mode. Using default or well-known
      passwords makes it easier for an attacker to gain entry to a device.
    audit_procedure: >
      • Step 1: Run the following to determine whether the login password is set
      hostname# show running-config passwd The output should look like passwd xxxxxx
      encrypted Example: Asa#show running-config passwd passwd 8Ry2YjIyt7RRXU24
      encrypted Here 8Ry2YjIyt7RRXU24 is the encrypted format of the plain-text
      password used as login password • Step 2: If an output is displayed, the
      system is compliant. If not, it is a finding. 12 | P a g e
    remediation: >
      Run the following to set the login password. hostname(config)#passwd
      <login_password> The login_password parameter should be the plain-text
      password used to log into the system Default Value: The default password is
      'cisco'. References: 1.
      http://www.cisco.com/en/US/docs/security/asa/asa90/command/reference/p1.h
      tml#wp2130703 13 | P a g e
    references: >
      1. http://www.cisco.com/en/US/docs/security/asa/asa90/command/reference/p1.h
      tml#wp2130703 13 | P a g e
    impact: >
      
    compliance_mappings:
      cis:
        - "CIS_CISCO_FIREWALL_v4_1_0_1_1_1"
      nist_800_53: []
      soc2: []
      pci_dss: []
    source_unique_id: "cis_cisco_firewall_v4_1_0_1_1_1"
    metadata_source: generated
    generated_by: generate_tech_rules

  - rule_id: cisco_firewall.cis.1.enable_password_is_set
    title: "Ensure 'Enable Password' is set"
    severity: high
    category: networking
    tech_type: cisco_firewall
    automation_type: manual
    cis_benchmark: "CIS_CISCO_FIREWALL v4.1.0"
    cis_version: "v4.1.0"
    cis_control: "1.1.2"
    cis_section: "1"
    profile_applicability: "Level 1"
    description: >
      Sets the password for users accessing privileged EXEC mode when they run the
      enable command.
    rationale: >
      The default device configuration does not require any strong user
      authentication enabling unfettered access to an attacker that can reach the
      device. A user can enter the default password and just press the Enter key at
      the Password prompt to login to the device. Setting the enable password causes
      the device to enforce use of a strong password to access privileged EXEC mode.
      Using default or well-known passwords makes it easier for an attacker to gain
      entry to a device.
    audit_procedure: >
      • Step 1: Run the following to determine whether the login password is set
      hostname#show run enable The output should look like enable password xxxxxxx
      encrypted Example: Asa#show run enable enable password 8Ry2YjIyt7RRXU24
      encrypted Here 8Ry2YjIyt7RRXU24 is the encrypted format of the plain-text
      password used as enable password • Step 2: If an output is displayed, the
      system is compliant. If not, it is a finding. 14 | P a g e
    remediation: >
      Run the following to set the enable password. hostname(config)#enable password
      <enable_password> level <privilege_level> The enable_password parameter should
      be the plain-text password used to log into the enable mode If the privilege
      level is not configured, the default one is 15 Default Value: By default, the
      enable password is blank. References: 1.
      http://www.cisco.com/c/en/us/td/docs/security/asa/asa82/configuration/guide/
      config/basic.html 15 | P a g e
    references: >
      1.
      http://www.cisco.com/c/en/us/td/docs/security/asa/asa82/configuration/guide/
      config/basic.html 15 | P a g e
    impact: >
      
