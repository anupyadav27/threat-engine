      configured for the access to the enable mode (privileged EXEC mode) hostname#
      sh run | i aaa authentication enable console The output should look like aaa
      authentication enable console server_group_name Example: Asa#sh run | i aaa
      authentication enable console aaa authentication enable console cisco_tacacs
      Here the remote servers group name is cisco_tacacs • Step 2: If an output is
      displayed, the system is compliant. If not, it is a finding. 44 | P a g e
