      hostname#sh run logging | i host The output should look like: logging host
      interface_name host_ip_address Example: Asa#sh run logging | i host logging
      host mgmt 10.7.26.5 Here the interface name is mgmt, the Syslog server IP
      address is 10.7.26.5 • Step 2: If an output is displayed, the system is
      compliant. If not, there is a finding.
