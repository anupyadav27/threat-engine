      troubleshooting. Logging to a central syslog server is a method of collecting
      messages from devices to a server running a syslog daemon. This helps in
      aggregation of logs and alerts. This form of logging provides protected long-
      term storage for logs, since are also useful in incident handling.
    audit_procedure: >
