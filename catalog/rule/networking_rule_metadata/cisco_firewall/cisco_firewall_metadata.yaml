  - rule_id: cisco_firewall.cis.1.master_key_passphrase_is_set
    title: "Ensure 'Master Key Passphrase' is set"
    severity: high
    category: networking
    tech_type: cisco_firewall
    automation_type: manual
    cis_benchmark: "CIS_CISCO_FIREWALL v4.1.0"
    cis_version: "v4.1.0"
    cis_control: "1.1.3"
    cis_section: "1"
    profile_applicability: "Level 1"
    description: >
      Defines the master key passphrase used for to encrypt the application secret-
      keys contained in the configuration file for software releases from 8.3(1) and
      above.
    rationale: >
      For ASA software releases from 8.3 and below, the VPN preshared keys,
      Tacacs+/Radius shared keys or Routing protocols authentication passwords are
      encrypted in the running- configuration once generated. They can be viewed in
      plain-text when the file is transferred through TFTP or FTP to be stored out
      of the device. Therefore, if the stored file falls into the hands on an
      attacker, he/she will have all the passwords and application encryption keys.
      From version 8.3(1) and above, the master key passphrase helps to generate the
      AES encryption key used to encrypt secret-keys both in the running
      configuration and when the file is exported through TFTP or FTP to be stored
      in a different location. It improves the security because the master key is
      never displayed in the running- configuration.
    audit_procedure: >
      • Step 1: Run the following to find whether the software version of the
      security appliance is from 8.3(1) and above hostname# sh version | i
      Software_Version_8.[3-9] hostname# sh version | i Software_Version_9.[0-9]
      Example: asa-dmz# sh version | i Software_Version_8.[3-9] Cisco Adaptive
      Security Appliance Software Version 8.4(2) asa-dmz# sh version | i
      Software_Version_9.[0-9] In this example, the software version is 8.4(2 16 | P
      a g e Datacenter-fw-01# sh version | i Software_Version_8.[3-9] Datacenter-
      fw-01# sh version | i Software_Version_9.[0-9] Cisco Adaptive Security
      Appliance Software Version 9.5(2) <system> In this example, the software
      version is 9.5(2) • Step 2: If an output is displayed, go to the step 3. If
      not, the release is not from 8.3(1) and above and the recommendation is not
      applicable. • Step 3: Run the following to find whether the existing keys are
      type 6 encrypted hostname# sh run | in key.6 Example: cis-asa-1/admin# sh run
      | in key.6 key 6 'JDYkW0hEIquGiXMdznN2 Here the Tacacs+ key is encrypted using
      AES encryption and master key. If it was not the case, the key would be
      displayed with stars only as follows: key ****** • Step 4: If an output is
      displayed, the system is compliant, if not it is a finding.
    remediation: >
      • Step 1: Set the master key passphrase with the following command: hostname
      (config)# key config-key password-encryption <passphrase> The passphrase is
      between 8 and 128 characters long • Step 2: Enable the AES encryption of
      existing keys of the running-configuration hostname(config)# password
      encryption aes • Step 3: Run the following for the encryption of keys in the
      startup-configuration hostname(config)# write memory References: 1.
      http://www.cisco.com/c/en/us/td/docs/security/asa/asa83/configuration/guide/
      config/basic.html 17 | P a g e
    references: >
      1.
      http://www.cisco.com/c/en/us/td/docs/security/asa/asa83/configuration/guide/
      config/basic.html 17 | P a g e
    impact: >
      
    compliance_mappings:
      cis:
        - "CIS_CISCO_FIREWALL_v4_1_0_1_1_3"
      nist_800_53: []
      soc2: []
      pci_dss: []
    source_unique_id: "cis_cisco_firewall_v4_1_0_1_1_3"
    metadata_source: generated
    generated_by: generate_tech_rules

  - rule_id: cisco_firewall.cis.1.password_recovery_is_disabled
    title: "Ensure 'Password Recovery' is disabled"
    severity: high
    category: networking
    tech_type: cisco_firewall
    automation_type: manual
    cis_benchmark: "CIS_CISCO_FIREWALL v4.1.0"
    cis_version: "v4.1.0"
    cis_control: "1.1.4"
    cis_section: "1"
    profile_applicability: "Level 1"
    description: >
      Disables the password recovery
    rationale: >
      Disabling the password recovery is an additional physical control. It will
      prevent an attacker that will have circumvented all the physical safeguards
      and being in contact with the security appliance to change the existing login
      password, enable password and local user password and then hack the system.
    audit_procedure: >
      • Step 1: Run the following to determine if the password recovery has been
      disabled hostname#sh run | in no.service.password-recovery • Step 2: If an
      output is displayed, the system is compliant. If not, it is a finding.
    remediation: >
      Run the following to disable the password recovery: hostname (config)# no
      service password-recovery Default Value: The password recovery is enabled by
      default References: 1.
      http://www.cisco.com/c/en/us/td/docs/security/asa/asa84/configuration/guide/
      asa_84_cli_config/admin_trouble.html#wp1243707 18 | P a g e
    references: >
      1.
      http://www.cisco.com/c/en/us/td/docs/security/asa/asa84/configuration/guide/
      asa_84_cli_config/admin_trouble.html#wp1243707 18 | P a g e
    impact: >
      
    compliance_mappings:
      cis:
        - "CIS_CISCO_FIREWALL_v4_1_0_1_1_4"
      nist_800_53: []
      soc2: []
      pci_dss: []
    source_unique_id: "cis_cisco_firewall_v4_1_0_1_1_4"
