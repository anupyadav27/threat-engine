  - rule_id: cisco_firewall.cis.2.icmp_is_restricted_for_untrusted_interfaces
    title: "Ensure ICMP is restricted for untrusted interfaces"
    severity: high
    category: networking
    tech_type: cisco_firewall
    automation_type: manual
    cis_benchmark: "CIS_CISCO_FIREWALL v4.1.0"
    cis_version: "v4.1.0"
    cis_control: "2.5"
    cis_section: "2"
    profile_applicability: "Level 1"
    description: >
      Allows ICMP traffic for specific hosts or subnets and denies ICMP traffic for
      all other sources
    rationale: >
      ICMP is an important troubleshooting tool that can also be used to perform
      ICMP attacks on untrusted interfaces. For these interfaces, the ICMP traffic
      should be allowed only for specific hosts or subnets that are trusted by the
      Enterprise and should be denied for all other sources.
    audit_procedure: >
      • Step 1: Acquire the untrusted interface name <untrusted_interface_name> •
      Step 2: Run the following command to determine whether ICMP is denied on the
      interface hostname#sh run icmp | in deny.any.<untrusted_interface_name>
      Example: Corp-FW# sh run icmp | in deny.any.Outside icmp deny any Outside Here
      the untrusted interface name is Outside. • Step 3: If there is an output to
      this command that is displayed, the system is compliant. If not, it is a
      finding.
    remediation: >
      • Step 1: Acquire the untrusted interface name <untrusted_interface_name>, the
      trusted subnet and corresponding subnet mask 159 | P a g e • Step 2: Run the
      following command to allow ICMP from the trusted subnet to the untrusted
      interface. Repeat the command if there are more than one trusted subnets
      identified. hostname(config)# icmp permit <subnet> <mask>
      <untrusted_interface_name> • Step 3: Run the following command to deny ICMP
      from all other sources to the untrusted interface. hostname(config)# icmp deny
      any<untrusted_interface_name> Default Value: ICMP is enabled by default.
      References: 1.
      http://www.cisco.com/c/en/us/td/docs/security/asa/asa82/command/reference
      /cmd_ref/i1.html 160 | P a g e 3 Data Plane The data plane is for services and
      settings related to the data passing through the security appliance (as
