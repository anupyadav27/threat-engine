  - rule_id: cisco_firewall.cis.1.rsa_key_pair_is_greater_than_or_equal_to_2048_bits
    title: "Ensure 'RSA key pair' is greater than or equal to 2048 bits"
    severity: high
    category: networking
    tech_type: cisco_firewall
    automation_type: manual
    cis_benchmark: "CIS_CISCO_FIREWALL v4.1.0"
    cis_version: "v4.1.0"
    cis_control: "1.6.3"
    cis_section: "1"
    profile_applicability: "Level 1"
    description: >
      Generates an RSA key pair used by SSH protocol of at least 2048 bits
    rationale: >
      Secure Shell (SSH) is a secure remote-login protocol. The ASA allows SSH
      connections to the ASA for management purposes and supports the SSH DES and
      3DES ciphers. SSH uses a key-exchange method based on Rivest-Shamir-Adleman
      (RSA) public-key. Since RSA 1024- bit keys are likely to become crackable, it
      is recommended to have RSA keys of at least 2048 bits.
    audit_procedure: >
      • Step 1: Run the following to determine whether the RSA key modulus size is
      equal or greater than 2048 bits. hostname#sh crypto key mypubkey rsa | i
      _Modulus_Size_.bits.._[2-9][0-9][0- 9][0-9] Ths is an example of output where
      the key pair modulus size is 2048 bits: Asa# sh crypto key mypubkey rsa | i
      _Modulus_Size_.bits.._[2-9][0-9][0-9][0- 9] Modulus Size (bits): 2048 • Step
      2: If this output is not displayed, either there is no key configured, either
      the available modulus size is less than 2048 bits. The system is not
      compliant. If is a finding. • Step 3: Run the following to check if there is
      already an existing RSA key pair: hostname# sh crypto key mypubkey rsa | i
      ^Key|^_Usage|^_Modulus The example below shows that there are already created
      RSA key pairs but they are not compliant, since one is 1024 bits and the other
      768 bits. Asa# sh crypto key mypubkey rsa | i ^Key|^_Usage|^_Modulus 84 | P a
      g e Key pair was generated at: 13:54:47 UTC Sep 14 2008 Key name: <Default-
      RSA-Key> Usage: General Purpose Key Modulus Size (bits): 1024 Key pair was
      generated at: 06:43:39 UTC Mar 2 2003 Key name: <Default-RSA-Key>.server
      Usage: Encryption Key Modulus Size (bits): 768
    remediation: >
      • Step 1: Acquire the enterprise standard RSA key size greater or equal than
      2048 bits • Step 2: If the audit procedure revealed existing non-compliant key
      pairs, run the following to remove them: hostname(config)#crypto key zeroize
      rsa • Step 3: Run the following to generate compliant RSA key pair:
      hostname(config)# crypto key generate rsa modulus <enterprise_RSA_key_size> •
      Step 4: Run the following to save the RSA keys to persistent Flash memory
      hostname(config)#write memory References: 1.
      http://www.cisco.com/c/en/us/td/docs/security/asa/asa91/configuration/genera
      l/asa_91_general_config/admin_management.html 85 | P a g e
    references: >
      1.
      http://www.cisco.com/c/en/us/td/docs/security/asa/asa91/configuration/genera
      l/asa_91_general_config/admin_management.html 85 | P a g e
    impact: >
      
    compliance_mappings:
      cis:
        - "CIS_CISCO_FIREWALL_v4_1_0_1_6_3"
      nist_800_53: []
      soc2: []
      pci_dss: []
    source_unique_id: "cis_cisco_firewall_v4_1_0_1_6_3"
    metadata_source: generated
    generated_by: generate_tech_rules

