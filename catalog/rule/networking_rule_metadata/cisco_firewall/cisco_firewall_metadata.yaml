  - rule_id: cisco_firewall.cis.2.dhcp_services_are_disabled_for_untrusted
    title: "Ensure DHCP services are disabled for untrusted interfaces"
    severity: high
    category: networking
    tech_type: cisco_firewall
    automation_type: manual
    cis_benchmark: "CIS_CISCO_FIREWALL v4.1.0"
    cis_version: "v4.1.0"
    cis_control: "2.4"
    cis_section: "2"
    profile_applicability: "Level 1"
    description: >
      Disables the DHCP service
    rationale: >
      The ASA can act as a DHCP or DHCP Relay server. However, on untrusted
      interface, attacker can get the opportunity of the availability of the service
      to perform DoS attacks such as DHCP starvation that will exhaust not only the
      IP addresses' space but also the memory and CPU resources of the security
      appliance and bring it down.
    audit_procedure: >
      • Step 1: Acquire the name of the untrusted interface
      <untrusted_interface_name> • Step 2: Run the following command to check if the
      DHCP service is enabled on the untrusted interface hostname# sh run | in
      dhcpd.enable.<untrusted_interface_name> Example: Extrnl-FW# sh run | in
      dhcpd.enable.outside dhcpd enable outside Here outside is the name of the
      untrusted interface. • Step 3: If there is no output displayed, go to the step
      4. If not, it is a finding and the remediation procedure should be applied. •
      Step 4: Run the following command to check if the DHCP Relay service is
      enabled on the untrusted interface hostname# sh run | in
      dhcprelay.enable.<untrusted_interface_name> Example: 157 | P a g e Extrnl-FW#
      sh run | in dhcprelay.enable.outside dhcprelay enable outside • Step 5: If
      there is no output displayed, the system is compliant. If not, it is a finding
      and the remediation procedure should be applied.
    remediation: >
      • Step 1: Acquire the name of the untrusted interface
      <untrusted_interface_name> • Step 2: Run the following command to disable DHCP
      service on the untrusted interface hostname(config)# no dhcpd enable
      <untrusted_interface_name> • Step 3: Run the following command to disable DHCP
      Relay service on the untrusted interface hostname(config)# no dhcprelay enable
      <untrusted_interface_name> Default Value: Disabled by default References: 1.
      http://www.cisco.com/c/en/us/td/docs/security/asa/asa90/configuration/guide/
      asa_90_cli_config/basic_dhcp.html 158 | P a g e
    references: >
