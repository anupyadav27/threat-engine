  - rule_id: cisco_firewall.cis.1.snmp_server_user_is_set_to_v3_auth_sha
    title: "Ensure 'snmp-server user' is set to 'v3 auth SHA'"
    severity: high
    category: networking
    tech_type: cisco_firewall
    automation_type: manual
    cis_benchmark: "CIS_CISCO_FIREWALL v4.1.0"
    cis_version: "v4.1.0"
    cis_control: "1.11.2"
    cis_section: "1"
    profile_applicability: "Level 1"
    description: >
      Sets the SNMP v3 user with SHA authentication and AES-256 encryption
    rationale: >
      SNMP users have a specified username, a group to which the user belongs,
      authentication password, encryption password, and authentication and
      encryption algorithms to use. The authentication algorithm options are MD5 and
      SHA. The encryption algorithm options are DES, 3DES, and AES (which is
      available in 128, 192, and 256 versions). It is recommended to use SHA
      algorithm for authentication and AES-256 for encryption
    audit_procedure: >
      • Step 1: Run the following to check if there is an SNMP v3 user with SHA
      authentication hostname#sh run snmp-server user | i auth.SHA The output should
      look like: snmp-server user snmp_user group-name v3 auth SHA
      authentication_password priv AES 256 encryption_password Example: sa#sh run
      snmp-server user | i auth.SHA snmp-server user asauser asagroup v3 auth SHA
      xxxxxxx priv AES 256 yyyyyyyyy Here the SNMP v3 user is asauser in the group
      asagroup. The authentication algorithm is SHA and xxxxxxx is the
      authentication password. • Step 2: If an output is displayed, go to the step
      3. If not, there is a finding. The remediation procedure should be applied 138
      | P a g e • Step 3: Acquire the SNMP username identified in step 1 configured
      for SHA authentication • Step 4: Run the following to check that the
      identified user is also configured for AES- 256 encryption hostname#sh run
      snmp-server user | i priv.AES.256 The output should look like: snmp-server
      user snmp_user group-name v3 auth SHA authentication_password priv AES 256
      encryption_password Example: Asa#sh run snmp-server user | i priv.AES.256
      snmp-server user asauser asagroup v3 auth SHA xxxxxxx priv AES 256 yyyyyyyyy
      Here, for the SNMP v3 user 'asauser', the encryption algorithm is AES-256 and
      yyyyyyyyy is the encryption password. • Step 5: If an output is displayed, the
      system is compliant. If not, there is a finding. The remediation procedure
      should be applied
    remediation: >
      Run the following: hostname(config)#snmp-server user <snmp_username> <group-
      name> v3 auth SHA <authentication_password> priv AES 256 <encryption_password>
      References: 1.
      http://www.cisco.com/c/en/us/td/docs/security/asa/asa90/configuration/guide/
      asa_90_cli_config/monitor_snmp.html#56907 139 | P a g e
