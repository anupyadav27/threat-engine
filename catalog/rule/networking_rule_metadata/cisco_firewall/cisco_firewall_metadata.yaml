  - rule_id: cisco_firewall.cis.1.aaa_command_accounting_is_configured_correctly
    title: "Ensure 'aaa command accounting' is configured correctly"
    severity: high
    category: networking
    tech_type: cisco_firewall
    automation_type: manual
    cis_benchmark: "CIS_CISCO_FIREWALL v4.1.0"
    cis_version: "v4.1.0"
    cis_control: "1.4.5.1"
    cis_section: "1"
    profile_applicability: "Level 1"
    description: >
      Enables accounting of administrative access by specifying that each command,
      or commands of a specified privilege level or higher, entered by an
      administrator/user is recorded and sent to the accounting server or servers.
    rationale: >
      The AAA accounting feature enables to track the actions performed by users and
      to store the data collected into AAA serves for further audit or further
      analysis. While the aaa accounting serial, ssh, telnet and enable commands
      collect and sent the accounting records related to the start and end of
      sessions done on each access type, the aaa accounting command provides the
      accounting records related to each command entered by the users during the
      session and whatever the privilege level of the user.
    audit_procedure: >
      • Step 1: Perform the following to determine if command accounting is enabled.
      hostname#sh run aaa accounting | in command The output should look like aaa
      accounting command server_group_name Example: Asa#sh run aaa accounting | in
      command aaa accounting command cisco_tacacs Here the remote servers group name
      is cisco_tacacs • Step 2: If an output is displayed, the system is compliant.
      If not, it is a finding 62 | P a g e
    remediation: >
      Run the following in order to record all the commands entered at all the
      privilege levels and to send them to the AAA servers hostname(config)# aaa
      accounting command <server-group_name> Default Value: By default, AAA
      accounting for administrative access is disabled. References: 1.
      http://www.cisco.com/c/en/us/td/docs/security/asa/asa-command-reference/A-
      H/cmdref1/a1.html#pgfId-1593580 63 | P a g e
    references: >
      1. http://www.cisco.com/c/en/us/td/docs/security/asa/asa-command-reference/A-
      H/cmdref1/a1.html#pgfId-1593580 63 | P a g e
    impact: >
      
    compliance_mappings:
      cis:
        - "CIS_CISCO_FIREWALL_v4_1_0_1_4_5_1"
      nist_800_53: []
      soc2: []
      pci_dss: []
    source_unique_id: "cis_cisco_firewall_v4_1_0_1_4_5_1"
