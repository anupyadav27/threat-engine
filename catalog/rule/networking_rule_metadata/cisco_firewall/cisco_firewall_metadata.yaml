  - rule_id: cisco_firewall.cis.3.intrusion_prevention_is_enabled_for_untrusted
    title: "Ensure intrusion prevention is enabled for untrusted interfaces"
    severity: high
    category: networking
    tech_type: cisco_firewall
    automation_type: manual
    cis_benchmark: "CIS_CISCO_FIREWALL v4.1.0"
    cis_version: "v4.1.0"
    cis_control: "3.2"
    cis_section: "3"
    profile_applicability: "Level 1"
    description: >
      Enables the intrusion prevention with the IP audit feature on untrusted
      interfaces
    rationale: >
      The intrusion prevention is an additional feature for which the security
      appliance audits the traffic in order to identify vulnerability exploits. This
      is achieved because specific signatures are matched in the traffic. There are
      two types of signatures, attack signature for which the traffic is intended to
      harm the internal resource and informational signature for which the traffic
      is to gather information on internal resources through port scans, ping
      sweeps, DNS zone transfers and many others. The possible actions to prevent
      the intrusion are to drop the traffic, to reset the connection or to send an
      alarm.
    audit_procedure: >
      • Step 1: Acquire the name of the untrusted interface <interface_name> • Step
      2: Run the following to determine if there is a configured audit policy to
      prevent against attack signatures hostname# sh run ip audit name | in _attack_
      Example: Asa-fw# sh run ip audit name | in _attack_ ip audit name ips-fw
      attack action alarm reset Here the audit policy name is ips-fw • Step 3: If
      there is an output displayed, collect the audit policy name <audit_name> and
      go to Step 4. If there is no output, the system is not compliant. It is a
      finding. The remediation procedure should be applied. • Step 4: Run the
      following to determine if the identified audit policy is enabled on the
      untrusted interface 164 | P a g e hostname#sh run ip audit interface
      <interface_name> | in <audit_name> Example: Asa-fw# sh run ip audit interface
      outside | in ips-fw ip audit interface outside ips-fw Here, the audit policy
      ips-fw is applied to the untrusted interface named outside • Step 5: If there
      is an output, the system is compliant. If not, it is a finding.
    remediation: >
      • Step 1: Acquire the Enterprise standard action <prevention_action> to be
      performed when an attack signature is matched. It is to be chosen between
      'drop' (The packet is dropped) and 'reset' (The packet is dropped and the
      connection closed) • Step 2: Run the following to enable the audit policy
      against the attack signatures with the Enterprise standard action
      hostname(config)# ip audit name <audit_name> attack action alarm
      <prevention_action> • Step 3: Identify the untrusted interface
      <interface_name> • Step 4: Run the following to enable the intrusion
      prevention on the untrusted interface hostname(config)# ip audit interface
      <interface_name> <audit_name> Default Value: Disabled References: 1.
      http://www.cisco.com/en/US/docs/security/asa/asa90/command/reference/i3.ht
      ml#wp1913566 165 | P a g e
    references: >
