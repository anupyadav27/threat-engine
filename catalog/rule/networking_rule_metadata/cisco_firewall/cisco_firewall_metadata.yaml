  - rule_id: cisco_firewall.cis.1.local_username_and_password_is_set
    title: "Ensure 'local username and password' is set"
    severity: high
    category: networking
    tech_type: cisco_firewall
    automation_type: manual
    cis_benchmark: "CIS_CISCO_FIREWALL v4.1.0"
    cis_version: "v4.1.0"
    cis_control: "1.4.1.2"
    cis_section: "1"
    profile_applicability: "Level 1"
    description: >
      Sets a local username and password
    rationale: >
      Default device configuration does not require strong user authentication
      enabling unfettered access to an attacker that can reach the device. Creating
      a local account with a strong password enforces login authentication and
      provides a fallback authentication mechanism in case remote centralized
      authentication, authorization and accounting services are unavailable
    audit_procedure: >
      • Step 1: Run the following to determine whether a local username password is
      set hostname#show running-config username The output should look like username
      <username> password xxxxxxx encrypted Example: Asa#show running-config
      username username cisuser password 3USUcOPFUiMCO4Jk encrypted Here the
      username is cisuser and 3USUcOPFUiMCO4Jk is the encrypted format of the plain-
      text password that has been configured • Step 2: If an output is displayed,
      the system is compliant. If not, it is a finding.
    remediation: >
      Run the following to set a local username and password. 36 | P a g e
      hostname(config)#username <local_username> password <local_password> privilege
      <level> The privilege level is chosen between 0 and 15. If the privilege is
      not configured, the default one is 2. Default Value: The default username used
      for the first SSH connection or aaa authentication telnet console is asa but
      for versions from 8.4(2) and above, there is no default username References:
      1.
      http://www.cisco.com/c/en/us/td/docs/security/asa/asa91/configuration/genera
      l/asa_91_general_config/aaa_local.html 37 | P a g e
    references: >
      1.
      http://www.cisco.com/c/en/us/td/docs/security/asa/asa91/configuration/genera
      l/asa_91_general_config/aaa_local.html 37 | P a g e
    impact: >
      
