  - rule_id: cisco_firewall.cis.1.local_timezone_is_properly_configured
    title: "Ensure 'local timezone' is properly configured"
    severity: high
    category: networking
    tech_type: cisco_firewall
    automation_type: manual
    cis_benchmark: "CIS_CISCO_FIREWALL v4.1.0"
    cis_version: "v4.1.0"
    cis_control: "1.9.2"
    cis_section: "1"
    profile_applicability: "Level 1"
    description: >
      Sets the local time zone information so that the time displayed by the ASA is
      more relevant to those who are viewing it.
    rationale: >
      Having a correct time set on a Cisco ASA is important for two main reasons.
      The first reason is that digital certificates compare this time to the range
      defined by their Valid From and Valid To fields to define a specific validity
      period. The second reason is to have a relevant time stamps when logging
      information. Whether you are sending messages to a syslog server, sending
      messages to an SNMP monitoring station, or performing packet captures, time
      stamps have little usefulness if you cannot be certain of their accuracy.
    audit_procedure: >
      • Step 1: Acquire standard zone name (enterprise_zone_name) used by the
      enterprise (GMT, UTC, EDT, PST) • Step 2: Run the following to check if the
      required value is configured hostname#sh run clock | in <enterprise_zone_name>
      The output should look like clock timezone enterprise_zone_name local_offset
      Example: Asa# sh run clock | in EDT clock timezone EDT 1 Here the
      enterprise_zone_name is EDT and the local_offset is 1 • Step 3: If an output
      is displayed, the system is compliant. If not, there is a finding. 108 | P a g
      e
    remediation: >
      • Step 1: Acquire standard zone name (enterprise_zone_name) used by the
      enterprise (GMT, UTC, EDT, PST) • Step 2: Run the following to configure the
      required value hostname(config)# clock timezone <enterprise_zone_name>
      <local_offset> Default Value: By default, the time zone is UTC References: 1.
      http://www.cisco.com/c/en/us/td/docs/security/asa/asa82/configuration/guide/
      config/basic.html#wp1071217 109 | P a g e 1.10 Logging Rules Rules in the
      logging class enforce controls that provide a record of system activity and
      events. 110 | P a g e
    references: >
      1.
      http://www.cisco.com/c/en/us/td/docs/security/asa/asa82/configuration/guide/
      config/basic.html#wp1071217 109 | P a g e 1.10 Logging Rules Rules in the
      logging class enforce controls that provide a record of system activity and
      events. 110 | P a g e
    impact: >
      
    compliance_mappings:
      cis:
        - "CIS_CISCO_FIREWALL_v4_1_0_1_9_2"
      nist_800_53: []
      soc2: []
