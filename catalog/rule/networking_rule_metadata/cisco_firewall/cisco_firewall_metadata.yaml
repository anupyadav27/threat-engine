  - rule_id: cisco_firewall.cis.2.noproxyarp_is_enabled_for_untrusted_interfaces
    title: "Ensure 'noproxyarp' is enabled for untrusted interfaces"
    severity: high
    category: networking
    tech_type: cisco_firewall
    automation_type: manual
    cis_benchmark: "CIS_CISCO_FIREWALL v4.1.0"
    cis_version: "v4.1.0"
    cis_control: "2.2"
    cis_section: "2"
    profile_applicability: "Level 1"
    description: >
      Disables the Proxy-ARP function on untrusted interfaces
    rationale: >
      The ASA replies to ARP requests performed to IP addresses belonging to its
      interfaces' subnets and also to global IP addresses in some NAT
      configurations. Where the appliance is not asked to be a proxy for ARP
      requests, the Proxy-ARP function should be disabled especially on untrusted
      interfaces since attackers can act as legitimate devices by spoofing their IP
      addresses, perform ARP requests thus receiving packets intended to them.
    audit_procedure: >
      • Step 1: Acquire the name of the untrusted interface
      <untrusted_interface_name> • Step 2: Run the following to check whether the
      Proxy-ARP is disabled on the interface hostname# sh run sysopt | grep
      proxyarp.<untrusted_interface_name> Example: asa_fw_1# sh run sysopt | grep
      proxyarp.DMZ sysopt noproxyarp DMZ Here the untrusted interface name is DMZ •
      Step 3: If an output is displayed, the system is compliant. If not, it is a
      finding.
    remediation: >
      • Step 1: Acquire the name of the untrusted interface
      <untrusted_interface_name> • Step 2: Run the following command to disable the
      Proxy-ARP on the untrusted interface. 153 | P a g e hostname(config)# sysopt
      noproxyarp <untrusted_interface_name> Default Value: Proxy-ARP is enabled by
      default References: 1.
      https://supportforums.cisco.com/discussion/9867551/sysopt-noproxyarp 154 | P a
      g e
    references: >
      1. https://supportforums.cisco.com/discussion/9867551/sysopt-noproxyarp 154 |
      P a g e
