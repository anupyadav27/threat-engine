      abraxas Organization Unit : ASAv Organization Name : CiscoSystems Certificate
      Serial Number : 565963AF Hash Algorithm : SHA2 512 Signature Algorithm :
      2048-bit RSA Key Version : A Asa-fw# show software authenticity running | in
      CiscoSystems$ Organization Name : CiscoSystems • Step 2: If an output is
      displayed, the image is sourced from Cisco. The system is compliant. If there
      is no output displayed, the image is not from a trusted source. It is a
      finding. 31 | P a g e
    remediation: >
      • Step 1: Correct the errors on the hardware and software • Step 2: Run the
      audit procedure until the system is compliant • Step 3: Implement secure
      delivery of hardware and harden the software distribution server References:
