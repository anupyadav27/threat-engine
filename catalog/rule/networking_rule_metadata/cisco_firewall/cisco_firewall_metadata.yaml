  - rule_id: cisco_firewall.cis.3.java_applet_filtering_is_enabled
    title: "Ensure Java applet filtering is enabled"
    severity: high
    category: networking
    tech_type: cisco_firewall
    automation_type: manual
    cis_benchmark: "CIS_CISCO_FIREWALL v4.1.0"
