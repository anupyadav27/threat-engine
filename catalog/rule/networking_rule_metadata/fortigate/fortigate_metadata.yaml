  - rule_id: fortigate.cis.2.default_admin_ports_are_changed
    title: "Ensure default Admin ports are changed"
    severity: high
    category: networking
    tech_type: fortigate
    automation_type: manual
    cis_benchmark: "CIS_FORTIGATE 7.0.x_v1.3.0"
    cis_version: "7.0.x_v1.3.0"
    cis_control: "2.4.7"
    cis_section: "2"
    profile_applicability: "Level 1"
    description: >
      FortiGate admin ports listen on the common ports of 80 and 443. This is
      default behavior. While interface access is controlled by configuring network
      interfaces, the FortiGate still listens on the admin ports that have been
      configured, which can also cause a conflict should 80 or 443 be needed as part
      of additional configuration later on.
    rationale: >
      To increase security of the FortiGate Admin Ports, changing it from the
      default ports will reduce the attack surface should FortiGate Admin Access be
      targeted. As mentioned, a possible port conflict can also be avoided. Impact:
      Unauthorized access to a FortiGate or any firewall could prove very costly.
      While this is a single hardening step of many, it is an important one when
      hardening any firewall.
    audit_procedure: >
      Log in to the GUI and click on System > Settings > Review the ports under
      'Administration Settings' section.
    remediation: >
      config system global set admin-https-redirect disable set admin-port 8082
      **(or any other uncommon port)** set admin-server-cert 'self-sign' set admin-
      sport 4343 **(or any other uncommon port)** end OR From Web GUI: 1. System >
      Settings 2. Change the ports/settings under 'Administration Settings' section.
      NOTE: https redirection must be turned off as well as changing port 80. This
      is due to the nature of how browser port redirection works. The browser will
      be redirected from port 80 to port 443 or whichever 'admin-sport' is
      configured, meaning that it will still listen on port 80 even when the port
      has been reconfigured. Default Value: config system global set admin-https-
      redirect enable set admin-port 80 set admin-server-cert 'self-sign' set admin-
      sport 443 References: 1.
      https://docs.fortinet.com/document/fortigate/7.2.4/administration-
      guide/616955/configuring-ports 2.
      https://community.fortinet.com/t5/FortiGate/Technical-Tip-How-to-change-the-
      port-for-the-admin-access-to/ta-p/192295?externalID=FD46981 Additional
      Information: TIP: Don't choose these ports: 8080/8081 - These are very common
      browser proxy ports. 4433 - This is the FortiGate default FTM push port. 10443
      - This is the FortiGate default SSL VPN port. Other Admin Ports such as 22 and
      23 can also be changed as required.
    references: >
      1. https://docs.fortinet.com/document/fortigate/7.2.4/administration-
      guide/616955/configuring-ports 2.
      https://community.fortinet.com/t5/FortiGate/Technical-Tip-How-to-change-the-
      port-for-the-admin-access-to/ta-p/192295?externalID=FD46981 Additional
      Information: TIP: Don't choose these ports: 8080/8081 - These are very common
      browser proxy ports. 4433 - This is the FortiGate default FTM push port. 10443
      - This is the FortiGate default SSL VPN port. Other Admin Ports such as 22 and
      23 can also be changed as required.
    impact: >
      Unauthorized access to a FortiGate or any firewall could prove very costly.
      While this is a single hardening step of many, it is an important one when
      hardening any firewall.
    compliance_mappings:
      cis:
        - "CIS_FORTIGATE_7_0_x_v1_3_0_2_4_7"
      nist_800_53: []
      soc2: []
      pci_dss: []
