  - rule_id: fortigate.cis.2.apply_local_in_policies
    title: "Apply Local-in Policies"
    severity: high
    category: networking
    tech_type: fortigate
    automation_type: manual
    cis_benchmark: "CIS_FORTIGATE v1.1.0"
    cis_version: "v1.1.0"
    cis_control: "2.4.6"
    cis_section: "2"
    profile_applicability: "Level 1"
    description: >
      Configure Local-in Policies to control inbound traffic that is destined to a
      FortiGate interface.
    rationale: >
      Local-in Policies allow for more granular and specific control of all types of
      traffic that are destined for a FortiGate interface. They are not limited to
      management only protocols so they can extend past 'trusted host'
      configurations and can be configured with source and destination addresses as
      well as services specifically. Impact: Local-in Policies are processed before
      'trusted host' configurations so it is important to validate that management
      access will be maintained once the Local-in policies are put in place.
    audit_procedure: >
      To review Local-in Policies you can enable the feature to see them in the GUI
      by going to System > Feature Visibility and turning on 'Local-in policies'
      under the Additional Features Section. This will then add the section under
      'Policies and Objects' there will now be a section for 'Local-in Policies' It
      can also be viewed through the CLI: config firewall local-in-policy show
    remediation: >
      Local-in Policies can only be configured through the CLI: config firewall
      {local-in-policy | local-in-policy6} edit <policy_number> set intf <interface>
      set srcaddr <source_address> [source_address] ... set dstaddr
      <destination_address> [destination_address] ... set action {accept | deny} set
      service <service_name> [service_name] ... set schedule <schedule_name> set
      comments <string> next end For example, to prevent the source subnet
      10.10.10.0/24 from pinging port1, but allow administrative access for PING on
      port1: config firewall address edit '10.10.10.0' set subnet 10.10.10.0
      255.255.255.0 next end config firewall local-in-policy edit 1 set intf 'port1'
      set srcaddr '10.10.10.0' set dstaddr 'all' set service 'PING' set schedule
      'always' next end Default Value: There are no Local-in Policies in place by
      default 2.5 High Availability High Availability (HA) subsection includes
      configurations for High Availability between FortiGate devices
    references: >
      
    impact: >
      Local-in Policies are processed before 'trusted host' configurations so it is
      important to validate that management access will be maintained once the
      Local-in policies are put in place.
    compliance_mappings:
      cis:
        - "CIS_FORTIGATE_v1_1_0_2_4_6"
      nist_800_53: []
      soc2: []
      pci_dss: []
