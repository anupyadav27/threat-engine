    generated_by: generate_tech_rules

  - rule_id: fortigate.cis.2.pre_login_banner_is_set
    title: "Ensure 'Pre-Login Banner' is set"
    severity: high
    category: networking
    tech_type: fortigate
    automation_type: automated
    cis_benchmark: "CIS_FORTIGATE v1.1.0"
    cis_version: "v1.1.0"
    cis_control: "2.1.1"
    cis_section: "2"
    profile_applicability: "Level 1"
    description: >
      Configure a pre-login banner, ideally approved by the organization’s legal
      team. This banner should, at minimum, prohibit unauthorized access, provide
      notice of logging or monitoring, and avoid using the word “welcome” or similar
      words of invitation.
    rationale: >
      Through a properly stated login banner, the risk of unintentional access to
      the device by unauthorized users is reduced. Should legal action take place
      against a person accessing the device without authorization, the login banner
      greatly diminishes a defendant’s claim of ignorance. Impact: Login banners
      provide a definitive warning to any possible intruders that may want to access
      the FortiGate that certain types of activity are illegal, but at the same
      time, it also advises the authorized and legitimate users of their obligations
      relating to acceptable use.
    audit_procedure: >
      Run the following command in the CLI to verify the pre-login-banner is
      enabled: FG1 # get system global ... pre-login-banner : enable ... end In the
      GUI, to verify the content of the pre-login disclaimer message: 1) go to
      'System' -> 'Replacement Messages' 2) from the top right side, select
      'Extended View' 3) find 'Pre-login Disclaimer Message'
    remediation: >
      Run the following command in the CLI to enable the pre-login-banner: FG1 #
      config system global FG1 (global) # set pre-login-banner enable FG1 (global) #
      end FG1 # In the GUI, to edit the content of the pre-login disclaimer message:
      1. go to 'System' -> 'Replacement Messages' -> 'Extended View' -> 'Pre-login
      Disclaimer Message'. The edit screen is on the bottom right corner of the
      page. Click on 'Save' after the editing is done. Default Value: the 'Pre-Login
      Banner' is disabled by default FG1 # config system global FG1 (global) # show
      config system global ... set pre-login-banner disable ... end the warning
      message default value is as follows: PRE WARNING: This is a private computer
      system. Unauthorized access or use is prohibited and subject to prosecution
      and/or disciplinary action. All use of this system constitutes consent to
      monitoring at all times and users are not entitled to any expectation of
      privacy. If monitoring reveals possible evidence of violation of criminal
      statutes, this evidence and any other related information, including
      identification information about the user, may be provided to law enforcement
      officials. If monitoring reveals violations of security regulations or
      unauthorized use, employees who violate security regulations or make
      unauthorized use of this system are subject to appropriate disciplinary
      action. References: 1.
      https://kb.fortinet.com/kb/documentLink.do?externalID=FD33887
    references: >
      1. https://kb.fortinet.com/kb/documentLink.do?externalID=FD33887
    impact: >
      Login banners provide a definitive warning to any possible intruders that may
      want to access the FortiGate that certain types of activity are illegal, but
      at the same time, it also advises the authorized and legitimate users of their
      obligations relating to acceptable use.
    compliance_mappings:
      cis:
        - "CIS_FORTIGATE_v1_1_0_2_1_1"
      nist_800_53: []
      soc2: []
      pci_dss: []
    source_unique_id: "cis_fortigate_v1_1_0_2_1_1"
    metadata_source: generated
    generated_by: generate_tech_rules

  - rule_id: fortigate.cis.2.post_login_banner_is_set
    title: "Ensure 'Post-Login-Banner' is set"
    severity: high
    category: networking
    tech_type: fortigate
    automation_type: automated
    cis_benchmark: "CIS_FORTIGATE v1.1.0"
    cis_version: "v1.1.0"
    cis_control: "2.1.2"
    cis_section: "2"
    profile_applicability: "Level 1"
    description: >
      Sets the banner after users successfully login. This is equivalent to Message
      of the Day (MOTD) in some other systems.
    rationale: >
      Network banners are electronic messages that provide notice of legal rights to
      users of computer networks. From a legal standpoint, banners have four primary
      functions. First, banners may be used to generate consent to real-time
      monitoring under Title III. Second, banners may be used to generate consent to
      the retrieval of stored files and records pursuant to ECPA. Third, in the case
      of government networks, banners may eliminate any Fourth Amendment 'reasonable
      expectation of privacy' that government employees or other users might
      otherwise retain in their use of the government's network under O'Connor v.
      Impact: When post-login banner is enabled, some automated-script might be
      affected because both CLI and GUI need an acceptance action (press 'A' or
      'Accept') to continue.
    audit_procedure: >
      Run the following command in the CLI to verify the post-login-banner is
      enabled: FG1 # get system global ... post-login-banner : enable ... In the
      GUI, to verify the content of the post-login disclaimer message: 1) go to
      'System' -> 'Replacement Messages' 2) from the top right side, select
      'Extended View' 3) find 'Post-login Disclaimer Message'
    remediation: >
      Run the following command in the CLI to enable the post-login-banner: FG1 #
      config system global FG1 (global) # set post-login-banner enable FG1 (global)
      # end FG1 # In the GUI, to edit the content of the post-login disclaimer
      message, go to System -> Replace Messages -> Extended View -> 'Post-login
      Disclaimer Message'. The edit screen is on the bottom right corner of the
      page. Click on 'Save' after the editing is done. Default Value: POST WARNING:
      This is a private computer system. Unauthorized access or use is prohibited
      and subject to prosecution and/or disciplinary action. All use of this system
      constitutes consent to monitoring at all times and users are not entitled to
      any expectation of privacy. If monitoring reveals possible evidence of
      violation of criminal statutes, this evidence and any other related
      information, including identification information about the user, may be
      provided to law enforcement officials. If monitoring reveals violations of
      security regulations or unauthorized use, employees who violate security
      regulations or make unauthorized use of this system are subject to appropriate
      disciplinary action. %%LAST_SUCCESSFUL_LOGIN%% %%LAST_FAILED_LOGIN%%
      References: 1. https://kb.fortinet.com/kb/documentLink.do?externalID=FD33887
    references: >
      1. https://kb.fortinet.com/kb/documentLink.do?externalID=FD33887
    impact: >
      When post-login banner is enabled, some automated-script might be affected
      because both CLI and GUI need an acceptance action (press 'A' or 'Accept') to
      continue.
    compliance_mappings:
      cis:
        - "CIS_FORTIGATE_v1_1_0_2_1_2"
      nist_800_53: []
      soc2: []
      pci_dss: []
    source_unique_id: "cis_fortigate_v1_1_0_2_1_2"
    metadata_source: generated
    generated_by: generate_tech_rules

  - rule_id: fortigate.cis.2.timezone_is_properly_configured
    title: "Ensure timezone is properly configured"
    severity: high
    category: networking
    tech_type: fortigate
    automation_type: manual
    cis_benchmark: "CIS_FORTIGATE v1.1.0"
    cis_version: "v1.1.0"
    cis_control: "2.1.3"
    cis_section: "2"
    profile_applicability: "Level 1"
    description: >
      Sets the local time zone information so that the time displayed by the device
      is more relevant to those who are viewing it.
    rationale: >
      Having a correct time set on the device is important for two main reasons. The
      first reason is that digital certificates compare this time to the range
      defined by their Valid From and Valid To fields to define a specific validity
      period. The second reason is to have relevant time stamps when logging
      information. Whether you are sending messages to a Syslog server, sending
      messages to an SNMP monitoring station, or performing packet captures,
      timestamps have little usefulness if you cannot be certain of their accuracy.
      Impact: For many features to work, including scheduling, logging, and SSL-
      dependent features, the FortiOS system time must be accurate.
    audit_procedure: >
      In the CLI, do the following command and check the result of timezone filed in
      the output FGT1 # get system global ... timezone : (GMT-8:00) Pacific Time (US
      & Canada) ... Or from GUI, do the following: 1) login to FortiGate 2) Go to
      'System' -> 'Settings'. 3) Time Zone and NTP settings are under 'System Time'
    remediation: >
      In this example, we will set Eastern Timezone (GMT-5:00) for the Fortigate.
      Each timezone will have its corresponding ID. To find the correct ID, when you
      type in the command 'set timezone ', also type the question mark '?' to list
      all of the available timezones and their IDs. The ID of the Eastern Timezone
      is 12 In the CLI: FGT1 # config system global FGT1 (global) # set timezone 12
      FGT1 (global) # end FGT1 # In the GUI, do the following: 1) after login to
      fortigate, go to 'System' -> 'Settings' 2) select '(GMT-5:00) Eastern Time (US
      & Canada)' under 'System Time' Default Value: Default value is (GMT-8:00)
      Pacific Time (US & Canada) References: 1.
      https://kb.fortinet.com/kb/documentLink.do?externalID=FD49018 2.
      https://docs.fortinet.com/document/fortigate/6.2.0/cookbook/512210/setting-
      the- system-time 3.
      https://docs.fortinet.com/document/fortigate/7.0.0/administration-
      guide/512210/setting-the-system-time Additional Information: Daylight savings
      time is enabled by default, and can only be configured in the CLI.
    references: >
      1. https://kb.fortinet.com/kb/documentLink.do?externalID=FD49018 2.
      https://docs.fortinet.com/document/fortigate/6.2.0/cookbook/512210/setting-
      the- system-time 3.
      https://docs.fortinet.com/document/fortigate/7.0.0/administration-
      guide/512210/setting-the-system-time Additional Information: Daylight savings
      time is enabled by default, and can only be configured in the CLI.
    impact: >
      For many features to work, including scheduling, logging, and SSL-dependent
      features, the FortiOS system time must be accurate.
    compliance_mappings:
      cis:
        - "CIS_FORTIGATE_v1_1_0_2_1_3"
      nist_800_53: []
      soc2: []
      pci_dss: []
    source_unique_id: "cis_fortigate_v1_1_0_2_1_3"
    metadata_source: generated
    generated_by: generate_tech_rules

  - rule_id: fortigate.cis.2.correct_system_time_is_configured_through_ntp
    title: "Ensure correct system time is configured through NTP"
    severity: high
    category: networking
    tech_type: fortigate
    automation_type: automated
    cis_benchmark: "CIS_FORTIGATE v1.1.0"
    cis_version: "v1.1.0"
    cis_control: "2.1.4"
    cis_section: "2"
    profile_applicability: "Level 1"
    description: >
      You can either manually set the FortiOS system time, or configure the device
      to automatically keep its system time correct by synchronizing with a Network
      Time Protocol (NTP) server. These settings enable the use of primary and
      secondary NTP servers to provide redundancy in case of a failure involving the
      primary NTP server.
    rationale: >
      NTP enables the device to maintain accurate time and date when receiving
      updates from a reliable NTP server. Accurate timestamps are critical when
      correlating events with other systems, troubleshooting, or performing
      investigative work. Logs and certain cryptographic functions, such as those
      utilizing certificates, rely on accurate time and date parameters. In
      addition, rules referencing a Schedule object will not function as intended if
      the device’s time and date are incorrect. For additional security,
      authenticated NTP can be utilized. If Symmetric Key authentication is
      selected, only SHA1 should be used, as MD5 is considered severely compromised.
      Impact: For many features to work, including scheduling, logging, and SSL-
      dependent features, the FortiOS system time must be accurate.
    audit_procedure: >
      In the CLI: FGT1 # diag sys ntp status synchronized: yes, ntpsync: enabled,
      server-mode: enabled ipv4 server(ntp2.fortiguard.com) 208.91.114.23 --
      reachable(0xff) S:3 T:54 server-version=4, stratum=1 reference time is
      e12361d5.f27e0322 -- UTC Wed Sep 11 12:06:45 2019 clock offset is -0.001569
      sec, root delay is 0.000000 sec root dispersion is 0.010269 sec, peer
      dispersion is 19 msec ipv4 server(ntp1.fortiguard.com) 208.91.115.123 --
      reachable(0xff) S:3 T:54 selected server-version=4, stratum=1 reference time
      is e12361d4.4f8b22a5 -- UTC Wed Sep 11 12:06:44 2019 clock offset is -0.000652
      sec, root delay is 0.000000 sec root dispersion is 0.010284 sec, peer
      dispersion is 8 msec ipv4 server(ntp2.fortiguard.com) 208.91.113.71 --
      reachable(0xff) S:3 T:54 server-version=4, stratum=2 reference time is
      e12361d6.4caf57ab -- UTC Wed Sep 11 12:06:46 2019 clock offset is -0.004814
      sec, root delay is 0.000137 sec root dispersion is 0.011154 sec, peer
      dispersion is 3 msec ipv4 server(ntp1.fortiguard.com) 208.91.113.70 --
      reachable(0xff) S:3 T:54 server-version=4, stratum=2 reference time is
      e123617b.c98e2059 -- UTC Wed Sep 11 12:05:15 2019 clock offset is -0.005106
      sec, root delay is 0.000122 sec root dispersion is 0.013382 sec, peer
      dispersion is 6 msec
    remediation: >
      You can only customize NTP setting using CLI. In this example, we'll assign
      pool.ntp.org as primary NTP server and 1.1.1.1 as secondary NTP server. FGT1 #
      config system ntp FGT1 (ntp) # set type custom FGT1 (ntp) # config ntpserver
      FGT1 (ntpserver) # edit 1 FGT1 (1) # set server pool.ntp.org FGT1 (1) # next
      FGT1 (ntpserver) # edit 2 FGT1 (2) # set server 1.1.1.1 FGT1 (2) # end FGT1
      (ntp) # end FGT1 # Default Value: By default, Fortinet uses the NTPs server of
      the FortiGuard References: 1.
      https://docs.fortinet.com/document/fortigate/6.2.0/cookbook/512210/setting-
      the- system-time 2.
      https://kb.fortinet.com/kb/documentLink.do?externalID=FD49018 3.
      https://docs.fortinet.com/document/fortigate/7.0.0/administration-
      guide/512210/setting-the-system-time Additional Information: Daylight savings
      time is enabled by default, and can only be configured in the CLI.
    references: >
      1. https://docs.fortinet.com/document/fortigate/6.2.0/cookbook/512210/setting-
      the- system-time 2.
      https://kb.fortinet.com/kb/documentLink.do?externalID=FD49018 3.
      https://docs.fortinet.com/document/fortigate/7.0.0/administration-
      guide/512210/setting-the-system-time Additional Information: Daylight savings
      time is enabled by default, and can only be configured in the CLI.
    impact: >
      For many features to work, including scheduling, logging, and SSL-dependent
      features, the FortiOS system time must be accurate.
    compliance_mappings:
      cis:
        - "CIS_FORTIGATE_v1_1_0_2_1_4"
      nist_800_53: []
      soc2: []
      pci_dss: []
    source_unique_id: "cis_fortigate_v1_1_0_2_1_4"
