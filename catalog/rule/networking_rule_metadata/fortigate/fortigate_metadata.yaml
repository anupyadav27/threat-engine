  - rule_id: fortigate.cis.2.latest_firmware_is_installed
    title: "Ensure the latest firmware is installed"
    severity: medium
    category: networking
    tech_type: fortigate
    automation_type: manual
    cis_benchmark: "CIS_FORTIGATE v1.1.0"
    cis_version: "v1.1.0"
    cis_control: "2.1.6"
    cis_section: "2"
    profile_applicability: "Level 2"
    description: >
      Check against Fortinet website to make sure that the latest stable firmware is
      installed.
    rationale: >
      Fortinet periodically updates the FortiGate firmware to include new features
      and resolve important issues. After you have registered your FortiGate unit,
      firmware updates can be downloaded from the Fortinet Customer Service &
      Support website. It is important to constantly keep the firmware up-to-date to
      prevent any new well-known exploitation.
    audit_procedure: >
      First, check for the latest firmware version available by going to
      https://docs.fortinet.com/upgrade-tool, select your product from the Current
      Product drop-down menu then select the upgrade to FortiOS Version which will
      gives you the latest version available. Second, verify the current firmware on
      your system. In the CLI: FGT1 # get system status ... Version: Fortigate-100D
      v6.2.7,build1190,201216 (GA) ... FGT1 # In the GUI: go to Dashboard -> Status
      -> System information and check for Firmware. At the same time, go to
      https://www.fortiguard.com/psirt?product=FortiOS and check for vulnerabilities
      that your existing version might have.
    remediation: >
      First, determine the upgrade path recommended by Fortinet. If you have not
      upgraded the system for a long time, it is not recommended to upgrade straight
      to the latest version as the configuration could be lost. Fortinet provides a
      tool to recommend an upgrade path for all of its products. Go to
      https://docs.fortinet.com/upgrade-tool. Choose your product from the 'Current
      Product' drop-down menu, the 'current FortiOS version', and the latest
      firmware version available for that model from 'Upgrade to FortiOS Version'.
      Click 'Go'. Write down the path and then click on 'Download' to download all
      the necessary versions. The second step is to download the required FortiOS
      firmware/s. Go to https://support.fortinet.com and login. Go to Support ->
      Firmware Download. Once there, select the product and click on 'Upgrade Path'.
      Choose the specific model of the hardware, the current firmware version and
      the latest firmware version available for that model. Click 'Go'. Write down
      the path and then click on 'Download' to download all the necessary versions.
      The last step is to install the new firmwares in the order provided by the
      'Upgrade tool'. It is recommended to use GUI to perform this task as it would
      be much easier. In the GUI, click on System -> Firmware, then click on
      'Browse' to select the next firmware file. Then click on 'Upgrade'. You might
      have to perform this step multiple times if you follow the upgrade path.
      Default Value: There is no default firmware. The hardware comes with the
      latest firmware at the time it was manufactured. References: 1.
      https://kb.fortinet.com/kb/documentLink.do?externalID=10948
