  - rule_id: fortigate.cis.2.idle_timeout_time_is_configured
    title: "Ensure idle timeout time is configured"
    severity: high
    category: networking
    tech_type: fortigate
    automation_type: automated
    cis_benchmark: "CIS_FORTIGATE v1.1.0"
    cis_version: "v1.1.0"
    cis_control: "2.4.4"
    cis_section: "2"
    profile_applicability: "Level 1"
    description: >
      The idle timeout period is the amount of time that an administrator will stay
      logged in to the GUI without any activity.
    rationale: >
      Best practice dictates settings admin idle timeout to prevent the risk of
      unauthorized access to the device by preventing someone from using a logged-in
      GUI on a PC that has been left unattended. Impact: This is to prevent someone
      from accessing the FortiGate if the management PC is left unattended.
    audit_procedure: >
      To check the idle timeout in the GUI: 1) Login to FortiGate 2) Go to 'System'
      > 'Settings'. 3) In the 'Administration Settings' section, check the 'Idle
      timeout' value in minutes. To check the idle timeout in the CLI: get system
      global check the value of admintimeout in minutes
    remediation: >
      To change the idle timeout in the GUI: 1) Login to FortiGate with Super Admin
      privileges 2) Go to 'System' > 'Settings'. 3) In the 'Administration Settings'
      section, set the 'Idle timeout' value to five minutes by typing 5. 4) Click
      Apply. To change the idle timeout in the CLI: config system global set
      admintimeout 5 end Default Value: By default, it is set to five minutes.
      References: 1.
      https://docs.fortinet.com/document/fortigate/6.2.0/cookbook/215451/setting-
      the- idle-timeout-time Additional Information: A setting of higher than 15
      minutes will have a negative effect on a security rating score.
    references: >
      1. https://docs.fortinet.com/document/fortigate/6.2.0/cookbook/215451/setting-
      the- idle-timeout-time Additional Information: A setting of higher than 15
      minutes will have a negative effect on a security rating score.
