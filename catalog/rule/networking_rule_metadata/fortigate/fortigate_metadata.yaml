      all Schedule: Always Services: All Action: Deny Log Violation Traffic: Enabled
      Enable this policy: Enabled 2. A firewall policy created to block outbound
      connections with these settings: From: Any To: Any Source: All Destination:
      'Tor-Relay.Node' and 'Malicious-Malicious.Server' Schedule: Always Action:
