      decreases impact of routine maintenance (Firmware updates, cable moves, etc.)
      and the the impact of device failure. Impact: Not having High Availability
      (HA) configured correctly and synced properly impacts the availability of the
      FortiGate devices as well as any systems that require traversing the
      FortiGates. With properly configured HA in place outages can be minimized
