  - rule_id: fortigate.cis.1.dns_server_is_configured
    title: "Ensure DNS server is configured"
    severity: high
    category: networking
    tech_type: fortigate
    automation_type: automated
    cis_benchmark: "CIS_FORTIGATE v1.1.0"
    cis_version: "v1.1.0"
    cis_control: "1.1"
    cis_section: "1"
    profile_applicability: "Level 1"
    description: >
      Fortinet uses the Domain Name Service (DNS) to translate host names into IP
      addresses. To enable DNS lookups, you must specify the primary DNS server for
      your system. You can also specify secondary and tertiary DNS servers. When
      resolving host names, the system consults the primary name server. If a
      failure or time-out occurs, the system consults the secondary name server
    rationale: >
      The purpose is to perform the resolution of system hostnames to Internet
      Protocol (IP) addresses.
    audit_procedure: >
      In CLI: FGT1 # config system dns FGT1 (dns) # show config system dns set
      primary <ip_address> set secondary <ip_address> ... end In the GUI, go to
      Networks -> DNS. The Fortigate uses either the default FortiGuard DNS or
      customized DNS
    remediation: >
      In this example, we will assign 8.8.8.8 as primary DNS and 8.8.4.4 as
      secondary DNS. In CLI: FGT1 # config system dns FGT1 (dns) # set primary
      8.8.8.8 FGT1 (dns) # set secondary 8.8.4.4 FGT1 (dns) # end FGT1 # In the GUI,
      go to Networks -> DNS. Click on 'Specify' and put in 8.8.8.8 as 'Primary DNS
      Server' and 8.8.4.4 as 'Secondary DNS Server' Default Value: Default primary
      DNS server is 208.91.112.53. Default secondary DNS server is 208.91.112.52
      References: 1.
      https://docs.fortinet.com/document/fortigate/6.4.1/administration-
      guide/903162/important-dns-cli-commands
    references: >
      1. https://docs.fortinet.com/document/fortigate/6.4.1/administration-
      guide/903162/important-dns-cli-commands
    impact: >
      
