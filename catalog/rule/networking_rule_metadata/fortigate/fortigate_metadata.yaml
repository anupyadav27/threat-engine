  - rule_id: fortigate.cis.4.inline_scanning_with_fortiguard_ai_based_sandbox
    title: "Ensure inline scanning with FortiGuard AI-Based Sandbox Service is enabled"
    severity: high
    category: networking
    tech_type: fortigate
    automation_type: manual
    cis_benchmark: "CIS_FORTIGATE 7.0.x_v1.3.0"
    cis_version: "7.0.x_v1.3.0"
    cis_control: "4.2.6"
    cis_section: "4"
    profile_applicability: "Level 1"
    description: >
      Inline scanning is supported when the FortiGate is licensed with the
      FortiGuard AI- Based Sandbox Service (FAIS). It works similar to inline
      scanning for the FortiSandbox appliance, by holding a file up to 50 seconds
      for the verdict to be returned. Timed out scans can either be set to block,
      log, or ignore. Inline scanning can be enabled from the GUI on the Cloud
      Sandbox configuration page.
    rationale: >
      With FAIS, unknown malware can be detected and blocked using cloud sandboxing
      technology. Using inline scanning with FAIS, patient zero can also be
      prevented. This complements the existing antivirus signature-based detection
      and also acts as an additional layer of defense on top of FortiGate's AV
      heuristics feature.
    audit_procedure: >
      On CLI: config system fortiguard get Verify if sandbox-inline-scan is enabled.
      Note that, sandbox-inline-scan will only show up after sandbox region is set
      (this is done during initial setup). If there is no sandbox-inline-scan in the
      output, it means that this feature is not enabled. If sandbox-inline-scan is
      enabled, check on CLI if it is enforced on AV security profile: config
      antivirus profile show Verify if fortisandbox-mode inline is set and on each
      traffic protocol, fortisandbox block is set. On GUI: 1. Go to Security Fabric
      > Fabric Connectors and double-click the Cloud Sandbox card. Verify if 'Inline
      scan' is enabled. If 'Inline scan' is enabled, then: 1. Go to Security
      Profiles > AntiVirus and double-click the relevant AV profile. Verify if Scan
      strategy is set as 'Inline' and Action is set as 'Block'
    remediation: >
      On GUI: Enable the FortiGate Cloud feature visibility: 1. Go to System >
      Feature Visibility. 2. In the Additional Features section, enable FortiGate
      Cloud Sandbox. 3. Click Apply. Configure the Cloud Sandbox Fabric connector:
      1. Go to Security Fabric > Fabric Connectors and double-click the Cloud
      Sandbox card. 2. Set the Type to FortiGate Cloud. 3. Select a Region. 4.
      Enable Inline scan. 5. Click OK. Configure the antivirus profile: 1. Go to
      Security Profiles > AntiVirus and click Create New. 2. Set the Feature set to
      Proxy-based. 3. Enable the protocols to inspect. 4. Enable Send files to
      FortiSandbox for inspection. 5. Set the Scan strategy to Inline, and set the
      Action to Block. 6. Click OK. On CLI: Disable FortiSandbox appliance and
      FortiSandbox Cloud: config system fortisandbox set status disable end
      Configure FortiGate Cloud Sandbox (example given is setting it as 'Global'
      region): # execute forticloud-sandbox region 0 Global 1 Europe 2 Japan 3 US
      Please select cloud sandbox region[0-3]:0 Cloud sandbox region is selected:
      Global Enable inline scanning for FortiGate Cloud: config system fortiguard
      set sandbox-region 'Global' set sandbox-inline-scan enable end Enforced on AV
      security profile: config antivirus profile edit set feature-set proxy set
      fortisandbox-mode inline config http set fortisandbox block end config ftp set
      fortisandbox block end config imap set fortisandbox block ..... end Default
      Value: Disabled References: 1.
      https://docs.fortinet.com/document/fortigate/7.2.0/new-features/599740/inline-
      scanning-with-fortiguard-ai-based-sandbox-service-7-2-1
    references: >
