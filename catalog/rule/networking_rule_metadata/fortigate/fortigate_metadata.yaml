  - rule_id: fortigate.cis.2.ha_reserved_management_interface_is_configured
    title: "Ensure HA Reserved Management Interface is Configured"
    severity: high
    category: networking
    tech_type: fortigate
    automation_type: manual
    cis_benchmark: "CIS_FORTIGATE v1.1.0"
    cis_version: "v1.1.0"
    cis_control: "2.5.3"
    cis_section: "2"
    profile_applicability: "Level 1 + Level 2"
    description: >
      Ensure Reserved Management Interfaces are configured on HA devices
    rationale: >
      To be able to access both the primary and secondary firewalls in an HA cluster
      Reserved Management Interfaces need to be configured to prevent them from
      syncing with HA and sharing a virtual MAC address Impact: Not configuring
      reserved Management Interfaces impacts the ability to access secondary devices
      directly due to the primary and secondary devices syncing configuration
      exactly and floating a virtualized mac address between them for failover
    audit_procedure: >
      Review through the GUI: go to System -> HA edit the 'Master' device and verify
      that 'Management Interface Reservation' is selected and there is an interface,
      and gateway defined Review through the CLI: FGT1 #config system ha FGT1 (ha) #
      show config system ha set group-name 'FGT-HA' set mode a-p set password ENC
      enrwD467hJmO6j6YW/l6FEOa1YNVYdo8Z5mCcTDEKUFpOVXcNYnPBmQDGX//ViXk6TkwNH0il5aJr
      /fZY25lq+husndQHZVWp2LIlXmCv/n81U43nkZUWaIKvqkellGFbhv0/IHoOLzQPCsVcBbyrsgopr
      YMvh6w7F06+nRriBtMNQxpiTE+12xAHz7lA3EoYZzf8A== set ha-mgmt-status enable
      config ha-mgmt-interfaces edit 1 set interface 'port6' set gateway 10.10.10.1
      next end set override disable end Validate that set ha-mgmt-status is enable
      and that config ha-mgmt-interfaces has at least one entry with an interface
      and gateway defined
    remediation: >
      Remediate through the GUI: go to System -> HA edit the 'Master' device and
      enable 'Management Interface Reservation' once this is enabled select an an
      interface, and configure the appropriate gateway. Remediate through the CLI:
      FGT1 #config system ha FGT1 (ha) # set ha-mgmt-status enable FGT1 (ha) #
      config ha-mgmt-interfaces FGT1 (ha-mgmt-interfaces) # edit 1 new entry '1'
      added FGT1 (1) # set interface port6 FGT1 (1) # set gateway 10.10.10.1 FGT1
      (1) # end FGT1 (ha) # show config system ha set group-name 'FGT-HA' set mode
      a-p set password ENC
      enrwD467hJmO6j6YW/l6FEOa1YNVYdo8Z5mCcTDEKUFpOVXcNYnPBmQDGX//ViXk6TkwNH0il5aJr
      /fZY25lq+husndQHZVWp2LIlXmCv/n81U43nkZUWaIKvqkellGFbhv0/IHoOLzQPCsVcBbyrsgopr
      YMvh6w7F06+nRriBtMNQxpiTE+12xAHz7lA3EoYZzf8A== set ha-mgmt-status enable
      config ha-mgmt-interfaces edit 1 set interface 'port6' set gateway 10.10.10.1
      next end set override disable end FGT1 (ha) # end Default Value: N/A 3 Policy
      and Objects This section contains best practices related to configuring
      firewall policies, Objects and traffic shaping
    references: >
      
    impact: >
      Not configuring reserved Management Interfaces impacts the ability to access
      secondary devices directly due to the primary and secondary devices syncing
      configuration exactly and floating a virtualized mac address between them for
      failover
    compliance_mappings:
      cis:
        - "CIS_FORTIGATE_v1_1_0_2_5_3"
