  - rule_id: fortigate.cis.2.only_snmpv3_is_enabled
    title: "Ensure only SNMPv3 is enabled"
    severity: medium
    category: networking
    tech_type: fortigate
    automation_type: automated
    cis_benchmark: "CIS_FORTIGATE v1.1.0"
    cis_version: "v1.1.0"
    cis_control: "2.3.2"
    cis_section: "2"
    profile_applicability: "Level 2"
    description: >
      Ensuring that only SNMPv3 service is enabled and SNMPv1, SNMPv2c are disabled.
    rationale: >
      SNMP Version 3 provides security enhancements that are not available in SNMP
      Version 1 or SNMP Version 2c. SNMP Versions 1 and 2c transmit data between the
      SNMP server and SNMP agent in clear text. SNMP Version 3 adds authentication
      and privacy options to secure protocol operations. Some firewalls need to be
      constantly monitored of its performance and status. Especially if the
      firewalls are critical to the operation. Enabling SNMPv3 will ensure that the
      firewall is monitored properly. Impact: Some older SNMP server that only run
      SNMPv1 or SNMPv2C will not be able to query to this firewall.
    audit_procedure: >
      From CLI, check to make sure that there is not any community for SNMPv1 or
      SNMPv2c and only SNMPv3 users are there. Also make sure that SNMP Agent is
      enabled. FGT1 # config system snmp sysinfo FGT1 (sysinfo) # show config system
      snmp sysinfo set status enable ... end FGT1 (sysinfo) # end FGT1 # config
      system snmp community FGT1 (community) # show config system snmp community end
      FGT1 (community) # end FGT1 # config system snmp user FGT1 (user) # show
      config system snmp user edit 'snmp_test' set security-level auth-priv set
      auth-proto sha256 set auth-pwd ENC xxxxxx set priv-proto aes256 set priv-pwd
      ENC xxxxxx next end In the GUI, go to System -> SNMP. Make sure that SNMP
      agent is enabled. Make sure that there is not any SNMPv1/2c community. Make
      sure that there is at least 1 SNMPv3 user in the list.
    remediation: >
      To enable SNMP agent in CLI FGT1 # config system snmp sysinfo FGT1 (sysinfo) #
      set status enable FGT1 (sysinfo) # end In GUI, go to System -> SNMP and enable
      SNMP Agent. To delete SNMPv1/2c communities In this example, we'll delete
      community 'public' in CLI FGT1 # config system snmp community FGT1 (community)
      # delete public FGT1 (community) # end FGT # In the GUI, go to System -> SNMP,
      select the community and click on the Delete button. To add SNMPv3 User in CLI
      FGT1 # config system snmp user FGT1 (user) # edit 'snmp_test' FGT1 (snmp_test)
      # set security-level auth-priv FGT1 (snmp_test) # set auth-proto sha256 FGT1
      (snmp_test) # set auth-pwd xxxx FGT1 (snmp_test) # set priv-proto aes256 FGT1
      (snmp_test) # set priv_pwd xxxx FGT1 (snmp_test) # end FGT1 # In the GUI, go
      to System -> SNMP, under SNMPv3, click on 'Create New' button. Select
      'Authentication' and choose SHA256 as Authentication algorithm. Click 'Change'
      to type in the password. Also select option 'Private', choose AES256 as
      Encryption Algorithm. Click on Change to change the password. Click 'OK' to
      add the new user. Click apply to apply the new setting into the current
      config. Default Value: By default, SNMP agent is disabled. References: 1.
      https://kb.fortinet.com/kb/documentLink.do?externalID=FD45755 2.
      https://docs.fortinet.com/document/fortigate/6.4.0/administration-
      guide/457149/snmp-v3-users
    references: >
      1. https://kb.fortinet.com/kb/documentLink.do?externalID=FD45755 2.
      https://docs.fortinet.com/document/fortigate/6.4.0/administration-
      guide/457149/snmp-v3-users
    impact: >
      Some older SNMP server that only run SNMPv1 or SNMPv2C will not be able to
      query to this firewall.
    compliance_mappings:
      cis:
        - "CIS_FORTIGATE_v1_1_0_2_3_2"
      nist_800_53: []
      soc2: []
      pci_dss: []
    source_unique_id: "cis_fortigate_v1_1_0_2_3_2"
