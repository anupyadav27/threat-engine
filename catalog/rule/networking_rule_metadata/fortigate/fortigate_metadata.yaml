      ^, &, *, (, and ) • Where the password applies (admin or IPsec or both). • The
      duration of the password before a new one must be specified. • The minimum
      number of unique characters that a new password must include.
    impact: >
      Weak passwords can be easily discovered by hackers which leads to unauthorized
