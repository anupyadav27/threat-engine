    profile_applicability: "Level 2"
    description: >
      Ensuring that only certain hosts are able to conduct SNMP GET or receive SNMP
      Trap.
    rationale: >
      SNMP offers rich information that can be useful for reconnaissance activity.
      Hence, limiting this information to only relevant devices such as NMS (Network
      Monitoring System) or other SNMP servers is necessary.
    audit_procedure: >
      From CLI: FGT1 # show system snmp user config system snmp user edit
