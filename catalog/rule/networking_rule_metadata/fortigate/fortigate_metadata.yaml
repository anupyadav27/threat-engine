  - rule_id: fortigate.cis.2.monitor_interfaces_for_high_availability_devices
    title: "Ensure 'Monitor Interfaces' for High Availability Devices is Enabled"
    severity: high
    category: networking
    tech_type: fortigate
    automation_type: automated
    cis_benchmark: "CIS_FORTIGATE v1.1.0"
    cis_version: "v1.1.0"
    cis_control: "2.5.2"
    cis_section: "2"
    profile_applicability: "Level 1"
    description: >
      Configure Interface Monitoring within High Availability settings, Interface
      Monitoring should be enabled on all critical interfaces.
    rationale: >
      With Interface Monitoring enabled on devices failover can occur if there are
      physical media issues or issues with the specific port that the FortiGate is
      connected to. Impact: Not configuring Interface Monitoring can directly impact
      services due to a failure to trigger a High Availability failover if an
      interface is impacted only on the primary device and it is not being
      monitored. Without the Interface monitoring enabled failover would be limited
      to hardware, system, or power faults.
    audit_procedure: >
      To Validate from GUI: go to System - > HA Under 'Monitor Interfaces' validate
      all applicable interfaces are selected select 'OK' To Validate from CLI: FGT1
      # config system ha FGT1 (ha) # show config system ha set group-name 'FGT-HA'
      set mode a-p set password ENC
      enrwD467hJmO6j6YW/l6FEOa1YNVYdo8Z5mCcTDEKUFpOVXcNYnPBmQDGX//ViXk6TkwNH0il5aJr
      /fZY25lq+husndQHZVWp2LIlXmCv/n81U43nkZUWaIKvqkellGFbhv0/IHoOLzQPCsVcBbyrsgopr
      YMvh6w7F06+nRriBtMNQxpiTE+12xAHz7lA3EoYZzf8A== set override disable set
      monitor 'port6' 'port7' ###Validate proper interfaces are present end
    remediation: >
      To Remediate from GUI: go to System - > HA Under 'Monitor Interfaces' select
      all applicable interfaces. select 'OK' To Validate from CLI: FGT1 # config
      system ha FGT1 (ha) # set monitor 'port6' 'port7' FGT1 (ha) # show ###To
      Review changes to monitored interfaces before applying config system ha set
      group-name 'FGT-HA' set mode a-p set password ENC
      enrwD467hJmO6j6YW/l6FEOa1YNVYdo8Z5mCcTDEKUFpOVXcNYnPBmQDGX//ViXk6TkwNH0il5aJr
      /fZY25lq+husndQHZVWp2LIlXmCv/n81U43nkZUWaIKvqkellGFbhv0/IHoOLzQPCsVcBbyrsgopr
      YMvh6w7F06+nRriBtMNQxpiTE+12xAHz7lA3EoYZzf8A== set override disable set
      monitor 'port6' 'port7' end Default Value: N/A References: 1.
      https://docs.fortinet.com/document/fortigate/6.0.0/best-
      practices/498515/interface-monitoring-port-monitoring
    references: >
      1. https://docs.fortinet.com/document/fortigate/6.0.0/best-
      practices/498515/interface-monitoring-port-monitoring
    impact: >
      Not configuring Interface Monitoring can directly impact services due to a
      failure to trigger a High Availability failover if an interface is impacted
      only on the primary device and it is not being monitored. Without the
      Interface monitoring enabled failover would be limited to hardware, system, or
      power faults.
