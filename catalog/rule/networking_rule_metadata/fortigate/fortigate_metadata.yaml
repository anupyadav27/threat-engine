    cis_section: "4"
    profile_applicability: "Level 2"
    description: >
      Ensure FortiGate Application Control blocks applications running on non-
      default ports.
    rationale: >
      Running application on non-default ports is not directly a threat, but can be
      an indication of something unexpected. For example, HTTPS runs on port 443.
      Potentially, if attacker starts a rogue HTTPS server on port 10443, it could
      be used for data exfiltration.
    audit_procedure: >
      GUI: Go to 'Security Profiles' > 'Application Control' > select App Control
      profile Validate that 'Block applications detected on non-default ports'
      option is enabled.
    remediation: >
      GUI: Go to 'Security Profiles' > 'Application Control' > select App Control
      profile Enable 'Block applications detected on non-default ports' option CLI:
      FGT1 # config application list FGT1 (list) # edit <profile name> FGT1
      (<profile name>) # set enforce-default-app-port enable Default Value: Disabled
      References: 1. https://attack.mitre.org/techniques/T1571/
