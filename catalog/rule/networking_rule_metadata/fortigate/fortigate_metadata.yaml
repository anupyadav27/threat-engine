  - rule_id: fortigate.cis.2.snmp_agent_is_disabled
    title: "Ensure SNMP agent is disabled"
    severity: high
    category: networking
    tech_type: fortigate
    automation_type: automated
    cis_benchmark: "CIS_FORTIGATE v1.1.0"
    cis_version: "v1.1.0"
    cis_control: "2.3.1"
    cis_section: "2"
    profile_applicability: "Level 1"
    description: >
      The Simple Network Management Protocol (SNMP) server is used to listen for
      SNMP commands from an SNMP management system, execute the commands or collect
      the information and then send results back to the requesting system.
    rationale: >
      The SNMP server can communicate using SNMP v1, which transmits data in the
      clear and does not require authentication to execute commands. Unless
      absolutely necessary, it is recommended that the SNMP service not be used. If
      SNMP is required the server should be configured to use only SNMPv3. Impact:
      SNMP servers will not be able to query the Fortigate devices that have SNMP
      agents disabled.
    audit_procedure: >
      on CLI, run the following commands to check whether SNMP agent is disabled.
      FGT1 # config system snmp sysinfo FGT1 (sysinfo) # show full config system
      snmp sysinfo set status disable ... end On the GUI, select System -> SNMP,
      make sure that SNMP Agent is disabled.
    remediation: >
      On the CLI, run the following command to disable the agent FGT1 # config
      system snmp sysinfo FGT1 (sysinfo) # set status disable FGT1 (sysinfo) # end
      On the GUI, select System -> SNMP, disable SNMP agent Default Value: SNMP
      agent is disabled by default. References: 1.
      https://kb.fortinet.com/kb/documentLink.do?externalID=FD45755
    references: >
      1. https://kb.fortinet.com/kb/documentLink.do?externalID=FD45755
    impact: >
      SNMP servers will not be able to query the Fortigate devices that have SNMP
      agents disabled.
    compliance_mappings:
      cis:
        - "CIS_FORTIGATE_v1_1_0_2_3_1"
      nist_800_53: []
      soc2: []
      pci_dss: []
    source_unique_id: "cis_fortigate_v1_1_0_2_3_1"
    metadata_source: generated
    generated_by: generate_tech_rules

  - rule_id: fortigate.cis.2.admin_accounts_with_different_privileges_having
    title: "Ensure admin accounts with different privileges having their correct profiles assigned"
    severity: high
    category: networking
    tech_type: fortigate
    automation_type: manual
    cis_benchmark: "CIS_FORTIGATE v1.1.0"
    cis_version: "v1.1.0"
    cis_control: "2.4.3"
    cis_section: "2"
    profile_applicability: "Level 1"
    description: >
      Verify that users with access to the Fortinet should only have the minimum
      privileges required for that particular user.
    rationale: >
      In some organizations, there are needs to create different levels of
      administrative accounts. For example, technicians from tier 1 support should
      not have total access to the system as compared with a tier 3 support.
    audit_procedure: >
      There are 2 stages to audit. Stage 1: verify the profile . Here is how to
      verify in the CLI: FGT1 # config system accprofile FGT1 (accprofile) # edit
      'tier_1' FGT1 (tier_1) # show full config system accprofile edit 'tier_1' set
      comments '' set secfabgrp read set ftviewgrp read set authgrp none set sysgrp
      none set netgrp read set loggrp none set fwgrp custom set vpngrp none set
      utmgrp none set wifi none set admintimeout-override disable config fwgrp-
      permission set policy none set address none set service none set schedule none
      end next end FGT1 (tier_1) # If the following privileges are set to 'custom',
      please also check the sub-privileges of the customized ones to make sure that
      only the right privileges are allowed: fwgrp, sysgrp, netgrp, loggrp,
      utmgrpset. In the GUI, go to System -> Admin Profiles, select the profile and
      click on 'Edit'. Stage 2: verify the admin accounts . In the CLI: FGT1 #config
      system admin FGT1 (admin) # edit 'support1' FGT1 (support1) # show full config
      system admin edit 'support1' ... set accprofile 'tier_1' ... next end In the
      GUI, go to System -> Administrators, select the account and click 'Edit'
    remediation: >
      In this example, I would like to provide the profile 'tier_1' the ability to
      view and modify address objects. This sub-privilege is under fwgrp privilege.
      In CLI FGT1 # config system accprofile FGT1 (accprofile) # edit 'tier_1' FGT1
      (tier_1) # set fwgrp custom FGT1 (tier_1) # config fwgrp-permission FGT1
      (fwgrp-permission) # set address read-write FGT1 (fwgrp-permission) # end FGT1
      (tier_1) # end FGT1 # For the GUI, go to System -> Admin Profiles, select
      'tier_1' and click 'Edit'. On 'Firewall', click on 'Custom' and then click on
      'Read/Write' option for 'Address'. In the next example, I would like to assign
      the profile 'tier_1' to the account 'support1'. In the CLI FGT1 # config
      system admin FGT1 (admin) # edit 'support1' FGT1 (support1) # set accprofile
      'tier_1' FGT1 (support1) # end FGT1 # For the GUI, go to System ->
      Administrators, select 'support1' and click 'Edit'. Under 'Administrator
      Profile', select 'tier_1'. Default Value: By default, there are only 2
      profiles: prof_admin and super_admin. You have to select a profile to create
      an admin account, the system will not automatically choose for you.
      References: 1.
      https://docs.fortinet.com/document/fortigate/latest/administration-
      guide/294491/administrator-profiles Additional Information: You cannot change
      the profile of the account which you are currently logging in as. The profile
      'super_admin' cannot be deleted or modified.
    references: >
      1. https://docs.fortinet.com/document/fortigate/latest/administration-
      guide/294491/administrator-profiles Additional Information: You cannot change
      the profile of the account which you are currently logging in as. The profile
      'super_admin' cannot be deleted or modified.
    impact: >
      
    compliance_mappings:
      cis:
        - "CIS_FORTIGATE_v1_1_0_2_4_3"
      nist_800_53: []
      soc2: []
      pci_dss: []
    source_unique_id: "cis_fortigate_v1_1_0_2_4_3"
    metadata_source: generated
    generated_by: generate_tech_rules

