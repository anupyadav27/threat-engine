  - rule_id: fortigate.cis.4.dns_filter_logs_all_dns_queries_and_responses
    title: "Ensure DNS Filter logs all DNS queries and responses"
    severity: high
    category: networking
    tech_type: fortigate
    automation_type: manual
    cis_benchmark: "CIS_FORTIGATE v1.1.0"
    cis_version: "v1.1.0"
    cis_control: "4.3.2"
    cis_section: "4"
    profile_applicability: "Level 1"
    description: >
      DNS filter should log all DNS queries and responses.
    rationale: >
      DNS filter should log all DNS queries and responses (whether if the DNS
      category is blocked, monitored, or allowed). This enables SOC or security
      analyst to do further investigations on security incidents especially on
      threat hunting or incident response activities. Although there are many data
      sources that can provide DNS query logs (AD or EDR), but this option should be
      enabled out of best practice and with assumption that no other data sources is
      available. Impact: By default, allowed DNS is not logged. This creates data
      gap in threat hunting or incident response activities.
    audit_procedure: >
      GUI: Go to 'Security Profiles' > 'DNS Filter' > select DNS Filter profile
      Validate that 'Log all DNS queries and responses' is enabled. CLI: FGT1 #
      config dnsfilter profile FGT1 (profile) # show Validate that 'set log-all-
      domain enable' is configured on DNS Filter profile.
    remediation: >
      Review DNS Filter Security Profiles and validate that 'Log all DNS queries and
      responses' is enabled. Default Value: Disabled References: 1.
      https://community.fortinet.com/t5/FortiGate/Technical-Tip-FortiGate-Static-
      DNS- filter-behavior-in-logging/ta-p/223110 4.4 Application Control
      Application Control Security profiles
    references: >
