  - rule_id: fortigate.cis.4.enable_outbreak_prevention_database
    title: "Enable Outbreak Prevention Database"
    severity: medium
    category: networking
    tech_type: fortigate
    automation_type: automated
    cis_benchmark: "CIS_FORTIGATE v1.1.0"
    cis_version: "v1.1.0"
    cis_control: "4.2.3"
    cis_section: "4"
    profile_applicability: "Level 2"
    description: >
      Ensure FortiGate AV inspection uses outbreak prevention database as an added
      layer of protection on top of antivirus' signature-based detection.
    rationale: >
      Antivirus mainly uses signature for malware blocking. By enabling 'FortiGuard
      outbreak prevention database', FortiGate can leverage on 3rd party malware
      hash signatures curated by the FortiGuard as an additional protection layer.
      The hash signatures are obtained from FortiGuard's Global Threat Intelligence
      database. The antivirus database queries FortiGuard with the hash of a scanned
      file. If FortiGuard returns a match, the scanned file is deemed to be
      malicious.
    audit_procedure: >
      GUI: Go to 'Security Profiles' > 'AntiVirus' > select AV profile Validate that
      'Use FortiGuard outbreak prevention database' is enabled. CLI: FGT1 # config
      antivirus profile FGT1 (profile) # show Validate that for each traffic
      protocol, 'set outbreak-prevention block' is configured.
    remediation: >
      Review Antivirus Security Profiles and validate that 'Use FortiGuard outbreak
      prevention database' is enabled. Default Value: Disabled References: 1.
      https://docs.fortinet.com/document/fortigate/7.0.9/administration-
      guide/889364/fortiguard-outbreak-prevention
    references: >
      1. https://docs.fortinet.com/document/fortigate/7.0.9/administration-
