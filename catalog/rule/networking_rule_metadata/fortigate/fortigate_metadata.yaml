  - rule_id: fortigate.cis.2.admin_accounts_with_different_privileges_have
    title: "Ensure admin accounts with different privileges have their correct profiles assigned"
    severity: high
    category: networking
    tech_type: fortigate
    automation_type: manual
    cis_benchmark: "CIS_FORTIGATE 7.0.x_v1.3.0"
    cis_version: "7.0.x_v1.3.0"
    cis_control: "2.4.3"
    cis_section: "2"
    profile_applicability: "Level 1"
    description: >
      Verify that users with access to the Fortinet should only have the minimum
      privileges required for that particular user.
    rationale: >
      In some organizations, it is necessary to create different levels of
      administrative accounts. For example, technicians from tier 1 support should
      not have total access to the system compared to a tier 3 support.
    audit_procedure: >
      There are 2 stages to audit. Here is how to verify in the CLI: Stage 1: Verify
      the profile . FGT1 # config system accprofile FGT1 (accprofile) # edit
      'tier_1' FGT1 (tier_1) # show full config system accprofile edit 'tier_1' set
      comments '' set secfabgrp read set ftviewgrp read set authgrp none set sysgrp
      none set netgrp read set loggrp none set fwgrp custom set vpngrp none set
      utmgrp none set wifi none set admintimeout-override disable config fwgrp-
      permission set policy none set address none set service none set schedule none
      end next end FGT1 (tier_1) # If the following privileges are set to 'custom',
      please also check the sub-privileges of the customized ones to make sure that
      only the right privileges are allowed: fwgrp, sysgrp, netgrp, loggrp,
      utmgrpset. In the GUI, go to: System > Admin Profiles, select the profile and
      click on 'Edit'. Stage 2: Verify the admin accounts . In the CLI: FGT1 #config
      system admin FGT1 (admin) # edit 'support1' FGT1 (support1) # show full config
      system admin edit 'support1' ... set accprofile 'tier_1' ... next end In the
      GUI, go to: System > Administrators, select the account and click 'Edit'
    remediation: >
      In this example, the goal is to provide the profile 'tier_1' the ability to
      view and modify address objects. This sub-privilege is under fwgrp privilege.
      In CLI: FGT1 # config system accprofile FGT1 (accprofile) # edit 'tier_1' FGT1
      (tier_1) # set fwgrp custom FGT1 (tier_1) # config fwgrp-permission FGT1
      (fwgrp-permission) # set address read-write FGT1 (fwgrp-permission) # end FGT1
      (tier_1) # end FGT1 # For the GUI, go to: 1. System > Admin Profiles, select
      'tier_1' and click 'Edit'. 2. On 'Firewall', click on 'Custom'. 3. Click on
      'Read/Write' option for 'Address'. In the next example, assign the profile
      'tier_1' to the account 'support1'. In the CLI: FGT1 # config system admin
      FGT1 (admin) # edit 'support1' FGT1 (support1) # set accprofile 'tier_1' FGT1
      (support1) # end FGT1 # For the GUI, go to: 1. System > Administrators. 2.
      Select 'support1' and click 'Edit'. 3. Under 'Administrator Profile', select
      'tier_1'. Default Value: By default, there are only 2 profiles: prof_admin and
      super_admin. You must select a profile to create an admin account. The system
      will not automatically choose for you. References: 1.
      https://docs.fortinet.com/document/fortigate/7.2.0/administration-
      guide/294491/administrator-profiles Additional Information: You cannot change
      the profile of the account you are already logged in as. The profile
      'super_admin' cannot be deleted or modified.
    references: >
      1. https://docs.fortinet.com/document/fortigate/7.2.0/administration-
      guide/294491/administrator-profiles Additional Information: You cannot change
      the profile of the account you are already logged in as. The profile
      'super_admin' cannot be deleted or modified.
    impact: >
      
    compliance_mappings:
      cis:
        - "CIS_FORTIGATE_7_0_x_v1_3_0_2_4_3"
