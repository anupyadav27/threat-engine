  - rule_id: fortigate.cis.4.block_high_risk_categories_on_application_control
    title: "Block high risk categories on Application Control"
    severity: high
    category: networking
    tech_type: fortigate
    automation_type: manual
    cis_benchmark: "CIS_FORTIGATE v1.1.0"
    cis_version: "v1.1.0"
    cis_control: "4.4.1"
    cis_section: "4"
    profile_applicability: "Level 1"
    description: >
      Ensure FortiGate Application Control blocks high risk application to reduce
      attack surface.
    rationale: >
      High risk applications such as those in 'P2P' and 'Proxy' are known for
      spreading malwares. Other than that, some of these traffic is encrypted and
      therefore is able to bypass network security inspection (for those without
      decryption implemented). Blocking these applications from running eliminates
      this risk. If any application that falls under 'P2P' and 'Proxy' requires to
      be allowed based on organization's policy, that specific application needs to
      be under 'Monitor' mode in the 'Application and Filter Override'
      configuration.
    audit_procedure: >
      GUI: Go to 'Security Profiles' > 'Application Control' > select App Control
      profile Validate that 'P2P' and 'Proxy' category is blocked.
    remediation: >
      Review Application Control Security Profiles and validate that 'P2P' and
      'Proxy' category is blocked. Default Value: Disabled on default profile
    references: >
      
    impact: >
      
    compliance_mappings:
      cis:
