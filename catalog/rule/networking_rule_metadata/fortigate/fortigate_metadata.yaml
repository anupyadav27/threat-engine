  - rule_id: fortigate.cis.1.disable_all_management_related_services_on_wan
    title: "Disable all management related services on WAN port"
    severity: high
    category: networking
    tech_type: fortigate
    automation_type: manual
    cis_benchmark: "CIS_FORTIGATE v1.1.0"
    cis_version: "v1.1.0"
    cis_control: "1.3"
    cis_section: "1"
    profile_applicability: "Level 1"
    description: >
      Enabling any management related services on WAN interface is high risk.
      Management related services such as HTTPS, HTTP, ping, SSH, SNMP, and Radius
      should be disabled on WAN.
    rationale: >
      Management related services should only be enabled on management interface.
      This is part of defending the firewall from attacks and reducing attack
      surface. For WAN related services such as IPSec and SSLVPN, make use of local-
      in-policy (refer to CIS Section 2.4) to tighten firewall defenses. Impact:
      Enabling management related services on WAN port is convenient but it exposes
      the firewall to unnecessary risks. Vulnerabilities found on vendor devices are
      commonly related to management services and opening access to these allows
      attackers to exploit its vulnerabilities.
    audit_procedure: >
      On GUI: Go to 'Network' > 'Interfaces'. Identify WAN interface and validate
      that HTTPS, HTTP, PING, SSH, SNMP, and Radius Accounting is not enabled in
      'Administrative Access' section. On CLI: `FGT1 # show system interface`
      Identify WAN interface and validate that 'set allowaccess' does not have ping,
      https, http, ssh, snmp or radius-acct configured.
    remediation: >
      On GUI: Go to 'Network' > 'Interfaces'. Review WAN interface and disable
      HTTPS, HTTP, ping, SSH, SNMP, and Radius services. On CLI: FGT1 # config
      system interface FGT1 (interface) # edit 'port1' FGT1 (port1) # unselect
      allowaccess ping https ssh snmp http radius-acct Note: 1. Interface name may
      differ based on deployment. For this example, port1 is deployed as WAN
      interface. 2. 'unselect allowaccess' will only show services that you have
      enabled. If you have not enabled snmp on that interface, then snmp option will
      not be available. 2 System Settings This topic contains information and best
      practices about FortiGate administration and system configuration. 2.1 General
      Settings
    references: >
      
    impact: >
      Enabling management related services on WAN port is convenient but it exposes
      the firewall to unnecessary risks. Vulnerabilities found on vendor devices are
      commonly related to management services and opening access to these allows
      attackers to exploit its vulnerabilities.
    compliance_mappings:
      cis:
        - "CIS_FORTIGATE_v1_1_0_1_3"
      nist_800_53: []
      soc2: []
      pci_dss: []
    source_unique_id: "cis_fortigate_v1_1_0_1_3"
