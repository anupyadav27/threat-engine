  - rule_id: fortigate.cis.2.default_admin_password_is_changed
    title: "Ensure default 'admin' password is changed"
    severity: high
    category: networking
    tech_type: fortigate
    automation_type: manual
    cis_benchmark: "CIS_FORTIGATE v1.1.0"
    cis_version: "v1.1.0"
    cis_control: "2.4.1"
    cis_section: "2"
    profile_applicability: "Level 1"
    description: >
      Before deploying any new FortiGate, it is important to change the password of
      the default admin account. It is also recommended that you change even the
      user name of the default admin account; however, since you cannot change the
      user name of an account that is currently in use, a second administrator
      account must be created in order to do this.
    rationale: >
      Default credentials are well documented by most vendors including Fortinet.
      Therefore, it will be one of the first things that will be tried to illegally
      gain access to the system. Impact: if not changed, then any scripts that use
      default credentials will be able to access the system.
    audit_procedure: >
      Using both CLI and GUI, in the username field put in 'admin', leave the
      password field blank and proceed. If it's checked out, it means that the
      default password is still in place and needs to be changed.
    remediation: >
      In the CLI, to change the password of account 'admin' FG1 # config system
      admin FG1 (admin) # edit 'admin' FG1 (admin) # set password <your passwords>
      FG1 (admin) # end FG1 # To change the default password in the GUI: 1) Login to
      FortiGate with admin account 2) Go to System > Administrators. 3) Edit the
      admin account. 4) Click Change Password. 5) If applicable, enter the current
      password in the Old Password field. 6) Enter a password in the New Password
      field, then enter it again in the Confirm Password field. 7) Click OK. Default
      Value: By default, your FortiGate has an administrator account set up with the
      username admin and no password. In order to prevent unauthorized access to
      FortiGate, it is highly recommended that you add a password to this account.
      Username: admin The default admin account does not have any password. Just
      leave it blank References: 1.
      https://kb.fortinet.com/kb/documentLink.do?externalID=FD48763 2.
      https://docs.fortinet.com/document/fortigate/6.2.0/cookbook/99980/default-
      administrator-password Additional Information: In FortiOS 6.2.1 and later,
      adding a password to the admin administrator is mandatory. You will be
      prompted to configure it the first time you log in to the FortiGate using that
      account, after a factory reset, and after a new image installation.
    references: >
      1. https://kb.fortinet.com/kb/documentLink.do?externalID=FD48763 2.
      https://docs.fortinet.com/document/fortigate/6.2.0/cookbook/99980/default-
      administrator-password Additional Information: In FortiOS 6.2.1 and later,
      adding a password to the admin administrator is mandatory. You will be
      prompted to configure it the first time you log in to the FortiGate using that
      account, after a factory reset, and after a new image installation.
    impact: >
      if not changed, then any scripts that use default credentials will be able to
      access the system.
    compliance_mappings:
      cis:
        - "CIS_FORTIGATE_v1_1_0_2_4_1"
      nist_800_53: []
      soc2: []
      pci_dss: []
