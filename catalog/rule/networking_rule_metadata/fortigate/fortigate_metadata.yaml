  - rule_id: fortigate.cis.2.administrator_password_retries_and_lockout_time
    title: "Ensure administrator password retries and lockout time are configured"
    severity: high
    category: networking
    tech_type: fortigate
    automation_type: automated
    cis_benchmark: "CIS_FORTIGATE v1.1.0"
    cis_version: "v1.1.0"
    cis_control: "2.2.2"
    cis_section: "2"
    profile_applicability: "Level 1"
    description: >
      Failed login attempts can indicate malicious attempts to gain access to your
      network. To prevent this security risk, FortiGate is preconfigured to limit
      the number of failed administrator login attempts. After the maximum number of
      failed login attempts is reached, access to the account is blocked for the
      configured lockout period.
    rationale: >
      When you login and fail to enter the correct password you could be a valid
      user, or a hacker attempting to gain access. For this reason, best practices
      dictate to limit the number of failed attempts to login before a lockout
      period where you cannot login for a certain period of time. lockout period
      will minimize the hacker attempts to gain access to firewall. Impact:
      Attackers will keep attempting to access the device through brute force
      attacks without any interruption which may lead to a successful login.
    audit_procedure: >
      To check the lockout options, from CLI: get system global from the output,
      check the value of the below fields admin-lockout-threshold and admin-lockout-
      duration
    remediation: >
      To configure the lockout options, from CLI: config system global set admin-
      lockout-threshold 3 set admin-lockout-duration 60 end Default Value: By
      default, the number of password retry attempts is set to three, allowing the
      administrator a maximum of three attempts at logging in to their account
      before they are locked out for a set amount of time (by default, 60 seconds).
      To configure the lockout options, from CLI: config system global set admin-
      lockout-threshold 3 set admin-lockout-duration 60 end References: 1.
      https://docs.fortinet.com/document/fortigate/6.2.0/cookbook/631730/setting-
      the- administrator-password-retries-and-lockout-time Additional Information:
      The number of attempts and the default wait time before the administrator can
      try to enter a password again can be configured using the CLI. A maximum of
      ten retry attempts can be configured, and the lockout period can be 1 to
      2147483647 seconds (over 68 years). The higher the retry attempts, the higher
      the risk that someone might be able to guess the password.
    references: >
      1. https://docs.fortinet.com/document/fortigate/6.2.0/cookbook/631730/setting-
      the- administrator-password-retries-and-lockout-time Additional Information:
      The number of attempts and the default wait time before the administrator can
      try to enter a password again can be configured using the CLI. A maximum of
      ten retry attempts can be configured, and the lockout period can be 1 to
      2147483647 seconds (over 68 years). The higher the retry attempts, the higher
      the risk that someone might be able to guess the password.
    impact: >
      Attackers will keep attempting to access the device through brute force
