      relevant App Control profile. 3. Change any categories with 'Allow' action to
      'Monitor'. Default Value: 'Unknown Applications' category is set as 'Allow'.
      References: 1.
      https://docs.fortinet.com/document/fortigate/7.2.0/administration-
      guide/19814/basic-category-filters-and-overrides
