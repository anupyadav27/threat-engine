  - rule_id: fortigate.cis.2.all_the_login_accounts_having_specific_trusted
    title: "Ensure all the login accounts having specific trusted hosts enabled"
    severity: high
    category: networking
    tech_type: fortigate
    automation_type: manual
    cis_benchmark: "CIS_FORTIGATE v1.1.0"
    cis_version: "v1.1.0"
    cis_control: "2.4.2"
    cis_section: "2"
    profile_applicability: "Level 1"
    description: >
      Configure an administrative account to be accessible only to someone who is
      using a trusted host. You can set a specific IP address for the trusted host
      or use a subnet.
    rationale: >
      Access to a firewall to perform administrative tasks should only come from
      specific network segments reserved for administrators only. This additional
      layer of security ensure that no one from anywhere else on the network able to
      login even with correct credentials. Impact: All access, from legitimate or
      illegitimate users, outside of allowed segment will be stopped. Thus,
      administrators working remotely will have to make sure that they have access
      to jump hosts that sit in the allowed segment.
    audit_procedure: >
      This example is to check if trusted hosts option is enabled for account
      'test_admin' and which trusted hosts are in the list FG1 # config system admin
      FG1 (admin) # edit 'test_admin' FG1 (test_admin) # show config system admin
      edit 'test_admin' ... set trusthost1 10.0.0.0 255.255.255.0 set trusthost2
      192.168.10.0 255.255.255.0 ... next end In the web GUI, go to System ->
      Administrators, select the account and click on edit. In the account setting
      page, make sure that 'Restrict login to trusted hosts' are enabled and all the
      allowed hosts / subnets are in the list of trusted Host. Please take note that
      certain versions of FortiOS will only show the first 3 trusted hosts in the
      list. If you want to see more, you have to click on the '+' sign as if you're
      adding a new item into the list. Keep clicking until you see an empty field of
      trusted host. That's when you know that you have reached the bottom of the
      list.
    remediation: >
      To remove a trusted host item from the list in CLI FG1 # config system admin
      FG1 (admin) # edit 'test_admin' FG1 (test_admin) # unset trusthost1 FG1
      (test_admin) # end FG1 # To add a trusted host into the list in CLI FG1 #
      config system admin FG1 (admin) # edit 'test_admin' FG1 (test_admin) # set
      trusthost6 1.1.1.1 255.255.255.255 FG1 (test_admin) # end FG1 # Before adding
      an item, please make sure that it does not already exist. For example, if
      trusthost3 is already in the list, using it again will over-ride the existing
      host/network. In the web GUI, go to System -> Administrators, select the
      account and click on edit. In the account setting page, make sure that
      'Restrict login to trusted hosts' are enabled and all the allowed hosts /
      subnets are in the list of trusted Host. Please take note that certain
      versions of FortiOS will only show the first 3 trusted hosts in the list. If
      you want to see more, you have to click on the '+' sign as if you're adding a
      new item into the list. Keep clicking until you see an empty field of trusted
      host. That's when you know that you have reached the bottom of the list. To
      add another trusted host, fill in the empty field of the new 'Trusted Host'.
      To remove a trusted host, simply erase everything in the field of that
      corresponding host. Default Value: By default, each account is accessible from
      everywhere , the host value is 0.0.0.0/0 References: 1.
      https://docs.fortinet.com/document/fortigate/6.0.0/cookbook/222079/using-a-
      trusted-host-optional
    references: >
      1. https://docs.fortinet.com/document/fortigate/6.0.0/cookbook/222079/using-a-
      trusted-host-optional
    impact: >
      All access, from legitimate or illegitimate users, outside of allowed segment
      will be stopped. Thus, administrators working remotely will have to make sure
      that they have access to jump hosts that sit in the allowed segment.
    compliance_mappings:
      cis:
        - "CIS_FORTIGATE_v1_1_0_2_4_2"
      nist_800_53: []
      soc2: []
      pci_dss: []
