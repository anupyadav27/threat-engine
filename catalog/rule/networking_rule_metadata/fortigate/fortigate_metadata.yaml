  - rule_id: fortigate.cis.1.intra_zone_traffic_is_not_always_allowed
    title: "Ensure intra-zone traffic is not always allowed"
    severity: high
    category: networking
    tech_type: fortigate
    automation_type: manual
    cis_benchmark: "CIS_FORTIGATE v1.1.0"
    cis_version: "v1.1.0"
    cis_control: "1.2"
    cis_section: "1"
    profile_applicability: "Level 1"
    description: >
      This is to make sure that only specific, authorized traffic are allowed
      between networks in the same zone.
    rationale: >
      This adds an extra layer of protection between different networks
    audit_procedure: >
      In this example, we'll verify the zone DMZ. In CLI: FGT1 # config system zone
      FGT1 (zone) # edit DMZ FGT1 (DMZ) # show full config system zone edit 'DMZ'
      ... set intrazone deny ... next end In the GUI, click on Network ->
      Interfaces, select the zone and click on 'Edit'. Make sure that the option
      'Block intra-zone traffic' is enabled.
    remediation: >
      In this example, we'll turn of intra-zone traffic in the zone DMZ. In CLI:
      FGT1 # config system zone FGT1 (zone) # edit DMZ FGT1 (DMZ) # set intrazone
      deny FGT1 (DMZ) # end FGT1 # In the GUI, click on Network -> Interfaces,
      select the zone and click on 'Edit' and turn on 'Block intra-zone traffic'
      Default Value: By default, intra-zone traffic is blocked References: 1.
      https://docs.fortinet.com/document/fortigate/6.2.0/cookbook/116821/zone
    references: >
      1. https://docs.fortinet.com/document/fortigate/6.2.0/cookbook/116821/zone
    impact: >
      
    compliance_mappings:
      cis:
        - "CIS_FORTIGATE_v1_1_0_1_2"
