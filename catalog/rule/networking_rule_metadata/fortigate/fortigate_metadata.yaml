      interface FG1 (interface) # edit port1 FG1 (port1) # set allowaccess ssh https
      ping snmp FG1 (port1) # end FG1 # In the web GUI, click on Network ->
      Interfaces, select the interface and click 'Edit'. In the interface setting
      page, uncheck HTTP and Telnet in the section 'Administrative Access'. Default
      Value: By default, HTTP and Telnet are not enabled on any interface.
