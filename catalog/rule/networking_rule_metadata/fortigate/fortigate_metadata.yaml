  - rule_id: fortigate.cis.2.password_policy_is_enabled
    title: "Ensure 'Password Policy' is enabled"
    severity: high
    category: networking
    tech_type: fortigate
    automation_type: automated
    cis_benchmark: "CIS_FORTIGATE v1.1.0"
    cis_version: "v1.1.0"
    cis_control: "2.2.1"
    cis_section: "2"
    profile_applicability: "Level 1"
    description: >
      It is important to use secure and complex passwords for preventing
      unauthorized access to the FortiGate device.
    rationale: >
      Attackers can use Brute force password software to launch more than just
      dictionary attacks. such Attacks can discover common passwords where a letter
      is replaced by a number or symbol. Impact: Weak passwords can be easily
      discovered by hackers which leads to unauthorized access to FortiGate and
      depends on the access privilege of the compromised account the attacker may
      modify the settings.
    audit_procedure: >
      currently implemented password policy can be shown from GUI or CLI From CLI,
      type get system password-policy From GUI, Or from GUI as follows: 1) log in to
      FortiGate with a user with at least read-only privileges 2) Go to 'System' ->
      'Settings' 3) find and check the status of the 'password Policy' Section
    remediation: >
      can be modified from CLI or GUI From CLI, do the following: config system
      password-policy set status enable set apply-to admin-password ipsec-preshared-
      key set minimum-length 8 set min-lower-case-letter 1 set min-upper-case-letter
      1 set min-non-alphanumeric 1 set min-number 1 set expire-status enable set
      expire-day 90 set reuse-password disable end or From GUI, do the following 1)
      log in to FortiGate as Super Admin 2) Go to 'System' -> 'Settings' 3) find the
      'password Policy' Section 4) Default 'Password scope' is 'Off', change it to
      'Both' 5) set 'Minimum length' to '8' 6) Enable 'Character requirements' 7)
      set minimum '1' in the filed of 'Upper Case', 'Lower Case', 'Numbers (0- 9)'
      and 'Special' 8) Disable 'Allow password reuse' 9) Enable 'Password
      expiration' and set it to 90 Default Value: By Default, Password Policy is
      disabled, can be checked from CLI as follows: config system password-policy
      set status disable end Or from GUI as follows: 1) log in to FortiGate as Super
      Admin 2) Go to 'System '-> 'Settings' 3) find the 'password Policy' Section 4)
      Default 'Password scope' is 'Off' References: 1.
      https://kb.fortinet.com/kb/documentLink.do?externalID=FD31021 2.
      https://docs.fortinet.com/document/fortigate/7.0.0/cli-reference/11620/config-
      system-password-policy 3.
      https://docs.fortinet.com/document/fortigate/7.0.0/administration-
      guide/364729/password-policy Additional Information: Consider the following to
      ensure better security: • Do not use passwords that are obvious, such as the
      company name, administrator names, or other obvious words or phrases. • Use
      numbers in place of letters, for example: passw0rd. • Administrator passwords
      can be up to 64 characters. • Include a mixture of numbers, symbols, and upper
      and lower case letters. • Use multiple words together, or possibly even a
      sentence, for example: correcthorsebatterystaple. • Use a password generator.
      • Change the password regularly and always make the new password unique and
      not a variation of the existing password. for example, do not change from
      password to password1. • Make note of the password and store it in a safe
      place away from the management computer, in case you forget it; or ensure at
      least two people know the password in the event one person becomes
      unavailable. Alternatively, have two different admin logins. FortiGate allows
      you to create a password policy for administrators and IPsec pre- shared keys.
      With this policy, you can enforce regular changes and specific criteria for a
      password policy, including: • The minimum length, between 8 and 64 characters.
      • If the password must contain uppercase (A, B, C) and/or lowercase (a, b, c)
      characters. • If the password must contain numbers (1, 2, 3). • If the
      password must contain special or non-alphanumeric characters: !, @, #, $, %,
      ^, &, *, (, and ) • Where the password applies (admin or IPsec or both). • The
      duration of the password before a new one must be specified. • The minimum
      number of unique characters that a new password must include.
    references: >
      1. https://kb.fortinet.com/kb/documentLink.do?externalID=FD31021 2.
      https://docs.fortinet.com/document/fortigate/7.0.0/cli-reference/11620/config-
      system-password-policy 3.
      https://docs.fortinet.com/document/fortigate/7.0.0/administration-
      guide/364729/password-policy Additional Information: Consider the following to
      ensure better security: • Do not use passwords that are obvious, such as the
      company name, administrator names, or other obvious words or phrases. • Use
