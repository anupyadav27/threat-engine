  - rule_id: fortigate.cis.7.configuring_the_maximum_login_attempts_and
    title: "Configuring the maximum login attempts and lockout period"
    severity: medium
    category: networking
    tech_type: fortigate
    automation_type: automated
    cis_benchmark: "CIS_FORTIGATE v1.1.0"
    cis_version: "v1.1.0"
    cis_control: "7.1"
    cis_section: "7"
    profile_applicability: "Level 2"
    description: >
      Configure maximum user log in attempts and lockout period
    rationale: >
      Failed user log in attempts can indicate an attempt to gain access to the
      network. Limiting the number of attempts before the account is locked for a
      determined amount of time helps slow down brute force attempts and impedes
      malicious attempts to access user accounts.
    audit_procedure: >
      CLI: config user setting get (Validate auth-lockout-threshold * the number of
      attempts before locking out the account and auth-lockout duration * the
      duration of the lockout once the failed attempts is met)
    remediation: >
      CLI: config user setting set auth-lockout-threshold 5 end config user setting
      set auth-lockout-duration 300 end Default Value: auth-lockout-threshold: 3
      auth-lockout-duration: 0 8 Logs and Reports This section provides best
      practices related to logging and reporting in FortiGate. 8.1 Enable Logging
      How to enable logging on the FortiGate device.
