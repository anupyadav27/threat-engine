    cis_section: "2"
    profile_applicability: "Level 1"
    description: >
      Log system messages and debug output to a remote host.
    rationale: >
      Cisco routers can send their log messages to a Unix-style Syslog service. A
      syslog service simply accepts messages and stores them in files or prints them
      according to a simple configuration file. This form of logging is best because
      it can provide protected long-term storage for logs (the devices internal
      logging buffer has limited capacity to store events.) In addition, logging to
      an external system is highly recommended or required by most security
      standards. If desired or required by policy, law and/or regulation, enable a
      second syslog server for redundancy. Impact: Logging is an important process
      for an organization managing technology risk. The 'logging host' command sets
      the IP address of the logging host and enforces the logging process.
    audit_procedure: >
      Perform the following to determine if a syslog server is enabled: Verify one
      or more IP address(es) returns hostname#sh log | incl logging host
    remediation: >
      Designate one or more syslog servers by IP address. hostname(config)#logging
      host {syslog_server} Default Value: System logging messages are not sent to
      any remote host. References: 1.
      http://www.cisco.com/en/US/docs/ios/netmgmt/command/reference/nm_09.html#
