  - rule_id: cisco_ios_xe.cis.1.enable_aaa_authentication_login
    title: "Enable 'aaa authentication login'"
    severity: high
    category: networking
    tech_type: cisco_ios_xe
    automation_type: automated
    cis_benchmark: "CIS_CISCO_IOS_XE 17.x_v2.2.0"
    cis_version: "17.x_v2.2.0"
    cis_control: "1.1.2"
    cis_section: "1"
    profile_applicability: "Level 1"
    description: >
      Sets authentication, authorization and accounting (AAA) authentication at
      login.
    rationale: >
      Using AAA authentication for interactive management access to the device
      provides consistent, centralized control of your network. The default under
      AAA (local or network) is to require users to log in using a valid user name
      and password. This rule applies for both local and network AAA. Fallback mode
      should also be enabled to allow emergency access to the router or switch in
      the event that the AAA server was unreachable, by utilizing the LOCAL keyword
      after the AAA server-tag. Impact: Implementing Cisco AAA is significantly
      disruptive as former access methods are immediately disabled. Therefore,
      before implementing Cisco AAA, the organization should carefully review and
      plan their authentication methods such as logins and passwords, challenges and
      responses, and which token technologies will be used.
    audit_procedure: >
      Perform the following to determine if AAA authentication for login is enabled:
      hostname#show running-config | incl aaa authentication login If a result does
      not return, the feature is not enabled.
    remediation: >
      Configure AAA authentication method(s) for login authentication.
      hostname(config)#aaa authentication login {default | aaa_list_name} [passwd-
      expiry] [method1] [method2] Default Value: AAA authentication at login is
      disabled. References: 1. http://www.cisco.com/en/US/docs/ios-
      xml/ios/security/a1/sec-cr-a1.html#GUID- 3DB1CC8A-4A98-400B-A906-C42F265C7EA2
      Additional Information: Only “the default method list is automatically applied
      to all interfaces except those that have a named method list explicitly
      defined. A defined method list overrides the default method list.” (1)
    references: >
      1. http://www.cisco.com/en/US/docs/ios-xml/ios/security/a1/sec-
      cr-a1.html#GUID- 3DB1CC8A-4A98-400B-A906-C42F265C7EA2 Additional Information:
      Only “the default method list is automatically applied to all interfaces
      except those that have a named method list explicitly defined. A defined
      method list overrides the default method list.” (1)
    impact: >
      Implementing Cisco AAA is significantly disruptive as former access methods
      are immediately disabled. Therefore, before implementing Cisco AAA, the
      organization should carefully review and plan their authentication methods
      such as logins and passwords, challenges and responses, and which token
      technologies will be used.
    compliance_mappings:
      cis:
        - "CIS_CISCO_IOS_XE_17_x_v2_2_0_1_1_2"
      nist_800_53: []
      soc2: []
      pci_dss: []
    source_unique_id: "cis_cisco_ios_xe_17_x_v2_2_0_1_1_2"
    metadata_source: generated
    generated_by: generate_tech_rules

