  - rule_id: cisco_ios_xe.cis.1.set_priv_for_each_snmp_server_group_using_snmpv3
    title: "Set 'priv' for each 'snmp-server group' using SNMPv3"
    severity: high
    category: networking
    tech_type: cisco_ios_xe
    automation_type: automated
    cis_benchmark: "CIS_CISCO_IOS_XE 17.x_v2.2.0"
    cis_version: "17.x_v2.2.0"
    cis_control: "1.5.9"
    cis_section: "1"
    profile_applicability: "Level 1"
    description: >
      Specifies authentication of a packet with encryption when using SNMPv3
    rationale: >
      SNMPv3 provides much improved security over previous versions by offering
      options for Authentication and Encryption of messages. When configuring a user
      for SNMPv3 you have the option of using a range of encryption schemes, or no
      encryption at all, to protect messages in transit. AES128 is the minimum
      strength encryption method that should be deployed. Impact: Organizations
      using SNMP can significantly reduce the risks of unauthorized access by using
      the 'snmp-server group v3 priv' setting to encrypt messages in transit.
    audit_procedure: >
      Verify the result show the appropriate group name and security model
      hostname#show snmp group
    remediation: >
      For each SNMPv3 group created on your router add privacy options by issuing
      the following command... hostname(config)#snmp-server group
      {<em>group_name</em>} v3 priv Default Value: No SNMP server groups are
      configured. References: 1. http://www.cisco.com/en/US/docs/ios-
      xml/ios/snmp/command/nm-snmp-cr-
      s5.html#GUID-56E87D02-C56F-4E2D-A5C8-617E31740C3F
    references: >
