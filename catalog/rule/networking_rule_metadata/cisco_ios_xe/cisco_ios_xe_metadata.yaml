  - rule_id: cisco_ios_xe.cis.2.set_service_tcp_keepalives_in
    title: "Set 'service tcp-keepalives-in'"
    severity: high
    category: networking
    tech_type: cisco_ios_xe
    automation_type: automated
    cis_benchmark: "CIS_CISCO_IOS_XE 17.x_v2.2.0"
    cis_version: "17.x_v2.2.0"
    cis_control: "2.1.5"
    cis_section: "2"
    profile_applicability: "Level 1"
    description: >
      Generate keepalive packets on idle incoming network connections.
    rationale: >
      Stale connections use resources and could potentially be hijacked to gain
      illegitimate access. The TCP keepalives-in service generates keepalive packets
      on idle incoming network connections (initiated by remote host). This service
      allows the device to detect when the remote host fails and drop the session.
      If enabled, keepalives are sent once per minute on idle connections. The
      connection is closed within five minutes if no keepalives are received or
      immediately if the host replies with a reset packet. Impact: To reduce the
      risk of unauthorized access, organizations should implement a security policy
      restricting how long to allow terminated sessions and enforce this policy
      through the use of 'tcp-keepalives-in' command.
    audit_procedure: >
      Perform the following to determine if the feature is enabled: Verify a command
      string result returns hostname#show run | incl service tcp
    remediation: >
      Enable TCP keepalives-in service: hostname(config)#service tcp-keepalives-in
      Default Value: Disabled by default. References: 1.
      http://www.cisco.com/en/US/docs/ios-
      xml/ios/fundamentals/command/R_through_setup.html#GUID-1489ABA3-2428-
      4A64-B252-296A035DB85E
    references: >
      1. http://www.cisco.com/en/US/docs/ios-
      xml/ios/fundamentals/command/R_through_setup.html#GUID-1489ABA3-2428-
      4A64-B252-296A035DB85E
    impact: >
      To reduce the risk of unauthorized access, organizations should implement a
      security policy restricting how long to allow terminated sessions and enforce
      this policy through the use of 'tcp-keepalives-in' command.
    compliance_mappings:
      cis:
        - "CIS_CISCO_IOS_XE_17_x_v2_2_0_2_1_5"
      nist_800_53: []
      soc2: []
      pci_dss: []
