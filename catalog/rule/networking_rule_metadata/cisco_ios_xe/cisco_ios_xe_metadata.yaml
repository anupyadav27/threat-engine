  - rule_id: cisco_ios_xe.cis.1.set_the_acl_for_each_snmp_server_community
    title: "Set the ACL for each 'snmp-server community'"
    severity: high
    category: networking
    tech_type: cisco_ios_xe
    automation_type: manual
    cis_benchmark: "CIS_CISCO_IOS_XE 17.x_v2.2.0"
    cis_version: "17.x_v2.2.0"
    cis_control: "1.5.5"
    cis_section: "1"
    profile_applicability: "Level 1"
    description: >
      This feature specifies a list of IP addresses that are allowed to use the
      community string to gain access to the SNMP agent.
    rationale: >
      If ACLs are not applied, then anyone with a valid SNMP community string can
      potentially monitor and manage the router. An ACL should be defined and
      applied for all SNMP access to limit access to a small number of authorized
      management stations segmented in a trusted management zone. If possible, use
      SNMPv3 which uses authentication, authorization, and data privatization
      (encryption). Impact: To reduce the risk of unauthorized access, Organizations
      should enable access control lists for all snmp-server communities and
      restrict the access to appropriate trusted management zones. If possible,
      implement SNMPv3 to apply authentication, authorization, and data
      privatization (encryption) for additional benefits to the organization.
    audit_procedure: >
      Perform the following to determine if an ACL is enabled: Verify the result
      shows a number after the community string hostname#show run | incl snmp-server
      community
    remediation: >
      Configure authorized SNMP community string and restrict access to authorized
      management systems. hostname(config)#snmp-server community
      <<em>community_string</em>> ro {<em>snmp_access-list_number |
      <span>snmp_access-list_name</span></em><span>}</span> Default Value: No ACL is
      set for SNMP References: 1. http://www.cisco.com/en/US/docs/ios-
      xml/ios/snmp/command/nm-snmp-cr-
      s2.html#GUID-2F3F13E4-EE81-4590-871D-6AE1043473DE
    references: >
      1. http://www.cisco.com/en/US/docs/ios-xml/ios/snmp/command/nm-snmp-cr-
      s2.html#GUID-2F3F13E4-EE81-4590-871D-6AE1043473DE
    impact: >
      To reduce the risk of unauthorized access, Organizations should enable access
      control lists for all snmp-server communities and restrict the access to
      appropriate trusted management zones. If possible, implement SNMPv3 to apply
      authentication, authorization, and data privatization (encryption) for
      additional benefits to the organization.
    compliance_mappings:
      cis:
        - "CIS_CISCO_IOS_XE_17_x_v2_2_0_1_5_5"
      nist_800_53: []
      soc2: []
