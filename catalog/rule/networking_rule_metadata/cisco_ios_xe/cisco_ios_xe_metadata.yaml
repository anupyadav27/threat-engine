      BGP peers
    rationale: >
      Enforcing routing authentication reduces the likelihood of routing poisoning
      and unauthorized routers from joining BGP routing. Impact: Organizations
      should plan and implement enterprise security policies that require rigorous
      authentication methods for routing protocols. Using the 'neighbor password'
      for BGP enforces these policies by restricting the type of authentication
      between network devices.
    audit_procedure: >
      Verify you see the appropriate neighbor password is defined: hostname#sh run |
      sec router bgp
    remediation: >
