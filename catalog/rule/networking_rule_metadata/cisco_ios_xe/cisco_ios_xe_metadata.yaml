  - rule_id: cisco_ios_xe.cis.1.set_http_secure_server_limit
    title: "Set 'http Secure-server' limit"
    severity: high
    category: networking
    tech_type: cisco_ios_xe
    automation_type: automated
    cis_benchmark: "CIS_CISCO_IOS_XE 17.x_v2.2.0"
    cis_version: "17.x_v2.2.0"
    cis_control: "1.2.9"
    cis_section: "1"
    profile_applicability: "Level 1"
    description: >
      Device management includes the ability to control the number of administrators
      and management sessions that manage a device. Limiting the number of allowed
      administrators and sessions per administrator based on account type, role, or
      access type is helpful in limiting risks related to denial-of-service (DoS)
      attacks.
    rationale: >
      This requirement addresses concurrent sessions for administrative accounts and
      does not address concurrent sessions by a single administrator via multiple
      administrative accounts. The maximum number of concurrent sessions should be
      defined based upon mission needs and the operational environment for each
      system. At a minimum, limits must be set for SSH, HTTPS, account of last
      resort, and root account sessions. Center for Internet Security recommends a
      limit of 2
    audit_procedure: >
      The result should show ip http secure-server with max connections on following
      line hostname#show run | inc ip http secure-server
    remediation: >
      hostname(config)#ip http max-connections 2 References: 1. NIST SP 800-53 ::
      AC-10 2.
      https://www.tenable.com/audits/items/DISA_STIG_Cisco_IOS_XE_Switch_NDM
      _v2r1.audit:392b7a414732407810fa9d87c5a0d581 Additional Information: limiting
      http max connections is useful only if http server or http secure-server, at
      least one, is enable. if HTTP server is disabled (Artifact #2 'HTTP server is
      disabled') and HTTPS server is disabled (Artifact #3 'HTTPS server is
      disabled'), then this control is passed, otherwise it needs to limit
      connections to a maximum of 2 (Artifact #1 'Max http secure-server limit').
