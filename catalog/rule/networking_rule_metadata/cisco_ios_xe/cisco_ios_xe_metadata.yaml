  - rule_id: cisco_ios_xe.cis.1.set_no_exec_for_line_aux_0
    title: "Set 'no exec' for 'line aux 0'"
    severity: high
    category: networking
    tech_type: cisco_ios_xe
    automation_type: automated
    cis_benchmark: "CIS_CISCO_IOS_XE 17.x_v2.2.0"
    cis_version: "17.x_v2.2.0"
    cis_control: "1.2.3"
    cis_section: "1"
    profile_applicability: "Level 1"
    description: >
      The 'no exec' command restricts a line to outgoing connections only.
    rationale: >
      Unused ports should be disabled, if not required, since they provide a
      potential access path for attackers. Some devices include both an auxiliary
      and console port that can be used to locally connect to and configure the
      device. The console port is normally the primary port used to configure the
      device; even when remote, backup administration is required via console server
      or Keyboard, Video, Mouse (KVM) hardware. The auxiliary port is primarily used
      for dial-up administration via an external modem; instead, use other available
      methods. Impact: Organizations can reduce the risk of unauthorized access by
      disabling the 'aux' port with the 'no exec' command. Conversely, not
      restricting access through the 'aux' port increases the risk of remote
      unauthorized access.
    audit_procedure: >
      Perform the following to determine if the EXEC process for the aux port is
      disabled: Verify no exec hostname#show running-config all | sec aux Verify you
      see the following 'no exec'
    remediation: >
      Disable the EXEC process on the auxiliary port. hostname(config)#line aux 0
      hostname(config-line)#no exec References: 1.
      https://www.cisco.com/c/en/us/td/docs/switches/lan/catalyst9200/software/releas
      e/17-6/command_reference/b_176_9200_cr.html Additional Information: Some Cisco
      devices don't even have an auxiliary port, therefore this control will fail.
      Adjusting this control logic: check for existence of auxiliary port (ie check
      for 'none_exist' of a section with 'aux') combined with a logical OR with the
      current control.
    references: >
      1.
      https://www.cisco.com/c/en/us/td/docs/switches/lan/catalyst9200/software/releas
      e/17-6/command_reference/b_176_9200_cr.html Additional Information: Some Cisco
      devices don't even have an auxiliary port, therefore this control will fail.
      Adjusting this control logic: check for existence of auxiliary port (ie check
      for 'none_exist' of a section with 'aux') combined with a logical OR with the
      current control.
    impact: >
      Organizations can reduce the risk of unauthorized access by disabling the
      'aux' port with the 'no exec' command. Conversely, not restricting access
      through the 'aux' port increases the risk of remote unauthorized access.
    compliance_mappings:
      cis:
