    cis_section: "3"
    profile_applicability: "Level 1"
    description: >
      Disable the handling of IP datagrams with source routing header options.
    rationale: >
      Source routing is a feature of IP whereby individual packets can specify
      routes. This feature is used in several kinds of attacks. Cisco routers
      normally accept and process source routes. Unless a network depends on source
      routing, it should be disabled. Impact: Organizations should plan and
      implement network policies to ensure unnecessary services are explicitly
      disabled. The 'ip source-route' feature has been used in several attacks and
      should be disabled.
