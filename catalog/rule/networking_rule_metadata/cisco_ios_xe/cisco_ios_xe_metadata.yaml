      cr-t2-z.html#GUID- 34B3E43E-0F79-40E8-82B6-A4B5F1AFF1AD
    impact: >
      Organizations should create policies requiring all local accounts with
      'privilege level 1' with encrypted passwords to reduce the risk of
      unauthorized access. Default configuration settings do not provide strong user
      authentication to the device.
