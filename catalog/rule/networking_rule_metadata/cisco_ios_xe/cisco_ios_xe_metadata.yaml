  - rule_id: cisco_ios_xe.cis.1.set_username_secret_for_all_local_users
    title: "Set 'username secret' for all local users"
    severity: high
    category: networking
    tech_type: cisco_ios_xe
    automation_type: automated
    cis_benchmark: "CIS_CISCO_IOS_XE 17.x_v2.2.0"
    cis_version: "17.x_v2.2.0"
    cis_control: "1.4.3"
    cis_section: "1"
    profile_applicability: "Level 1"
    description: >
      Username secret password type 5 and enable secret password type 5 must be
      migrated to the stronger password type 8 or 9. IF a device is upgraded from
      IOS XE 16.9 or later the type 5 is auto converted to type 9. The username
      secret command provides an additional layer of security over the username
      password.
    rationale: >
      Default device configuration does not require strong user authentication
      potentially enabling unfettered access to an attacker that is able to reach
      the device. Creating a local account with an encrypted password enforces login
      authentication and provides a fallback authentication mechanism for
      configuration in a named method list in a situation where centralized
      authentication, authorization, and accounting services are unavailable.
      Impact: Organizations implementing 'username secret' across their enterprise
      reduce the risk of unauthorized users gaining access to Cisco IOS devices by
      applying a MD5 hash and encrypting user passwords.
    audit_procedure: >
      Perform the following to determine if a user with an encrypted password is
      enabled: If a result does not return with secret, the feature is not enabled
      hostname#show run | incl username
    remediation: >
      Create a local user with an encrypted, complex (not easily guessed) password.
      hostname(config)#username {{em}LOCAL_USERNAME{/em}} secret
      {{em}LOCAL_PASSWORD{/em}} Default Value: No passwords are set by default
      References: 1.
      https://www.cisco.com/c/en/us/td/docs/switches/lan/catalyst9600/software/releas
      e/16-
      12/configuration_guide/sec/b_1612_sec_9600_cg/controlling_switch_access_wit
      h_passwords_and_privilege_levels.html Additional Information: if any local
      user is defined ensure that 'secret 9' is used for each of them (Artifact #1
      'check all username are using secret 9 only'), so that reverting the hash to
      the password is difficult.
    references: >
      1.
      https://www.cisco.com/c/en/us/td/docs/switches/lan/catalyst9600/software/releas
      e/16-
      12/configuration_guide/sec/b_1612_sec_9600_cg/controlling_switch_access_wit
      h_passwords_and_privilege_levels.html Additional Information: if any local
      user is defined ensure that 'secret 9' is used for each of them (Artifact #1
      'check all username are using secret 9 only'), so that reverting the hash to
      the password is difficult.
    impact: >
      Organizations implementing 'username secret' across their enterprise reduce
      the risk of unauthorized users gaining access to Cisco IOS devices by applying
      a MD5 hash and encrypting user passwords.
