rules:

  - rule_id: cisco_ios_xe.cis.1.enable_aaa_new_model
    title: "Enable 'aaa new-model'"
    severity: high
    category: networking
    tech_type: cisco_ios_xe
    automation_type: automated
    cis_benchmark: "CIS_CISCO_IOS_XE 17.x_v2.2.0"
    cis_version: "17.x_v2.2.0"
    cis_control: "1.1.1"
    cis_section: "1"
    profile_applicability: "Level 1"
    description: >
      This command enables the AAA access control system.
    rationale: >
      Authentication, authorization and accounting (AAA) services provide an
      authoritative source for managing and monitoring access for devices.
      Centralizing control improves consistency of access control, the services that
      may be accessed once authenticated and accountability by tracking services
      accessed. Additionally, centralizing access control simplifies and reduces
      administrative costs of account provisioning and de- provisioning, especially
      when managing a large number of devices. Impact: Implementing Cisco AAA is
      significantly disruptive as former access methods are immediately disabled.
      Therefore, before implementing Cisco AAA, the organization should carefully
      review and plan their authentication criteria (logins & passwords, challenges
      & responses, and token technologies), authorization methods, and accounting
      requirements.
    audit_procedure: >
      Perform the following to determine if AAA services are enabled: hostname#show
      running-config | inc aaa new-model If the result includes a 'no', the feature
      is not enabled.
    remediation: >
      Globally enable authentication, authorization and accounting (AAA) using the
      new- model command. hostname(config)#aaa new-model Default Value: AAA is not
      enabled. References: 1. http://www.cisco.com/en/US/docs/ios-
      xml/ios/security/a1/sec-cr-a2.html#GUID- E05C2E00-C01E-4053-9D12-EC37C7E8EEC5
      Additional Information: this is a cosmetic change: adjusting regex to match
      'aaa new-model' and nothing from line which follows next.
    references: >
      1. http://www.cisco.com/en/US/docs/ios-xml/ios/security/a1/sec-
      cr-a2.html#GUID- E05C2E00-C01E-4053-9D12-EC37C7E8EEC5 Additional Information:
      this is a cosmetic change: adjusting regex to match 'aaa new-model' and
      nothing from line which follows next.
    impact: >
      Implementing Cisco AAA is significantly disruptive as former access methods
      are immediately disabled. Therefore, before implementing Cisco AAA, the
      organization should carefully review and plan their authentication criteria
      (logins & passwords, challenges & responses, and token technologies),
      authorization methods, and accounting requirements.
