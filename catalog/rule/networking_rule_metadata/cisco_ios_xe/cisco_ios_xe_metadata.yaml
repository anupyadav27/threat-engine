  - rule_id: cisco_ios_xe.cis.1.set_login_authentication_for_ip_http
    title: "Set 'login authentication for 'ip http'"
    severity: high
    category: networking
    tech_type: cisco_ios_xe
    automation_type: automated
    cis_benchmark: "CIS_CISCO_IOS_XE 17.x_v2.2.0"
    cis_version: "17.x_v2.2.0"
    cis_control: "1.1.5"
    cis_section: "1"
    profile_applicability: "Level 1"
    description: >
      If account management functions are not automatically enforced, an attacker
      could gain privileged access to a vital element of the network security
      architecture
    rationale: >
      Configure the device to enforce authentication for the HTTP server (ip http)
      by defining a valid login method. This ensures that only authorized users can
      access the device's web-based management interface. Use AAA (Authentication,
      Authorization, and Accounting) or a predefined local username and password
      database to enforce login authentication Impact: Enabling Cisco AAA 'line
      login' is significantly disruptive as former access methods are immediately
      disabled. Therefore, before enabling Cisco AAA 'line login', the organization
      should plan and implement authentication logins and passwords, challenges and
      responses, and token technologies.
    audit_procedure: >
      Perform the following to determine if AAA authentication for line login is
      enabled: If the command does not return a result for each management access
      method, the feature is not enabled hostname#show running-config | inc ip http
      authentication
    remediation: >
      Configure management lines to require login using the default or a named AAA
      authentication list. This configuration must be set individually for all line
      types. hostname#(config)ip http secure-server hostname#(config)ip http
      authentication {default | _aaa\_list\_name_} Default Value: Login
      authentication is not enabled. Uses the default set with aaa authentication
      login. References: 1. http://www.cisco.com/en/US/docs/ios-
      xml/ios/security/d1/sec-cr-k1.html#GUID- 297BDF33-4841-441C-83F3-4DA51C3C7284
      Additional Information: This control is usefull if http or https server is
      enabled, which involves global config contains a line starting with 'ip http
      server' or 'ip http secure-server'. Then, look for ('no ip http server' and
      'no ip http secure-server') or 'ip http authentication ' config lines
    references: >
      1. http://www.cisco.com/en/US/docs/ios-xml/ios/security/d1/sec-
      cr-k1.html#GUID- 297BDF33-4841-441C-83F3-4DA51C3C7284 Additional Information:
      This control is usefull if http or https server is enabled, which involves
      global config contains a line starting with 'ip http server' or 'ip http
      secure-server'. Then, look for ('no ip http server' and 'no ip http secure-
      server') or 'ip http authentication ' config lines
    impact: >
      Enabling Cisco AAA 'line login' is significantly disruptive as former access
      methods are immediately disabled. Therefore, before enabling Cisco AAA 'line
      login', the organization should plan and implement authentication logins and
      passwords, challenges and responses, and token technologies.
    compliance_mappings:
      cis:
        - "CIS_CISCO_IOS_XE_17_x_v2_2_0_1_1_5"
      nist_800_53: []
      soc2: []
      pci_dss: []
    source_unique_id: "cis_cisco_ios_xe_17_x_v2_2_0_1_1_5"
    metadata_source: generated
    generated_by: generate_tech_rules

  - rule_id: cisco_ios_xe.cis.1.set_aaa_accounting_to_log_all_privileged_use
    title: "Set 'aaa accounting' to log all privileged use commands using 'commands 15'"
    severity: high
    category: networking
    tech_type: cisco_ios_xe
    automation_type: automated
    cis_benchmark: "CIS_CISCO_IOS_XE 17.x_v2.2.0"
    cis_version: "17.x_v2.2.0"
    cis_control: "1.1.6"
    cis_section: "1"
    profile_applicability: "Level 1"
    description: >
      Runs accounting for all commands at the specified privilege level.
    rationale: >
      Authentication, authorization and accounting (AAA) systems provide an
      authoritative source for managing and monitoring access for devices.
      Centralizing control improves consistency of access control, the services that
      may be accessed once authenticated and accountability by tracking services
      accessed. Additionally, centralizing access control simplifies and reduces
      administrative costs of account provisioning and de- provisioning, especially
      when managing many devices. AAA Accounting provides a management and audit
      trail for user and administrative sessions through TACACS+. Impact: Enabling
      'aaa accounting' for privileged commands records and sends activity to the
      accounting servers and enables organizations to monitor and analyze privileged
      activity.
    audit_procedure: >
      Perform the following to determine if aaa accounting for commands is required:
      Verify a command string result returns hostname#show running-config | incl aaa
      accounting commands
    remediation: >
      Configure AAA accounting for commands. hostname(config)#aaa accounting
      commands 15 {default | list-name | guarantee- first} {start-stop | stop-only |
      none} {radius | group group-name} Default Value: AAA accounting is disabled.
      Additional Information: Valid privilege level entries are integers from 0
      through 15.
    references: >
      
    impact: >
      Enabling 'aaa accounting' for privileged commands records and sends activity
      to the accounting servers and enables organizations to monitor and analyze
      privileged activity.
