    cis_control: "1.2.1"
    cis_section: "1"
    profile_applicability: "Level 1"
    description: >
      Sets the privilege level for the user.
    rationale: >
      Default device configuration does not require strong user authentication
      potentially enabling unfettered access to an attacker that is able to reach
      the device. Creating a local account with privilege level 1 permissions only
      allows the local user to access the device with EXEC-level permissions and
      will be unable to modify the device without using the enable password. In
      addition, require the use of an encrypted password as well (see Section
      1.1.4.4 - Require Encrypted User Passwords). Impact: Organizations should
      create policies requiring all local accounts with 'privilege level 1' with
      encrypted passwords to reduce the risk of unauthorized access. Default
      configuration settings do not provide strong user authentication to the
      device.
    audit_procedure: >
      Perform the following to determine if a user with an encrypted password is
      enabled: Verify all username results return 'privilege 1' hostname#show
      running-config | incl privilege
    remediation: >
      Set the local user to privilege level 1. hostname(config)#username
      <LOCAL_USERNAME> privilege 1 References: 1.
      http://www.cisco.com/en/US/docs/ios-xml/ios/security/s1/sec-cr-t2-z.html#GUID-
      34B3E43E-0F79-40E8-82B6-A4B5F1AFF1AD
    references: >
