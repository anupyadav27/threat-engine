  - rule_id: cisco_ios_xe.cis.1.set_exec_timeout_to_less_than_or_equal_to_10
    title: "Set 'exec-timeout' to less than or equal to 10 minutes for 'line aux 0'"
    severity: high
    category: networking
    tech_type: cisco_ios_xe
    automation_type: automated
    cis_benchmark: "CIS_CISCO_IOS_XE 17.x_v2.2.0"
    cis_version: "17.x_v2.2.0"
    cis_control: "1.2.6"
    cis_section: "1"
    profile_applicability: "Level 1"
    description: >
      If no input is detected during the interval, the EXEC facility resumes the
      current connection. If no connections exist, the EXEC facility returns the
      terminal to the idle state and disconnects the incoming session.
    rationale: >
      This prevents unauthorized users from misusing abandoned sessions. For
      example, if the network administrator leaves for the day and leaves a computer
      open with an enabled login session accessible. There is a trade-off here
      between security (shorter timeouts) and usability (longer timeouts). Review
      your local policies and operational needs to determine the best timeout value.
      In most cases, this should be no more than 10 minutes. Impact: Organizations
      should prevent unauthorized use of unattended or abandoned sessions by an
      automated control. Enabling 'exec-timeout' with an appropriate length of
      minutes or seconds prevents unauthorized access of abandoned sessions.
    audit_procedure: >
      Perform the following to determine if the timeout is configured: Verify you
      return a result hostname#show running-config all | sec line aux 0
    remediation: >
      Configure device timeout (10 minutes or less) to disconnect sessions after a
      fixed idle time. hostname(config)#line aux 0 hostname(config-line)#exec-
      timeout <timeout_in_minutes> <timeout_in_seconds> References: 1.
      http://www.cisco.com/en/US/docs/ios-
      xml/ios/fundamentals/command/D_through_E.html#GUID-76805E6F-9E89-4457-
      A9DC-5944C8FE5419 Additional Information: Some Cisco devices don't even have
      an auxiliary port, therefore this control will fail. Adjusting this control
      logic: check for existence of auxiliary port (ie check for 'none_exist' of a
      section with 'aux') combined with a logical OR with the current control. in
      addition adjusting the regex to match the control's title. Adjusting the
      'audit' section.
    references: >
      1. http://www.cisco.com/en/US/docs/ios-
      xml/ios/fundamentals/command/D_through_E.html#GUID-76805E6F-9E89-4457-
      A9DC-5944C8FE5419 Additional Information: Some Cisco devices don't even have
      an auxiliary port, therefore this control will fail. Adjusting this control
      logic: check for existence of auxiliary port (ie check for 'none_exist' of a
      section with 'aux') combined with a logical OR with the current control. in
      addition adjusting the regex to match the control's title. Adjusting the
      'audit' section.
    impact: >
      Organizations should prevent unauthorized use of unattended or abandoned
      sessions by an automated control. Enabling 'exec-timeout' with an appropriate
      length of minutes or seconds prevents unauthorized access of abandoned
      sessions.
