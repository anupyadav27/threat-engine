      effectiveness of IP spoofing, configure access control to deny any traffic
      from the external network that has a source address that should reside on the
      internal network. Include local host address or any reserved private addresses
      (RFC 1918). Ensure the permit rule(s) above the final deny rule only allow
      traffic according to your organization's least privilege policy. Impact:
      Organizations should plan and implement enterprise security policies that
      explicitly separate internal from external networks. Adding 'ip access-list'
      explicitly permitting and denying internal and external networks enforces
      these policies.
