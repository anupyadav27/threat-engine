  - rule_id: cisco_ios_xe.cis.1.set_password_for_enable_secret
    title: "Set 'password' for 'enable secret'"
    severity: high
    category: networking
    tech_type: cisco_ios_xe
    automation_type: automated
    cis_benchmark: "CIS_CISCO_IOS_XE 17.x_v2.2.0"
    cis_version: "17.x_v2.2.0"
    cis_control: "1.4.1"
    cis_section: "1"
    profile_applicability: "Level 1"
    description: >
      Use the enable secret command to provide an additional layer of security over
      the enable password. The enable secret command provides better security by
      storing the enable secret password using a nonreversible cryptographic
      function. The added layer of security encryption provides is useful in
      environments where the password crosses the network or is stored on a TFTP
      server.
    rationale: >
      In Cisco IOS XE, password types 8 and 9 are considered more secure than older
      password types because they use strong hashing algorithms. • Type 8 passwords
      use PBKDF2 with SHA-256, which is an improvement over older MD5-based hashing
      methods. • Type 9 passwords use SCRYPT, which is designed to be memory-
      intensive, making it harder for attackers to brute-force. Cisco generally
      recommends using Type 8 or Type 9 for better security, but Type 9 is the
      default in IOS XE. However, some auditors may prefer Type 8 because Type 9 is
      not NIST-approved, especially in U.S. Defense and Public Sector environments.
      Impact: While enable secret in Cisco IOS XE enhances security, it can have
      some potential drawbacks: • Password Recovery Complexity: If the password is
      lost, recovering access can be difficult, • Performance Overhead: Stronger
      hashing algorithms (like SCRYPT) can slightly increase CPU usage, especially
      on older hardware. • Configuration Management Issues: If not properly
      documented, administrators may struggle with access control changes. •
      Potential Lockout Risks: If centralized authentication fails and the enable
      secret is unknown, network administrators could be locked out. • Security
      Misconfiguration: If weak passwords are used, even with encryption, attackers
      could still brute-force them.
    audit_procedure: >
      Perform the following to determine enable secret is set: If the command does
      not return a result, the enable password is not set. hostname#sh run | incl
      enable secret
    remediation: >
      Configure a strong, enable secret password. hostname(config)#enable secret 9
      {ENABLE_SECRET_PASSWORD} Default Value: No enable secret password setup by
      default References: 1.
      https://www.cisco.com/c/en/us/td/docs/switches/lan/catalyst9600/software/releas
      e/16-
      12/configuration_guide/sec/b_1612_sec_9600_cg/controlling_switch_access_wit
      h_passwords_and_privilege_levels.html Additional Information: Note: You cannot
      recover a lost encrypted password. You must clear NVRAM and set a new
      password.
    references: >
      1.
      https://www.cisco.com/c/en/us/td/docs/switches/lan/catalyst9600/software/releas
      e/16-
      12/configuration_guide/sec/b_1612_sec_9600_cg/controlling_switch_access_wit
      h_passwords_and_privilege_levels.html Additional Information: Note: You cannot
      recover a lost encrypted password. You must clear NVRAM and set a new
      password.
    impact: >
      While enable secret in Cisco IOS XE enhances security, it can have some
      potential drawbacks: • Password Recovery Complexity: If the password is lost,
      recovering access can be difficult, • Performance Overhead: Stronger hashing
      algorithms (like SCRYPT) can slightly increase CPU usage, especially on older
      hardware. • Configuration Management Issues: If not properly documented,
      administrators may struggle with access control changes. • Potential Lockout
      Risks: If centralized authentication fails and the enable secret is unknown,
      network administrators could be locked out. • Security Misconfiguration: If
      weak passwords are used, even with encryption, attackers could still brute-
      force them.
    compliance_mappings:
      cis:
        - "CIS_CISCO_IOS_XE_17_x_v2_2_0_1_4_1"
      nist_800_53: []
      soc2: []
      pci_dss: []
    source_unique_id: "cis_cisco_ios_xe_17_x_v2_2_0_1_4_1"
    metadata_source: generated
    generated_by: generate_tech_rules

  - rule_id: cisco_ios_xe.cis.1.enable_service_password_encryption
    title: "Enable 'service password-encryption'"
    severity: high
    category: networking
    tech_type: cisco_ios_xe
    automation_type: automated
    cis_benchmark: "CIS_CISCO_IOS_XE 17.x_v2.2.0"
    cis_version: "17.x_v2.2.0"
    cis_control: "1.4.2"
    cis_section: "1"
    profile_applicability: "Level 1"
    description: >
      When password encryption is enabled, the encrypted form of the passwords is
      displayed when a more system:running-config command is entered.
    rationale: >
      This requires passwords to be encrypted in the configuration file to prevent
      unauthorized users from learning the passwords just by reading the
      configuration. When not enabled, many of the device's passwords will be
      rendered in plain text in the configuration file. This service ensures
      passwords are rendered as encrypted strings preventing an attacker from easily
      determining the configured value. Impact: Organizations implementing 'service
      password-encryption' reduce the risk of unauthorized users learning clear text
      passwords to Cisco IOS configuration files. However, the algorithm used is not
      designed to withstand serious analysis and should be treated like clear-text.
    audit_procedure: >
      Perform the following to determine if a user with an encrypted password is
      enabled: Ensure a result that matches the command return hostname#sh run |
      incl service password-encryption
    remediation: >
      Enable password encryption service to protect sensitive access passwords in
      the device configuration. hostname(config)#service password-encryption Default
      Value: Service password encryption is not set by default References: 1.
      http://www.cisco.com/en/US/docs/ios-xml/ios/security/s1/sec-cr-s1.html#GUID-
      CC0E305A-604E-4A74-8A1A-975556CE5871 Additional Information: Caution: This
      command does not provide a high level of network security. If you use this
      command, you should also take additional network security measures. Note: You
      cannot recover a lost encrypted password. You must clear NVRAM and set a new
      password.
    references: >
      1. http://www.cisco.com/en/US/docs/ios-xml/ios/security/s1/sec-
      cr-s1.html#GUID- CC0E305A-604E-4A74-8A1A-975556CE5871 Additional Information:
      Caution: This command does not provide a high level of network security. If
      you use this command, you should also take additional network security
      measures. Note: You cannot recover a lost encrypted password. You must clear
      NVRAM and set a new password.
    impact: >
      Organizations implementing 'service password-encryption' reduce the risk of
      unauthorized users learning clear text passwords to Cisco IOS configuration
      files. However, the algorithm used is not designed to withstand serious
      analysis and should be treated like clear-text.
    compliance_mappings:
      cis:
        - "CIS_CISCO_IOS_XE_17_x_v2_2_0_1_4_2"
      nist_800_53: []
      soc2: []
