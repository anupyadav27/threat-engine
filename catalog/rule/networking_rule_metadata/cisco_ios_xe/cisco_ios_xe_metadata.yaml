  - rule_id: cisco_ios_xe.cis.1.set_transport_input_none_for_line_aux_0
    title: "Set 'transport input none' for 'line aux 0'"
    severity: high
    category: networking
    tech_type: cisco_ios_xe
    automation_type: automated
    cis_benchmark: "CIS_CISCO_IOS_XE 17.x_v2.1.0"
    cis_version: "17.x_v2.1.0"
    cis_control: "1.2.9"
    cis_section: "1"
    profile_applicability: "Level 1"
    description: >
      When you want to allow only an outgoing connection on a line, use the no exec
      command.
    rationale: >
      Unused ports should be disabled, if not required, since they provide a
      potential access path for attackers. Some devices include both an auxiliary
      and console port that can be used to locally connect to and configure the
      device. The console port is normally the primary port used to configure the
      device; even when remote, backup administration is required via console server
      or Keyboard, Video, Mouse (KVM) hardware. The auxiliary port is primarily used
      for dial-up administration via an external modem; instead, use other available
      methods. Impact: Organizations should prevent all unauthorized access of
      auxiliary ports by disabling all protocols using the 'transport input none'
      command.
    audit_procedure: >
      Perform the following to determine if inbound connections for the aux port are
      disabled: Verify you see the following 'Allowed input transports are none
      hostname#sh line aux 0 | incl input transports
    remediation: >
      Disable the inbound connections on the auxiliary port. hostname(config)#line
      aux 0 hostname(config-line)#transport input none References: 1.
      http://www.cisco.com/en/US/docs/ios/termserv/command/reference/tsv_s1.html#
      wp1069219
    references: >
      1. http://www.cisco.com/en/US/docs/ios/termserv/command/reference/tsv_s1.html#
      wp1069219
    impact: >
      Organizations should prevent all unauthorized access of auxiliary ports by
      disabling all protocols using the 'transport input none' command.
