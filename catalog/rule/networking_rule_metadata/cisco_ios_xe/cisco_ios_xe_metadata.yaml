  - rule_id: cisco_ios_xe.cis.3.set_no_ip_proxy_arp
    title: "Set 'no ip proxy-arp'"
    severity: medium
    category: networking
    tech_type: cisco_ios_xe
    automation_type: automated
    cis_benchmark: "CIS_CISCO_IOS_XE 17.x_v2.2.0"
    cis_version: "17.x_v2.2.0"
    cis_control: "3.1.2"
    cis_section: "3"
    profile_applicability: "Level 2"
    description: >
      Disable proxy ARP on all interfaces.
    rationale: >
      Address Resolution Protocol (ARP) provides resolution between IP and MAC
      Addresses (or other Network and Link Layer addresses on none IP networks)
      within a Layer 2 network. Proxy ARP is a service where a device connected to
      one network (in this case the Cisco router) answers ARP Requests which are
      addressed to a host on another network, replying with its own MAC Address and
      forwarding the traffic on to the intended host. Sometimes used for extending
      broadcast domains across WAN links, in most cases Proxy ARP on enterprise
      networks is used to enable communication for hosts with mis- configured subnet
      masks, a situation which should no longer be a common problem. Proxy ARP
      effectively breaks the LAN Security Perimeter, extending a network across
      multiple Layer 2 segments. Using Proxy ARP can also allow other security
      controls such as PVLAN to be bypassed. Impact: Organizations should plan and
      implement network policies to ensure unnecessary services are explicitly
      disabled. The 'ip proxy-arp' feature effectively breaks the LAN security
      perimeter and should be disabled.
    audit_procedure: >
      Verify the proxy ARP status hostname#sh ip int {<em>interface</em>} | incl
      proxy-arp
    remediation: >
      Disable proxy ARP on all interfaces. hostname(config)#interface {interface}
      hostname(config-if)#no ip proxy-arp Default Value: Enabled References: 1.
      http://www.cisco.com/en/US/docs/ios-xml/ios/ipaddr/command/ipaddr-
      i4.html#GUID-AEB7DDCB-7B3D-4036-ACF0-0A0250F3002E
    references: >
      1. http://www.cisco.com/en/US/docs/ios-xml/ios/ipaddr/command/ipaddr-
      i4.html#GUID-AEB7DDCB-7B3D-4036-ACF0-0A0250F3002E
    impact: >
      Organizations should plan and implement network policies to ensure unnecessary
      services are explicitly disabled. The 'ip proxy-arp' feature effectively
      breaks the LAN security perimeter and should be disabled.
    compliance_mappings:
      cis:
        - "CIS_CISCO_IOS_XE_17_x_v2_2_0_3_1_2"
      nist_800_53: []
      soc2: []
      pci_dss: []
    source_unique_id: "cis_cisco_ios_xe_17_x_v2_2_0_3_1_2"
    metadata_source: generated
    generated_by: generate_tech_rules

