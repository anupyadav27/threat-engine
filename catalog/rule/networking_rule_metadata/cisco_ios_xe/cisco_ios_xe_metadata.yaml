    cis_benchmark: "CIS_CISCO_IOS_XE 17.x_v2.2.0"
    cis_version: "17.x_v2.2.0"
    cis_control: "1.1.4"
    cis_section: "1"
    profile_applicability: "Level 1"
    description: >
      Authenticates users who access the router or switch remotely through the VTY
      port.
    rationale: >
      Using AAA authentication for interactive management access to the device
      provides consistent, centralized control of your network. The default under
      AAA (local or network) is to require users to log in using a valid user name
      and password. This rule applies for both local and network AAA. Impact:
      Enabling Cisco AAA 'login authentication for line VTY' is significantly
      disruptive as former access methods are immediately disabled. Therefore,
      before enabling Cisco AAA 'login authentication for line VTY', the
      organization should plan and implement authentication logins and passwords,
      challenges and responses, and token technologies.
    audit_procedure: >
      Perform the following to determine if AAA authentication for line login is
      enabled: If the command does not return a result for each management access
      method, the feature is not enabled hostname#show running-config | sec line |
      incl login authentication
    remediation: >
      Configure management lines to require login using the default or a named AAA
      authentication list. This configuration must be set individually for all line
      types. hostname(config)#line vty {line-number} [<em>ending-line-number]
      hostname(config-line)#login authentication {default | aaa_list_name} Default
      Value: Login authentication is not enabled. Uses the default set with aaa
      authentication login. References: 1. http://www.cisco.com/en/US/docs/ios-
      xml/ios/security/d1/sec-cr-k1.html#GUID- 297BDF33-4841-441C-83F3-4DA51C3C7284
    references: >
