  - rule_id: cisco_ios_xe.cis.1.create_access_list_for_use_with_line_vty
    title: "Create 'access-list' for use with 'line vty'"
    severity: high
    category: networking
    tech_type: cisco_ios_xe
    automation_type: manual
    cis_benchmark: "CIS_CISCO_IOS_XE 17.x_v2.2.0"
    cis_version: "17.x_v2.2.0"
    cis_control: "1.2.4"
    cis_section: "1"
    profile_applicability: "Level 1"
    description: >
      Access lists control the transmission of packets on an interface, control
      Virtual Terminal Line (VTY) access, and restrict the contents of routing
      updates. The Cisco IOS software stops checking the extended access list after
      a match occurs.
    rationale: >
      VTY ACLs control what addresses may attempt to log in to the router.
      Configuring VTY lines to use an ACL, restricts the sources where a user can
      manage the device. You should limit the specific host(s) and or network(s)
      authorized to connect to and configure the device, via an approved protocol,
      to those individuals or systems authorized to administer the device. For
      example, you could limit access to specific hosts, so that only network
      managers can configure the devices only by using specific network management
      workstations. Make sure you configure all VTY lines to use the same ACL.
      Impact: Organizations can reduce the risk of unauthorized access by
      implementing access-lists for all VTY lines. Conversely, using VTY lines
      without access-lists increases the risk of unauthorized access.
    audit_procedure: >
      Perform the following to determine if the ACL is created: Verify the
      appropriate access-list definitions hostname#sh ip access-list
      <vty_acl_number>
    remediation: >
      Configure the VTY ACL that will be used to restrict management access to the
      device. hostname(config)#access-list <vty_acl_number> permit tcp
      <vty_acl_block_with_mask> any hostname(config)#access-list <vty_acl_number>
      permit tcp host <vty_acl_host> any hostname(config)#deny ip any any log
      References: 1. http://www.cisco.com/en/US/docs/ios-xml/ios/security/a1/sec-
      cr-a2.html#GUID- 9EA733A3-1788-4882-B8C3-AB0A2949120C
    references: >
      1. http://www.cisco.com/en/US/docs/ios-xml/ios/security/a1/sec-
      cr-a2.html#GUID- 9EA733A3-1788-4882-B8C3-AB0A2949120C
    impact: >
      Organizations can reduce the risk of unauthorized access by implementing
      access-lists for all VTY lines. Conversely, using VTY lines without access-
      lists increases the risk of unauthorized access.
    compliance_mappings:
