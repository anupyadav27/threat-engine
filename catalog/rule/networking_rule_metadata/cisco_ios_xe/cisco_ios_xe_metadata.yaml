  - rule_id: cisco_ios_xe.cis.1.set_no_snmp_server_to_disable_snmp_when_unused
    title: "Set 'no snmp-server' to disable SNMP when unused"
    severity: high
    category: networking
    tech_type: cisco_ios_xe
    automation_type: manual
    cis_benchmark: "CIS_CISCO_IOS_XE 17.x_v2.2.0"
    cis_version: "17.x_v2.2.0"
    cis_control: "1.5.1"
    cis_section: "1"
    profile_applicability: "Level 1"
    description: >
      If not in use, disable simple network management protocol (SNMP), read and
      write access.
    rationale: >
      SNMP read access allows remote monitoring and management of the device.
      Impact: Organizations not using SNMP should require all SNMP services to be
      disabled by running the 'no snmp-server' command.
    audit_procedure: >
      Verify the result reads 'SNMP agent not enabled' hostname#show snmp community
