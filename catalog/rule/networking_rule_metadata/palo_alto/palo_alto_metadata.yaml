  - rule_id: palo_alto.cis.2.security_policies_restrict_user_id_agent_traffic
    title: "Ensure that security policies restrict User-ID Agent traffic from crossing into untrusted zones"
    severity: high
    category: networking
    tech_type: palo_alto
    automation_type: automated
    cis_benchmark: "CIS_PALO_ALTO 11_v1.1.0"
    cis_version: "11_v1.1.0"
    cis_control: "2.8"
    cis_section: "2"
    profile_applicability: "Level 1"
    description: >
      Create security policies to deny Palo Alto User-ID traffic originating from
      the interface configured for the UID Agent service that are destined to any
      untrusted zone.
    rationale: >
      If User-ID and WMI probes are sent to untrusted zones, the risk of privileged
      information disclosure exists. The information disclosed can include the User-
      ID Agent service account name, domain name, and encrypted password hashes sent
      in User-ID and WMI probes. To prevent this exposure, msrpc traffic originating
      from the firewall to untrusted networks should be explicitly denied. This
      security policy should be in effect even for environments not currently using
      WMI probing to help guard against possible probe misconfigurations in the
      future. This setting is a 'fail safe' to prevent exposure of this information
      if any of the other WMI User control settings are misconfigured.
    audit_procedure: >
      Navigate to Device > Setup > Services > Services Features > Service Route
      Configuration > Customize. Click on the protocol in use (IPv4 and/or IPv6).
      Click UID Agent. Click on the address object for the UID Agent's IP address.
      Verify SOURCE/NAME is set to 'Deny msrpc to untrusted'. Verify SOURCE/ZONE is
      set to 'INSIDE'. Verify SOURCE/Address is set to the Address object for the
      UID Agent. Verify DESTINATION/ZONE is set to 'GUEST' and 'OUTSIDE'. Verify
      DESTINATION/Address is set to 'any'. Verify DESTINATION/Application is set to
      'msrpc'. Verify DESTINATION/Service is set to 'application-default'. Verify
      DESTINATION/Action is set to 'Block' (red circle with diagonal line).
    remediation: >
      Navigate to Device > Setup > Services > Services Features > Service Route
      Configuration > Customize. Click on the protocol in use (IPv4 and/or IPv6).
      Click UID Agent. Click on the address object for the UID Agent's IP address.
      Set SOURCE/NAME to 'Deny msrpc to untrusted'. Set SOURCE/ZONE to 'INSIDE'. Set
      SOURCE/Address to the Address object for the UID Agent. Set DESTINATION/ZONE
      to 'GUEST' and 'OUTSIDE'. Set DESTINATION/Address to 'any'. Set
      DESTINATION/Application to 'msrpc'. Set DESTINATION/Service to 'application-
      default'. Set DESTINATION/Action to 'Block' (red circle with diagonal line).
      References: 1. “Best Practices for Securing User-ID Deployments” -
      https://live.paloaltonetworks.com/docs/DOC-7912 2. “User-ID Best Practices” -
      https://live.paloaltonetworks.com/docs/DOC-6591 3. “PAN-OS Administrator's
