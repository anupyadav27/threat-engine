  - rule_id: palo_alto.cis.2.include_exclude_networks_is_used_if_user_id_is
    title: "Ensure that 'Include/Exclude Networks' is used if User-ID is enabled"
    severity: high
    category: networking
    tech_type: palo_alto
    automation_type: automated
    cis_benchmark: "CIS_PALO_ALTO 11_v1.1.0"
    cis_version: "11_v1.1.0"
    cis_control: "2.4"
    cis_section: "2"
    profile_applicability: "Level 1"
    description: >
      If User-ID is configured, use the Include/Exclude Networks section to limit
      the User-ID scope to operate only on trusted networks. There is rarely a
      legitimate need to allow WMI probing or other User identification on an
      untrusted network.
    rationale: >
      The Include/Exclude Networks feature allow users to configure boundaries for
      the User- ID service. By using the feature to limit User-ID probing to only
      trusted internal networks, the risks of privileged information disclosure
      through sent probes can be reduced. Note that if an entry appears in the
      Include/Exclude Networks section, an implicit exclude-all-networks policy will
      take effect for all other networks. Impact: Not restricting the networks
      subject to User Identification means that the administrative credentials
      (userid and password hash) used for this task will transit untrusted networks,
      or be sent to untrusted hosts. Capturing these credentials exposes them to
      offline cracking attacks.
    audit_procedure: >
      Navigate to Device > User Identification > User Mapping > Include/Exclude
      Networks. Verify that all trusted internal networks have a Discovery value of
      Include. Verify that all untrusted external networks have a Discovery value of
      Exclude. Note that any value in the trusted networks list implies that all
      other networks are untrusted.
    remediation: >
      Navigate to Device > User Identification > User Mapping > Include/Exclude
      Networks. Set all trusted internal networks to have a Discovery value of
      Include. Set all untrusted external networks to have a Discovery value of
      Exclude. Note that any value in the trusted networks list implies that all
      other networks are untrusted. Default Value: Not configured References: 1.
      Best Practices for Securing User-ID Deployments -
      https://live.paloaltonetworks.com/docs/DOC-7912
    references: >
      1. Best Practices for Securing User-ID Deployments -
      https://live.paloaltonetworks.com/docs/DOC-7912
    impact: >
      Not restricting the networks subject to User Identification means that the
      administrative credentials (userid and password hash) used for this task will
      transit untrusted networks, or be sent to untrusted hosts. Capturing these
      credentials exposes them to offline cracking attacks.
    compliance_mappings:
      cis:
        - "CIS_PALO_ALTO_11_v1_1_0_2_4"
      nist_800_53: []
      soc2: []
      pci_dss: []
