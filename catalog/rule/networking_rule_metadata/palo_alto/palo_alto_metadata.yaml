  - rule_id: palo_alto.cis.2.remote_access_capabilities_for_the_user_id
    title: "Ensure remote access capabilities for the User-ID service account are forbidden."
    severity: high
    category: networking
    tech_type: palo_alto
    automation_type: manual
    cis_benchmark: "CIS_PALO_ALTO 11_v1.1.0"
    cis_version: "11_v1.1.0"
    cis_control: "2.7"
    cis_section: "2"
    profile_applicability: "Level 1"
    description: >
      Restrict the User-ID service account’s ability to gain remote access into the
      organization. This capability could be made available through a variety of
      technologies, such as VPN, Citrix GoToMyPC, or TeamViewer. Remote services
      that integrate authentication with the organization’s Active Directory may
      unintentionally allow the User-ID service account to gain remote access.
    rationale: >
      In the event of a compromised User-ID service account, restricting the
      account’s ability to remotely access resources within the organization’s
      internal network reduces the impact of a service account compromise.
    audit_procedure: >
      Auditing is operating-system dependent. For instance, in Windows Active
      Directory, this account should not be included in any group that grants the
      account access to VPN or Wireless access. In addition, domain administrative
      accounts should not have remote desktop (RDP) access to all domain member
      workstations.
    remediation: >
      Remove this account from all groups that might grant remote access to the
      network, or to any network services or hosts. Remediation is operating-system
      dependent. For instance, in Windows Active Directory, this account should be
      removed from any group that grants the account access to VPN or Wireless
      access. In addition, domain administrative accounts by default have remote
      desktop (RDP) access to all domain member workstations - this should be
      explicitly denied for this account. Default Value: Not configured References:
      1. “Best Practices for Securing User-ID Deployments” -
      https://live.paloaltonetworks.com/docs/DOC-7912 2. “User-ID Best Practices” -
      https://live.paloaltonetworks.com/docs/DOC-6591 3. “PAN-OS Administrator's
      Guide 11.1 (English) - Configure User Mapping Using the Windows User-ID Agent”
