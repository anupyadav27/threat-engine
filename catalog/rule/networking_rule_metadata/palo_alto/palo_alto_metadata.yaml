  - rule_id: palo_alto.cis.6.access_to_every_url_is_logged
    title: "Ensure that access to every URL is logged"
    severity: high
    category: networking
    tech_type: palo_alto
    automation_type: automated
    cis_benchmark: "CIS_PALO_ALTO 11_v1.1.0"
    cis_version: "11_v1.1.0"
    cis_control: "6.10"
    cis_section: "6"
    profile_applicability: "Level 1"
    description: >
      URL filters should not specify any categories as Allow Categories.
    rationale: >
      Setting a URL filter to have one or more entries under Allow Categories will
      cause no log entries to be produced in the URL Filtering logs for access to
      URLs in those categories. For forensic, legal, and HR purposes, it is
      advisable to log access to every URL. In many cases failure to log all URL
      access is a violation of corporate policy, legal requirements or regulatory
      requirements. Impact: Not having an effective URL Filtering configuration can
      leave an organization open to legal action, internal HR issues, non-compliance
      with regulatory policies or productivity loss.
    audit_procedure: >
      Navigate to Objects > Security Profiles > URL Filtering. Verify that the for
      all allowed categories, that the Site Access action is set to alert
    remediation: >
      Navigate to Objects > Security Profiles > URL Filtering. For each permitted
      category, set the Site Access actioun to alert Default Value: A default URL
      Filtering Security Profile is configured, with the following categories set to
      'block': abused-drugs adult gambling hacking malware phishing questionable
      weapons 3 Categories are set to alert in the default policy, and 58 Categories
      are set to allow (which means they are not logged) References: 1. “PAN-OS
      Administrator's Guide 11.1 (English) - URL Filtering Best Practices' -
      https://docs.paloaltonetworks.com/advanced-url-
      filtering/administration/configuring-url-filtering/url-filtering-best-
