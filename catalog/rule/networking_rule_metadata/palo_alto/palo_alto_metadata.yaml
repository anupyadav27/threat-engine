  - rule_id: palo_alto.cis.6.antivirus_profiles_are_set_to_reset_both_on_all
    title: "Ensure that antivirus profiles are set to reset-both on all decoders except 'imap' and 'pop3'"
    severity: high
    category: networking
    tech_type: palo_alto
    automation_type: automated
    cis_benchmark: "CIS_PALO_ALTO 11_v1.1.0"
    cis_version: "11_v1.1.0"
    cis_control: "6.1"
    cis_section: "6"
    profile_applicability: "Level 1"
    description: >
      Configure antivirus profiles to a value of 'reset-both' for all decoders
      except imap and pop3 under both Action and WildFire Action. If required by the
      organization's email implementation, configure imap and pop3 decoders to
      'alert' under both Action and WildFire Action.
    rationale: >
      Antivirus signatures produce low false positives. By blocking any detected
      malware through the specified decoders, the threat of malware propagation
      through the firewall is greatly reduced. It is recommended to mitigate malware
      found in pop3 and imap through a dedicated antivirus gateway. Due to the
      nature of the pop3 and imap protocols, the firewall is not able to block only
      a single email message containing malware. Instead, the entire session would
      be terminated, potentially affecting benign email messages.
    audit_procedure: >
      Navigate to Objects > Security Profiles > Antivirus Verify that antivirus
      profiles have all decoders set to reset-both for both Action and Wildfire
      Action. If imap and pop3 are required in the organization, verify that the
      imap and pop3 decoders are set to alert for both Action and Wildfire Action.
    remediation: >
      Navigate to Objects > Security Profiles > Antivirus. Set antivirus profiles to
      have all decoders set to reset-both for both Action and Wildfire Action. If
      imap and pop3 are required in the organization, set the imap and pop3 decoders
      to alert for both Action and Wildfire Action. Default Value: Not Configured
      References: 1. “Threat Prevention Deployment Tech Note” -
      https://live.paloaltonetworks.com/docs/DOC-3094 2. “PAN-OS Administrator's
      Guide 11.1 (English) - Security Profiles” -
      https://docs.paloaltonetworks.com/pan-os/11-1/pan-os-admin/policy/security-
      profiles 3. 'KB on reset-server, reset-client or silent drop' -
      https://knowledgebase.paloaltonetworks.com/KCSArticleDetail?id=kA10g000000
      ClTaCAK
    references: >
      1. “Threat Prevention Deployment Tech Note” -
      https://live.paloaltonetworks.com/docs/DOC-3094 2. “PAN-OS Administrator's
      Guide 11.1 (English) - Security Profiles” -
      https://docs.paloaltonetworks.com/pan-os/11-1/pan-os-admin/policy/security-
      profiles 3. 'KB on reset-server, reset-client or silent drop' -
      https://knowledgebase.paloaltonetworks.com/KCSArticleDetail?id=kA10g000000
      ClTaCAK
