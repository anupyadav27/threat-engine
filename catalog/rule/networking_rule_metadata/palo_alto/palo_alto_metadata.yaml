    cis_control: "5.7"
    cis_section: "5"
    profile_applicability: "Level 2"
    description: >
      By default, all relevant files are uploaded to Wildfire datacenter located in
      US. Palo Alto Networks has been adding more WildFire regional clouds around
      the world. From having just 3 regional clouds back in PanOS 8.x, now to more
      than 10 regional clouds all over the world.
    rationale: >
      Depending on regulations, files is only allowed to be uploaded to local
      country / region. Besides, uploading to local country or even nearest country
      decreases file uploading speed. Refer to the available regions in the
      references below. Impact: With default values, all relevant files are uploaded
      to wildfire.paloaltonetworks.com which is located in US.
    audit_procedure: >
      Navigate to Device > Setup > WildFire. Navigate to the General Settings
      sections. Verify that WildFire Public Cloud is set to your appropriate region.
    remediation: >
