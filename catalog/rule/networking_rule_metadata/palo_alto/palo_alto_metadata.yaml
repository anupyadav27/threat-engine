    cis_section: "4"
    profile_applicability: "Level 1"
    description: >
      Set Antivirus Update Schedule to download and install updates hourly.
    rationale: >
      New antivirus definitions may be released at any time. With an hourly update
      schedule, the firewall can ensure threats with new definitions are quickly
      mitigated. A daily update schedule could leave an organization vulnerable to a
      known virus for nearly 24 hours, in a worst-case scenario. Setting an
      appropriate threshold value reduces the risk of a bad definition file
      negatively affecting traffic.
