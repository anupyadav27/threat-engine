  - rule_id: palo_alto.cis.7.security_policy_denying_any_all_traffic_to_from
    title: "Ensure 'Security Policy' denying any/all traffic to/from IP addresses on Trusted Threat Intelligence Sources Exists"
    severity: high
    category: networking
    tech_type: palo_alto
    automation_type: automated
    cis_benchmark: "CIS_PALO_ALTO 11_v1.1.0"
    cis_version: "11_v1.1.0"
    cis_control: "7.3"
    cis_section: "7"
    profile_applicability: "Level 1"
    description: >
      Create a pair of security rules at the top of the security policies ruleset to
      block traffic to and from IP addresses known to be malicious. Note: This
      recommendation (as written) requires a Palo Alto Networks 'Threat Prevention
      License'. Third Party and Open Source Threat Intelligence Feeds can also be
      used for this purpose.
    rationale: >
      Creating rules that block traffic to/from known malicious sites from Trusted
      Threat Intelligence Sources protects you against IP addresses that Palo Alto
      Networks has proven to be used almost exclusively to distribute malware,
      initiate command-and- control activity, and launch attacks. Impact: While not
      foolproof, simply blocking traffic from known malicious hosts allows more
      resources to be devoted to analyzing traffic from other sources for malicious
      content. This approach is a recommended part of most 'Defense in Depth'
      recommendations, allowing defenders to focus more deeply on traffic from
      uncategorized sources.
