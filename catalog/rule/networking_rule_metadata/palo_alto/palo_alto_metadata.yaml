  - rule_id: palo_alto.cis.6.all_http_header_logging_options_are_enabled
    title: "Ensure all HTTP Header Logging options are enabled"
    severity: high
    category: networking
    tech_type: palo_alto
    automation_type: automated
    cis_benchmark: "CIS_PALO_ALTO 11_v1.1.0"
    cis_version: "11_v1.1.0"
    cis_control: "6.11"
    cis_section: "6"
    profile_applicability: "Level 1"
    description: >
      Enable all options (User-Agent, Referer, and X-Forwarded-For) for HTTP header
      logging.
    rationale: >
      Logging HTTP header information provides additional information in the URL
      logs, which may be useful during forensic investigations. The User-Agent
      option logs which browser was used during the web session, which could provide
      insight to the vector used for malware retrieval. The Referer option logs the
      source webpage responsible for referring the user to the logged webpage. The
      X-Forwarded-For option is useful for preserving the user’s source IP address,
      such as if a user traverses a proxy server prior to the firewall. Un-checking
      the Log container page only box produces substantially more information about
      web activity, with the expense of producing far more entries in the URL logs.
      If this option remains checked, a URL filter log entry showing details of a
      malicious file download may not exist. Impact: Not having an effective URL
      Filtering configuration can leave an organization open to legal action,
      internal HR issues, non-compliance with regulatory policies or productivity
      loss.
    audit_procedure: >
