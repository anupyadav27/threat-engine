  - rule_id: palo_alto.cis.6.alerting_after_a_threshold_of_credit_card_or
    title: "Ensure alerting after a threshold of credit card or Social Security numbers is detected is enabled"
    severity: high
    category: networking
    tech_type: palo_alto
    automation_type: automated
    cis_benchmark: "CIS_PALO_ALTO 11_v1.1.0"
    cis_version: "11_v1.1.0"
    cis_control: "6.13"
    cis_section: "6"
    profile_applicability: "Level 1"
    description: >
      This guideline is highly specific to an organization. While blocking of credit
      card or Social Security numbers will not occur with the recommended settings
      below, careful tuning is also recommended.
    rationale: >
      Credit card and Social Security numbers are sensitive, and should never
      traverse an organization’s Internet connection in clear text. Passing
      sensitive data within an organization should also be avoided whenever
      possible. Detecting and blocking known sensitive information is a basic
      protection against a data breach or data loss. Not implementing these defenses
      can lead to loss of regulatory accreditation (such as PCI, HIPAA etc), or can
      lead to legal action from injured parties or regulatory bodies.
    audit_procedure: >
      Navigate to Objects > Custom Objects > Data Patterns. Verify an appropriate
      Data Pattern has been created that accounts for sensitive information within
      your organization. In most cases this will include Credit Card Numbers, and
      your jurisdiction's equivalent of Social Insurance Numbers. In many cases
      these can simply be picked from the list of Predefined Patterns. Navigate to
      Objects > Security Profiles > Data Filtering. Verify an appropriate Data
      Filtering Profile has been created, using the created Data Patterns. Ensure
      that an Alert Threshold is set that generates alerts appropriately. A typical
      starting value for Alert Threshold is 20, but this should be adjusted after
      appropriate testing.
    remediation: >
      Navigate to Objects > Custom Objects > Data Patterns. Create an appropriate
      Data Pattern that accounts for sensitive information within your organization.
      In most cases this will include Credit Card Numbers, and your jurisdiction's
      equivalent of Social Insurance Numbers. In many cases these can simply be
      picked from the list of Predefined Patterns. Navigate to Objects > Security
      Profiles > Data Filtering. Create appropriate Data Filtering Profile, using
      the created Data Patterns. Ensure that an Alert Threshold is set that
      generates alerts appropriately. A typical starting value for Alert Threshold
      is 20, but this should be adjusted after appropriate testing. Default Value:
      Not Configured References: 1. “What are the Data Filtering Best Practices?” -
      https://live.paloaltonetworks.com/docs/DOC-2513 2. “PAN-OS Administrator's
      Guide 9.0 (English) - Setting up Data Filtering' -
      https://docs.paloaltonetworks.com/pan-os/9-0/pan-os-admin/threat-
      prevention/set-up-data-filtering.html#
    references: >
      1. “What are the Data Filtering Best Practices?” -
      https://live.paloaltonetworks.com/docs/DOC-2513 2. “PAN-OS Administrator's
      Guide 9.0 (English) - Setting up Data Filtering' -
