  - rule_id: palo_alto.cis.1.the_certificate_securing_remote_access_vpns_is
    title: "Ensure that the Certificate Securing Remote Access VPNs is Valid"
    severity: high
    category: networking
    tech_type: palo_alto
    automation_type: manual
    cis_benchmark: "CIS_PALO_ALTO 11_v1.1.0"
    cis_version: "11_v1.1.0"
    cis_control: "1.6.3"
    cis_section: "1"
    profile_applicability: "Level 1 + Level 2"
    description: >
      The Certificate used to secure Remote Access VPNs should satisfy the following
      criteria: • It should be a valid certificate from a trusted source. In almost
      cases this means a trusted Public Certificate Authority, as in most cases
      remote access VPN users will not have access to any Private Certificate
      Authorities for Certificate validation. • The certificate should have a valid
      date. It should not have a 'to' date in the past (it should not be expired),
      and should not have a 'from' date in the future. • The key length used to
      encrypt the certificate should be 2048 bits or more. • The hash used to sign
      the certificate should be SHA-2 or better. • When the Certificate is applied,
      the TLS version should be 1.1 or higher (1.2 is recommended)
    rationale: >
      If presented with a certificate error, the end user in most cases will not be
      able to tell if their session is using a self-signed or expired certificate,
      or if their session is being eavesdropped on or injected into by a 'Man in the
      Middle' attack. This means that self- signed or invalid certificates should
      never be used for VPN connections. Impact: Not using a trusted Certificate,
      issued by a trusted Public Certificate Authority means that clients
      establishing VPN sessions will always see an error indicating an untrusted
      Certificate. This means that they will have no method of validating if their
      VPN session is being hijacked by a 'Monkey in the Middle' (MitM) attack. It
      also 'trains' them to bypass certificate warnings for other services, making
      MitM attacks easier for those other services as well.
    audit_procedure: >
      Verify that the certificate being used to secure the VPN meets the criteria
      listed above: Navigate to Device > Certificate Management > Certificates
      Ensure that a valid certificate is applied to the HTTPS portal: Navigate to
      Network > GlobalProtect > Portals > Portal Configuration > (Select the Portal
      being assessed) > Authentication > SSL/TLS Profile Ensure that a valid
      certificate is applied to the GlobalProtect Gateway: Navigate to Network >
      GlobalProtect > Gateways > (Select the Gateway being Assessed) >
      Authentication > SSL/TLS Service Profile Ensure that the correct Certificate
      is selected. Ensure that the Minimum TLS version is configured to be 1.1 or
      higher (TLSv1.2 is recommended).
    remediation: >
      Create a CSR and install a certificate from a public CA (Certificate
      Authority) here: Navigate to Device > Certificate Management > Certificates
      Apply a valid certificate to the HTTPS portal: Navigate to Network >
      GlobalProtect > Portals > Portal Configuration > Authentication > SSL/TLS
      Profile Apply a valid certificate to the GlobalProtect Gateway: Navigate to
      Network > GlobalProtect > Gateways > Authentication > SSL/TLS Service Profile
      Configure the Service Profile to use the correct certificate Ensure that the
      Minimum TLS version is set to 1.1 or 1.2 (1.2 is recommended). Default Value:
      Not configured References: 1. “PAN-OS Administrator's Guide 9.0 (English) -
      GlobalProtect Certificate Best Practices' -
      https://docs.paloaltonetworks.com/globalprotect/9-0/globalprotect- admin/get-
      started/enable-ssl-between-globalprotect-components/globalprotect-
      certificate-best-practices.html 2. “PAN-OS Administrator's Guide 9.0 (English)
      - Deploy Server Certificates to the GlobalProtect Components' -
      https://docs.paloaltonetworks.com/globalprotect/9- 0/globalprotect-admin/get-
      started/enable-ssl-between-globalprotect- components/deploy-server-
      certificates-to-the-globalprotect-components.html#
    references: >
      1. “PAN-OS Administrator's Guide 9.0 (English) - GlobalProtect Certificate
      Best Practices' -
      https://docs.paloaltonetworks.com/globalprotect/9-0/globalprotect- admin/get-
      started/enable-ssl-between-globalprotect-components/globalprotect-
      certificate-best-practices.html 2. “PAN-OS Administrator's Guide 9.0 (English)
      - Deploy Server Certificates to the GlobalProtect Components' -
      https://docs.paloaltonetworks.com/globalprotect/9- 0/globalprotect-admin/get-
      started/enable-ssl-between-globalprotect- components/deploy-server-
      certificates-to-the-globalprotect-components.html#
    impact: >
      Not using a trusted Certificate, issued by a trusted Public Certificate
      Authority means that clients establishing VPN sessions will always see an
      error indicating an untrusted Certificate. This means that they will have no
      method of validating if their VPN session is being hijacked by a 'Monkey in
      the Middle' (MitM) attack. It also 'trains' them to bypass certificate
      warnings for other services, making MitM attacks easier for those other
      services as well.
    compliance_mappings:
      cis:
        - "CIS_PALO_ALTO_11_v1_1_0_1_6_3"
      nist_800_53: []
      soc2: []
