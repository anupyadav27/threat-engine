    metadata_source: generated
    generated_by: generate_tech_rules

  - rule_id: palo_alto.cis.3.passive_link_state_and_preemptive_are_configured
    title: "Ensure 'Passive Link State' and 'Preemptive' are configured appropriately"
    severity: high
    category: networking
    tech_type: palo_alto
    automation_type: automated
    cis_benchmark: "CIS_PALO_ALTO 11_v1.1.0"
    cis_version: "11_v1.1.0"
    cis_control: "3.3"
    cis_section: "3"
    profile_applicability: "Level 1"
    description: >
      Set the Passive Link State to auto, and uncheck the Preemptive option to
      disable it.
    rationale: >
      Simultaneously enabling the 'Preemptive' option and setting the 'Passive Link
      State' option to 'Shutdown' could cause a 'preemptive loop' if Link and Path
      Monitoring are both configured. This will negatively impact the availability
      of the firewall and network services, should a monitored failure occur.
      Impact: Incorrectly configuring this setting will adversely affect
      availability, rather than positively affect it.
    audit_procedure: >
      To ensure Active/Passive Settings are configured correctly: Navigate to Device
      > High Availability > General > Active/Passive Settings. Verify Passive Link
      State is set to auto. To ensure Election Settings are configured correctly:
      Navigate to Device > High Availability > Election Settings. Verify Preemptive
      is disabled.
    remediation: >
      To set Active/Passive Settings correctly: Navigate to Device > High
      Availability > General > Active/Passive Settings. Set Passive Link State to
      auto. To set Election Settings correctly: Navigate to Device > High
      Availability > Election Settings. Set Preemptive to be disabled. Default
      Value: Not Configured References: 1. “PAN-OS Administrator's Guide 11.1
      (English) - High Availability' - https://docs.paloaltonetworks.com/pan-
      os/11-1/pan-os-web-interface- help/device/device-high-availability
    references: >
      1. “PAN-OS Administrator's Guide 11.1 (English) - High Availability' -
      https://docs.paloaltonetworks.com/pan-os/11-1/pan-os-web-interface-
      help/device/device-high-availability
    impact: >
      Incorrectly configuring this setting will adversely affect availability,
      rather than positively affect it.
