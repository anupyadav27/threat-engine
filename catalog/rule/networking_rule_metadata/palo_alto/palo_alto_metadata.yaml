  - rule_id: palo_alto.cis.1.verify_update_server_identity_is_enabled
    title: "Ensure 'Verify Update Server Identity' is enabled"
    severity: high
    category: networking
    tech_type: palo_alto
    automation_type: automated
    cis_benchmark: "CIS_PALO_ALTO 11_v1.1.0"
    cis_version: "11_v1.1.0"
    cis_control: "1.6.1"
    cis_section: "1"
    profile_applicability: "Level 1"
    description: >
      This setting determines whether or not the identity of the update server must
      be verified before performing an update session. Note that if an SSL Forward
      Proxy is configured to intercept the update session, this option may need to
      be disabled (because the SSL Certificate will not match).
    rationale: >
      Verifying the update server identity before package download ensures the
      packages originate from a trusted source. Without this, it is possible to
      receive and install an update from a malicious source. Impact: This setting
      protects the device from an 'evilgrade' attack, where a successful DNS attack
      can redirect the firewall to an attacker-controlled update server, which can
      then serve a modified update.
    audit_procedure: >
      Navigate to Device > Setup > Services > Services. Verify that the Verify
      Update Server Identity box is checked.
    remediation: >
      Navigate to Device > Setup > Services > Services. Set the Verify Update Server
      Identity box to checked. Default Value: Not configured References: 1. “PAN-OS
      Administrator's Guide 9.0 (English) - Install Content Updates' -
      https://docs.paloaltonetworks.com/pan-os/9-0/pan-os-admin/software-and-
      content-updates/install-content-and-software-updates.html
