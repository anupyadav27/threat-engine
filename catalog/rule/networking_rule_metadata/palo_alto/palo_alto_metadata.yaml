  - rule_id: palo_alto.cis.2.the_user_id_agent_has_minimal_permissions_if_user
    title: "Ensure that the User-ID Agent has minimal permissions if User-ID is enabled"
    severity: high
    category: networking
    tech_type: palo_alto
    automation_type: manual
    cis_benchmark: "CIS_PALO_ALTO 11_v1.1.0"
    cis_version: "11_v1.1.0"
    cis_control: "2.5"
    cis_section: "2"
    profile_applicability: "Level 1"
    description: >
      If the integrated (on-device) User-ID Agent is utilized, the Active Directory
      account for the agent should only be a member of the Event Log Readers group,
      Distributed COM Users group, and Domain Users group. If the Windows User-ID
      agent is utilized, the Active Directory account for the agent should only be a
      member of the Event Log Readers group, Server Operators group, and Domain
      Users group.
    rationale: >
      As a principle of least privilege, user accounts should have only minimum
      necessary permissions. If an attacker compromises a User-ID service account
      with domain admin rights, the organization is at far greater risk than if the
      service account were only granted minimum rights. Impact: Using accounts with
      full administrative privileges when those rights are not required is always a
      bad idea. This is particularly true for service accounts of this type, which
      in many organizations do not see strong passwords or frequent password
      changes. In addition, service passwords are stored in the Windows Registry,
      and are recoverable with the user of appropriate malicious tools. The
      principal of least privilege means that any compromised accounts of this type
      have less value to an attacker, and expose fewer assets based on their rights.
    audit_procedure: >
      Navigate to Active Directory Users and Computers for the Active Directory
      under consideration. Verify that the service account for the User-ID agent is
      not a member of any groups other than Event Log Readers, Distributed COM
      Users, and Domain Users (for the integrated, on-device User-ID agent) or Event
      Log Readers, Server Operators, and Domain Users (for the Windows User-ID
      agent.)
    remediation: >
      Navigate to Active Directory Users and Computers. Set the service account for
      the User-ID agent so that it is only a member of the Event Log Readers,
      Distributed COM Users, and Domain Users (for the integrated, on-device User-ID
      agent) or the Event Log Readers, Server Operators, and Domain Users groups
      (for the Windows User-ID agent.) Default Value: Not configured References: 1.
      “Best Practices for Securing User-ID Deployments” -
      https://live.paloaltonetworks.com/docs/DOC-7912 2. “User-ID Best Practices” -
      https://live.paloaltonetworks.com/docs/DOC-6591 3. “PAN-OS Administrator's
      Guide 11.1 (English) - Configure User Mapping Using the Windows User-ID Agent”
      - https://docs.paloaltonetworks.com/pan-os/11- 1/pan-os-admin/user-id/map-ip-
      addresses-to-users/configure-user-mapping- using-the-windows-user-id-agent 4.
      “PAN-OS Administrator's Guide 11.1 (English) - Configure User Mapping Using
      the PAN-OS Integrated User-ID Agent” - https://docs.paloaltonetworks.com/pan-
      os/11-1/pan-os-admin/user-id/map-ip-addresses-to-users/configure-user-
      mapping-using-the-pan-os-integrated-user-id-agent
    references: >
      1. “Best Practices for Securing User-ID Deployments” -
      https://live.paloaltonetworks.com/docs/DOC-7912 2. “User-ID Best Practices” -
      https://live.paloaltonetworks.com/docs/DOC-6591 3. “PAN-OS Administrator's
      Guide 11.1 (English) - Configure User Mapping Using the Windows User-ID Agent”
      - https://docs.paloaltonetworks.com/pan-os/11- 1/pan-os-admin/user-id/map-ip-
      addresses-to-users/configure-user-mapping- using-the-windows-user-id-agent 4.
      “PAN-OS Administrator's Guide 11.1 (English) - Configure User Mapping Using
      the PAN-OS Integrated User-ID Agent” - https://docs.paloaltonetworks.com/pan-
      os/11-1/pan-os-admin/user-id/map-ip-addresses-to-users/configure-user-
      mapping-using-the-pan-os-integrated-user-id-agent
    impact: >
      Using accounts with full administrative privileges when those rights are not
      required is always a bad idea. This is particularly true for service accounts
      of this type, which in many organizations do not see strong passwords or
      frequent password changes. In addition, service passwords are stored in the
