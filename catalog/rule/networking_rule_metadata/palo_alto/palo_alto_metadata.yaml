  - rule_id: palo_alto.cis.1.failed_attempts_and_lockout_time_for
    title: "Ensure 'Failed Attempts' and 'Lockout Time' for Authentication Profile are properly configured"
    severity: high
    category: networking
    tech_type: palo_alto
    automation_type: automated
    cis_benchmark: "CIS_PALO_ALTO 11_v1.1.0"
    cis_version: "11_v1.1.0"
    cis_control: "1.4.2"
    cis_section: "1"
    profile_applicability: "Level 1"
    description: >
      Configure values for Failed Login Attempts and Account Lockout Time set to
      organization-defined values (for example, 3 failed attempts and a 15 minute
      lockout time). Do not set Failed Attempts and Lockout Time in the
      Authentication Settings section; any Failed Attempts or Lockout Time settings
      within the selected Authentication Profile do not apply in the Authentication
      Settings section.
    rationale: >
      Without a lockout limit, an attacker can continuously guess administrators’
      passwords. From the other point of view, if lockout settings are configured in
      the Authentication Settings section it may be possible for an attacker to
      continuously lock out all administrative accounts from accessing the device.
      This potential situation indicates the importance of using named
      administrative accounts, instead of the default, single shared 'admin'
      account.
    audit_procedure: >
      Navigate to Device > Authentication Profile. Verify Failed Attempts is set a
      non-zero organization-defined value. Verify Lockout Time is set to a non-zero
      organization-defined value.
    remediation: >
      Navigate to Device > Authentication Profile. Set Failed Attempts to the non-
      zero organization-defined value. Set Lockout Time to the non-zero
      organization-defined value. Default Value: Not configured References: 1. “PAN-
      OS Administrator's Guide 11.1 (English) - Device - Setup - Management” -
      https://docs.paloaltonetworks.com/pan-os/11-1/pan-os-web-interface-
      help/device/device-setup-management# 2. “PAN-OS Administrator's Guide 11.1
      (English) - Authentication Profile' - https://docs.paloaltonetworks.com/pan-
      os/11-1/pan-os-web-interface- help/device/device-authentication-profile
      Additional Information: Both values must be set. If either value is not set,
      account lockout does not occur.
    references: >
