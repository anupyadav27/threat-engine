  - rule_id: palo_alto.cis.8.the_certificate_used_for_decryption_is_trusted
    title: "Ensure that the Certificate used for Decryption is Trusted"
    severity: high
    category: networking
    tech_type: palo_alto
    automation_type: automated
    cis_benchmark: "CIS_PALO_ALTO 11_v1.1.0"
    cis_version: "11_v1.1.0"
    cis_control: "8.3"
    cis_section: "8"
    profile_applicability: "Level 1 + Level 2"
    description: >
      The CA Certificate used for in-line HTTP Man in the Middle should be trusted
      by target users. For SSL Forward Proxy configurations, there are classes of
      users that need to be considered. 1: Users that are members of the
      organization, users of machines under control of the organization. For these
      people and machines, ensure that the CA Certificate is in one of the Trusted
      CA certificate stores. This is easily done in Active Directory, using Group
      Policies for instance. A MDM (Mobile Device Manager) can be used to accomplish
      the same task for mobile devices such as telephones or tablets. Other central
      management or orchestration tools can be used for Linux or 'IoT' (Internet of
      Things) devices. 2: Users that are not member of the organization - often
      these are classed as 'Visitors' in the policies of the organization. If a
      public CA Certificate is a possibility for your organization, then that is one
      approach. A second approach is to not decrypt affected traffic - this is
      easily done, but leaves the majority of 'visitor' traffic uninspected and
      potentially carrying malicious content. The final approach, and the one most
      commonly seen, is to use the same certificate as is used for the hosting
      organization. In this last case, visitors will see a certificate warning, but
      the issuing CA will be the organization that they are visiting.
    rationale: >
      Using a self-signed certificate, or any certificate that generates a warning
      in the browser, means that members of the organization have no method of
      determining if they are being presented with a legitimate certificate, or an
      attacker's 'man in the middle' certificate. It also very rapidly teaches
      members of the organization to bypass all security warnings of this type.
    audit_procedure: >
      Verify the CA Certificate(s): Navigate to Device > Certificate Management >
      Certificates • Verify that appropriate internal certificates are imported, and
      that all certificates in the list are valid. In particular, verify the
      Subject, Issuer, CA, Expires, Algorithm and Usage fields • Alternatively, if
      an internal CA is implemented on the firewall, verify that target clients have
      the root certificate for this CA imported into their list of trusted
      certificate authorities. Verify the Certificate Profile needed for the SSL
      Forward Proxy: • Navigate to Device > Certificate Management > Certificate
      Profile. Verify that an appropriate profile is created.
    remediation: >
      Set the CA Certificate(s): Navigate to Device > Certificate Management >
      Certificates. Import the appropriate CA Certificates from any internal
      Certificate Authorities. Alternatively, generate a self-signed certificate for
      an internal CA on the firewall, and then import the root certificate for that
      CA into the trusted CA list of target clients. In an Active Directory
      environment this can be facilitated using a Group Policy. Set the Certificate
      Profile needed for the SSL Forward Proxy: • Navigate to Device > Certificate
      Management > Certificate Profile. Set the decryption profile to include the
      settings described in the SSL Forward Proxy guidance in this document Default
      Value: Decryption is not enabled by default. References: 1. 'How to Implement
      and Test SSL Decryption' - https://live.paloaltonetworks.com/t5/Configuration-
      Articles/How-to-Implement- and-Test-SSL-Decryption/ta-p/59719 2. “PAN-OS
      Administrator's Guide 11.1 (English) - Decryption (English)” -
      https://docs.paloaltonetworks.com/pan-os/11-1/pan-os-admin/decryption 3. 'SSL
      Certificates Resource List on Configuring and Troubleshooting' -
      https://live.paloaltonetworks.com/t5/Management-Articles/SSL-certificates-
      resource-list/ta-p/53068 4. 'Certificates' - http://palo-
      alto.wikia.com/wiki/Certificates
    references: >
      1. 'How to Implement and Test SSL Decryption' -
      https://live.paloaltonetworks.com/t5/Configuration-Articles/How-to-Implement-
      and-Test-SSL-Decryption/ta-p/59719 2. “PAN-OS Administrator's Guide 11.1
      (English) - Decryption (English)” - https://docs.paloaltonetworks.com/pan-
      os/11-1/pan-os-admin/decryption 3. 'SSL Certificates Resource List on
      Configuring and Troubleshooting' -
      https://live.paloaltonetworks.com/t5/Management-Articles/SSL-certificates-
      resource-list/ta-p/53068 4. 'Certificates' - http://palo-
