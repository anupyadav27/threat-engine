  - rule_id: palo_alto.cis.6.a_secure_antivirus_profile_is_applied_to_all
    title: "Ensure a secure antivirus profile is applied to all relevant security policies"
    severity: high
    category: networking
    tech_type: palo_alto
    automation_type: manual
    cis_benchmark: "CIS_PALO_ALTO 11_v1.1.0"
    cis_version: "11_v1.1.0"
    cis_control: "6.2"
    cis_section: "6"
    profile_applicability: "Level 1"
    description: >
      Create a secure antivirus profile and apply it to all security policies that
      could pass HTTP, SMTP, IMAP, POP3, FTP, or SMB traffic. The antivirus profile
      may be applied to the security policies directly or through a profile group.
    rationale: >
      By applying a secure antivirus profile to all applicable traffic, the threat
      of malware propagation through the firewall is greatly reduced. Without an
      antivirus profile assigned to any potential hostile zone, the first protection
      in the path against malware is removed, leaving in most cases only the desktop
      endpoint protection application to detect and remediate any potential malware.
      Impact: Not having an AV Profile on a Security Policy allows signature-based
      malware to transit the security boundary without blocks or alerts. In most
      cases this leaves only the Endpoint Security application to block or alert
      malware.
    audit_procedure: >
      Navigate to Policies > Security . For each policy, navigate to [Policy Name] >
      Actions Verify there is a secure Antivirus profile applied to all security
      policies passing traffic - regardless of protocol. This can be set by Profiles
      or by Profile Group.
    remediation: >
      Navigate to Policies > Security . For each policy, navigate to [Policy Name] >
      Actions Set an Antivirus profile or a Profile Group containing an AV profile
      for each security policy passing traffic - regardless of protocol. Default
      Value: No Antivirus Profiles are enabled on any default or new Security Policy
      References: 1. “PAN-OS Administrator's Guide 11.1 (English) - Security
      Policies ” - https://docs.paloaltonetworks.com/pan-os/11-1/pan-os-
      admin/policy/security- policy 2. “PAN-OS Administrator's Guide 11.1 (English)
      - Security Profiles” - https://docs.paloaltonetworks.com/pan-os/11-1/pan-os-
      admin/policy/security- profiles
    references: >
      1. “PAN-OS Administrator's Guide 11.1 (English) - Security Policies ” -
      https://docs.paloaltonetworks.com/pan-os/11-1/pan-os-admin/policy/security-
      policy 2. “PAN-OS Administrator's Guide 11.1 (English) - Security Profiles” -
      https://docs.paloaltonetworks.com/pan-os/11-1/pan-os-admin/policy/security-
      profiles
    impact: >
      Not having an AV Profile on a Security Policy allows signature-based malware
      to transit the security boundary without blocks or alerts. In most cases this
      leaves only the Endpoint Security application to block or alert malware.
    compliance_mappings:
      cis:
        - "CIS_PALO_ALTO_11_v1_1_0_6_2"
      nist_800_53: []
      soc2: []
      pci_dss: []
