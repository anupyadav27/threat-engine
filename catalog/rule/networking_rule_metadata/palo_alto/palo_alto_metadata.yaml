  - rule_id: palo_alto.cis.6.an_anti_spyware_profile_is_configured_to_block_on
    title: "Ensure an anti-spyware profile is configured to block on all spyware severity levels, categories, and threats"
    severity: high
    category: networking
    tech_type: palo_alto
    automation_type: automated
    cis_benchmark: "CIS_PALO_ALTO 11_v1.1.0"
    cis_version: "11_v1.1.0"
    cis_control: "6.3"
    cis_section: "6"
    profile_applicability: "Level 1"
    description: >
      If a single rule exists within the anti-spyware profile, configure it to block
      on any spyware severity level, any category, and any threat. If multiple rules
      exist within the anti- spyware profile, ensure all spyware categories,
      threats, and severity levels are set to be blocked. Additional rules may exist
      for packet capture or exclusion purposes.
    rationale: >
      Requiring a blocking policy for all spyware threats, categories, and
      severities reduces the risk of spyware traffic from successfully exiting the
      organization. Without an anti- spyware profile assigned to any potential
      hostile zone, the first protection in the path against malware is removed,
      leaving in most cases only the desktop endpoint protection application to
      detect and remediate any potential spyware.
    audit_procedure: >
      Navigate to Objects > Security Profiles > Anti-Spyware. Verify a rule exists
      within the anti-spyware profile that is configured to perform the reset-both
      on any Severity level, any Category, and any Threat Name.
    remediation: >
