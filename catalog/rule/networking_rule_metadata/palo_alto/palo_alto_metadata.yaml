    cis_version: "11_v1.1.0"
    cis_control: "6.18"
    cis_section: "6"
    profile_applicability: "Level 1"
    description: >
      For all zones, attach a Zone Protection Profile that is configured to drop
      packets with a spoofed IP address or a mismatched overlapping TCP segment, and
      packets with malformed, strict source routing, or loose source routing IP
      options set.
    rationale: >
      Using specially crafted packets, an attacker may attempt to evade or diminish
      the effectiveness of network security devices. Enabling the options in this
      recommendation lowers the risk of these attacks. Impact: Not configuring a
      Network Zone Protection Profile leaves an organization exposed to common
      attacks and reconnaissance from untrusted networks.
    audit_procedure: >
      Navigate to Network > Network Profiles > Zone Protection > Zone Protection
      Profile > Packet Based Attack Protection > TCP/IP Drop. Verify Spoofed IP
      address is checked. Verify Mismatched overlapping TCP segment is checked.
      Under IP Option Drop, verify that Strict Source Routing, Loose Source Routing,
      and Malformed are all checked. Additional options may also be checked.
    remediation: >
      Navigate to Network > Network Profiles > Zone Protection > Zone Protection
      Profile > Packet Based Attack Protection > TCP/IP Drop. Set Spoofed IP address
      to be checked. Set Mismatched overlapping TCP segment to be checked. Under IP
      Option Drop, set Strict Source Routing, Loose Source Routing, and Malformed to
      all be checked. Additional options may also be set if desired. Default Value:
      Not Configured References: 1. “Understanding DoS Protection” -
      https://live.paloaltonetworks.com/docs/DOC- 5078 2. “Threat Prevention
      Deployment Tech Note” - https://live.paloaltonetworks.com/docs/DOC-3094 3.
