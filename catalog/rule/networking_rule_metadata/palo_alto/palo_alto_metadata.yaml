  - rule_id: palo_alto.cis.6.all_zones_have_zone_protection_profiles_with_all
    title: "Ensure that all zones have Zone Protection Profiles with all Reconnaissance Protection settings enabled, tuned, and set to appropriate actions"
    severity: high
    category: networking
    tech_type: palo_alto
    automation_type: automated
    cis_benchmark: "CIS_PALO_ALTO 11_v1.1.0"
    cis_version: "11_v1.1.0"
    cis_control: "6.17"
    cis_section: "6"
    profile_applicability: "Level 1"
    description: >
      Enable all three scan options in a Zone Protection profile. Do not configure
      an action of Allow for any scan type. The exact interval and threshold values
      must be tuned to the specific environment. Less aggressive settings are
      typically appropriate for trusted zones, such as setting an action of alert
      for all scan types. Attach appropriate Zone Protection profiles meeting these
      criteria to all zones. Separate Zone Protection profiles for trusted and
      untrusted zones is a best practice.
    rationale: >
      Port scans and host sweeps are common in the reconnaissance phase of an
      attack. Bots scouring the Internet in search of a vulnerable target may also
      scan for open ports and available hosts. Reconnaissance Protection will allow
      for these attacks to be either alerted on or blocked altogether. Impact: Not
      configuring a Network Zone Protection Profile leaves an organization exposed
      to common attacks and reconnaissance from untrusted networks.
    audit_procedure: >
      Navigate to Network > Network Profiles > Zone Protection > Zone Protection
      Profile > Reconnaissance Protection. Verify that TCP Port Scan is enabled, its
      Action is set to block-ip, its Interval is set to 5, and its Threshold is set
      to 20. For block-ip, ensure the 'Track By' is set to source and 'Duration' is
      set to 600 seconds. Verify that Host Sweep is enabled, its Action is set to
      block, its Interval is set to 10, and its Threshold is set to 30. Verify that
      UDP Port Scan is enabled, its Action is set to alert, its Interval is set to
      10, and its Threshold is set to 20.
    remediation: >
      Navigate to Network > Network Profiles > Zone Protection > Zone Protection
      Profile > Reconnaissance Protection. Set TCP Port Scan to enabled, its Action
      to block-ip, its Interval to 5, and its Threshold to 20. For block-ip, set the
      'Track By' is set to source and 'Duration' is set to 600 seconds. Set Host
      Sweep to enabled, its Action to block, its Interval to 10, and its Threshold
      to 30. Set UDP Port Scan to enabled, its Action to alert, its Interval to 10,
      and its Threshold to 20. Default Value: Not Configured References: 1. “Host
      Sweep Triggering Method in Zone Protection Profile” -
      https://live.paloaltonetworks.com/docs/DOC-8703 2. “Understanding DoS
      Protection” - https://live.paloaltonetworks.com/docs/DOC- 5078 3. “Threat
      Prevention Deployment Tech Note” -
      https://live.paloaltonetworks.com/docs/DOC-3094 4. “What are the Differences
      between DoS Protection and Zone Protection?” -
      https://live.paloaltonetworks.com/docs/DOC-4501 5. PANOS 11.1 Admin Guide -
