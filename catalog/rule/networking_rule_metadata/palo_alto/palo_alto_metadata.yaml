  - rule_id: palo_alto.cis.8.ssl_forward_proxy_policy_for_traffic_destined_to
    title: "Ensure 'SSL Forward Proxy Policy' for traffic destined to the Internet is configured"
    severity: high
    category: networking
    tech_type: palo_alto
    automation_type: automated
    cis_benchmark: "CIS_PALO_ALTO 11_v1.1.0"
    cis_version: "11_v1.1.0"
    cis_control: "8.1"
    cis_section: "8"
    profile_applicability: "Level 1"
    description: >
      Configure SSL Forward Proxy for all traffic destined to the Internet. In most
      organizations, including all categories except financial-services, government
      and health-and-medicine is recommended.
    rationale: >
      Without SSL inspection, the firewall cannot apply many of its protection
      features against encrypted traffic. The amount of encrypted malware traffic
      continues to rise, and legitimate websites using SSL encryption are hacked or
      tricked into delivering malware on a frequent basis. As encryption on the
      Internet continues to grow at a rapid rate, SSL inspection is no longer
      optional as a practical security measure. If proper decryption is not
      configured, it follows that the majority of traffic is not being fully
      inspected for malicious content or policy violations. This is a major
      exposure, allowing delivery of exploits and payloads direct to user desktops.
      Note that, categories to be decrypted is highly dependant on each
      organization's policy. Impact: Failure to decrypt outbound traffic allows
      attackers to mask attacks, data exfiltration and/or command and control (C2)
      traffic by simply using standard TLS encryption. Privacy concerns for your
      organization's users will dictate that some common categories should be
      exempted from inspection and decryption. Personal banking or healthcare
      information is almost always exempted, as are interactions with government
      entities. Exemptions and inclusions to decryption policies should be
      negotiated internally and governed by published Corporate Policies.
    audit_procedure: >
      Navigate to Policies > Decryption. Verify SSL Forward Proxy is set for all
      traffic destined to the Internet. Verify each Decryption Policy Rule: • Source
      tab: The Source Zone and/or Source Address should include all target internal
      networks. Source User should include all target internal users • Destination
      tab: The Destination Zone should include the untrusted target zone (usually
      the internet). Destination Address is typically Any for an internet
      destination. • Service/URL Category tab: Verify that all URL Category entries
      are included except financial-services, government and health-and-medicine
      (this list may vary depending on your organization and its policies). •
      Options tab: Verify that the Type is set to SSL Forward Proxy
    remediation: >
      Navigate to Policies > Decryption. Create a Policy for all traffic destined to
      the Internet. This Policy should include: • Source tab: The Source Zone and/or
      Source Address should include all target internal networks. Source User should
      include all target internal users • Destination tab: The Destination Zone
      should include the untrusted target zone (usually the internet). Destination
      Address is typically Any for an internet destination. • Service/URL Category
      tab: all URL Category entries should be included except financial-services,
      government and health-and-medicine (this list may vary depending on your
      organization and its policies). • Options tab: Type set to SSL Forward Proxy
      Default Value: Not Configured References: 1. “How to Implement SSL Decryption”
      - https://live.paloaltonetworks.com/docs/DOC-1412 2. ““PAN-OS Administrator's
      Guide 11.1 (English) - Decryption (English)” -
      https://docs.paloaltonetworks.com/pan-os/11-1/pan-os-admin/decryption
    references: >
      1. “How to Implement SSL Decryption” -
      https://live.paloaltonetworks.com/docs/DOC-1412 2. ““PAN-OS Administrator's
      Guide 11.1 (English) - Decryption (English)” -
      https://docs.paloaltonetworks.com/pan-os/11-1/pan-os-admin/decryption
    impact: >
      Failure to decrypt outbound traffic allows attackers to mask attacks, data
      exfiltration and/or command and control (C2) traffic by simply using standard
      TLS encryption. Privacy concerns for your organization's users will dictate
      that some common categories should be exempted from inspection and decryption.
      Personal banking or healthcare information is almost always exempted, as are
      interactions with government entities. Exemptions and inclusions to decryption
      policies should be negotiated internally and governed by published Corporate
      Policies.
    compliance_mappings:
      cis:
        - "CIS_PALO_ALTO_11_v1_1_0_8_1"
      nist_800_53: []
      soc2: []
      pci_dss: []
    source_unique_id: "cis_palo_alto_11_v1_1_0_8_1"
    metadata_source: generated
    generated_by: generate_tech_rules

  - rule_id: palo_alto.cis.8.ssl_inbound_inspection_is_required_for_all
    title: "Ensure 'SSL Inbound Inspection' is required for all untrusted traffic destined for servers using SSL or TLS"
    severity: high
    category: networking
    tech_type: palo_alto
    automation_type: manual
    cis_benchmark: "CIS_PALO_ALTO 11_v1.1.0"
    cis_version: "11_v1.1.0"
    cis_control: "8.2"
    cis_section: "8"
    profile_applicability: "Level 1"
    description: >
      Configure SSL Inbound Inspection for all untrusted traffic destined for
      servers using SSL or TLS.
    rationale: >
      Without SSL Inbound Inspection, the firewall is not able to protect SSL or
      TLS-enabled webservers against many threats. Impact: Not decrypting inbound
      traffic to TLS encrypted services means that inspection for many common
      attacks cannot occur on the firewall. This means that all defenses against
      these attacks are up to the host.
    audit_procedure: >
      Navigate to Policies > Decryption. Verify SSL Inbound Inspection is set
      appropriately for all untrusted traffic destined for servers using SSL or TLS.
      Navigate to Policies > Decryption. For each service published to the internet
      (or other untrusted zones), verify the following settings: • General tab: Name
      set to a descriptive name • Source: Source Zone set to the target zone
      (Internet in many cases). Source Address set to the target address space (Any
      for internet traffic) • Destination tab: Destination Zone should be set to the
      appropriate zone, or Any. Destination Address set to the target host address •
      Options tab: Type set to SSL Inbound Inspection
    remediation: >
      Navigate to Policies > Decryption. Set SSL Inbound Inspection appropriately
      for all untrusted traffic destined for servers using SSL or TLS. Navigate to
      Policies > Decryption. For each service published to the internet (or other
      untrusted zones), create a Policy and set the following options: • General
      tab: Name set to a descriptive name • Source: Source Zone set to the target
      zone (Internet in many cases). Source Address set to the target address space
      (Any for internet traffic) • Destination tab: Destination Zone should be set
      to the appropriate zone, or Any. Destination Address set to the target host
      address • Options tab: Type set to SSL Inbound Inspection Default Value: Not
      Configured References: 1. “How to Implement SSL Decryption” -
      https://live.paloaltonetworks.com/docs/DOC-1412 2. “PAN-OS Administrator's
      Guide 11.1 (English) - Decryption (English)” -
      https://docs.paloaltonetworks.com/pan-os/11-1/pan-os-admin/decryption
    references: >
      1. “How to Implement SSL Decryption” -
      https://live.paloaltonetworks.com/docs/DOC-1412 2. “PAN-OS Administrator's
      Guide 11.1 (English) - Decryption (English)” -
      https://docs.paloaltonetworks.com/pan-os/11-1/pan-os-admin/decryption
    impact: >
      Not decrypting inbound traffic to TLS encrypted services means that inspection
      for many common attacks cannot occur on the firewall. This means that all
      defenses against these attacks are up to the host.
