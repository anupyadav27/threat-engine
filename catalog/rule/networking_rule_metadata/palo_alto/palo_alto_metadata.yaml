  - rule_id: palo_alto.cis.3.high_availability_requires_link_monitoring_and_or
    title: "Ensure 'High Availability' requires Link Monitoring and/or Path Monitoring"
    severity: high
    category: networking
    tech_type: palo_alto
    automation_type: automated
    cis_benchmark: "CIS_PALO_ALTO 11_v1.1.0"
    cis_version: "11_v1.1.0"
    cis_control: "3.2"
    cis_section: "3"
    profile_applicability: "Level 1"
    description: >
      Configure Link Monitoring and/or Path Monitoring under High Availability
      options. If Link Monitoring is utilized, all links critical to traffic flow
      should be monitored.
    rationale: >
      If Link or Path Monitoring is not enabled, the standby router will not
      automatically take over as active if a critical link fails on the active
      firewall. Services through the firewall could become unavailable as a result.
      Impact: Not configuring High Availability (HA) correctly directly impacts the
      Availability of the system. With HA in place, standard maintenance such as OS
      updates, network and power cabling can be accomplished with no outage or a
      minimum impact. Without Link and Path monitoring in particular, failover will
      only occur when the primary device fails completely. Link and path monitoring
      permits failover if a critical interface loses link (either due to cabling or
      an upstream switch failover), or if a route or path fails (indicating an
      upstream issue that affects local Layer 3).
    audit_procedure: >
      To verify Link Monitoring from GUI: Navigate to Device > High Availability >
      Link and Path Monitoring. In the Link Monitoring section, verify the correct
      interfaces are in the Link Group and Group Failure Conditions Under the Link
      Monitoring section, verify Failure Condition is set to Any. Verify Enabled
      button is checked. To verify Path Monitoring from GUI: Navigate to Device >
      High Availability > Link and Path Monitoring. In the Path Monitoring section,
      verify Option is set correctly. Verify Failure Condition is set to Any. Verify
      Name, IP Address, Failure Condition is set correctly. Verify Default setting
      is set to Any. Verify Enabled button is checked.
    remediation: >
      To set Link Monitoring from GUI: Navigate to Device > High Availability > Link
      and Path Monitoring. Click Link Monitoring. Set the correct interfaces to the
      Link Group and Group Failure Conditions. Click Link Monitoring. Set Failure
      Condition to Any. Check Enabled button. To set Path Monitoring from GUI:
      Navigate to Device > High Availability > Link and Path Monitoring. Click Path
      Monitoring. Set Option correctly. Set Failure Condition to Any. Set Name, IP
      Address, Failure Condition correctly. Set Default setting to Any. Check
      Enabled button. Default Value: Not Configured References: 1. “PAN-OS
      Administrator's Guide 11.1 (English) - High Availability' -
      https://docs.paloaltonetworks.com/pan-os/11-1/pan-os-web-interface-
      help/device/device-high-availability
    references: >
      1. “PAN-OS Administrator's Guide 11.1 (English) - High Availability' -
      https://docs.paloaltonetworks.com/pan-os/11-1/pan-os-web-interface-
      help/device/device-high-availability
    impact: >
      Not configuring High Availability (HA) correctly directly impacts the
      Availability of the system. With HA in place, standard maintenance such as OS
      updates, network and power cabling can be accomplished with no outage or a
      minimum impact. Without Link and Path monitoring in particular, failover will
      only occur when the primary device fails completely. Link and path monitoring
      permits failover if a critical interface loses link (either due to cabling or
      an upstream switch failover), or if a route or path fails (indicating an
      upstream issue that affects local Layer 3).
    compliance_mappings:
      cis:
        - "CIS_PALO_ALTO_11_v1_1_0_3_2"
      nist_800_53: []
      soc2: []
      pci_dss: []
