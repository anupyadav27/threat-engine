  - rule_id: palo_alto.cis.1.minimum_password_complexity_is_enabled
    title: "Ensure 'Minimum Password Complexity' is enabled"
    severity: high
    category: networking
    tech_type: palo_alto
    automation_type: automated
    cis_benchmark: "CIS_PALO_ALTO 11_v1.1.0"
    cis_version: "11_v1.1.0"
    cis_control: "1.3.1"
    cis_section: "1"
    profile_applicability: "Level 1"
    description: >
      This checks all new passwords to ensure that they meet basic requirements for
      strong passwords.
    rationale: >
      Password complexity recommendations are derived from the USGCB (United States
      Government Configuration Baseline), Common Weakness Enumeration, and
      benchmarks published by the CIS (Center for Internet Security). Password
      complexity adds entropy to a password, in comparison to a simple password of
      the same length. A complex password is more difficult to attack, either
      directly against administrative interfaces or cryptographically, against
      captured password hashes. However, making a password of greater length will
      generally have a greater impact in this regard, in comparison to making a
      shorter password more complex. Impact: Simple passwords make an attacker's job
      very easy. There is a reasonably short list of commonly used admin passwords
      for network infrastructure, not enforcing password lengths and complexity can
      lend itself to making an attacker's brute force attack successful.
    audit_procedure: >
      Navigate to Device > Setup > Management > Minimum Password Complexity. Verify
      Enabled is checked Ensure that the various password settings to values that
      are appropriate to your organization. Non-zero values should be set for
      Minimum Uppercase, Lowercase and Special Characters. 'Block Username
      Inclusion' should be enabled.
    remediation: >
      Navigate to Device > Setup > Management > Minimum Password Complexity. Set
      Enabled to be checked Set that the various password settings to values that
      are appropriate to your organization. It is suggested that there at least be
      some special characters enforced, and that a minimum length be set. Ensure
      that non-zero values are set for Minimum Uppercase, Lowercase and Special
      Characters. 'Block Username Inclusion' should be enabled. Operationally,
      dictionary words should be avoided for all passwords - passphrases are a much
      better alternative. Default Value: Not enabled. References: 1. “PAN-OS
      Administrator's Guide 9.0 (English) - Best Practices for Securing
      Administrative Access” - https://docs.paloaltonetworks.com/pan-os/9-0/pan-os-
      admin/getting-started/best-practices-for-securing-administrative-access.html
    references: >
      1. “PAN-OS Administrator's Guide 9.0 (English) - Best Practices for Securing
      Administrative Access” - https://docs.paloaltonetworks.com/pan-os/9-0/pan-os-
      admin/getting-started/best-practices-for-securing-administrative-access.html
    impact: >
      Simple passwords make an attacker's job very easy. There is a reasonably short
      list of commonly used admin passwords for network infrastructure, not
      enforcing password lengths and complexity can lend itself to making an
      attacker's brute force attack successful.
    compliance_mappings:
      cis:
        - "CIS_PALO_ALTO_11_v1_1_0_1_3_1"
      nist_800_53: []
      soc2: []
      pci_dss: []
    source_unique_id: "cis_palo_alto_11_v1_1_0_1_3_1"
    metadata_source: generated
    generated_by: generate_tech_rules

  - rule_id: palo_alto.cis.1.minimum_length_is_greater_than_or_equal_to_12
    title: "Ensure 'Minimum Length' is greater than or equal to 12"
    severity: high
    category: networking
    tech_type: palo_alto
    automation_type: automated
    cis_benchmark: "CIS_PALO_ALTO 11_v1.1.0"
    cis_version: "11_v1.1.0"
    cis_control: "1.3.2"
    cis_section: "1"
    profile_applicability: "Level 1"
    description: >
      This determines the least number of characters that make up a password for a
      user account.
    rationale: >
      A longer password is much more difficult to attack, either directly against
      administrative interfaces or cryptographically, against captured password
      hashes. Making a password of greater length will generally have a greater
      impact in this regard, in comparison to making a shorter password more
      complex. Passphrases are a commonly used recommendation, to make longer
      passwords more palatable to end users. Administrative staff however generally
      use 'password safe' applications, so a long and complex password is more
      easily implemented for most infrastructure administrative interfaces. Impact:
      Longer passwords are much more difficult to attack. This is true of attacks
      against the administrative interfaces themselves, or of decryption attacks
      against captured hashes. A longer password will almost always have a more
      positive impact than a shorter but more complex password.
    audit_procedure: >
      Navigate to Device > Setup > Management > Minimum Password Complexity. Verify
      Minimum Length is greater than or equal to 12
    remediation: >
      Navigate to Device > Setup > Management > Minimum Password Complexity. Set
      Minimum Length to greater than or equal to 12 Default Value: Not enabled.
      References: 1. “PAN-OS Administrator's Guide 9.0 (English) - Best Practices
      for Securing Administrative Access” - https://docs.paloaltonetworks.com/pan-
      os/9-0/pan-os- admin/getting-started/best-practices-for-securing-
      administrative-access.html
    references: >
      1. “PAN-OS Administrator's Guide 9.0 (English) - Best Practices for Securing
      Administrative Access” - https://docs.paloaltonetworks.com/pan-os/9-0/pan-os-
