  - rule_id: palo_alto.cis.5.inline_cloud_analysis_on_wildfire_profiles_is
    title: "Ensure that 'Inline Cloud Analysis' on Wildfire profiles is enabled"
    severity: high
    category: networking
    tech_type: palo_alto
    automation_type: manual
    cis_benchmark: "CIS_PALO_ALTO 11_v1.1.0"
    cis_version: "11_v1.1.0"
    cis_control: "5.8"
    cis_section: "5"
    profile_applicability: "Level 1"
    description: >
      Enable 'Advanced WildFire Inline Cloud Analysis' on Wildfire profiles and
      forward PE files for analysis. Palo Alto Networks Advanced WildFire operates a
      series of cloud- based ML detection engines that provide inline analysis of PE
      (portable executable) files traversing your network to detect and prevent
      advanced malware in real-time.
    rationale: >
      Advanced WildFire Inline Cloud Analysis uses a lightweight forwarding
      mechanism on the firewall to minimize performance impact. The cloud-based ML
      models are updated seamlessly, to address the ever-changing threat landscape
      without requiring content updates or feature release support. Advanced
      WildFire Inline Cloud Analysis is enabled and configured through the WildFire
      Analysis profile and requires PAN-OS 11.1 or later with an active Advanced
      WildFire license. As of PAN-OS 11.1, only PE file type is supported.
    audit_procedure: >
      Navigate to Objects > Security Profiles > Wildfire Verify that Wildfire
      profiles has Enable cloud inline analysis checked. On Inline cloud analysis
      tab, verify that there is a rule to forward files with the following settings:
      • Application set to Any • File Type set to PE • Direction set to Both •
      Action set to Block
    remediation: >
      Navigate to Objects > Security Profiles > Wildfire On relevant Wildfire
      profile, checked Enable cloud inline analysis box. On Inline cloud analysis
      tab, configure a rule to forward files with the following settings: •
      Application set to Any • File Type set to PE • Direction set to Both • Action
      set to Block Default Value: Not Configured References: 1. “Advanced WildFire
      (English)” - https://docs.paloaltonetworks.com/advanced-
