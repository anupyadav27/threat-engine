  - rule_id: palo_alto.cis.1.required_password_change_period_is_less_than_or
    title: "Ensure 'Required Password Change Period' is less than or equal to 90 days"
    severity: high
    category: networking
    tech_type: palo_alto
    automation_type: automated
    cis_benchmark: "CIS_PALO_ALTO 11_v1.1.0"
    cis_version: "11_v1.1.0"
    cis_control: "1.3.7"
    cis_section: "1"
    profile_applicability: "Level 1"
    description: >
      This defines how long a user can use a password before it expires.
    rationale: >
      The longer a password exists, the higher the likelihood that it will be
      compromised by a brute force attack, by an attacker gaining general knowledge
      about the user and guessing the password, or by the user sharing the password.
      Impact: Failure to change administrative passwords can result in a slow
      'creep' of people who have access. Especially in a situation with high staff
      turnover (for instance, in a NOC or SOC situation), administrative passwords
      need to be changed frequently. Administrative credentials should not be shared
      across multiple devices. In a NOC/SOC situation, it's important to not share
      administrative credentials between operators (names accounts should be used),
      and in particular administrative credentials should never be shared across
      different customer infrastructures.
    audit_procedure: >
      Navigate to Device > Setup > Management > Minimum Password Complexity. Verify
      Required Password Change Period (days) is less than or equal to 90
    remediation: >
      Navigate to Device > Setup > Management > Minimum Password Complexity. Set
      Required Password Change Period (days) to less than or equal to 90 Default
      Value: Not enabled. References: 1. “PAN-OS Administrator's Guide 9.0 (English)
      - Best Practices for Securing Administrative Access” -
      https://docs.paloaltonetworks.com/pan-os/9-0/pan-os- admin/getting-
      started/best-practices-for-securing-administrative-access.html Additional
      Information: This guidance is currently under some debate in the community. If
      the password length is sufficient and password complexity is enforced, then in
      many organizations it is likely that the password change period can be
      increased to 6, 9 or even 12 months.
    references: >
      1. “PAN-OS Administrator's Guide 9.0 (English) - Best Practices for Securing
      Administrative Access” - https://docs.paloaltonetworks.com/pan-os/9-0/pan-os-
      admin/getting-started/best-practices-for-securing-administrative-access.html
      Additional Information: This guidance is currently under some debate in the
      community. If the password length is sufficient and password complexity is
      enforced, then in many organizations it is likely that the password change
      period can be increased to 6, 9 or even 12 months.
    impact: >
      Failure to change administrative passwords can result in a slow 'creep' of
      people who have access. Especially in a situation with high staff turnover
      (for instance, in a NOC or SOC situation), administrative passwords need to be
      changed frequently. Administrative credentials should not be shared across
      multiple devices. In a NOC/SOC situation, it's important to not share
      administrative credentials between operators (names accounts should be used),
      and in particular administrative credentials should never be shared across
      different customer infrastructures.
    compliance_mappings:
      cis:
        - "CIS_PALO_ALTO_11_v1_1_0_1_3_7"
