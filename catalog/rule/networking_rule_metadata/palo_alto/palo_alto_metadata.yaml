  - rule_id: palo_alto.cis.6.dns_sinkholing_is_configured_on_all_anti_spyware
    title: "Ensure DNS sinkholing is configured on all anti-spyware profiles in use"
    severity: high
    category: networking
    tech_type: palo_alto
    automation_type: automated
    cis_benchmark: "CIS_PALO_ALTO 11_v1.1.0"
    cis_version: "11_v1.1.0"
    cis_control: "6.4"
    cis_section: "6"
    profile_applicability: "Level 1"
    description: >
      Configure DNS sinkholing for all anti-spyware profiles in use. All internal
      requests to the selected sinkhole IP address must traverse the firewall. Any
      device attempting to communicate with the DNS sinkhole IP address should be
      considered infected.
    rationale: >
      DNS sinkholing helps to identify infected clients by spoofing DNS responses
      for malware domain queries. Without sinkholing, the DNS server itself may be
      seen as infected, while the truly infected device remains unidentified. In
      addition, sinkholing also ensures that DNS queries that might be indicators of
      compromise do not transit the internet, where they could be potentially used
      to negatively impact the 'ip reputation' of the organization's internet
      network subnets.
    audit_procedure: >
      Navigate to Objects > Security Profiles > Anti-Spyware. Within the each anti-
      spyware profile, under its DNS Policies tab, verify the Signature Source List:
      default-paloalto-dns should have as its Policy Action set to sinkhole If
      licensed, the DNS Security should have as its Policy Action set to sinkhole
      Verify the 'Sinkhole IPv4' IP address is correct. This should be set to
      sinkhole.paloaltnetworks.com, or if an internal host is set then that host IP
      or FQDN should be in that field Verify the 'Sinkhole IPv6' IP address is
      correct. This should be set to IPv6 Loopback IP (::1), or if an internal DNS
      Sinkhole host is set then that host IP or FQDN should be in that field
      Navigate to Policies > Security Policies For each outbound security Policy, in
      the Actions tab, verify that the Anti-Spyware setting includes the Spyware
      Profile created, either explicitly or as a Group Profile To verify correct
      operation of DNS Security, from an internal station make a DNS request to each
      of the following hosts: • test-malware.testpanw.com to test Malware DNS
      Signature checks • test-c2.testpanw.com to test C2 DNS Signature checks •
      test-dga.testpanw.com to test DGA (Domain Generation Algorithm) DNS attack
      checks • test-dnstun.testpanw.com to test DNS Tunneling attack checks Each of
      these DNS requests should be redirected to the configured DNS Sinkhole server
      IP address Each of these DNS requests should appear in the firewall logs,
      under Monitor > Logs > Threat. If configured, each of these requests should
      generate an alert in the organization's SIEM.
    remediation: >
      Navigate to Objects > Security Profiles > Anti-Spyware. Within the each anti-
      spyware profile, under its DNS Policies tab, set the Signature Source List:
      default-paloalto-dns should have as its Policy Action set to sinkhole If
      licensed, the DNS Security should have as its Policy Action set to sinkhole
      Verify the 'Sinkhole IPv4' IP address is correct. This should be set to
      sinkhole.paloaltnetworks.com, or if an internal host is set then that host IP
      or FQDN should be in that field Verify the 'Sinkhole IPv6' IP address is
      correct. This should be set to IPv6 Loopback IP (::1), or if an internal DNS
      Sinkhole host is set then that host IP or FQDN should be in that field
      Navigate to Policies > Security Policies For each outbound security Policy, in
      the Actions tab, set the Anti-Spyware setting to include the Spyware Profile
      created, either explicitly or as a Group Profile Default Value: Not Configured
      References: 1. “How to Deal with Conficker using DNS Sinkhole” -
      https://live.paloaltonetworks.com/docs/DOC-6628 2. “Threat Prevention
      Deployment Tech Note” - https://live.paloaltonetworks.com/docs/DOC-3094 3.
      'PAN OS Administrator's Guide 11.1 (English) - Anti-Spyware Profile' -
      https://docs.paloaltonetworks.com/pan-os/11-1/pan-os-web-interface-
      help/objects/objects-security-profiles-anti-spyware-profile
    references: >
