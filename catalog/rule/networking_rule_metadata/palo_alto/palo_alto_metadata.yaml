  - rule_id: palo_alto.cis.6.url_filtering_uses_the_action_of_block_or
    title: "Ensure that URL Filtering uses the action of “block” or “override” on the URL categories"
    severity: high
    category: networking
    tech_type: palo_alto
    automation_type: automated
    cis_benchmark: "CIS_PALO_ALTO 11_v1.1.0"
    cis_version: "11_v1.1.0"
    cis_control: "6.9"
    cis_section: "6"
    profile_applicability: "Level 1"
    description: >
      Ideally, deciding which URL categories to block, and which to allow, is a
      joint effort between IT and another entity of authority within an
      organization—such as the legal department or administration. For most
      organizations, blocking or requiring an override on the following categories
      represents a minimum baseline: adult, hacking, command- and-control,
      copyright-infringement, extremism, malware, phishing, proxy-avoidance- and-
      anonymizers, and parked. Some organizations may add 'unknown' and 'dynamic-
      dns' to this list, at the expense of some support calls on those topics.
    rationale: >
      Certain URL categories pose a technology-centric threat, such as command-and-
      control, copyright-infringement, extremism, malware, phishing, proxy-
      avoidance-and- anonymizers, and parked. Users visiting websites in these
      categories, many times unintentionally, are at greater risk of compromising
      the security of their system. Other categories, such as adult, may pose a
      legal liability and will be blocked for those reasons. Impact: Not having an
      effective URL Filtering configuration can leave an organization open to legal
      action, internal HR issues, non-compliance with regulatory policies or
      productivity loss.
    audit_procedure: >
      Navigate to Objects > Security Profiles > URL Filtering. Verify that all URL
      categories designated by the organization are listed, and the action is set to
      Block.
    remediation: >
      Navigate to Objects > Security Profiles > URL Filtering. Set a URL filter so
      that all URL categories designated by the organization are listed. Navigate to
      the Actions tab. Set the action to Block. Default Value: Not Configured
      References: 1. “PAN-OS Administrator's Guide 11.1 (English) - Security
      Profiles” - https://docs.paloaltonetworks.com/pan-os/11-1/pan-os-
      admin/policy/security- profiles 2. “PAN-OS Administrator's Guide 9.0 (English)
      - URL Filtering” - https://docs.paloaltonetworks.com/pan-os/9-0/pan-os-
      admin/url-filtering.html 3. “PAN-OS Admin Guide 9.0 (English) - URL Filtering
      Best Practices' - https://docs.paloaltonetworks.com/advanced-url-
      filtering/administration/configuring-url-filtering/url-filtering-best-
      practices
    references: >
      1. “PAN-OS Administrator's Guide 11.1 (English) - Security Profiles” -
      https://docs.paloaltonetworks.com/pan-os/11-1/pan-os-admin/policy/security-
      profiles 2. “PAN-OS Administrator's Guide 9.0 (English) - URL Filtering” -
      https://docs.paloaltonetworks.com/pan-os/9-0/pan-os-admin/url-filtering.html
      3. “PAN-OS Admin Guide 9.0 (English) - URL Filtering Best Practices' -
