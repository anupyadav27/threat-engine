  - rule_id: palo_alto.cis.6.a_secure_data_filtering_profile_is_applied_to_all
    title: "Ensure a secure Data Filtering profile is applied to all security policies allowing traffic to or from the Internet"
    severity: high
    category: networking
    tech_type: palo_alto
    automation_type: automated
    cis_benchmark: "CIS_PALO_ALTO 11_v1.1.0"
    cis_version: "11_v1.1.0"
    cis_control: "6.14"
    cis_section: "6"
    profile_applicability: "Level 1"
    description: >
      Create a secure Data Filtering profile and apply it to all security policies
      permitting traffic to or from the Internet. The Data Filtering profile may be
      applied to security policies directly or through a profile group.
    rationale: >
      A Data Filtering profile helps prevent certain types of sensitive information
      from traversing an organization’s Internet connection, especially in clear
      text. Detecting and blocking known sensitive information is a basic protection
      against a data breach or data loss. Not implementing these defenses can lead
      to loss of regulatory accreditation (such as PCI, HIPAA etc), or can lead to
      legal action from injured parties or regulatory bodies. Before starting, be
      very aware that Data Filtering will often block data that you didn't
      anticipate, false positives will definitely occur. Even the prebuilt filters
      will frequently match on unintended data in files or websites. Work very
      closely with your user community to ensure that required data is blocked or
      alerted on, but a minimum of false positive blocks occur. As false positives
      occur, ensure that your user community has a clear and timely procedure to get
      the configuration updated.
    audit_procedure: >
      Navigate to Objects > Custom Objects > Data Patterns. Verify that the patterns
      defined match the various data that you wish to monitor or make blocking
      decisions on. Navigate to Objects > Security Profiles > Data Filtering For
      each Filtering Profile, verify that the Data Patterns defined matches the data
      you wish to monitor, with appropriate values for Alert Threshold (typically
      20), Block Threshold (typically 0) and Log Severity. Finally, navigate to
      Policies > Security. Open all appropriate policies, for each Policy choose the
      Actions tab, and verify that the appropriate Data Filtering Policy is applied
      (either as an individual Profile or as part of a Group Profile)
    remediation: >
      Navigate to Objects > Custom Objects > Data Patterns. Add patterns to match
      the various data that you wish to monitor or make blocking decisions on.
      Navigate to Objects > Security Profiles > Data Filtering Add a Filtering
      Profile that matches the data you wish to monitor, with appropriate values for
      Alert Threshold (typically 20), Block Threshold (typically 0) and Log
      Serverity Finally, apply the Filtering Profile to a Security Profile. Navigate
      to Policies > Security. Edit all appropriate policies, and for each Policy
      choose the Actions tab, and add the appropriate Data Filtering Policy (either
      as an individual Profile or as part of a Group Profile) Default Value: Not
      Configured References: 1. “PAN-OS Administrator's Guide 9.0 (English) -
      Setting up Data Filtering' - https://docs.paloaltonetworks.com/pan-os/9-0/pan-
      os-admin/threat- prevention/set-up-data-filtering.html#
    references: >
      1. “PAN-OS Administrator's Guide 9.0 (English) - Setting up Data Filtering' -
