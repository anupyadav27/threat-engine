  - rule_id: palo_alto.cis.6.pan_db_url_filtering_is_used
    title: "Ensure that PAN-DB URL Filtering is used"
    severity: high
    category: networking
    tech_type: palo_alto
    automation_type: automated
    cis_benchmark: "CIS_PALO_ALTO 11_v1.1.0"
    cis_version: "11_v1.1.0"
    cis_control: "6.8"
    cis_section: "6"
    profile_applicability: "Level 1"
    description: >
      Configure the device to use PAN-DB URL Filtering instead of BrightCloud.
    rationale: >
      Standard URL filtering provides protection against inappropriate and malicious
      URLs and IP addresses. PAN-DB URL Filtering is slightly less granular than the
      BrightCloud URL filtering. However the PAN-DB Filter offers additional malware
      protection and PAN threat intelligence by using the Wildfire service as an
      additional input, which is currently not available in the BrightCloud URL
      Filtering license. This makes the PAN-DB filter more responsive to specific
      malware 'campaigns'. Impact: Not having an effective URL Filtering
      configuration can leave an organization open to legal action, internal HR
      issues, non-compliance with regulatory policies or productivity loss.
    audit_procedure: >
      Navigate to Device > Licenses. Click on PAN-DB URL Filtering. Verify Active is
      set to Yes.
    remediation: >
      Navigate to Device > Licenses. Click on PAN-DB URL Filtering. Set Active to
      Yes. Default Value: Not Configured References: 1. “PAN-OS Administrator's
      Guide 9.0 (English) - URL Filtering” - https://docs.paloaltonetworks.com/pan-
      os/9-0/pan-os-admin/url-filtering.html 2. “PAN-OS Administrator's Guide 9.0
      (English) - URL Filtering Best Practices' -
