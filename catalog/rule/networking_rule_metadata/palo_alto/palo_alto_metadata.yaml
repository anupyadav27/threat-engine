  - rule_id: palo_alto.cis.2.user_id_is_only_enabled_for_internal_trusted
    title: "Ensure that User-ID is only enabled for internal trusted interfaces"
    severity: high
    category: networking
    tech_type: palo_alto
    automation_type: automated
    cis_benchmark: "CIS_PALO_ALTO 11_v1.1.0"
    cis_version: "11_v1.1.0"
    cis_control: "2.3"
    cis_section: "2"
    profile_applicability: "Level 1"
    description: >
      Only enable the User-ID option for interfaces that are both internal and
      trusted. There is rarely a legitimate need to allow WMI probing (or any user-
      id identification) on an untrusted interface. The exception to this is
      identification of remote-access VPN users, who are identified as they connect.
    rationale: >
      PAN released a customer advisory in October of 2014 warning of WMI probing on
      untrusted interfaces with User-ID enabled. This can result in theft of the
      password hash for the account used in WMI probing. Impact: If WMI probing is
      enabled without limiting the scope, internet hosts that are sources or
      destinations of traffic will be probed, and the password hash of the
      configured Domain Admin account can be captured by an outside attacker on such
      a host.
    audit_procedure: >
      Navigate to Network > Network Profiles > Interface Management. Verify that
      User-ID is only enabled for interfaces that are both internal and trusted.
    remediation: >
      Navigate to Network > Network Profiles > Interface Management. Set User-ID to
      be checked only for interfaces that are both internal and trusted; uncheck it
      for all other interfaces. Default Value: By default WMI probing and all User-
      ID functions are disabled. References: 1. “Customer advisory: Security Impact
      of User-ID Misconfiguration” - https://live.paloaltonetworks.com/docs/DOC-8125
      2. “R7-2014-16: Palo Alto Networks User-ID Credential Exposure” -
      https://blog.rapid7.com/2014/10/14/palo-alto-networks-userid-credential-
      exposure/ 3. “Best Practices for Securing User-ID Deployments” -
      https://live.paloaltonetworks.com/docs/DOC-7912 4. “User-ID Best Practices” -
      https://live.paloaltonetworks.com/docs/DOC-6591 5. “PAN-OS Administrator's
      Guide 11.1 (English) - Client Probing' -
      https://docs.paloaltonetworks.com/pan-os/11-1/pan-os-admin/user-id/user-id-
      concepts/user-mapping/client-probing
    references: >
      1. “Customer advisory: Security Impact of User-ID Misconfiguration” -
      https://live.paloaltonetworks.com/docs/DOC-8125 2. “R7-2014-16: Palo Alto
      Networks User-ID Credential Exposure” -
      https://blog.rapid7.com/2014/10/14/palo-alto-networks-userid-credential-
      exposure/ 3. “Best Practices for Securing User-ID Deployments” -
      https://live.paloaltonetworks.com/docs/DOC-7912 4. “User-ID Best Practices” -
      https://live.paloaltonetworks.com/docs/DOC-6591 5. “PAN-OS Administrator's
