  - rule_id: palo_alto.cis.7.service_setting_of_any_in_a_security_policy
    title: "Ensure 'Service setting of ANY' in a security policy allowing traffic does not exist"
    severity: high
    category: networking
    tech_type: palo_alto
    automation_type: automated
    cis_benchmark: "CIS_PALO_ALTO 11_v1.1.0"
    cis_version: "11_v1.1.0"
    cis_control: "7.2"
    cis_section: "7"
    profile_applicability: "Level 1"
    description: >
      Create security policies specifying application-default for the Service
      setting, in addition to the specific ports desired. The Service setting of any
      should not be used for any policies that allow traffic.
    rationale: >
      App-ID requires a number of packets to traverse the firewall before an
      application can be identified and either allowed or dropped. Due to this
      behavior, even when an application is defined in a security policy, a service
      setting of any may allow a device in one zone to perform ports scans on IP
      addresses in a different zone. In addition, this recommendation helps to avoid
      an App-ID cache pollution attack. Because of how App-ID works, configuring the
      service setting to 'Any' allows some initial traffic to reach the target host
      before App-ID can recognize and appropriately restrict the traffic. Setting
      the Service Setting to application specific at least restricts the traffic to
      the target applications or protocols for that initial volume of traffic.
    audit_procedure: >
      Navigate to Policies > Security. For each exposed host, verify that a Security
      Policy exists with: • Source tab: Zone set to OUTSIDE Address set to any •
      Destination tab: Zone set to DMZ / Address set to <DMZ Host Object> •
      Application tab: Application set to web-browsing (or appropriate application)
      • Service tab: Service set to application-default. The value of any should
      never be used
    remediation: >
      Navigate to Policies > Security. For each exposed host, set a Security Policy
      exists with: • Source tab: Zone set to OUTSIDE Address set to any •
      Destination tab: Zone set to DMZ / Address set to <DMZ Host Object> •
      Application tab: Application set to web-browsing (or appropriate application)
      • Service tab: Service set to application-default. The value of any should
      never be used Default Value: Not Configured References: 1. “Security Policy
      Guidelines” - https://live.paloaltonetworks.com/docs/DOC-3469 2. “Security
      Bulletin: App-ID Cache Pollution” -
      http://researchcenter.paloaltonetworks.com/2012/12/app-id-cache-pollution-
      response/ 3. “PAN-OS Administrator's Guide 11.1 (English) - Security Policiy
      Overview ” - https://docs.paloaltonetworks.com/pan-os/11-1/pan-os-web-
      interface- help/policies/policies-security/security-policy-overview
    references: >
      1. “Security Policy Guidelines” -
