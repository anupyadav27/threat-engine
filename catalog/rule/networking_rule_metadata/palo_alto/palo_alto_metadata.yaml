  - rule_id: palo_alto.cis.1.enable_log_on_high_dp_load_is_enabled
    title: "Ensure 'Enable Log on High DP Load' is enabled"
    severity: high
    category: networking
    tech_type: palo_alto
    automation_type: automated
    cis_benchmark: "CIS_PALO_ALTO 11_v1.1.0"
    cis_version: "11_v1.1.0"
    cis_control: "1.1.3"
    cis_section: "1"
    profile_applicability: "Level 1"
    description: >
      Enable the option 'Enable Log on High DP Load' feature. When this option is
      selected, a system log entry is created when the device’s packet processing
      load reaches 100% utilization.
    rationale: >
      When the device’s packet processing load reaches 100%, a degradation in the
      availability of services accessed through the device can occur. Logging this
      event can help with troubleshooting system performance. Impact: Sustained
      attacks, especially volumetric DOS and DDOS attacks will often affect CPU
      utilization. This setting will generate an event that is easily monitored for
      and alerted on. While setting CPU utilization watermarks in a Network
      Management System is a standard practice, this setting does not depend on even
      having an NMS, it doesn't require anything other than standard logging to
      implement.
    audit_procedure: >
      Navigate to Device > Setup > Management > Logging and Reporting Settings > Log
      Export and Reporting. Verify Enable Log on High DP Load is checked.
    remediation: >
      Navigate to Device > Setup > Management > Logging and Reporting Settings > Log
      Export and Reporting. Set the Enable Log on High DP Load box to checked.
      Default Value: Not enabled References: 1. 'Logging Best Practices' -
      https://live.paloaltonetworks.com/t5/best-practice- assessment-device/logging-
      and-reporting-settings-log-on-high-dp-mode/ta- p/336964
    references: >
      1. 'Logging Best Practices' - https://live.paloaltonetworks.com/t5/best-
      practice- assessment-device/logging-and-reporting-settings-log-on-high-dp-
      mode/ta- p/336964
    impact: >
      Sustained attacks, especially volumetric DOS and DDOS attacks will often
      affect CPU utilization. This setting will generate an event that is easily
      monitored for and alerted on. While setting CPU utilization watermarks in a
      Network Management System is a standard practice, this setting does not depend
      on even having an NMS, it doesn't require anything other than standard logging
      to implement.
    compliance_mappings:
      cis:
        - "CIS_PALO_ALTO_11_v1_1_0_1_1_3"
      nist_800_53: []
      soc2: []
      pci_dss: []
    source_unique_id: "cis_palo_alto_11_v1_1_0_1_1_3"
    metadata_source: generated
    generated_by: generate_tech_rules

  - rule_id: palo_alto.cis.1.permitted_ip_addresses_is_set_to_those_necessary
    title: "Ensure 'Permitted IP Addresses' is set to those necessary for device management"
    severity: high
    category: networking
    tech_type: palo_alto
    automation_type: automated
    cis_benchmark: "CIS_PALO_ALTO 11_v1.1.0"
    cis_version: "11_v1.1.0"
    cis_control: "1.2.1"
    cis_section: "1"
    profile_applicability: "Level 1"
    description: >
      Permit only the necessary IP addresses to be used to manage the device.
    rationale: >
      Management access to the device should be restricted to the IP addresses or
      subnets used by firewall administrators. Permitting management access from
      other IP addresses increases the risk of unauthorized access through password
      guessing, stolen credentials, or other means.
    audit_procedure: >
      Navigate to Device > Setup > Interfaces > Management. Verify that Permitted IP
      Addresses is limited only to those necessary for device management.
    remediation: >
      Navigate to Device > Setup > Interfaces > Management. Set Permitted IP
      Addresses to only those necessary for device management for the SSH and HTTPS
      protocols. If no profile exists, create one that has these addresses set.
      Default Value: Not enabled (all addresses that can reach the interface are
      permitted) References: 1. 'How to Allow Certain IP Addresses on the Management
      Interface' - https://live.paloaltonetworks.com/docs/DOC-8432 2. “PAN-OS
      Administrator's Guide 9.0 (English) - Best Practices for Securing
      Administrative Access': https://docs.paloaltonetworks.com/pan-os/9-0/pan-os-
      admin/getting-started/best-practices-for-securing-administrative-access.html#
    references: >
      1. 'How to Allow Certain IP Addresses on the Management Interface' -
      https://live.paloaltonetworks.com/docs/DOC-8432 2. “PAN-OS Administrator's
      Guide 9.0 (English) - Best Practices for Securing Administrative Access':
      https://docs.paloaltonetworks.com/pan-os/9-0/pan-os- admin/getting-
      started/best-practices-for-securing-administrative-access.html#
    impact: >
      
    compliance_mappings:
