  - rule_id: palo_alto.cis.1.redundant_ntp_servers_are_configured_appropriately
    title: "Ensure redundant NTP servers are configured appropriately"
    severity: high
    category: networking
    tech_type: palo_alto
    automation_type: automated
    cis_benchmark: "CIS_PALO_ALTO 11_v1.1.0"
    cis_version: "11_v1.1.0"
    cis_control: "1.6.2"
    cis_section: "1"
    profile_applicability: "Level 1"
    description: >
      These settings enable use of primary and secondary NTP servers to provide
      redundancy in case of a failure involving the primary NTP server.
    rationale: >
      NTP enables the device to maintain an accurate time and date when receiving
      updates from a reliable NTP server. Accurate timestamps are critical when
      correlating events with other systems, troubleshooting, or performing
      investigative work. Logs and certain cryptographic functions, such as those
      utilizing certificates, rely on accurate time and date parameters. In
      addition, rules referencing a Schedule object will not function as intended if
      the device’s time and date are incorrect. For additional security,
      authenticated NTP can be utilized. If Symmetric Key authentication is
      selected, only SHA1 should be used, as MD5 is considered severely compromised.
      Most organizations will maintain a pair of internal NTP servers for all
      internal time services. These servers will either be self-contained atomic
      clocks, or will collect time from a known reliable source (often GPS or a
      well-known internet server pool will be used).
    audit_procedure: >
      Navigate to Device > Setup > Services > Services. Verify Primary NTP Server
      Address is set appropriately. Verify Secondary NTP Server Address is set
      appropriately.
    remediation: >
      Navigate to Device > Setup > Services > Services. Set Primary NTP Server
      Address appropriately. Set Secondary NTP Server Address appropriately. Default
      Value: Not configured References: 1. “The NIST Authenticated NTP Service” -
      http://www.nist.gov/pml/div688/grp40/authntp.cfm 2.
      https://docs.paloaltonetworks.com/pan-os/11-1/pan-os-web-interface-
      help/device/device-setup-services/global-services-settings 3. 'How to
      Configure Authenticated NTP' -
      https://live.paloaltonetworks.com/t5/Configuration-Articles/How-to-Configure-
      Authenticated-NTP/ta-p/54495
    references: >
      1. “The NIST Authenticated NTP Service” -
