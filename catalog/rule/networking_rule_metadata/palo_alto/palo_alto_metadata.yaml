  - rule_id: palo_alto.cis.2.the_user_id_service_account_does_not_have
    title: "Ensure that the User-ID service account does not have interactive logon rights"
    severity: high
    category: networking
    tech_type: palo_alto
    automation_type: automated
    cis_benchmark: "CIS_PALO_ALTO 11_v1.1.0"
    cis_version: "11_v1.1.0"
    cis_control: "2.6"
    cis_section: "2"
    profile_applicability: "Level 1"
    description: >
      Restrict the User-ID service account from interactively logging on to systems
      in the Active Directory domain.
    rationale: >
      In the event of a compromised User-ID service account, restricting interactive
      logins forbids the attacker from utilizing services such as RDP against
      computers in the Active Directory domain of the organization. This reduces the
      impact of a User-ID service account compromise.
    audit_procedure: >
      Navigate to Active Directory Group Policies. Verify that Group Policies
      restricts the interactive logon privilege for the User-ID service account. or
      Navigate to Active Directory Managed Service Accounts. Verify that Managed
      Service Accounts restricts the interactive logon privilege for the User-ID
      service account.
    remediation: >
      Navigate to Active Directory Group Policies. Set Group Policies to restrict
      the interactive logon privilege for the User-ID service account. or Navigate
      to Active Directory Managed Service Accounts. Set Managed Service Accounts to
      restrict the interactive logon privilege for the User-ID service account.
      Default Value: Not configured References: 1. “Best Practices for Securing
      User-ID Deployments” - https://live.paloaltonetworks.com/docs/DOC-7912 2.
      “PAN-OS Administrator's Guide 11.1 (English) - Configure User Mapping Using
