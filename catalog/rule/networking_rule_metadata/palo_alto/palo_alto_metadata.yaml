  - rule_id: palo_alto.cis.5.a_wildfire_analysis_profile_is_enabled_for_all
    title: "Ensure a WildFire Analysis profile is enabled for all security policies"
    severity: high
    category: networking
    tech_type: palo_alto
    automation_type: automated
    cis_benchmark: "CIS_PALO_ALTO 11_v1.1.0"
    cis_version: "11_v1.1.0"
    cis_control: "5.2"
    cis_section: "5"
    profile_applicability: "Level 1"
    description: >
      Ensure that all files traversing the firewall are inspected by WildFire by
      setting a Wildfire file blocking profile on all security policies.
    rationale: >
      Traffic matching security policies that do not include a WildFire file
      blocking profile will not utilize WildFire for file analysis. Wildfire
      analysis is one of the key security measures available on this platform.
      Without Wildfire analysis enabled, inbound malware can only be analyzed by
      signature - which industry wide is roughly 40-60% effective. In a targeted
      attack, the success of signature-based-only analysis drops even further.
    audit_procedure: >
      To verify WildFire Analysis Profile: • Navigate to Objects > Security Profiles
      > WildFire Analysis Profile verify that a profile exists. To verify File
      Blocking Rules: • For each Security Policy were the action is set to Allow,
      edit the Rule and navigate to Actions > Profile Setting. Ensure that the
      WildFire Analysis is set to Allow and verify that a profile is set. If Group
      Profiles are used: • Navigate to Policies > Security • For each Security
      Policy were the action is set to Allow, edit the Rule and navigate to Actions
      > Profile Setting. Ensure that the Profile Type is set to Group. • Navigate to
      Objects > Security Profile Groups. Open the Security Profile Group used above,
      and ensure that the Wildfire Analysis Profile is set.
    remediation: >
      To Set File Blocking Profile: • Navigate to Objects > Security Profiles >
      WildFire Analysis Profile. • Create a WildFire profile that has 'Application
      Any', 'File Types Any', and 'Direction Both' To Set WildFire Analysis Rules: •
