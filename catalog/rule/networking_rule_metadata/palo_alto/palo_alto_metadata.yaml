  - rule_id: palo_alto.cis.6.a_zone_protection_profile_with_tuned_flood
    title: "Ensure that a Zone Protection Profile with tuned Flood Protection settings enabled for all flood types is attached to all untrusted zones"
    severity: medium
    category: networking
    tech_type: palo_alto
    automation_type: automated
    cis_benchmark: "CIS_PALO_ALTO 11_v1.1.0"
    cis_version: "11_v1.1.0"
    cis_control: "6.16"
    cis_section: "6"
    profile_applicability: "Level 2"
    description: >
      Enable all Flood Protection options in the Zone Protection Profile attached to
      all untrusted zones. The Alert, Activate, and Maximum settings for Flood
      Protection depend highly on the environment and device used. Perform traffic
      analysis on the specific environment and firewall to determine accurate
      thresholds. Do not rely on default values to be appropriate for an
      environment. Setting these values for all interfaces is an approach that
      should be considered by many organizations, as traffic floods can result from
      internal testing or malware as well.
    rationale: >
      Without flood protection, it may be possible for an attacker, through the use
      of a botnet or other means, to overwhelm network resources. Flood protection
      does not completely eliminate this risk; rather, it provides a layer of
      protection. Without a properly configured zone protection profile applied to
      untrusted interfaces, the protected / trusted networks are susceptible to
      large number of attacks. While many of these involve denial of service, some
      of these attacks are designed to evade IPS systems (fragmentation attacks for
      instance) or to evade basic firewall protections (source routing and record
      route attacks). Impact: Not configuring and applying a Network Zone Protection
      Profile leaves an organization exposed to common attacks and reconnaissance
      from untrusted networks. Not configuring a Zone Protection Profile for
      internal networks leaves an organization vulnerable to malware, software or
      hardware causes of traffic flooding from internal sources.
    audit_procedure: >
      In the GUI: Navigate to Network > Network Profiles > Zone Protection > Flood
      Protection. Ensure that all settings are enabled with at least the default
      values. Navigate to Network > Zones, select each untrusted zone in turn, and
      ensure that the Zone Protection Profile is set.
    remediation: >
      In the GUI: Navigate to Network > Network Profiles > Zone Protection > Flood
      Protection. Set all settings to 'enabled' with at least the default values.
      Navigate to Network > Zones, select each untrusted zone in turn, and set the
      Zone Protection Profile. Default Value: Not Configured References: 1.
      “Understanding DoS Protection” - https://live.paloaltonetworks.com/docs/DOC-
      5078 2. “Threat Prevention Deployment Tech Note” -
      https://live.paloaltonetworks.com/docs/DOC-3094 3. “What are the Differences
      between DoS Protection and Zone Protection?” -
      https://live.paloaltonetworks.com/docs/DOC-4501 4. PANOS 11.1 Admin Guide -
      Network Profiles / Zone Protection / Flood Protection -
      https://docs.paloaltonetworks.com/pan-os/11-1/pan-os-web-interface-
      help/network/network-network-profiles/network-network-profiles-zone-
      protection/flood-protection
    references: >
      1. “Understanding DoS Protection” -
      https://live.paloaltonetworks.com/docs/DOC- 5078 2. “Threat Prevention
      Deployment Tech Note” - https://live.paloaltonetworks.com/docs/DOC-3094 3.
      “What are the Differences between DoS Protection and Zone Protection?” -
      https://live.paloaltonetworks.com/docs/DOC-4501 4. PANOS 11.1 Admin Guide -
      Network Profiles / Zone Protection / Flood Protection -
      https://docs.paloaltonetworks.com/pan-os/11-1/pan-os-web-interface-
      help/network/network-network-profiles/network-network-profiles-zone-
      protection/flood-protection
    impact: >
      Not configuring and applying a Network Zone Protection Profile leaves an
      organization exposed to common attacks and reconnaissance from untrusted
      networks. Not configuring a Zone Protection Profile for internal networks
      leaves an organization vulnerable to malware, software or hardware causes of
      traffic flooding from internal sources.
