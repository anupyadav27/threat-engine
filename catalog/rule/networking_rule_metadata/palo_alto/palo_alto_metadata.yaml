  - rule_id: palo_alto.cis.6.wildfire_inline_ml_action_on_antivirus_profiles
    title: "Ensure that 'Wildfire Inline ML Action' on antivirus profiles are set to reset-both on all decoders except 'imap' and 'pop3'"
    severity: high
    category: networking
    tech_type: palo_alto
    automation_type: manual
    cis_benchmark: "CIS_PALO_ALTO 11_v1.1.0"
    cis_version: "11_v1.1.0"
    cis_control: "6.20"
    cis_section: "6"
    profile_applicability: "Level 1"
    description: >
      Configure 'Wildfire Inline ML Action' on antivirus profiles to a value of
      'reset-both' for all decoders except imap and pop3 under 'Wildfire Inline ML
      Action'. If required by the organization's email implementation, configure
      imap and pop3 decoders to 'alert' under 'Wildfire Inline ML Action'.
    rationale: >
      Starting from PanOS 10, Wildfire supports real-time detection and blocking. As
      more attacks are designed to bypass signature-based protection, real-time
      signatureless- based protection is needed. Antivirus signatures produce low
      false positives. By blocking any detected malware through the specified
      decoders, the threat of malware propagation through the firewall is greatly
      reduced. It is recommended to mitigate malware found in pop3 and imap through
      a dedicated antivirus gateway. Due to the nature of the pop3 and imap
      protocols, the firewall is not able to block only a single email message
      containing malware. Instead, the entire session would be terminated,
      potentially affecting benign email messages.
    audit_procedure: >
      Navigate to Objects > Security Profiles > Antivirus Verify that antivirus
      profiles have all decoders set to reset-both for Wildfire Inline ML Action. If
      imap and pop3 are required in the organization, verify that the imap and pop3
      decoders are set to alert for Wildfire Inline ML Action.
    remediation: >
      Navigate to Objects > Security Profiles > Antivirus Set antivirus profiles to
      have all decoders set to reset-both for Wildfire Inline ML Action. If imap and
      pop3 are required in the organization, set the imap and pop3 decoders are set
      to alert for Wildfire Inline ML Action. Default Value: Not Configured
      References: 1. “PAN-OS Administrator's Guide 11.1 (English) - Security
      Profiles” - https://docs.paloaltonetworks.com/advanced-
      wildfire/administration/configure- advanced-wildfire-analysis/enable-advanced-
      wildfire-inline-ml
    references: >
      1. “PAN-OS Administrator's Guide 11.1 (English) - Security Profiles” -
      https://docs.paloaltonetworks.com/advanced-wildfire/administration/configure-
      advanced-wildfire-analysis/enable-advanced-wildfire-inline-ml
    impact: >
      
    compliance_mappings:
