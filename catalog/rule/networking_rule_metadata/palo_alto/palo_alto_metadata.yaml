  - rule_id: palo_alto.cis.6.user_credential_submission_uses_the_action_of
    title: "Ensure that User Credential Submission uses the action of “block” or “continue” on the URL categories"
    severity: high
    category: networking
    tech_type: palo_alto
    automation_type: automated
    cis_benchmark: "CIS_PALO_ALTO 11_v1.1.0"
    cis_version: "11_v1.1.0"
    cis_control: "6.19"
    cis_section: "6"
    profile_applicability: "Level 1"
    description: >
      Ideally user names and passwords user within an organization are not used with
      third party sites. Some sanctioned SAS applications may have connections to
      the corporate domain, in which case they will need to be exempt from the user
      credential submission policy through a custom URL category.
    rationale: >
      Preventing users from having the ability to submit their corporate credentials
      to the Internet could stop credential phishing attacks and the potential that
      a breach at a site where a user reused credentials could lead to a credential
      stuffing attack. Impact: Not preventing users from submitting their corporate
      credentials to the Internet can leave them open to phishing attacks or allow
      for credential reuse on unauthorized sites. Using internal email accounts
      provides malicious actors with intelligence information, which can be used for
      phishing, credential stuffing and other attacks. Using internal passwords will
      often provide authenticated access directly to sensitive information. Not only
      that, but a pattern of credential re-use can expose personal information from
      multiple online sources.
    audit_procedure: >
      Navigate to Objects > Security Profiles > URL Filtering. Choose the Categories
      tab. Verify that the User Credential Submitting action on all enabled URL
      categories is set to either block or continue. Under the User Credential
      Detection tab ensure the User Credential Detection is set to a value
      appropriate to your organization, and is not set to Disabled. Verify that the
      Log Severity value is set to a value appropriate to your organization and your
      logging or SIEM solution.
    remediation: >
      Navigate to Objects > Security Profiles > URL Filtering. Choose the Categories
      tab. Set the User Credential Submitting action on all enabled URL categories
      is either block or continue, as appropriate to your organization and the
      category. Under the User Credential Detection tab set the User Credential
      Detection value to a setting appropriate to your organization, any value
      except Disabled. Set the Log Severity to a value appropriate to your
      organization and your logging or SIEM solution. Default Value: Not Configured
      References: 1. PAN OS 11.1 Admin Guide - URL Filtering / User Credential
      Detection - https://docs.paloaltonetworks.com/pan-os/11-1/pan-os-web-
      interface- help/objects/objects-security-profiles-url-filtering/user-
      credential-detection
    references: >
      1. PAN OS 11.1 Admin Guide - URL Filtering / User Credential Detection -
      https://docs.paloaltonetworks.com/pan-os/11-1/pan-os-web-interface-
      help/objects/objects-security-profiles-url-filtering/user-credential-detection
    impact: >
      Not preventing users from submitting their corporate credentials to the
      Internet can leave them open to phishing attacks or allow for credential reuse
      on unauthorized sites. Using internal email accounts provides malicious actors
      with intelligence information, which can be used for phishing, credential
      stuffing and other attacks. Using internal passwords will often provide
      authenticated access directly to sensitive information. Not only that, but a
      pattern of credential re-use can expose personal information from multiple
      online sources.
