  - rule_id: palo_alto.cis.1.syslog_logging_should_be_configured
    title: "Syslog logging should be configured"
    severity: high
    category: networking
    tech_type: palo_alto
    automation_type: automated
    cis_benchmark: "CIS_PALO_ALTO 11_v1.1.0"
    cis_version: "11_v1.1.0"
    cis_control: "1.1.1.1"
    cis_section: "1"
    profile_applicability: "Level 1"
    description: >
      Syslog logging is a standard logging protocol that is widely supported. It is
      recommended for a level 1 deployment only, as syslog does not support
      encryption.
    rationale: >
      Sending all system logs to a remote host is recommended to provide protected,
      long term storage and archiving. This also places a copy of the logs in a
      second location, in case the primary (on the firewall) logs are compromised.
      Storing logs on a remote host also allows for more flexible log searches and
      log processing, as well as many methods of triggering events or scripts based
      on specific log events or combinations of events. Finally, remote logging
      provides many organizations with the opportunity to combine logs from
      disparate infrastructure in a SIEM (Security Information and Event Management)
      system. Logging to an external system is also usually required by most
      regulatory frameworks. Impact: Failure to properly store and archive logs for
      critical infrastructure leaves an organization without the tools required to
      establish trends in events or activity, or to retrospectively analyze security
      or operational events beyond the log timespan stored on the firewall. Not
      having remote logs also puts many organizations outside of compliance with
      many regulatory frameworks. Finally, not logging to a remote host leaves
      organizations without recourse in the event of a compromise of logs on the
      primary device. It is imperative that organizations log critical
      infrastructure appropriately, store and archive these logs in a central
      location, and have a robust set of tools to analyze logs both in real time and
      after the fact.
    audit_procedure: >
      Navigate to Device > Server Profiles > Syslog Ensure that a valid Syslog
      profile is configured, and that it points to a valid Syslog host. Navigate to
      Device > Log Settings Under System, verify that at least one Syslog entry
      exists and that at least one entry has 'All Logs' selected. Each Syslog entry
      must have a valid Syslog Profile attached. Under Configuration, verify that at
      least one Syslog entry exists and that at least one entry has 'All Logs'
      selected. Each Syslog entry must have a valid Syslog Profile attached. Under
      User-ID, verify that at least one Syslog entry exists and that at least one
      entry has 'All Logs' selected. Each Syslog entry must have a valid Syslog
      Profile attached. Under HIP Match (Host Information Profile), verify that at
      least one Syslog entry exists and that at least one entry has 'All Logs'
      selected. Each Syslog entry must have a valid Syslog Profile attached. Under
      IP-Tag, verify that at least one Syslog entry exists and that at least one
      entry has 'All Logs' selected. Each Syslog entry must have a valid Syslog
      Profile attached.
    remediation: >
      Navigate to Device > Server Profiles > Syslog Choose Add Assign a Name to the
      Profile. Choose Add, and assign a server name in the Name field, add an IP
      address or FQDN in the Syslog Server field. Edit other fields as appropriate
      for your server. Repeat if multiple Syslog destinations are required. Navigate
      to Device > Log Settings Under System, add an entry. Define a Name and a
      Filter setting. Under Forward Methods, add a Syslog Profile in the Syslog
      section. Ensure that at least one of the Log Settings Configuration entries
      has it's Filter setting at All Logs Under Configuration, add an entry. Define
      a Name and a Filter setting. Under Forward Methods, add a Syslog Profile in
      the Syslog section. Ensure that at least one of the Log Settings Configuration
      entries has it's Filter setting at All Logs Under User-ID, add an entry.
      Define a Name and a Filter setting. Under Forward Methods, add a Syslog
      Profile in the Syslog section. Ensure that at least one of the Log Settings
      Configuration entries has it's Filter setting at All Logs Under HIP Match
      (Host Information Profile), add an entry. Define a Name and a Filter setting.
      Under Forward Methods, add a Syslog Profile in the Syslog section. Ensure that
      at least one of the Log Settings Configuration entries has it's Filter setting
      at All Logs Under IP-Tag, add an entry. Define a Name and a Filter setting.
      Under Forward Methods, add a Syslog Profile in the Syslog section. Ensure that
      at least one of the Log Settings Configuration entries has it's Filter setting
      at All Logs Default Value: By default no external logging is defined
      References: 1. “PAN-OS Administrator's Guide 11.1 (English) - Configure Syslog
      Monitoring” - https://docs.paloaltonetworks.com/pan-os/11-1/pan-os-
      admin/monitoring/use- syslog-for-monitoring/configure-syslog-monitoring
    references: >
      1. “PAN-OS Administrator's Guide 11.1 (English) - Configure Syslog Monitoring”
      - https://docs.paloaltonetworks.com/pan-os/11-1/pan-os-admin/monitoring/use-
      syslog-for-monitoring/configure-syslog-monitoring
    impact: >
      Failure to properly store and archive logs for critical infrastructure leaves
      an organization without the tools required to establish trends in events or
      activity, or to retrospectively analyze security or operational events beyond
      the log timespan stored on the firewall. Not having remote logs also puts many
      organizations outside of compliance with many regulatory frameworks. Finally,
      not logging to a remote host leaves organizations without recourse in the
      event of a compromise of logs on the primary device. It is imperative that
      organizations log critical infrastructure appropriately, store and archive
      these logs in a central location, and have a robust set of tools to analyze
      logs both in real time and after the fact.
    compliance_mappings:
      cis:
        - "CIS_PALO_ALTO_11_v1_1_0_1_1_1_1"
      nist_800_53: []
      soc2: []
      pci_dss: []
    source_unique_id: "cis_palo_alto_11_v1_1_0_1_1_1_1"
    metadata_source: generated
    generated_by: generate_tech_rules

  - rule_id: palo_alto.cis.1.snmpv3_traps_should_be_configured
    title: "SNMPv3 traps should be configured"
    severity: medium
    category: networking
    tech_type: palo_alto
    automation_type: automated
    cis_benchmark: "CIS_PALO_ALTO 11_v1.1.0"
    cis_version: "11_v1.1.0"
    cis_control: "1.1.1.2"
    cis_section: "1"
    profile_applicability: "Level 2"
    description: >
      SNMP v3 can be used for remote logging, and is the recommended protocol in
      higher security situations as it fully supports encryption of logs.
    rationale: >
      Sending all system logs to a remote host is recommended to provide protected,
      long term storage and archiving. This also places a copy of the logs in a
      second location, in case the primary (on the firewall) logs are compromised.
      Storing logs on a remote host also allows for more flexible log searches and
      log processing, as well as many methods of triggering events or scripts based
      on specific log events or combinations of events. Finally, remote logging
      provides many organizations with the opportunity to combine logs from
      disparate infrastructure in a SIEM (Security Information and Event Management)
      system. Logging to an external system is also usually required by most
      regulatory frameworks. Impact: Failure to properly store and archive logs for
      critical infrastructure leaves an organization without the tools required to
      establish trends in events or activity, or to retrospectively analyze security
      or operational events beyond the log timespan stored on the firewall. Not
      having remote logs also puts many organizations outside of compliance with
      many regulatory frameworks. Finally, not logging to a remote host leaves
      organizations without recourse in the event of a compromise of logs on the
      primary device. It is imperative that organizations log critical
      infrastructure appropriately, store and archive these logs in a central
      location, and have a robust set of tools to analyze logs both in real time and
      after the fact. Not encrypting log data as it transits the network allows an
      attacker to mount a 'MiTM' (Monkey in the Middle) attack, which allows them to
      intercept and/or modify logs as they transit from the source to the
      destination.
    audit_procedure: >
      Navigate to Device > Server Profiles > SNMP Traps Ensure that a valid SNMP
      profile is configured, that version V3 is selected, and that it points to a
      valid SNMPv3 host. User, EngineID and Password fields should be completed
      appropriately Navigate to Device > Log Settings Under System, verify that at
      least one SNMP entry exists, corresponding to an SNMPv3 Server Profile and
      that at least one entry has 'All Logs' selected. Under Configuration, verify
      that at least one SNMP entry exists, corresponding to an SNMPv3 Server Profile
      and that at least one entry has 'All Logs' selected. Under User-ID, verify
      that at least one SNMP entry exists, corresponding to an SNMPv3 Server Profile
      and that at least one entry has 'All Logs' selected. Under HIP Match (Host
      Information Profile), verify that at least one SNMP entry exists,
      corresponding to an SNMPv3 Server Profile and that at least one entry has 'All
      Logs' selected. Under IP-Tag, verify that at least one SNMP entry exists,
      corresponding to an SNMPv3 Server Profile and that at least one entry has 'All
      Logs' selected.
    remediation: >
      Navigate to Device > Server Profiles > SNMP Trap Choose Add Assign a Name to
      the Profile, and specify version V3. Choose Add, and assign a server name in
      the Name field, add an IP address or FQDN in the SNMP Manager field. Edit the
      Password fields as appropriate for your server. Repeat if multiple Syslog
      destinations are required. Navigate to Device > Log Settings Under System, add
      an entry. Define a Name and a Filter setting. Under Forward Methods, add a
      SNMP Profile in the SNMP section. Ensure that at least one of the Log Settings
      Configuration entries has its Filter setting at All Logs Under Configuration,
      add an entry. Define a Name and a Filter setting. Under Forward Methods, add a
      SNMP Profile in the SNMP section. Ensure that at least one of the Log Settings
      Configuration entries has its Filter setting at All Logs Under User-ID, add an
      entry. Define a Name and a Filter setting. Under Forward Methods, add a SNMP
      Profile in the SNMP section. Ensure that at least one of the Log Settings
      Configuration entries has its Filter setting at All Logs Under HIP Match (Host
      Information Profile), add an entry. Define a Name and a Filter setting. Under
      Forward Methods, add a SNMP Profile in the SNMP section. Ensure that at least
      one of the Log Settings Configuration entries has its Filter setting at All
      Logs Under IP-Tag, add an entry. Define a Name and a Filter setting. Under
      Forward Methods, add a SNMP Profile in the SNMP section. Ensure that at least
      one of the Log Settings Configuration entries has its Filter setting at All
      Logs Default Value: By default no external logging is defined References: 1.
      “PAN-OS Administrator's Guide 11.1 (English) - Forward Traps to an SNMP
      Manager” - https://docs.paloaltonetworks.com/pan-os/11-1/pan-os-
      admin/monitoring/snmp-monitoring-and-traps/forward-traps-to-an-snmp-manager
    references: >
      1. “PAN-OS Administrator's Guide 11.1 (English) - Forward Traps to an SNMP
      Manager” - https://docs.paloaltonetworks.com/pan-os/11-1/pan-os-
      admin/monitoring/snmp-monitoring-and-traps/forward-traps-to-an-snmp-manager
    impact: >
      Failure to properly store and archive logs for critical infrastructure leaves
      an organization without the tools required to establish trends in events or
      activity, or to retrospectively analyze security or operational events beyond
      the log timespan stored on the firewall. Not having remote logs also puts many
      organizations outside of compliance with many regulatory frameworks. Finally,
      not logging to a remote host leaves organizations without recourse in the
      event of a compromise of logs on the primary device. It is imperative that
      organizations log critical infrastructure appropriately, store and archive
      these logs in a central location, and have a robust set of tools to analyze
      logs both in real time and after the fact. Not encrypting log data as it
      transits the network allows an attacker to mount a 'MiTM' (Monkey in the
      Middle) attack, which allows them to intercept and/or modify logs as they
      transit from the source to the destination.
