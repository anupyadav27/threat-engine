  - rule_id: palo_alto.cis.7.application_security_policies_exist_when_allowing
    title: "Ensure application security policies exist when allowing traffic from an untrusted zone to a more trusted zone"
    severity: high
    category: networking
    tech_type: palo_alto
    automation_type: automated
    cis_benchmark: "CIS_PALO_ALTO 11_v1.1.0"
    cis_version: "11_v1.1.0"
    cis_control: "7.1"
    cis_section: "7"
    profile_applicability: "Level 1 + Level 2"
    description: >
      When permitting traffic from an untrusted zone, such as the Internet or guest
      network, to a more trusted zone, such as a DMZ segment, create security
      policies specifying which specific applications are allowed. **Enhanced
      Security Recommendation: ** Require specific application policies when
      allowing any traffic, regardless of the trust level of a zone. Do not rely
      solely on port permissions. This may require SSL interception, and may also
      not be possible in all environments.
    rationale: >
      To avoid unintentionally exposing systems and services, rules allowing traffic
      from untrusted zones to trusted zones should be as specific as possible.
      Application-based rules, as opposed to service/port rules, further tighten
      what traffic is allowed to pass. Similarly, traffic from trusted to untrusted
      networks should have a security policy set, with application-based rules. A
      'catch-all' rule that allows all applications will also allow malware traffic.
      The goal should be to understand both inbound and outbound traffic, permit
      what is known, and block all other traffic. Impact: Setting application based
      rules on both inbound and outbound traffic ensures that the traffic on the
      protocol and port being specified is actually the application that you expect.
      For outbound traffic, the days of 'we trust our users' is well past us, that
      statement also implies that we trust the malware on the user workstations,
      which is obviously not the case. For traffic from trusted to less trusted
      interfaces, the applications should be characterized over time, with the end
      goal being that all applications in in the rules, and a final 'block all' rule
      is in place. Not having this goal gives both attackers and malware the leeway
      they need to accomplish their goals. Trusting only Port permissions to control
      traffic exposes an organization to 'tunneling' style attacks that can
      exfiltrate data or facilitate Command and Control (C2) sessions.
    audit_procedure: >
      Navigate to Policies > Security. For all Security Policies that transit from a
      less trusted to a more trusted interface, that the appropriate Application and
      Service values are set. For instance, for a web server exposed to the internet
      from a DMZ: Source tab: Zone set to OUTSIDE / Address set to Any Destination
      tab: Zone set to DMZ / Address set to [DMZ Host Object] Application tab: set
      to web-browsing Service/URL Category tab: set Service to ether: • application-
      default or: • service-http and/or service-https **Enhanced Security
      Recommendation: ** Assess this setting for Policies on all Interfaces, for
      traffic in all directions. Ensure that for each Security Policy that the
      appropriate settings are set for both Application and Service
    remediation: >
      Navigate to Policies > Security. For all Security Policies that transit from a
      less trusted to a more trusted interface, set the Application and Service
      values to match the exposed application. For instance, for a web server
      exposed to the internet from a DMZ: Source tab: Zone set to OUTSIDE / Address
      set to Any Destination tab: Zone set to DMZ / Address set to [DMZ Host Object]
      Application tab: set to web-browsing Service/URL Category tab: set Service to
      ether: • application-default or: • service-http and/or service-https
      **Enhanced Security Recommendation: ** Set these values for Policies on all
      Interfaces, for traffic in all directions. For each Security Policy, set the
      Application and Service values to match the exposed application. Default
      Value: Not Configured References: 1. “PAN-OS Administrator's Guide 11.1
      (English) - Security Policies / Applications and Usage ” -
      https://docs.paloaltonetworks.com/pan-os/11-1/pan-os-web- interface-
      help/policies/policies-security/applications-and-usage
    references: >
      1. “PAN-OS Administrator's Guide 11.1 (English) - Security Policies /
      Applications and Usage ” - https://docs.paloaltonetworks.com/pan-os/11-1/pan-
      os-web- interface-help/policies/policies-security/applications-and-usage
    impact: >
      Setting application based rules on both inbound and outbound traffic ensures
      that the traffic on the protocol and port being specified is actually the
      application that you expect. For outbound traffic, the days of 'we trust our
      users' is well past us, that statement also implies that we trust the malware
      on the user workstations, which is obviously not the case. For traffic from
      trusted to less trusted interfaces, the applications should be characterized
      over time, with the end goal being that all applications in in the rules, and
      a final 'block all' rule is in place. Not having this goal gives both
      attackers and malware the leeway they need to accomplish their goals. Trusting
      only Port permissions to control traffic exposes an organization to
      'tunneling' style attacks that can exfiltrate data or facilitate Command and
      Control (C2) sessions.
