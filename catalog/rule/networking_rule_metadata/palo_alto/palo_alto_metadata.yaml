  - rule_id: palo_alto.cis.6.a_secure_vulnerability_protection_profile_is
    title: "Ensure a secure Vulnerability Protection Profile is applied to all security rules allowing traffic"
    severity: high
    category: networking
    tech_type: palo_alto
    automation_type: automated
    cis_benchmark: "CIS_PALO_ALTO 11_v1.1.0"
    cis_version: "11_v1.1.0"
    cis_control: "6.7"
    cis_section: "6"
    profile_applicability: "Level 1"
    description: >
      For any security rule allowing traffic, apply a securely configured
      Vulnerability Protection Profile. Careful analysis of the target environment
      should be performed before implementing this configuration, as outlined by
      PAN’s “Threat Prevention Deployment Tech Note” in the references section.
    rationale: >
      A Vulnerability Protection Profile helps to protect assets by alerting on, or
      blocking network attacks. By applying a secure Vulnerability Protection
      Profile to all security rules permitting traffic, all network traffic
      traversing the firewall will be inspected for attacks. This protects both
      organizational assets from attack and organizational reputation from damage.
      Note that encrypted sessions do not allow for complete inspection. Impact: Not
      configuring a Vulnerability Protection Profile means that network attacks will
      not be logged, alerted on or blocked.
    audit_procedure: >
      Navigate to Policies > Security. For each Policy, under the Actions tab,
      select Vulnerability Protection. Verify either the 'Strict' or the 'Default'
      profile is selected, or a custom profile that complies with the organization's
      policies, legal and regulatory requirements.
    remediation: >
      Navigate to Policies > Security. For each Policy, under the Actions tab,
      select Vulnerability Protection. Set it to use either the 'Strict' or the
      'Default' profile, or a custom profile that complies with the organization's
      policies, legal and regulatory requirements. Default Value: Not Configured
      References: 1. “Threat Prevention Deployment Tech Note” -
      https://live.paloaltonetworks.com/docs/DOC-3094 2. “PAN-OS Administrator's
      Guide 11.1 (English) - Security Policies” -
      https://docs.paloaltonetworks.com/pan-os/11-1/pan-os-admin/policy/security-
