  - rule_id: palo_alto.cis.2.ip_addresses_are_mapped_to_usernames
    title: "Ensure that IP addresses are mapped to usernames"
    severity: medium
    category: networking
    tech_type: palo_alto
    automation_type: automated
    cis_benchmark: "CIS_PALO_ALTO 11_v1.1.0"
    cis_version: "11_v1.1.0"
    cis_control: "2.1"
    cis_section: "2"
    profile_applicability: "Level 2"
    description: >
      Configure appropriate settings to map IP addresses to usernames. Mapping
      userids to IP addresses is what permits the firewall to create rules based on
      userids and groups rather than IP addresses and subnets, as well as log events
      by userids rather than IP addresses or DNS names. The specifics of how to
      achieve IP-to-username mapping is highly dependent on the environment. It can
      be enabled by integrating the firewall with a domain controller, Exchange
      server, captive portal, Terminal Server, User-ID Agent, XML API, or syslog
      data from a variety of devices.
    rationale: >
      Understanding which user is involved in a security incident allows appropriate
      personnel to move quickly between the detection and reaction phases of
      incident response. In environments with either short DHCP lease times, or
      where users may move frequently between systems, the ability to analyze or
      report, or alert on events based on user accounts or user groups is a
      tremendous advantage. For forensics tasks when DHCP lease information may not
      be available, the Source User information may be the only way to tie together
      related data.
    audit_procedure: >
      To validate if this recommendation has been met, look at the Source User
      column in the URL Filtering or Traffic logs (Monitor > Logs > URL Filtering
      and Logs > Traffic Logs, respectively.) User traffic originating from a
      trusted zone should identify a username.
    remediation: >
      To Set User-ID Agents: Navigate to Device > User Identification > User-ID
      Agents Set the Name, IP Address and Port of the User-ID Agent` Enable User
      Identification for each monitored zone that will have user accounts: Navigate
      to Network > Zone, for each relevant zone enable User Identification To Set
      Terminal Services Agents: Navigate to Device > Terminal Services Agents Set
      the Name, IP Address and Port of the Terminal Services Agent Enable User
      Identification for each monitored zone that will have Terminal Servers:
      Navigate to Network > Zone, enable User Identification References: 1. “Best
      Practices for Securing User-ID Deployments” -
      https://live.paloaltonetworks.com/docs/DOC-7912 2. “How to Configure Group
      Mapping settings?” - https://live.paloaltonetworks.com/docs/DOC-4994 3.
      https://docs.paloaltonetworks.com/pan-os/11-1/pan-os-admin/user-id 4.
      https://paloaltonetworks.com/content/dam/paloaltonetworks-
      com/en_US/assets/pdf/tech-briefs/techbrief-user-id.pdf
    references: >
      1. “Best Practices for Securing User-ID Deployments” -
