  - rule_id: palo_alto.cis.3.a_fully_synchronized_high_availability_peer_is
    title: "Ensure a fully-synchronized High Availability peer is configured"
    severity: high
    category: networking
    tech_type: palo_alto
    automation_type: automated
    cis_benchmark: "CIS_PALO_ALTO 11_v1.1.0"
    cis_version: "11_v1.1.0"
    cis_control: "3.1"
    cis_section: "3"
    profile_applicability: "Level 1"
    description: >
      Ensure a High Availability peer is fully synchronized and in a passive or
      active state.
    rationale: >
      To ensure availability of both the firewall and the resources it protects, a
      High Availability peer is required. In the event a single firewall fails, or
      when maintenance such as a software update is required, the HA peer can be
      used to automatically fail over session states and maintain overall
      availability Impact: Not configuring High Availability (HA) correctly directly
      impacts the Availability of the system. With HA in place, standard maintenance
      such as OS updates, network and power cabling can be accomplished with no
      outage or a minimum impact.
    audit_procedure: >
      Navigate to Device > High Availability > HA Communications. In the HA
      Communications. >Data Link (HA2) section, verify that the correct interface is
      selected. Verify the desired protocol (IPv4 or IPv6) is selected. Verify the
      correct Transport is selected. Verify the Enable Session Synchronization box
      is checked.
    remediation: >
      Navigate to Device > High Availability > HA Communications. Click HA
      Communications. Click Data Link (HA2). Select the correct interface. Select
      the desired protocol (IPv4 or IPv6). Select the correct Transport. Set the
      Enable Session Synchronization box to be checked. Choose Save Configuration.
      Default Value: Not Configured References: 1. “PAN-OS Administrator's Guide
      11.1 (English) - High Availability' - https://docs.paloaltonetworks.com/pan-
      os/11-1/pan-os-web-interface- help/device/device-high-availability
    references: >
      1. “PAN-OS Administrator's Guide 11.1 (English) - High Availability' -
      https://docs.paloaltonetworks.com/pan-os/11-1/pan-os-web-interface-
      help/device/device-high-availability
    impact: >
      Not configuring High Availability (HA) correctly directly impacts the
