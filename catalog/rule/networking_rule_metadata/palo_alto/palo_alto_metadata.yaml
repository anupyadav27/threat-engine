  - rule_id: palo_alto.cis.1.v3_is_selected_for_snmp_polling
    title: "Ensure 'V3' is selected for SNMP polling"
    severity: high
    category: networking
    tech_type: palo_alto
    automation_type: automated
    cis_benchmark: "CIS_PALO_ALTO 11_v1.1.0"
    cis_version: "11_v1.1.0"
    cis_control: "1.5.1"
    cis_section: "1"
    profile_applicability: "Level 1"
    description: >
      For SNMP polling, only SNMPv3 should be used.
    rationale: >
      SNMPv3 utilizes AES-128 encryption, message integrity, user authorization, and
      device authentication security features. SNMPv2c does not provide these
      security features. If an SNMPv2c community string is intercepted or otherwise
      obtained, an attacker could gain read access to the firewall. Note that SNMP
      write access is not possible. Impact: Any clear-text administrative protocol
      (such as SNMPv2) can expose valuable information to any attacker that is in a
      position to eavesdrop on that protocol.
    audit_procedure: >
      Navigate to Device > Setup > Operations > Miscellaneous > SNMP Setup Verify V3
      is selected.
    remediation: >
      Navigate to Device > Setup > Operations > Miscellaneous > SNMP Setup Select
      V3. In order to be usable, the User and View sections of this dialog should
      also be completed. These settings need to match the settings in the
      organization's NMS (Network Management System) Default Value: Not configured
      References: 1. https://docs.paloaltonetworks.com/pan-os/11-1/pan-os-web-
      interface- help/device/device-setup-operations/enable-snmp-monitoring
    references: >
      1. https://docs.paloaltonetworks.com/pan-os/11-1/pan-os-web-interface-
      help/device/device-setup-operations/enable-snmp-monitoring
    impact: >
