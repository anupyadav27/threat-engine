  - rule_id: palo_alto.cis.5.forwarding_of_decrypted_content_to_wildfire_is
    title: "Ensure forwarding of decrypted content to WildFire is enabled"
    severity: high
    category: networking
    tech_type: palo_alto
    automation_type: automated
    cis_benchmark: "CIS_PALO_ALTO 11_v1.1.0"
    cis_version: "11_v1.1.0"
    cis_control: "5.3"
    cis_section: "5"
    profile_applicability: "Level 1"
    description: >
      Allow the firewall to forward decrypted content to WildFire. Note that SSL
      Forward- Proxy must also be enabled and configured for this setting to take
      effect on inside-to- outside traffic flows.
    rationale: >
      As encrypted Internet traffic continues to proliferate, WildFire becomes less
      effective unless it is allowed to act on decrypted content. For example, if a
      user downloads a malicious pdf over SSL, WildFire can only provide analysis if
      1) the session is decrypted by the firewall and 2) forwarding of decrypted
      content is enabled. In today's internet, roughly 70-80% of all user traffic is
      encrypted. If Wildfire is not configured to analyze encrypted content, the
      effectiveness of Wildfire is drastically reduced.
    audit_procedure: >
      Navigate to Device > Setup > Content-ID > Content-ID Settings. Verify that
      Allow forwarding of decrypted content is checked.
    remediation: >
      Navigate to Device > Setup > Content-ID > Content-ID Settings. Set Allow
      forwarding of decrypted content to be checked. Note that SSL Forward Proxy
      must be configured for this setting to be effective. Default Value: Not
      Configured References: 1. “WildFire Fails Forwarding File to Cloud for
      Encrypted Traffic” - https://live.paloaltonetworks.com/docs/DOC-6845 2.
      “Wildfire Administrator's Guide 9.0 (English) - Forward Decrypted SSL Traffic
      for Wildfire Analysis' -
      https://docs.paloaltonetworks.com/wildfire/9-0/wildfire- admin/submit-files-
      for-wildfire-analysis/forward-decrypted-ssl-traffic-for-wildfire-
      analysis.html# 3. “Wildfire Administrator's Guide 9.0 (English) - Wildfire
