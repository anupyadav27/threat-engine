  - rule_id: palo_alto.cis.1.permitted_ip_addresses_is_set_for_all_management
    title: "Ensure 'Permitted IP Addresses' is set for all management profiles where SSH, HTTPS, or SNMP is enabled"
    severity: high
    category: networking
    tech_type: palo_alto
    automation_type: automated
    cis_benchmark: "CIS_PALO_ALTO 11_v1.1.0"
    cis_version: "11_v1.1.0"
    cis_control: "1.2.2"
    cis_section: "1"
    profile_applicability: "Level 1"
    description: >
      For all management profiles, only the IP addresses required for device
      management should be specified.
    rationale: >
      If a Permitted IP Addresses list is either not specified or is too broad, an
      attacker may gain the ability to attempt management access from unintended
      locations, such as the Internet. The “Ensure 'Security Policy' denying any/all
      traffic exists at the bottom of the security policies ruleset” recommendation
      in this benchmark can provide additional protection by requiring a security
      policy specifically allowing device management access.
    audit_procedure: >
      Navigate to Network > Network Profiles > Interface Management. In each
      profile, for each of the target protocols (SNMP, HTTPS, SSH), verify that
      Permitted IP Addresses is limited to those necessary for device management.
    remediation: >
      Navigate to Network > Network Profiles > Interface Management. In each
      profile, for each of the target protocols (SNMP, HTTPS, SSH), set Permitted IP
      Addresses to only include those necessary for device management. If no profile
      exists, create one that has these options set. Default Value: Not enabled
      References: 1. 'How to Allow Certain IP Addresses on the Management Interface'
      - https://live.paloaltonetworks.com/docs/DOC-8432 2. “PAN-OS Administrator's
      Guide 9.0 (English) - Best Practices for Securing Administrative Access':
      https://docs.paloaltonetworks.com/pan-os/9-0/pan-os- admin/getting-
      started/best-practices-for-securing-administrative-access.html#
    references: >
      1. 'How to Allow Certain IP Addresses on the Management Interface' -
      https://live.paloaltonetworks.com/docs/DOC-8432 2. “PAN-OS Administrator's
      Guide 9.0 (English) - Best Practices for Securing Administrative Access':
      https://docs.paloaltonetworks.com/pan-os/9-0/pan-os- admin/getting-
      started/best-practices-for-securing-administrative-access.html#
    impact: >
      
    compliance_mappings:
