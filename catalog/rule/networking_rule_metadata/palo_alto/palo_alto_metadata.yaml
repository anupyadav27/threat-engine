  - rule_id: palo_alto.cis.1.login_banner_is_set
    title: "Ensure 'Login Banner' is set"
    severity: high
    category: networking
    tech_type: palo_alto
    automation_type: automated
    cis_benchmark: "CIS_PALO_ALTO 11_v1.1.0"
    cis_version: "11_v1.1.0"
    cis_control: "1.1.2"
    cis_section: "1"
    profile_applicability: "Level 1"
    description: >
      Configure a login banner, ideally approved by the organization’s legal team.
      This banner should, at minimum, prohibit unauthorized access, provide notice
      of logging or monitoring, and avoid using the word “welcome” or similar words
      of invitation.
    rationale: >
      Through a properly stated login banner, the risk of unintentional access to
      the device by unauthorized users is reduced. Should legal action take place
      against a person accessing the device without authorization, the login banner
      greatly diminishes a defendant’s claim of ignorance.
    audit_procedure: >
      Navigate to Device > Setup > Management > General Settings. Verify that Login
      Banner is set appropriately for your organization.
    remediation: >
      Navigate to Device > Setup > Management > General Settings. Set Login Banner
      as appropriate for your organization. Default Value: Not configured
      References: 1. “PAN-OS Administrator's Guide 11.1 (English) - Configuring
      Logon Banners” - https://docs.paloaltonetworks.com/pan-os/11-1/pan-os-
      admin/firewall- administration/use-the-web-interface/configure-banners-
      message-of-the-day- and-logos
    references: >
      1. “PAN-OS Administrator's Guide 11.1 (English) - Configuring Logon Banners” -
      https://docs.paloaltonetworks.com/pan-os/11-1/pan-os-admin/firewall-
      administration/use-the-web-interface/configure-banners-message-of-the-day-
      and-logos
    impact: >
      
    compliance_mappings:
