  - rule_id: palo_alto.cis.1.prevent_password_reuse_limit_is_set_to_24_or_more
    title: "Ensure 'Prevent Password Reuse Limit' is set to 24 or more passwords"
    severity: high
    category: networking
    tech_type: palo_alto
    automation_type: automated
    cis_benchmark: "CIS_PALO_ALTO 11_v1.1.0"
    cis_version: "11_v1.1.0"
    cis_control: "1.3.9"
    cis_section: "1"
    profile_applicability: "Level 1"
    description: >
      This determines the number of unique passwords that have to be most recently
      used for a user account before a previous password can be reused.
    rationale: >
      The longer a user uses the same password, the greater the chance that an
      attacker can determine the password through brute force attacks. Also, any
      accounts that may have been compromised will remain exploitable for as long as
      the password is left unchanged. If password changes are required but password
      reuse is not prevented, or if users continually reuse a small number of
      passwords, the effectiveness of a good password policy is greatly reduced.
      While current guidance emphasizes password length above frequent password
      changes, not enforcing password re-use guidance adds the temptation of using a
      small pool of passwords, which can make an attacker's job easier across an
      entire infrastructure.
    audit_procedure: >
      Navigate to Device > Setup > Management > Minimum Password Complexity. Verify
      Prevent Password Reuse Limit is greater than or equal to 24
    remediation: >
