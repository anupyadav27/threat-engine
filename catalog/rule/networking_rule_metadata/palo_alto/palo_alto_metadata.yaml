  - rule_id: palo_alto.cis.6.a_vulnerability_protection_profile_is_set_to
    title: "Ensure a Vulnerability Protection Profile is set to block attacks against critical and high vulnerabilities, and set to default on medium, low, and informational vulnerabilities"
    severity: high
    category: networking
    tech_type: palo_alto
    automation_type: automated
    cis_benchmark: "CIS_PALO_ALTO 11_v1.1.0"
    cis_version: "11_v1.1.0"
    cis_control: "6.6"
    cis_section: "6"
    profile_applicability: "Level 1"
    description: >
      Configure a Vulnerability Protection Profile set to block attacks against any
      critical or high vulnerabilities, at minimum, and set to default on any
      medium, low, or informational vulnerabilities. Configuring an alert action for
      low and informational, instead of default, will produce additional information
      at the expense of greater log utilization.
    rationale: >
      A Vulnerability Protection Profile helps to protect assets by alerting on, or
      blocking, network attacks. The default action for attacks against many
      critical and high vulnerabilities is to only alert on the attack - not to
      block. Impact: Not configuring a Vulnerability Protection Profile means that
      network attacks will not be logged, alerted on or blocked.
    audit_procedure: >
      Navigate to Objects > Security Profiles > Vulnerability Protection. Verify a
      Vulnerability Protection Profile is set to block attacks against any critical
      or high vulnerabilities (minimum), and set to default on attacks against any
      medium, low, or informational vulnerabilities.
    remediation: >
      Navigate to Objects > Security Profiles > Vulnerability Protection. Set a
      Vulnerability Protection Profile to block attacks against any critical or high
      vulnerabilities (minimum), and to default on attacks against any medium, low,
      or informational vulnerabilities. Default Value: Two Vulnerability Protection
      Profiles are configured by default - 'strict' and 'default'. References: 1.
      “Threat Prevention Deployment Tech Note” -
      https://live.paloaltonetworks.com/docs/DOC-3094 2. “PAN-OS Administrator's
      Guide 11.1 (English) - Security Profiles” -
      https://docs.paloaltonetworks.com/pan-os/11-1/pan-os-admin/policy/security-
      profiles
    references: >
      1. “Threat Prevention Deployment Tech Note” -
      https://live.paloaltonetworks.com/docs/DOC-3094 2. “PAN-OS Administrator's
      Guide 11.1 (English) - Security Profiles” -
      https://docs.paloaltonetworks.com/pan-os/11-1/pan-os-admin/policy/security-
      profiles
    impact: >
      Not configuring a Vulnerability Protection Profile means that network attacks
