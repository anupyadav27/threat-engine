  - rule_id: palo_alto.cis.6.a_secure_anti_spyware_profile_is_applied_to_all
    title: "Ensure a secure anti-spyware profile is applied to all security policies permitting traffic to the Internet"
    severity: high
    category: networking
    tech_type: palo_alto
    automation_type: automated
    cis_benchmark: "CIS_PALO_ALTO 11_v1.1.0"
    cis_version: "11_v1.1.0"
    cis_control: "6.5"
    cis_section: "6"
    profile_applicability: "Level 1"
    description: >
      Create one or more anti-spyware profiles and collectively apply them to all
      security policies permitting traffic to the Internet. The anti-spyware
      profiles may be applied to the security policies directly or through a profile
      group.
    rationale: >
      By applying secure anti-spyware profiles to all applicable traffic, the threat
      of sensitive data exfiltration or command-and-control traffic successfully
      passing through the firewall is greatly reduced. Anti-spyware profiles are not
      restricted to particular protocols like antivirus profiles, so anti-spyware
      profiles should be applied to all security policies permitting traffic to the
      Internet. Assigning an anti-spyware profile to each trusted zone will quickly
      and easily identify trusted hosts that have been infected with spyware, by
      identifying the infection from their outbound network traffic. In addition,
      that outbound network traffic will be blocked by the profile.
    audit_procedure: >
      Navigate to Objects > Security Profiles > Anti-Spyware. Also navigate to
      Policies > Security. Verify there are one or more anti-spyware profiles that
      collectively apply to all inside to outside traffic from any address to any
      address and any application and service.
    remediation: >
      Navigate to Objects > Security Profiles > Anti-Spyware. Also navigate to
      Policies > Security. Set one or more anti-spyware profiles to collectively
      apply to all inside to outside traffic from any address to any address and any
      application and service. Default Value: Not Configured References: 1. “Threat
      Prevention Deployment Tech Note” -
      https://live.paloaltonetworks.com/docs/DOC-3094 2. “PAN-OS Administrator's
      Guide 9.0 (English) - Security Profiles” -
      https://docs.paloaltonetworks.com/pan-os/11-1/pan-os-admin/policy/security-
      profiles
    references: >
      1. “Threat Prevention Deployment Tech Note” -
      https://live.paloaltonetworks.com/docs/DOC-3094 2. “PAN-OS Administrator's
      Guide 9.0 (English) - Security Profiles” -
      https://docs.paloaltonetworks.com/pan-os/11-1/pan-os-admin/policy/security-
      profiles
