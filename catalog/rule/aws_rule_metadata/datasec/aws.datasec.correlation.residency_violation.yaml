requirement: Residency Violation
description: Data residency violation — data transferred to non-compliant region or
  account.
rationale: Transferring data to an attacker-controlled cloud account bypasses traditional
  egress monitoring by using trusted cloud provider channels that appear legitimate.
remediation: '1. Block cross-account data replication/copy operations via SCPs / Azure
  Policy.

  2. Monitor for S3 replication rule changes or storage account copy operations.

  3. Alert on cross-tenant storage access and replication events.

  4. Apply data residency policies via Azure Policy / AWS Config.

  '
