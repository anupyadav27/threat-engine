rule_id: aws.acm-pca.certificateauthority.cloudwatch_audit_logging
service: acm-pca
resource: certificateauthority
requirement: ACM Private CA Audit Logging Configured
title: 'ACM-PCA certificateauthority: CloudWatch Audit Logging Enabled'
scope: acm-pca.certificateauthority.logging
domain: logging_monitoring_and_alerting
subcategory: audit_logging
posture_category: key_management
rationale: Audit logging for Private CAs records certificate issuance, revocation,
  and administrative operations. Without logging, unauthorized certificate issuance
  may go undetected, enabling man-in-the-middle attacks or impersonation within the
  internal PKI.
severity: high
assertion_id: key_management.acm_pca_certificateauthority_cloudwatch_audit_logging
source: default
description: Checks that ACM Private Certificate Authorities have CSR extensions configured,
  which indicates the CA has been fully set up with proper certificate profile configuration.
  CAs missing CSR extension configuration may not have comprehensive audit settings,
  reducing visibility into certificate operations. Full audit logging to S3 or CloudWatch
  is critical for detecting and investigating unauthorized certificate issuance.
references:
- https://docs.aws.amazon.com/privateca/latest/userguide/PcaAuditReport.html
- https://docs.aws.amazon.com/wellarchitected/latest/security-pillar/welcome.html
remediation: "Enable audit reporting for ACM Private CAs:\n\n1. Open the AWS Certificate\
  \ Manager console\n2. Select the Private CA\n3. Navigate to Actions > Create audit\
  \ report\n4. Configure the S3 bucket for audit log delivery\n5. Enable CloudTrail\
  \ for ACM PCA API calls:\n   - Open CloudTrail console\n   - Confirm data events\
  \ for ACM PCA are captured\n\nAWS CLI:\n  # Create audit report (S3 delivery)\n\
  \  aws acm-pca create-certificate-authority-audit-report \\\n    --certificate-authority-arn\
  \ <arn> \\\n    --s3-bucket-name <bucket> \\\n    --audit-report-response-format\
  \ JSON\n\n Best Practices:\n• Enable audit reports on a recurring schedule (daily/weekly)\n\
  • Protect the S3 audit bucket with object lock and versioning\n• Set up CloudWatch\
  \ Alarms for unexpected certificate issuance spikes\n• Review audit reports for\
  \ certificates issued outside of approved workflows"
