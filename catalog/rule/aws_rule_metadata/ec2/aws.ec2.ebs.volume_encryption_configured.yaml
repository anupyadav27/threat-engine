rule_id: aws.ec2.ebs.volume_encryption_configured
service: ec2
resource: ebs
requirement: Data Encryption
title: 'EC2 ebs: Volume Encryption Configured'
scope: ec2.ebs.encryption
domain: data_protection_and_privacy
subcategory: encryption
rationale: Ensures ec2 ebs has volume encryption configured properly configured for
  security compliance.
data_security:
  applicable: true
  modules:
  - data_protection_encryption
  categories:
  - encryption
  - sensitive_data_protection
  priority: high
  impact:
    gdpr: Article 32 - Encryption requirement for personal data
    pci: Requirement 3.4 - Render PAN unreadable via encryption
    hipaa: §164.312(a)(2)(iv) - Encryption of ePHI at rest
  sensitive_data_context: "Encryption is mandatory for all resources containing:\n\
    \    - PII (personally identifiable information)\n    - PCI data (credit card\
    \ information)\n    - PHI (protected health information)\n    - Financial records"
severity: high
assertion_id: data_protection.encryption_rest.ec2_ebs_volume_encryption_configured
source: default
description: Validates that Amazon EC2 ebs has encryption enabled to protect data
  confidentiality. Encryption is a fundamental security control required by most compliance
  frameworks including PCI-DSS, HIPAA, and GDPR to prevent unauthorized data access.
references:
- https://docs.aws.amazon.com/AWSEC2/latest/UserGuide/EBSEncryption.html
- https://docs.aws.amazon.com/AWSEC2/latest/UserGuide/ec2-security.html
- https://docs.aws.amazon.com/securityhub/latest/userguide/ec2-controls.html
remediation: "Enable encryption for ec2 ebs:\n\n1. Open EC2 console\n2. Select the\
  \ ebs\n3. Navigate to Properties/Configuration > Encryption\n4. Enable encryption\n\
  5. Choose encryption key:\n   - AWS managed key (default)\n   - Customer managed\
  \ key (KMS) for enhanced control\n6. Save changes\n\nAWS CLI:\naws ec2 modify-ebs\
  \ --ebs-id <id> --encrypted --kms-key-id <key-id>\n\nSecurity Best Practices:\n\
  • Use customer-managed KMS keys for sensitive data\n• Enable automatic key rotation\n\
  • Implement proper key access policies\n• Audit key usage regularly"
