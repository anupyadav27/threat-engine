assertion_id: logging_monitoring.logging.cloudtrail_logs_s3_bucket_access_logging_enabled
source: default
description: Verifies that AWS CloudTrail logs has access logging enabled to record
  all access requests with caller identity, timestamp, and response codes. Access
  logs are critical for security auditing, compliance reporting, and investigating
  unauthorized access attempts.
references:
- https://docs.aws.amazon.com/awscloudtrail/latest/userguide/best-practices-security.html
- https://docs.aws.amazon.com/securityhub/latest/userguide/cloudtrail-controls.html
- https://docs.aws.amazon.com/wellarchitected/latest/security-pillar/welcome.html
remediation: "Enable logging for cloudtrail logs:\n\n1. Open CLOUDTRAIL console\n\
  2. Select the logs\n3. Go to Logging/Monitoring settings\n4. Enable logging\n5.\
  \ Configure log destination:\n   - CloudWatch Logs\n   - S3 bucket (for long-term\
  \ retention)\n6. Set log level (INFO, DEBUG, ERROR)\n7. Save changes\n\nAWS CLI:\n\
  aws cloudtrail update-logs-logging --logs-id <id> --logging-enabled\n\nBest Practices:\n\
  • Enable all security-relevant log types\n• Send logs to centralized logging service\n\
  • Set appropriate retention periods\n• Configure log encryption\n• Set up log monitoring\
  \ and alerting"
