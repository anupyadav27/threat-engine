rule_id: aws.cloudtrail.logs.s3_bucket_access_logging_enabled
service: cloudtrail
resource: logs
requirement: Access Logging
title: 'CLOUDTRAIL logs: S3 Bucket Access Logging Enabled'
scope: cloudtrail.logs.logging
domain: logging_monitoring_and_alerting
subcategory: audit_logging
rationale: Ensures cloudtrail logs has s3 bucket access logging enabled properly configured
  for security compliance.
data_security:
