rule_id: aws.inspector2.organization.scanning_enabled
service: inspector2
resource: organization
requirement: Inspector V2 Organization Scanning Enabled
title: 'INSPECTOR2 organization: Organization Scanning Enabled'
scope: inspector2.organization.configuration
domain: compliance_and_governance
subcategory: governance
posture_category: configuration
rationale: Ensures AWS Inspector V2 organization-level scanning is enabled so that
  all member accounts are automatically enrolled for vulnerability assessments.
severity: medium
assertion_id: configuration.inspector2_organization_scanning_enabled
source: default
description: Verifies that AWS Inspector V2 organization scanning is enabled and not
  disabled by the organization. Inspector V2 provides automated vulnerability management
  for EC2 instances and container images. Without organization-level scanning enabled,
  accounts may not be enrolled, leaving workloads unscanned for known CVEs and configuration
  weaknesses.
references:
- https://docs.aws.amazon.com/inspector/latest/user/getting_started_tutorial.html
- https://docs.aws.amazon.com/wellarchitected/latest/security-pillar/welcome.html
remediation: "Enable Inspector V2 organization scanning:\n\n1. Open the AWS Inspector\
  \ V2 console\n2. Navigate to Account Management > Organization Settings\n3. Ensure\
  \ EC2 scanning status is not DISABLED_BY_ORGANIZATION\n4. Enable Auto-enable for\
  \ new member accounts\n5. Delegate an Inspector V2 administrator account if required\n\
  \n AWS CLI:\n  aws inspector2 enable --resource-types EC2 ECR\n  aws inspector2\
  \ update-organization-configuration --auto-enable ec2=true,ecr=true\n\nBest Practices:\n\
  • Enable both EC2 and ECR scanning at the organization level\n• Review Inspector\
  \ findings regularly in Security Hub\n• Set up SNS notifications for critical findings"
