rule_id: aws.inspector2.coverage.ecr_scanning_enabled
service: inspector2
resource: coverage
requirement: Inspector V2 ECR Container Image Scanning Active
title: 'INSPECTOR2 coverage: ECR Scanning Enabled'
scope: inspector2.coverage.scanning
domain: threat_detection_and_incident_response
subcategory: threat_detection
posture_category: configuration
rationale: Ensures that resources covered by Inspector V2 have an ACTIVE scan status,
  confirming that container images and EC2 instances are being continuously assessed
  for vulnerabilities.
severity: medium
assertion_id: configuration.inspector2_coverage_ecr_scanning_enabled
source: default
description: Verifies that resources under AWS Inspector V2 coverage have a scan status
  of ACTIVE. Resources with non-ACTIVE scan status (e.g. INACTIVE_UNSUPPORTED_RUNTIME,
  INACTIVE_AGENT_UNINSTALLED) are not being scanned, leaving potential vulnerabilities
  undetected in container images or EC2 workloads.
references:
- https://docs.aws.amazon.com/inspector/latest/user/scanning-ecr.html
- https://docs.aws.amazon.com/wellarchitected/latest/security-pillar/welcome.html
remediation: "Ensure all covered resources have ACTIVE Inspector V2 scan status:\n\
  \n 1. Open the AWS Inspector V2 console\n2. Navigate to Coverage\n3. Filter for\
  \ resources with non-ACTIVE scan status\n4. For EC2 instances: verify the SSM agent\
  \ is installed and the instance is managed\n5. For ECR repositories: ensure Enhanced\
  \ scanning is enabled on the repository\n6. For Lambda: enable Lambda scanning in\
  \ Inspector settings\n\n AWS CLI:\n  aws inspector2 list-coverage \\\n    --filter-criteria\
  \ '{\"scanStatusCode\":[{\"comparison\":\"NOT_EQUALS\",\"value\":\"ACTIVE\"}]}'\n\
  \n Best Practices:\n• Automate remediation via EventBridge rules on coverage status\
  \ changes\n• Review coverage report weekly\n• Tag resources to ensure they are enrolled\
  \ in scanning"
