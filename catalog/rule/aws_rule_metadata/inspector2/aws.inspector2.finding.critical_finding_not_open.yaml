rule_id: aws.inspector2.finding.critical_finding_not_open
service: inspector2
resource: finding
requirement: No Active Critical Inspector Findings
title: 'INSPECTOR2 finding: Critical Finding Not Open'
scope: inspector2.finding.vulnerability
domain: threat_detection_and_incident_response
subcategory: threat_detection
posture_category: configuration
rationale: Active critical-severity Inspector V2 findings represent unmitigated vulnerabilities
  that can be exploited to compromise systems. These must be remediated or suppressed
  promptly.
severity: critical
assertion_id: configuration.inspector2_finding_critical_not_open
source: default
description: Checks that no Inspector V2 findings with CRITICAL severity remain in
  an ACTIVE (open) state. Critical findings indicate severe vulnerabilities — such
  as remotely exploitable CVEs or publicly known exploits — that pose immediate risk
  to workload security. Unaddressed critical findings violate security baselines and
  compliance frameworks including PCI-DSS and NIST.
references:
- https://docs.aws.amazon.com/inspector/latest/user/findings-understanding.html
- https://docs.aws.amazon.com/wellarchitected/latest/security-pillar/welcome.html
remediation: "Remediate or suppress active critical Inspector V2 findings:\n\n1. Open\
  \ the AWS Inspector V2 console\n2. Filter findings by Severity=CRITICAL and Status=ACTIVE\n\
  \ 3. For each finding:\n   a. Review the affected resource and vulnerability details\n\
  \   b. Apply the recommended patch or configuration fix\n   c. If false positive,\
  \ create a suppression rule with justification\n4. Re-scan the resource after patching\
  \ to confirm resolution\n\nAWS CLI:\n  aws inspector2 list-findings \\\n    --filter-criteria\
  \ '{ \"findingStatus\":[{\"comparison\":\"EQUALS\",\"value\":\"ACTIVE\"}],\n   \
  \    \"severity\":[{\"comparison\":\"EQUALS\",\"value\":\"CRITICAL\"}] }'\n\nBest\
  \ Practices:\n• Establish SLA for critical findings (e.g. remediate within 7 days)\n\
  • Integrate Inspector findings into your ticketing/ITSM system\n• Enable Security\
  \ Hub aggregation for central visibility"
