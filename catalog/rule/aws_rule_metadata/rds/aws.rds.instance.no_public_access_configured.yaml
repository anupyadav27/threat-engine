rule_id: aws.rds.instance.no_public_access_configured
service: rds
resource: instance
requirement: Public Access Restriction
title: 'RDS instance: No Public Access Configured'
scope: rds.instance.network
domain: storage_and_database_security
subcategory: data_security
rationale: Ensures rds instance has no public access configured properly configured
  for security compliance.
data_security:
  applicable: true
  modules:
  - data_access_governance
  - data_compliance
  categories:
  - access_control
  - public_access_prevention
  priority: high
  impact:
    gdpr: Article 25 - Data protection by design and by default
    pci: Requirement 7 - Restrict access to cardholder data
    hipaa: §164.312(a)(1) - Access control
  sensitive_data_context: "Public access to data storage resources must be restricted\
    \ to prevent:\n    - Unauthorized data access\n    - Data breaches\n    - Compliance\
    \ violations (GDPR, PCI, HIPAA)"
severity: high
assertion_id: network_security.network_access.rds_instance_no_public_access_configured
source: default
description: Verifies that Amazon RDS instance blocks public internet access to prevent
  unauthorized exposure. Publicly accessible resources significantly increase attack
  surface, enabling reconnaissance, brute force attacks, and potential data breaches
  from external threat actors.
references:
- https://docs.aws.amazon.com/AmazonRDS/latest/UserGuide/CHAP_BestPractices.Security.html
- https://docs.aws.amazon.com/securityhub/latest/userguide/rds-controls.html
- https://docs.aws.amazon.com/wellarchitected/latest/security-pillar/welcome.html
remediation: "Restrict public access for rds instance:\n\n1. Open RDS console\n2.\
  \ Select the instance\n3. Go to Permissions/Access Control\n4. Review current permissions:\n\
  \   - Remove public access grants\n   - Remove wildcard (*) principals\n   - Implement\
  \ least privilege\n5. Update resource policy or IAM policies\n6. Enable resource-level\
  \ access control\n7. Save changes\n\nSecurity Recommendations:\n• Use IAM roles\
  \ instead of access keys\n• Implement condition keys for additional security\n•\
  \ Enable MFA for sensitive operations\n• Regularly audit access permissions\n• Use\
  \ AWS Organizations SCPs for guardrails"
