description: Ensures Amazon VPC vpc has VPC flow logs enabled to capture network traffic
  metadata. Flow logs are essential for security monitoring, troubleshooting connectivity
  issues, and detecting suspicious network patterns or potential data exfiltration
  attempts.
references:
- https://docs.aws.amazon.com/vpc/latest/userguide/vpc-security-best-practices.html
- https://docs.aws.amazon.com/securityhub/latest/userguide/vpc-controls.html
- https://docs.aws.amazon.com/wellarchitected/latest/security-pillar/welcome.html
remediation: "Enable logging for vpc vpc:\n\n1. Open VPC console\n2. Select the vpc\n\
  3. Go to Logging/Monitoring settings\n4. Enable logging\n5. Configure log destination:\n\
  \   - CloudWatch Logs\n   - S3 bucket (for long-term retention)\n6. Set log level\
  \ (INFO, DEBUG, ERROR)\n7. Save changes\n\nAWS CLI:\naws vpc update-vpc-logging\
  \ --vpc-id <id> --logging-enabled\n\nBest Practices:\n• Enable all security-relevant\
  \ log types\n• Send logs to centralized logging service\n• Set appropriate retention\
  \ periods\n• Configure log encryption\n• Set up log monitoring and alerting"
