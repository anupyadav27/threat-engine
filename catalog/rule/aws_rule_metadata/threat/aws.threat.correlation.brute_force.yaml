rationale: Password guessing attacks can compromise accounts with weak passwords;
  detection enables account lockout before successful compromise occurs.
remediation: '1. Enforce account lockout policies after consecutive failed attempts.

  2. Require strong password complexity and minimum length.

  3. Enable MFA to prevent successful login even if password is guessed.

  4. Block sign-ins from high-risk IP ranges using Conditional Access policies.

  '
