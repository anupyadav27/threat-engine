rationale: 'Adversaries create snapshots or data backups within cloud accounts to
  evade defenses and stage data for exfiltration. Snapshots can be shared with attacker-controlled
  accounts, mounted to attacker instances to bypass access restrictions on the original
  volume. Detected via: snapshot creation by unexpected or newly provisioned IAM users,
  rapid snapshot-create → cross-account share sequences, and snapshots from sensitive
  volumes without change-control approval.'
remediation: '1. Enforce golden image policies requiring only approved base images.

  2. Restrict CreateImage / image write permissions to CI/CD pipeline roles.

  3. Enable CSPM image scanning via Defender for Servers / Amazon Inspector.

