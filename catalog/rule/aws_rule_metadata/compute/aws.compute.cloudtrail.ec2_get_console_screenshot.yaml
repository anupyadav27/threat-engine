requirement: Ec2 Get Console Screenshot
description: EC2 console screenshot captured — may expose credentials or sensitive
  data displayed on screen.
rationale: Cloud instance metadata endpoints provide temporary credentials; accessing
  them from an SSRF vulnerability or compromised workload yields credentials to the
  cloud account.
remediation: '1. Enforce IMDSv2 (AWS) / restrict IMDS access (Azure) to prevent credential
  theft.

  2. Alert on metadata service calls from unexpected sources.

  3. Apply network-level restrictions to limit IMDS reachability.

  4. Investigate the source of any metadata endpoint request.

  '
