severity: high
assertion_id: data_protection.encryption_rest.s3_bucket_default_encryption_configured
source: default
description: Validates that Amazon S3 bucket has encryption enabled to protect data
  confidentiality. Encryption is a fundamental security control required by most compliance
  frameworks including PCI-DSS, HIPAA, and GDPR to prevent unauthorized data access.
references:
- https://docs.aws.amazon.com/AmazonS3/latest/userguide/bucket-encryption.html
