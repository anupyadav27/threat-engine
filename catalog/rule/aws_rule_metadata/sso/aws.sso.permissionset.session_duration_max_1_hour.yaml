rule_id: aws.sso.permissionset.session_duration_max_1_hour
service: sso
resource: permissionset
requirement: SSO Permission Set Session Duration Maximum 1 Hour
title: 'SSO permissionset: Session Duration Max 1 Hour'
scope: sso.permissionset.session
domain: identity_and_access_management
subcategory: access_control
posture_category: access_control
rationale: Long-lived SSO sessions increase the window of opportunity for session
  hijacking or unauthorized use of temporary credentials. Limiting session duration
  reduces blast radius from compromised sessions.
severity: medium
assertion_id: iam.access_control.sso_permissionset_session_duration_max_1_hour
source: default
description: Checks that AWS IAM Identity Center (SSO) permission sets do not grant
  session durations exceeding 1 hour (PT1H). Excessive session durations extend the
  validity of assumed role credentials, which — if leaked or hijacked — can be exploited
  for a prolonged period before expiry. Aligns with the principle of least privilege
  and CIS AWS Benchmark recommendations.
references:
- https://docs.aws.amazon.com/singlesignon/latest/userguide/permissionsetsconcept.html
- https://docs.aws.amazon.com/wellarchitected/latest/security-pillar/welcome.html
remediation: "Reduce SSO permission set session duration to 1 hour or less:\n\n1.\
  \ Open the AWS IAM Identity Center console\n2. Navigate to Permission Sets\n3. For\
  \ each permission set with SessionDuration > PT1H:\n   a. Click Edit\n   b. Set\
  \ Session duration to 1 hour (PT1H) or less\n   c. Save changes\n4. Re-provision\
  \ affected accounts to apply changes\n\nAWS CLI:\n  aws sso-admin update-permission-set\
  \ \\\n    --instance-arn <instance-arn> \\\n    --permission-set-arn <arn> \\\n\
  \    --session-duration PT1H\n\nBest Practices:\n• Use short sessions (15-60 min)\
  \ for high-privilege permission sets\n• Require re-authentication through MFA for\
  \ sensitive operations\n• Review and audit all permission sets quarterly"
