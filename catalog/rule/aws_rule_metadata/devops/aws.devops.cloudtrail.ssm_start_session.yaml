rationale: Cloud service lateral movement via VPC peering, service-to-service calls,
  or shared credentials enables attackers to pivot between cloud accounts and regions.
remediation: '1. Review all VPC/VNet peering connections and remove unauthorized peerings.

  2. Apply network ACLs to restrict cross-VPC traffic to required flows only.

  3. Use AWS Transit Gateway / Azure Virtual WAN with strict routing policies.

  4. Enable VPC Flow Logs / NSG Flow Logs to detect lateral movement patterns.

  '
