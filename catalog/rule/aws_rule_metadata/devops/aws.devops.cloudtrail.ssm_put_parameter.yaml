rule_type: ciem
title: 'DevOps: SSM Put Parameter'
scope: devops.cloudtrail
domain: logging_monitoring_and_alerting
subcategory: audit_logging
severity: high
service: devops
resource: cloudtrail
requirement: Ssm Put Parameter
description: SSM Parameter Store parameter created or updated — may store credentials
  or malicious config.
rationale: 'Adversaries search local file systems, remote file shares, and cloud storage
  for files containing insecurely stored credentials — including config files, source
  code, .env files, and shell history. Cloud-specific targets include ~/.aws/credentials,
  terraform.tfstate (containing plaintext secrets), and container environment variable
  dumps. Detected via: file read access to .env/.xml/.ps1/config files, grep commands
  targeting credential patterns, and container process access to mounted secret paths.'
remediation: '1. Rotate all credentials that may have been exposed.

  2. Use AWS Secrets Manager / Azure Key Vault for all credential storage.

  3. Scan repositories and container images for embedded credentials.

  4. Implement DLP policies to prevent credential file exfiltration.

  '
