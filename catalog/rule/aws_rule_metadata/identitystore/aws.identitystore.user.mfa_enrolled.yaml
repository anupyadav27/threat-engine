rule_id: aws.identitystore.user.mfa_enrolled
service: identitystore
resource: user
requirement: Identity Store User Exists and Is Active
title: 'IDENTITYSTORE user: MFA Enrolled'
scope: identitystore.user.mfa
domain: identity_and_access_management
subcategory: access_control
posture_category: access_control
rationale: Users in AWS Identity Store without MFA enrollment are susceptible to account
  takeover via credential phishing or brute-force attacks. All users should have MFA
  configured before accessing cloud resources through IAM Identity Center.
severity: medium
assertion_id: iam.access_control.identitystore_user_mfa_enrolled
source: default
description: Checks that all users in the AWS Identity Store have a valid user record
  (UserName exists), confirming they are active directory members. This rule validates
  user presence as a prerequisite check — MFA enrollment status should be verified
  through IAM Identity Center MFA settings. Users not enrolled in MFA are at higher
  risk of unauthorized access via compromised passwords.
references:
- https://docs.aws.amazon.com/singlesignon/latest/userguide/enable-mfa.html
- https://docs.aws.amazon.com/wellarchitected/latest/security-pillar/welcome.html
remediation: "Enroll all Identity Store users in MFA:\n\n1. Open the AWS IAM Identity\
  \ Center console\n2. Navigate to Settings > Authentication\n3. Enable MFA for the\
  \ organization (Require MFA)\n4. Notify users to register their MFA devices:\n \
  \  - TOTP authenticator apps (Google Authenticator, Authy)\n   - FIDO2/WebAuthn\
  \ security keys\n5. Set MFA enforcement to Required for all users\n6. Remove users\
  \ who have not enrolled within the grace period\n\nBest Practices:\n• Enforce phishing-resistant\
  \ MFA (FIDO2) for privileged users\n• Disable SMS-based MFA in favour of TOTP or\
  \ hardware keys\n• Review inactive users and disable/remove stale accounts\n• Set\
  \ up quarterly access reviews for all identity store users"
