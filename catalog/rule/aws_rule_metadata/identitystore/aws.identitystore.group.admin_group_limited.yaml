rule_id: aws.identitystore.group.admin_group_limited
service: identitystore
resource: group
requirement: Identity Store Admin Group Membership Limited
title: 'IDENTITYSTORE group: Admin Group Limited'
scope: identitystore.group.membership
domain: configuration_and_change_management
subcategory: configuration
posture_category: access_control
rationale: Groups with administrative naming conventions in the Identity Store may
  be mapped to high-privilege permission sets. Tracking their existence ensures they
  are reviewed regularly and membership is restricted to authorized personnel.
severity: medium
assertion_id: iam.access_control.identitystore_group_admin_group_limited
source: default
description: Checks that Identity Store groups are present and properly named, flagging
  groups whose DisplayName contains administrative keywords (e.g. admin, administrator,
  superuser). Such groups are frequently mapped to high-privilege IAM Identity Center
  permission sets and require strict membership controls and regular access reviews
  to prevent excessive privilege accumulation.
references:
- https://docs.aws.amazon.com/singlesignon/latest/userguide/manage-your-identity-source-idstore.html
- https://docs.aws.amazon.com/wellarchitected/latest/security-pillar/welcome.html
remediation: "Restrict and review admin groups in Identity Store:\n\n1. Open the AWS\
  \ IAM Identity Center console\n2. Navigate to Groups\n3. Identify groups with 'admin',\
  \ 'administrator', or 'superuser' in their name\n4. Review group membership:\n \
  \  a. Remove users who no longer require admin access\n   b. Ensure all remaining\
  \ members are approved and documented\n5. Review permission set assignments for\
  \ these groups\n 6. Implement a formal access review process (quarterly minimum)\n\
  \nBest Practices:\n• Follow least privilege — assign admin groups only to users\
  \ who need it\n• Prefer time-limited access via break-glass procedures for emergencies\n\
  • Audit group membership changes via CloudTrail (CreateGroupMembership events)\n\
  • Separate read-only and read-write admin groups"
