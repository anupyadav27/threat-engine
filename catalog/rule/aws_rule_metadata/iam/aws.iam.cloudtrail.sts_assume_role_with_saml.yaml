title: 'IAM: STS Assume Role With SAML'
scope: iam.cloudtrail
domain: logging_monitoring_and_alerting
subcategory: audit_logging
severity: high
service: iam
resource: cloudtrail
requirement: Sts Assume Role With Saml
description: Role assumed via SAML federation — forged or legitimate SAML token used
  to gain AWS access.
rationale: Forging SAML tokens (Golden SAML attack) enables long-term, tenant-wide
  authentication as any user including administrators, without triggering MFA or password
  checks.
remediation: '1. Rotate all SAML signing certificates immediately.

  2. Enable sign-in risk detection and Conditional Access for suspicious tokens.

  3. Monitor for unusual service usage patterns from federated accounts.

  4. Consider migrating to OIDC/OAuth2 from SAML where possible.

  '
