resource: cloudtrail
requirement: Sts Assume Role With Web Identity
description: Role assumed via web identity (OIDC) — application access token used
  to access AWS resources.
rationale: OAuth token abuse allows attackers to access cloud resources as the token
  owner for extended periods without needing credentials, until token expiry.
remediation: '1. Revoke the compromised application token immediately.

  2. Audit all OAuth consent grants and remove unauthorized application registrations.

  3. Enable Microsoft Entra ID risky sign-in detection.

  4. Reduce token lifetimes for high-privilege applications.

  '
