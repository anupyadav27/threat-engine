rule_id: aws.apigateway.resource.restapi_logging_enabled
service: apigateway
resource: resource
requirement: Activity Logging
title: 'APIGATEWAY resource: Restapi Logging Enabled'
scope: apigateway.resource.logging
domain: application_and_api_security
subcategory: api_security
rationale: Ensures apigateway resource has restapi logging enabled properly configured
  for security compliance.
data_security:
  applicable: true
  modules:
  - data_activity_monitoring
  - data_protection_encryption
  categories:
  - sensitive_data_protection
  - audit_logging
  priority: medium
  impact:
    gdpr: Article 30 - Records of processing activities
    pci: Requirement 10 - Track and monitor all access
    hipaa: §164.312(b) - Audit controls
  sensitive_data_context: "Encryption is mandatory for all resources containing:\n\
    \    - PII (personally identifiable information)\n    - PCI data (credit card\
    \ information)\n    - PHI (protected health information)\n    - Financial records"
severity: medium
assertion_id: logging_monitoring.logging.apigateway_resource_restapi_logging_enabled
source: default
description: Checks that Amazon API Gateway resource has comprehensive audit logging
  enabled to capture API calls, configuration changes, and administrative actions.
  Logging is essential for security monitoring, incident investigation, compliance
  auditing, and establishing accountability through non-repudiation.
references:
- https://docs.aws.amazon.com/apigateway/latest/developerguide/best-practices.html
- https://docs.aws.amazon.com/securityhub/latest/userguide/apigateway-controls.html
- https://docs.aws.amazon.com/wellarchitected/latest/security-pillar/welcome.html
remediation: "Enable logging for apigateway resource:\n\n1. Open APIGATEWAY console\n\
  2. Select the resource\n3. Go to Logging/Monitoring settings\n4. Enable logging\n\
  5. Configure log destination:\n   - CloudWatch Logs\n   - S3 bucket (for long-term\
  \ retention)\n6. Set log level (INFO, DEBUG, ERROR)\n7. Save changes\n\nAWS CLI:\n\
  aws apigateway update-resource-logging --resource-id <id> --logging-enabled\n\n\
  Best Practices:\n• Enable all security-relevant log types\n• Send logs to centralized\
  \ logging service\n• Set appropriate retention periods\n• Configure log encryption\n\
  • Set up log monitoring and alerting"
