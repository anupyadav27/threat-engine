requirement: Rds Create Db Snapshot
description: RDS database snapshot created — point-in-time copy of database made.
rationale: 'Adversaries access data from cloud object storage (S3, Azure Blob, GCS)
  which may be misconfigured with overly permissive policies exposing PII, medical
  records, financial data, or credentials. Bulk download followed by external transfer
  indicates active data theft. Detected via: unusual object access patterns from new
  IAM users or roles, OAuth token grants to external apps preceding high-volume downloads,
  and GetObject events from anomalous IPs or user agents.'
remediation: '1. Enable server-side access logging for all storage buckets and containers.

  2. Alert on high-volume GetObject/BlobRead operations by single principals.

  3. Apply bucket policies to restrict GetObject to authorized principals only.

  4. Enable Macie / Defender for Storage for sensitive data detection and alerting.

  '
