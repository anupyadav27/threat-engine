rule_id: aws.redshift.cluster.audit_logging_configured
service: redshift
resource: cluster
requirement: Audit Logging
title: 'REDSHIFT cluster: Audit Logging Configured'
scope: redshift.cluster.logging
domain: configuration_and_change_management
subcategory: configuration
rationale: Ensures redshift cluster has audit logging configured properly configured
  for security compliance.
data_security:
  applicable: true
  modules:
  - data_activity_monitoring
  - data_protection_encryption
  categories:
  - sensitive_data_protection
  - audit_logging
  priority: medium
  impact:
    gdpr: Article 30 - Records of processing activities
    pci: Requirement 10 - Track and monitor all access
    hipaa: §164.312(b) - Audit controls
  sensitive_data_context: "Encryption is mandatory for all resources containing:\n\
    \    - PII (personally identifiable information)\n    - PCI data (credit card\
    \ information)\n    - PHI (protected health information)\n    - Financial records"
severity: medium
assertion_id: logging_monitoring.logging.redshift_cluster_audit_logging_configured
source: default
description: Checks that Amazon Redshift cluster has comprehensive audit logging enabled
  to capture API calls, configuration changes, and administrative actions. Logging
  is essential for security monitoring, incident investigation, compliance auditing,
  and establishing accountability through non-repudiation.
references:
- https://docs.aws.amazon.com/wellarchitected/latest/security-pillar/welcome.html
remediation: "Enable logging for redshift cluster:\n\n1. Open REDSHIFT console\n2.\
  \ Select the cluster\n3. Go to Logging/Monitoring settings\n4. Enable logging\n\
  5. Configure log destination:\n   - CloudWatch Logs\n   - S3 bucket (for long-term\
  \ retention)\n6. Set log level (INFO, DEBUG, ERROR)\n7. Save changes\n\nAWS CLI:\n\
  aws redshift update-cluster-logging --cluster-id <id> --logging-enabled\n\nBest\
  \ Practices:\n• Enable all security-relevant log types\n• Send logs to centralized\
  \ logging service\n• Set appropriate retention periods\n• Configure log encryption\n\
  • Set up log monitoring and alerting"
