  - rule_id: tciem.snowflake.the_require_storage_integration_for_stage_creatio
    title: "Ensure that the REQUIRE_STORAGE_INTEGRATION_FOR_STAGE_CREATIO N account parameter is set to true"
    severity: high
    mitre_technique: T1078
    mitre_tactic: initial_access
    cis_control: '4.5'
    cis_section: '4'
    log_source: "SNOWFLAKE.ACCOUNT_USAGE.ACCESS_HISTORY"
    detection:
      event_type: resource_access
      filters:
        account_type: human
      evidence_fields: [source_ip, username, timestamp, action]
    response: alert
    remediation: >
      Programmatically: In a Snowsight worksheet or from the SNOWSQL cli, run the
      following command to set the parameter value to true: ALTER ACCOUNT SET
      REQUIRE_STORAGE_INTEGRATION_FOR_STAGE_CREATION=true; Note: To avoid disruption
      of existing workflow relying on creation of external stages not referencing a
      storage integration, all such workflows should be identified and migrated to
      creation of external stages referencing storage integrations. Default Value:
      By default, the REQUIRE_STORAGE_INTEGRATION_FOR_STAGE_CREATION account level
      parameters is set to false. References: 1. https://docs.snowflake.com/en/sql-
      reference/parameters#require-storage- integration-for-stage-creation 2.
      https://www.snowflake.com/blog/how-to-configure-a-snowflake-account-to-
      prevent-data-exfiltration/

