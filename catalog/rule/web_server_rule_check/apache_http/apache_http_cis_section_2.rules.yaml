tech_type: apache_http
category: web_server
cis_benchmark: CIS Apache HTTP Server 2.4 v2.2.0
cis_section: '2'

rules:

  - rule_id: apache_http.cis.2.log_config_module_is_enabled
    title: "Ensure the Log Config Module Is Enabled"
    severity: high
    automation_type: automated
    cis_control: '2.2'
    cis_section: '2'
    profile_applicability: "Level 1"
    scope: apache_http.section_2.log_config_module_is_enabled
    assertion:
      field: enabled
      operator: equals
      expected: "true"
    remediation: >
      Perform either one of the following: • For source builds with static modules,
      run the Apache ./configure script without including the --disable-log-config
      script options. $ cd $DOWNLOAD_HTTPD $ ./configure • For dynamically loaded
      modules, add or modify the LoadModule directive so that it is present in the
      apache configuration as below and not commented out: LoadModule
      log_config_module modules/mod_log_config.so Default Value: The log_config
      module is loaded by default. References: 1.
      https://httpd.apache.org/docs/2.4/mod/mod_log_config.html
    compliance:
      - cis_apache_http_2_4_v2_2_0_2_2

  - rule_id: apache_http.cis.2.webdav_modules_are_disabled
    title: "Ensure the WebDAV Modules Are Disabled"
    severity: high
    automation_type: automated
    cis_control: '2.3'
    cis_section: '2'
    profile_applicability: "Level 1"
    scope: apache_http.section_2.webdav_modules_are_disabled
    assertion:
      field: enabled
      operator: equals
      expected: "false"
    remediation: >
      Perform either one of the following to disable WebDAV module: 1. For source
      builds with static modules run the Apache ./configure script without including
      the mod_dav, and mod_dav_fs in the --enable-modules=configure script options.
      $ cd $DOWNLOAD_HTTPD $ ./configure 2. For dynamically loaded modules comment
      out or remove the LoadModule directive for mod_dav, and mod_dav_fs modules
      from the httpd.conf file. ##LoadModule dav_module modules/mod_dav.so
      ##LoadModule dav_fs_module modules/mod_dav_fs.so Default Value: The WebDav
      modules are not enabled with a default source build. References: 1.
      https://httpd.apache.org/docs/2.4/mod/mod_dav.html
    compliance:
      - cis_apache_http_2_4_v2_2_0_2_3

  - rule_id: apache_http.cis.2.status_module_is_disabled
    title: "Ensure the Status Module Is Disabled"
    severity: high
    automation_type: automated
    cis_control: '2.4'
    cis_section: '2'
    profile_applicability: "Level 1"
    scope: apache_http.section_2.status_module_is_disabled
    assertion:
      field: enabled
      operator: equals
      expected: "false"
    remediation: >
      Perform either one of the following to disable the mod_status module: 1. For
      source builds with static modules, run the Apache ./configure script with the
      --disable-status configure script options. $ cd $DOWNLOAD_HTTPD $ ./configure
      --disable-status 2. For dynamically loaded modules, comment out or remove the
      LoadModule directive for the mod_status module from the httpd.conf file.
      ##LoadModule status_module modules/mod_status.so Default Value: The mod_status
      module IS enabled with a default source build. References: 1.
      https://httpd.apache.org/docs/2.4/mod/mod_status.html
    compliance:
      - cis_apache_http_2_4_v2_2_0_2_4

  - rule_id: apache_http.cis.2.autoindex_module_is_disabled
    title: "Ensure the Autoindex Module Is Disabled"
    severity: high
    automation_type: automated
    cis_control: '2.5'
    cis_section: '2'
    profile_applicability: "Level 1"
    scope: apache_http.section_2.autoindex_module_is_disabled
    assertion:
      field: enabled
      operator: equals
      expected: "false"
    remediation: >
      Perform either one of the following to disable the mod_autoindex module: 1.
      For source builds with static modules, run the Apache ./configure script with
      the --disable-autoindex configure script options $ cd $DOWNLOAD_HTTPD $
      ./configure -disable-autoindex 2. For dynamically loaded modules, comment out
      or remove the LoadModule directive for mod_autoindex from the httpd.conf file.
      ## LoadModule autoindex_module modules/mod_autoindex.so Default Value: The
      mod_autoindex module IS enabled with a default source build. References: 1.
      https://httpd.apache.org/docs/2.4/mod/mod_autoindex.html
    compliance:
      - cis_apache_http_2_4_v2_2_0_2_5

  - rule_id: apache_http.cis.2.proxy_modules_are_disabled_if_not_in_use
    title: "Ensure the Proxy Modules Are Disabled if not in use"
    severity: high
    automation_type: automated
    cis_control: '2.6'
    cis_section: '2'
    profile_applicability: "Level 1"
    scope: apache_http.section_2.proxy_modules_are_disabled_if_not_in_use
    assertion:
      field: enabled
      operator: equals
      expected: "false"
    remediation: >
      Perform either one of the following to disable the proxy module: 1. For source
      builds with static modules, run the Apache ./configure script without
      including the mod_proxy in the --enable-modules=configure script options. $ cd
      $DOWNLOAD_HTTPD $ ./configure 2. For dynamically loaded modules, comment out
      or remove the LoadModule directive for mod_proxy module and all other proxy
      modules from the httpd.conf file. ##LoadModule proxy_module
      modules/mod_proxy.so ##LoadModule proxy_connect_module
      modules/mod_proxy_connect.so ##LoadModule proxy_ftp_module
      modules/mod_proxy_ftp.so ##LoadModule proxy_http_module
      modules/mod_proxy_http.so ##LoadModule proxy_fcgi_module
      modules/mod_proxy_fcgi.so ##LoadModule proxy_scgi_module
      modules/mod_proxy_scgi.so ##LoadModule proxy_ajp_module
      modules/mod_proxy_ajp.so ##LoadModule proxy_balancer_module
      modules/mod_proxy_balancer.so ##LoadModule proxy_express_module
      modules/mod_proxy_express.so ##LoadModule proxy_wstunnel_module
      modules/mod_proxy_wstunnel.so ##LoadModule proxy_fdpass_module
      modules/mod_proxy_fdpass.so Default Value: The mod_proxy module and other
      proxy modules are NOT enabled with a default source build. References: 1.
      https://httpd.apache.org/docs/2.4/mod/mod_proxy.html
    compliance:
      - cis_apache_http_2_4_v2_2_0_2_6


