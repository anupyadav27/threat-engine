tech_type: apache_http
category: web_server
cis_benchmark: CIS Apache HTTP Server 2.4 v2.2.0
cis_section: '3'

rules:

  - rule_id: apache_http.cis.3.apache_user_account_is_locked
    title: "Ensure the Apache User Account Is Locked"
    severity: high
    automation_type: automated
    cis_control: '3.3'
    cis_section: '3'
    profile_applicability: "Level 1"
    scope: apache_http.section_3.apache_user_account_is_locked
    assertion:
      field: row_count
      operator: equals
      expected: "true"
    remediation: >
      Use the passwd command to lock the apache account: # passwd -l apache Default
      Value: The default user is daemon and the account is typically locked.
    compliance:
      - cis_apache_http_2_4_v2_2_0_3_3

  - rule_id: apache_http.cis.3.apache_directories_and_files_are_owned_by_root
    title: "Ensure Apache Directories and Files Are Owned By Root"
    severity: high
    automation_type: automated
    cis_control: '3.4'
    cis_section: '3'
    profile_applicability: "Level 1"
    scope: apache_http.section_3.apache_directories_and_files_are_owned_by_root
    assertion:
      field: value
      operator: equals
      expected: "true"
    remediation: >
      Perform the following: Set ownership on the $APACHE_PREFIX directories such as
      /usr/local/apache2: $ chown -R root $APACHE_PREFIX Default Value: Default
      ownership and group is a mixture of the user:group that built the software and
      root:root.
    compliance:
      - cis_apache_http_2_4_v2_2_0_3_4

  - rule_id: apache_http.cis.3.group_is_set_correctly_on_apache_directories_and
    title: "Ensure the Group Is Set Correctly on Apache Directories and Files"
    severity: high
    automation_type: automated
    cis_control: '3.5'
    cis_section: '3'
    profile_applicability: "Level 1"
    scope: apache_http.section_3.group_is_set_correctly_on_apache_directories_and
    assertion:
      field: value
      operator: equals
      expected: "true"
    remediation: >
      Perform the following: Set ownership on the $APACHE_PREFIX directories such as
      /usr/local/apache2: $ chgrp -R root $APACHE_PREFIX Default Value: Default
      ownership and group is a mixture of the user:group that built the software and
      root:root.
    compliance:
      - cis_apache_http_2_4_v2_2_0_3_5

  - rule_id: apache_http.cis.3.pid_file_is_secured
    title: "Ensure the Pid File Is Secured"
    severity: high
    automation_type: automated
    cis_control: '3.9'
    cis_section: '3'
    profile_applicability: "Level 1"
    scope: apache_http.section_3.pid_file_is_secured
    assertion:
      field: value
      operator: equals
      expected: "on"
    remediation: >
      1. Find the directory in which the PidFile would be created. The default value
      is the ServerRoot/logs directory. 2. Modify the directory if the PidFile is in
      a directory within the Apache `DocumentRoot'. 3. Change the ownership and
      group to be root:root, if not already. 4. Change the permissions so that the
      directory is only writable by root, or the user under which Apache initially
      starts up (default is root). Default Value: The default process ID file is
      logs/httpd.pid. References: 1.
      https://httpd.apache.org/docs/2.4/mod/mpm_common.html#pidfile
    compliance:
      - cis_apache_http_2_4_v2_2_0_3_9

  - rule_id: apache_http.cis.3.scoreboard_file_is_secured
    title: "Ensure the ScoreBoard File Is Secured"
    severity: high
    automation_type: automated
    cis_control: '3.10'
    cis_section: '3'
    profile_applicability: "Level 1"
    scope: apache_http.section_3.scoreboard_file_is_secured
    assertion:
      field: value
      operator: exists
      expected: "on"
    remediation: >
      1. Check to see if the ScoreBoardFile is specified in any of the Apache
      configuration files. If it is not present, no changes are required. 2. If the
      directive is present, find the directory in which the ScoreBoardFile would be
      created. The default value is the ServerRoot/logs directory. 3. Modify the
      directory if the ScoreBoardFile is in a directory within the Apache
      DocumentRoot 4. Change the ownership and group to be root:root, if not
      already. 5. Change the permissions so that the directory is only writable by
      root, or the user under which apache initially starts up (default is root), 6.
      Check that the scoreboard file directory is on a locally mounted hard drive
      rather than an NFS mounted file system. Default Value: The default scoreboard
      file is logs/apache_status. References: 1.
      https://httpd.apache.org/docs/2.4/mod/mpm_common.html#scoreboardfile
    compliance:
      - cis_apache_http_2_4_v2_2_0_3_10


