tech_type: apache_http
category: web_server
cis_benchmark: CIS Apache HTTP Server 2.4 v2.2.0
cis_section: '10'

rules:

  - rule_id: apache_http.cis.10.limitrequestline_directive_is_set_to_8190_or_less
    title: "Ensure the LimitRequestLine directive is Set to 8190 or less"
    severity: medium
    automation_type: automated
    cis_control: '10.1'
    cis_section: '10'
    profile_applicability: "Level 2"
    scope: apache_http.section_10.limitrequestline_directive_is_set_to_8190_or_less
    assertion:
      field: version
      operator: equals
      expected: "true"
    remediation: >
      Perform the following to implement the recommended state: Add or modify the
      LimitRequestline directive in the Apache configuration to have a value of 8190
      or shorter. LimitRequestline 8190 Default Value: LimitRequestline 8190
      References: 1.
      https://httpd.apache.org/docs/2.4/mod/core.html#limitrequestline
    compliance:
      - cis_apache_http_2_4_v2_2_0_10_1

  - rule_id: apache_http.cis.10.limitrequestfields_directive_is_set_to_100_or_less
    title: "Ensure the LimitRequestFields Directive is Set to 100 or Less"
    severity: medium
    automation_type: automated
    cis_control: '10.2'
    cis_section: '10'
    profile_applicability: "Level 2"
    scope: apache_http.section_10.limitrequestfields_directive_is_set_to_100_or_less
    assertion:
      field: row_count
      operator: equals
      expected: "true"
    remediation: >
      Perform the following to implement the recommended state: Add or modify the
      LimitRequestFields directive in the Apache configuration to have a value of
      100 or less. If the directive is not present the default depends on a compile
      time configuration, but defaults to a value of 100. LimitRequestFields 100
      Default Value: LimitRequestFields 100 References: 1.
      https://httpd.apache.org/docs/2.4/mod/core.html#limitrequestfields
    compliance:
      - cis_apache_http_2_4_v2_2_0_10_2

  - rule_id: apache_http.cis.10.limitrequestfieldsize_directive_is_set_to_1024_or
    title: "Ensure the LimitRequestFieldsize Directive is Set to 1024 or Less"
    severity: medium
    automation_type: automated
    cis_control: '10.3'
    cis_section: '10'
    profile_applicability: "Level 2"
    scope: apache_http.section_10.limitrequestfieldsize_directive_is_set_to_1024_or
    assertion:
      field: row_count
      operator: equals
      expected: "true"
    remediation: >
      Perform the following to implement the recommended state: Add or modify the
      LimitRequestFieldsize directive in the Apache configuration to have a value of
      1024 or less. LimitRequestFieldsize 1024 Default Value: LimitRequestFieldsize
      8190 References: 1.
      https://httpd.apache.org/docs/2.4/mod/core.html#limitrequestfieldsize
    compliance:
      - cis_apache_http_2_4_v2_2_0_10_3

  - rule_id: apache_http.cis.10.limitrequestbody_directive_is_set_to_102400_or
    title: "Ensure the LimitRequestBody Directive is Set to 102400 or Less"
    severity: medium
    automation_type: automated
    cis_control: '10.4'
    cis_section: '10'
    profile_applicability: "Level 2"
    scope: apache_http.section_10.limitrequestbody_directive_is_set_to_102400_or
    assertion:
      field: row_count
      operator: equals
      expected: "true"
    remediation: >
      Perform the following to implement the recommended state: Add or modify the
      LimitRequestBody directive in the Apache configuration to have a value of
      102400 (100K) or less. Please read the Apache documentation so that it is
      understood that this directive will limit the size of file up-loads to the web
      server. LimitRequestBody 102400 Default Value: LimitRequestBody 0 (unlimited)
      References: 1.
      https://httpd.apache.org/docs/2.4/mod/core.html#limitrequestbody
    compliance:
      - cis_apache_http_2_4_v2_2_0_10_4


