tech_type: apache_http
category: web_server
cis_benchmark: CIS Apache HTTP Server 2.4 v2.2.0
cis_section: '5'

rules:

  - rule_id: apache_http.cis.5.options_for_the_os_root_directory_are_restricted
    title: "Ensure Options for the OS Root Directory Are Restricted"
    severity: high
    automation_type: automated
    cis_control: '5.1'
    cis_section: '5'
    profile_applicability: "Level 1"
    scope: apache_http.section_5.options_for_the_os_root_directory_are_restricted
    assertion:
      field: value
      operator: equals
      expected: "true"
    remediation: >
      Perform the following to implement the recommended state: 1. Search the Apache
      configuration files (httpd.conf and any included configuration files) to find
      a root <Directory> element. 2. Add a single Options directive if there is
      none. 3. Set the value for Options to None. <Directory /> . . . Options None .
      . . </Directory> Default Value: The default value for the root directory's
      Option directive is Indexes FollowSymLinks. References: 1.
      https://httpd.apache.org/docs/2.4/mod/core.html#options
    compliance:
      - cis_apache_http_2_4_v2_2_0_5_1

  - rule_id: apache_http.cis.5.options_for_the_web_root_directory_are_restricted
    title: "Ensure Options for the Web Root Directory Are Restricted"
    severity: high
    automation_type: automated
    cis_control: '5.2'
    cis_section: '5'
    profile_applicability: "Level 1"
    scope: apache_http.section_5.options_for_the_web_root_directory_are_restricted
    assertion:
      field: value
      operator: equals
      expected: "true"
    remediation: >
      Perform the following to implement the recommended state: 1. Search the Apache
      configuration files (httpd.conf and any included configuration files) to find
      the document root <Directory> element. 2. Add or modify any existing Options
      directive to have a value of None or Multiviews, if multiviews are needed.
      <Directory '/usr/local/apache2/htdocs'> . . . Options None . . . </Directory>
      Default Value: The default value for the web root directory's Option directive
      is FollowSymLinks. References: 1.
      https://httpd.apache.org/docs/2.4/mod/core.html#options
    compliance:
      - cis_apache_http_2_4_v2_2_0_5_2

  - rule_id: apache_http.cis.5.options_for_other_directories_are_minimized
    title: "Ensure Options for Other Directories Are Minimized"
    severity: high
    automation_type: automated
    cis_control: '5.3'
    cis_section: '5'
    profile_applicability: "Level 1"
    scope: apache_http.section_5.options_for_other_directories_are_minimized
    assertion:
      field: value
      operator: equals
      expected: "true"
    remediation: >
      Perform the following to implement the recommended state: 1. Search the Apache
      configuration files (httpd.conf and any included configuration files) to find
      all <Directory> elements. 2. Add or modify any existing Options directive to
      NOT have a value of Includes. Other options may be set if necessary and
      appropriate as described above. References: 1.
      https://httpd.apache.org/docs/2.4/mod/core.html#options
    compliance:
      - cis_apache_http_2_4_v2_2_0_5_3

  - rule_id: apache_http.cis.5.default_html_content_is_removed
    title: "Ensure Default HTML Content Is Removed"
    severity: high
    automation_type: automated
    cis_control: '5.4'
    cis_section: '5'
    profile_applicability: "Level 1"
    scope: apache_http.section_5.default_html_content_is_removed
    assertion:
      field: value
      operator: equals
      expected: "true"
    remediation: >
      Review all pre-installed content and remove content which is not required. In
      particular look for the unnecessary content which may be found in the document
      root directory, a configuration directory such as conf/extra directory, or as
      a Unix/Linux package. 1. Remove the default index.html or welcome page if it
      is a separate package. If it is part of main Apache httpd package such as it
      is on Red Hat Linux, then comment out the configuration as shown below.
      Removing a file such as the welcome.conf, is not recommended as it may get
      replaced if the package is updated. # # This configuration file enables the
      default 'Welcome' # page if there is no default index page present for # the
      root URL. To disable the Welcome page, comment # out all the lines below. # ##
      <LocationMatch '^/+$'\> ## Options -Indexes ## ErrorDocument 403
      /error/noindex.html ## </LocationMatch\> 2. Remove the Apache user manual
      content or comment out configurations referencing the manual # yum erase
      httpd-manual 3. Remove or comment out any Server Status handler configuration.
      # # Allow server status reports generated by mod_status, # with the URL of
      http://servername/server-status # Change the '.example.com' to match your
      domain to enable. # ## <Location /server-status\> ## SetHandler server-status
      ## Order deny,allow ## Deny from all ## Allow from .example.com ##
      </Location\> 4. Remove or comment out any Server Information handler
      configuration. # # Allow remote server configuration reports, with the URL of
      # http://servername/server-info (requires that mod_info.c be loaded). # Change
      the '.example.com' to match your domain to enable. # ## <Location /server-
      info\> ## SetHandler server-info ## Order deny,allow ## Deny from all ## Allow
      from .example.com ## </Location\> 5. Remove or comment out any other handler
      configuration such as perl-status. # This will allow remote server
      configuration reports, with the URL of # http://servername/perl-status #
      Change the '.example.com' to match your domain to enable. # ## <Location
      /perl-status\> ## SetHandler perl-script ## PerlResponseHandler
      Apache2::Status ## Order deny,allow ## Deny from all ## Allow from
      .example.com ## </Location\> Default Value: The default source build provides
      extra content available in the /usr/local/apache2/conf/extra/ directory, but
      the configuration of most of the extra content is commented out by default. In
      particular, the include of conf/extra/proxy-html.conf is not commented out in
      the httpd.conf. # Server-pool management (MPM specific) #Include
      conf/extra/httpd-mpm.conf # Multi-language error messages #Include
      conf/extra/httpd-multilang-errordoc.conf # Fancy directory listings #Include
      conf/extra/httpd-autoindex.conf # Language settings #Include conf/extra/httpd-
      languages.conf # User home directories #Include conf/extra/httpd-userdir.conf
      # Real-time info on requests and configuration #Include conf/extra/httpd-
      info.conf # Virtual hosts #Include conf/extra/httpd-vhosts.conf # Local access
      to the Apache HTTP Server Manual #Include conf/extra/httpd-manual.conf #
      Distributed authoring and versioning (WebDAV) #Include conf/extra/httpd-
      dav.conf # Various default settings #Include conf/extra/httpd-default.conf #
      Configure mod_proxy_html to understand HTML4/XHTML1 <IfModule
      proxy_html_module\> Include conf/extra/proxy-html.conf </IfModule\> # Secure
      (SSL/TLS) connections #Include conf/extra/httpd-ssl.conf Also, the only other
      default content is a minimal barebones index.html in the document root which
      contains. <html> <body> <h1>It works!</h1> </body> </html>
    compliance:
      - cis_apache_http_2_4_v2_2_0_5_4

  - rule_id: apache_http.cis.5.default_cgi_content_printenv_script_is_removed
    title: "Ensure the Default CGI Content printenv Script Is Removed"
    severity: high
    automation_type: automated
    cis_control: '5.5'
    cis_section: '5'
    profile_applicability: "Level 1"
    scope: apache_http.section_5.default_cgi_content_printenv_script_is_removed
    assertion:
      field: value
      operator: equals
      expected: "true"
    remediation: >
      Perform the following to implement the recommended state: 1. Locate cgi-bin
      files and directories enabled in the Apache configuration via Script,
      ScriptAlias, ScriptAliasMatch, or ScriptInterpreterSource directives. 2.
      Remove the printenvdefault CGI in cgi-bin directory if it is installed. # rm
      $APACHE_PREFIX/cgi-bin/printenv Default Value: The default source installation
      includes the printenv script. However, this script is not executable by
      default.
    compliance:
      - cis_apache_http_2_4_v2_2_0_5_5

  - rule_id: apache_http.cis.5.default_cgi_content_test_cgi_script_is_removed
    title: "Ensure the Default CGI Content test-cgi Script Is Removed"
    severity: high
    automation_type: automated
    cis_control: '5.6'
    cis_section: '5'
    profile_applicability: "Level 1"
    scope: apache_http.section_5.default_cgi_content_test_cgi_script_is_removed
    assertion:
      field: value
      operator: equals
      expected: "true"
    remediation: >
      Perform the following to implement the recommended state: 1. Locate cgi-bin
      files and directories enabled in the Apache configuration via Script,
      ScriptAlias, ScriptAliasMatch, or ScriptInterpreterSource directives. 2.
      Remove the test-cgi default CGI in cgi-bin directory if it is installed. # rm
      $APACHE_PREFIX/cgi-bin/test-cgi Default Value: The default source installation
      includes the test-cgi script. However, this script is not executable by
      default.
    compliance:
      - cis_apache_http_2_4_v2_2_0_5_6

  - rule_id: apache_http.cis.5.http_request_methods_are_restricted
    title: "Ensure HTTP Request Methods Are Restricted"
    severity: high
    automation_type: automated
    cis_control: '5.7'
    cis_section: '5'
    profile_applicability: "Level 1 + Level 2"
    scope: apache_http.section_5.http_request_methods_are_restricted
    assertion:
      field: value
      operator: equals
      expected: "no"
    remediation: >
      Perform the following to implement the recommended state: 1. Locate the Apache
      configuration files and included configuration files. 2. Search for the
      directive on the document root directory such as: <Directory
      '/usr/local/apache2/htdocs'> . . . </Directory> 3. Add a directive as shown
      below within the group of document root directives. # Limit HTTP methods to
      standard methods. Note: Does not limit TRACE <LimitExcept GET POST OPTIONS>
      Require all denied </LimitExcept> 4. Search for other directives in the Apache
      configuration files other than the OS root directory and add the same
      directives to each. It is very important to understand that the directives are
      based on the OS file system hierarchy as accessed by Apache and not the
      hierarchy of the locations within web site URLs. <Directory
      '/usr/local/apache2/cgi-bin'> . . . # Limit HTTP methods <LimitExcept GET POST
      OPTIONS> Require all denied </LimitExcept> </Directory> or use the
      experimental AllowMethods module 1. Locate the Apache configuration files and
      included configuration files. 2. Search for the directive 'AllowMethods' on
      the document root directory such as: <Directory '/usr/local/apache2/htdocs'> .
      . . </Directory> 3. Add a directive as shown below within the group of
      document root directives. LoadModule allowmethods_module
      modules/mod_allowmethods.so <Directory /var/www> #other directives
      AllowMethods GET POST OPTIONS </Directory> 4. Search for other directives in
      the Apache configuration files other than the OS root directory and add the
      same directives to each. It is very important to understand that the
      directives are based on the OS file system hierarchy as accessed by Apache and
      not the hierarchy of the locations within web site URLs. LoadModule
      allowmethods_module modules/mod_allowmethods.so <Directory /var/www> #other
      directives AllowMethods GET POST OPTIONS </Directory> The `LimitExcept`
      implemtation may not work well for proxy configurations or systems with many
      locations or directories. A global rewrite condition can be implemented either
      by explicitly forbidding REQUEST_METHODs or by rejecting everything but the
      allowed REQUEST_METHODs 1. Reject specific REQUEST_METHODs RewriteEngine on
      RewriteCond %{REQUEST_METHOD} ^(PUT|DELETE|TRACE|OPTIONS|CONNECT)$ [NC]
      RewriteRule .* - [F] 2. Reject everything but allowed REQUEST_METHODs
      RewriteCond %{REQUEST_METHOD} ^((?!(GET|POST|OPTIONS)). )$ [NC] RewriteRule .
      - [F] Default Value: No Limits on HTTP methods. References: 1.
      https://httpd.apache.org/docs/2.4/mod/core.html#limitexcept 2.
      https://www.ietf.org/rfc/rfc2616.txt
    compliance:
      - cis_apache_http_2_4_v2_2_0_5_7

  - rule_id: apache_http.cis.5.http_trace_method_is_disabled
    title: "Ensure the HTTP TRACE Method Is Disabled"
    severity: high
    automation_type: automated
    cis_control: '5.8'
    cis_section: '5'
    profile_applicability: "Level 1"
    scope: apache_http.section_5.http_trace_method_is_disabled
    assertion:
      field: enabled
      operator: equals
      expected: "false"
    remediation: >
      Perform the following to implement the recommended state: 1. Locate the main
      Apache configuration file such as httpd.conf. 2. Add a TraceEnable directive
      to the server level configuration with a value of off. Server level
      configuration is the top-level configuration, not nested within any other
      directives like <Directory> or <Location>. Default Value: The TRACE method is
      enabled. References: 1.
      https://httpd.apache.org/docs/2.4/mod/core.html#traceenable 2.
      https://www.ietf.org/rfc/rfc2616.txt
    compliance:
      - cis_apache_http_2_4_v2_2_0_5_8

  - rule_id: apache_http.cis.5.old_http_protocol_versions_are_disallowed
    title: "Ensure Old HTTP Protocol Versions Are Disallowed"
    severity: high
    automation_type: automated
    cis_control: '5.9'
    cis_section: '5'
    profile_applicability: "Level 1"
    scope: apache_http.section_5.old_http_protocol_versions_are_disallowed
    assertion:
      field: version
      operator: equals
      expected: "on"
    remediation: >
      Perform the following to implement the recommended state: 1. Load the
      mod_rewrite module for Apache by doing either one of the following: o Build
      Apache with mod_rewrite statically loaded during the build, by adding the
      --enable-rewrite option to the ./configure script. ./configure --enable-
      rewrite. o Or, dynamically loading the module with the LoadModule directive in
      the httpd.conf configuration file. LoadModule rewrite_module
      modules/mod_rewrite.so 2. Locate the main Apache configuration file such as
      httpd.conf and add the following rewrite condition to match HTTP/1.1 and the
      rewrite rule to the global server level configuration to disallow other
      protocol versions. RewriteEngine On RewriteCond %{THE_REQUEST} !HTTP/1\.1$
      RewriteRule .* - [F] 3. By default, mod_rewrite configuration settings from
      the main server context are not inherited by virtual hosts. Therefore, it is
      also necessary to add the following directives in each section to inherit the
      main server settings. RewriteEngine On RewriteOptions Inherit Default Value:
      The default value for the RewriteEngine directive is off. References: 1.
      https://httpd.apache.org/docs/2.4/mod/mod_rewrite.html
    compliance:
      - cis_apache_http_2_4_v2_2_0_5_9

  - rule_id: apache_http.cis.5.ip_addresses_for_listening_for_requests_are
    title: "Ensure the IP Addresses for Listening for Requests Are Specified"
    severity: medium
    automation_type: automated
    cis_control: '5.15'
    cis_section: '5'
    profile_applicability: "Level 2"
    scope: apache_http.section_5.ip_addresses_for_listening_for_requests_are
    assertion:
      field: port
      operator: equals
      expected: "no"
    remediation: >
      Perform the following to implement the recommended state: 1. Find any Listen
      directives in the Apache configuration file with no IP address specified, or
      with an IP address of all zeros similar to the examples below. Keep in mind
      there may be both IPv4 and IPv6 addresses on the system. Listen 80 Listen
      0.0.0.0:80 Listen [::ffff:0.0.0.0]:80 2. Modify the Listen directives in the
      Apache configuration file to have explicit IP addresses according to the
      intended usage. Multiple Listendirectives may be specified for each IP address
      & Port. Listen 10.1.2.3:80 Listen 192.168.4.5:80 Listen
      [2001:db8::a00:20ff:fea7:ccea]:80 Default Value: Listen 80 References: 1.
      https://httpd.apache.org/docs/2.4/mod/mpm_common.html#listen
    compliance:
      - cis_apache_http_2_4_v2_2_0_5_15

  - rule_id: apache_http.cis.5.browser_framing_is_restricted
    title: "Ensure Browser Framing Is Restricted"
    severity: medium
    automation_type: automated
    cis_control: '5.16'
    cis_section: '5'
    profile_applicability: "Level 2"
    scope: apache_http.section_5.browser_framing_is_restricted
    assertion:
      field: port
      operator: equals
      expected: "no"
    remediation: >
      Perform the following to implement the recommended state: Add or modify the
      Header directive for the Content-Security-Policy header in the Apache
      configuration to have the condition always , an action of append and a value
      of frame-ancestors self , as shown below. Header always append Content-
      Security-Policy 'frame-ancestors 'self'' Default Value: Neither the Content-
      Security-Policy HTTP response header nor the X-Frame-Options header is
      generated by default. References: 1.
      https://httpd.apache.org/docs/2.4/mod/mod_headers.html#header 2.
      https://owasp.org/www-project-cheat-
      sheets/cheatsheets/Content_Security_Policy_Cheat_Sheet 3.
      https://developer.mozilla.org/en-US/docs/Web/HTTP/Headers/Content-Security-
      Policy 4. https://en.wikipedia.org/wiki/Clickjacking
    compliance:
      - cis_apache_http_2_4_v2_2_0_5_16


