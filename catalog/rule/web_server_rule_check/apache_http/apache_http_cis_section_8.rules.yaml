tech_type: apache_http
category: web_server
cis_benchmark: CIS Apache HTTP Server 2.4 v2.2.0
cis_section: '8'

rules:

  - rule_id: apache_http.cis.8.servertokens_is_set_to_prod_or_productonly
    title: "Ensure ServerTokens is Set to 'Prod' or 'ProductOnly'"
    severity: high
    automation_type: automated
    cis_control: '8.1'
    cis_section: '8'
    profile_applicability: "Level 1"
    scope: apache_http.section_8.servertokens_is_set_to_prod_or_productonly
    assertion:
      field: version
      operator: equals
      expected: "true"
    remediation: >
      Perform the following to implement the recommended state: Add or modify the
      ServerTokens directive as shown below to have the value of Prod or
      ProductOnly: ServerTokens Prod Default Value: The default value is Full which
      provides the most detailed information. References: 1.
      https://httpd.apache.org/docs/2.4/mod/core.html#servertokens
    compliance:
      - cis_apache_http_2_4_v2_2_0_8_1

  - rule_id: apache_http.cis.8.serversignature_is_not_enabled
    title: "Ensure ServerSignature Is Not Enabled"
    severity: high
    automation_type: automated
    cis_control: '8.2'
    cis_section: '8'
    profile_applicability: "Level 1"
    scope: apache_http.section_8.serversignature_is_not_enabled
    assertion:
      field: enabled
      operator: equals
      expected: "off"
    remediation: >
      Perform the following to implement the recommended state: Add or modify the
      ServerSignature directive as shown below to have the value of Off:
      ServerSignature Off Default Value: The default value is Off for
      ServerSignature. References: 1.
      https://httpd.apache.org/docs/2.4/mod/core.html#serversignature
    compliance:
      - cis_apache_http_2_4_v2_2_0_8_2

  - rule_id: apache_http.cis.8.all_default_apache_content_is_removed
    title: "Ensure All Default Apache Content Is Removed"
    severity: medium
    automation_type: automated
    cis_control: '8.3'
    cis_section: '8'
    profile_applicability: "Level 2"
    scope: apache_http.section_8.all_default_apache_content_is_removed
    assertion:
      field: port
      operator: equals
      expected: "no"
    remediation: >
      Perform either of the following to implement the recommended state: 1. The
      default source build places the auto-index and icon configurations in the
      extra/httpd-autoindex.conf file, so it can be disabled by leaving the include
      line commented out in the main httpd.conffile as shown below. # Fancy
      directory listings #Include conf/extra/httpd-autoindex.conf 2. Alternatively,
      the icon alias directive and the directory access control configuration can be
      commented out as shown if present: # We include the /icons/ alias for
      FancyIndexed directory listings. If # you do not use FancyIndexing, you may
      comment this out. # #Alias /icons/ '/var/www/icons/' #<Directory
      '/var/www/icons'> # Options Indexes MultiViews FollowSymLinks # AllowOverride
      None # Order allow,deny # Allow from all #</Directory> Default Value: The
      default source build does not enable access to the Apache icons.
    compliance:
      - cis_apache_http_2_4_v2_2_0_8_3

  - rule_id: apache_http.cis.8.etag_response_header_fields_do_not_include_inodes
    title: "Ensure ETag Response Header Fields Do Not Include Inodes"
    severity: medium
    automation_type: automated
    cis_control: '8.4'
    cis_section: '8'
    profile_applicability: "Level 2"
    scope: apache_http.section_8.etag_response_header_fields_do_not_include_inodes
    assertion:
      field: value
      operator: equals
      expected: "true"
    remediation: >
      Perform the following to implement the recommended state: Remove all instances
      of the FileETag directive. Alternatively, add or modify the FileETag directive
      in the server and each virtual host configuration to have either the value
      None or MTime Size. Default Value: The default value is MTime Size.
      References: 1. http://httpd.apache.org/docs/2.4/mod/core.html#FileETag 2.
      https://nvd.nist.gov/vuln/detail/CVE-2003-1418
    compliance:
      - cis_apache_http_2_4_v2_2_0_8_4


