tech_type: apache_http
category: web_server
cis_benchmark: CIS Apache HTTP Server 2.4 v2.2.0
cis_section: '6'

rules:

  - rule_id: apache_http.cis.6.error_log_filename_and_severity_level_are
    title: "Ensure the Error Log Filename and Severity Level Are Configured Correctly"
    severity: high
    automation_type: automated
    cis_control: '6.1'
    cis_section: '6'
    profile_applicability: "Level 1"
    scope: apache_http.section_6.error_log_filename_and_severity_level_are
    assertion:
      field: value
      operator: exists
      expected: "true"
    remediation: >
      Perform the following to implement the recommended state: 1. Add or modify the
      LogLevel in the Apache configuration to have a value of info or lower for the
      core module and notice or lower for all other modules. Note that is it is
      compliant to have a value of info or debug if there is a need for a more
      verbose log and the storage and monitoring processes are capable of handling
      the extra load. The recommended value is notice core:info. LogLevel notice
      core:info 2. Add an ErrorLog directive if not already configured. The file
      path may be relative or absolute, or the logs may be configured to be sent to
      a syslog server. ErrorLog 'logs/error_log' 3. Add a similar ErrorLog directive
      for each virtual host configured if the virtual host will have different
      people responsible for the web site. Each responsible individual or
      organization needs access to their own web logs and needs the
      skills/training/tools for monitoring the logs. Default Value: The following is
      the default configuration: LogLevel warn ErrorLog 'logs/error_log' References:
      1. https://httpd.apache.org/docs/2.4/logs.html 2.
      https://httpd.apache.org/docs/2.4/mod/core.html#loglevel 3.
      https://httpd.apache.org/docs/2.4/mod/core.html#errorlog
    compliance:
      - cis_apache_http_2_4_v2_2_0_6_1

  - rule_id: apache_http.cis.6.a_syslog_facility_is_configured_for_error_logging
    title: "Ensure a Syslog Facility Is Configured for Error Logging"
    severity: medium
    automation_type: automated
    cis_control: '6.2'
    cis_section: '6'
    profile_applicability: "Level 2"
    scope: apache_http.section_6.a_syslog_facility_is_configured_for_error_logging
    assertion:
      field: value
      operator: exists
      expected: "true"
    remediation: >
      Perform the following to implement the recommended state: 1. Add an ErrorLog
      directive if not already configured. Any appropriate syslog facility may be
      used in place of local1. ErrorLog 'syslog:local1' 2. Add a similar ErrorLog
      directive for each virtual host if necessary. Default Value: The following is
      the default configuration: ErrorLog 'logs/error_log' References: 1.
      https://httpd.apache.org/docs/2.4/logs.html 2.
      https://httpd.apache.org/docs/2.4/mod/core.html#loglevel 3.
      https://httpd.apache.org/docs/2.4/mod/core.html#errorlog
    compliance:
      - cis_apache_http_2_4_v2_2_0_6_2

  - rule_id: apache_http.cis.6.log_storage_and_rotation_is_configured_correctly
    title: "Ensure Log Storage and Rotation Is Configured Correctly"
    severity: high
    automation_type: automated
    cis_control: '6.4'
    cis_section: '6'
    profile_applicability: "Level 1"
    scope: apache_http.section_6.log_storage_and_rotation_is_configured_correctly
    assertion:
      field: port
      operator: gte
      expected: "true"
    remediation: >
      To implement the recommended state, do either option 'a' if using the Linux
      logrotate utility or option 'b' if using a piped logging utility such as the
      Apache rotatelogs: a) File Logging with Logrotate: 1. Add or modify the web
      log rotation configuration to match your configured log files in
      /etc/logrotate.d/httpd to be similar to the following. /var/log/httpd/*log {
      missingok notifempty sharedscripts postrotate /bin/kill -HUP 'cat
      /var/run/httpd.pid 2>/dev/null' 2> /dev/null || true endscript } 2. Modify the
      rotation period and number of logs to keep so that at least 13 weeks or 3
      months of logs are retained. This may be done as the default value for all
      logs in /etc/logrotate.conf or in the web specific log rotation configuration
      in /etc/logrotate.d/httpdto be similar to the following. # rotate log files
      weekly weekly # keep 13 weeks of backlogs rotate 13 3. For each virtual host
      configured with its own log files ensure that those log files are also
      included in a similar log rotation. b) Piped Logging: 1. Configure the log
      rotation interval and log file names to a suitable interval such as daily.
      CustomLog '|bin/rotatelogs -l /var/logs/logfile.%Y.%m.%d 86400' combined 2.
      Ensure the log file naming and any rotation scripts provide for retaining at
      least 3 months or 13 weeks of log files. 3. For each virtual host configured
      with its own log files ensure that those log files are also included in a
      similar log rotation. Default Value: The following is the default httpd log
      rotation configuration in /etc/logrotate.d/httpd: /var/log/httpd/*log {
      missingok notifempty sharedscripts postrotate /bin/kill -HUP `cat
      /var/run/httpd.pid 2>/dev/null` 2> /dev/null || true endscript } The default
      log retention configured in /etc/logrotate.conf: # rotate log files weekly
      weekly # keep 4 weeks worth of backlogs rotate 4
    compliance:
      - cis_apache_http_2_4_v2_2_0_6_4

  - rule_id: apache_http.cis.6.applicable_patches_are_applied
    title: "Ensure Applicable Patches Are Applied"
    severity: high
    automation_type: automated
    cis_control: '6.5'
    cis_section: '6'
    profile_applicability: "Level 1"
    scope: apache_http.section_6.applicable_patches_are_applied
    assertion:
      field: value
      operator: equals
      expected: "true"
    remediation: >
      Update to the latest Apache release available according to either of the
      following: 1. When building from source: o Read release notes and related
      security patch information o Download latest source and any dependent modules
      such as mod_security. o Build new Apache software according to your build
      process with the same configuration options. o Install and test the new
      software according to your organization's testing process. o Move to
      production according to your organization's deployment process. 2. When using
      platform packages: o Read release notes and related security patch information
      o Download and install latest available Apache package and any dependent
      software. o Test the new software according to your organization's testing
      process. o Move to production according to your organization's deployment
      process. Default Value: Not Applicable References: 1.
      https://httpd.apache.org/security/vulnerabilities_24.html
    compliance:
      - cis_apache_http_2_4_v2_2_0_6_5


