tech_type: apache_http
category: web_server
cis_benchmark: CIS Apache HTTP Server 2.4 v2.2.0
cis_section: '9'

rules:

  - rule_id: apache_http.cis.9.timeout_is_set_to_10_or_less
    title: "Ensure the TimeOut Is Set to 10 or Less"
    severity: high
    automation_type: automated
    cis_control: '9.1'
    cis_section: '9'
    profile_applicability: "Level 1"
    scope: apache_http.section_9.timeout_is_set_to_10_or_less
    assertion:
      field: value
      operator: equals
      expected: "true"
    remediation: >
      Perform the following to implement the recommended state: Add or modify the
      Timeout directive in the Apache configuration to have a value of 10 seconds or
      shorter. Timeout 10 Default Value: Timeout 60 References: 1.
      https://httpd.apache.org/docs/2.4/mod/core.html#timeout Additional
      Information:
    compliance:
      - cis_apache_http_2_4_v2_2_0_9_1

  - rule_id: apache_http.cis.9.keepalive_is_enabled
    title: "Ensure KeepAlive Is Enabled"
    severity: high
    automation_type: automated
    cis_control: '9.2'
    cis_section: '9'
    profile_applicability: "Level 1"
    scope: apache_http.section_9.keepalive_is_enabled
    assertion:
      field: enabled
      operator: equals
      expected: "on"
    remediation: >
      Perform the following to implement the recommended state: Add or modify the
      KeepAlive directive in the Apache configuration to have a value of On, so that
      KeepAlive connections are enabled. KeepAlive On Default Value: KeepAlive On
      References: 1. https://httpd.apache.org/docs/2.4/mod/core.html#keepalive
      Additional Information:
    compliance:
      - cis_apache_http_2_4_v2_2_0_9_2

  - rule_id: apache_http.cis.9.maxkeepaliverequests_is_set_to_a_value_of_100_or
    title: "Ensure MaxKeepAliveRequests is Set to a Value of 100 or Greater"
    severity: high
    automation_type: automated
    cis_control: '9.3'
    cis_section: '9'
    profile_applicability: "Level 1"
    scope: apache_http.section_9.maxkeepaliverequests_is_set_to_a_value_of_100_or
    assertion:
      field: row_count
      operator: equals
      expected: "true"
    remediation: >
      Perform the following to implement the recommended state: Add or modify the
      MaxKeepAliveRequests directive in the Apache configuration to have a value of
      100 or more. MaxKeepAliveRequests 100 Default Value: MaxKeepAliveRequests 100
      References: 1.
      https://httpd.apache.org/docs/2.4/mod/core.html#maxkeepaliverequests
    compliance:
      - cis_apache_http_2_4_v2_2_0_9_3

  - rule_id: apache_http.cis.9.keepalivetimeout_is_set_to_a_value_of_15_or_less
    title: "Ensure KeepAliveTimeout is Set to a Value of 15 or Less"
    severity: high
    automation_type: automated
    cis_control: '9.4'
    cis_section: '9'
    profile_applicability: "Level 1"
    scope: apache_http.section_9.keepalivetimeout_is_set_to_a_value_of_15_or_less
    assertion:
      field: row_count
      operator: equals
      expected: "true"
    remediation: >
      Perform the following to implement the recommended state: Add or modify the
      KeepAliveTimeout directive in the Apache configuration to have a value of 15
      or less. KeepAliveTimeout 15 Default Value: KeepAliveTimeout 5 References: 1.
      https://httpd.apache.org/docs/2.4/mod/core.html#keepalivetimeout
    compliance:
      - cis_apache_http_2_4_v2_2_0_9_4

  - rule_id: apache_http.cis.9.timeout_limits_for_request_headers_is_set_to_40
    title: "Ensure the Timeout Limits for Request Headers is Set to 40 or Less"
    severity: high
    automation_type: automated
    cis_control: '9.5'
    cis_section: '9'
    profile_applicability: "Level 1"
    scope: apache_http.section_9.timeout_limits_for_request_headers_is_set_to_40
    assertion:
      field: length
      operator: gte
      expected: "true"
    remediation: >
      Perform the following to implement the recommended state: 1. Load the
      mod_requesttimeout module in the Apache configuration with the following
      configuration. LoadModule reqtimeout_module modules/mod_reqtimeout.so 2. Add a
      RequestReadTimeout directive similar to the one below with the maximum request
      header timeout value of 40 seconds or less. RequestReadTimeout
      header=20-40,MinRate=500 body=20,MinRate=500 Default Value:
      header=20-40,MinRate=500 References: 1. http://ha.ckers.org/slowloris/ 2.
      https://www.owasp.org/index.php/H.....t.....t....p.......p....o....s....t 3.
      https://httpd.apache.org/docs/2.4/mod/mod_reqtimeout.html
    compliance:
      - cis_apache_http_2_4_v2_2_0_9_5

  - rule_id: apache_http.cis.9.timeout_limits_for_the_request_body_is_set_to_20
    title: "Ensure Timeout Limits for the Request Body is Set to 20 or Less"
    severity: high
    automation_type: automated
    cis_control: '9.6'
    cis_section: '9'
    profile_applicability: "Level 1"
    scope: apache_http.section_9.timeout_limits_for_the_request_body_is_set_to_20
    assertion:
      field: length
      operator: gte
      expected: "true"
    remediation: >
      Load the mod_requesttimeout module in the Apache configuration with the
      following configuration. LoadModule reqtimeout_module
      modules/mod_reqtimeout.so Add a RequestReadTimeout directive similar to the
      one below with the maximum request body timeout value of 20 seconds or less.
      RequestReadTimeout header=20-40,MinRate=500 body=20,MinRate=500 Default Value:
      body=20,MinRate=500 References: 1.
      https://httpd.apache.org/docs/2.4/mod/mod_reqtimeout.html
    compliance:
      - cis_apache_http_2_4_v2_2_0_9_6


