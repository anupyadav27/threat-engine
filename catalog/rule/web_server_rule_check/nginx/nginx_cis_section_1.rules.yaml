tech_type: nginx
category: web_server
cis_benchmark: CIS NGINX v2.1.0
cis_section: '1'

rules:

  - rule_id: nginx.cis.1.nginx_is_installed
    title: "Ensure NGINX is installed"
    severity: high
    automation_type: automated
    cis_control: '1.1.1'
    cis_section: '1'
    profile_applicability: "Level 1"
    scope: nginx.section_1.nginx_is_installed
    assertion:
      field: value
      operator: equals
      expected: "on"
    remediation: >
      1. Configure and setup Nginx sudo su dnf update -y && dnf install dnf-utils -y
      cat << EOF > /etc/yum.repos.d/nginx.repo [nginx-stable] name=nginx stable repo
      baseurl=http://nginx.org/packages/rhel/8/\$basearch/ gpgcheck=1 enabled=1
      gpgkey=https://nginx.org/keys/nginx_signing.key module_hotfixes=true EOF dnf
      install nginx -y Default Value: NGINX is not installed by default. References:
      1. http://nginx.org/en/docs/install.html 2.
      http://nginx.org/en/linux_packages.html
    compliance:
      - cis_nginx_v2_1_0_1_1_1


