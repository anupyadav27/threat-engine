tech_type: iis
category: web_server
cis_benchmark: CIS Microsoft IIS 10 v1.2.1
cis_section: '5'

rules:

  - rule_id: iis.cis.5.l1_ensure_default_iis_web_log_location_is_moved
    title: "(L1) Ensure Default IIS web log location is moved"
    severity: high
    automation_type: automated
    cis_control: '5.1'
    cis_section: '5'
    profile_applicability: "Level 1"
    scope: iis.section_5.l1_ensure_default_iis_web_log_location_is_moved
    assertion:
      field: value
      operator: equals
      expected: "on"
    remediation: >
      Moving the default log location can be easily accomplished using the Logging
      feature in the IIS Management UI, AppCmd.exe, or PowerShell. Enter the
      following command in AppCmd.exe to configure:
      %systemroot%\system32\inetsrv\appcmd set config -section:sites -
      siteDefaults.logfile.directory:<new log location> OR Enter the following
      command in PowerShell to configure: Set-WebConfigurationProperty -pspath
      'MACHINE/WEBROOT/APPHOST' -filter
      'system.applicationHost/sites/siteDefaults/logFile' -name 'directory' -value
      <new log location> Moving log file stores to a non-system drive or partition
      separate from where web applications run and/or content is served is
      preferred. Additionally, folder-level NTFS permissions should be set as
      restrictive as possible; Administrators and SYSTEM are typically the only
      principals requiring access. While standard IIS logs can be moved and edited
      using IIS Manager, additional management tool add-ons are required in order to
      manage logs generated by other IIS features, such as Request Filtering and IIS
      Advanced Logging. These add-ons can be obtained using the Web Platform
      Installer or from Microsoft's site. The HTTPErr logging location can be
      changed by adding a registry key. Default Value: The default location for web
      logs in IIS is: %SystemDrive%\inetpub\logs\LogFiles. References: 1.
      https://technet.microsoft.com/en-us/library/cc770709(v=ws.10).aspx?
    compliance:
      - cis_iis_10_v1_2_1_5_1

  - rule_id: iis.cis.5.l1_ensure_advanced_iis_logging_is_enabled
    title: "(L1) Ensure Advanced IIS logging is enabled"
    severity: high
    automation_type: automated
    cis_control: '5.2'
    cis_section: '5'
    profile_applicability: "Level 1"
    scope: iis.section_5.l1_ensure_advanced_iis_logging_is_enabled
    assertion:
      field: enabled
      operator: equals
      expected: "true"
    remediation: >
      IIS Advanced Logging can be configured for servers, Web sites, and directories
      in IIS Manager. To enable Advanced Logging using the UI: 1. Open Internet
      Information Services (IIS) Manager 2. Click the server in the Connections pane
      3. Double-click the Logging icon on the Home page 4. Click Select Fields The
      fields that will be logged need to be configured using the Add or Edit Fields
      button. Note: There may be performance considerations depending on the extent
      of the configuration. Default Value: IIS Advanced Logging is enabled by
      default. References: 1. https://www.iis.net/learn/get-started/whats-new-in-
      iis-85/enhanced-logging-for- iis85
    compliance:
      - cis_iis_10_v1_2_1_5_2


