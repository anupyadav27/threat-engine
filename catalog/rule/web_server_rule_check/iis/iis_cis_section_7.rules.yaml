      field: enabled
      operator: equals
      expected: "false"
    remediation: >
      Perform the following to disable DES 56/56 cipher: 1. Set the following
      Registry key to 0.
      HKLM\SYSTEM\CurrentControlSet\Control\SecurityProviders\SCHANNEL\Ciphers\DES
      56/56:Enabled To disable using PowerShell enter the following command: (Get-
      Item
      'HKLM:\').OpenSubKey('SYSTEM\CurrentControlSet\Control\SecurityProviders\SCHA
      NNEL\Ciphers', $true).CreateSubKey('DES 56/56') New-ItemProperty -path
      'HKLM:\SYSTEM\CurrentControlSet\Control\SecurityProviders\SCHANNEL\Ciphers\DE
      S 56/56' -name 'Enabled' -value '0' -PropertyType 'DWord' -Force | Out-Null
      References: 1. https://www.owasp.org/index.php/Testing_for_SSL-TLS_%28OWASP-
      CM- 001%29 2. http://technet.microsoft.com/en-us/library/dn786433.aspx 3.
