      HKLM\SYSTEM\CurrentControlSet\Control\SecurityProviders\SCHANNEL\Protocols\SS
      L 3.0\Server:Enabled
      HKLM\SYSTEM\CurrentControlSet\Control\SecurityProviders\SCHANNEL\Protocols\SS
      L 3.0\Client:Enabled 2. Set the following Registry key to 1.
      HKLM\SYSTEM\CurrentControlSet\Control\SecurityProviders\SCHANNEL\Protocols\SS
      L 3.0\Server:DisabledByDefault
      HKLM\SYSTEM\CurrentControlSet\Control\SecurityProviders\SCHANNEL\Protocols\SS
      L 3.0\Client:DisabledByDefault To disable using PowerShell enter the following
      command: New-Item
      'HKLM:\SYSTEM\CurrentControlSet\Control\SecurityProviders\SCHANNEL\Protocols\
      SSL 3.0\Server' -Force | Out-Null New-Item
      'HKLM:\SYSTEM\CurrentControlSet\Control\SecurityProviders\SCHANNEL\Protocols\
      SSL 3.0\Client' -Force | Out-Null New-ItemProperty -path
      'HKLM:\SYSTEM\CurrentControlSet\Control\SecurityProviders\SCHANNEL\Protocols\
      SSL 3.0\Server' -name 'Enabled' -value '0' -PropertyType 'DWord' -Force | Out-
      Null New-ItemProperty -path
      'HKLM:\SYSTEM\CurrentControlSet\Control\SecurityProviders\SCHANNEL\Protocols\
      SSL 3.0\Client' -name 'Enabled' -value '0' -PropertyType 'DWord' -Force | Out-
      Null New-ItemProperty -path
      'HKLM:\SYSTEM\CurrentControlSet\Control\SecurityProviders\SCHANNEL\Protocols\
      SSL 3.0\Server' -name 'DisabledByDefault' -value '1' -PropertyType 'DWord' -
      Force | Out-Null New-ItemProperty -path
      'HKLM:\SYSTEM\CurrentControlSet\Control\SecurityProviders\SCHANNEL\Protocols\
      SSL 3.0\Client' -name 'DisabledByDefault' -value '1' -PropertyType 'DWord' -
      Force | Out-Null Default Value: Enabled References: 1.
      https://www.openssl.org/~bodo/ssl-poodle.pdf 2.
      http://technet.microsoft.com/en-us/library/dn786419.aspx 3.
      https://www.owasp.org/index.php/Testing_for_SSL-TLS_%28OWASP-CM- 001%29 4.
      http://technet.microsoft.com/en-us/library/dn786433.aspx 5.
      http://msdn.microsoft.com/en-us/library/aa374757%28v=vs.85%29.aspx
    compliance:
      - cis_iis_10_v1_2_1_7_3

