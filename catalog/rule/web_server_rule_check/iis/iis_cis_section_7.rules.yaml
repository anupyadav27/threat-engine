tech_type: iis
category: web_server
cis_benchmark: CIS Microsoft IIS 10 v1.2.1
cis_section: '7'

rules:

  - rule_id: iis.cis.7.l1_ensure_sslv2_is_disabled
    title: "(L1) Ensure SSLv2 is Disabled"
    severity: high
    automation_type: automated
    cis_control: '7.2'
    cis_section: '7'
    profile_applicability: "Level 1"
    scope: iis.section_7.l1_ensure_sslv2_is_disabled
    assertion:
      field: enabled
      operator: equals
      expected: "false"
    remediation: >
      Perform the following to disable SSL 2.0: 1. Set the following Registry key to
      0.
      HKLM\SYSTEM\CurrentControlSet\Control\SecurityProviders\SCHANNEL\Protocols\SS
      L 2.0\Server:Enabled
      HKLM\SYSTEM\CurrentControlSet\Control\SecurityProviders\SCHANNEL\Protocols\SS
      L 2.0\Client:Enabled 2. Set the following Registry key to 1.
      HKLM\SYSTEM\CurrentControlSet\Control\SecurityProviders\SCHANNEL\Protocols\SS
      L 2.0\Server:DisabledByDefault
      HKLM\SYSTEM\CurrentControlSet\Control\SecurityProviders\SCHANNEL\Protocols\SS
      L 2.0\Client:DisabledByDefault To disable using PowerShell enter the following
      command: New-Item
      'HKLM:\SYSTEM\CurrentControlSet\Control\SecurityProviders\SCHANNEL\Protocols\
      SSL 2.0\Server' -Force | Out-Null New-Item
      'HKLM:\SYSTEM\CurrentControlSet\Control\SecurityProviders\SCHANNEL\Protocols\
      SSL 2.0\Client' -Force | Out-Null New-ItemProperty -path
      'HKLM:\SYSTEM\CurrentControlSet\Control\SecurityProviders\SCHANNEL\Protocols\
      SSL 2.0\Server' -name 'Enabled' -value '0' -PropertyType 'DWord' -Force | Out-
      Null New-ItemProperty -path
      'HKLM:\SYSTEM\CurrentControlSet\Control\SecurityProviders\SCHANNEL\Protocols\
      SSL 2.0\Client' -name 'Enabled' -value '0' -PropertyType 'DWord' -Force | Out-
      Null New-ItemProperty -path
      'HKLM:\SYSTEM\CurrentControlSet\Control\SecurityProviders\SCHANNEL\Protocols\
      SSL 2.0\Server' -name 'DisabledByDefault' -value '1' -PropertyType 'DWord' -
      Force | Out-Null New-ItemProperty -path
      'HKLM:\SYSTEM\CurrentControlSet\Control\SecurityProviders\SCHANNEL\Protocols\
      SSL 2.0\Client' -name 'DisabledByDefault' -value '1' -PropertyType 'DWord' -
      Force | Out-Null Default Value: Enabled References: 1.
      http://technet.microsoft.com/en-us/library/dn786419.aspx 2.
      http://technet.microsoft.com/en-us/library/dn786433.aspx 3.
      http://msdn.microsoft.com/en-us/library/aa374757%28v=vs.85%29.aspx 4.
      https://www.owasp.org/index.php/Testing_for_SSL-TLS_%28OWASP-CM- 001%29
    compliance:
      - cis_iis_10_v1_2_1_7_2

  - rule_id: iis.cis.7.l1_ensure_sslv3_is_disabled
