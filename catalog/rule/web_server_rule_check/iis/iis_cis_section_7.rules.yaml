    assertion:
      field: enabled
      operator: equals
      expected: "true"
    remediation: >
      Perform the following to enable TLS 1.2: 1. Set the following Registry key to
      1.
      HKLM\SYSTEM\CurrentControlSet\Control\SecurityProviders\SCHANNEL\Protocols\TL
      S 1.2\Server:Enabled 2. Set the following Registry key to 0.
      HKLM\SYSTEM\CurrentControlSet\Control\SecurityProviders\SCHANNEL\Protocols\TL
      S 1.2\Server:DisabledByDefault To enable using PowerShell enter the following
      command: New-Item
      'HKLM:\SYSTEM\CurrentControlSet\Control\SecurityProviders\SCHANNEL\Protocols\
      TLS 1.2\Server' -Force | Out-Null New-ItemProperty -path
