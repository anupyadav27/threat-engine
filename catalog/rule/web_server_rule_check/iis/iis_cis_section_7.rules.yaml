  - rule_id: iis.cis.7.l1_ensure_rc4_cipher_suites_is_disabled
    title: "(L1) Ensure RC4 Cipher Suites is Disabled"
    severity: high
    automation_type: automated
    cis_control: '7.9'
    cis_section: '7'
    profile_applicability: "Level 1"
    scope: iis.section_7.l1_ensure_rc4_cipher_suites_is_disabled
    assertion:
      field: enabled
      operator: equals
      expected: "false"
    remediation: >
      Perform the following to disable RC4 40/128, RC4 56/128, RC4 64/128, RC4
      128/128 ciphers: 1. Set the following Registry keys to 0.
      HKLM\SYSTEM\CurrentControlSet\Control\SecurityProviders\SCHANNEL\Ciphers\RC4
      40/128:Enabled
      HKLM\SYSTEM\CurrentControlSet\Control\SecurityProviders\SCHANNEL\Ciphers\RC4
      56/128:Enabled
      HKLM\SYSTEM\CurrentControlSet\Control\SecurityProviders\SCHANNEL\Ciphers\RC4
      64/128:Enabled
      HKLM\SYSTEM\CurrentControlSet\Control\SecurityProviders\SCHANNEL\Ciphers\RC4
      128/128:Enabled To disable using PowerShell enter the following commands:
      (Get-Item
      'HKLM:\').OpenSubKey('SYSTEM\CurrentControlSet\Control\SecurityProviders\SCHA
      NNEL\Ciphers', $true).CreateSubKey('RC4 40/128') New-ItemProperty -path
      'HKLM:\SYSTEM\CurrentControlSet\Control\SecurityProviders\SCHANNEL\Ciphers\RC
      4 40/128' -name 'Enabled' -value '0' -PropertyType 'DWord' -Force | Out-Null
      (Get-Item
      'HKLM:\').OpenSubKey('SYSTEM\CurrentControlSet\Control\SecurityProviders\SCHA
      NNEL\Ciphers', $true).CreateSubKey('RC4 56/128') New-ItemProperty -path
      'HKLM:\SYSTEM\CurrentControlSet\Control\SecurityProviders\SCHANNEL\Ciphers\RC
      4 56/128' -name 'Enabled' -value '0' -PropertyType 'DWord' -Force | Out-Null
      (Get-Item
      'HKLM:\').OpenSubKey('SYSTEM\CurrentControlSet\Control\SecurityProviders\SCHA
      NNEL\Ciphers', $true).CreateSubKey('RC4 64/128') New-ItemProperty -path
      'HKLM:\SYSTEM\CurrentControlSet\Control\SecurityProviders\SCHANNEL\Ciphers\RC
      4 64/128' -name 'Enabled' -value '0' -PropertyType 'DWord' -Force | Out-Null
      (Get-Item
      'HKLM:\').OpenSubKey('SYSTEM\CurrentControlSet\Control\SecurityProviders\SCHA
      NNEL\Ciphers', $true).CreateSubKey('RC4 128/128') New-ItemProperty -path
      'HKLM:\SYSTEM\CurrentControlSet\Control\SecurityProviders\SCHANNEL\Ciphers\RC
      4 128/128' -name 'Enabled' -value '0' -PropertyType 'DWord' -Force | Out-Null
      References: 1. http://msdn.microsoft.com/en-
      us/library/aa374757%28v=vs.85%29.aspx 2. http://technet.microsoft.com/en-
      us/library/dn786433.aspx 3. http://technet.microsoft.com/en-
      us/library/dn786419.aspx 4. https://www.owasp.org/index.php/Testing_for_SSL-
      TLS_%28OWASP-CM- 001%29
    compliance:
