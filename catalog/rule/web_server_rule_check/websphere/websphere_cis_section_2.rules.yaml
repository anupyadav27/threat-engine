tech_type: websphere
category: web_server
cis_benchmark: CIS IBM WebSphere liberty v1.0.0
cis_section: '2'

rules:

  - rule_id: websphere.cis.2.basic_registry_and_quick_start_security_registry
    title: "Ensure Basic Registry and Quick Start security Registry are Removed"
    severity: high
    automation_type: automated
    cis_control: '2.2'
    cis_section: '2'
    profile_applicability: "Level 1"
    scope: websphere.section_2.basic_registry_and_quick_start_security_registry
    assertion:
      field: value
      operator: equals
      expected: "no"
    remediation: >
      Use robust user registries, such as an LDAP registry or a Custom registry for
      production. References: 1.
      https://openliberty.io/docs/latest/reference/feature/appSecurity-2.0.html
    compliance:
      - cis_websphere_liberty_v1_0_0_2_2

  - rule_id: websphere.cis.2.the_ldap_connection_uses_tls
    title: "Ensure that the LDAP connection uses TLS"
    severity: high
    automation_type: automated
    cis_control: '2.3'
    cis_section: '2'
    profile_applicability: "Level 1"
    scope: websphere.section_2.the_ldap_connection_uses_tls
    assertion:
      field: port
      operator: equals
      expected: "on"
    remediation: >
      Set the sslEnabled attribute on all ldapRegistry elements in
      ${server.config.dir}/configDropins/overrides/<any file name>.xml. Also set the
      sslRef attribute to a value that contains the correct keystore and truststore
      configuration for LDAPS communication. <ldapRegistry sslEnabled='true'
      sslRef='LDAPSSLSettings' > </ldapRegistry> <ssl id='LDAPSSLSettings'
      keyStoreRef='LDAPKeyStore' trustStoreRef='LDAPTrustStore' /> Default Value:
      The default value of the sslEnabled attribute on the ldapRegistry element is
      false. References: 1.
      https://openliberty.io/docs/latest/reference/config/ldapRegistry.html 2.
      https://openliberty.io/docs/latest/reference/config/ssl.html
    compliance:
      - cis_websphere_liberty_v1_0_0_2_3


