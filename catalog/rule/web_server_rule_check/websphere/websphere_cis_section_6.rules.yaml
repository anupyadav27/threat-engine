tech_type: websphere
category: web_server
cis_benchmark: CIS IBM WebSphere liberty v1.0.0
cis_section: '6'

rules:

  - rule_id: websphere.cis.6.httpstoken_is_set_in_ws_security_policy
    title: "Ensure 'HttpsToken' is set in WS-Security policy"
    severity: high
    automation_type: automated
    cis_control: '6.1'
    cis_section: '6'
    profile_applicability: "Level 1"
    scope: websphere.section_6.httpstoken_is_set_in_ws_security_policy
    assertion:
      field: port
      operator: equals
      expected: "true"
    remediation: >
      Add HttpsToken as seen in the example to wsdl or policy attachment files for
      each web service. <wsp:Policy ...> ... <sp:TransportBinding> <wsp:Policy>
      <sp:TransportToken> <wsp:Policy> <sp:HttpsToken /> </wsp:Policy>
      </sp:TransportToken> ... </wsp:Policy> </sp:TransportBinding> </wsp:Policy>
      References: 1. https://www.ibm.com/docs/en/was-liberty/base?topic=security-
      web-services- https-transport-policy-assertions
    compliance:
      - cis_websphere_liberty_v1_0_0_6_1

  - rule_id: websphere.cis.6.ensured_hashpassword_is_set_in_usernametoken_ws
    title: "Ensured 'HashPassword' is set in UsernameToken WS- Security policy"
    severity: high
    automation_type: automated
    cis_control: '6.2'
    cis_section: '6'
    profile_applicability: "Level 1"
    scope: websphere.section_6.ensured_hashpassword_is_set_in_usernametoken_ws
    assertion:
      field: value
      operator: equals
      expected: "true"
    remediation: >
      Add HashPassword as seen in the example to wsdl or policy attachment files for
      each web service. <sp:UsernameToken sp:IncludeToken='...'> ... <wsp:Policy>
      <sp:WssUsernameToken11 /> <sp:HashPassword /> </wsp:Policy> ..
      </sp:UsernameToken> References: 1. https://www.ibm.com/docs/en/was-
      liberty/base?topic=level-authentication-web- services-clients-usernametoken
    compliance:
      - cis_websphere_liberty_v1_0_0_6_2

  - rule_id: websphere.cis.6.algorithmsuite_is_set_to_that_strong_algorithms
    title: "Ensure 'AlgorithmSuite' is set to that strong algorithms for signing and encrypting messages with WS-Security policy"
    severity: high
    automation_type: automated
    cis_control: '6.6'
    cis_section: '6'
    profile_applicability: "Level 1"
    scope: websphere.section_6.algorithmsuite_is_set_to_that_strong_algorithms
    assertion:
      field: value
      operator: equals
      expected: "true"
    remediation: >
      Use Basic256Sha256 for Algorithm suite in WS-Security policy as seen in the
      example to wsdl or policy attachment files for each web service.
      <sp:AlgorithmSuite> <wsp:Policy> <sp:Basic256Sha256/> </wsp:Policy>
      </sp:AlgorithmSuite> References: 1. http://docs.oasis-open.org/ws-sx/ws-
      securitypolicy/v1.2/ws-securitypolicy.html
    compliance:
      - cis_websphere_liberty_v1_0_0_6_6

  - rule_id: websphere.cis.6.http_conduit_tlsclientparameters_disablecncheck
    title: "Ensure 'http.conduit.tlsClientParameters.disableCNCheck' is set to 'false' to enable hostname verification for JAX-WS applications"
    severity: high
    automation_type: automated
    cis_control: '6.7'
    cis_section: '6'
    profile_applicability: "Level 1"
    scope: websphere.section_6.http_conduit_tlsclientparameters_disablecncheck
    assertion:
      field: value
      operator: equals
      expected: "true"
    remediation: >
      Add the http.conduit.tlsClientParameters.disableCNCheck property to
      webservice- endpoint element in
      ${server.config.dir}/configDropins/overrides/<any file name>.xml. Set the
      http.conduit.tlsClientParameters.disableCNCheck attributes value to false for
      both provider and client sides. The same setting can be disabled trough WEB-
      INF/ibm-ws-bnd.xml of the web application or META-INF/ibm-ws-bnd.xml of the
      EJB module. ... <!-- ***** Provider Side ***** --> <webApplication ... >
      <webservices-bnd ... > <webservice-endpoint ... > <properties
      http.conduit.tlsClientParameters.disableCNCheck='false' /> </webservice-
      endpoint> </webservices-bnd> </webApplication> ... <!-- ***** Client Side
      (service-ref) ***** --> <webApplication ... > <webservices-bnd ... > <service-
      ref ... > <properties http.conduit.tlsClientParameters.disableCNCheck='false'
      /> </service-ref> </webservices-bnd> </webApplication> Default Value: The
      http.conduit.tlsClientParameters.diableCNCheck property is set to false by
      default. References: 1. https://www.ibm.com/docs/en/was-
      liberty/base?topic=level-enabling-ssl- communication-web-services-access 2.
      https://www.ibm.com/docs/en/was-liberty/base?topic=liberty-ws-bndxml-file
    compliance:
      - cis_websphere_liberty_v1_0_0_6_7


