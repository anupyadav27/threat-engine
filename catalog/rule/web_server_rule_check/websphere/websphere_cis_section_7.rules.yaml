tech_type: websphere
category: web_server
cis_benchmark: CIS IBM WebSphere liberty v1.0.0
cis_section: '7'

rules:

  - rule_id: websphere.cis.7.usessl_attribute_is_set_to_true_for_tls_transport
    title: "Ensure the `useSSL` attribute is set to `true` for TLS Transport"
    severity: high
    automation_type: automated
    cis_control: '7.5'
    cis_section: '7'
    profile_applicability: "Level 1"
    scope: websphere.section_7.usessl_attribute_is_set_to_true_for_tls_transport
    assertion:
      field: port
      operator: equals
      expected: "true"
    remediation: >
      Add the useSSL attribute to wasJmsOutbound element in
      ${server.config.dir}/configDropins/overrides/<any file name>.xml. Set the
      useSSL attributes value to true. <wasJmsOutbound ... useSSL ='true' /> Default
      Value: The useSSL attribute is false by default. References: 1.
      https://openliberty.io/docs/22.0.0.1/reference/config/wasJmsOutbound.html
    compliance:
      - cis_websphere_liberty_v1_0_0_7_5


