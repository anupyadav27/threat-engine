  - rule_id: websphere.cis.4.virtual_hosts_are_defined_to_isolate_applications
    title: "Ensure virtual hosts are defined to isolate applications"
    severity: high
    automation_type: automated
    cis_control: '4.4.22'
    cis_section: '4'
    profile_applicability: "Level 1"
    scope: websphere.section_4.virtual_hosts_are_defined_to_isolate_applications
    assertion:
      field: value
      operator: equals
      expected: "true"
    remediation: >
      Ensure the following to enable virtual hosting. 1. Configure the application
      with virtual-host name in the enterpriseApplication or webApplication elements
      in the [Liberty
      configuration]${server.config.dir}/configDropins/overrides/*.xml
      <webApplication ... > <web-bnd virtual-host name='myApplication1'/>
      </webApplication> Note: The virtual-host name can also be set in the ibm-
      web.bnd.xml file in the application. 2. Configure the application to use the
      specific virtual host in ${server.config.dir}/configDropins/overrides/*.xml.
      <virtualHost id='myApplication1'> <hostAlias>your_host_name:9080</hostAlias>
      </virtualHost> Default Value: WebSphere Liberty provides a default virtual
      host (default_host) that matches requests from any incoming host and port
      combination. References: 1. https://www.ibm.com/docs/en/was-
      liberty/base?topic=liberty-using-virtual-hosts
    compliance:
      - cis_websphere_liberty_v1_0_0_4_4_22

  - rule_id: websphere.cis.4.virtual_hosts_are_defined_to_isolate_jmx
    title: "Ensure virtual hosts are Defined to isolate JMX communication and application traffic"
    severity: high
    automation_type: automated
    cis_control: '4.4.23'
    cis_section: '4'
    profile_applicability: "Level 1"
    scope: websphere.section_4.virtual_hosts_are_defined_to_isolate_jmx
    assertion:
      field: value
      operator: equals
      expected: "true"
    remediation: >
      Ensure the following to enable virtual hosting. 1. Configure the application
      with virtual-host name in the enterpriseApplication or webApplication elements
      in the [Liberty
      configuration]${server.config.dir}/configDropins/overrides/*.xml
      <webApplication ... > <web-bnd virtual-host name='myApplication1'/>
      </webApplication> Note: The virtual-host name can also be set in the ibm-
      web.bnd.xml file in the application. 2. Configure the application to use the
      specific virtual host in ${server.config.dir}/configDropins/overrides/*.xml.
      <virtualHost id='myApplication1'> <hostAlias>your_host_name:9080</hostAlias>
      </virtualHost> Default Value: WebSphere Liberty provides a default virtual
      host (default_host) that matches requests from any incoming host and port
      combination including both the JMX and the application traffic. References: 1.
      https://www.ibm.com/docs/en/was-liberty/base?topic=liberty-using-virtual-hosts
    compliance:
      - cis_websphere_liberty_v1_0_0_4_4_23


