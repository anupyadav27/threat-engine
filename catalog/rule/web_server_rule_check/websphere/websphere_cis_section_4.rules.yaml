tech_type: websphere
category: web_server
cis_benchmark: CIS IBM WebSphere liberty v1.0.0
cis_section: '4'

rules:

  - rule_id: websphere.cis.4.cookiesamesite_samesite_attribute_is_set_to
    title: "Ensure 'cookieSameSite' SameSite attribute is set to 'Strict' for session cookies"
    severity: high
    automation_type: automated
    cis_control: '4.1.1.1'
    cis_section: '4'
    profile_applicability: "Level 1"
    scope: websphere.section_4.cookiesamesite_samesite_attribute_is_set_to
    assertion:
      field: value
      operator: equals
      expected: "true"
    remediation: >
      Add the cookieSameSite attribute to the httpSession element in
      ${server.config.dir}/configDropins/overrides/<any file name>.xml. Set the
      cookieSameSite value to Strict. <httpSession cookieSameSite='Strict'/> Default
      Value: The default value is Disabled. References: 1.
      https://openliberty.io/blog/2020/03/25/set-samesite-attribute-cookies-
      liberty.html
    compliance:
      - cis_websphere_liberty_v1_0_0_4_1_1_1

  - rule_id: websphere.cis.4.cookiedomain_cookie_domain_name_attribute_is_set
    title: "Ensure 'cookieDomain' cookie domain name attribute is set for the session cookies."
    severity: high
    automation_type: automated
    cis_control: '4.1.1.3'
    cis_section: '4'
    profile_applicability: "Level 1"
    scope: websphere.section_4.cookiedomain_cookie_domain_name_attribute_is_set
    assertion:
      field: value
      operator: equals
      expected: "true"
    remediation: >
      Set the cookieDomain attribute in the httpSession element to the appropriate
      domain name in the ${server.config.dir}/configDropins/overrides/<any file
      name>.xml For Example, 'mySubDomain.myCompany.com' <httpSession
      cookieDomain='mySubDomain.myCompany.com' /> References: 1.
      https://openliberty.io/docs/latest/reference/config/httpSession.html
    compliance:
      - cis_websphere_liberty_v1_0_0_4_1_1_3

  - rule_id: websphere.cis.4.cookiesecure_secure_attribute_is_set_to_true
    title: "Ensure 'cookieSecure' secure attribute is set to 'true'"
    severity: high
    automation_type: automated
    cis_control: '4.1.1.4'
    cis_section: '4'
    profile_applicability: "Level 1"
    scope: websphere.section_4.cookiesecure_secure_attribute_is_set_to_true
    assertion:
      field: value
      operator: equals
      expected: "true"
    remediation: >
      Set the cookieSecure attribute to true in the httpSession element in the
      ${server.config.dir}/configDropins/overrides/<any file name>.xml <httpSession
      cookieSecure='true'/> Default Value: The default value is false References: 1.
      https://openliberty.io/docs/latest/reference/config/httpSession.html
    compliance:
      - cis_websphere_liberty_v1_0_0_4_1_1_4

  - rule_id: websphere.cis.4.ssodomainnames_attribute_is_configured_for_the
    title: "Ensure 'ssoDomainNames' attribute is configured for the authentication cookies."
    severity: high
    automation_type: automated
    cis_control: '4.1.2.2'
    cis_section: '4'
    profile_applicability: "Level 1"
    scope: websphere.section_4.ssodomainnames_attribute_is_configured_for_the
    assertion:
      field: value
      operator: exists
      expected: "true"
    remediation: >
      Add the appropriate domain name to the ssoDomainNames attribute in the
      webAppSecurity element in ${server.config.dir}/configDropins/overrides/<any
      file name>.xml. For example, to add mySubDomain.myCompany.com <webAppSecurity
      ssoDomainNames='mySubDomain.myCompany.com'/> References: 1.
      https://openliberty.io/docs/latest/reference/config/webAppSecurity.html
    compliance:
      - cis_websphere_liberty_v1_0_0_4_1_2_2

  - rule_id: websphere.cis.4.setcookiesecureflag_secure_attribute_is_set_to
    title: "Ensure 'setCookieSecureFlag' secure attribute is set to 'true' for the `JWT` cookie."
    severity: high
    automation_type: automated
    cis_control: '4.1.2.3'
    cis_section: '4'
    profile_applicability: "Level 1"
    scope: websphere.section_4.setcookiesecureflag_secure_attribute_is_set_to
    assertion:
      field: value
      operator: equals
      expected: "true"
    remediation: >
      Set the setCookieSecureFlag attribute to true in the jwtSso element in
      ${server.config.dir}/configDropins/overrides/<any file name>.xml. <jwtSso
      setCookieSecureFlag='true'/> Default Value: The default value is true.
      References: 1. https://openliberty.io/docs/latest/reference/config/jwtSso.html
    compliance:
      - cis_websphere_liberty_v1_0_0_4_1_2_3

  - rule_id: websphere.cis.4.ssorequiresssl_secure_attribute_is_set_to_true
    title: "Ensure 'ssoRequiresSSL' secure attribute is set to 'true' for the LTPA Cookies"
    severity: high
    automation_type: automated
    cis_control: '4.1.2.4'
    cis_section: '4'
    profile_applicability: "Level 1"
    scope: websphere.section_4.ssorequiresssl_secure_attribute_is_set_to_true
    assertion:
      field: value
      operator: equals
      expected: "true"
    remediation: >
      Set the ssoRequiresSSL attribute is set to true in the webAppSecurity element
      on ${server.config.dir}/configDropins/overrides/*.xml <webAppSecurity
      ssoRequiresSSL='true' /> References: 1.
      https://openliberty.io/docs/latest/reference/config/webAppSecurity.html
    compliance:
      - cis_websphere_liberty_v1_0_0_4_1_2_4

  - rule_id: websphere.cis.4.ssocookiename_ltpa_cookie_name_is_set
    title: "Ensure 'ssoCookieName' LTPA cookie name is set"
    severity: high
    automation_type: automated
    cis_control: '4.1.2.5'
    cis_section: '4'
    profile_applicability: "Level 1"
    scope: websphere.section_4.ssocookiename_ltpa_cookie_name_is_set
    assertion:
      field: value
      operator: exists
      expected: "true"
    remediation: >
      Set the ssoCookieName attribute to something other than LtpaToken2 in the
      webAppSecurity in the ${server.config.dir}/configDropins/overrides/*.xml For
      Example, obscureCookieName2 <webAppSecurity ssoCookieName='obscureCookieName2'
      /> Set the useOnlyCustomCookieName attribute to true in the webAppSecurity in
      the ${server.config.dir}/configDropins/overrides/*.xml <webAppSecurity
      useOnlyCustomCookieName='true' /> Default Value: • The ssoCookieName attribute
      has a default value of LtpaToken2. • The useOnlyCustomCookieName attribute is
      set to false by default. References: 1.
      https://openliberty.io/docs/latest/reference/config/webAppSecurity.html
    compliance:
      - cis_websphere_liberty_v1_0_0_4_1_2_5

  - rule_id: websphere.cis.4.trackloggedoutssocookies_is_set_to_true
    title: "Ensure 'trackLoggedOutSSOCookies' is set to 'true'"
    severity: high
    automation_type: automated
    cis_control: '4.1.2.7'
    cis_section: '4'
    profile_applicability: "Level 1"
    scope: websphere.section_4.trackloggedoutssocookies_is_set_to_true
    assertion:
      field: value
      operator: equals
      expected: "true"
    remediation: >
      Set trackLoggedOutSSOCookies to true in the webAppSecurity element in the
      ${server.config.dir}/configDropins/overrides/<any file name>.xml
      <webAppSecurity trackLoggedOutSSOCookies='true' /> Default Value: The default
      value of trackLoggedOutSSOCookies is false References: 1.
      https://openliberty.io/docs/latest/reference/config/webAppSecurity.html
    compliance:
      - cis_websphere_liberty_v1_0_0_4_1_2_7

  - rule_id: websphere.cis.4.cookiename_jwt_json_web_token_cookie_name_is_set
    title: "Ensure 'cookieName' JWT (JSON Web Token) cookie name is set"
    severity: high
    automation_type: automated
    cis_control: '4.1.2.8'
    cis_section: '4'
    profile_applicability: "Level 1"
    scope: websphere.section_4.cookiename_jwt_json_web_token_cookie_name_is_set
    assertion:
      field: value
      operator: exists
      expected: "true"
    remediation: >
      Set the cookieName attribute to any obscure value in jwtSso element in the
      ${server.config.dir}/configDropins/overrides/*.xml For Example,
      'obscuredCookieName2' <jwtSso cookieName='obscuredCookieName2' /> Set the
      useOnlyCustomCookieName attribute to true in the webAppSecurity in the
      ${server.config.dir}/configDropins/overrides/*.xml <webAppSecurity
      useOnlyCustomCookieName='true' /> Default Value: • The cookieName attribute
      has a default value of JWT. • The useOnlyCustomCookieName attribute is set to
      false by default. References: 1.
      https://openliberty.io/docs/latest/reference/config/jwtSso.html 2.
      https://openliberty.io/docs/latest/reference/config/webAppSecurity.html 4.1.3
      Securing Other Cookies
    compliance:
      - cis_websphere_liberty_v1_0_0_4_1_2_8

  - rule_id: websphere.cis.4.samesite_samesite_attribute_is_set_to_strict_for
    title: "Ensure 'samesite' SameSite attribute is set to 'Strict' for additional cookies"
    severity: high
    automation_type: automated
    cis_control: '4.1.3.1'
    cis_section: '4'
    profile_applicability: "Level 1"
    scope: websphere.section_4.samesite_samesite_attribute_is_set_to_strict_for
    assertion:
      field: value
      operator: equals
      expected: "true"
    remediation: >
      Set the strict attribute to * in the samesite element in the httpEndpoint
      element in ${server.config.dir}/configDropins/overrides/*.xml. <httpEndpoint
      ... <samesite strict='*'/> </httpEndpoint> References: 1.
      https://openliberty.io/blog/2020/03/25/set-samesite-attribute-cookies-
      liberty.html 4.2 Secure Transport
    compliance:
      - cis_websphere_liberty_v1_0_0_4_1_3_1

  - rule_id: websphere.cis.4.trustdefaultcerts_is_set_to_false
    title: "Ensure 'trustDefaultCerts' is set to 'false'"
    severity: medium
    automation_type: automated
    cis_control: '4.2.1'
    cis_section: '4'
    profile_applicability: "Level 2"
    scope: websphere.section_4.trustdefaultcerts_is_set_to_false
    assertion:
      field: value
      operator: exists
      expected: "true"
    remediation: >
      Add the trustDefaultCerts attribute to all ssl elements to
      ${server.config.dir}/configDropins/overrides/*.xml and set the value to false.
      <ssl trustDefaultCerts='false' /> Default Value: The default configuration
      templates provided by WebSphere Liberty trust public certificates from the
      Java runtime by default, the templates set the trustDefaultCerts attribute to
      true. References: 1.
      https://openliberty.io/docs/latest/reference/feature/transportSecurity-1.0.html
      2. https://openliberty.io/docs/latest/reference/config/ssl.html
    compliance:
      - cis_websphere_liberty_v1_0_0_4_2_1

  - rule_id: websphere.cis.4.sslprotocol_is_set_to_the_latest_versions_of_tls
    title: "Ensure 'sslProtocol' is set to the latest versions of TLS (Transport Layer Security)"
    severity: high
    automation_type: automated
    cis_control: '4.2.2'
    cis_section: '4'
    profile_applicability: "Level 1"
    scope: websphere.section_4.sslprotocol_is_set_to_the_latest_versions_of_tls
    assertion:
      field: version
      operator: equals
      expected: "true"
    remediation: >
      Set the sslProtocol attribute version to the latest supported level in all ssl
      elements to ${server.config.dir}/configDropins/overrides/*.xml. <ssl ...
      sslProtocol='TLSv1.2' /> Default Value: In WebSphere Liberty, when using the
      IBM JRE the default version is SSL_TLSv2 and when using the Oracle JRE the
      default value is SSL when transport security is enabled. References: 1.
      https://openliberty.io/docs/latest/reference/config/ssl.html 2.
      https://openliberty.io/docs/latest/reference/feature/transportSecurity-1.0.html
    compliance:
      - cis_websphere_liberty_v1_0_0_4_2_2

  - rule_id: websphere.cis.4.outbound_tls_configurations_are_specified
    title: "Ensure that outbound TLS configurations are specified"
    severity: high
    automation_type: automated
    cis_control: '4.2.4'
    cis_section: '4'
    profile_applicability: "Level 1"
    scope: websphere.section_4.outbound_tls_configurations_are_specified
    assertion:
      field: value
      operator: exists
      expected: "on"
    remediation: >
      Add the outboundSSLRef attribute to the sslDefault elements to
      ${server.config.dir}/configDropins/overrides/*.xml and set the value to a
      valid ssl configuration id. <sslDefault outboundSSLRef='alternateSSLSettings'
      /> Also add host and port attributes on the outboundConnection elements for
      all ssl elements used for outbound requests to
      ${server.config.dir}/configDropins/overrides/*.xml and set the values to hosts
      and ports used by the application or server. <ssl id='alternateSSLSettings'
      ... <outboundConnection host='hostname1' port='020' /> <outboundConnection
      host='hostname2' port='9020' /> </ssl> References: 1.
      https://openliberty.io/docs/latest/reference/config/ssl.html 2.
      https://openliberty.io/docs/latest/reference/feature/transportSecurity-1.0.html
    compliance:
      - cis_websphere_liberty_v1_0_0_4_2_4

  - rule_id: websphere.cis.4.secure_ciphers_suites_are_configured
    title: "Ensure that secure ciphers suites are configured"
    severity: high
    automation_type: automated
    cis_control: '4.2.5'
    cis_section: '4'
    profile_applicability: "Level 1"
    scope: websphere.section_4.secure_ciphers_suites_are_configured
    assertion:
      field: value
      operator: exists
      expected: "true"
    remediation: >
      Add the securityLevel attribute to all ssl elements to
      ${server.config.dir}/configDropins/overrides/*.xml and set the value to HIGH.
      Also add the enforceCipherOrder attribute and set the value to true. <ssl ...
      securityLevel='HIGH' enforceCipherOrder='true' /> Or add the enabledCiphers
      attribute to all ssl elements to
      ${server.config.dir}/configDropins/overrides/*.xml and set the value to space
      separated list of appropriate strong ciphers in the preferred order. For
      example, <ssl ... enabledCiphers='TLS_AES_256_GCM_SHA384
      SSL_ECDHE_ECDSA_WITH_AES_256_GCM_SHA384 SSL_ECDHE_RSA_WITH_AES_256_GCM_SHA384'
      enforceCipherOrder='true' /> Default Value: WebSphere Liberty sets the
      securityLevel attribute to HIGH and the enforceCipherOrder attribute is set to
      false by default. References: 1.
      https://openliberty.io/docs/latest/reference/config/ssl.html 2.
      https://www.ibm.com/docs/en/sdk-java-technology/8?topic=suites-cipher 3.
      https://docs.oracle.com/en/java/javase/11/docs/specs/security/standard-
      names.html#jsse-cipher-suite-names
    compliance:
      - cis_websphere_liberty_v1_0_0_4_2_5

  - rule_id: websphere.cis.4.hostname_verification_for_tls_communication_is
    title: "Ensure Hostname verification for TLS communication is enabled"
    severity: high
    automation_type: automated
    cis_control: '4.2.7'
    cis_section: '4'
    profile_applicability: "Level 1"
    scope: websphere.section_4.hostname_verification_for_tls_communication_is
    assertion:
      field: enabled
      operator: equals
      expected: "true"
    remediation: >
      Enable hostname verification in the SSL configuration by adding the
      verifyHostname attribute to the ssl configuration element in
      ${server.config.dir}/configDropins/overrides/<any file name>.xml <ssl ...
      verifyHostname='true' /> For JAX-RS client, enable hostname verification in
      the webTarget element by adding the disableCNCheck attribute in
      ${server.config.dir}/configDropins/overrides/<any file name>.xml <webTarget
      ... disableCNCheck='false' /> Default Value: • The default value of the
      verifyHostname attribute is false • The default value of the disableCNCheck
      attribute is false References: 1.
      https://openliberty.io/blog/2019/06/21/microprofile-rest-client-19006.html 2.
      https://openliberty.io/docs/latest/reference/config/ssl.html
    compliance:
      - cis_websphere_liberty_v1_0_0_4_2_7

  - rule_id: websphere.cis.4.ca_certificate_authority_certificates_are_used
    title: "Ensure that CA (Certificate Authority) certificates are used"
    severity: high
    automation_type: automated
    cis_control: '4.2.8'
    cis_section: '4'
    profile_applicability: "Level 1"
    scope: websphere.section_4.ca_certificate_authority_certificates_are_used
    assertion:
      field: value
      operator: equals
      expected: "true"
    remediation: >
      Add non self signed CA certificates as described here.
    compliance:
      - cis_websphere_liberty_v1_0_0_4_2_8

  - rule_id: websphere.cis.4.ocsp_enable_certificate_revocation_is_set_to_true
    title: "Ensure 'ocsp.enable' certificate revocation is set to 'true'"
    severity: high
    automation_type: automated
    cis_control: '4.2.9'
    cis_section: '4'
    profile_applicability: "Level 1"
    scope: websphere.section_4.ocsp_enable_certificate_revocation_is_set_to_true
    assertion:
      field: value
      operator: equals
      expected: "true"
    remediation: >
      Add ocsp.enable=true in $JAVA_HOME/jre/lib/security/java.security file.
      ocsp.enable=true Default Value: Default value depends on JDK distribution.
    compliance:
      - cis_websphere_liberty_v1_0_0_4_2_9

  - rule_id: websphere.cis.4.mutual_tls_authentication_is_enabled
    title: "Ensure mutual TLS authentication is enabled"
    severity: medium
    automation_type: automated
    cis_control: '4.2.10'
    cis_section: '4'
    profile_applicability: "Level 2"
    scope: websphere.section_4.mutual_tls_authentication_is_enabled
    assertion:
      field: enabled
      operator: equals
      expected: "true"
    remediation: >
      Add these settings to ${server.config.dir}/configDropins/overrides/<any file
      name>.xml for direct login to WebSphere Liberty. <httpDispatcher ...
      trustedHeaderOrigin=“none”/> <ssl ... clientAuthentication='true' /> For login
      in conjunction with a proxy, add the following. Replace the ip addresses with
      your values. <httpDispatcher ... trustedHeaderOrigin=“10.20.30.40,
      10.20.50.60”/> <ssl ... clientAuthentication='true' /> References: 1.
      https://www.ibm.com/support/pages/how-setup-liberty-use-certificate-based-
      authentication
    compliance:
      - cis_websphere_liberty_v1_0_0_4_2_10

  - rule_id: websphere.cis.4.signaturealgorithm_asymmetric_key_algorithm_is
    title: "Ensure 'signatureAlgorithm' asymmetric key algorithm is set for encrypting the JSON Web Tokens"
    severity: high
    automation_type: automated
    cis_control: '4.3.1'
    cis_section: '4'
    profile_applicability: "Level 1"
    scope: websphere.section_4.signaturealgorithm_asymmetric_key_algorithm_is
    assertion:
      field: value
      operator: exists
      expected: "true"
    remediation: >
      Add the signatureAlgorithm attribute to the openidConnectProvider element and
      set it to a strong algorithm, such as RS256 in
      ${server.config.dir}/configDropins/overrides/*.xml. <openidConnectProvider
      signatureAlgorithm='RS256' /> <openidConnectClient signatureAlgorithm='RS256'
      /> Default Value: The WebSphere Liberty OpenID Connect Server Provider signs
      the token ID by default with the signature algorithm of HS256. References: 1.
      https://openliberty.io/docs/latest/reference/config/openidConnectProvider.html
    compliance:
      - cis_websphere_liberty_v1_0_0_4_3_1

  - rule_id: websphere.cis.4.tokenreuse_is_set_to_false
    title: "Ensure 'tokenReuse' is set to 'false'"
    severity: high
    automation_type: automated
    cis_control: '4.3.3'
    cis_section: '4'
    profile_applicability: "Level 1"
    scope: websphere.section_4.tokenreuse_is_set_to_false
    assertion:
      field: value
      operator: equals
      expected: "true"
    remediation: >
      Add the tokenReuse attribute to the openidConnectClient element to
      ${server.config.dir}/configDropins/overrides/*.xml and set it to false to
      prevent token reuse on JSON Web Tokens. <openidConnectClient
      tokenReuse='false' /> Default Value: The tokenReuse attribute is set to false
      by default. References: 1.
      https://openliberty.io/docs/latest/reference/config/openidConnectClient.html
    compliance:
      - cis_websphere_liberty_v1_0_0_4_3_3

  - rule_id: websphere.cis.4.disableisschecking_issuer_claim_is_set_to_false
    title: "Ensure 'disableIssChecking' issuer claim is set to 'false' in the RP (Relying Party)"
    severity: high
    automation_type: automated
    cis_control: '4.3.4'
    cis_section: '4'
    profile_applicability: "Level 1"
    scope: websphere.section_4.disableisschecking_issuer_claim_is_set_to_false
    assertion:
      field: value
      operator: equals
      expected: "true"
    remediation: >
      Add the disableIssChecking attribute to the openidConnectClient element to
      ${server.config.dir}/configDropins/overrides/*.xml. Set the disableIssChecking
      attribute value to false to ensure that issuer claim checking for JSON Web
      Tokens occurs. <openidConnectClient disableIssChecking='false' /> Default
      Value: The disableIssChecking attribute is set to false by default.
      References: 1.
      https://openliberty.io/docs/latest/reference/config/openidConnectClient.html
    compliance:
      - cis_websphere_liberty_v1_0_0_4_3_4

  - rule_id: websphere.cis.4.hostnameverificationenabled_is_set_to_true_in
    title: "Ensure 'hostNameVerificationEnabled' is set to 'true' in OIDC Relying Party (RP)"
    severity: high
    automation_type: automated
    cis_control: '4.3.5'
    cis_section: '4'
    profile_applicability: "Level 1"
    scope: websphere.section_4.hostnameverificationenabled_is_set_to_true_in
    assertion:
      field: enabled
      operator: equals
      expected: "true"
    remediation: >
      Add the hostNameVerificationEnabled attribute to the openidConnectClient
      element to ${server.config.dir}/configDropins/overrides/*.xml and set it to
      true to do hostname verification for JSON Web Tokens. <openidConnectClient
      hostNameVerificationEnabled='true' /> Default Value: The WebSphere Liberty
      hostname verification for an OpenID Connect relying party is disabled by
      default, hostNameVerificationEnabled is set to false. References: 1.
      https://openliberty.io/docs/latest/reference/config/openidConnectClient.html
    compliance:
      - cis_websphere_liberty_v1_0_0_4_3_5

  - rule_id: websphere.cis.4.signaturealgorithm_is_set_to_a_secure_algorithm
    title: "Ensure 'signatureAlgorithm' is set to a secure algorithm in OIDC Relying Party (RP)"
    severity: high
    automation_type: automated
    cis_control: '4.3.6'
    cis_section: '4'
    profile_applicability: "Level 1"
    scope: websphere.section_4.signaturealgorithm_is_set_to_a_secure_algorithm
    assertion:
      field: value
      operator: equals
      expected: "true"
    remediation: >
      Add the signatureAlgorithm attribute to the openidConnectClient element to
      ${server.config.dir}/configDropins/overrides/*.xml and set it a valid
      signature algorithm type, for example RS256, to enable token signing for JSON
      Web Tokens. <openidConnectClient signatureAlgorithm='RS256' /> Default Value:
      The signatureAlgorithm attribute is set to HS256 by default. References: 1.
      https://openliberty.io/docs/latest/reference/config/openidConnectClient.html
    compliance:
      - cis_websphere_liberty_v1_0_0_4_3_6

  - rule_id: websphere.cis.4.httpsrequired_is_set_to_true_in_oidc_relying
    title: "Ensure 'httpsRequired' is set to 'true' in OIDC Relying Party (RP)"
    severity: high
    automation_type: automated
    cis_control: '4.3.8'
    cis_section: '4'
    profile_applicability: "Level 1"
    scope: websphere.section_4.httpsrequired_is_set_to_true_in_oidc_relying
    assertion:
      field: value
      operator: equals
      expected: "true"
    remediation: >
      Add the httpsRequired attribute to the openidConnectClient element to
      ${server.config.dir}/configDropins/overrides/*.xml and set it to true to
      ensure that security transport is used for JSON Web Tokens.
      <openidConnectClient httpsRequired='true' /> Default Value: The httpsRequired
