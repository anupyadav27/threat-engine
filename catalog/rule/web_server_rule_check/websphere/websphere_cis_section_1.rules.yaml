tech_type: websphere
category: web_server
cis_benchmark: CIS IBM WebSphere liberty v1.0.0
cis_section: '1'

rules:

  - rule_id: websphere.cis.1.automated_configuration_updates_are_disabled
    title: "Ensure automated configuration updates are disabled"
    severity: high
    automation_type: automated
    cis_control: '1.6'
    cis_section: '1'
    profile_applicability: "Level 1"
    scope: websphere.section_1.automated_configuration_updates_are_disabled
    assertion:
      field: enabled
      operator: equals
      expected: "false"
    remediation: >
      Add the updateTrigger attribute to the config element in
      ${server.config.dir}/configDropins/overrides/*.xmland set to mbean or
      disabled. <config updateTrigger='mbean' /> Default Value: Liberty enables
      dynamic configuration updates by default. The default settings for
      configuration monitoring are as follows: <config updateTrigger='polled'
      monitorInterval='500ms'/> References: 1.
      https://openliberty.io/docs/latest/reference/config/server-configuration-
      overview.html#_dynamic_updates 2. https://www.ibm.com/docs/en/was-
      liberty/base?topic=SSEQTP_liberty/com.ibm.websphere.wlp.zseries.doc/ae/twlp_
      setup_dyn_upd.html 3.
      https://openliberty.io/docs/latest/reference/config/config.html
    compliance:
      - cis_websphere_liberty_v1_0_0_1_6


