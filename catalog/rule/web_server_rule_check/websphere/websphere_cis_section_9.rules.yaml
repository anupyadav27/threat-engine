tech_type: websphere
category: web_server
cis_benchmark: CIS IBM WebSphere liberty v1.0.0
cis_section: '9'

rules:

  - rule_id: websphere.cis.9.location_attribute_in_the_ssl_configurations
    title: "Ensure the location attribute in the SSL configurations points to a valid SAF Keyring containing SSL/TLS certificates"
    severity: high
    automation_type: automated
    cis_control: '9.2'
    cis_section: '9'
    profile_applicability: "Level 1"
    scope: websphere.section_9.location_attribute_in_the_ssl_configurations
    assertion:
      field: value
      operator: equals
      expected: "true"
    remediation: >
      Configure the location attribute in the keyStore elements referenced by the
      SSL configurations to point to a valid SAF Keyring location that contains the
      SSL/TLS certificates and set the fileBased attribute to false in
      ${server.config.dir}/configDropins/overrides/<any file name>.xml. <keyStore
      id='DefaultKeyStore' location='safkeyring:///Keyring.LIBERTY' type='JCERACFKS'
      fileBased='false' readOnly='true' /> <keyStore id='DefaultTrustStore'
      location='safkeyring:///Keyring.LIBERTY' type='JCERACFKS' fileBased='false'
      readOnly='true' /> References: 1. https://www.ibm.com/docs/en/was-
      liberty/base?topic=liberty-enabling-ssl- communication-in
    compliance:
      - cis_websphere_liberty_v1_0_0_9_2

  - rule_id: websphere.cis.9.safregistry_is_configured
    title: "Ensure 'safRegistry' is configured"
    severity: high
    automation_type: automated
    cis_control: '9.4'
    cis_section: '9'
    profile_applicability: "Level 1"
    scope: websphere.section_9.safregistry_is_configured
    assertion:
      field: value
      operator: exists
      expected: "true"
    remediation: >
      Configure the zosSecurity-1.0 feature and set the safRegistry element in
      ${server.config.dir}/configDropins/overrides/<any file name>.xml.
      <feature>zosSecurity-1.0</feature> <safRegistry realm='myrealm' /> References:
      1. https://www.ibm.com/docs/el/was-liberty/zos?topic=liberty-activating-
      configuring- saf-registry-zos
    compliance:
      - cis_websphere_liberty_v1_0_0_9_4


