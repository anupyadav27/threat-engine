tech_type: websphere
category: web_server
cis_benchmark: CIS IBM WebSphere liberty v1.0.0
cis_section: '3'

rules:

  - rule_id: websphere.cis.3.automatic_applications_updates_are_disabled
    title: "Ensure that automatic applications updates are disabled"
    severity: high
    automation_type: automated
    cis_control: '3.1'
    cis_section: '3'
    profile_applicability: "Level 1"
    scope: websphere.section_3.automatic_applications_updates_are_disabled
    assertion:
      field: enabled
      operator: equals
      expected: "false"
    remediation: >
      Add the dropinsEnabled attribute and the updateTrigger attributes to the
      applicationMonitor element to
      ${server.config.dir}/configDropins/overrides/*.xml. Set the dropinsEnabled to
      false to stop usage of dropins folder. Set the updateTrigger to mbean or
      disabled. <applicationMonitor updateTrigger='mbean' dropinsEnabled='false' />
      Default Value: Liberty enables dynamic application by default. The default
      settings for application monitoring are as follows: <applicationMonitor
      updateTrigger='polled' pollingRate='500ms' dropins='dropins'
      dropinsEnabled='true'/> References: 1.
      https://openliberty.io/docs/latest/reference/config/applicationMonitor.html 2.
      https://www.ibm.com/docs/en/was-
      liberty/base?topic=SSEQTP_liberty/com.ibm.websphere.wlp.zseries.doc/ae/twlp_
      setup_dyn_upd.html
    compliance:
      - cis_websphere_liberty_v1_0_0_3_1

  - rule_id: websphere.cis.3.jdk_security_manager_is_enabled
    title: "Ensure JDK Security Manager is Enabled"
    severity: medium
    automation_type: automated
    cis_control: '3.2'
    cis_section: '3'
    profile_applicability: "Level 2"
    scope: websphere.section_3.jdk_security_manager_is_enabled
    assertion:
      field: enabled
      operator: equals
      expected: "true"
    remediation: >
      Enable the websphere.java.security property in
      ${server.config.dir}/bootstrap.properties file websphere.java.security and
      also confirm that the appropriate permissions are granted in the application's
      permission.xml file and/or in the javaPermission element specified in
      ${server.config.dir}/configDropins/overrides/*.xml. For example,
      <javaPermission className='java.security.PropertyPermission' name='os.name'
      actions='read' restriction='true' /> Default Value: Security Manager is not
      enabled by default. References: 1. https://www.ibm.com/docs/en/was-
      liberty/base?topic=security-java-2 2. https://openjdk.java.net/jeps/411 3.
      https://docs.oracle.com/en/java/javase/17/docs/api/java.base/java/lang/SecurityM
      anager.html 4 Web Applications Security considerations that apply to Web
      applications like servlets, jsps etc. 4.1 Securing Cookies 4.1.1 Securing
      Session Cookies JSESSIONID is a cookie generated by Servlet containers and
      used for session management in J2EE web applications for HTTP protocol
    compliance:
      - cis_websphere_liberty_v1_0_0_3_2


