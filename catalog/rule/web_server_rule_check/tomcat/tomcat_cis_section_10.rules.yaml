tech_type: tomcat
category: web_server
cis_benchmark: CIS Apache Tomcat 9 v1.2.0
cis_section: '10'

rules:

  - rule_id: tomcat.cis.10.configure_connectiontimeout
    title: "Configure connectionTimeout"
    severity: medium
    automation_type: automated
    cis_control: '10.9'
    cis_section: '10'
    profile_applicability: ""
    scope: tomcat.section_10.configure_connectiontimeout
    assertion:
      field: value
      operator: equals
      expected: "true"
    remediation: >
      Set the connectionTimeout for each connector in $CATALINA_HOME/conf/server.xml
      ensure to the optimal number of milliseconds based on hardware resources,
      load, and number of concurrent connections. connectionTimeout='60000' Default
      Value: By default this is set to 60000 (i.e. 60 seconds). References: 1.
      https://tomcat.apache.org/tomcat-9.0-doc/config/http.html CIS Controls:
    compliance:
      - cis_tomcat_9_v1_2_0_10_9

  - rule_id: tomcat.cis.10.configure_maxhttpheadersize
    title: "Configure maxHttpHeaderSize"
    severity: medium
    automation_type: automated
    cis_control: '10.10'
    cis_section: '10'
    profile_applicability: ""
    scope: tomcat.section_10.configure_maxhttpheadersize
    assertion:
      field: value
      operator: equals
      expected: "true"
    remediation: >
      Set maxHttpHeaderSize for each connector in $CATALINA_HOME/conf/server.xml to
      the appropriate setting. maxHttpHeaderSize=”8192” Default Value: The default
      is 8192 bytes. References: 1.
      https://tomcat.apache.org/tomcat-9.0-doc/config/http.html CIS Controls:
    compliance:
      - cis_tomcat_9_v1_2_0_10_10

  - rule_id: tomcat.cis.10.force_ssl_for_all_applications
    title: "Force SSL for all applications"
    severity: medium
    automation_type: automated
    cis_control: '10.11'
    cis_section: '10'
    profile_applicability: ""
    scope: tomcat.section_10.force_ssl_for_all_applications
    assertion:
      field: value
      operator: equals
      expected: "true"
    remediation: >
      Set transport-guarantee to CONFIDENTIAL in $CATALINA_HOME/conf/web.xml: <user-
      data-constraint> <transport-guarantee>CONFIDENTIAL</transport-guarantee>
      </user-data-constraint> Default Value: By default this configuration is not
      present. References: 1. https://www.owasp.org/index.php/Securing_tomcat CIS
      Controls:
    compliance:
      - cis_tomcat_9_v1_2_0_10_11

  - rule_id: tomcat.cis.10.do_not_allow_symbolic_linking
    title: "Do not allow symbolic linking"
    severity: medium
    automation_type: automated
    cis_control: '10.12'
    cis_section: '10'
    profile_applicability: ""
    scope: tomcat.section_10.do_not_allow_symbolic_linking
    assertion:
      field: value
      operator: equals
      expected: "true"
    remediation: >
      In all context.xml, set the allowLinking attribute to false: <Context ...
      <Resources ... allowLinking=”false” /> ... </Context> Default Value: By
      default allowLinking has a value of false. References: 1.
      https://tomcat.apache.org/tomcat-9.0-doc/config/resources.html 2.
      https://tomcat.apache.org/tomcat-9.0-doc/config/context.html CIS Controls:
    compliance:
      - cis_tomcat_9_v1_2_0_10_12

  - rule_id: tomcat.cis.10.do_not_allow_cross_context_requests
    title: "Do not allow cross context requests"
    severity: medium
    automation_type: automated
    cis_control: '10.14'
    cis_section: '10'
    profile_applicability: ""
    scope: tomcat.section_10.do_not_allow_cross_context_requests
    assertion:
      field: value
      operator: equals
      expected: "true"
    remediation: >
      Set the crossContext attribute in all context.xml files to false: <Context ...
      crossContext=”false” /> Default Value: By default crossContext has a value of
      false. References: 1.
      https://tomcat.apache.org/tomcat-9.0-doc/config/context.html CIS Controls:
    compliance:
      - cis_tomcat_9_v1_2_0_10_14

  - rule_id: tomcat.cis.10.do_not_resolve_hosts_on_logging_valves
    title: "Do not resolve hosts on logging valves"
    severity: medium
    automation_type: automated
    cis_control: '10.15'
    cis_section: '10'
    profile_applicability: ""
    scope: tomcat.section_10.do_not_resolve_hosts_on_logging_valves
    assertion:
      field: value
      operator: equals
      expected: "true"
    remediation: >
      In Connector elements, set the enableLookups attribute to false or remove it.
      <Connector ... enableLookups='false' /> Default Value: By default, DNS lookups
      are disabled. References: 1.
      https://tomcat.apache.org/tomcat-9.0-doc/config/valve.html 2.
      https://tomcat.apache.org/tomcat-9.0-doc/config/http.html CIS Controls:
    compliance:
      - cis_tomcat_9_v1_2_0_10_15

  - rule_id: tomcat.cis.10.enable_memory_leak_listener
    title: "Enable memory leak listener"
    severity: medium
    automation_type: automated
    cis_control: '10.16'
    cis_section: '10'
    profile_applicability: ""
    scope: tomcat.section_10.enable_memory_leak_listener
    assertion:
      field: value
      operator: equals
      expected: "true"
    remediation: >
      Uncomment the JRE Memory Leak Prevention Listener in
      $CATALINA_HOME/conf/server.xml <Listener
      className='org.apache.catalina.core.JreMemoryLeakPreventionListener' />
      References: 1. https://tomcat.apache.org/tomcat-9.0-
      doc/config/listeners.html#JRE_Memory_Leak_Prevention_Listener_-
      _org.apache.catalina.core.JreMemoryLeakPreventionListener CIS Controls:
    compliance:
      - cis_tomcat_9_v1_2_0_10_16

  - rule_id: tomcat.cis.10.setting_security_lifecycle_listener
    title: "Setting Security Lifecycle Listener"
    severity: medium
    automation_type: automated
    cis_control: '10.17'
    cis_section: '10'
    profile_applicability: ""
    scope: tomcat.section_10.setting_security_lifecycle_listener
    assertion:
      field: value
      operator: equals
      expected: "on"
    remediation: >
      
    compliance:
      - cis_tomcat_9_v1_2_0_10_17

  - rule_id: tomcat.cis.10.use_the_logeffectivewebxml_and_metadata_complete
    title: "Use the logEffectiveWebXml and metadata-complete settings for deploying applications in production"
    severity: medium
    automation_type: automated
    cis_control: '10.18'
    cis_section: '10'
    profile_applicability: ""
    scope: tomcat.section_10.use_the_logeffectivewebxml_and_metadata_complete
    assertion:
      field: value
      operator: equals
      expected: "true"
    remediation: >
      • Set the metadata-complete value in the web.xml in each of the applications
      to true. Note: The metadata-complete option is not enough to disable all of
      annotation scanning. If there is a ServletContainerInitializer with a
      @HandlesTypes annotation, Tomcat has to scan your application for classes that
      use annotations or interfaces specified in that annotation. • Set the
      logEffectiveWebXml value in the context.xml in each of the application to
      true. Default Value: If logEffectiveWebXml and/or metadata-complete is/are not
      specified, the default value is false. References: 1.
      https://tomcat.apache.org/tomcat-9.0-doc/config/context.html 2.
      https://alexismp.wordpress.com/2010/07/28/servlet-3-0-fragments-and-web-xml-
      to-rule-them-all/ CIS Controls:
    compliance:
      - cis_tomcat_9_v1_2_0_10_18


