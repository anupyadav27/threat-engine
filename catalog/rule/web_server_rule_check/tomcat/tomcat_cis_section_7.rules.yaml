tech_type: tomcat
category: web_server
cis_benchmark: CIS Apache Tomcat 9 v1.2.0
cis_section: '7'

rules:

  - rule_id: tomcat.cis.7.application_specific_logging
    title: "Application specific logging"
    severity: medium
    automation_type: automated
    cis_control: '7.1'
    cis_section: '7'
    profile_applicability: ""
    scope: tomcat.section_7.application_specific_logging
    assertion:
      field: value
      operator: equals
      expected: "true"
    remediation: >
      
    compliance:
      - cis_tomcat_9_v1_2_0_7_1

  - rule_id: tomcat.cis.7.specify_file_handler_in_logging_properties_files
    title: "Specify file handler in logging.properties files"
    severity: medium
    automation_type: automated
    cis_control: '7.2'
    cis_section: '7'
    profile_applicability: ""
    scope: tomcat.section_7.specify_file_handler_in_logging_properties_files
    assertion:
      field: value
      operator: equals
      expected: "true"
    remediation: >
      Add the following entries, replacing <file_handler> with either FileHandler or
      AsyncFileHandler, to your logging.properties file if they do not exist.
      handlers=1catalina.org.apache.juli.<file_handler>,
      2localhost.org.apache.juli.<file_handler>,
      3manager.org.apache.juli.<file_handler>, 4host-
      manager.org.apache.juli.<file_handler>, java.util.logging.ConsoleHandler
      Ensure logging is not off and set the <logging_level> to the desired level
      (SEVERE, WARNING, INFO, CONFIG, FINE, FINER, FINEST or ALL), for example:
      org.apache.juli.FileHandler.level=<logging_level> Default Value: No value for
      new applications by default. References: 1.
      https://tomcat.apache.org/tomcat-9.0-doc/logging.html CIS Controls:
    compliance:
      - cis_tomcat_9_v1_2_0_7_2

  - rule_id: tomcat.cis.7.classname_is_set_correctly_in_context_xml
    title: "Ensure className is set correctly in context.xml"
    severity: medium
    automation_type: automated
    cis_control: '7.3'
    cis_section: '7'
    profile_applicability: ""
    scope: tomcat.section_7.classname_is_set_correctly_in_context_xml
    assertion:
      field: value
      operator: equals
      expected: "true"
    remediation: >
      Add the following statement into the $CATALINA_BASE/webapps/ <app_name> /META-
      INF/context.xml file if it does not already exist. <Valve
      className='org.apache.catalina.valves.AccessLogValve'
      directory='$CATALINA_HOME/logs/' prefix='access_log' fileDateFormat='yyyy-MM-
      dd.HH' suffix='.log' pattern='%h %t %H cookie:%{SESSIONID}c
      request:%{SESSIONID}r %m %U %s %q %r' /> Default Value: Does not exist by
      default. References: 1.
      https://tomcat.apache.org/tomcat-9.0-doc/config/valve.html CIS Controls:
    compliance:
      - cis_tomcat_9_v1_2_0_7_3

  - rule_id: tomcat.cis.7.pattern_in_context_xml_is_correct
    title: "Ensure pattern in context.xml is correct"
    severity: medium
    automation_type: automated
    cis_control: '7.5'
    cis_section: '7'
    profile_applicability: ""
    scope: tomcat.section_7.pattern_in_context_xml_is_correct
    assertion:
      field: value
      operator: equals
      expected: "true"
    remediation: >
      Add the following statement into the $CATALINA_BASE/webapps/ <app_name> /META-
      INF/context.xml file if it does not already exist. <Valve
      className='org.apache.catalina.valves.AccessLogValve'
      directory='$CATALINA_HOME/logs/' prefix='access_log' fileDateFormat='yyyy-MM-
      dd.HH' suffix='.log' pattern='%h %t %H cookie:%{SESSIONID}c
      request:%{SESSIONID}r %m %U %s %q %r' /> Default Value: Does not exist by
      default. References: 1.
      https://tomcat.apache.org/tomcat-9.0-doc/config/valve.html CIS Controls:
    compliance:
      - cis_tomcat_9_v1_2_0_7_5

  - rule_id: tomcat.cis.7.directory_in_logging_properties_is_a_secure
    title: "Ensure directory in logging.properties is a secure location"
    severity: medium
    automation_type: automated
    cis_control: '7.6'
    cis_section: '7'
    profile_applicability: ""
    scope: tomcat.section_7.directory_in_logging_properties_is_a_secure
    assertion:
      field: value
      operator: equals
      expected: "true"
    remediation: >
      Perform the following: 1. Add the following properties into your
      logging.properties file if they do not exist
      <application_name>.org.apache.juli.AsyncFileHandler.directory=<log_loca tion>
      <application_name>.org.apache.juli.AsyncFileHandler.prefix=<application _name>
      2. Set the location pointed to by the directory attribute to be owned by
      tomcat_admin:tomcat with permissions of o-rwx. # chown tomcat_admin:tomcat
      <log_location> # chmod o-rwx <log_location> Default Value: The directory
      location is configured to store logs in $CATALINA_BASE/logs. CIS Controls:
    compliance:
      - cis_tomcat_9_v1_2_0_7_6


