tech_type: tomcat
category: web_server
cis_benchmark: CIS Apache Tomcat 9 v1.2.0
cis_section: '3'

rules:

  - rule_id: tomcat.cis.3.set_a_nondeterministic_shutdown_command_value
    title: "Set a nondeterministic Shutdown command value"
    severity: medium
    automation_type: automated
    cis_control: '3.1'
    cis_section: '3'
    profile_applicability: ""
    scope: tomcat.section_3.set_a_nondeterministic_shutdown_command_value
    assertion:
      field: value
      operator: equals
      expected: "true"
    remediation: >
      Perform the following to set a nondeterministic value for the shutdown
      attribute. Update the shutdown attribute in $CATALINA_HOME/conf/server.xml as
      follows: <Server port='8005' shutdown='NONDETERMINISTICVALUE'> Note:
      NONDETERMINISTICVALUE should be replaced with a sequence of random characters.
      Default Value: The default value for the shutdown attribute is SHUTDOWN.
      References: 1. https://tomcat.apache.org/tomcat-9.0-doc/config/server.html CIS
      Controls:
    compliance:
      - cis_tomcat_9_v1_2_0_3_1

  - rule_id: tomcat.cis.3.disable_the_shutdown_port
    title: "Disable the Shutdown port"
    severity: medium
    automation_type: automated
    cis_control: '3.2'
    cis_section: '3'
    profile_applicability: ""
    scope: tomcat.section_3.disable_the_shutdown_port
    assertion:
      field: port
      operator: equals
      expected: "true"
    remediation: >
      Set the port to -1 in the $CATALINA_HOME/conf/server.xml to disable the
      shutdown port: <Server port='-1' shutdown='SHUTDOWN'> Default Value: The
      shutdown port is enabled on TCP port 8005, bound to the loopback address.
      References: 1. https://tomcat.apache.org/tomcat-9.0-doc/config/server.html CIS
      Controls:
    compliance:
      - cis_tomcat_9_v1_2_0_3_2


