tech_type: tomcat
category: web_server
cis_benchmark: CIS Apache Tomcat 9 v1.2.0
cis_section: '5'

rules:

  - rule_id: tomcat.cis.5.use_secure_realms
    title: "Use secure Realms"
    severity: medium
    automation_type: automated
    cis_control: '5.1'
    cis_section: '5'
    profile_applicability: ""
    scope: tomcat.section_5.use_secure_realms
    assertion:
      field: value
      operator: equals
      expected: "true"
    remediation: >
      
    compliance:
      - cis_tomcat_9_v1_2_0_5_1

  - rule_id: tomcat.cis.5.use_lockout_realms
    title: "Use LockOut Realms"
    severity: medium
    automation_type: automated
    cis_control: '5.2'
    cis_section: '5'
    profile_applicability: ""
    scope: tomcat.section_5.use_lockout_realms
    assertion:
      field: value
      operator: equals
      expected: "true"
    remediation: >
      Create a lockout realm wrapping the main realm similar to the example below:
      <Realm className='org.apache.catalina.realm.LockOutRealm' failureCount='3'
      lockOutTime='600' cacheSize='1000' cacheRemovalWarningTime='3600'> <Realm
      className='org.apache.catalina.realm.DataSourceRealm' dataSourceName=... />
      </Realm> References: 1. http://tomcat.apache.org/tomcat-9.0-doc/realm-
      howto.html 2. http://tomcat.apache.org/tomcat-9.0-doc/config/realm.html CIS
      Controls:
    compliance:
      - cis_tomcat_9_v1_2_0_5_2


