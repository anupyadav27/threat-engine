tech_type: tomcat
category: web_server
cis_benchmark: CIS Apache Tomcat 9 v1.2.0
cis_section: '6'

rules:

  - rule_id: tomcat.cis.6.setup_client_cert_authentication
    title: "Setup Client-cert Authentication"
    severity: medium
    automation_type: automated
    cis_control: '6.1'
    cis_section: '6'
    profile_applicability: ""
    scope: tomcat.section_6.setup_client_cert_authentication
    assertion:
      field: value
      operator: equals
      expected: "true"
    remediation: >
      
    compliance:
      - cis_tomcat_9_v1_2_0_6_1

  - rule_id: tomcat.cis.6.sslenabled_is_set_to_true_for_sensitive_connectors
    title: "Ensure SSLEnabled is set to True for Sensitive Connectors"
    severity: medium
    automation_type: automated
    cis_control: '6.2'
    cis_section: '6'
    profile_applicability: ""
    scope: tomcat.section_6.sslenabled_is_set_to_true_for_sensitive_connectors
    assertion:
      field: enabled
      operator: equals
      expected: "true"
    remediation: >
      
    compliance:
      - cis_tomcat_9_v1_2_0_6_2

  - rule_id: tomcat.cis.6.scheme_is_set_accurately
    title: "Ensure scheme is set accurately"
    severity: medium
    automation_type: automated
    cis_control: '6.3'
    cis_section: '6'
    profile_applicability: ""
    scope: tomcat.section_6.scheme_is_set_accurately
    assertion:
      field: value
      operator: equals
      expected: "true"
    remediation: >
      
    compliance:
      - cis_tomcat_9_v1_2_0_6_3

  - rule_id: tomcat.cis.6.secure_is_set_to_true_only_for_ssl_enabled
    title: "Ensure secure is set to true only for SSL-enabled Connectors"
    severity: medium
    automation_type: automated
    cis_control: '6.4'
    cis_section: '6'
    profile_applicability: ""
    scope: tomcat.section_6.secure_is_set_to_true_only_for_ssl_enabled
    assertion:
      field: enabled
      operator: equals
      expected: "true"
    remediation: >
      
    compliance:
      - cis_tomcat_9_v1_2_0_6_4

  - rule_id: tomcat.cis.6.sslprotocol_is_configured_correctly_for_secure
    title: "Ensure 'sslProtocol' is Configured Correctly for Secure Connectors"
    severity: medium
    automation_type: automated
    cis_control: '6.5'
    cis_section: '6'
    profile_applicability: ""
    scope: tomcat.section_6.sslprotocol_is_configured_correctly_for_secure
    assertion:
      field: value
      operator: exists
      expected: "true"
    remediation: >
      
    compliance:
      - cis_tomcat_9_v1_2_0_6_5


