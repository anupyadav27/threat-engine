tech_type: tomcat
category: web_server
cis_benchmark: CIS Apache Tomcat 9 v1.2.0
cis_section: '2'

rules:

  - rule_id: tomcat.cis.2.disable_x_powered_by_http_header_and_rename_the
    title: "Disable X-Powered-By HTTP Header and Rename the Server Value for all Connectors"
    severity: medium
    automation_type: automated
    cis_control: '2.4'
    cis_section: '2'
    profile_applicability: ""
    scope: tomcat.section_2.disable_x_powered_by_http_header_and_rename_the
    assertion:
      field: value
      operator: equals
      expected: "true"
    remediation: >
      
    compliance:
      - cis_tomcat_9_v1_2_0_2_4

  - rule_id: tomcat.cis.2.disable_client_facing_stack_traces
    title: "Disable client facing Stack Traces"
    severity: medium
    automation_type: automated
    cis_control: '2.5'
    cis_section: '2'
    profile_applicability: ""
    scope: tomcat.section_2.disable_client_facing_stack_traces
    assertion:
      field: value
      operator: equals
      expected: "true"
    remediation: >
      
    compliance:
      - cis_tomcat_9_v1_2_0_2_5

  - rule_id: tomcat.cis.2.turn_off_trace
    title: "Turn off TRACE"
    severity: medium
    automation_type: automated
    cis_control: '2.6'
    cis_section: '2'
    profile_applicability: ""
    scope: tomcat.section_2.turn_off_trace
    assertion:
      field: value
      operator: equals
      expected: "true"
    remediation: >
      Perform the following to prevent Tomcat from accepting a TRACE request: 1. Set
      the allowTrace attribute for each Connector specified in
      $CATALINA_HOME/conf/server.xml to false. <Connector ... allowTrace='false' />
      Alternatively, ensure the allowTrace attribute is absent from each Connector
      specified in $CATALINA_HOME/conf/server.xml. 2. Add the following as a child
      of the web-app root element, if present, in each web applications web.xml:
      <security-constraint> <web-resource-collection> <web-resource-name>restricted
      methods</web-resource-name> ... <http-method>TRACE</http-method> ... </web-
      resource-collection> ... </security-constraint> Default Value: Tomcat does not
      allow the TRACE HTTP verb by default. Tomcat will only allow TRACE if the
      allowTrace attribute is present and set to true. References: 1.
      https://tomcat.apache.org/tomcat-9.0-doc/config/http.html CIS Controls:
    compliance:
      - cis_tomcat_9_v1_2_0_2_6

  - rule_id: tomcat.cis.2.sever_header_is_modified_to_prevent_information
    title: "Ensure Sever Header is Modified To Prevent Information Disclosure"
    severity: medium
    automation_type: automated
    cis_control: '2.7'
    cis_section: '2'
    profile_applicability: ""
    scope: tomcat.section_2.sever_header_is_modified_to_prevent_information
    assertion:
      field: value
      operator: equals
      expected: "true"
    remediation: >
      In $CATALINA_HOME/conf/server.xml, add the server directive to the connector
      as shown below replacing apache with the text of your choosing. This text
      should not help in identifying the server. <Connector port='8443' server=”I am
      a teapot' redirectPort='8080' /> Scripted: • If you do not have the header
      defined: sed -ir 's/Connector/Connector server=”I am a teapot'/g'
      $CATALINA_HOME/conf/server.xml • If you already have a header but it is still
      revealing sed -ir 's/server='[^']*'/server='I Am A Teapot'/g'
      $CATALINA_HOME/conf/server.xml Default Value: The default value is Apache-
      Coyote/1.1. References: 1. https://tomcat.apache.org/tomcat-9.0-doc/security-
      howto.html#server.xml 2.
      https://stackoverflow.com/questions/52637285/replacing-server-header-in-
      tomcat-with-sed CIS Controls:
    compliance:
      - cis_tomcat_9_v1_2_0_2_7


