tech_type: tomcat
category: web_server
cis_benchmark: CIS Apache Tomcat 9 v1.2.0
cis_section: '9'

rules:

  - rule_id: tomcat.cis.9.disabling_auto_deployment_of_applications
    title: "Disabling auto deployment of applications"
    severity: medium
    automation_type: automated
    cis_control: '9.2'
    cis_section: '9'
    profile_applicability: ""
    scope: tomcat.section_9.disabling_auto_deployment_of_applications
    assertion:
      field: value
      operator: equals
      expected: "true"
    remediation: >
      In the $CATALINA_HOME/conf/server.xml file, change autoDeploy to false.
      autoDeploy='false' Default Value: autoDeploy is set to true. References: 1.
      https://tomcat.apache.org/tomcat-9.0-doc/deployer-
      howto.html#Deploying_on_a_running_Tomcat_server 2.
      https://tomcat.apache.org/tomcat-9.0-doc/config/host.html CIS Controls:
    compliance:
      - cis_tomcat_9_v1_2_0_9_2

  - rule_id: tomcat.cis.9.disable_deploy_on_startup_of_applications
    title: "Disable deploy on startup of applications"
    severity: medium
    automation_type: automated
    cis_control: '9.3'
    cis_section: '9'
    profile_applicability: ""
    scope: tomcat.section_9.disable_deploy_on_startup_of_applications
    assertion:
      field: value
      operator: equals
      expected: "true"
    remediation: >
      In the $CATALINA_HOME/conf/server.xml file, change deployOnStartup to false.
      deployOnStartup='false' Default Value: deployOnStartup is set to true.
      References: 1. https://tomcat.apache.org/tomcat-9.0-doc/deployer-
      howto.html#Deployment_on_Tomcat_startup 2.
      https://tomcat.apache.org/tomcat-9.0-
      doc/config/host.html#Automatic_Application_Deployment CIS Controls:
    compliance:
      - cis_tomcat_9_v1_2_0_9_3


