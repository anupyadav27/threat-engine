rule_id: k8s.ingress.audit.create_modify
rule_type: ciem
title: 'Ingress: Ingress Created or Modified'
scope: ingress.audit
domain: container_and_kubernetes_security
subcategory: container_security
severity: medium
service: ingress
resource: audit
requirement: Create Modify
description: Kubernetes Ingress resource created or modified — may expose internal
  services externally or redirect traffic to attacker-controlled backends.
rationale: Adversaries modify Kubernetes Service objects to add external load balancer
  IPs or NodePort configurations, exposing internal cluster services to the internet.
  This creates unauthorized ingress points for C2 traffic or data exfiltration. Detected
  via K8s audit logs for service patch/update operations adding externalIPs or changing
  type to NodePort/LoadBalancer.
remediation: '1. Terminate the unauthorized kubectl exec or port-forward session immediately.

  2. Audit RBAC permissions: restrict pods/exec and pods/portforward to specific service
  accounts.

  3. Apply NetworkPolicies to prevent unauthorized pod-to-pod communication.

  4. Enable audit log alerting for exec/portforward operations by non-CI/CD users.

  5. Use Falco rules to detect and alert on interactive exec sessions in production
  namespaces.

  '
