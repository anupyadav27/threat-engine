description: CronJob created outside normal CI/CD pipelines — scheduled recurring
  workloads used for persistent cryptomining, data exfiltration, or C2 callbacks.
rationale: Adversaries create Kubernetes CronJobs to schedule recurring malicious
  workloads — cryptomining, data exfiltration, or C2 callbacks — that survive pod
  restarts and operator intervention. CronJob creation outside normal CI/CD pipelines
  or with unusual schedules indicates adversary use. Detected via K8s audit logs for
  cronjobs/create.
remediation: '1. Delete the unauthorized DaemonSet, CronJob, or ServiceAccount immediately.

  2. Audit all resources in kube-system: `kubectl get all -n kube-system`

  3. Enable admission control policies restricting resource creation to known CI/CD
  identities.

  4. Use RBAC least-privilege: restrict create verbs on DaemonSets/CronJobs to dedicated
  service accounts.

  5. Monitor for new ServiceAccount creation via Falco or audit log alerting.

  '
