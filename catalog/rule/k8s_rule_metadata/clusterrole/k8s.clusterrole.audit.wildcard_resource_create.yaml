title: 'ClusterRole: Created with Wildcard Resources'
scope: clusterrole.audit
domain: container_and_kubernetes_security
subcategory: container_security
severity: high
service: clusterrole
resource: audit
requirement: Wildcard Resource Create
description: 'ClusterRole created with resources: ["*"] — grants all API resource
  types as scope, giving the role broad access comparable to cluster-admin on matched
  verbs.'
rationale: 'Adversaries add roles or permissions to service accounts or workload identities
  to maintain persistent access to container orchestration systems. Creating Kubernetes
  RoleBindings or ClusterRoleBindings for attacker-controlled identities enables cluster-wide
  command execution. Detected via: high-privilege role assignments outside CI/CD automation,
  bindings from unfamiliar IP addresses, and unexpected ServiceAccount token creation.'
remediation: '1. Immediately delete the unauthorized ClusterRoleBinding or RoleBinding.

  2. Audit all cluster-admin bindings: `kubectl get clusterrolebindings -o wide |
  grep cluster-admin`

  3. Enable OPA Gatekeeper or Kyverno policy to prevent cluster-admin binding creation
  by non-admins.

  4. Use just-in-time (JIT) access for privileged Kubernetes operations.

  5. Configure Falco rules to alert on ClusterRoleBinding creation outside CI/CD service
  accounts.

  '
