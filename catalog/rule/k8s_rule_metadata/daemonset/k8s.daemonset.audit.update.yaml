rule_id: k8s.daemonset.audit.update
rule_type: ciem
title: 'DaemonSet: DaemonSet Image or Config Updated'
scope: daemonset.audit
domain: container_and_kubernetes_security
subcategory: container_security
severity: high
service: daemonset
resource: audit
requirement: Update
description: Existing DaemonSet modified — image or configuration change affects all
  nodes simultaneously; may inject malicious code into cluster-wide infrastructure.
rationale: Adversaries create or modify DaemonSets to run malicious containers on
  every node in a cluster, achieving persistent code execution across the entire cluster
  infrastructure. DaemonSet creation in kube-system or with privileged containers
  is a strong persistence indicator. Detected via K8s audit logs for daemonsets/create
  in sensitive namespaces.
remediation: '1. Delete the unauthorized DaemonSet, CronJob, or ServiceAccount immediately.

  2. Audit all resources in kube-system: `kubectl get all -n kube-system`

  3. Enable admission control policies restricting resource creation to known CI/CD
  identities.

  4. Use RBAC least-privilege: restrict create verbs on DaemonSets/CronJobs to dedicated
  service accounts.

  5. Monitor for new ServiceAccount creation via Falco or audit log alerting.

  '
