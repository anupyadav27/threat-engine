rule_id: k8s.audit.audit.policy_configmap_delete
rule_type: ciem
title: 'Audit: Audit Policy ConfigMap Deleted'
scope: audit.audit
domain: container_and_kubernetes_security
subcategory: container_security
severity: high
service: audit
resource: audit
requirement: Policy Configmap Delete
description: ConfigMap containing K8s audit policy deleted — audit logging rules destroyed,
  potentially disabling audit log capture for sensitive resource categories.
rationale: 'Adversaries disable or modify cloud logging capabilities to limit visibility
  into their activities. With sufficient permissions they can disable CloudTrail,
  delete Azure diagnostic settings, delete log sinks, or modify audit configurations
  — blinding defenders to all subsequent actions. Detected via: StopLogging, DeleteTrail,
  UpdateSink, Delete-DiagnosticSetting, license downgrade events, and SaaS audit log
  disable events.'
remediation: '1. Immediately restore the deleted webhook configuration or network
  policy.

  2. Apply RBAC to restrict deletion of admission webhooks and audit policies to cluster-admin
  only.

  3. Enable Falco rules to alert on webhook configuration deletion and network policy
  removal.

  4. Use GitOps (ArgoCD/Flux) to detect and restore unauthorized configuration drift.

  5. Configure out-of-band audit log export before admission webhook changes take
  effect.

  '
