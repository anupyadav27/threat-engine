rule_id: k8s.secret.audit.get_by_unexpected_subject
rule_type: ciem
title: 'Secret: Secret Accessed by Non-Application Subject'
scope: secret.audit
domain: container_and_kubernetes_security
subcategory: container_security
severity: high
service: secret
resource: audit
requirement: Get By Unexpected Subject
description: Kubernetes Secret directly retrieved (get) by a user or service account
  outside the owning application — credential theft attempt.
rationale: 'Adversaries search local file systems, remote file shares, and cloud storage
  for files containing insecurely stored credentials — including config files, source
  code, .env files, and shell history. Cloud-specific targets include ~/.aws/credentials,
  terraform.tfstate (containing plaintext secrets), and container environment variable
  dumps. Detected via: file read access to .env/.xml/.ps1/config files, grep commands
  targeting credential patterns, and container process access to mounted secret paths.'
remediation: '1. Rotate all secrets that were read by the unauthorized principal.

  2. Enable K8s audit log alerting on secrets/get and secrets/list for non-application
  subjects.

  3. Use external secret managers (Vault, AWS Secrets Manager) instead of K8s Secrets
  for sensitive data.

  4. Apply RBAC to restrict secrets access to only the service accounts that need
  them.

  5. Enable encryption at rest for etcd where K8s Secrets are stored.

  '
