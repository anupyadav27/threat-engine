requirement: Patch Unlimited
description: ResourceQuota patched — namespace resource limits may have been increased
  to allow resource exhaustion by compromised workloads.
rationale: 'Adversaries destroy data and files on cloud storage or databases at scale
  to interrupt availability, render services inoperable, or destroy evidence. Cloud
  data destruction is often irreversible without backups. Detected via: bulk S3 object
  deletion via elevated IAM credentials, EC2/EBS/snapshot mass deletion events, storage
  account deletion with soft-delete disabled, and database cluster deletion without
  final snapshot.'
remediation: '1. Restore deleted resources from cluster backup or etcd snapshot.

  2. Apply RBAC to restrict delete verbs on nodes, namespaces, and PersistentVolumes.

  3. Enable Velero or equivalent backup solution for cluster state and PersistentVolumes.

  4. Configure resource deletion protection policies via admission controllers.

  5. Alert on node and namespace deletion via audit log monitoring or Falco.

  '
