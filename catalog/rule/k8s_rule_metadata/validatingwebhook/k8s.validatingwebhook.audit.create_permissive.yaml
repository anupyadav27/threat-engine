description: ValidatingWebhookConfiguration created with failurePolicy=Ignore — if
  the webhook backend is unavailable or slow, admission validation is bypassed entirely.
rationale: 'Adversaries modify or disable security tools to avoid detection of their
  activities — including killing security software processes, disabling GuardDuty
  detectors, deleting Microsoft Defender plans, or tampering with cloud monitoring
  agents. Once defenses are disabled, subsequent attack phases proceed without generating
  alerts. Detected via: security process/service termination, cloud monitoring agent
  disable API calls, and container admission controller tampering.'
remediation: '1. Immediately restore the deleted webhook configuration or network
  policy.

  2. Apply RBAC to restrict deletion of admission webhooks and audit policies to cluster-admin
  only.

  3. Enable Falco rules to alert on webhook configuration deletion and network policy
  removal.

  4. Use GitOps (ArgoCD/Flux) to detect and restore unauthorized configuration drift.

  5. Configure out-of-band audit log export before admission webhook changes take
  effect.

  '
