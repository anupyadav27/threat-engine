rule_id: k8s.pod.audit.run_as_root_create
rule_type: ciem
title: 'Pod: Created Without Non-Root Enforcement'
scope: pod.audit
domain: container_and_kubernetes_security
subcategory: container_security
severity: high
service: pod
resource: audit
requirement: Run As Root Create
description: Pod created without setting securityContext.runAsNonRoot=true, allowing
  container processes to run as UID 0 (root). Root containers have elevated filesystem
  and capability access within the container namespace.
rationale: 'Adversaries abuse Linux privilege escalation mechanisms within Kubernetes
  containers — including setuid/setgid binaries, Linux capabilities, and missing allowPrivilegeEscalation
  controls. Without explicit securityContext restrictions, a process inside a container
  can call execve() on a setuid binary to gain root (UID 0), directly enabling container
  escape chains (T1611). CIS Kubernetes Benchmark 5.2.5/5.2.6 require these controls
  to be explicitly set. Detected via: pods created without runAsNonRoot=true, pods
  created with allowPrivilegeEscalation unset or true, and setuid binary execution.'
remediation: '1. Set securityContext.runAsNonRoot: true in the pod spec.

  2. Set runAsUser to a non-zero UID (e.g., 1000).

  3. Apply a Kyverno or OPA Gatekeeper policy enforcing non-root containers cluster-wide.

  4. Use Pod Security Admission with ''restricted'' or ''baseline'' profile to block
  root containers at the namespace level.

  5. Audit existing pods: `kubectl get pods -A -o jsonpath=''{range .items[*]}{.metadata.name}{"\t"}{.spec.securityContext.runAsNonRoot}{"\n"}{end}''`

  '
references:
