rule_id: k8s.pod.audit.privileged_container_create
rule_type: ciem
title: 'Pod: Privileged Container Created'
scope: pod.audit
domain: container_and_kubernetes_security
subcategory: container_security
severity: critical
service: pod
resource: audit
requirement: Privileged Container Create
description: Pod created with securityContext.privileged=true — container runs with
  full node capabilities, enabling container escape and access to host resources.
rationale: 'Adversaries escape container or virtualized environment isolation to gain
  access to the underlying host, circumventing container security boundaries to access
  other containerized resources or the node''s credentials. Requires privileged container,
  hostPath mounts, or kernel exploit. Detected via: hostPath mounts to /proc or /sys,
  privileged container launches, unshare/keyctl/mount syscalls from container processes,
  and process execution outside container namespaces.'
remediation: '1. Immediately delete the unauthorized ClusterRoleBinding or RoleBinding.

  2. Audit all cluster-admin bindings: `kubectl get clusterrolebindings -o wide |
  grep cluster-admin`

  3. Enable OPA Gatekeeper or Kyverno policy to prevent cluster-admin binding creation
  by non-admins.

  4. Use just-in-time (JIT) access for privileged Kubernetes operations.

  5. Configure Falco rules to alert on ClusterRoleBinding creation outside CI/CD service
  accounts.

  '
