title: 'Pod: Ephemeral Debug Container Added'
scope: pod.audit
domain: container_and_kubernetes_security
subcategory: container_security
severity: high
service: pod
resource: audit
requirement: Ephemeral Container Add
description: Ephemeral container added to a running pod via kubectl debug — attacker
  may inject a privileged debug container into a running production workload.
rationale: Adversaries execute commands inside running Kubernetes pods via the kubectl
  exec API — achieving interactive shell access without SSH or network access to the
  pod. Pod exec by non-CI/CD users or service accounts, especially in production namespaces,
  indicates unauthorized access or post-exploitation activity. Detected via K8s audit
  logs for pods/exec subresource with create verb.
remediation: '1. Audit the created pod or container for malicious images or startup
  commands.

  2. Enforce Binary Authorization or Cosign image signing via admission webhooks.

  3. Apply Pod Security Standards (Restricted profile) to prevent privileged execution.

  4. Restrict pod creation to specific service accounts in production namespaces.

  5. Enable runtime threat detection (Falco, Tetragon) for anomalous container behavior.

  '
