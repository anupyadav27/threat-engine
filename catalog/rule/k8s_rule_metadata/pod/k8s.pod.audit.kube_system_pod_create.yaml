requirement: Kube System Pod Create
description: Pod created in the kube-system namespace by a non-cluster-admin — privileged
  namespace creation may inject malicious components into cluster management infrastructure.
rationale: 'Adversaries deploy containers into environments using Docker APIs or Kubernetes
  control planes to facilitate execution or evade defenses by running malicious images
  outside standard deployment processes. Deployed containers can host C2 infrastructure,
  cryptomining workloads, or data exfiltration tools. Detected via: container create
  + start by non-admin principals, images not on an allowlist or using ''latest''
  tag, privileged mode or host namespace mount at runtime, and unauthenticated Docker
  API access.'
remediation: '1. Delete the unauthorized DaemonSet, CronJob, or ServiceAccount immediately.

  2. Audit all resources in kube-system: `kubectl get all -n kube-system`

  3. Enable admission control policies restricting resource creation to known CI/CD
  identities.

  4. Use RBAC least-privilege: restrict create verbs on DaemonSets/CronJobs to dedicated
  service accounts.

  5. Monitor for new ServiceAccount creation via Falco or audit log alerting.

  '
