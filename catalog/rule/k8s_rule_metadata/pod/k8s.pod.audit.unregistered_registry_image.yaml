rule_id: k8s.pod.audit.unregistered_registry_image
rule_type: ciem
title: 'Pod: Image from Unregistered Registry'
scope: pod.audit
domain: container_and_kubernetes_security
subcategory: container_security
severity: high
service: pod
resource: audit
requirement: Unregistered Registry Image
description: Pod created with container image from an unregistered or untrusted registry
  — supply chain risk; malicious images may contain backdoors or cryptominers.
rationale: 'Adversaries deploy containers into environments using Docker APIs or Kubernetes
  control planes to facilitate execution or evade defenses by running malicious images
  outside standard deployment processes. Deployed containers can host C2 infrastructure,
  cryptomining workloads, or data exfiltration tools. Detected via: container create
  + start by non-admin principals, images not on an allowlist or using ''latest''
  tag, privileged mode or host namespace mount at runtime, and unauthenticated Docker
  API access.'
remediation: '1. Remove the unauthorized workload and quarantine the image for forensic
  analysis.

  2. Enable Binary Authorization or Kyverno policy to allowlist approved registries.

  3. Scan all cluster images with Trivy or Snyk for vulnerabilities and malicious
  code.

  4. Restrict image pull sources to internal registries via OPA/Kyverno admission
  policies.

  5. Enable Sigstore/Cosign image signing verification for all production deployments.

  '
