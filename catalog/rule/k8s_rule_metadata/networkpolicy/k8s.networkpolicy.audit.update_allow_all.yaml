title: 'NetworkPolicy: Updated to Allow All Traffic'
scope: networkpolicy.audit
domain: container_and_kubernetes_security
subcategory: container_security
severity: high
service: networkpolicy
resource: audit
requirement: Update Allow All
description: Existing NetworkPolicy updated to allow all ingress/egress — network
  isolation controls weakened, enabling lateral movement between pods.
rationale: Adversaries use kubectl port-forward to establish encrypted tunnels to
  pods running internal services — exposing cluster-internal databases, APIs, or management
  interfaces to attacker-controlled endpoints. Port-forward activity by non-operator
  users outside maintenance windows indicates unauthorized access. Detected via K8s
  audit logs.
remediation: '1. Terminate the unauthorized kubectl exec or port-forward session immediately.

  2. Audit RBAC permissions: restrict pods/exec and pods/portforward to specific service
  accounts.

  3. Apply NetworkPolicies to prevent unauthorized pod-to-pod communication.

  4. Enable audit log alerting for exec/portforward operations by non-CI/CD users.

  5. Use Falco rules to detect and alert on interactive exec sessions in production
  namespaces.

  '
