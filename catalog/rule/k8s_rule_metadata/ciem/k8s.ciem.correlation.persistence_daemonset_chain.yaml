rule_type: ciem
title: 'K8s: Cluster-Wide Persistence Chain — DaemonSet + RBAC Grant'
scope: ciem.correlation
domain: container_and_kubernetes_security
subcategory: container_security
severity: critical
service: ciem
resource: correlation
requirement: Persistence Daemonset Chain
description: 'Correlated cluster-wide persistence: DaemonSet created (cluster-wide
  execution) followed by ClusterRoleBinding — malicious workload granted ongoing cluster
  admin access.'
rationale: 'Adversaries add roles or permissions to service accounts or workload identities
  to maintain persistent access to container orchestration systems. Creating Kubernetes
  RoleBindings or ClusterRoleBindings for attacker-controlled identities enables cluster-wide
  command execution. Detected via: high-privilege role assignments outside CI/CD automation,
  bindings from unfamiliar IP addresses, and unexpected ServiceAccount token creation.'
remediation: '1. Delete the unauthorized DaemonSet, CronJob, or ServiceAccount immediately.

  2. Audit all resources in kube-system: `kubectl get all -n kube-system`

  3. Enable admission control policies restricting resource creation to known CI/CD
  identities.

  4. Use RBAC least-privilege: restrict create verbs on DaemonSets/CronJobs to dedicated
  service accounts.

  5. Monitor for new ServiceAccount creation via Falco or audit log alerting.

  '
