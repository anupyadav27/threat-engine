rule_id: k8s.ciem.correlation.credential_exfil_chain
rule_type: ciem
title: 'K8s: Credential Exfiltration Chain — Secret List + External Service'
scope: ciem.correlation
domain: container_and_kubernetes_security
subcategory: container_security
severity: critical
service: ciem
resource: correlation
requirement: Credential Exfil Chain
description: 'Correlated credential exfiltration: bulk Secrets enumeration followed
  by Service with external IP creation — secrets harvested and an exfiltration channel
  established.'
rationale: 'Adversaries search local file systems, remote file shares, and cloud storage
  for files containing insecurely stored credentials — including config files, source
  code, .env files, and shell history. Cloud-specific targets include ~/.aws/credentials,
  terraform.tfstate (containing plaintext secrets), and container environment variable
  dumps. Detected via: file read access to .env/.xml/.ps1/config files, grep commands
  targeting credential patterns, and container process access to mounted secret paths.'
remediation: '1. Revoke RBAC access for the principal that performed the unauthorized
  Secret/ConfigMap read.

  2. Rotate all secrets and credentials that may have been accessed.

  3. Enable K8s audit log alerting on bulk secrets/list or configmaps/list operations.

  4. Restrict data access using RBAC and namespace isolation for sensitive workloads.

  5. Use Vault or external secret stores with dynamic short-lived credentials.

  '
