requirement: Create
description: New Kubernetes namespace created outside standard provisioning — may
  establish isolated execution environment for attacker workloads outside normal monitoring
  scope.
rationale: 'Adversaries create cloud accounts (IAM users, Entra ID users, service
  principals) to maintain access to victim systems without deploying persistent remote
  access tools. Such accounts establish secondary credentialed access that survives
  password resets of the initially compromised account. Detected via: IAM CreateUser
  + AttachUserPolicy from non-standard sources, Add User events from unusual IPs,
  and SaaS account provisioning outside business hours.'
remediation: '1. Delete the unauthorized DaemonSet, CronJob, or ServiceAccount immediately.

  2. Audit all resources in kube-system: `kubectl get all -n kube-system`

  3. Enable admission control policies restricting resource creation to known CI/CD
  identities.

  4. Use RBAC least-privilege: restrict create verbs on DaemonSets/CronJobs to dedicated
  service accounts.

  5. Monitor for new ServiceAccount creation via Falco or audit log alerting.

  '
