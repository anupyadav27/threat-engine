rule_id: k8s.configmap.audit.bulk_list
rule_type: ciem
title: 'ConfigMap: Bulk ConfigMap Enumeration'
scope: configmap.audit
domain: container_and_kubernetes_security
subcategory: container_security
severity: medium
service: configmap
resource: audit
requirement: Bulk List
description: ConfigMaps listed in bulk — may contain application credentials, connection
  strings, or configuration secrets stored outside proper Secrets management.
rationale: 'Adversaries search local file systems, remote file shares, and cloud storage
  for files containing insecurely stored credentials — including config files, source
  code, .env files, and shell history. Cloud-specific targets include ~/.aws/credentials,
  terraform.tfstate (containing plaintext secrets), and container environment variable
  dumps. Detected via: file read access to .env/.xml/.ps1/config files, grep commands
  targeting credential patterns, and container process access to mounted secret paths.'
remediation: '1. Revoke the unauthorized RBAC access used for secret/configmap enumeration.

  2. Rotate all secrets and credentials in the affected namespace.

  3. Apply namespace isolation and RBAC least-privilege for secrets access.

  4. Enable K8s audit alerting on secrets/list and configmaps/list from unexpected
  subjects.

  5. Use external secret stores to prevent lateral secret access within the cluster.

  '
