rule_id: k8s.rbac.audit.impersonation_used
rule_type: ciem
title: 'RBAC: User Impersonation Detected'
scope: rbac.audit
domain: container_and_kubernetes_security
subcategory: container_security
severity: high
service: rbac
resource: audit
requirement: Impersonation Used
description: Kubernetes user impersonation (--as flag) used — a principal is acting
  as a different user or service account, bypassing their own permission boundary.
rationale: 'Adversaries abuse Linux privilege escalation mechanisms within Kubernetes
  containers — including setuid/setgid binaries, Linux capabilities, and missing allowPrivilegeEscalation
  controls. Without explicit securityContext restrictions, a process inside a container
  can call execve() on a setuid binary to gain root (UID 0), directly enabling container
  escape chains (T1611). CIS Kubernetes Benchmark 5.2.5/5.2.6 require these controls
  to be explicitly set. Detected via: pods created without runAsNonRoot=true, pods
  created with allowPrivilegeEscalation unset or true, and setuid binary execution.'
remediation: '1. Remove the unauthorized ServiceAccount, Role, or binding immediately.

  2. Audit all service accounts and their bound roles: `kubectl get sa,rolebindings
  -A`

  3. Apply RBAC policies restricting ServiceAccount and Role creation to CI/CD pipelines.

  4. Enable audit alerting on identity resource creation outside normal deployment
  windows.

  5. Use Workload Identity (GKE, EKS, AKS) instead of legacy service account tokens.

  '
