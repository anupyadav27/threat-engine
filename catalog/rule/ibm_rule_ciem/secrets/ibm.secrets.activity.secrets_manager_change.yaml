rule_id: ibm.secrets.activity.secrets_manager_change
service: secrets
provider: ibm
check_type: log
severity: high
title: 'IBM Secrets Manager: Secret Deleted or Modified'
description: An IBM Secrets Manager secret was deleted, rotated, or had its access policy modified. Secret deletion causes authentication failures for dependent applications.
threat_category: impact
mitre_tactics:
- impact
- credential_access
mitre_techniques:
- T1531
risk_score: 80
resource: ibm_secrets_manager_secret
domain: cryptography_and_key_management
action_category: modify
log_source_type: 
posture_category: workload_posture
threat_tags:
- T1531
- impact
- availability
risk_indicators:
  actor_type: cloud_principal
  action_type: write
  target_type: cloud_resource
  blast_radius: resource_group
  stealth_risk: low
iam_security:
  applicable: false
  modules: []
data_security:
  applicable: true
  modules:
  - secrets_management
  categories:
  - sensitive_data_access
  priority: high
  impact:
    pci: PCI DSS Requirement 3.4 — Sensitive authentication data must be protected
    gdpr: GDPR Article 32 — Appropriate technical measures to protect personal data
    hipaa: §164.312(e)(2)(ii) — Encryption of ePHI in transit and at rest
  sensitive_data_context: |
  Unauthorized impact on secrets resources must be detected to prevent:
      - Data loss and regulatory compliance violations
      - Unauthorized exposure of sensitive and personal data
      - Violation of data residency and retention policies
compliance_frameworks: {}
remediation: Review and investigate this activity in the IBM Cloud Console and take corrective action.
check_config:
  conditions:
    all:
    - field: source_type
      op: equals
      value: ibm_activity
    - field: operation
      op: in
      value:
      - secrets-manager.secret.delete
      - secrets-manager.secret-metadata.update
