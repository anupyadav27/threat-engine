rule_id: ibm.kms.activity.key_protect_key_delete
service: kms
provider: ibm
check_type: log
severity: critical
title: 'IBM Key Protect: Encryption Key Deleted'
description: An IBM Key Protect encryption key was deleted. Data encrypted with this key is permanently inaccessible after deletion — a critical impact event.
threat_category: impact
mitre_tactics:
- impact
mitre_techniques:
- T1486
risk_score: 98
resource: ibm_kms_key
domain: impact
action_category: delete
log_source_type: 
posture_category: workload_posture
threat_tags:
- T1486
- impact
- availability
risk_indicators:
  actor_type: cloud_principal
  action_type: destructive
  target_type: cloud_resource
  blast_radius: resource_group
  stealth_risk: low
iam_security:
  applicable: false
  modules: []
data_security:
  applicable: true
  modules:
  - secrets_management
  categories:
  - sensitive_data_access
  priority: critical
  impact:
    pci: PCI DSS Requirement 3.4 — Sensitive authentication data must be protected
    gdpr: GDPR Article 32 — Appropriate technical measures to protect personal data
    hipaa: §164.312(e)(2)(ii) — Encryption of ePHI in transit and at rest
  sensitive_data_context: |
  Unauthorized impact on kms resources must be detected to prevent:
      - Data loss and regulatory compliance violations
      - Unauthorized exposure of sensitive and personal data
      - Violation of data residency and retention policies
compliance_frameworks: {}
remediation: Review and investigate this activity in the IBM Cloud Console and take corrective action.
check_config:
  conditions:
    all:
    - field: source_type
      op: equals
      value: ibm_activity
    - field: operation
      op: in
      value:
      - kms.secrets.delete
      - kms.secrets.setkeyfordeletion
