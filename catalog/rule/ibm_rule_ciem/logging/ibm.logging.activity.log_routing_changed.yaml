rule_id: ibm.logging.activity.log_routing_changed
service: logging
provider: ibm
check_type: log
severity: high
title: 'IBM Logging: Activity Tracker Route or Target Changed'
description: An Activity Tracker routing rule or target was modified. Changing log routes may stop forwarding audit logs to your SIEM, blinding threat detection.
threat_category: defense_evasion
mitre_tactics:
- defense_evasion
mitre_techniques:
- T1562
risk_score: 85
resource: ibm_atracker_route
domain: logging_monitoring_and_alerting
action_category: modify
log_source_type: 
posture_category: security_posture
threat_tags:
- T1562
- defense_evasion
- log_tampering
risk_indicators:
  actor_type: cloud_principal
  action_type: write
  target_type: cloud_resource
  blast_radius: resource_group
  stealth_risk: critical
iam_security:
  applicable: false
  modules: []
data_security:
  applicable: false
compliance_frameworks: {}
remediation: Review and investigate this activity in the IBM Cloud Console and take corrective action.
check_config:
  conditions:
    all:
    - field: source_type
      op: equals
      value: ibm_activity
    - field: operation
      op: in
      value:
      - atracker.route.update
      - atracker.target.update
      - atracker.route.create
      - atracker.target.create
