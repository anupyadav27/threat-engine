rule_id: ibm.logging.activity.activity_tracker_delete
service: logging
provider: ibm
check_type: log
severity: critical
title: 'IBM Logging: Activity Tracker Instance Deleted'
description: An IBM Cloud Activity Tracker instance was deleted. Activity Tracker is the primary audit logging service; its deletion removes visibility into all account activity.
threat_category: defense_evasion
mitre_tactics:
- defense_evasion
mitre_techniques:
- T1562
risk_score: 97
resource: ibm_logdna_instance
domain: logging_monitoring_and_alerting
action_category: delete
log_source_type: 
posture_category: security_posture
threat_tags:
- T1562
- defense_evasion
- log_tampering
risk_indicators:
  actor_type: cloud_principal
  action_type: destructive
  target_type: cloud_resource
  blast_radius: resource_group
  stealth_risk: critical
iam_security:
  applicable: false
  modules: []
data_security:
  applicable: false
compliance_frameworks: {}
remediation: Review and investigate this activity in the IBM Cloud Console and take corrective action.
check_config:
  conditions:
    all:
    - field: source_type
      op: equals
      value: ibm_activity
    - field: operation
      op: in
      value:
      - logdnaat.instance.delete
      - atracker.target.delete
      - atracker.route.delete
