rule_id: ibm.vsi.activity.vsi_created
service: vsi
provider: ibm
check_type: log
severity: medium
title: 'IBM VPC: Virtual Server Instance Created'
description: A new virtual server instance was provisioned in IBM VPC. Unauthorized instance creation may indicate resource hijacking for cryptomining.
threat_category: execution
mitre_tactics:
- execution
mitre_techniques:
- T1204
risk_score: 65
resource: ibm_is_instance
domain: compute_and_workload_security
action_category: create
log_source_type: 
posture_category: workload_posture
threat_tags:
- T1204
- remote_execution
- cloud_exec
risk_indicators:
  actor_type: cloud_principal
  action_type: write
  target_type: cloud_resource
  blast_radius: resource_group
  stealth_risk: medium
iam_security:
  applicable: false
  modules: []
data_security:
  applicable: false
compliance_frameworks: {}
remediation: Review and investigate this activity in the IBM Cloud Console and take corrective action.
check_config:
  conditions:
    all:
    - field: source_type
      op: equals
      value: ibm_activity
    - field: operation
      op: equals
      value: is.instance.instance.create
