rule_id: ibm.vsi.activity.bare_metal_change
service: vsi
provider: ibm
check_type: log
severity: high
title: 'IBM: Bare Metal Server Modified or Deleted'
description: An IBM Cloud bare metal server was modified, stopped, or deleted. Bare metal servers host critical workloads and are hard to replace quickly.
threat_category: impact
mitre_tactics:
- impact
mitre_techniques:
- T1485
risk_score: 80
resource: ibm_is_bare_metal_server
domain: impact
action_category: modify
log_source_type: 
posture_category: workload_posture
threat_tags:
- T1485
- impact
- availability
risk_indicators:
  actor_type: cloud_principal
  action_type: write
  target_type: cloud_resource
  blast_radius: resource_group
  stealth_risk: low
iam_security:
  applicable: false
  modules: []
data_security:
  applicable: false
compliance_frameworks: {}
remediation: Review and investigate this activity in the IBM Cloud Console and take corrective action.
check_config:
  conditions:
    all:
    - field: source_type
      op: equals
      value: ibm_activity
    - field: operation
      op: in
      value:
      - is.bare-metal-server.bare-metal-server.delete
      - is.bare-metal-server.bare-metal-server.stop
