rule_id: ibm.vsi.activity.vsi_action
service: vsi
provider: ibm
check_type: log
severity: medium
title: 'IBM VPC: Virtual Server Action Performed (Start/Stop/Reboot)'
description: A start, stop, reboot, or reset action was performed on a virtual server. Unauthorized stop/reboot disrupts running workloads.
threat_category: impact
mitre_tactics:
- impact
mitre_techniques:
- T1529
risk_score: 62
resource: ibm_is_instance
domain: impact
action_category: delete
log_source_type: 
posture_category: workload_posture
threat_tags:
- T1529
- impact
- availability
risk_indicators:
  actor_type: cloud_principal
  action_type: destructive
  target_type: cloud_resource
  blast_radius: resource_group
  stealth_risk: low
iam_security:
  applicable: false
  modules: []
data_security:
  applicable: false
compliance_frameworks: {}
remediation: Review and investigate this activity in the IBM Cloud Console and take corrective action.
check_config:
  conditions:
    all:
    - field: source_type
      op: equals
      value: ibm_activity
    - field: operation
      op: in
      value:
      - is.instance.instance-action.create
