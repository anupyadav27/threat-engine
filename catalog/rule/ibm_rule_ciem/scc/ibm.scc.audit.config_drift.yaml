rule_id: ibm.scc.audit.config_drift
service: scc
provider: ibm
check_type: log
severity: medium
title: 'IBM SCC: Configuration Drift Detected'
description: IBM SCC detected configuration drift from a previously compliant baseline. Drift may indicate unauthorized infrastructure changes.
threat_category: defense_evasion
mitre_tactics:
- defense_evasion
mitre_techniques:
- T1562
risk_score: 65
resource: ibm_scc_profile
domain: logging_monitoring_and_alerting
action_category: modify
log_source_type: 
posture_category: security_posture
threat_tags:
- T1562
- defense_evasion
- log_tampering
risk_indicators:
  actor_type: cloud_principal
  action_type: write
  target_type: cloud_resource
  blast_radius: resource_group
  stealth_risk: critical
iam_security:
  applicable: false
  modules: []
data_security:
  applicable: false
compliance_frameworks: {}
remediation: Review and investigate this activity in the IBM Cloud Console and take corrective action.
check_config:
  conditions:
    all:
    - field: source_type
      op: equals
      value: ibm_scc
    - field: event_type
      op: equals
      value: CONFIG_DRIFT
