rule_id: ibm.codeengine.activity_log.privileged_job_run
service: compute
provider: ibm
check_type: log
severity: high
title: Detect privileged workload creation in IKS/OpenShift and Code Engine
description: singleton
rationale: Monitoring this activity is essential for detecting adversary privilege
  escalation against IBM resources. Unauthorized or unexpected API calls may indicate
  account compromise, privilege escalation, or an active attack chain.
threat_category: privilege_escalation
mitre_tactics:
- privilege_escalation
mitre_techniques:
- T1548
- T1548.005
risk_score: 80
resource: cloud_compute_instance
source: csv_generated
is_active: true
domain: identity_and_access_management
action_category: audit_activity
log_source_type: ibm_activity_tracker
posture_category: threat_posture
threat_tags:
- T1548
- T1548.005
- privilege_escalation
- ciem_detection
risk_indicators:
  actor_type: cloud_principal
  action_type: read
  target_type: cloud_resource
  blast_radius: account
  stealth_risk: medium
iam_security:
  applicable: true
  modules:
  - access_control
data_security:
  applicable: false
compliance_frameworks: {}
remediation: '1. Revoke the escalated permissions immediately.

  2. Audit all policies and roles attached to the principal.

  3. Review recent resource access with the elevated permissions.

  4. Enforce Just-in-Time (JIT) access for privileged roles.

  5. Require manager approval and MFA for policy attachment operations.'
references:
- https://attack.mitre.org/techniques/T1548/
- https://attack.mitre.org/techniques/T1548.005/
- https://cloud.ibm.com/docs/account?topic=account-iamoverview
check_config:
  conditions:
    all:
    - field: source_type
      op: equals
      value: ibm_activity_tracker
    - field: service
      op: equals
      value: codeengine
    - field: operation
      op: in
      value:
      - codeengine.job.create
      - kubernetes.pods.create
  type: log
  version: '1.0'
