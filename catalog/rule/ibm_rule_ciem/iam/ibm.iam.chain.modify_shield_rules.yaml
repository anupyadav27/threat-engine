rule_id: ibm.iam.chain.modify_shield_rules
service: iam
provider: ibm
check_type: log
severity: high
title: Detect disabling of security group logging or IAM modifications that could
  bypass IBM Cloud Security & Compliance Center malware rules.
description: Detects disabling of security group logging or IAM modifications to bypass
  Cloud Shield.
rationale: Monitoring this activity is essential for detecting adversary defense evasion
  against IBM resources. Unauthorized or unexpected API calls may indicate account
  compromise, privilege escalation, or an active attack chain.
threat_category: defense_evasion
mitre_tactics:
- defense_evasion
- privilege_escalation
mitre_techniques:
- T1562
- T1548
risk_score: 82
resource: cloud_iam_principal
source: csv_generated
is_active: true
domain: identity_and_access_management
action_category: modify
log_source_type: ibm_activity_tracker
posture_category: threat_posture
threat_tags:
- T1562
- T1548
- defense_evasion
- privilege_escalation
- ciem_detection
- attack_chain
risk_indicators:
  actor_type: cloud_principal
  action_type: write
  target_type: cloud_resource
  blast_radius: account
  stealth_risk: high
iam_security:
  applicable: true
  modules: []
data_security:
  applicable: false
compliance_frameworks:
  canada_pbmm:
  - SI-3(1)
remediation: '1. Immediately investigate the principal that performed this action
  — treat as potentially compromised.

  2. Restore any disabled/deleted security controls (logging, agents, scanning).

  3. Review the full session context for lateral movement or data exfiltration following
  this action.

  4. Restrict the ability to disable security tools to break-glass roles with MFA
  enforcement.

  5. Add SCPs/Organization Policies to prevent non-authorized disablement of security
  controls.'
references:
- https://attack.mitre.org/techniques/T1562/
- https://attack.mitre.org/techniques/T1548/
- https://cloud.ibm.com/docs/account?topic=account-iamoverview
check_config:
  events:
  - conditions:
      all:
      - field: source_type
        op: equals
        value: ibm_activity_tracker
      - field: service
        op: equals
        value: iam-am
      - field: operation
        op: equals
        value: is.security-group.log-config.delete
  - conditions:
      all:
      - field: source_type
        op: equals
        value: ibm_activity_tracker
      - field: service
        op: equals
        value: iam-am
      - field: operation
        op: equals
        value: iam-am.policy.delete
  type: sequence
  window_seconds: 600
  version: '1.0'
