rule_id: ibm.iam.audit.serviceid_privilege_reversion
service: iam
provider: ibm
check_type: log
severity: high
title: Detect service ID privilege reversion post-review and chained access group
  modifications to evade entitlement removal
description: Detects service ID privilege reversion and chained access group changes.
rationale: Monitoring this activity is essential for detecting adversary privilege
  escalation against IBM resources. Unauthorized or unexpected API calls may indicate
  account compromise, privilege escalation, or an active attack chain.
threat_category: privilege_escalation
mitre_tactics:
- privilege_escalation
mitre_techniques:
- T1548
- T1548.005
risk_score: 80
resource: cloud_iam_principal
source: csv_generated
is_active: true
domain: identity_and_access_management
action_category: audit_activity
log_source_type: ibm_activity_tracker
posture_category: threat_posture
threat_tags:
- T1548
- T1548.005
- privilege_escalation
- ciem_detection
risk_indicators:
  actor_type: cloud_principal
  action_type: read
  target_type: cloud_resource
  blast_radius: account
  stealth_risk: medium
iam_security:
  applicable: true
  modules:
  - access_control
data_security:
  applicable: false
compliance_frameworks:
  pci_dss_v4:
  - 7.2.4
remediation: '1. Revoke the escalated permissions immediately.

  2. Audit all policies and roles attached to the principal.

  3. Review recent resource access with the elevated permissions.

  4. Enforce Just-in-Time (JIT) access for privileged roles.

  5. Require manager approval and MFA for policy attachment operations.'
references:
- https://attack.mitre.org/techniques/T1548/
- https://attack.mitre.org/techniques/T1548.005/
- https://cloud.ibm.com/docs/account?topic=account-iamoverview
check_config:
  conditions:
    all:
    - field: source_type
      op: equals
      value: ibm_activity_tracker
    - field: service
      op: equals
      value: iam-am
    - field: operation
      op: in
      value:
      - iam-am.policy.create
      - iam-am.accessgroup.update
  type: log
  version: '1.0'
