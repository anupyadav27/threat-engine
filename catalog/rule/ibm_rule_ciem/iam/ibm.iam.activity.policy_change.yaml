rule_id: ibm.iam.activity.policy_change
service: iam
provider: ibm
check_type: log
severity: critical
title: 'IBM IAM: IAM Policy Modified'
description: An IAM access policy was updated. Policy modifications expanding roles (Reader → Administrator) on critical services constitute privilege escalation.
threat_category: privilege_escalation
mitre_tactics:
- privilege_escalation
mitre_techniques:
- T1548
risk_score: 90
resource: ibm_iam_access_policy
domain: identity_and_access_management
action_category: modify
log_source_type: 
posture_category: iam_posture
threat_tags:
- T1548
- cloud_iam
- privilege_escalation
- identity
risk_indicators:
  actor_type: iam_user_or_role
  action_type: write
  target_type: iam_identity
  blast_radius: account
  stealth_risk: high
iam_security:
  applicable: true
  modules:
  - policy_analysis
  - access_control
data_security:
  applicable: false
compliance_frameworks: {}
remediation: Review and investigate this activity in the IBM Cloud Console and take corrective action.
check_config:
  conditions:
    all:
    - field: source_type
      op: equals
      value: ibm_activity
    - field: operation
      op: in
      value:
      - iam-am.policy.update
      - iam-am.policy.delete
