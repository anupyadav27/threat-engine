rule_id: ibm.iam.activity.service_id_locked
service: iam
provider: ibm
check_type: log
severity: high
title: 'IBM IAM: Service ID Locked or Unlocked'
description: An IBM Cloud Service ID was locked or unlocked. Unlocking a service ID that was locked for security reasons re-enables compromised credentials.
threat_category: defense_evasion
mitre_tactics:
- defense_evasion
mitre_techniques:
- T1562
risk_score: 72
resource: ibm_iam_service_id
domain: logging_monitoring_and_alerting
action_category: modify
log_source_type: 
posture_category: security_posture
threat_tags:
- T1562
- defense_evasion
- log_tampering
- cloud_iam
- identity
risk_indicators:
  actor_type: iam_user_or_role
  action_type: write
  target_type: iam_identity
  blast_radius: account
  stealth_risk: critical
iam_security:
  applicable: true
  modules:
  - access_control
data_security:
  applicable: false
compliance_frameworks: {}
remediation: Review and investigate this activity in the IBM Cloud Console and take corrective action.
check_config:
  conditions:
    all:
    - field: source_type
      op: equals
      value: ibm_activity
    - field: operation
      op: in
      value:
      - iam-identity.serviceid.lock
      - iam-identity.serviceid.unlock
