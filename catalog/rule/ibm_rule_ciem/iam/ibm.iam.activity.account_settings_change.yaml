rule_id: ibm.iam.activity.account_settings_change
service: iam
provider: ibm
check_type: log
severity: high
title: 'IBM IAM: Account Settings Changed'
description: Global IBM Cloud account security settings were changed (e.g., restrict API key creation, session timeout, IP address restrictions).
threat_category: defense_evasion
mitre_tactics:
- defense_evasion
mitre_techniques:
- T1562
risk_score: 80
resource: ibm_iam_settings
domain: logging_monitoring_and_alerting
action_category: modify
log_source_type: 
posture_category: security_posture
threat_tags:
- T1562
- defense_evasion
- log_tampering
- cloud_iam
- identity
risk_indicators:
  actor_type: iam_user_or_role
  action_type: write
  target_type: iam_identity
  blast_radius: account
  stealth_risk: critical
iam_security:
  applicable: true
  modules:
  - access_control
data_security:
  applicable: false
compliance_frameworks: {}
remediation: Review and investigate this activity in the IBM Cloud Console and take corrective action.
check_config:
  conditions:
    all:
    - field: source_type
      op: equals
      value: ibm_activity
    - field: operation
      op: equals
      value: iam-identity.accountsettings.update
