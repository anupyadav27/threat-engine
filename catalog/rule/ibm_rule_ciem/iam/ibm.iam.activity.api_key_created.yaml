rule_id: ibm.iam.activity.api_key_created
service: iam
provider: ibm
check_type: log
severity: high
title: 'IBM IAM: API Key Created'
description: An IBM Cloud API key was created for a user or service ID. API keys are long-lived credentials that provide programmatic access to all IBM Cloud services the identity has access to.
threat_category: credential_access
mitre_tactics:
- credential_access
mitre_techniques:
- T1552
risk_score: 78
resource: ibm_iam_api_key
domain: identity_and_access_management
action_category: create
log_source_type: 
posture_category: iam_posture
threat_tags:
- T1552
- credential_access
- secret_exposure
- cloud_iam
- identity
risk_indicators:
  actor_type: iam_user_or_role
  action_type: write
  target_type: iam_identity
  blast_radius: account
  stealth_risk: high
iam_security:
  applicable: true
  modules:
  - access_control
data_security:
  applicable: true
  modules:
  - secrets_management
  categories:
  - secrets_exposure
  - credential_theft
  priority: high
  impact:
    pci: PCI DSS Requirement 12.3 — Implement security awareness program and protect systems
    gdpr: GDPR Article 32 — Appropriate technical and organizational measures for data security
    hipaa: §164.306(a) — Ensure confidentiality, integrity, and availability of ePHI
  sensitive_data_context: |
  Unauthorized credential access on iam resources must be detected to prevent:
      - Data loss and regulatory compliance violations
      - Unauthorized exposure of sensitive and personal data
      - Violation of data residency and retention policies
compliance_frameworks: {}
remediation: Review and investigate this activity in the IBM Cloud Console and take corrective action.
check_config:
  conditions:
    all:
    - field: source_type
      op: equals
      value: ibm_activity
    - field: operation
      op: in
      value:
      - iam-identity.user-apikey.create
      - iam-identity.serviceid-apikey.create
