rule_id: ibm.iam.activity_log.replay_auth
service: iam
provider: ibm
check_type: log
severity: high
title: Detect authentication replay events and suspicious sequences indicating potential
  replay attacks.
description: Detects authentication replay events and suspicious sequences.
rationale: Monitoring this activity is essential for detecting adversary credential
  access against IBM resources. Unauthorized or unexpected API calls may indicate
  account compromise, privilege escalation, or an active attack chain.
threat_category: credential_access
mitre_tactics:
- credential_access
mitre_techniques:
- T1550
- T1212
risk_score: 78
resource: cloud_iam_principal
source: csv_generated
is_active: true
domain: identity_and_access_management
action_category: audit_activity
log_source_type: ibm_activity_tracker
posture_category: threat_posture
threat_tags:
- T1550
- T1212
- credential_access
- ciem_detection
risk_indicators:
  actor_type: cloud_principal
  action_type: read
  target_type: cloud_resource
  blast_radius: account
  stealth_risk: medium
iam_security:
  applicable: true
  modules: []
data_security:
  applicable: false
compliance_frameworks:
  nist_800_171:
  - 3.5.4
remediation: '1. Lock the account or invalidate the session immediately if replay
  or brute force confirmed.

  2. Force MFA re-enrollment and rotate all API keys/secrets for the affected principal.

  3. Review all actions taken by the principal in the surrounding time window.

  4. Enforce account lockout policies after N failed attempts.

  5. Enable anomaly detection alerts for repeated authentication failures.'
references:
- https://attack.mitre.org/techniques/T1550/
- https://attack.mitre.org/techniques/T1212/
- https://cloud.ibm.com/docs/account?topic=account-iamoverview
check_config:
  conditions:
    all:
    - field: source_type
      op: equals
      value: ibm_activity_tracker
    - field: service
      op: equals
      value: iam-am
    - field: operation
      op: in
      value:
      - iam-identity.token.create
      - iam-am.credentials.exchange
  type: log
  version: '1.0'
