rule_id: ibm.resource.audit.management_key_rotation_bypass
service: resource
provider: ibm
check_type: log
severity: high
title: Detect service ID conversions to API keys and management key rotation evasion
description: Detects service ID to API key conversion to bypass key rotation.
rationale: Monitoring this activity is essential for detecting adversary credential
  access against IBM resources. Unauthorized or unexpected API calls may indicate
  account compromise, privilege escalation, or an active attack chain.
threat_category: credential_access
mitre_tactics:
- credential_access
- persistence
mitre_techniques:
- T1528
- T1552.005
risk_score: 75
resource: ibm_resource_resource
source: csv_generated
is_active: true
domain: logging_monitoring_and_alerting
action_category: audit_activity
log_source_type: ibm_activity_tracker
posture_category: threat_posture
threat_tags:
- T1528
- T1552.005
- T1552
- credential_access
- persistence
- ciem_detection
risk_indicators:
  actor_type: cloud_principal
  action_type: read
  target_type: cloud_resource
  blast_radius: account
  stealth_risk: medium
iam_security:
  applicable: false
  modules: []
data_security:
  applicable: false
compliance_frameworks:
  canada_pbmm:
  - AC-6(2)
remediation: '1. Lock the account or invalidate the session immediately if replay
  or brute force confirmed.

  2. Force MFA re-enrollment and rotate all API keys/secrets for the affected principal.

  3. Review all actions taken by the principal in the surrounding time window.

  4. Enforce account lockout policies after N failed attempts.

  5. Enable anomaly detection alerts for repeated authentication failures.'
references:
- https://attack.mitre.org/techniques/T1528/
- https://attack.mitre.org/techniques/T1552.005/
- https://cloud.ibm.com/docs/account?topic=account-iamoverview
check_config:
  conditions:
    all:
    - field: source_type
      op: equals
      value: ibm_activity_tracker
    - field: service
      op: equals
      value: resource-controller
    - field: operation
      op: in
      value:
      - iam-identity.serviceid.update
      - iam-identity.apikey.create
  type: log
  version: '1.0'
