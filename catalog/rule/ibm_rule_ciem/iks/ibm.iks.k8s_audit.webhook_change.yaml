rule_id: ibm.iks.k8s_audit.webhook_change
service: iks
provider: ibm
check_type: log
severity: critical
title: 'IBM IKS: Admission Webhook Modified'
description: A Kubernetes ValidatingWebhookConfiguration or MutatingWebhookConfiguration was modified in an IKS cluster. Malicious webhooks can intercept or modify all API server requests.
threat_category: persistence
mitre_tactics:
- persistence
mitre_techniques:
- T1505
risk_score: 93
resource: ibm_container_cluster
domain: container_and_kubernetes_security
action_category: modify
log_source_type: 
posture_category: iam_posture
threat_tags:
- T1505
- persistence
- backdoor
risk_indicators:
  actor_type: cloud_principal
  action_type: write
  target_type: cloud_resource
  blast_radius: resource_group
  stealth_risk: high
iam_security:
  applicable: true
  modules:
  - access_control
data_security:
  applicable: false
compliance_frameworks: {}
remediation: Review and investigate this activity in the IBM Cloud Console and take corrective action.
check_config:
  conditions:
    all:
    - field: source_type
      op: equals
      value: ibm_k8s_audit
    - field: resource
      op: in
      value:
      - validatingwebhookconfigurations
      - mutatingwebhookconfigurations
    - field: verb
      op: in
      value:
      - create
      - update
      - patch
      - delete
