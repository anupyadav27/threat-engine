rule_id: ibm.iks.k8s_audit.rolebinding_change
service: iks
provider: ibm
check_type: log
severity: critical
title: 'IBM IKS: RBAC RoleBinding Created or Modified'
description: A Kubernetes RBAC RoleBinding or ClusterRoleBinding was created or modified. Unauthorized bindings grant persistent access to cluster resources.
threat_category: privilege_escalation
mitre_tactics:
- privilege_escalation
mitre_techniques:
- T1548
risk_score: 90
resource: ibm_container_cluster
domain: container_and_kubernetes_security
action_category: modify
log_source_type: 
posture_category: iam_posture
threat_tags:
- T1548
- cloud_iam
- privilege_escalation
risk_indicators:
  actor_type: cloud_principal
  action_type: write
  target_type: cloud_resource
  blast_radius: resource_group
  stealth_risk: high
iam_security:
  applicable: true
  modules:
  - access_control
data_security:
  applicable: false
compliance_frameworks: {}
remediation: Review and investigate this activity in the IBM Cloud Console and take corrective action.
check_config:
  conditions:
    all:
    - field: source_type
      op: equals
      value: ibm_k8s_audit
    - field: resource
      op: in
      value:
      - rolebindings
      - clusterrolebindings
    - field: verb
      op: in
      value:
      - create
      - update
      - patch
