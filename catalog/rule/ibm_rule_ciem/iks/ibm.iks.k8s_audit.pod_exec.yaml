rule_id: ibm.iks.k8s_audit.pod_exec
service: iks
provider: ibm
check_type: log
severity: high
title: 'IBM IKS: kubectl exec / attach into Pod'
description: An interactive exec or attach session was opened into a running pod in an IKS cluster. Used for post-exploitation reconnaissance.
threat_category: execution
mitre_tactics:
- execution
mitre_techniques:
- T1609
risk_score: 80
resource: ibm_container_cluster
domain: container_and_kubernetes_security
action_category: execute
log_source_type: 
posture_category: workload_posture
threat_tags:
- T1609
- remote_execution
- cloud_exec
risk_indicators:
  actor_type: cloud_principal
  action_type: execution
  target_type: cloud_resource
  blast_radius: resource_group
  stealth_risk: medium
iam_security:
  applicable: false
  modules: []
data_security:
  applicable: false
compliance_frameworks: {}
remediation: Review and investigate this activity in the IBM Cloud Console and take corrective action.
check_config:
  conditions:
    all:
    - field: source_type
      op: equals
      value: ibm_k8s_audit
    - field: resource
      op: equals
      value: pods
    - field: subresource
      op: in
      value:
      - exec
      - attach
