rule_id: ibm.iks.k8s_audit.secret_modified
service: iks
provider: ibm
check_type: log
severity: critical
title: 'IBM IKS: Kubernetes Secret Modified'
description: A Kubernetes Secret was created, updated, or patched in an IKS cluster. Attackers modify secrets to inject backdoor credentials or hijack service account tokens.
threat_category: persistence
mitre_tactics:
- persistence
mitre_techniques:
- T1098
risk_score: 90
resource: ibm_container_cluster
domain: container_and_kubernetes_security
action_category: create
log_source_type: 
posture_category: iam_posture
threat_tags:
- T1098
- persistence
- backdoor
risk_indicators:
  actor_type: cloud_principal
  action_type: write
  target_type: cloud_resource
  blast_radius: resource_group
  stealth_risk: high
iam_security:
  applicable: true
  modules:
  - access_control
data_security:
  applicable: true
  modules:
  - secrets_management
  categories:
  - sensitive_data_access
  priority: critical
  impact:
    pci: PCI DSS Requirement 3.4 — Sensitive authentication data must be protected
    gdpr: GDPR Article 32 — Appropriate technical measures to protect personal data
    hipaa: §164.312(e)(2)(ii) — Encryption of ePHI in transit and at rest
  sensitive_data_context: |
  Unauthorized persistence on iks resources must be detected to prevent:
      - Data loss and regulatory compliance violations
      - Unauthorized exposure of sensitive and personal data
      - Violation of data residency and retention policies
compliance_frameworks: {}
remediation: Review and investigate this activity in the IBM Cloud Console and take corrective action.
check_config:
  conditions:
    all:
    - field: source_type
      op: equals
      value: ibm_k8s_audit
    - field: resource
      op: equals
      value: secrets
    - field: verb
      op: in
      value:
      - create
      - update
      - patch
      - delete
