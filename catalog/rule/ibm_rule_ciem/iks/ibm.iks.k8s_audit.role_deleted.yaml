rule_id: ibm.iks.k8s_audit.role_deleted
service: iks
provider: ibm
check_type: log
severity: high
title: 'IBM IKS: RBAC Role or ClusterRole Deleted'
description: A RBAC Role or ClusterRole was deleted from an IKS cluster. Deletion of built-in roles disrupts legitimate access and may be evidence of sabotage.
threat_category: impact
mitre_tactics:
- impact
mitre_techniques:
- T1531
risk_score: 78
resource: ibm_container_cluster
domain: container_and_kubernetes_security
action_category: delete
log_source_type: 
posture_category: workload_posture
threat_tags:
- T1531
- impact
- availability
risk_indicators:
  actor_type: cloud_principal
  action_type: destructive
  target_type: cloud_resource
  blast_radius: resource_group
  stealth_risk: low
iam_security:
  applicable: false
  modules: []
data_security:
  applicable: false
compliance_frameworks: {}
remediation: Review and investigate this activity in the IBM Cloud Console and take corrective action.
check_config:
  conditions:
    all:
    - field: source_type
      op: equals
      value: ibm_k8s_audit
    - field: resource
      op: in
      value:
      - roles
      - clusterroles
    - field: verb
      op: equals
      value: delete
