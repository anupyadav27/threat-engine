rule_id: ibm.iks.k8s_audit.daemonset_created
service: iks
provider: ibm
check_type: log
severity: critical
title: 'IBM IKS: DaemonSet Created'
description: A Kubernetes DaemonSet was created in an IKS cluster. DaemonSets run on all nodes and are used by attackers to deploy malware with cluster-wide persistence.
threat_category: persistence
mitre_tactics:
- persistence
mitre_techniques:
- T1610
risk_score: 88
resource: ibm_container_cluster
domain: container_and_kubernetes_security
action_category: create
log_source_type: 
posture_category: iam_posture
threat_tags:
- T1610
- persistence
- backdoor
risk_indicators:
  actor_type: cloud_principal
  action_type: write
  target_type: cloud_resource
  blast_radius: resource_group
  stealth_risk: high
iam_security:
  applicable: true
  modules:
  - access_control
data_security:
  applicable: false
compliance_frameworks: {}
remediation: Review and investigate this activity in the IBM Cloud Console and take corrective action.
check_config:
  conditions:
    all:
    - field: source_type
      op: equals
      value: ibm_k8s_audit
    - field: resource
      op: equals
      value: daemonsets
    - field: verb
      op: equals
      value: create
