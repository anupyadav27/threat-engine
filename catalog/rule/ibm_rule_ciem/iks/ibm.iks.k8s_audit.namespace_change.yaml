rule_id: ibm.iks.k8s_audit.namespace_change
service: iks
provider: ibm
check_type: log
severity: medium
title: 'IBM IKS: Namespace Created or Deleted'
description: A Kubernetes namespace was created or deleted. Attackers create namespaces to deploy malicious workloads in isolated contexts that bypass monitoring.
threat_category: defense_evasion
mitre_tactics:
- defense_evasion
mitre_techniques:
- T1036
risk_score: 65
resource: ibm_container_cluster
domain: container_and_kubernetes_security
action_category: modify
log_source_type: 
posture_category: security_posture
threat_tags:
- T1036
- defense_evasion
- log_tampering
risk_indicators:
  actor_type: cloud_principal
  action_type: write
  target_type: cloud_resource
  blast_radius: resource_group
  stealth_risk: critical
iam_security:
  applicable: false
  modules: []
data_security:
  applicable: false
compliance_frameworks: {}
remediation: Review and investigate this activity in the IBM Cloud Console and take corrective action.
check_config:
  conditions:
    all:
    - field: source_type
      op: equals
      value: ibm_k8s_audit
    - field: resource
      op: equals
      value: namespaces
    - field: verb
      op: in
      value:
      - create
      - delete
