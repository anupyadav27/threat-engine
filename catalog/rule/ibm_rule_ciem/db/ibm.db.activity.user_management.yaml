rule_id: ibm.db.activity.user_management
service: db
provider: ibm
check_type: log
severity: high
title: 'IBM DB Audit: Database User Created or Privilege Granted'
description: A new database user was created or DBA privileges were granted. Unauthorized user creation enables persistent database access.
threat_category: persistence
mitre_tactics:
- persistence
mitre_techniques:
- T1136
risk_score: 78
resource: ibm_database_instance
domain: identity_and_access_management
action_category: create
log_source_type: 
posture_category: iam_posture
threat_tags:
- T1136
- persistence
- backdoor
risk_indicators:
  actor_type: cloud_principal
  action_type: write
  target_type: cloud_resource
  blast_radius: resource_group
  stealth_risk: high
iam_security:
  applicable: true
  modules:
  - access_control
data_security:
  applicable: false
compliance_frameworks: {}
remediation: Review and investigate this activity in the IBM Cloud Console and take corrective action.
check_config:
  conditions:
    all:
    - field: source_type
      op: equals
      value: ibm_db_audit
    - field: action
      op: in
      value:
      - CREATE_USER
      - GRANT_PRIVILEGE
      - ALTER_USER
