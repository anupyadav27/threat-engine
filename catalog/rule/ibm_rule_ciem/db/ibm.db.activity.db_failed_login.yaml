rule_id: ibm.db.activity.db_failed_login
service: db
provider: ibm
check_type: log
severity: medium
title: 'IBM DB Audit: Failed Database Login'
description: Multiple failed login attempts were recorded in IBM database audit logs, indicating potential brute force.
threat_category: credential_access
mitre_tactics:
- credential_access
mitre_techniques:
- T1110
risk_score: 68
resource: ibm_database_instance
domain: identity_and_access_management
action_category: read
log_source_type: 
posture_category: iam_posture
threat_tags:
- T1110
- credential_access
- secret_exposure
risk_indicators:
  actor_type: cloud_principal
  action_type: read
  target_type: cloud_resource
  blast_radius: resource_group
  stealth_risk: high
iam_security:
  applicable: true
  modules:
  - access_control
data_security:
  applicable: true
  modules:
  - data_access_governance
  categories:
  - secrets_exposure
  - credential_theft
  priority: medium
  impact:
    pci: PCI DSS Requirement 12.3 — Implement security awareness program and protect systems
    gdpr: GDPR Article 32 — Appropriate technical and organizational measures for data security
    hipaa: §164.306(a) — Ensure confidentiality, integrity, and availability of ePHI
  sensitive_data_context: |
  Unauthorized credential access on db resources must be detected to prevent:
      - Data loss and regulatory compliance violations
      - Unauthorized exposure of sensitive and personal data
      - Violation of data residency and retention policies
compliance_frameworks: {}
remediation: Review and investigate this activity in the IBM Cloud Console and take corrective action.
check_config:
  conditions:
    all:
    - field: source_type
      op: equals
      value: ibm_db_audit
    - field: action
      op: equals
      value: LOGON
    - field: return_code
      op: not_equals
      value: 0
