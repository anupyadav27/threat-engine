rule_id: ibm.db.activity.db_schema_change
service: db
provider: ibm
check_type: log
severity: high
title: 'IBM DB Audit: DDL Schema Change'
description: A DDL statement (DROP TABLE, ALTER TABLE, TRUNCATE) was executed in an IBM database. Unauthorized schema changes destroy data or bypass security controls.
threat_category: impact
mitre_tactics:
- impact
mitre_techniques:
- T1485
risk_score: 82
resource: ibm_database_instance
domain: impact
action_category: modify
log_source_type: 
posture_category: workload_posture
threat_tags:
- T1485
- impact
- availability
risk_indicators:
  actor_type: cloud_principal
  action_type: write
  target_type: cloud_resource
  blast_radius: resource_group
  stealth_risk: low
iam_security:
  applicable: false
  modules: []
data_security:
  applicable: false
compliance_frameworks: {}
remediation: Review and investigate this activity in the IBM Cloud Console and take corrective action.
check_config:
  conditions:
    all:
    - field: source_type
      op: equals
      value: ibm_db_audit
    - field: action
      op: in
      value:
      - DROP_TABLE
      - ALTER_TABLE
      - TRUNCATE
