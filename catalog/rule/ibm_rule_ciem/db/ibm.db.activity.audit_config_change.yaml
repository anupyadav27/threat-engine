rule_id: ibm.db.activity.audit_config_change
service: db
provider: ibm
check_type: log
severity: high
title: 'IBM DB Audit: Audit Configuration Changed'
description: Database audit configuration was modified. Disabling audit policies removes forensic evidence of future database activity.
threat_category: defense_evasion
mitre_tactics:
- defense_evasion
mitre_techniques:
- T1562
risk_score: 80
resource: ibm_database_instance
domain: logging_monitoring_and_alerting
action_category: modify
log_source_type: 
posture_category: security_posture
threat_tags:
- T1562
- defense_evasion
- log_tampering
risk_indicators:
  actor_type: cloud_principal
  action_type: write
  target_type: cloud_resource
  blast_radius: resource_group
  stealth_risk: critical
iam_security:
  applicable: false
  modules: []
data_security:
  applicable: false
compliance_frameworks: {}
remediation: Review and investigate this activity in the IBM Cloud Console and take corrective action.
check_config:
  conditions:
    all:
    - field: source_type
      op: equals
      value: ibm_db_audit
    - field: action
      op: in
      value:
      - AUDIT_POLICY_CHANGE
      - AUDIT_TRAIL_DELETE
