rule_id: ibm.vpc.chain.nested_virtualization_bypass
service: network
provider: ibm
check_type: log
severity: medium
title: Monitor instance profile updates for nested virtualization settings and detect
  multi-step attempts to enable it.
description: Monitors for nested virtualization bypass via profile updates and multi-step
  detection.
rationale: Monitoring this activity is essential for detecting adversary defense evasion
  against IBM resources. Unauthorized or unexpected API calls may indicate account
  compromise, privilege escalation, or an active attack chain.
threat_category: defense_evasion
mitre_tactics:
- defense_evasion
mitre_techniques:
- T1564
risk_score: 70
resource: ibm_network_resource
source: csv_generated
is_active: true
domain: network_security_and_connectivity
action_category: privilege_escalation
log_source_type: ibm_activity_tracker
posture_category: threat_posture
threat_tags:
- T1564
- defense_evasion
- ciem_detection
- attack_chain
risk_indicators:
  actor_type: cloud_principal
  action_type: read
  target_type: cloud_resource
  blast_radius: account
  stealth_risk: high
iam_security:
  applicable: false
  modules: []
data_security:
  applicable: false
compliance_frameworks: {}
remediation: '1. Immediately investigate the principal that performed this action
  — treat as potentially compromised.

  2. Restore any disabled/deleted security controls (logging, agents, scanning).

  3. Review the full session context for lateral movement or data exfiltration following
  this action.

  4. Restrict the ability to disable security tools to break-glass roles with MFA
  enforcement.

  5. Add SCPs/Organization Policies to prevent non-authorized disablement of security
  controls.'
references:
- https://attack.mitre.org/techniques/T1564/
- https://cloud.ibm.com/docs/account?topic=account-iamoverview
check_config:
  events:
  - conditions:
      all:
      - field: source_type
        op: equals
        value: ibm_activity_tracker
      - field: service
        op: equals
        value: is.vpc
      - field: operation
        op: equals
        value: is.instance.update
  - conditions:
      all:
      - field: source_type
        op: equals
        value: ibm_activity_tracker
      - field: service
        op: equals
        value: is.vpc
      - field: operation
        op: equals
        value: is.instance.create
  type: sequence
  window_seconds: 600
  version: '1.0'
