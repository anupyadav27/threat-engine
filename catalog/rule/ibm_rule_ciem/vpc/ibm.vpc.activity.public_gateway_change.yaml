rule_id: ibm.vpc.activity.public_gateway_change
service: vpc
provider: ibm
check_type: log
severity: high
title: 'IBM VPC: Public Gateway Created or Deleted'
description: A VPC public gateway was created or deleted. Creating a public gateway exposes private subnet resources to the internet; deleting one breaks outbound connectivity.
threat_category: defense_evasion
mitre_tactics:
- defense_evasion
mitre_techniques:
- T1562
risk_score: 78
resource: ibm_is_public_gateway
domain: network_security_and_connectivity
action_category: modify
log_source_type: 
posture_category: security_posture
threat_tags:
- T1562
- defense_evasion
- log_tampering
- network_security
- vpc
risk_indicators:
  actor_type: cloud_principal
  action_type: write
  target_type: network_resource
  blast_radius: resource_group
  stealth_risk: critical
iam_security:
  applicable: false
  modules: []
data_security:
  applicable: false
compliance_frameworks: {}
remediation: Review and investigate this activity in the IBM Cloud Console and take corrective action.
check_config:
  conditions:
    all:
    - field: source_type
      op: equals
      value: ibm_activity
    - field: operation
      op: in
      value:
      - is.public-gateway.public-gateway.create
      - is.public-gateway.public-gateway.delete
