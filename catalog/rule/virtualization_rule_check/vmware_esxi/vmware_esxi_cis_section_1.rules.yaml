tech_type: vmware_esxi
category: virtualization
cis_benchmark: CIS VMware ESXi 7 v1.5.0
cis_section: '1'

rules:

  - rule_id: vmware_esxi.cis.1.l1_ensure_the_image_profile_vib_acceptance_level
    title: "(L1) Ensure the Image Profile VIB acceptance level is configured properly"
    severity: high
    automation_type: automated
    cis_control: '1.2'
    cis_section: '1'
    profile_applicability: "Level 1"
    scope: vmware_esxi.section_1.l1_ensure_the_image_profile_vib_acceptance_level
    assertion:
      field: port
      operator: exists
      expected: "true"
    remediation: >
      To verify the host image profile acceptance level perform the following: 1.
      From the vSphere Web Client, select the host. 2. Click Configure, then under
      System select Security Profile. 3. Under Host Image Profile Acceptance Level
      select Edit 4. In the dropdown select one of the following - VMware Certified,
      VMware Accepted, or Partner Supported. To implement the recommended
      configuration state, run the following PowerCLI command (in the example code,
      the level is Partner Supported): # Set the Software AcceptanceLevel for each
      host<span> Foreach ($VMHost in Get-VMHost ) { $ESXCli = Get-EsxCli -VMHost
      $VMHost $ESXCli.software.acceptance.Set('PartnerSupported') } Default Value:
      Partner Supported References: 1. https://docs.vmware.com/en/VMware-
      vSphere/7.0/com.vmware.vsphere.security.doc/GUID-52188148-C579-4F6A-
      8335-CFBCE0DD2167.html
    compliance:
      - cis_vmware_esxi_7_v1_5_0_1_2

  - rule_id: vmware_esxi.cis.1.l2_ensure_the_default_value_of_individual_salt
    title: "(L2) Ensure the default value of individual salt per vm is configured"
    severity: medium
    automation_type: automated
    cis_control: '1.4'
    cis_section: '1'
    profile_applicability: "Level 2"
    scope: vmware_esxi.section_1.l2_ensure_the_default_value_of_individual_salt
    assertion:
      field: enabled
      operator: exists
      expected: "true"
    remediation: >
      From the vSphere Web Client: 1. Select a host 2. Click Configure then expand
      System then select Advanced System settings. 3. Click Edit then Filter for
      Mem.ShareForceSalting. 4. Set the value to 2. 5. Click OK. Additionally, the
      following PowerCLI command can be used: Get-VMHost | Get-AdvancedSetting -Name
      Mem.ShareForceSalting | Set- AdvancedSetting -Value 2 References: 1.
      https://kb.vmware.com/s/article/2097593 2.
      https://blogs.vmware.com/vsphere/2015/01/assess-the-performance-impact-of-
      the-security-change-in-transparent-page-sharing-behaviour.html
    compliance:
      - cis_vmware_esxi_7_v1_5_0_1_4


