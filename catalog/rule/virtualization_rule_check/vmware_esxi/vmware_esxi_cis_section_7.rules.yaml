tech_type: vmware_esxi
category: virtualization
cis_benchmark: CIS VMware ESXi 8 v1.2.0
cis_section: '7'

rules:

  - rule_id: vmware_esxi.cis.7.l1_virtual_machines_must_limit_console_sharing
    title: "(L1) Virtual machines must limit console sharing."
    severity: high
    automation_type: automated
    cis_control: '7.6'
    cis_section: '7'
    profile_applicability: "Level 1"
    scope: vmware_esxi.section_7.l1_virtual_machines_must_limit_console_sharing
    assertion:
      field: value
      operator: equals
      expected: "on"
    remediation: >
      To set this configuration utilize the vSphere interface as follows: 1. Select
      the VM then select Actions followed by Edit Settings. 2. Click on the VM
      Options tab then expand Advanced. 3. Click on EDIT CONFIGURATION. 4. Click on
      ADD CONFIGURATION PARAMS then input RemoteDisplay.maxConnections with a value
      of 1. 5. Click OK, then OK again. Alternatively, run the following PowerCLI
      command for VMs that do not specify the setting: # Add the setting to all VMs
      Get-VM | New-AdvancedSetting -Name 'RemoteDisplay.maxConnections' -value 1 Run
      the following PowerCLI command for VMs that specify the setting but have the
      wrong value for it: # Add the setting to all VMs Get-VM | New-AdvancedSetting
      -Name 'RemoteDisplay.maxConnections' -value 1 - Force References: 1.
      http://www.ibenit.com/post/85227299008/security-benchmark-hardening-guide-
      policies-and-profile 2. https://docs.vmware.com/en/VMware-
      vSphere/7.0/com.vmware.vsphere.security.doc/GUID-27A340F5-DE98-41A8-
      AC73-01ED4949EEF2.html 3. https://docs.vmware.com/en/VMware-
      vSphere/7.0/com.vmware.vsphere.vm_admin.doc/GUID-7FED3B17-E2E9-4360-
      AAC6-B70F9A9AEB84.html
    compliance:
      - cis_vmware_esxi_8_v1_2_0_7_6

  - rule_id: vmware_esxi.cis.7.l1_virtual_machines_must_remove_unnecessary_usb
    title: "(L1) Virtual machines must remove unnecessary USB/XHCI devices"
    severity: high
    automation_type: automated
    cis_control: '7.12'
    cis_section: '7'
    profile_applicability: "Level 1"
    scope: vmware_esxi.section_7.l1_virtual_machines_must_remove_unnecessary_usb
    assertion:
      field: value
      operator: equals
      expected: "true"
    remediation: >
      To disconnect all USB devices from VMs, run the following PowerCLI command: #
      Remove all USB Devices attached to VMs Get-VM | Get-USBDevice | Remove-
      USBDevice The VM will need to be powered off for this change to take effect.
      References: 1. https://docs.vmware.com/en/VMware-
      vSphere/7.0/com.vmware.vsphere.vm_admin.doc/GUID-7FED3B17-E2E9-4360-
      AAC6-B70F9A9AEB84.html
    compliance:
      - cis_vmware_esxi_8_v1_2_0_7_12

  - rule_id: vmware_esxi.cis.7.l1_virtual_machines_must_remove_unnecessary
    title: "(L1) Virtual machines must remove unnecessary serial port devices"
    severity: high
    automation_type: automated
    cis_control: '7.13'
    cis_section: '7'
    profile_applicability: "Level 1"
    scope: vmware_esxi.section_7.l1_virtual_machines_must_remove_unnecessary
    assertion:
      field: port
      operator: equals
      expected: "true"
    remediation: >
      To disconnect all serial ports from VMs, run the following PowerCLI command: #
      In this Example you will need to add the functions from this post:
      http://blogs.vmware.com/vipowershell/2012/05/working-with-vm-devices-in-
      powercli.html # Remove all Serial Ports attached to VMs Get-VM | Get-
      SerialPort | Remove-SerialPort The VM will need to be powered off for this
      change to take effect. References: 1.
      https://blogs.vmware.com/PowerCLI/2012/05/working-with-vm-devices-in-
      powercli.html 2. https://blogs.vmware.com/PowerCLI/2012/05/working-with-vm-
      devices-in- powercli.html
    compliance:
      - cis_vmware_esxi_8_v1_2_0_7_13

  - rule_id: vmware_esxi.cis.7.l2_virtual_machines_must_remove_unnecessary_cd
    title: "(L2) Virtual machines must remove unnecessary CD/DVD devices"
    severity: medium
    automation_type: automated
    cis_control: '7.15'
    cis_section: '7'
    profile_applicability: "Level 2"
    scope: vmware_esxi.section_7.l2_virtual_machines_must_remove_unnecessary_cd
    assertion:
      field: value
      operator: equals
      expected: "true"
    remediation: >
      To disconnect all CD/DVD drives from VMs, run the following PowerCLI command:
      # Remove all CD/DVD Drives attached to VMs Get-VM | Get-CDDrive | Remove-
      CDDrive The VM will need to be powered off for this change to take effect.
      References: 1. https://docs.vmware.com/en/VMware-
      vSphere/7.0/com.vmware.vsphere.security.doc/GUID-600D24C8-0F77-4D96-
      B273-A30F256B29D4.html
    compliance:
      - cis_vmware_esxi_8_v1_2_0_7_15

  - rule_id: vmware_esxi.cis.7.l1_virtual_machines_must_deactivate_console_drag
    title: "(L1) Virtual machines must deactivate console drag and drop operations"
    severity: high
    automation_type: automated
    cis_control: '7.17'
    cis_section: '7'
    profile_applicability: "Level 1"
    scope: vmware_esxi.section_7.l1_virtual_machines_must_deactivate_console_drag
    assertion:
      field: enabled
      operator: equals
      expected: "false"
    remediation: >
      To set this configuration utilize the vSphere interface as follows: 1. Select
      the VM then select Actions followed by Edit Settings. 2. Click on the VM
      Options tab then expand Advanced. 3. Click on EDIT CONFIGURATION. 4. Click on
      ADD CONFIGURATION PARAMS then input isolation.tools.dnd.disable with a value
      of TRUE. 5. Click OK, then OK again. To explicitly disable VM console drag and
      drop operations, run the following PowerCLI command: # Add the setting to all
      VMs Get-VM -Name $VM | Remove-AdvancedSetting -Name
      isolation.tools.dnd.disable Default Value: TRUE
    compliance:
      - cis_vmware_esxi_8_v1_2_0_7_17

  - rule_id: vmware_esxi.cis.7.l1_virtual_machines_must_deactivate_virtual_disk
    title: "(L1) Virtual machines must deactivate virtual disk shrinking operations"
    severity: high
    automation_type: automated
    cis_control: '7.21'
    cis_section: '7'
    profile_applicability: "Level 1"
    scope: vmware_esxi.section_7.l1_virtual_machines_must_deactivate_virtual_disk
    assertion:
      field: value
      operator: equals
      expected: "on"
    remediation: >
      To set this configuration utilize the vSphere interface as follows: 1. Select
      the VM then select Actions followed by Edit Settings. 2. Click on the VM
      Options tab then expand Advanced. 3. Click on EDIT CONFIGURATION. 4. Click on
      ADD CONFIGURATION PARAMS then input isolation.tools.diskShrink.disable with a
      value of TRUE. 5. Click OK, then OK again. To implement the recommended
      configuration state, run the following PowerCLI command: # Add the setting to
      all VMs Get-VM | New-AdvancedSetting -Name
      'isolation.tools.diskShrink.disable' - value $true Default Value: The
      prescribed state is not the default state. References: 1.
      https://docs.vmware.com/en/VMware-
      Tools/10.3.0/com.vmware.vsphere.vmwaretools.doc/GUID-685722FA-9009- 439C-9142-
      18A9E7C592EA.html?hWord=N4IghgNiBcIMoFMDGBXATgSwC4E8AEAwgPYB
      2AzhgCYJphYall4BmRahpzGA5uhidzwA1ALIB3MGgR4AKkSIQyIAL5A 2.
      https://docs.vmware.com/en/VMware-
      vSphere/7.0/com.vmware.vsphere.security.doc/GUID-9610FE65-3A78-4982-
      8C28-5B34FEB264B6.html
    compliance:
      - cis_vmware_esxi_8_v1_2_0_7_21

  - rule_id: vmware_esxi.cis.7.l1_virtual_machines_must_not_be_able_to_obtain
    title: "(L1) Virtual machines must not be able to obtain host information from the hypervisor"
    severity: high
    automation_type: automated
    cis_control: '7.24'
    cis_section: '7'
    profile_applicability: "Level 1"
    scope: vmware_esxi.section_7.l1_virtual_machines_must_not_be_able_to_obtain
    assertion:
      field: value
      operator: not_equals
      expected: "on"
    remediation: >
      To set this configuration utilize the vSphere interface as follows: 1. Select
      the VM then select Actions followed by Edit Settings. 2. Click on the VM
      Options tab then expand Advanced. 3. Click on EDIT CONFIGURATION. 4. Click on
      ADD CONFIGURATION PARAMS then input tools.guestlib.enableHostInfo with a value
      of FALSE. 5. Click OK, then OK again. To prevent host information from being
      sent to guests, run the following PowerCLI command: # Add the setting to all
      VMs Get-VM | New-AdvancedSetting -Name 'tools.guestlib.enableHostInfo' -value
      $false Default Value: FALSE References: 1. https://docs.vmware.com/en/VMware-
      vSphere/7.0/com.vmware.vsphere.security.doc/GUID-2CF880DA-2435-4201-
      9AFB-A16A11951A2D.html
    compliance:
      - cis_vmware_esxi_8_v1_2_0_7_24

  - rule_id: vmware_esxi.cis.7.l1_virtual_machines_must_limit_the_number_of
    title: "(L1) Virtual machines must limit the number of retained diagnostic logs"
    severity: high
    automation_type: automated
    cis_control: '7.26'
    cis_section: '7'
    profile_applicability: "Level 1"
    scope: vmware_esxi.section_7.l1_virtual_machines_must_limit_the_number_of
    assertion:
      field: row_count
      operator: equals
      expected: "on"
    remediation: >
      To set this configuration utilize the vSphere interface as follows: 1. Select
      the VM then select Actions followed by Edit Settings. 2. Click on the VM
      Options tab then expand Advanced. 3. Click on EDIT CONFIGURATION. 4. Click on
      ADD CONFIGURATION PARAMS then input log.keepOld with a value of 10. 5. Click
      OK, then OK again. To set the number of log files to be used to 10, run the
      following PowerCLI command: # Add the setting to all VMs Get-VM | New-
      AdvancedSetting -Name 'log.keepOld' -value '10' References: 1.
      https://docs.vmware.com/en/VMware-
      Tools/10.3.0/com.vmware.vsphere.vmwaretools.doc/GUID-685722FA-9009-
      439C-9142-18A9E7C592EA.html
    compliance:
      - cis_vmware_esxi_8_v1_2_0_7_26

  - rule_id: vmware_esxi.cis.7.l1_virtual_machines_must_limit_the_size_of
    title: "(L1) Virtual machines must limit the size of diagnostic logs"
    severity: high
    automation_type: automated
    cis_control: '7.27'
    cis_section: '7'
    profile_applicability: "Level 1"
    scope: vmware_esxi.section_7.l1_virtual_machines_must_limit_the_size_of
    assertion:
      field: value
      operator: equals
      expected: "on"
    remediation: >
      To set this configuration utilize the vSphere interface as follows: 1. Select
      the VM then select Actions followed by Edit Settings. 2. Click on the VM
      Options tab then expand Advanced. 3. Click on EDIT CONFIGURATION. 4. Click on
      ADD CONFIGURATION PARAMS then input log.rotateSize with a value of 1024000. 5.
      Click OK, then OK again. To properly limit the maximum log file size, run the
      following PowerCLI command: # Add the setting to all VMs Get-VM | New-
      AdvancedSetting -Name 'log.rotateSize' -value '1024000' References: 1.
      http://kb.vmware.com/kb/8182749 2. https://docs.vmware.com/en/VMware-
      vSphere/7.0/com.vmware.vsphere.monitoring.doc/GUID-2DD66869-52C7-42C5-
      8F5B-145EBD26BBA1.html
    compliance:
      - cis_vmware_esxi_8_v1_2_0_7_27

  - rule_id: vmware_esxi.cis.7.l1_ensure_the_vswitch_forged_transmits_policy_is
    title: "(L1) Ensure the vSwitch Forged Transmits policy is set to reject"
    severity: high
    automation_type: automated
    cis_control: '7.1'
    cis_section: '7'
    profile_applicability: "Level 1"
    scope: vmware_esxi.section_7.l1_ensure_the_vswitch_forged_transmits_policy_is
    assertion:
      field: port
      operator: equals
      expected: "on"
    remediation: >
      To set the policy to reject forged transmissions, perform the following: 1.
      From the vSphere Web Client, select the host. 2. Click Configure then expand
      Networking. 3. Select Virtual switches then click Edit. 4. Click on Security.
      5. Set Forged transmits to Reject in the dropdown. 6. Click on OK.
      Alternately, the following ESXi shell command may be used: # esxcli network
      vswitch standard policy security set -v vSwitch2 -f false References: 1.
      https://docs.vmware.com/en/VMware-
      vSphere/7.0/com.vmware.vsphere.networking.doc/GUID-891147DD-3E2E-45A1-
      9B50-7717C3443DD7.html
    compliance:
      - cis_vmware_esxi_7_v1_5_0_7_1

  - rule_id: vmware_esxi.cis.7.l1_ensure_the_vswitch_mac_address_change_policy
    title: "(L1) Ensure the vSwitch MAC Address Change policy is set to reject"
    severity: high
    automation_type: automated
    cis_control: '7.2'
    cis_section: '7'
    profile_applicability: "Level 1"
    scope: vmware_esxi.section_7.l1_ensure_the_vswitch_mac_address_change_policy
    assertion:
      field: port
      operator: equals
      expected: "on"
    remediation: >
      To set the policy to reject, perform the following: 1. From the vSphere Web
      Client, select the host. 2. Click Configure then expand Networking. 3. Select
      Virtual switches then click Edit. 4. Click on Security. 5. Set MAC address
      changes to Reject in the dropdown. 6. Click on OK. Alternately, perform the
      following using the ESXi shell: # esxcli network vswitch standard policy
      security set -v vSwitch2 -m false References: 1.
      https://docs.vmware.com/en/VMware-
      vSphere/7.0/com.vmware.vsphere.networking.doc/GUID-891147DD-3E2E-45A1-
      9B50-7717C3443DD7.html
    compliance:
      - cis_vmware_esxi_7_v1_5_0_7_2

  - rule_id: vmware_esxi.cis.7.l1_ensure_the_vswitch_promiscuous_mode_policy_is
    title: "(L1) Ensure the vSwitch Promiscuous Mode policy is set to reject"
    severity: high
    automation_type: automated
    cis_control: '7.3'
    cis_section: '7'
    profile_applicability: "Level 1"
    scope: vmware_esxi.section_7.l1_ensure_the_vswitch_promiscuous_mode_policy_is
    assertion:
      field: port
      operator: equals
      expected: "on"
    remediation: >
      To set the policy to reject, perform the following: 1. From the vSphere Web
      Client, select the host. 2. Click Configure then expand Networking. 3. Select
      Virtual switches then click Edit. 4. Click on Security. 5. Set Promiscuous
      mode to Reject in the dropdown. 6. Click on OK. Alternately, perform the
      following via the ESXi shell: # esxcli network vswitch standard policy
      security set -v vSwitch2 -p false Default Value: Reject References: 1.
      https://docs.vmware.com/en/VMware-
      vSphere/7.0/com.vmware.vsphere.networking.doc/GUID-891147DD-3E2E-45A1-
      9B50-7717C3443DD7.html
    compliance:
      - cis_vmware_esxi_7_v1_5_0_7_3

  - rule_id: vmware_esxi.cis.7.l1_ensure_port_groups_are_not_configured_to_the
    title: "(L1) Ensure port groups are not configured to the value of the native VLAN"
    severity: high
    automation_type: automated
    cis_control: '7.4'
    cis_section: '7'
    profile_applicability: "Level 1"
    scope: vmware_esxi.section_7.l1_ensure_port_groups_are_not_configured_to_the
    assertion:
      field: port
      operator: exists
      expected: "on"
    remediation: >
      To stop using the native VLAN ID for port groups, perform the following: 1.
      From the vSphere Web Client, select the host. 2. Click Configure then expand
      Networking. 3. Select Virtual switches. 4. Expand the Standard vSwitch. 5.
      View the topology diagram of the switch, which shows the various port groups
      associated with that switch. 6. For each port group on the vSwitch, verify and
      record the VLAN IDs used. 7. If a VLAN ID change is needed, click the name of
      the port group in the topology diagram of the virtual switch. 8. Click the
      Edit settings option. 9. In the Properties section, enter an appropriate name
      in the Network label field. 10. In the VLAN ID dropdown select or type a new
      VLAN. 11. Click OK. References: 1. https://docs.vmware.com/en/VMware-
      vSphere/7.0/com.vmware.vsphere.networking.doc/GUID-3A9D9911-3632-4B81-
      9D2E-A2F9F2D01180.html
    compliance:
      - cis_vmware_esxi_7_v1_5_0_7_4

  - rule_id: vmware_esxi.cis.7.l1_ensure_port_level_configuration_overrides_are
    title: "(L1) Ensure port-level configuration overrides are disabled."
    severity: high
    automation_type: automated
    cis_control: '7.8'
    cis_section: '7'
    profile_applicability: "Level 1"
    scope: vmware_esxi.section_7.l1_ensure_port_level_configuration_overrides_are
    assertion:
      field: enabled
      operator: equals
      expected: "false"
    remediation: >
      Using the vSphere Web Client, 1. Go to the Networking section of vCenter 2.
      After expanding each individual switch you will need to perform the following
      for each PortGroup. 3. Go to Configure then expand Settings. 4. Click on
      Properties then click on Edit. 5. Select Advanced then under Override port
      policies set each to Disabled. 6. Click OK. References: 1.
      https://docs.vmware.com/en/VMware-
      vSphere/7.0/com.vmware.vsphere.security.doc/GUID-FA661AE0-C0B5-4522-
      951D-A3790DBE70B4.html 2. https://docs.vmware.com/en/VMware-
      vSphere/7.0/com.vmware.vsphere.networking.doc/GUID-DDF5CD98-454A-
      471D-9053-03ABB8FE86D1.html
    compliance:
      - cis_vmware_esxi_7_v1_4_0_7_8


