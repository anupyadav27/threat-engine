tech_type: vmware_esxi
category: virtualization
cis_benchmark: CIS VMware ESXi 8 v1.2.0
cis_section: '2'

rules:

  - rule_id: vmware_esxi.cis.2.l1_host_image_profile_acceptance_level_must_be
    title: "(L1) Host image profile acceptance level must be PartnerSupported or higher"
    severity: high
    automation_type: automated
    cis_control: '2.4'
    cis_section: '2'
    profile_applicability: "Level 1"
    scope: vmware_esxi.section_2.l1_host_image_profile_acceptance_level_must_be
    assertion:
      field: port
      operator: equals
      expected: "true"
    remediation: >
      To verify the host image profile acceptance level perform the following: 1.
      From the vSphere Web Client, select the host. 2. Click Configure, then under
      System select Security Profile. 3. Under Host Image Profile Acceptance Level
      select Edit 4. In the dropdown select one of the following - VMware Certified,
      VMware Accepted, or Partner Supported. To implement the recommended
      configuration state, run the following PowerCLI command (in the example code,
      the level is Partner Supported): # Set the Software AcceptanceLevel for each
      host<span> Foreach ($VMHost in Get-VMHost ) { $ESXCli = Get-EsxCli -VMHost
      $VMHost $ESXCli.software.acceptance.Set('PartnerSupported') } Default Value:
      Partner Supported References: 1. https://docs.vmware.com/en/VMware-
      vSphere/8.0/vsphere-security/GUID- 751034F3-5337-4DB2-8272-
      8DAC0980EACA.html?hWord=N4IghgNiBcIApgE4BcB2BTRBlArgBzwHsV0ATE AXyA
    compliance:
      - cis_vmware_esxi_8_v1_2_0_2_4

  - rule_id: vmware_esxi.cis.2.l1_ensure_managed_object_browser_mob_is_disabled
    title: "(L1) Ensure Managed Object Browser (MOB) is disabled"
    severity: high
    automation_type: automated
    cis_control: '2.3'
    cis_section: '2'
    profile_applicability: "Level 1"
    scope: vmware_esxi.section_2.l1_ensure_managed_object_browser_mob_is_disabled
    assertion:
      field: enabled
      operator: equals
      expected: "false"
    remediation: >
      To disabled MOB, perform the following from the vSphere Web Client: 1. Select
      a host 2. Click Configure then expand System then select Advanced System
      Settings. 3. Click Edit then search for
      Config.HostAgent.plugins.solo.enableMob 4. Set the value to false. 5. Click
      OK. Note: You cannot disable the MOB while a host is in lockdown mode. Note 2:
      You must disable MOB from the vSphere interface not via the vim-cmd command.
      References: 1. https://docs.vmware.com/en/VMware-
      vSphere/6.7/com.vmware.vsphere.security.doc/GUID-0EF83EA7-277C-400B-
      B697-04BDC9173EA3.html Additional Information: Some third-party tools use the
      MOB to gather information. Use the following command to re-enable the MOB
      temporarily for third-party tool usage: To disabled MOB, perform the following
      from the vSphere Web Client: 1. Select a host 2. Click Configure then expand
      System then select Advanced System Settings. 3. Click Edit then search for
      Config.HostAgent.plugins.solo.enableMob 4. Set the value to true. 5. Click OK.
      Note 2: You must enable MOB from the vSphere interface not via the vim-cmd
      command.
    compliance:
      - cis_vmware_esxi_7_v1_5_0_2_3


