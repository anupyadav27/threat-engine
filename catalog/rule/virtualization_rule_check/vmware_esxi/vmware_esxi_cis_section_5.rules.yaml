tech_type: vmware_esxi
category: virtualization
cis_benchmark: CIS VMware ESXi 8 v1.2.0
cis_section: '5'

rules:

  - rule_id: vmware_esxi.cis.5.l1_host_should_reject_forged_transmits_on
    title: "(L1) Host should reject forged transmits on standard virtual switches and port groups"
    severity: high
    automation_type: automated
    cis_control: '5.6'
    cis_section: '5'
    profile_applicability: "Level 1"
    scope: vmware_esxi.section_5.l1_host_should_reject_forged_transmits_on
    assertion:
      field: port
      operator: equals
      expected: "on"
    remediation: >
      To set the policy to reject forged transmissions, perform the following: 1.
      From the vSphere Web Client, select the host. 2. Click Configure then expand
      Networking. 3. Select Virtual switches then click Edit. 4. Click on Security.
      5. Set Forged transmits to Reject in the dropdown. 6. Click on OK.
      Alternately, the following ESXi shell command may be used: # esxcli network
      vswitch standard policy security set -v vSwitch2 -f false References: 1.
      https://docs.vmware.com/en/VMware-vSphere/8.0/vsphere-security/GUID-
      3507432E-AFEA-4B6B-B404-17A020575358.html#GUID-7DC6486F-5400-
      44DF-8A62-6273798A2F80
    compliance:
      - cis_vmware_esxi_8_v1_2_0_5_6

  - rule_id: vmware_esxi.cis.5.l1_host_should_reject_mac_address_changes_on
    title: "(L1) Host should reject MAC address changes on standard virtual switches and port groups"
    severity: high
    automation_type: automated
    cis_control: '5.7'
    cis_section: '5'
    profile_applicability: "Level 1"
    scope: vmware_esxi.section_5.l1_host_should_reject_mac_address_changes_on
    assertion:
      field: port
      operator: equals
      expected: "on"
    remediation: >
      To set the policy to reject, perform the following: 1. From the vSphere Web
      Client, select the host. 2. Click Configure then expand Networking. 3. Select
      Virtual switches then click Edit. 4. Click on Security. 5. Set MAC address
      changes to Reject in the dropdown. 6. Click on OK. Alternately, perform the
      following using the ESXi shell: # esxcli network vswitch standard policy
      security set -v vSwitch2 -m false References: 1.
      https://docs.vmware.com/en/VMware-
      vSphere/7.0/com.vmware.vsphere.networking.doc/GUID-891147DD-3E2E-45A1-
      9B50-7717C3443DD7.html
    compliance:
      - cis_vmware_esxi_8_v1_2_0_5_7

  - rule_id: vmware_esxi.cis.5.l1_host_should_reject_promiscuous_mode_requests
    title: "(L1) Host should reject promiscuous mode requests on standard virtual switches and port groups"
    severity: high
    automation_type: automated
    cis_control: '5.8'
    cis_section: '5'
    profile_applicability: "Level 1"
    scope: vmware_esxi.section_5.l1_host_should_reject_promiscuous_mode_requests
    assertion:
      field: port
      operator: equals
      expected: "on"
    remediation: >
      To set the policy to reject, perform the following: 1. From the vSphere Web
      Client, select the host. 2. Click Configure then expand Networking. 3. Select
      Virtual switches then click Edit. 4. Click on Security. 5. Set Promiscuous
      mode to Reject in the dropdown. 6. Click on OK. Alternately, perform the
      following via the ESXi shell: # esxcli network vswitch standard policy
      security set -v vSwitch2 -p false Default Value: Reject References: 1.
      https://docs.vmware.com/en/VMware-
      vSphere/7.0/com.vmware.vsphere.networking.doc/GUID-891147DD-3E2E-45A1-
      9B50-7717C3443DD7.html
    compliance:
      - cis_vmware_esxi_8_v1_2_0_5_8

  - rule_id: vmware_esxi.cis.5.l1_host_must_restrict_the_use_of_virtual_guest
    title: "(L1) Host must restrict the use of Virtual Guest Tagging (VGT) on standard virtual switches"
    severity: high
    automation_type: automated
    cis_control: '5.10'
    cis_section: '5'
    profile_applicability: "Level 1"
    scope: vmware_esxi.section_5.l1_host_must_restrict_the_use_of_virtual_guest
    assertion:
      field: port
      operator: equals
      expected: "on"
    remediation: >
      To set port groups to values other than 4095 and 0 unless VGT is required,
      perform the following: 1. From the vSphere Web Client, select the host. 2.
      Click Configure then expand Networking. 3. Select Virtual switches. 4. Expand
      the Standard vSwitch. 5. View the topology diagram of the switch, which shows
      the various port groups associated with that switch. 6. For each port group on
      the vSwitch, verify and record the VLAN IDs used. 7. If a VLAN ID change is
      needed, click the name of the port group in the topology diagram of the
      virtual switch. 8. Click the Edit settings option. 9. In the Properties
      section, enter an appropriate name in the Network label field. 10. In the VLAN
      ID dropdown select or type a new VLAN. 11. Click OK. References: 1.
      http://www.cisco.com/c/en/us/td/docs/switches/lan/catalyst4500/12-
      2/20ew/configuration/guide/config/vlans.html#wp1038758
    compliance:
      - cis_vmware_esxi_8_v1_2_0_5_10

  - rule_id: vmware_esxi.cis.5.l1_ensure_the_dcui_timeout_is_set_to_600_seconds
    title: "(L1) Ensure the DCUI timeout is set to 600 seconds or less"
    severity: high
    automation_type: automated
    cis_control: '5.1'
    cis_section: '5'
    profile_applicability: "Level 1"
    scope: vmware_esxi.section_5.l1_ensure_the_dcui_timeout_is_set_to_600_seconds
    assertion:
      field: row_count
      operator: equals
      expected: "600"
    remediation: >
      To correct the DCUI timeout setting, perform the following steps: 1. From the
      vSphere Web Client, select the host. 2. Click Configure, then under System
      select Advanced System Settings. 3. Select Edit then enter
      UserVars.DcuiTimeOut in the filter. 4. Click in the box for the current value,
      then set the value to 600 seconds or less. Alternately, use the following
      PowerCLI command: Get-VMHost | Get-AdvancedSetting -Name UserVars.DcuiTimeOut
      | Set- AdvancedSetting -Value 600
    compliance:
      - cis_vmware_esxi_7_v1_5_0_5_1

  - rule_id: vmware_esxi.cis.5.l1_ensure_the_esxi_shell_is_disabled
    title: "(L1) Ensure the ESXi shell is disabled"
    severity: high
    automation_type: automated
    cis_control: '5.2'
    cis_section: '5'
    profile_applicability: "Level 1"
    scope: vmware_esxi.section_5.l1_ensure_the_esxi_shell_is_disabled
    assertion:
      field: enabled
      operator: equals
      expected: "false"
    remediation: >
      To disable the ESXi shell, perform the following: 1. From the vSphere Web
      Client, select the host. 2. Select Configure then expand System and select
      Services. 3. Click on ESXi Shell then click Edit Startup Policy. 4. Set the
      Startup Policy is set to Start and Stop Manually. 5. Click on OK. Alternately,
      use the following PowerCLI command: # Set the ESXi shell to start manually
      rather than automatically for all hosts Get-VMHost | Get-VMHostService | Where
      { $_.key -eq 'TSM' } | Set- VMHostService -Policy Off References: 1.
      https://docs.vmware.com/en/VMware-
      vSphere/7.0/com.vmware.vsphere.security.doc/GUID-B5144CE9-F8BB-494D-
      8F5D-0D5621D65DAE.html 2. https://docs.vmware.com/en/VMware-
      vSphere/7.0/com.vmware.vsphere.security.doc/GUID-DFA67697-232E-4F7D-
      860F-96C0819570A8.html
    compliance:
      - cis_vmware_esxi_7_v1_5_0_5_2

  - rule_id: vmware_esxi.cis.5.l1_ensure_idle_esxi_shell_and_ssh_sessions_time
    title: "(L1) Ensure idle ESXi shell and SSH sessions time out after 300 seconds or less"
    severity: high
    automation_type: automated
    cis_control: '5.8'
    cis_section: '5'
    profile_applicability: "Level 1"
    scope: vmware_esxi.section_5.l1_ensure_idle_esxi_shell_and_ssh_sessions_time
    assertion:
      field: value
      operator: equals
      expected: "300"
    remediation: >
      To set the timeout to the desired value, perform the following from the
      vSphere web client: 1. From the vSphere Web Client, select the host. 2. Click
      Configure then expand System. 3. Select Advanced System Settings then click
      Edit. 4. Enter ESXiShellInteractiveTimeOut in the filter. 5. Set the value for
      this parameter is set to the appropriate value (300 seconds or less). 6. Click
      OK. Note: A value of 0 disables the ESXi ShellInteractiveTimeOut. Alternately,
      use the following PowerCLI command: # Set Remove
      UserVars.ESXiShellInteractiveTimeOut to 300 on all hosts Get-VMHost | Get-
      AdvancedSetting -Name 'UserVars.ESXiShellInteractiveTimeOut' | Set-
      AdvancedSetting -Value '300' References: 1. http://kb.vmware.com/kb/2004746
      Additional Information: It is recommended to set the ESXiShellTimeOut together
      with ESXiShellInteractiveTimeOut.
    compliance:
      - cis_vmware_esxi_7_v1_5_0_5_8

  - rule_id: vmware_esxi.cis.5.l1_ensure_the_shell_services_timeout_is_set_to_1
    title: "(L1) Ensure the shell services timeout is set to 1 hour or less"
    severity: high
    automation_type: automated
    cis_control: '5.9'
    cis_section: '5'
    profile_applicability: "Level 1"
    scope: vmware_esxi.section_5.l1_ensure_the_shell_services_timeout_is_set_to_1
    assertion:
      field: enabled
      operator: equals
      expected: "1"
    remediation: >
      To set the timeout to the desired value, perform the following from the
      vSphere web client: 1. From the vSphere Web Client, select the host. 2. Click
      Configure then expand System. 3. Select Advanced System Settings then click
      Edit. 4. Enter ESXiShellTimeOut in the filter. 5. Set the value for this
      parameter is set to 3600 (1 hour) or less 6. Click OK. Note: A value of 0
      disables the ESXiShellTimeOut. Alternately, run the following PowerCLI
      command: # Set UserVars.ESXiShellTimeOut to 3600 on all hosts Get-VMHost |
      Get-AdvancedSetting -Name 'UserVars.ESXiShellTimeOut' | Set- AdvancedSetting
      -Value '3600' References: 1. https://docs.vmware.com/en/VMware-
      vSphere/7.0/com.vmware.vsphere.security.doc/GUID-6E1ECA4D-B617-4D42-
      B40B-71E4C83DEEFB.html 2. https://docs.vmware.com/en/VMware-
      vSphere/7.0/com.vmware.vsphere.security.doc/GUID-B314F79B-2BDD-4D68-
      8096-F009B87ACB33.html 3. http://kb.vmware.com/kb/2004746 4.
      https://docs.vmware.com/en/VMware-
      vSphere/7.0/com.vmware.vsphere.security.doc/GUID-94F0C54F-05E3-4E16-
      8027-0280B9ED1009.html Additional Information: This value can be set in
      minutes via the DCUI. When using the vCenter GUI or PowerShell API, the value
      is set in seconds.
    compliance:
      - cis_vmware_esxi_7_v1_5_0_5_9


