      $false Default Value: FALSE References: 1. https://docs.vmware.com/en/VMware-
      vSphere/7.0/com.vmware.vsphere.security.doc/GUID-2CF880DA-2435-4201-
      9AFB-A16A11951A2D.html
    compliance:
      - cis_vmware_esxi_7_v1_5_0_8_7_2

  - rule_id: vmware_esxi.cis.8.l1_ensure_vm_log_file_size_is_limited
    title: "(L1) Ensure VM log file size is limited"
    severity: high
    automation_type: automated
    cis_control: '8.7.3'
    cis_section: '8'
    profile_applicability: "Level 1"
    scope: vmware_esxi.section_8.l1_ensure_vm_log_file_size_is_limited
    assertion:
      field: row_count
      operator: lte
      expected: "on"
    remediation: >
      To set this configuration utilize the vSphere interface as follows: 1. Select
      the VM then select Actions followed by Edit Settings. 2. Click on the VM
      Options tab then expand Advanced. 3. Click on EDIT CONFIGURATION. 4. Click on
      ADD CONFIGURATION PARAMS then input log.rotateSize with a value of 1024000. 5.
      Click OK, then OK again. To properly limit the maximum log file size, run the
      following PowerCLI command: # Add the setting to all VMs Get-VM | New-
      AdvancedSetting -Name 'log.rotateSize' -value '1024000' References: 1.
      http://kb.vmware.com/kb/8182749 2. https://docs.vmware.com/en/VMware-
      vSphere/7.0/com.vmware.vsphere.monitoring.doc/GUID-2DD66869-52C7-42C5-
      8F5B-145EBD26BBA1.html
    compliance:
      - cis_vmware_esxi_7_v1_5_0_8_7_3


