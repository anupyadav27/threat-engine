# Alibaba Cloud Linux — CIS Check Rules
# Source benchmark: CIS Alibaba Cloud Linux 3
# Fill in rules per sprint. Each rule maps to a discovery_id above.

tech_type: alibaba_linux
category: linux
cis_benchmark: CIS Alibaba Cloud Linux 3

rules:
  - rule_id: alibaba_linux.cis.auth.password_policy_min_length
    title: "Ensure minimum password length is configured"
    severity: medium
    cis_section: '1'
    nist_controls: [IA-5]
    soc2_criteria: [CC6.1]
    scope: alibaba_linux.auth.password_policy
    assertion:
      field: min_length
      operator: gte
      expected: 14
    remediation: >
      Configure minimum password length to 14+ characters in the Alibaba Cloud Linux
      password policy settings.

  - rule_id: alibaba_linux.cis.logging.audit_enabled
    title: "Ensure audit logging is enabled"
    severity: high
    cis_section: '1'
    nist_controls: [AU-2, AU-3]
    soc2_criteria: [CC7.2]
    scope: alibaba_linux.logging.audit_config
    assertion:
      field: audit_enabled
      operator: equals
      expected: "true"
    remediation: >
      Enable audit logging in Alibaba Cloud Linux configuration.
      Refer to CIS Alibaba Cloud Linux 3 for specific settings.

  - rule_id: alibaba_linux.cis.encryption.tls_enabled
    title: "Ensure TLS/SSL is enabled for all connections"
    severity: high
    cis_section: '1'
    nist_controls: [SC-8, SC-28]
    soc2_criteria: [CC6.7]
    scope: alibaba_linux.encryption.transport
    assertion:
      field: tls_enabled
      operator: equals
      expected: "true"
    remediation: >
      Enable TLS/SSL encryption for Alibaba Cloud Linux connections.
      Refer to CIS Alibaba Cloud Linux 3 for minimum TLS version requirements.

  - rule_id: alibaba_linux.cis.acl.admin_count
    title: "Ensure the number of administrative accounts is minimized"
    severity: medium
    cis_section: '1'
    nist_controls: [AC-6]
    soc2_criteria: [CC6.3]
    scope: alibaba_linux.acl.admin_privileges
    assertion:
      field: row_count
      operator: lte
      expected: 3
    remediation: >
      Review and reduce administrative accounts in Alibaba Cloud Linux.
      Apply principle of least privilege.
