  - rule_id: rhel.cis.2.chrony_is_not_run_as_the_root_user
    title: "Ensure chrony is not run as the root user"
    severity: high
    automation_type: automated
    cis_control: '2.3.3'
    cis_section: '2'
    profile_applicability: "Level 1"
    scope: rhel.section_2.chrony_is_not_run_as_the_root_user
    assertion:
      field: value
      operator: equals
      expected: "true"
    remediation: >
      Edit the file /etc/sysconfig/chronyd and add or modify the following line to
      remove '-u root' from any OPTIONS= argument: Example: OPTIONS='-F 2' Run the
      following command to reload the chronyd.service configuration: # systemctl
      reload-or-restart chronyd.service Default Value: OPTIONS='-F 2' 2.4 Job
      Schedulers A job scheduler is used to execute jobs, commands, or shell
      scripts, at fixed times, dates, or intervals 2.4.1 Configure cron cron is a
      time based job scheduler Notes: • Other methods, such as systemd timers, exist
      for scheduling jobs. If another method is used, cron should be removed, and
      the alternate method should be secured in accordance with local site policy •
      - IF - cron is not installed on the system, this section can be skipped
    compliance:
      - cis_rhel_9_v2_0_0_2_3_3

  - rule_id: rhel.cis.2.cron_daemon_is_enabled_and_active
    title: "Ensure cron daemon is enabled and active"
    severity: high
    automation_type: automated
    cis_control: '2.4.1.1'
    cis_section: '2'
    profile_applicability: "Level 1"
    scope: rhel.section_2.cron_daemon_is_enabled_and_active
    assertion:
      field: enabled
      operator: equals
      expected: "on"
    remediation: >
      - IF - cron is installed on the system: Run the following commands to unmask,
      enable, and start cron: # systemctl unmask '$(systemctl list-unit-files | awk
      '$1~/^crond?\.service/{print $1}')' # systemctl --now enable '$(systemctl
      list-unit-files | awk '$1~/^crond?\.service/{print $1}')' References: 1. NIST
      SP 800-53 Rev. 5: CM-1, CM-2, CM-6, CM-7, IA-5 MITRE ATT&CK Mappings:
      Techniques / Sub- techniques Tactics Mitigations T1562, T1562.001 TA0005 M1018
    compliance:
      - cis_rhel_9_v2_0_0_2_4_1_1

  - rule_id: rhel.cis.2.at_is_restricted_to_authorized_users
    title: "Ensure at is restricted to authorized users"
    severity: high
    automation_type: automated
    cis_control: '2.4.2.1'
    cis_section: '2'
    profile_applicability: "Level 1"
    scope: rhel.section_2.at_is_restricted_to_authorized_users
    assertion:
      field: row_count
      operator: exists
      expected: "on"
    remediation: >
      - IF - at is installed on the system: Run the following script to: •
      /etc/at.allow: o Create the file if it doesn't exist o Change owner or user
      root o If group daemon exists, change to group daemon, else change group to
      root o Change mode to 640 or more restrictive • - IF - /etc/at.deny exists: o
      Change owner or user root o If group daemon exists, change to group daemon,
      else change group to root o Change mode to 640 or more restrictive
      #!/usr/bin/env bash { grep -Pq -- '^daemon\b' /etc/group && l_group='daemon'
      || l_group='root' [ ! -e '/etc/at.allow' ] && touch /etc/at.allow chown
      root:'$l_group' /etc/at.allow chmod u-x,g-wx,o-rwx /etc/at.allow [ -e
      '/etc/at.deny' ] && chown root:'$l_group' /etc/at.deny [ -e '/etc/at.deny' ]
      && chmod u-x,g-wx,o-rwx /etc/at.deny } References: 1. NIST SP 800-53 Rev. 5:
      AC-3. MP-2
    compliance:
      - cis_rhel_9_v2_0_0_2_4_2_1


