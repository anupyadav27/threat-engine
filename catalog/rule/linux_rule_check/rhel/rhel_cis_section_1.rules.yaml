    remediation: >
      Run the following script to ensure that autorun-never=true cannot be
      overridden: #!/usr/bin/env bash { # Check if GNOME Desktop Manager is
      installed. If package isn't installed, recommendation is Not Applicable\n #
      determine system's package manager l_pkgoutput='' if command -v dpkg-query >
      /dev/null 2>&1; then l_pq='dpkg-query -W' elif command -v rpm > /dev/null
      2>&1; then l_pq='rpm -q' fi # Check if GDM is installed l_pcl='gdm gdm3' #
      Space separated list of packages to check for l_pn in $l_pcl; do $l_pq '$l_pn'
      > /dev/null 2>&1 && l_pkgoutput='y' && echo -e '\n - Package: \'$l_pn\' exists
      on the system\n - remediating configuration if needed' done # Check
      configuration (If applicable) if [ -n '$l_pkgoutput' ]; then # Look for
      autorun to determine profile in use, needed for remaining tests
      l_kfd='/etc/dconf/db/$(grep -Psril '^\h*autorun-never\b' /etc/dconf/db/*/ |
      awk -F'/' '{split($(NF-1),a,'.');print a[1]}').d' #set directory of key file
      to be locked if [ -d '$l_kfd' ]; then # If key file directory doesn't exist,
      options can't be locked if grep -Priq '^\h*\/org/gnome\/desktop\/media-
      handling\/autorun-never\b' '$l_kfd'; then echo ' - \'autorun-never\' is locked
      in \'$(grep -Pril '^\h*\/org/gnome\/desktop\/media-handling\/autorun-never\b'
      '$l_kfd')\'' else echo ' - creating entry to lock \'autorun-never\'' [ ! -d
      '$l_kfd'/locks ] && echo 'creating directory $l_kfd/locks' && mkdir
      '$l_kfd'/locks { echo -e '\n# Lock desktop media-handling autorun-never
      setting' echo '/org/gnome/desktop/media-handling/autorun-never' } >>
      '$l_kfd'/locks/00-media-autorun fi else echo -e ' - \'autorun-never\' is not
      set so it can not be locked\n - Please follow Recommendation \'Ensure GDM
      autorun-never is enabled\' and follow this Recommendation again' fi # update
      dconf database dconf update else echo -e ' - GNOME Desktop Manager package is
      not installed on the system\n - Recommendation is not applicable' fi }
    compliance:
      - cis_rhel_9_v2_0_0_1_8_9

  - rule_id: rhel.cis.1.permissions_on_bootloader_config_are_configured
    title: "Ensure permissions on bootloader config are configured"
    severity: high
    automation_type: automated
    cis_control: '1.3.2'
    cis_section: '1'
    profile_applicability: "Level 1"
    scope: rhel.section_1.permissions_on_bootloader_config_are_configured
    assertion:
      field: value
      operator: exists
      expected: "true"
    remediation: >
      Run the following to update the mode, ownership, and group ownership of the
      grub configuration files: -IF- the system uses UEFI (Files located in
      /boot/efi/EFI/*) Edit /etc/fstab and add the fmask=0077, uid=0, and gid=0
      options: Example: <device> /boot/efi vfat
      defaults,umask=0027,fmask=0077,uid=0,gid=0 0 0 Note: This may require a re-
      boot to enable the change -OR- -IF- the system uses BIOS (Files located in
      /boot/grub2/*) Run the following commands to set ownership and permissions on
      your grub configuration file(s): # [ -f /boot/grub2/grub.cfg ] && chown
      root:root /boot/grub2/grub.cfg # [ -f /boot/grub2/grub.cfg ] && chmod u-x,go-
      rwx /boot/grub2/grub.cfg # [ -f /boot/grub2/grubenv ] && chown root:root
      /boot/grub2/grubenv # [ -f /boot/grub2/grubenv ] && chmod u-x,go-rwx
      /boot/grub2/grubenv # [ -f /boot/grub2/user.cfg ] && chown root:root
      /boot/grub2/user.cfg # [ -f /boot/grub2/user.cfg ] && chmod u-x,go-rwx
      /boot/grub2/user.cfg References: 1. NIST SP 800-53 Rev. 5: AC-3, MP-2
      Additional Information: This recommendation is designed around the grub
      bootloader, if LILO or another bootloader is in use in your environment enact
      equivalent settings.
    compliance:
      - cis_rhel_8_v3_0_0_1_3_2

  - rule_id: rhel.cis.1.address_space_layout_randomization_aslr_is_enabled
    title: "Ensure address space layout randomization (ASLR) is enabled"
    severity: high
    automation_type: automated
    cis_control: '1.4.1'
    cis_section: '1'
    profile_applicability: "Level 1"
    scope: rhel.section_1.address_space_layout_randomization_aslr_is_enabled
    assertion:
      field: enabled
      operator: equals
      expected: "on"
    remediation: >
      Set the following parameter in /etc/sysctl.conf or a file in /etc/sysctl.d/
      ending in .conf: • kernel.randomize_va_space = 2 Example: # printf '
      kernel.randomize_va_space = 2 ' >> /etc/sysctl.d/60-kernel_sysctl.conf Run the
      following command to set the active kernel parameter: # sysctl -w
      kernel.randomize_va_space=2 Note: If these settings appear in a canonically
      later file, or later in the same file, these settings will be overwritten
      Default Value: kernel.randomize_va_space = 2 References: 1. CCI-000366: The
      organization implements the security configuration settings 2. NIST SP 800-53
      Rev. 5: CM-6 3. NIST SP 800-53A :: CM-6.1 (iv)
    compliance:
      - cis_rhel_8_v3_0_0_1_4_1


