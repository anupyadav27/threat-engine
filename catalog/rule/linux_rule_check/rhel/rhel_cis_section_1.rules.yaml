      Note: • The commands below are written for the included DEFAULT system-wide
      crypto policy. If another policy is in use and follows local site policy,
      replace DEFAULT with the name of your system-wide crypto policy. • CBC can be
      turned off globally by using the argument cipher opposed to cipher@SSH •
      Multiple subpolicies may be assigned to a policy as a colon separated list.
      e.g. DEFAULT:NO-SHA1:NO-SSHCBC • Subpolicies: o Not included in the update-
      crypto-policies --set command will not be applied to the system wide crypto
      policy. o must exist before they can be applied to the system wide crypto
      policy. o .pmod file filenames must be in all upper case, upper case, e.g. NO-
      SSHCBC.pmod, or they will not be read by the update-crypto-policies --set
      command. Create or edit a file in /etc/crypto-policies/policies/modules/
      ending in .pmod and add or modify one of the the following lines: cipher@SSH =
      -*-CBC # Disables the CBC cipher for SSH Example: # printf '%s\n' '# This is a
