  - rule_id: rhel.cis.1.selinux_is_not_disabled_in_bootloader
    title: "Ensure SELinux is not disabled in bootloader configuration"
    severity: high
    automation_type: automated
    cis_control: '1.3.1.2'
    cis_section: '1'
    profile_applicability: "Level 1"
    scope: rhel.section_1.selinux_is_not_disabled_in_bootloader
    assertion:
      field: enabled
      operator: equals
      expected: "false"
    remediation: >
      Run the following command to remove the selinux=0 and enforcing=0 parameters:
      grubby --update-kernel ALL --remove-args 'selinux=0 enforcing=0' Run the
      following command to remove the selinux=0 and enforcing=0 parameters if they
      were created by the deprecated grub2-mkconfig command: # grep -Prsq --
      '\h*([^#\n\r]+\h+)?kernelopts=([^#\n\r]+\h+)?(selinux|enforcing)=0\b'
      /boot/grub2 /boot/efi && grub2-mkconfig -o '$(grep -Prl --
      '\h*([^#\n\r]+\h+)?kernelopts=([^#\n\r]+\h+)?(selinux|enforcing)=0\b'
      /boot/grub2 /boot/efi)' References: 1. NIST SP 800-53 Rev. 5: AC-3, MP-2
      Additional Information: This recommendation is designed around the grub 2
      bootloader, if another bootloader is in use in your environment enact
      equivalent settings. grubby is a command line tool for updating and displaying
      information about the configuration files for the grub2 and zipl boot loaders.
      It is primarily designed to be used from scripts which install new kernels and
      need to find information about the current boot environment. • All bootloaders
      define the boot entries as individual configuration fragments that are stored
      by default in /boot/loader/entries. The format for the config files is
      specified at https://systemd.io/BOOT_LOADER_SPECIFICATION. The grubby tool is
      used to update and display the configuration defined in the BootLoaderSpec
      fragment files. • There are a number of ways to specify the kernel used for
      --info, --remove- kernel, and --update-kernel. Specifying DEFAULT or ALL
      selects the de‐fault entry and all of the entries, respectively. Also, the
      title of a boot entry may be specified by using TITLE=title as the argument;
      all entries with that title are used.
    compliance:
      - cis_rhel_9_v2_0_0_1_3_1_2

