      following line in the [Coredump] section: Storage=none Example: #!/usr/bin/env
      bash { [ ! -d /etc/systemd/coredump.conf.d/ ] && mkdir
      /etc/systemd/coredump.conf.d/ if grep -Psq -- '^\h*\[Coredump\]'
      /etc/systemd/coredump.conf.d/60- coredump.conf; then printf '%s\n'
      'Storage=none' >> /etc/systemd/coredump.conf.d/60- coredump.conf else printf
      '%s\n' '[Coredump]' 'Storage=none' >>
      /etc/systemd/coredump.conf.d/60-coredump.conf fi } References: 1.
      https://www.freedesktop.org/software/systemd/man/coredump.conf.html MITRE
      ATT&CK Mappings: Techniques / Sub- techniques Tactics Mitigations T1005,
      T1005.000 TA0007 M1057 1.6 Configure system wide crypto policy The crypto
      policy definition files have a simple syntax following an INI file key = value
      syntax Full policy definition files have suffix .pol, subpolicy files have
      suffix .pmod. Subpolicies do not have to have values set for all the keys. The
      effective configuration of a policy with subpolicies applied is the same as a
      configuration from a single policy obtained by concatenating the policy and
      the subpolicies in question. The policy files shipped in packages are placed
      in /usr/share/crypto- policies/policies and the subpolicies in
      /usr/share/crypto- policies/policies/modules. Locally configured policy files
      should be placed in /etc/crypto-policies/policies and subpolicies in
      /etc/crypto-policies/policies/modules. The policy and subpolicy files must
      have names in upper-case except for the .pol and .pmod suffix as the update-
      crypto-policies command always converts the policy name to upper-case before
      searching for the policy on the filesystem. The following predefined policies
      are included: • DEFAULT - The default system-wide cryptographic policy level
      offers secure settings for current threat models. It allows the TLS 1.2 and
      1.3 protocols, as well as the IKEv2 and SSH2 protocols. The RSA keys and
      Diffie-Hellman parameters are accepted if they are at least 2048 bits long. •
      LEGACY - This policy ensures maximum compatibility with Red Hat Enterprise
      Linux 5 and earlier; it is less secure due to an increased attack surface. In
      addition to the DEFAULT level algorithms and protocols, it includes support
      for the TLS 1.0 and 1.1 protocols. The algorithms DSA, 3DES, and RC4 are
      allowed, while RSA keys and Diffie-Hellman parameters are accepted if they are
      at least 1023 bits long. • FUTURE - A stricter forward-looking security level
      intended for testing a possible future policy. This policy does not allow the
      use of SHA-1 in signature algorithms. It allows the TLS 1.2 and 1.3 protocols,
      as well as the IKEv2 and SSH2 protocols. The RSA keys and Diffie-Hellman
      parameters are accepted if they are at least 3072 bits long. If your system
      communicates on the public internet, you might face interoperability problems.
      • FIPS - A policy level that conforms with the FIPS 140 requirements. The
      fips- mode-setup tool, which switches the RHEL system into FIPS mode, uses
      this policy internally. Switching to the FIPS policy does not guarantee
      compliance with the FIPS 140 standard. You also must re-generate all
      cryptographic keys after you set the system to FIPS mode. This is not possible
      in many scenarios.
    compliance:
      - cis_rhel_9_v2_0_0_1_5_4

  - rule_id: rhel.cis.1.system_wide_crypto_policy_is_not_set_to_legacy
    title: "Ensure system wide crypto policy is not set to legacy"
    severity: high
    automation_type: automated
    cis_control: '1.6.1'
    cis_section: '1'
    profile_applicability: "Level 1"
    scope: rhel.section_1.system_wide_crypto_policy_is_not_set_to_legacy
    assertion:
      field: version
      operator: gte
      expected: "no"
    remediation: >
      Run the following command to change the system-wide crypto policy # update-
      crypto-policies --set <CRYPTO POLICY> Example: # update-crypto-policies --set
      DEFAULT Run the following to make the updated system-wide crypto policy active
      # update-crypto-policies Default Value: DEFAULT References: 1. CRYPTO-
      POLICIES(7) 2. https://access.redhat.com/articles/3642912#what-polices-are-
      provided-1 3. fips-mode-setup(8) 4. NIST SP 800-53 Rev. 5: SC-8 Additional
      Information: - IF - FIPS is required by local site policy: The system-wide
      cryptographic policies contain a policy level that enables cryptographic
      algorithms in accordance with the requirements by the Federal Information
      Processing Standard (FIPS) Publication 140. The fips-mode-setup tool that
      enables or disables FIPS mode internally uses the FIPS systemwide
      cryptographic policy. Switching the system to FIPS mode by using the FIPS
      system-wide cryptographic policy does not guarantee compliance with the FIPS
      140 standard. Re-generating all cryptographic keys after setting the system to
      FIPS mode may not be possible. For example, in the case of an existing IdM
      realm with users' cryptographic keys you cannot re-generate all the keys. The
      fips-mode-setup tool uses the FIPS policy internally. But on top of what the
      update-crypto-policies command with the --set FIPS option does, fips-mode-
      setup ensures the installation of the FIPS dracut module by using the fips-
      finish- install tool, it also adds the fips=1 boot option to the kernel
      command line and regenerates the initial ramdisk. IMPORTANT: Only enabling
      FIPS mode during installation ensures that the system generates all keys with
      FIPS-approved algorithms and continuous monitoring tests in place. Run the
      following command to switch the system to FIPS mode: # fips-mode-setup
      --enable Output: Kernel initramdisks are being regenerated. This might take
      some time. Setting system policy to FIPS Note: System-wide crypto policies are
      applied on application start-up. It is recommended to restart the system for
      the change of policies to fully take place. FIPS mode will be enabled. Please
      reboot the system for the setting to take effect. Run the following command to
      restart the system: # reboot After the reboot has completed, run the following
      command to verify FIPS mode: # fips-mode-setup --check Output: FIPS mode is
      enabled.
    compliance:
      - cis_rhel_9_v2_0_0_1_6_1

  - rule_id: rhel.cis.1.system_wide_crypto_policy_is_not_set_in_sshd
