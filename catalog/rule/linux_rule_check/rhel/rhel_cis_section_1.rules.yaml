      a_output2+=(' - denylisting kernel module: \'$l_mod_name\'') printf '%s\n'
      'blacklist $l_mod_name' >> /etc/modprobe.d/'$l_mod_name'.conf fi } for
      l_mod_base_directory in $l_mod_path; do # Check if the module exists on the
      system if [ -d '$l_mod_base_directory/${l_mod_name/-/\/}' ] && [ -n '$(ls -A
      $l_mod_base_directory/${l_mod_name/-/\/})' ]; then l_output3='$l_output3\n -
      \'$l_mod_base_directory\'' [[ '$l_mod_name' =~ overlay ]] &&
      l_mod_name='${l_mod_name::-2}' [ '$l_dl' != 'y' ] && f_module_fix else echo -e
      ' - kernel module: \'$l_mod_name\' doesn't exist in \'$l_mod_base_directory\''
      fi done [ -n '$l_output3' ] && echo -e '\n\n -- INFO --\n - module:
      \'$l_mod_name\' exists in:$l_output3' [ '${#a_output2[@]}' -gt 0 ] && printf
      '%s\n' '${a_output2[@]}' echo -e '\n - remediation of kernel module:
      \'$l_mod_name\' complete\n' } References: 1. NIST SP 800-53 Rev. 5: CM-7
    compliance:
      - cis_rhel_9_v2_0_0_1_1_1_7

  - rule_id: rhel.cis.1.usb_storage_kernel_module_is_not_available
    title: "Ensure usb-storage kernel module is not available"
    severity: high
    automation_type: automated
    cis_control: '1.1.1.8'
    cis_section: '1'
    profile_applicability: "Level 1 + Level 2"
    scope: rhel.section_1.usb_storage_kernel_module_is_not_available
    assertion:
      field: value
      operator: equals
      expected: "on"
    remediation: >
      Run the following script to unload and disable the usb-storage module: - IF -
      the usb-storage kernel module is available in ANY installed kernel: • Create a
      file ending in .conf with install usb-storage /bin/false in the
      /etc/modprobe.d/ directory • Create a file ending in .conf with blacklist usb-
      storage in the /etc/modprobe.d/ directory • Run modprobe -r usb-storage
      2>/dev/null; rmmod usb-storage 2>/dev/null to remove usb-storage from the
      kernel - IF - the usb-storage kernel module is not available on the system, or
      pre-compiled into the kernel, no remediation is necessary #!/usr/bin/env bash
      { unset a_output2; l_output3='' l_dl='' # unset arrays and clear variables
      l_mod_name='usb-storage' # set module name l_mod_type='drivers' # set module
      type l_mod_path='$(readlink -f /lib/modules/**/kernel/$l_mod_type | sort -u)'
      f_module_fix() { l_dl='y' # Set to ignore duplicate checks a_showconfig=() #
      Create array with modprobe output while IFS= read -r l_showconfig; do
      a_showconfig+=('$l_showconfig') done < <(modprobe --showconfig | grep -P --
      '\b(install|blacklist)\h+''${l_mod_name//-/_}''\b') if lsmod | grep
      '$l_mod_name' &> /dev/null; then # Check if the module is currently loaded
      a_output2+=(' - unloading kernel module: \'$l_mod_name\'') modprobe -r
      '$l_mod_name' 2>/dev/null; rmmod '$l_mod_name' 2>/dev/null fi if ! grep -Pq --
      '\binstall\h+''${l_mod_name//- /_}''\h+\/bin\/(true|false)\b' <<<
      '${a_showconfig[*]}'; then a_output2+=(' - setting kernel module:
      \'$l_mod_name\' to \'/bin/false\'') printf '%s\n' 'install $l_mod_name
      /bin/false' >> /etc/modprobe.d/'$l_mod_name'.conf fi if ! grep -Pq --
      '\bblacklist\h+''${l_mod_name//-/_}''\b' <<< '${a_showconfig[*]}'; then
      a_output2+=(' - denylisting kernel module: \'$l_mod_name\'') printf '%s\n'
      'blacklist $l_mod_name' >> /etc/modprobe.d/'$l_mod_name'.conf fi } for
      l_mod_base_directory in $l_mod_path; do # Check if the module exists on the
      system if [ -d '$l_mod_base_directory/${l_mod_name/-/\/}' ] && [ -n '$(ls -A
      $l_mod_base_directory/${l_mod_name/-/\/})' ]; then l_output3='$l_output3\n -
      \'$l_mod_base_directory\'' [[ '$l_mod_name' =~ overlay ]] &&
      l_mod_name='${l_mod_name::-2}' [ '$l_dl' != 'y' ] && f_module_fix else echo -e
      ' - kernel module: \'$l_mod_name\' doesn't exist in \'$l_mod_base_directory\''
      fi done [ -n '$l_output3' ] && echo -e '\n\n -- INFO --\n - module:
      \'$l_mod_name\' exists in:$l_output3' [ '${#a_output2[@]}' -gt 0 ] && printf
      '%s\n' '${a_output2[@]}' echo -e '\n - remediation of kernel module:
      \'$l_mod_name\' complete\n' } References: 1. NIST SP 800-53 Rev. 5: SI-3
      Additional Information: An alternative solution to disabling the usb-storage
      module may be found in USBGuard. Use of USBGuard and construction of USB
      device policies should be done in alignment with site policy.
    compliance:
      - cis_rhel_9_v2_0_0_1_1_1_8

