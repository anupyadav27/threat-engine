  - rule_id: rhel.cis.1.gdm_screen_locks_when_the_user_is_idle
    title: "Ensure GDM screen locks when the user is idle"
    severity: high
    automation_type: automated
    cis_control: '1.8.4'
    cis_section: '1'
    profile_applicability: "Level 1"
    scope: rhel.section_1.gdm_screen_locks_when_the_user_is_idle
    assertion:
      field: row_count
      operator: equals
      expected: "on"
    remediation: >
      Create or edit a file in the /etc/dconf/profile/ and verify it includes the
      following: user-db:user system-db:{NAME_OF_DCONF_DATABASE} Note: local is the
      name of a dconf database used in the examples. Example: # echo -e '\nuser-
      db:user\nsystem-db:local' >> /etc/dconf/profile/user Create the directory
      /etc/dconf/db/{NAME_OF_DCONF_DATABASE}.d/ if it doesn't already exist:
      Example: # mkdir /etc/dconf/db/local.d Create the key file
      /etc/dconf/db/{NAME_OF_DCONF_DATABASE}.d/{FILE_NAME} to provide information
      for the {NAME_OF_DCONF_DATABASE} database: Example script: #!/usr/bin/env bash
      { l_key_file='/etc/dconf/db/local.d/00-screensaver' l_idmv='900' # Set max
      value for idle-delay in seconds (between 1 and 900) l_ldmv='5' # Set max value
      for lock-delay in seconds (between 0 and 5) { echo '# Specify the dconf path'
      echo '[org/gnome/desktop/session]' echo '' echo '# Number of seconds of
      inactivity before the screen goes blank' echo '# Set to 0 seconds if you want
      to deactivate the screensaver.' echo 'idle-delay=uint32 $l_idmv' echo '' echo
      '# Specify the dconf path' echo '[org/gnome/desktop/screensaver]' echo '' echo
      '# Number of seconds after the screen is blank before locking the screen' echo
      'lock-delay=uint32 $l_ldmv' } > '$l_key_file' } Note: You must include the
      uint32 along with the integer key values as shown. Run the following command
      to update the system databases: # dconf update Note: Users must log out and
      back in again before the system-wide settings take effect. References: 1.
      https://help.gnome.org/admin/system-admin-guide/stable/desktop-
      lockscreen.html.en
    compliance:
      - cis_rhel_9_v2_0_0_1_8_4

  - rule_id: rhel.cis.1.gdm_screen_locks_cannot_be_overridden
    title: "Ensure GDM screen locks cannot be overridden"
    severity: high
    automation_type: automated
    cis_control: '1.8.5'
    cis_section: '1'
    profile_applicability: "Level 1"
    scope: rhel.section_1.gdm_screen_locks_cannot_be_overridden
    assertion:
      field: row_count
      operator: equals
      expected: "on"
    remediation: >
      Run the following script to ensure screen locks cannot be overridden:
      #!/usr/bin/env bash { # Check if GNMOE Desktop Manager is installed. If
      package isn't installed, recommendation is Not Applicable\n # determine
      system's package manager l_pkgoutput='' if command -v dpkg-query > /dev/null
      2>&1; then l_pq='dpkg-query -W' elif command -v rpm > /dev/null 2>&1; then
      l_pq='rpm -q' fi # Check if GDM is installed l_pcl='gdm gdm3' # Space
      separated list of packages to check for l_pn in $l_pcl; do $l_pq '$l_pn' >
      /dev/null 2>&1 && l_pkgoutput='y' && echo -e '\n - Package: \'$l_pn\' exists
      on the system\n - remediating configuration if needed' done # Check
      configuration (If applicable) if [ -n '$l_pkgoutput' ]; then # Look for idle-
      delay to determine profile in use, needed for remaining tests
      l_kfd='/etc/dconf/db/$(grep -Psril '^\h*idle-delay\h*=\h*uint32\h+\d+\b'
      /etc/dconf/db/*/ | awk -F'/' '{split($(NF-1),a,'.');print a[1]}').d' #set
      directory of key file to be locked # Look for lock-delay to determine profile
      in use, needed for remaining tests l_kfd2='/etc/dconf/db/$(grep -Psril
      '^\h*lock-delay\h*=\h*uint32\h+\d+\b' /etc/dconf/db/*/ | awk -F'/'
      '{split($(NF-1),a,'.');print a[1]}').d' #set directory of key file to be
      locked if [ -d '$l_kfd' ]; then # If key file directory doesn't exist, options
      can't be locked if grep -Prilq '^\h*\/org\/gnome\/desktop\/session\/idle-
      delay\b' '$l_kfd'; then echo ' - \'idle-delay\' is locked in \'$(grep -Pril
      '^\h*\/org\/gnome\/desktop\/session\/idle-delay\b' '$l_kfd')\'' else echo
      'creating entry to lock \'idle-delay\'' [ ! -d '$l_kfd'/locks ] && echo
      'creating directory $l_kfd/locks' && mkdir '$l_kfd'/locks { echo -e '\n# Lock
      desktop screensaver idle-delay setting' echo '/org/gnome/desktop/session/idle-
      delay' } >> '$l_kfd'/locks/00-screensaver fi else echo -e ' - \'idle-delay\'
      is not set so it can not be locked\n - Please follow Recommendation \'Ensure
      GDM screen locks when the user is idle\' and follow this Recommendation again'
      fi if [ -d '$l_kfd2' ]; then # If key file directory doesn't exist, options
      can't be locked if grep -Prilq '^\h*\/org\/gnome\/desktop\/screensaver\/lock-
      delay\b' '$l_kfd2'; then echo ' - \'lock-delay\' is locked in \'$(grep -Pril
      '^\h*\/org\/gnome\/desktop\/screensaver\/lock-delay\b' '$l_kfd2')\'' else echo
      'creating entry to lock \'lock-delay\'' [ ! -d '$l_kfd2'/locks ] && echo
      'creating directory $l_kfd2/locks' && mkdir '$l_kfd2'/locks { echo -e '\n#
      Lock desktop screensaver lock-delay setting' echo
      '/org/gnome/desktop/screensaver/lock-delay' } >>
      '$l_kfd2'/locks/00-screensaver fi else echo -e ' - \'lock-delay\' is not set
      so it can not be locked\n - Please follow Recommendation \'Ensure GDM screen
      locks when the user is idle\' and follow this Recommendation again' fi else
      echo -e ' - GNOME Desktop Manager package is not installed on the system\n -
      Recommendation is not applicable' fi } Run the following command to update the
      system databases: # dconf update Note: Users must log out and back in again
      before the system-wide settings take effect. References: 1.
      https://help.gnome.org/admin/system-admin-guide/stable/desktop-
      lockscreen.html.en 2. https://help.gnome.org/admin/system-admin-
      guide/stable/dconf-lockdown.html.en
    compliance:
      - cis_rhel_9_v2_0_0_1_8_5

  - rule_id: rhel.cis.1.gdm_automatic_mounting_of_removable_media_is
    title: "Ensure GDM automatic mounting of removable media is disabled"
    severity: high
    automation_type: automated
    cis_control: '1.8.6'
    cis_section: '1'
    profile_applicability: "Level 1 + Level 2"
    scope: rhel.section_1.gdm_automatic_mounting_of_removable_media_is
    assertion:
      field: enabled
      operator: equals
      expected: "false"
    remediation: >
      Run the following script to disable automatic mounting of media for all GNOME
      users: #!/usr/bin/env bash { l_pkgoutput='' l_gpname='local' # Set to desired
      dconf profile name (default is local) # Check if GNOME Desktop Manager is
      installed. If package isn't installed, recommendation is Not Applicable\n #
      determine system's package manager if command -v dpkg-query > /dev/null 2>&1;
      then l_pq='dpkg-query -W' elif command -v rpm > /dev/null 2>&1; then l_pq='rpm
      -q' fi # Check if GDM is installed l_pcl='gdm gdm3' # Space separated list of
      packages to check for l_pn in $l_pcl; do $l_pq '$l_pn' > /dev/null 2>&1 &&
      l_pkgoutput='$l_pkgoutput\n - Package: \'$l_pn\' exists on the system\n -
      checking configuration' done # Check configuration (If applicable) if [ -n
      '$l_pkgoutput' ]; then echo -e '$l_pkgoutput' # Look for existing settings and
      set variables if they exist l_kfile='$(grep -Prils -- '^\h*automount\b'
      /etc/dconf/db/*.d)' l_kfile2='$(grep -Prils -- '^\h*automount-open\b'
      /etc/dconf/db/*.d)' # Set profile name based on dconf db directory
      ({PROFILE_NAME}.d) if [ -f '$l_kfile' ]; then l_gpname='$(awk -F\/
      '{split($(NF-1),a,'.');print a[1]}' <<< '$l_kfile')' echo ' - updating dconf
      profile name to \'$l_gpname\'' elif [ -f '$l_kfile2' ]; then l_gpname='$(awk
      -F\/ '{split($(NF-1),a,'.');print a[1]}' <<< '$l_kfile2')' echo ' - updating
      dconf profile name to \'$l_gpname\'' fi # check for consistency (Clean up
      configuration if needed) if [ -f '$l_kfile' ] && [ '$(awk -F\/
      '{split($(NF-1),a,'.');print a[1]}' <<< '$l_kfile')' != '$l_gpname' ]; then
      sed -ri '/^\s*automount\s*=/s/^/# /' '$l_kfile'
      l_kfile='/etc/dconf/db/$l_gpname.d/00-media-automount' fi if [ -f '$l_kfile2'
      ] && [ '$(awk -F\/ '{split($(NF-1),a,'.');print a[1]}' <<< '$l_kfile2')' !=
      '$l_gpname' ]; then sed -ri '/^\s*automount-open\s*=/s/^/# /' '$l_kfile2' fi [
      -z '$l_kfile' ] && l_kfile='/etc/dconf/db/$l_gpname.d/00-media- automount' #
      Check if profile file exists if grep -Pq -- '^\h*system-db:$l_gpname\b'
      /etc/dconf/profile/*; then echo -e '\n - dconf database profile exists in:
      \'$(grep -Pl -- '^\h*system-db:$l_gpname\b' /etc/dconf/profile/*)\'' else if [
      ! -f '/etc/dconf/profile/user' ]; then l_gpfile='/etc/dconf/profile/user' else
      l_gpfile='/etc/dconf/profile/user2' fi echo -e ' - creating dconf database
      profile' { echo -e '\nuser-db:user' echo 'system-db:$l_gpname' } >>
      '$l_gpfile' fi # create dconf directory if it doesn't exists
      l_gpdir='/etc/dconf/db/$l_gpname.d' if [ -d '$l_gpdir' ]; then echo ' - The
      dconf database directory \'$l_gpdir\' exists' else echo ' - creating dconf
      database directory \'$l_gpdir\'' mkdir '$l_gpdir' fi # check automount-open
      setting if grep -Pqs -- '^\h*automount-open\h*=\h*false\b' '$l_kfile'; then
      echo ' - \'automount-open\' is set to false in: \'$l_kfile\'' else echo ' -
      creating \'automount-open\' entry in \'$l_kfile\'' ! grep -Psq --
      '\^\h*\[org\/gnome\/desktop\/media-handling\]\b' '$l_kfile' && echo
      '[org/gnome/desktop/media-handling]' >> '$l_kfile' sed -ri
      '/^\s*\[org\/gnome\/desktop\/media-handling\]/a \\nautomount-open=false'
      '$l_kfile' fi # check automount setting if grep -Pqs --
      '^\h*automount\h*=\h*false\b' '$l_kfile'; then echo ' - \'automount\' is set
      to false in: \'$l_kfile\'' else echo ' - creating \'automount\' entry in
      \'$l_kfile\'' ! grep -Psq -- '\^\h*\[org\/gnome\/desktop\/media-handling\]\b'
      '$l_kfile' && echo '[org/gnome/desktop/media-handling]' >> '$l_kfile' sed -ri
      '/^\s*\[org\/gnome\/desktop\/media-handling\]/a \\nautomount=false' '$l_kfile'
      fi # update dconf database dconf update else echo -e '\n - GNOME Desktop
      Manager package is not installed on the system\n - Recommendation is not
      applicable' fi } - OR - Run the following command to uninstall the GNOME
      desktop Manager package: # dnf remove gdm References: 1.
      https://access.redhat.com/solutions/20107
    compliance:
      - cis_rhel_9_v2_0_0_1_8_6

