  - rule_id: rhel.cis.3.a_single_firewall_configuration_utility_is_in_use
    title: "Ensure a single firewall configuration utility is in use"
    severity: high
    automation_type: automated
    cis_control: '3.4.1.2'
    cis_section: '3'
    profile_applicability: "Level 1"
    scope: rhel.section_3.a_single_firewall_configuration_utility_is_in_use
    assertion:
      field: port
      operator: equals
      expected: "on"
    remediation: >
      Run the following script to ensure that a single firewall utility is in use on
      the system: #!/usr/bin/env bash { l_output='' l_output2='' l_fwd_status=''
      l_nft_status='' l_fwutil_status='' # Determine FirewallD utility Status rpm -q
      firewalld > /dev/null 2>&1 && l_fwd_status='$(systemctl is-enabled
      firewalld.service):$(systemctl is-active firewalld.service)' # Determine
      NFTables utility Status rpm -q nftables > /dev/null 2>&1 &&
      l_nft_status='$(systemctl is-enabled nftables.service):$(systemctl is-active
      nftables.service)' l_fwutil_status='$l_fwd_status:$l_nft_status' case
      $l_fwutil_status in
      enabled:active:masked:inactive|enabled:active:disabled:inactive) echo -e '\n -
      FirewallD utility is in use, enabled and active\n - NFTables utility is
      correctly disabled or masked and inactive\n - no remediation required' ;;
      masked:inactive:enabled:active|disabled:inactive:enabled:active) echo -e '\n -
      NFTables utility is in use, enabled and active\n - FirewallD utility is
      correctly disabled or masked and inactive\n - no remediation required' ;;
      enabled:active:enabled:active) echo -e '\n - Both FirewallD and NFTables
      utilities are enabled and active\n - stopping and masking NFTables utility'
      systemctl stop nftables && systemctl --now mask nftables ;;
      enabled:*:enabled:*) echo -e '\n - Both FirewallD and NFTables utilities are
      enabled\n - remediating' if [ '$(awk -F: '{print $2}' <<< '$l_fwutil_status')'
      = 'active' ] && [ '$(awk -F: '{print $4}' <<< '$l_fwutil_status')' =
      'inactive' ]; then echo ' - masking NFTables utility' systemctl stop nftables
      && systemctl --now mask nftables elif [ '$(awk -F: '{print $4}' <<<
      '$l_fwutil_status')' = 'active' ] && [ '$(awk -F: '{print $2}' <<<
      '$l_fwutil_status')' = 'inactive' ]; then echo ' - masking FirewallD utility'
      systemctl stop firewalld && systemctl --now mask firewalld fi ;;
      *:active:*:active) echo -e '\n - Both FirewallD and NFTables utilities are
      active\n - remediating' if [ '$(awk -F: '{print $1}' <<< '$l_fwutil_status')'
      = 'enabled' ] && [ '$(awk -F: '{print $3}' <<< '$l_fwutil_status')' !=
      'enabled' ]; then echo ' - stopping and masking NFTables utility' systemctl
      stop nftables && systemctl --now mask nftables elif [ '$(awk -F: '{print $3}'
      <<< '$l_fwutil_status')' = 'enabled' ] && [ '$(awk -F: '{print $1}' <<<
      '$l_fwutil_status')' != 'enabled' ]; then echo ' - stopping and masking
      FirewallD utility' systemctl stop firewalld && systemctl --now mask firewalld
      fi ;; :enabled:active) echo -e '\n - NFTables utility is in use, enabled, and
      active\n - FirewallD package is not installed\n - no remediation required' ;;
      :) echo -e '\n - Neither FirewallD or NFTables is installed.\n - remediating\n
      - installing NFTables' dnf -q install nftables ;; *:*:) echo -e '\n - NFTables
      package is not installed on the system\n - remediating\n - installing
      NFTables' dnf -q install nftables ;; *) echo -e '\n - Unable to determine
      firewall state' ;; esac } References: 1.
      https://access.redhat.com/documentation/en-us/red_hat_enterprise_linux/9/html-
      single/configuring_firewalls_and_packet_filters/index
    compliance:
      - cis_rhel_8_v3_0_0_3_4_1_2

