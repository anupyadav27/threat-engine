  - rule_id: rhel.cis.3.host_based_firewall_loopback_traffic_is_configured
    title: "Ensure host based firewall loopback traffic is configured"
    severity: high
    automation_type: automated
    cis_control: '3.4.2.2'
    cis_section: '3'
    profile_applicability: "Level 1"
    scope: rhel.section_3.host_based_firewall_loopback_traffic_is_configured
    assertion:
      field: value
      operator: exists
      expected: "true"
    remediation: >
      Run the following script to implement the loopback rules: #!/usr/bin/env bash
      { l_hbfw='' if systemctl is-enabled firewalld.service | grep -q 'enabled' &&
      systemctl is-enabled nftables.service | grep -q 'enabled'; then echo -e '\n -
      Error - Both FirewallD and NFTables are enabled\n - Please follow
      recommendation: \'Ensure a single firewall configuration utility is in use\''
      elif ! systemctl is-enabled firewalld.service | grep -q 'enabled' && !
      systemctl is-enabled nftables.service | grep -q 'enabled'; then echo -e '\n -
      Error - Neither FirewallD or NFTables is enabled\n - Please follow
      recommendation: \'Ensure a single firewall configuration utility is in use\''
      else if systemctl is-enabled firewalld.service | grep -q 'enabled' && !
      systemctl is-enabled nftables.service | grep -q 'enabled'; then echo -e '\n -
      FirewallD is in use on the system' && l_hbfw='fwd' elif ! systemctl is-enabled
      firewalld.service | grep -q 'enabled' && systemctl is-enabled nftables.service
      | grep -q 'enabled'; then echo -e '\n - NFTables is in use on the system' &&
      l_hbfw='nft' fi l_ipsaddr='$(nft list ruleset | awk
      '/filter_IN_public_deny|hook\s+input\s+/,/\}\s*(#.*)?$/' | grep -P --
      'ip\h+saddr')' if ! nft list ruleset | awk '/hook\s+input\s+/,/\}\s*(#.*)?$/'
      | grep -Pq -- '\H+\h+'lo'\h+accept'; then echo -e '\n - Enabling input to
      accept for loopback address' if [ '$l_hbfw' = 'fwd' ]; then firewall-cmd
      --permanent --zone=trusted --add-interface=lo firewall-cmd --reload elif [
      '$l_hbfw' = 'nft' ]; then nft add rule inet filter input iif lo accept fi fi
      if ! grep -Pq --
      'ip\h+saddr\h+127\.0\.0\.0\/8\h+(counter\h+packets\h+\d+\h+bytes\h+\d+\h+)?drop'
      <<< '$l_ipsaddr' && ! grep -Pq --
      'ip\h+daddr\h+\!\=\h+127\.0\.0\.1\h+ip\h+saddr\h+127\.0\.0\.1\h+drop' <<<
      '$l_ipsaddr'; then echo -e '\n - Setting IPv4 network traffic from loopback
      address to drop' if [ '$l_hbfw' = 'fwd' ]; then firewall-cmd --permanent
      --add-rich-rule='rule family=ipv4 source address='127.0.0.1' destination not
      address='127.0.0.1' drop' firewall-cmd --permanent --zone=trusted --add-rich-
      rule='rule family=ipv4 source address='127.0.0.1' destination not
      address='127.0.0.1' drop' firewall-cmd --reload elif [ '$l_hbfw' = 'nft' ];
      then nft create rule inet filter input ip saddr 127.0.0.0/8 counter drop fi fi
      if grep -Pq -- '^\h*0\h*$' /sys/module/ipv6/parameters/disable; then
      l_ip6saddr='$(nft list ruleset | awk '/filter_IN_public_deny|hook input/,/}/'
      | grep 'ip6 saddr')' if ! grep -Pq
      'ip6\h+saddr\h+::1\h+(counter\h+packets\h+\d+\h+bytes\h+\d+\h+)?drop' <<<
      '$l_ip6saddr' && ! grep -Pq --
      'ip6\h+daddr\h+\!=\h+::1\h+ip6\h+saddr\h+::1\h+drop' <<< '$l_ip6saddr'; then
      echo -e '\n - Setting IPv6 network traffic from loopback address to drop' if [
      '$l_hbfw' = 'fwd' ]; then firewall-cmd --permanent --add-rich-rule='rule
      family=ipv6 source address='::1' destination not address='::1' drop' firewall-
      cmd --permanent --zone=trusted --add-rich-rule='rule family=ipv6 source
      address='::1' destination not address='::1' drop' firewall-cmd --reload elif [
      '$l_hbfw' = 'nft' ]; then nft add rule inet filter input ip6 saddr ::1 counter
      drop fi fi fi fi } References: 1. NIST SP 800-53 Rev. 5: CA-9
    compliance:
      - cis_rhel_8_v3_0_0_3_4_2_2

