tech_type: rhel
category: linux
cis_benchmark: CIS Red Hat Enterprise Linux 9 v2.0.0
cis_section: '5'

rules:

  - rule_id: rhel.cis.5.permissions_on_etc_ssh_sshd_config_are_configured
    title: "Ensure permissions on /etc/ssh/sshd_config are configured"
    severity: high
    automation_type: automated
    cis_control: '5.1.1'
    cis_section: '5'
    profile_applicability: "Level 1"
    scope: rhel.section_5.permissions_on_etc_ssh_sshd_config_are_configured
    assertion:
      field: value
      operator: exists
      expected: "true"
    remediation: >
      Run the following script to set ownership and permissions on
      /etc/ssh/sshd_config and files ending in .conf in the /etc/ssh/sshd_config.d
      directory: #!/usr/bin/env bash { chmod u-x,og-rwx /etc/ssh/sshd_config chown
      root:root /etc/ssh/sshd_config while IFS= read -r -d $'\0' l_file; do if [ -e
      '$l_file' ]; then chmod u-x,og-rwx '$l_file' chown root:root '$l_file' fi done
      < <(find /etc/ssh/sshd_config.d -type f -print0 2>/dev/null) } - IF - other
      locations are listed in an Include statement, *.conf files in these locations
      access should also be modified. References: 1. NIST SP 800-53 Rev. 5: AC-3.
      MP-2
    compliance:
      - cis_rhel_9_v2_0_0_5_1_1

  - rule_id: rhel.cis.5.permissions_on_ssh_private_host_key_files_are
    title: "Ensure permissions on SSH private host key files are configured"
    severity: high
    automation_type: automated
    cis_control: '5.1.2'
    cis_section: '5'
    profile_applicability: "Level 1"
    scope: rhel.section_5.permissions_on_ssh_private_host_key_files_are
    assertion:
      field: value
      operator: exists
      expected: "no"
    remediation: >
      Run the following script to set mode, ownership, and group on the private SSH
      host key files: { l_output='' l_output2='' l_ssh_group_name='$(awk -F: '($1 ~
      /^(ssh_keys|_?ssh)$/) {print $1}' /etc/group)' f_file_access_fix() { while
      IFS=: read -r l_file_mode l_file_owner l_file_group; do echo 'File:
      \'$l_file\' mode: \'$l_file_mode\' owner \'$l_file_owner\' group
      \'$l_file_group\'' l_out2='' [ '$l_file_group' = '$l_ssh_group_name' ] &&
      l_pmask='0137' || l_pmask='0177' l_maxperm='$( printf '%o' $(( 0777 &
      ~$l_pmask )) )' if [ $(( $l_file_mode & $l_pmask )) -gt 0 ]; then
      l_out2='$l_out2\n - Mode: \'$l_file_mode\' should be mode: \'$l_maxperm\' or
      more restrictive\n - updating to mode: \:$l_maxperm\'' if [ 'l_file_group' =
      '$l_ssh_group_name' ]; then chmod u-x,g-wx,o-rwx '$l_file' else chmod u-x,go-
      rwx '$l_file' fi fi if [ '$l_file_owner' != 'root' ]; then l_out2='$l_out2\n -
      Owned by: \'$l_file_owner\' should be owned by \'root\'\n - Changing ownership
      to \'root\'' chown root '$l_file' fi if [[ ! '$l_file_group' =~
      ($l_ssh_group_name|root) ]]; then [ -n '$l_ssh_group_name' ] &&
      l_new_group='$l_ssh_group_name' || l_new_group='root' l_out2='$l_out2\n -
      Owned by group \'$l_file_group\' should be group owned by:
      \'$l_ssh_group_name\' or \'root\'\n - Changing group ownership to
      \'$l_new_group\'' chgrp '$l_new_group' '$l_file' fi if [ -n '$l_out2' ]; then
      l_output2='$l_output2\n - File: \'$l_file\'$l_out2' else l_output='$l_output\n
      - File: \'$l_file\'\n - Correct: mode: \'$l_file_mode\', owner:
      \'$l_file_owner\', and group owner: \'$l_file_group\' configured' fi done <
      <(stat -Lc '%#a:%U:%G' '$l_file') } while IFS= read -r -d $'\0' l_file; do if
      ssh-keygen -lf &>/dev/null '$l_file'; then file '$l_file' | grep -Piq --
      '\bopenssh\h+([^#\n\r]+\h+)?private\h+key\b' && f_file_access_fix fi done <
      <(find -L /etc/ssh -xdev -type f -print0 2>/dev/null) if [ -z '$l_output2' ];
      then echo -e '\n- No access changes required\n' else echo -e '\n- Remediation
      results:\n$l_output2\n' fi } References: 1. NIST SP 800-53 Rev. 5: AC-3. MP-2
    compliance:
      - cis_rhel_9_v2_0_0_5_1_2

  - rule_id: rhel.cis.5.permissions_on_ssh_public_host_key_files_are
    title: "Ensure permissions on SSH public host key files are configured"
    severity: high
    automation_type: automated
    cis_control: '5.1.3'
    cis_section: '5'
    profile_applicability: "Level 1"
    scope: rhel.section_5.permissions_on_ssh_public_host_key_files_are
    assertion:
      field: value
      operator: exists
      expected: "no"
    remediation: >
      Run the following script to set mode, ownership, and group on the public SSH
      host key files: #!/usr/bin/env bash { l_output='' l_output2='' l_pmask='0133'
      && l_maxperm='$( printf '%o' $(( 0777 & ~$l_pmask )) )' FILE_ACCESS_FIX() {
      while IFS=: read -r l_file_mode l_file_owner l_file_group; do l_out2='' if [
      $(( $l_file_mode & $l_pmask )) -gt 0 ]; then l_out2='$l_out2\n - Mode:
      \'$l_file_mode\' should be mode: \'$l_maxperm\' or more restrictive\n -
      updating to mode: \:$l_maxperm\'' chmod u-x,go-wx fi if [ '$l_file_owner' !=
      'root' ]; then l_out2='$l_out2\n - Owned by: \'$l_file_owner\' should be owned
      by \'root\'\n - Changing ownership to \'root\'' chown root '$l_file' fi if [
      '$l_file_group' != 'root' ]; then l_out2='$l_out2\n - Owned by group
      \'$l_file_group\' should be group owned by: \'root\'\n - Changing group
      ownership to \'root\'' chgrp root '$l_file' fi if [ -n '$l_out2' ]; then
      l_output2='$l_output2\n - File: \'$l_file\'$l_out2' else l_output='$l_output\n
      - File: \'$l_file\'\n - Correct: mode: \'$l_file_mode\', owner:
      \'$l_file_owner\', and group owner: \'$l_file_group\' configured' fi done <
      <(stat -Lc '%#a:%U:%G' '$l_file') } while IFS= read -r -d $'\0' l_file; do if
      ssh-keygen -lf &>/dev/null '$l_file'; then file '$l_file' | grep -Piq --
      '\bopenssh\h+([^#\n\r]+\h+)?public\h+key\b' && FILE_ACCESS_FIX fi done <
      <(find -L /etc/ssh -xdev -type f -print0 2>/dev/null) if [ -z '$l_output2' ];
      then echo -e '\n- No access changes required\n' else echo -e '\n- Remediation
      results:\n$l_output2\n' fi } Default Value: 644 0/root 0/root References: 1.
      NIST SP 800-53 Rev. 5: AC-3. MP-2
    compliance:
      - cis_rhel_9_v2_0_0_5_1_3

  - rule_id: rhel.cis.5.sshd_ciphers_are_configured
    title: "Ensure sshd Ciphers are configured"
    severity: high
    automation_type: automated
    cis_control: '5.1.4'
    cis_section: '5'
    profile_applicability: "Level 1"
    scope: rhel.section_5.sshd_ciphers_are_configured
    assertion:
      field: value
      operator: exists
      expected: "no"
    remediation: >
      Note: • First occurrence of an option takes precedence. • Though ciphers may
      be configured through the Ciphers option in the /etc/ssh/sshd_config file, it
      is recommended that the ciphers available to openSSH server are configured
      through system-wide-crypto-policy • If the recommendations in the subsection
      'Configure system wide crypto policy' have been followed, this Audit should be
      in a passing state. Please review that section before following this
      Remediation Procedure • By default, system-wide-crypto-policy is applied to
      the openSSH server. If the following defaults don't exist due to modifications
      or upgrade from a earlier release, the system-wide-crypto-policy may not be
      included by the openSSH server. It is recommended that these defaults be
      restored, created, or the line Include /etc/crypto-policies/back-
      ends/opensshserver.config be added before any lines containing the Cipher
      argument. • Defaults: o The file /etc/ssh/sshd_config includes the line:
      Include /etc/ssh/sshd_config.d/*.conf. This line must appear before any lines
      containing the Cipher argument o This directory /etc/ssh/sshd_config.d/
      includes a file /etc/ssh/sshd_config.d/50-redhat.conf o The file
      /etc/ssh/sshd_config.d/50-redhat.conf includes the line Include /etc/crypto-
      policies/back-ends/opensshserver.config o The file /etc/crypto-policies/back-
      ends/opensshserver.config is generated by system-wide-crypto-policy - IF -
      CVE-2023-48795 has been addressed, and it meets local site policy, chacha20-
      poly1305 may be removed from the list of excluded ciphers. Create or edit a
      file in /etc/crypto-policies/policies/modules/ ending in .pmod and add or
      modify the the following line: cipher@SSH = -3DES-CBC -AES-128-CBC
      -AES-192-CBC -AES-256-CBC -CHACHA20- POLY1305 Example: # printf '%s\n' '# This
      is a subpolicy to disable weak ciphers' '# for the SSH protocol (libssh and
      OpenSSH)' 'cipher@SSH = -3DES-CBC -AES-128-CBC -AES- 192-CBC -AES-256-CBC
      -CHACHA20-POLY1305' >> /etc/crypto- policies/policies/modules/NO-
      SSHWEAKCIPHERS.pmod Run the following command to update the system-wide
      cryptographic policy # update-crypto-policies --set
      <CRYPTO_POLICY>:<CRYPTO_SUBPOLICY1>:<CRYPTO_SUBPOLICY2>:<CRYPTO_SUBPOLICY3>
      Example: # update-crypto-policies --set DEFAULT:NO-SHA1:NO-WEAKMAC:NO-
      SSHCBC:NO- SSHCHACHA20:NO-SSHWEAKCIPHERS Run the following command to reload
      the openSSH server to make your cryptographic settings effective: # systemctl
      reload-or-restart sshd - OR - If system-wide-crypto-policy is not being used
      to configure available ciphers ( This is not recommended ) Edit the
      /etc/ssh/sshd_config file and add/modify the Ciphers line to contain a comma
      separated list of the site unapproved (weak) Ciphers preceded with a - above
      any Include entries: Example: Ciphers -3des-
      cbc,aes128-cbc,aes192-cbc,aes256-cbc,chacha20- poly1305@openssh.com Default
      Value: Ciphers
      chacha20-poly1305@openssh.com,aes128-ctr,aes192-ctr,aes256-ctr,aes128-
      gcm@openssh.com,aes256-gcm@openssh.com References: 1.
      https://nvd.nist.gov/vuln/detail/CVE-2023-48795 2.
      https://nvd.nist.gov/vuln/detail/CVE-2019-1543 3.
      https://nvd.nist.gov/vuln/detail/CVE-2016-2183 4.
      https://nvd.nist.gov/vuln/detail/CVE-2008-5161 5.
      https://www.openssh.com/txt/cbc.adv 6. https://www.openssh.com/txt/cbc.adv 7.
      SSHD_CONFIG(5) 8. SSHD(8) 9. NIST SP 800-53 Rev. 5: SC-8
    compliance:
      - cis_rhel_9_v2_0_0_5_1_4

  - rule_id: rhel.cis.5.sshd_kexalgorithms_is_configured
    title: "Ensure sshd KexAlgorithms is configured"
    severity: high
    automation_type: automated
    cis_control: '5.1.5'
    cis_section: '5'
    profile_applicability: "Level 1"
    scope: rhel.section_5.sshd_kexalgorithms_is_configured
    assertion:
      field: value
      operator: exists
      expected: "true"
    remediation: >
      Note: • First occurrence of an option takes precedence. • Though key_exchange
      may be configured through the KexAlgorithms option in the /etc/ssh/sshd_config
      file, it is recommended that the key_exchange available to openSSH server are
      configured through system-wide-crypto-policy • If the recommendations in the
      subsection 'Configure system wide crypto policy' have been followed, this
      Audit should be in a passing state. Please review that section before
      following this Remediation Procedure • By default, system-wide-crypto-policy
      is applied to the openSSH server. If the following defaults don't exist due to
      modifications or upgrade from a earlier release, the system-wide-crypto-policy
      may not be included by the openSSH server. It is recommended that these
      defaults be restored, created, or the line Include /etc/crypto-policies/back-
      ends/opensshserver.config be added before any lines containing the
      KexAlgorithms argument. • Defaults: o The file /etc/ssh/sshd_config includes
      the line: Include /etc/ssh/sshd_config.d/*.conf. This line must appear before
      any lines containing the KexAlgorithms argument o This directory
      /etc/ssh/sshd_config.d/ includes a file /etc/ssh/sshd_config.d/50-redhat.conf
      o The file /etc/ssh/sshd_config.d/50-redhat.conf includes the line Include
      /etc/crypto-policies/back-ends/opensshserver.config o The file /etc/crypto-
      policies/back-ends/opensshserver.config is generated by system-wide-crypto-
      policy Follow the Remediation Procedure in 'Ensure system wide crypto policy
      disables sha1 hash and signature support' This is and excerpt of the
      Remediation Procedure from 'Ensure system wide crypto policy disables sha1
      hash and signature support': Create or edit a file in /etc/crypto-
      policies/policies/modules/ ending in .pmod and add or modify the following
      lines: hash = -SHA1 sign = -*-SHA1 sha1_in_certs = 0 Example: # printf '%s\n'
      '# This is a subpolicy dropping the SHA1 hash and signature support' 'hash =
      -SHA1' 'sign = -*-SHA1' 'sha1_in_certs = 0' >> /etc/crypto-
      policies/policies/modules/NO-SHA1.pmod Run the following command to update the
      system-wide cryptographic policy # update-crypto-policies --set
      <CRYPTO_POLICY>:<CRYPTO_SUBPOLICY1>:<CRYPTO_SUBPOLICY2>:<CRYPTO_SUBPOLICY3>
      Example: # update-crypto-policies --set DEFAULT:NO-SHA1:NO-WEAKMAC:NO-
      SSHCBC:NO- SSHCHACHA20:NO-SSHETM:NO-SSHWEAKCIPHERS Run the following command
      to reload the openSSH server to make your cryptographic settings effective: #
      systemctl reload-or-restart sshd - OR - If system-wide-crypto-policy is not
      being used to configure available KexAlgorithms ( This is not recommended )
      Edit the /etc/ssh/sshd_config file and add/modify the KexAlgorithms line to
      contain a comma separated list of the site unapproved (weak) KexAlgorithms
      preceded with a - above any Include entries: Example: KexAlgorithms -diffie-
      hellman-group1-sha1,diffie-hellman-group14-sha1,diffie- hellman-group-
      exchange-sha1 Default Value: KexAlgorithms
      sntrup761x25519-sha512@openssh.com,curve25519-
      sha256,curve25519-sha256@libssh.org,ecdh-sha2-nistp256,ecdh-
      sha2-nistp384,ecdh- sha2-nistp521,diffie-hellman-group-exchange-sha256,diffie-
      hellman-group16- sha512,diffie-hellman-group18-sha512,diffie-hellman-
      group14-sha256 References: 1. https://ubuntu.com/server/docs/openssh-crypto-
      configuration 2. NIST SP 800-53 Rev. 5: SC-8 3. SSHD(8) 4. SSHD_CONFIG(5)
      Additional Information: The supported algorithms are: curve25519-sha256
      curve25519-sha256@libssh.org diffie-hellman-group1-sha1 diffie-hellman-
      group14-sha1 diffie-hellman-group14-sha256 diffie-hellman-group16-sha512
      diffie-hellman-group18-sha512 diffie-hellman-group-exchange-sha1 diffie-
      hellman-group-exchange-sha256 ecdh-sha2-nistp256 ecdh-sha2-nistp384 ecdh-
      sha2-nistp521 sntrup4591761x25519-sha512@tinyssh.org
    compliance:
      - cis_rhel_9_v2_0_0_5_1_5

  - rule_id: rhel.cis.5.sshd_macs_are_configured
    title: "Ensure sshd MACs are configured"
    severity: high
    automation_type: automated
    cis_control: '5.1.6'
    cis_section: '5'
    profile_applicability: "Level 1"
    scope: rhel.section_5.sshd_macs_are_configured
    assertion:
      field: value
      operator: exists
      expected: "true"
    remediation: >
      Note: • First occurrence of an option takes precedence. • Though MACs may be
      configured through the MACs option in the /etc/ssh/sshd_config file, it is
      recommended that the MACs available to openSSH server are configured through
      system-wide-crypto-policy • If the recommendations in the subsection
      'Configure system wide crypto policy' have been followed, this Audit should be
      in a passing state. Please review that section before following this
      Remediation Procedure • By default, system-wide-crypto-policy is applied to
      the openSSH server. If the following defaults don't exist due to modifications
      or upgrade from a earlier release, the system-wide-crypto-policy may not be
      included by the openSSH server. It is recommended that these defaults be
      restored, created, or the line Include /etc/crypto-policies/back-
      ends/opensshserver.config be added before any lines containing the MACs
      argument. • Defaults: o The file /etc/ssh/sshd_config includes the line:
      Include /etc/ssh/sshd_config.d/*.conf. This line must appear before any lines
      containing the MACs argument o This directory /etc/ssh/sshd_config.d/ includes
      a file /etc/ssh/sshd_config.d/50-redhat.conf o The file
      /etc/ssh/sshd_config.d/50-redhat.conf includes the line Include /etc/crypto-
      policies/back-ends/opensshserver.config o The file /etc/crypto-policies/back-
      ends/opensshserver.config is generated by system-wide-crypto-policy - IF -
      CVE-2023-48795 has not been reviewed and addressed, Recommendation 'Ensure
      system wide crypto policy disables EtM for ssh' should be followed. Create or
      edit a file in /etc/crypto-policies/policies/modules/ ending in .pmod and add
      or modify the the following line: mac@SSH = -HMAC-MD5* -UMAC-64* -UMAC-128*
      Example: # printf '%s\n' '# This is a subpolicy to disable weak MACs' '# for
      the SSH protocol (libssh and OpenSSH)' 'mac@SSH = -HMAC-MD5* -UMAC-64*
      -UMAC-128*' >> /etc/crypto-policies/policies/modules/NO-SSHWEAKMACS.pmod Run
      the following command to update the system-wide cryptographic policy # update-
      crypto-policies --set
      <CRYPTO_POLICY>:<CRYPTO_SUBPOLICY1>:<CRYPTO_SUBPOLICY2>:<CRYPTO_SUBPOLICY3>
      Example: # update-crypto-policies --set DEFAULT:NO-SHA1:NO-WEAKMAC:NO-
      SSHCBC:NO- SSHCHACHA20:NO-SSHETM:NO-SSHWEAKCIPHERS:NO-SSHWEAKMACS Run the
      following command to reload the openSSH server to make your cryptographic
      settings effective: # systemctl reload-or-restart sshd - OR - If system-wide-
      crypto-policy is not being used to configure available ciphers ( This is not
      recommended ) Edit the /etc/ssh/sshd_config file and add/modify the MACs line
      to contain a comma separated list of the site unapproved (weak) MACs preceded
      with a - above any Include entries: Example: MACs -hmac-md5,hmac-md5-96,hmac-
      ripemd160,hmac-sha1-96,umac- 64@openssh.com,hmac-md5-etm@openssh.com,hmac-
      md5-96-etm@openssh.com,hmac- ripemd160-etm@openssh.com,hmac-
      sha1-96-etm@openssh.com,umac-64- etm@openssh.com,umac-128-etm@openssh.com - IF
      - CVE-2023-48795 has not been reviewed and addressed, the following etm MACs
      should be added to the exclude list: hmac-sha1-etm@openssh.com,hmac-sha2-256-
      etm@openssh.com,hmac-sha2-512-etm@openssh.com Default Value: MACs
      umac-64-etm@openssh.com,umac-128-etm@openssh.com,hmac-sha2-256-
      etm@openssh.com,hmac-sha2-512-etm@openssh.com,hmac-sha1-
      etm@openssh.com,umac-64@openssh.com,umac-128@openssh.com,hmac-sha2- 256,hmac-
      sha2-512,hmac-sha1 References: 1.
      https://nvd.nist.gov/vuln/detail/CVE-2023-48795 2. More information on SSH
      downgrade attacks can be found here: http://www.mitls.org/pages/attacks/SLOTH
      3. SSHD_CONFIG(5) 4. NIST SP 800-53 Rev. 5: CM-1, CM-2, CM-6, CM-7, IA-5
    compliance:
      - cis_rhel_9_v2_0_0_5_1_6

  - rule_id: rhel.cis.5.sshd_banner_is_configured
    title: "Ensure sshd Banner is configured"
    severity: high
    automation_type: automated
    cis_control: '5.1.8'
    cis_section: '5'
    profile_applicability: "Level 1"
    scope: rhel.section_5.sshd_banner_is_configured
    assertion:
      field: value
      operator: exists
      expected: "no"
    remediation: >
      Edit the /etc/ssh/sshd_config file to set the Banner parameter above any
      Include and Match entries as follows: Banner /etc/issue.net Note: First
      occurrence of a option takes precedence, Match set statements withstanding. If
      Include locations are enabled, used, and order of precedence is understood in
      your environment, the entry may be created in a file in Include location. Edit
      the file being called by the Banner argument with the appropriate contents
      according to your site policy, remove any instances of \m , \r , \s , \v or
      references to the OS platform Example: # printf '%s\n' 'Authorized users only.
      All activity may be monitored and reported.' > '$(sshd -T | awk '$1 ==
      'banner' {print $2}')' References: 1. SSHD(8) 2. SSHD_CONFIG(5) 3. NIST SP
      800-53 Rev. 5: CM-1, CM-2, CM-6, CM-7, IA-5 MITRE ATT&CK Mappings: Techniques
      / Sub- techniques Tactics Mitigations TA0001, TA0007 M1035
    compliance:
      - cis_rhel_9_v2_0_0_5_1_8

  - rule_id: rhel.cis.5.sshd_clientaliveinterval_and_clientalivecountmax
    title: "Ensure sshd ClientAliveInterval and ClientAliveCountMax are configured"
    severity: high
    automation_type: automated
    cis_control: '5.1.9'
    cis_section: '5'
    profile_applicability: "Level 1"
    scope: rhel.section_5.sshd_clientaliveinterval_and_clientalivecountmax
    assertion:
      field: row_count
      operator: exists
      expected: "true"
    remediation: >
      Edit the /etc/ssh/sshd_config file to set the ClientAliveInterval and
      ClientAliveCountMax parameters above any Include and Match entries according
      to site policy. Example: ClientAliveInterval 15 ClientAliveCountMax 3 Note:
      First occurrence of a option takes precedence, Match set statements
      withstanding. If Include locations are enabled, used, and order of precedence
      is understood in your environment, the entry may be created in a file in
      Include location. Default Value: ClientAliveInterval 0 ClientAliveCountMax 3
      References: 1. SSHD_CONFIG(5) 2. SSHD(8) 3. NIST SP 800-53 Rev. 5: CM-1, CM-2,
      CM-6, CM-7, IA-5 Additional Information:
      https://bugzilla.redhat.com/show_bug.cgi?id=1873547
      https://github.com/openssh/openssh-portable/blob/V_8_9/serverloop.c#L137 MITRE
      ATT&CK Mappings: Techniques / Sub- techniques Tactics Mitigations T1078,
      T1078.001, T1078.002, T1078.003 TA0001 M1026
    compliance:
      - cis_rhel_9_v2_0_0_5_1_9

  - rule_id: rhel.cis.5.sshd_disableforwarding_is_enabled
    title: "Ensure sshd DisableForwarding is enabled"
    severity: high
    automation_type: automated
    cis_control: '5.1.10'
    cis_section: '5'
    profile_applicability: "Level 1 + Level 2"
    scope: rhel.section_5.sshd_disableforwarding_is_enabled
    assertion:
      field: enabled
      operator: equals
      expected: "yes"
    remediation: >
      Edit the /etc/ssh/sshd_config file to set the DisableForwarding parameter to
      yes above any Include entry as follows: DisableForwarding yes Note: First
      occurrence of a option takes precedence. If Include locations are enabled,
      used, and order of precedence is understood in your environment, the entry may
      be created in a file in Include location. References: 1. sshd_config(5) 2.
      SSHD(8) 3. NIST SP 800-53 Rev. 5: CM-7
    compliance:
