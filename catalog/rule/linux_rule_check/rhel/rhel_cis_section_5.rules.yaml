  - rule_id: rhel.cis.5.file_deletion_events_by_users_are_collected
    title: "Ensure file deletion events by users are collected"
    severity: medium
    automation_type: automated
    cis_control: '5.2.3.13'
    cis_section: '5'
    profile_applicability: "Level 2"
    scope: rhel.section_5.file_deletion_events_by_users_are_collected
    assertion:
      field: value
      operator: equals
      expected: "on"
    remediation: >
      Create audit rules Edit or create a file in the /etc/audit/rules.d/ directory,
      ending in .rules extension, with the relevant rules to monitor file deletion
      events by users. 64 Bit systems Example: # { UID_MIN=$(awk
      '/^\s*UID_MIN/{print $2}' /etc/login.defs) [ -n '${UID_MIN}' ] && printf ' -a
      always,exit -F arch=b64 -S rename,unlink,unlinkat,renameat -F auid>=${UID_MIN}
      -F auid!=unset -F key=delete -a always,exit -F arch=b32 -S
      rename,unlink,unlinkat,renameat -F auid>=${UID_MIN} -F auid!=unset -F
      key=delete ' >> /etc/audit/rules.d/50-delete.rules || printf 'ERROR: Variable
      'UID_MIN' is unset.\n' } Load audit rules Merge and load the rules into active
      configuration: # augenrules --load Check if reboot is required. # if [[
      $(auditctl -s | grep 'enabled') =~ '2' ]]; then printf 'Reboot required to
      load rules\n'; fi 32 Bit systems Follow the same procedures as for 64 bit
      systems and ignore any entries with b64. Additional Information: Potential
      reboot required If the auditing configuration is locked (-e 2), then
      augenrules will not warn in any way that rules could not be loaded into the
      running configuration. A system reboot will be required to load the rules into
      the running configuration. System call structure For performance (man 7
      audit.rules) reasons it is preferable to have all the system calls on one
      line. However, your configuration may have them on one line each or some other
      combination. This is important to understand for both the auditing and
      remediation sections as the examples given are optimized for performance as
      per the man page.
    compliance:
      - cis_rhel_8_v3_0_0_5_2_3_13

