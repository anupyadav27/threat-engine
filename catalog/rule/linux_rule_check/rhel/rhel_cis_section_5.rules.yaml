  - rule_id: rhel.cis.5.filesystem_integrity_is_regularly_checked
    title: "Ensure filesystem integrity is regularly checked"
    severity: high
    automation_type: automated
    cis_control: '5.3.2'
    cis_section: '5'
    profile_applicability: "Level 1"
    scope: rhel.section_5.filesystem_integrity_is_regularly_checked
    assertion:
      field: value
      operator: equals
      expected: "true"
    remediation: >
      - IF - cron will be used to schedule and run aide check Run the following
      command: # crontab -u root -e Add the following line to the crontab: 0 5 * * *
      /usr/sbin/aide --check - OR - - IF - aidecheck.service and aidecheck.timer
      will be used to schedule and run aide check: Create or edit the file
      /etc/systemd/system/aidecheck.service and add the following lines: [Unit]
      Description=Aide Check [Service] Type=simple ExecStart=/usr/sbin/aide --check
      [Install] WantedBy=multi-user.target Create or edit the file
      /etc/systemd/system/aidecheck.timer and add the following lines: [Unit]
      Description=Aide check every day at 5AM [Timer] OnCalendar=*-*-* 05:00:00
      Unit=aidecheck.service [Install] WantedBy=multi-user.target Run the following
      commands: # chown root:root /etc/systemd/system/aidecheck.* # chmod 0644
      /etc/systemd/system/aidecheck.* # systemctl daemon-reload # systemctl enable
      aidecheck.service # systemctl --now enable aidecheck.timer References: 1.
      https://github.com/konstruktoid/hardening/blob/master/config/aidecheck.service
      2.
      https://github.com/konstruktoid/hardening/blob/master/config/aidecheck.timer
      3. NIST SP 800-53 Rev. 5: AU-2 Additional Information: The checking in this
      recommendation occurs every day at 5am. Alter the frequency and time of the
      checks in compliance with site policy.
    compliance:
      - cis_rhel_8_v3_0_0_5_3_2


