  - rule_id: rhel.cis.4.system_accounts_are_secured
    title: "Ensure system accounts are secured"
    severity: high
    automation_type: automated
    cis_control: '4.5.2.3'
    cis_section: '4'
    profile_applicability: "Level 1"
    scope: rhel.section_4.system_accounts_are_secured
    assertion:
      field: row_count
      operator: equals
      expected: "no"
    remediation: >
      System accounts Set the shell for any accounts returned by the audit to
      nologin: # usermod -s $(command -v nologin) <user> Disabled accounts Lock any
      non root accounts returned by the audit: # usermod -L <user> Large scale
      changes The following command will set all system accounts to nologin: # awk
      -F: '($1!~/^(root|halt|sync|shutdown|nfsnobody)$/ && ($3<''$(awk
      '/^\s*UID_MIN/{print $2}' /etc/login.defs)'' || $3 == 65534)) { print $1 }'
      /etc/passwd | while read user; do usermod -s $(command -v nologin) $user
      >/dev/null; done The following command will automatically lock all accounts
      that have their shell set to nologin: # awk -F: '/nologin/ {print $1}'
      /etc/passwd | while read user; do usermod -L $user; done References: 1. NIST
      SP 800-53 Rev. 5: AC-2(5), AC-3, AC-11, MP-2 Additional Information: The root,
      sync, shutdown, and halt users are exempted from requiring a non-login shell.
    compliance:
      - cis_rhel_8_v3_0_0_4_5_2_3


