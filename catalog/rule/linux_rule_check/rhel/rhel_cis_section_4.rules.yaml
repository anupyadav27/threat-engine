  - rule_id: rhel.cis.4.strong_password_hashing_algorithm_is_configured
    title: "Ensure strong password hashing algorithm is configured"
    severity: high
    automation_type: automated
    cis_control: '4.5.1.1'
    cis_section: '4'
    profile_applicability: "Level 1"
    scope: rhel.section_4.strong_password_hashing_algorithm_is_configured
    assertion:
      field: length
      operator: exists
      expected: "true"
    remediation: >
      Note: If yescrypt becomes available in a future release, this would also be
      acceptable. It is highly recommended that the chosen hashing algorithm is
      consistent across /etc/libuser.conf, /etc/login.defs, /etc/pam.d/password-
      auth, and /etc/pam.d/system-auth. Set password hashing algorithm to sha512.
      Edit /etc/libuser.conf and edit or add the following line: crypt_style =
      sha512 Edit /etc/login.defs and edit or add the following line: ENCRYPT_METHOD
      SHA512 Note: This only effects local users and passwords created after
      updating the files to use sha512 or yescrypt. If it is determined that the
      password algorithm being used is not sha512 or yescrypt, once it is changed,
      it is recommended that all group passwords be updated to use the stronger
      hashing algorithm. References: 1. NIST SP 800-53 Rev. 5: IA-5 Additional
      Information: Additional module options may be set, recommendation only covers
      those listed here. The following command may be used to expire all non-system
      user ID's immediately and force them to change their passwords on next login.
      Any system accounts that need to be expired should be carefully done
      separately by the system administrator to prevent any potential problems. #
      awk -F: '( $3<''$(awk '/^\s*UID_MIN/{print $2}' /etc/login.defs)'' && $1 !=
      'nfsnobody' ) { print $1 }' /etc/passwd | xargs -n 1 chage -d 0
    compliance:
      - cis_rhel_8_v3_0_0_4_5_1_1

