tech_type: rhel
category: linux
cis_benchmark: CIS Red Hat Enterprise Linux 9 v2.0.0
cis_section: '4'

rules:

  - rule_id: rhel.cis.4.nftables_is_installed
    title: "Ensure nftables is installed"
    severity: high
    automation_type: automated
    cis_control: '4.1.1'
    cis_section: '4'
    profile_applicability: "Level 1"
    scope: rhel.section_4.nftables_is_installed
    assertion:
      field: value
      operator: equals
      expected: "true"
    remediation: >
      Run the following command to install nftables # dnf install nftables
      References: 1. NIST SP 800-53 Rev. 5: CA-9
    compliance:
      - cis_rhel_9_v2_0_0_4_1_1

  - rule_id: rhel.cis.4.a_single_firewall_configuration_utility_is_in_use
    title: "Ensure a single firewall configuration utility is in use"
    severity: high
    automation_type: automated
    cis_control: '4.1.2'
    cis_section: '4'
    profile_applicability: "Level 1"
    scope: rhel.section_4.a_single_firewall_configuration_utility_is_in_use
    assertion:
      field: port
      operator: equals
      expected: "on"
    remediation: >
      Run the following script to ensure that a single firewall utility is in use on
      the system: #!/usr/bin/env bash { l_fwd_status='' l_nft_status=''
      l_fwutil_status='' # Determine FirewallD utility Status rpm -q firewalld >
      /dev/null 2>&1 && l_fwd_status='$(systemctl is-enabled
      firewalld.service):$(systemctl is-active firewalld.service)' # Determine
      NFTables utility Status rpm -q nftables > /dev/null 2>&1 &&
      l_nft_status='$(systemctl is-enabled nftables.service):$(systemctl is-active
      nftables.service)' l_fwutil_status='$l_fwd_status:$l_nft_status' case
      $l_fwutil_status in
      enabled:active:masked:inactive|enabled:active:disabled:inactive) echo -e '\n -
      FirewallD utility is in use, enabled and active\n - NFTables utility is
      correctly disabled or masked and inactive\n - no remediation required' ;;
      masked:inactive:enabled:active|disabled:inactive:enabled:active) echo -e '\n -
      NFTables utility is in use, enabled and active\n - FirewallD utility is
      correctly disabled or masked and inactive\n - no remediation required' ;;
      enabled:active:enabled:active) echo -e '\n - Both FirewallD and NFTables
      utilities are enabled and active\n - stopping and masking NFTables utility'
      systemctl stop nftables && systemctl --now mask nftables ;;
      enabled:*:enabled:*) echo -e '\n - Both FirewallD and NFTables utilities are
      enabled\n - remediating' if [ '$(awk -F: '{print $2}' <<< '$l_fwutil_status')'
      = 'active' ] && [ '$(awk -F: '{print $4}' <<< '$l_fwutil_status')' =
      'inactive' ]; then echo ' - masking NFTables utility' systemctl stop nftables
      && systemctl --now mask nftables elif [ '$(awk -F: '{print $4}' <<<
      '$l_fwutil_status')' = 'active' ] && [ '$(awk -F: '{print $2}' <<<
      '$l_fwutil_status')' = 'inactive' ]; then echo ' - masking FirewallD utility'
      systemctl stop firewalld && systemctl --now mask firewalld fi ;;
      *:active:*:active) echo -e '\n - Both FirewallD and NFTables utilities are
      active\n - remediating' if [ '$(awk -F: '{print $1}' <<< '$l_fwutil_status')'
      = 'enabled' ] && [ '$(awk -F: '{print $3}' <<< '$l_fwutil_status')' !=
      'enabled' ]; then echo ' - stopping and masking NFTables utility' systemctl
      stop nftables && systemctl --now mask nftables elif [ '$(awk -F: '{print $3}'
      <<< '$l_fwutil_status')' = 'enabled' ] && [ '$(awk -F: '{print $1}' <<<
      '$l_fwutil_status')' != 'enabled' ]; then echo ' - stopping and masking
      FirewallD utility' systemctl stop firewalld && systemctl --now mask firewalld
      fi ;; :enabled:active) echo -e '\n - NFTables utility is in use, enabled, and
      active\n - FirewallD package is not installed\n - no remediation required' ;;
      :) echo -e '\n - Neither FirewallD or NFTables is installed.\n - remediating\n
      - installing NFTables' echo -e '\n - Configure only ONE firewall either
      NFTables OR Firewalld and follow the according subsection to complete this
      remediation process' dnf -q install nftables ;; *:*:) echo -e '\n - NFTables
      package is not installed on the system\n - remediating\n - installing
      NFTables' echo -e '\n - Configure only ONE firewall either NFTables OR
      Firewalld and follow the according subsection to complete this remediation
      process' dnf -q install nftables ;; *) echo -e '\n - Unable to determine
      firewall state' echo -e '\n - MANUAL REMEDIATION REQUIRED: Configure only ONE
      firewall either NFTables OR Firewalld' ;; esac } References: 1.
      https://access.redhat.com/documentation/en-us/red_hat_enterprise_linux/9/html-
      single/configuring_firewalls_and_packet_filters/index
    compliance:
      - cis_rhel_9_v2_0_0_4_1_2

  - rule_id: rhel.cis.4.firewalld_loopback_traffic_is_configured
    title: "Ensure firewalld loopback traffic is configured"
    severity: high
    automation_type: automated
    cis_control: '4.2.2'
    cis_section: '4'
    profile_applicability: "Level 1"
    scope: rhel.section_4.firewalld_loopback_traffic_is_configured
    assertion:
      field: value
      operator: exists
      expected: "on"
    remediation: >
      Run the following script to implement the loopback rules: #!/usr/bin/env bash
      { l_hbfw='' if systemctl is-enabled firewalld.service | grep -q 'enabled';
      then echo -e '\n - FirewallD is in use on the system' && l_hbfw='fwd' elif
      systemctl is-enabled nftables.service 2>/dev/null | grep -q 'enabled'; then
      echo -e '\n - nftables is in use on the system \n - Recommendation is NA \n -
      Remediation Complete' && l_hbfw='nft' fi if [ '$l_hbfw' = 'fwd' ]; then
      l_ipsaddr='$(nft list ruleset | awk
      '/filter_IN_public_deny|hook\s+input\s+/,/\}\s*(#.*)?$/' | grep -P --
      'ip\h+saddr')' if ! nft list ruleset | awk '/hook\s+input\s+/,/\}\s*(#.*)?$/'
      | grep -Pq -- '\H+\h+'lo'\h+accept'; then echo -e '\n - Enabling input to
      accept for loopback address' firewall-cmd --permanent --zone=trusted --add-
      interface=lo firewall-cmd --reload else echo -e '\n - firewalld input
      correctly set to accept for loopback address' if ! grep -Pq --
      'ip\h+saddr\h+127\.0\.0\.0\/8\h+(counter\h+packets\h+\d+\h+bytes\h+\d+\h+)?drop'
      <<< '$l_ipsaddr' && ! grep -Pq --
      'ip\h+daddr\h+\!\=\h+127\.0\.0\.1\h+ip\h+saddr\h+127\.0\.0\.1\h+drop' <<<
      '$l_ipsaddr'; then echo -e '\n - Setting IPv4 network traffic from loopback
      address to drop' firewall-cmd --permanent --add-rich-rule='rule family=ipv4
      source address='127.0.0.1' destination not address='127.0.0.1' drop' firewall-
      cmd --permanent --zone=trusted --add-rich-rule='rule family=ipv4 source
      address='127.0.0.1' destination not address='127.0.0.1' drop' firewall-cmd
      --reload else echo -e '\n - firewalld correctly set IPv4 network traffic from
      loopback address to drop' fi if grep -Pq -- '^\h*0\h*$'
      /sys/module/ipv6/parameters/disable; then l_ip6saddr='$(nft list ruleset | awk
      '/filter_IN_public_deny|hook input/,/}/' | grep 'ip6 saddr')' if ! grep -Pq
      'ip6\h+saddr\h+::1\h+(counter\h+packets\h+\d+\h+bytes\h+\d+\h+)?drop' <<<
      '$l_ip6saddr' && ! grep -Pq --
      'ip6\h+daddr\h+\!=\h+::1\h+ip6\h+saddr\h+::1\h+drop' <<< '$l_ip6saddr'; then
      echo -e '\n - Setting IPv6 network traffic from loopback address to drop'
      firewall-cmd --permanent --add-rich-rule='rule family=ipv6 source
      address='::1' destination not address='::1' drop' firewall-cmd --permanent
      --zone=trusted --add-rich-rule='rule family=ipv6 source address='::1'
      destination not address='::1' drop' firewall-cmd --reload else echo -e '\n -
      firewalld correctly set IPv6 network traffic from loopback address to drop' fi
      fi fi fi } References: 1. NIST SP 800-53 Rev. 5: CA-9 2.
      https://access.redhat.com/documentation/en-
      us/red_hat_enterprise_linux/9/pdf/configuring_firewalls_and_packet_filters/red_h
      at_enterprise_linux-9-configuring_firewalls_and_packet_filters-en-us.pdf
    compliance:
      - cis_rhel_9_v2_0_0_4_2_2

  - rule_id: rhel.cis.4.nftables_base_chains_exist
    title: "Ensure nftables base chains exist"
    severity: high
    automation_type: automated
    cis_control: '4.3.1'
    cis_section: '4'
    profile_applicability: "Level 1"
    scope: rhel.section_4.nftables_base_chains_exist
    assertion:
      field: value
      operator: equals
      expected: "on"
    remediation: >
      - IF - NFTables utility is in use on your system: Run the following command to
      create the base chains: # nft create chain inet <table name> <base chain name>
      { type filter hook <(input|forward|output)> priority 0 \; } Example: # nft
      create chain inet filter input { type filter hook input priority 0 \; } # nft
      create chain inet filter forward { type filter hook forward priority 0 \; } #
      nft create chain inet filter output { type filter hook output priority 0 \; }
      Note: use the add command if the create command returns an error due to the
      chain already existing. References: 1. NIST SP 800-53 Rev. 5: CA-9 2.
      https://www.netfilter.org/projects/nftables/manpage.html 3.
      https://access.redhat.com/documentation/en-
      us/red_hat_enterprise_linux/9/pdf/configuring_firewalls_and_packet_filters/red_h
      at_enterprise_linux-9-configuring_firewalls_and_packet_filters-en-us.pdf
    compliance:
      - cis_rhel_9_v2_0_0_4_3_1

  - rule_id: rhel.cis.4.nftables_default_deny_firewall_policy
    title: "Ensure nftables default deny firewall policy"
    severity: high
    automation_type: automated
    cis_control: '4.3.3'
    cis_section: '4'
    profile_applicability: "Level 1"
    scope: rhel.section_4.nftables_default_deny_firewall_policy
    assertion:
      field: value
      operator: equals
      expected: "on"
    remediation: >
      - IF - NFTables utility is in use on your system: Run the following command
      for the base chains with the input, forward, and output hooks to implement a
      default DROP policy: # nft chain <table family> <table name> <chain name> {
      policy drop \; } Example: # nft chain inet filter input { policy drop \; } #
      nft chain inet filter forward { policy drop \; } Default Value: accept
      References: 1. Manual Page nft 2. NIST SP 800-53 Rev. 5: CA-9 3.
      https://access.redhat.com/documentation/en-
      us/red_hat_enterprise_linux/9/pdf/configuring_firewalls_and_packet_filters/red_h
      at_enterprise_linux-9-configuring_firewalls_and_packet_filters-en-us.pdf
    compliance:
      - cis_rhel_9_v2_0_0_4_3_3

  - rule_id: rhel.cis.4.nftables_loopback_traffic_is_configured
    title: "Ensure nftables loopback traffic is configured"
    severity: high
    automation_type: automated
    cis_control: '4.3.4'
    cis_section: '4'
    profile_applicability: "Level 1"
    scope: rhel.section_4.nftables_loopback_traffic_is_configured
    assertion:
      field: value
      operator: exists
      expected: "on"
    remediation: >
      Run the following script to implement the loopback rules: #!/usr/bin/env bash
      { l_hbfw='' if systemctl is-enabled firewalld.service 2>/dev/null | grep -q
      'enabled'; then echo -e '\n - FirewallD is in use on the system\n -
      Recommendation is NA \n - Remediation Complete' && l_hbfw='fwd' elif systemctl
      is-enabled nftables.service | grep -q 'enabled'; then l_hbfw='nft' fi if [
      '$l_hbfw' = 'nft' ]; then l_ipsaddr='$(nft list ruleset | awk
      '/filter_IN_public_deny|hook\s+input\s+/,/\}\s*(#.*)?$/' | grep -P --
      'ip\h+saddr')' if ! nft list ruleset | awk '/hook\s+input\s+/,/\}\s*(#.*)?$/'
      | grep -Pq -- '\H+\h+'lo'\h+accept'; then echo -e '\n - Enabling input to
      accept for loopback address' nft add rule inet filter input iif lo accept else
      echo -e '\n -nftables input correctly configured to accept for loopback
      address' fi if ! grep -Pq --
      'ip\h+saddr\h+127\.0\.0\.0\/8\h+(counter\h+packets\h+\d+\h+bytes\h+\d+\h+)?dr
      op' <<< '$l_ipsaddr' && ! grep -Pq --
      'ip\h+daddr\h+\!\=\h+127\.0\.0\.1\h+ip\h+saddr\h+127\.0\.0\.1\h+drop' <<<
      '$l_ipsaddr'; then echo -e '\n - Setting IPv4 network traffic from loopback
      address to drop' nft add rule inet filter input ip saddr 127.0.0.0/8 counter
      drop else echo -e '\n -nftables correctly configured IPv4 network traffic from
      loopback address to drop' fi if grep -Pq -- '^\h*0\h*$'
      /sys/module/ipv6/parameters/disable; then l_ip6saddr='$(nft list ruleset | awk
      '/filter_IN_public_deny|hook input/,/}/' | grep 'ip6 saddr')' if ! grep -Pq
      'ip6\h+saddr\h+::1\h+(counter\h+packets\h+\d+\h+bytes\h+\d+\h+)?drop' <<<
      '$l_ip6saddr' && ! grep -Pq --
      'ip6\h+daddr\h+\!=\h+::1\h+ip6\h+saddr\h+::1\h+drop' <<< '$l_ip6saddr'; then
      echo -e '\n - Setting IPv6 network traffic from loopback address to drop' nft
      add rule inet filter input ip6 saddr ::1 counter drop else echo -e '\n -
      nftables IPv6 network traffic from loopback address to drop' fi fi fi }
      References: 1. NIST SP 800-53 Rev. 5: CA-9 2.
      https://access.redhat.com/documentation/en-
      us/red_hat_enterprise_linux/9/pdf/configuring_firewalls_and_packet_filters/red_h
      at_enterprise_linux-9-configuring_firewalls_and_packet_filters-en-us.pdf
    compliance:
      - cis_rhel_9_v2_0_0_4_3_4

  - rule_id: rhel.cis.4.cron_daemon_is_enabled_and_active
    title: "Ensure cron daemon is enabled and active"
    severity: high
    automation_type: automated
    cis_control: '4.1.1.1'
    cis_section: '4'
    profile_applicability: "Level 1"
    scope: rhel.section_4.cron_daemon_is_enabled_and_active
    assertion:
      field: enabled
      operator: equals
      expected: "on"
    remediation: >
      - IF - cron is installed on the system: Run the following commands to unmask,
      enable, and start crond: # systemctl unmask crond # systemctl --now enable
      crond References: 1. NIST SP 800-53 Rev. 5: CM-1, CM-2, CM-6, CM-7, IA-5 MITRE
      ATT&CK Mappings: Techniques / Sub- techniques Tactics Mitigations T1562,
      T1562.001 TA0005 M1018
    compliance:
      - cis_rhel_8_v3_0_0_4_1_1_1

  - rule_id: rhel.cis.4.at_is_restricted_to_authorized_users
    title: "Ensure at is restricted to authorized users"
    severity: high
    automation_type: automated
    cis_control: '4.1.2.1'
    cis_section: '4'
    profile_applicability: "Level 1"
    scope: rhel.section_4.at_is_restricted_to_authorized_users
    assertion:
      field: row_count
      operator: exists
      expected: "on"
    remediation: >
      -IF- at is installed on the system: Run the following script to: •
      /etc/at.allow: o Create the file if it doesn't exist o Change owner or user
      root o If group daemon exists, change to group daemon, else change group to
      root o Change mode to 640 or more restrictive • -IF- /etc/at.deny exists: o
      Change owner or user root o If group daemon exists, change to group daemon,
      else change group to root o Change mode to 640 or more restrictive
      #!/usr/bin/env bash { grep -Pq -- '^daemon\b' /etc/group && l_group='daemon'
      || l_group='root' [ ! -e '/etc/at.allow' ] && touch /etc/at.allow chown
      root:'$l_group' /etc/at.allow chmod u-x,g-wx,o-rwx /etc/at.allow [ -e
      '/etc/at.deny' ] && chown root:'$l_group' /etc/at.deny [ -e '/etc/at.deny' ]
      && chmod u-x,g-wx,o-rwx /etc/at.deny } References: 1. NIST SP 800-53 Rev. 5:
      AC-3. MP-2
    compliance:
      - cis_rhel_8_v3_0_0_4_1_2_1

  - rule_id: rhel.cis.4.permissions_on_etc_ssh_sshd_config_are_configured
    title: "Ensure permissions on /etc/ssh/sshd_config are configured"
    severity: high
    automation_type: automated
    cis_control: '4.2.1'
    cis_section: '4'
    profile_applicability: "Level 1"
    scope: rhel.section_4.permissions_on_etc_ssh_sshd_config_are_configured
    assertion:
      field: value
      operator: exists
      expected: "true"
    remediation: >
      Run the following script to set ownership and permissions on
      /etc/ssh/sshd_config and files ending in .conf in the /etc/ssh/sshd_config.d
      directory: #!/usr/bin/env bash { chmod u-x,og-rwx /etc/ssh/sshd_config chown
      root:root /etc/ssh/sshd_config while IFS= read -r -d $'\0' l_file; do if [ -e
      '$l_file' ]; then chmod u-x,og-rwx '$l_file' chown root:root '$l_file' fi done
      < <(find /etc/ssh/sshd_config.d -type f -print0) } References: 1. NIST SP
      800-53 Rev. 5: AC-3. MP-2
    compliance:
      - cis_rhel_8_v3_0_0_4_2_1

  - rule_id: rhel.cis.4.permissions_on_ssh_private_host_key_files_are
    title: "Ensure permissions on SSH private host key files are configured"
    severity: high
    automation_type: automated
    cis_control: '4.2.2'
    cis_section: '4'
    profile_applicability: "Level 1"
    scope: rhel.section_4.permissions_on_ssh_private_host_key_files_are
    assertion:
      field: value
      operator: exists
      expected: "on"
    remediation: >
      Run the following script to set mode, ownership, and group on the private SSH
      host key files: #!/usr/bin/env bash { l_output='' l_output2='' l_skgn='$(grep
      -Po -- '^(ssh_keys|_?ssh)\b' /etc/group)' # Group designated to own openSSH
      keys l_skgid='$(awk -F: '($1 == '''$l_skgn'''){print $3}' /etc/group)' # Get
      gid of group if [ -n '$l_skgid' ]; then l_agroup='(root|$l_skgn)' &&
      l_sgroup='$l_skgn' && l_mfix='u-x,g-wx,o-rwx' else l_agroup='root' &&
      l_sgroup='root' && l_mfix='u-x,go-rwx' fi unset a_skarr && a_skarr=() # Clear
      and initialize array if [ -d /etc/ssh ]; then while IFS= read -r -d $'\0'
      l_file; do # Loop to populate array if grep -Pq
      ':\h+OpenSSH\h+private\h+key\b' <<< '$(file '$l_file')'; then
      a_skarr+=('$(stat -Lc '%n^%#a^%U^%G^%g' '$l_file')') fi done < <(find -L
      /etc/ssh -xdev -type f -print0) while IFS='^' read -r l_file l_mode l_owner
      l_group l_gid; do l_out2='' [ '$l_gid' = '$l_skgid' ] && l_pmask='0137' ||
      l_pmask='0177' l_maxperm='$( printf '%o' $(( 0777 & ~$l_pmask )) )' if [ $((
      $l_mode & $l_pmask )) -gt 0 ]; then l_out2='$l_out2\n - Mode: \'$l_mode\'
      should be mode: \'$l_maxperm\' or more restrictive\n - Revoking excess
      permissions' chmod '$l_mfix' '$l_file' fi if [ '$l_owner' != 'root' ]; then
      l_out2='$l_out2\n - Owned by: \'$l_owner\' should be owned by \'root\'\n -
      Changing ownership to \'root\'' chown root '$l_file' fi if [[ ! '$l_group' =~
      $l_agroup ]]; then l_out2='$l_out2\n - Owned by group \'$l_group\' should be
      group owned by: \'${l_agroup//|/ or }\'\n - Changing group ownership to
      \'$l_sgroup\'' chgrp '$l_sgroup' '$l_file' fi [ -n '$l_out2' ] &&
      l_output2='$l_output2\n - File: \'$l_file\'$l_out2' done <<< '$(printf '%s\n'
      '${a_skarr[@]}')' else l_output=' - openSSH keys not found on the system' fi
      unset a_skarr if [ -z '$l_output2' ]; then echo -e '\n- No access changes
      required\n' else echo -e '\n- Remediation results:\n$l_output2\n' fi }
      References: 1. NIST SP 800-53 Rev. 5: AC-3. MP-2
    compliance:
      - cis_rhel_8_v3_0_0_4_2_2

  - rule_id: rhel.cis.4.permissions_on_ssh_public_host_key_files_are
    title: "Ensure permissions on SSH public host key files are configured"
    severity: high
    automation_type: automated
    cis_control: '4.2.3'
    cis_section: '4'
    profile_applicability: "Level 1"
    scope: rhel.section_4.permissions_on_ssh_public_host_key_files_are
    assertion:
      field: value
      operator: exists
      expected: "on"
    remediation: >
      Run the following script to set mode, ownership, and group on the public SSH
      host key files: #!/usr/bin/env bash { l_output='' l_output2='' l_skgn='$(grep
      -Po -- '^(ssh_keys|_?ssh)\b' /etc/group)' # Group designated to own openSSH
      keys l_skgid='$(awk -F: '($1 == '''$l_skgn'''){print $3}' /etc/group)' # Get
      gid of group l_mfix='u-x,go-wx' unset a_skarr && a_skarr=() # Clear and
      initialize array if [ -d /etc/ssh ]; then while IFS= read -r -d $'\0' l_file;
      do # Loop to populate array if grep -Pq ':\h+OpenSSH\h+(\H+\h+)public\h+key\b'
      <<< '$(file '$l_file')'; then a_skarr+=('$(stat -Lc '%n^%#a^%U^%G^%g'
      '$l_file')') fi done < <(find -L /etc/ssh -xdev -type f -print0) while IFS='^'
      read -r l_file l_mode l_owner l_group l_gid; do l_out2='' l_pmask='0133'
      l_maxperm='$( printf '%o' $(( 0777 & ~$l_pmask )) )' if [ $(( $l_mode &
      $l_pmask )) -gt 0 ]; then l_out2='$l_out2\n - Mode: \'$l_mode\' should be
      mode: \'$l_maxperm\' or more restrictive\n - Revoking excess permissions'
      chmod '$l_mfix' '$l_file' fi if [ '$l_owner' != 'root' ]; then
      l_out2='$l_out2\n - Owned by: \'$l_owner\' should be owned by \'root\'\n -
      Changing ownership to \'root\'' chown root '$l_file' fi if [[ ! '$l_group' =~
      $l_agroup ]]; then l_out2='$l_out2\n - Owned by group \'$l_group\' should be
      group owned by: \'${l_agroup//|/ or }\'\n - Changing group ownership to
      \'$l_sgroup\'' chgrp '$l_sgroup' '$l_file' fi [ -n '$l_out2' ] &&
      l_output2='$l_output2\n - File: \'$l_file\'$l_out2' done <<< '$(printf '%s\n'
      '${a_skarr[@]}')' else l_output=' - openSSH keys not found on the system' fi
      unset a_skarr if [ -z '$l_output2' ]; then echo -e '\n- No access changes
      required\n' else echo -e '\n- Remediation results:\n$l_output2\n' fi } Default
      Value: 644 0/root 0/root References: 1. NIST SP 800-53 Rev. 5: AC-3. MP-2
    compliance:
      - cis_rhel_8_v3_0_0_4_2_3

  - rule_id: rhel.cis.4.sshd_banner_is_configured
