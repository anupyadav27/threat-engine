tech_type: debian
category: linux
cis_benchmark: CIS Debian 12 v1.1.0
cis_section: '6'

rules:

  - rule_id: debian.cis.6.journald_service_is_enabled_and_active
    title: "Ensure journald service is enabled and active"
    severity: high
    automation_type: automated
    cis_control: '6.1.1.1'
    cis_section: '6'
    profile_applicability: "Level 1"
    scope: debian.section_6.journald_service_is_enabled_and_active
    assertion:
      field: enabled
      operator: equals
      expected: "true"
    remediation: >
      Run the following commands to unmask and start systemd-journald.service #
      systemctl unmask systemd-journald.service # systemctl start systemd-
      journald.service References: 1. NIST SP 800-53 Rev. 5: AU-2, AU-7 AU-12
    compliance:
      - cis_debian_12_v1_1_0_6_1_1_1

  - rule_id: debian.cis.6.only_one_logging_system_is_in_use
    title: "Ensure only one logging system is in use"
    severity: high
    automation_type: automated
    cis_control: '6.1.1.4'
    cis_section: '6'
    profile_applicability: "Level 1"
    scope: debian.section_6.only_one_logging_system_is_in_use
    assertion:
      field: value
      operator: equals
      expected: "true"
    remediation: >
      1. Determine whether to use journald - OR - rsyslog depending on site needs 2.
      Configure systemd-jounald.service 3. Configure only ONE either journald - OR -
      rsyslog and complete the recommendations in that subsection 4. Return to this
      recommendation to ensure only one logging system is in use 6.1.2 Configure
      journald Included in the systemd suite is a journaling service called systemd-
      journald.service for the collection and storage of logging data. It creates
      and maintains structured, indexed journals based on logging information that
      is received from a variety of sources such as: Classic RFC3164 BSD syslog via
      the /dev/log socket STDOUT/STDERR of programs via StandardOutput=journal +
      StandardError=journal in service files (both of which are default settings)
      Kernel log messages via the /dev/kmsg device node Audit records via the
      kernel’s audit subsystem Structured log messages via journald’s native
      protocol Any changes made to the systemd-journald configuration will require a
      re-start of systemd- journald Note: - IF - rsyslog will be used for remote
      logging on the system this subsection can be skipped 6.1.2.1 Configure
      systemd-journal-remote The systemd-journal-remote package includes systemd-
      journal-upload. systemd-journal-upload will upload journal entries to the URL
      specified with --url=. This program reads journal entries from one or more
      journal files, similarly to journalctl. systemd-journal-upload transfers the
      raw content of journal file and uses HTTP as a transport protocol. systemd-
      journal-upload.service is a system service that uses systemd-journal- upload
      to upload journal entries to a server. It uses the configuration in journal-
      upload.conf. Note: • - IF - rsyslog is in use this subsection can be skipped.
      • systemd-journal-remote package is part of the universe component, this may
      impact support and update frequency which should be considered when assessing
      organizational risk.
    compliance:
      - cis_debian_12_v1_1_0_6_1_1_4

  - rule_id: debian.cis.6.systemd_journal_remote_is_installed
    title: "Ensure systemd-journal-remote is installed"
    severity: high
    automation_type: automated
    cis_control: '6.1.2.1.1'
    cis_section: '6'
    profile_applicability: "Level 1"
    scope: debian.section_6.systemd_journal_remote_is_installed
    assertion:
      field: port
      operator: equals
      expected: "on"
    remediation: >
      Run the following command to install systemd-journal-remote: # apt install
      systemd-journal-remote References: 1. NIST SP 800-53 Rev. 5: AU-2, AU-7 AU-12
    compliance:
      - cis_debian_12_v1_1_0_6_1_2_1_1

  - rule_id: debian.cis.6.systemd_journal_upload_is_enabled_and_active
    title: "Ensure systemd-journal-upload is enabled and active"
    severity: high
    automation_type: automated
    cis_control: '6.1.2.1.3'
    cis_section: '6'
    profile_applicability: "Level 1"
    scope: debian.section_6.systemd_journal_upload_is_enabled_and_active
    assertion:
      field: enabled
      operator: equals
      expected: "true"
    remediation: >
      Run the following commands to unmask, enable and start systemd-journal-upload:
      # systemctl unmask systemd-journal-upload.service # systemctl --now enable
      systemd-journal-upload.service References: 1. NIST SP 800-53 Rev. 5: AU-2,
      AU-12
    compliance:
      - cis_debian_12_v1_1_0_6_1_2_1_3

  - rule_id: debian.cis.6.systemd_journal_remote_service_is_not_in_use
    title: "Ensure systemd-journal-remote service is not in use"
    severity: high
    automation_type: automated
    cis_control: '6.1.2.1.4'
    cis_section: '6'
    profile_applicability: "Level 1"
    scope: debian.section_6.systemd_journal_remote_service_is_not_in_use
    assertion:
      field: port
      operator: equals
      expected: "true"
    remediation: >
      Run the following commands to stop and mask systemd-journal-remote.socket and
      systemd-journal-remote.service: # systemctl stop systemd-journal-remote.socket
      systemd-journal-remote.service # systemctl mask systemd-journal-remote.socket
      systemd-journal-remote.service References: 1. NIST SP 800-53 Rev. 5: AU-2,
      AU-7 AU-12
    compliance:
      - cis_debian_12_v1_1_0_6_1_2_1_4

  - rule_id: debian.cis.6.journald_forwardtosyslog_is_disabled
    title: "Ensure journald ForwardToSyslog is disabled"
    severity: high
    automation_type: automated
    cis_control: '6.1.2.2'
    cis_section: '6'
    profile_applicability: "Level 1"
    scope: debian.section_6.journald_forwardtosyslog_is_disabled
    assertion:
      field: enabled
      operator: equals
      expected: "false"
    remediation: >
      - IF - rsyslog is the preferred method for capturing logs, this section and
      Recommendation should be skipped and the 'Configure rsyslog' section followed.
      - IF - journald is the preferred method for capturing logs: Set the following
      parameter in the [Journal] section in /etc/systemd/journald.conf or a file in
      /etc/systemd/journald.conf.d/ ending in .conf: ForwardToSyslog=no Example
      script to create systemd drop-in configuration file: #!/usr/bin/env bash {
      a_settings=('ForwardToSyslog=no') [ ! -d /etc/systemd/journald.conf.d/ ] &&
      mkdir /etc/systemd/journald.conf.d/ if grep -Psq -- '^\h*\[Journal\]'
      /etc/systemd/journald.conf.d/60- journald.conf; then printf '%s\n' ''
      '${a_settings[@]}' >> /etc/systemd/journald.conf.d/60- journald.conf else
      printf '%s\n' '' '[Journal]' '${a_settings[@]}' >>
      /etc/systemd/journald.conf.d/60-journald.conf fi } Note: If this setting
      appears in a canonically later file, or later in the same file, the setting
      will be overwritten Run to following command to update the parameters in the
      service: # systemctl reload-or-restart systemd-journald Default Value:
      ForwardToSyslog=no References: 1. NIST SP 800-53 Rev. 5: AU-2, AU-6, AU-7,
      AU-12
    compliance:
      - cis_debian_12_v1_1_0_6_1_2_2

  - rule_id: debian.cis.6.journald_compress_is_configured
    title: "Ensure journald Compress is configured"
    severity: high
    automation_type: automated
    cis_control: '6.1.2.3'
    cis_section: '6'
    profile_applicability: "Level 1"
    scope: debian.section_6.journald_compress_is_configured
    assertion:
      field: value
      operator: exists
      expected: "yes"
    remediation: >
      - IF - rsyslog is the preferred method for capturing logs, this section and
      Recommendation should be skipped and the 'Configure rsyslog' section followed.
      - IF - journald is the preferred method for capturing logs: Set the following
      parameter in the [Journal] section in /etc/systemd/journald.conf or a file in
      /etc/systemd/journald.conf.d/ ending in .conf: Compress=yes Example script to
      create systemd drop-in configuration file: #!/usr/bin/env bash {
      a_settings=('Compress=yes') [ ! -d /etc/systemd/journald.conf.d/ ] && mkdir
      /etc/systemd/journald.conf.d/ if grep -Psq -- '^\h*\[Journal\]'
      /etc/systemd/journald.conf.d/60- journald.conf; then printf '%s\n' ''
      '${a_settings[@]}' >> /etc/systemd/journald.conf.d/60- journald.conf else
      printf '%s\n' '' '[Journal]' '${a_settings[@]}' >>
      /etc/systemd/journald.conf.d/60-journald.conf fi } Note: If this setting
      appears in a canonically later file, or later in the same file, the setting
      will be overwritten Run to following command to update the parameters in the
      service: # systemctl reload-or-restart systemd-journald Default Value:
      Compress=yes References: 1. NIST SP 800-53 Rev. 5: AU-4
    compliance:
      - cis_debian_12_v1_1_0_6_1_2_3

  - rule_id: debian.cis.6.journald_storage_is_configured
    title: "Ensure journald Storage is configured"
    severity: high
    automation_type: automated
    cis_control: '6.1.2.4'
    cis_section: '6'
    profile_applicability: "Level 1"
    scope: debian.section_6.journald_storage_is_configured
    assertion:
      field: value
      operator: exists
      expected: "true"
    remediation: >
      - IF - rsyslog is the preferred method for capturing logs, this section and
      Recommendation should be skipped and the 'Configure rsyslog' section followed.
      - IF - journald is the preferred method for capturing logs: Set the following
      parameter in the [Journal] section in /etc/systemd/journald.conf or a file in
      /etc/systemd/journald.conf.d/ ending in .conf: Storage=persistent Example
      script to create systemd drop-in configuration file: #!/usr/bin/env bash {
      a_settings=('Storage=persistent') [ ! -d /etc/systemd/journald.conf.d/ ] &&
      mkdir /etc/systemd/journald.conf.d/ if grep -Psq -- '^\h*\[Journal\]'
      /etc/systemd/journald.conf.d/60- journald.conf; then printf '%s\n' ''
      '${a_settings[@]}' >> /etc/systemd/journald.conf.d/60- journald.conf else
      printf '%s\n' '' '[Journal]' '${a_settings[@]}' >>
      /etc/systemd/journald.conf.d/60-journald.conf fi } Note: If this setting
      appears in a canonically later file, or later in the same file, the setting
      will be overwritten Run to following command to update the parameters in the
      service: # systemctl reload-or-restart systemd-journald Default Value:
      Storage=persistent References: 1. NIST SP 800-53 Rev. 5: AU-3, AU-12
    compliance:
      - cis_debian_12_v1_1_0_6_1_2_4

  - rule_id: debian.cis.6.rsyslog_is_installed
    title: "Ensure rsyslog is installed"
    severity: high
    automation_type: automated
    cis_control: '6.1.3.1'
    cis_section: '6'
    profile_applicability: "Level 1"
    scope: debian.section_6.rsyslog_is_installed
    assertion:
      field: value
      operator: equals
      expected: "on"
    remediation: >
      Run the following command to install rsyslog: # apt install rsyslog Default
      Value: Installed References: 1. NIST SP 800-53 Rev. 5: AU-2, AU-3, AU-12
    compliance:
      - cis_debian_12_v1_1_0_6_1_3_1

  - rule_id: debian.cis.6.rsyslog_service_is_enabled_and_active
    title: "Ensure rsyslog service is enabled and active"
    severity: high
    automation_type: automated
    cis_control: '6.1.3.2'
    cis_section: '6'
    profile_applicability: "Level 1"
    scope: debian.section_6.rsyslog_service_is_enabled_and_active
    assertion:
      field: enabled
      operator: equals
      expected: "on"
    remediation: >
      - IF - rsyslog is being used for logging on the system: Run the following
      commands to unmask, enable, and start rsyslog.service: # systemctl unmask
      rsyslog.service # systemctl enable rsyslog.service # systemctl start
      rsyslog.service References: 1. NIST SP 800-53 Rev. 5: AU-2, AU-3, AU-12
    compliance:
      - cis_debian_12_v1_1_0_6_1_3_2

  - rule_id: debian.cis.6.journald_is_configured_to_send_logs_to_rsyslog
    title: "Ensure journald is configured to send logs to rsyslog"
    severity: high
    automation_type: automated
    cis_control: '6.1.3.3'
    cis_section: '6'
    profile_applicability: "Level 1"
    scope: debian.section_6.journald_is_configured_to_send_logs_to_rsyslog
    assertion:
      field: port
      operator: exists
      expected: "yes"
    remediation: >
      - IF - Journald is the preferred method for capturing logs, this section and
      Recommendation should be skipped and the 'Configure Journald' section
      followed. - IF - rsyslog is the preferred method for capturing logs: Set the
      following parameter in the [Journal] section in /etc/systemd/journald.conf or
      a file in /etc/systemd/journald.conf.d/ ending in .conf: ForwardToSyslog=yes
      Example script to create systemd drop-in configuration file: #!/usr/bin/env
      bash { a_settings=('ForwardToSyslog=yes') [ ! -d /etc/systemd/journald.conf.d/
      ] && mkdir /etc/systemd/journald.conf.d/ if grep -Psq -- '^\h*\[Journal\]'
      /etc/systemd/journald.conf.d/60- journald.conf; then printf '%s\n' ''
      '${a_settings[@]}' >> /etc/systemd/journald.conf.d/60- journald.conf else
      printf '%s\n' '' '[Journal]' '${a_settings[@]}' >>
      /etc/systemd/journald.conf.d/60-journald.conf fi } Note: If this setting
      appears in a canonically later file, or later in the same file, the setting
      will be overwritten Run to following command to update the parameters in the
      service: Restart systemd-journald.service: # systemctl reload-or-restart
      systemd-journald.service References: 1. NIST SP 800-53 Rev. 5: AC-3, AU-2,
      AU-4, AU-12, MP-2 2. SYSTEMD-JOURNALD.SERVICE(8) 3. JOURNALD.CONF(5)
      Additional Information: As noted in the systemd-journald man pages, systemd-
      journald logs may be exported to rsyslog either through the process mentioned
      here, or through a facility like systemd-journald.service. There are trade-
      offs involved in each implementation, where ForwardToSyslog will immediately
      capture all events (and forward to an external log server, if properly
      configured), but may not capture all boot-up activities. Mechanisms such as
      systemd-journald.service, on the other hand, will record bootup events, but
      may delay sending the information to rsyslog, leading to the potential for log
      manipulation prior to export. Be aware of the limitations of all tools
      employed to secure a system.
    compliance:
      - cis_debian_12_v1_1_0_6_1_3_3

  - rule_id: debian.cis.6.rsyslog_log_file_creation_mode_is_configured
    title: "Ensure rsyslog log file creation mode is configured"
    severity: high
    automation_type: automated
    cis_control: '6.1.3.4'
    cis_section: '6'
    profile_applicability: "Level 1"
    scope: debian.section_6.rsyslog_log_file_creation_mode_is_configured
    assertion:
      field: port
      operator: exists
      expected: "true"
    remediation: >
      Edit either /etc/rsyslog.conf or a dedicated .conf file in /etc/rsyslog.d/ and
      set $FileCreateMode to 0640 or more restrictive: $FileCreateMode 0640 Example
      script to create a drop-in configuration file in the default include location:
      #!/usr/bin/env bash { [ ! -d '/etc/rsyslog.d/' ] && mkdir /etc/rsyslog.d/
      printf '%s\n' '' '\$FileCreateMode 0640' >> /etc/rsyslog.d/60-rsyslog.conf }
      Reload the service: # systemctl reload-or-restart rsyslog References: 1.
      RSYSLOG.CONF(5) 2. NIST SP 800-53 Rev. 5: AC-3, AC-6, MP-2 3.
      https://www.rsyslog.com/doc/
    compliance:
      - cis_debian_12_v1_1_0_6_1_3_4

  - rule_id: debian.cis.6.rsyslog_is_not_configured_to_receive_logs_from_a
    title: "Ensure rsyslog is not configured to receive logs from a remote client"
    severity: high
    automation_type: automated
    cis_control: '6.1.3.7'
    cis_section: '6'
    profile_applicability: "Level 1"
    scope: debian.section_6.rsyslog_is_not_configured_to_receive_logs_from_a
    assertion:
      field: port
      operator: exists
      expected: "no"
    remediation: >
      Unless the system's primary function is to serve as a logfile server , modify
      the files returned by the Audit Procedure and remove the specific lines
      highlighted by the audit. Verify none of the following entries are present in
      the rsyslog configuration. advanced format module(load='imtcp')
      input(type='imtcp' port='514') deprecated legacy format $ModLoad imtcp
      $InputTCPServerRun Reload the service: # systemctl reload-or-restart rsyslog
      References: 1. NIST SP 800-53 Rev. 5: AU-2, AU-7, AU-12, CM-6 2.
      https://www.rsyslog.com/doc/index.html
    compliance:
      - cis_debian_12_v1_1_0_6_1_3_7

  - rule_id: debian.cis.6.file_deletion_events_by_users_are_collected
    title: "Ensure file deletion events by users are collected"
    severity: medium
    automation_type: automated
    cis_control: '6.2.3.13'
    cis_section: '6'
    profile_applicability: "Level 2"
    scope: debian.section_6.file_deletion_events_by_users_are_collected
    assertion:
      field: value
      operator: equals
      expected: "on"
    remediation: >
      Create audit rules Edit or create a file in the /etc/audit/rules.d/ directory,
      ending in .rules extension, with the relevant rules to monitor file deletion
      events by users. Example: # { UID_MIN=$(awk '/^\s*UID_MIN/{print $2}'
      /etc/login.defs) [ -n '${UID_MIN}' ] && printf ' -a always,exit -F arch=b64 -S
      rename,unlink,unlinkat,renameat -F auid>=${UID_MIN} -F auid!=unset -F
      key=delete -a always,exit -F arch=b32 -S rename,unlink,unlinkat,renameat -F
      auid>=${UID_MIN} -F auid!=unset -F key=delete ' >>
      /etc/audit/rules.d/50-delete.rules || printf 'ERROR: Variable 'UID_MIN' is
      unset.\n' } Load audit rules Merge and load the rules into active
      configuration: # augenrules --load Check if reboot is required. # if [[
      $(auditctl -s | grep 'enabled') =~ '2' ]]; then printf 'Reboot required to
      load rules\n'; fi References: 1. NIST SP 800-53 Rev. 5: AU-12, SC-7 Additional
      Information: Potential reboot required If the auditing configuration is locked
      (-e 2), then augenrules will not warn in any way that rules could not be
      loaded into the running configuration. A system reboot will be required to
      load the rules into the running configuration. System call structure For
      performance (man 7 audit.rules) reasons it is preferable to have all the
      system calls on one line. However, your configuration may have them on one
      line each or some other combination. This is important to understand for both
      the auditing and remediation sections as the examples given are optimized for
      performance as per the man page.
    compliance:
      - cis_debian_12_v1_1_0_6_2_3_13

  - rule_id: debian.cis.6.aide_is_installed
    title: "Ensure AIDE is installed"
    severity: high
    automation_type: automated
    cis_control: '6.3.1'
    cis_section: '6'
    profile_applicability: "Level 1"
    scope: debian.section_6.aide_is_installed
    assertion:
      field: value
      operator: equals
      expected: "true"
    remediation: >
      Install AIDE using the appropriate package manager or manual installation: #
      apt install aide aide-common Configure AIDE as appropriate for your
      environment. Consult the AIDE documentation for options. Run the following
      commands to initialize AIDE: # aideinit # mv /var/lib/aide/aide.db.new
      /var/lib/aide/aide.db References: 1. NIST SP 800-53 Rev. 5: AU-2 Additional
      Information: The prelinking feature can interfere with AIDE because it alters
      binaries to speed up their start up times. Run prelink -ua to restore the
      binaries to their prelinked state, thus avoiding false positives from AIDE.
    compliance:
      - cis_debian_12_v1_1_0_6_3_1

  - rule_id: debian.cis.6.filesystem_integrity_is_regularly_checked
    title: "Ensure filesystem integrity is regularly checked"
    severity: high
    automation_type: automated
    cis_control: '6.3.2'
    cis_section: '6'
    profile_applicability: "Level 1"
    scope: debian.section_6.filesystem_integrity_is_regularly_checked
    assertion:
      field: value
      operator: equals
      expected: "true"
    remediation: >
      Run the following command to unmask dailyaidecheck.timer and
      dailyaidecheck.service: # systemctl unmask dailyaidecheck.timer
      dailyaidecheck.service Run the following command to enable and start
      dailyaidecheck.timer: # systemctl --now enable dailyaidecheck.timer
      References: 1.
      https://github.com/konstruktoid/hardening/blob/master/config/aidecheck.service
      2.
      https://github.com/konstruktoid/hardening/blob/master/config/aidecheck.timer
      3. NIST SP 800-53 Rev. 5: AU-2 Additional Information: The checking in this
      recommendation occurs every day at 5am. Alter the frequency and time of the
      checks in compliance with site policy systemd timers, timer file
      aidecheck.timer and service file aidecheck.service, have been included as an
      optional alternative to using cron Ubuntu advises using /usr/bin/aide.wrapper
      rather than calling /usr/bin/aide directly in order to protect the database
      and prevent conflicts
    compliance:
      - cis_debian_12_v1_1_0_6_3_2


