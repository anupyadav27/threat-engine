tech_type: debian
category: linux
cis_benchmark: CIS Debian 12 v1.1.0
cis_section: '5'

rules:

  - rule_id: debian.cis.5.permissions_on_etc_ssh_sshd_config_are_configured
    title: "Ensure permissions on /etc/ssh/sshd_config are configured"
    severity: high
    automation_type: automated
    cis_control: '5.1.1'
    cis_section: '5'
    profile_applicability: "Level 1"
    scope: debian.section_5.permissions_on_etc_ssh_sshd_config_are_configured
    assertion:
      field: value
      operator: exists
      expected: "true"
    remediation: >
      Run the following script to set ownership and permissions on
      /etc/ssh/sshd_config and files ending in .conf in the /etc/ssh/sshd_config.d
      directory: #!/usr/bin/env bash { chmod u-x,og-rwx /etc/ssh/sshd_config chown
      root:root /etc/ssh/sshd_config while IFS= read -r -d $'\0' l_file; do if [ -e
      '$l_file' ]; then chmod u-x,og-rwx '$l_file' chown root:root '$l_file' fi done
      < <(find /etc/ssh/sshd_config.d -type f -print0 2>/dev/null) } - IF - other
      locations are listed in an Include statement, *.conf files in these locations
      access should also be modified. References: 1. NIST SP 800-53 Rev. 5: AC-3.
      MP-2
    compliance:
      - cis_debian_12_v1_1_0_5_1_1

  - rule_id: debian.cis.5.permissions_on_ssh_private_host_key_files_are
    title: "Ensure permissions on SSH private host key files are configured"
    severity: high
    automation_type: automated
    cis_control: '5.1.2'
    cis_section: '5'
    profile_applicability: "Level 1"
    scope: debian.section_5.permissions_on_ssh_private_host_key_files_are
    assertion:
      field: value
      operator: exists
      expected: "true"
    remediation: >
      Run the following script to set mode, ownership, and group on the private SSH
      host key files: #!/usr/bin/env bash { a_output=(); a_output2=();
      l_ssh_group_name='$(awk -F: '($1 ~ /^(ssh_keys|_?ssh)$/) {print $1}'
      /etc/group)' f_file_access_fix() { while IFS=: read -r l_file_mode
      l_file_owner l_file_group; do a_out2=() [ '$l_file_group' =
      '$l_ssh_group_name' ] && l_pmask='0137' || l_pmask='0177' l_maxperm='$( printf
      '%o' $(( 0777 & ~$l_pmask )) )' if [ $(( $l_file_mode & $l_pmask )) -gt 0 ];
      then a_out2+=(' Mode: \'$l_file_mode\' should be mode: \'$l_maxperm\' or more
      restrictive' \ ' updating to mode: \:$l_maxperm\'') if [ 'l_file_group' =
      '$l_ssh_group_name' ]; then chmod u-x,g-wx,o-rwx '$l_file' else chmod u-x,go-
      rwx '$l_file' fi fi if [ '$l_file_owner' != 'root' ]; then a_out2+=(' Owned
      by: \'$l_file_owner\' should be owned by \'root\'' \ ' Changing ownership to
      \'root\'') chown root '$l_file' fi if [[ ! '$l_file_group' =~
      ($l_ssh_group_name|root) ]]; then [ -n '$l_ssh_group_name' ] &&
      l_new_group='$l_ssh_group_name' || l_new_group='root' a_out2+=(' Owned by
      group \'$l_file_group\' should be group owned by: \'$l_ssh_group_name\' or
      \'root\'' \ ' Changing group ownership to \'$l_new_group\'') chgrp
      '$l_new_group' '$l_file' fi if [ '${#a_out2[@]}' -gt '0' ]; then a_output2+=('
      - File: \'$l_file\'' '${a_out2[@]}') else a_output+=(' - File: \'$l_file\'' \
      'Correct: mode: \'$l_file_mode\', owner: \'$l_file_owner\', and group owner:
      \'$l_file_group\' configured') fi done < <(stat -Lc '%#a:%U:%G' '$l_file') }
      while IFS= read -r -d $'\0' l_file; do if ssh-keygen -lf &>/dev/null
      '$l_file'; then file '$l_file' | grep -Piq --
      '\bopenssh\h+([^#\n\r]+\h+)?private\h+key\b' && f_file_access_fix fi done <
      <(find -L /etc/ssh -xdev -type f -print0 2>/dev/null) if [ '${#a_output2[@]}'
      -le '0' ]; then printf '%s\n' '' ' - No access changes required' '' else
      printf '%s\n' '' ' - Remediation results:' '${a_output2[@]}' '' fi }
      References: 1. NIST SP 800-53 Rev. 5: AC-3. MP-2
    compliance:
      - cis_debian_12_v1_1_0_5_1_2

  - rule_id: debian.cis.5.permissions_on_ssh_public_host_key_files_are
    title: "Ensure permissions on SSH public host key files are configured"
    severity: high
    automation_type: automated
    cis_control: '5.1.3'
    cis_section: '5'
    profile_applicability: "Level 1"
    scope: debian.section_5.permissions_on_ssh_public_host_key_files_are
    assertion:
      field: value
      operator: exists
      expected: "no"
    remediation: >
      Run the following script to set mode, ownership, and group on the public SSH
      host key files: #!/usr/bin/env bash { a_output=(); a_output2=()
      l_pmask='0133'; l_maxperm='$( printf '%o' $(( 0777 & ~$l_pmask )) )'
      f_file_access_fix() { while IFS=: read -r l_file_mode l_file_owner
      l_file_group; do a_out2=() [ $(( $l_file_mode & $l_pmask )) -gt 0 ] && \
      a_out2+=(' Mode: \'$l_file_mode\' should be mode: \'$l_maxperm\' or more
      restrictive' \ ' updating to mode: \'$l_maxperm\'') && chmod u-x,go-wx
      '$l_file' [ '$l_file_owner' != 'root' ] && \ a_out2+=(' Owned by:
      \'$l_file_owner\' should be owned by \'root\'' \ ' Changing ownership to
      \'root\'') && chown root '$l_file' [ '$l_file_group' != 'root' ] && \
      a_out2+=(' Owned by group \'$l_file_group\' should be group owned by:
      \'root\'' \ ' Changing group ownership to \'root\'') && chgrp root '$l_file'
      if [ '${#a_out2[@]}' -gt '0' ]; then a_output2+=(' - File: \'$l_file\''
      '${a_out2[@]}') else a_output+=(' - File: \'$l_file\'' \ ' Correct: mode:
      \'$l_file_mode\', owner: \'$l_file_owner\', and group owner: \'$l_file_group\'
      configured') fi done < <(stat -Lc '%#a:%U:%G' '$l_file') } while IFS= read -r
      -d $'\0' l_file; do if ssh-keygen -lf &>/dev/null '$l_file'; then file
      '$l_file' | grep -Piq -- '\bopenssh\h+([^#\n\r]+\h+)?public\h+key\b' &&
      f_file_access_fix fi done < <(find -L /etc/ssh -xdev -type f -print0
      2>/dev/null) if [ '${#a_output2[@]}' -le '0' ]; then printf '%s\n' '' ' - No
      access changes required' '' else printf '%s\n' ' - Remediation results:'
      '${a_output2[@]}' '' fi } Default Value: 644 0/root 0/root References: 1. NIST
      SP 800-53 Rev. 5: AC-3. MP-2
    compliance:
      - cis_debian_12_v1_1_0_5_1_3

  - rule_id: debian.cis.5.sshd_banner_is_configured
    title: "Ensure sshd Banner is configured"
    severity: high
    automation_type: automated
    cis_control: '5.1.5'
    cis_section: '5'
    profile_applicability: "Level 1"
    scope: debian.section_5.sshd_banner_is_configured
    assertion:
      field: value
      operator: exists
      expected: "no"
    remediation: >
      Edit the /etc/ssh/sshd_config file to set the Banner parameter above any
      Include and Match entries as follows: Banner /etc/issue.net Note: First
      occurrence of a option takes precedence, Match set statements withstanding. If
      Include locations are enabled, used, and order of precedence is understood in
      your environment, the entry may be created in a file in Include location. Edit
      the file being called by the Banner argument with the appropriate contents
      according to your site policy, remove any instances of \m , \r , \s , \v or
      references to the OS platform Example: # printf '%s\n' 'Authorized users only.
      All activity may be monitored and reported.' > '$(sshd -T | awk '$1 ==
      'banner' {print $2}')' References: 1. NIST SP 800-53 Rev. 5: CM-1, CM-2, CM-6,
      CM-7, IA-5 MITRE ATT&CK Mappings: Techniques / Sub- techniques Tactics
      Mitigations TA0001, TA0007 M1035
    compliance:
      - cis_debian_12_v1_1_0_5_1_5

  - rule_id: debian.cis.5.sshd_ciphers_are_configured
    title: "Ensure sshd Ciphers are configured"
    severity: high
    automation_type: automated
    cis_control: '5.1.6'
    cis_section: '5'
    profile_applicability: "Level 1"
    scope: debian.section_5.sshd_ciphers_are_configured
    assertion:
      field: value
      operator: exists
      expected: "no"
    remediation: >
      Edit the /etc/ssh/sshd_config file and add/modify the Ciphers line to contain
      a comma separated list of the site unapproved (weak) Ciphers preceded with a -
      above any Include entries: Example: Ciphers -3des-
      cbc,aes128-cbc,aes192-cbc,aes256-cbc,chacha20- poly1305@openssh.com - IF -
      CVE-2023-48795 has been addressed, and it meets local site policy, chacha20-
      poly1305@openssh.com may be removed from the list of excluded ciphers. Note:
      First occurrence of an option takes precedence. If Include locations are
      enabled, used, and order of precedence is understood in your environment, the
      entry may be created in a file in Include location. Default Value: Ciphers
      chacha20-poly1305@openssh.com,aes128-ctr,aes192-ctr,aes256-ctr,aes128-
      gcm@openssh.com,aes256-gcm@openssh.com References: 1.
      https://nvd.nist.gov/vuln/detail/CVE-2023-48795 2.
      https://nvd.nist.gov/vuln/detail/CVE-2019-1543 3.
      https://nvd.nist.gov/vuln/detail/CVE-2016-2183 4.
      https://nvd.nist.gov/vuln/detail/CVE-2008-5161 5.
      https://www.openssh.com/txt/cbc.adv 6. https://www.openssh.com/txt/cbc.adv 7.
      SSHD_CONFIG(5) 8. NIST SP 800-53 Rev. 5: SC-8
    compliance:
      - cis_debian_12_v1_1_0_5_1_6

  - rule_id: debian.cis.5.sshd_clientaliveinterval_and_clientalivecountmax
    title: "Ensure sshd ClientAliveInterval and ClientAliveCountMax are configured"
    severity: high
    automation_type: automated
    cis_control: '5.1.7'
    cis_section: '5'
    profile_applicability: "Level 1"
    scope: debian.section_5.sshd_clientaliveinterval_and_clientalivecountmax
    assertion:
      field: row_count
      operator: exists
      expected: "true"
    remediation: >
      Edit the /etc/ssh/sshd_config file to set the ClientAliveInterval and
      ClientAliveCountMax parameters above any Include and Match entries according
      to site policy. Example: ClientAliveInterval 15 ClientAliveCountMax 3 Note:
      First occurrence of a option takes precedence, Match set statements
      withstanding. If Include locations are enabled, used, and order of precedence
      is understood in your environment, the entry may be created in a file in
      Include location. Default Value: ClientAliveInterval 0 ClientAliveCountMax 3
      References: 1. SSHD_CONFIG(5) 2. SSHD(8) 3. NIST SP 800-53 Rev. 5: CM-1, CM-2,
      CM-6, CM-7, IA-5 Additional Information:
      https://bugzilla.redhat.com/show_bug.cgi?id=1873547
      https://github.com/openssh/openssh-portable/blob/V_8_9/serverloop.c#L137 MITRE
      ATT&CK Mappings: Techniques / Sub- techniques Tactics Mitigations T1078,
      T1078.001, T1078.002, T1078.003 TA0001 M1026
    compliance:
      - cis_debian_12_v1_1_0_5_1_7

