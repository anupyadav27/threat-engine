    remediation: >
      Run the following command to install libpam-pwquality: # apt install libpam-
      pwquality References: 1. https://packages.debian.org/buster/libpam-pwquality
      5.3.2 Configure pam-auth-update profiles pam-auth-update is a utility that
      permits configuring the central authentication policy for the system using
      pre-defined profiles as supplied by PAM module packages. Profiles - Shipped in
      the /usr/share/pam-configs/ directory specify the modules, with options, to
      enable; the preferred ordering with respect to other profiles; and whether a
      profile should be enabled by default. Packages providing PAM modules register
      their profiles at install time by calling pam-auth-update --package. Selection
      of profiles is done using the standard debconf interface. The profile
      selection question will be asked at medium priority when packages are added or
      removed, so no user interaction is required by default. Users may invoke pam-
      auth-update directly to change their authentication configuration. The pam-
      auth-update script makes every effort to respect local changes to
      /etc/pam.d/common-*. Local modifications to the list of module options will be
      preserved, and additions of modules within the managed portion of the stack
      will cause pam-auth-update to treat the config files as locally modified and
      not make further changes to the config files unless given the --force option.
      If the user specifies that pam-auth-update should override local configuration
      changes, the locally-modified files will be saved in /etc/pam.d/ with a suffix
      of .pam-old.
    compliance:
      - cis_debian_12_v1_1_0_5_3_1_3

  - rule_id: debian.cis.5.pam_faillock_module_is_enabled
    title: "Ensure pam_faillock module is enabled"
    severity: high
    automation_type: automated
    cis_control: '5.3.2.2'
    cis_section: '5'
    profile_applicability: "Level 1"
    scope: debian.section_5.pam_faillock_module_is_enabled
    assertion:
      field: row_count
      operator: exists
      expected: "true"
    remediation: >
      Create two pam-auth-update profiles in /usr/share/pam-configs/: 1. Create the
      faillock profile in /usr/share/pam-configs/ with the following lines: Name:
      Enable pam_faillock to deny access Default: yes Priority: 0 Auth-Type: Primary
      Auth: [default=die] pam_faillock.so authfail Example Script: #!/usr/bin/env
      bash { arr=('Name: Enable pam_faillock to deny access' 'Default: yes'
      'Priority: 0' 'Auth-Type: Primary' 'Auth:' ' [default=die] pam_faillock.so
      authfail') printf '%s\n' '${arr[@]}' > /usr/share/pam-configs/faillock } 2.
      Create the faillock_notify profile in /usr/share/pam-configs/ with the
      following lines: Name: Notify of failed login attempts and reset count upon
      success Default: yes Priority: 1024 Auth-Type: Primary Auth: requisite
      pam_faillock.so preauth Account-Type: Primary Account: required
      pam_faillock.so Example Script: #!/usr/bin/env bash { arr=('Name: Notify of
      failed login attempts and reset count upon success' 'Default: yes' 'Priority:
      1024' 'Auth-Type: Primary' 'Auth:' ' requisite pam_faillock.so preauth'
      'Account-Type: Primary' 'Account:' ' required pam_faillock.so') printf '%s\n'
      '${arr[@]}' > /usr/share/pam-configs/faillock_notify } Run the following
      command to update the common-auth and common-account PAM files with the new
      profiles: # pam-auth-update --enable <profile_filename> Example: # pam-auth-
      update --enable faillock # pam-auth-update --enable faillock_notify Note: •
      The name used for the file must be used in the pam-auth-update --enable
      command • The Name: line should be easily recognizable and understood • The
      Priority: Line is important as it effects the order of the lines in the
      /etc/pam.d/ files • If a site specific custom profile is being used in your
      environment to configure PAM that includes the configuration for the
      pam_faillock module, enable that module instead
    compliance:
      - cis_debian_12_v1_1_0_5_3_2_2

