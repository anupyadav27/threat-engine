  - rule_id: debian.cis.5.pam_unix_does_not_include_remember
    title: "Ensure pam_unix does not include remember"
    severity: high
    automation_type: automated
    cis_control: '5.3.3.4.2'
    cis_section: '5'
    profile_applicability: "Level 1"
    scope: debian.section_5.pam_unix_does_not_include_remember
    assertion:
      field: value
      operator: equals
      expected: "on"
    remediation: >
      Run the following command: # grep -PH --
      '^\h*([^#\n\r]+\h+)?pam_unix\.so\h+([^#\n\r]+\h+)?remember\b' /usr/share/pam-
      configs/* Edit any files returned and remove the remember=_<N>_ argument for
      the pam_unix lines Example output: [success=end default=ignore] pam_unix.so
      obscure use_authtok try_first_pass yescrypt remember=5 # **<- remove
      remember=<N>** [success=end default=ignore] pam_unix.so obscure yescrypt
      remember=5 # **<- remove remember=<N>** Run the following command to update
      the files in the /etc/pam.d/ directory: # pam-auth-update --enable
      <EDITED_PROFILE_NAME> Example: # pam-auth-update --enable unix Note: If custom
      files are being used, the corresponding files in /etc/pam.d/ would need to be
      edited directly, and the pam-auth-update --enable <EDITED_PROFILE_NAME>
      command skipped
    compliance:
      - cis_debian_12_v1_1_0_5_3_3_4_2

  - rule_id: debian.cis.5.pam_unix_includes_a_strong_password_hashing
    title: "Ensure pam_unix includes a strong password hashing algorithm"
    severity: high
    automation_type: automated
    cis_control: '5.3.3.4.3'
    cis_section: '5'
    profile_applicability: "Level 1"
    scope: debian.section_5.pam_unix_includes_a_strong_password_hashing
    assertion:
      field: length
      operator: exists
      expected: "on"
    remediation: >
      Run the following command: # awk '/Password-Type:/{ f = 1;next } /-Type:/{ f =
      0 } f {if (/pam_unix\.so/) print FILENAME}' /usr/share/pam-configs/* Edit any
      returned files and edit or add a strong hashing algorithm, either sha512 or
      yescrypt, that meets local site policy to the pam_unix lines in the Password
      section: Example File: Name: Unix authentication Default: yes Priority: 256
      Auth-Type: Primary # <- Start of 'Auth' section Auth: [success=end
      default=ignore] pam_unix.so try_first_pass Auth-Initial: [success=end
      default=ignore] pam_unix.so Account-Type: Primary # <- Start of 'Account'
      section Account: [success=end new_authtok_reqd=done default=ignore]
      pam_unix.so Account-Initial: [success=end new_authtok_reqd=done
      default=ignore] pam_unix.so Session-Type: Additional # <- Start of 'Session'
      section Session: required pam_unix.so Session-Initial: required pam_unix.so
      Password-Type: Primary # <- Start of 'Password' section Password: [success=end
      default=ignore] pam_unix.so obscure use_authtok try_first_pass yescrypt # <-
      **ensure hashing algorithm is either sha512 or yescrypt** Password-Initial:
      [success=end default=ignore] pam_unix.so obscure yescrypt # <- **ensure
      hashing algorithm is either sha512 or yescrypt** Run the following command to
      update the files in the /etc/pam.d/ directory: # pam-auth-update --enable
      <MODIFIED_PROFILE_NAME> Example: # pam-auth-update --enable unix References:
      1. NIST SP 800-53 Rev. 5: IA-5 Additional Information: The following command
      may be used to expire all non-system user ID's immediately and force them to
      change their passwords on next login. Any system accounts that need to be
      expired should be carefully done separately by the system administrator to
      prevent any potential problems. # awk -F: '( $3<''$(awk '/^\s*UID_MIN/{print
      $2}' /etc/login.defs)'' && $1 != 'nfsnobody' ) { print $1 }' /etc/passwd |
      xargs -n 1 chage -d 0
    compliance:
      - cis_debian_12_v1_1_0_5_3_3_4_3

  - rule_id: debian.cis.5.pam_unix_includes_use_authtok
    title: "Ensure pam_unix includes use_authtok"
    severity: high
    automation_type: automated
    cis_control: '5.3.3.4.4'
    cis_section: '5'
    profile_applicability: "Level 1"
    scope: debian.section_5.pam_unix_includes_use_authtok
    assertion:
      field: value
      operator: equals
      expected: "on"
    remediation: >
      Run the following command: # awk '/Password-Type:/{ f = 1;next } /-Type:/{ f =
      0 } f {if (/pam_unix\.so/) print FILENAME}' /usr/share/pam-configs/* Edit any
      returned files add use_authtok to the pam_unix line in the Password section
      under Password: subsection: Note: The if the file's Password section includes
      a Password-Initial: subsection, use_authtok should not be added to the
      pam_unix line in the Password-Initial: subsection Example File: Name: Unix
      authentication Default: yes Priority: 256 Auth-Type: Primary # <- Start of
      'Auth' section Auth: [success=end default=ignore] pam_unix.so try_first_pass
      Auth-Initial: [success=end default=ignore] pam_unix.so Account-Type: Primary #
      <- Start of 'Account' section Account: [success=end new_authtok_reqd=done
      default=ignore] pam_unix.so Account-Initial: [success=end
      new_authtok_reqd=done default=ignore] pam_unix.so Session-Type: Additional #
      <- Start of 'Session' section Session: required pam_unix.so Session-Initial:
      required pam_unix.so Password-Type: Primary # <- Start of 'Password' section
      Password: [success=end default=ignore] pam_unix.so obscure use_authtok
      try_first_pass yescrypt # <- **ensure line includes use_authtok** Password-
      Initial: [success=end default=ignore] pam_unix.so obscure yescrypt # <-
      **Password-Initial: subsection does not include use_authtok Run the following
      command to update the files in the /etc/pam.d/ directory: # pam-auth-update
      --enable <MODIFIED_PROFILE_NAME> Example: # pam-auth-update --enable unix
      References: 1. NIST SP 800-53 Rev. 5: IA-5
    compliance:
      - cis_debian_12_v1_1_0_5_3_3_4_4

  - rule_id: debian.cis.5.strong_password_hashing_algorithm_is_configured
    title: "Ensure strong password hashing algorithm is configured"
    severity: high
    automation_type: automated
    cis_control: '5.4.1.4'
    cis_section: '5'
    profile_applicability: "Level 1"
    scope: debian.section_5.strong_password_hashing_algorithm_is_configured
    assertion:
      field: length
      operator: exists
      expected: "true"
    remediation: >
      Edit /etc/login.defs and set the ENCRYPT_METHOD to SHA512 or YESCRYPT:
      ENCRYPT_METHOD <HASHING_ALGORITHM> Example: ENCRYPT_METHOD YESCRYPT Note: •
      This only effects local groups' passwords created after updating the file to
      use sha512 or yescrypt. • If it is determined that the password algorithm
      being used is not sha512 or yescrypt, once it is changed, it is recommended
      that all group passwords be updated to use the stronger hashing algorithm. •
      It is recommended that the chosen hashing algorithm is consistent across
      /etc/login.defs and the PAM configuration Default Value: ENCRYPT_METHOD SHA512
      References: 1. NIST SP 800-53 Rev. 5: IA-5
    compliance:
      - cis_debian_12_v1_1_0_5_4_1_4

  - rule_id: debian.cis.5.inactive_password_lock_is_configured
    title: "Ensure inactive password lock is configured"
    severity: high
    automation_type: automated
    cis_control: '5.4.1.5'
    cis_section: '5'
    profile_applicability: "Level 1"
    scope: debian.section_5.inactive_password_lock_is_configured
    assertion:
      field: row_count
      operator: lte
      expected: "false"
    remediation: >
      Run the following command to set the default password inactivity period to 45
      days or less that meets local site policy: # useradd -D -f <N> Example: #
      useradd -D -f 45 Run the following command to modify user parameters for all
      users with a password set to a inactive age of 45 days or less that follows
      local site policy: # chage --inactive <N> <user> Example: # awk -F:
      '($2~/^\$.+\$/) {if($7 > 45 || $7 < 0)system ('chage --inactive 45 ' $1)}'
      /etc/shadow Default Value: INACTIVE=-1 References: 1. CIS Password Policy
      Guide Additional Information: A value of -1 would disable this setting.
    compliance:
      - cis_debian_12_v1_1_0_5_4_1_5

  - rule_id: debian.cis.5.all_users_last_password_change_date_is_in_the_past
    title: "Ensure all users last password change date is in the past"
    severity: high
    automation_type: automated
    cis_control: '5.4.1.6'
    cis_section: '5'
    profile_applicability: "Level 1"
    scope: debian.section_5.all_users_last_password_change_date_is_in_the_past
    assertion:
      field: value
      operator: equals
      expected: "true"
    remediation: >
      Investigate any users with a password change date in the future and correct
      them. Locking the account, expiring the password, or resetting the password
      manually may be appropriate.
    compliance:
      - cis_debian_12_v1_1_0_5_4_1_6

  - rule_id: debian.cis.5.root_is_the_only_gid_0_account
    title: "Ensure root is the only GID 0 account"
    severity: high
    automation_type: automated
    cis_control: '5.4.2.2'
    cis_section: '5'
    profile_applicability: "Level 1"
    scope: debian.section_5.root_is_the_only_gid_0_account
    assertion:
      field: row_count
      operator: equals
      expected: "no"
    remediation: >
      Run the following command to set the root user's GID to 0: # usermod -g 0 root
      Run the following command to set the root group's GID to 0: # groupmod -g 0
      root Remove any users other than the root user with GID 0 or assign them a new
      GID if appropriate. References: 1. NIST SP 800-53 Rev. 5: CM-1, CM-2, CM-6,
      CM-7, IA-5
    compliance:
      - cis_debian_12_v1_1_0_5_4_2_2

  - rule_id: debian.cis.5.group_root_is_the_only_gid_0_group
    title: "Ensure group root is the only GID 0 group"
    severity: high
    automation_type: automated
    cis_control: '5.4.2.3'
    cis_section: '5'
    profile_applicability: "Level 1"
    scope: debian.section_5.group_root_is_the_only_gid_0_group
    assertion:
      field: value
      operator: equals
      expected: "no"
    remediation: >
      Run the following command to set the root group's GID to 0: # groupmod -g 0
      root Remove any groups other than the root group with GID 0 or assign them a
      new GID if appropriate. References: 1. NIST SP 800-53 Rev. 5: CM-1, CM-2,
      CM-6, CM-7, IA-5
    compliance:
      - cis_debian_12_v1_1_0_5_4_2_3

  - rule_id: debian.cis.5.root_path_integrity
    title: "Ensure root path integrity"
    severity: high
    automation_type: automated
    cis_control: '5.4.2.5'
    cis_section: '5'
    profile_applicability: "Level 1"
    scope: debian.section_5.root_path_integrity
    assertion:
      field: value
      operator: equals
      expected: "true"
    remediation: >
      Correct or justify any: • Locations that are not directories • Empty
      directories (::) • Trailing (:) • Current working directory (.) • Non root
      owned directories • Directories that less restrictive than mode 0755
      References: 1. NIST SP 800-53 Rev. 5: CM-1, CM-2, CM-6, CM-7, IA-5 MITRE
      ATT&CK Mappings: Techniques / Sub- techniques Tactics Mitigations T1204,
      T1204.002 TA0006 M1022
    compliance:
      - cis_debian_12_v1_1_0_5_4_2_5


