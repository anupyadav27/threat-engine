  - rule_id: debian.cis.1.apparmor_is_enabled_in_the_bootloader
    title: "Ensure AppArmor is enabled in the bootloader configuration"
    severity: high
    automation_type: automated
    cis_control: '1.3.1.2'
    cis_section: '1'
    profile_applicability: "Level 1"
    scope: debian.section_1.apparmor_is_enabled_in_the_bootloader
    assertion:
      field: enabled
      operator: equals
      expected: "true"
    remediation: >
      Edit /etc/default/grub and add the apparmor=1 and security=apparmor parameters
      to the GRUB_CMDLINE_LINUX= line GRUB_CMDLINE_LINUX='apparmor=1
      security=apparmor' Run the following command to update the grub2
      configuration: # update-grub References: 1. NIST SP 800-53 Rev. 5: AC-3
    compliance:
      - cis_debian_12_v1_1_0_1_3_1_2

  - rule_id: debian.cis.1.bootloader_password_is_set
    title: "Ensure bootloader password is set"
    severity: high
    automation_type: automated
    cis_control: '1.4.1'
    cis_section: '1'
    profile_applicability: "Level 1"
    scope: debian.section_1.bootloader_password_is_set
    assertion:
      field: value
      operator: equals
      expected: "true"
    remediation: >
      Create an encrypted password with grub-mkpasswd-pbkdf2: # grub-mkpasswd-pbkdf2
      --iteration-count=600000 --salt=64 Enter password: <password> Reenter
      password: <password> PBKDF2 hash of your password is <encrypted-password> Add
      the following into a custom /etc/grub.d configuration file: cat <<EOF exec
      tail -n +2 $0 set superusers='<username>' password_pbkdf2 <username>
      <encrypted-password> EOF The superuser/user information and password should
      not be contained in the /etc/grub.d/00_header file as this file could be
      overwritten in a package update. If there is a requirement to be able to
      boot/reboot without entering the password, edit /etc/grub.d/10_linux and add
      --unrestricted to the line CLASS= Example: CLASS='--class gnu-linux --class
      gnu --class os --unrestricted' Run the following command to update the grub2
      configuration: # update-grub Default Value: This recommendation is designed
      around the grub bootloader, if LILO or another bootloader is in use in your
      environment enact equivalent settings. Replace /boot/grub/grub.cfg with the
      appropriate grub configuration file for your environment. References: 1. NIST
      SP 800-53 Rev. 5: AC-3 Additional Information: Changes to /etc/grub.d/10_linux
      may be overwritten during updates to the grub- common package. You should
      review any changes to this file before rebooting otherwise the system may
      unexpectedly prompt for a password on the next boot.
    compliance:
      - cis_debian_12_v1_1_0_1_4_1

  - rule_id: debian.cis.1.address_space_layout_randomization_is_enabled
    title: "Ensure address space layout randomization is enabled"
    severity: high
    automation_type: automated
    cis_control: '1.5.1'
    cis_section: '1'
    profile_applicability: "Level 1"
    scope: debian.section_1.address_space_layout_randomization_is_enabled
    assertion:
      field: enabled
      operator: equals
      expected: "true"
    remediation: >
      Set the following parameter in /etc/sysctl.conf or a file in /etc/sysctl.d/
      ending in .conf: • kernel.randomize_va_space = 2 Example: # printf '%s\n'
      'kernel.randomize_va_space = 2' >> /etc/sysctl.d/60- kernel_sysctl.conf Run
      the following command to set the active kernel parameter: # sysctl -w
      kernel.randomize_va_space=2 Note: If these settings appear in a canonically
      later file, or later in the same file, these settings will be overwritten
      Default Value: kernel.randomize_va_space = 2 References: 1.
      http://manpages.ubuntu.com/manpages/focal/man5/sysctl.d.5.html 2. CCI-000366:
      The organization implements the security configuration settings 3. NIST SP
      800-53 Rev. 5: CM-6
    compliance:
      - cis_debian_12_v1_1_0_1_5_1

  - rule_id: debian.cis.1.core_dumps_are_restricted
    title: "Ensure core dumps are restricted"
    severity: high
    automation_type: automated
    cis_control: '1.5.3'
    cis_section: '1'
    profile_applicability: "Level 1"
    scope: debian.section_1.core_dumps_are_restricted
    assertion:
      field: value
      operator: equals
      expected: "true"
    remediation: >
      Add the following line to /etc/security/limits.conf or a
      /etc/security/limits.d/* file: * hard core 0 Set the following parameter in
      /etc/sysctl.conf or a file in /etc/sysctl.d/ ending in .conf: •
      fs.suid_dumpable = 0 Example: # printf '\n%s' 'fs.suid_dumpable = 0' >>
      /etc/sysctl.d/60-fs_sysctl.conf Run the following command to set the active
      kernel parameter: # sysctl -w fs.suid_dumpable=0 Note: If these settings
      appear in a canonically later file, or later in the same file, these settings
      will be overwritten -IF- systemd-coredump is installed: edit
      /etc/systemd/coredump.conf and add/modify the following lines: Storage=none
      ProcessSizeMax=0 Run the command: systemctl daemon-reload References: 1. NIST
      SP 800-53 Rev. 5: CM-6 MITRE ATT&CK Mappings: Techniques / Sub- techniques
      Tactics Mitigations T1005, T1005.000 TA0007 M1057 1.6 Configure Command Line
      Warning Banners Presenting a warning message prior to the normal user login
      may assist in the prosecution of trespassers on the computer system. Changing
      some of these login banners also has the side effect of hiding OS version
      information and other detailed system information from attackers attempting to
      target specific exploits at a system. Guidelines published by the US
      Department of Defense require that warning messages include at least the name
      of the organization that owns the system, the fact that the system is subject
      to monitoring and that such monitoring is in compliance with local statutes,
      and that use of the system implies consent to such monitoring. It is important
      that the organization's legal counsel review the content of all messages
      before any system modifications are made, as these warning messages are
      inherently site-specific. More information (including citations of relevant
      case law) can be found at http://www.justice.gov/criminal/cybercrime/ The
      /etc/motd, /etc/issue, and /etc/issue.net files govern warning banners for
      standard command line logins for both local and remote users. Note: The text
      provided in the remediation actions for these items is intended as an example
      only. Please edit to include the specific text for your organization as
      approved by your legal department.
    compliance:
      - cis_debian_12_v1_1_0_1_5_3

  - rule_id: debian.cis.1.gdm_screen_locks_when_the_user_is_idle
    title: "Ensure GDM screen locks when the user is idle"
    severity: high
    automation_type: automated
    cis_control: '1.7.4'
    cis_section: '1'
    profile_applicability: "Level 1"
    scope: debian.section_1.gdm_screen_locks_when_the_user_is_idle
    assertion:
      field: value
      operator: equals
      expected: "true"
    remediation: >
      - IF - A user profile is already created run the following commands to enable
      screen locks when the user is idle: # gsettings set
      org.gnome.desktop.screensaver lock-delay 5 # gsettings set
      org.gnome.desktop.session idle-delay 900 Note: • gsettings commands in this
      section MUST be done from a command window on a graphical desktop or an error
      will be returned. • The system must be restarted after all gsettings
      configurations have been set in order for CIS-CAT Assessor to appropriately
      assess. • If the dconf database is not updating correctly due to umask
      requirements contain in the benchmark, then use (umask 0022 && gsetting set)
      commands from above to temporarily set umask ensuring that any files or
      directories created by gsettings will have the required permissions. - OR/IF-
      A user profile does not exist: 1. Create or edit the user profile in the
      /etc/dconf/profile/ and verify it includes the following: user-db:user system-
      db:{NAME_OF_DCONF_DATABASE} Note: local is the name of a dconf database used
      in the examples. 2. Create the directory /etc/dconf/db/local.d/ if it doesn't
      already exist: 3. Create the key file /etc/dconf/db/local.d/00-screensaver to
      provide information for the local database: Example key file: # Specify the
      dconf path [org/gnome/desktop/session] # Number of seconds of inactivity
      before the screen goes blank # Set to 0 seconds if you want to deactivate the
      screensaver. idle-delay=uint32 180 # Specify the dconf path
      [org/gnome/desktop/screensaver] # Number of seconds after the screen is blank
      before locking the screen lock-delay=uint32 0 Note: You must include the
      uint32 along with the integer key values as shown. 4. Run the following
      command to update the system databases: # dconf update 5. Users must log out
      and back in again before the system-wide settings take effect. References: 1.
      https://help.gnome.org/admin/system-admin-guide/stable/desktop-
      lockscreen.html.en
    compliance:
      - cis_debian_12_v1_1_0_1_7_4

  - rule_id: debian.cis.1.gdm_screen_locks_cannot_be_overridden
    title: "Ensure GDM screen locks cannot be overridden"
    severity: high
    automation_type: automated
    cis_control: '1.7.5'
    cis_section: '1'
    profile_applicability: "Level 1"
    scope: debian.section_1.gdm_screen_locks_cannot_be_overridden
    assertion:
      field: row_count
      operator: equals
      expected: "true"
    remediation: >
      1. To prevent the user from overriding these settings, create the file
      /etc/dconf/db/local.d/locks/00-screensaver with the following content: # Lock
      desktop screensaver settings /org/gnome/desktop/session/idle-delay
      /org/gnome/desktop/screensaver/lock-delay 2. Update the system databases: #
      dconf update Note: • A user profile must exist in order to apply locks. •
      Users must log out and back in again before the system-wide settings take
      effect. References: 1. https://help.gnome.org/admin/system-admin-
      guide/stable/desktop- lockscreen.html.en 2.
      https://help.gnome.org/admin/system-admin-guide/stable/dconf-lockdown.html.en
      3. NIST SP 800-53 Rev. 5: CM-11
    compliance:
      - cis_debian_12_v1_1_0_1_7_5

  - rule_id: debian.cis.1.gdm_automatic_mounting_of_removable_media_is
