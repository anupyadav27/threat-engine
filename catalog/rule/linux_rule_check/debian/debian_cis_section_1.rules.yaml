  - rule_id: debian.cis.1.tmp_is_a_separate_partition
    title: "Ensure /tmp is a separate partition"
    severity: high
    automation_type: automated
    cis_control: '1.1.2.1.1'
    cis_section: '1'
    profile_applicability: "Level 1"
    scope: debian.section_1.tmp_is_a_separate_partition
    assertion:
      field: row_count
      operator: lte
      expected: "true"
    remediation: >
      First ensure that systemd is correctly configured to ensure that /tmp will be
      mounted at boot time. # systemctl unmask tmp.mount For specific configuration
      requirements of the /tmp mount for your environment, modify /etc/fstab.
      Example of using tmpfs with specific mount options: tmpfs /tmp tmpfs
      defaults,rw,nosuid,nodev,noexec,relatime,size=2G 0 0 Note: the size=2G is an
      example of setting a specific size for tmpfs. Example of using a volume or
      disk with specific mount options. The source location of the volume or disk
      will vary depending on your environment: <device> /tmp <fstype>
      defaults,nodev,nosuid,noexec 0 0 References: 1.
      https://www.freedesktop.org/wiki/Software/systemd/APIFileSystems/ 2.
      https://www.freedesktop.org/software/systemd/man/systemd-fstab-generator.html
      3. https://www.kernel.org/doc/Documentation/filesystems/tmpfs.txt 4. NIST SP
      800-53 Rev. 5: CM-7
    compliance:
      - cis_debian_12_v1_1_0_1_1_2_1_1

