  - rule_id: ubuntu.cis.2.mail_transfer_agent_is_configured_for_local_only
    title: "Ensure mail transfer agent is configured for local-only mode"
    severity: high
    automation_type: automated
    cis_control: '2.1.21'
    cis_section: '2'
    profile_applicability: "Level 1"
    scope: ubuntu.section_2.mail_transfer_agent_is_configured_for_local_only
    assertion:
      field: value
      operator: exists
      expected: "on"
    remediation: >
      Edit /etc/postfix/main.cf and add the following line to the RECEIVING MAIL
      section. If the line already exists, change it to look like the line below:
      inet_interfaces = loopback-only Run the following command to restart postfix:
      # systemctl restart postfix Note: • This recommendation is designed around the
      postfix mail server. • Depending on your environment you may have an
      alternative MTA installed such as exim4. If this is the case consult the
      documentation for your installed MTA to configure the recommended state.
      References: 1. NIST SP 800-53 Rev. 5: CM-7
    compliance:
      - cis_ubuntu_24_04_v1_0_0_2_1_21

