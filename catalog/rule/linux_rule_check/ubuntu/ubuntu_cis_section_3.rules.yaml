tech_type: ubuntu
category: linux
cis_benchmark: CIS Ubuntu 24.04 v1.0.0
cis_section: '3'

rules:

  - rule_id: ubuntu.cis.3.wireless_interfaces_are_disabled
    title: "Ensure wireless interfaces are disabled"
    severity: high
    automation_type: automated
    cis_control: '3.1.2'
    cis_section: '3'
    profile_applicability: "Level 1"
    scope: ubuntu.section_3.wireless_interfaces_are_disabled
    assertion:
      field: enabled
      operator: equals
      expected: "false"
    remediation: >
      Run the following script to disable any wireless interfaces: #!/usr/bin/env
      bash { module_fix() { if ! modprobe -n -v '$l_mname' | grep -P -- '^\h*install
      \/bin\/(true|false)'; then echo -e ' - setting module: \'$l_mname\' to be un-
      loadable' echo -e 'install $l_mname /bin/false' >>
      /etc/modprobe.d/'$l_mname'.conf fi if lsmod | grep '$l_mname' > /dev/null
      2>&1; then echo -e ' - unloading module \'$l_mname\'' modprobe -r '$l_mname'
      fi if ! grep -Pq -- '^\h*blacklist\h+$l_mname\b' /etc/modprobe.d/*; then echo
      -e ' - deny listing \'$l_mname\'' echo -e 'blacklist $l_mname' >>
      /etc/modprobe.d/'$l_mname'.conf fi } if [ -n '$(find /sys/class/net/*/ -type d
      -name wireless)' ]; then l_dname=$(for driverdir in $(find /sys/class/net/*/
      -type d -name wireless | xargs -0 dirname); do basename '$(readlink -f
      '$driverdir'/device/driver/module)';done | sort -u) for l_mname in $l_dname;
      do module_fix done fi } References: 1. NIST SP 800-53 Rev. 5: CM-7
    compliance:
      - cis_ubuntu_24_04_v1_0_0_3_1_2

  - rule_id: ubuntu.cis.3.bluetooth_services_are_not_in_use
    title: "Ensure bluetooth services are not in use"
    severity: high
    automation_type: automated
    cis_control: '3.1.3'
    cis_section: '3'
    profile_applicability: "Level 1 + Level 2"
    scope: ubuntu.section_3.bluetooth_services_are_not_in_use
    assertion:
      field: value
      operator: equals
      expected: "true"
    remediation: >
      Run the following commands to stop bluetooth.service, and remove the bluez
      package: # systemctl stop bluetooth.service # apt purge bluez - OR - - IF -
      the bluez package is required as a dependency: Run the following commands to
      stop and mask bluetooth.service: # systemctl stop bluetooth.service #
      systemctl mask bluetooth.service Note: A reboot may be required References: 1.
      https://www.cisa.gov/tips/st05-015 2. NIST SP 800-53 Rev. 5: CM-7
    compliance:
      - cis_ubuntu_24_04_v1_0_0_3_1_3

  - rule_id: ubuntu.cis.3.tipc_kernel_module_is_not_available
    title: "Ensure tipc kernel module is not available"
    severity: medium
    automation_type: automated
    cis_control: '3.2.2'
    cis_section: '3'
    profile_applicability: "Level 2"
    scope: ubuntu.section_3.tipc_kernel_module_is_not_available
    assertion:
      field: value
      operator: equals
      expected: "on"
    remediation: >
      Run the following script to unload and disable the tipc module: - IF - the
      tipc kernel module is available in ANY installed kernel: • Create a file
      ending in .conf with install tipc /bin/false in the /etc/modprobe.d/ directory
      • Create a file ending in .conf with blacklist tipc in the /etc/modprobe.d/
      directory • Run modprobe -r tipc 2>/dev/null; rmmod tipc 2>/dev/null to remove
      tipc from the kernel - IF - the tipc kernel module is not available on the
      system, or pre-compiled into the kernel, no remediation is necessary
      #!/usr/bin/env bash { a_output2=() a_output3=() l_dl='' l_mod_name='tipc'
      l_mod_type='net' l_mod_path='$(readlink -f /lib/modules/**/kernel/$l_mod_type
      | sort -u)' f_module_fix() { l_dl='y' a_showconfig=() while IFS= read -r
      l_showconfig; do a_showconfig+=('$l_showconfig') done < <(modprobe
      --showconfig | grep -P --
      '\b(install|blacklist)\h+''${l_mod_chk_name//-/_}''\b') if lsmod | grep
      '$l_mod_chk_name' &> /dev/null; then a_output2+=(' - unloading kernel module:
      \'$l_mod_name\'') modprobe -r '$l_mod_chk_name' 2>/dev/null; rmmod
      '$l_mod_name' 2>/dev/null fi if ! grep -Pq --
      '\binstall\h+''${l_mod_chk_name//- /_}''\h+(\/usr)?\/bin\/(true|false)\b' <<<
      '${a_showconfig[*]}'; then a_output2+=(' - setting kernel module:
      \'$l_mod_name\' to \'$(readlink -f /bin/false)\'') printf '%s\n' 'install
      $l_mod_chk_name $(readlink -f /bin/false)' >>
      /etc/modprobe.d/'$l_mod_name'.conf fi if ! grep -Pq --
      '\bblacklist\h+''${l_mod_chk_name//-/_}''\b' <<< '${a_showconfig[*]}'; then
      a_output2+=(' - denylisting kernel module: \'$l_mod_name\'') printf '%s\n'
      'blacklist $l_mod_chk_name' >> /etc/modprobe.d/'$l_mod_name'.conf fi } for
      l_mod_base_directory in $l_mod_path; do # Check if the module exists on the
      system if [ -d '$l_mod_base_directory/${l_mod_name/-/\/}' ] && [ -n '$(ls -A
      '$l_mod_base_directory/${l_mod_name/-/\/}')' ]; then a_output3+=(' -
      \'$l_mod_base_directory\'') l_mod_chk_name='$l_mod_name' [[ '$l_mod_name' =~
      overlay ]] && l_mod_chk_name='${l_mod_name::-2}' [ '$l_dl' != 'y' ] &&
      f_module_fix else printf '%s\n' ' - kernel module: \'$l_mod_name\' doesn't
      exist in \'$l_mod_base_directory\'' fi done [ '${#a_output3[@]}' -gt 0 ] &&
      printf '%s\n' '' ' -- INFO --' ' - module: \'$l_mod_name\' exists in:'
      '${a_output3[@]}' [ '${#a_output2[@]}' -gt 0 ] && printf '%s\n' ''
      '${a_output2[@]}' || printf '%s\n' '' ' - No changes needed' printf '%s\n' ''
      ' - remediation of kernel module: \'$l_mod_name\' complete' '' } References:
      1. NIST SP 800-53 Rev. 5: SI-4, CM-7
    compliance:
      - cis_ubuntu_24_04_v1_0_0_3_2_2

