  - rule_id: ubuntu.cis.3.ip_forwarding_is_disabled
    title: "Ensure ip forwarding is disabled"
    severity: high
    automation_type: automated
    cis_control: '3.3.1'
    cis_section: '3'
    profile_applicability: "Level 1"
    scope: ubuntu.section_3.ip_forwarding_is_disabled
    assertion:
      field: enabled
      operator: equals
      expected: "false"
    remediation: >
      Set the following parameter in /etc/sysctl.conf or a file in /etc/sysctl.d/
      ending in .conf: • net.ipv4.ip_forward = 0 Example: # printf '%s\n'
      'net.ipv4.ip_forward = 0' >> /etc/sysctl.d/60- netipv4_sysctl.conf Run the
      following script to set the active kernel parameters: #!/usr/bin/env bash {
      sysctl -w net.ipv4.ip_forward=0 sysctl -w net.ipv4.route.flush=1 } - IF - IPv6
      is enabled on the system: Set the following parameter in /etc/sysctl.conf or a
      file in /etc/sysctl.d/ ending in .conf: • net.ipv6.conf.all.forwarding = 0
      Example: # printf '%s\n' 'net.ipv6.conf.all.forwarding = 0' >>
      /etc/sysctl.d/60- netipv6_sysctl.conf Run the following script to set the
      active kernel parameters: #!/usr/bin/env bash { sysctl -w
      net.ipv6.conf.all.forwarding=0 sysctl -w net.ipv6.route.flush=1 } Note: If
      these settings appear in a canonically later file, or later in the same file,
      these settings will be overwritten Default Value: net.ipv4.ip_forward = 0
      net.ipv6.conf.all.forwarding = 0 References: 1. NIST SP 800-53 Rev. 5: CM-1,
      CM-2, CM-6, CM-7, IA-5 Additional Information: On systems with Uncomplicated
      Firewall, additional settings may be configured in /etc/ufw/sysctl.conf • The
      settings in /etc/ufw/sysctl.conf will override settings in /etc/sysctl.conf •
      This behavior can be changed by updating the IPT_SYSCTL parameter in
      /etc/default/ufw
    compliance:
      - cis_ubuntu_24_04_v1_0_0_3_3_1

  - rule_id: ubuntu.cis.3.packet_redirect_sending_is_disabled
    title: "Ensure packet redirect sending is disabled"
    severity: high
    automation_type: automated
    cis_control: '3.3.2'
    cis_section: '3'
    profile_applicability: "Level 1"
    scope: ubuntu.section_3.packet_redirect_sending_is_disabled
    assertion:
      field: enabled
      operator: equals
      expected: "false"
    remediation: >
      Set the following parameters in /etc/sysctl.conf or a file in /etc/sysctl.d/
      ending in .conf: • net.ipv4.conf.all.send_redirects = 0 •
      net.ipv4.conf.default.send_redirects = 0 Example: # printf '%s\n'
      'net.ipv4.conf.all.send_redirects = 0' 'net.ipv4.conf.default.send_redirects =
      0' >> /etc/sysctl.d/60- netipv4_sysctl.conf Run the following script to set
      the active kernel parameters: #!/usr/bin/env bash { sysctl -w
      net.ipv4.conf.all.send_redirects=0 sysctl -w
      net.ipv4.conf.default.send_redirects=0 sysctl -w net.ipv4.route.flush=1 }
      Note: If these settings appear in a canonically later file, or later in the
      same file, these settings will be overwritten Default Value:
      net.ipv4.conf.all.send_redirects = 1 net.ipv4.conf.default.send_redirects = 1
      References: 1. NIST SP 800-53 Rev. 5: CM-1, CM-2, CM-6, CM-7, IA-5 Additional
      Information: On systems with Uncomplicated Firewall, additional settings may
      be configured in /etc/ufw/sysctl.conf • The settings in /etc/ufw/sysctl.conf
      will override settings in /etc/sysctl.conf • This behavior can be changed by
      updating the IPT_SYSCTL parameter in /etc/default/ufw
    compliance:
      - cis_ubuntu_24_04_v1_0_0_3_3_2

