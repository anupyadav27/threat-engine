      script to create systemd drop-in configuration file: #!/usr/bin/env bash {
      a_settings=('Storage=persistent') [ ! -d /etc/systemd/journald.conf.d/ ] &&
      mkdir /etc/systemd/journald.conf.d/ if grep -Psq -- '^\h*\[Journal\]'
      /etc/systemd/journald.conf.d/60- journald.conf; then printf '%s\n' ''
      '${a_settings[@]}' >> /etc/systemd/journald.conf.d/60- journald.conf else
