  - rule_id: ubuntu.cis.6.journald_forwardtosyslog_is_disabled
    title: "Ensure journald ForwardToSyslog is disabled"
    severity: high
    automation_type: automated
    cis_control: '6.1.2.2'
    cis_section: '6'
    profile_applicability: "Level 1"
    scope: ubuntu.section_6.journald_forwardtosyslog_is_disabled
    assertion:
      field: enabled
      operator: equals
      expected: "false"
    remediation: >
      - IF - rsyslog is the preferred method for capturing logs, this section and
      Recommendation should be skipped and the 'Configure rsyslog' section followed.
      - IF - journald is the preferred method for capturing logs: Set the following
      parameter in the [Journal] section in /etc/systemd/journald.conf or a file in
      /etc/systemd/journald.conf.d/ ending in .conf: ForwardToSyslog=no Example
      script to create systemd drop-in configuration file: #!/usr/bin/env bash {
      a_settings=('ForwardToSyslog=no') [ ! -d /etc/systemd/journald.conf.d/ ] &&
      mkdir /etc/systemd/journald.conf.d/ if grep -Psq -- '^\h*\[Journal\]'
      /etc/systemd/journald.conf.d/60- journald.conf; then printf '%s\n' ''
      '${a_settings[@]}' >> /etc/systemd/journald.conf.d/60- journald.conf else
      printf '%s\n' '' '[Journal]' '${a_settings[@]}' >>
      /etc/systemd/journald.conf.d/60-journald.conf fi } Note: If this setting
      appears in a canonically later file, or later in the same file, the setting
      will be overwritten Run to following command to update the parameters in the
      service: # systemctl reload-or-restart systemd-journald Default Value:
      ForwardToSyslog=no References: 1. NIST SP 800-53 Rev. 5: AU-2, AU-6, AU-7,
      AU-12
    compliance:
      - cis_ubuntu_24_04_v1_0_0_6_1_2_2

  - rule_id: ubuntu.cis.6.journald_compress_is_configured
    title: "Ensure journald Compress is configured"
    severity: high
    automation_type: automated
    cis_control: '6.1.2.3'
    cis_section: '6'
    profile_applicability: "Level 1"
    scope: ubuntu.section_6.journald_compress_is_configured
    assertion:
      field: value
      operator: exists
      expected: "yes"
    remediation: >
      - IF - rsyslog is the preferred method for capturing logs, this section and
      Recommendation should be skipped and the 'Configure rsyslog' section followed.
      - IF - journald is the preferred method for capturing logs: Set the following
      parameter in the [Journal] section in /etc/systemd/journald.conf or a file in
      /etc/systemd/journald.conf.d/ ending in .conf: Compress=yes Example script to
      create systemd drop-in configuration file: #!/usr/bin/env bash {
      a_settings=('Compress=yes') [ ! -d /etc/systemd/journald.conf.d/ ] && mkdir
      /etc/systemd/journald.conf.d/ if grep -Psq -- '^\h*\[Journal\]'
      /etc/systemd/journald.conf.d/60- journald.conf; then printf '%s\n' ''
      '${a_settings[@]}' >> /etc/systemd/journald.conf.d/60- journald.conf else
      printf '%s\n' '' '[Journal]' '${a_settings[@]}' >>
      /etc/systemd/journald.conf.d/60-journald.conf fi } Note: If this setting
      appears in a canonically later file, or later in the same file, the setting
      will be overwritten Run to following command to update the parameters in the
      service: # systemctl reload-or-restart systemd-journald Default Value:
      Compress=yes References: 1. NIST SP 800-53 Rev. 5: AU-4
    compliance:
      - cis_ubuntu_24_04_v1_0_0_6_1_2_3

  - rule_id: ubuntu.cis.6.journald_storage_is_configured
    title: "Ensure journald Storage is configured"
    severity: high
