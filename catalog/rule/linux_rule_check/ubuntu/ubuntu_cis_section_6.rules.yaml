  - rule_id: ubuntu.cis.6.accounts_in_etc_passwd_use_shadowed_passwords
    title: "Ensure accounts in /etc/passwd use shadowed passwords"
    severity: high
    automation_type: automated
    cis_control: '6.2.1'
    cis_section: '6'
    profile_applicability: "Level 1"
    scope: ubuntu.section_6.accounts_in_etc_passwd_use_shadowed_passwords
    assertion:
      field: row_count
      operator: equals
      expected: "no"
    remediation: >
      Run the following command to set accounts to use shadowed passwords and
      migrate passwords in /etc/passwd to /etc/shadow: # pwconv Investigate to
      determine if the account is logged in and what it is being used for, to
      determine if it needs to be forced off. References: 1. NIST SP 800-53 Rev. 5:
      IA-5 2. PWCONV(8) Additional Information: The pwconv command creates shadow
      from passwd and an optionally existing shadow. • The pwunconv command creates
      passwd from passwd and shadow and then removes shadow. • The grpconv command
      creates gshadow from group and an optionally existing gshadow. • The grpunconv
      command creates group from group and gshadow and then removes gshadow. These
      four programs all operate on the normal and shadow password and group files:
      /etc/passwd, /etc/group, /etc/shadow, and /etc/gshadow. Each program acquires
      the necessary locks before conversion. pwconv and grpconv are similar. First,
      entries in the shadowed file which don't exist in the main file are removed.
      Then, shadowed entries which don't have x' as the password in the main file
      are updated. Any missing shadowed entries are added. Finally, passwords in the
      main file are replaced with x'. These programs can be used for initial
      conversion as well to update the shadowed file if the main file is edited by
      hand. pwconv will use the values of PASS_MIN_DAYS, PASS_MAX_DAYS, and
      PASS_WARN_AGE from /etc/login.defs when adding new entries to /etc/shadow.
      pwunconv and grpunconv are similar. Passwords in the main file are updated
      from the shadowed file. Entries which exist in the main file but not in the
      shadowed file are left alone. Finally, the shadowed file is removed. Some
      password aging information is lost by pwunconv. It will convert what it can.
    compliance:
      - cis_ubuntu_18_04_v2_2_0_6_2_1

