    cis_control: '6.3.2'
    cis_section: '6'
    profile_applicability: "Level 1"
    scope: ubuntu.section_6.filesystem_integrity_is_regularly_checked
    assertion:
      field: value
      operator: equals
      expected: "true"
    remediation: >
      Run the following command to unmask dailyaidecheck.timer and
      dailyaidecheck.service: # systemctl unmask dailyaidecheck.timer
      dailyaidecheck.service Run the following command to enable and start
      dailyaidecheck.timer: # systemctl --now enable dailyaidecheck.timer
      References: 1.
      https://github.com/konstruktoid/hardening/blob/master/config/aidecheck.service
      2.
      https://github.com/konstruktoid/hardening/blob/master/config/aidecheck.timer
      3. NIST SP 800-53 Rev. 5: AU-2 Additional Information: The checking in this
