  - rule_id: ubuntu.cis.6.permissions_on_etc_passwd_are_configured
    title: "Ensure permissions on /etc/passwd are configured"
    severity: high
    automation_type: automated
    cis_control: '6.1.1'
    cis_section: '6'
    profile_applicability: "Level 1"
