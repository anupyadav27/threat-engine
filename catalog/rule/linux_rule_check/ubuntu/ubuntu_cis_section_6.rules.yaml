      operator: equals
      expected: "on"
    remediation: >
      Run the following command to install systemd-journal-remote: # apt install
      systemd-journal-remote References: 1. NIST SP 800-53 Rev. 5: AU-2, AU-7 AU-12
    compliance:
      - cis_ubuntu_24_04_v1_0_0_6_1_2_1_1

