    scope: ubuntu.section_4.ip6tables_default_deny_firewall_policy
    assertion:
      field: value
      operator: exists
      expected: "on"
    remediation: >
      - IF - IPv6 is enabled on your system: Run the following commands to implement
      a default DROP policy: # ip6tables -P INPUT DROP # ip6tables -P OUTPUT DROP #
      ip6tables -P FORWARD DROP References: 1. NIST SP 800-53 Rev. 5: CA-9, SC-7
    compliance:
      - cis_ubuntu_24_04_v1_0_0_4_4_3_1

  - rule_id: ubuntu.cis.4.ip6tables_loopback_traffic_is_configured
    title: "Ensure ip6tables loopback traffic is configured"
    severity: high
    automation_type: automated
    cis_control: '4.4.3.2'
    cis_section: '4'
    profile_applicability: "Level 1"
    scope: ubuntu.section_4.ip6tables_loopback_traffic_is_configured
    assertion:
      field: value
      operator: exists
      expected: "on"
    remediation: >
      Run the following commands to implement the loopback rules: # ip6tables -A
      INPUT -i lo -j ACCEPT # ip6tables -A OUTPUT -o lo -j ACCEPT # ip6tables -A
      INPUT -s ::1 -j DROP References: 1. NIST SP 800-53 Rev. 5: CA-9, SC-7
    compliance:
      - cis_ubuntu_24_04_v1_0_0_4_4_3_2

  - rule_id: ubuntu.cis.4.ip6tables_firewall_rules_exist_for_all_open_ports
    title: "Ensure ip6tables firewall rules exist for all open ports"
