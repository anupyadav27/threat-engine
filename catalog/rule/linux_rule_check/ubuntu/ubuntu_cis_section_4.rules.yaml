  - rule_id: ubuntu.cis.4.password_creation_requirements_are_configured
    title: "Ensure password creation requirements are configured"
    severity: high
    automation_type: automated
    cis_control: '4.4.1'
    cis_section: '4'
    profile_applicability: "Level 1"
    scope: ubuntu.section_4.password_creation_requirements_are_configured
    assertion:
      field: row_count
      operator: gte
      expected: "true"
    remediation: >
      The following setting is a recommend example policy. Alter these values to
      conform to your own organization's password policies. Run the following
      command to install the pam_pwquality module: # apt install libpam-pwquality
      Edit the file /etc/security/pwquality.conf and add or modify the following
      line for password length to conform to site policy: minlen = 14 Edit the file
      /etc/security/pwquality.conf and add or modify the following line for password
      complexity to conform to site policy: Option 1 minclass = 4 Option 2 dcredit =
      -1 ucredit = -1 ocredit = -1 lcredit = -1 Edit the /etc/pam.d/common-password
      file to include pam_pwquality.so and to conform to site policy: password
      requisite pam_pwquality.so retry=3 References: 1. NIST SP 800-53 Rev. 5: IA-5
      Additional Information: Additional module options may be set, recommendation
      requirements only cover including try_first_pass and minlen set to 14 or more.
      NOTE: As of this writing it is not possible to customize the maximum number of
      retries for the creation of a password within recommended methods. The command
      pam-auth- update is used to manage certain PAM configurations via profiles,
      such as /etc/pam.d/common-password. Making a manual change to this file will
      cause pam-auth- update to overwrite it on the next run and is thus against
      recommendations. Alternatively, pam_pwquality (via
      /etc/security/pwquality.conf) fully supports the configuration of the maximum
      number of retries for a password change with the configuration entry retry =
      XXX. The issue is that the template /usr/share/pam- configs/pwquality contains
      retry=3 which will override any retry setting in /etc/security/pwquality.conf
      as PAM entries takes precedence. This template file should not be modified as
      any package update will overwrite the change. Thus it is not possible, in any
      recommended way, to modify password retries.
    compliance:
      - cis_ubuntu_18_04_v2_2_0_4_4_1

