  - rule_id: ubuntu.cis.4.at_is_restricted_to_authorized_users
    title: "Ensure at is restricted to authorized users"
    severity: high
    automation_type: automated
    cis_control: '4.1.9'
    cis_section: '4'
    profile_applicability: "Level 1"
    scope: ubuntu.section_4.at_is_restricted_to_authorized_users
    assertion:
      field: value
      operator: equals
      expected: "on"
    remediation: >
      Run the following script to: • Remove /etc/at.deny if it exists • Create
      /etc/at.allow if it doesn't exist • Change ownership of /etc/at.allow to the
      root user • Change group ownership of /etc/at.allow to the group root
      #!/usr/bin/env bash { if dpkg-query -W at > /dev/null 2>&1; then
      l_file='/etc/at.allow' l_mask='0137' l_maxperm='$( printf '%o' $(( 0777 &
      ~$l_mask)) )' if [ -e /etc/at.deny ]; then echo -e ' - Removing
      \'/etc/at.deny\'' rm -f /etc/at.deny fi if [ ! -e /etc/at.allow ]; then echo
      -e ' - creating \'$l_file\'' touch '$l_file' fi while read l_mode l_fown
      l_fgroup; do if [ $(( $l_mode & $l_mask )) -gt 0 ]; then echo -e ' - Removing
      excessive permissions from \'$l_file\'' chmod u-x,g-wx,o-rwx '$l_file' fi if [
      '$l_fown' != 'root' ]; then echo -e ' - Changing owner on \'$l_file\' from:
      \'$l_fown\' to: \'root\'' chown root '$l_file' fi if [ '$l_fgroup' != 'root'
      ]; then echo -e ' - Changing group owner on \'$l_file\' from: \'$l_fgroup\'
      to: \'root\'' chgrp root '$l_file' fi done < <(stat -Lc '%#a %U %G' '$l_file')
      else echo -e '- cron is not installed on the system, no remediation
      required\n' fi } References: 1. NIST SP 800-53 Rev. 5: AC-3. MP-2
    compliance:
      - cis_ubuntu_18_04_v2_2_0_4_1_9

