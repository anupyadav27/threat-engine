  - rule_id: ubuntu.cis.4.system_accounts_are_secured
    title: "Ensure system accounts are secured"
    severity: high
    automation_type: automated
    cis_control: '4.5.2'
    cis_section: '4'
    profile_applicability: "Level 1"
    scope: ubuntu.section_4.system_accounts_are_secured
    assertion:
      field: row_count
      operator: equals
      expected: "true"
    remediation: >
      Set the shell for any accounts returned by the audit to nologin: # usermod -s
      $(which nologin) <user> Lock any non root accounts returned by the audit: #
      usermod -L <user> The following script will: • Set the shell for any accounts
      returned by the audit to nologin • Lock any non root system accounts returned
      by the audit: #!/usr/bin/env bash { l_output='' l_output2=''
      l_valid_shells='^($( awk -F\/ '$NF != 'nologin' {print}' /etc/shells | sed -rn
      '/^\//{s,/,\\\\/,g;p}' | paste -s -d '|' - ))$' a_users=(); a_ulock=() #
      initialize arrays while read -r l_user; do # change system accounts that have
      a valid login shell to nolog shell echo -e ' - System account \'$l_user\' has
      a valid logon shell, changing shell to \'$(which nologin)\'' usermod -s
      '$(which nologin)' '$l_user' done < <(awk -v pat='$l_valid_shells' -F:
      '($1!~/(root|sync|shutdown|halt|^\+)/ && $3<''$(awk '/^\s*UID_MIN/{print $2}'
      /etc/login.defs)'' && $(NF) ~ pat) { print $1 }' /etc/passwd) while read -r
      l_ulock; do # Lock system accounts that aren't locked echo -e ' - System
      account \'$l_ulock\' is not locked, locking account' usermod -L '$l_ulock'
      done < <(awk -v pat='$l_valid_shells' -F: '($1!~/(root|^\+)/ && $2!~/LK?/ &&
      $3<''$(awk '/^\s*UID_MIN/{print $2}' /etc/login.defs)'' && $(NF) ~ pat) {
      print $1 }' /etc/passwd) } References: 1. NIST SP 800-53 Rev. 5: AC-2. AC-3,
      AC-5, MP-2
    compliance:
      - cis_ubuntu_18_04_v2_2_0_4_5_2

