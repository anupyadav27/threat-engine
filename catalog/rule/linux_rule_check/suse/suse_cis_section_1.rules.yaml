tech_type: suse
category: linux
cis_benchmark: CIS SUSE Linux 15 v2.0.1
cis_section: '1'

rules:

  - rule_id: suse.cis.1.cramfs_kernel_module_is_not_available
    title: "Ensure cramfs kernel module is not available"
    severity: high
    automation_type: automated
    cis_control: '1.1.1.1'
    cis_section: '1'
    profile_applicability: "Level 1"
    scope: suse.section_1.cramfs_kernel_module_is_not_available
    assertion:
      field: value
      operator: equals
      expected: "on"
    remediation: >
      Run the following to unload and disable the cramfs kernel module. This can
      also be done by running the script included below. 1. Run the following
      commands to unload the cramfs kernel module: # modprobe -r cramfs 2>/dev/null
      # rmmod cramfs 2>/dev/null 2. Perform the following to disable the cramfs
      kernel module: a) Create a file ending in .conf with install cramfs /bin/false
      in the /etc/modprobe.d/ directory Example: # printf '\n%s\n' 'install cramfs
      /bin/false' >> cramfs.conf b) Create a file ending in .conf with blacklist
      cramfs in the /etc/modprobe.d/ directory Example: # printf '\n%s\n' 'blacklist
      cramfs' >> cramfs.conf Optional remediation script: This script will perform
      the above remediation as required by the system #!/usr/bin/env bash {
      a_output2=() a_output3=() l_dl='' l_mod_name='cramfs' l_mod_type='fs'
      l_mod_path='$(readlink -f /usr/lib/modules/**/kernel/$l_mod_type || readlink
      -f /lib/modules/**/kernel/$l_mod_type)' f_module_fix() { l_dl='y'
      a_showconfig=() while IFS= read -r l_showconfig; do
      a_showconfig+=('$l_showconfig') done < <(modprobe --showconfig | grep -P --
      '\b(install|blacklist)\h+''${l_mod_chk_name//-/_}''\b') if lsmod | grep
      '$l_mod_chk_name' &> /dev/null; then a_output2+=(' - unloading kernel module:
      \'$l_mod_name\'') modprobe -r '$l_mod_chk_name' 2>/dev/null; rmmod
      '$l_mod_name' 2>/dev/null fi if ! grep -Pq --
      '\binstall\h+''${l_mod_chk_name//- /_}''\h+(\/usr)?\/bin\/(true|false)\b' <<<
      '${a_showconfig[*]}'; then a_output2+=(' - setting kernel module:
      \'$l_mod_name\' to \'$(readlink -f /bin/false)\'') printf '%s\n' 'install
      $l_mod_chk_name $(readlink -f /bin/false)' >>
      /etc/modprobe.d/'$l_mod_name'.conf fi if ! grep -Pq --
      '\bblacklist\h+''${l_mod_chk_name//-/_}''\b' <<< '${a_showconfig[*]}'; then
      a_output2+=(' - denylisting kernel module: \'$l_mod_name\'') printf '%s\n'
      'blacklist $l_mod_chk_name' >> /etc/modprobe.d/'$l_mod_name'.conf fi } for
      l_mod_base_directory in $l_mod_path; do # Check if the module exists on the
      system if [ -d '$l_mod_base_directory/${l_mod_name/-/\/}' ] && [ -n '$(ls -A
      '$l_mod_base_directory/${l_mod_name/-/\/}')' ]; then a_output3+=(' -
      \'$l_mod_base_directory\'') l_mod_chk_name='$l_mod_name' [[ '$l_mod_name' =~
      overlay ]] && l_mod_chk_name='${l_mod_name::-2}' [ '$l_dl' != 'y' ] &&
      f_module_fix else printf '%s\n' ' - kernel module: \'$l_mod_name\' doesn't
      exist in \'$l_mod_base_directory\'' fi done [ '${#a_output3[@]}' -gt 0 ] &&
      printf '%s\n' '' ' -- INFO --' ' - module: \'$l_mod_name\' exists in:'
      '${a_output3[@]}' [ '${#a_output2[@]}' -gt 0 ] && printf '%s\n' ''
      '${a_output2[@]}' || printf '%s\n' '' ' - No changes needed' printf '%s\n' ''
      ' - remediation of kernel module: \'$l_mod_name\' complete' '' } References:
      1. NIST SP 800-53: CM-7 a 2. NIST SP 800-53A :: CM-7.1 (ii) 3. RHEL 8 STIG
      Group ID: V-230498 4. RHEL 9 STIG Group ID: V-257880
    compliance:
      - cis_suse_15_v2_0_1_1_1_1_1

