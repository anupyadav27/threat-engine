    scope: suse.section_1.system_wide_crypto_policy_is_not_set_in_sshd
    assertion:
      field: value
      operator: equals
      expected: "no"
    remediation: >
      Run the following commands: # sed -ri 's/^\s*(CRYPTO_POLICY\s*=.*)$/# \1/'
      /etc/sysconfig/ssh # systemctl reload sshd References: 1. NIST SP 800-53 Rev.
      5: SC-8, IA-5, AC-17
    compliance:
      - cis_suse_15_v2_0_1_1_6_3

  - rule_id: suse.cis.1.system_wide_crypto_policy_disables_sha1_hash_and
    title: "Ensure system wide crypto policy disables sha1 hash and signature support"
    severity: high
    automation_type: automated
    cis_control: '1.6.4'
    cis_section: '1'
    profile_applicability: "Level 1"
    scope: suse.section_1.system_wide_crypto_policy_disables_sha1_hash_and
    assertion:
      field: port
      operator: equals
      expected: "true"
    remediation: >
      Note: • The commands below are written for the included DEFAULT system-wide
      crypto policy. If another policy is in use and follows local site policy,
      replace DEFAULT with the name of your system-wide crypto policy. • Multiple
      subpolicies may be assigned to a policy as a colon separated list. e.g.
      DEFAULT:NO-SHA1:NO-SSHCBC • Subpolicies: o Not included in the update-crypto-
      policies --set command will not be applied to the system wide crypto policy. o
      must exist before they can be applied to the system wide crypto policy. o
      .pmod file filenames must be in all upper case, upper case, e.g. NO-
      SHA1.pmod, or they will not be read by the update-crypto-policies -- set
      command. Create or edit a file in /etc/crypto-policies/policies/modules/
      ending in .pmod and add or modify the following lines: hash = -SHA1 sign =
      -*-SHA1 sha1_in_certs = 0 Example: # printf '%s\n' '# This is a subpolicy
      dropping the SHA1 hash and signature support' 'hash = -SHA1' 'sign = -*-SHA1'
      'sha1_in_certs = 0' >> /etc/crypto- policies/policies/modules/NO-SHA1.pmod Run
      the following command to update the system-wide cryptographic policy # update-
      crypto-policies --set
