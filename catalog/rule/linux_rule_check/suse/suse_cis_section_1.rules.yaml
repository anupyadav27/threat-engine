  - rule_id: suse.cis.1.address_space_layout_randomization_is_enabled
    title: "Ensure address space layout randomization is enabled"
    severity: high
    automation_type: automated
    cis_control: '1.5.1'
    cis_section: '1'
    profile_applicability: "Level 1"
    scope: suse.section_1.address_space_layout_randomization_is_enabled
    assertion:
      field: enabled
      operator: equals
      expected: "true"
    remediation: >
      Set the following parameter in /etc/sysctl.conf or a file in /etc/sysctl.d/
      ending in .conf: • kernel.randomize_va_space = 2 Example: # printf '\n%s\n'
      'kernel.randomize_va_space = 2' >> /etc/sysctl.d/60- kernel_sysctl.conf Run
      the following command to set the active kernel parameter: # sysctl -w
      kernel.randomize_va_space=2 Note: If these settings appear in a canonically
      later file, or later in the same file, these settings will be overwritten
      Default Value: kernel.randomize_va_space = 2 References: 1. CCI-000366: The
      organization implements the security configuration settings 2. NIST SP 800-53:
      CM-6 3. NIST SP 800-53A: CM-6.1 (iv) 4. NIST SP 800-53: SI-16
    compliance:
      - cis_suse_15_v2_0_1_1_5_1

  - rule_id: suse.cis.1.core_dumps_are_restricted
