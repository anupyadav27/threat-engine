    severity: medium
    automation_type: automated
    cis_control: '1.1.1.1'
    cis_section: '1'
    profile_applicability: "Level 2"
    scope: suse.section_1.mounting_of_squashfs_filesystems_is_disabled
    assertion:
      field: enabled
      operator: equals
      expected: "false"
    remediation: >
      Edit or create a file in the /etc/modprobe.d/ directory ending in .conf
      Example: vi /etc/modprobe.d/squashfs.conf and add the following line: install
      squashfs /bin/true Run the following command to unload the squashfs module: #
      modprobe -r squashfs
