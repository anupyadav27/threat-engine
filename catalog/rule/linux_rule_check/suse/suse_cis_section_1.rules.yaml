  - rule_id: suse.cis.1.system_wide_crypto_policy_is_not_set_to_legacy
    title: "Ensure system wide crypto policy is not set to legacy"
    severity: high
    automation_type: automated
    cis_control: '1.6.2'
    cis_section: '1'
    profile_applicability: "Level 1"
    scope: suse.section_1.system_wide_crypto_policy_is_not_set_to_legacy
    assertion:
      field: port
      operator: gte
      expected: "no"
    remediation: >
      Run the following command to change the system-wide crypto policy # update-
      crypto-policies --set <CRYPTO POLICY> Example: # update-crypto-policies --set
      DEFAULT Run the following to make the updated system-wide crypto policy active
      # update-crypto-policies Default Value: DEFAULT References: 1. CRYPTO-
      POLICIES(7) 2. fips-mode-setup(8) 3. NIST SP 800-53 Rev. 5: SC-8 Additional
      Information: - IF - FIPS is required by local site policy: The system-wide
      cryptographic policies contain a policy level that enables cryptographic
      algorithms in accordance with the requirements by the Federal Information
      Processing Standard (FIPS) Publication 140. The fips-mode-setup tool that
      enables or disables FIPS mode internally uses the FIPS systemwide
      cryptographic policy. Switching the system to FIPS mode by using the FIPS
      system-wide cryptographic policy does not guarantee compliance with the FIPS
      140 standard. Re-generating all cryptographic keys after setting the system to
      FIPS mode may not be possible. For example, in the case of an existing IdM
      realm with users' cryptographic keys you cannot re-generate all the keys. The
      fips-mode-setup tool uses the FIPS policy internally. But on top of what the
      update-crypto-policies command with the --set FIPS option does, fips-mode-
      setup ensures the installation of the FIPS dracut module by using the fips-
      finish- install tool, it also adds the fips=1 boot option to the kernel
      command line and regenerates the initial ramdisk. IMPORTANT: Only enabling
      FIPS mode during installation ensures that the system generates all keys with
      FIPS-approved algorithms and continuous monitoring tests in place. Run the
      following command to switch the system to FIPS mode: # fips-mode-setup
      --enable Output: Kernel initramdisks are being regenerated. This might take
      some time. Setting system policy to FIPS Note: System-wide crypto policies are
      applied on application start-up. It is recommended to restart the system for
      the change of policies to fully take place. FIPS mode will be enabled. Please
      reboot the system for the setting to take effect. Run the following command to
      restart the system: # reboot After the reboot has completed, run the following
      command to verify FIPS mode: # fips-mode-setup --check Output: FIPS mode is
      enabled.
    compliance:
      - cis_suse_15_v2_0_1_1_6_2

  - rule_id: suse.cis.1.system_wide_crypto_policy_is_not_set_in_sshd
    title: "Ensure system wide crypto policy is not set in sshd configuration"
