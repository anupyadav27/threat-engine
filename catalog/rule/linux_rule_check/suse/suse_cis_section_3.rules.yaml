  - rule_id: suse.cis.3.disable_ipv6
    title: "Disable IPv6"
    severity: medium
    automation_type: automated
    cis_control: '3.1.1'
    cis_section: '3'
    profile_applicability: "Level 2"
    scope: suse.section_3.disable_ipv6
    assertion:
      field: value
      operator: equals
      expected: "no"
    remediation: >
      Use one of the two following methods to disable IPv6 on the system: To disable
      IPv6 through the GRUB2 config: Edit /etc/default/grub and add ipv6.disable=1
      to the GRUB_CMDLINE_LINUX parameters: GRUB_CMDLINE_LINUX='ipv6.disable=1' Run
      the following command to update the grub2 configuration: # grub2-mkconfig –o
      /boot/grub2/grub.cfg - OR - To disable IPv6 through sysctl settings: Set the
      following parameters in /etc/sysctl.conf or a /etc/sysctl.d/* file:
      net.ipv6.conf.all.disable_ipv6 = 1 net.ipv6.conf.default.disable_ipv6 = 1 Run
      the following commands to set the active kernel parameters: # sysctl -w
      net.ipv6.conf.all.disable_ipv6=1 # sysctl -w
      net.ipv6.conf.default.disable_ipv6=1 # sysctl -w net.ipv6.route.flush=1
    compliance:
      - cis_suse_12_v3_2_1_3_1_1

