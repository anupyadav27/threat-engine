  - rule_id: suse.cis.7.no_duplicate_uids_exist
    title: "Ensure no duplicate UIDs exist"
    severity: high
    automation_type: automated
    cis_control: '7.2.4'
    cis_section: '7'
    profile_applicability: "Level 1"
    scope: suse.section_7.no_duplicate_uids_exist
