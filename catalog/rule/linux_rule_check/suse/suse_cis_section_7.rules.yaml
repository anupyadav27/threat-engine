  - rule_id: suse.cis.7.local_interactive_user_home_directories_are
    title: "Ensure local interactive user home directories are configured"
    severity: high
    automation_type: automated
    cis_control: '7.2.8'
    cis_section: '7'
    profile_applicability: "Level 1"
    scope: suse.section_7.local_interactive_user_home_directories_are
    assertion:
      field: value
      operator: exists
      expected: "on"
    remediation: >
      If a local interactive users' home directory is undefined and/or doesn't
      exist, follow local site policy and perform one of the following: • Lock the
      user account • Remove the user from the system • create a directory for the
      user. If undefined, edit /etc/passwd and add the absolute path to the
      directory to the last field of the user. Run the following script to: • Remove
      excessive permissions from local interactive users home directories • Update
      the home directory's owner #!/usr/bin/env bash { a_output=() a_output2=()
      a_exists2=() a_mode2=() a_owner2=() l_valid_shells='^($( awk -F\/ '$NF !=
      'nologin' {print}' /etc/shells | sed -rn '/^\//{s,/,\\\\/,g;p}' | paste -s -d
      '|' - ))$' l_mask='0027'; l_max='$( printf '%o' $(( 0777 & ~$l_mask)) )'
      l_users='$(awk -v pat='$l_valid_shells' -F: '$(NF) ~ pat { print $1 ' '
      $(NF-1) }' /etc/passwd | wc -l)' [ '$l_users' -gt 10000 ] && printf '%s\n' ''
      ' ** INFO **' \ ' $l_users Local interactive users found on the system' ' This
      may be a long running process' ' **********' while IFS=' ' read -r l_user
      l_home; do if [ -d '$l_home' ]; then while IFS=: read -r l_own l_mode; do if [
      '$l_user' != '$l_own' ]; then a_owner2+=(' - User: \'$l_user\' Home
      \'$l_home\' is owned by: \'$l_own\'' \ ' changing owner to: \'$l_user\'') &&
      chown '$l_user' '$l_home' fi if [ $(( $l_mode & $l_mask )) -gt 0 ]; then
      a_mode2+=(' - User: \'$l_user\' Home \'$l_home\' is mode: \'$l_mode\'' \ '
      changing to mode: \'$l_max\' or more restrictive') chmod g-w,o-rwx '$l_home'
      fi done <<< '$(stat -Lc '%U:%#a' '$l_home')' else a_exists2+=(' - User:
      \'$l_user\' Home Directory: \'$l_home\' Doesn't exist') fi done <<< '$(awk -v
      pat='$l_valid_shells' -F: '$(NF) ~ pat { print $1 ' ' $(NF-1) }' /etc/passwd)'
      [ '${#a_exists2[@]}' -gt 0 ] && a_output2+=('${a_exists2[@]}') [
      '${#a_mode2[@]}' -gt 0 ] && a_output2+=('${a_mode2[@]}') [ '${#a_owner2[@]}'
      -gt 0 ] && a_output2+=('${a_owner2[@]}') if [ '${#a_output2[@]}' -gt 0 ]; then
      printf '%s\n' '' '${a_output2[@]}' else printf '%s\n' '' '- No changes
      required' fi } References: 1. NIST SP 800-53 Revision 5 :: CM-6 b 2. NIST SP
      800-53A :: CM-6.1 (iv)
    compliance:
      - cis_suse_15_v2_0_1_7_2_8


