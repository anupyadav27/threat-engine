  - rule_id: suse.cis.5.sshd_loglevel_is_configured
    title: "Ensure sshd LogLevel is configured"
    severity: high
    automation_type: automated
    cis_control: '5.1.15'
    cis_section: '5'
    profile_applicability: "Level 1"
    scope: suse.section_5.sshd_loglevel_is_configured
    assertion:
      field: port
      operator: exists
      expected: "true"
    remediation: >
      Edit the /etc/ssh/sshd_config file to set the LogLevel parameter to VERBOSE or
      INFO above any Include and Match entries as follows: LogLevel VERBOSE - OR -
      LogLevel INFO Note: First occurrence of an option takes precedence, Match set
      statements withstanding. If Include locations are enabled, used, and order of
      precedence is understood in your environment, the entry may be created in a
      file in Include location. Default Value: LogLevel INFO References: 1.
      https://www.ssh.com/ssh/sshd_config/ 2. NIST SP 800-53 Rev. 5: AU-3, AU-12,
      SI-5
    compliance:
      - cis_suse_15_v2_0_1_5_1_15

  - rule_id: suse.cis.5.sshd_maxstartups_is_configured
    title: "Ensure sshd MaxStartups is configured"
    severity: high
    automation_type: automated
    cis_control: '5.1.17'
    cis_section: '5'
    profile_applicability: "Level 1"
    scope: suse.section_5.sshd_maxstartups_is_configured
    assertion:
      field: row_count
      operator: lte
      expected: "true"
    remediation: >
      Edit the /etc/ssh/sshd_config file to set the MaxStartups parameter to
      10:30:60 or more restrictive above any Include entries as follows: MaxStartups
      10:30:60 Note: First occurrence of a option takes precedence. If Include
      locations are enabled, used, and order of precedence is understood in your
      environment, the entry may be created in a file in Include location. Default
      Value: MaxStartups 10:30:100 References: 1. SSHD_CONFIG(5) 2. NIST SP 800-53
      Rev. 5: CM-1, CM-2, CM-6, CM-7, IA-5
    compliance:
      - cis_suse_15_v2_0_1_5_1_17

  - rule_id: suse.cis.5.sshd_maxsessions_is_configured
    title: "Ensure sshd MaxSessions is configured"
    severity: high
    automation_type: automated
    cis_control: '5.1.18'
    cis_section: '5'
    profile_applicability: "Level 1"
    scope: suse.section_5.sshd_maxsessions_is_configured
    assertion:
      field: row_count
      operator: lte
      expected: "true"
    remediation: >
      Edit the /etc/ssh/sshd_config file to set the MaxSessions parameter to 10 or
      less above any Include and Match entries as follows: MaxSessions 10 Note:
      First occurrence of an option takes precedence, Match set statements
      withstanding. If Include locations are enabled, used, and order of precedence
      is understood in your environment, the entry may be created in a file in
      Include location. Default Value: MaxSessions 10 References: 1. SSHD_CONFIG(5)
      2. NIST SP 800-53 Rev. 5: CM-1, CM-2, CM-6, CM-7, IA-5
    compliance:
      - cis_suse_15_v2_0_1_5_1_18

  - rule_id: suse.cis.5.sshd_permituserenvironment_is_disabled
    title: "Ensure sshd PermitUserEnvironment is disabled"
