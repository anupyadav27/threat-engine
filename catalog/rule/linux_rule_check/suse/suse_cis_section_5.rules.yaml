      -a --cracklib-ucredit=<value> # pam-config -a --cracklib-lcredit=<value> #
      pam-config -a --cracklib-ocredit=<value> Default Value: minclass = 0 dcredit =
      0 ucredit = 0 ocredit = 0 lcredit = 0 References: 1. pam_pwquality(8) 2.
