    scope: suse.section_5.sshd_usepam_is_enabled
    assertion:
      field: row_count
      operator: equals
      expected: "yes"
    remediation: >
      Edit the /etc/ssh/sshd_config file to set the UsePAM parameter to yes above
      any Include entries as follows: UsePAM yes Note: First occurrence of an option
      takes precedence. If Include locations are enabled, used, and order of
      precedence is understood in your environment, the entry may be created in a
      file in Include location. Default Value: UsePAM yes References: 1.
      SSHD_CONFIG(5) 2. NIST SP 800-53 Rev. 5: CM-1, CM-2, CM-6, CM-7, IA-5 3.
      SSHD(8)
    compliance:
