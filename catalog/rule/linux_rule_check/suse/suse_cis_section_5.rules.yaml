tech_type: suse
category: linux
cis_benchmark: CIS SUSE Linux 15 v2.0.1
cis_section: '5'

rules:

  - rule_id: suse.cis.5.sshd_ciphers_are_configured
    title: "Ensure sshd Ciphers are configured"
    severity: high
    automation_type: automated
    cis_control: '5.1.4'
    cis_section: '5'
    profile_applicability: "Level 1"
    scope: suse.section_5.sshd_ciphers_are_configured
    assertion:
      field: value
      operator: exists
      expected: "no"
    remediation: >
      Edit the /etc/ssh/sshd_config file and add/modify the Ciphers line to contain
      a comma separated list of the site unapproved (weak) Ciphers preceded with a -
      above any Include entries: Example: Ciphers -3des-
      cbc,aes128-cbc,aes192-cbc,aes256-cbc,chacha20- poly1305@openssh.com - IF -
      CVE-2023-48795 has been addressed, and it meets local site policy, chacha20-
      poly1305@openssh.com may be removed from the list of excluded ciphers. Note:
      First occurrence of an option takes precedence. If Include locations are
      enabled, used, and order of precedence is understood in your environment, the
      entry may be created in a file in Include location. Default Value: Ciphers
      chacha20-poly1305@openssh.com,aes128-ctr,aes192-ctr,aes256-ctr,aes128-
      gcm@openssh.com,aes256-gcm@openssh.com References: 1.
      https://nvd.nist.gov/vuln/detail/CVE-2023-48795 2.
      https://nvd.nist.gov/vuln/detail/CVE-2019-1543 3.
      https://nvd.nist.gov/vuln/detail/CVE-2016-2183 4.
      https://nvd.nist.gov/vuln/detail/CVE-2008-5161 5.
      https://www.openssh.com/txt/cbc.adv 6. https://www.openssh.com/txt/cbc.adv 7.
      SSHD_CONFIG(5) 8. NIST SP 800-53 Rev. 5: SC-8
    compliance:
      - cis_suse_15_v2_0_1_5_1_4

  - rule_id: suse.cis.5.sshd_kexalgorithms_is_configured
    title: "Ensure sshd KexAlgorithms is configured"
    severity: high
    automation_type: automated
    cis_control: '5.1.5'
    cis_section: '5'
    profile_applicability: "Level 1"
    scope: suse.section_5.sshd_kexalgorithms_is_configured
    assertion:
      field: value
      operator: exists
      expected: "true"
    remediation: >
      Edit the /etc/ssh/sshd_config file and add/modify the KexAlgorithms line to
      contain a comma separated list of the site unapproved (weak) KexAlgorithms
      preceded with a - above any Include entries: Example: KexAlgorithms -diffie-
      hellman-group1-sha1,diffie-hellman-group14-sha1,diffie- hellman-group-
      exchange-sha1 Note: First occurrence of an option takes precedence. If Include
      locations are enabled, used, and order of precedence is understood in your
      environment, the entry may be created in a file in Include location. Default
      Value: KexAlgorithms sntrup761x25519-sha512@openssh.com,curve25519-
      sha256,curve25519-sha256@libssh.org,ecdh-sha2-nistp256,ecdh-
      sha2-nistp384,ecdh- sha2-nistp521,diffie-hellman-group-exchange-sha256,diffie-
      hellman-group16- sha512,diffie-hellman-group18-sha512,diffie-hellman-
      group14-sha256 References: 1. https://ubuntu.com/server/docs/openssh-crypto-
      configuration 2. NIST SP 800-53 Rev. 5: SC-8 3. SSHD(8) 4. SSHD_CONFIG(5)
      Additional Information: The supported algorithms are: curve25519-sha256
      curve25519-sha256@libssh.org diffie-hellman-group1-sha1 diffie-hellman-
      group14-sha1 diffie-hellman-group14-sha256 diffie-hellman-group16-sha512
      diffie-hellman-group18-sha512 diffie-hellman-group-exchange-sha1 diffie-
      hellman-group-exchange-sha256 ecdh-sha2-nistp256 ecdh-sha2-nistp384 ecdh-
      sha2-nistp521 sntrup4591761x25519-sha512@tinyssh.org
    compliance:
      - cis_suse_15_v2_0_1_5_1_5

  - rule_id: suse.cis.5.sshd_macs_are_configured
    title: "Ensure sshd MACs are configured"
    severity: high
    automation_type: automated
    cis_control: '5.1.6'
    cis_section: '5'
    profile_applicability: "Level 1"
    scope: suse.section_5.sshd_macs_are_configured
    assertion:
      field: value
      operator: exists
      expected: "true"
    remediation: >
      Edit the /etc/ssh/sshd_config file and add/modify the MACs line to contain a
      comma separated list of the site unapproved (weak) MACs preceded with a -
      above any Include entries: Example: MACs -hmac-md5,hmac-md5-96,hmac-
      ripemd160,hmac-sha1-96,umac- 64@openssh.com,hmac-md5-etm@openssh.com,hmac-
      md5-96-etm@openssh.com,hmac- ripemd160-etm@openssh.com,hmac-
      sha1-96-etm@openssh.com,umac-64- etm@openssh.com - IF - CVE-2023-48795 has not
      been reviewed and addressed, the following etm MACs should be added to the
      exclude list: hmac-sha1-etm@openssh.com,hmac-sha2-256- etm@openssh.com,hmac-
      sha2-512-etm@openssh.com Note: First occurrence of an option takes precedence.
      If Include locations are enabled, used, and order of precedence is understood
      in your environment, the entry may be created in a file in Include location.
      Default Value: MACs umac-64-etm@openssh.com,umac-128-etm@openssh.com,hmac-
      sha2-256- etm@openssh.com,hmac-sha2-512-etm@openssh.com,hmac-sha1-
      etm@openssh.com,umac-64@openssh.com,umac-128@openssh.com,hmac-sha2- 256,hmac-
      sha2-512,hmac-sha1 References: 1.
      https://nvd.nist.gov/vuln/detail/CVE-2023-48795 2. More information on SSH
      downgrade attacks can be found here: http://www.mitls.org/pages/attacks/SLOTH
      3. SSHD_CONFIG(5) 4. NIST SP 800-53 Rev. 5: CM-1, CM-2, CM-6, CM-7, IA-5
    compliance:
      - cis_suse_15_v2_0_1_5_1_6

  - rule_id: suse.cis.5.sshd_banner_is_configured
    title: "Ensure sshd Banner is configured"
    severity: high
    automation_type: automated
    cis_control: '5.1.8'
    cis_section: '5'
    profile_applicability: "Level 1"
    scope: suse.section_5.sshd_banner_is_configured
    assertion:
      field: value
      operator: exists
      expected: "no"
    remediation: >
      Edit the /etc/ssh/sshd_config file to set the Banner parameter above any
      Include and Match entries as follows: Banner /etc/issue.net Note: First
      occurrence of a option takes precedence, Match set statements withstanding. If
      Include locations are enabled, used, and order of precedence is understood in
      your environment, the entry may be created in a file in Include location. Edit
      the file being called by the Banner argument with the appropriate contents
      according to your site policy, remove any instances of \m , \r , \s , \v or
      references to the OS platform Example: # printf '%s\n' 'Authorized users only.
      All activity may be monitored and reported.' > '$(sshd -T | awk '$1 ==
      'banner' {print $2}')' References: 1. NIST SP 800-53 Rev. 5: CM-1, CM-2, CM-6,
      CM-7, IA-5
    compliance:
      - cis_suse_15_v2_0_1_5_1_8

  - rule_id: suse.cis.5.sshd_clientaliveinterval_and_clientalivecountmax
    title: "Ensure sshd ClientAliveInterval and ClientAliveCountMax are configured"
    severity: high
    automation_type: automated
    cis_control: '5.1.9'
    cis_section: '5'
    profile_applicability: "Level 1"
    scope: suse.section_5.sshd_clientaliveinterval_and_clientalivecountmax
    assertion:
      field: row_count
      operator: exists
      expected: "true"
    remediation: >
      Edit the /etc/ssh/sshd_config file to set the ClientAliveInterval and
      ClientAliveCountMax parameters above any Include and Match entries according
      to site policy. Example: ClientAliveInterval 15 ClientAliveCountMax 3 Note:
      First occurrence of a option takes precedence, Match set statements
      withstanding. If Include locations are enabled, used, and order of precedence
      is understood in your environment, the entry may be created in a file in
      Include location. Default Value: ClientAliveInterval 0 ClientAliveCountMax 3
      References: 1. SSHD_CONFIG(5) 2. SSHD(8) 3. NIST SP 800-53 Rev. 5: CM-1, CM-2,
      CM-6, CM-7, IA-5 Additional Information:
      https://bugzilla.redhat.com/show_bug.cgi?id=1873547
      https://github.com/openssh/openssh-portable/blob/V_8_9/serverloop.c#L137
    compliance:
      - cis_suse_15_v2_0_1_5_1_9

  - rule_id: suse.cis.5.sshd_disableforwarding_is_enabled
    title: "Ensure sshd DisableForwarding is enabled"
    severity: high
    automation_type: automated
    cis_control: '5.1.10'
    cis_section: '5'
    profile_applicability: "Level 1 + Level 2"
    scope: suse.section_5.sshd_disableforwarding_is_enabled
    assertion:
      field: enabled
      operator: equals
      expected: "yes"
    remediation: >
      Edit the /etc/ssh/sshd_config file to set the DisableForwarding parameter to
      yes above any Include entry as follows: DisableForwarding yes Note: First
      occurrence of a option takes precedence. If Include locations are enabled,
      used, and order of precedence is understood in your environment, the entry may
      be created in a file in Include location. References: 1. sshd_config(5) 2.
      SSHD(8) 3. NIST SP 800-53 Rev. 5: CM-7
    compliance:
      - cis_suse_15_v2_0_1_5_1_10

