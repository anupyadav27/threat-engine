    remediation: >
      Edit the /etc/ssh/sshd_config file to set the PermitUserEnvironment parameter
      to no above any Include entries as follows: PermitUserEnvironment no Note:
      First occurrence of an option takes precedence. If Include locations are
      enabled, used, and order of precedence is understood in your environment, the
      entry may be created in a file in Include location. Default Value:
      PermitUserEnvironment no References: 1. SSHD_CONFIG(5) 2. NIST SP 800-53 Rev.
      5: CM-1,CM-2, CM-6, CM-7, IA-5 3. SSHD(8)
    compliance:
