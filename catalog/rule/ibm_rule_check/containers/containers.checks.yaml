# Auto-generated: check rules for IBM containers from test-rulecheck_python_code
version: '1.0'
provider: ibm
service: containers
checks:
- rule_id: ibm.containers.cluster.latest_kubernetes_version
  for_each: ibm.containers.clusters.list
  severity: MEDIUM
  conditions:
    var: item.masterKubeVersion
    op: equals
    value: item.latestKubeVersion
- rule_id: ibm.containers.cluster.logging_configured
  for_each: ibm.containers.cluster.list
  severity: MEDIUM
  conditions:
    var: item.logging
    op: exists
- rule_id: ibm.containers.cluster.private_endpoint_enabled
  for_each: ibm.containers.list_clusters
  severity: HIGH
  conditions:
    var: item.PrivateServiceEndpointEnabled
    op: is_true
- rule_id: ibm.containers.cluster.public_endpoint_disabled
  for_each: ibm.containers.clusters.list
  severity: HIGH
  conditions:
    var: item.publicServiceEndpointEnabled
    op: is_false
