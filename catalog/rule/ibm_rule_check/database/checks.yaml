version: '1.0'
provider: ibm
service: database
checks:
- rule_id: ibm.cloudant.database.non_del_doc_purge_configured
  for_each: ibm.cloudant.list-databases
  severity: MEDIUM
  conditions:
    var: item.enabled
    op: is_true
- rule_id: ibm.cloudant.instance.https_enforcement_configured
  for_each: ibm.cloudant.list-databases
  severity: MEDIUM
  conditions:
    var: item.enabled
    op: is_true
