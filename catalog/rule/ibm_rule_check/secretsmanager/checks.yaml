version: '1.0'
provider: ibm
service: secretsmanager
checks:
- rule_id: ibm.secretsmanager.secret.expiration_set
  for_each: ibm.secrets_manager.list-secrets
  severity: MEDIUM
  conditions:
    var: item.enabled
    op: is_true
- rule_id: ibm.secretsmanager.secret.permissions_configured
  for_each: ibm.secrets_manager.list-secrets
  severity: MEDIUM
  conditions:
    var: item.enabled
    op: is_true
- rule_id: ibm.secretsmanager.secret.rotation_enabled
  for_each: ibm.secrets_manager.list-secrets
  severity: MEDIUM
  conditions:
    var: item.enabled
    op: is_true
