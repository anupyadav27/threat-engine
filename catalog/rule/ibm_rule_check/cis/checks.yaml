version: '1.0'
provider: ibm
service: cis
checks:
- rule_id: ibm.cis.ddos.protection_proxied_status_check
  for_each: ibm.internet_services.list-services
  severity: MEDIUM
  conditions:
    var: item.enabled
    op: is_true
- rule_id: ibm.cis.waf.enabled_status_check
  for_each: ibm.internet_services.list-services
  severity: MEDIUM
  conditions:
    var: item.enabled
    op: is_true
