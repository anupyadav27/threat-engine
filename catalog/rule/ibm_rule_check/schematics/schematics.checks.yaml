# Auto-generated: check rules for IBM schematics from test-rulecheck_python_code
version: '1.0'
provider: ibm
service: schematics
checks:
- rule_id: ibm.schematics.workspace.compliance_check_enabled
  for_each: ibm.schematics.get-all-workspace-inputs
  severity: MEDIUM
  conditions:
    var: item.status
    op: equals
    value: ACTIVE
- rule_id: ibm.schematics.workspace.no_sensitive_variables_in_state
  for_each: ibm.schematics.get-all-workspace-inputs
  severity: HIGH
  conditions:
    var: item.tfvars
    op: not_contains
    value: password
- rule_id: ibm.schematics.workspace.private_git_source
  for_each: ibm.schematics.get-all-workspace-inputs
  severity: MEDIUM
  conditions:
    var: item.template_repo.private
    op: is_true
- rule_id: ibm.schematics.workspace.terraform_version_pinned
  for_each: ibm.schematics.get-all-workspace-inputs
  severity: LOW
  conditions:
    var: item.terraform_version
    op: exists
