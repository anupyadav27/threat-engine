# Auto-generated: check rules for IBM databases from test-rulecheck_python_code
version: '1.0'
provider: ibm
service: databases
checks:
- rule_id: ibm.databases.backup.encrypted
  for_each: ibm.databases.list_instances
  severity: HIGH
  conditions:
    var: item.BackupEncryptionEnabled
    op: is_true
- rule_id: ibm.databases.backup.pitr_enabled
  for_each: ibm.databases.list_instances
  severity: MEDIUM
  conditions:
    var: item.PITR.Enabled
    op: is_true
- rule_id: ibm.databases.deployment.encryption_at_rest_enabled
  for_each: ibm.databases.list_deployments
  severity: HIGH
  conditions:
    var: item.EncryptionAtRest
    op: is_true
- rule_id: ibm.databases.deployment.high_availability_configured
  for_each: ibm.databases.deployment.list
  severity: MEDIUM
  conditions:
    var: item.high_availability
    op: is_true
- rule_id: ibm.databases.deployment.ip_allowlist_configured
  for_each: ibm.databases.deployment.list
  severity: MEDIUM
  conditions:
    var: item.ip_allowlist
    op: not_empty
- rule_id: ibm.databases.deployment.private_endpoint_only
  for_each: ibm.databases.list_deployments
  severity: HIGH
  conditions:
    var: item.PrivateEndpointEnabled
    op: is_true
- rule_id: ibm.databases.deployment.tls_12_minimum
  for_each: ibm.databases.list_deployments
  severity: HIGH
  conditions:
    var: item.TLSVersion
    op: equals
    value: TLSv1.2
