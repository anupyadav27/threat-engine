version: '1.0'
provider: ibm
service: blockstorage
checks:
- rule_id: ibm.blockstorage.volume.encryption_at_rest_configured
  for_each: ibm.block_storage.list-volumes
  severity: MEDIUM
  conditions:
    all:
    - var: item.enabled
      op: not_empty
      value: null
    - var: item.kms_key_id
      op: exists
      value: null
