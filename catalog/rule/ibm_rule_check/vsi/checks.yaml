version: '1.0'
provider: ibm
service: vsi
checks:
- rule_id: ibm.vsi.backup.enabled
  for_each: ibm.vpc.list-backup-policies
  severity: MEDIUM
  conditions:
    var: item.status
    op: equals
    value: Active
- rule_id: ibm.vsi.block_storage.public_snapshot_enabled
  for_each: ibm.vpc.list-public-address-ranges
  severity: MEDIUM
  conditions:
    var: item.status
    op: equals
    value: Active
- rule_id: ibm.vsi.block_storage.snapshot_account_block_public_access_restricted
  for_each: ibm.vpc.list-public-address-ranges
  severity: MEDIUM
  conditions:
    var: item.status
    op: equals
    value: Active
- rule_id: ibm.vsi.block_storage.snapshots_encrypted
  for_each: ibm.vpc.list-snapshots
  severity: MEDIUM
  conditions:
    all:
    - var: item.status
      op: not_empty
      value: null
    - var: item.kms_key_id
      op: exists
      value: null
- rule_id: ibm.vsi.block_storage.volume_protected_by_backup_plan_configured
  for_each: ibm.vpc.list-backup-policy-plans
  severity: MEDIUM
  conditions:
    var: item.status
    op: equals
    value: Active
- rule_id: ibm.vsi.block_storage.volume_snapshots_exists
  for_each: ibm.vpc.list-snapshots
  severity: MEDIUM
  conditions:
    var: item.status
    op: equals
    value: Active
