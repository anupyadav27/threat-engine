version: '1.0'
provider: ibm
service: direct_link
checks:
- rule_id: ibm.direct_link.connection.redundancy_configured
  for_each: ibm.direct_link.list-connections
  severity: MEDIUM
  conditions:
    var: item.enabled
    op: is_true
- rule_id: ibm.direct_link.virtual.interface_redundancy_configured
  for_each: ibm.direct_link.list-connections
  severity: MEDIUM
  conditions:
    var: item.enabled
    op: is_true
