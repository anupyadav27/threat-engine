version: '1.0'
provider: ibm
service: threat
checks:
- rule_id: ibm.security_advisor.iks_audit_log_enabled
  for_each: ibm.security_advisor.list-findings
  severity: MEDIUM
  conditions:
    var: item.enabled
    op: is_true
- rule_id: ibm.security_advisor.enabled
  for_each: ibm.security_advisor.list-findings
  severity: MEDIUM
  conditions:
    var: item.enabled
    op: is_true
- rule_id: ibm.security_advisor.notification_channel.is_configured
  for_each: ibm.security_advisor.list-findings
  severity: MEDIUM
  conditions:
    var: item.enabled
    op: is_true
