version: '1.0'
provider: ibm
service: network
checks:
- rule_id: ibm.is.instance.backup_policy_configured
  for_each: ibm.vpc.get-instance-group-manager-policy
  severity: MEDIUM
  conditions:
    var: item.status
    op: equals
    value: Active
- rule_id: ibm.is.instance.baseline_image_configured
  for_each: ibm.vpc.list-image-instance-profiles
  severity: MEDIUM
  conditions:
    var: item.status
    op: equals
    value: Active
- rule_id: ibm.is.instance.disaster_recovery_enabled
  for_each: ibm.vpc.list-instance-groups
  severity: MEDIUM
  conditions:
    var: item.status
    op: equals
    value: Active
- rule_id: ibm.is.instance.image_scan_enabled
  for_each: ibm.vpc.list-image-instance-profiles
  severity: MEDIUM
  conditions:
    var: item.status
    op: equals
    value: Active
- rule_id: ibm.is.instance.inventory_enabled
  for_each: ibm.vpc.list-instance-groups
  severity: MEDIUM
  conditions:
    var: item.status
    op: equals
    value: Active
- rule_id: ibm.is.instance.maintenance_policy_configured
  for_each: ibm.vpc.get-instance-group-manager-policy
  severity: MEDIUM
  conditions:
    var: item.status
    op: equals
    value: Active
- rule_id: ibm.is.security_group.no_public_ingress_enforced
  for_each: ibm.vpc.list-security-group-targets
  severity: MEDIUM
  conditions:
    var: item.status
    op: equals
    value: Active
- rule_id: ibm.is.vpc.load_balancer_pool_session_persistence_configured
  for_each: ibm.vpc.list-load-balancer-pool-members
  severity: MEDIUM
  conditions:
    var: item.status
    op: equals
    value: Active
- rule_id: ibm.is.vpc.routing_table_route_action_configured
  for_each: ibm.vpc.list-vpc-routing-table-routes
  severity: MEDIUM
  conditions:
    var: item.status
    op: equals
    value: Active
- rule_id: ibm.is.vpc.security_group_rule_direction_configured
  for_each: ibm.vpc.list-security-group-rules
  severity: MEDIUM
  conditions:
    var: item.status
    op: equals
    value: Active
- rule_id: ibm.is.vpc.vpn_gateway_ha_configured
  for_each: ibm.vpc.list-endpoint-gateways
  severity: MEDIUM
  conditions:
    var: item.status
    op: equals
    value: Active
- rule_id: ibm.network.bastion.host_exists
  for_each: ibm.direct_link.list-connections
  severity: MEDIUM
  conditions:
    var: item.enabled
    op: is_true
- rule_id: ibm.network.flow.log_more_than_90_days_configured
  for_each: ibm.direct_link.list-connections
  severity: MEDIUM
  conditions:
    var: item.enabled
    op: is_true
- rule_id: ibm.network.vpn_gateway.policy_configured
  for_each: ibm.direct_link.list-connections
  severity: MEDIUM
  conditions:
    var: item.enabled
    op: is_true
- rule_id: ibm.vpc.block_storage_snapshot.encrypted
  for_each: ibm.vpc.get-load-balancer-listener
  severity: MEDIUM
  conditions:
    all:
    - var: item.status
      op: not_empty
      value: null
    - var: item.kms_key_id
      op: exists
      value: null
- rule_id: ibm.vpc.block_storage.volume_protected_by_backup_plan_configured
  for_each: ibm.vpc.list-backup-policy-plans
  severity: MEDIUM
  conditions:
    var: item.status
    op: equals
    value: Active
- rule_id: ibm.vpc.endpoint.for_vsi_enabled
  for_each: ibm.vpc.list-endpoint-gateways
  severity: MEDIUM
  conditions:
    var: item.status
    op: equals
    value: Active
- rule_id: ibm.vpc.endpoint.multi_az_enabled
  for_each: ibm.vpc.list-endpoint-gateways
  severity: MEDIUM
  conditions:
    var: item.status
    op: equals
    value: Active
- rule_id: ibm.vpc.endpoint.services_allowed_principals_trust_boundaries_configured
  for_each: ibm.vpc.list-endpoint-gateways
  severity: MEDIUM
  conditions:
    var: item.status
    op: equals
    value: Active
- rule_id: ibm.vpc.image.baseline_approved_enforced
  for_each: ibm.vpc.list-images
  severity: MEDIUM
  conditions:
    var: item.status
    op: equals
    value: Active
- rule_id: ibm.vpc.instance.boot_volume_delete_volume_on_instance_delete_configured
  for_each: ibm.vpc.list-instance-volume-attachments
  severity: MEDIUM
  conditions:
    var: item.status
    op: equals
    value: Active
- rule_id: ibm.vpc.instance.compliance_managed_configured
  for_each: ibm.vpc.list-instance-groups
  severity: MEDIUM
  conditions:
    var: item.status
    op: equals
    value: Active
- rule_id: ibm.vpc.instance.older_than_specific_days_configured
  for_each: ibm.vpc.list-instance-groups
  severity: MEDIUM
  conditions:
    var: item.status
    op: equals
    value: Active
- rule_id: ibm.vpc.instance.required_tags_configured
  for_each: ibm.vpc.list-instance-groups
  severity: MEDIUM
  conditions:
    var: item.tags
    op: is_true
- rule_id: ibm.vpc.instance.trusted_image_configured
  for_each: ibm.vpc.list-image-instance-profiles
  severity: MEDIUM
  conditions:
    var: item.status
    op: equals
    value: Active
- rule_id: ibm.vpc.instance.trusted_profile_attachment_configured
  for_each: ibm.vpc.list-instance-profiles
  severity: MEDIUM
  conditions:
    var: item.status
    op: equals
    value: Active
- rule_id: ibm.vpc.instance.vulnerability_scanning_enabled
  for_each: ibm.vpc.list-instance-groups
  severity: MEDIUM
  conditions:
    var: item.status
    op: equals
    value: Active
- rule_id: ibm.vpc.loadbalancers.tls_listeners_configured
  for_each: ibm.vpc.list-load-balancers
  severity: MEDIUM
  conditions:
    var: item.status
    op: equals
    value: Active
- rule_id: ibm.vpc.network_acl.configured
  for_each: ibm.vpc.list-network-acls
  severity: MEDIUM
  conditions:
    var: item.status
    op: equals
    value: Active
- rule_id: ibm.vpc.networkacl.allow_ingress_any_port_restricted
  for_each: ibm.vpc.list-network-acls
  severity: MEDIUM
  conditions:
    var: item.status
    op: equals
    value: Active
- rule_id: ibm.vpc.networkacl.allow_ingress_tcp_port_22_restricted
  for_each: ibm.vpc.list-network-acls
  severity: MEDIUM
  conditions:
    var: item.status
    op: equals
    value: Active
- rule_id: ibm.vpc.networkacl.allow_ingress_tcp_port_3389_restricted
  for_each: ibm.vpc.list-network-acls
  severity: MEDIUM
  conditions:
    var: item.status
    op: equals
    value: Active
- rule_id: ibm.vpc.peering.routing_tables_with_least_privilege_enforced
  for_each: ibm.vpc.list-vpc-routing-tables
  severity: MEDIUM
  conditions:
    var: item.status
    op: equals
    value: Active
- rule_id: ibm.vpc.security_group.configured
  for_each: ibm.vpc.list-security-group-targets
  severity: MEDIUM
  conditions:
    var: item.status
    op: equals
    value: Active
- rule_id: ibm.vpc.security_group.deny_all_inbound_restricted
  for_each: ibm.vpc.list-security-group-targets
  severity: MEDIUM
  conditions:
    var: item.status
    op: equals
    value: Active
- rule_id: ibm.vpc.security_group.flow_logs_enabled
  for_each: ibm.vpc.list-security-group-targets
  severity: MEDIUM
  conditions:
    var: item.status
    op: equals
    value: Active
- rule_id: ibm.vpc.security_group.ingress_restricted
  for_each: ibm.vpc.list-security-group-targets
  severity: MEDIUM
  conditions:
    var: item.status
    op: equals
    value: Active
- rule_id: ibm.vpc.subnet.different_az_configured
  for_each: ibm.vpc.list-subnets
  severity: MEDIUM
  conditions:
    var: item.status
    op: equals
    value: Active
- rule_id: ibm.vpc.vpn.connection_tunnels_up_configured
  for_each: ibm.vpc.list-vpn-gateway-connections
  severity: MEDIUM
  conditions:
    var: item.status
    op: equals
    value: Active
- rule_id: ibm.vpc.vpn.ike_policy_configured
  for_each: ibm.vpc.list-vpn-gateways
  severity: MEDIUM
  conditions:
    var: item.status
    op: equals
    value: Active
- rule_id: ibm.vpc.vsi.maintenance_behavior_configured
  for_each: ibm.vpc.get-load-balancer-listener
  severity: MEDIUM
  conditions:
    var: item.status
    op: equals
    value: Active
- rule_id: ibm.vpc.vsi.patch_management_configured
  for_each: ibm.vpc.get-load-balancer-listener
  severity: MEDIUM
  conditions:
    var: item.status
    op: equals
    value: Active
- rule_id: ibm.watson.studio.notebook_instance_encryption_enabled
  for_each: ibm.watson.list-workspaces
  severity: MEDIUM
  conditions:
    var: item.status
    op: equals
    value: Active
- rule_id: ibm.watson.studio.notebook_instance_without_direct_internet_access_configured
  for_each: ibm.watson.list-workspaces
  severity: MEDIUM
  conditions:
    var: item.status
    op: equals
    value: Active
