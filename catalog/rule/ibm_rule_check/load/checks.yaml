version: '1.0'
provider: ibm
service: load
checks:
- rule_id: ibm.load.balancer.deletion_protection_enabled
  for_each: ibm.load_balancer.list-load-balancers
  severity: MEDIUM
  conditions:
    var: item.enabled
    op: is_true
- rule_id: ibm.load.balancer.desync_mitigation_mode_configured
  for_each: ibm.load_balancer.list-load-balancers
  severity: MEDIUM
  conditions:
    var: item.enabled
    op: is_true
- rule_id: ibm.load.balancer.waf_acl_attached_configured
  for_each: ibm.load_balancer.list-load-balancers
  severity: MEDIUM
  conditions:
    var: item.enabled
    op: is_true
