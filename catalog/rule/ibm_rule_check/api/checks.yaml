version: '1.0'
provider: ibm
service: api
checks:
- rule_id: ibm.api.connect.authorization_enabled
  for_each: ibm.api_gateway.list-apis
  severity: MEDIUM
  conditions:
    var: item.enabled
    op: is_true
- rule_id: ibm.api.connect.restapi_client_certificate_enabled
  for_each: ibm.api_gateway.list-apis
  severity: MEDIUM
  conditions:
    var: item.enabled
    op: is_true
- rule_id: ibm.api.connect.restapi_logging_enabled
  for_each: ibm.api_gateway.list-apis
  severity: MEDIUM
  conditions:
    var: item.enabled
    op: is_true
- rule_id: ibm.api.connect.restapi_tracing_enabled
  for_each: ibm.api_gateway.list-apis
  severity: MEDIUM
  conditions:
    var: item.enabled
    op: is_true
- rule_id: ibm.api.connect.restapi_waf_acl_attached_configured
  for_each: ibm.api_gateway.list-apis
  severity: MEDIUM
  conditions:
    var: item.enabled
    op: is_true
