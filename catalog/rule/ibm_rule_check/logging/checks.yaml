version: '1.0'
provider: ibm
service: logging
checks:
- rule_id: ibm.activity_tracker.alert_configuration_verification_enabled
  for_each: ibm.activity_tracker.list-events
  severity: MEDIUM
  conditions:
    var: item.enabled
    op: is_true
- rule_id: ibm.activity_tracker.monitoring_api_log_enabled
  for_each: ibm.activity_tracker.list-events
  severity: MEDIUM
  conditions:
    var: item.enabled
    op: is_true
- rule_id: ibm.activity_tracker.cos_dataevents_read_enabled
  for_each: ibm.activity_tracker.list-events
  severity: MEDIUM
  conditions:
    var: item.enabled
    op: is_true
- rule_id: ibm.activity_tracker.data_encryption_at_rest_configured
  for_each: ibm.activity_tracker.list-events
  severity: MEDIUM
  conditions:
    all:
    - var: item.enabled
      op: not_empty
      value: null
    - var: item.kms_key_id
      op: exists
      value: null
- rule_id: ibm.activity_tracker.kms_encryption_enabled
  for_each: ibm.activity_tracker.list-events
  severity: MEDIUM
  conditions:
    all:
    - var: item.enabled
      op: not_empty
      value: null
    - var: item.kms_key_id
      op: exists
      value: null
- rule_id: ibm.activity_tracker.log_file_validation_enabled
  for_each: ibm.activity_tracker.list-events
  severity: MEDIUM
  conditions:
    var: item.enabled
    op: is_true
- rule_id: ibm.activity_tracker.logdna_archiving_enabled
  for_each: ibm.activity_tracker.list-events
  severity: MEDIUM
  conditions:
    var: item.enabled
    op: is_true
- rule_id: ibm.activity_tracker.login_ip_restriction_check
  for_each: ibm.activity_tracker.list-events
  severity: MEDIUM
  conditions:
    var: item.enabled
    op: is_true
- rule_id: ibm.activity_tracker.multi_region_enabled
  for_each: ibm.activity_tracker.list-events
  severity: MEDIUM
  conditions:
    var: item.enabled
    op: is_true
- rule_id: ibm.activity_tracker.cos_dataevents_write_enabled
  for_each: ibm.activity_tracker.list-events
  severity: MEDIUM
  conditions:
    var: item.enabled
    op: is_true
- rule_id: ibm.activity_tracker.threat_detection_enumeration_configured
  for_each: ibm.activity_tracker.list-events
  severity: MEDIUM
  conditions:
    var: item.enabled
    op: is_true
- rule_id: ibm.activity_tracker.threat_detection_llm_jacking_configured
  for_each: ibm.activity_tracker.list-events
  severity: MEDIUM
  conditions:
    var: item.enabled
    op: is_true
- rule_id: ibm.activity_tracker.configuration.enabled
  for_each: ibm.activity_tracker.list-events
  severity: MEDIUM
  conditions:
    var: item.enabled
    op: is_true
- rule_id: ibm.activity_tracker.event_routing.enabled
  for_each: ibm.activity_tracker.list-events
  severity: MEDIUM
  conditions:
    var: item.enabled
    op: is_true
- rule_id: ibm.activity_tracker.instance.status_configured
  for_each: ibm.activity_tracker.list-events
  severity: MEDIUM
  conditions:
    var: item.enabled
    op: is_true
- rule_id: ibm.activity_tracker.route.destination_and_filter_configured
  for_each: ibm.activity_tracker.list-events
  severity: MEDIUM
  conditions:
    var: item.enabled
    op: is_true
- rule_id: ibm.activity_tracker.route.encryption_enabled
  for_each: ibm.activity_tracker.list-events
  severity: MEDIUM
  conditions:
    all:
    - var: item.enabled
      op: not_empty
      value: null
    - var: item.kms_key_id
      op: exists
      value: null
- rule_id: ibm.activity_tracker.route.global_events_enabled
  for_each: ibm.activity_tracker.list-events
  severity: MEDIUM
  conditions:
    var: item.enabled
    op: is_true
- rule_id: ibm.activity_tracker.route.is_configured
  for_each: ibm.activity_tracker.list-events
  severity: MEDIUM
  conditions:
