version: '1.0'
provider: ibm
service: dns
checks:
- rule_id: ibm.dns.dnssec.disabled
  for_each: ibm.dns.list-records
  severity: MEDIUM
  conditions:
    var: item.enabled
    op: is_true
- rule_id: ibm.dns.rsasha1.in_use_to_zone_sign_in_dnssec_configured
  for_each: ibm.dns.list-zones
  severity: MEDIUM
  conditions:
    var: item.enabled
    op: is_true
