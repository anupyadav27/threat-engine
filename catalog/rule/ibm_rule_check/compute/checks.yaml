version: '1.0'
provider: ibm
service: compute
checks:
- rule_id: ibm.functions.app.access_keys_configured
  for_each: ibm.functions.list-namespaces
  severity: MEDIUM
  conditions:
    var: item.classic_type
    op: is_true
- rule_id: ibm.functions.app.identity_without_admin_privileges_configured
  for_each: ibm.functions.list-namespaces
  severity: MEDIUM
  conditions:
    var: item.classic_type
    op: is_true
- rule_id: ibm.functions.function.secrets_in_secrets_manager_configured
  for_each: ibm.functions.list-namespaces
  severity: MEDIUM
  conditions:
    var: item.classic_type
    op: is_true
- rule_id: ibm.functions.function.iam_role_least_privilege_enforced
  for_each: ibm.functions.list-namespaces
  severity: MEDIUM
  conditions:
    var: item.classic_type
    op: is_true
- rule_id: ibm.functions.function.not_publicly_accessible_enforced
  for_each: ibm.functions.list-namespaces
  severity: MEDIUM
  conditions:
    var: item.classic_type
    op: is_true
