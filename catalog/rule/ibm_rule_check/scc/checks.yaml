version: '1.0'
provider: ibm
service: scc
checks:
- rule_id: ibm.scc.collector.enabled
  for_each: ibm.security_compliance_center.list-assessments
  severity: MEDIUM
  conditions:
    var: item.enabled
    op: is_true
- rule_id: ibm.scc.recorder.all_regions_enabled
  for_each: ibm.security_compliance_center.list-assessments
  severity: MEDIUM
  conditions:
    var: item.enabled
    op: is_true
