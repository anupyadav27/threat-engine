    value: critical
- rule_id: ibm.scc.audit.high_finding
  for_each: ibm.scc.list_findings
  severity: HIGH
  conditions:
    var: item.severity
    op: not_equals
    value: high
- rule_id: ibm.scc.audit.policy_violation
  for_each: ibm.scc.list_audit_policies
  severity: HIGH
  conditions:
    var: item.Enabled
    op: is_true
- rule_id: ibm.scc.audit.posture_degradation
  for_each: ibm.scc.list_posture_management
  severity: HIGH
  conditions:
    var: item.posture_status
    op: equals
    value: compliant
