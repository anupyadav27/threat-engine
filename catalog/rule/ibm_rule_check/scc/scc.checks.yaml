# Auto-generated: check rules for IBM scc from test-rulecheck_python_code
version: '1.0'
provider: ibm
service: scc
checks:
- rule_id: ibm.scc.audit.compliance_violation
  for_each: ibm.scc.list_audit_compliance_checks
  severity: HIGH
  conditions:
    var: item.compliant
    op: is_true
- rule_id: ibm.scc.audit.config_drift
  for_each: ibm.scc.audit.list_configurations
