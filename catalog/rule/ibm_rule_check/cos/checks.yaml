version: '1.0'
provider: ibm
service: cos
checks:
- rule_id: ibm.cos.signed_url.allowed_protocols_https_only
  for_each: ibm.s3transfer.get-name
  severity: MEDIUM
  conditions:
    var: item.status
    op: equals
    value: Active
- rule_id: ibm.cos.bucket.anonymous_auth_disabled
  for_each: ibm.s3transfer.get-name
  severity: MEDIUM
  conditions:
    var: item.status
    op: equals
    value: Active
- rule_id: ibm.cos.bucket.cross_account_replication_disabled
  for_each: ibm.s3transfer.get-name
  severity: MEDIUM
  conditions:
    var: item.status
    op: equals
    value: Active
- rule_id: ibm.cos.bucket.kms_encryption_enabled
  for_each: ibm.s3transfer.get-name
  severity: MEDIUM
  conditions:
    all:
    - var: item.status
      op: not_empty
      value: null
    - var: item.kms_key_id
      op: exists
      value: null
- rule_id: ibm.cos.bucket.replication_enabled
  for_each: ibm.s3transfer.get-name
  severity: MEDIUM
  conditions:
    var: item.status
    op: equals
    value: Active
- rule_id: ibm.cos.bucket.server_access_logging_enabled
  for_each: ibm.s3transfer.get-name
  severity: MEDIUM
  conditions:
    var: item.status
    op: equals
    value: Active
- rule_id: ibm.cos.bucket.temporary_url_expiry_configured
  for_each: ibm.s3transfer.get-name
  severity: MEDIUM
  conditions:
    var: item.status
    op: equals
    value: Active
- rule_id: ibm.cos.bucket.tls_policy_configured
  for_each: ibm.s3transfer.get-name
  severity: MEDIUM
  conditions:
    var: item.status
    op: equals
    value: Active
- rule_id: ibm.cos.bucket.versioning_enabled
  for_each: ibm.s3transfer.get-name
  severity: MEDIUM
  conditions:
    var: item.status
    op: equals
    value: Active
- rule_id: ibm.cos.bucket.ibm_services_trusted_access_enabled
  for_each: ibm.s3transfer.get-name
  severity: MEDIUM
  conditions:
    var: item.status
    op: equals
    value: Active
