version: '1.0'
provider: ibm
service: cloud_databases
checks:
- rule_id: ibm.cloud_databases.instance.backup_policies_configured
  for_each: ibm.databases.list-backups
  severity: MEDIUM
  conditions:
    var: item.enabled
    op: is_true
- rule_id: ibm.cloud_databases.auto.minor_version_upgrade_configured
  for_each: ibm.databases.list-backups
  severity: MEDIUM
  conditions:
    var: item.enabled
    op: is_true
- rule_id: ibm.cloud_databases.cluster.copy_tags_to_snapshots_configured
  for_each: ibm.databases.list-backups
  severity: MEDIUM
  conditions:
    var: item.enabled
    op: is_true
- rule_id: ibm.cloud_databases.cluster.multi_az_enabled
  for_each: ibm.databases.list-backups
  severity: MEDIUM
  conditions:
    var: item.enabled
    op: is_true
- rule_id: ibm.cloud_databases.connection.credentials_in_secrets_manager_configured
  for_each: ibm.databases.list-backups
  severity: MEDIUM
  conditions:
    var: item.enabled
    op: is_true
- rule_id: ibm.cloud_databases.instance.enhanced_monitoring_enabled
  for_each: ibm.databases.list-backups
  severity: MEDIUM
  conditions:
    var: item.enabled
    op: is_true
- rule_id: ibm.cloud_databases.instance.iam_authentication_enabled
  for_each: ibm.databases.list-backups
  severity: MEDIUM
  conditions:
    var: item.enabled
    op: is_true
- rule_id: ibm.cloud_databases.instance.no_public_access_enforced
  for_each: ibm.databases.list-backups
  severity: MEDIUM
  conditions:
    var: item.enabled
    op: is_true
- rule_id: ibm.cloud_databases.postgresql.backup_policy_configured
  for_each: ibm.databases.list-backups
  severity: MEDIUM
  conditions:
    var: item.enabled
    op: is_true
- rule_id: ibm.cloud_databases.cluster.minor_version_upgrade_enabled
  for_each: ibm.databases.list-backups
  severity: MEDIUM
  conditions:
    var: item.enabled
    op: is_true
- rule_id: ibm.cloud_databases.instance.protected_by_backup_plan_configured
  for_each: ibm.databases.list-backups
  severity: MEDIUM
  conditions:
    var: item.enabled
    op: is_true
- rule_id: ibm.cloud_databases.instance.storage_encrypted
  for_each: ibm.databases.list-backups
  severity: MEDIUM
  conditions:
    all:
    - var: item.enabled
      op: not_empty
      value: null
    - var: item.kms_key_id
      op: exists
      value: null
- rule_id: ibm.cloud_databases.redis.cluster_backup_enabled
  for_each: ibm.databases.list-backups
  severity: MEDIUM
  conditions:
    var: item.enabled
    op: is_true
- rule_id: ibm.cloud_databases.service.domains_audit_logging_enabled
  for_each: ibm.databases.list-backups
  severity: MEDIUM
  conditions:
    var: item.enabled
    op: is_true
- rule_id: ibm.cloud_databases.service.domains_node_to_node_encryption_enabled
  for_each: ibm.databases.list-backups
  severity: MEDIUM
  conditions:
    all:
    - var: item.enabled
      op: not_empty
      value: null
    - var: item.kms_key_id
      op: exists
      value: null
- rule_id: ibm.cloud_databases.opensearch.service_domains_audit_logging_enabled
  for_each: ibm.databases.list-backups
  severity: MEDIUM
  conditions:
    var: item.enabled
    op: is_true
- rule_id: ibm.cloud_databases.opensearch.service_domains_fault_tolerant_data_nodes_configured
  for_each: ibm.databases.list-backups
  severity: MEDIUM
  conditions:
    var: item.enabled
    op: is_true
- rule_id: ibm.cloud_databases.opensearch.service_domains_fault_tolerant_master_nodes_configured
  for_each: ibm.databases.list-backups
  severity: MEDIUM
  conditions:
    var: item.enabled
    op: is_true
- rule_id: ibm.cloud_databases.opensearch.service_domains_internal_user_database_enabled
  for_each: ibm.databases.list-backups
  severity: MEDIUM
  conditions:
    var: item.enabled
    op: is_true
- rule_id: ibm.cloud_databases.opensearch.service_domains_node_to_node_encryption_enabled
  for_each: ibm.databases.list-backups
  severity: MEDIUM
  conditions:
    all:
    - var: item.enabled
      op: not_empty
      value: null
    - var: item.kms_key_id
      op: exists
      value: null
- rule_id: ibm.cloud_databases.opensearch.service_domains_not_publicly_accessible_restricted
  for_each: ibm.databases.list-backups
  severity: MEDIUM
  conditions:
    var: item.enabled
    op: is_true
