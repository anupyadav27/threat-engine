version: '1.0'
provider: ibm
service: monitoring
checks:
- rule_id: ibm.monitoring.alarm.configured
  for_each: ibm.monitoring.list-metrics
  severity: MEDIUM
  conditions:
    var: item.enabled
    op: is_true
- rule_id: ibm.monitoring.alert.action_enabled
  for_each: ibm.monitoring.list-metrics
  severity: MEDIUM
  conditions:
    var: item.enabled
    op: is_true
- rule_id: ibm.monitoring.log.group_kms_encryption_enabled
  for_each: ibm.monitoring.list-metrics
  severity: MEDIUM
  conditions:
    all:
    - var: item.enabled
      op: not_empty
      value: null
    - var: item.kms_key_id
      op: exists
      value: null
- rule_id: ibm.monitoring.log.group_no_secrets_in_logs_configured
  for_each: ibm.monitoring.list-metrics
  severity: MEDIUM
  conditions:
    var: item.enabled
    op: is_true
- rule_id: ibm.monitoring.log.group_not_publicly_accessible_restricted
  for_each: ibm.monitoring.list-metrics
  severity: MEDIUM
  conditions:
    var: item.enabled
    op: is_true
- rule_id: ibm.monitoring.log.metric_filter_authentication_failures_configured
  for_each: ibm.monitoring.list-metrics
  severity: MEDIUM
  conditions:
    var: item.enabled
    op: is_true
- rule_id: ibm.monitoring.log.metric_filter_root_usage_configured
  for_each: ibm.monitoring.list-metrics
  severity: MEDIUM
  conditions:
    var: item.enabled
    op: is_true
- rule_id: ibm.monitoring.log.metric_filter_unauthorized_api_calls_configured
  for_each: ibm.monitoring.list-metrics
  severity: MEDIUM
  conditions:
    var: item.enabled
    op: is_true
- rule_id: ibm.monitoring.notification_channel.configured
  for_each: ibm.monitoring.list-metrics
  severity: MEDIUM
  conditions:
    var: item.enabled
    op: is_true
