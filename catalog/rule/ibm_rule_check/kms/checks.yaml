version: '1.0'
provider: ibm
service: kms
checks:
- rule_id: ibm.kms.key.cmk_not_multi_region_enabled
  for_each: ibm.key_protect.list-keys
  severity: MEDIUM
  conditions:
    var: item.enabled
    op: is_true
- rule_id: ibm.kms.key.dual_auth_delete_configured
  for_each: ibm.key_protect.list-keys
  severity: MEDIUM
  conditions:
    var: item.enabled
    op: is_true
- rule_id: ibm.kms.key.key_manager_configured
  for_each: ibm.key_protect.list-keys
  severity: MEDIUM
  conditions:
    var: item.enabled
    op: is_true
- rule_id: ibm.kms.key.rotation_policy_configured
  for_each: ibm.key_protect.list-keys
  severity: MEDIUM
  conditions:
    var: item.enabled
    op: is_true
