version: '1.0'
provider: ibm
service: iks
checks:
- rule_id: ibm.iks.cluster.worker_pool_configured
  for_each: ibm.iks.list-workerpools
  severity: MEDIUM
  conditions:
    all:
    - var: item.worker_count
      op: greater_than
      value: 0
    - var: item.state
      op: not_equals
      value: error
