title: 'Identity: Managed Identity Assign'
scope: identity.activity_log
domain: configuration_and_change_management
subcategory: configuration
severity: high
service: identity
resource: activity_log
requirement: Managed Identity Assign
description: Managed identity assigned to resource — resource gains access to Azure
  services via identity permissions.
rationale: 'Adversaries add additional roles or permissions to adversary-controlled
  cloud accounts to maintain persistent access to a tenant. Attackers target Global
  Administrator, Owner, and Contributor roles — granting full control over subscription
  resources without deploying remote access tools. Detected via: IAM role attachment
  events, privilege grant events in Entra ID/Okta, and admin role assignment in Microsoft
  365.'
remediation: '1. Remove the unauthorized role assignment immediately.

  2. Review all role assignments for the affected principal.

  3. Enable just-in-time privileged access using PIM / AWS IAM Identity Center.

  4. Require approval workflows for Owner/Contributor/privileged role assignments.

  5. Alert on all role assignments at subscription or tenant scope.

  '
