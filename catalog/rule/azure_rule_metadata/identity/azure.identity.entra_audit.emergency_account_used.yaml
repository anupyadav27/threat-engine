resource: entra_audit
requirement: Emergency Account Used
description: Break-glass emergency account sign-in detected — highly privileged emergency
  account used outside of authorized incident.
rationale: Cloud account compromise enables access to all resources within the account's
  permission scope. Attackers leverage valid credentials to avoid detection and pivot
  across cloud services.
remediation: '1. Immediately suspend the compromised account and revoke active sessions.

  2. Reset credentials and enforce MFA enrollment.

  3. Review all API calls and resource accesses made by the account.

  4. Investigate sign-in logs for source IP and geolocation anomalies.

  5. Enable Microsoft Entra ID Protection / AWS GuardDuty credential anomaly alerts.

  '
