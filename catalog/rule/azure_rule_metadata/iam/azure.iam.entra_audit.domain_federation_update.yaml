resource: entra_audit
requirement: Domain Federation Update
description: Domain federation configuration updated — attacker may establish rogue
  identity provider for persistent access.
rationale: 'Adversaries patch, modify, or backdoor cloud authentication processes
  tied to on-premises identities (Golden SAML / hybrid identity attack). Organizations
  using Password Hash Sync, Pass-Through Authentication, or AD FS are at risk. A rogue
  identity provider can issue valid tokens for any user in the tenant without their
  credentials. Detected via: AD FS token-signing certificate changes, federation trust
  modifications, and conditional access MFA bypass modifications.'
remediation: '1. Immediately revert the federation change and remove the rogue IdP.

  2. Revoke all SAML tokens issued via the rogue IdP.

  3. Restrict domain federation changes to break-glass accounts with approval workflows.

  4. Enable Microsoft Sentinel detection rules for federation changes.

  5. Implement PIM with approval for all federation management operations.

  '
