title: 'Compute: Vm Extension Write'
scope: compute.activity_log
domain: compute_and_workload_security
subcategory: workload_security
severity: high
service: compute
resource: activity_log
requirement: Vm Extension Write
description: VM extension installed or updated — code execution capability added to
  virtual machine.
rationale: 'Adversaries abuse cloud management services such as AWS Systems Manager
  (Run Command), Azure VM RunCommand, or Automation Runbooks to execute commands within
  virtual machines via installed agents — achieving remote code execution through
  the cloud control plane without requiring network access to the instance. Detected
  via: SSM RunCommand / Azure RunCommand API calls by unexpected users, command execution
  outside maintenance windows, and service account-initiated script execution atypical
  for admin tasks.'
remediation: '1. Restrict Systems Manager Run Command / VM extension write permissions
  via RBAC.

  2. Enable logging for all Run Command executions and VM extension deployments.

  3. Use approved patch management instead of ad-hoc run commands.

  4. Alert on Run Command / RunShellScript executions by non-standard principals.

  '
