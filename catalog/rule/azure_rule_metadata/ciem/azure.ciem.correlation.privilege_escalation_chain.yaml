requirement: Privilege Escalation Chain
description: 'Correlated privilege escalation: RBAC role assigned + conditional access
  deleted + MFA disabled by same principal within 30 minutes.'
rationale: 'Adversaries circumvent elevation control mechanisms to gain higher-level
  permissions. In cloud environments this includes SAML assertion manipulation, IAM
  role privilege boundary modifications, and STS:AssumeRole chaining to escalate from
  limited to administrative access. Detected via: privilege boundary removal events,
  STS role chaining with unusually broad permissions, and unexpected policy attachments.'
remediation: '1. Revoke the elevated permissions immediately.

  2. Enable Privileged Identity Management with approval workflows.

  3. Audit all elevation events and correlate with other suspicious activity.

  4. Enforce time-limited privilege elevations with justification requirements.

