requirement: Lateral Movement Chain
description: 'Cross-resource lateral movement: VNet peered + RBAC role assigned +
  AKS admin credentials retrieved.'
rationale: 'Adversaries add additional roles or permissions to adversary-controlled
  cloud accounts to maintain persistent access to a tenant. Attackers target Global
  Administrator, Owner, and Contributor roles — granting full control over subscription
  resources without deploying remote access tools. Detected via: IAM role attachment
  events, privilege grant events in Entra ID/Okta, and admin role assignment in Microsoft
  365.'
remediation: '1. Review all VPC/VNet peering connections and remove unauthorized peerings.

  2. Apply network ACLs to restrict cross-VPC traffic to required flows only.

  3. Use AWS Transit Gateway / Azure Virtual WAN with strict routing policies.

  4. Enable VPC Flow Logs / NSG Flow Logs to detect lateral movement patterns.

  '
