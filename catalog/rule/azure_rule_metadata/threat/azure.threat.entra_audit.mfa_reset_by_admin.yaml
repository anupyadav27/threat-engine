severity: critical
service: threat
resource: entra_audit
requirement: Mfa Reset By Admin
description: Admin reset user MFA authenticator app — user's second factor cleared,
  account may be accessible with only password.
rationale: MFA bypass or manipulation allows attackers to authenticate without the
  second factor, significantly reducing authentication security for targeted accounts.
remediation: '1. Investigate and revert MFA method changes for all affected accounts.

  2. Force re-enrollment of MFA for affected accounts.

  3. Enable Conditional Access policies requiring phishing-resistant MFA (FIDO2).

  4. Alert on all MFA method changes, especially for privileged accounts.

  '
