service: keyvault
resource: activity_log
requirement: Keyvault Key Backup
description: Key Vault key backed up — key material exported to blob, potential off-vault
  exfiltration.
rationale: Private keys embedded in code repositories, CI/CD pipelines, or cloud storage
  can be harvested to authenticate as services or users.
remediation: '1. Rotate all affected private keys immediately.

  2. Scan source code and build artifacts for private key patterns.

  3. Use HSM-backed key storage (AWS KMS / Azure Key Vault HSM).

  4. Enforce automated secret scanning in all CI/CD pipelines.

  '
