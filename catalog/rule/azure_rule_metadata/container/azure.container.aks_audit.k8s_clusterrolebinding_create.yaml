requirement: K8S Clusterrolebinding Create
description: Kubernetes ClusterRoleBinding created — cluster-wide permissions granted
  to subject.
rationale: 'Adversaries add roles or permissions to service accounts or workload identities
  to maintain persistent access to container orchestration systems. Creating Kubernetes
  RoleBindings or ClusterRoleBindings for attacker-controlled identities enables cluster-wide
  command execution. Detected via: high-privilege role assignments outside CI/CD automation,
  bindings from unfamiliar IP addresses, and unexpected ServiceAccount token creation.'
remediation: '1. Immediately delete the unauthorized credential from the service principal.

  2. Rotate all existing credentials for the affected identity.

  3. Review the service principal''s permission scope and reduce if excessive.

  4. Require approved change management for credential operations.

  5. Use Managed Identities instead of explicit credentials where possible.

  '
