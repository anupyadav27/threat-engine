resource: aks_audit
requirement: K8S Secret Access
description: Kubernetes secret accessed via API — token, certificate, or sensitive
  config read from cluster.
rationale: Container secrets, Kubernetes secrets, and environment variables can expose
  sensitive credentials to any process with read access to the container environment.
remediation: '1. Remove sensitive data from container environment variables.

  2. Use Kubernetes Secrets Store CSI Driver or Vault Agent for secrets injection.

  3. Enable encryption for Kubernetes Secrets at rest.

  4. Restrict access to secrets using Kubernetes RBAC least-privilege policies.

  '
