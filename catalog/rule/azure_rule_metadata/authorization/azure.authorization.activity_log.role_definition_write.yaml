rationale: Group Policy modifications can disable security controls, deploy malware,
  or modify access rights across all systems in an organizational unit simultaneously.
remediation: '1. Identify and revert unauthorized GPO changes.

  2. Restrict GPO modification rights to domain admin accounts with approval workflows.

  3. Enable audit logging for all Group Policy changes.

  4. Use Microsoft Defender for Identity to detect GPO tampering.

  '
