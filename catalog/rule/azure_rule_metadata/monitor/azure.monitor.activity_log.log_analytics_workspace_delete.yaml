requirement: Log Analytics Workspace Delete
description: Log Analytics workspace deleted — centralized logging repository destroyed.
rationale: 'Adversaries disable or modify cloud logging capabilities to limit visibility
  into their activities. With sufficient permissions they can disable CloudTrail,
  delete Azure diagnostic settings, delete log sinks, or modify audit configurations
  — blinding defenders to all subsequent actions. Detected via: StopLogging, DeleteTrail,
  UpdateSink, Delete-DiagnosticSetting, license downgrade events, and SaaS audit log
  disable events.'
remediation: '1. Immediately restore the logging configuration.

  2. Lock CloudTrail S3 buckets with Object Lock; use immutable Azure Monitor storage.

  3. Apply SCPs / Azure Policy to prevent logging disruption.

  4. Configure out-of-band alerting (AWS EventBridge → SNS / Azure Event Grid) for
  logging changes.

  '
