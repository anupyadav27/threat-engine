# FORTIGATE — CIEM Detection Rules
# Real-time authentication & access event analysis
# Log source: FortiAnalyzer, syslog

tech_type: fortigate
category: networking
log_source: FortiAnalyzer, syslog

rules:

  - rule_id: tciem.fortigate.pre_login_banner_is_set
    title: "Ensure 'Pre-Login Banner' is set"
    severity: high
    mitre_technique: T1078
    mitre_tactic: initial_access
    cis_control: '2.1.1'
    cis_section: '2'
    log_source: "FortiAnalyzer, syslog"
    detection:
      event_type: authentication_success
      filters:
        account_type: human
      evidence_fields: [source_ip, username, timestamp, action]
    response: alert
    remediation: >
      Run the following command in the CLI to enable the pre-login-banner: FG1 #
      config system global FG1 (global) # set pre-login-banner enable FG1 (global) #
      end FG1 # In the GUI, to edit the content of the pre-login disclaimer message:
      1. go to 'System' -> 'Replacement Messages' -> 'Extended View' -> 'Pre-login
      Disclaimer Message'. The edit screen is on the bottom right corner of the
      page. Click on 'Save' after the editing is done. Default Value: the 'Pre-Login
      Banner' is disabled by default FG1 # config system global FG1 (global) # show
      config system global ... set pre-login-banner disable ... end the warning
      message default value is as follows: PRE WARNING: This is a private computer
      system. Unauthorized access or use is prohibited and subject to prosecution
      and/or disciplinary action. All use of this system constitutes consent to
      monitoring at all times and users are not entitled to any expectation of
      privacy. If monitoring reveals possible evidence of violation of criminal
      statutes, this evidence and any other related information, including
      identification information about the user, may be provided to law enforcement
      officials. If monitoring reveals violations of security regulations or
      unauthorized use, employees who violate security regulations or make
      unauthorized use of this system are subject to appropriate disciplinary
      action. References: 1.
      https://kb.fortinet.com/kb/documentLink.do?externalID=FD33887

  - rule_id: tciem.fortigate.post_login_banner_is_set
    title: "Ensure 'Post-Login-Banner' is set"
    severity: high
    mitre_technique: T1078
    mitre_tactic: initial_access
    cis_control: '2.1.2'
    cis_section: '2'
    log_source: "FortiAnalyzer, syslog"
    detection:
      event_type: authentication_success
      filters:
        account_type: human
      evidence_fields: [source_ip, username, timestamp, action]
    response: alert
    remediation: >
      Run the following command in the CLI to enable the post-login-banner: FG1 #
      config system global FG1 (global) # set post-login-banner enable FG1 (global)
      # end FG1 # In the GUI, to edit the content of the post-login disclaimer
      message, go to System -> Replace Messages -> Extended View -> 'Post-login
      Disclaimer Message'. The edit screen is on the bottom right corner of the
      page. Click on 'Save' after the editing is done. Default Value: POST WARNING:
      This is a private computer system. Unauthorized access or use is prohibited
      and subject to prosecution and/or disciplinary action. All use of this system
      constitutes consent to monitoring at all times and users are not entitled to
      any expectation of privacy. If monitoring reveals possible evidence of
      violation of criminal statutes, this evidence and any other related
      information, including identification information about the user, may be
      provided to law enforcement officials. If monitoring reveals violations of
      security regulations or unauthorized use, employees who violate security
      regulations or make unauthorized use of this system are subject to appropriate
      disciplinary action. %%LAST_SUCCESSFUL_LOGIN%% %%LAST_FAILED_LOGIN%%
      References: 1. https://kb.fortinet.com/kb/documentLink.do?externalID=FD33887

  - rule_id: tciem.fortigate.password_policy_is_enabled
    title: "Ensure 'Password Policy' is enabled"
    severity: high
    mitre_technique: T1078
    mitre_tactic: initial_access
    cis_control: '2.2.1'
    cis_section: '2'
    log_source: "FortiAnalyzer, syslog"
    detection:
      event_type: resource_access
      filters:
        account_type: human
      evidence_fields: [source_ip, username, timestamp, action]
    response: alert
    remediation: >
      can be modified from CLI or GUI From CLI, do the following: config system
      password-policy set status enable set apply-to admin-password ipsec-preshared-
      key set minimum-length 8 set min-lower-case-letter 1 set min-upper-case-letter
      1 set min-non-alphanumeric 1 set min-number 1 set expire-status enable set
      expire-day 90 set reuse-password disable end or From GUI, do the following 1)
      log in to FortiGate as Super Admin 2) Go to 'System' -> 'Settings' 3) find the
      'password Policy' Section 4) Default 'Password scope' is 'Off', change it to
      'Both' 5) set 'Minimum length' to '8' 6) Enable 'Character requirements' 7)
      set minimum '1' in the filed of 'Upper Case', 'Lower Case', 'Numbers (0- 9)'
      and 'Special' 8) Disable 'Allow password reuse' 9) Enable 'Password
      expiration' and set it to 90 Default Value: By Default, Password Policy is
      disabled, can be checked from CLI as follows: config system password-policy
      set status disable end Or from GUI as follows: 1) log in to FortiGate as Super
      Admin 2) Go to 'System '-> 'Settings' 3) find the 'password Policy' Section 4)
      Default 'Password scope' is 'Off' References: 1.
      https://kb.fortinet.com/kb/documentLink.do?externalID=FD31021 2.
      https://docs.fortinet.com/document/fortigate/7.0.0/cli-reference/11620/config-
      system-password-policy 3.
      https://docs.fortinet.com/document/fortigate/7.0.0/administration-
      guide/364729/password-policy Additional Information: Consider the following to
      ensure better security: • Do not use passwords that are obvious, such as the
      company name, administrator names, or other obvious words or phrases. • Use
      numbers in place of letters, for example: passw0rd. • Administrator passwords
      can be up to 64 characters. • Include a mixture of numbers, symbols, and upper
      and lower case letters. • Use multiple words together, or possibly even a
      sentence, for example: correcthorsebatterystaple. • Use a password generator.
      • Change the password regularly and always make the new password unique and
      not a variation of the existing password. for example, do not change from
      password to password1. • Make note of the password and store it in a safe
      place away from the management computer, in case you forget it; or ensure at
      least two people know the password in the event one person becomes
      unavailable. Alternatively, have two different admin logins. FortiGate allows
      you to create a password policy for administrators and IPsec pre- shared keys.
      With this policy, you can enforce regular changes and specific criteria for a
      password policy, including: • The minimum length, between 8 and 64 characters.
      • If the password must contain uppercase (A, B, C) and/or lowercase (a, b, c)
      characters. • If the password must contain numbers (1, 2, 3). • If the
      password must contain special or non-alphanumeric characters: !, @, #, $, %,
      ^, &, *, (, and ) • Where the password applies (admin or IPsec or both). • The
      duration of the password before a new one must be specified. • The minimum
      number of unique characters that a new password must include.

  - rule_id: tciem.fortigate.administrator_password_retries_and_lockout_time
    title: "Ensure administrator password retries and lockout time are configured"
    severity: high
    mitre_technique: T1110
    mitre_tactic: credential_access
    cis_control: '2.2.2'
    cis_section: '2'
    log_source: "FortiAnalyzer, syslog"
    detection:
      event_type: authentication_failure
      threshold: 5
      window_seconds: 300
      group_by: [source_ip, username]
      evidence_fields: [source_ip, username, timestamp, action]
    response: alert
    remediation: >
      To configure the lockout options, from CLI: config system global set admin-
      lockout-threshold 3 set admin-lockout-duration 60 end Default Value: By
      default, the number of password retry attempts is set to three, allowing the
      administrator a maximum of three attempts at logging in to their account
      before they are locked out for a set amount of time (by default, 60 seconds).
      To configure the lockout options, from CLI: config system global set admin-
      lockout-threshold 3 set admin-lockout-duration 60 end References: 1.
      https://docs.fortinet.com/document/fortigate/6.2.0/cookbook/631730/setting-
      the- administrator-password-retries-and-lockout-time Additional Information:
      The number of attempts and the default wait time before the administrator can
      try to enter a password again can be configured using the CLI. A maximum of
      ten retry attempts can be configured, and the lockout period can be 1 to
      2147483647 seconds (over 68 years). The higher the retry attempts, the higher
      the risk that someone might be able to guess the password.

  - rule_id: tciem.fortigate.only_encrypted_access_channels_are_enabled
    title: "Ensure only encrypted access channels are enabled"
    severity: high
    mitre_technique: T1078
    mitre_tactic: initial_access
    cis_control: '2.4.5'
    cis_section: '2'
    log_source: "FortiAnalyzer, syslog"
    detection:
      event_type: resource_access
      filters:
        account_type: human
      evidence_fields: [source_ip, username, timestamp, action]
    response: alert
    remediation: >
      If HTTP or Telnet is in the allowaccess list, you will have to set that list
      again with the same elements except for http or telnet FG1 # config system
      interface FG1 (interface) # edit port1 FG1 (port1) # set allowaccess ssh https
      ping snmp FG1 (port1) # end FG1 # In the web GUI, click on Network ->
      Interfaces, select the interface and click 'Edit'. In the interface setting
      page, uncheck HTTP and Telnet in the section 'Administrative Access'. Default
      Value: By default, HTTP and Telnet are not enabled on any interface.
      References: 1.
      https://docs.fortinet.com/document/fortigate/6.0.0/handbook/909236/configuring-
      administrative-access-to-interfaces

  - rule_id: tciem.fortigate.enable_botnet_c_c_domain_blocking_dns_filter
    title: "Enable Botnet C&C Domain Blocking DNS Filter"
    severity: medium
    mitre_technique: T1078
    mitre_tactic: initial_access
    cis_control: '4.3.1'
    cis_section: '4'
    log_source: "FortiAnalyzer, syslog"
    detection:
      event_type: resource_access
      filters:
        account_type: human
      evidence_fields: [source_ip, username, timestamp, action]
    response: alert
    remediation: >
      Review DNS Filter Security Profiles and validate that 'Redirect botnet C&C
      requests to Block Portal' is enabled and that firewall policies that have DNS
      traffic have a DNS Filter security profile applied with that option enabled

  - rule_id: tciem.fortigate.enable_event_logging
    title: "Enable Event Logging"
    severity: medium
    mitre_technique: T1562
    mitre_tactic: defense_evasion
    cis_control: '7.1.1'
    cis_section: '7'
    log_source: "FortiAnalyzer, syslog"
    detection:
      event_type: audit_event
      filters:
        change_type: security_relevant
      evidence_fields: [source_ip, username, timestamp, action]
    response: alert
    remediation: >
      On GUI: 1. Go to Log & Report > Log Settings. 2. Enable 'All' Event Logging.
      On CLI: config log eventfilter set event enable end Default Value: Enabled
      References: 1.
      https://docs.fortinet.com/document/fortigate/7.2.6/administration-guide/250999

  - rule_id: tciem.fortigate.configuring_the_maximum_login_attempts_and
    title: "Configuring the maximum login attempts and lockout period"
    severity: medium
    mitre_technique: T1078
    mitre_tactic: initial_access
    cis_control: '7.1'
    cis_section: '7'
    log_source: "FortiAnalyzer, syslog"
    detection:
      event_type: authentication_success
      filters:
        account_type: human
      evidence_fields: [source_ip, username, timestamp, action]
    response: alert
    remediation: >
      CLI: config user setting set auth-lockout-threshold 5 end config user setting
      set auth-lockout-duration 300 end Default Value: auth-lockout-threshold: 3
      auth-lockout-duration: 0 8 Logs and Reports This section provides best
      practices related to logging and reporting in FortiGate. 8.1 Enable Logging
      How to enable logging on the FortiGate device.

  - rule_id: tciem.fortigate.enable_event_logging_2
    title: "Enable Event Logging"
    severity: medium
    mitre_technique: T1562
    mitre_tactic: defense_evasion
    cis_control: '8.1.1'
    cis_section: '8'
    log_source: "FortiAnalyzer, syslog"
    detection:
      event_type: audit_event
      filters:
        change_type: security_relevant
      evidence_fields: [source_ip, username, timestamp, action]
    response: alert
    remediation: >
      Access the FortiGate administrative web access page and go to Log & Report >
      Log Settings enable Event Logging. CLI: config log eventfilter set event
      enable end 8.2 Encrypt Logs Sent to FortiAnalyzer / FortiManager Ensure that
      logs sent to FortiAnalyzer or FortiManager are encrypted during transmission.

