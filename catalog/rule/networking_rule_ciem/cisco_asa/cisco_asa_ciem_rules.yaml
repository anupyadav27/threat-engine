      a_90_cli_config/vpn_ike.html

  - rule_id: tciem.cisco_asa.intrusion_prevention_is_enabled_for_untrusted
    title: "Ensure intrusion prevention is enabled for untrusted interfaces"
    severity: high
    mitre_technique: T1562
    mitre_tactic: defense_evasion
    cis_control: '3.2'
    cis_section: '3'
    log_source: "syslog"
    detection:
      event_type: audit_event
      filters:
        change_type: security_relevant
      evidence_fields: [source_ip, username, timestamp, action]
    response: alert
    remediation: >
      • Step 1: Acquire the Enterprise standard action <prevention_action> to be
      performed when an attack signature is matched. It is to be chosen between
      'drop' (The packet is dropped) and 'reset' (The packet is dropped and the
      connection closed) • Step 2: Run the following to enable the audit policy
      against the attack signatures with the Enterprise standard action
      hostname(config)# ip audit name <audit_name> attack action alarm
      <prevention_action> • Step 3: Identify the untrusted interface
      <interface_name> • Step 4: Run the following to enable the intrusion
      prevention on the untrusted interface hostname(config)# ip audit interface
      <interface_name> <audit_name> Default Value: Disabled References: 1.
      https://www.cisco.com/c/en/us/td/docs/security/asa/asa92/asdm72/firewall/asa-
      firewall-asdm/modules-ips.html

  - rule_id: tciem.cisco_asa.explicit_deny_in_access_lists_is_configured
    title: "Ensure explicit deny in access lists is configured correctly"
    severity: high
    mitre_technique: T1078
    mitre_tactic: initial_access
    cis_control: '3.12'
    cis_section: '3'
    log_source: "syslog"
    detection:
      event_type: resource_access
      filters:
        account_type: human
      evidence_fields: [source_ip, username, timestamp, action]
    response: alert
    remediation: >
      • Step 1: Acquire the name <access-list_name> of the access-list that is not
      compliant from the audit procedure • Step 2: Run the following to configure
      the explicit deny. hostname(config)#<access-list_name> extended deny ip any
      any log The statement will be placed at the end of the access-list Default
      Value: Disabled by default. References: 1.
      https://www.cisco.com/c/en/us/td/docs/security/asa/asa910/configuration/firewall/
      asa-910-firewall-config/access-rules.html

