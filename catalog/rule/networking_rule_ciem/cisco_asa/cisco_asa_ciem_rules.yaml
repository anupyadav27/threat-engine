# CISCO_ASA — CIEM Detection Rules
# Real-time authentication & access event analysis
# Log source: syslog

tech_type: cisco_asa
category: networking
log_source: syslog

rules:

  - rule_id: tciem.cisco_asa.logon_password_is_set
    title: "Ensure 'Logon Password' is set"
    severity: high
    mitre_technique: T1078
    mitre_tactic: initial_access
    cis_control: '1.1.1'
    cis_section: '1'
    log_source: "syslog"
    detection:
      event_type: authentication_success
      filters:
        account_type: human
      evidence_fields: [source_ip, username, timestamp, action]
    response: alert
    remediation: >
      Run the following to set the login password. hostname(config)#passwd
      <login_password> The login_password parameter should be the plain-text
      password used to log into the system Default Value: The default password is
      'cisco'. 9.x The default password, “cisco,” has been removed; you must
      actively set a login password. Using the no passwd or clear configure passwd
      command removes the password; formerly, it reset it to the default of “cisco.”
      References: 1.
      https://www.cisco.com/c/en/us/td/docs/security/asa/asa91/configuration/general/a
      sa_91_general_config/basic_hostname_pw.html

  - rule_id: tciem.cisco_asa.enable_password_is_set
    title: "Ensure 'Enable Password' is set"
    severity: high
    mitre_technique: T1068
    mitre_tactic: privilege_escalation
    cis_control: '1.1.2'
    cis_section: '1'
    log_source: "syslog"
    detection:
      event_type: privilege_change
      filters:
        action_in: [GRANT, ROLE_ADD, ELEVATION, SUDO]
        target_privilege_in: [admin, superuser, root, dba, wheel]
      evidence_fields: [source_ip, username, timestamp, action]
    response: alert
    remediation: >
      Run the following to set the enable password. hostname(config)#enable password
      <enable_password> level <privilege_level> The enable_password parameter should
      be the plain-text password used to log into the enable mode If the privilege
      level is not configured, the default one is 15 Default Value: By default, the
      enable password is blank. References: 1.
      https://www.cisco.com/c/en/us/td/docs/security/asa/asa91/configuration/general/a
      sa_91_general_config/basic_hostname_pw.html

  - rule_id: tciem.cisco_asa.aaa_authentication_enable_console_is_configured
    title: "Ensure 'aaa authentication enable console' is configured correctly"
    severity: high
    mitre_technique: T1068
    mitre_tactic: privilege_escalation
    cis_control: '1.4.3.1'
    cis_section: '1'
    log_source: "syslog"
    detection:
      event_type: privilege_change
      filters:
        action_in: [GRANT, ROLE_ADD, ELEVATION, SUDO]
        target_privilege_in: [admin, superuser, root, dba, wheel]
      evidence_fields: [source_ip, username, timestamp, action]
    response: alert
    remediation: >
      Configure the aaa authentication for enable access using the TACACS+ server-
      group as primary method and the local database as backup method
      hostname(config)# aaa authentication enable console <server-group_name> local
      Default Value: The aaa authentication is disabled by default for the enable
      mode References: 1.
      https://www.cisco.com/c/en/us/td/docs/security/asa/asa910/configuration/general/
      asa-910-general-config/aaa-local.html

