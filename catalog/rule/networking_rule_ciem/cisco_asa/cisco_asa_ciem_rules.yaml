  - rule_id: tciem.cisco_asa.aaa_authorization_exec_is_configured_correctly
    title: "Ensure 'aaa authorization exec' is configured correctly"
    severity: high
    mitre_technique: T1068
    mitre_tactic: privilege_escalation
    cis_control: '1.4.4.2'
    cis_section: '1'
    log_source: "syslog"
    detection:
      event_type: privilege_change
      filters:
        action_in: [GRANT, ROLE_ADD, ELEVATION, SUDO]
        target_privilege_in: [admin, superuser, root, dba, wheel]
      evidence_fields: [source_ip, username, timestamp, action]
    response: alert
    remediation: >
      Run the following to enable the AAA authorization exec hostname(config)# aaa
      authorization exec authentication-server auto-enable Default Value: Not
      enabled References: 1.
      https://www.cisco.com/c/en/us/td/docs/security/asa/asa94/config-
      guides/cli/general/asa-94-general-config/aaa-local.html

  - rule_id: tciem.cisco_asa.aaa_accounting_command_is_configured_correctly
    title: "Ensure 'aaa accounting command' is configured correctly"
    severity: high
    mitre_technique: T1068
    mitre_tactic: privilege_escalation
    cis_control: '1.4.5.1'
    cis_section: '1'
    log_source: "syslog"
    detection:
      event_type: privilege_change
      filters:
        action_in: [GRANT, ROLE_ADD, ELEVATION, SUDO]
        target_privilege_in: [admin, superuser, root, dba, wheel]
      evidence_fields: [source_ip, username, timestamp, action]
    response: alert
    remediation: >
      Run the following in order to record all the commands entered at all the
      privilege levels and to send them to the AAA servers hostname(config)# aaa
      accounting command <server-group_name> Default Value: By default, AAA
      accounting for administrative access is disabled. References: 1.
      https://www.cisco.com/c/en/us/td/docs/security/asa/asa94/config-
      guides/cli/general/asa-94-general-config/aaa-local.html

