  - rule_id: tciem.cisco_asa.asdm_banner_is_set
    title: "Ensure 'ASDM banner' is set"
    severity: high
    mitre_technique: T1078
    mitre_tactic: initial_access
    cis_control: '1.5.1'
    cis_section: '1'
    log_source: "syslog"
    detection:
      event_type: resource_access
      filters:
        account_type: human
      evidence_fields: [source_ip, username, timestamp, action]
    response: alert
    remediation: >
      Run the following command to set the ASDM banner where <line_of_message> is a
      line of the banner text. hostname(config)#banner asdm <line_of_message> Repeat
      the command for each line if the banner text has several lines. Default Value:
      Disabled by default References: 1.
      https://www.cisco.com/c/en/us/td/docs/security/asa/asa84/configuration/guide/as
      a_84_cli_config/access_management.html#36060

