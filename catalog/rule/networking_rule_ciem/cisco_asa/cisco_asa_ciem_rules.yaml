  - rule_id: tciem.cisco_asa.tls_1_2_or_greater_is_set_for_https_access
    title: "Ensure 'TLS 1.2' or greater is set for HTTPS access"
    severity: high
    mitre_technique: T1078
    mitre_tactic: initial_access
    cis_control: '1.7.2'
    cis_section: '1'
    log_source: "syslog"
    detection:
      event_type: resource_access
      filters:
        account_type: human
      evidence_fields: [source_ip, username, timestamp, action]
    response: alert
    remediation: >
      For version 8.x, run the following command to enable AES 256 algorithm
      hostname(config)# ssl encryption aes256-sha1 For version 9.x, run the
      following command to enable AES 256 algorithm hostname(config)# ssl cipher
      tlsv1.2 References: 1. https://www.jaacostan.com/2018/03/cisco-asa-disable-
      sslv3-and-configure.html

  - rule_id: tciem.cisco_asa.ssl_aes_256_encryption_is_set_for_https_access
