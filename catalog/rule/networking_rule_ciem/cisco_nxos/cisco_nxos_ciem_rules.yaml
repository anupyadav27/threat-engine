# CISCO_NXOS — CIEM Detection Rules
# Real-time authentication & access event analysis
# Log source: syslog, SNMP trap

tech_type: cisco_nxos
category: networking
log_source: syslog, SNMP trap

rules:

  - rule_id: tciem.cisco_nxos.configure_aaa_authentication_tacacs_if_applicable
    title: "Configure AAA Authentication - TACACS if applicable"
    severity: medium
    mitre_technique: T1078
    mitre_tactic: initial_access
    cis_control: '1.1.1.1'
    cis_section: '1'
    log_source: "syslog, SNMP trap"
    detection:
      event_type: resource_access
      filters:
        account_type: human
      evidence_fields: [source_ip, username, timestamp, action]
    response: alert
    remediation: >
      First, enable TACACS+ in NX-OS switch(config)#feature tacacs+ Next, define two
      or more TACACS+ servers: switch(config)#tacacs-server host 3.4.5.6 key somekey
      switch(config)#tacacs-server host 4.5.6.7 key someotherkey define the aaa
      group for TACACS+: switch(config)#aaa group server tacacs+ TACACSGROUP server
      3.4.5.6 server 4.5.6.7 Finally, create the aaa authentication list for both
      console and default access: switch(config)#aaa authentication login default
      group TACACSGROUP local switch(config)#aaa authentication login console group
      TACACSGROUP local It is common to include 'local' as the last entry in the
      list, to allow access to administer the device even if the RADIUS server is
      offline. Note that while this ensures access in the case of the device or the
      RADIUS server being offline, it also means that if an attacker can DOS the
      RADIUS Servers, they can authenticate locally as well. Default Value: By
      default TACACS+ is not implemented References: 1.
      https://www.cisco.com/c/m/en_us/techdoc/dc/reference/cli/nxos/commands/fund/
      show-running-config.html

  - rule_id: tciem.cisco_nxos.configure_aaa_authentication_local_ssh_keys
    title: "Configure AAA Authentication - Local SSH keys"
    severity: medium
    mitre_technique: T1078
    mitre_tactic: initial_access
    cis_control: '1.1.1.2'
    cis_section: '1'
    log_source: "syslog, SNMP trap"
    detection:
      event_type: authentication_success
      filters:
        account_type: human
      evidence_fields: [source_ip, username, timestamp, action]
    response: alert
    remediation: >
      • Create the client's SSH public and private keys. The keys must be in OpenSSH
      format for the NX-OS switch to interpret them correctly. Use either RSA or DSA
      algorithms, and be sure to specify enough bits for entropy (2048 minimum, more
      is of course better) • Upload the client's SSH public key, and store it on the
      bootflash of the switch. • Be sure that the file has a meaningful name, often
      the users's initials and the key algorithm (RSA or DSA) is in the filename.
      This makes it easier to remove or replace that file as keys are expired out,
      workstations migrate or administrators leave the organization. • To enable
      key-based authentication for one local user (for instance, Davey Jones), enter
      the command: switch(config)# username djadmin sshkey file bootflash:dj_rsa.pub
      Alternatively, the ssh key can be defined in the username configuration line:
      switch(config)# username djadmin sshkey ssh-rsa
      AAAAB3NzaC1yc2EAAAABIwAAAIEAy19oF6QaZl9G+3f1XswK3OiW4H7YyUyuA50rv7gsEPjhOBYms
      i6PAVKui1nIf/DQhum+lJNqJP/eLowb7ubO+lVKRXFY/G+lJNIQW3g9igG30c6k6+XVn+NjnI1B7i
      hvpVh7dLddMOXwOnXHYshXmSiH3UD/vKyziEh5S4Tplx8= The file based method is
      usually preferred, as they keys can be changed without modifying the
      configuration of the switch. Also, the keys are not stored in any archived
      copy of the configuration. Note that the username and file name will vary
      depending on your organization's policies, procedures and standards Default
      Value: Per-user SSH keys are not created or defined by default.

  - rule_id: tciem.cisco_nxos.configure_aaa_authentication_radius_if_applicable
    title: "Configure AAA Authentication - RADIUS if applicable"
    severity: medium
    mitre_technique: T1078
    mitre_tactic: initial_access
    cis_control: '1.1.1.3'
    cis_section: '1'
    log_source: "syslog, SNMP trap"
    detection:
      event_type: resource_access
      filters:
        account_type: human
      evidence_fields: [source_ip, username, timestamp, action]
    response: alert
    remediation: >
      First define two or more RADIUS Servers switch(config)#radius-server host
      3.4.5.6 key somekey authentication accounting switch(config)#radius-server
      host 4.5.6.7 key someotherkey authentication accounting Then create an AAA
      group for RADIUS switch(config)# aaa group server radius RADIUSGROUP server
      3.4.5.6 server 4.5.6.7 Finally, create the authentication lists in the correct
      order - to be effective the RADIUS group needs to appear first in the list.
      Both the default and console access should be secured in the same way:
      switch(config)# aaa authentication login default group RADIUSGROUP local
      switch(config)# aaa authentication login console group RADIUSGROUP local It is
      common to include 'local' as the last entry in the list, to allow access to
      administer the device even if the RADIUS server is offline. Note that while
      this ensures access in the case of the device or the RADIUS server being
      offline, it also means that if an attacker can DOS the RADIUS Servers, they
      can authenticate locally as well. Default Value: By default RADIUS is not
      implemented References: 1.
      https://www.cisco.com/c/m/en_us/techdoc/dc/reference/cli/nxos/commands/fund/
      show-running-config.html

  - rule_id: tciem.cisco_nxos.vty_line_authentication
    title: "vty line authentication"
    severity: medium
    mitre_technique: T1078
    mitre_tactic: initial_access
    cis_control: '1.1.2.1'
    cis_section: '1'
    log_source: "syslog, SNMP trap"
    detection:
      event_type: resource_access
      filters:
        account_type: human
      evidence_fields: [source_ip, username, timestamp, action]
    response: alert
    remediation: >
      Configure central authentication for vty lines as follows: aaa authentication
      login default group <servergroup> Default Value: By default local
      authentication is configured: switch# show run all | i 'aaa authentication
      login' aaa authentication login default local aaa authentication login console
      local aaa authentication login default fallback error local aaa authentication
      login console fallback error local References: 1.
      https://www.cisco.com/c/en/us/td/docs/dcn/nx-
      os/nexus9000/102x/configuration/Security/cisco-nexus-9000-nx-os-security-
      configuration-guide-102x/m-configuring-aaa.html

  - rule_id: tciem.cisco_nxos.limit_ssh_login_attempts_to_3_or_less
    title: "Limit SSH Login Attempts to 3 or less"
    severity: medium
    mitre_technique: T1078
    mitre_tactic: initial_access
    cis_control: '1.2.3'
    cis_section: '1'
    log_source: "syslog, SNMP trap"
    detection:
      event_type: authentication_success
      filters:
        account_type: human
      evidence_fields: [source_ip, username, timestamp, action]
    response: alert
    remediation: >
      switch(config)# ssh login attempts 3 Default Value: By default, after 3 failed
      login attempts in an SSH session, that session is terminated. References: 1.
      https://www.cisco.com/c/en/us/td/docs/switches/datacenter/nexus9000/sw/93x/se
      curity/configuration/guide/b-cisco-nexus-9000-nx-os-security-configuration-
      guide- 93x.html

  - rule_id: tciem.cisco_nxos.pre_authentication_banner
    title: "Pre-authentication Banner"
    severity: medium
    mitre_technique: T1078
    mitre_tactic: initial_access
    cis_control: '1.3.1'
    cis_section: '1'
    log_source: "syslog, SNMP trap"
    detection:
      event_type: authentication_success
      filters:
        account_type: human
      evidence_fields: [source_ip, username, timestamp, action]
    response: alert
    remediation: >
      Configure an MOTD banner as shown below. The delimiter character shown is a
      '^', but any character can serve as a delimiter. switch(config)# banner motd ^
      > Enter MOTD Banner here. > End this message with the same delimiter as above
      > ^ switch(config)# Default Value: By default no MOTD banner is configured.
      Additional Information: In contrast to IOS(-XE) or IOS XR, NX-OS just supports
      two banner types: 1. motd banner (shown before authentication) 2. exec banner
      (shown after successful authentication)

  - rule_id: tciem.cisco_nxos.post_authentication_banner
    title: "Post-authentication Banner"
    severity: medium
    mitre_technique: T1078
    mitre_tactic: initial_access
    cis_control: '1.3.2'
    cis_section: '1'
    log_source: "syslog, SNMP trap"
    detection:
      event_type: authentication_success
      filters:
        account_type: human
      evidence_fields: [source_ip, username, timestamp, action]
    response: alert
    remediation: >
      Configure an exec banner as shown below. The delimiter character shown is a
      '^', but any character can serve as a delimiter. switch(config)# banner exec ^
      > Enter your standard EXEC Banner text here. End with the same delimiter as
      used above > ^ switch(config)# Default Value: By default no exec banner is
      configured. Additional Information: In contrast to IOS(-XE) or IOS XR, NX-OS
      just supports two banner types: 1. motd banner (shown before authentication)
      2. exec banner (shown after successful authentication)

  - rule_id: tciem.cisco_nxos.log_all_successful_and_failed_administrative
    title: "Log all Successful and Failed Administrative Logins"
    severity: medium
    mitre_technique: T1110
    mitre_tactic: credential_access
    cis_control: '1.5.2'
    cis_section: '1'
    log_source: "syslog, SNMP trap"
    detection:
      event_type: authentication_failure
      threshold: 5
      window_seconds: 300
      group_by: [source_ip, username]
      evidence_fields: [source_ip, username, timestamp, action]
    response: alert
    remediation: >
      switch(config)# login level authpriv 5 Default Value: By default failed logins
      are logged and successful logins are not logged. Additional Information: The
      methods in this recommendation are applicable to all NX-OS platforms. Some
      platforms will also support 'login on-success' and 'login on-failure'
      commands, but because of inconsistent support the use of these commands are
      not recommended.

  - rule_id: tciem.cisco_nxos.configure_snmpv3
    title: "Configure SNMPv3"
    severity: medium
    mitre_technique: T1562
    mitre_tactic: defense_evasion
    cis_control: '1.9.1'
    cis_section: '1'
    log_source: "syslog, SNMP trap"
    detection:
      event_type: audit_event
      filters:
        change_type: security_relevant
      evidence_fields: [source_ip, username, timestamp, action]
    response: alert
    remediation: >
      Create SNMPv3 Users (and groups if needed). Ensure that SHA hashes are used
      rather than MD5. Also ensure that appropriate authorization levels are set
      ('network- admin' is shown below): switch(config)#snmp-server user
      SNMPv3_UserName network-admin auth sha 0x12624c4dcb90cffeb43a1177324f547d priv
      0x12624c4dcb90cffeb43a1177324f547d localizedkey To set SNMP to version 3, add
      the 'version' parameter to the snmp-server command (note that SNMPv3 users and
      groups need to be configured first): switch(config)# snmp-server host 1.2.3.4
      traps version 3 priv <SNMPv3_UserName> To enforce encryption for all SNMPv3
      Users. This can be done by individual user, but it's recommended to enforce it
      globally: switch(config)# snmp-server globalEnforcePriv Default Value: Not
      Configured References: 1.
      https://www.cisco.com/c/en/us/td/docs/switches/datacenter/nexus9000/sw/6-
      x/system_management/configuration/guide/b_Cisco_Nexus_9000_Series_NX-
      OS_System_Management_Configuration_Guide/sm_9snmp.html?form=MG0AV3

