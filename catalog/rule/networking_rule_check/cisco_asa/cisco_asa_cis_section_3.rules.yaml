tech_type: cisco_asa
category: networking
cis_benchmark: CIS Cisco ASA 9.x v1.1.0
cis_section: '3'

rules:

  - rule_id: cisco_asa.cis.3.dns_services_are_configured_correctly
    title: "Ensure DNS services are configured correctly"
    severity: high
    automation_type: automated
    cis_control: '3.1'
    cis_section: '3'
    profile_applicability: "Level 1"
    scope: cisco_asa.section_3.dns_services_are_configured_correctly
    assertion:
      field: value
      operator: exists
      expected: "true"
    remediation: >
      • Step 1: Run the following to enable the DNS lookup hostname(config)# dns
      domain-lookup <interface_name> <interface_name> is the name of the interface
      connected to the DNS server • Step 2: Configure the group of DNS servers
      hostname(config)# dns server-group DefaultDNS • Step 3: Acquire the enterprise
      authorized DNS servers' IP addresses <dns_ip_address> and for each of them,
      run the following command to configure the DNS server in the DNS server group
      hostname(config-dns-server-group)#name-server <dns_ip_address> References: 1.
      https://www.cisco.com/c/en/us/td/docs/security/asa/asa90/configuration/guide/as
      a_90_cli_config/basic_hostname_pw.html
    compliance:
      - cis_cisco_asa_9_x_v1_1_0_3_1

  - rule_id: cisco_asa.cis.3.packet_fragments_are_restricted_for_untrusted
    title: "Ensure packet fragments are restricted for untrusted interfaces"
    severity: high
    automation_type: automated
    cis_control: '3.3'
    cis_section: '3'
    profile_applicability: "Level 1"
    scope: cisco_asa.section_3.packet_fragments_are_restricted_for_untrusted
    assertion:
      field: value
      operator: equals
      expected: "on"
    remediation: >
      • Step 1: Acquire the name of the untrusted interface <interface_name> • Step
      2: Run the following command to deny fragments on the interface.
      hostname(config)#fragment chain 1 <interface_name> Default Value: The default
      value for the fragment chain is 24. References: 1.
      https://www.cisco.com/c/en/us/td/docs/security/asa/asa90/configuration/guide/as
      a_90_cli_config/protect_tools.html
    compliance:
      - cis_cisco_asa_9_x_v1_1_0_3_3

  - rule_id: cisco_asa.cis.3.threat_detection_statistics_is_set_to_tcp
    title: "Ensure 'threat-detection statistics' is set to 'tcp-intercept'"
    severity: high
    automation_type: automated
    cis_control: '3.6'
    cis_section: '3'
    profile_applicability: "Level 1"
    scope: cisco_asa.section_3.threat_detection_statistics_is_set_to_tcp
    assertion:
      field: value
      operator: equals
      expected: "true"
    remediation: >
      Run the following to enable threat detection statistics for TCP Intercept
      hostname(config)# threat-detection statistics tcp-intercept Default Value: Not
      enable by default References: 1.
      https://www.cisco.com/c/en/us/td/docs/security/asa/asa912/configuration/firewall/
      asa-912-firewall-config/conns-threat.html
    compliance:
      - cis_cisco_asa_9_x_v1_1_0_3_6

  - rule_id: cisco_asa.cis.3.ip_verify_is_set_to_reverse_path_for_untrusted
    title: "Ensure 'ip verify' is set to 'reverse-path' for untrusted interfaces"
    severity: high
    automation_type: automated
    cis_control: '3.7'
    cis_section: '3'
    profile_applicability: "Level 1"
    scope: cisco_asa.section_3.ip_verify_is_set_to_reverse_path_for_untrusted
    assertion:
      field: value
      operator: equals
      expected: "on"
    remediation: >
      • Step 1: Acquire the name of the untrusted interface <interface_name> • Step
      2: Run the following command to enable protection against IP spoofing
      hostname(config)# ip verify reverse-path interface <interface_name> Default
      Value: Disabled by default References: 1.
      https://www.cisco.com/c/en/us/td/docs/security/asa/asa91/configuration/firewall/a
      sa_91_firewall_config/protect_tools.html
    compliance:
      - cis_cisco_asa_9_x_v1_1_0_3_7

  - rule_id: cisco_asa.cis.3.security_level_is_set_to_0_for_internet_facing
    title: "Ensure 'security-level' is set to '0' for Internet-facing interface"
    severity: high
    automation_type: automated
    cis_control: '3.8'
    cis_section: '3'
    profile_applicability: "Level 1"
    scope: cisco_asa.section_3.security_level_is_set_to_0_for_internet_facing
    assertion:
      field: value
      operator: equals
      expected: "true"
    remediation: >
      • Step 1: Acquire the physical name of the Internet facing interface
      <interface_physical_name> • Step 2: Run the following command assigned the
      security-level 0 hostname(config)#interface <interface_physical_name>
      hostname(config-if)#security-level 0 Default Value: Security level is not
      assigned by default References: 1.
      http://www.cisco.com/c/en/us/td/docs/security/asa/asa72/configuration/guide/conf
      _gd/int5505.html 2. https://networklessons.com/cisco/asa-firewall/cisco-asa-
      security-
      levels#:~:text=Security%20level%200%3A%20This%20is,it%20within%20an%20
      access%2Dlist.
    compliance:
      - cis_cisco_asa_9_x_v1_1_0_3_8

  - rule_id: cisco_asa.cis.3.botnet_protection_is_enabled_for_untrusted
    title: "Ensure Botnet protection is enabled for untrusted interfaces"
    severity: medium
    automation_type: automated
    cis_control: '3.9'
    cis_section: '3'
    profile_applicability: "Level 2"
    scope: cisco_asa.section_3.botnet_protection_is_enabled_for_untrusted
    assertion:
      field: enabled
      operator: equals
      expected: "on"
    remediation: >
      • Step 1: Run the following command to ensure that the DNS server is
      available. hostname#sh run | i name-server If there is no DNS server,
      configure the DNS server according to the related recommendation. • Step 2:
      Run the following commands to enable the security appliance to download and
      use for inspection the lists of known malware websites
      hostname(config)#dynamic-filter updater-client enable
      hostname(config)#dynamic-filter use-database • Step 3: Run the following
      command to create a class map for the security appliance to match the DNS
      traffic hostname(config)#class-map <dns_class_map_name> hostname(config-
      cmap)#match port udp eq domain • Step 4: Run the following to create the
      policy-map in order to ask the appliance to inspect the matched DNS traffic
      and to compare the domain name in the DNS traffic with the list of known
      malware related domain names. hostname(config)#policy-map
      <dns_policy_map_name> hostname(config-pmap)# class <dns_class_map_name>
      hostname(config-pmap-c)# inspect dns preset_dns_map dynamic-filter-snoop •
      Step 5: Run the following for the inspection to be applied on the untrusted
      interface hostname(config)# service-policy <dns_policy_map_name> interface
      <untrusted_interface_name> • Step 6: Run the following to monitor the Botnet
      traffic crossing the untrusted interface hostname(config)# dynamic-filter
      enable interface <untrusted_interface_name> • Step 7: Run the following to
      drop any identified Botnet traffic on the untrusted interface
      hostname(config)# dynamic-filter drop blacklist interface
      <untrusted_interface_name> Default Value: Disabled by default References: 1.
      https://www.cisco.com/c/en/us/td/docs/security/asa/special/botnet/guide/asa-
      botnet.html
    compliance:
      - cis_cisco_asa_9_x_v1_1_0_3_9

  - rule_id: cisco_asa.cis.3.activex_filtering_is_enabled
    title: "Ensure ActiveX filtering is enabled"
    severity: medium
    automation_type: automated
    cis_control: '3.10'
    cis_section: '3'
    profile_applicability: "Level 2"
    scope: cisco_asa.section_3.activex_filtering_is_enabled
    assertion:
      field: enabled
      operator: equals
      expected: "true"
    remediation: >
      • Step 1: Acquire the TCP port used for the HTTP traffic containing ActiveX
      objects, the IP address <internal_users_ip> and mask <internal_users_mask> of
      internal users generating the HTTP traffic, and the IP address
      <external_servers_ip> and mask <external_servers_mask> of the external servers
      to which the internal users connect and that are source of ActiveX objects. •
      Step 2: Run the following command to filter ActiveX applets. hostname(config)#
      filter activex <port> <internal_users_ip> <internal_users_mask>
      <external_servers_ip> <external_servers_mask> Default Value: ActiveX control
      filtering is disabled by default. References: 1.
      https://www.cisco.com/c/en/us/td/docs/security/asa/asa91/configuration/firewall/a
      sa_91_firewall_config/protect_filter.html
    compliance:
      - cis_cisco_asa_9_x_v1_1_0_3_10

  - rule_id: cisco_asa.cis.3.java_applet_filtering_is_enabled
    title: "Ensure Java applet filtering is enabled"
    severity: medium
    automation_type: automated
    cis_control: '3.11'
    cis_section: '3'
    profile_applicability: "Level 2"
    scope: cisco_asa.section_3.java_applet_filtering_is_enabled
    assertion:
      field: enabled
      operator: equals
      expected: "true"
    remediation: >
      • Step 1: Acquire the TCP port used for the HTTP traffic containing Java
      objects, the IP address <internal_users_ip> and mask <internal_users_mask> of
      internal users generating the HTTP traffic, and the IP address
      <external_servers_ip> and mask <external_servers_mask> of the external servers
      to which the internal users connect and that are source of Java objects. •
      Step 2: Run the following command to filter Java applets. hostname(config)#
      filter java <port> <internal_users_ip> <internal_users_mask>
      <external_servers_ip> <external_servers_mask> Default Value: Java applet
      filtering is disabled by default. References: 1.
      https://www.cisco.com/c/en/us/td/docs/security/asa/legacy/asa-legacy-
      gd/protect- filter.html
    compliance:
      - cis_cisco_asa_9_x_v1_1_0_3_11


