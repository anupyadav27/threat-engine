      run the following to enable the account as email source address in the
      firewall hostname(config)#logging from-address <firewall_email_account> • Step
      3: Acquire the firewall administrator email account <firewall_admin_email> and
      run the following for the security appliance to send logs to its administrator
      email account hostname(config)#logging recipient-address
      <firewall_admin_email> • Step 4: Obtain from the mail server administrator the
      mail server IP address <mail_server_ip> and run the following to configure it
      in the firewall hostname(config)#smtp-server <mail_server_ip> References: 1.
      http://www.cisco.com/c/en/us/td/docs/security/asa/asa91/configuration/general/as
