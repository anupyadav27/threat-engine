tech_type: cisco_asa
category: networking
cis_benchmark: CIS Cisco ASA 9.x v1.1.0
cis_section: '1'

rules:

  - rule_id: cisco_asa.cis.1.master_key_passphrase_is_set
    title: "Ensure 'Master Key Passphrase' is set"
    severity: high
    automation_type: automated
    cis_control: '1.1.3'
    cis_section: '1'
    profile_applicability: "Level 1"
    scope: cisco_asa.section_1.master_key_passphrase_is_set
    assertion:
      field: value
      operator: equals
      expected: "true"
    remediation: >
      • Step 1: Set the master key passphrase with the following command: hostname
      (config)# key config-key password-encryption <passphrase> The passphrase is
      between 8 and 128 characters long • Step 2: Enable the AES encryption of
      existing keys of the running-configuration hostname(config)# password
      encryption aes • Step 3: Run the following for the encryption of keys in the
      startup-configuration hostname(config)# write memory References: 1.
      https://www.cisco.com/c/en/us/td/docs/security/asa/asa94/config-
      guides/cli/general/asa-94-general-config/basic-hostname-pw.html
    compliance:
      - cis_cisco_asa_9_x_v1_1_0_1_1_3

  - rule_id: cisco_asa.cis.1.password_recovery_is_disabled
    title: "Ensure 'Password Recovery' is disabled"
    severity: high
    automation_type: automated
    cis_control: '1.1.4'
    cis_section: '1'
    profile_applicability: "Level 1"
    scope: cisco_asa.section_1.password_recovery_is_disabled
    assertion:
      field: enabled
      operator: equals
      expected: "false"
    remediation: >
      Run the following to disable the password recovery: hostname (config)# no
      service password-recovery Default Value: The password recovery is enabled by
      default References: 1.
      https://www.cisco.com/c/en/us/td/docs/security/asa/asa93/configuration/general/a
      sa-general-cli/basic-hostname-pw.html
    compliance:
      - cis_cisco_asa_9_x_v1_1_0_1_1_4

  - rule_id: cisco_asa.cis.1.password_policy_is_enabled
    title: "Ensure 'Password Policy' is enabled"
    severity: high
    automation_type: automated
    cis_control: '1.1.5'
    cis_section: '1'
    profile_applicability: "Level 1"
    scope: cisco_asa.section_1.password_policy_is_enabled
    assertion:
      field: enabled
      operator: equals
      expected: "true"
    remediation: >
      • Step 1: Run the following to set the password lifetime in days to less than
      or equal to 365 hostname(config)#password-policy lifetime 365 • Step 2: Run
      the following to set the minimum number of characters that must be changed
      between the old and the new passwords, to be to be greater than or equal to 14
      hostname(config)#password-policy minimum-changes 14 • Step 3: Run the
      following to set the minimum number of upper case characters in the password,
      to be to be greater than or equal to 1 hostname(config)#password-policy
      minimum-uppercase 1 • Step 4: Run the following to set the minimum number of
      lower case characters in the password, to be to be greater than or equal to 1
      hostname(config)#password-policy minimum-lowercase 1 • Step 5: Run the
      following to set the minimum number of numeric characters in the password, to
      be greater than or equal to 1 hostname(config)#password-policy minimum-numeric
      1 • Step 6: Run the following to set the minimum number of special characters
      in the password, to be greater than or equal to 1 hostname(config)#password-
      policy minimum-special 1 • Step 7: Run the following to set the password
      minimum length, to be greater than or equal to 14 hostname(config)#password-
      policy minimum-length 14 Default Value: Password policy is disabled by
      default. The following are default values: password-policy lifetime 0
      password-policy minimum-changes 0 password-policy minimum-length 3 password-
      policy minimum-uppercase 0 password-policy minimum- lowercase 0 password-
      policy minimum-numeric 0 password-policy minimum-special 0 References: 1.
      http://www.cisco.com/c/en/us/td/docs/security/asa/asa91/configuration/general/as
      a_91_general_config/admin_management.html 2.
      https://www.cisecurity.org/insights/white-papers/cis-password-policy-guide
    compliance:
      - cis_cisco_asa_9_x_v1_1_0_1_1_5

  - rule_id: cisco_asa.cis.1.domain_name_is_set
    title: "Ensure 'Domain Name' is set"
    severity: high
    automation_type: automated
    cis_control: '1.2.1'
    cis_section: '1'
    profile_applicability: "Level 1"
    scope: cisco_asa.section_1.domain_name_is_set
    assertion:
      field: value
      operator: equals
      expected: "true"
    remediation: >
      • Step 1: Acquire the enterprise domain name (enterprise_domain) • Step 2: Run
      the following to configure the domain name hostname(config)#domain-name
      <enterprise_domain> References: 1.
      https://www.cisco.com/c/en/us/td/docs/security/asa/asa90/configuration/guide/as
      a_90_cli_config/basic_hostname_pw.html
    compliance:
      - cis_cisco_asa_9_x_v1_1_0_1_2_1

  - rule_id: cisco_asa.cis.1.host_name_is_set
    title: "Ensure 'Host Name' is set"
    severity: high
    automation_type: automated
    cis_control: '1.2.2'
    cis_section: '1'
    profile_applicability: "Level 1"
    scope: cisco_asa.section_1.host_name_is_set
    assertion:
      field: value
      operator: equals
      expected: "true"
    remediation: >
      • Step 1: Acquire the enterprise naming convention to build the name_of_device
      • Step 2: Run the following to configure the device hostname
      hostname(config)#hostname <name_of_device> Default Value: The default value
      depends on the platform, but generally is ciscoasa References: 1.
      https://www.cisco.com/c/en/us/td/docs/security/asa/asa90/configuration/guide/as
      a_90_cli_config/basic_hostname_pw.html#pgfId-1103007
    compliance:
      - cis_cisco_asa_9_x_v1_1_0_1_2_2

  - rule_id: cisco_asa.cis.1.failover_is_enabled
    title: "Ensure 'Failover' is enabled"
    severity: high
    automation_type: automated
    cis_control: '1.2.3'
    cis_section: '1'
    profile_applicability: "Level 1"
    scope: cisco_asa.section_1.failover_is_enabled
    assertion:
      field: enabled
      operator: equals
      expected: "no"
    remediation: >
      Follow the steps below to enable active/standby failover. The commands are run
      in the system execution space • Step 1: For each appliance, identify the
      failover link physical interface <failover_interface_physical> and assign it a
      name <failover_interface_name> and IP address <failover_interface_ip> and
      subnet mask <failover_interface_mask>. Identify the other device IP address
      for each appliance as <peer_failover_ip> • Step 2: For each appliance,
      identify the state link physical interface <state_interface_physical> and
      assign it a name <state_interface_name> and IP address <state_interface_ip>
      and subnet mask <state_interface_mask>. Identify the other device IP address
      for each appliance as <peer_state_ip> • Step 3: Run the following on the
      Active device to set it as primary node hostname(config)#failover lan unit
      primary • Step 4: Run the following on the Standby device to set it as
      secondary node hostname(config)#failover lan unit secondary • Step 5: Run the
      following on both security appliances hostname(config)#failover lan interface
      <failover_interface_name> <failover_interface_physical>
      hostname(config)#failover interface ip <failover_interface_name>
      <failover_interface_ip> <failover_interface_mask> standby <peer_failover_ip>
      hostname(config)#interface <failover_interface_physical> hostname(config-
      if)#no shutdown hostname(config)#failover link <state_interface_name>
      <state_interface_physical> hostname(config)#failover interface ip
      <state_interface_name> <state_interface_ip> <state_interface_mask> standby
      <peer_state_ip> hostname(config)#interface <state_interface_physical>
      hostname(config-if)#no shutdown hostname(config)#failover
      hostname(config)#write memory • Step 6: Set up IPSEC preshared key
      hostname(config)#failover ipsec pre-shared-key *********** Default Value:
      Disabled by default References: 1.
      https://www.cisco.com/c/en/us/td/docs/security/asa/asa90/configuration/guide/as
      a_90_cli_config/ha_active_standby.html
    compliance:
      - cis_cisco_asa_9_x_v1_1_0_1_2_3

  - rule_id: cisco_asa.cis.1.unused_interfaces_is_disable
    title: "Ensure 'Unused Interfaces' is disable"
    severity: high
    automation_type: automated
    cis_control: '1.2.4'
    cis_section: '1'
    profile_applicability: "Level 1"
    scope: cisco_asa.section_1.unused_interfaces_is_disable
    assertion:
      field: value
      operator: equals
      expected: "yes"
    remediation: >
      • Step 1: Identify the physical name <interface_physical_name> of the unused
      interfaces that are not disabled • Step 2: For each of the identified
      interfaces, run the following command Hostname(config)#interface
      <interface_physical_name> Hostname(config-if)#shutdown References: 1.
      https://www.cisco.com/c/en/us/td/docs/security/asa/asa90/configuration/guide/as
      a_90_cli_config/ha_active_standby.html
    compliance:
      - cis_cisco_asa_9_x_v1_1_0_1_2_4

  - rule_id: cisco_asa.cis.1.image_authenticity_is_correct
    title: "Ensure 'Image Authenticity' is correct"
    severity: high
    automation_type: automated
    cis_control: '1.3.2'
    cis_section: '1'
    profile_applicability: "Level 1"
    scope: cisco_asa.section_1.image_authenticity_is_correct
    assertion:
      field: value
      operator: equals
      expected: "on"
    remediation: >
      • Step 1: Correct the errors on the hardware and software • Step 2: Run the
      audit procedure until the system is compliant • Step 3: Implement secure
      delivery of hardware and harden the software distribution server References:
      1.
      https://tools.cisco.com/security/center/resources/asa_integrity_assurance.html
    compliance:
      - cis_cisco_asa_9_x_v1_1_0_1_3_2

  - rule_id: cisco_asa.cis.1.aaa_local_authentication_max_failed_attempts_is
    title: "Ensure 'aaa local authentication max failed attempts' is set to less than or equal to '3'"
    severity: high
    automation_type: automated
    cis_control: '1.4.1.1'
    cis_section: '1'
    profile_applicability: "Level 1"
    scope: cisco_asa.section_1.aaa_local_authentication_max_failed_attempts_is
    assertion:
      field: row_count
      operator: lte
      expected: "true"
    remediation: >
      Run the following to configure the maximum number of consecutive local login
      failures to be less than or equal to 3 hostname(config)# aaa local
      authentication attempts max-fail 3 Default Value: The aaa local authentication
      max login attempts is disabled by default References: 1.
      https://www.cisco.com/c/en/us/td/docs/ios-
      xml/ios/sec_usr_aaa/configuration/xe- 3s/sec-usr-aaa-xe-3s-book/sec-login-pw-
      retry.html Additional Information: The feature does not affect the privilege
      level 15 users.
    compliance:
      - cis_cisco_asa_9_x_v1_1_0_1_4_1_1

  - rule_id: cisco_asa.cis.1.known_default_accounts_do_not_exist
    title: "Ensure known default accounts do not exist"
    severity: high
    automation_type: automated
    cis_control: '1.4.1.3'
    cis_section: '1'
    profile_applicability: "Level 1"
    scope: cisco_asa.section_1.known_default_accounts_do_not_exist
    assertion:
      field: row_count
      operator: exists
      expected: "no"
    remediation: >
      • Step 1: Acquire the Enterprise customized administrative account
      <customized\_admin\_account> and password <admin\_password> • Step 2: Run the
      following to create the customized administrative account as well as the
      required privilege level <privilege\_level> hostname(config)#username
      <customized_admin_account> password <admin_password> privilege
      <privilege_level> • Step 3: Run the following to delete the known default
      accounts identified during the audit hostname(config)# no username
      <known_default_account> Default Value: The default username used for the first
      SSH connection or aaa authentication telnet console is asa but for versions
      from 8.4(2) and above, there is no default username References: 1.
      https://www.cisco.com/c/en/us/td/docs/security/asa/asa97/configuration/general/a
      sa-97-general-config/basic-hostname-pw.html
    compliance:
      - cis_cisco_asa_9_x_v1_1_0_1_4_1_3

  - rule_id: cisco_asa.cis.1.tacacs_radius_is_configured_correctly
    title: "Ensure 'TACACS+/RADIUS' is configured correctly"
    severity: medium
    automation_type: automated
    cis_control: '1.4.2.1'
    cis_section: '1'
    profile_applicability: "Level 2"
    scope: cisco_asa.section_1.tacacs_radius_is_configured_correctly
    assertion:
      field: value
      operator: exists
      expected: "true"
    remediation: >
      • Step 1: Acquire the enterprise standard protocol (protocol_name) for
      authentication (TACACS+ or RADIUS) • Step 2: Run the following to configure
      the AAA server-group for the required protocol hostname(config)#aaa-server
      <server-group_name> protocol <protocol_name> • Step 3: Run the following to
      configure the AAA server: hostname(config)#aaa-server <server-group_name>
      (<interface_name>) host <aaa- server_ip> <shared_key> server-group_name: the
      above server-group configured interface_name: the network interface from which
      the AAA server will be accessed aaa-server_ip: the IP address of the AAA
      server shared_key: the TACACS+ or RADIUS shared key Default Value: The AAA
      server configuraton is by default disabled References: 1.
      https://www.cisco.com/c/en/us/td/docs/security/asa/asa96/configuration/general/a
      sa-96-general-config/aaa-tacacs.html 2.
      https://www.cisco.com/c/en/us/td/docs/security/asa/asa96/configuration/general/a
      sa-96-general-config/aaa-radius.html
    compliance:
      - cis_cisco_asa_9_x_v1_1_0_1_4_2_1

  - rule_id: cisco_asa.cis.1.aaa_authentication_secure_http_client_is
    title: "Ensure 'aaa authentication secure-http-client' is configured correctly"
    severity: high
    automation_type: automated
    cis_control: '1.4.3.3'
    cis_section: '1'
    profile_applicability: "Level 1"
    scope: cisco_asa.section_1.aaa_authentication_secure_http_client_is
    assertion:
      field: value
      operator: exists
      expected: "true"
    remediation: >
      Configure the secure aaa authentication for http hostname(config)#aaa
      authentication secure-http-client Default Value: The secure aaa authentication
      for http is disabled by default References: 1.
      https://www.cisco.com/c/en/us/td/docs/security/asa/asa90/configuration/guide/as
      a_90_cli_config/access_fwaaa.html
    compliance:
      - cis_cisco_asa_9_x_v1_1_0_1_4_3_3

  - rule_id: cisco_asa.cis.1.aaa_command_authorization_is_configured_correctly
    title: "Ensure 'aaa command authorization' is configured correctly"
    severity: high
    automation_type: automated
    cis_control: '1.4.4.1'
    cis_section: '1'
    profile_applicability: "Level 1"
    scope: cisco_asa.section_1.aaa_command_authorization_is_configured_correctly
    assertion:
      field: value
      operator: exists
      expected: "true"
    remediation: >
      Run the following to determine the remote the TACACS+/RADIUS servers
      (server_group_name) as source of authorization and the local database (LOCAL)
      as fallback method if the remote servers are not available. hostname(config)#
      aaa authorization command <server-group_name> LOCAL This implies that locally,
      each privilege has its sets of commands configured and username associated
      just in accordance with the privilege and command definition in the remote
      servers. References: 1.
      https://www.cisco.com/c/en/us/td/docs/security/asa/asa94/config-
      guides/cli/general/asa-94-general-config/aaa-local.html
    compliance:
      - cis_cisco_asa_9_x_v1_1_0_1_4_4_1

  - rule_id: cisco_asa.cis.1.ssh_source_restriction_is_set_to_an_authorized_ip
    title: "Ensure 'SSH source restriction' is set to an authorized IP address"
    severity: high
    automation_type: automated
    cis_control: '1.6.1'
    cis_section: '1'
    profile_applicability: "Level 1"
    scope: cisco_asa.section_1.ssh_source_restriction_is_set_to_an_authorized_ip
    assertion:
      field: value
      operator: equals
      expected: "true"
    remediation: >
      Run the following to enable SSH access source restriction hostname(config)#ssh
      <source_ip> <source_netmask> <interface_name> References: 1.
      http://www.cisco.com/c/en/us/td/docs/security/asa/asa91/configuration/general/as
      a_91_general_config/admin_management.html
    compliance:
      - cis_cisco_asa_9_x_v1_1_0_1_6_1

  - rule_id: cisco_asa.cis.1.ssh_version_2_is_enabled
    title: "Ensure 'SSH version 2' is enabled"
    severity: high
    automation_type: automated
    cis_control: '1.6.2'
    cis_section: '1'
    profile_applicability: "Level 1"
    scope: cisco_asa.section_1.ssh_version_2_is_enabled
    assertion:
      field: enabled
      operator: equals
      expected: "true"
    remediation: >
      Run the following to enable SSH version 2 hostname(config)# ssh version 2
      Default Value: By default, the security appliance allows both SSH Version 1
      and Version 2 References: 1.
      https://www.cisco.com/c/en/us/support/docs/security/asa-5500-x-series-next-
      generation-firewalls/118075-configure-asa-00.pdf
    compliance:
      - cis_cisco_asa_9_x_v1_1_0_1_6_2

  - rule_id: cisco_asa.cis.1.rsa_key_pair_is_greater_than_or_equal_to_2048_bits
    title: "Ensure 'RSA key pair' is greater than or equal to 2048 bits"
    severity: medium
    automation_type: automated
    cis_control: '1.6.3'
    cis_section: '1'
    profile_applicability: "Level 2"
    scope: cisco_asa.section_1.rsa_key_pair_is_greater_than_or_equal_to_2048_bits
    assertion:
      field: value
      operator: gte
      expected: "no"
    remediation: >
      • Step 1: Acquire the enterprise standard RSA key size greater or equal than
      2048 bits • Step 2: If the audit procedure revealed existing non-compliant key
      pairs, run the following to remove them: hostname(config)#crypto key zeroize
      rsa • Step 3: Run the following to generate compliant RSA key pair:
      hostname(config)# crypto key generate rsa modulus <enterprise_RSA_key_size> •
      Step 4: Run the following to save the RSA keys to persistent Flash memory
      hostname(config)#write memory References: 1.
      http://www.cisco.com/c/en/us/td/docs/security/asa/asa91/configuration/general/as
      a_91_general_config/admin_management.html
    compliance:
      - cis_cisco_asa_9_x_v1_1_0_1_6_3

  - rule_id: cisco_asa.cis.1.scp_protocol_is_set_to_enable_for_files_transfers
    title: "Ensure 'SCP protocol' is set to Enable for files transfers"
    severity: medium
    automation_type: automated
    cis_control: '1.6.4'
    cis_section: '1'
    profile_applicability: "Level 2"
    scope: cisco_asa.section_1.scp_protocol_is_set_to_enable_for_files_transfers
    assertion:
      field: value
      operator: equals
      expected: "true"
    remediation: >
      Run the following command to enable secure copy hostname(config)# ssh scopy
      enable References: 1.
      https://www.cisco.com/c/en/us/td/docs/security/asa/asa91/configuration/general/a
      sa_91_general_config/admin_swconfig.html
    compliance:
      - cis_cisco_asa_9_x_v1_1_0_1_6_4

  - rule_id: cisco_asa.cis.1.http_source_restriction_is_set_to_an_authorized
    title: "Ensure 'HTTP source restriction' is set to an authorized IP address"
    severity: medium
    automation_type: automated
    cis_control: '1.7.1'
    cis_section: '1'
    profile_applicability: "Level 2"
    scope: cisco_asa.section_1.http_source_restriction_is_set_to_an_authorized
    assertion:
      field: value
      operator: equals
      expected: "true"
    remediation: >
      Run the following to enable HTTP access source restriction
      hostname(config)#http <source_ip> <source_netmask> <interface_name>
      References: 1.
      http://www.cisco.com/c/en/us/td/docs/security/asa/asa91/configuration/general/as
      a_91_general_config/admin_management.html
    compliance:
      - cis_cisco_asa_9_x_v1_1_0_1_7_1

  - rule_id: cisco_asa.cis.1.console_session_timeout_is_less_than_or_equal_to
    title: "Ensure 'console session timeout' is less than or equal to '5' minutes"
    severity: high
    automation_type: automated
    cis_control: '1.8.1'
    cis_section: '1'
    profile_applicability: "Level 1"
    scope: cisco_asa.section_1.console_session_timeout_is_less_than_or_equal_to
    assertion:
      field: value
      operator: equals
      expected: "true"
    remediation: >
      • Step 1: Run the following command to set the console timeout to less than or
      equal to 5 minutes hostname(config)# console timeout 5 Default Value: The
      default timeout is 0, which means the console session will not time out.
      References: 1.
      http://www.cisco.com/c/en/us/td/docs/security/asa/asa91/configuration/general/as
      a_91_general_config/admin_management.html
    compliance:
      - cis_cisco_asa_9_x_v1_1_0_1_8_1

  - rule_id: cisco_asa.cis.1.ssh_session_timeout_is_less_than_or_equal_to_5
    title: "Ensure 'SSH session timeout' is less than or equal to '5' minutes"
    severity: high
    automation_type: automated
    cis_control: '1.8.2'
    cis_section: '1'
    profile_applicability: "Level 1"
    scope: cisco_asa.section_1.ssh_session_timeout_is_less_than_or_equal_to_5
    assertion:
      field: value
      operator: equals
      expected: "true"
    remediation: >
      • Step 1: Run the following to set the SSH timeout to 5 minutes
      hostname(config)# ssh timeout 5 Default Value: The default session timeout
      value is 5 minutes. References: 1.
      http://www.cisco.com/c/en/us/td/docs/security/asa/asa91/configuration/general/as
      a_91_general_config/admin_management.html
    compliance:
      - cis_cisco_asa_9_x_v1_1_0_1_8_2

  - rule_id: cisco_asa.cis.1.http_idle_timeout_is_less_than_or_equal_to_5
    title: "Ensure 'HTTP idle timeout' is less than or equal to '5' minutes"
    severity: high
    automation_type: automated
    cis_control: '1.8.3'
    cis_section: '1'
    profile_applicability: "Level 1"
    scope: cisco_asa.section_1.http_idle_timeout_is_less_than_or_equal_to_5
    assertion:
      field: value
      operator: equals
      expected: "true"
    remediation: >
      • Step 1: Run the following to set the HTTP timeout to less than or equal to 5
      minutes hostname(config)# http server idle-timeout 5 Default Value: The
      default session timeout value is 20 minutes. References: 1.
      http://www.cisco.com/c/en/us/td/docs/security/asa/asa82/configuration/guide/conf
      ig/intro.html
    compliance:
      - cis_cisco_asa_9_x_v1_1_0_1_8_3

  - rule_id: cisco_asa.cis.1.ntp_authentication_is_enabled
    title: "Ensure 'NTP authentication' is enabled"
    severity: high
    automation_type: automated
    cis_control: '1.9.1.1'
    cis_section: '1'
    profile_applicability: "Level 1"
    scope: cisco_asa.section_1.ntp_authentication_is_enabled
    assertion:
      field: enabled
      operator: equals
      expected: "true"
    remediation: >
      Run the following command to enable NTP authentication hostname(config)#ntp
      authenticate Default Value: Disabled by default References: 1.
      https://www.cisco.com/c/en/us/td/docs/security/asa/asa96/configuration/general/a
      sa-96-general-config/basic-hostname-pw.html
    compliance:
