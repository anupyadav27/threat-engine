tech_type: cisco_asa
category: networking
cis_benchmark: CIS Cisco ASA 9.x v1.1.0
cis_section: '2'

rules:

  - rule_id: cisco_asa.cis.2.ospf_authentication_is_enabled
    title: "Ensure 'OSPF authentication' is enabled"
    severity: medium
    automation_type: automated
    cis_control: '2.1.1'
    cis_section: '2'
    profile_applicability: "Level 2"
    scope: cisco_asa.section_2.ospf_authentication_is_enabled
    assertion:
      field: enabled
      operator: equals
      expected: "no"
    remediation: >
      • Step 1: Acquire the interface <interface_name> used by the firewall to
      receive OSPF routing updates and the area ID <area_id> • Step 2: Agree with
      the neighbor device on the authencation key <key_value> and determine an
      authentication key ID <key_id> • Step 3: Run the following to enable OSPF
      authentication hostname(config)#interface <interface_name> hostname(config-
      if)#ospf authentication message-digest hostname(config-if)#ospf message-
      digest-key <key_id> md5 <key_value> hostname(config-if)#exit
      hostname(config)#area <area_id> authentication message-digest Default Value:
      Disabled by default References: 1.
      https://www.cisco.com/c/en/us/td/docs/security/asa/asa95/configuration/general/a
      sa-95-general-config/route-ospf.html
    compliance:
      - cis_cisco_asa_9_x_v1_1_0_2_1_1

  - rule_id: cisco_asa.cis.2.eigrp_authentication_is_enabled
    title: "Ensure 'EIGRP authentication' is enabled"
    severity: medium
    automation_type: automated
    cis_control: '2.1.2'
    cis_section: '2'
    profile_applicability: "Level 2"
    scope: cisco_asa.section_2.eigrp_authentication_is_enabled
    assertion:
      field: enabled
      operator: equals
      expected: "no"
    remediation: >
      • Step 1: Acquire the interface <interface_name> used by the firewall to
      receive EIGRP routing updates and the EIGRP Autonomous System number
      <as_number> • Step 2: Agree with the neighbor device on the authencation key
      <key_value> and determine an authentication key ID <key_id> • Step 3: Run the
      following to enable RIP authentication hostname(config)#interface
      <interface_name> hostname(config-if)#authentication mode eigrp <as_number> md5
      hostname(config-if)#authentication key eigrp <as_number> <key_value> key-id
      <key_id> Default Value: Disabled by default References: 1.
      https://www.cisco.com/c/en/us/td/docs/security/asa/asa95/configuration/general/a
      sa-95-general-config/route-eigrp.html
    compliance:
      - cis_cisco_asa_9_x_v1_1_0_2_1_2

  - rule_id: cisco_asa.cis.2.bgp_authentication_is_enabled
    title: "Ensure 'BGP authentication' is enabled"
    severity: medium
    automation_type: automated
    cis_control: '2.1.3'
    cis_section: '2'
    profile_applicability: "Level 2"
    scope: cisco_asa.section_2.bgp_authentication_is_enabled
    assertion:
      field: enabled
      operator: equals
      expected: "no"
    remediation: >
      Step 1 Enable BGP. Step 2 Define the Best Path for a BGP Routing Process. Step
      3 Configure Policy Lists. Step 4 Configure AS Path Filters. Step 5 Configure
      Community Rules. Step 6 Configure IPv4 Address Family Settings. Step 7
      Configure IPv6 Address Family Settings. ciscoasa#(config)router bgp 2
      ciscoasa(config-router)# bgp default local-preference 500 ciscoasa(config)#
      policy-list Example-policy-list1 permit ciscoasa(config)# as-path access-list
      35 permit testaspath ciscoasa(config)# community-list standard excomm1 permit
      100 internet no- advertise no-export ciscoasa(config-router-af)# bgp router-id
      10.86.118.3 ciscoasa(config-router-af) aggregate-address 10.86.118.0
      255.255.255.0 as-set summary-only suppress-map example1 advertise-map example1
      attribute-map example1 Default Value: not enabled References: 1.
      https://www.cisco.com/c/en/us/td/docs/security/asa/asa95/configuration/general/a
      sa-95-general-config/route-bgp.html
    compliance:
      - cis_cisco_asa_9_x_v1_1_0_2_1_3

  - rule_id: cisco_asa.cis.2.noproxyarp_is_enabled_for_untrusted_interfaces
    title: "Ensure 'noproxyarp' is enabled for untrusted interfaces"
    severity: medium
    automation_type: automated
    cis_control: '2.2'
    cis_section: '2'
    profile_applicability: "Level 2"
    scope: cisco_asa.section_2.noproxyarp_is_enabled_for_untrusted_interfaces
    assertion:
      field: enabled
      operator: equals
      expected: "on"
    remediation: >
      • Step 1: Acquire the name of the untrusted interface
      <untrusted_interface_name> • Step 2: Run the following command to disable the
      Proxy-ARP on the untrusted interface. hostname(config)# sysopt noproxyarp
      <untrusted_interface_name> Default Value: Proxy-ARP is enabled by default
      References: 1. https://community.cisco.com/t5/network-security/disbling-proxy-
      arp/td-p/3096028
    compliance:
      - cis_cisco_asa_9_x_v1_1_0_2_2

  - rule_id: cisco_asa.cis.2.dns_guard_is_enabled
    title: "Ensure 'DNS Guard' is enabled"
    severity: medium
    automation_type: automated
    cis_control: '2.3'
    cis_section: '2'
    profile_applicability: "Level 2"
    scope: cisco_asa.section_2.dns_guard_is_enabled
    assertion:
      field: enabled
      operator: equals
      expected: "true"
    remediation: >
      Run the following command to enable the DNS Guard function. hostname(config)#
      dns-guard Default Value: The function is disabled for the related software
      versions References: 1. http://www.cisco.com/c/en/us/td/docs/security/asa/asa-
      command-reference/A- H/cmdref1/d3.html
    compliance:
      - cis_cisco_asa_9_x_v1_1_0_2_3

  - rule_id: cisco_asa.cis.2.dhcp_services_are_disabled_for_untrusted
    title: "Ensure DHCP services are disabled for untrusted interfaces"
    severity: high
    automation_type: automated
    cis_control: '2.4'
    cis_section: '2'
    profile_applicability: "Level 1"
    scope: cisco_asa.section_2.dhcp_services_are_disabled_for_untrusted
    assertion:
      field: enabled
      operator: equals
      expected: "false"
    remediation: >
      • Step 1: Acquire the name of the untrusted interface
      <untrusted_interface_name> • Step 2: Run the following command to disable DHCP
      service on the untrusted interface hostname(config)# no dhcpd enable
      <untrusted_interface_name> • Step 3: Run the following command to disable DHCP
      Relay service on the untrusted interface hostname(config)# no dhcprelay enable
      <untrusted_interface_name> Default Value: Disabled by default References: 1.
      http://www.cisco.com/c/en/us/td/docs/security/asa/asa90/configuration/guide/asa
      _90_cli_config/basic_dhcp.html
    compliance:
      - cis_cisco_asa_9_x_v1_1_0_2_4

  - rule_id: cisco_asa.cis.2.icmp_is_restricted_for_untrusted_interfaces
    title: "Ensure ICMP is restricted for untrusted interfaces"
    severity: high
    automation_type: automated
    cis_control: '2.5'
    cis_section: '2'
    profile_applicability: "Level 1"
    scope: cisco_asa.section_2.icmp_is_restricted_for_untrusted_interfaces
    assertion:
      field: value
      operator: equals
      expected: "on"
    remediation: >
      • Step 1: Acquire the untrusted interface name <untrusted_interface_name>, the
      trusted subnet and corresponding subnet mask • Step 2: Run the following
      command to allow ICMP from the trusted subnet to the untrusted interface.
      Repeat the command if there are more than one trusted subnets identified.
      hostname(config)# icmp permit <subnet> <mask> <untrusted_interface_name> •
      Step 3: Run the following command to deny ICMP from all other sources to the
      untrusted interface. hostname(config)# icmp deny any<untrusted_interface_name>
      Default Value: ICMP is enabled by default. References: 1.
      https://www.cisco.com/c/en/us/td/docs/security/asa/asa93/configuration/firewall/a
      sa-firewall-cli/access-rules.html
    compliance:
      - cis_cisco_asa_9_x_v1_1_0_2_5


