tech_type: check_point
category: networking
cis_benchmark: CIS Check Point v1.1.0
cis_section: '3'

rules:

  - rule_id: check_point.cis.3.enable_the_firewall_stealth_rule
    title: "Enable the Firewall Stealth Rule"
    severity: medium
    automation_type: automated
    cis_control: '3.1'
    cis_section: '3'
    profile_applicability: "Level 2"
    scope: check_point.section_3.enable_the_firewall_stealth_rule
    assertion:
      field: value
      operator: equals
      expected: "on"
    remediation: >
      Login to the Management Server via SmartDashboard and create or edit the
      stealth rule, allowed only required IP address to manage the gateway and make
      sure it is on top of all rules.
    compliance:
      - cis_check_point_v1_1_0_3_1

  - rule_id: check_point.cis.3.hit_count_is_enable_for_the_rules
    title: "Ensure Hit count is Enable for the rules"
    severity: medium
    automation_type: automated
    cis_control: '3.4'
    cis_section: '3'
    profile_applicability: "Level 2"
    scope: check_point.section_3.hit_count_is_enable_for_the_rules
    assertion:
      field: row_count
      operator: equals
      expected: "true"
    remediation: >
      Go to the following path in Smart Console and Enable the Enable Hit Count
      setting. Navigate to Global Properties > Hit Count Checked the 'Enable Hit
      Count' setting
    compliance:
      - cis_check_point_v1_1_0_3_4

  - rule_id: check_point.cis.3.review_and_log_implied_rules
    title: "Review and Log Implied Rules"
    severity: medium
    automation_type: automated
    cis_control: '3.9'
    cis_section: '3'
    profile_applicability: "Level 2"
    scope: check_point.section_3.review_and_log_implied_rules
    assertion:
      field: value
      operator: equals
      expected: "true"
    remediation: >
      Go to the following path in the Smart Console and enabled the Log Implied
      Rules. Navigate to Global Properties > Firewall Enable the Log Implied Rules
      Default Value: Disabled
    compliance:
      - cis_check_point_v1_1_0_3_9

  - rule_id: check_point.cis.3.drop_out_of_state_tcp_packets_is_enabled
    title: "Ensure Drop Out of State TCP Packets is enabled"
    severity: medium
    automation_type: automated
    cis_control: '3.10'
    cis_section: '3'
    profile_applicability: "Level 2"
    scope: check_point.section_3.drop_out_of_state_tcp_packets_is_enabled
    assertion:
      field: enabled
      operator: equals
      expected: "on"
    remediation: >
      Go to the following path and checked the Drop Out of State TCP Packets and Log
      on Drop. SmartConsole > Global Properties > Stateful Inspection Checked the
      Drop Out of State TCP Packets and Log on Drop Default Value: Enabled
    compliance:
      - cis_check_point_v1_1_0_3_10

  - rule_id: check_point.cis.3.drop_out_of_state_icmp_packets_is_enabled
    title: "Ensure Drop Out of State ICMP Packets is enabled"
    severity: medium
    automation_type: automated
    cis_control: '3.11'
    cis_section: '3'
    profile_applicability: "Level 2"
    scope: check_point.section_3.drop_out_of_state_icmp_packets_is_enabled
    assertion:
      field: enabled
      operator: equals
      expected: "on"
    remediation: >
      Go to the following path and checked the Drop Out of State ICMP Packets and
      Log on Drop. SmartConsole > Global Properties > Stateful Inspection Checked
      the Drop Out of State ICMP Packets and Log on Drop Default Value: Enabled
    compliance:
      - cis_check_point_v1_1_0_3_11

  - rule_id: check_point.cis.3.anti_spoofing_is_enabled_and_action_is_set_to
    title: "Ensure Anti-Spoofing is enabled and action is set to Prevent for all Interfaces"
    severity: medium
    automation_type: automated
    cis_control: '3.12'
    cis_section: '3'
    profile_applicability: "Level 2"
    scope: check_point.section_3.anti_spoofing_is_enabled_and_action_is_set_to
    assertion:
      field: enabled
      operator: equals
      expected: "on"
    remediation: >
      For all managed gateways enable the Anti-Spoofing, set the Anti-Spoofing
      action to Prevent and set the tracking to Log. SmartConsole > Gateways &
      Servers > select managed Gateway > Network Management > Select each interface
      > General > Modify - Checked the Perform Anti-Spoofing based on Interface
      topology - Set the Anti-Spoofing action to Prevent - Set the Spoof Tracking to
      Log 101 | P a g e
    compliance:
      - cis_check_point_v1_1_0_3_12

  - rule_id: check_point.cis.3.disk_space_alert_is_set
    title: "Ensure Disk Space Alert is set"
    severity: high
    automation_type: automated
    cis_control: '3.13'
    cis_section: '3'
    profile_applicability: "Level 1"
    scope: check_point.section_3.disk_space_alert_is_set
    assertion:
      field: value
      operator: exists
      expected: "true"
    remediation: >
      Go to the following path and configured the Disk Space Alert. SmartConsole >
      Gateways & Servers > Select each Gateway > Logs > Local Storage * Checked the
      When disk space is below and value MBytes or Percentage is configured as per
      the Organization Policy. * Set the Issue alert to Log, Popup Alert, Mail or
      SNMP trap alert.
    compliance:
      - cis_check_point_v1_1_0_3_13

  - rule_id: check_point.cis.3.accept_rip_is_not_enabled
    title: "Ensure Accept RIP is not enabled"
    severity: medium
    automation_type: automated
    cis_control: '3.14'
    cis_section: '3'
    profile_applicability: "Level 2"
    scope: check_point.section_3.accept_rip_is_not_enabled
    assertion:
      field: enabled
      operator: equals
      expected: "true"
    remediation: >
      Go to the following path and Configured the Accept RIP. SmartConsole >
      Gateways & Servers > select each Gateway > Firewall Unchecked the Accept RIP
      Default Value: Disabled 104 | P a g e
    compliance:
      - cis_check_point_v1_1_0_3_14

  - rule_id: check_point.cis.3.accept_domain_name_over_tcp_zone_transfer_is_not
    title: "Ensure Accept Domain Name over TCP (Zone Transfer) is not enabled"
    severity: medium
    automation_type: automated
    cis_control: '3.15'
    cis_section: '3'
    profile_applicability: "Level 2"
    scope: check_point.section_3.accept_domain_name_over_tcp_zone_transfer_is_not
    assertion:
      field: enabled
      operator: equals
      expected: "true"
    remediation: >
      Go to the following path and Configured the Accept Accept Domain Name over TCP
      (Zone Transfer). SmartConsole > Gateways & Servers > select each Gateway >
      Firewall Unchecked the Accept Accept Domain Name over TCP (Zone Transfer) 106
      | P a g e
    compliance:
      - cis_check_point_v1_1_0_3_15

  - rule_id: check_point.cis.3.accept_domain_name_over_udp_queries_is_not_enabled
    title: "Ensure Accept Domain Name over UDP (Queries) is not enabled"
    severity: medium
    automation_type: automated
    cis_control: '3.16'
    cis_section: '3'
    profile_applicability: "Level 2"
    scope: check_point.section_3.accept_domain_name_over_udp_queries_is_not_enabled
    assertion:
      field: enabled
      operator: equals
      expected: "true"
    remediation: >
      Go to the following path and Configured the Accept Accept Domain Name over UDP
      (Queries). SmartConsole > Gateways & Servers > select each Gateway > Firewall
      Unchecked the Accept Accept Domain Name over UDP (Queries) 108 | P a g e
    compliance:
      - cis_check_point_v1_1_0_3_16

  - rule_id: check_point.cis.3.accept_icmp_requests_is_not_enabled
    title: "Ensure Accept ICMP Requests is not enabled"
    severity: medium
    automation_type: automated
    cis_control: '3.17'
    cis_section: '3'
    profile_applicability: "Level 2"
    scope: check_point.section_3.accept_icmp_requests_is_not_enabled
    assertion:
      field: enabled
      operator: equals
      expected: "true"
    remediation: >
      Go to the following path and Configured the Accept Accept ICMP Requests.
      SmartConsole > Gateways & Servers > select each Gateway > Firewall Unchecked
      the Accept Accept ICMP Requests 110 | P a g e
    compliance:
      - cis_check_point_v1_1_0_3_17

  - rule_id: check_point.cis.3.allow_bi_directional_nat_is_enabled
    title: "Ensure Allow bi-directional NAT is enabled"
    severity: medium
    automation_type: automated
    cis_control: '3.18'
    cis_section: '3'
    profile_applicability: "Level 2"
    scope: check_point.section_3.allow_bi_directional_nat_is_enabled
    assertion:
      field: enabled
      operator: equals
      expected: "true"
    remediation: >
      Go to the following path and Configured the Allow bi-directional NAT.
      SmartConsole > Gateways & Servers > select each Gateway > NAT - Network
      Address Translation Unchecked the Allow bi-directional NAT 111 | P a g e
    compliance:
      - cis_check_point_v1_1_0_3_18

  - rule_id: check_point.cis.3.automatic_arp_configuration_nat_is_enabled
    title: "Ensure Automatic ARP Configuration NAT is enabled"
    severity: medium
    automation_type: automated
    cis_control: '3.19'
    cis_section: '3'
    profile_applicability: "Level 2"
    scope: check_point.section_3.automatic_arp_configuration_nat_is_enabled
    assertion:
      field: enabled
      operator: equals
      expected: "true"
    remediation: >
      Go to the following path and Configured the Automatic ARP Configuration NAT.
      SmartConsole > Gateways & Servers > select each Gateway > NAT - Network
      Address Translation Unchecked the Automatic ARP Configuration NAT
    compliance:
      - cis_check_point_v1_1_0_3_19

  - rule_id: check_point.cis.3.logging_is_enabled_for_track_options_of_global
    title: "Ensure Logging is enabled for Track Options of Global Properties"
    severity: high
    automation_type: automated
    cis_control: '3.20'
    cis_section: '3'
    profile_applicability: "Level 1"
    scope: check_point.section_3.logging_is_enabled_for_track_options_of_global
    assertion:
      field: enabled
      operator: equals
      expected: "true"
