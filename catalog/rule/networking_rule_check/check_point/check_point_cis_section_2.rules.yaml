tech_type: check_point
category: networking
cis_benchmark: CIS Check Point v1.1.0
cis_section: '2'

rules:

  - rule_id: check_point.cis.2.message_of_the_day_motd_is_set
    title: "Ensure 'Message Of The Day (MOTD)' is set"
    severity: high
    automation_type: automated
    cis_control: '2.1.2'
    cis_section: '2'
    profile_applicability: "Level 1"
    scope: check_point.section_2.message_of_the_day_motd_is_set
    assertion:
      field: value
      operator: equals
      expected: "on"
    remediation: >
      Run the following command to enable and configured the MOTD setting. CLI:
      Hostname> set message motd on msgvalue 'MOTD BANNER' 41 | P a g e GUI:
      Navigate to System Management -> Messages -> Message of the day Checked the
      Message of the day and add 'MOTD Banner'.
    compliance:
      - cis_check_point_v1_1_0_2_1_2

  - rule_id: check_point.cis.2.core_dump_is_enabled
    title: "Ensure Core Dump is enabled"
    severity: high
    automation_type: automated
    cis_control: '2.1.3'
    cis_section: '2'
    profile_applicability: "Level 1"
    scope: check_point.section_2.core_dump_is_enabled
    assertion:
      field: enabled
      operator: equals
      expected: "true"
    remediation: >
      Run the following command to set Core Dump. Hostname> set core-dump enable
      GUI: Navigate to System Management > Core Dump > select Enable Core Dumps
      Default Value: enabled 43 | P a g e
    compliance:
      - cis_check_point_v1_1_0_2_1_3

  - rule_id: check_point.cis.2.config_state_is_saved
    title: "Ensure Config-state is saved"
    severity: high
    automation_type: automated
    cis_control: '2.1.4'
    cis_section: '2'
    profile_applicability: "Level 1"
    scope: check_point.section_2.config_state_is_saved
    assertion:
      field: value
      operator: equals
      expected: "true"
    remediation: >
      Run the following command to save the configuration. Hostname> save config
      Default Value: NA
    compliance:
      - cis_check_point_v1_1_0_2_1_4

  - rule_id: check_point.cis.2.unused_interfaces_are_disabled
    title: "Ensure unused interfaces are disabled"
    severity: high
    automation_type: automated
    cis_control: '2.1.5'
    cis_section: '2'
    profile_applicability: "Level 1"
    scope: check_point.section_2.unused_interfaces_are_disabled
    assertion:
      field: enabled
      operator: equals
      expected: "false"
    remediation: >
      Run the following command disable the unused interface. CLI: Hostname> set
      interface <Interface_Number> state off GUI: Navigate to Network Management >
      Network Interfaces > Open unused Interface > unchecked Enable Default Value:
      NA 46 | P a g e
    compliance:
      - cis_check_point_v1_1_0_2_1_5

  - rule_id: check_point.cis.2.dns_server_is_configured
    title: "Ensure DNS server is configured"
    severity: high
    automation_type: automated
    cis_control: '2.1.6'
    cis_section: '2'
    profile_applicability: "Level 1"
    scope: check_point.section_2.dns_server_is_configured
    assertion:
      field: value
      operator: exists
      expected: "true"
    remediation: >
      Run the following command to set DNS server. CLI: Hostname> set dns primary
      <IP_Address> Hostname> set dns secondary <IP_Address> Hostname> set dns
      tertiary <IP_Address> 48 | P a g e GUI: Navigate to Network Management > Hosts
      and DNS > DNS Set Primary, secondary and tertiary DNS server address. Default
      Value: Not Configured
    compliance:
      - cis_check_point_v1_1_0_2_1_6

  - rule_id: check_point.cis.2.ipv6_is_disabled_if_not_used
    title: "Ensure IPv6 is disabled if not used"
    severity: high
    automation_type: automated
    cis_control: '2.1.7'
    cis_section: '2'
    profile_applicability: "Level 1"
    scope: check_point.section_2.ipv6_is_disabled_if_not_used
    assertion:
      field: enabled
      operator: equals
      expected: "false"
    remediation: >
      Run the following command to enable or disable IPv6. Hostname> set ipv6-state
      on Hostname> set ipv6-state off Default Value: ipv6 is disabled
    compliance:
      - cis_check_point_v1_1_0_2_1_7

  - rule_id: check_point.cis.2.host_name_is_set
    title: "Ensure Host Name is set"
    severity: high
    automation_type: automated
    cis_control: '2.1.8'
    cis_section: '2'
    profile_applicability: "Level 1"
    scope: check_point.section_2.host_name_is_set
    assertion:
      field: value
      operator: equals
      expected: "true"
    remediation: >
      Run the following command to set Host Name. CLI: Hostname> set hostname <name>
      GUI: Navigate to Network Management > Hosts and DNS > System Name > Host Name
    compliance:
      - cis_check_point_v1_1_0_2_1_8

  - rule_id: check_point.cis.2.dhcp_is_disabled
    title: "Ensure DHCP is disabled"
    severity: high
    automation_type: automated
    cis_control: '2.1.10'
    cis_section: '2'
    profile_applicability: "Level 1"
    scope: check_point.section_2.dhcp_is_disabled
    assertion:
      field: enabled
      operator: equals
      expected: "false"
    remediation: >
      Run the following command to disable the DHCP. CLI: Hostname> set dhcp server
      disable GUI: Navigate to Network Management > DHCP Server > DHCP Server
      Configuration > veriify Enable DHCP Server is unchecked Default Value: DHCP
      Server Disabled 54 | P a g e
    compliance:
      - cis_check_point_v1_1_0_2_1_10

  - rule_id: check_point.cis.2.snmp_agent_is_disabled
    title: "Ensure SNMP agent is disabled"
    severity: high
    automation_type: automated
    cis_control: '2.2.1'
    cis_section: '2'
    profile_applicability: "Level 1"
    scope: check_point.section_2.snmp_agent_is_disabled
    assertion:
      field: enabled
      operator: equals
      expected: "false"
    remediation: >
      Run the following command to configure the SNMP. CLI: Hostname> set snmp agent
      off GUI: System Management > SNMP > Unhecked the Enable SNMP Agent 56 | P a g
      e Default Value: SNMP Agent Disabled
    compliance:
      - cis_check_point_v1_1_0_2_2_1

  - rule_id: check_point.cis.2.snmp_version_is_set_to_v3_only
    title: "Ensure SNMP version is set to v3-Only"
    severity: high
    automation_type: automated
    cis_control: '2.2.2'
    cis_section: '2'
    profile_applicability: "Level 1"
    scope: check_point.section_2.snmp_version_is_set_to_v3_only
    assertion:
      field: version
      operator: equals
      expected: "true"
    remediation: >
      Run the following command to configure the SNMP agent-version v3-only CLI:
      Hostname> set snmp agent-version v3-Only 58 | P a g e GUI: Navigate to System
      Management > SNMP > Select V3-Only in Version Default Value: Not Configured
    compliance:
      - cis_check_point_v1_1_0_2_2_2

  - rule_id: check_point.cis.2.snmp_traps_is_enabled
    title: "Ensure SNMP traps is enabled"
    severity: high
    automation_type: automated
    cis_control: '2.2.3'
    cis_section: '2'
    profile_applicability: "Level 1"
    scope: check_point.section_2.snmp_traps_is_enabled
    assertion:
      field: enabled
      operator: equals
      expected: "true"
    remediation: >
      Run the following command to Configure the SNMP traps. CLI: Hostname> set snmp
      traps trap authorizationError enable Hostname> set snmp traps trap coldStart
      enable Hostname> set snmp traps trap configurationChange enable Hostname> set
      snmp traps trap configurationSave enable Hostname> set snmp traps trap
      linkUpLinkDown enable Hostname> set snmp traps trap lowDiskSpace enable 60 | P
      a g e GUI: Navigate to System Management > SNMP > Enabled Traps > Set and
      select the following traps uthorizationError, coldStart, configurationChange,
      configurationSave, linkUpLinkDown and lowDiskSpace Default Value: Not
      Configured
    compliance:
      - cis_check_point_v1_1_0_2_2_3

  - rule_id: check_point.cis.2.snmp_traps_receivers_is_set
    title: "Ensure SNMP traps receivers is set"
    severity: high
    automation_type: automated
    cis_control: '2.2.4'
    cis_section: '2'
    profile_applicability: "Level 1"
    scope: check_point.section_2.snmp_traps_receivers_is_set
    assertion:
      field: value
      operator: equals
      expected: "true"
    remediation: >
      Run the following command to Configure the SNMP traps receivers. CLI:
      Hostname> add snmp traps receiver 10.10.168.86 version v3 GUI: Navigate to
      System Management > SNMP > Trap Receivers Setting > Add > Add IP Address
      Version details. 62 | P a g e Default Value: Not Configured
    compliance:
      - cis_check_point_v1_1_0_2_2_4

  - rule_id: check_point.cis.2.ntp_is_enabled_and_ip_address_is_set_for_primary
    title: "Ensure NTP is enabled and IP address is set for Primary and Secondary NTP server"
    severity: high
    automation_type: automated
    cis_control: '2.3.1'
    cis_section: '2'
    profile_applicability: "Level 1"
    scope: check_point.section_2.ntp_is_enabled_and_ip_address_is_set_for_primary
    assertion:
      field: enabled
      operator: equals
      expected: "yes"
    remediation: >
      Run the following command to enable the NTP and configure the Primary &
      Secondary NTP server. CLI: Hostname> set ntp active on Hostname> set ntp
      server primary ntpserver.time.com version 3 Hostname> set ntp server primary
      10.22.13.33 version 3 GUI: System Management > Time > Set Time and Date >
      Checked Set Time and Date automatically using Network Time Protocol (NTP) and
      configured the Primary NTP Server and Secondary NTP server Default Value: No
    compliance:
      - cis_check_point_v1_1_0_2_3_1

  - rule_id: check_point.cis.2.timezone_is_properly_configured
    title: "Ensure timezone is properly configured"
    severity: high
    automation_type: automated
    cis_control: '2.3.2'
    cis_section: '2'
    profile_applicability: "Level 1"
    scope: check_point.section_2.timezone_is_properly_configured
    assertion:
      field: value
      operator: exists
      expected: "true"
    remediation: >
      Run the following command to Configure the Timezone used by the enterprise
      (GMT, UTC, EDT, PST). CLI: Hostname> set timezone Asia / Kolkata GUI: System
      Management > Time > Set Time Zone > Time Zone 66 | P a g e Default Value: Time
      Zone: America/New_York (GMT -05:00)
    compliance:
      - cis_check_point_v1_1_0_2_3_2

  - rule_id: check_point.cis.2.system_backup_is_set
    title: "Ensure 'System Backup' is set."
    severity: high
    automation_type: automated
    cis_control: '2.4.1'
    cis_section: '2'
    profile_applicability: "Level 1"
    scope: check_point.section_2.system_backup_is_set
    assertion:
      field: value
      operator: equals
      expected: "true"
    remediation: >
      Run the following command to Configure the backup. CLI: To take the backup
      local on the device. Hostname> add backup local To take the backup of FTP or
      SCP server. Hostname>add backup [ftp|scp] ip [IP Address] path [Path to store
      backup] username [Username] password [Password] To take the backup on tftp
      server. Hostname>add backup tftp [IP address of tftp server] GUI: Navigate to
      Maintenance > System Backup > Backup > Select (This appliance | SCP Server |
      FTP Server | TFTP Server) Default Value: Not Configured
    compliance:
      - cis_check_point_v1_1_0_2_4_1

  - rule_id: check_point.cis.2.snapshot_is_set
    title: "Ensure 'Snapshot' is set"
    severity: high
    automation_type: automated
    cis_control: '2.4.2'
    cis_section: '2'
    profile_applicability: "Level 1"
    scope: check_point.section_2.snapshot_is_set
    assertion:
      field: value
      operator: equals
      expected: "on"
    remediation: >
      Run the following command to take the snapshot. CLI: To take the snapshot run
      the following command on the device. Hostname> add snapshot [snapshot_name]
      GUI: Navigate to Maintenance > Snapshot Management > New Provide the Name and
      description for the snapshot 70 | P a g e Default Value: Not Configured
    compliance:
      - cis_check_point_v1_1_0_2_4_2

  - rule_id: check_point.cis.2.cli_session_timeout_is_set_to_less_than_or_equal
    title: "Ensure CLI session timeout is set to less than or equal to 10 minutes"
    severity: high
    automation_type: automated
    cis_control: '2.5.1'
    cis_section: '2'
    profile_applicability: "Level 1"
    scope: check_point.section_2.cli_session_timeout_is_set_to_less_than_or_equal
    assertion:
      field: value
      operator: equals
      expected: "10"
    remediation: >
      Run the following command to Configure the Inactivity Timeout for Command
      Line. CLI: Hostname> set inactivity-timeout 10 GUI: Navigate to System
      Management > Session > Command Line Shell > Inactivity Timeout - Set to 10 or
      less 73 | P a g e Default Value: 10
    compliance:
      - cis_check_point_v1_1_0_2_5_1

  - rule_id: check_point.cis.2.web_session_timeout_is_set_to_less_than_or_equal
    title: "Ensure Web session timeout is set to less than or equal to 10 minutes"
    severity: high
    automation_type: automated
    cis_control: '2.5.2'
    cis_section: '2'
    profile_applicability: "Level 1"
    scope: check_point.section_2.web_session_timeout_is_set_to_less_than_or_equal
    assertion:
      field: value
      operator: equals
      expected: "10"
    remediation: >
      Run the following command to Configure the Inactivity Timeout for Web UI. CLI:
      Hostname> set web session-timeout 10 GUI: Navigate to System Management >
      Session > Web UI > Inactivity Timeout - Set to 10 or less Default Value: 10 75
      | P a g e
    compliance:
      - cis_check_point_v1_1_0_2_5_2

  - rule_id: check_point.cis.2.client_authentication_is_secured
    title: "Ensure Client Authentication is secured."
    severity: high
    automation_type: automated
    cis_control: '2.5.3'
    cis_section: '2'
    profile_applicability: "Level 1"
    scope: check_point.section_2.client_authentication_is_secured
    assertion:
      field: value
      operator: exists
      expected: "true"
    remediation: >
      Comment out or remove the following line from $FWDIR/conf/fwauthd.conf file,
      or disable the telnet service listening on port 259 by default, write a rule
      that prevents connections to the daemon in the rulebase. #259 fwssd
      in.aclientd wait 259 Edit the following line to include SSL setting in
      $FWDIR/conf/fwauthd.conf file. 900 fwssd in.ahclientd wait 900 ssl:defaultCert
      Default Value: 259 fwssd in.aclientd wait 259 900 fwssd in.ahclientd wait 900
    compliance:
      - cis_check_point_v1_1_0_2_5_3

  - rule_id: check_point.cis.2.radius_or_tacacs_server_is_configured
    title: "Ensure Radius or TACACS+ server is configured"
    severity: high
    automation_type: automated
    cis_control: '2.5.4'
    cis_section: '2'
    profile_applicability: "Level 1"
    scope: check_point.section_2.radius_or_tacacs_server_is_configured
    assertion:
      field: value
      operator: exists
      expected: "true"
    remediation: >
      run the following command to enable and add TACACS+ servers. CLI: Hostname>
      set aaa tacacs-servers state on Hostname> add aaa tacacs-servers priority
      <priority_value> server <IP_Address> key <Key> timeout <timeout_value> GUI:
      Navigate to User Management > Authentication Servers > TACACS+ configuration >
      Ensuere Enable TACACS+ authentication is checked Navigate to User Management >
      Authentication Servers > TACACS+ configuration > Enable TACACS+ Servers > Add
      Provide <Server_IP_Address>, <Priority> and <Timeout>. Run the following
      command to enable and add Radius servers. CLI: Hostname>add aaa radius-servers
      priority <priority_value> host <IP_Address> secret <Key> port <Port_number>
      timeout <timeout_value> GUI: Navigate to User Management > Authentication
      Servers > Radius Servers > Add Provide <Server_IP_Address>, <Priority>,
      <UDP_Port> and <Timeout>. Default Value: Not Configured
    compliance:
      - cis_check_point_v1_1_0_2_5_4

  - rule_id: check_point.cis.2.allowed_client_is_set_to_those_necessary_for
    title: "Ensure allowed-client is set to those necessary for device management"
    severity: medium
    automation_type: automated
    cis_control: '2.5.5'
    cis_section: '2'
    profile_applicability: "Level 2"
    scope: check_point.section_2.allowed_client_is_set_to_those_necessary_for
    assertion:
      field: value
      operator: equals
      expected: "true"
    remediation: >
      Run the following command to remove the IP Address or Network from allowed-
      client list. CLI: Hostname> delete allowed-client host (ipv4-address |
      ipv6-address) <IP Address> Hostname> delete allowed-client network
      (ipv4-address | ipv6-address) <Network> 81 | P a g e GUI: Navigate to System
      Management > Host Access > Allowed Hosts > Select and Delete the not required
      IP address or Network Default Value: Any
    compliance:
      - cis_check_point_v1_1_0_2_5_5

  - rule_id: check_point.cis.2.cplogs_is_set_to_on
    title: "Ensure cplogs is set to on"
    severity: high
    automation_type: automated
    cis_control: '2.6.3'
    cis_section: '2'
    profile_applicability: "Level 1"
    scope: check_point.section_2.cplogs_is_set_to_on
    assertion:
      field: value
      operator: equals
      expected: "true"
    remediation: >
      Run the following command to enable the cplogs. CLI: Hostname> set syslog
      cplogs on GUI: Navigate to System Management > System Logging > System Logging
      checked the Send Syslog messages to management server
    compliance:
      - cis_check_point_v1_1_0_2_6_3


