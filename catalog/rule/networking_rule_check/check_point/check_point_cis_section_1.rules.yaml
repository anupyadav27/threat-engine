tech_type: check_point
category: networking
cis_benchmark: CIS Check Point v1.1.0
cis_section: '1'

rules:

  - rule_id: check_point.cis.1.minimum_password_length_is_set_to_14_or_higher
    title: "Ensure Minimum Password Length is set to 14 or higher"
    severity: high
    automation_type: automated
    cis_control: '1.1'
    cis_section: '1'
    profile_applicability: "Level 1"
    scope: check_point.section_1.minimum_password_length_is_set_to_14_or_higher
    assertion:
      field: row_count
      operator: gte
      expected: "true"
    remediation: >
      Run the following command to set the min-password-length setting. CLI:
      Hostname>set password-controls min-password-length 14 GUI: Navigate to User
      Management > Password Policy Ensure 'Minimum Password Length' is set to 14 or
      higher. 12 | P a g e Default Value: 6
    compliance:
      - cis_check_point_v1_1_0_1_1

  - rule_id: check_point.cis.1.disallow_palindromes_is_selected
    title: "Ensure Disallow Palindromes is selected"
    severity: high
    automation_type: automated
    cis_control: '1.2'
    cis_section: '1'
    profile_applicability: "Level 1"
    scope: check_point.section_1.disallow_palindromes_is_selected
    assertion:
      field: value
      operator: equals
      expected: "on"
    remediation: >
      Run the following command to set the palindrome-check setting. CLI:
      Hostname>set password-controls palindrome-check on GUI: Navigate to User
      Management > Password Policy Ensure 'Disallow Palindrome' is checked. Default
      Value: Selected 14 | P a g e
    compliance:
      - cis_check_point_v1_1_0_1_2

  - rule_id: check_point.cis.1.password_complexity_is_set_to_3
    title: "Ensure Password Complexity is set to 3"
    severity: high
    automation_type: automated
    cis_control: '1.3'
    cis_section: '1'
    profile_applicability: "Level 1"
    scope: check_point.section_1.password_complexity_is_set_to_3
    assertion:
      field: row_count
      operator: equals
      expected: "true"
    remediation: >
      Run the following command to set the password-controls complexity setting.
      CLI: Hostname>set password-controls complexity 3 16 | P a g e GUI: Navigate to
      User Management > Password Policy > Password Complexity: checked the '3 -
      Require three character types' setting. Default Value: 2
    compliance:
      - cis_check_point_v1_1_0_1_3

  - rule_id: check_point.cis.1.check_for_password_reuse_is_selected_and_history
    title: "Ensure Check for Password Reuse is selected and History Length is set to 12 or more"
    severity: high
    automation_type: automated
    cis_control: '1.4'
    cis_section: '1'
    profile_applicability: "Level 1"
    scope: check_point.section_1.check_for_password_reuse_is_selected_and_history
    assertion:
      field: row_count
      operator: equals
      expected: "on"
    remediation: >
      Run the following command to set tie history-checking setting. CLI:
      Hostname>set password-controls history-checking on Hostname>set password-
      controls history-length 12 GUI: Navigate to User Management > Password Policy
      > Password History: checked the 'Check for Password Reuse' setting. Navigate
      to User Management > Password Policy > Password History: Set 'History Length'
      is set to 12 or more. Default Value: Selected
    compliance:
      - cis_check_point_v1_1_0_1_4

  - rule_id: check_point.cis.1.password_expiration_is_set_to_90_days
    title: "Ensure Password Expiration is set to 90 days"
    severity: high
    automation_type: automated
    cis_control: '1.5'
    cis_section: '1'
    profile_applicability: "Level 1"
    scope: check_point.section_1.password_expiration_is_set_to_90_days
    assertion:
      field: row_count
      operator: equals
      expected: "90"
    remediation: >
      Run the following command to set the history-length setting. CLI: Hostname>set
      password-controls history-length 90 GUI: Navigate to User Management >
      Password Policy > Mandatory Password Changes: Password Expiration: Set
      'Password expires after' setting to 90 or less 20 | P a g e Default Value:
      Password never expire
    compliance:
      - cis_check_point_v1_1_0_1_5

  - rule_id: check_point.cis.1.warn_users_before_password_expiration_is_set_to_7
    title: "Ensure Warn users before password expiration is set to 7 days"
    severity: high
    automation_type: automated
    cis_control: '1.6'
    cis_section: '1'
    profile_applicability: "Level 1"
    scope: check_point.section_1.warn_users_before_password_expiration_is_set_to_7
    assertion:
      field: row_count
      operator: equals
      expected: "7"
    remediation: >
      Run the following command to set the expiration-warning-days setting. CLI:
      Hostname>set password-controls expiration-warning-days 7 GUI: Navigate to User
      Management > Password Policy > Mandatory Password Changes Set 'Warn users
      before password expiration' is set to 7 days or less. 22 | P a g e Default
      Value: 7 days
    compliance:
      - cis_check_point_v1_1_0_1_6

  - rule_id: check_point.cis.1.lockout_users_after_password_expiration_is_set_to
    title: "Ensure Lockout users after password expiration is set to 1"
    severity: high
    automation_type: automated
    cis_control: '1.7'
    cis_section: '1'
    profile_applicability: "Level 1"
    scope: check_point.section_1.lockout_users_after_password_expiration_is_set_to
    assertion:
      field: row_count
      operator: equals
      expected: "true"
    remediation: >
      Run the following command to set the expiration-lockout-days setting. CLI:
      Hostname>set password-controls expiration-lockout-days 1 24 | P a g e GUI:
      Navigate to User Management > Password Policy > Mandatory Password Changes >
      Lockout users after password expiration: Checked 'Lockout user after' setting
      and set to 1 day. Default Value: Never lockout users after password expires
    compliance:
      - cis_check_point_v1_1_0_1_7


