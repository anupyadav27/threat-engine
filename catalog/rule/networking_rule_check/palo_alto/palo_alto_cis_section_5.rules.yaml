tech_type: palo_alto
category: networking
cis_benchmark: CIS Palo Alto Networks 11 v1.1.0
cis_section: '5'

rules:

  - rule_id: palo_alto.cis.5.wildfire_file_size_upload_limits_are_maximized
    title: "Ensure that WildFire file size upload limits are maximized"
    severity: high
    automation_type: automated
    cis_control: '5.1'
    cis_section: '5'
    profile_applicability: "Level 1"
    scope: palo_alto.section_5.wildfire_file_size_upload_limits_are_maximized
    assertion:
      field: value
      operator: equals
      expected: "true"
    remediation: >
      Navigate to Device > Setup > WildFire. Click the General Settings edit icon.
      Set the maximum size for each file type are larger than the defaults, to a
      size that is as large enough to account for 'large' files, but not large
      enough to affect performance of the hardware. In PAN-OS 9.x and higher, the
      default file sizes for WildFire are: • pe (Portable Executable) - 16MB • apk
      (Android Application)- 10MB • pdf (Portable Document Format) - 3072KB • ms-
      office (Microsoft Office) — 16384KB • jar (Packaged Java class file) — 5MB •
      flash (Adobe Flash) — 5MB • MacOSX (DMG/MAC-APP/MACH-O PKG files) — 10MB •
      archive (RAR and 7z files) — 50MB • linux (ELF files) — 50MB • script
      (JScript, VBScript, PowerShell, and Shell Script)- 20KB In PAN-OS 9.x and
      higher, the maximum file sizes for Wildfire are: • pe (Portable Executable) -
      50MB • apk (Android Application)- 50MB • pdf (Portable Document Format) -
      51200KB • ms-office (Microsoft Office) — 51200KB • jar (Packaged Java class
      file) — 20MB • flash (Adobe Flash) — 10MB • MacOSX (DMG/MAC-APP/MACH-O PKG
      files) — 50MB • archive (RAR and 7z files) — 50MB • linux (ELF files) — 50MB •
      script (JScript, VBScript, PowerShell, and Shell Script)- 4096KB Default
      Value: In PAN-OS 9.x, the default file sizes for WildFire are: • pe (Portable
      Executable) - 16MB • apk (Android Application)- 10MB • pdf (Portable Document
      Format) - 3072KB • ms-office (Microsoft Office) — 16384KB • jar (Packaged Java
      class file) — 5MB • flash (Adobe Flash) — 5MB • MacOSX (DMG/MAC-APP/MACH-O PKG
      files) — 10MB • archive (RAR and 7z files) — 50MB • linux (ELF files) — 50MB •
      script (JScript, VBScript, PowerShell, and Shell Script)- 20KB References: 1.
      “How to Configure WildFire” - https://live.paloaltonetworks.com/docs/DOC-3252
      2. https://docs.paloaltonetworks.com/wildfire/10-2/wildfire-admin/wildfire-
      deployment-best-practices/wildfire-best-practices
    compliance:
      - cis_palo_alto_11_v1_1_0_5_1

  - rule_id: palo_alto.cis.5.a_wildfire_analysis_profile_is_enabled_for_all
    title: "Ensure a WildFire Analysis profile is enabled for all security policies"
    severity: high
    automation_type: automated
    cis_control: '5.2'
    cis_section: '5'
    profile_applicability: "Level 1"
    scope: palo_alto.section_5.a_wildfire_analysis_profile_is_enabled_for_all
    assertion:
      field: enabled
      operator: equals
      expected: "true"
    remediation: >
      To Set File Blocking Profile: • Navigate to Objects > Security Profiles >
      WildFire Analysis Profile. • Create a WildFire profile that has 'Application
      Any', 'File Types Any', and 'Direction Both' To Set WildFire Analysis Rules: •
      Navigate to Policies > Security. • For each Security Policy Rule where the
      action is 'Allow', Navigate to Actions > Profile Setting > WildFire Analysis
      and set a WildFire Analysis profile. Group Profiles can also be used. To take
      this approach: • Navigate to Objects > Security Profile Groups. Create a
      Security Profile Group, and ensure that (among other settings) the Wildfire
      Analysis Profile is set to the created profile. • Navigate to Policies >
      Security. For each Security Policy Rule where the action is 'Allow', Navigate
      to Actions > Profile Setting. Modify the Profile Type to Group, and set the
      Group Profile to the created Security Profile Group. Default Value: Not
      Configured References: 1. “Wildfire Administrator's Guide 9.0 (English)' -
      https://docs.paloaltonetworks.com/wildfire/9-0/wildfire-admin.html
    compliance:
      - cis_palo_alto_11_v1_1_0_5_2

  - rule_id: palo_alto.cis.5.forwarding_of_decrypted_content_to_wildfire_is
    title: "Ensure forwarding of decrypted content to WildFire is enabled"
    severity: high
    automation_type: automated
    cis_control: '5.3'
    cis_section: '5'
    profile_applicability: "Level 1"
    scope: palo_alto.section_5.forwarding_of_decrypted_content_to_wildfire_is
    assertion:
      field: enabled
      operator: exists
      expected: "true"
    remediation: >
      Navigate to Device > Setup > Content-ID > Content-ID Settings. Set Allow
      forwarding of decrypted content to be checked. Note that SSL Forward Proxy
      must be configured for this setting to be effective. Default Value: Not
      Configured References: 1. “WildFire Fails Forwarding File to Cloud for
      Encrypted Traffic” - https://live.paloaltonetworks.com/docs/DOC-6845 2.
      “Wildfire Administrator's Guide 9.0 (English) - Forward Decrypted SSL Traffic
      for Wildfire Analysis' -
      https://docs.paloaltonetworks.com/wildfire/9-0/wildfire- admin/submit-files-
      for-wildfire-analysis/forward-decrypted-ssl-traffic-for-wildfire-
      analysis.html# 3. “Wildfire Administrator's Guide 9.0 (English) - Wildfire
      Best Practices' - https://docs.paloaltonetworks.com/wildfire/9-0/wildfire-
      admin/wildfire-deployment- best-practices/wildfire-best-practices.html#
    compliance:
      - cis_palo_alto_11_v1_1_0_5_3

  - rule_id: palo_alto.cis.5.all_wildfire_session_information_settings_are
    title: "Ensure all WildFire session information settings are enabled"
    severity: high
    automation_type: automated
    cis_control: '5.4'
    cis_section: '5'
    profile_applicability: "Level 1"
    scope: palo_alto.section_5.all_wildfire_session_information_settings_are
    assertion:
      field: enabled
      operator: equals
      expected: "true"
    remediation: >
      Navigate to Device > Setup > WildFire > Session Information Settings. Set
      every option to be enabled. Default Value: All Session Information Settings
      are enabled by default. These include: • Source IP • Source port • Destination
      IP • Destination port • Virtual System • Application • User • URL • File name
      • Email sender • Email recipient • Email subject References: 1. “Wildfire
      Administrator's Guide 9.0 (English)' -
      https://docs.paloaltonetworks.com/wildfire/9-0/wildfire-admin.html# 2.
      “Wildfire Administrator's Guide 9.0 (English) - Wildfire Best Practices' -
      /https://docs.paloaltonetworks.com/wildfire/9-0/wildfire-admin/wildfire-
      deployment-best-practices/wildfire-best-practices.html
    compliance:
      - cis_palo_alto_11_v1_1_0_5_4

  - rule_id: palo_alto.cis.5.alerts_are_enabled_for_malicious_files_detected
    title: "Ensure alerts are enabled for malicious files detected by WildFire"
    severity: high
    automation_type: automated
    cis_control: '5.5'
    cis_section: '5'
    profile_applicability: "Level 1"
    scope: palo_alto.section_5.alerts_are_enabled_for_malicious_files_detected
    assertion:
      field: row_count
      operator: exists
      expected: "true"
    remediation: >
      From GUI, configure some combination of the following Server Profiles:
      Configure the Email Server: Select Device > Server Profiles > Email Click Add
      Enter a name for the Profile. Select the virtual system from the Location drop
      down menu (if applicable) Click Add Configure the Syslog Server: Select Device
      > Server Profiles > Syslog > Add Enter Name, Display Name, Syslog Server,
      Transport, Port, Format, Facility Click OK Click Commit to save the
      configuration Configure the SMTP Server: Select Device > Server Profiles >
      Email Select Add, Name, Display Name, From, To, Additional Recipients, Gateway
      IP or Hostname Click OK Click Commit to save the configuration Navigate to
      Objects, Log Forwarding Choose Add, set the log type to 'wildfire', add the
      filter '(verdict neq benign)', then add log destinations for SNMP, Syslog,
      Email or HTTP as required. Default Value: Not Configured References: 1.
      “WildFire Email Alerts: Subscribe or Add Additional Recipients” -
      https://live.paloaltonetworks.com/docs/DOC-7740 2. “Wildfire Administrator's
      Guide 9.0 (English)' -
      https://docs.paloaltonetworks.com/wildfire/9-0/wildfire-admin.html
    compliance:
      - cis_palo_alto_11_v1_1_0_5_5

  - rule_id: palo_alto.cis.5.wildfire_update_schedule_is_set_to_download_and
    title: "Ensure 'WildFire Update Schedule' is set to download and install updates in real-time"
    severity: high
    automation_type: automated
    cis_control: '5.6'
    cis_section: '5'
    profile_applicability: "Level 1"
    scope: palo_alto.section_5.wildfire_update_schedule_is_set_to_download_and
    assertion:
      field: value
      operator: equals
      expected: "true"
    remediation: >
      Navigate to Device > Dynamic Updates > WildFire Update Schedule. Set
      Recurrence is set to Real-time. Default Value: Not Configured References: 1.
      “Wildfire What's New in 10.0 (English)' -
      https://docs.paloaltonetworks.com/wildfire/u-v/wildfire-whats-new/wildfire-
      features-in-panos-100/wildfire-real-time-signature-updates 2. “How to
      Configure WildFire” - https://live.paloaltonetworks.com/docs/DOC-3252 3. “Tips
      for Managing Content Updates” -
      https://live.paloaltonetworks.com/docs/DOC-1578
    compliance:
      - cis_palo_alto_11_v1_1_0_5_6


