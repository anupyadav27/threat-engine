tech_type: palo_alto
category: networking
cis_benchmark: CIS Palo Alto Networks 11 v1.1.0
cis_section: '8'

rules:

  - rule_id: palo_alto.cis.8.ssl_forward_proxy_policy_for_traffic_destined_to
    title: "Ensure 'SSL Forward Proxy Policy' for traffic destined to the Internet is configured"
    severity: high
    automation_type: automated
    cis_control: '8.1'
    cis_section: '8'
    profile_applicability: "Level 1"
    scope: palo_alto.section_8.ssl_forward_proxy_policy_for_traffic_destined_to
    assertion:
      field: value
      operator: exists
      expected: "on"
    remediation: >
      Navigate to Policies > Decryption. Create a Policy for all traffic destined to
      the Internet. This Policy should include: • Source tab: The Source Zone and/or
      Source Address should include all target internal networks. Source User should
      include all target internal users • Destination tab: The Destination Zone
      should include the untrusted target zone (usually the internet). Destination
      Address is typically Any for an internet destination. • Service/URL Category
      tab: all URL Category entries should be included except financial-services,
      government and health-and-medicine (this list may vary depending on your
      organization and its policies). • Options tab: Type set to SSL Forward Proxy
      Default Value: Not Configured References: 1. “How to Implement SSL Decryption”
      - https://live.paloaltonetworks.com/docs/DOC-1412 2. ““PAN-OS Administrator's
      Guide 11.1 (English) - Decryption (English)” -
      https://docs.paloaltonetworks.com/pan-os/11-1/pan-os-admin/decryption
    compliance:
      - cis_palo_alto_11_v1_1_0_8_1

  - rule_id: palo_alto.cis.8.the_certificate_used_for_decryption_is_trusted
    title: "Ensure that the Certificate used for Decryption is Trusted"
    severity: high
    automation_type: automated
    cis_control: '8.3'
    cis_section: '8'
    profile_applicability: "Level 1 + Level 2"
    scope: palo_alto.section_8.the_certificate_used_for_decryption_is_trusted
    assertion:
      field: value
      operator: equals
      expected: "on"
    remediation: >
      Set the CA Certificate(s): Navigate to Device > Certificate Management >
      Certificates. Import the appropriate CA Certificates from any internal
      Certificate Authorities. Alternatively, generate a self-signed certificate for
      an internal CA on the firewall, and then import the root certificate for that
      CA into the trusted CA list of target clients. In an Active Directory
      environment this can be facilitated using a Group Policy. Set the Certificate
      Profile needed for the SSL Forward Proxy: • Navigate to Device > Certificate
      Management > Certificate Profile. Set the decryption profile to include the
      settings described in the SSL Forward Proxy guidance in this document Default
      Value: Decryption is not enabled by default. References: 1. 'How to Implement
      and Test SSL Decryption' - https://live.paloaltonetworks.com/t5/Configuration-
      Articles/How-to-Implement- and-Test-SSL-Decryption/ta-p/59719 2. “PAN-OS
      Administrator's Guide 11.1 (English) - Decryption (English)” -
      https://docs.paloaltonetworks.com/pan-os/11-1/pan-os-admin/decryption 3. 'SSL
      Certificates Resource List on Configuring and Troubleshooting' -
      https://live.paloaltonetworks.com/t5/Management-Articles/SSL-certificates-
      resource-list/ta-p/53068 4. 'Certificates' - http://palo-
      alto.wikia.com/wiki/Certificates
    compliance:
      - cis_palo_alto_11_v1_1_0_8_3


