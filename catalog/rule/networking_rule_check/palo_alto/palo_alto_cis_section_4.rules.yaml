tech_type: palo_alto
category: networking
cis_benchmark: CIS Palo Alto Networks 11 v1.1.0
cis_section: '4'

rules:

  - rule_id: palo_alto.cis.4.antivirus_update_schedule_is_set_to_download_and
    title: "Ensure 'Antivirus Update Schedule' is set to download and install updates hourly"
    severity: high
    automation_type: automated
    cis_control: '4.1'
    cis_section: '4'
    profile_applicability: "Level 1"
    scope: palo_alto.section_4.antivirus_update_schedule_is_set_to_download_and
    assertion:
      field: value
      operator: equals
      expected: "true"
    remediation: >
      Navigate to Device > Dynamic Updates > Antivirus Update Schedule. Set Action
      to Download and Install. Set Recurrence to Hourly. Default Value: Not
      Configured References: 1. “Tips for Managing Content Updates” -
      https://live.paloaltonetworks.com/docs/DOC-1578 2. “PAN-OS Administrator's
      Guide 9.0 (English) -Dynamic Content Updates' -
      https://docs.paloaltonetworks.com/pan-os/9-0/pan-os-admin/software-and-
      content-updates/dynamic-content-updates.html 3. “PAN-OS Administrator's Guide
      9.0 (English) - Install Content Updates' -
      https://docs.paloaltonetworks.com/pan-os/9-0/pan-os-admin/software-and-
      content-updates/install-content-and-software-updates.html
    compliance:
      - cis_palo_alto_11_v1_1_0_4_1

  - rule_id: palo_alto.cis.4.applications_and_threats_update_schedule_is_set
    title: "Ensure 'Applications and Threats Update Schedule' is set to download and install updates at daily or shorter intervals"
    severity: high
    automation_type: automated
    cis_control: '4.2'
    cis_section: '4'
    profile_applicability: "Level 1"
    scope: palo_alto.section_4.applications_and_threats_update_schedule_is_set
    assertion:
      field: value
      operator: equals
      expected: "true"
    remediation: >
      Navigate to Device > Dynamic Updates > Application and Threats Update
      Schedule. Set Action to Download and Install. Set Recurrence to Daily, Hourly
      or Every 30 Minutes Default Value: This setting is by default set to Weekly.
      References: 1. “Tips for Managing Content Updates” -
      https://live.paloaltonetworks.com/docs/DOC-1578 2. “PAN-OS Administrator's
      Guide 9.0 (English) -Dynamic Content Updates' -
      https://docs.paloaltonetworks.com/pan-os/9-0/pan-os-admin/software-and-
      content-updates/dynamic-content-updates.html 3. “PAN-OS Administrator's Guide
      9.0 (English) - Install Content Updates' -
      https://docs.paloaltonetworks.com/pan-os/9-0/pan-os-admin/software-and-
      content-updates/install-content-and-software-updates.html
    compliance:
      - cis_palo_alto_11_v1_1_0_4_2


