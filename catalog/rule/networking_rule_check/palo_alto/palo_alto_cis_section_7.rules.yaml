tech_type: palo_alto
category: networking
cis_benchmark: CIS Palo Alto Networks 11 v1.1.0
cis_section: '7'

rules:

  - rule_id: palo_alto.cis.7.application_security_policies_exist_when_allowing
    title: "Ensure application security policies exist when allowing traffic from an untrusted zone to a more trusted zone"
    severity: high
    automation_type: automated
    cis_control: '7.1'
    cis_section: '7'
    profile_applicability: "Level 1 + Level 2"
    scope: palo_alto.section_7.application_security_policies_exist_when_allowing
    assertion:
      field: port
      operator: equals
      expected: "on"
    remediation: >
      Navigate to Policies > Security. For all Security Policies that transit from a
      less trusted to a more trusted interface, set the Application and Service
      values to match the exposed application. For instance, for a web server
      exposed to the internet from a DMZ: Source tab: Zone set to OUTSIDE / Address
      set to Any Destination tab: Zone set to DMZ / Address set to [DMZ Host Object]
      Application tab: set to web-browsing Service/URL Category tab: set Service to
      ether: • application-default or: • service-http and/or service-https
      **Enhanced Security Recommendation: ** Set these values for Policies on all
      Interfaces, for traffic in all directions. For each Security Policy, set the
      Application and Service values to match the exposed application. Default
      Value: Not Configured References: 1. “PAN-OS Administrator's Guide 11.1
      (English) - Security Policies / Applications and Usage ” -
      https://docs.paloaltonetworks.com/pan-os/11-1/pan-os-web- interface-
      help/policies/policies-security/applications-and-usage
    compliance:
      - cis_palo_alto_11_v1_1_0_7_1

  - rule_id: palo_alto.cis.7.service_setting_of_any_in_a_security_policy
    title: "Ensure 'Service setting of ANY' in a security policy allowing traffic does not exist"
    severity: high
    automation_type: automated
    cis_control: '7.2'
    cis_section: '7'
    profile_applicability: "Level 1"
    scope: palo_alto.section_7.service_setting_of_any_in_a_security_policy
    assertion:
      field: port
      operator: equals
      expected: "true"
    remediation: >
      Navigate to Policies > Security. For each exposed host, set a Security Policy
      exists with: • Source tab: Zone set to OUTSIDE Address set to any •
      Destination tab: Zone set to DMZ / Address set to <DMZ Host Object> •
      Application tab: Application set to web-browsing (or appropriate application)
      • Service tab: Service set to application-default. The value of any should
      never be used Default Value: Not Configured References: 1. “Security Policy
      Guidelines” - https://live.paloaltonetworks.com/docs/DOC-3469 2. “Security
      Bulletin: App-ID Cache Pollution” -
      http://researchcenter.paloaltonetworks.com/2012/12/app-id-cache-pollution-
      response/ 3. “PAN-OS Administrator's Guide 11.1 (English) - Security Policiy
      Overview ” - https://docs.paloaltonetworks.com/pan-os/11-1/pan-os-web-
      interface- help/policies/policies-security/security-policy-overview
    compliance:
      - cis_palo_alto_11_v1_1_0_7_2

  - rule_id: palo_alto.cis.7.security_policy_denying_any_all_traffic_to_from
    title: "Ensure 'Security Policy' denying any/all traffic to/from IP addresses on Trusted Threat Intelligence Sources Exists"
    severity: high
    automation_type: automated
    cis_control: '7.3'
    cis_section: '7'
    profile_applicability: "Level 1"
    scope: palo_alto.section_7.security_policy_denying_any_all_traffic_to_from
    assertion:
      field: value
      operator: exists
      expected: "true"
    remediation: >
      Navigate to Policies > Security Create a Security Policy similar to: • General
      tab: Name set to Deny to Malicious IP • Source tab: Source Zone set to Any, •
      Destination tab: Destination Zone set to Any, Destination Address set to Palo
      Alto Networks - Known malicious IP addresses,Palo Alto Networks - High risk IP
      addresses, Palo Alto Networks - Tor exit IP addresses, Palo Alto Networks -
      Bulletproof IP addresses • Application tab: Application set to Any •
      Service/URL Category tab: Service set to Any • Actions tab: Action set to
      Block, Profile Type set to None Create a Security Policy similar to: • General
      tab: Name set to Deny from Malicious IP • Source tab: Source Zone set to Any,
      Source Address set to Palo Alto Networks - Known malicious IP addresses,Palo
      Alto Networks - High risk IP addresses, Palo Alto Networks - Tor exit IP
      addresses, Palo Alto Networks - Bulletproof IP addresses • Destination tab:
      Destination Zone set to Any • Application tab: Application set to Any •
      Service/URL Category tab: Service set to Any • Actions tab: Action set to
      Block, Profile Type set to None Note: This recommendation requires a Palo Alto
      Networks 'Threat Prevention License' Default Value: Not Configured References:
      1. 'PAN-OS 11.1 Admin Guide: Built-in External Dynamic Lists':
      https://docs.paloaltonetworks.com/pan-os/11-1/pan-os-admin/policy/use-an-
      external-dynamic-list-in-policy/built-in-edls
    compliance:
      - cis_palo_alto_11_v1_1_0_7_3


