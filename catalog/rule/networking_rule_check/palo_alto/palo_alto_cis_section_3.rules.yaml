tech_type: palo_alto
category: networking
cis_benchmark: CIS Palo Alto Networks 11 v1.1.0
cis_section: '3'

rules:

  - rule_id: palo_alto.cis.3.a_fully_synchronized_high_availability_peer_is
    title: "Ensure a fully-synchronized High Availability peer is configured"
    severity: high
    automation_type: automated
    cis_control: '3.1'
    cis_section: '3'
    profile_applicability: "Level 1"
    scope: palo_alto.section_3.a_fully_synchronized_high_availability_peer_is
    assertion:
      field: value
      operator: exists
      expected: "true"
    remediation: >
      Navigate to Device > High Availability > HA Communications. Click HA
      Communications. Click Data Link (HA2). Select the correct interface. Select
      the desired protocol (IPv4 or IPv6). Select the correct Transport. Set the
      Enable Session Synchronization box to be checked. Choose Save Configuration.
      Default Value: Not Configured References: 1. “PAN-OS Administrator's Guide
      11.1 (English) - High Availability' - https://docs.paloaltonetworks.com/pan-
      os/11-1/pan-os-web-interface- help/device/device-high-availability
    compliance:
      - cis_palo_alto_11_v1_1_0_3_1

  - rule_id: palo_alto.cis.3.high_availability_requires_link_monitoring_and_or
    title: "Ensure 'High Availability' requires Link Monitoring and/or Path Monitoring"
    severity: high
    automation_type: automated
    cis_control: '3.2'
    cis_section: '3'
    profile_applicability: "Level 1"
    scope: palo_alto.section_3.high_availability_requires_link_monitoring_and_or
    assertion:
      field: value
      operator: equals
      expected: "true"
    remediation: >
      To set Link Monitoring from GUI: Navigate to Device > High Availability > Link
      and Path Monitoring. Click Link Monitoring. Set the correct interfaces to the
      Link Group and Group Failure Conditions. Click Link Monitoring. Set Failure
      Condition to Any. Check Enabled button. To set Path Monitoring from GUI:
      Navigate to Device > High Availability > Link and Path Monitoring. Click Path
      Monitoring. Set Option correctly. Set Failure Condition to Any. Set Name, IP
      Address, Failure Condition correctly. Set Default setting to Any. Check
      Enabled button. Default Value: Not Configured References: 1. “PAN-OS
      Administrator's Guide 11.1 (English) - High Availability' -
      https://docs.paloaltonetworks.com/pan-os/11-1/pan-os-web-interface-
      help/device/device-high-availability
    compliance:
      - cis_palo_alto_11_v1_1_0_3_2

  - rule_id: palo_alto.cis.3.passive_link_state_and_preemptive_are_configured
    title: "Ensure 'Passive Link State' and 'Preemptive' are configured appropriately"
    severity: high
    automation_type: automated
    cis_control: '3.3'
    cis_section: '3'
    profile_applicability: "Level 1"
    scope: palo_alto.section_3.passive_link_state_and_preemptive_are_configured
    assertion:
      field: value
      operator: exists
      expected: "true"
    remediation: >
      To set Active/Passive Settings correctly: Navigate to Device > High
      Availability > General > Active/Passive Settings. Set Passive Link State to
      auto. To set Election Settings correctly: Navigate to Device > High
      Availability > Election Settings. Set Preemptive to be disabled. Default
      Value: Not Configured References: 1. “PAN-OS Administrator's Guide 11.1
      (English) - High Availability' - https://docs.paloaltonetworks.com/pan-
      os/11-1/pan-os-web-interface- help/device/device-high-availability
    compliance:
      - cis_palo_alto_11_v1_1_0_3_3


