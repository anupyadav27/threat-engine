tech_type: palo_alto
category: networking
cis_benchmark: CIS Palo Alto Networks 11 v1.1.0
cis_section: '2'

rules:

  - rule_id: palo_alto.cis.2.ip_addresses_are_mapped_to_usernames
    title: "Ensure that IP addresses are mapped to usernames"
    severity: medium
    automation_type: automated
    cis_control: '2.1'
    cis_section: '2'
    profile_applicability: "Level 2"
    scope: palo_alto.section_2.ip_addresses_are_mapped_to_usernames
    assertion:
      field: enabled
      operator: equals
      expected: "true"
    remediation: >
      To Set User-ID Agents: Navigate to Device > User Identification > User-ID
      Agents Set the Name, IP Address and Port of the User-ID Agent` Enable User
      Identification for each monitored zone that will have user accounts: Navigate
      to Network > Zone, for each relevant zone enable User Identification To Set
      Terminal Services Agents: Navigate to Device > Terminal Services Agents Set
      the Name, IP Address and Port of the Terminal Services Agent Enable User
      Identification for each monitored zone that will have Terminal Servers:
      Navigate to Network > Zone, enable User Identification References: 1. “Best
      Practices for Securing User-ID Deployments” -
      https://live.paloaltonetworks.com/docs/DOC-7912 2. “How to Configure Group
      Mapping settings?” - https://live.paloaltonetworks.com/docs/DOC-4994 3.
      https://docs.paloaltonetworks.com/pan-os/11-1/pan-os-admin/user-id 4.
      https://paloaltonetworks.com/content/dam/paloaltonetworks-
      com/en_US/assets/pdf/tech-briefs/techbrief-user-id.pdf
    compliance:
      - cis_palo_alto_11_v1_1_0_2_1

  - rule_id: palo_alto.cis.2.wmi_probing_is_disabled
    title: "Ensure that WMI probing is disabled"
    severity: medium
    automation_type: automated
    cis_control: '2.2'
    cis_section: '2'
    profile_applicability: "Level 2"
    scope: palo_alto.section_2.wmi_probing_is_disabled
    assertion:
      field: enabled
      operator: equals
      expected: "false"
    remediation: >
      Navigate to Device > User Identification > User Mapping > Palo Alto Networks
      User ID Agent Setup. Set Enable Probing so it is unchecked. Default Value: Not
      configured References: 1. “R7-2014-16: Palo Alto Networks User-ID Credential
      Exposure” - https://blog.rapid7.com/2014/10/14/palo-alto-networks-userid-
      credential- exposure/ 2. “Best Practices for Securing User-ID Deployments” -
      https://live.paloaltonetworks.com/docs/DOC-7912 3. “PAN-OS Administrator's
      Guide 11.1 (English) - Client Probing' -
      https://docs.paloaltonetworks.com/pan-os/11-1/pan-os-admin/user-id/user-id-
      concepts/user-mapping/client-probing
    compliance:
      - cis_palo_alto_11_v1_1_0_2_2

  - rule_id: palo_alto.cis.2.include_exclude_networks_is_used_if_user_id_is
    title: "Ensure that 'Include/Exclude Networks' is used if User-ID is enabled"
    severity: high
    automation_type: automated
    cis_control: '2.4'
    cis_section: '2'
    profile_applicability: "Level 1"
    scope: palo_alto.section_2.include_exclude_networks_is_used_if_user_id_is
    assertion:
      field: enabled
      operator: exists
      expected: "true"
    remediation: >
      Navigate to Device > User Identification > User Mapping > Include/Exclude
      Networks. Set all trusted internal networks to have a Discovery value of
      Include. Set all untrusted external networks to have a Discovery value of
      Exclude. Note that any value in the trusted networks list implies that all
      other networks are untrusted. Default Value: Not configured References: 1.
      Best Practices for Securing User-ID Deployments -
      https://live.paloaltonetworks.com/docs/DOC-7912
    compliance:
      - cis_palo_alto_11_v1_1_0_2_4

  - rule_id: palo_alto.cis.2.security_policies_restrict_user_id_agent_traffic
    title: "Ensure that security policies restrict User-ID Agent traffic from crossing into untrusted zones"
    severity: high
    automation_type: automated
    cis_control: '2.8'
    cis_section: '2'
    profile_applicability: "Level 1"
    scope: palo_alto.section_2.security_policies_restrict_user_id_agent_traffic
    assertion:
      field: value
      operator: exists
      expected: "on"
    remediation: >
      Navigate to Device > Setup > Services > Services Features > Service Route
      Configuration > Customize. Click on the protocol in use (IPv4 and/or IPv6).
      Click UID Agent. Click on the address object for the UID Agent's IP address.
      Set SOURCE/NAME to 'Deny msrpc to untrusted'. Set SOURCE/ZONE to 'INSIDE'. Set
      SOURCE/Address to the Address object for the UID Agent. Set DESTINATION/ZONE
      to 'GUEST' and 'OUTSIDE'. Set DESTINATION/Address to 'any'. Set
      DESTINATION/Application to 'msrpc'. Set DESTINATION/Service to 'application-
      default'. Set DESTINATION/Action to 'Block' (red circle with diagonal line).
      References: 1. “Best Practices for Securing User-ID Deployments” -
      https://live.paloaltonetworks.com/docs/DOC-7912 2. “User-ID Best Practices” -
      https://live.paloaltonetworks.com/docs/DOC-6591 3. “PAN-OS Administrator's
      Guide 11.1 (English) - Configure User Mapping Using the Windows User-ID Agent”
      - https://docs.paloaltonetworks.com/pan-os/11- 1/pan-os-admin/user-id/map-ip-
      addresses-to-users/configure-user-mapping- using-the-windows-user-id-agent 4.
      “PAN-OS Administrator's Guide 11.1 (English) - Configure User Mapping Using
      the PAN-OS Integrated User-ID Agent” - https://docs.paloaltonetworks.com/pan-
      os/11-1/pan-os-admin/user-id/map-ip-addresses-to-users/configure-user-
      mapping-using-the-pan-os-integrated-user-id-agent
    compliance:
      - cis_palo_alto_11_v1_1_0_2_8


