      https://docs.paloaltonetworks.com/pan-os/9-0/pan-os- admin/getting-
      started/best-practices-for-securing-administrative-access.html
    compliance:
      - cis_palo_alto_11_v1_1_0_1_3_5

  - rule_id: palo_alto.cis.1.minimum_special_characters_is_greater_than_or
    title: "Ensure 'Minimum Special Characters' is greater than or equal to 1"
