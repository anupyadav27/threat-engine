      https://live.paloaltonetworks.com/docs/DOC-5557 2. “PAN-OS Administrator's
      Guide 11.1 (English) - Device - Setup - Management” -
      https://docs.paloaltonetworks.com/pan-os/11-1/pan-os-web-interface-
      help/device/device-setup-management#
    compliance:
      - cis_palo_alto_11_v1_1_0_1_4_1

  - rule_id: palo_alto.cis.1.v3_is_selected_for_snmp_polling
    title: "Ensure 'V3' is selected for SNMP polling"
    severity: high
    automation_type: automated
    cis_control: '1.5.1'
    cis_section: '1'
    profile_applicability: "Level 1"
    scope: palo_alto.section_1.v3_is_selected_for_snmp_polling
