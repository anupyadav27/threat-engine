      Practices for Securing Administrative Access” -
      https://docs.paloaltonetworks.com/pan-os/9-0/pan-os- admin/getting-
      started/best-practices-for-securing-administrative-access.html
    compliance:
      - cis_palo_alto_11_v1_1_0_1_3_4

  - rule_id: palo_alto.cis.1.minimum_numeric_letters_is_greater_than_or_equal
    title: "Ensure 'Minimum Numeric Letters' is greater than or equal to 1"
    severity: high
    automation_type: automated
    cis_control: '1.3.5'
    cis_section: '1'
    profile_applicability: "Level 1"
    scope: palo_alto.section_1.minimum_numeric_letters_is_greater_than_or_equal
    assertion:
      field: length
      operator: gte
      expected: "true"
    remediation: >
      Navigate to Device > Setup > Management > Minimum Password Complexity Set
      Minimum Numeric Letters to greater than or equal to 1 Default Value: Not
