tech_type: palo_alto
category: networking
cis_benchmark: CIS Palo Alto Networks 11 v1.1.0
cis_section: '1'

rules:

  - rule_id: palo_alto.cis.1.syslog_logging_should_be_configured
    title: "Syslog logging should be configured"
    severity: high
    automation_type: automated
    cis_control: '1.1.1.1'
    cis_section: '1'
    profile_applicability: "Level 1"
    scope: palo_alto.section_1.syslog_logging_should_be_configured
    assertion:
      field: port
      operator: exists
      expected: "true"
    remediation: >
      Navigate to Device > Server Profiles > Syslog Choose Add Assign a Name to the
      Profile. Choose Add, and assign a server name in the Name field, add an IP
      address or FQDN in the Syslog Server field. Edit other fields as appropriate
      for your server. Repeat if multiple Syslog destinations are required. Navigate
      to Device > Log Settings Under System, add an entry. Define a Name and a
      Filter setting. Under Forward Methods, add a Syslog Profile in the Syslog
      section. Ensure that at least one of the Log Settings Configuration entries
      has it's Filter setting at All Logs Under Configuration, add an entry. Define
      a Name and a Filter setting. Under Forward Methods, add a Syslog Profile in
      the Syslog section. Ensure that at least one of the Log Settings Configuration
      entries has it's Filter setting at All Logs Under User-ID, add an entry.
      Define a Name and a Filter setting. Under Forward Methods, add a Syslog
      Profile in the Syslog section. Ensure that at least one of the Log Settings
      Configuration entries has it's Filter setting at All Logs Under HIP Match
      (Host Information Profile), add an entry. Define a Name and a Filter setting.
      Under Forward Methods, add a Syslog Profile in the Syslog section. Ensure that
      at least one of the Log Settings Configuration entries has it's Filter setting
      at All Logs Under IP-Tag, add an entry. Define a Name and a Filter setting.
      Under Forward Methods, add a Syslog Profile in the Syslog section. Ensure that
      at least one of the Log Settings Configuration entries has it's Filter setting
      at All Logs Default Value: By default no external logging is defined
      References: 1. “PAN-OS Administrator's Guide 11.1 (English) - Configure Syslog
      Monitoring” - https://docs.paloaltonetworks.com/pan-os/11-1/pan-os-
      admin/monitoring/use- syslog-for-monitoring/configure-syslog-monitoring
    compliance:
      - cis_palo_alto_11_v1_1_0_1_1_1_1

  - rule_id: palo_alto.cis.1.snmpv3_traps_should_be_configured
    title: "SNMPv3 traps should be configured"
    severity: medium
    automation_type: automated
    cis_control: '1.1.1.2'
    cis_section: '1'
    profile_applicability: "Level 2"
    scope: palo_alto.section_1.snmpv3_traps_should_be_configured
    assertion:
      field: port
      operator: exists
      expected: "true"
    remediation: >
      Navigate to Device > Server Profiles > SNMP Trap Choose Add Assign a Name to
      the Profile, and specify version V3. Choose Add, and assign a server name in
      the Name field, add an IP address or FQDN in the SNMP Manager field. Edit the
      Password fields as appropriate for your server. Repeat if multiple Syslog
      destinations are required. Navigate to Device > Log Settings Under System, add
      an entry. Define a Name and a Filter setting. Under Forward Methods, add a
      SNMP Profile in the SNMP section. Ensure that at least one of the Log Settings
      Configuration entries has its Filter setting at All Logs Under Configuration,
      add an entry. Define a Name and a Filter setting. Under Forward Methods, add a
      SNMP Profile in the SNMP section. Ensure that at least one of the Log Settings
      Configuration entries has its Filter setting at All Logs Under User-ID, add an
      entry. Define a Name and a Filter setting. Under Forward Methods, add a SNMP
      Profile in the SNMP section. Ensure that at least one of the Log Settings
      Configuration entries has its Filter setting at All Logs Under HIP Match (Host
      Information Profile), add an entry. Define a Name and a Filter setting. Under
      Forward Methods, add a SNMP Profile in the SNMP section. Ensure that at least
      one of the Log Settings Configuration entries has its Filter setting at All
      Logs Under IP-Tag, add an entry. Define a Name and a Filter setting. Under
      Forward Methods, add a SNMP Profile in the SNMP section. Ensure that at least
      one of the Log Settings Configuration entries has its Filter setting at All
      Logs Default Value: By default no external logging is defined References: 1.
      “PAN-OS Administrator's Guide 11.1 (English) - Forward Traps to an SNMP
      Manager” - https://docs.paloaltonetworks.com/pan-os/11-1/pan-os-
      admin/monitoring/snmp-monitoring-and-traps/forward-traps-to-an-snmp-manager
    compliance:
      - cis_palo_alto_11_v1_1_0_1_1_1_2

  - rule_id: palo_alto.cis.1.enable_log_on_high_dp_load_is_enabled
    title: "Ensure 'Enable Log on High DP Load' is enabled"
    severity: high
    automation_type: automated
    cis_control: '1.1.3'
    cis_section: '1'
    profile_applicability: "Level 1"
    scope: palo_alto.section_1.enable_log_on_high_dp_load_is_enabled
    assertion:
      field: enabled
      operator: equals
      expected: "on"
    remediation: >
      Navigate to Device > Setup > Management > Logging and Reporting Settings > Log
      Export and Reporting. Set the Enable Log on High DP Load box to checked.
      Default Value: Not enabled References: 1. 'Logging Best Practices' -
      https://live.paloaltonetworks.com/t5/best-practice- assessment-device/logging-
      and-reporting-settings-log-on-high-dp-mode/ta- p/336964
    compliance:
      - cis_palo_alto_11_v1_1_0_1_1_3

  - rule_id: palo_alto.cis.1.permitted_ip_addresses_is_set_to_those_necessary
    title: "Ensure 'Permitted IP Addresses' is set to those necessary for device management"
    severity: high
    automation_type: automated
    cis_control: '1.2.1'
    cis_section: '1'
    profile_applicability: "Level 1"
    scope: palo_alto.section_1.permitted_ip_addresses_is_set_to_those_necessary
    assertion:
      field: value
      operator: equals
      expected: "true"
    remediation: >
      Navigate to Device > Setup > Interfaces > Management. Set Permitted IP
      Addresses to only those necessary for device management for the SSH and HTTPS
      protocols. If no profile exists, create one that has these addresses set.
      Default Value: Not enabled (all addresses that can reach the interface are
      permitted) References: 1. 'How to Allow Certain IP Addresses on the Management
      Interface' - https://live.paloaltonetworks.com/docs/DOC-8432 2. “PAN-OS
      Administrator's Guide 9.0 (English) - Best Practices for Securing
      Administrative Access': https://docs.paloaltonetworks.com/pan-os/9-0/pan-os-
      admin/getting-started/best-practices-for-securing-administrative-access.html#
    compliance:
      - cis_palo_alto_11_v1_1_0_1_2_1

  - rule_id: palo_alto.cis.1.permitted_ip_addresses_is_set_for_all_management
    title: "Ensure 'Permitted IP Addresses' is set for all management profiles where SSH, HTTPS, or SNMP is enabled"
    severity: high
    automation_type: automated
    cis_control: '1.2.2'
    cis_section: '1'
    profile_applicability: "Level 1"
    scope: palo_alto.section_1.permitted_ip_addresses_is_set_for_all_management
    assertion:
      field: enabled
      operator: equals
      expected: "true"
    remediation: >
      Navigate to Network > Network Profiles > Interface Management. In each
      profile, for each of the target protocols (SNMP, HTTPS, SSH), set Permitted IP
      Addresses to only include those necessary for device management. If no profile
      exists, create one that has these options set. Default Value: Not enabled
      References: 1. 'How to Allow Certain IP Addresses on the Management Interface'
      - https://live.paloaltonetworks.com/docs/DOC-8432 2. “PAN-OS Administrator's
      Guide 9.0 (English) - Best Practices for Securing Administrative Access':
      https://docs.paloaltonetworks.com/pan-os/9-0/pan-os- admin/getting-
      started/best-practices-for-securing-administrative-access.html#
    compliance:
      - cis_palo_alto_11_v1_1_0_1_2_2

  - rule_id: palo_alto.cis.1.http_and_telnet_options_are_disabled_for_the
    title: "Ensure HTTP and Telnet options are disabled for the management interface"
    severity: high
    automation_type: automated
    cis_control: '1.2.3'
    cis_section: '1'
    profile_applicability: "Level 1"
    scope: palo_alto.section_1.http_and_telnet_options_are_disabled_for_the
    assertion:
      field: enabled
      operator: equals
      expected: "false"
    remediation: >
      Navigate to Device > Setup > Interfaces > Management. Set the HTTP and Telnet
      boxes to unchecked. Default Value: Not set. (HTTP and Telnet are disabled by
      default) References: 1. 'How to Configure a Layer 3 Interface to act as a
      Management Port' - https://live.paloaltonetworks.com/t5/Configuration-
      Articles/How-to-Configure-a- Layer-3-Interface-to-act-as-a-Management-
      Port/ta-p/59024 2. “PAN-OS Administrator's Guide 9.0 (English) - Best
      Practices for Securing Administrative Access':
      https://docs.paloaltonetworks.com/pan-os/9-0/pan-os- admin/getting-
      started/best-practices-for-securing-administrative-access.html#
    compliance:
      - cis_palo_alto_11_v1_1_0_1_2_3

  - rule_id: palo_alto.cis.1.http_and_telnet_options_are_disabled_for_all
    title: "Ensure HTTP and Telnet options are disabled for all management profiles"
    severity: high
    automation_type: automated
    cis_control: '1.2.4'
    cis_section: '1'
    profile_applicability: "Level 1"
    scope: palo_alto.section_1.http_and_telnet_options_are_disabled_for_all
    assertion:
      field: enabled
      operator: equals
      expected: "false"
    remediation: >
      Navigate to Network > Network Profiles > Interface Management. For each
      Profile, set the HTTP and Telnet boxes to unchecked. References: 1. “PAN-OS
      Administrator's Guide 9.0 (English) - Best Practices for Securing
      Administrative Access': https://docs.paloaltonetworks.com/pan-os/9-0/pan-os-
      admin/getting-started/best-practices-for-securing-administrative-access.html#
      2. “PAN-OS Administrator's Guide 9.0 (English) - Use Interface Management
      Profiles to Restrict Access': https://docs.paloaltonetworks.com/pan-
      os/9-0/pan- os-admin/networking/configure-interfaces/use-interface-management-
      profiles-to- restrict-access.html#
    compliance:
      - cis_palo_alto_11_v1_1_0_1_2_4

  - rule_id: palo_alto.cis.1.valid_certificate_is_set_for_browser_based
    title: "Ensure valid certificate is set for browser-based administrator interface"
    severity: medium
    automation_type: automated
    cis_control: '1.2.5'
    cis_section: '1'
    profile_applicability: "Level 2"
    scope: palo_alto.section_1.valid_certificate_is_set_for_browser_based
    assertion:
      field: value
      operator: equals
      expected: "true"
    remediation: >
      Create or acquire a certificate that meets the stated criteria and set it:
      Navigate to Device > Certificate Management > Certificates Import an
      appropriate Certificate for your administrative session, from a trusted
      Certificate Authority. Navigate to Device > Certificate Management > SSL/TLS
      Service Profile Choose or import the certificate you want to use for the web
      based administrative session. Navigate to Device > Setup > Management >
      General Settings > SSL/TLS Service Profile Choose the Service Profile that you
      have configured Default Value: A self-signed certificate is installed by
      default for the administrative interface. References: 1. 'How to Configure a
      Certificate for Secure Web GUI Access' -
      https://live.paloaltonetworks.com/t5/Configuration-Articles/How-to-
      configure-a- certificate-for-secure-web-gui-access/ta-p/68653 2. “PAN-OS
      Administrator's Guide 9.0 (English) - Best Practices for Securing
      Administrative Access': https://docs.paloaltonetworks.com/pan-os/9-0/pan-os-
      admin/getting-started/best-practices-for-securing-administrative-access.html#
      Additional Information: Verify that the clock is both accurate and reliable on
      both the Palo Alto and on the administrative workstations before setting the
      SSL/TLS Service Profile. Inaccurate or mismatched clocks will result in
      certificate errors and can result in loss of HTTPS administrative access.
    compliance:
      - cis_palo_alto_11_v1_1_0_1_2_5

  - rule_id: palo_alto.cis.1.minimum_password_complexity_is_enabled
    title: "Ensure 'Minimum Password Complexity' is enabled"
    severity: high
    automation_type: automated
    cis_control: '1.3.1'
    cis_section: '1'
    profile_applicability: "Level 1"
    scope: palo_alto.section_1.minimum_password_complexity_is_enabled
    assertion:
      field: enabled
      operator: gte
      expected: "true"
    remediation: >
      Navigate to Device > Setup > Management > Minimum Password Complexity. Set
      Enabled to be checked Set that the various password settings to values that
      are appropriate to your organization. It is suggested that there at least be
      some special characters enforced, and that a minimum length be set. Ensure
      that non-zero values are set for Minimum Uppercase, Lowercase and Special
      Characters. 'Block Username Inclusion' should be enabled. Operationally,
      dictionary words should be avoided for all passwords - passphrases are a much
      better alternative. Default Value: Not enabled. References: 1. “PAN-OS
      Administrator's Guide 9.0 (English) - Best Practices for Securing
      Administrative Access” - https://docs.paloaltonetworks.com/pan-os/9-0/pan-os-
      admin/getting-started/best-practices-for-securing-administrative-access.html
    compliance:
      - cis_palo_alto_11_v1_1_0_1_3_1

  - rule_id: palo_alto.cis.1.minimum_length_is_greater_than_or_equal_to_12
    title: "Ensure 'Minimum Length' is greater than or equal to 12"
    severity: high
    automation_type: automated
    cis_control: '1.3.2'
    cis_section: '1'
    profile_applicability: "Level 1"
    scope: palo_alto.section_1.minimum_length_is_greater_than_or_equal_to_12
    assertion:
      field: row_count
      operator: gte
      expected: "true"
    remediation: >
      Navigate to Device > Setup > Management > Minimum Password Complexity. Set
      Minimum Length to greater than or equal to 12 Default Value: Not enabled.
      References: 1. “PAN-OS Administrator's Guide 9.0 (English) - Best Practices
      for Securing Administrative Access” - https://docs.paloaltonetworks.com/pan-
      os/9-0/pan-os- admin/getting-started/best-practices-for-securing-
      administrative-access.html
    compliance:
      - cis_palo_alto_11_v1_1_0_1_3_2

