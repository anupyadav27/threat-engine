    automation_type: automated
    cis_control: '1.3.6'
    cis_section: '1'
    profile_applicability: "Level 1"
    scope: palo_alto.section_1.minimum_special_characters_is_greater_than_or
    assertion:
      field: length
      operator: gte
      expected: "true"
    remediation: >
      Navigate to Device > Setup > Management > Minimum Password Complexity Set
      Minimum Special Characters to greater than or equal to 1 Default Value: Not
      enabled. References: 1. “PAN-OS Administrator's Guide 9.0 (English) - Best
      Practices for Securing Administrative Access” -
      https://docs.paloaltonetworks.com/pan-os/9-0/pan-os- admin/getting-
      started/best-practices-for-securing-administrative-access.html
    compliance:
