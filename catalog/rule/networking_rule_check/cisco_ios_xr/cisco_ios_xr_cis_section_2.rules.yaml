tech_type: cisco_ios_xr
category: networking
cis_benchmark: CIS Cisco IOS XR 7.x v1.0.1
cis_section: '2'

rules:

  - rule_id: cisco_ios_xr.cis.2.authentication
    title: "Authentication"
    severity: medium
    automation_type: automated
    cis_control: '2.1.1.1'
    cis_section: '2'
    profile_applicability: "Level 2"
    scope: cisco_ios_xr.section_2.authentication
    assertion:
      field: value
      operator: equals
      expected: "true"
    remediation: >
      Configure the EIGRP address family. IOSXR(config)#router eigrp {AS_number}
      IOSXR(config-eigrp)# address-family ipv4 IOSXR(config-eigrp-af)# interface
      {interface} IOSXR(config-eigrp-af-if)#authentication keychain {key_chain_name}
      Default Value: Not set References: 1.
      https://www.cisco.com/c/en/us/td/docs/routers/xr12000/software/xr12k_r3-
      9/routing/configuration/guide/xr12krc39_chapter2.html
    compliance:
      - cis_cisco_ios_xr_7_x_v1_0_1_2_1_1_1

  - rule_id: cisco_ios_xr.cis.2.key_chains
    title: "Key chains"
    severity: medium
    automation_type: automated
    cis_control: '2.1.6'
    cis_section: '2'
    profile_applicability: "Level 2"
    scope: cisco_ios_xr.section_2.key_chains
    assertion:
      field: value
      operator: equals
      expected: "true"
    remediation: >
      IOSXR(config)#key chain {key_chain_name} IOSXR(config-CHAIN)#key {key_id}
      IOSXR(config-CHAIN-1)#key-string {key_string} Default Value: By default no key
      strings are configured References: 1.
      https://www.cisco.com/c/en/us/td/docs/routers/xr12000/software/xr12k_r3-
      9/security/configuration/guide/sc39kcm.html
    compliance:
      - cis_cisco_ios_xr_7_x_v1_0_1_2_1_6


