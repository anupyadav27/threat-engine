tech_type: fortigate
category: networking
cis_benchmark: CIS Fortinet FortiGate 7.0.x v1.3.0
cis_section: '7'

rules:

  - rule_id: fortigate.cis.7.encrypt_log_transmission_to_fortianalyzer
    title: "Encrypt Log Transmission to FortiAnalyzer / FortiManager"
    severity: high
    automation_type: automated
    cis_control: '7.2.1'
    cis_section: '7'
    profile_applicability: "Level 1"
    scope: fortigate.section_7.encrypt_log_transmission_to_fortianalyzer
    assertion:
      field: value
      operator: equals
      expected: "true"
    remediation: >
      Secure log transfer settings can only be configured on CLI: config log
      fortianalyzer setting set reliable enable set enc-algorithm high end Default
      Value: Disabled References: 1.
      https://docs.fortinet.com/document/fortianalyzer/7.2.0/administration-
      guide/410387/appendix-b-log-integrity-and-secure-log-transfer
    compliance:
      - cis_fortigate_7_0_x_v1_3_0_7_2_1

  - rule_id: fortigate.cis.7.centralized_logging_and_reporting
    title: "Centralized Logging and Reporting"
    severity: medium
    automation_type: automated
    cis_control: '7.3.1'
    cis_section: '7'
    profile_applicability: "Level 2"
    scope: fortigate.section_7.centralized_logging_and_reporting
    assertion:
      field: port
      operator: equals
      expected: "on"
    remediation: >
      Configure a remote server for logs to be sent to: 1. Go to Log & Report > Log
      Settings. 2. Under 'Syslog logging' configure a remote server to send logs to.
      Default Value: Not configured. References: 1.
      https://docs.fortinet.com/document/fortigate/7.2.6/administration-guide/250999
    compliance:
      - cis_fortigate_7_0_x_v1_3_0_7_3_1


