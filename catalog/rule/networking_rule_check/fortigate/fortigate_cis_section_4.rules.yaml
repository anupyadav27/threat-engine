tech_type: fortigate
category: networking
cis_benchmark: CIS Fortinet FortiGate v1.1.0
cis_section: '4'

rules:

  - rule_id: fortigate.cis.4.antivirus_definition_push_updates_are_configured
    title: "Ensure Antivirus Definition Push Updates are Configured"
    severity: medium
    automation_type: automated
    cis_control: '4.2.1'
    cis_section: '4'
    profile_applicability: "Level 2"
    scope: fortigate.section_4.antivirus_definition_push_updates_are_configured
    assertion:
      field: value
      operator: exists
      expected: "no"
    remediation: >
      GUI (FortiOS 6): Access the FortiGate administrative web access page and go to
      System > FortiGuard under 'FortiGuard Updates' enable 'Accept push updates'.
      GUI (FortiOS 7): Access the FortiGate administrative web access page and go to
      System > FortiGuard under 'FortiGuard Updates' ensure that the 'Scheduled
      updates' is set to 'Automatic'. CLI (FortiOS 6): config system autoupdate set
      status enable end CLI (FortiOS 7): config system autoupdate schedule set
      status enable set frequency automatic end Default Value: Disable (on FortiOS
      6) Enabled and set to automatic (on FortiOS 7) References: 1.
      https://docs.fortinet.com/document/fortigate/7.0.10/administration-
      guide/547335
    compliance:
      - cis_fortigate_v1_1_0_4_2_1

  - rule_id: fortigate.cis.4.enable_outbreak_prevention_database
    title: "Enable Outbreak Prevention Database"
    severity: medium
    automation_type: automated
    cis_control: '4.2.3'
    cis_section: '4'
    profile_applicability: "Level 2"
    scope: fortigate.section_4.enable_outbreak_prevention_database
    assertion:
      field: value
      operator: equals
      expected: "true"
    remediation: >
      Review Antivirus Security Profiles and validate that 'Use FortiGuard outbreak
      prevention database' is enabled. Default Value: Disabled References: 1.
      https://docs.fortinet.com/document/fortigate/7.0.9/administration-
      guide/889364/fortiguard-outbreak-prevention
    compliance:
      - cis_fortigate_v1_1_0_4_2_3

  - rule_id: fortigate.cis.4.enable_ai_heuristic_based_malware_detection
    title: "Enable AI /heuristic based malware detection"
    severity: medium
    automation_type: automated
    cis_control: '4.2.4'
    cis_section: '4'
    profile_applicability: "Level 2"
    scope: fortigate.section_4.enable_ai_heuristic_based_malware_detection
    assertion:
      field: enabled
      operator: equals
      expected: "on"
    remediation: >
      FGT1 # config antivirus settings FGT1 (settings) # set machine-learning-
      detection enable Default Value: Disabled (for version 6.4.x) Enabled (for
      version 7.x) References: 1.
      https://docs.fortinet.com/document/fortigate/6.4.11/cli-
      reference/517620/config- antivirus-heuristic 2.
      https://docs.fortinet.com/document/fortigate/7.0.0/new-features/773410/ai-
      based- malware-detection
    compliance:
      - cis_fortigate_v1_1_0_4_2_4

  - rule_id: fortigate.cis.4.enable_grayware_detection_on_antivirus
    title: "Enable grayware detection on antivirus"
    severity: medium
    automation_type: automated
    cis_control: '4.2.5'
    cis_section: '4'
    profile_applicability: "Level 2"
    scope: fortigate.section_4.enable_grayware_detection_on_antivirus
    assertion:
      field: enabled
      operator: equals
      expected: "true"
    remediation: >
      FGT1 # config antivirus settings FGT1 (settings) # set grayware enable Default
      Value: Enabled References: 1.
      https://community.fortinet.com/t5/FortiGate/Technical-Tip-Configuration-
      options- about-antivirus/ta-p/191939 4.3 DNS Filter
    compliance:
      - cis_fortigate_v1_1_0_4_2_5

  - rule_id: fortigate.cis.4.block_applications_running_on_non_default_ports
    title: "Block applications running on non-default ports"
    severity: medium
    automation_type: automated
    cis_control: '4.4.2'
    cis_section: '4'
    profile_applicability: "Level 2"
    scope: fortigate.section_4.block_applications_running_on_non_default_ports
    assertion:
      field: port
      operator: equals
      expected: "on"
    remediation: >
      GUI: Go to 'Security Profiles' > 'Application Control' > select App Control
      profile Enable 'Block applications detected on non-default ports' option CLI:
      FGT1 # config application list FGT1 (list) # edit <profile name> FGT1
      (<profile name>) # set enforce-default-app-port enable Default Value: Disabled
      References: 1. https://attack.mitre.org/techniques/T1571/
    compliance:
      - cis_fortigate_v1_1_0_4_4_2


