tech_type: fortigate
category: networking
cis_benchmark: CIS Fortinet FortiGate v1.1.0
cis_section: '3'

rules:

  - rule_id: fortigate.cis.3.policies_do_not_use_all_as_service
    title: "Ensure that policies do not use 'ALL' as Service"
    severity: high
    automation_type: automated
    cis_control: '3.2'
    cis_section: '3'
    profile_applicability: "Level 1"
    scope: fortigate.section_3.policies_do_not_use_all_as_service
    assertion:
      field: value
      operator: equals
      expected: "true"
    remediation: >
      In this example, we will modify policy with ID of 2 to change the service from
      'ALL' to FTP and SNMP In CLI: FGT1 # config firewall policy FGT1 (policy) #
      edit 2 FGT1 (2) # set service 'FTP' 'SNMP' FGT1 (2) # end FGT1 # In the GUI,
      click on Policy & Objects -> IPv4 Policy. Select the policy, click 'Edit'. In
      the Service section, click on it and select FTP and SNMP. Click OK Default
      Value: By default, all new policy will have 'ALL' in its service field.
    compliance:
      - cis_fortigate_v1_1_0_3_2


