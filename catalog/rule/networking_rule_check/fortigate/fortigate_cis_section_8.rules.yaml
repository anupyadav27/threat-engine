tech_type: fortigate
category: networking
cis_benchmark: CIS Fortinet FortiGate v1.1.0
cis_section: '8'

rules:

  - rule_id: fortigate.cis.8.encrypt_log_transmission_to_fortianalyzer
    title: "Encrypt Log Transmission to FortiAnalyzer / FortiManager"
    severity: medium
    automation_type: automated
    cis_control: '8.2.1'
    cis_section: '8'
    profile_applicability: "Level 2"
    scope: fortigate.section_8.encrypt_log_transmission_to_fortianalyzer
    assertion:
      field: value
      operator: equals
      expected: "true"
    remediation: >
      GUI: Access the FortiGate administrative web access page and go to Log &
      Report > Log Settings and when configuring Remote logging to
      FortiAnalyzer/FortiManager select 'Encrypt log transmission' CLI: config log
      fortianalyzer setting set enc-algorithm high end 8.3 Centralized Logging and
      Reporting Logging and Reporting should be done to a Centralized device
    compliance:
      - cis_fortigate_v1_1_0_8_2_1

  - rule_id: fortigate.cis.8.centralized_logging_and_reporting
    title: "Centralized Logging and Reporting"
    severity: medium
    automation_type: automated
    cis_control: '8.3.1'
    cis_section: '8'
    profile_applicability: "Level 2"
    scope: fortigate.section_8.centralized_logging_and_reporting
    assertion:
      field: port
      operator: equals
      expected: "true"
    remediation: >
      Configure a remote server for logs to be sent to. Access the FortiGate
      administrative web access page and to to Log & Report > Log Settings and under
      'Remote Logging and Archiving' configure a remote server to send logs to.
