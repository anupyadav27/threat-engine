tech_type: fortigate
category: networking
cis_benchmark: CIS Fortinet FortiGate v1.1.0
cis_section: '2'

rules:

  - rule_id: fortigate.cis.2.correct_system_time_is_configured_through_ntp
    title: "Ensure correct system time is configured through NTP"
    severity: high
    automation_type: automated
    cis_control: '2.1.4'
    cis_section: '2'
    profile_applicability: "Level 1"
    scope: fortigate.section_2.correct_system_time_is_configured_through_ntp
    assertion:
      field: value
      operator: exists
      expected: "yes"
    remediation: >
      You can only customize NTP setting using CLI. In this example, we'll assign
      pool.ntp.org as primary NTP server and 1.1.1.1 as secondary NTP server. FGT1 #
      config system ntp FGT1 (ntp) # set type custom FGT1 (ntp) # config ntpserver
      FGT1 (ntpserver) # edit 1 FGT1 (1) # set server pool.ntp.org FGT1 (1) # next
      FGT1 (ntpserver) # edit 2 FGT1 (2) # set server 1.1.1.1 FGT1 (2) # end FGT1
      (ntp) # end FGT1 # Default Value: By default, Fortinet uses the NTPs server of
      the FortiGuard References: 1.
      https://docs.fortinet.com/document/fortigate/6.2.0/cookbook/512210/setting-
      the- system-time 2.
      https://kb.fortinet.com/kb/documentLink.do?externalID=FD49018 3.
      https://docs.fortinet.com/document/fortigate/7.0.0/administration-
      guide/512210/setting-the-system-time Additional Information: Daylight savings
      time is enabled by default, and can only be configured in the CLI.
    compliance:
      - cis_fortigate_v1_1_0_2_1_4

  - rule_id: fortigate.cis.2.hostname_is_set
    title: "Ensure hostname is set"
    severity: high
    automation_type: automated
    cis_control: '2.1.5'
    cis_section: '2'
    profile_applicability: "Level 1"
    scope: fortigate.section_2.hostname_is_set
    assertion:
      field: value
      operator: equals
      expected: "true"
    remediation: >
      In CLI, set the hostname to 'New_FGT1' as follows: FGT1 # config system global
      FGT1 (global) # set hostname 'New_FGT1' FGT1 (global) # end New_FGT1 # or In
      GUI, go to 'System' -> 'Settings', update the field 'Hostname' with the new
      hostname, and click 'Apply' Default Value: The default value of the hostname
      is the model number of the unit. Example: 'FortiGate 2000E' References: 1.
      https://kb.fortinet.com/kb/documentLink.do?externalID=FD48765
    compliance:
      - cis_fortigate_v1_1_0_2_1_5

  - rule_id: fortigate.cis.2.disable_usb_firmware_and_configuration
    title: "Disable USB Firmware and configuration installation"
    severity: medium
    automation_type: automated
    cis_control: '2.1.7'
    cis_section: '2'
    profile_applicability: "Level 2"
    scope: fortigate.section_2.disable_usb_firmware_and_configuration
    assertion:
      field: port
      operator: equals
      expected: "true"
    remediation: >
      CLI: config system auto-install set auto-install-config disable set auto-
      install-image disable end Default Value: config system auto-install set auto-
      install-config enable set auto-install-image enable end
    compliance:
      - cis_fortigate_v1_1_0_2_1_7

  - rule_id: fortigate.cis.2.disable_static_keys_for_tls
    title: "Disable static keys for TLS"
    severity: medium
    automation_type: automated
    cis_control: '2.1.8'
    cis_section: '2'
    profile_applicability: "Level 2"
    scope: fortigate.section_2.disable_static_keys_for_tls
    assertion:
      field: port
      operator: equals
      expected: "true"
    remediation: >
      CLI: config system global set ssl-static-key-ciphers disable end Default
      Value: set ssl-static-key-ciphers enable
    compliance:
      - cis_fortigate_v1_1_0_2_1_8

  - rule_id: fortigate.cis.2.enable_global_strong_encryption
    title: "Enable Global Strong Encryption"
    severity: medium
    automation_type: automated
    cis_control: '2.1.9'
    cis_section: '2'
    profile_applicability: "Level 2"
    scope: fortigate.section_2.enable_global_strong_encryption
    assertion:
      field: value
      operator: equals
      expected: "true"
    remediation: >
      CLI: config system global set strong-crypto enable end Default Value: strong-
      crypto : enable 2.2 Password Policy This Section contains criteria for local
      passwords such as complexity and restrictions. The best practice is to use
      named accounts, and if possible a back-end authentication solution such as
      Active Directory or (best case) a two-factor authentication solution. However,
      local credentials will always exist, if only to account for the failure of a
      back- end authentication solution.
    compliance:
      - cis_fortigate_v1_1_0_2_1_9

  - rule_id: fortigate.cis.2.only_snmpv3_is_enabled
    title: "Ensure only SNMPv3 is enabled"
    severity: medium
    automation_type: automated
    cis_control: '2.3.2'
    cis_section: '2'
    profile_applicability: "Level 2"
    scope: fortigate.section_2.only_snmpv3_is_enabled
    assertion:
      field: enabled
      operator: equals
      expected: "false"
    remediation: >
      To enable SNMP agent in CLI FGT1 # config system snmp sysinfo FGT1 (sysinfo) #
      set status enable FGT1 (sysinfo) # end In GUI, go to System -> SNMP and enable
      SNMP Agent. To delete SNMPv1/2c communities In this example, we'll delete
      community 'public' in CLI FGT1 # config system snmp community FGT1 (community)
      # delete public FGT1 (community) # end FGT # In the GUI, go to System -> SNMP,
      select the community and click on the Delete button. To add SNMPv3 User in CLI
      FGT1 # config system snmp user FGT1 (user) # edit 'snmp_test' FGT1 (snmp_test)
      # set security-level auth-priv FGT1 (snmp_test) # set auth-proto sha256 FGT1
      (snmp_test) # set auth-pwd xxxx FGT1 (snmp_test) # set priv-proto aes256 FGT1
      (snmp_test) # set priv_pwd xxxx FGT1 (snmp_test) # end FGT1 # In the GUI, go
      to System -> SNMP, under SNMPv3, click on 'Create New' button. Select
      'Authentication' and choose SHA256 as Authentication algorithm. Click 'Change'
      to type in the password. Also select option 'Private', choose AES256 as
      Encryption Algorithm. Click on Change to change the password. Click 'OK' to
      add the new user. Click apply to apply the new setting into the current
      config. Default Value: By default, SNMP agent is disabled. References: 1.
      https://kb.fortinet.com/kb/documentLink.do?externalID=FD45755 2.
      https://docs.fortinet.com/document/fortigate/6.4.0/administration-
      guide/457149/snmp-v3-users
    compliance:
      - cis_fortigate_v1_1_0_2_3_2

  - rule_id: fortigate.cis.2.idle_timeout_time_is_configured
    title: "Ensure idle timeout time is configured"
    severity: high
    automation_type: automated
    cis_control: '2.4.4'
    cis_section: '2'
    profile_applicability: "Level 1"
    scope: fortigate.section_2.idle_timeout_time_is_configured
    assertion:
      field: value
      operator: exists
      expected: "true"
    remediation: >
      To change the idle timeout in the GUI: 1) Login to FortiGate with Super Admin
      privileges 2) Go to 'System' > 'Settings'. 3) In the 'Administration Settings'
      section, set the 'Idle timeout' value to five minutes by typing 5. 4) Click
      Apply. To change the idle timeout in the CLI: config system global set
      admintimeout 5 end Default Value: By default, it is set to five minutes.
      References: 1.
      https://docs.fortinet.com/document/fortigate/6.2.0/cookbook/215451/setting-
      the- idle-timeout-time Additional Information: A setting of higher than 15
      minutes will have a negative effect on a security rating score.
    compliance:
      - cis_fortigate_v1_1_0_2_4_4

  - rule_id: fortigate.cis.2.high_availability_configuration_is_enabled
    title: "Ensure High Availability configuration is enabled"
    severity: medium
    automation_type: automated
    cis_control: '2.5.1'
    cis_section: '2'
    profile_applicability: "Level 2"
    scope: fortigate.section_2.high_availability_configuration_is_enabled
    assertion:
      field: enabled
      operator: exists
      expected: "on"
    remediation: >
      In GUI: 1. Navigate to 'System' and then 'HA' 2. Ensure 'Mode' is set to
      proper setting 'Active-Active' or 'Active-Passive' 3. Review Configuration
      settings: - 'Cluster Name' must match on devices - 'Password' Must match on
      devices - 'Heartbeat Interfaces' need to be defined on devices 4. Click 'OK'
      to save changes and exit In CLI: FGT1 # config system ha FGT1 (ha) # set mode
      a-p ###(Active-Passive) FGT1 (ha) # set group-name 'FGT-HA' ###(Set cluster
      name) FGT1 (ha) # set password ******* ###(Set password) FGT1 (ha) # set hbdev
      port10 50 ###(Set Heartbeat Interface and priority) FGT1 (ha) # end To review
      configuration in CLI: FGT1 # config system ha FGT1 (ha) # show config system
      ha set group-name 'FGT-HA' set mode a-p set password ENC
      enrwD467hJmO6j6YW/l6FEOa1YNVYdo8Z5mCcTDEKUFpOVXcNYnPBmQDGX//ViXk6TkwNH0il5aJr
      /fZY25lq+husndQHZVWp2LIlXmCv/n81U43nkZUWaIKvqkellGFbhv0/IHoOLzQPCsVcBbyrsgopr
      YMvh6w7F06+nRriBtMNQxpOV5V+e388EcwsOOMsXBZOw== set hbdev 'port10' 50 set
      override disable end Default Value: N/A References: 1.
      https://docs.fortinet.com/document/fortigate/7.2.0/administration-
      guide/900885/ha-active-passive-cluster-setup 2.
      https://docs.fortinet.com/document/fortigate/7.2.0/administration-
      guide/357558/ha-active-active-cluster-setup
    compliance:
      - cis_fortigate_7_0_x_v1_3_0_2_5_1

  - rule_id: fortigate.cis.2.monitor_interfaces_for_high_availability_devices
    title: "Ensure 'Monitor Interfaces' for High Availability Devices is Enabled"
    severity: high
    automation_type: automated
    cis_control: '2.5.2'
    cis_section: '2'
    profile_applicability: "Level 1"
    scope: fortigate.section_2.monitor_interfaces_for_high_availability_devices
    assertion:
      field: enabled
      operator: equals
      expected: "true"
    remediation: >
      To Remediate from GUI: go to System - > HA Under 'Monitor Interfaces' select
      all applicable interfaces. select 'OK' To Validate from CLI: FGT1 # config
      system ha FGT1 (ha) # set monitor 'port6' 'port7' FGT1 (ha) # show ###To
      Review changes to monitored interfaces before applying config system ha set
      group-name 'FGT-HA' set mode a-p set password ENC
      enrwD467hJmO6j6YW/l6FEOa1YNVYdo8Z5mCcTDEKUFpOVXcNYnPBmQDGX//ViXk6TkwNH0il5aJr
      /fZY25lq+husndQHZVWp2LIlXmCv/n81U43nkZUWaIKvqkellGFbhv0/IHoOLzQPCsVcBbyrsgopr
      YMvh6w7F06+nRriBtMNQxpiTE+12xAHz7lA3EoYZzf8A== set override disable set
      monitor 'port6' 'port7' end Default Value: N/A References: 1.
      https://docs.fortinet.com/document/fortigate/6.0.0/best-
      practices/498515/interface-monitoring-port-monitoring
    compliance:
      - cis_fortigate_v1_1_0_2_5_2

  - rule_id: fortigate.cis.2.snmp_agent_is_disabled
    title: "Ensure SNMP agent is disabled"
    severity: high
    automation_type: automated
    cis_control: '2.3.1'
    cis_section: '2'
    profile_applicability: "Level 1"
    scope: fortigate.section_2.snmp_agent_is_disabled
    assertion:
      field: enabled
      operator: equals
      expected: "false"
    remediation: >
      On the CLI, run the following command to disable the agent FGT1 # config
      system snmp sysinfo FGT1 (sysinfo) # set status disable FGT1 (sysinfo) # end
      On the GUI, select System -> SNMP, disable SNMP agent Default Value: SNMP
      agent is disabled by default. References: 1.
      https://kb.fortinet.com/kb/documentLink.do?externalID=FD45755
    compliance:
      - cis_fortigate_v1_1_0_2_3_1

  - rule_id: fortigate.cis.2.high_availability_configuration
    title: "Ensure High Availability Configuration"
    severity: medium
    automation_type: automated
    cis_control: '2.5.1'
    cis_section: '2'
    profile_applicability: "Level 2"
    scope: fortigate.section_2.high_availability_configuration
    assertion:
      field: value
      operator: exists
      expected: "on"
    remediation: >
      In GUI: Navigate to 'System' and then 'HA' Ensure 'Mode' is set to proper
      setting 'Active-Active' or 'Active-Passive' Review Configuration settings
      'Cluster Name' must match on devices 'Password' Must match on devices
      'Heartbeat Interfaces' need to be defined on devices Click 'OK' to save
      changes and exit In CLI: FGT1 # config system ha FGT1 (ha) # set mode a-p
      ###(Active-Passive) FGT1 (ha) # set group-name 'FGT-HA' ###(Set cluster name)
      FGT1 (ha) # set password ******* ###(Set password) FGT1 (ha) # set hbdev
      port10 50 ###(Set Heartbeat Interface and priority) FGT1 (ha) # end To review
      configuration in CLI FGT1 # config system ha FGT1 (ha) # show config system ha
      set group-name 'FGT-HA' set mode a-p set password ENC
      enrwD467hJmO6j6YW/l6FEOa1YNVYdo8Z5mCcTDEKUFpOVXcNYnPBmQDGX//ViXk6TkwNH0il5aJr
      /fZY25lq+husndQHZVWp2LIlXmCv/n81U43nkZUWaIKvqkellGFbhv0/IHoOLzQPCsVcBbyrsgopr
      YMvh6w7F06+nRriBtMNQxpOV5V+e388EcwsOOMsXBZOw== set hbdev 'port10' 50 set
      override disable end Default Value: N/A References: 1.
      https://docs.fortinet.com/document/fortigate/6.4.5/administration-
      guide/489119/ha-cluster-setup-examples
    compliance:
      - cis_fortigate_v1_1_0_2_5_1


