tech_type: cisco_nxos
category: networking
cis_benchmark: CIS Cisco NX-OS v1.2.0
cis_section: '1'

rules:

  - rule_id: cisco_nxos.cis.1.exec_timeout_for_console_sessions_is_set_for_less
    title: "Ensure Exec Timeout for Console Sessions is set for less than 10"
    severity: medium
    automation_type: automated
    cis_control: '1.2.4'
    cis_section: '1'
    profile_applicability: ""
    scope: cisco_nxos.section_1.exec_timeout_for_console_sessions_is_set_for_less
    assertion:
      field: value
      operator: lte
      expected: "true"
    remediation: >
      switch(config)# line console switch(config)# exec-timeout 10 Default Value:
      The default timeout value is 0 (ie the timeout is disabled).
    compliance:
      - cis_cisco_nxos_v1_2_0_1_2_4

  - rule_id: cisco_nxos.cis.1.exec_timeout_for_remote_administrative_sessions
    title: "Ensure Exec Timeout for Remote Administrative Sessions (VTY) is set to less than 10"
    severity: medium
    automation_type: automated
    cis_control: '1.2.5'
    cis_section: '1'
    profile_applicability: ""
    scope: cisco_nxos.section_1.exec_timeout_for_remote_administrative_sessions
    assertion:
      field: value
      operator: lte
      expected: "true"
    remediation: >
      switch(config)# line vty switch(config)# exec-timeout 10 Default Value: By
      default the exec-timeout is 0 (disabled). In this default setting the value is
      not shown in the running or saved configuration.
    compliance:
      - cis_cisco_nxos_v1_2_0_1_2_5

  - rule_id: cisco_nxos.cis.1.set_the_maximum_number_of_vty_sessions
    title: "Set the Maximum Number of VTY Sessions"
    severity: medium
    automation_type: automated
    cis_control: '1.2.6'
    cis_section: '1'
    profile_applicability: ""
    scope: cisco_nxos.section_1.set_the_maximum_number_of_vty_sessions
    assertion:
      field: row_count
      operator: lte
      expected: "true"
    remediation: >
      switch(config)# line vty switch(config)# session-limit 16 Default Value: The
      default value for this setting is 32 sessions. If set to this value, the
      setting is not shown in the running or saved configuration.
    compliance:
      - cis_cisco_nxos_v1_2_0_1_2_6

  - rule_id: cisco_nxos.cis.1.disable_the_telnet_feature
    title: "Disable the Telnet Feature"
    severity: medium
    automation_type: automated
    cis_control: '1.2.7'
    cis_section: '1'
    profile_applicability: ""
    scope: cisco_nxos.section_1.disable_the_telnet_feature
    assertion:
      field: value
      operator: equals
      expected: "no"
    remediation: >
      switch(config)# no feature telnet Default Value: By default the telnet feature
      is disabled. This setting appears in both the running and saved configuration.
    compliance:
      - cis_cisco_nxos_v1_2_0_1_2_7

  - rule_id: cisco_nxos.cis.1.enable_password_complexity_requirements_for_local
    title: "Enable Password Complexity Requirements for Local Credentials"
    severity: medium
    automation_type: automated
    cis_control: '1.4.1'
    cis_section: '1'
    profile_applicability: ""
    scope: cisco_nxos.section_1.enable_password_complexity_requirements_for_local
    assertion:
      field: row_count
      operator: gte
      expected: "true"
    remediation: >
      A single command enables this: switch(config)# password strength-check Default
      Value: Password strength checking is enabled by default. When enabled, this
      setting does not appear in the configuration. When enabled, the password
      strength settings are: • At least eight characters long • Does not contain
      many consecutive characters (such as 'abcd') • Does not contain many repeating
      characters (such as 'aaabbb') • Does not contain dictionary words • Does not
      contain proper names • Contains both uppercase and lowercase characters •
      Contains numbers Additional Information:
      https://www.cisco.com/c/en/us/td/docs/switches/datacenter/sw/4_0/nx-
      os/security/configuration/guide/sec_nx-os_config/sec_rbac.html#wp1314939
    compliance:
      - cis_cisco_nxos_v1_2_0_1_4_1

  - rule_id: cisco_nxos.cis.1.set_password_lifetime_warning_time_and_grace_time
    title: "Set password lifetime, warning time and grace time for local credentials"
    severity: medium
    automation_type: automated
    cis_control: '1.4.3'
    cis_section: '1'
    profile_applicability: ""
    scope: cisco_nxos.section_1.set_password_lifetime_warning_time_and_grace_time
    assertion:
      field: value
      operator: equals
      expected: "true"
    remediation: >
      To set passphrase timers globally: switch(config)# userpassphrase default-
      warntime <days> switch(config)# userpassphrase default-gracetime <days>
      switch(config)# userpassphrase default-lifetime <days> example:
      switch(config)# userpassphrase default-warntime 10 switch(config)#
      userpassphrase default-gracetime 10 switch(config)# userpassphrase default-
      lifetime 365 To set passphrase time values per-user: switch(config)# username
      <userid> passphrase lifetime <days> warntime <time in days> gradetime <time in
      days> example switch(config)# username test passphrase lifetime 365 warntime
      10 gracetime 10 Default Value: By default, the passphrase time values per-user
      are: • Lifetime: 99999 (this value indicates no expiry, or an infinite
      lifetime) • Gracetime: 3 days • Warntime: 14 days By default, there are no
      global default values set, they are assigned per local user as the local
      accounts are created. By default the 'admin' account does not have any
      associated timers, and these values cannot be set for this account.
    compliance:
      - cis_cisco_nxos_v1_2_0_1_4_3

  - rule_id: cisco_nxos.cis.1.set_password_length_for_local_credentials
    title: "Set password length for local credentials"
    severity: medium
    automation_type: automated
    cis_control: '1.4.4'
    cis_section: '1'
    profile_applicability: ""
    scope: cisco_nxos.section_1.set_password_length_for_local_credentials
    assertion:
      field: length
      operator: gte
      expected: "true"
    remediation: >
      Passphrase length values can only be set globally, not per-local user
      switch(config)# userpassphrase min-length <minimum passphrase length>
      switch(config)# userpassphrase max-length <maximum passphrase length> or in a
      single command: userpassphrase min-length max-length example: switch(config)#
      userpassphrase min-length 20 switch(config)# userpassphrase max-length 127 Or
      in a single command: switch(config)# userpassphrase min-length 20 max-length
      127 Default Value: The default minimum passphrase length is 8. This has
      possible values between 8 and 127. The default maximum passphrase length is
      127. This has possible values between 80 and 127.
    compliance:
      - cis_cisco_nxos_v1_2_0_1_4_4

  - rule_id: cisco_nxos.cis.1.syslog_logging_is_configured
    title: "Ensure Syslog Logging is configured"
    severity: medium
    automation_type: automated
    cis_control: '1.5.1'
    cis_section: '1'
    profile_applicability: ""
    scope: cisco_nxos.section_1.syslog_logging_is_configured
    assertion:
      field: value
      operator: exists
      expected: "true"
    remediation: >
      Configure a logging level and a syslog host: switch(config)#logging server
      <server ip address or name> switch(config)#logging level <service name>
      <logging level> or switch(config)#logging level all <logging level>
      switch(config)#logging source-interface <interface name>
      switch(config)#logging server <server ip address or name> optionally:
      switch(config)#logging server <server ip address or name> vrf [management vrf
      name] switch(config)#logging source-interface <mgmt 0 or other dedicated
      management interface> Default Value: By default syslog logging is not
      configured. By default the source interface of all logs will be the interface
      in the 'default' vrf that is topologically closest to the logging host, if
      defined. By default, the logging levels (by service or feature) are shown
      below: switch# sho logging level Facility Default Severity Current Session
      Severity -------- ---------------- ------------------------ aaa 3 3 acllog 2 2
      aclmgr 3 3 aclqos 5 5 adbm 2 2 arp 3 3 auth 0 0 authpriv 3 3 bootvar 5 5
      callhome 2 2 capability 2 2 cdp 2 2 cert_enroll 2 2 cfs 3 3 clis 3 3 clk_mgr 2
      2 confcheck 2 2 copp 2 2 cron 3 3 daemon 3 3 device_test 3 3 dhclient 2 2
      dhcp_snoop 2 2 diag_port_lb 2 2 diagclient 2 2 diagmgr 2 2 ecp 5 5 eltm 2 2
      eth_port_channel 5 5 ethpm 5 5 evmc 5 5 evms 2 2 feature-mgr 2 2 fs-daemon 2 2
      ftp 3 3 ifmgr 5 5 igmp_1 5 5 interface-vlan 2 2 ip 3 3 ipfib 2 2 ipqosmgr 4 4
      ipv6 3 3 kern 3 3 l2fm 2 2 l2pt 3 3 l3vm 5 5 lacp 2 2 licmgr 6 6 lldp 2 2
      local0 3 3 local1 3 3 local2 3 3 local3 3 3 local4 3 3 local5 3 3 local6 3 3
      local7 3 3 lpr 3 3 m2rib 2 2 m6rib 5 5 mail 3 3 mcm 2 2 mfdm 2 2 mmode 2 2
      module 5 5 monitor 3 3 mrib 5 5 mvsh 2 2 news 3 3 ntp 2 2 otm 3 3 pfstat 2 2
      pixm_gl 4 4 pixm_vl 4 4 platform 5 5 plcmgr 2 2 plugin 2 2 port-profile 2 2
      radius 3 3 res_mgr 5 5 rpm 5 5 sal 2 2 scheduler 5 5 securityd 3 3 sflow 2 2
      sksd 3 3 smm 4 4 snmpd 2 2 span 3 3 spm 2 2 stp 3 3 syslog 3 3 sysmgr 3 3
      tamnw 2 2 telemetry 3 3 template_manager 2 2 u6rib 5 5 ufdm 3 3 urib 5 5 user
      3 3 uucp 3 3 vdc_mgr 6 6 virtual-service 5 5 vlan_mgr 2 2 vshd 5 5 xbar 5 5
      xmlma 3 3 0(emergencies) 1(alerts) 2(critical) 3(errors) 4(warnings)
      5(notifications) 6(information) 7(debugging)
    compliance:
      - cis_cisco_nxos_v1_2_0_1_5_1

  - rule_id: cisco_nxos.cis.1.configure_a_time_zone
    title: "Configure a Time Zone"
    severity: medium
    automation_type: automated
    cis_control: '1.6.2'
    cis_section: '1'
    profile_applicability: ""
    scope: cisco_nxos.section_1.configure_a_time_zone
    assertion:
      field: port
      operator: exists
      expected: "true"
    remediation: >
      To set the timezone, define the timezone name, the offset in hours, then the
      offset in seconds. The example below shows EST (Offset of -5 hours, zero
      seconds). switch(config)# clock timezone EST -5 0 Default Value: By default
      UTC is set
    compliance:
      - cis_cisco_nxos_v1_2_0_1_6_2

  - rule_id: cisco_nxos.cis.1.disable_power_on_auto_provisioning_poap
    title: "Disable Power on Auto Provisioning (POAP)"
    severity: medium
    automation_type: automated
    cis_control: '1.7.1'
    cis_section: '1'
    profile_applicability: ""
    scope: cisco_nxos.section_1.disable_power_on_auto_provisioning_poap
    assertion:
      field: value
      operator: equals
      expected: "on"
    remediation: >
      To disable POAP, use the command: switch(config)# no boot poap enable Default
      Value: POAP is not enabled by default. The 'boot poap' configuration line does
      not show in the running or startup configuration if it is disabled, only if it
      is enabled. References: 1.
      https://tools.cisco.com/security/center/content/CiscoSecurityAdvisory/cisco-
      sa- 20190306-info-poap
    compliance:
      - cis_cisco_nxos_v1_2_0_1_7_1

  - rule_id: cisco_nxos.cis.1.disable_ipxe_pre_boot_execution_environment
    title: "Disable iPXE (Pre-boot eXecution Environment)"
    severity: medium
    automation_type: automated
    cis_control: '1.7.2'
    cis_section: '1'
    profile_applicability: ""
    scope: cisco_nxos.section_1.disable_ipxe_pre_boot_execution_environment
    assertion:
      field: value
      operator: equals
      expected: "on"
    remediation: >
      Setting the boot order explicity to 'bootflash' will remediate a PXE
      configured device. switch(config)# boot order bootflash You can also 'no' the
      current boot order line to revert to the default setting. For instance, to
      remove the configuration line 'boot order pxe bootflash' command, use
      switch(config)# no boot order pxe bootflash Default Value: By default the boot
      order is 'bootflash' only. This default configuration will not show in the
      configuration. However, entering any valid 'boot order' in the configuration
      will result it that order being explicit in the configuration, so entering
      'boot order bootflash' will result in that showing in the configuration.
    compliance:
      - cis_cisco_nxos_v1_2_0_1_7_2

  - rule_id: cisco_nxos.cis.1.configure_snmp_traps
    title: "Configure SNMP Traps"
    severity: medium
    automation_type: automated
    cis_control: '1.9.2'
    cis_section: '1'
    profile_applicability: ""
    scope: cisco_nxos.section_1.configure_snmp_traps
    assertion:
      field: value
      operator: equals
      expected: "true"
    remediation: >
      Examples of traps All notifications switch(config)##switch(config)#snmp-server
      enable traps CISCO-AAA-SERVER-MIB switch(config)#switch(config)#snmp-server
      enable traps aaa ENITY-MIB, CISCO-ENTITY-FRU-CONTROL-MIB, CISCO-ENTITY-SENSOR-
      MIB switch(config)#switch(config)#snmp-server enable traps entity
      switch(config)#switch(config)#snmp-server enable traps entity fru CISCO-
      LICENSE-MGR-MIB switch(config)#switch(config)#snmp-server enable traps license
      IF-MIB switch(config)#switch(config)#snmp-server enable traps link
      switch(config)#CISCO-PSM-MIB switch(config)#switch(config)#snmp-server enable
      traps port-security switch(config)#snmpv2-MIB
      switch(config)#switch(config)#snmp-server enable traps switch(config)#snmp
      switch(config)#switch(config)#snmp-server enable traps switch(config)#snmp
      authentication CISCO-FCC-MIB switch(config)##switch(config)#snmp-server enable
      traps fcc CISCO-DM-MIB switch(config)#snmp-server enable traps fcdomain CISCO-
      NS-MIB switch(config)#snmp-server enable traps fcns CISCO-FCS-MIB
      switch(config)#snmp-server enable traps fcs discovery-complete
      switch(config)#snmp-server enable traps fcs request-reject CISCO-FDMI-MIB
      switch(config)#snmp-server enable traps fdmi CISCO-FSPF-MIB
      switch(config)#snmp-server enable traps fspf CISCO-PSM-MIB
      switch(config)#snmp-server enable traps port-security CISCO-RSCN-MIB
      switch(config)#snmp-server enable traps rscn switch(config)#snmp-server enable
      traps rscn els switch(config)#snmp-server enable traps rscn ils CISCO-ZS-MIB
      switch(config)#snmp-server enable traps zone switch(config)#snmp-server enable
      traps zone default-zone-behavior-change switch(config)#snmp-server enable
      traps zone merge-failure switch(config)#snmp-server enable traps zone merge-
      success switch(config)#snmp-server enable traps zone request-reject
      switch(config)#snmp-server enable traps zone unsupp-mem References: 1.
      https://www.cisco.com/c/en/us/td/docs/switches/datacenter/nexus9000/sw/6-
      x/system_management/configuration/guide/b_Cisco_Nexus_9000_Series_NX-
      OS_System_Management_Configuration_Guide/sm_9snmp.html?form=MG0AV3
    compliance:
      - cis_cisco_nxos_v1_2_0_1_9_2


