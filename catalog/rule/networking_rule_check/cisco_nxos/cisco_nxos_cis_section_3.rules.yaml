tech_type: cisco_nxos
category: networking
cis_benchmark: CIS Cisco NX-OS v1.2.0
cis_section: '3'

rules:

  - rule_id: cisco_nxos.cis.3.disable_icmp_redirects_on_all_layer_3_interfaces
    title: "Disable ICMP Redirects on all Layer 3 Interfaces"
    severity: medium
    automation_type: automated
    cis_control: '3.2.2'
    cis_section: '3'
    profile_applicability: ""
    scope: cisco_nxos.section_3.disable_icmp_redirects_on_all_layer_3_interfaces
    assertion:
      field: value
      operator: exists
      expected: "no"
    remediation: >
      It is recommended that you perform this task on all Layer 3 Interfaces which
      have both a primary and a backup routed path to any destination. In
      particular, the next hop will need to be in the same subnet as the potential
      victim hosts. The corollary to this is that if the network is architected such
      that all layer 3 egress paths are on dedicated or 'point to point' segments
      (with no other hosts on those segments), then the ip redirect issue will never
      arise. switch(config-if) no ip redirects switch(config)# Default Value: IP
      redirects are enabled by default, and do not appear in the configuration. The
      desired value is 'no ip redirects', which will appear in the configuration.
      References: 1. https://www.cisco.com/c/en/us/support/docs/ios-nx-os-
      software/nx-os- software/213841-understanding-icmp-redirect-
      messages.html#anc17
    compliance:
      - cis_cisco_nxos_v1_2_0_3_2_2

  - rule_id: cisco_nxos.cis.3.disable_proxy_arp_on_all_layer_3_interfaces
    title: "Disable Proxy ARP on all Layer 3 Interfaces"
    severity: medium
    automation_type: automated
    cis_control: '3.2.3'
    cis_section: '3'
    profile_applicability: ""
    scope: cisco_nxos.section_3.disable_proxy_arp_on_all_layer_3_interfaces
    assertion:
      field: value
      operator: equals
      expected: "on"
    remediation: >
      Proxy ARP is disabled on all interfaces by default, and that configuration
      does not appear in the running or saved configuration. Proxy ARP only appears
      in the configuration if it is enabled (which is not desired in most cases). To
      disable this on an interface if it is enabled: switch(config-if)# no ip proxy-
      arp for instance: switch(config)# int vlan 9 switch(config-if)# no ip proxy-
      arp Default Value: By default the Proxy ARP feature is disabled on all IP
      Interfaces. This desired and default setting does not appear in the
      configuration. This default setting does not appear in the running or saved
      configurations.
    compliance:
      - cis_cisco_nxos_v1_2_0_3_2_3

  - rule_id: cisco_nxos.cis.3.disable_ip_source_routing
    title: "Disable IP Source-Routing"
    severity: medium
    automation_type: automated
    cis_control: '3.2.5'
    cis_section: '3'
    profile_applicability: ""
    scope: cisco_nxos.section_3.disable_ip_source_routing
    assertion:
      field: value
      operator: equals
      expected: "no"
    remediation: >
      switch(config)# no ip source-route Default Value: By default source-routing is
      enabled (which is not the desired setting)
    compliance:
      - cis_cisco_nxos_v1_2_0_3_2_5


