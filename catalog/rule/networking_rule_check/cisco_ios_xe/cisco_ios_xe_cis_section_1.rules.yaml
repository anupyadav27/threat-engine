tech_type: cisco_ios_xe
category: networking
cis_benchmark: CIS Cisco IOS XE 17.x v2.2.0
cis_section: '1'

rules:

  - rule_id: cisco_ios_xe.cis.1.set_aaa_accounting_exec
    title: "Set 'aaa accounting exec'"
    severity: high
    automation_type: automated
    cis_control: '1.1.8'
    cis_section: '1'
    profile_applicability: "Level 1"
    scope: cisco_ios_xe.section_1.set_aaa_accounting_exec
    assertion:
      field: row_count
      operator: equals
      expected: "true"
    remediation: >
      Configure AAA accounting for EXEC shell session. hostname(config)#aaa
      accounting exec {default | list-name | guarantee-first} {start-stop | stop-
      only | none} {radius | group group-name} Default Value: AAA accounting is not
      enabled. References: 1. http://www.cisco.com/en/US/docs/ios-
      xml/ios/security/a1/sec-cr-a1.html#GUID- 0520BCEF-89FB-4505-A5DF-D7F1389F1BBA
    compliance:
      - cis_cisco_ios_xe_17_x_v2_2_0_1_1_8

  - rule_id: cisco_ios_xe.cis.1.set_aaa_accounting_network
    title: "Set 'aaa accounting network'"
    severity: high
    automation_type: automated
    cis_control: '1.1.9'
    cis_section: '1'
    profile_applicability: "Level 1"
    scope: cisco_ios_xe.section_1.set_aaa_accounting_network
    assertion:
      field: row_count
      operator: equals
      expected: "true"
    remediation: >
      Configure AAA accounting for connections. hostname(config)#aaa accounting
      network {default | list-name | guarantee- first} {start-stop | stop-only |
      none} {radius | group group-name} Default Value: AAA accounting is not
      enabled. References: 1. http://www.cisco.com/en/US/docs/ios-
      xml/ios/security/a1/sec-cr-a1.html#GUID- 0520BCEF-89FB-4505-A5DF-D7F1389F1BBA
    compliance:
      - cis_cisco_ios_xe_17_x_v2_2_0_1_1_9

  - rule_id: cisco_ios_xe.cis.1.set_aaa_accounting_system
    title: "Set 'aaa accounting system'"
    severity: high
    automation_type: automated
    cis_control: '1.1.10'
    cis_section: '1'
    profile_applicability: "Level 1"
    scope: cisco_ios_xe.section_1.set_aaa_accounting_system
    assertion:
      field: row_count
      operator: equals
      expected: "true"
    remediation: >
      Configure AAA accounting system. hostname(config)#aaa accounting system
      {default | list-name | guarantee- first} {start-stop | stop-only | none}
      {radius | group group-name} Default Value: AAA accounting is not enabled.
      References: 1. http://www.cisco.com/en/US/docs/ios-xml/ios/security/a1/sec-
      cr-a1.html#GUID- 0520BCEF-89FB-4505-A5DF-D7F1389F1BBA Additional Information:
      When system accounting is used and the accounting server is unreachable at
      system startup time, the system will not be accessible for approximately two
      minutes.
    compliance:
      - cis_cisco_ios_xe_17_x_v2_2_0_1_1_10

  - rule_id: cisco_ios_xe.cis.1.set_transport_input_ssh_for_line_vty_connections
    title: "Set 'transport input ssh' for 'line vty' connections"
    severity: high
    automation_type: automated
    cis_control: '1.2.2'
    cis_section: '1'
    profile_applicability: "Level 1"
    scope: cisco_ios_xe.section_1.set_transport_input_ssh_for_line_vty_connections
    assertion:
      field: port
      operator: equals
      expected: "true"
    remediation: >
      Apply SSH to transport input on all VTY management lines hostname(config)#line
      vty <line-number> <ending-line-number> hostname(config-line)#transport input
      ssh References: 1.
      http://www.cisco.com/en/US/docs/ios/termserv/command/reference/tsv_s1.html#
      wp1069219
    compliance:
      - cis_cisco_ios_xe_17_x_v2_2_0_1_2_2

  - rule_id: cisco_ios_xe.cis.1.set_no_exec_for_line_aux_0
    title: "Set 'no exec' for 'line aux 0'"
    severity: high
    automation_type: automated
    cis_control: '1.2.3'
    cis_section: '1'
    profile_applicability: "Level 1"
    scope: cisco_ios_xe.section_1.set_no_exec_for_line_aux_0
    assertion:
      field: value
      operator: equals
      expected: "no"
    remediation: >
      Disable the EXEC process on the auxiliary port. hostname(config)#line aux 0
      hostname(config-line)#no exec References: 1.
      https://www.cisco.com/c/en/us/td/docs/switches/lan/catalyst9200/software/releas
      e/17-6/command_reference/b_176_9200_cr.html Additional Information: Some Cisco
      devices don't even have an auxiliary port, therefore this control will fail.
      Adjusting this control logic: check for existence of auxiliary port (ie check
      for 'none_exist' of a section with 'aux') combined with a logical OR with the
      current control.
    compliance:
      - cis_cisco_ios_xe_17_x_v2_2_0_1_2_3

  - rule_id: cisco_ios_xe.cis.1.set_exec_timeout_to_less_than_or_equal_to_10
    title: "Set 'exec-timeout' to less than or equal to 10 minutes for 'line aux 0'"
    severity: high
    automation_type: automated
    cis_control: '1.2.6'
    cis_section: '1'
    profile_applicability: "Level 1"
    scope: cisco_ios_xe.section_1.set_exec_timeout_to_less_than_or_equal_to_10
    assertion:
      field: value
      operator: equals
      expected: "10"
    remediation: >
      Configure device timeout (10 minutes or less) to disconnect sessions after a
      fixed idle time. hostname(config)#line aux 0 hostname(config-line)#exec-
      timeout <timeout_in_minutes> <timeout_in_seconds> References: 1.
      http://www.cisco.com/en/US/docs/ios-
      xml/ios/fundamentals/command/D_through_E.html#GUID-76805E6F-9E89-4457-
      A9DC-5944C8FE5419 Additional Information: Some Cisco devices don't even have
      an auxiliary port, therefore this control will fail. Adjusting this control
      logic: check for existence of auxiliary port (ie check for 'none_exist' of a
      section with 'aux') combined with a logical OR with the current control. in
      addition adjusting the regex to match the control's title. Adjusting the
      'audit' section.
    compliance:
      - cis_cisco_ios_xe_17_x_v2_2_0_1_2_6

  - rule_id: cisco_ios_xe.cis.1.set_exec_timeout_to_less_than_or_equal_to_10_min
    title: "Set 'exec-timeout' to less than or equal to 10 min on 'ip http'"
    severity: high
    automation_type: automated
    cis_control: '1.2.10'
    cis_section: '1'
    profile_applicability: "Level 1"
    scope: cisco_ios_xe.section_1.set_exec_timeout_to_less_than_or_equal_to_10_min
    assertion:
      field: value
      operator: equals
      expected: "true"
    remediation: >
      Configure device timeout (10 minutes or less) to disconnect sessions after a
      fixed idle time. ip http timeout-policy idle 600 life {nnnn} requests {nn}
      Default Value: disabled References: 1. http://www.cisco.com/en/US/docs/ios-
      xml/ios/fundamentals/command/D_through_E.html#GUID-76805E6F-9E89-4457-
      A9DC-5944C8FE5419 Additional Information: limiting http exec-timeout to 10
      minutes is useful only if http server or http secure-server, at least one, is
      enable. if HTTP server is disabled (Artifact #2 'HTTP server is disabled') and
      HTTPS server is disabled (Artifact #3 'HTTPS server is disabled'), then this
      control is passed, otherwise it needs to limit exec-timeout to a maximum of 10
      minutes (600 seconds) (Artifact #1 'Max http secure-server limit').
    compliance:
      - cis_cisco_ios_xe_17_x_v2_2_0_1_2_10

  - rule_id: cisco_ios_xe.cis.1.set_password_for_enable_secret
    title: "Set 'password' for 'enable secret'"
    severity: high
    automation_type: automated
    cis_control: '1.4.1'
    cis_section: '1'
    profile_applicability: "Level 1"
    scope: cisco_ios_xe.section_1.set_password_for_enable_secret
    assertion:
      field: value
      operator: equals
      expected: "true"
    remediation: >
      Configure a strong, enable secret password. hostname(config)#enable secret 9
      {ENABLE_SECRET_PASSWORD} Default Value: No enable secret password setup by
      default References: 1.
      https://www.cisco.com/c/en/us/td/docs/switches/lan/catalyst9600/software/releas
      e/16-
      12/configuration_guide/sec/b_1612_sec_9600_cg/controlling_switch_access_wit
      h_passwords_and_privilege_levels.html Additional Information: Note: You cannot
      recover a lost encrypted password. You must clear NVRAM and set a new
      password.
    compliance:
      - cis_cisco_ios_xe_17_x_v2_2_0_1_4_1

  - rule_id: cisco_ios_xe.cis.1.enable_service_password_encryption
    title: "Enable 'service password-encryption'"
    severity: high
    automation_type: automated
    cis_control: '1.4.2'
    cis_section: '1'
    profile_applicability: "Level 1"
    scope: cisco_ios_xe.section_1.enable_service_password_encryption
    assertion:
      field: enabled
      operator: equals
      expected: "true"
    remediation: >
      Enable password encryption service to protect sensitive access passwords in
      the device configuration. hostname(config)#service password-encryption Default
      Value: Service password encryption is not set by default References: 1.
      http://www.cisco.com/en/US/docs/ios-xml/ios/security/s1/sec-cr-s1.html#GUID-
      CC0E305A-604E-4A74-8A1A-975556CE5871 Additional Information: Caution: This
      command does not provide a high level of network security. If you use this
      command, you should also take additional network security measures. Note: You
      cannot recover a lost encrypted password. You must clear NVRAM and set a new
      password.
    compliance:
      - cis_cisco_ios_xe_17_x_v2_2_0_1_4_2

  - rule_id: cisco_ios_xe.cis.1.set_username_secret_for_all_local_users
    title: "Set 'username secret' for all local users"
    severity: high
    automation_type: automated
    cis_control: '1.4.3'
    cis_section: '1'
    profile_applicability: "Level 1"
    scope: cisco_ios_xe.section_1.set_username_secret_for_all_local_users
    assertion:
      field: value
      operator: equals
      expected: "true"
    remediation: >
      Create a local user with an encrypted, complex (not easily guessed) password.
      hostname(config)#username {{em}LOCAL_USERNAME{/em}} secret
      {{em}LOCAL_PASSWORD{/em}} Default Value: No passwords are set by default
      References: 1.
      https://www.cisco.com/c/en/us/td/docs/switches/lan/catalyst9600/software/releas
      e/16-
      12/configuration_guide/sec/b_1612_sec_9600_cg/controlling_switch_access_wit
      h_passwords_and_privilege_levels.html Additional Information: if any local
      user is defined ensure that 'secret 9' is used for each of them (Artifact #1
      'check all username are using secret 9 only'), so that reverting the hash to
      the password is difficult.
    compliance:
      - cis_cisco_ios_xe_17_x_v2_2_0_1_4_3

  - rule_id: cisco_ios_xe.cis.1.set_snmp_server_host_when_using_snmp
    title: "Set 'snmp-server host' when using SNMP"
    severity: high
    automation_type: automated
    cis_control: '1.5.7'
    cis_section: '1'
    profile_applicability: "Level 1"
    scope: cisco_ios_xe.section_1.set_snmp_server_host_when_using_snmp
    assertion:
      field: value
      operator: equals
      expected: "true"
    remediation: >
      Configure authorized SNMP trap community string and restrict sending messages
      to authorized management systems. hostname(config)#snmp-server host
      {ip_address} {trap_community_string} {notification-type} Default Value: A
      recipient is not specified to receive notifications. References: 1.
      http://www.cisco.com/en/US/docs/ios-xml/ios/snmp/command/nm-snmp-cr-
      s5.html#GUID-D84B2AB5-6485-4A23-8C26-73E50F73EE61
    compliance:
      - cis_cisco_ios_xe_17_x_v2_2_0_1_5_7

  - rule_id: cisco_ios_xe.cis.1.set_snmp_server_enable_traps_snmp
    title: "Set 'snmp-server enable traps snmp'"
    severity: high
    automation_type: automated
    cis_control: '1.5.8'
    cis_section: '1'
    profile_applicability: "Level 1"
    scope: cisco_ios_xe.section_1.set_snmp_server_enable_traps_snmp
    assertion:
      field: value
      operator: equals
      expected: "true"
    remediation: >
      Enable SNMP traps. hostname(config)#snmp-server enable traps snmp
      authentication linkup linkdown coldstart Default Value: SNMP notifications are
      disabled. References: 1. http://www.cisco.com/en/US/docs/ios-
      xml/ios/snmp/command/nm-snmp-cr- s3.html#GUID-
      EB3EB677-A355-42C6-A139-85BA30810C54
    compliance:
      - cis_cisco_ios_xe_17_x_v2_2_0_1_5_8

  - rule_id: cisco_ios_xe.cis.1.set_priv_for_each_snmp_server_group_using_snmpv3
    title: "Set 'priv' for each 'snmp-server group' using SNMPv3"
    severity: high
    automation_type: automated
    cis_control: '1.5.9'
    cis_section: '1'
    profile_applicability: "Level 1"
    scope: cisco_ios_xe.section_1.set_priv_for_each_snmp_server_group_using_snmpv3
    assertion:
      field: value
      operator: equals
      expected: "true"
    remediation: >
      For each SNMPv3 group created on your router add privacy options by issuing
      the following command... hostname(config)#snmp-server group
      {<em>group_name</em>} v3 priv Default Value: No SNMP server groups are
      configured. References: 1. http://www.cisco.com/en/US/docs/ios-
      xml/ios/snmp/command/nm-snmp-cr-
      s5.html#GUID-56E87D02-C56F-4E2D-A5C8-617E31740C3F
    compliance:
      - cis_cisco_ios_xe_17_x_v2_2_0_1_5_9

  - rule_id: cisco_ios_xe.cis.1.set_transport_input_none_for_line_aux_0
    title: "Set 'transport input none' for 'line aux 0'"
    severity: high
    automation_type: automated
    cis_control: '1.2.9'
    cis_section: '1'
    profile_applicability: "Level 1"
    scope: cisco_ios_xe.section_1.set_transport_input_none_for_line_aux_0
    assertion:
      field: port
      operator: equals
      expected: "true"
    remediation: >
      Disable the inbound connections on the auxiliary port. hostname(config)#line
      aux 0 hostname(config-line)#transport input none References: 1.
      http://www.cisco.com/en/US/docs/ios/termserv/command/reference/tsv_s1.html#
      wp1069219
    compliance:
      - cis_cisco_ios_xe_17_x_v2_1_0_1_2_9


