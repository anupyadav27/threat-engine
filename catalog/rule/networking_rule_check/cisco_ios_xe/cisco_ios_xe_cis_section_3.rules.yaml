tech_type: cisco_ios_xe
category: networking
cis_benchmark: CIS Cisco IOS XE 17.x v2.2.0
cis_section: '3'

rules:

  - rule_id: cisco_ios_xe.cis.3.set_no_ip_proxy_arp
    title: "Set 'no ip proxy-arp'"
    severity: medium
    automation_type: automated
    cis_control: '3.1.2'
    cis_section: '3'
    profile_applicability: "Level 2"
    scope: cisco_ios_xe.section_3.set_no_ip_proxy_arp
    assertion:
      field: value
      operator: equals
      expected: "true"
    remediation: >
      Disable proxy ARP on all interfaces. hostname(config)#interface {interface}
      hostname(config-if)#no ip proxy-arp Default Value: Enabled References: 1.
      http://www.cisco.com/en/US/docs/ios-xml/ios/ipaddr/command/ipaddr-
      i4.html#GUID-AEB7DDCB-7B3D-4036-ACF0-0A0250F3002E
    compliance:
      - cis_cisco_ios_xe_17_x_v2_2_0_3_1_2

  - rule_id: cisco_ios_xe.cis.3.set_key_chain
    title: "Set 'key chain'"
    severity: medium
    automation_type: automated
    cis_control: '3.3.1.1'
    cis_section: '3'
    profile_applicability: "Level 2"
    scope: cisco_ios_xe.section_3.set_key_chain
    assertion:
      field: value
      operator: gte
      expected: "true"
    remediation: >
      Establish the key chain. hostname(config)#key chain {<em>key-chain_name</em>}
      Default Value: Not set References: 1. http://www.cisco.com/en/US/docs/ios-
      xml/ios/iproute_pi/command/iri-cr-
      a1.html#GUID-A62E89F5-0B8B-4CF0-B4EB-08F2762D88BB
    compliance:
      - cis_cisco_ios_xe_17_x_v2_2_0_3_3_1_1

  - rule_id: cisco_ios_xe.cis.3.set_key
    title: "Set 'key'"
    severity: medium
    automation_type: automated
    cis_control: '3.3.1.2'
    cis_section: '3'
    profile_applicability: "Level 2"
    scope: cisco_ios_xe.section_3.set_key
    assertion:
      field: value
      operator: equals
      expected: "true"
    remediation: >
      Configure the key number. hostname(config-keychain)#key {<em>key-number</em>}
      References: 1. http://www.cisco.com/en/US/docs/ios-
      xml/ios/iproute_pi/command/iri-cr-
      a1.html#GUID-3F31B2E0-0E4B-4F49-A4A8-8ADA1CA0D73F
    compliance:
      - cis_cisco_ios_xe_17_x_v2_2_0_3_3_1_2

  - rule_id: cisco_ios_xe.cis.3.set_key_string
    title: "Set 'key-string'"
    severity: medium
    automation_type: automated
    cis_control: '3.3.1.3'
    cis_section: '3'
    profile_applicability: "Level 2"
    scope: cisco_ios_xe.section_3.set_key_string
    assertion:
      field: value
      operator: equals
      expected: "true"
    remediation: >
      Configure the key string. hostname(config-keychain-key)#key-string <<em>key-
      string</em>> Default Value: Not set References: 1.
      http://www.cisco.com/en/US/docs/ios-xml/ios/iproute_pi/command/iri-cr-
      a1.html#GUID-D7A8DC18-2E16-4EA5-8762-8B68B94CC43E
    compliance:
      - cis_cisco_ios_xe_17_x_v2_2_0_3_3_1_3


