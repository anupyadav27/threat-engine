tech_type: cisco_ios_xe
category: networking
cis_benchmark: CIS Cisco IOS XE 17.x v2.2.0
cis_section: '2'

rules:

  - rule_id: cisco_ios_xe.cis.2.set_the_hostname
    title: "Set the 'hostname'"
    severity: high
    automation_type: automated
    cis_control: '2.1.1.1.1'
    cis_section: '2'
    profile_applicability: "Level 1"
    scope: cisco_ios_xe.section_2.set_the_hostname
    assertion:
      field: value
      operator: equals
      expected: "true"
    remediation: >
      Configure an appropriate host name for the router. hostname(config)#hostname
      {<em>router_name</em>} Default Value: The default hostname is Router.
      References: 1. http://www.cisco.com/en/US/docs/ios-
      xml/ios/fundamentals/command/F_through_K.html#GUID-F3349988-EC16-
      484A-BE81-4C40110E6625
    compliance:
      - cis_cisco_ios_xe_17_x_v2_2_0_2_1_1_1_1

  - rule_id: cisco_ios_xe.cis.2.set_the_ip_domain_name
    title: "Set the 'ip domain-name'"
    severity: high
    automation_type: automated
    cis_control: '2.1.1.1.2'
    cis_section: '2'
    profile_applicability: "Level 1"
    scope: cisco_ios_xe.section_2.set_the_ip_domain_name
    assertion:
      field: value
      operator: equals
      expected: "true"
    remediation: >
      Configure an appropriate domain name for the router. hostname (config)#ip
      domain-name {<em>domain-name</em>} Default Value: No domain is set.
      References: 1. http://www.cisco.com/en/US/docs/ios-
      xml/ios/ipaddr/command/ipaddr-
      i3.html#GUID-A706D62B-9170-45CE-A2C2-7B2052BE2CAB
    compliance:
      - cis_cisco_ios_xe_17_x_v2_2_0_2_1_1_1_2

  - rule_id: cisco_ios_xe.cis.2.set_version_2_for_ip_ssh_version
    title: "Set version 2 for 'ip ssh version'"
    severity: high
    automation_type: automated
    cis_control: '2.1.1.2'
    cis_section: '2'
    profile_applicability: "Level 1"
    scope: cisco_ios_xe.section_2.set_version_2_for_ip_ssh_version
    assertion:
      field: version
      operator: equals
      expected: "true"
    remediation: >
      Configure the router to use SSH version 2 hostname(config)#ip ssh version 2
      Default Value: SSH is not enabled by default. When enabled, SSH operates in
      compatibility mode (versions 1 and 2 supported). References: 1.
      http://www.cisco.com/en/US/docs/ios-xml/ios/security/d1/sec-cr-i3.html#GUID-
      170AECF1-4B5B-462A-8CC8-999DEDC45C21
    compliance:
      - cis_cisco_ios_xe_17_x_v2_2_0_2_1_1_2

  - rule_id: cisco_ios_xe.cis.2.set_no_cdp_run
    title: "Set 'no cdp run'"
    severity: high
    automation_type: automated
    cis_control: '2.1.2'
    cis_section: '2'
    profile_applicability: "Level 1"
    scope: cisco_ios_xe.section_2.set_no_cdp_run
    assertion:
      field: value
      operator: equals
      expected: "true"
    remediation: >
      Disable Cisco Discovery Protocol (CDP) service globally. hostname(config)#no
      cdp run Default Value: Enabled on all platforms except the Cisco 10000 Series
      Edge Services Router References: 1. http://www.cisco.com/en/US/docs/ios-
      xml/ios/cdp/command/cdp-cr- a1.html#GUID-E006FAC8-417E-4C3F-B732-4D47B0447750
    compliance:
      - cis_cisco_ios_xe_17_x_v2_2_0_2_1_2

  - rule_id: cisco_ios_xe.cis.2.set_no_service_dhcp
    title: "Set 'no service dhcp'"
    severity: high
    automation_type: automated
    cis_control: '2.1.4'
    cis_section: '2'
    profile_applicability: "Level 1"
    scope: cisco_ios_xe.section_2.set_no_service_dhcp
    assertion:
      field: value
      operator: equals
      expected: "no"
    remediation: >
      Disable the DHCP server. hostname(config)#<strong>no service dhcp</strong>
      Default Value: Enabled by default, but also requires a DHCP pool to be set to
      activate the DHCP server. References: 1. http://www.cisco.com/en/US/docs/ios-
      xml/ios/ipaddr/command/ipaddr-
      r1.html#GUID-1516B259-AA28-4839-B968-8DDBF0B382F6
    compliance:
      - cis_cisco_ios_xe_17_x_v2_2_0_2_1_4

  - rule_id: cisco_ios_xe.cis.2.set_service_tcp_keepalives_in
    title: "Set 'service tcp-keepalives-in'"
    severity: high
    automation_type: automated
    cis_control: '2.1.5'
    cis_section: '2'
    profile_applicability: "Level 1"
    scope: cisco_ios_xe.section_2.set_service_tcp_keepalives_in
    assertion:
      field: value
      operator: equals
      expected: "true"
    remediation: >
      Enable TCP keepalives-in service: hostname(config)#service tcp-keepalives-in
      Default Value: Disabled by default. References: 1.
      http://www.cisco.com/en/US/docs/ios-
      xml/ios/fundamentals/command/R_through_setup.html#GUID-1489ABA3-2428-
      4A64-B252-296A035DB85E
    compliance:
      - cis_cisco_ios_xe_17_x_v2_2_0_2_1_5

  - rule_id: cisco_ios_xe.cis.2.set_service_tcp_keepalives_out
    title: "Set 'service tcp-keepalives-out'"
    severity: high
    automation_type: automated
    cis_control: '2.1.6'
    cis_section: '2'
    profile_applicability: "Level 1"
    scope: cisco_ios_xe.section_2.set_service_tcp_keepalives_out
    assertion:
      field: value
      operator: equals
      expected: "true"
    remediation: >
      Enable TCP keepalives-out service: hostname(config)#service tcp-keepalives-out
      Default Value: Disabled by default. References: 1.
      http://www.cisco.com/en/US/docs/ios-
      xml/ios/fundamentals/command/R_through_setup.html#GUID-9321ECDC-6284-
      4BF6-BA4A-9CEEF5F993E5
    compliance:
      - cis_cisco_ios_xe_17_x_v2_2_0_2_1_6

  - rule_id: cisco_ios_xe.cis.2.set_logging_enable
    title: "Set 'logging enable'"
    severity: high
    automation_type: automated
    cis_control: '2.2.1'
    cis_section: '2'
    profile_applicability: "Level 1"
    scope: cisco_ios_xe.section_2.set_logging_enable
    assertion:
      field: value
      operator: equals
      expected: "no"
    remediation: >
      Enable system logging. hostname(config)#archive hostname(config-archive)#log
      config hostname(config-archive-log-cfg)#logging enable hostname(config-
      archive-log-cfg)#end Default Value: Logging is not enabled/ References: 1.
      https://community.cisco.com/t5/networking-knowledge-base/how-to-configure-
      logging-in-cisco-ios/ta-p/3132434
    compliance:
      - cis_cisco_ios_xe_17_x_v2_2_0_2_2_1

  - rule_id: cisco_ios_xe.cis.2.set_buffer_size_for_logging_buffered
    title: "Set 'buffer size' for 'logging buffered'"
    severity: high
    automation_type: automated
    cis_control: '2.2.2'
    cis_section: '2'
    profile_applicability: "Level 1"
    scope: cisco_ios_xe.section_2.set_buffer_size_for_logging_buffered
    assertion:
      field: value
      operator: equals
      expected: "true"
    remediation: >
      Configure buffered logging (with minimum size). Recommended size is 64000.
      hostname(config)#logging buffered [<em>log_buffer_size</em>] Default Value: No
      logging buffer is set by default References: 1.
      http://www.cisco.com/en/US/docs/ios/netmgmt/command/reference/nm_09.html#
      wp1060051
    compliance:
      - cis_cisco_ios_xe_17_x_v2_2_0_2_2_2

  - rule_id: cisco_ios_xe.cis.2.set_logging_console_critical
    title: "Set 'logging console critical'"
    severity: high
    automation_type: automated
    cis_control: '2.2.3'
    cis_section: '2'
    profile_applicability: "Level 1"
    scope: cisco_ios_xe.section_2.set_logging_console_critical
    assertion:
      field: enabled
      operator: equals
      expected: "true"
    remediation: >
      Configure console logging level. hostname(config)#logging console critical
      Default Value: Tthe default is to log all messages Additional Information: The
      console is a slow display device. In message storms some logging messages may
      be silently dropped when the console queue becomes full. Set severity levels
      accordingly.
    compliance:
      - cis_cisco_ios_xe_17_x_v2_2_0_2_2_3

  - rule_id: cisco_ios_xe.cis.2.set_ip_address_for_logging_host
    title: "Set IP address for 'logging host'"
    severity: high
    automation_type: automated
    cis_control: '2.2.4'
    cis_section: '2'
    profile_applicability: "Level 1"
    scope: cisco_ios_xe.section_2.set_ip_address_for_logging_host
    assertion:
      field: value
      operator: equals
      expected: "true"
    remediation: >
      Designate one or more syslog servers by IP address. hostname(config)#logging
      host {syslog_server} Default Value: System logging messages are not sent to
      any remote host. References: 1.
      http://www.cisco.com/en/US/docs/ios/netmgmt/command/reference/nm_09.html#
      wp1082864
    compliance:
      - cis_cisco_ios_xe_17_x_v2_2_0_2_2_4

  - rule_id: cisco_ios_xe.cis.2.set_logging_trap_informational
    title: "Set 'logging trap informational'"
    severity: high
    automation_type: automated
    cis_control: '2.2.5'
    cis_section: '2'
    profile_applicability: "Level 1"
    scope: cisco_ios_xe.section_2.set_logging_trap_informational
    assertion:
      field: value
      operator: equals
      expected: "true"
    remediation: >
      Configure SNMP trap and syslog logging level. hostname(config)#logging trap
      informational Default Value: Disabled References: 1.
      http://www.cisco.com/en/US/docs/ios/netmgmt/command/reference/nm_09.html#
      wp1015177
    compliance:
      - cis_cisco_ios_xe_17_x_v2_2_0_2_2_5

  - rule_id: cisco_ios_xe.cis.2.set_service_timestamps_debug_datetime
    title: "Set 'service timestamps debug datetime'"
    severity: high
    automation_type: automated
    cis_control: '2.2.6'
    cis_section: '2'
    profile_applicability: "Level 1"
    scope: cisco_ios_xe.section_2.set_service_timestamps_debug_datetime
    assertion:
      field: value
      operator: equals
      expected: "true"
    remediation: >
      Configure debug messages to include timestamps. hostname(config)#service
      timestamps debug datetime {<em>msec</em>} show- timezone Default Value: Time
      stamps are applied to debug and logging messages. References: 1.
      http://www.cisco.com/en/US/docs/ios-
      xml/ios/fundamentals/command/R_through_setup.html#GUID-DC110E59-D294-
      4E3D-B67F-CCB06E607FC6
    compliance:
      - cis_cisco_ios_xe_17_x_v2_2_0_2_2_6

  - rule_id: cisco_ios_xe.cis.2.set_logging_source_interface
    title: "Set 'logging source interface'"
    severity: high
    automation_type: automated
    cis_control: '2.2.7'
    cis_section: '2'
    profile_applicability: "Level 1"
    scope: cisco_ios_xe.section_2.set_logging_source_interface
    assertion:
      field: value
      operator: equals
      expected: "true"
    remediation: >
      Bind logging to the loopback interface. hostname(config)#logging source-
      interface loopback {<em>loopback_interface_number</em>} Default Value: The
      wildcard interface address is used. References: 1.
      http://www.cisco.com/en/US/docs/ios/netmgmt/command/reference/nm_09.html#
      wp1095099
    compliance:
      - cis_cisco_ios_xe_17_x_v2_2_0_2_2_7

  - rule_id: cisco_ios_xe.cis.2.set_ntp_authenticate
    title: "Set 'ntp authenticate'"
    severity: high
    automation_type: automated
    cis_control: '2.3.1.1'
    cis_section: '2'
    profile_applicability: "Level 1"
    scope: cisco_ios_xe.section_2.set_ntp_authenticate
    assertion:
      field: value
      operator: equals
      expected: "true"
    remediation: >
      Configure NTP authentication: hostname(config)#ntp authenticate Default Value:
      NTP authentication is not enabled. References: 1.
      http://www.cisco.com/en/US/docs/ios-xml/ios/bsm/command/bsm-cr-
      n1.html#GUID-8BEBDAF4-6D03-4C3E-B8D6-6BCBC7D0F324
    compliance:
      - cis_cisco_ios_xe_17_x_v2_2_0_2_3_1_1

  - rule_id: cisco_ios_xe.cis.2.set_ntp_authentication_key
    title: "Set 'ntp authentication-key'"
    severity: high
    automation_type: automated
    cis_control: '2.3.1.2'
    cis_section: '2'
    profile_applicability: "Level 1"
    scope: cisco_ios_xe.section_2.set_ntp_authentication_key
    assertion:
      field: value
      operator: equals
      expected: "true"
    remediation: >
      Configure at the NTP key ring and encryption key using the following command
      hostname(config)#ntp authentication-key {ntp_key_id} md5 {ntp_key_hash}
      Default Value: No authentication key is defined for NTP. References: 1.
      http://www.cisco.com/en/US/docs/ios-xml/ios/bsm/command/bsm-cr-
      n1.html#GUID-0435BFD1-D7D7-41D4-97AC-7731C11226BC
    compliance:
      - cis_cisco_ios_xe_17_x_v2_2_0_2_3_1_2

  - rule_id: cisco_ios_xe.cis.2.set_the_ntp_trusted_key
    title: "Set the 'ntp trusted-key'"
    severity: high
    automation_type: automated
    cis_control: '2.3.1.3'
    cis_section: '2'
    profile_applicability: "Level 1"
    scope: cisco_ios_xe.section_2.set_the_ntp_trusted_key
    assertion:
      field: value
      operator: equals
      expected: "true"
    remediation: >
      Configure the NTP trusted key using the following command hostname(config)#ntp
      trusted-key {ntp_key_id} Default Value: Authentication of the identity of the
      system is disabled. References: 1. http://www.cisco.com/en/US/docs/ios-
      xml/ios/bsm/command/bsm-cr- n1.html#GUID-89CA798D-0F12-4AE8-B382-DE10CBD261DB
    compliance:
      - cis_cisco_ios_xe_17_x_v2_2_0_2_3_1_3

  - rule_id: cisco_ios_xe.cis.2.set_ip_address_for_ntp_server
    title: "Set 'ip address' for 'ntp server'"
    severity: high
    automation_type: automated
    cis_control: '2.3.2'
    cis_section: '2'
    profile_applicability: "Level 1"
    scope: cisco_ios_xe.section_2.set_ip_address_for_ntp_server
    assertion:
      field: value
      operator: equals
      expected: "true"
    remediation: >
      Configure at least one external NTP Server using the following commands
      hostname(config)#ntp server {ntp-server_ip_address} or hostname(config)#ntp
      server {ntp server vrf [vrf name] ip address} Default Value: No servers are
      configured by default. References: 1. http://www.cisco.com/en/US/docs/ios-
      xml/ios/bsm/command/bsm-cr- n1.html#GUID-255145EB-D656-43F0-B361-D9CBCC794112
      2. https://www.cisco.com/c/en/us/td/docs/ios-xml/ios/bsm/command/bsm-cr-
      book/bsm-cr-n1.html#wp3294676008
    compliance:
      - cis_cisco_ios_xe_17_x_v2_2_0_2_3_2

  - rule_id: cisco_ios_xe.cis.2.create_a_single_interface_loopback
    title: "Create a single 'interface loopback'"
    severity: high
    automation_type: automated
    cis_control: '2.4.1'
    cis_section: '2'
    profile_applicability: "Level 1"
    scope: cisco_ios_xe.section_2.create_a_single_interface_loopback
    assertion:
      field: value
      operator: equals
      expected: "true"
    remediation: >
      Define and configure one loopback interface. hostname(config)#interface
      loopback <<em>number</em>> hostname(config-if)#ip address
      <<em>loopback_ip_address</em>> <<em>loopback_subnet_mask</em>> Default Value:
      There are no loopback interfaces defined by default. References: 1.
      http://www.cisco.com/en/US/docs/ios-xml/ios/interface/command/ir-
      i1.html#GUID-0D6BDFCD-3FBB-4D26-A274-C1221F8592DF
    compliance:
      - cis_cisco_ios_xe_17_x_v2_2_0_2_4_1

  - rule_id: cisco_ios_xe.cis.2.set_aaa_source_interface
    title: "Set AAA 'source-interface'"
    severity: high
    automation_type: automated
    cis_control: '2.4.2'
    cis_section: '2'
    profile_applicability: "Level 1"
    scope: cisco_ios_xe.section_2.set_aaa_source_interface
    assertion:
      field: value
      operator: equals
      expected: "true"
    remediation: >
      Bind AAA services to the loopback interface. Hostname(config)#ip radius
      source-interface loopback {loopback_interface_number} or Hostname(config)#aaa
      group server tacacs+ {group_name} hostname(config-sg- tacacs+)#ip tacacs
      source-interface {loopback_interface_number} References: 1.
      http://www.cisco.com/en/US/docs/ios-xml/ios/security/d1/sec-cr-i2.html#GUID-
      22E8B211-751F-48E0-9C76-58F0FE0AABA8 2. http://www.cisco.com/en/US/docs/ios-
      xml/ios/security/d1/sec-cr-i3.html#GUID- 54A00318-CF69-46FC-9ADC-313BFC436713
    compliance:
      - cis_cisco_ios_xe_17_x_v2_2_0_2_4_2

  - rule_id: cisco_ios_xe.cis.2.set_ntp_source_to_loopback_interface
    title: "Set 'ntp source' to Loopback Interface"
    severity: high
    automation_type: automated
    cis_control: '2.4.3'
    cis_section: '2'
    profile_applicability: "Level 1"
    scope: cisco_ios_xe.section_2.set_ntp_source_to_loopback_interface
    assertion:
      field: value
      operator: equals
      expected: "true"
    remediation: >
      Bind the NTP service to the loopback interface. hostname(config)#ntp source
      loopback {<em>loopback_interface_number}</em> Default Value: Source address is
      determined by the outgoing interface. References: 1.
      http://www.cisco.com/en/US/docs/ios-xml/ios/bsm/command/bsm-cr- n1.html#GUID-
      DF29FBFB-E1C0-4E5C-9013-D4CE59CA0B88
    compliance:
      - cis_cisco_ios_xe_17_x_v2_2_0_2_4_3

  - rule_id: cisco_ios_xe.cis.2.set_ip_tftp_source_interface_to_the_loopback
    title: "Set 'ip tftp source-interface' to the Loopback Interface"
    severity: high
    automation_type: automated
    cis_control: '2.4.4'
    cis_section: '2'
    profile_applicability: "Level 1"
    scope: cisco_ios_xe.section_2.set_ip_tftp_source_interface_to_the_loopback
    assertion:
      field: value
      operator: equals
      expected: "true"
    remediation: >
      Bind the TFTP client to the loopback interface. hostname(config)#ip tftp
      source-interface loopback {<em>loobpback_interface_number</em>} Default Value:
      The address of the closest interface to the destination is selected as the
      source address. References: 1. http://www.cisco.com/en/US/docs/ios-
      xml/ios/fundamentals/command/F_through_K.html#GUID-9AA27050-A578-
      47CD-9F1D-5A8E2B449209
    compliance:
      - cis_cisco_ios_xe_17_x_v2_2_0_2_4_4

  - rule_id: cisco_ios_xe.cis.2.set_no_ip_identd
    title: "Set 'no ip identd'"
    severity: high
    automation_type: automated
    cis_control: '2.1.5'
    cis_section: '2'
    profile_applicability: "Level 1"
    scope: cisco_ios_xe.section_2.set_no_ip_identd
    assertion:
      field: value
      operator: equals
      expected: "no"
    remediation: >
      Disable the ident server. hostname(config)#no ip identd Default Value:
      Disabled by default References: 1.
      http://www.cisco.com/en/US/docs/solutions/Enterprise/Security/Baseline_Securit
      y/sec_chap4.html#wp1056539
    compliance:
      - cis_cisco_ios_xe_17_x_v2_1_0_2_1_5


