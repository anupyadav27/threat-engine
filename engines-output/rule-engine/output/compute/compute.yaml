version: '1.0'
provider: azure
service: compute
services:
  client: compute
  module: azure.mgmt.{service}.{Service}ManagementClient
discovery: []
checks:
- rule_id: azure.compute.resource.vm_provisioned_successfully
  for_each: ''
  conditions:
    var: item.provisioningState
    op: equals
    value: Succeeded
