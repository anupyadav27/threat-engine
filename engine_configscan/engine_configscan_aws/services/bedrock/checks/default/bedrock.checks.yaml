version: '1.0'
provider: aws
service: bedrock
checks:
- rule_id: aws.bedrock.model.bedrock_artifact_encrypted_at_rest
  for_each: aws.bedrock.get_custom_model
  conditions:
    var: item.modelKmsKeyArn
    op: exists
    value: null
- rule_id: aws.bedrock.model.bedrock_image_scan_passed_configured
  for_each: aws.bedrock.get_model_invocation_logging_configuration
  conditions:
    var: item.loggingConfig.imageDataDeliveryEnabled
    op: equals
    value: 'true'
- rule_id: aws.bedrock.model.bedrock_kms_cmk_used_configured
  for_each: aws.bedrock.get_custom_model
  conditions:
    var: item.modelKmsKeyArn
    op: exists
    value: null
- rule_id: aws.bedrock.model.bedrock_package_approved_configured
  for_each: aws.bedrock.list_enforced_guardrails_configuration
  conditions:
    all:
    - var: item.guardrailArn
      op: exists
      value: null
    - var: item.guardrailId
      op: exists
      value: null
- rule_id: aws.bedrock.model.execution_role_least_privilege
  for_each: aws.bedrock.list_model_invocation_jobs
  conditions:
    var: item.roleArn
    op: exists
    value: null
- rule_id: aws.bedrock.model.kms_encryption_enabled
  for_each: aws.bedrock.get_custom_model
  conditions:
    var: item.modelKmsKeyArn
    op: exists
    value: null
- rule_id: aws.bedrock.resource.model_invocation_logging_enabled
  for_each: aws.bedrock.get_model_invocation_logging_configuration
  conditions:
    all:
    - var: item.loggingConfig.cloudWatchConfig
      op: exists
      value: null
    - var: item.loggingConfig.s3Config
      op: exists
      value: null
    - var: item.loggingConfig.textDataDeliveryEnabled
      op: equals
      value: 'true'
    - var: item.loggingConfig.imageDataDeliveryEnabled
      op: equals
      value: 'true'
    - var: item.loggingConfig.embeddingDataDeliveryEnabled
      op: equals
      value: 'true'
    - var: item.loggingConfig.videoDataDeliveryEnabled
      op: equals
      value: 'true'
- rule_id: aws.bedrock.resource.model_invocation_logs_encryption_enabled
  for_each: aws.bedrock.get_model_invocation_logging_configuration
  conditions:
    all:
    - var: item.loggingConfig.cloudWatchConfig
      op: exists
      value: null
    - var: item.loggingConfig.s3Config
      op: exists
      value: null
