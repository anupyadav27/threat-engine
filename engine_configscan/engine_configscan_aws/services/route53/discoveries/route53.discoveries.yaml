version: '1.0'
provider: aws
service: route53
services:
  client: route53
  module: boto3.client
discovery:
- discovery_id: aws.route53.list_hosted_zones
  calls:
  - action: list_hosted_zones
    params:
      MaxItems: '100'
    save_as: response
  emit:
    items_for: '{{ response.HostedZones }}'
    as: item
- discovery_id: aws.route53.list_query_logging_configs
  calls:
  - action: list_query_logging_configs
    params:
      MaxItems: '100'
    save_as: response
  emit:
    items_for: '{{ response.QueryLoggingConfigs }}'
    as: item
- discovery_id: aws.route53.list_traffic_policy_instances
  calls:
  - action: list_traffic_policy_instances
    params:
      MaxItems: '100'
    save_as: response
  emit:
    items_for: '{{ response.TrafficPolicyInstances }}'
    as: item
- discovery_id: aws.route53.list_health_checks
  calls:
  - action: list_health_checks
    params:
      MaxItems: '100'
    save_as: response
  emit:
    items_for: '{{ response.HealthChecks }}'
    as: item

- discovery_id: aws.route53.list_resource_record_sets
  for_each: aws.route53.list_hosted_zones
  calls:
  - action: list_resource_record_sets
    params:
      HostedZoneId: '{{ item.Id }}'
      MaxItems: '1000'
    save_as: response
  emit:
    items_for: '{{ response.ResourceRecordSets }}'
    as: record
    item:
      Name: '{{ record.Name }}'
      Type: '{{ record.Type }}'
      TTL: '{{ record.TTL if record.TTL is defined else \"\" }}'
      ResourceRecords: '{{ record.ResourceRecords if record.ResourceRecords is defined else [] }}'
      AliasTarget: '{{ record.AliasTarget if record.AliasTarget is defined else {} }}'
      Failover: '{{ record.Failover if record.Failover is defined else \"\" }}'
      Weight: '{{ record.Weight if record.Weight is defined else \"\" }}'
      SetIdentifier: '{{ record.SetIdentifier if record.SetIdentifier is defined else \"\" }}'
      HostedZoneId: '{{ item.Id }}'
      resource_arn: '{{ \"arn:aws:route53::%s:hostedzone/%s\" | format(item.Config.AccountId if item.get(\"Config\") else \"\", item.Id) if item is defined else \"\" }}'
