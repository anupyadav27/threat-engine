version: '1.0'
provider: aws
service: organizations
services:
  client: organizations
  module: boto3.client
discovery:
- discovery_id: aws.organizations.list_targets_for_policy
  calls:
  - action: list_policies
    params:
      Filter: SERVICE_CONTROL_POLICY
      MaxResults: 1000
    save_as: response
  emit:
    items_for: '{{ response.Policies }}'
    as: item
- discovery_id: aws.organizations.list_outbound_responsibility_transfers
  calls:
  - action: list_accounts
    save_as: response
    params:
      MaxResults: 1000
  emit:
    items_for: '{{ response.Accounts }}'
    as: item
- discovery_id: aws.organizations.describe_organization
  calls:
  - action: describe_organization
    save_as: response
    params:
      MaxResults: 1000
  emit: {}
- discovery_id: aws.organizations.list_policies_for_target
  calls:
  - action: list_policies
    params:
      Filter: SERVICE_CONTROL_POLICY
      MaxResults: 1000
    save_as: response
  emit:
    items_for: '{{ response.Policies }}'
    as: item
- discovery_id: aws.organizations.describe_account
  for_each: aws.organizations.list_accounts
  calls:
  - action: describe_account
    params:
      AccountId: '{{ item.Id }}'
      MaxResults: 1000
    save_as: response
  emit: {}
- discovery_id: aws.organizations.list_roots
  calls:
  - action: list_roots
    save_as: response
    params:
      MaxResults: 1000
  emit:
    items_for: '{{ response.Roots }}'
    as: item
- discovery_id: aws.organizations.list_accounts_with_invalid_effective_policy
  calls:
  - action: list_accounts
    save_as: response
    params:
      MaxResults: 1000
  emit:
    items_for: '{{ response.Accounts }}'
    as: item
- discovery_id: aws.organizations.list_accounts
  calls:
  - action: list_accounts
    save_as: response
    params:
      MaxResults: 1000
  emit:
    items_for: '{{ response.Accounts }}'
    as: item
- discovery_id: aws.organizations.describe_effective_policy
  for_each: aws.organizations.list_accounts
  calls:
  - action: describe_effective_policy
    params:
      PolicyType: SERVICE_CONTROL_POLICY
      TargetId: '{{ item.Id }}'
      MaxResults: 1000
    save_as: response
    on_error: continue
  emit: {}
checks:
- rule_id: aws.organizations.service_control_policy.organizations_mandatory_block_disabling_guardrail_services_configured
  for_each: aws.organizations.list_targets_for_policy
  conditions:
    all:
    - var: item.Type
      op: equals
      value: SERVICE_CONTROL_POLICY
    - var: item.Name
      op: exists
      value: null
- rule_id: aws.organizations.organization.inactive_user_disable_threshold_configured
  for_each: aws.organizations.list_outbound_responsibility_transfers
  conditions:
    var: item.Status
    op: not_equals
    value: SUSPENDED
- rule_id: aws.organizations.service_control_policy.mandatory_deny_iam_star_admin_configured
  for_each: aws.organizations.list_targets_for_policy
  conditions:
    all:
    - var: item.Type
      op: equals
      value: SERVICE_CONTROL_POLICY
    - var: item.AwsManaged
      op: equals
      value: 'false'
    - var: item.Name
      op: equals
      value: DenyIAMStarAdmin
- rule_id: aws.organizations.account.break_glass_s_mfa_enforced
  for_each: aws.organizations.describe_organization
  conditions:
    var: item.MasterAccountId
    op: exists
    value: null
- rule_id: aws.organizations.account.organizations_lockout_threshold_configured
  for_each: aws.organizations.describe_organization
  conditions:
    var: item.MasterAccountId
    op: exists
    value: null
- rule_id: aws.organizations.organizational_unit.organizations_no_overly_permissive_exceptions_configured
  for_each: aws.organizations.list_targets_for_policy
  conditions:
    all:
    - var: item.Name
      op: exists
      value: null
    - var: item.Id
      op: exists
      value: null
- rule_id: aws.organizations.policy.organizations_no_wildcard_admin_actions_configured
  for_each: aws.organizations.list_policies_for_target
  conditions:
    all:
    - var: item.AwsManaged
      op: equals
      value: 'false'
    - var: item.Type
      op: equals
      value: SERVICE_CONTROL_POLICY
    - var: item.Name
      op: exists
      value: null
- rule_id: aws.organizations.organization.organizations_sso_federation_configured_if_supported
  for_each: aws.organizations.describe_organization
  conditions:
    var: item.FeatureSet
    op: equals
    value: ALL
- rule_id: aws.organizations.account.inactive_user_disable_threshold_configured
  for_each: aws.organizations.list_outbound_responsibility_transfers
  conditions:
    all:
    - var: item.Status
      op: equals
      value: ACTIVE
    - var: item.JoinedTimestamp
      op: exists
      value: null
- rule_id: aws.organizations.organization.api_access_keys_root_or_owner_disallowed_configured
  for_each: aws.organizations.describe_organization
  conditions:
    all:
    - var: item.MasterAccountId
      op: exists
      value: null
    - var: item.MasterAccountEmail
      op: exists
      value: null
- rule_id: aws.organizations.organization.organizations_lockout_threshold_configured
  for_each: aws.organizations.describe_organization
  conditions:
    var: item.MasterAccountId
    op: exists
    value: null
- rule_id: aws.organizations.policy.editors_rbac_least_privilege
  for_each: aws.organizations.list_targets_for_policy
  conditions:
    all:
    - var: item.Type
      op: equals
      value: SERVICE_CONTROL_POLICY
    - var: item.AwsManaged
      op: equals
      value: 'false'
    - var: item.Name
      op: exists
      value: null
- rule_id: aws.organizations.account.password_policy_compliant
  for_each: aws.organizations.describe_account
  conditions:
    all:
    - var: item.PasswordPolicy.MinimumPasswordLength
      op: greater_than
      value: '8'
    - var: item.PasswordPolicy.RequireSymbols
      op: equals
      value: 'true'
    - var: item.PasswordPolicy.RequireNumbers
      op: equals
      value: 'true'
    - var: item.PasswordPolicy.RequireUppercaseCharacters
      op: equals
      value: 'true'
    - var: item.PasswordPolicy.RequireLowercaseCharacters
      op: equals
      value: 'true'
    - var: item.PasswordPolicy.AllowUsersToChangePassword
      op: equals
      value: 'true'
    - var: item.PasswordPolicy.ExpirePasswords
      op: equals
      value: 'true'
- rule_id: aws.organizations.account.organizations_part_of_organizations_configured
  for_each: aws.organizations.describe_organization
  conditions:
    var: item.MasterAccountId
    op: exists
    value: null
- rule_id: aws.organizations.resource.organizations_tags_policies_enabled_and
  for_each: aws.organizations.describe_organization
  conditions:
    all:
    - var: item.FeatureSet
      op: equals
      value: ALL
    - var: item.AvailablePolicyTypes
      op: exists
      value: null
- rule_id: aws.organizations.account.no_public_admin_roles_configured
  for_each: aws.organizations.list_roots
  conditions:
    var: item.Id
    op: exists
    value: null
- rule_id: aws.organizations.organization.organizations_min_length_14_configured
  for_each: aws.organizations.describe_organization
  conditions:
    var: item.FeatureSet
    op: equals
    value: ALL
- rule_id: aws.organizations.organization.organizations_all_accounts_enrolled_in_org_configured
  for_each: aws.organizations.list_accounts_with_invalid_effective_policy
  conditions:
    all:
    - var: item.JoinedMethod
      op: equals
      value: INVITED
    - var: item.JoinedMethod
      op: equals
      value: CREATED
- rule_id: aws.organizations.account.organizations_max_age_90_days_or_less_configured
  for_each: aws.organizations.describe_organization
  conditions:
    var: item.MasterAccountId
    op: exists
    value: null
- rule_id: aws.organizations.organization.organizations_prevent_reuse_last_24_configured
  for_each: aws.organizations.describe_organization
  conditions:
    var: item.FeatureSet
    op: equals
    value: ALL
- rule_id: aws.organizations.account.api_access_keys_root_or_owner_disallowed_configured
  for_each: aws.organizations.list_accounts
  conditions:
    all:
    - var: item.RootAccessKeys
      op: equals
      value: null
    - var: item.OwnerAccessKeys
      op: equals
      value: null
- rule_id: aws.organizations.service_control_policy.organizations_no_allow_star_on_star_resources_configured
  for_each: aws.organizations.list_policies_for_target
  conditions:
    all:
    - var: item.AwsManaged
      op: equals
      value: 'false'
    - var: item.Name
      op: not_equals
      value: '*'
- rule_id: aws.organizations.account.console_mfa_required_org_wide
  for_each: aws.organizations.list_policies_for_target
  conditions:
    all:
    - var: item.Id
      op: exists
      value: null
    - var: item.Id
      op: not_equals
      value: null
- rule_id: aws.organizations.account.organizations_sso_federation_configured_if_supported
  for_each: aws.organizations.describe_organization
  conditions:
    all:
    - var: item.FeatureSet
      op: equals
      value: ALL
    - var: item.MasterAccountId
      op: exists
      value: null
- rule_id: aws.organizations.account.organizations_require_upper_lower_number_special_configured
  for_each: aws.organizations.describe_organization
  conditions:
    all:
    - var: item.FeatureSet
      op: equals
      value: ALL
    - var: item.MasterAccountId
      op: exists
      value: null
- rule_id: aws.organizations.account.organizations_required_guardrail_policies_enabled
  for_each: aws.organizations.list_targets_for_policy
  conditions:
    all:
    - var: item.Type
      op: equals
      value: SERVICE_CONTROL_POLICY
    - var: item.AwsManaged
      op: equals
      value: 'true'
- rule_id: aws.organizations.service_control_policy.mandatory_require_mfa_for_console_if_supported
  for_each: aws.organizations.list_targets_for_policy
  conditions:
    all:
    - var: item.Type
      op: equals
      value: SERVICE_CONTROL_POLICY
    - var: item.Name
      op: exists
      value: null
- rule_id: aws.organizations.account.organizations_prevent_reuse_last_24_configured
  for_each: aws.organizations.describe_organization
  conditions:
    var: item.FeatureSet
    op: equals
    value: ALL
- rule_id: aws.organizations.organization.organizations_scps_enabled
  for_each: aws.organizations.describe_organization
  conditions:
    var: item.FeatureSet
    op: equals
    value: ALL
- rule_id: aws.organizations.organization.organizations_max_age_90_days_or_less_configured
  for_each: aws.organizations.describe_organization
  conditions:
    var: item.MasterAccountId
    op: exists
    value: null
- rule_id: aws.organizations.account.security_services_mandatory_enabled
  for_each: aws.organizations.describe_organization
  conditions:
    all:
    - var: item.FeatureSet
      op: equals
      value: ALL
    - var: item.MasterAccountId
      op: exists
      value: null
- rule_id: aws.organizations.organization.block_leave_org_by_policy_configured
  for_each: aws.organizations.describe_organization
  conditions:
    var: item.FeatureSet
    op: equals
    value: ALL
- rule_id: aws.organizations.organizational_unit.organizations_required_scps_enabled
  for_each: aws.organizations.list_targets_for_policy
  conditions:
    all:
    - var: item.Type
      op: equals
      value: SERVICE_CONTROL_POLICY
    - var: item.Id
      op: exists
      value: null
- rule_id: aws.organizations.organization.organizations_require_upper_lower_number_special_configured
  for_each: aws.organizations.describe_organization
  conditions:
    all:
    - var: item.FeatureSet
      op: equals
      value: ALL
    - var: item.MasterAccountId
      op: exists
      value: null
- rule_id: aws.organizations.organizational_unit.organizations_auto_tag_policies_enabled_if_supported
  for_each: aws.organizations.list_targets_for_policy
  conditions:
    var: item.Type
    op: equals
    value: TAG_POLICY
- rule_id: aws.organizations.account.organizations_min_length_14_configured
  for_each: aws.organizations.describe_organization
  conditions:
    var: item.FeatureSet
    op: equals
    value: ALL
- rule_id: aws.organizations.organization.console_mfa_required_org_wide
  for_each: aws.organizations.describe_organization
  conditions:
    var: item.FeatureSet
    op: equals
    value: ALL
- rule_id: aws.organizations.organization.break_glass_accounts_mfa_enforced
  for_each: aws.organizations.describe_organization
  conditions:
    all:
    - var: item.FeatureSet
      op: equals
      value: ALL
    - var: item.MasterAccountId
      op: exists
      value: null
- rule_id: aws.organizations.organization.restrict_region_usage_by_policy_where_required
  for_each: aws.organizations.describe_organization
  conditions:
    all:
    - var: item.FeatureSet
      op: equals
      value: ALL
    - var: item.AvailablePolicyTypes
      op: exists
      value: null
- rule_id: aws.organizations.policy.versioning_and_change_audit_enabled
  for_each: aws.organizations.describe_effective_policy
  conditions:
    all:
    - var: item.PolicyContent
      op: exists
      value: null
    - var: item.LastUpdatedTimestamp
      op: exists
      value: null
- rule_id: aws.organizations.organization.password_policy_compliant
  for_each: aws.organizations.describe_organization
  conditions:
    var: item.FeatureSet
    op: equals
    value: ALL
