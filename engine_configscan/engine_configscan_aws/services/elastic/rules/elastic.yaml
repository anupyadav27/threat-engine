version: '1.0'
provider: aws
service: elastic
services:
  client: elastic
  module: boto3.client
discovery:
- discovery_id: aws.elastic.list_domain_names
  calls:
  - action: list_domain_names
    save_as: response
  emit:
    items_for: '{{ response.DomainNames }}'
    as: item
    item:
      DomainName: '{{ item.DomainName }}'
      EngineType: '{{ item.EngineType }}'
- discovery_id: aws.elastic.describe_elasticsearch_domains
  for_each: aws.elastic.list_domain_names
  calls:
  - action: describe_elasticsearch_domains
    params:
      DomainNames:
      - '{{ item.DomainName }}'
    save_as: response
  emit:
    items_for: '{{ response.DomainStatusList }}'
    as: item
checks:
- rule_id: aws.elastic.resource.disaster_recovery_drill_execution_configured
  for_each: aws.elastic.describe_elasticsearch_domains
  conditions:
    var: item.SnapshotOptions
    op: exists
    value: null
