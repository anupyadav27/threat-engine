version: '1.0'
provider: aws
service: eip
services:
  client: ec2
  module: boto3.client
discovery:
- discovery_id: aws.eip.describe_addresses
  calls:
  - action: describe_addresses
    save_as: response
    params:
      MaxResults: 1000
  emit:
    items_for: '{{ response.Addresses }}'
    as: item
