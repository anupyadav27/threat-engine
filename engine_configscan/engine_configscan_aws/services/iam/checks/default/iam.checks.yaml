version: '1.0'
provider: aws
service: iam
checks:
- rule_id: aws.iam.password.policy_lowercase_configured
  for_each: aws.iam.get_account_password_policy
  conditions:
    var: item.RequireLowercaseCharacters
    op: equals
    value: 'true'
- rule_id: aws.iam.instanceprofile.no_instance_profile_with_admin_star_configured
  for_each: aws.iam.get_instance_profile
  conditions:
    all:
    - var: item.Roles.AssumeRolePolicyDocument.Statement.Effect
      op: equals
      value: Allow
    - var: item.Roles.AssumeRolePolicyDocument.Statement.Principal.Service
      op: equals
      value: ec2.amazonaws.com
    - var: item.Roles.AssumeRolePolicyDocument.Statement.Action
      op: equals
      value: sts:AssumeRole
    - var: item.Roles.PolicyDocument.Statement.Effect
      op: equals
      value: Allow
    - var: item.Roles.PolicyDocument.Statement.Action
      op: equals
      value: '*'
    - var: item.Roles.PolicyDocument.Statement.Resource
      op: equals
      value: '*'
- rule_id: aws.iam.policy.security_check_full_admin_privileges_configured
  for_each: aws.iam.list_policies
  conditions:
    all:
    - var: item.DefaultVersionId
      op: exists
      value: null
    - var: item.AttachmentCount
      op: greater_than
      value: '0'
- rule_id: aws.iam.password.policy_minimum_length_14_configured
  for_each: aws.iam.get_account_password_policy
  conditions:
    var: item.MinimumPasswordLength
    op: equals
    value: '14'
- rule_id: aws.iam.role.session_duration_reasonable_if_applicable_configured
  for_each: aws.iam.list_roles
  conditions:
    var: item.MaxSessionDuration
    op: less_than
    value: '3600'
- rule_id: aws.iam.user.inactive_90_days_disabled
  for_each: aws.iam.list_users
  conditions:
    all:
    - var: item.PasswordLastUsed
      op: exists
      value: null
    - var: item.PasswordLastUsed
      op: greater_than
      value: '90'
- rule_id: aws.iam.policy.conditions_used_if_applicable_configured
  for_each: aws.iam.list_policies
  conditions:
    all:
    - var: item.DefaultVersionId
      op: exists
      value: null
    - var: item.AttachmentCount
      op: greater_than
      value: '0'
- rule_id: aws.iam.instanceprofile.role_policies_least_privilege
  for_each: aws.iam.get_instance_profile
  conditions:
    all:
    - var: item.Roles.AssumeRolePolicyDocument.Statement.Effect
      op: equals
      value: Allow
    - var: item.Roles.AssumeRolePolicyDocument.Statement.Action
      op: equals
      value: sts:AssumeRole
    - var: item.Roles.AssumeRolePolicyDocument.Statement.Principal.Service
      op: equals
      value: ec2.amazonaws.com
- rule_id: aws.iam.user.no_inline_policies_enabled
  for_each: aws.iam.list_user_policies
  conditions:
    var: item.PolicyNames
    op: equals
    value: []
- rule_id: aws.iam.role.scopes_or_s_least_privilege
  for_each: aws.iam.get_role
  conditions:
    all:
    - var: item.AssumeRolePolicyDocument
      op: exists
      value: null
    - var: item.RoleName
      op: exists
      value: null
- rule_id: aws.iam.policy.no_full_access_to_cloudtrail_configured
  for_each: aws.iam.list_attached_user_policies
  conditions:
    all:
    - var: item.PolicyName
      op: not_equals
      value: CloudTrailFullAccess
    - var: item.PolicyDocument.Statement.Action
      op: not_equals
      value: cloudtrail:*
- rule_id: aws.iam.policy.versioning_and_change_audit_enabled
  for_each: aws.iam.list_policy_versions
  conditions:
    all:
    - var: item.VersionId
      op: exists
      value: null
    - var: item.IsDefaultVersion
      op: equals
      value: true
- rule_id: aws.iam.policy.reuse_24_configured
  for_each: aws.iam.get_policy
  conditions:
    var: item.DefaultVersionId
    op: exists
    value: null
- rule_id: aws.iam.user.console_access_unused_configured
  for_each: aws.iam.list_users
  conditions:
    all:
    - var: item.PasswordLastUsed
      op: exists
      value: null
    - var: item.PasswordLastUsed
      op: equals
      value: null
- rule_id: aws.iam.role.attached_policies_not_admin_star_configured
  for_each: aws.iam.list_attached_user_policies
  conditions:
    var: item.PolicyName
    op: not_equals
    value: AdministratorAccess
- rule_id: aws.iam.samlprovider.idp_metadata_signed_configured
  for_each: aws.iam.get_saml_provider
  conditions:
    all:
    - var: item.SAMLMetadataDocument
      op: exists
      value: null
    - var: item.SAMLMetadataDocument
      op: contains
      value: signed
- rule_id: aws.iam.policy.no_wildcard_admin_actions_configured
  for_each: aws.iam.get_policy
  conditions:
    all:
    - var: item.DefaultVersionId
      op: exists
      value: null
    - var: item.AttachmentCount
      op: greater_than
      value: '0'
- rule_id: aws.iam.resource.access_analyzer_external_all_regions_configured
  for_each: aws.iam.list_signing_certificates
  conditions:
    all:
    - var: item.type
      op: equals
      value: ACCOUNT
    - var: item.status
      op: equals
      value: ACTIVE
- rule_id: aws.iam.policy.least_privilege_audit_configured
  for_each: aws.iam.list_policies
  conditions:
    all:
    - var: item.DefaultVersionId
      op: exists
      value: null
    - var: item.AttachmentCount
      op: greater_than
      value: '0'
- rule_id: aws.iam.certificate.expired_removal_monitored
  for_each: aws.iam.list_server_certificates
  conditions:
    all:
    - var: item.Expiration
      op: exists
      value: null
    - var: item.Expiration
      op: greater_than
      value: '2023-10-01T00:00:00Z'
- rule_id: aws.iam.role.keys_not_used_or_rotated_90_days_or_less_configured
  for_each: aws.iam.list_access_keys
  conditions:
    all:
    - var: item.CreateDate
      op: exists
      value: null
    - var: item.Status
      op: equals
      value: Active
- rule_id: aws.iam.customer.attached_policy_no_administrative_privileges_configured
  for_each: aws.iam.list_attached_user_policies
  conditions:
    var: item.PolicyName
    op: not_equals
    value: AdministratorAccess
- rule_id: aws.iam.password.policy_reuse_24_configured
  for_each: aws.iam.get_account_password_policy
  conditions:
    var: item.PasswordPolicy.PasswordReusePrevention
    op: equals
    value: '24'
- rule_id: aws.iam.policy.no_action_star_on_resource_star_configured
  for_each: aws.iam.get_policy
  conditions:
    all:
    - var: item.PolicyDocument.Statement.Action
      op: not_equals
      value: '*'
    - var: item.PolicyDocument.Statement.Resource
      op: not_equals
      value: '*'
- rule_id: aws.iam.policy.attached_only_to_group_or_roles_configured
  for_each: aws.iam.list_policies
  conditions:
    all:
    - var: item.AttachmentCount
      op: greater_than
      value: '0'
    - var: item.PolicyUsage
      op: in
      value:
      - PermissionsBoundary
      - PermissionsPolicy
- rule_id: aws.iam.certificate.expiration_removal_monitored
  for_each: aws.iam.list_server_certificates
  conditions:
    all:
    - var: item.Expiration
      op: exists
      value: null
    - var: item.Expiration
      op: greater_than
      value: '2023-10-01T00:00:00Z'
- rule_id: aws.iam.managedpolicy.editors_rbac_least_privilege
  for_each: aws.iam.list_attached_user_policies
  conditions:
    all:
    - var: item.PolicyName
      op: contains
      value: Editor
    - var: item.PolicyVersionList0.Document.Statement.Effect
      op: equals
      value: Allow
    - var: item.PolicyVersionList0.Document.Statement.Action
      op: in
      value:
      - iam:PassRole
      - iam:CreateUser
      - iam:DeleteUser
    - var: item.PolicyVersionList0.Document.Statement.Resource
      op: not_equals
      value: '*'
- rule_id: aws.iam.user.access_keys_rotated_90_days_or_less_when_present
  for_each: aws.iam.list_access_keys
  conditions:
    all:
    - var: item.Status
      op: equals
      value: Active
    - var: item.CreateDate
      op: exists
      value: null
- rule_id: aws.iam.support.role_created_configured
  for_each: aws.iam.list_roles
  conditions:
    all:
    - var: item.RoleName
      op: equals
      value: support
    - var: item.AssumeRolePolicyDocument
      op: exists
      value: null
- rule_id: aws.iam.user.single_active_access_key_audit_configured
  for_each: aws.iam.list_signing_certificates
  conditions:
    var: item.Status
    op: equals
    value: Active
- rule_id: aws.iam.policy.allows_privilege_escalation_configured
  for_each: aws.iam.get_policy
  conditions:
    all:
    - var: item.DefaultVersionId
      op: exists
      value: null
    - var: item.AttachmentCount
      op: greater_than
      value: '0'
- rule_id: aws.iam.resource.root_mfa_enabled
  for_each: aws.iam.get_account_summary
  conditions:
    var: item.SummaryMap.AccountMFAEnabled
    op: equals
    value: '1'
- rule_id: aws.iam.no.root_access_key_configured
  for_each: aws.iam.list_access_keys
  conditions:
    var: item.AccessKeyId
    op: not_equals
    value: null
- rule_id: aws.iam.user.policy_elastic_disaster_recovery_configured
  for_each: aws.iam.list_user_policies
  conditions:
    var: item.PolicyNames
    op: contains
    value: ElasticDisasterRecoveryPolicy
- rule_id: aws.iam.rotate.access_key_90_days_configured
  for_each: aws.iam.list_policy_versions
  conditions:
    var: item.CreateDate
    op: less_than
    value: '90'
- rule_id: aws.iam.policy.no_full_admin_privileges_enabled
  for_each: aws.iam.list_attached_user_policies
  conditions:
    var: item.PolicyName
    op: not_equals
    value: AdministratorAccess
- rule_id: aws.iam.policy.no_administrative_privileges_configured
  for_each: aws.iam.list_attached_user_policies
  conditions:
    all:
    - var: item.PolicyName
      op: not_equals
      value: AdministratorAccess
    - var: item.PolicyName
      op: not_equals
      value: PowerUserAccess
- rule_id: aws.iam.group.has_users_configured
  for_each: aws.iam.list_users
  conditions:
    all:
    - var: item.Users
      op: exists
      value: null
    - var: item.Users
      op: not_equals
      value: []
- rule_id: aws.iam.policy.minimum_length_14_configured
  for_each: aws.iam.list_attached_user_policies
  conditions:
    all:
    - var: item.PolicyName
      op: exists
      value: null
    - var: item.PolicyName
      op: greater_than
      value: '14'
- rule_id: aws.iam.password.policy_uppercase_configured
  for_each: aws.iam.get_account_password_policy
  conditions:
    var: item.RequireUppercaseCharacters
    op: equals
    value: 'true'
- rule_id: aws.iam.user.centralization_monitored
  for_each: aws.iam.list_users
  conditions:
    all:
    - var: item.UserName
      op: exists
      value: null
    - var: item.Tags
      op: exists
      value: null
- rule_id: aws.iam.user.accesskey_unused_configured
  for_each: aws.iam.list_signing_certificates
  conditions:
    all:
    - var: item.Status
      op: equals
      value: Inactive
    - var: item.CreateDate
      op: exists
      value: null
- rule_id: aws.iam.instanceprofile.role_enabled
  for_each: aws.iam.list_instance_profiles_for_role
  conditions:
    var: item.Roles
    op: exists
    value: null
- rule_id: aws.iam.user.password_policy_complex_configured
  for_each: aws.iam.get_account_password_policy
  conditions:
    all:
    - var: item.RequireUppercaseCharacters
      op: equals
      value: 'true'
    - var: item.RequireLowercaseCharacters
      op: equals
      value: 'true'
    - var: item.RequireNumbers
      op: equals
      value: 'true'
    - var: item.RequireSymbols
      op: equals
      value: 'true'
- rule_id: aws.iam.role.no_user_managed_long_lived_keys_configured
  for_each: aws.iam.list_signing_certificates
  conditions:
    all:
    - var: item.Status
      op: equals
      value: Active
    - var: item.CreateDate
      op: exists
      value: null
- rule_id: aws.iam.policy.execution_roles_least_privilege
  for_each: aws.iam.list_attached_user_policies
  conditions:
    all:
    - var: item.PolicyName
      op: equals
      value: ExecutionRole
    - var: item.PolicyArn
      op: exists
      value: null
- rule_id: aws.iam.samlprovider.assertion_lifetime_configured
  for_each: aws.iam.get_saml_provider
  conditions:
    var: item.SAMLMetadataDocument
    op: exists
    value: null
- rule_id: aws.iam.policy.monitored
  for_each: aws.iam.list_attached_user_policies
  conditions:
    all:
    - var: item.PolicyName
      op: exists
      value: null
    - var: item.PolicyArn
      op: exists
      value: null
- rule_id: aws.iam.access_analyzer_active_status_all_regions.access_analyzer_active_status_all_regions_configured
  for_each: aws.iam.list_signing_certificates
  conditions:
    all:
    - var: item.status
      op: equals
      value: ACTIVE
    - var: item.type
      op: equals
      value: ACCOUNT
- rule_id: aws.iam.managedpolicy.no_policy_allows_without_constraints_configured
  for_each: aws.iam.list_attached_user_policies
  conditions:
    all:
    - var: item.PolicyName
      op: exists
      value: null
    - var: item.PolicyDocument.Statement.Effect
      op: equals
      value: Allow
    - var: item.PolicyDocument.Statement.Condition
      op: exists
      value: null
- rule_id: aws.iam.policy.awscloudshell_full_access_restriction_configured
  for_each: aws.iam.list_attached_user_policies
  conditions:
    all:
    - var: item.PolicyName
      op: not_equals
      value: AWSCloudShellFullAccess
    - var: item.PolicyDocument.Statement.Effect
      op: equals
      value: Deny
    - var: item.PolicyDocument.Statement.Action
      op: not_equals
      value: cloudshell:*
- rule_id: aws.iam.user.single_active_access_key_configured
  for_each: aws.iam.list_signing_certificates
  conditions:
    all:
    - var: item.Status
      op: equals
      value: Active
    - var: item.AccessKeyMetadata
      op: equals
      value: '1'
- rule_id: aws.iam.role.no_inline_policies_configured
  for_each: aws.iam.get_role
  conditions:
    var: item.RoleName
    op: exists
    value: null
- rule_id: aws.iam.managedpolicy.versioning_and_change_audit_enabled
  for_each: aws.iam.list_policies
  conditions:
    all:
    - var: item.AttachmentCount
      op: greater_than
      value: '0'
    - var: item.PolicyVersionList.IsDefaultVersion
      op: equals
      value: 'true'
- rule_id: aws.iam.managedpolicy.policy_no_wildcard_admin_actions_configured
  for_each: aws.iam.get_policy
  conditions:
    all:
    - var: item.DefaultVersionId
      op: exists
      value: null
    - var: item.AttachmentCount
      op: greater_than
      value: '0'
- rule_id: aws.iam.oidcprovider.certificate_issuer_https_and_matches_discovery_verified
  for_each: aws.iam.list_open_id_connect_providers
  conditions:
    all:
    - var: item.OpenIDConnectProviderArn
      op: exists
      value: null
    - var: item.OpenIDConnectProviderArn
      op: contains
      value: https://
- rule_id: aws.iam.user.mfa_enabled_console_access
  for_each: aws.iam.list_mfa_devices
  conditions:
    var: item.MFADevices
    op: not_equals
    value: null
- rule_id: aws.iam.group.attached_policies_not_admin_star_configured
  for_each: aws.iam.list_attached_user_policies
  conditions:
    var: item.PolicyName
    op: not_equals
    value: AdministratorAccess
- rule_id: aws.iam.key.rotation_90_days_configured
  for_each: aws.iam.get_key_rotation_status
  conditions:
    var: item.KeyRotationEnabled
    op: equals
    value: 'true'
- rule_id: aws.iam.root.hardware_mfa_enabled
  for_each: aws.iam.get_account_summary
  conditions:
    all:
    - var: item.SummaryMap.AccountMFAEnabled
      op: equals
      value: '1'
    - var: item.SummaryMap.HardwareMFADevices
      op: greater_than
      value: '1'
- rule_id: aws.iam.resource.root_hardware_mfa_enabled
  for_each: aws.iam.get_account_summary
  conditions:
    var: item.SummaryMap.AccountMFAEnabled
    op: equals
    value: '1'
- rule_id: aws.iam.resource.console_mfa_enabled
  for_each: aws.iam.list_users
  conditions:
    all:
    - var: item.UserName
      op: exists
      value: null
    - var: item.UserName
      op: not_equals
      value: null
- rule_id: aws.iam.managedpolicy.policy_no_action_star_on_resource_star_configured
  for_each: aws.iam.list_attached_user_policies
  conditions:
    all:
    - var: item.PolicyName
      op: exists
      value: null
    - var: item.Arn
      op: exists
      value: null
    - var: item.DefaultVersionId
      op: exists
      value: null
- rule_id: aws.iam.aws.attached_policy_no_administrative_privileges_configured
  for_each: aws.iam.list_attached_user_policies
  conditions:
    var: item.PolicyName
    op: not_equals
    value: AdministratorAccess
- rule_id: aws.iam.group.external_sharing_restricted_if_supported
  for_each: aws.iam.list_groups_for_user
  conditions:
    var: item.GroupName
    op: exists
    value: null
- rule_id: aws.iam.oidcprovider.token_lifetime_configured
  for_each: aws.iam.get_open_id_connect_provider
  conditions:
    var: item.TokenLifetime
    op: exists
    value: null
- rule_id: aws.iam.timestream_access_control_and_mfa_enforcement.timestream_access_control_mfa_enforcement_configured
  for_each: aws.iam.list_users
  conditions:
    all:
    - var: item.UserName
      op: exists
      value: null
    - var: item.UserName
      op: not_equals
      value: null
- rule_id: aws.iam.samlprovider.certificates_certificate_valid
  for_each: aws.iam.list_s_a_m_l_providers
  conditions:
    all:
    - var: item.ValidUntil
      op: exists
      value: null
    - var: item.ValidUntil
      op: greater_than
      value: current_date
- rule_id: aws.iam.managedpolicy.policy_conditions_used_if_applicable_configured
  for_each: aws.iam.list_attached_user_policies
  conditions:
    all:
    - var: item.PolicyName
      op: exists
      value: null
    - var: item.PolicyVersionList.Document.Statement.Condition
      op: exists
      value: null
- rule_id: aws.iam.role.awssupport_access_policy_attachment_configured
  for_each: aws.iam.list_attached_user_policies
  conditions:
    var: item.AttachedManagedPolicies.PolicyName
    op: contains
    value: AWSSupportAccess
- rule_id: aws.iam.password.policy_number_configured
  for_each: aws.iam.get_account_password_policy
  conditions:
    var: item.PasswordPolicy.MinimumPasswordLength
    op: greater_than
    value: '8'
- rule_id: aws.iam.oidcprovider.thumbprints_or_jwks_pinning_configured
  for_each: aws.iam.list_open_id_connect_providers
  conditions:
    any:
    - var: item.ThumbprintList
      op: exists
      value: null
    - var: item.ThumbprintList
      op: not_equals
      value: []
- rule_id: aws.iam.role.least_privilege
  for_each: aws.iam.get_role
  conditions:
    all:
    - var: item.Effect
      op: equals
      value: Allow
    - var: item.Action
      op: in
      value:
      - sts:AssumeRole
    - var: item.Principal.Service
      op: exists
      value: null
- rule_id: aws.iam.policy.workflow_storage_encrypted
  for_each: aws.iam.list_policies
  conditions:
    var: item.DefaultVersionId
    op: exists
    value: null
- rule_id: aws.iam.no_guest_accounts_with_permissions.no_guest_accounts_with_permissions_configured
  for_each: aws.iam.list_users
  conditions:
    all:
    - var: item.UserName
      op: not_equals
      value: Guest
    - var: item.PermissionsBoundary
      op: exists
      value: null
- rule_id: aws.iam.key.monitored
  for_each: aws.iam.list_access_keys
  conditions:
    all:
    - var: item.AccessKeyId
      op: exists
      value: null
    - var: item.Status
      op: equals
      value: Active
- rule_id: aws.iam.policy.policy_enabled
  for_each: aws.iam.list_attached_user_policies
  conditions:
    var: item.PolicyName
    op: exists
    value: null
- rule_id: aws.iam.user.console_password_present_only_if_required
  for_each: aws.iam.list_users
  conditions:
    all:
    - var: item.PasswordLastUsed
      op: exists
      value: null
    - var: item.PasswordLastUsed
      op: not_equals
      value: null
- rule_id: aws.iam.managedpolicy.policy_resource_constraints_present
  for_each: aws.iam.get_policy
  conditions:
    all:
    - var: item.DefaultVersionId
      op: exists
      value: null
    - var: item.AttachmentCount
      op: greater_than
      value: '0'
- rule_id: aws.iam.user.mfa_required
  for_each: aws.iam.list_mfa_devices
  conditions:
    var: item.MFADevices
    op: not_equals
    value: null
- rule_id: aws.iam.avoidrootusage.avoid_root_usage_configured
  for_each: aws.iam.get_account_summary
  conditions:
    var: item.SummaryMap.AccountAccessKeysPresent
    op: equals
    value: '0'
- rule_id: aws.iam.group.membership_review_enabled_if_supported
  for_each: aws.iam.list_groups_for_user
  conditions:
    var: item.Group.GroupName
    op: exists
    value: null
- rule_id: aws.iam.root.mfa_enabled
  for_each: aws.iam.get_account_summary
  conditions:
    var: item.SummaryMap.AccountMFAEnabled
    op: equals
    value: '1'
- rule_id: aws.iam.policy.resource_constraints_present
  for_each: aws.iam.get_policy
  conditions:
    all:
    - var: item.PolicyDocument.Statement.Resource
      op: exists
      value: null
    - var: item.PolicyDocument.Statement.Resource
      op: not_equals
      value: '*'
- rule_id: aws.iam.password.policy_symbol_configured
  for_each: aws.iam.get_account_password_policy
  conditions:
    var: item.RequireSymbols
    op: equals
    value: 'true'
- rule_id: aws.iam.role.workload_identity_federation_used_if_supported
  for_each: aws.iam.get_role
  conditions:
    var: item.Principal.Federated
    op: exists
    value: null
- rule_id: aws.iam.samlprovider.audience_restriction_configured
  for_each: aws.iam.get_saml_provider
  conditions:
    all:
    - var: item.AudienceRestriction
      op: exists
      value: null
    - var: item.AudienceRestriction
      op: contains
      value: https://signin.aws.amazon.com/saml
- rule_id: aws.iam.inline.policy_no_administrative_privileges_configured
  for_each: aws.iam.list_user_policies
  conditions:
    var: item.PolicyNames
    op: not_equals
    value: AdministratorAccess
- rule_id: aws.iam.role.trust_external_id_or_audience_required
  for_each: aws.iam.get_role
  conditions:
    any:
    - var: item.Condition.StringEquals.sts:ExternalId
      op: exists
      value: null
    - var: item.Condition.StringEquals.sts:Audience
      op: exists
      value: null
- rule_id: aws.iam.group.no_inline_policies_configured
  for_each: aws.iam.list_group_policies
  conditions:
    var: item.PolicyNames
    op: equals
    value: []
- rule_id: aws.iam.policy.expires_passwords_within_90_days_or_less_configured
  for_each: aws.iam.get_account_password_policy
  conditions:
    all:
    - var: item.PasswordPolicy.ExpirePasswords
      op: equals
      value: 'true'
    - var: item.PasswordPolicy.MaxPasswordAge
      op: less_than
      value: '90'
- rule_id: aws.iam.role.max_session_duration_configured
  for_each: aws.iam.list_roles
  conditions:
    var: item.MaxSessionDuration
    op: greater_than
    value: '3600'
- rule_id: aws.iam.policy.overly_permissive_configured
  for_each: aws.iam.list_policies
  conditions:
    all:
    - var: item.DefaultVersionId
      op: exists
      value: null
    - var: item.AttachmentCount
      op: greater_than
      value: '0'
- rule_id: aws.iam.user.hardware_mfa_enabled
  for_each: aws.iam.list_mfa_devices
  conditions:
    var: item.MFADevices
    op: not_equals
    value: null
- rule_id: aws.iam.policy.awscloudshellfullaccess_attachment_configured
  for_each: aws.iam.list_attached_user_policies
  conditions:
    all:
    - var: item.PolicyName
      op: equals
      value: AWSCloudShellFullAccess
    - var: item.AttachmentCount
      op: greater_than
      value: '1'
- rule_id: aws.iam.oidcprovider.allowed_client_ids_audiences_restricted
  for_each: aws.iam.get_open_id_connect_provider
  conditions:
    all:
    - var: item.ClientIDList
      op: exists
      value: null
    - var: item.ClientIDList
      op: not_equals
      value: []
- rule_id: aws.iam.policy.editors_rbac_least_privilege
  for_each: aws.iam.list_policies
  conditions:
    all:
    - var: item.DefaultVersionId
      op: exists
      value: null
    - var: item.AttachmentCount
      op: greater_than
      value: '0'
- rule_id: aws.iam.user.credentials_unused_45_days_disabled
  for_each: aws.iam.list_signing_certificates
  conditions:
    all:
    - var: item.Status
      op: equals
      value: Inactive
    - var: item.CreateDate
      op: greater_than
      value: '45'
- rule_id: aws.iam.user.management_centralization_configured
  for_each: aws.iam.list_users
  conditions:
    all:
    - var: item.UserName
      op: exists
      value: null
    - var: item.Arn
      op: exists
      value: null
- rule_id: aws.iam.user.no_inline_policies_configured
  for_each: aws.iam.list_user_policies
  conditions:
    var: item.PolicyNames
    op: equals
    value: []
- rule_id: aws.iam.user.in_group_configured
  for_each: aws.iam.list_groups_for_user
  conditions:
    var: item.Groups
    op: not_equals
    value: null
- rule_id: aws.iam.role.trust_principals_allowlist_only_configured
  for_each: aws.iam.get_role
  conditions:
    var: item.Principal.AWS
    op: in
    value:
    - arn:aws:iam::123456789012:root
    - arn:aws:iam::098765432109:role/ExampleRole
- rule_id: aws.iam.instanceprofile.no_admin_star_policies_configured
  for_each: aws.iam.list_attached_user_policies
  conditions:
    all:
    - var: item.Roles.AssumeRolePolicyDocument.Statement.Effect
      op: equals
      value: Allow
    - var: item.Roles.AssumeRolePolicyDocument.Statement.Action
      op: equals
      value: sts:AssumeRole
    - var: item.Roles.AssumeRolePolicyDocument.Statement.Principal.Service
      op: equals
      value: ec2.amazonaws.com
    - var: item.Roles.AttachedManagedPolicies.PolicyArn
      op: not_equals
      value: arn:aws:iam::aws:policy/AdministratorAccess
- rule_id: aws.iam.role.creation_monitored
  for_each: aws.iam.list_roles
  conditions:
    all:
    - var: item.RoleName
      op: exists
      value: null
    - var: item.AssumeRolePolicyDocument
      op: exists
      value: null
- rule_id: aws.iam.policy.no_policies_without_constraints_configured
  for_each: aws.iam.list_policies
  conditions:
    all:
    - var: item.AttachmentCount
      op: greater_than
      value: '0'
    - var: item.PolicyVersionList.Document.Statement.Effect
      op: equals
      value: Allow
    - var: item.PolicyVersionList.Document.Statement.Condition
      op: exists
      value: null
