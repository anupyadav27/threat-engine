version: '1.0'
provider: aws
service: directoryservice
services:
  client: directoryservice
  module: boto3.client
discovery:
- discovery_id: aws.ds.list_log_subscriptions
  calls:
  - action: list_log_subscriptions
    save_as: response
  emit:
    items_for: '{{ response.LogSubscriptions }}'
    as: item
    item:
      DirectoryId: '{{ item.DirectoryId }}'
      LogGroupName: '{{ item.LogGroupName }}'
      SubscriptionCreatedDateTime: '{{ item.SubscriptionCreatedDateTime }}'
- discovery_id: aws.ds.describe_directories
  calls:
  - action: describe_directories
    save_as: response
  emit:
    items_for: '{{ response.DirectoryDescriptions }}'
    as: item
    item:
      DirectoryId: '{{ item.DirectoryId }}'
      Name: '{{ item.Name }}'
      ShortName: '{{ item.ShortName }}'
      Size: '{{ item.Size }}'
      Edition: '{{ item.Edition }}'
      Alias: '{{ item.Alias }}'
      AccessUrl: '{{ item.AccessUrl }}'
      Description: '{{ item.Description }}'
      DnsIpAddrs: '{{ item.DnsIpAddrs }}'
      DnsIpv6Addrs: '{{ item.DnsIpv6Addrs }}'
      Stage: '{{ item.Stage }}'
      ShareStatus: '{{ item.ShareStatus }}'
      ShareMethod: '{{ item.ShareMethod }}'
      ShareNotes: '{{ item.ShareNotes }}'
      LaunchTime: '{{ item.LaunchTime }}'
      StageLastUpdatedDateTime: '{{ item.StageLastUpdatedDateTime }}'
      Type: '{{ item.Type }}'
      VpcSettings: '{{ item.VpcSettings }}'
      ConnectSettings: '{{ item.ConnectSettings }}'
      RadiusSettings: '{{ item.RadiusSettings }}'
      RadiusStatus: '{{ item.RadiusStatus }}'
checks:
- rule_id: aws.directoryservice.resource.directoryservice_directory_log_forwarding_enabled
  for_each: aws.ds.list_log_subscriptions
  conditions:
    all:
    - var: item.DirectoryId
      op: exists
      value: null
    - var: item.LogGroupName
      op: exists
      value: null
- rule_id: aws.directoryservice.resource.supported_mfa_radius_enabled
  for_each: aws.ds.describe_directories
  conditions:
    all:
    - var: item.RadiusSettings
      op: exists
      value: null
    - var: item.RadiusStatus
      op: equals
      value: Completed

