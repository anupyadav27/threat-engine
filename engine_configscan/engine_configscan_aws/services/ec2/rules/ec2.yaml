      KmsKeyId: '{{ item.KmsKeyId }}'
      LicenseType: '{{ item.LicenseType }}'
      Platform: '{{ item.Platform }}'
      Progress: '{{ item.Progress }}'
      SnapshotDetails: '{{ item.SnapshotDetails }}'
      Status: '{{ item.Status }}'
      StatusMessage: '{{ item.StatusMessage }}'
      Tags: '{{ item.Tags }}'
