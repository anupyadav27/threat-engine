version: '1.0'
provider: aws
service: ec2
services:
  client: ec2
  module: boto3.client
discovery:
- discovery_id: aws.ec2.describe_vpc_block_public_access_options
  calls:
  - action: describe_vpc_block_public_access_options
    save_as: response
  emit:
    items_for: '{{ response.VpcBlockPublicAccessOptions }}'
    as: item
    item:
      AwsAccountId: '{{ item.AwsAccountId }}'
      AwsRegion: '{{ item.AwsRegion }}'
      State: '{{ item.State }}'
      InternetGatewayBlockMode: '{{ item.InternetGatewayBlockMode }}'
      Reason: '{{ item.Reason }}'
      LastUpdateTimestamp: '{{ item.LastUpdateTimestamp }}'
      ManagedBy: '{{ item.ManagedBy }}'
      ExclusionsAllowed: '{{ item.ExclusionsAllowed }}'
- discovery_id: aws.ec2.list_images_in_recycle_bin
  calls:
  - action: describe_export_image_tasks
    save_as: response
  emit:
    items_for: '{{ response.ExportImageTasks }}'
    as: item
    item:
      Description: '{{ item.Description }}'
      ExportImageTaskId: '{{ item.ExportImageTaskId }}'
      ImageId: '{{ item.ImageId }}'
      Progress: '{{ item.Progress }}'
      S3ExportLocation: '{{ item.S3ExportLocation }}'
      Status: '{{ item.Status }}'
      StatusMessage: '{{ item.StatusMessage }}'
      Tags: '{{ item.Tags }}'
- discovery_id: aws.ec2.describe_import_image_tasks
