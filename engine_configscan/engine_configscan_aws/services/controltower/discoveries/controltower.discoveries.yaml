version: '1.0'
provider: aws
service: controltower
services:
  client: controltower
  module: boto3.client
discovery:
- discovery_id: aws.controltower.list_enabled_controls
  calls:
  - action: list_enabled_controls
    save_as: response
    params:
      MaxResults: 1000
  emit:
    items_for: '{{ response.enabledControls }}'
    as: item
- discovery_id: aws.controltower.get_enabled_control
  for_each: aws.controltower.list_enabled_controls
  on_error: continue
  calls:
  - action: get_enabled_control
    params:
      enabledControlIdentifier: '{{ item.arn }}'
    save_as: response
  emit: {}
