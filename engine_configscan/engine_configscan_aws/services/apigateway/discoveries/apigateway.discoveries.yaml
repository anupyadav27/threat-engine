version: '1.0'
provider: aws
service: apigateway
services:
  client: apigateway
  module: boto3.client
discovery:
- discovery_id: aws.apigateway.get_api_keys
  calls:
  - action: get_api_keys
    save_as: response
  emit:
    items_for: '{{ response.items }}'
    as: item
- discovery_id: aws.apigateway.get_authorizers
  for_each: '{{ aws.apigateway.get_rest_apis }}'
  calls:
  - action: get_authorizers
    params:
      restApiId: '{{ item.id }}'
    save_as: response
  emit:
    items_for: '{{ response.items }}'
    as: item
- discovery_id: aws.apigateway.get_domain_names
  calls:
  - action: get_domain_names
    save_as: response
  emit:
    items_for: '{{ response.items }}'
    as: item
- discovery_id: aws.apigateway.get_request_validators
  for_each: '{{ aws.apigateway.get_rest_apis }}'
  calls:
  - action: get_request_validators
    params:
      restApiId: '{{ item.id }}'
    save_as: response
  emit:
    items_for: '{{ response.items }}'
    as: item
- discovery_id: aws.apigateway.get_domain_name
  for_each: '{{ aws.apigateway.get_domain_names }}'
  calls:
  - action: get_domain_name
    params:
      domainName: '{{ item.domainName }}'
    save_as: response
  emit: {}
- discovery_id: aws.apigateway.get_rest_apis
  calls:
  - action: get_rest_apis
    save_as: response
  emit:
    items_for: '{{ response.items }}'
    as: item
- discovery_id: aws.apigateway.get_resources
  for_each: '{{ aws.apigateway.get_rest_apis }}'
  calls:
  - action: get_resources
    params:
      restApiId: '{{ item.id }}'
    save_as: response
  emit:
    items_for: '{{ response.items }}'
    as: item
- discovery_id: aws.apigateway.get_method
  for_each: '{{ aws.apigateway.get_resources }}'
  calls:
  - action: get_method
    params:
      restApiId: '{{ item.restApiId }}'
      resourceId: '{{ item.id }}'
      httpMethod: GET
    save_as: response
  emit:
    item:
      RestApiId: '{{ response.method.get(\"restApiId\") if response.method is defined else item.restApiId }}'
      ResourceId: '{{ response.method.get(\"resourceId\") if response.method is defined else item.id }}'
      HttpMethod: '{{ response.method.get(\"httpMethod\") if response.method is defined else \"GET\" }}'
      IntegrationUri: '{{ response.methodIntegration.get(\"uri\") if response.methodIntegration is defined else (response.get(\"integration\", {}).get(\"uri\") if response.get(\"integration\") is defined else \"\") }}'
      IntegrationType: '{{ response.methodIntegration.get(\"type\") if response.methodIntegration is defined else \"\" }}'

  # get integration explicitly (some API shapes vary)
- discovery_id: aws.apigateway.get_integration
  for_each: '{{ aws.apigateway.get_method }}'
  calls:
  - action: get_integration
    params:
      restApiId: '{{ item.RestApiId if item.RestApiId is defined else item.restApiId }}'
      resourceId: '{{ item.ResourceId if item.ResourceId is defined else item.id }}'
      httpMethod: '{{ item.HttpMethod if item.HttpMethod is defined else \"GET\" }}'
    save_as: response
  emit:
    item:
      IntegrationUri: '{{ response.uri if response.uri is defined else (response.get(\"integrationUri\") if response.get(\"integrationUri\") is defined else \"\") }}'
      IntegrationType: '{{ response.type if response.type is defined else \"\" }}'
- discovery_id: aws.apigateway.get_stages
  for_each: '{{ aws.apigateway.get_rest_apis }}'
  calls:
  - action: get_stages
    params:
      restApiId: '{{ item.id }}'
    save_as: response
  emit:
    items_for: '{{ response.item }}'
    as: stage_item
- discovery_id: aws.apigateway.get_stage
  for_each: '{{ aws.apigateway.get_stages }}'
  calls:
  - action: get_stage
    params:
      restApiId: '{{ item.restApiId }}'
      stageName: '{{ item.stageName }}'
    save_as: response
  emit: {}
- discovery_id: aws.apigateway.get_usage_plans
  calls:
  - action: get_usage_plans
    save_as: response
  emit:
    items_for: '{{ response.items }}'
    as: item
