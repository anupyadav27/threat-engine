id: PAT-ALI-T1-002
version: 1
description: "CloudFW instance with public access enabled and logging disabled — network traffic not inspected, exfiltration goes undetected."
tier: 1
severity_base: high
confidence: confirmed
mitre_tactics: [Defense Evasion, Exfiltration]
mitre_techniques: [T1562.001, T1048]
tactic_chain_order: [Defense Evasion, Exfiltration]
csps: [alicloud]
entry:
