id: PAT-ALI-T2-001
version: 1
description: "ACK workload with over-privileged RAM role connected to ACK cluster with least-privilege violations — container escape enables RAM role abuse."
tier: 2
severity_base: high
confidence: confirmed
mitre_tactics: [Privilege Escalation, Lateral Movement]
mitre_techniques: [T1611, T1078.004]
tactic_chain_order: [Privilege Escalation, Lateral Movement]
csps: [alicloud]
min_hops_for_tier2: 1
entry:
  node_type: Resource
  resource_types: [alicloud_ack_cluster]
  conditions:
    check_rules_failing:
      - alicloud.ack.cluster.rbac_permissions_least_privilege
hops:
  - edge_type: CAN_ESCALATE_TO
    target:
      node_type: Resource
      resource_types: [alicloud_ram_role]
      conditions:
        check_rules_failing:
          - alicloud.ram.securityaudit.role_created_configured
        is_admin_role: true
scoring:
  posture_severity: high
  active_severity: critical
  path_length_bonus: true
tests:
  positive:
    description: "ACK cluster with RBAC violations → over-privileged RAM role"
    expected_tier: 2
    expected_severity: high
  negative:
    description: "ACK with least-privilege RBAC, scoped RAM roles"
    expected_tier: 2
    expected_severity: low
