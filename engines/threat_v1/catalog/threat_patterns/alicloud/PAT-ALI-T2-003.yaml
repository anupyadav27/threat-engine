id: PAT-ALI-T2-003
version: 1
description: "RAM audit trail detects privileged anomaly CDR event — attacker attempting to expand RAM permissions before lateral movement."
tier: 2
severity_base: critical
confidence: confirmed
mitre_tactics: [Privilege Escalation, Defense Evasion]
mitre_techniques: [T1078.004, T1548]
tactic_chain_order: [Privilege Escalation, Defense Evasion]
csps: [alicloud]
min_hops_for_tier2: 1
entry:
  node_type: Resource
  resource_types: [alicloud_ram_user, alicloud_ram_role]
  conditions:
    cdr_actor_seen: true
hops:
  - edge_type: CAN_ESCALATE_TO
    target:
      node_type: Resource
      resource_types: [alicloud_ram_policy]
      conditions:
        check_rules_failing:
          - alicloud.ram.policy.attached_only_to_group_or_roles_configured
        is_admin_role: true
scoring:
  posture_severity: critical
  active_severity: critical
  path_length_bonus: true
cdr_watch:
  techniques: [T1078.004]
  window_minutes: 60
  min_coverage: 0.5
  tactic_order_required: false
tests:
  positive:
    description: "RAM privileged anomaly CDR event → admin RAM policy directly attached"
    expected_tier: 2
    expected_severity: critical
  negative:
    description: "No CDR events, RAM policies attached via groups only"
    expected_tier: 2
    expected_severity: low
