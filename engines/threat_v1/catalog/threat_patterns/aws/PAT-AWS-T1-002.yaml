id: PAT-AWS-T1-002
version: 1
description: "RDS instance publicly accessible with no storage encryption — database fully exposed over the internet."
tier: 1
severity_base: critical
confidence: confirmed
mitre_tactics: [Initial Access, Exfiltration]
mitre_techniques: [T1190, T1048.002]
tactic_chain_order: [Initial Access, Exfiltration]
csps: [aws]
entry:
  node_type: Resource
  resource_types: [aws_rds_instance, aws_db_instance]
  conditions:
    check_rules_failing:
      - aws.rds.instance.public_access_disabled
      - aws.rds.instance.storage_encrypted
scoring:
  posture_severity: critical
  active_severity: critical
tests:
  positive:
    description: "RDS instance publicly_accessible=true with no encryption"
    expected_tier: 1
    expected_severity: critical
  negative:
    description: "RDS instance private with storage encryption enabled"
    expected_tier: 1
    expected_severity: low
