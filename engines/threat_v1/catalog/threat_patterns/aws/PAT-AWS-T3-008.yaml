id: PAT-AWS-T3-008
version: 1
description: "EKS pod exec CDR event on overprivileged service account pivots to crown jewel Secrets Manager entry."
tier: 3
severity_base: critical
confidence: confirmed
mitre_tactics: [Execution, Privilege Escalation, Collection]
mitre_techniques: [T1609, T1611, T1555]
tactic_chain_order: [Execution, Privilege Escalation, Collection]
csps: [aws]
entry:
  node_type: Resource
  resource_types: [aws_eks_cluster]
  conditions:
    cdr_actor_seen: true
    check_rules_failing:
      - aws.eks.api.wildcard_verbs_disallowed_configured
hops:
  - edge_type: CAN_ESCALATE_TO
    target:
      node_type: Resource
      resource_types: [aws_iam_role]
      conditions:
        is_admin_role: true
target:
  node_type: Resource
  resource_types: [aws_secretsmanager_secret]
  conditions:
    is_crown_jewel: true
    check_rules_failing:
      - aws.secretsmanager.resource.secret_rotation_enabled
cdr_watch:
  techniques: [T1609, T1611]
  window_minutes: 60
  min_coverage: 0.5
  tactic_order_required: true
scoring:
  posture_severity: critical
  active_severity: critical
  path_length_bonus: true
tests:
  positive:
    description: "EKS pod exec CDR + wildcard RBAC → admin role → Secrets crown jewel"
    expected_tier: 3
    expected_severity: critical
  negative:
    description: "No CDR events, scoped RBAC, secrets not crown jewel"
    expected_tier: 3
    expected_severity: low
