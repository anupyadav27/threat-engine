id: PAT-AWS-T2-004
version: 1
description: "Lambda function code update event followed by overprivileged execution role — supply chain injection leads to privilege escalation."
tier: 2
severity_base: high
confidence: confirmed
mitre_tactics: [Execution, Privilege Escalation]
mitre_techniques: [T1648, T1078.004]
tactic_chain_order: [Execution, Privilege Escalation]
csps: [aws]
min_hops_for_tier2: 1
entry:
  node_type: Resource
  resource_types: [aws_lambda_function]
  conditions:
    check_rules_failing:
      - aws.iam.instanceprofile.role_policies_least_privilege
    cdr_actor_seen: true
hops:
  - edge_type: CAN_ESCALATE_TO
    target:
      node_type: Resource
      resource_types: [aws_iam_role]
      conditions:
        check_rules_failing:
          - aws.iam.policy.no_wildcard_admin_actions_configured
        is_admin_role: true
scoring:
  posture_severity: high
  active_severity: critical
  path_length_bonus: true
cdr_watch:
  techniques: [T1648]
  window_minutes: 60
  min_coverage: 0.5
  tactic_order_required: false
tests:
  positive:
    description: "Lambda with recent code update CDR event + admin execution role"
    expected_tier: 2
    expected_severity: high
  negative:
    description: "Lambda with scoped role, no suspicious CDR events"
    expected_tier: 2
    expected_severity: low
