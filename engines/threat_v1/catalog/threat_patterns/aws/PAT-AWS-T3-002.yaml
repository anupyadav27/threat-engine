id: PAT-AWS-T3-002
version: 1
description: "Internet-facing EC2 pivots through shared VPC to unencrypted public RDS crown jewel database."
tier: 3
severity_base: critical
confidence: confirmed
mitre_tactics: [Initial Access, Lateral Movement, Exfiltration]
mitre_techniques: [T1190, T1021.007, T1048.002]
tactic_chain_order: [Initial Access, Lateral Movement, Exfiltration]
csps: [aws]
entry:
  node_type: Resource
  resource_types: [aws_instance]
  conditions:
    internet_exposed: true
    check_rules_failing:
      - aws.ec2.security_group_ssh_restricted.ssh_access_restricted
hops:
  - edge_type: CAN_ACCESS
    target:
      node_type: Resource
      resource_types: [aws_rds_instance, aws_db_instance]
      conditions:
        check_rules_failing:
          - aws.rds.instance.storage_encrypted
target:
  node_type: Resource
  resource_types: [aws_rds_instance, aws_db_instance]
  conditions:
    is_crown_jewel: true
    check_rules_failing:
      - aws.rds.instance.public_access_disabled
cdr_watch:
  techniques: [T1190, T1021.007]
  window_minutes: 240
  min_coverage: 0.5
  tactic_order_required: true
scoring:
  posture_severity: critical
  active_severity: critical
  path_length_bonus: true
tests:
  positive:
    description: "Public EC2 → VPC path → public RDS crown jewel"
    expected_tier: 3
    expected_severity: critical
  negative:
    description: "Private EC2 with no path to private encrypted RDS"
    expected_tier: 3
    expected_severity: low
