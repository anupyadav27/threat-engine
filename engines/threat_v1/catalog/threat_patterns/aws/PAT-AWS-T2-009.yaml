id: PAT-AWS-T2-009
version: 1
description: "ECR repository with public image access connected to ECS privileged task — poisoned container image supply chain."
tier: 2
severity_base: high
confidence: confirmed
mitre_tactics: [Execution, Privilege Escalation]
mitre_techniques: [T1610, T1611]
tactic_chain_order: [Execution, Privilege Escalation]
csps: [aws]
min_hops_for_tier2: 1
entry:
  node_type: Resource
  resource_types: [aws_ecr_repository]
  conditions:
    check_rules_failing:
      - aws.ec2.ami.not_publicly_shared_configured
hops:
  - edge_type: EXECUTES_IN
    target:
      node_type: Resource
      resource_types: [aws_ecs_task_definition]
      conditions:
        check_rules_failing:
          - aws.ecs.container_instance.no_privileged_containers_configured
scoring:
  posture_severity: high
  active_severity: critical
  path_length_bonus: true
tests:
  positive:
    description: "Public ECR image pulled into ECS privileged task"
    expected_tier: 2
    expected_severity: high
  negative:
    description: "Private ECR with image scanning, non-privileged ECS task"
    expected_tier: 2
    expected_severity: low
