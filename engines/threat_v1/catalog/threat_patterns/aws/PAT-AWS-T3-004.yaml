id: PAT-AWS-T3-004
version: 1
description: "Poisoned ECR image deployed to ECS privileged container pivots to Secrets Manager crown jewel via task role credential abuse."
tier: 3
severity_base: critical
confidence: confirmed
mitre_tactics: [Execution, Privilege Escalation, Collection]
mitre_techniques: [T1610, T1611, T1555]
tactic_chain_order: [Execution, Privilege Escalation, Collection]
csps: [aws]
entry:
  node_type: Resource
  resource_types: [aws_ecr_repository]
  conditions:
    cdr_actor_seen: true
hops:
  - edge_type: EXECUTES_IN
    target:
      node_type: Resource
      resource_types: [aws_ecs_task_definition]
      conditions:
        check_rules_failing:
          - aws.ecs.container_instance.no_privileged_containers_configured
          - aws.iam.instanceprofile.role_policies_least_privilege
target:
  node_type: Resource
  resource_types: [aws_secretsmanager_secret]
  conditions:
    is_crown_jewel: true
cdr_watch:
  techniques: [T1610, T1611]
  window_minutes: 120
  min_coverage: 0.5
  tactic_order_required: true
scoring:
  posture_severity: critical
  active_severity: critical
  path_length_bonus: true
tests:
  positive:
    description: "ECR push CDR event → ECS privileged task → Secrets crown jewel"
    expected_tier: 3
    expected_severity: critical
  negative:
    description: "Private ECR no CDR events, non-privileged ECS, scoped role"
    expected_tier: 3
    expected_severity: low
