id: PAT-AWS-T2-010
version: 1
description: "IAM role with admin privileges connected to multiple services — blast radius: one credential compromise exposes entire account."
tier: 2
severity_base: critical
confidence: confirmed
mitre_tactics: [Privilege Escalation, Impact]
mitre_techniques: [T1078.004, T1098.001]
tactic_chain_order: [Privilege Escalation, Impact]
csps: [aws]
min_hops_for_tier2: 1
entry:
  node_type: Resource
  resource_types: [aws_iam_role]
  conditions:
    check_rules_failing:
      - aws.iam.policy.security_check_full_admin_privileges_configured
      - aws.iam.role.attached_policies_not_admin_star_configured
    is_admin_role: true
hops:
  - edge_type: CAN_ESCALATE_TO
    target:
      node_type: Resource
      resource_types: [aws_iam_user, aws_iam_role]
      conditions:
        check_rules_failing:
          - aws.iam.customer.attached_policy_no_administrative_privileges_configured
scoring:
  posture_severity: critical
  active_severity: critical
  path_length_bonus: false
tests:
  positive:
    description: "IAM role with AdministratorAccess that can assume another admin role"
    expected_tier: 2
    expected_severity: critical
  negative:
    description: "IAM role with scoped permissions, no cross-account admin trust"
    expected_tier: 2
    expected_severity: low
