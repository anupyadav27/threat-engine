id: PAT-GCP-T3-004
version: 1
description: "KMS role binding update (CDR) grants decrypt access on CMEK key protecting a GCS crown jewel — encrypted data becomes readable."
tier: 3
severity_base: critical
confidence: confirmed
mitre_tactics: [Collection, Exfiltration]
mitre_techniques: [T1098.001, T1552, T1530]
tactic_chain_order: [Collection, Exfiltration]
csps: [gcp]
entry:
  node_type: Resource
  resource_types: [gcp_kms_key_ring, gcp_kms_key]
  conditions:
    cdr_actor_seen: true
hops:
  - edge_type: CAN_ACCESS
    target:
      node_type: Resource
      resource_types: [gcp_storage_bucket, gcp_gcs_bucket]
      conditions:
        check_rules_failing:
          - gcp.storage.policy.bucket_policy_deny_unencrypted_puts
target:
  node_type: Resource
  resource_types: [gcp_storage_bucket, gcp_gcs_bucket]
  conditions:
    is_crown_jewel: true
cdr_watch:
  techniques: [T1098.001]
  window_minutes: 60
  min_coverage: 0.5
  tactic_order_required: false
scoring:
  posture_severity: critical
  active_severity: critical
  path_length_bonus: true
tests:
  positive:
    description: "KMS role binding CDR → GCS crown jewel bucket with weak policy"
    expected_tier: 3
    expected_severity: critical
  negative:
    description: "No CDR events on KMS, GCS not crown jewel"
    expected_tier: 3
    expected_severity: low
