id: PAT-GCP-T2-005
version: 1
description: "GCE instance with secrets in user data connected to GCS via admin SA — plaintext secret enables direct bucket access."
tier: 2
severity_base: high
confidence: confirmed
mitre_tactics: [Credential Access, Collection]
mitre_techniques: [T1552.001, T1530]
tactic_chain_order: [Credential Access, Collection]
csps: [gcp]
min_hops_for_tier2: 1
entry:
  node_type: Resource
  resource_types: [gcp_compute_instance, gcp_gce_instance]
  conditions:
    check_rules_failing:
      - gcp.compute.instance.vm_user_data_no_secrets
hops:
  - edge_type: CAN_ACCESS
    target:
      node_type: Resource
      resource_types: [gcp_storage_bucket, gcp_gcs_bucket]
      conditions:
        check_rules_failing:
          - gcp.storage.policy.bucket_policy_deny_unencrypted_puts
scoring:
  posture_severity: high
  active_severity: critical
  path_length_bonus: true
tests:
  positive:
    description: "GCE instance with secret in startup script → unprotected GCS"
    expected_tier: 2
    expected_severity: high
  negative:
    description: "GCE no secrets in user data, GCS with strict policy"
    expected_tier: 2
    expected_severity: low
