id: PAT-GCP-T3-005
version: 1
description: "SA impersonation CDR on org-admin service account achieves project-level takeover; full access to GCS crown jewel data."
tier: 3
severity_base: critical
confidence: confirmed
mitre_tactics: [Privilege Escalation, Lateral Movement, Exfiltration]
mitre_techniques: [T1134.001, T1078.004, T1537]
tactic_chain_order: [Privilege Escalation, Lateral Movement, Exfiltration]
csps: [gcp]
entry:
  node_type: Resource
  resource_types: [gcp_service_account, gcp_iam_sa]
  conditions:
    cdr_actor_seen: true
    check_rules_failing:
      - gcp.iam.service_account.service_account_keys_not_used_or_rotated_90_days_or_less
hops:
  - edge_type: CAN_ESCALATE_TO
    target:
      node_type: Resource
      resource_types: [gcp_project, gcp_organization]
      conditions:
        is_admin_role: true
target:
  node_type: Resource
  resource_types: [gcp_storage_bucket, gcp_gcs_bucket]
  conditions:
    is_crown_jewel: true
cdr_watch:
  techniques: [T1134.001, T1078.004]
  window_minutes: 120
  min_coverage: 0.5
  tactic_order_required: true
scoring:
  posture_severity: critical
  active_severity: critical
  path_length_bonus: true
tests:
  positive:
    description: "SA impersonation CDR → org admin → GCS crown jewel"
    expected_tier: 3
    expected_severity: critical
  negative:
    description: "No CDR events, SA keys rotated, GCS not crown jewel"
    expected_tier: 3
    expected_severity: low
