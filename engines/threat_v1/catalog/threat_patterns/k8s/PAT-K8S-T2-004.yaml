id: PAT-K8S-T2-004
version: 1
description: "HostPath sensitive mount (CDR: hostpath_sensitive_mount audit) on pod with host network — direct OS file read enabling credential theft."
tier: 2
severity_base: critical
confidence: confirmed
mitre_tactics: [Credential Access, Lateral Movement]
mitre_techniques: [T1005, T1552]
tactic_chain_order: [Credential Access, Lateral Movement]
csps: [k8s]
min_hops_for_tier2: 1
entry:
  node_type: Resource
  resource_types: [k8s_pod]
  conditions:
    check_rules_failing:
      - k8s.pod.host.network_disabled
    cdr_actor_seen: true
hops:
  - edge_type: CAN_ACCESS
    target:
      node_type: Resource
      resource_types: [k8s_node]
      conditions:
        check_rules_failing:
          - k8s.admission.control.hostpath_volumes_restricted
scoring:
  posture_severity: critical
  active_severity: critical
  path_length_bonus: true
cdr_watch:
  techniques: [T1005]
  window_minutes: 60
  min_coverage: 0.5
  tactic_order_required: false
tests:
  positive:
    description: "Pod with hostNetwork + sensitive hostPath CDR mount event"
    expected_tier: 2
    expected_severity: critical
  negative:
    description: "No CDR events, no hostNetwork, hostPath restricted"
    expected_tier: 2
    expected_severity: low
