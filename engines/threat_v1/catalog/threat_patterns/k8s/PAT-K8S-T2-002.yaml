id: PAT-K8S-T2-002
version: 1
description: "RBAC cluster role binding creation CDR event on overprivileged service account — attacker granting themselves cluster-admin."
tier: 2
severity_base: critical
confidence: confirmed
mitre_tactics: [Privilege Escalation, Persistence]
mitre_techniques: [T1613, T1098]
tactic_chain_order: [Privilege Escalation, Persistence]
csps: [k8s]
min_hops_for_tier2: 1
entry:
  node_type: Resource
  resource_types: [k8s_serviceaccount, k8s_clusterrole]
  conditions:
    cdr_actor_seen: true
hops:
  - edge_type: CAN_ESCALATE_TO
    target:
      node_type: Resource
      resource_types: [k8s_clusterrolebinding]
      conditions:
        check_rules_failing:
          - k8s.rbac.role.administrators_cannot_update_cluster_role_binding_configured
        is_admin_role: true
scoring:
  posture_severity: critical
  active_severity: critical
  path_length_bonus: true
cdr_watch:
  techniques: [T1613]
  window_minutes: 30
  min_coverage: 0.5
  tactic_order_required: false
tests:
  positive:
    description: "Cluster role binding CDR event → admin ClusterRoleBinding"
    expected_tier: 2
    expected_severity: critical
  negative:
    description: "No CDR events, ClusterRoleBinding update restricted"
    expected_tier: 2
    expected_severity: low
