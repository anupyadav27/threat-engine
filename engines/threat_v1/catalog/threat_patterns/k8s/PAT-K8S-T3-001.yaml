id: PAT-K8S-T3-001
version: 1
description: "Container escape via privileged pod and HostPath mount, node takeover via host PID, cluster-admin escalation, crown jewel secret exfiltration."
tier: 3
severity_base: critical
confidence: confirmed
mitre_tactics: [Privilege Escalation, Lateral Movement, Collection]
mitre_techniques: [T1611, T1613, T1552]
tactic_chain_order: [Privilege Escalation, Lateral Movement, Collection]
csps: [k8s]
entry:
  node_type: Resource
  resource_types: [k8s_pod]
  conditions:
    check_rules_failing:
      - k8s.pod.security.privileged_containers_check
      - k8s.pod.node.host_pid_disabled_enforced
    cdr_actor_seen: true
hops:
  - edge_type: CAN_ESCALATE_TO
    target:
      node_type: Resource
      resource_types: [k8s_node]
      conditions:
        check_rules_failing:
          - k8s.admission.control.hostpath_volumes_restricted
target:
  node_type: Resource
  resource_types: [k8s_secret]
  conditions:
    is_crown_jewel: true
cdr_watch:
  techniques: [T1611, T1613]
  window_minutes: 60
  min_coverage: 0.5
  tactic_order_required: true
scoring:
  posture_severity: critical
  active_severity: critical
  path_length_bonus: true
tests:
  positive:
    description: "Privileged pod CDR escape → node → crown jewel secret"
    expected_tier: 3
    expected_severity: critical
  negative:
    description: "Non-privileged pod, hostPath restricted, secret not crown jewel"
    expected_tier: 3
    expected_severity: low
