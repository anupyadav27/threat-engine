id: PAT-AZU-T3-003
version: 1
description: "Global admin account without MFA taken over via conditional access bypass; attacker escalates to subscription owner and reaches storage crown jewel."
tier: 3
severity_base: critical
confidence: confirmed
mitre_tactics: [Credential Access, Privilege Escalation, Collection]
mitre_techniques: [T1556, T1078.004, T1530]
tactic_chain_order: [Credential Access, Privilege Escalation, Collection]
csps: [azure]
entry:
  node_type: Resource
  resource_types: [azure_ad_user, azure_aad_user]
  conditions:
    cdr_actor_seen: true
    is_admin_role: true
    check_rules_failing:
      - azure.aad.user.access_user_mfa_required
hops:
  - edge_type: CAN_ESCALATE_TO
    target:
      node_type: Resource
      resource_types: [azure_subscription]
      conditions:
        check_rules_failing:
          - azure.rbac.role_definition.identity_access_role_attached_policies_not_admin_star
target:
  node_type: Resource
  resource_types: [azure_storage_account]
  conditions:
    is_crown_jewel: true
cdr_watch:
  techniques: [T1556, T1078.004]
  window_minutes: 240
  min_coverage: 0.5
  tactic_order_required: true
scoring:
  posture_severity: critical
  active_severity: critical
  path_length_bonus: true
tests:
  positive:
    description: "Global admin CDR bypass → subscription owner → storage crown jewel"
    expected_tier: 3
    expected_severity: critical
  negative:
    description: "MFA enforced admin, no CDR events, storage not crown jewel"
    expected_tier: 3
    expected_severity: low
