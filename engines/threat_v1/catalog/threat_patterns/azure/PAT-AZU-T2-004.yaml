id: PAT-AZU-T2-004
version: 1
description: "RBAC role evasion chain CDR event on subscription scope — attacker modifying role definitions to expand permissions."
tier: 2
severity_base: critical
confidence: confirmed
mitre_tactics: [Privilege Escalation, Defense Evasion]
mitre_techniques: [T1548, T1078.004]
tactic_chain_order: [Privilege Escalation, Defense Evasion]
csps: [azure]
min_hops_for_tier2: 1
entry:
  node_type: Resource
  resource_types: [azure_subscription, azure_rbac_role]
  conditions:
    cdr_actor_seen: true
hops:
  - edge_type: CAN_ESCALATE_TO
    target:
      node_type: Resource
      resource_types: [azure_role_definition]
      conditions:
        check_rules_failing:
          - azure.rbac.role_definition.identity_access_role_attached_policies_not_admin_star
        is_admin_role: true
scoring:
  posture_severity: critical
  active_severity: critical
  path_length_bonus: true
cdr_watch:
  techniques: [T1548]
  window_minutes: 60
  min_coverage: 0.5
  tactic_order_required: false
tests:
  positive:
    description: "RBAC role evasion CDR event → admin role definition modified"
    expected_tier: 2
    expected_severity: critical
  negative:
    description: "No CDR events, roles restricted"
    expected_tier: 2
    expected_severity: low
