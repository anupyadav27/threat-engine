id: PAT-AZU-T1-004
version: 1
description: "Azure Key Vault without key rotation policy and no private endpoint — secrets and keys reachable from internet."
tier: 1
severity_base: high
confidence: confirmed
mitre_tactics: [Credential Access, Collection]
mitre_techniques: [T1555, T1552.001]
tactic_chain_order: [Credential Access, Collection]
csps: [azure]
entry:
  node_type: Resource
  resource_types: [azure_key_vault, azure_keyvault]
  conditions:
    check_rules_failing:
      - azure.keyvault.key.rotation_enabled
      - azure.keyvault.private.endpoint.association.check
scoring:
