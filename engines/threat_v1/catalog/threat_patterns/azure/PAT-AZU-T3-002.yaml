id: PAT-AZU-T3-002
version: 1
description: "Poisoned ACR container image deployed to AKS escapes container runtime; pivots to Azure Storage crown jewel via node identity."
tier: 3
severity_base: critical
confidence: confirmed
mitre_tactics: [Execution, Privilege Escalation, Collection]
mitre_techniques: [T1610, T1611, T1530]
tactic_chain_order: [Execution, Privilege Escalation, Collection]
csps: [azure]
entry:
  node_type: Resource
  resource_types: [azure_container_registry, azure_acr]
  conditions:
    cdr_actor_seen: true
    check_rules_failing:
      - azure.containerregistry.repository.supply_chain_registry_image_scanning_enabled
hops:
  - edge_type: EXECUTES_IN
    target:
      node_type: Resource
      resource_types: [azure_kubernetes_service, azure_aks]
      conditions:
        check_rules_failing:
          - azure.security.defender.container_vulnerabilities_resolved
target:
  node_type: Resource
  resource_types: [azure_storage_account]
  conditions:
    is_crown_jewel: true
    check_rules_failing:
      - azure.storage.private.endpoint.presence.and.configuration.check
cdr_watch:
  techniques: [T1610, T1611]
  window_minutes: 60
  min_coverage: 0.5
  tactic_order_required: true
scoring:
  posture_severity: critical
  active_severity: critical
  path_length_bonus: true
tests:
  positive:
    description: "ACR push CDR → AKS container escape → storage crown jewel"
    expected_tier: 3
    expected_severity: critical
  negative:
    description: "ACR scanning, AKS patched, storage private endpoint"
    expected_tier: 3
    expected_severity: low
