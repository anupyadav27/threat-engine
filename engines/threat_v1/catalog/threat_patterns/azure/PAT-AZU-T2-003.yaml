id: PAT-AZU-T2-003
version: 1
description: "Unscanned ACR image deployed to AKS workload with privileged containers — supply chain compromise enables container escape."
tier: 2
severity_base: high
confidence: confirmed
mitre_tactics: [Execution, Privilege Escalation]
mitre_techniques: [T1610, T1611]
tactic_chain_order: [Execution, Privilege Escalation]
csps: [azure]
min_hops_for_tier2: 1
entry:
  node_type: Resource
  resource_types: [azure_container_registry, azure_acr]
  conditions:
    check_rules_failing:
      - azure.containerregistry.repository.supply_chain_registry_image_scanning_enabled
    cdr_actor_seen: true
hops:
  - edge_type: EXECUTES_IN
    target:
      node_type: Resource
      resource_types: [azure_kubernetes_service, azure_aks]
      conditions:
        check_rules_failing:
          - azure.security.defender.container_vulnerabilities_resolved
scoring:
  posture_severity: high
  active_severity: critical
  path_length_bonus: true
cdr_watch:
  techniques: [T1610]
  window_minutes: 120
  min_coverage: 0.5
  tactic_order_required: false
tests:
  positive:
    description: "ACR push CDR event → AKS with vulnerable containers"
    expected_tier: 2
    expected_severity: high
  negative:
    description: "ACR with scanning, AKS with no container vulnerabilities"
    expected_tier: 2
    expected_severity: low
