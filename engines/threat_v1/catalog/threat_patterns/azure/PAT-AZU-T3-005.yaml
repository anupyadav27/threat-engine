id: PAT-AZU-T3-005
version: 1
description: "RBAC role evasion CDR event escalates custom role to subscription owner scope; full access to SQL DB crown jewel."
tier: 3
severity_base: critical
confidence: confirmed
mitre_tactics: [Privilege Escalation, Defense Evasion, Collection]
mitre_techniques: [T1548, T1078.004, T1005]
tactic_chain_order: [Privilege Escalation, Defense Evasion, Collection]
csps: [azure]
entry:
  node_type: Resource
  resource_types: [azure_rbac_role, azure_role_definition]
  conditions:
    cdr_actor_seen: true
hops:
  - edge_type: CAN_ESCALATE_TO
    target:
      node_type: Resource
      resource_types: [azure_subscription]
      conditions:
        check_rules_failing:
          - azure.rbac.role_definition.identity_access_role_attached_policies_not_admin_star
        is_admin_role: true
target:
  node_type: Resource
  resource_types: [azure_sql_server, azure_sql_database]
  conditions:
    is_crown_jewel: true
cdr_watch:
  techniques: [T1548, T1078.004]
  window_minutes: 180
  min_coverage: 0.5
  tactic_order_required: true
scoring:
  posture_severity: critical
  active_severity: critical
  path_length_bonus: true
tests:
  positive:
    description: "RBAC evasion CDR → subscription owner → SQL DB crown jewel"
    expected_tier: 3
    expected_severity: critical
  negative:
    description: "No CDR events, roles restricted, SQL not crown jewel"
    expected_tier: 3
    expected_severity: low
