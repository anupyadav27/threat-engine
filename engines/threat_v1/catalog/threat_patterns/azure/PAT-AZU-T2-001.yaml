id: PAT-AZU-T2-001
version: 1
description: "Internet-facing Azure VM with managed identity connected to Key Vault — exploit VM to obtain identity token and read all secrets."
tier: 2
severity_base: high
confidence: confirmed
mitre_tactics: [Initial Access, Credential Access]
mitre_techniques: [T1190, T1555]
tactic_chain_order: [Initial Access, Credential Access]
csps: [azure]
min_hops_for_tier2: 1
entry:
  node_type: Resource
  resource_types: [azure_virtual_machine, azure_vm]
  conditions:
    check_rules_failing:
      - azure.vm.encryption.at.host.enabled
    internet_exposed: true
hops:
  - edge_type: CAN_ACCESS
    target:
      node_type: Resource
      resource_types: [azure_key_vault, azure_keyvault]
      conditions:
        check_rules_failing:
          - azure.keyvault.secret.access_rbac_least_privilege
scoring:
  posture_severity: high
  active_severity: critical
  path_length_bonus: true
tests:
  positive:
    description: "Public VM with managed identity → Key Vault no RBAC scoping"
    expected_tier: 2
    expected_severity: high
  negative:
    description: "Private VM with scoped managed identity, Key Vault RBAC enforced"
    expected_tier: 2
    expected_severity: low
