apiVersion: apps/v1
kind: Deployment
metadata:
  name: engine-secops-fix
  namespace: threat-engine-engines
  labels:
    app: engine-secops-fix
    version: "1.0.0"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: engine-secops-fix
  template:
    metadata:
      labels:
        app: engine-secops-fix
    spec:
      containers:
        - name: engine-secops-fix
          image: yadavanup84/engine-secops-fix:v1.0
          ports:
            - containerPort: 8006
          env:
            - name: SECOPS_FIX_PORT
              value: "8006"
            - name: SECOPS_DB_HOST
              valueFrom:
                configMapKeyRef:
                  name: threat-engine-db-config
                  key: SECOPS_DB_HOST
            - name: SECOPS_DB_PORT
              valueFrom:
                configMapKeyRef:
                  name: threat-engine-db-config
                  key: SECOPS_DB_PORT
            - name: SECOPS_DB_NAME
              valueFrom:
                configMapKeyRef:
                  name: threat-engine-db-config
                  key: SECOPS_DB_NAME
            - name: SECOPS_DB_USER
              valueFrom:
                secretKeyRef:
                  name: external-secret-db-passwords
                  key: SECOPS_DB_USER
            - name: SECOPS_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: external-secret-db-passwords
                  key: SECOPS_DB_PASSWORD
          livenessProbe:
            httpGet:
              path: /api/v1/health/live
              port: 8006
            initialDelaySeconds: 15
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /api/v1/health/ready
              port: 8006
            initialDelaySeconds: 20
            periodSeconds: 15
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
      restartPolicy: Always
---
apiVersion: v1
kind: Service
metadata:
  name: engine-secops-fix
  namespace: threat-engine-engines
spec:
  selector:
    app: engine-secops-fix
  ports:
    - name: http
      port: 8006
      targetPort: 8006
  type: ClusterIP
