rules:
- rule_id: dns.crypto_mining_domain
  title: DNS query for known cryptocurrency mining pool domain
  severity: critical
  log_source_type: dns
  conditions:
    all:
    - field: source_type
      op: equals
      value: dns
    - field: operation
      op: contains
      value: pool
  engines:
  - threat_engine
  - network_engine
  primary_engine: threat_engine
  action_category: c2
  mitre_tactics:
  - impact
  mitre_techniques:
  - T1496
  domain: network_security
  provider: aws
  remediation: Review security group and NACL rules. Restrict public access. Enable VPC Flow Logs for monitoring.
  compliance_frameworks: &id001
  - CIS
  - NIST_800-53
  - PCI-DSS
  - SOC2
  risk_score: 90
