- rule_id: dns.tunneling_long_subdomain
  title: DNS query with unusually long subdomain — possible DNS tunneling
  severity: high
  log_source_type: dns
  conditions:
    all:
    - field: source_type
      op: equals
      value: dns
    - field: operation
      op: contains
      value: '.......'
  engines:
  - threat_engine
  - network_engine
  primary_engine: threat_engine
  action_category: exfiltration
  description: Very long subdomains (many labels) can indicate DNS tunneling for data exfiltration or C2
  mitre_tactics:
  - exfiltration
  - command-and-control
  mitre_techniques:
  - T1048.003
  - T1071.004
  domain: network_security
  provider: aws
  remediation: Review security group and NACL rules. Restrict public access. Enable VPC Flow Logs for monitoring.
  compliance_frameworks: *id001
  risk_score: 70
