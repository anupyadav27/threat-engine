rules:
- rule_id: ibm.scc.critical_finding
  title: IBM SCC critical-severity finding detected
  severity: critical
  log_source_type: ibm_scc
  conditions:
    all:
    - field: source_type
      op: equals
      value: ibm_scc
    - field: operation
      op: equals
      value: finding.create
    - field: severity
      op: equals
      value: CRITICAL
  engines:
  - threat_engine
  - ciem
  primary_engine: threat_engine
  action_category: read
  mitre_tactics:
  - discovery
  mitre_techniques:
  - T1518
  domain: security_services
  provider: ibm
  remediation: Verify the accessor has legitimate need-to-know. Review access patterns for anomalies. Consider restricting
    read permissions.
  compliance_frameworks: &id001
  - CIS
  - NIST_800-53
  - SOC2
  risk_score: 90
