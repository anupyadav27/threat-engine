- rule_id: oci.oke_audit.secret_read
  title: OKE Kubernetes secret accessed
  severity: medium
  log_source_type: oci_oke_audit
  conditions:
    all:
    - field: source_type
      op: equals
      value: oci_oke_audit
    - field: operation
      op: in
      value:
      - get_secret
      - list_secret
    - field: resource_type
      op: equals
      value: secrets
  engines:
  - threat_engine
  - ciem
  - container_engine
  primary_engine: threat_engine
  action_category: read
  mitre_tactics:
  - credential-access
  mitre_techniques:
  - T1552.007
  domain: container_security
  provider: oci
  remediation: Verify the accessor has legitimate need-to-know. Review access patterns for anomalies. Consider restricting
    read permissions.
  compliance_frameworks: *id001
  risk_score: 50
