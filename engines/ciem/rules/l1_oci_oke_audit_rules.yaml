rules:
- rule_id: oci.oke_audit.clusterrole_change
  title: OKE ClusterRole or ClusterRoleBinding created or modified
  severity: high
  log_source_type: oci_oke_audit
  conditions:
    all:
    - field: source_type
      op: equals
      value: oci_oke_audit
    - field: operation
      op: in
      value:
      - create_clusterrole
      - update_clusterrole
      - patch_clusterrole
      - create_clusterrolebinding
      - update_clusterrolebinding
      - patch_clusterrolebinding
  engines:
  - threat_engine
  - ciem
  - container_engine
  primary_engine: threat_engine
  action_category: modify
  mitre_tactics:
  - persistence
  - privilege-escalation
  mitre_techniques:
  - T1098.001
  domain: container_security
  provider: oci
  remediation: Review the configuration change for unintended exposure. Validate the actor's authorization. Consider enabling
    change approval workflows.
  compliance_frameworks: &id001
  - CIS
  - NIST_800-53
  - SOC2
  risk_score: 70
