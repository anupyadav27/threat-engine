      - delete_clusterrolebinding
      - delete_role
  engines:
  - threat_engine
  - ciem
  - container_engine
  primary_engine: threat_engine
  action_category: delete
  mitre_tactics:
  - defense-evasion
  mitre_techniques:
  - T1070
