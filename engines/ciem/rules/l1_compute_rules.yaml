rules:
- rule_id: compute.ct.ec2_run_instances
  title: EC2 instances launched
  severity: medium
  log_source_type: cloudtrail
  conditions:
    all:
    - field: service
      op: equals
      value: ec2
    - field: operation
      op: equals
      value: RunInstances
  engines:
  - threat_engine
  primary_engine: threat_engine
  action_category: create
  mitre_tactics:
  - execution
  mitre_techniques:
  - T1204.003
  description: New EC2 instances launched — review instance type, AMI, and VPC placement.
  domain: compute_security
  provider: aws
  remediation: Verify the newly created resource follows organizational policy. Check for overly permissive settings. Tag
    the resource for tracking.
  compliance_frameworks: &id001
  - CIS
  - NIST_800-53
  - SOC2
  risk_score: 50
- rule_id: compute.ct.ec2_modify_instance_attribute
  title: EC2 instance attribute modified
  severity: medium
  log_source_type: cloudtrail
  conditions:
    all:
    - field: service
      op: equals
      value: ec2
    - field: operation
      op: equals
      value: ModifyInstanceAttribute
  engines:
  - threat_engine
  primary_engine: threat_engine
  action_category: modify
  mitre_tactics:
  - defense-evasion
  - persistence
  mitre_techniques:
  - T1578.001
  description: Instance attribute change — could disable termination protection or change userdata.
  domain: compute_security
  provider: aws
  remediation: Review the configuration change for unintended exposure. Validate the actor's authorization. Consider enabling
    change approval workflows.
  compliance_frameworks: *id001
  risk_score: 50
