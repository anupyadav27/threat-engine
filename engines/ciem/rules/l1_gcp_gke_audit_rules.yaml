rules:
- rule_id: gcp.gke_audit.clusterrole_create
  title: GKE ClusterRole created
  severity: high
  log_source_type: gcp_gke_audit
  conditions:
    all:
    - field: source_type
      op: equals
      value: gcp_gke_audit
    - field: operation
      op: equals
      value: create
    - field: resource_type
      op: equals
      value: clusterroles
  engines:
  - container_engine
  - ciem
  primary_engine: container_engine
  action_category: create
  mitre_tactics:
  - privilege-escalation
  - persistence
  mitre_techniques:
  - T1078.004
  domain: container_security
  provider: gcp
  remediation: Verify the newly created resource follows organizational policy. Check for overly permissive settings. Tag
    the resource for tracking.
  compliance_frameworks: &id001
  - CIS
  - NIST_800-53
  - SOC2
  risk_score: 70
