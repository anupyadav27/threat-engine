    - field: source_type
      op: equals
      value: gcp_gke_audit
    - field: operation
      op: equals
      value: get
    - field: resource_type
      op: equals
      value: secrets
  engines:
  - container_engine
  - ciem
  primary_engine: container_engine
  action_category: read
  mitre_tactics:
  - credential-access
  mitre_techniques:
  - T1552.007
  domain: container_security
  provider: gcp
  remediation: Verify the accessor has legitimate need-to-know. Review access patterns for anomalies. Consider restricting
    read permissions.
  compliance_frameworks: *id001
  risk_score: 50
