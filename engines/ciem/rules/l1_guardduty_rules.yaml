rules:
- rule_id: guardduty.critical_finding
  title: GuardDuty critical severity finding (severity >= 7)
  severity: critical
  log_source_type: guardduty
  conditions:
    all:
    - field: source_type
      op: equals
      value: guardduty
    - field: severity
      op: equals
      value: high
  engines:
  - threat_engine
  - network_engine
  primary_engine: threat_engine
  action_category: threat
  mitre_tactics:
  - initial-access
  - execution
  - impact
  domain: threat_detection
  provider: aws
  remediation: Investigate the detected threat. Correlate with other security signals. Initiate incident response if confirmed.
  compliance_frameworks: &id001
  - NIST_800-53
  - SOC2
  - MITRE_ATT&CK
  risk_score: 90
