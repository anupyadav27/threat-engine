rules:
- rule_id: azure.storage.anonymous_access
  title: Anonymous (unauthenticated) access to Azure Storage blob
  severity: high
  log_source_type: azure_storage
  conditions:
    all:
    - field: source_type
      op: equals
      value: azure_storage
    - field: actor_principal
      op: equals
      value: anonymous
  engines:
  - threat_engine
  - datasec_engine
  primary_engine: datasec_engine
  action_category: read
  mitre_tactics:
  - initial-access
  - exfiltration
  mitre_techniques:
  - T1530
  domain: data_security
  provider: azure
  remediation: Verify the accessor has legitimate need-to-know. Review access patterns for anomalies. Consider restricting
    read permissions.
  compliance_frameworks: &id001
  - CIS
  - NIST_800-53
  - GDPR
  - PCI-DSS
  - HIPAA
  - ISO_27001
  risk_score: 70
- rule_id: azure.storage.unauthorized_access
  title: Azure Storage access denied (403 Forbidden)
  severity: medium
  log_source_type: azure_storage
  conditions:
    all:
    - field: source_type
      op: equals
      value: azure_storage
    - field: outcome
      op: equals
      value: FAILURE
    - field: error_code
      op: in
      value:
      - AuthorizationFailure
      - AuthorizationPermissionMismatch
      - AccountIsDisabled
  engines:
  - threat_engine
  - datasec_engine
  primary_engine: threat_engine
  action_category: read
  mitre_tactics:
  - discovery
  mitre_techniques:
  - T1580
  domain: data_security
  provider: azure
  remediation: Verify the accessor has legitimate need-to-know. Review access patterns for anomalies. Consider restricting
    read permissions.
  compliance_frameworks: *id001
  risk_score: 50
- rule_id: azure.storage.bulk_download
  title: Azure Storage bulk blob download (potential exfiltration)
  severity: high
  log_source_type: azure_storage
  conditions:
    all:
    - field: source_type
      op: equals
      value: azure_storage
    - field: operation
      op: equals
      value: GetBlob
  engines:
  - threat_engine
  - datasec_engine
  primary_engine: datasec_engine
  action_category: read
  mitre_tactics:
  - exfiltration
  - collection
  mitre_techniques:
  - T1530
  description: Correlate with volume/frequency to detect bulk exfiltration
  domain: data_security
  provider: azure
  remediation: Verify the accessor has legitimate need-to-know. Review access patterns for anomalies. Consider restricting
    read permissions.
  compliance_frameworks: *id001
  risk_score: 70
- rule_id: azure.storage.container_delete
  title: Azure Storage container deleted
  severity: critical
  log_source_type: azure_storage
  conditions:
    all:
    - field: source_type
      op: equals
      value: azure_storage
    - field: operation
      op: equals
      value: DeleteContainer
  engines:
  - threat_engine
  - datasec_engine
  primary_engine: threat_engine
  action_category: delete
  mitre_tactics:
  - impact
  mitre_techniques:
  - T1485
  domain: data_security
  provider: azure
  remediation: Investigate deletion. Verify the actor had authorization. Enable MFA delete where applicable. Review CloudTrail
    for associated activity.
  compliance_frameworks: *id001
  risk_score: 90
- rule_id: azure.storage.blob_delete
  title: Azure Storage blob deleted
  severity: medium
  log_source_type: azure_storage
  conditions:
    all:
    - field: source_type
      op: equals
      value: azure_storage
    - field: operation
      op: equals
      value: DeleteBlob
  engines:
  - threat_engine
  - datasec_engine
  primary_engine: datasec_engine
  action_category: delete
  mitre_tactics:
  - impact
  mitre_techniques:
  - T1485
  domain: data_security
  provider: azure
  remediation: Investigate deletion. Verify the actor had authorization. Enable MFA delete where applicable. Review CloudTrail
    for associated activity.
  compliance_frameworks: *id001
  risk_score: 50
- rule_id: azure.storage.sas_token_usage
  title: Azure Storage accessed via SAS token
  severity: medium
  log_source_type: azure_storage
  conditions:
    all:
    - field: source_type
      op: equals
      value: azure_storage
    - field: operation
      op: contains
      value: SAS
  engines:
  - threat_engine
  - datasec_engine
  primary_engine: threat_engine
  action_category: read
  mitre_tactics:
  - credential-access
  - lateral-movement
  mitre_techniques:
  - T1528
  description: SAS tokens grant delegated access -- monitor for abuse or leaked tokens
  domain: data_security
  provider: azure
  remediation: Verify the accessor has legitimate need-to-know. Review access patterns for anomalies. Consider restricting
    read permissions.
  compliance_frameworks: *id001
  risk_score: 50
- rule_id: azure.storage.cross_tenant_access
  title: Azure Storage cross-tenant access detected
  severity: high
  log_source_type: azure_storage
  conditions:
    all:
    - field: source_type
      op: equals
      value: azure_storage
    - field: operation
      op: contains
      value: CrossTenant
  engines:
  - threat_engine
  - ciem
  primary_engine: threat_engine
  action_category: read
  mitre_tactics:
  - lateral-movement
  - exfiltration
  mitre_techniques:
  - T1537
  domain: data_security
  provider: azure
  remediation: Verify the accessor has legitimate need-to-know. Review access patterns for anomalies. Consider restricting
    read permissions.
  compliance_frameworks: *id001
  risk_score: 70
- rule_id: azure.storage.large_data_transfer
  title: Azure Storage large data transfer operation
  severity: high
  log_source_type: azure_storage
  conditions:
    all:
    - field: source_type
      op: equals
      value: azure_storage
    - field: operation
      op: in
      value:
      - CopyBlob
      - PutBlob
      - PutBlockList
  engines:
  - threat_engine
  - datasec_engine
  primary_engine: datasec_engine
  action_category: modify
  mitre_tactics:
  - exfiltration
  - collection
  mitre_techniques:
  - T1537
  description: Large copy/put operations may indicate data staging or exfiltration
  domain: data_security
  provider: azure
  remediation: Review the configuration change for unintended exposure. Validate the actor's authorization. Consider enabling
    change approval workflows.
  compliance_frameworks: *id001
  risk_score: 70
