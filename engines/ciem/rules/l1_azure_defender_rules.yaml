rules:
- rule_id: azure.defender.critical_alert
  title: Defender for Cloud critical severity alert
  severity: critical
  log_source_type: azure_defender
  conditions:
    all:
    - field: source_type
      op: equals
      value: azure_defender
    - field: severity
      op: equals
      value: Critical
  engines:
  - threat_engine
  primary_engine: threat_engine
  action_category: read
  mitre_tactics:
  - initial-access
  - execution
  domain: security_services
  provider: azure
  remediation: Verify the accessor has legitimate need-to-know. Review access patterns for anomalies. Consider restricting
    read permissions.
  compliance_frameworks: &id001
  - CIS
  - NIST_800-53
  - SOC2
  risk_score: 90
