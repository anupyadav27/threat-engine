rules:
- rule_id: oci.vcn_flow.rejected_traffic
  title: OCI VCN traffic rejected by security list or NSG
  severity: info
  log_source_type: oci_vcn_flow
  conditions:
    all:
    - field: source_type
      op: equals
      value: oci_vcn_flow
    - field: network.flow_action
      op: equals
      value: REJECT
  engines:
  - network_engine
  primary_engine: network_engine
  action_category: network
  domain: network_security
  provider: oci
  remediation: Review network configuration changes. Validate security group rules follow least-privilege. Block unauthorized
    ports.
  compliance_frameworks: &id001
  - CIS
  - NIST_800-53
  - PCI-DSS
  - SOC2
  risk_score: 10
- rule_id: oci.vcn_flow.ssh_inbound
  title: OCI SSH traffic (port 22) accepted
  severity: medium
  log_source_type: oci_vcn_flow
  conditions:
    all:
    - field: source_type
      op: equals
      value: oci_vcn_flow
    - field: network.dst_port
      op: equals
      value: '22'
    - field: network.flow_action
      op: equals
      value: ACCEPT
  engines:
  - network_engine
  - threat_engine
  primary_engine: threat_engine
  action_category: network
  mitre_tactics:
  - lateral-movement
  - initial-access
  mitre_techniques:
  - T1021.004
  domain: network_security
  provider: oci
  remediation: Review network configuration changes. Validate security group rules follow least-privilege. Block unauthorized
    ports.
  compliance_frameworks: *id001
  risk_score: 50
- rule_id: oci.vcn_flow.rdp_inbound
  title: OCI RDP traffic (port 3389) accepted
  severity: medium
  log_source_type: oci_vcn_flow
  conditions:
    all:
    - field: source_type
      op: equals
      value: oci_vcn_flow
    - field: network.dst_port
      op: equals
      value: '3389'
    - field: network.flow_action
      op: equals
      value: ACCEPT
  engines:
  - network_engine
  - threat_engine
  primary_engine: threat_engine
  action_category: network
  mitre_tactics:
  - lateral-movement
  - initial-access
  mitre_techniques:
  - T1021.001
  domain: network_security
  provider: oci
  remediation: Review network configuration changes. Validate security group rules follow least-privilege. Block unauthorized
    ports.
  compliance_frameworks: *id001
  risk_score: 50
- rule_id: oci.vcn_flow.database_port
  title: OCI database port traffic (3306/5432/1521/27017) accepted
  severity: low
  log_source_type: oci_vcn_flow
  conditions:
    all:
    - field: source_type
      op: equals
      value: oci_vcn_flow
    - field: network.dst_port
      op: in
      value:
      - '3306'
      - '5432'
      - '1521'
      - '27017'
      - '6379'
    - field: network.flow_action
      op: equals
      value: ACCEPT
  engines:
  - network_engine
  - datasec_engine
  primary_engine: network_engine
  action_category: network
  domain: network_security
  provider: oci
  remediation: Review network configuration changes. Validate security group rules follow least-privilege. Block unauthorized
    ports.
  compliance_frameworks: *id001
  risk_score: 25
- rule_id: oci.vcn_flow.dns_traffic
  title: OCI DNS traffic (port 53) — potential exfiltration vector
  severity: info
  log_source_type: oci_vcn_flow
  conditions:
    all:
    - field: source_type
      op: equals
      value: oci_vcn_flow
    - field: network.dst_port
      op: equals
      value: '53'
  engines:
  - network_engine
  primary_engine: network_engine
  action_category: network
  domain: network_security
  provider: oci
  remediation: Review network configuration changes. Validate security group rules follow least-privilege. Block unauthorized
    ports.
  compliance_frameworks: *id001
  risk_score: 10
