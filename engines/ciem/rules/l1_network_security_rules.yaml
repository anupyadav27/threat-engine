rules:
- rule_id: netsec.ct.vpc_created
  title: New VPC created
  severity: medium
  log_source_type: cloudtrail
  conditions:
    all:
    - field: service
      op: equals
      value: ec2
    - field: operation
      op: equals
      value: CreateVpc
  engines:
  - threat_engine
  - network_engine
  primary_engine: network_engine
  action_category: create
  mitre_tactics:
  - persistence
  mitre_techniques:
  - T1578.002
  description: New VPC may create isolated network for attacker infrastructure.
  domain: network_security
  provider: aws
  remediation: Verify the newly created resource follows organizational policy. Check for overly permissive settings. Tag
    the resource for tracking.
  compliance_frameworks: &id001
  - CIS
  - NIST_800-53
  - PCI-DSS
  - SOC2
  risk_score: 50
- rule_id: netsec.ct.vpc_deleted
  title: VPC deleted
  severity: high
  log_source_type: cloudtrail
  conditions:
    all:
    - field: service
      op: equals
      value: ec2
    - field: operation
      op: equals
      value: DeleteVpc
  engines:
  - threat_engine
  - network_engine
  primary_engine: network_engine
  action_category: delete
  mitre_tactics:
  - impact
  mitre_techniques:
  - T1485
  description: VPC deletion destroys all associated network resources.
  domain: network_security
  provider: aws
  remediation: Investigate deletion. Verify the actor had authorization. Enable MFA delete where applicable. Review CloudTrail
    for associated activity.
  compliance_frameworks: *id001
  risk_score: 70
