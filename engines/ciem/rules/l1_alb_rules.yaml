rules:
- rule_id: alb.http_5xx_error
  title: ALB returned HTTP 5xx server error
  severity: medium
  log_source_type: alb
  conditions:
    all:
    - field: source_type
      op: equals
      value: alb
    - field: outcome
      op: equals
      value: failure
  engines:
  - network_engine
  - threat_engine
  primary_engine: network_engine
  action_category: network
  mitre_tactics:
  - impact
  mitre_techniques:
  - T1499
  domain: network_security
  provider: aws
  remediation: Review network configuration changes. Validate security group rules follow least-privilege. Block unauthorized
    ports.
  compliance_frameworks: &id001
  - CIS
  - NIST_800-53
  - PCI-DSS
  - SOC2
  risk_score: 50
- rule_id: alb.repeated_server_errors
  title: Repeated HTTP 5xx errors indicating service degradation
  severity: high
  log_source_type: alb
  conditions:
    all:
    - field: source_type
      op: equals
      value: alb
    - field: outcome
      op: equals
      value: failure
    - field: error_code
      op: contains
      value: '5'
  engines:
  - network_engine
  - threat_engine
  primary_engine: network_engine
  action_category: network
  mitre_tactics:
  - impact
  mitre_techniques:
  - T1499.002
  domain: network_security
  provider: aws
  remediation: Review network configuration changes. Validate security group rules follow least-privilege. Block unauthorized
    ports.
  compliance_frameworks: *id001
  risk_score: 70
- rule_id: alb.http_401_unauthorized
  title: ALB HTTP 401 Unauthorized response
  severity: medium
  log_source_type: alb
  conditions:
    all:
