- rule_id: alb.http_delete_method
  title: HTTP DELETE request through ALB
  severity: medium
  log_source_type: alb
  conditions:
    all:
    - field: source_type
      op: equals
      value: alb
    - field: operation
      op: equals
      value: DELETE
  engines:
  - network_engine
  - datasec_engine
  primary_engine: network_engine
  action_category: delete
  mitre_tactics:
  - impact
  mitre_techniques:
  - T1485
  domain: network_security
  provider: aws
  remediation: Investigate deletion. Verify the actor had authorization. Enable MFA delete where applicable. Review CloudTrail
    for associated activity.
  compliance_frameworks: *id001
  risk_score: 50
