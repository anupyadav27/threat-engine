rules:
- rule_id: waf.request_blocked
  title: WAF blocked an incoming request
  severity: medium
  log_source_type: waf
  conditions:
    all:
    - field: source_type
      op: equals
      value: waf
    - field: operation
      op: equals
      value: BLOCK
  engines:
  - network_engine
  - threat_engine
  primary_engine: network_engine
  action_category: block
  mitre_tactics:
  - initial-access
  mitre_techniques:
  - T1190
  domain: network_security
  provider: aws
  remediation: Review security group and NACL rules. Restrict public access. Enable VPC Flow Logs for monitoring.
  compliance_frameworks: &id001
  - CIS
  - NIST_800-53
  - PCI-DSS
  - SOC2
  risk_score: 50
- rule_id: waf.request_counted
  title: WAF counted (but did not block) a suspicious request
  severity: low
  log_source_type: waf
  conditions:
    all:
    - field: source_type
      op: equals
      value: waf
    - field: operation
      op: equals
      value: COUNT
  engines:
  - network_engine
  primary_engine: network_engine
  action_category: monitor
  domain: network_security
  provider: aws
  remediation: Review security group and NACL rules. Restrict public access. Enable VPC Flow Logs for monitoring.
  compliance_frameworks: *id001
  risk_score: 25
