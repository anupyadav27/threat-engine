rules:
- rule_id: s3.access_denied
  title: S3 access denied (403 Forbidden)
  severity: medium
  log_source_type: s3_access
  conditions:
    all:
    - field: source_type
      op: equals
      value: s3_access
    - field: error_code
      op: equals
      value: AccessDenied
  engines:
  - datasec_engine
  - threat_engine
  primary_engine: datasec_engine
  action_category: authorization
  mitre_tactics:
  - initial-access
  - credential-access
  mitre_techniques:
  - T1530
  domain: data_security
  provider: aws
  remediation: Review data access policies. Enable encryption at rest and in transit. Implement DLP controls.
  compliance_frameworks:
  - CIS
  - NIST_800-53
  - GDPR
  - PCI-DSS
  - HIPAA
  - ISO_27001
  risk_score: 50
- rule_id: s3.no_such_key
  title: S3 NoSuchKey error — object enumeration attempt
  severity: low
  log_source_type: s3_access
  conditions:
    all:
    - field: source_type
      op: equals
      value: s3_access
    - field: error_code
      op: equals
      value: NoSuchKey
  engines:
  - datasec_engine
  primary_engine: datasec_engine
  action_category: reconnaissance
  mitre_tactics:
  - discovery
  mitre_techniques:
  - T1580
  domain: data_security
  provider: aws
  remediation: Investigate the event. Review actor permissions and intent.
  compliance_frameworks:
  - CIS
  - NIST_800-53
  risk_score: 25
- rule_id: s3.list_objects
  title: S3 bucket listing operation
  severity: low
  log_source_type: s3_access
  conditions:
    all:
    - field: source_type
      op: equals
      value: s3_access
    - field: operation
      op: starts_with
      value: REST.GET.BUCKET
  engines:
  - datasec_engine
  primary_engine: datasec_engine
  action_category: read
  mitre_tactics:
  - discovery
  mitre_techniques:
  - T1580
  domain: data_security
  provider: aws
  remediation: Verify the accessor has legitimate need-to-know. Review access patterns for anomalies. Consider restricting
    read permissions.
  compliance_frameworks:
  - CIS
  - NIST_800-53
  risk_score: 25
- rule_id: s3.get_object
  title: S3 object downloaded
  severity: info
  log_source_type: s3_access
  conditions:
    all:
    - field: source_type
      op: equals
      value: s3_access
    - field: operation
      op: equals
      value: REST.GET.OBJECT
  engines:
  - datasec_engine
  primary_engine: datasec_engine
  action_category: read
  mitre_tactics:
  - collection
  mitre_techniques:
  - T1530
  domain: data_security
  provider: aws
  remediation: Verify the accessor has legitimate need-to-know. Review access patterns for anomalies. Consider restricting
    read permissions.
  compliance_frameworks:
  - CIS
  - NIST_800-53
  risk_score: 10
- rule_id: s3.delete_object
  title: S3 object deleted
  severity: medium
  log_source_type: s3_access
  conditions:
    all:
    - field: source_type
      op: equals
      value: s3_access
    - field: operation
      op: equals
      value: REST.DELETE.OBJECT
  engines:
  - datasec_engine
  - threat_engine
  primary_engine: datasec_engine
  action_category: delete
  mitre_tactics:
  - impact
  mitre_techniques:
  - T1485
  domain: data_security
  provider: aws
  remediation: Investigate deletion. Verify the actor had authorization. Enable MFA delete where applicable. Review CloudTrail
    for associated activity.
  compliance_frameworks:
  - CIS
  - NIST_800-53
  risk_score: 50
- rule_id: s3.delete_multiple_objects
