rules:
- rule_id: azure.keyvault.secret_read
  title: Key Vault secret retrieved
  severity: medium
  log_source_type: azure_keyvault
  conditions:
    all:
    - field: source_type
      op: equals
      value: azure_keyvault
    - field: operation
      op: equals
      value: SecretGet
  engines:
  - threat_engine
  - datasec_engine
  primary_engine: datasec_engine
  action_category: read
  mitre_tactics:
  - credential-access
  mitre_techniques:
  - T1552.001
  domain: encryption_security
  provider: azure
  remediation: Verify the accessor has legitimate need-to-know. Review access patterns for anomalies. Consider restricting
    read permissions.
  compliance_frameworks: &id001
  - CIS
  - NIST_800-53
  - PCI-DSS
  - HIPAA
  risk_score: 50
- rule_id: azure.keyvault.secret_write
  title: Key Vault secret created or updated
  severity: medium
  log_source_type: azure_keyvault
  conditions:
    all:
    - field: source_type
      op: equals
      value: azure_keyvault
    - field: operation
      op: equals
      value: SecretSet
  engines:
  - threat_engine
  - datasec_engine
  primary_engine: datasec_engine
  action_category: create
  mitre_tactics:
  - persistence
  mitre_techniques:
  - T1098
  domain: encryption_security
  provider: azure
  remediation: Verify the newly created resource follows organizational policy. Check for overly permissive settings. Tag
    the resource for tracking.
  compliance_frameworks: *id001
  risk_score: 50
- rule_id: azure.keyvault.secret_delete
