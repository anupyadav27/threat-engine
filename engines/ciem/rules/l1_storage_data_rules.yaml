rules:
- rule_id: storage.ct.s3_put_bucket_policy
  title: S3 bucket policy modified
  severity: high
  log_source_type: cloudtrail
  conditions:
    all:
    - field: service
      op: equals
      value: s3
    - field: operation
      op: equals
      value: PutBucketPolicy
  engines:
  - threat_engine
  - datasec_engine
  primary_engine: threat_engine
  action_category: modify
  mitre_tactics:
  - exfiltration
  - defense-evasion
  mitre_techniques:
  - T1537
  description: Bucket policy change may grant cross-account or public access.
  domain: data_security
  provider: aws
  remediation: Review the configuration change for unintended exposure. Validate the actor's authorization. Consider enabling
    change approval workflows.
  compliance_frameworks: &id001
  - CIS
  - NIST_800-53
  - GDPR
  - PCI-DSS
  - HIPAA
  - ISO_27001
  risk_score: 70
