  risk_score: 50
- rule_id: gcp.lb.http_401
  title: GCP LB HTTP 401 Unauthorized response
  severity: medium
  log_source_type: gcp_lb
  conditions:
    all:
    - field: source_type
      op: equals
      value: gcp_lb
    - field: error_code
      op: equals
      value: '401'
  engines:
  - network_engine
  - ciem
  primary_engine: ciem
  action_category: authentication
  mitre_tactics:
  - initial-access
  - credential-access
  mitre_techniques:
  - T1110
  domain: network_security
  provider: gcp
  remediation: Review security group and NACL rules. Restrict public access. Enable VPC Flow Logs for monitoring.
  compliance_frameworks: *id001
  risk_score: 50
- rule_id: gcp.lb.request_too_large
  title: GCP LB request size exceeded limit
  severity: low
  log_source_type: gcp_lb
  conditions:
    all:
    - field: source_type
      op: equals
      value: gcp_lb
    - field: error_code
      op: equals
      value: '413'
  engines:
  - network_engine
  primary_engine: network_engine
  action_category: network
  mitre_tactics:
  - initial-access
  mitre_techniques:
  - T1190
  description: Oversized requests may indicate payload-based attacks or fuzzing
  domain: network_security
  provider: gcp
  remediation: Review network configuration changes. Validate security group rules follow least-privilege. Block unauthorized
    ports.
  compliance_frameworks: *id001
  risk_score: 25
