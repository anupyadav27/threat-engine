- rule_id: gcp.lb.backend_5xx
  title: GCP LB backend returned HTTP 5xx server error
  severity: medium
  log_source_type: gcp_lb
  conditions:
    all:
    - field: source_type
      op: equals
      value: gcp_lb
    - field: error_code
      op: contains
      value: '5'
    - field: outcome
      op: equals
      value: failure
  engines:
  - network_engine
  - threat_engine
  primary_engine: network_engine
  action_category: network
  mitre_tactics:
  - impact
  mitre_techniques:
  - T1499
  domain: network_security
  provider: gcp
  remediation: Review network configuration changes. Validate security group rules follow least-privilege. Block unauthorized
    ports.
  compliance_frameworks: *id001
  risk_score: 50
- rule_id: gcp.lb.backend_timeout
  title: GCP LB backend connection timed out
  severity: medium
  log_source_type: gcp_lb
  conditions:
    all:
    - field: source_type
      op: equals
      value: gcp_lb
    - field: error_code
      op: contains
      value: backend_timeout
  engines:
  - network_engine
  primary_engine: network_engine
  action_category: network
  mitre_tactics:
  - impact
  mitre_techniques:
  - T1499.002
  domain: network_security
  provider: gcp
  remediation: Review network configuration changes. Validate security group rules follow least-privilege. Block unauthorized
    ports.
