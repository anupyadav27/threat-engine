rules:
- rule_id: gcp.lb.armor_blocked
  title: Cloud Armor blocked request
  severity: medium
  log_source_type: gcp_lb
  conditions:
    all:
    - field: source_type
      op: equals
      value: gcp_lb
    - field: outcome
      op: equals
      value: DENIED
  engines:
  - network_engine
  - threat_engine
  primary_engine: network_engine
  action_category: network
  mitre_tactics:
  - initial-access
  mitre_techniques:
  - T1190
  domain: network_security
  provider: gcp
  remediation: Review network configuration changes. Validate security group rules follow least-privilege. Block unauthorized
    ports.
  compliance_frameworks: &id001
  - CIS
  - NIST_800-53
  - PCI-DSS
  - SOC2
  risk_score: 50
- rule_id: gcp.lb.sqli_detected
  title: Cloud Armor SQL injection attempt detected
  severity: high
  log_source_type: gcp_lb
  conditions:
    all:
    - field: source_type
      op: equals
      value: gcp_lb
    - field: operation
      op: contains
      value: sqli
    - field: outcome
      op: equals
      value: DENIED
  engines:
  - network_engine
  - threat_engine
  primary_engine: threat_engine
  action_category: network
  mitre_tactics:
  - initial-access
  mitre_techniques:
  - T1190
  domain: network_security
  provider: gcp
  remediation: Review network configuration changes. Validate security group rules follow least-privilege. Block unauthorized
    ports.
  compliance_frameworks: *id001
  risk_score: 70
