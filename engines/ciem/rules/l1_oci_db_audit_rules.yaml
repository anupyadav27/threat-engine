rules:
- rule_id: oci.db_audit.failed_login
  title: OCI database login failure detected
  severity: medium
  log_source_type: oci_db_audit
  conditions:
    all:
    - field: source_type
      op: equals
      value: oci_db_audit
    - field: operation
      op: equals
      value: LOGON
    - field: outcome
      op: equals
      value: failure
  engines:
  - threat_engine
  - ciem
  primary_engine: threat_engine
  action_category: read
  mitre_tactics:
  - credential-access
  mitre_techniques:
  - T1110
  domain: database_security
  provider: oci
  remediation: Verify the accessor has legitimate need-to-know. Review access patterns for anomalies. Consider restricting
    read permissions.
  compliance_frameworks: &id001
  - CIS
  - NIST_800-53
  - PCI-DSS
  - HIPAA
  - GDPR
  risk_score: 50
- rule_id: oci.db_audit.ddl_table_change
  title: OCI database table created, altered, or dropped
  severity: medium
  log_source_type: oci_db_audit
  conditions:
    all:
    - field: source_type
      op: equals
      value: oci_db_audit
    - field: operation
      op: in
      value:
      - CREATE TABLE
      - ALTER TABLE
      - DROP TABLE
      - TRUNCATE TABLE
  engines:
  - threat_engine
  - ciem
  primary_engine: threat_engine
  action_category: modify
  mitre_tactics:
  - impact
  mitre_techniques:
  - T1485
  domain: database_security
  provider: oci
  remediation: Review the configuration change for unintended exposure. Validate the actor's authorization. Consider enabling
    change approval workflows.
  compliance_frameworks: *id001
  risk_score: 50
- rule_id: oci.db_audit.schema_change
