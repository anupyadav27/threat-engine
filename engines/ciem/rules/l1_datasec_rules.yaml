- rule_id: datasec.ct.s3_get_object
  engine: datasec
  source_type: cloudtrail
  severity: info
  title: S3 object accessed
  condition:
    all:
    - field: service
      op: equals
      value: s3
    - field: operation
      op: in
      value:
      - GetObject
      - HeadObject
      - SelectObjectContent
  l2_scenarios:
  - datasec.data_access_tracking
  - datasec.mass_download
  domain: data_security
  service: s3
  provider: aws
  remediation: Review data access policies. Enable encryption at rest and in transit. Implement DLP controls.
  compliance_frameworks: &id001
  - CIS
  - NIST_800-53
  - GDPR
  - PCI-DSS
  - HIPAA
  - ISO_27001
  risk_score: 10
- rule_id: datasec.ct.s3_put_object
  engine: datasec
  source_type: cloudtrail
  severity: info
  title: S3 object uploaded
  condition:
    all:
    - field: service
      op: equals
      value: s3
    - field: operation
      op: in
      value:
      - PutObject
      - CopyObject
      - UploadPart
      - CompleteMultipartUpload
  l2_scenarios:
  - datasec.data_access_tracking
  - datasec.data_movement
  domain: data_security
  service: s3
  provider: aws
  remediation: Review data access policies. Enable encryption at rest and in transit. Implement DLP controls.
  compliance_frameworks: *id001
  risk_score: 10
