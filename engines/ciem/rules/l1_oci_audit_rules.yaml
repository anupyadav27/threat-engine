rules:
- rule_id: oci.audit.create_user
  title: OCI user account created
  severity: high
  log_source_type: oci_audit
  conditions:
    all:
    - field: source_type
      op: equals
      value: oci_audit
    - field: service
      op: equals
      value: com.oraclecloud.identitycontrolplane
    - field: operation
      op: equals
      value: CreateUser
  engines:
  - threat_engine
  - ciem
  primary_engine: threat_engine
  action_category: create
  mitre_tactics:
  - persistence
  mitre_techniques:
  - T1136.003
  domain: iam_security
  provider: oci
  remediation: Verify the newly created resource follows organizational policy. Check for overly permissive settings. Tag
    the resource for tracking.
  compliance_frameworks: &id001
  - CIS
  - NIST_800-53
  - SOC2
  - PCI-DSS
  - ISO_27001
  risk_score: 70
