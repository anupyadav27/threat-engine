rules:
- rule_id: secsvc.ct.cloudtrail_stop_logging
  title: CloudTrail logging stopped
  severity: critical
  log_source_type: cloudtrail
  conditions:
    all:
    - field: service
      op: equals
      value: cloudtrail
    - field: operation
      op: equals
      value: StopLogging
  engines:
  - threat_engine
  primary_engine: threat_engine
  action_category: modify
  mitre_tactics:
  - defense-evasion
  mitre_techniques:
  - T1562.008
  description: Stopping CloudTrail eliminates audit trail — highest priority defense evasion.
  domain: security_services
  provider: aws
  remediation: Review the configuration change for unintended exposure. Validate the actor's authorization. Consider enabling
    change approval workflows.
  compliance_frameworks: &id001
  - CIS
  - NIST_800-53
  - SOC2
  risk_score: 90
