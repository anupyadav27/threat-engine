rules:
- rule_id: oci.cloudguard.critical_problem
  title: OCI Cloud Guard critical problem detected
  severity: critical
  log_source_type: oci_cloudguard
  conditions:
    all:
    - field: source_type
      op: equals
      value: oci_cloudguard
    - field: operation
      op: equals
      value: ProblemDetected
    - field: severity
      op: equals
      value: CRITICAL
  engines:
  - threat_engine
  - ciem
  primary_engine: threat_engine
  action_category: read
  mitre_tactics:
  - discovery
  mitre_techniques:
  - T1518
  domain: security_services
  provider: oci
  remediation: Verify the accessor has legitimate need-to-know. Review access patterns for anomalies. Consider restricting
    read permissions.
  compliance_frameworks: &id001
  - CIS
  - NIST_800-53
  - SOC2
  risk_score: 90
- rule_id: oci.cloudguard.high_problem
  title: OCI Cloud Guard high-severity problem detected
  severity: high
  log_source_type: oci_cloudguard
  conditions:
