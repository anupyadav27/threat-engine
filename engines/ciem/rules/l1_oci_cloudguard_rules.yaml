      op: equals
      value: oci_cloudguard
    - field: operation
      op: equals
      value: ProblemDetected
    - field: severity
      op: equals
      value: HIGH
  engines:
  - threat_engine
  - ciem
  primary_engine: threat_engine
  action_category: read
  mitre_tactics:
  - discovery
  mitre_techniques:
  - T1518
  domain: security_services
  provider: oci
  remediation: Verify the accessor has legitimate need-to-know. Review access patterns for anomalies. Consider restricting
