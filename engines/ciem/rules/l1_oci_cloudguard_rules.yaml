- rule_id: oci.cloudguard.threat_detected
  title: OCI Cloud Guard threat indicator detected
  severity: critical
  log_source_type: oci_cloudguard
  conditions:
    all:
    - field: source_type
      op: equals
      value: oci_cloudguard
    - field: operation
      op: equals
      value: ThreatDetected
  engines:
  - threat_engine
  - ciem
  primary_engine: threat_engine
  action_category: read
  mitre_tactics:
  - initial-access
  - execution
  mitre_techniques:
  - T1190
  domain: security_services
  provider: oci
  remediation: Verify the accessor has legitimate need-to-know. Review access patterns for anomalies. Consider restricting
    read permissions.
  compliance_frameworks: *id001
  risk_score: 90
- rule_id: oci.cloudguard.responder_executed
  title: OCI Cloud Guard responder recipe executed
  severity: high
  log_source_type: oci_cloudguard
  conditions:
    all:
    - field: source_type
      op: equals
      value: oci_cloudguard
    - field: operation
      op: in
      value:
      - ResponderExecuted
      - TriggerResponder
  engines:
  - threat_engine
  - ciem
  primary_engine: threat_engine
  action_category: modify
  mitre_tactics:
  - defense-evasion
  mitre_techniques:
  - T1562
  domain: security_services
  provider: oci
  remediation: Review the configuration change for unintended exposure. Validate the actor's authorization. Consider enabling
    change approval workflows.
  compliance_frameworks: *id001
  risk_score: 70
