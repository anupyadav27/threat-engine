rules:
- rule_id: azure.sql_audit.failed_login
  title: Azure SQL failed login attempt
  severity: medium
  log_source_type: azure_sql_audit
  conditions:
    all:
    - field: source_type
      op: equals
      value: azure_sql_audit
    - field: operation
      op: equals
      value: LOGIN
    - field: outcome
      op: equals
      value: FAILURE
  engines:
  - threat_engine
  - datasec_engine
  primary_engine: threat_engine
  action_category: read
  mitre_tactics:
  - initial-access
  - credential-access
  mitre_techniques:
  - T1110
  domain: database_security
  provider: azure
  remediation: Verify the accessor has legitimate need-to-know. Review access patterns for anomalies. Consider restricting
    read permissions.
  compliance_frameworks: &id001
  - CIS
  - NIST_800-53
  - PCI-DSS
  - HIPAA
  - GDPR
  risk_score: 50
- rule_id: azure.sql_audit.admin_login
  title: Azure SQL admin or DBO login
  severity: medium
  log_source_type: azure_sql_audit
  conditions:
    all:
    - field: source_type
      op: equals
      value: azure_sql_audit
    - field: operation
      op: equals
      value: LOGIN
    - field: actor_principal
      op: in
      value:
      - sa
      - dbo
      - sqladmin
      - postgres
      - root
  engines:
  - threat_engine
  - ciem
  primary_engine: threat_engine
  action_category: read
  mitre_tactics:
  - privilege-escalation
  mitre_techniques:
  - T1078
  domain: database_security
  provider: azure
  remediation: Verify the accessor has legitimate need-to-know. Review access patterns for anomalies. Consider restricting
    read permissions.
  compliance_frameworks: *id001
  risk_score: 50
- rule_id: azure.sql_audit.create_table
  title: Azure SQL CREATE TABLE statement executed
  severity: low
  log_source_type: azure_sql_audit
  conditions:
    all:
    - field: source_type
      op: equals
      value: azure_sql_audit
    - field: operation
      op: equals
      value: CREATE TABLE
  engines:
  - datasec_engine
  primary_engine: datasec_engine
  action_category: create
  domain: database_security
  provider: azure
  remediation: Verify the newly created resource follows organizational policy. Check for overly permissive settings. Tag
    the resource for tracking.
  compliance_frameworks: *id001
  risk_score: 25
- rule_id: azure.sql_audit.drop_table
  title: Azure SQL DROP TABLE statement executed
  severity: high
  log_source_type: azure_sql_audit
  conditions:
    all:
    - field: source_type
      op: equals
      value: azure_sql_audit
    - field: operation
      op: equals
      value: DROP TABLE
  engines:
  - threat_engine
  - datasec_engine
  primary_engine: threat_engine
  action_category: delete
  mitre_tactics:
  - impact
  mitre_techniques:
  - T1485
  domain: database_security
  provider: azure
  remediation: Investigate deletion. Verify the actor had authorization. Enable MFA delete where applicable. Review CloudTrail
    for associated activity.
  compliance_frameworks: *id001
  risk_score: 70
- rule_id: azure.sql_audit.alter_table
  title: Azure SQL ALTER TABLE statement executed
  severity: medium
  log_source_type: azure_sql_audit
  conditions:
    all:
    - field: source_type
      op: equals
      value: azure_sql_audit
    - field: operation
      op: equals
      value: ALTER TABLE
  engines:
  - datasec_engine
  primary_engine: datasec_engine
  action_category: modify
  domain: database_security
  provider: azure
  remediation: Review the configuration change for unintended exposure. Validate the actor's authorization. Consider enabling
    change approval workflows.
  compliance_frameworks: *id001
  risk_score: 50
- rule_id: azure.sql_audit.schema_change
  title: Azure SQL schema modification (CREATE/ALTER/DROP SCHEMA)
  severity: medium
  log_source_type: azure_sql_audit
  conditions:
    all:
    - field: source_type
      op: equals
      value: azure_sql_audit
    - field: operation
      op: in
      value:
      - CREATE SCHEMA
      - ALTER SCHEMA
      - DROP SCHEMA
  engines:
  - datasec_engine
  primary_engine: datasec_engine
  action_category: modify
  domain: database_security
  provider: azure
  remediation: Review the configuration change for unintended exposure. Validate the actor's authorization. Consider enabling
    change approval workflows.
  compliance_frameworks: *id001
  risk_score: 50
