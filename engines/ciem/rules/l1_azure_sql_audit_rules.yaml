- rule_id: azure.sql_audit.bulk_operation
  title: Azure SQL bulk data operation (SELECT INTO / BULK INSERT)
  severity: high
  log_source_type: azure_sql_audit
  conditions:
    all:
    - field: source_type
      op: equals
      value: azure_sql_audit
    - field: operation
      op: in
      value:
      - SELECT INTO
      - BULK INSERT
      - INSERT EXEC
  engines:
  - threat_engine
  - datasec_engine
  primary_engine: datasec_engine
  action_category: read
  mitre_tactics:
  - collection
  - exfiltration
  mitre_techniques:
  - T1530
  domain: database_security
  provider: azure
  remediation: Verify the accessor has legitimate need-to-know. Review access patterns for anomalies. Consider restricting
    read permissions.
  compliance_frameworks: *id001
  risk_score: 70
- rule_id: azure.sql_audit.connection_unusual_ip
  title: Azure SQL connection from unusual source IP
  severity: high
  log_source_type: azure_sql_audit
  conditions:
    all:
    - field: source_type
      op: equals
      value: azure_sql_audit
    - field: operation
      op: equals
      value: LOGIN
    - field: outcome
      op: equals
      value: SUCCESS
  engines:
  - threat_engine
  primary_engine: threat_engine
  action_category: read
  mitre_tactics:
  - initial-access
  mitre_techniques:
  - T1078
  description: Baseline actor_ip against historical logins to detect anomalous source
  domain: database_security
  provider: azure
  remediation: Verify the accessor has legitimate need-to-know. Review access patterns for anomalies. Consider restricting
    read permissions.
  compliance_frameworks: *id001
  risk_score: 70
