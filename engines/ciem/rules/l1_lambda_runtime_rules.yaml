- rule_id: lambda.connection_refused
  title: Lambda function connection refused — network misconfiguration or blocked
  severity: medium
  log_source_type: lambda
  conditions:
    all:
    - field: source_type
      op: equals
      value: lambda
    - field: operation
      op: equals
      value: error
    - field: error_code
      op: contains
      value: ECONNREFUSED
  engines:
  - network_engine
  primary_engine: network_engine
  action_category: network
  domain: compute_security
  provider: aws
  remediation: Review network configuration changes. Validate security group rules follow least-privilege. Block unauthorized
    ports.
  compliance_frameworks:
  - CIS
  - NIST_800-53
  risk_score: 50
- rule_id: lambda.import_error
