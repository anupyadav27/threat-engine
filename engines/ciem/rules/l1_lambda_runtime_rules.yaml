      value: Unauthorized
  engines:
  - threat_engine
  - ciem
  primary_engine: ciem
  action_category: authorization
  mitre_tactics:
  - initial-access
  mitre_techniques:
  - T1078
  domain: compute_security
  provider: aws
  remediation: Investigate the event. Review actor permissions and intent.
  compliance_frameworks:
  - CIS
  - NIST_800-53
  risk_score: 70
