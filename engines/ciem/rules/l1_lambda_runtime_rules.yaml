rules:
- rule_id: lambda.function_error
  title: Lambda function error or exception
  severity: medium
  log_source_type: lambda
  conditions:
    all:
    - field: source_type
      op: equals
      value: lambda
    - field: operation
      op: equals
      value: error
  engines:
  - threat_engine
  - network_engine
  primary_engine: threat_engine
  action_category: error
  mitre_tactics:
  - execution
  mitre_techniques:
  - T1059
  domain: compute_security
  provider: aws
  remediation: Investigate the event. Review actor permissions and intent.
  compliance_frameworks:
  - CIS
  - NIST_800-53
  risk_score: 50
- rule_id: lambda.invocation_report
  title: Lambda invocation completed (performance tracking)
  severity: info
  log_source_type: lambda
  conditions:
    all:
    - field: source_type
      op: equals
      value: lambda
    - field: operation
      op: equals
      value: invocation_report
  engines:
  - network_engine
  primary_engine: network_engine
  action_category: monitoring
  domain: compute_security
  provider: aws
  remediation: Investigate the event. Review actor permissions and intent.
  compliance_frameworks:
  - CIS
  - NIST_800-53
  risk_score: 10
- rule_id: lambda.access_denied
  title: Lambda function received AccessDenied error
  severity: high
  log_source_type: lambda
  conditions:
    all:
    - field: source_type
      op: equals
      value: lambda
    - field: operation
      op: equals
      value: error
    - field: error_code
      op: contains
      value: AccessDenied
  engines:
  - threat_engine
  - ciem
  primary_engine: ciem
  action_category: authorization
  mitre_tactics:
  - privilege-escalation
  - discovery
  mitre_techniques:
  - T1078
  domain: compute_security
  provider: aws
  remediation: Investigate the event. Review actor permissions and intent.
  compliance_frameworks:
  - CIS
  - NIST_800-53
  risk_score: 70
- rule_id: lambda.unauthorized_error
