rules:
- rule_id: gcp.scc.critical_finding
  title: SCC critical severity finding detected
  severity: critical
  log_source_type: gcp_scc
  conditions:
    all:
    - field: source_type
      op: equals
      value: gcp_scc
    - field: severity
      op: equals
      value: CRITICAL
  engines:
  - threat_engine
  - network_engine
  primary_engine: threat_engine
  action_category: threat
  mitre_tactics:
  - initial-access
  - execution
  - impact
  domain: security_services
  provider: gcp
  remediation: Review security service findings. Prioritize by severity. Remediate root causes.
  compliance_frameworks: &id001
  - CIS
  - NIST_800-53
  - SOC2
  risk_score: 90
