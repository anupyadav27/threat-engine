rules:
- rule_id: eks.audit.secret_access
  title: K8s Secret accessed
  severity: medium
  log_source_type: eks_audit
  conditions:
    all:
    - field: source_type
      op: equals
      value: eks_audit
    - field: operation
      op: equals
      value: get
    - field: resource.type
      op: equals
      value: secrets
  engines:
  - container_engine
  - ciem
  primary_engine: container_engine
  action_category: read
  mitre_tactics:
  - credential-access
  mitre_techniques:
  - T1552.007
  domain: container_security
  provider: aws
  remediation: Verify the accessor has legitimate need-to-know. Review access patterns for anomalies. Consider restricting
    read permissions.
  compliance_frameworks: &id001
  - CIS
  - NIST_800-53
  - SOC2
  risk_score: 50
