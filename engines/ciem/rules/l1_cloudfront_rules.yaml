rules:
- rule_id: cloudfront.http_4xx_error
  title: CloudFront returned HTTP 4xx client error
  severity: low
  log_source_type: cloudfront
  conditions:
    all:
    - field: source_type
      op: equals
      value: cloudfront
    - field: outcome
      op: equals
      value: failure
    - field: error_code
      op: starts_with
      value: '4'
  engines:
  - network_engine
  primary_engine: network_engine
  action_category: access
  mitre_tactics:
  - reconnaissance
  mitre_techniques:
  - T1595.002
  domain: network_security
  provider: aws
  remediation: Review security group and NACL rules. Restrict public access. Enable VPC Flow Logs for monitoring.
  compliance_frameworks: &id001
  - CIS
  - NIST_800-53
  - PCI-DSS
  - SOC2
  risk_score: 25
- rule_id: cloudfront.http_5xx_error
  title: CloudFront returned HTTP 5xx origin error
  severity: medium
  log_source_type: cloudfront
  conditions:
    all:
    - field: source_type
      op: equals
      value: cloudfront
    - field: outcome
      op: equals
      value: failure
    - field: error_code
      op: starts_with
      value: '5'
  engines:
  - network_engine
  primary_engine: network_engine
  action_category: network
  mitre_tactics:
  - impact
  mitre_techniques:
  - T1499
  domain: network_security
  provider: aws
  remediation: Review network configuration changes. Validate security group rules follow least-privilege. Block unauthorized
    ports.
  compliance_frameworks: *id001
  risk_score: 50
- rule_id: cloudfront.http_403_forbidden
  title: CloudFront access denied (403 Forbidden)
  severity: medium
  log_source_type: cloudfront
  conditions:
    all:
    - field: source_type
      op: equals
      value: cloudfront
    - field: error_code
      op: equals
      value: '403'
  engines:
  - network_engine
  - threat_engine
  primary_engine: network_engine
  action_category: authorization
  mitre_tactics:
  - initial-access
  domain: network_security
  provider: aws
  remediation: Review security group and NACL rules. Restrict public access. Enable VPC Flow Logs for monitoring.
  compliance_frameworks: *id001
  risk_score: 50
- rule_id: cloudfront.cache_miss
  title: CloudFront cache miss — request forwarded to origin
  severity: info
  log_source_type: cloudfront
  conditions:
    all:
    - field: source_type
      op: equals
      value: cloudfront
    - field: resource_type
      op: equals
      value: Miss
  engines:
  - network_engine
  primary_engine: network_engine
  action_category: network
  description: High cache miss rates may indicate cache busting attacks or misconfigured caching
  domain: network_security
  provider: aws
  remediation: Review network configuration changes. Validate security group rules follow least-privilege. Block unauthorized
    ports.
  compliance_frameworks: *id001
  risk_score: 10
- rule_id: cloudfront.http_delete_method
  title: HTTP DELETE request through CloudFront
  severity: medium
  log_source_type: cloudfront
  conditions:
    all:
    - field: source_type
      op: equals
      value: cloudfront
    - field: operation
      op: equals
      value: DELETE
  engines:
  - network_engine
  - threat_engine
  primary_engine: network_engine
  action_category: delete
  mitre_tactics:
  - impact
  mitre_techniques:
  - T1485
  domain: network_security
  provider: aws
  remediation: Investigate deletion. Verify the actor had authorization. Enable MFA delete where applicable. Review CloudTrail
    for associated activity.
  compliance_frameworks: *id001
  risk_score: 50
- rule_id: cloudfront.http_put_method
  title: HTTP PUT request through CloudFront
  severity: low
  log_source_type: cloudfront
  conditions:
    all:
    - field: source_type
      op: equals
      value: cloudfront
    - field: operation
      op: equals
      value: PUT
  engines:
  - network_engine
  primary_engine: network_engine
  action_category: modify
  domain: network_security
  provider: aws
  remediation: Review the configuration change for unintended exposure. Validate the actor's authorization. Consider enabling
    change approval workflows.
  compliance_frameworks: *id001
  risk_score: 25
- rule_id: cloudfront.http_options_method
  title: HTTP OPTIONS request through CloudFront — CORS preflight or recon
  severity: info
  log_source_type: cloudfront
  conditions:
    all:
    - field: source_type
      op: equals
      value: cloudfront
    - field: operation
      op: equals
      value: OPTIONS
  engines:
  - network_engine
  primary_engine: network_engine
  action_category: reconnaissance
  domain: network_security
  provider: aws
  remediation: Review security group and NACL rules. Restrict public access. Enable VPC Flow Logs for monitoring.
  compliance_frameworks: *id001
  risk_score: 10
- rule_id: cloudfront.path_traversal
  title: Path traversal attempt through CloudFront (../ in URL)
  severity: high
  log_source_type: cloudfront
  conditions:
    all:
    - field: source_type
      op: equals
      value: cloudfront
    - field: resource_uid
      op: contains
      value: ..
  engines:
  - network_engine
  - threat_engine
  primary_engine: threat_engine
  action_category: exploit
  mitre_tactics:
  - initial-access
  mitre_techniques:
  - T1190
  domain: network_security
  provider: aws
  remediation: Review security group and NACL rules. Restrict public access. Enable VPC Flow Logs for monitoring.
  compliance_frameworks: *id001
  risk_score: 70
- rule_id: cloudfront.sensitive_path_access
  title: Access to sensitive path through CloudFront (.env, .git, wp-admin)
  severity: high
  log_source_type: cloudfront
  conditions:
    all:
    - field: source_type
      op: equals
      value: cloudfront
    - field: resource_uid
      op: contains
      value: .env
  engines:
  - network_engine
  - threat_engine
  primary_engine: threat_engine
  action_category: reconnaissance
  mitre_tactics:
  - reconnaissance
  - credential-access
  mitre_techniques:
  - T1592
  - T1552
  domain: network_security
  provider: aws
  remediation: Review security group and NACL rules. Restrict public access. Enable VPC Flow Logs for monitoring.
  compliance_frameworks: *id001
  risk_score: 70
- rule_id: cloudfront.error_from_origin
  title: CloudFront received error from origin server
  severity: medium
  log_source_type: cloudfront
  conditions:
    all:
    - field: source_type
      op: equals
      value: cloudfront
    - field: resource_type
      op: equals
      value: Error
  engines:
  - network_engine
  primary_engine: network_engine
  action_category: network
  description: Origin errors may indicate origin overload, misconfiguration, or targeted attacks
  domain: network_security
  provider: aws
  remediation: Review network configuration changes. Validate security group rules follow least-privilege. Block unauthorized
    ports.
  compliance_frameworks: *id001
  risk_score: 50
