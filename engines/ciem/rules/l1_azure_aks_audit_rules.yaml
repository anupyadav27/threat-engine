rules:
- rule_id: azure.aks_audit.clusterrole_create
  title: AKS ClusterRole created
  severity: high
  log_source_type: azure_aks_audit
  conditions:
    all:
    - field: source_type
      op: equals
      value: azure_aks_audit
    - field: operation
      op: equals
      value: create
    - field: resource_type
      op: equals
      value: clusterroles
  engines:
  - container_engine
  - ciem
  primary_engine: container_engine
  action_category: create
  mitre_tactics:
  - privilege-escalation
  - persistence
  mitre_techniques:
  - T1078.004
  domain: container_security
  provider: azure
  remediation: Verify the newly created resource follows organizational policy. Check for overly permissive settings. Tag
    the resource for tracking.
  compliance_frameworks: &id001
  - CIS
  - NIST_800-53
  - SOC2
  risk_score: 70
- rule_id: azure.aks_audit.clusterrole_modify
