      op: equals
      value: azure_aks_audit
    - field: operation
      op: in
      value:
      - patch
      - update
    - field: resource_type
      op: equals
      value: clusterroles
  engines:
  - container_engine
  - ciem
  primary_engine: container_engine
  action_category: modify
  mitre_tactics:
  - privilege-escalation
  mitre_techniques:
  - T1078.004
  domain: container_security
  provider: azure
  remediation: Review the configuration change for unintended exposure. Validate the actor's authorization. Consider enabling
    change approval workflows.
  compliance_frameworks: *id001
  risk_score: 70
