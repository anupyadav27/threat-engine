- rule_id: threat.ct.root_account_usage
  engine: threat
  source_type: cloudtrail
  severity: critical
  mitre_tactic: initial_access
  mitre_technique: T1078.004
  title: Root account API activity detected
  condition:
    field: actor.principal_type
    op: equals
    value: Root
  l2_scenarios:
  - threat.initial_access_chain
  - threat.privilege_abuse
  domain: threat_detection
  service: cloudtrail
  provider: aws
  remediation: Investigate the detected threat. Correlate with other security signals. Initiate incident response if confirmed.
  compliance_frameworks: &id001
  - NIST_800-53
  - SOC2
  - MITRE_ATT&CK
  risk_score: 90
- rule_id: threat.ct.console_login_no_mfa
  engine: threat
  source_type: cloudtrail
  severity: high
  mitre_tactic: initial_access
  mitre_technique: T1078
  title: Console login without MFA
  condition:
    all:
    - field: operation
      op: equals
      value: ConsoleLogin
    - field: raw_event.additionalEventData.MFAUsed
      op: not_equals
      value: 'Yes'
  l2_scenarios:
  - threat.credential_compromise
  domain: threat_detection
  service: cloudtrail
  provider: aws
  remediation: Investigate the detected threat. Correlate with other security signals. Initiate incident response if confirmed.
  compliance_frameworks: *id001
  risk_score: 70
