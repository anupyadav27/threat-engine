rules:
- rule_id: paas.ct.sqs_set_queue_attributes
  title: SQS queue attributes modified
  severity: high
  log_source_type: cloudtrail
  conditions:
    all:
    - field: service
      op: equals
      value: sqs
    - field: operation
      op: equals
      value: SetQueueAttributes
  engines:
  - threat_engine
  - ciem
  primary_engine: threat_engine
  action_category: modify
  mitre_tactics:
  - persistence
  - exfiltration
  mitre_techniques:
  - T1098.003
  description: Queue attribute change may modify resource policy to grant cross-account access.
  domain: platform_security
  provider: aws
  remediation: Review the configuration change for unintended exposure. Validate the actor's authorization. Consider enabling
    change approval workflows.
  compliance_frameworks: &id001
  - CIS
  - NIST_800-53
  - SOC2
  risk_score: 70
- rule_id: paas.ct.sqs_create_queue
