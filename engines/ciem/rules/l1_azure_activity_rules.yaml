rules:
- rule_id: azure.activity.role_assignment_created
  title: Azure RBAC role assignment created
  severity: high
  log_source_type: azure_activity
  conditions:
    all:
    - field: source_type
      op: equals
      value: azure_activity
    - field: operation
      op: equals
      value: Microsoft.Authorization/roleAssignments/write
  engines:
  - threat_engine
  - ciem
  primary_engine: threat_engine
  action_category: create
  mitre_tactics:
  - persistence
  - privilege-escalation
  mitre_techniques:
  - T1098.001
  domain: iam_security
  provider: azure
  remediation: Verify the newly created resource follows organizational policy. Check for overly permissive settings. Tag
    the resource for tracking.
  compliance_frameworks: &id001
  - CIS
  - NIST_800-53
  - SOC2
  - PCI-DSS
  - ISO_27001
  risk_score: 70
