  - discovery
  mitre_techniques:
  - T1087.004
  description: Querying access key last-used metadata — reconnaissance for stale credentials.
  domain: iam_security
  provider: aws
  remediation: Verify the accessor has legitimate need-to-know. Review access patterns for anomalies. Consider restricting
    read permissions.
  compliance_frameworks: *id001
  risk_score: 10
