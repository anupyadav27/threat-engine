rules:
- rule_id: iam.ct.delete_access_key
  title: IAM access key deleted
  severity: medium
  log_source_type: cloudtrail
  conditions:
    all:
    - field: service
      op: equals
      value: iam
    - field: operation
      op: equals
      value: DeleteAccessKey
  engines:
  - threat_engine
  - ciem
  primary_engine: ciem
  action_category: delete
  mitre_tactics:
  - defense-evasion
  mitre_techniques:
  - T1070.004
  description: Deletion of IAM access key — may indicate credential rotation or evidence destruction.
  domain: iam_security
  provider: aws
  remediation: Investigate deletion. Verify the actor had authorization. Enable MFA delete where applicable. Review CloudTrail
    for associated activity.
  compliance_frameworks: &id001
  - CIS
  - NIST_800-53
  - SOC2
  - PCI-DSS
  - ISO_27001
  risk_score: 50
- rule_id: iam.ct.update_access_key_disable
  title: IAM access key deactivated
  severity: low
  log_source_type: cloudtrail
  conditions:
    all:
    - field: service
      op: equals
      value: iam
    - field: operation
      op: equals
      value: UpdateAccessKey
  engines:
  - threat_engine
  - ciem
  primary_engine: ciem
  action_category: modify
  mitre_tactics:
  - defense-evasion
  mitre_techniques:
  - T1070
  description: Access key status changed — could be deactivation before rotation or disabling compromised key.
  domain: iam_security
  provider: aws
  remediation: Review the configuration change for unintended exposure. Validate the actor's authorization. Consider enabling
    change approval workflows.
  compliance_frameworks: *id001
  risk_score: 25
- rule_id: iam.ct.get_access_key_last_used
