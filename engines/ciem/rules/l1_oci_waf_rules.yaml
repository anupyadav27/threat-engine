rules:
- rule_id: oci.waf.sql_injection
  title: OCI WAF SQL injection attempt detected
  severity: critical
  log_source_type: oci_waf
  conditions:
    all:
    - field: source_type
      op: equals
      value: oci_waf
    - field: operation
      op: equals
      value: SQL_INJECTION
  engines:
  - threat_engine
  - ciem
  primary_engine: threat_engine
  action_category: read
  mitre_tactics:
  - initial-access
  mitre_techniques:
  - T1190
  domain: network_security
  provider: oci
  remediation: Verify the accessor has legitimate need-to-know. Review access patterns for anomalies. Consider restricting
    read permissions.
  compliance_frameworks: &id001
  - CIS
  - NIST_800-53
  - PCI-DSS
  - SOC2
  risk_score: 90
