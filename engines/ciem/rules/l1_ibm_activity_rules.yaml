rules:
- rule_id: ibm.activity.api_key_created
  title: IBM Cloud API key created
  severity: high
  log_source_type: ibm_activity
  conditions:
    all:
    - field: source_type
      op: equals
      value: ibm_activity
    - field: operation
      op: in
      value:
      - iam-identity.user-apikey.create
      - iam-identity.serviceid-apikey.create
  engines:
  - threat_engine
  - ciem
  primary_engine: threat_engine
  action_category: create
  mitre_tactics:
  - persistence
  - credential-access
  mitre_techniques:
  - T1098.001
  domain: iam_security
  provider: ibm
  remediation: Verify the newly created resource follows organizational policy. Check for overly permissive settings. Tag
    the resource for tracking.
  compliance_frameworks: &id001
  - CIS
  - NIST_800-53
  - SOC2
  - PCI-DSS
  - ISO_27001
  risk_score: 70
