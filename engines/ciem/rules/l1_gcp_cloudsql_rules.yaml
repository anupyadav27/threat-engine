  severity: medium
  log_source_type: gcp_cloudsql
  conditions:
    all:
    - field: source_type
      op: equals
      value: gcp_cloudsql
    - field: operation
      op: equals
      value: REVOKE
  engines:
  - datasec_engine
  - ciem
  primary_engine: ciem
  action_category: modify
  mitre_tactics:
  - impact
  - defense-evasion
  mitre_techniques:
  - T1531
  domain: database_security
  provider: gcp
  remediation: Review the configuration change for unintended exposure. Validate the actor's authorization. Consider enabling
    change approval workflows.
  compliance_frameworks: *id001
  risk_score: 50
