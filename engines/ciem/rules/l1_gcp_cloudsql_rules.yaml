- rule_id: gcp.cloudsql.bulk_export
  title: Cloud SQL bulk data export or COPY operation
  severity: high
  log_source_type: gcp_cloudsql
  conditions:
    all:
    - field: source_type
      op: equals
      value: gcp_cloudsql
    - field: operation
      op: in
      value:
      - COPY
      - EXPORT
      - SELECT_INTO_OUTFILE
  engines:
  - datasec_engine
  - threat_engine
  primary_engine: threat_engine
  action_category: read
  mitre_tactics:
  - exfiltration
  - collection
  mitre_techniques:
  - T1048
  domain: database_security
  provider: gcp
  remediation: Verify the accessor has legitimate need-to-know. Review access patterns for anomalies. Consider restricting
    read permissions.
  compliance_frameworks: *id001
  risk_score: 70
