rules:
- rule_id: gcp.cloudsql.failed_login
  title: Cloud SQL database login attempt failed
  severity: medium
  log_source_type: gcp_cloudsql
  conditions:
    all:
    - field: source_type
      op: equals
      value: gcp_cloudsql
    - field: operation
      op: equals
      value: FAILED_CONNECT
  engines:
  - datasec_engine
  - threat_engine
  primary_engine: datasec_engine
  action_category: authentication
  mitre_tactics:
  - credential-access
  - initial-access
  mitre_techniques:
  - T1110
  domain: database_security
  provider: gcp
  remediation: Review database access controls. Enable audit logging. Encrypt sensitive data at rest.
  compliance_frameworks: &id001
  - CIS
  - NIST_800-53
  - PCI-DSS
  - HIPAA
  - GDPR
  risk_score: 50
- rule_id: gcp.cloudsql.root_login
  title: Cloud SQL root/admin user logged in
  severity: high
  log_source_type: gcp_cloudsql
  conditions:
    all:
    - field: source_type
      op: equals
      value: gcp_cloudsql
    - field: operation
      op: equals
      value: CONNECT
    - field: actor_principal
      op: in
      value:
      - root
      - postgres
      - sqlserver
      - admin
  engines:
  - datasec_engine
  - threat_engine
  primary_engine: datasec_engine
  action_category: authentication
  mitre_tactics:
  - privilege-escalation
  - initial-access
  mitre_techniques:
  - T1078.001
  domain: database_security
  provider: gcp
  remediation: Review database access controls. Enable audit logging. Encrypt sensitive data at rest.
  compliance_frameworks: *id001
  risk_score: 70
- rule_id: gcp.cloudsql.create_table
  title: Cloud SQL CREATE TABLE statement executed
  severity: medium
  log_source_type: gcp_cloudsql
  conditions:
    all:
    - field: source_type
      op: equals
      value: gcp_cloudsql
    - field: operation
      op: equals
      value: CREATE
  engines:
  - datasec_engine
  - threat_engine
  primary_engine: datasec_engine
  action_category: create
  mitre_tactics:
  - persistence
  mitre_techniques:
  - T1505
  domain: database_security
  provider: gcp
  remediation: Verify the newly created resource follows organizational policy. Check for overly permissive settings. Tag
    the resource for tracking.
  compliance_frameworks: *id001
  risk_score: 50
- rule_id: gcp.cloudsql.drop_table
  title: Cloud SQL DROP TABLE statement executed — potential data destruction
  severity: critical
  log_source_type: gcp_cloudsql
  conditions:
    all:
    - field: source_type
      op: equals
      value: gcp_cloudsql
    - field: operation
      op: equals
      value: DROP
  engines:
  - datasec_engine
  - threat_engine
  primary_engine: threat_engine
  action_category: delete
  mitre_tactics:
  - impact
  mitre_techniques:
  - T1485
  domain: database_security
  provider: gcp
  remediation: Investigate deletion. Verify the actor had authorization. Enable MFA delete where applicable. Review CloudTrail
    for associated activity.
  compliance_frameworks: *id001
  risk_score: 90
- rule_id: gcp.cloudsql.alter_table
  title: Cloud SQL ALTER TABLE — schema change detected
  severity: medium
  log_source_type: gcp_cloudsql
  conditions:
    all:
    - field: source_type
      op: equals
      value: gcp_cloudsql
    - field: operation
      op: equals
      value: ALTER
  engines:
  - datasec_engine
  primary_engine: datasec_engine
  action_category: modify
  mitre_tactics:
  - persistence
  mitre_techniques:
  - T1505
  domain: database_security
  provider: gcp
  remediation: Review the configuration change for unintended exposure. Validate the actor's authorization. Consider enabling
    change approval workflows.
  compliance_frameworks: *id001
  risk_score: 50
- rule_id: gcp.cloudsql.grant_privileges
  title: Cloud SQL GRANT statement — privileges escalated
  severity: high
  log_source_type: gcp_cloudsql
  conditions:
    all:
    - field: source_type
      op: equals
      value: gcp_cloudsql
    - field: operation
      op: equals
      value: GRANT
  engines:
  - datasec_engine
  - ciem
  primary_engine: ciem
  action_category: modify
  mitre_tactics:
  - privilege-escalation
  - persistence
  mitre_techniques:
  - T1098
  domain: database_security
  provider: gcp
  remediation: Review the configuration change for unintended exposure. Validate the actor's authorization. Consider enabling
    change approval workflows.
  compliance_frameworks: *id001
  risk_score: 70
- rule_id: gcp.cloudsql.revoke_privileges
