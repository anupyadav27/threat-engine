- rule_id: devops.ct.ecr_put_image
  title: Container image pushed to ECR
  severity: low
  log_source_type: cloudtrail
  conditions:
    all:
    - field: service
      op: equals
      value: ecr
    - field: operation
      op: equals
      value: PutImage
  engines:
  - threat_engine
  primary_engine: threat_engine
  action_category: create
  mitre_tactics:
  - persistence
  mitre_techniques:
  - T1525
  description: Image push — monitor for tag overwriting (mutable tags) and unauthorized publishers.
  domain: devops_security
  provider: aws
  remediation: Verify the newly created resource follows organizational policy. Check for overly permissive settings. Tag
    the resource for tracking.
  compliance_frameworks: *id001
  risk_score: 25
- rule_id: devops.ct.ecr_set_repository_policy
  title: ECR repository policy modified
  severity: high
  log_source_type: cloudtrail
  conditions:
    all:
    - field: service
      op: equals
      value: ecr
    - field: operation
      op: equals
      value: SetRepositoryPolicy
  engines:
  - threat_engine
  - ciem
  primary_engine: threat_engine
  action_category: modify
  mitre_tactics:
  - persistence
  - lateral-movement
  mitre_techniques:
  - T1098.003
  description: Repository policy change may grant cross-account image pull/push access.
  domain: devops_security
  provider: aws
  remediation: Review the configuration change for unintended exposure. Validate the actor's authorization. Consider enabling
    change approval workflows.
  compliance_frameworks: *id001
  risk_score: 70
- rule_id: devops.ct.ecr_batch_delete_image
  title: ECR images batch deleted
  severity: high
  log_source_type: cloudtrail
  conditions:
    all:
    - field: service
      op: equals
      value: ecr
    - field: operation
      op: equals
      value: BatchDeleteImage
  engines:
  - threat_engine
  primary_engine: threat_engine
  action_category: delete
  mitre_tactics:
  - impact
  mitre_techniques:
  - T1485
  description: Bulk image deletion may disrupt deployments or destroy audit evidence.
  domain: devops_security
  provider: aws
  remediation: Investigate deletion. Verify the actor had authorization. Enable MFA delete where applicable. Review CloudTrail
    for associated activity.
  compliance_frameworks: *id001
  risk_score: 70
- rule_id: devops.ct.ecr_put_lifecycle_policy
