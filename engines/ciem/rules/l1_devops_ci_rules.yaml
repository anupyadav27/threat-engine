rules:
- rule_id: devops.ct.codebuild_create_project
  title: CodeBuild project created
  severity: medium
  log_source_type: cloudtrail
  conditions:
    all:
    - field: service
      op: equals
      value: codebuild
    - field: operation
      op: equals
      value: CreateProject
  engines:
  - threat_engine
  primary_engine: threat_engine
  action_category: create
  mitre_tactics:
  - execution
  - persistence
  mitre_techniques:
  - T1204.003
  description: New CodeBuild project — review source, buildspec, and IAM service role.
  domain: devops_security
  provider: aws
  remediation: Verify the newly created resource follows organizational policy. Check for overly permissive settings. Tag
    the resource for tracking.
  compliance_frameworks: &id001
  - NIST_800-53
  - SOC2
  risk_score: 50
- rule_id: devops.ct.codebuild_update_project
  title: CodeBuild project updated
  severity: high
  log_source_type: cloudtrail
  conditions:
    all:
    - field: service
      op: equals
      value: codebuild
    - field: operation
      op: equals
      value: UpdateProject
  engines:
  - threat_engine
  primary_engine: threat_engine
  action_category: modify
  mitre_tactics:
  - persistence
  - execution
  mitre_techniques:
  - T1195.002
  description: Build project update may change buildspec, environment variables, or source.
  domain: devops_security
  provider: aws
  remediation: Review the configuration change for unintended exposure. Validate the actor's authorization. Consider enabling
    change approval workflows.
  compliance_frameworks: *id001
  risk_score: 70
- rule_id: devops.ct.codebuild_start_build
  title: CodeBuild build started
  severity: low
  log_source_type: cloudtrail
  conditions:
    all:
    - field: service
      op: equals
      value: codebuild
    - field: operation
      op: equals
      value: StartBuild
  engines:
  - threat_engine
  primary_engine: threat_engine
  action_category: execute
  mitre_tactics:
  - execution
  mitre_techniques:
  - T1204.003
  description: Build execution — monitor for builds triggered outside normal CI patterns.
  domain: devops_security
  provider: aws
  remediation: Validate function/container execution is authorized. Review execution role permissions. Check for code injection
    indicators.
  compliance_frameworks: *id001
  risk_score: 25
