rules:
- rule_id: vpc.flow.rejected_traffic
  title: Network traffic rejected by security group/NACL
  severity: info
  log_source_type: vpc_flow
  conditions:
    all:
    - field: source_type
      op: equals
      value: vpc_flow
    - field: network.flow_action
      op: equals
      value: REJECT
  engines:
  - network_engine
  action_category: network
  domain: network_security
  provider: aws
  remediation: Review network configuration changes. Validate security group rules follow least-privilege. Block unauthorized
    ports.
  compliance_frameworks: &id001
  - CIS
  - NIST_800-53
  - PCI-DSS
  - SOC2
  risk_score: 10
- rule_id: vpc.flow.ssh_inbound
  title: SSH traffic (port 22) detected
  severity: medium
  log_source_type: vpc_flow
  conditions:
    all:
    - field: source_type
      op: equals
      value: vpc_flow
    - field: network.dst_port
      op: equals
      value: '22'
    - field: network.flow_action
      op: equals
      value: ACCEPT
  engines:
  - network_engine
  - threat_engine
  action_category: network
  mitre_tactics:
  - lateral-movement
  - initial-access
  mitre_techniques:
  - T1021.004
  domain: network_security
  provider: aws
  remediation: Review network configuration changes. Validate security group rules follow least-privilege. Block unauthorized
    ports.
  compliance_frameworks: *id001
  risk_score: 50
- rule_id: vpc.flow.rdp_inbound
  title: RDP traffic (port 3389) detected
  severity: medium
  log_source_type: vpc_flow
  conditions:
    all:
    - field: source_type
      op: equals
      value: vpc_flow
    - field: network.dst_port
      op: equals
      value: '3389'
    - field: network.flow_action
      op: equals
      value: ACCEPT
  engines:
  - network_engine
  - threat_engine
  action_category: network
  mitre_tactics:
  - lateral-movement
  - initial-access
  mitre_techniques:
  - T1021.001
  domain: network_security
  provider: aws
  remediation: Review network configuration changes. Validate security group rules follow least-privilege. Block unauthorized
    ports.
  compliance_frameworks: *id001
  risk_score: 50
- rule_id: vpc.flow.database_port
  title: Database port traffic (3306/5432/1433/27017) detected
  severity: low
  log_source_type: vpc_flow
  conditions:
    all:
    - field: source_type
      op: equals
      value: vpc_flow
    - field: network.dst_port
      op: in
      value:
      - '3306'
      - '5432'
      - '1433'
      - '27017'
      - '6379'
    - field: network.flow_action
      op: equals
      value: ACCEPT
  engines:
  - network_engine
  - datasec_engine
  action_category: network
  domain: network_security
  provider: aws
  remediation: Review network configuration changes. Validate security group rules follow least-privilege. Block unauthorized
    ports.
  compliance_frameworks: *id001
  risk_score: 25
- rule_id: vpc.flow.dns_traffic
  title: DNS traffic (port 53) — potential DNS exfiltration vector
  severity: info
  log_source_type: vpc_flow
  conditions:
    all:
    - field: source_type
      op: equals
      value: vpc_flow
    - field: network.dst_port
      op: equals
      value: '53'
  engines:
  - network_engine
  action_category: network
  domain: network_security
  provider: aws
  remediation: Review network configuration changes. Validate security group rules follow least-privilege. Block unauthorized
    ports.
  compliance_frameworks: *id001
  risk_score: 10
- rule_id: vpc.flow.high_port_traffic
  title: Traffic on uncommon high port
  severity: low
  log_source_type: vpc_flow
  conditions:
    all:
    - field: source_type
      op: equals
      value: vpc_flow
    - field: network.flow_action
      op: equals
      value: ACCEPT
  engines:
  - network_engine
  action_category: network
  description: High port traffic may indicate C2, reverse shells, or custom services
  domain: network_security
  provider: aws
  remediation: Review network configuration changes. Validate security group rules follow least-privilege. Block unauthorized
    ports.
  compliance_frameworks: *id001
  risk_score: 25
