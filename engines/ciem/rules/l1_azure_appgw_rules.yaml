rules:
- rule_id: azure.appgw.waf_blocked
  title: Azure WAF blocked request
  severity: medium
  log_source_type: azure_appgw
  conditions:
    all:
    - field: source_type
      op: equals
      value: azure_appgw
    - field: flow_action
      op: equals
      value: Blocked
  engines:
  - threat_engine
  - network_engine
  primary_engine: threat_engine
  action_category: read
  mitre_tactics:
  - initial-access
  mitre_techniques:
  - T1190
  domain: network_security
  provider: azure
  remediation: Verify the accessor has legitimate need-to-know. Review access patterns for anomalies. Consider restricting
    read permissions.
  compliance_frameworks: &id001
  - CIS
  - NIST_800-53
  - PCI-DSS
  - SOC2
  risk_score: 50
