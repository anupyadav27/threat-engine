      value: PERMISSION_DENIED
  engines:
  - threat_engine
  - ciem
  primary_engine: ciem
  action_category: authorization
  mitre_tactics:
  - privilege-escalation
  - discovery
  mitre_techniques:
  - T1078
  domain: compute_security
  provider: gcp
  remediation: Review instance security configurations. Apply security patches. Restrict instance metadata access.
  compliance_frameworks: *id001
  risk_score: 70
