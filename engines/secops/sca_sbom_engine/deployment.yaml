apiVersion: apps/v1
kind: Deployment
metadata:
  name: sbom-engine
  namespace: default
  labels:
    app: sbom-engine
spec:
  replicas: 1
  selector:
    matchLabels:
      app: sbom-engine
  template:
    metadata:
      labels:
        app: sbom-engine
    spec:
      containers:
      - name: sbom-engine
        image: ajaychaudhary86/sbom_engine:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8002
        resources:
          requests:
            cpu: "100m"
            memory: "256Mi"
          limits:
            cpu: "500m"
            memory: "1Gi"
        env:
        - name: DB_HOST
          value: "postgres-vulnerability-db.cbm92xowvx2t.ap-south-1.rds.amazonaws.com"
        - name: DB_PORT
          value: "5432"
        - name: DB_NAME
          value: "vulnerability_db"
        - name: DB_USER
          value: "postgres"
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: vulnerability-db-secret
              key: DB_PASSWORD
        - name: DB_SSLMODE
          value: "disable"
        - name: PORT
          value: "8002"
        - name: API_KEY
          value: '["sbom-api-key-2024","agent-key-centos","agent-key-debian-minimal","agent-key-ubuntu","agent-key-windows","agent-key-oracle"]'
        livenessProbe:
          httpGet:
            path: /health
            port: 8002
          initialDelaySeconds: 30
          periodSeconds: 30
          timeoutSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 8002
          initialDelaySeconds: 15
          periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: sbom-engine
  namespace: default
  labels:
    app: sbom-engine
spec:
  type: LoadBalancer
  selector:
    app: sbom-engine
  ports:
  - name: http
    protocol: TCP
    port: 8002
    targetPort: 8002
