version: '1.0'
provider: aws
service: networkfirewall
checks:
- rule_id: aws.networkfirewall.firewall.logging_enabled
  for_each: aws.networkfirewall.describe_logging_configuration
  conditions:
    all:
    - var: item.LoggingConfiguration
      op: exists
      value: null
    - var: item.LogDestinationConfigs
      op: exists
      value: null
- rule_id: aws.networkfirewall.firewall.networkfirewall_multi_az_deployment_enabled
  for_each: aws.networkfirewall.describe_firewalls
  conditions:
    var: item.SyncStates
    op: exists
    value: null
- rule_id: aws.networkfirewall.firewall.rule_groups_enabled
  for_each: aws.networkfirewall.describe_firewall
  conditions:
    all:
    - var: item.RuleGroups.StatefulRuleGroupReferences
      op: exists
      value: null
    - var: item.RuleGroups.StatelessRuleGroupReferences
      op: exists
      value: null
- rule_id: aws.networkfirewall.resource.logging_enabled
  for_each: aws.networkfirewall.describe_logging_configuration
  conditions:
    all:
    - var: item.LogDestinationConfigs
      op: exists
      value: null
    - var: item.LogDestinationConfigs[].LogType
      op: in
      value:
      - ALERT
      - FLOW
- rule_id: aws.networkfirewall.firewall.networkfirewall_no_permit_any_configured
  for_each: aws.networkfirewall.describe_firewall_policy
  conditions:
    all:
    - var: item.StatelessRuleGroupReferences[].Priority
      op: exists
      value: null
    - var: item.StatelessRuleGroupReferences[].ResourceArn
      op: exists
      value: null
    - var: item.StatelessRulesAndCustomActions.StatelessRules[].RuleDefinition.MatchAttributes.DestinationPorts[].FromPort
      op: greater_than
      value: 0
    - var: item.StatelessRulesAndCustomActions.StatelessRules[].RuleDefinition.MatchAttributes.SourcePorts[].FromPort
      op: greater_than
      value: 0
    - var: item.StatelessRulesAndCustomActions.StatelessRules[].RuleDefinition.MatchAttributes.Protocols[]
      op: exists
      value: null
- rule_id: aws.networkfirewall.in.all_vpc_configured
  for_each: aws.networkfirewall.describe_firewall_policy
  conditions:
    all:
    - var: item.StatelessRuleGroupReferences
      op: exists
      value: null
    - var: item.StatefulRuleGroupReferences
      op: exists
      value: null
