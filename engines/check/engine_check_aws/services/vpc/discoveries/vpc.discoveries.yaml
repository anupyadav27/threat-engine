version: '1.0'
provider: aws
service: vpc
services:
  client: vpc
  module: boto3.client
discovery:
- discovery_id: aws.ec2.describe_subnets
  calls:
  - action: describe_subnets
    save_as: response
    params:
      MaxResults: 1000
  emit:
    items_for: '{{ response.Subnets }}'
    as: item
    fields:
      resource_arn: '{{ item.SubnetArn }}'
      resource_uid: '{{ item.SubnetArn }}'
      resource_id: '{{ item.SubnetId }}'
      resource_type: subnet
- discovery_id: aws.ec2.describe_account_attributes
  calls:
  - action: describe_account_attributes
    save_as: response
    params:
      MaxResults: 1000
  emit:
    items_for: '{{ response.AccountAttributes }}'
    as: item
- discovery_id: aws.ec2.describe_egress_only_internet_gateways
  calls:
  - action: describe_egress_only_internet_gateways
    save_as: response
    params:
      MaxResults: 1000
  emit: {}
- discovery_id: aws.ec2.describe_vpc_endpoint_service_configurations
  calls:
  - action: describe_vpc_endpoint_service_configurations
    save_as: response
    params:
      MaxResults: 1000
  emit: {}
- discovery_id: aws.ec2.describe_flow_logs
  calls:
  - action: describe_flow_logs
    save_as: response
    params:
      MaxResults: 1000
  emit: {}
- discovery_id: aws.ec2.describe_security_group_rules
  calls:
  - action: describe_security_group_rules
    save_as: response
    params:
      MaxResults: 1000
  emit: {}
- discovery_id: aws.ec2.describe_ipam_resource_discoveries
  calls:
  - action: describe_ipam_resource_discoveries
    save_as: response
    params:
      MaxResults: 1000
  emit: {}
- discovery_id: aws.vpc.describe_customer_gateways
  calls:
  - action: describe_customer_gateways
    save_as: response
    params:
      MaxResults: 1000
  emit:
    items_for: '{{ response.CustomerGateways }}'
    as: item
- discovery_id: aws.ec2.describe_nat_gateways
  calls:
  - action: describe_nat_gateways
    save_as: response
    params:
      MaxResults: 1000
  emit: {}
- discovery_id: aws.ec2.list_snapshots_in_recycle_bin
  calls:
  - action: describe_client_vpn_endpoints
    save_as: response
    params:
      MaxResults: 1000
  emit: {}
- discovery_id: aws.ec2.describe_carrier_gateways
  calls:
  - action: describe_carrier_gateways
    save_as: response
    params:
      MaxResults: 1000
  emit: {}
- discovery_id: aws.ec2.describe_addresses
  calls:
  - action: describe_addresses
    save_as: response
    params:
      MaxResults: 1000
  emit:
    items_for: '{{ response.Addresses }}'
    as: item
- discovery_id: aws.ec2.describe_vpc_endpoint_connection_notifications
  calls:
  - action: describe_vpc_endpoint_connection_notifications
    save_as: response
    params:
      MaxResults: 1000
  emit: {}
- discovery_id: aws.ec2.describe_vpc_endpoint_service_permissions
  calls:
  - action: describe_vpc_endpoint_connection_notifications
    save_as: response
    params:
      MaxResults: 1000
  emit: {}
- discovery_id: aws.vpc.describe_route_tables
  calls:
  - action: describe_route_tables
    save_as: response
    params:
      MaxResults: 1000
  emit: {}
- discovery_id: aws.ec2.describe_network_acls
  calls:
  - action: describe_network_acls
    save_as: response
    params:
      MaxResults: 1000
  emit: {}
- discovery_id: aws.ec2.describe_vpc_endpoints
  calls:
  - action: describe_vpc_endpoints
    save_as: response
    params:
      MaxResults: 1000
  emit: {}
- discovery_id: aws.ec2.list_volumes_in_recycle_bin
  calls:
  - action: describe_capacity_block_extension_history
    save_as: response
    params:
      MaxResults: 1000
  emit: {}
- discovery_id: aws.ec2.describe_vpcs
  calls:
  - action: describe_vpcs
    save_as: response
    params:
      MaxResults: 1000
  emit:
    items_for: '{{ response.Vpcs }}'
    as: item
    fields:
      resource_arn: 'arn:aws:ec2:{{ region }}:{{ account_id }}:vpc/{{ item.VpcId }}'
      resource_uid: 'arn:aws:ec2:{{ region }}:{{ account_id }}:vpc/{{ item.VpcId }}'
      resource_id: '{{ item.VpcId }}'
      resource_type: vpc
