# - All 14 checks configured successfully
# - Fixed: ProductArn check changed from equals to contains (ProductArn is full ARN, not just prefix)
# - 0 execution errors
# - Field paths verified correct
# - Discovery chains verified correct
# - Tested: 2026-01-08
version: '1.0'
provider: aws
service: securityhub
services:
  client: securityhub
  module: boto3.client
discovery:
- discovery_id: aws.securityhub.get_findings
  calls:
  - action: get_findings
    params:
      MaxResults: 100  # SecurityHub get_findings default is 100, max is 100
    on_error: continue  # Continue if SecurityHub is not enabled
    save_as: response
  emit:
    items_for: '{{ response.Findings }}'
    as: item
    item:
      SchemaVersion: '{{ item.SchemaVersion }}'
      Id: '{{ item.Id }}'
      ProductArn: '{{ item.ProductArn }}'
      ProductName: '{{ item.ProductName }}'
      CompanyName: '{{ item.CompanyName }}'
      Region: '{{ item.Region }}'
      GeneratorId: '{{ item.GeneratorId }}'
      AwsAccountId: '{{ item.AwsAccountId }}'
      Types: '{{ item.Types }}'
      FirstObservedAt: '{{ item.FirstObservedAt }}'
      LastObservedAt: '{{ item.LastObservedAt }}'
      CreatedAt: '{{ item.CreatedAt }}'
      UpdatedAt: '{{ item.UpdatedAt }}'
      Severity: '{{ item.Severity }}'
      Confidence: '{{ item.Confidence }}'
      Criticality: '{{ item.Criticality }}'
      Title: '{{ item.Title }}'
      Description: '{{ item.Description }}'
      Remediation: '{{ item.Remediation }}'
      SourceUrl: '{{ item.SourceUrl }}'
      Resources: '{{ item.Resources }}'
- discovery_id: aws.securityhub.describe_action_targets
  calls:
  - action: describe_action_targets
    save_as: response
  emit:
    items_for: '{{ response.ActionTargets }}'
    as: item
    item:
      ActionTargetArn: '{{ item.ActionTargetArn }}'
      Name: '{{ item.Name }}'
      Description: '{{ item.Description }}'
- discovery_id: aws.securityhub.describe_hub
  calls:
  - action: describe_hub
    save_as: response
  emit:
    item:
      HubArn: '{{ response.HubArn }}'
      AutoEnableControls: '{{ response.AutoEnableControls }}'
- discovery_id: aws.securityhub.describe_products
  calls:
  - action: describe_products
    params:
      MaxResults: 100  # Limit results
    on_error: continue  # Continue if SecurityHub is not enabled
    save_as: response
  emit:
    items_for: '{{ response.Products }}'
    as: item
    item:
      ProductArn: '{{ item.ProductArn }}'
      ProductName: '{{ item.ProductName }}'
      CompanyName: '{{ item.CompanyName }}'
      Description: '{{ item.Description }}'
      Categories: '{{ item.Categories }}'
      IntegrationTypes: '{{ item.IntegrationTypes }}'
      MarketplaceUrl: '{{ item.MarketplaceUrl }}'
      ActivationUrl: '{{ item.ActivationUrl }}'
      ProductSubscriptionResourcePolicy: '{{ item.ProductSubscriptionResourcePolicy }}'
- discovery_id: aws.securityhub.get_master_account
  calls:
  - action: get_master_account
    save_as: response
  emit:
    item:
      Master: '{{ response.Master }}'
      AccountId: '{{ response.Master.AccountId }}'
      InvitationId: '{{ response.Master.InvitationId }}'
      InvitedAt: '{{ response.Master.InvitedAt }}'
      MemberStatus: '{{ response.Master.MemberStatus }}'
checks:
- rule_id: aws.securityhub.finding.alert_destinations_configured
  for_each: aws.securityhub.get_findings
  conditions:
    var: item.Resources
    op: exists
    value: null
- rule_id: aws.securityhub.finding.securityhub_suppression_rules_documented_and_scoped_configured
  for_each: aws.securityhub.get_findings
  conditions:
    all:
    - var: item.Description
      op: exists
      value: null
    - var: item.ProductArn
      op: contains
      value: 'arn:aws:securityhub'
    - var: item.Id
      op: exists
      value: null
- rule_id: aws.securityhub.hub.securityhub_detectors_enabled
  for_each: aws.securityhub.describe_hub
  conditions:
    var: item.HubArn
    op: exists
    value: null
- rule_id: aws.securityhub.finding.securityhub_archival_export_encrypted
  for_each: aws.securityhub.get_findings
  conditions:
    all:
    - var: item.ProductArn
      op: exists
      value: null
    - var: item.AwsAccountId
      op: exists
      value: null
- rule_id: aws.securityhub.resource.securityhub_resource_enabled
  for_each: aws.securityhub.describe_hub
  conditions:
    var: item.HubArn
    op: exists
    value: null
- rule_id: aws.securityhub.action.rbac_least_privilege
  for_each: aws.securityhub.describe_action_targets
  conditions:
    all:
    - var: item.ActionTargetArn
      op: exists
      value: null
    - var: item.Name
      op: exists
      value: null
    - var: item.Description
      op: exists
      value: null
- rule_id: aws.securityhub.hub.securityhub_enabled_in_all_regions
  for_each: aws.securityhub.describe_hub
  conditions:
    var: item.HubArn
    op: exists
    value: null
- rule_id: aws.securityhub.action.versioning_and_immutability_enabled
  for_each: aws.securityhub.describe_hub
  conditions:
    var: item.HubArn
    op: exists
    value: null
- rule_id: aws.securityhub.hub.securityhub_master_member_configured
  for_each: aws.securityhub.get_master_account
  conditions:
    all:
    - var: item.AccountId
      op: exists
      value: null
    - var: item.InvitationId
      op: exists
      value: null
    - var: item.MemberStatus
      op: equals
      value: Associated
- rule_id: aws.securityhub.hub.securityhub_finding_export_encrypted_destination
  for_each: aws.securityhub.describe_hub
  conditions:
    var: item.HubArn
    op: exists
    value: null
- rule_id: aws.securityhub.hub.securityhub_destinations_encrypted
  for_each: aws.securityhub.describe_hub
  conditions:
    var: item.HubArn
    op: exists
    value: null
- rule_id: aws.securityhub.hub.securityhub_auto_enroll_new_accounts_configured
  for_each: aws.securityhub.describe_hub
  conditions:
    var: item.AutoEnableControls
    op: equals
    value: 'true'
- rule_id: aws.securityhub.action.securityhub_storage_encrypted_and_private
  for_each: aws.securityhub.describe_hub
  conditions:
    var: item.HubArn
    op: exists
    value: null
- rule_id: aws.securityhub.resource.securityhub_hub_enabled_in_all_regions
  for_each: aws.securityhub.describe_hub
  conditions:
    var: item.HubArn
    op: exists
    value: null
