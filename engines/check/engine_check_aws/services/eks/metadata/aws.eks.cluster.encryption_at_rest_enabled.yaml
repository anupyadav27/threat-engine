assertion_id: data_protection.encryption_rest.eks_cluster_encryption_at_rest_enabled
source: default
description: Verifies that Amazon EKS cluster has encryption at rest enabled using
  AWS KMS customer managed keys or AWS managed keys. Unencrypted data at rest is vulnerable
  to unauthorized access if physical storage media is compromised, AWS credentials
  are leaked, or insider threats occur.
references:
- https://docs.aws.amazon.com/eks/latest/userguide/enable-kms.html
- https://docs.aws.amazon.com/eks/latest/userguide/security.html
