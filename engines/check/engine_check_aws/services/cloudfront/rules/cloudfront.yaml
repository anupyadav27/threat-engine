version: '1.0'
provider: aws
service: cloudfront
services:
  client: cloudfront
  module: boto3.client
discovery:
- discovery_id: aws.cloudfront.list_origin_request_policies
  calls:
  - action: list_origin_request_policies
    params:
      MaxItems: 100
    save_as: response
  emit:
    items_for: '{{ response.OriginRequestPolicyList.Items }}'
    as: item
    item:
      Id: '{{ item.Id }}'
      LastModifiedTime: '{{ item.LastModifiedTime }}'
- discovery_id: aws.cloudfront.get_origin_request_policy_config
  for_each: aws.cloudfront.list_origin_request_policies
  calls:
  - action: get_origin_request_policy_config
    params:
      Id: '{{ item.Id }}'
    save_as: response
    on_error: continue
  emit: {}
- discovery_id: aws.cloudfront.list_cache_policies
  calls:
  - action: list_cache_policies
    params:
      MaxItems: 100
    save_as: response
  emit:
    items_for: '{{ response.CachePolicyList.Items }}'
    as: item
    item:
      Id: '{{ item.Id }}'
      LastModifiedTime: '{{ item.LastModifiedTime }}'
- discovery_id: aws.cloudfront.get_cache_policy_config
  for_each: aws.cloudfront.list_cache_policies
  calls:
  - action: get_cache_policy_config
    params:
      Id: '{{ item.Id }}'
    save_as: response
    on_error: continue
  emit: {}
- discovery_id: aws.cloudfront.list_distributions
  calls:
  - action: list_distributions
    params:
      MaxItems: 100
    save_as: response
  emit:
    items_for: '{{ response.DistributionList.Items }}'
    as: item
    item:
      Id: '{{ item.Id }}'
      Status: '{{ item.Status }}'
- discovery_id: aws.cloudfront.get_distribution_config
  for_each: aws.cloudfront.list_distributions
  calls:
  - action: get_distribution_config
    params:
      Id: '{{ item.Id }}'
    save_as: response
    on_error: continue
  emit: {}
- discovery_id: aws.cloudfront.list_origin_access_controls
  calls:
  - action: list_origin_access_controls
    params:
      MaxItems: 100
    save_as: response
  emit:
    items_for: '{{ response.OriginAccessControlList.Items }}'
    as: item
    item:
      Id: '{{ item.Id }}'
      OriginAccessControlSummary: '{{ item.OriginAccessControlSummary }}'
- discovery_id: aws.cloudfront.get_origin_access_control
  for_each: aws.cloudfront.list_origin_access_controls
  calls:
  - action: get_origin_access_control
    params:
      Id: '{{ item.Id }}'
    save_as: response
    on_error: continue
  emit: {}
- discovery_id: aws.cloudfront.list_field_level_encryption_configs
  calls:
  - action: list_field_level_encryption_configs
    params:
      MaxItems: 100
    save_as: response
  emit:
    items_for: '{{ response.FieldLevelEncryptionList.Items }}'
    as: item
    item:
      Id: '{{ item.Id }}'
      LastModifiedTime: '{{ item.LastModifiedTime }}'
- discovery_id: aws.cloudfront.get_field_level_encryption
  for_each: aws.cloudfront.list_field_level_encryption_configs
  calls:
  - action: get_field_level_encryption
    params:
      Id: '{{ item.Id }}'
    save_as: response
    on_error: continue
  emit: {}
checks:
- rule_id: aws.cloudfront.cachepolicy.cache_allowlists_minimal_query_headers_cookies_configured
  for_each: aws.cloudfront.get_cache_policy_config
  conditions:
    all:
    - var: item.ParametersInCacheKeyAndForwardedToOrigin.HeadersConfig
      op: exists
      value: null
    - var: item.ParametersInCacheKeyAndForwardedToOrigin.CookiesConfig
      op: exists
      value: null
    - var: item.ParametersInCacheKeyAndForwardedToOrigin.QueryStringsConfig
      op: exists
      value: null
- rule_id: aws.cloudfront.cachepolicy.no_sensitive_headers_cached_configured
  for_each: aws.cloudfront.get_cache_policy_config
  conditions:
    var: item.ParametersInCacheKeyAndForwardedToOrigin.HeadersConfig
    op: exists
    value: null
- rule_id: aws.cloudfront.cachepolicy.respects_cache_control_no_store_private_configured
  for_each: aws.cloudfront.get_cache_policy_config
  conditions:
    var: item.ParametersInCacheKeyAndForwardedToOrigin
    op: exists
    value: null
- rule_id: aws.cloudfront.distribution.access_logging_enabled
  for_each: aws.cloudfront.get_distribution_config
  conditions:
    var: item.Logging
    op: exists
    value: null
- rule_id: aws.cloudfront.distribution.cache_key_excludes_sensitive_headers_configured
  for_each: aws.cloudfront.get_distribution_config
  conditions:
    all:
    - var: item.DefaultCacheBehavior.CachePolicyId
      op: exists
      value: null
    - var: item.CacheBehaviors.Items.CachePolicyId
      op: exists
      value: null
- rule_id: aws.cloudfront.distribution.cache_key_minimal_query_and_cookie_variants_configured
  for_each: aws.cloudfront.get_cache_policy_config
  conditions:
    var: item.ParametersInCacheKeyAndForwardedToOrigin
    op: exists
    value: null
- rule_id: aws.cloudfront.distribution.hsts_enabled
  for_each: aws.cloudfront.get_distribution_config
  conditions:
    var: item.DefaultCacheBehavior.ResponseHeadersPolicyId
    op: exists
    value: null
- rule_id: aws.cloudfront.distribution.https_only_viewer_protocol_configured
  for_each: aws.cloudfront.get_distribution_config
  conditions:
    var: item.DefaultCacheBehavior.ViewerProtocolPolicy
    op: equals
    value: https-only
- rule_id: aws.cloudfront.distribution.origin_access_restricted
  for_each: aws.cloudfront.get_origin_access_control
  conditions:
    var: item.OriginAccessControlConfig
    op: exists
    value: null
- rule_id: aws.cloudfront.distribution.signed_urls_headers_required_private_content
  for_each: aws.cloudfront.get_distribution_config
  conditions:
    all:
    - var: item.DefaultCacheBehavior.ForwardedValues.Headers
      op: exists
      value: null
    - var: item.DefaultCacheBehavior.ForwardedValues.QueryString
      op: equals
      value: 'true'
- rule_id: aws.cloudfront.distribution.tls_min_1_2_enforced
  for_each: aws.cloudfront.get_distribution_config
  conditions:
    var: item.ViewerCertificate.MinimumProtocolVersion
    op: equals
    value: TLSv1.2_2021
- rule_id: aws.cloudfront.distribution.valid_trusted_certificate_enabled
  for_each: aws.cloudfront.get_distribution_config
  conditions:
    var: item.ViewerCertificate
    op: exists
    value: null
- rule_id: aws.cloudfront.distribution.waf_web_acl_enabled
  for_each: aws.cloudfront.get_distribution_config
  conditions:
    var: item.WebACLId
    op: exists
    value: null
- rule_id: aws.cloudfront.distributions.custom_ssl_certificate_configured
  for_each: aws.cloudfront.get_distribution_config
  conditions:
    var: item.ViewerCertificate
    op: exists
    value: null
- rule_id: aws.cloudfront.distributions.distribution_https_enabled
  for_each: aws.cloudfront.get_distribution_config
  conditions:
    all:
    - var: item.ViewerCertificate
      op: exists
      value: null
    - var: item.ViewerCertificate.MinimumProtocolVersion
      op: equals
      value: TLSv1.2_2021
- rule_id: aws.cloudfront.distributions.logging_enabled
  for_each: aws.cloudfront.get_distribution_config
  conditions:
    var: item.Logging
    op: exists
    value: null
- rule_id: aws.cloudfront.distributions.using_deprecated_ssl_protocols_configured
  for_each: aws.cloudfront.get_distribution_config
  conditions:
    var: item.ViewerCertificate.MinimumProtocolVersion
    op: in
    value:
    - SSLv3
    - TLSv1
- rule_id: aws.cloudfront.distributions_multiple_origin_failover_configured.distributions_origin_failover_configured
  for_each: aws.cloudfront.get_distribution_config
  conditions:
    var: item.OriginGroups
    op: exists
    value: null
- rule_id: aws.cloudfront.origin_request_policy.cloudfront_forward_cookies_minimal_configured
  for_each: aws.cloudfront.get_origin_request_policy_config
  conditions:
    var: item.CookiesConfig
    op: equals
    value: none
- rule_id: aws.cloudfront.origin_request_policy.cloudfront_forward_headers_minimal_configured
  for_each: aws.cloudfront.get_origin_request_policy_config
  conditions:
    var: item.HeadersConfig
    op: exists
    value: null
- rule_id: aws.cloudfront.origin_request_policy.cloudfront_forward_querystrings_minimal_configured
  for_each: aws.cloudfront.get_origin_request_policy_config
  conditions:
    var: item.QueryStringsConfig
    op: equals
    value: none
- rule_id: aws.cloudfront.origin_request_policy.cloudfront_no_secret_headers_forwarded_configured
  for_each: aws.cloudfront.get_origin_request_policy_config
  conditions:
    var: item.HeadersConfig
    op: equals
    value: none
- rule_id: aws.cloudfront.resource.cloudfront_https_required
  for_each: aws.cloudfront.get_distribution_config
  conditions:
    all:
    - var: item.ViewerCertificate
      op: exists
      value: null
    - var: item.ViewerCertificate.MinimumProtocolVersion
      op: in
      value:
      - TLSv1.2_2021
      - TLSv1.2_2019
      - TLSv1.2_2018
- rule_id: aws.cloudfront.resource.distributions_field_level_encryption_enabled
  for_each: aws.cloudfront.get_field_level_encryption
  conditions:
    var: item.FieldLevelEncryptionConfig
    op: exists
    value: null
- rule_id: aws.cloudfront.resource.distributions_logging_enabled
  for_each: aws.cloudfront.get_distribution_config
  conditions:
    var: item.Logging
    op: exists
    value: null
- rule_id: aws.cloudfront.resource.distributions_origin_traffic_encrypted
  for_each: aws.cloudfront.get_distribution_config
  conditions:
    all:
    - var: item.Origins
      op: exists
      value: null
    - var: item.Origins.Items.OriginSslProtocols
      op: exists
      value: null
