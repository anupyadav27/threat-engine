version: '1.0'
provider: aws
service: neptune
services:
  client: neptune
  module: boto3.client
discovery:
- discovery_id: aws.neptune.describe_d_b_cluster_snapshots
  calls:
  - action: describe_db_cluster_snapshots
    params:
      MaxRecords: 100
      IncludeShared: false
      IncludePublic: false
    on_error: continue
    save_as: response
  emit:
    items_for: '{{ response.DBClusterSnapshots }}'
    as: item
    item:
      AvailabilityZones: '{{ item.AvailabilityZones }}'
      DBClusterSnapshotIdentifier: '{{ item.DBClusterSnapshotIdentifier }}'
      DBClusterIdentifier: '{{ item.DBClusterIdentifier }}'
      SnapshotCreateTime: '{{ item.SnapshotCreateTime }}'
      Engine: '{{ item.Engine }}'
      AllocatedStorage: '{{ item.AllocatedStorage }}'
      Status: '{{ item.Status }}'
      Port: '{{ item.Port }}'
      VpcId: '{{ item.VpcId }}'
      ClusterCreateTime: '{{ item.ClusterCreateTime }}'
      MasterUsername: '{{ item.MasterUsername }}'
      EngineVersion: '{{ item.EngineVersion }}'
      LicenseModel: '{{ item.LicenseModel }}'
      SnapshotType: '{{ item.SnapshotType }}'
      PercentProgress: '{{ item.PercentProgress }}'
      StorageEncrypted: '{{ item.StorageEncrypted }}'
      Encrypted: '{{ item.Encrypted }}'
      KmsKeyId: '{{ item.KmsKeyId }}'
      DBClusterSnapshotArn: '{{ item.DBClusterSnapshotArn }}'
      SourceDBClusterSnapshotArn: '{{ item.SourceDBClusterSnapshotArn }}'
      IamDatabaseAuthenticationEnabled: '{{ item.IamDatabaseAuthenticationEnabled }}'
- discovery_id: aws.neptune.describe_d_b_instances
  calls:
  - action: describe_db_instances
    save_as: response
  emit:
    items_for: '{{ response.DBInstances }}'
    as: item
    item:
      DBInstanceIdentifier: '{{ item.DBInstanceIdentifier }}'
      DBInstanceClass: '{{ item.DBInstanceClass }}'
      Engine: '{{ item.Engine }}'
      DBInstanceStatus: '{{ item.DBInstanceStatus }}'
      MasterUsername: '{{ item.MasterUsername }}'
      DBName: '{{ item.DBName }}'
      Endpoint: '{{ item.Endpoint }}'
      AllocatedStorage: '{{ item.AllocatedStorage }}'
      InstanceCreateTime: '{{ item.InstanceCreateTime }}'
      PreferredBackupWindow: '{{ item.PreferredBackupWindow }}'
      BackupRetentionPeriod: '{{ item.BackupRetentionPeriod }}'
      DBSecurityGroups: '{{ item.DBSecurityGroups }}'
      VpcSecurityGroups: '{{ item.VpcSecurityGroups }}'
      DBParameterGroups: '{{ item.DBParameterGroups }}'
      AvailabilityZone: '{{ item.AvailabilityZone }}'
      DBSubnetGroup: '{{ item.DBSubnetGroup }}'
      PreferredMaintenanceWindow: '{{ item.PreferredMaintenanceWindow }}'
      PendingModifiedValues: '{{ item.PendingModifiedValues }}'
      LatestRestorableTime: '{{ item.LatestRestorableTime }}'
      MultiAZ: '{{ item.MultiAZ }}'
      PubliclyAccessible: '{{ item.PubliclyAccessible }}'
      StorageEncrypted: '{{ item.StorageEncrypted }}'
      IamDatabaseAuthenticationEnabled: '{{ item.IamDatabaseAuthenticationEnabled }}'
      DeletionProtection: '{{ item.DeletionProtection }}'
      AutoMinorVersionUpgrade: '{{ item.AutoMinorVersionUpgrade }}'
- discovery_id: aws.neptune.describe_d_b_clusters
  calls:
  - action: describe_db_clusters
    save_as: response
  emit:
    items_for: '{{ response.DBClusters }}'
    as: item
    item:
      AllocatedStorage: '{{ item.AllocatedStorage }}'
      AvailabilityZones: '{{ item.AvailabilityZones }}'
      BackupRetentionPeriod: '{{ item.BackupRetentionPeriod }}'
      CharacterSetName: '{{ item.CharacterSetName }}'
      DatabaseName: '{{ item.DatabaseName }}'
      DBClusterIdentifier: '{{ item.DBClusterIdentifier }}'
      DBClusterParameterGroup: '{{ item.DBClusterParameterGroup }}'
      DBSubnetGroup: '{{ item.DBSubnetGroup }}'
      Status: '{{ item.Status }}'
      PercentProgress: '{{ item.PercentProgress }}'
      EarliestRestorableTime: '{{ item.EarliestRestorableTime }}'
      Endpoint: '{{ item.Endpoint }}'
      ReaderEndpoint: '{{ item.ReaderEndpoint }}'
      MultiAZ: '{{ item.MultiAZ }}'
      Engine: '{{ item.Engine }}'
      EngineVersion: '{{ item.EngineVersion }}'
      LatestRestorableTime: '{{ item.LatestRestorableTime }}'
      Port: '{{ item.Port }}'
      MasterUsername: '{{ item.MasterUsername }}'
      DBClusterOptionGroupMemberships: '{{ item.DBClusterOptionGroupMemberships }}'
      AutoMinorVersionUpgrade: '{{ item.AutoMinorVersionUpgrade }}'
      CloudwatchLogsExportConfiguration: '{{ item.CloudwatchLogsExportConfiguration }}'
      EnabledCloudwatchLogsExports: '{{ item.EnabledCloudwatchLogsExports }}'
      IamDatabaseAuthenticationEnabled: '{{ item.IamDatabaseAuthenticationEnabled }}'
      StorageEncrypted: '{{ item.StorageEncrypted }}'
      KmsKeyId: '{{ item.KmsKeyId }}'
      DeletionProtection: '{{ item.DeletionProtection }}'
      CopyTagsToSnapshot: '{{ item.CopyTagsToSnapshot }}'
      PubliclyAccessible: '{{ item.PubliclyAccessible }}'
      VpcSecurityGroups: '{{ item.VpcSecurityGroups }}'
- discovery_id: aws.neptune.describe_d_b_cluster_endpoints
  for_each: aws.neptune.describe_d_b_clusters
  calls:
  - action: describe_db_cluster_endpoints
    params:
      DBClusterIdentifier: '{{ item.DBClusterIdentifier }}'
    save_as: response
  emit:
    items_for: '{{ response.DBClusterEndpoints }}'
    as: item
checks:
- rule_id: aws.neptune.cluster.iam_or_managed_identity_auth_enabled_if_supported
  for_each: aws.neptune.describe_d_b_clusters
  conditions:
    var: item.IamDatabaseAuthenticationEnabled
    op: equals
    value: true
- rule_id: aws.neptune.cluster.public_access_disabled
  for_each: aws.neptune.describe_d_b_clusters
  conditions:
    var: item.PubliclyAccessible
    op: equals
    value: false
- rule_id: aws.neptune.instance.require_tls_in_transit_configured
  for_each: aws.neptune.describe_d_b_instances
  conditions:
    all:
    - var: item.DBInstanceStatus
      op: equals
      value: available
    - var: item.DBParameterGroups.DBParameterGroupStatus
      op: equals
      value: in-sync
    - var: item.DBParameterGroups.DBParameterGroupName
      op: equals
      value: neptune1
- rule_id: aws.neptune.security_configuration_review.security_configuration_review_configured
  for_each: aws.neptune.describe_d_b_clusters
  conditions:
    all:
    - var: item.StorageEncrypted
      op: equals
      value: true
    - var: item.IamDatabaseAuthenticationEnabled
      op: equals
      value: true
    - var: item.DBClusterParameterGroup
      op: exists
      value: null
- rule_id: aws.neptune.cluster.neptune_storage_encrypted
  for_each: aws.neptune.describe_d_b_clusters
  conditions:
    var: item.StorageEncrypted
    op: equals
    value: true
- rule_id: aws.neptune.cluster.encryption_at_rest_enabled
  for_each: aws.neptune.describe_d_b_clusters
  conditions:
    var: item.StorageEncrypted
    op: equals
    value: true
- rule_id: aws.neptune.cluster.cloudwatch_monitoring_alerting_enabled
  for_each: aws.neptune.describe_d_b_clusters
  conditions:
    all:
    - var: item.EnabledCloudwatchLogsExports
      op: exists
      value: null
    - var: item.EnabledCloudwatchLogsExports
      op: contains
      value:
      - audit
      - error
      - general
      - slowquery
- rule_id: aws.neptune.cluster.iam_db_authentication_enabled
  for_each: aws.neptune.describe_d_b_clusters
  conditions:
    var: item.IamDatabaseAuthenticationEnabled
    op: equals
    value: true
- rule_id: aws.neptune.cluster.neptune_integration_cloudwatch_logs_configured
  for_each: aws.neptune.describe_d_b_clusters
  conditions:
    all:
    - var: item.EnabledCloudwatchLogsExports
      op: exists
      value: null
    - var: item.EnabledCloudwatchLogsExports
      op: in
      value:
      - audit
      - error
      - general
      - slowquery
- rule_id: aws.neptune.cluster.deletion_protection_enabled
  for_each: aws.neptune.describe_d_b_clusters
  conditions:
    var: item.DeletionProtection
    op: equals
    value: true
- rule_id: aws.neptune.cluster.network_security_audit_configured
  for_each: aws.neptune.describe_d_b_clusters
  conditions:
    var: item.EnabledCloudwatchLogsExports
    op: contains
    value: audit
- rule_id: aws.neptune.cluster.private_networking_enforced
  for_each: aws.neptune.describe_d_b_clusters
  conditions:
    all:
    - var: item.DBSubnetGroup.Subnets.SubnetAvailabilityZone.Name
      op: exists
      value: null
    - var: item.DBSubnetGroup.Subnets.SubnetIdentifier
      op: exists
      value: null
    - var: item.VpcSecurityGroups.Status
      op: equals
      value: active
- rule_id: aws.neptune.instance.iam_or_managed_identity_auth_enabled_if_supported
  for_each: aws.neptune.describe_d_b_instances
  conditions:
    var: item.IamDatabaseAuthenticationEnabled
    op: equals
    value: true
- rule_id: aws.neptune.instance.deletion_protection_enabled
  for_each: aws.neptune.describe_d_b_instances
  conditions:
    var: item.DeletionProtection
    op: equals
    value: true
- rule_id: aws.neptune.cluster.encryption_at_rest_cmek_configured
  for_each: aws.neptune.describe_d_b_clusters
  conditions:
    all:
    - var: item.StorageEncrypted
      op: equals
      value: true
    - var: item.KmsKeyId
      op: exists
      value: null
- rule_id: aws.neptune.cluster.neptune_minor_version_auto_upgrade_enabled
  for_each: aws.neptune.describe_d_b_clusters
  conditions:
    var: item.AutoMinorVersionUpgrade
    op: equals
    value: true
- rule_id: aws.neptune.instance.encryption_at_rest_enabled
  for_each: aws.neptune.describe_d_b_instances
  conditions:
    var: item.StorageEncrypted
    op: equals
    value: true
- rule_id: aws.neptune.cluster.snapshot_encrypted
  for_each: aws.neptune.describe_d_b_cluster_snapshots
  conditions:
    var: item.Encrypted
    op: equals
    value: true
- rule_id: aws.neptune.cluster.neptune_multi_az_configured
  for_each: aws.neptune.describe_d_b_clusters
  conditions:
    var: item.MultiAZ
    op: equals
    value: true
- rule_id: aws.neptune.instance.public_access_disabled
  for_each: aws.neptune.describe_d_b_instances
  conditions:
    var: item.PubliclyAccessible
    op: equals
    value: false
- rule_id: aws.neptune.cluster.copy_tags_to_snapshots_configured
  for_each: aws.neptune.describe_d_b_clusters
  conditions:
    var: item.CopyTagsToSnapshot
    op: equals
    value: true
- rule_id: aws.neptune.cluster.audit_logging_enabled
  for_each: aws.neptune.describe_d_b_clusters
  conditions:
    var: item.EnabledCloudwatchLogsExports
    op: contains
    value: audit
- rule_id: aws.neptune.cluster.require_tls_in_transit_configured
  for_each: aws.neptune.describe_d_b_clusters
  conditions:
    var: item.IamDatabaseAuthenticationEnabled
    op: equals
    value: true
- rule_id: aws.neptune.cluster.encryption_in_transit_enforced
  for_each: aws.neptune.describe_d_b_clusters
  conditions:
    all:
    - var: item.StorageEncrypted
      op: equals
      value: true
    - var: item.IamDatabaseAuthenticationEnabled
      op: equals
      value: true
