version: '1.0'
provider: aws
service: sagemaker
services:
  client: sagemaker
  module: boto3.client
discovery:
- discovery_id: aws.sagemaker.list_endpoints
  calls:
  - action: list_endpoints
    save_as: response
  emit:
    items_for: '{{ response.Endpoints }}'
    as: item
    item:
      EndpointName: '{{ item.EndpointName }}'
      EndpointArn: '{{ item.EndpointArn }}'
      CreationTime: '{{ item.CreationTime }}'
      LastModifiedTime: '{{ item.LastModifiedTime }}'
      EndpointStatus: '{{ item.EndpointStatus }}'
- discovery_id: aws.sagemaker.list_flow_definitions
  calls:
  - action: list_flow_definitions
    params:
      MaxResults: 100
    on_error: continue
    save_as: response
  emit:
    items_for: '{{ response.FlowDefinitionSummaries }}'
    as: item
    item:
      FlowDefinitionName: '{{ item.FlowDefinitionName }}'
      FlowDefinitionArn: '{{ item.FlowDefinitionArn }}'
      FlowDefinitionStatus: '{{ item.FlowDefinitionStatus }}'
      CreationTime: '{{ item.CreationTime }}'
      FailureReason: '{{ item.FailureReason }}'
- discovery_id: aws.sagemaker.list_algorithms
  calls:
  - action: list_algorithms
    save_as: response
  emit:
    items_for: '{{ response.AlgorithmSummaryList }}'
    as: item
    item:
      AlgorithmName: '{{ item.AlgorithmName }}'
      AlgorithmArn: '{{ item.AlgorithmArn }}'
      AlgorithmDescription: '{{ item.AlgorithmDescription }}'
      CreationTime: '{{ item.CreationTime }}'
      AlgorithmStatus: '{{ item.AlgorithmStatus }}'
- discovery_id: aws.sagemaker.list_model_packages
  calls:
  - action: list_model_packages
    save_as: response
  emit:
    items_for: '{{ response.ModelPackageSummaryList }}'
    as: item
    item:
      ModelPackageName: '{{ item.ModelPackageName }}'
      ModelPackageGroupName: '{{ item.ModelPackageGroupName }}'
      ModelPackageVersion: '{{ item.ModelPackageVersion }}'
      ModelPackageArn: '{{ item.ModelPackageArn }}'
      ModelPackageDescription: '{{ item.ModelPackageDescription }}'
      CreationTime: '{{ item.CreationTime }}'
      ModelPackageStatus: '{{ item.ModelPackageStatus }}'
      ModelApprovalStatus: '{{ item.ModelApprovalStatus }}'
      ModelLifeCycle: '{{ item.ModelLifeCycle }}'
- discovery_id: aws.sagemaker.list_hyper_parameter_tuning_jobs
  calls:
  - action: list_hyper_parameter_tuning_jobs
    save_as: response
  emit:
    items_for: '{{ response.HyperParameterTuningJobSummaries }}'
    as: item
    item:
      HyperParameterTuningJobName: '{{ item.HyperParameterTuningJobName }}'
      HyperParameterTuningJobArn: '{{ item.HyperParameterTuningJobArn }}'
      HyperParameterTuningJobStatus: '{{ item.HyperParameterTuningJobStatus }}'
      CreationTime: '{{ item.CreationTime }}'
      TrainingJobStatusCounters: '{{ item.TrainingJobStatusCounters }}'
      ObjectiveStatusCounters: '{{ item.ObjectiveStatusCounters }}'
      ResourceLimits: '{{ item.ResourceLimits }}'
- discovery_id: aws.sagemaker.describe_hyper_parameter_tuning_job
  for_each: aws.sagemaker.list_hyper_parameter_tuning_jobs
  calls:
  - action: describe_hyper_parameter_tuning_job
    params:
      HyperParameterTuningJobName: '{{ item.HyperParameterTuningJobName }}'
    save_as: response
    on_error: continue
  emit: {}
- discovery_id: aws.sagemaker.list_training_jobs_for_hyper_parameter_tuning_job
  calls:
  - action: list_training_jobs
    save_as: response
  emit:
    items_for: '{{ response.TrainingJobSummaries }}'
    as: item
    item:
      TrainingJobName: '{{ item.TrainingJobName }}'
      TrainingJobArn: '{{ item.TrainingJobArn }}'
      CreationTime: '{{ item.CreationTime }}'
      TrainingEndTime: '{{ item.TrainingEndTime }}'
      LastModifiedTime: '{{ item.LastModifiedTime }}'
      TrainingJobStatus: '{{ item.TrainingJobStatus }}'
      SecondaryStatus: '{{ item.SecondaryStatus }}'
      WarmPoolStatus: '{{ item.WarmPoolStatus }}'
      TrainingPlanArn: '{{ item.TrainingPlanArn }}'
- discovery_id: aws.sagemaker.list_feature_groups
  calls:
  - action: list_feature_groups
    save_as: response
  emit:
    items_for: '{{ response.FeatureGroupSummaries }}'
    as: item
    item:
      FeatureGroupName: '{{ item.FeatureGroupName }}'
      FeatureGroupArn: '{{ item.FeatureGroupArn }}'
      CreationTime: '{{ item.CreationTime }}'
      FeatureGroupStatus: '{{ item.FeatureGroupStatus }}'
      OfflineStoreStatus: '{{ item.OfflineStoreStatus }}'
- discovery_id: aws.sagemaker.list_monitoring_schedules
  calls:
  - action: list_data_quality_job_definitions
    save_as: response
  emit:
    items_for: '{{ response.JobDefinitionSummaries }}'
    as: item
    item:
      MonitoringJobDefinitionName: '{{ item.MonitoringJobDefinitionName }}'
      MonitoringJobDefinitionArn: '{{ item.MonitoringJobDefinitionArn }}'
      CreationTime: '{{ item.CreationTime }}'
      EndpointName: '{{ item.EndpointName }}'
- discovery_id: aws.sagemaker.list_endpoint_configs
  calls:
  - action: list_endpoint_configs
    save_as: response
  emit:
    items_for: '{{ response.EndpointConfigs }}'
    as: item
    item:
      EndpointConfigName: '{{ item.EndpointConfigName }}'
      EndpointConfigArn: '{{ item.EndpointConfigArn }}'
      CreationTime: '{{ item.CreationTime }}'
- discovery_id: aws.sagemaker.list_ultra_servers_by_reserved_capacity
  calls:
  - action: list_notebook_instances
    save_as: response
  emit:
    items_for: '{{ response.NotebookInstances }}'
    as: item
    item:
      NotebookInstanceName: '{{ item.NotebookInstanceName }}'
      NotebookInstanceArn: '{{ item.NotebookInstanceArn }}'
      NotebookInstanceStatus: '{{ item.NotebookInstanceStatus }}'
      Url: '{{ item.Url }}'
      InstanceType: '{{ item.InstanceType }}'
      CreationTime: '{{ item.CreationTime }}'
      LastModifiedTime: '{{ item.LastModifiedTime }}'
      NotebookInstanceLifecycleConfigName: '{{ item.NotebookInstanceLifecycleConfigName }}'
      DefaultCodeRepository: '{{ item.DefaultCodeRepository }}'
      AdditionalCodeRepositories: '{{ item.AdditionalCodeRepositories }}'
- discovery_id: aws.sagemaker.list_auto_m_l_jobs
  calls:
  - action: list_auto_ml_jobs
    save_as: response
  emit:
    items_for: '{{ response.AutoMLJobSummaries }}'
    as: item
    item:
      AutoMLJobName: '{{ item.AutoMLJobName }}'
      AutoMLJobArn: '{{ item.AutoMLJobArn }}'
      AutoMLJobStatus: '{{ item.AutoMLJobStatus }}'
      AutoMLJobSecondaryStatus: '{{ item.AutoMLJobSecondaryStatus }}'
      CreationTime: '{{ item.CreationTime }}'
      EndTime: '{{ item.EndTime }}'
      LastModifiedTime: '{{ item.LastModifiedTime }}'
      FailureReason: '{{ item.FailureReason }}'
      PartialFailureReasons: '{{ item.PartialFailureReasons }}'
- discovery_id: aws.sagemaker.list_workforces
  calls:
  - action: list_workforces
    save_as: response
  emit:
    items_for: '{{ response.Workforces }}'
    as: item
    item:
      WorkforceName: '{{ item.WorkforceName }}'
      WorkforceArn: '{{ item.WorkforceArn }}'
      LastUpdatedDate: '{{ item.LastUpdatedDate }}'
      SourceIpConfig: '{{ item.SourceIpConfig }}'
      SubDomain: '{{ item.SubDomain }}'
      CognitoConfig: '{{ item.CognitoConfig }}'
      OidcConfig: '{{ item.OidcConfig }}'
      CreateDate: '{{ item.CreateDate }}'
      WorkforceVpcConfig: '{{ item.WorkforceVpcConfig }}'
      Status: '{{ item.Status }}'
      FailureReason: '{{ item.FailureReason }}'
      IpAddressType: '{{ item.IpAddressType }}'
- discovery_id: aws.sagemaker.describe_model_package
  for_each: aws.sagemaker.list_model_packages
  calls:
  - action: describe_model_package
    params:
      ModelPackageName: '{{ item.ModelPackageName }}'
    save_as: response
    on_error: continue
  emit: {}
- discovery_id: aws.sagemaker.list_inference_components
  calls:
  - action: list_endpoints
    save_as: response
  emit:
    items_for: '{{ response.Endpoints }}'
    as: item
    item:
      EndpointName: '{{ item.EndpointName }}'
      EndpointArn: '{{ item.EndpointArn }}'
      CreationTime: '{{ item.CreationTime }}'
      LastModifiedTime: '{{ item.LastModifiedTime }}'
      EndpointStatus: '{{ item.EndpointStatus }}'
- discovery_id: aws.sagemaker.list_apps
  calls:
  - action: list_apps
    save_as: response
  emit:
    items_for: '{{ response.Apps }}'
    as: item
    item:
      DomainId: '{{ item.DomainId }}'
      UserProfileName: '{{ item.UserProfileName }}'
      SpaceName: '{{ item.SpaceName }}'
      AppType: '{{ item.AppType }}'
      AppName: '{{ item.AppName }}'
      Status: '{{ item.Status }}'
      CreationTime: '{{ item.CreationTime }}'
      ResourceSpec: '{{ item.ResourceSpec }}'
- discovery_id: aws.sagemaker.list_device_fleets
  calls:
  - action: list_device_fleets
    params:
      MaxResults: 1000
    on_error: continue
    save_as: response
  emit:
    items_for: '{{ response.DeviceFleetSummaries }}'
    as: item
    item:
      DeviceFleetName: '{{ item.DeviceFleetName }}'
      DeviceFleetArn: '{{ item.DeviceFleetArn }}'
      CreationTime: '{{ item.CreationTime }}'
      LastModifiedTime: '{{ item.LastModifiedTime }}'
- discovery_id: aws.sagemaker.describe_device_fleet
  for_each: aws.sagemaker.list_device_fleets
  calls:
  - action: describe_device_fleet
    params:
      DeviceFleetName: '{{ item.DeviceFleetName }}'
    save_as: response
    on_error: continue
  emit: {}
- discovery_id: aws.sagemaker.list_transform_jobs
  calls:
  - action: list_transform_jobs
    save_as: response
  emit:
    items_for: '{{ response.TransformJobSummaries }}'
    as: item
    item:
      TransformJobName: '{{ item.TransformJobName }}'
      TransformJobArn: '{{ item.TransformJobArn }}'
      CreationTime: '{{ item.CreationTime }}'
      TransformEndTime: '{{ item.TransformEndTime }}'
      LastModifiedTime: '{{ item.LastModifiedTime }}'
      TransformJobStatus: '{{ item.TransformJobStatus }}'
      FailureReason: '{{ item.FailureReason }}'
- discovery_id: aws.sagemaker.list_edge_packaging_jobs
  calls:
  - action: list_edge_packaging_jobs
    params:
      MaxResults: 1000
    on_error: continue
    save_as: response
  emit:
    items_for: '{{ response.EdgePackagingJobSummaries }}'
    as: item
    item:
      EdgePackagingJobArn: '{{ item.EdgePackagingJobArn }}'
      EdgePackagingJobName: '{{ item.EdgePackagingJobName }}'
      EdgePackagingJobStatus: '{{ item.EdgePackagingJobStatus }}'
      CompilationJobName: '{{ item.CompilationJobName }}'
      ModelName: '{{ item.ModelName }}'
      ModelVersion: '{{ item.ModelVersion }}'
      CreationTime: '{{ item.CreationTime }}'
      LastModifiedTime: '{{ item.LastModifiedTime }}'
- discovery_id: aws.sagemaker.list_model_card_export_jobs
  calls:
  - action: list_actions
    save_as: response
  emit:
    items_for: '{{ response.ActionSummaries }}'
    as: item
    item:
      ActionArn: '{{ item.ActionArn }}'
      ActionName: '{{ item.ActionName }}'
      Source: '{{ item.Source }}'
      ActionType: '{{ item.ActionType }}'
      Status: '{{ item.Status }}'
      CreationTime: '{{ item.CreationTime }}'
      LastModifiedTime: '{{ item.LastModifiedTime }}'
- discovery_id: aws.sagemaker.list_experiments
  calls:
  - action: list_experiments
    save_as: response
  emit:
    items_for: '{{ response.ExperimentSummaries }}'
    as: item
    item:
      ExperimentArn: '{{ item.ExperimentArn }}'
      ExperimentName: '{{ item.ExperimentName }}'
      DisplayName: '{{ item.DisplayName }}'
      ExperimentSource: '{{ item.ExperimentSource }}'
      CreationTime: '{{ item.CreationTime }}'
      LastModifiedTime: '{{ item.LastModifiedTime }}'
- discovery_id: aws.sagemaker.list_data_quality_job_definitions
  calls:
  - action: list_data_quality_job_definitions
    save_as: response
  emit:
    items_for: '{{ response.JobDefinitionSummaries }}'
    as: item
    item:
      MonitoringJobDefinitionName: '{{ item.MonitoringJobDefinitionName }}'
      MonitoringJobDefinitionArn: '{{ item.MonitoringJobDefinitionArn }}'
      CreationTime: '{{ item.CreationTime }}'
      EndpointName: '{{ item.EndpointName }}'
- discovery_id: aws.sagemaker.list_pipelines
  calls:
  - action: list_inference_experiments
    save_as: response
  emit:
    items_for: '{{ response.NextToken }}'
    as: item
    item:
      Name: '{{ item.InferenceExperiments.Name }}'
      Type: '{{ item.InferenceExperiments.Type }}'
      Schedule: '{{ item.InferenceExperiments.Schedule }}'
      Status: '{{ item.InferenceExperiments.Status }}'
      StatusReason: '{{ item.InferenceExperiments.StatusReason }}'
      Description: '{{ item.InferenceExperiments.Description }}'
      CreationTime: '{{ item.InferenceExperiments.CreationTime }}'
      CompletionTime: '{{ item.InferenceExperiments.CompletionTime }}'
      LastModifiedTime: '{{ item.InferenceExperiments.LastModifiedTime }}'
      RoleArn: '{{ item.InferenceExperiments.RoleArn }}'
- discovery_id: aws.sagemaker.list_artifacts
  calls:
  - action: list_artifacts
    save_as: response
  emit:
    items_for: '{{ response.ArtifactSummaries }}'
    as: item
    item:
      ArtifactArn: '{{ item.ArtifactArn }}'
      ArtifactName: '{{ item.ArtifactName }}'
      Source: '{{ item.Source }}'
      ArtifactType: '{{ item.ArtifactType }}'
      CreationTime: '{{ item.CreationTime }}'
      LastModifiedTime: '{{ item.LastModifiedTime }}'
- discovery_id: aws.sagemaker.list_notebook_instances
  calls:
  - action: list_notebook_instances
    save_as: response
  emit:
    items_for: '{{ response.NotebookInstances }}'
    as: item
    item:
      NotebookInstanceName: '{{ item.NotebookInstanceName }}'
      NotebookInstanceArn: '{{ item.NotebookInstanceArn }}'
      NotebookInstanceStatus: '{{ item.NotebookInstanceStatus }}'
      Url: '{{ item.Url }}'
      InstanceType: '{{ item.InstanceType }}'
      CreationTime: '{{ item.CreationTime }}'
      LastModifiedTime: '{{ item.LastModifiedTime }}'
      NotebookInstanceLifecycleConfigName: '{{ item.NotebookInstanceLifecycleConfigName }}'
      DefaultCodeRepository: '{{ item.DefaultCodeRepository }}'
      AdditionalCodeRepositories: '{{ item.AdditionalCodeRepositories }}'
- discovery_id: aws.sagemaker.list_training_jobs
  calls:
  - action: list_training_jobs
    save_as: response
  emit:
    items_for: '{{ response.TrainingJobSummaries }}'
    as: item
    item:
      TrainingJobName: '{{ item.TrainingJobName }}'
      TrainingJobArn: '{{ item.TrainingJobArn }}'
      CreationTime: '{{ item.CreationTime }}'
      TrainingEndTime: '{{ item.TrainingEndTime }}'
      LastModifiedTime: '{{ item.LastModifiedTime }}'
      TrainingJobStatus: '{{ item.TrainingJobStatus }}'
      SecondaryStatus: '{{ item.SecondaryStatus }}'
      WarmPoolStatus: '{{ item.WarmPoolStatus }}'
      TrainingPlanArn: '{{ item.TrainingPlanArn }}'
- discovery_id: aws.sagemaker.list_clusters
  calls:
  - action: list_clusters
    save_as: response
  emit:
    items_for: '{{ response.ClusterSummaries }}'
    as: item
    item:
      ClusterArn: '{{ item.ClusterArn }}'
      ClusterName: '{{ item.ClusterName }}'
      CreationTime: '{{ item.CreationTime }}'
      ClusterStatus: '{{ item.ClusterStatus }}'
      TrainingPlanArns: '{{ item.TrainingPlanArns }}'
- discovery_id: aws.sagemaker.list_app_image_configs
  calls:
  - action: list_app_image_configs
    save_as: response
  emit:
    items_for: '{{ response.AppImageConfigs }}'
    as: item
    item:
      AppImageConfigArn: '{{ item.AppImageConfigArn }}'
      AppImageConfigName: '{{ item.AppImageConfigName }}'
      CreationTime: '{{ item.CreationTime }}'
      LastModifiedTime: '{{ item.LastModifiedTime }}'
      KernelGatewayImageConfig: '{{ item.KernelGatewayImageConfig }}'
      JupyterLabAppImageConfig: '{{ item.JupyterLabAppImageConfig }}'
      CodeEditorAppImageConfig: '{{ item.CodeEditorAppImageConfig }}'
- discovery_id: aws.sagemaker.list_pipeline_versions
  calls:
  - action: list_pipelines
    save_as: response
  emit:
    items_for: '{{ response.PipelineSummaries }}'
    as: item
    item:
      PipelineArn: '{{ item.PipelineArn }}'
      PipelineName: '{{ item.PipelineName }}'
      PipelineDisplayName: '{{ item.PipelineDisplayName }}'
      PipelineDescription: '{{ item.PipelineDescription }}'
      RoleArn: '{{ item.RoleArn }}'
      CreationTime: '{{ item.CreationTime }}'
      LastModifiedTime: '{{ item.LastModifiedTime }}'
      LastExecutionTime: '{{ item.LastExecutionTime }}'
- discovery_id: aws.sagemaker.list_hubs
  calls:
  - action: list_hubs
    save_as: response
  emit:
    items_for: '{{ response.HubSummaries }}'
    as: item
    item:
      HubName: '{{ item.HubName }}'
      HubArn: '{{ item.HubArn }}'
      HubDisplayName: '{{ item.HubDisplayName }}'
      HubDescription: '{{ item.HubDescription }}'
      HubSearchKeywords: '{{ item.HubSearchKeywords }}'
      HubStatus: '{{ item.HubStatus }}'
      CreationTime: '{{ item.CreationTime }}'
      LastModifiedTime: '{{ item.LastModifiedTime }}'
checks:
- rule_id: aws.sagemaker.endpoint.logging_enabled
  for_each: aws.sagemaker.list_endpoints
  conditions:
    var: item.EndpointStatus
    op: equals
    value: InService
- rule_id: aws.sagemaker.flowdefinition.workteam_access_rbac_least_privilege
  for_each: aws.sagemaker.list_flow_definitions
  conditions:
    all:
    - var: item.FlowDefinitionArn
      op: exists
      value: null
    - var: item.FlowDefinitionArn
      op: equals
      value: arn:aws:iam::123456789012:role/service-role/AmazonSageMaker-ExecutionRole-20200101T000001
- rule_id: aws.sagemaker.modelpackage.sagemaker_artifact_signed_and_verified
  for_each: aws.sagemaker.list_algorithms
  conditions:
    all:
    - var: item.AlgorithmStatus
      op: equals
      value: Completed
    - var: item.AlgorithmDescription
      op: not_equals
      value: null
- rule_id: aws.sagemaker.volume.and_output_encryption_enabled
  for_each: aws.sagemaker.list_endpoints
  conditions:
    all:
    - var: item.EndpointStatus
      op: equals
      value: InService
    - var: item.EndpointArn
      op: exists
      value: null
- rule_id: aws.sagemaker.modelpackage.encryption_at_rest_enabled
  for_each: aws.sagemaker.list_model_packages
  conditions:
    all:
    - var: item.ModelPackageSummaries.EncryptionKeyId
      op: exists
      value: null
    - var: item.ModelPackageSummaries.EncryptionKeyId
      op: not_equals
      value: ''
- rule_id: aws.sagemaker.trainingjob.vpc_configured
  for_each: aws.sagemaker.describe_hyper_parameter_tuning_job
  conditions:
    var: item.VpcConfig
    op: exists
    value: null
- rule_id: aws.sagemaker.trainingjob.output_encryption_enabled
  for_each: aws.sagemaker.list_training_jobs_for_hyper_parameter_tuning_job
  conditions:
    var: item.TrainingJobArn
    op: exists
    value: null
- rule_id: aws.sagemaker.featuregroup.online_store_kms_encryption_enabled
  for_each: aws.sagemaker.list_feature_groups
  conditions:
    var: item.FeatureGroupStatus
    op: equals
    value: ENABLED
- rule_id: aws.sagemaker.model.private_networking_enforced
  for_each: aws.sagemaker.describe_hyper_parameter_tuning_job
  conditions:
    var: item.VpcConfig
    op: exists
    value: null
- rule_id: aws.sagemaker.endpoint.security_group_restrictive_configured
  for_each: aws.sagemaker.list_monitoring_schedules
  conditions:
    all:
    - var: item.EndpointName
      op: exists
      value: null
    - var: item.EndpointStatus
      op: equals
      value: InService
- rule_id: aws.sagemaker.endpoint.role_least_privilege
  for_each: aws.sagemaker.list_endpoint_configs
  conditions:
    all:
    - var: item.EndpointConfigName
      op: exists
      value: null
    - var: item.EndpointConfigArn
      op: exists
      value: null
- rule_id: aws.sagemaker.endpoint_config_prod_variant_instances.endpoint_config_prod_variant_instances_configured
  for_each: aws.sagemaker.list_ultra_servers_by_reserved_capacity
  conditions:
    all:
    - var: item.InstanceType
      op: exists
      value: null
    - var: item.InitialInstanceCount
      op: greater_than
      value: '1'
- rule_id: aws.sagemaker.hyperparameter_tuning_job.logging_enabled
  for_each: aws.sagemaker.list_auto_m_l_jobs
  conditions:
    all:
    - var: item.AutoMLJobStatus
      op: equals
      value: Completed
    - var: item.AutoMLJobName
      op: exists
      value: null
- rule_id: aws.sagemaker.model.sagemaker_cross_account_sharing_restricted
  for_each: aws.sagemaker.list_algorithms
  conditions:
    all:
    - var: item.AlgorithmArn
      op: exists
      value: null
    - var: item.AlgorithmName
      op: exists
      value: null
- rule_id: aws.sagemaker.models_vpc_settings_configured.models_vpc_settings_configured_configured
  for_each: aws.sagemaker.list_workforces
  conditions:
    all:
    - var: item.VpcConfig.SecurityGroupIds
      op: exists
      value: null
    - var: item.VpcConfig.Subnets
      op: exists
      value: null
- rule_id: aws.sagemaker.model.sagemaker_kms_cmk_used_configured
  for_each: aws.sagemaker.describe_model_package
  conditions:
    var: item.Containers
    op: exists
    value: null
- rule_id: aws.sagemaker.pipeline.kms_encryption_enabled
  for_each: aws.sagemaker.list_inference_components
  conditions:
    var: item.EndpointArn
    op: exists
    value: null
- rule_id: aws.sagemaker.automljob.role_least_privilege
  for_each: aws.sagemaker.list_auto_m_l_jobs
  conditions:
    all:
    - var: item.AutoMLJobArn
      op: exists
      value: null
    - var: item.AutoMLJobArn
      op: not_equals
      value: arn:aws:iam::123456789012:role/service-role/AmazonSageMaker-ExecutionRole-20200101T000001
- rule_id: aws.sagemaker.instance.encryption_enabled
  for_each: aws.sagemaker.list_inference_components
  conditions:
    var: item.EndpointArn
    op: exists
    value: null
- rule_id: aws.sagemaker.trainingjob.volume_encryption_enabled
  for_each: aws.sagemaker.list_training_jobs_for_hyper_parameter_tuning_job
  conditions:
    var: item.TrainingJobArn
    op: exists
    value: null
- rule_id: aws.sagemaker.notebook.instance_encryption_enabled
  for_each: aws.sagemaker.list_apps
  conditions:
    var: item.ResourceSpec
    op: exists
    value: null
- rule_id: aws.sagemaker.training_jobs_vpc_settings_configured.training_jobs_vpc_settings_configured_configured
  for_each: aws.sagemaker.list_workforces
  conditions:
    all:
    - var: item.VpcConfig.SecurityGroupIds
      op: exists
      value: null
    - var: item.VpcConfig.Subnets
      op: exists
      value: null
- rule_id: aws.sagemaker.endpoint.in_vpc_configured
  for_each: aws.sagemaker.list_endpoints
  conditions:
    var: item.EndpointStatus
    op: equals
    value: InService
- rule_id: aws.sagemaker.endpoint_configuration.kms_keys_restricted
  for_each: aws.sagemaker.describe_device_fleet
  conditions:
    all:
    - var: item.KmsKeyId
      op: exists
      value: null
    - var: item.KmsKeyId
      op: not_equals
      value: ''
- rule_id: aws.sagemaker.notebook_instance.private_networking_enforced
  for_each: aws.sagemaker.list_endpoints
  conditions:
    var: item.SubnetId
    op: exists
    value: null
- rule_id: aws.sagemaker.transformjob.logging_enabled
  for_each: aws.sagemaker.list_transform_jobs
  conditions:
    all:
    - var: item.TransformJobStatus
