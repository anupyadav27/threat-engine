version: '1.0'
provider: aws
service: drs
services:
  client: drs
  module: boto3.client
discovery:
- discovery_id: aws.drs.describe_launch_configuration_templates
  calls:
  - action: describe_launch_configuration_templates
    save_as: response
  emit:
    items_for: '{{ response.items }}'
    as: item
    item:
      arn: '{{ item.arn }}'
      copyPrivateIp: '{{ item.copyPrivateIp }}'
      copyTags: '{{ item.copyTags }}'
      exportBucketArn: '{{ item.exportBucketArn }}'
      launchConfigurationTemplateID: '{{ item.launchConfigurationTemplateID }}'
      launchDisposition: '{{ item.launchDisposition }}'
      launchIntoSourceInstance: '{{ item.launchIntoSourceInstance }}'
      licensing: '{{ item.licensing }}'
      postLaunchEnabled: '{{ item.postLaunchEnabled }}'
      tags: '{{ item.tags }}'
      targetInstanceTypeRightSizingMethod: '{{ item.targetInstanceTypeRightSizingMethod }}'
checks:
- rule_id: aws.drs.resource.drs_failover_execution_configured
  for_each: aws.drs.describe_launch_configuration_templates
  conditions:
    all:
    - var: item.launchDisposition
      op: exists
      value: null
    - var: item.postLaunchEnabled
      op: equals
      value: 'true'

