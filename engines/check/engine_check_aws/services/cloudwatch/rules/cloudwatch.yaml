    all:
    - var: item.AlarmName
      op: exists
      value: null
    - var: item.AlarmActions
      op: exists
      value: null
    - var: item.StateValue
      op: equals
      value: ALARM
- rule_id: aws.cloudwatch.alarm_memory_utilization_configured.alarm_cloudwatch_alarm_memory_utilization_configured
  for_each: aws.cloudwatch.describe_alarm_history
  conditions:
