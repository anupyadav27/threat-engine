version: '1.0'
provider: aws
service: backup
services:
  client: backup
  module: boto3.client
discovery:
- discovery_id: aws.backup.get_backup_vault_notifications
  for_each: aws.backup.list_backup_vaults
  calls:
  - action: get_backup_vault_notifications
    params:
      BackupVaultName: '{{ item.BackupVaultName }}'
    save_as: response
    on_error: continue
  emit: {}
- discovery_id: aws.backup.list_copy_jobs
  calls:
  - action: list_backup_job_summaries
    save_as: response
  emit:
    items_for: '{{ response.BackupJobSummaries }}'
    as: item
    item:
      Region: '{{ item.Region }}'
      AccountId: '{{ item.AccountId }}'
      State: '{{ item.State }}'
      ResourceType: '{{ item.ResourceType }}'
      MessageCategory: '{{ item.MessageCategory }}'
      Count: '{{ item.Count }}'
      StartTime: '{{ item.StartTime }}'
      EndTime: '{{ item.EndTime }}'
- discovery_id: aws.backup.describe_backup_job
  for_each: aws.backup.list_backup_jobs
  calls:
  - action: describe_backup_job
    params:
      BackupJobId: '{{ item.BackupJobId }}'
    save_as: response
    on_error: continue
  emit: {}
- discovery_id: aws.backup.list_recovery_points_by_backup_vault
  calls:
  - action: list_backup_jobs
    save_as: response
  emit:
    items_for: '{{ response.BackupJobs }}'
    as: item
    item:
      AccountId: '{{ item.AccountId }}'
      BackupJobId: '{{ item.BackupJobId }}'
      BackupVaultName: '{{ item.BackupVaultName }}'
      BackupVaultArn: '{{ item.BackupVaultArn }}'
      VaultType: '{{ item.VaultType }}'
      VaultLockState: '{{ item.VaultLockState }}'
      RecoveryPointArn: '{{ item.RecoveryPointArn }}'
      RecoveryPointLifecycle: '{{ item.RecoveryPointLifecycle }}'
      EncryptionKeyArn: '{{ item.EncryptionKeyArn }}'
      IsEncrypted: '{{ item.IsEncrypted }}'
      ResourceArn: '{{ item.ResourceArn }}'
      CreationDate: '{{ item.CreationDate }}'
      CompletionDate: '{{ item.CompletionDate }}'
      State: '{{ item.State }}'
      StatusMessage: '{{ item.StatusMessage }}'
      PercentDone: '{{ item.PercentDone }}'
      BackupSizeInBytes: '{{ item.BackupSizeInBytes }}'
      IamRoleArn: '{{ item.IamRoleArn }}'
      CreatedBy: '{{ item.CreatedBy }}'
      ExpectedCompletionDate: '{{ item.ExpectedCompletionDate }}'
- discovery_id: aws.backup.list_restore_testing_selections
  calls:
  - action: list_backup_jobs
    save_as: response
  emit:
    items_for: '{{ response.BackupJobs }}'
    as: item
    item:
      AccountId: '{{ item.AccountId }}'
      BackupJobId: '{{ item.BackupJobId }}'
      BackupVaultName: '{{ item.BackupVaultName }}'
      BackupVaultArn: '{{ item.BackupVaultArn }}'
      VaultType: '{{ item.VaultType }}'
      VaultLockState: '{{ item.VaultLockState }}'
      RecoveryPointArn: '{{ item.RecoveryPointArn }}'
      RecoveryPointLifecycle: '{{ item.RecoveryPointLifecycle }}'
      EncryptionKeyArn: '{{ item.EncryptionKeyArn }}'
      IsEncrypted: '{{ item.IsEncrypted }}'
      ResourceArn: '{{ item.ResourceArn }}'
      CreationDate: '{{ item.CreationDate }}'
      CompletionDate: '{{ item.CompletionDate }}'
      State: '{{ item.State }}'
      StatusMessage: '{{ item.StatusMessage }}'
      PercentDone: '{{ item.PercentDone }}'
      BackupSizeInBytes: '{{ item.BackupSizeInBytes }}'
      IamRoleArn: '{{ item.IamRoleArn }}'
      CreatedBy: '{{ item.CreatedBy }}'
      ExpectedCompletionDate: '{{ item.ExpectedCompletionDate }}'
- discovery_id: aws.backup.list_restore_jobs_by_protected_resource
  calls:
  - action: list_backup_job_summaries
    save_as: response
  emit:
    items_for: '{{ response.BackupJobSummaries }}'
    as: item
    item:
      Region: '{{ item.Region }}'
      AccountId: '{{ item.AccountId }}'
      State: '{{ item.State }}'
      ResourceType: '{{ item.ResourceType }}'
      MessageCategory: '{{ item.MessageCategory }}'
      Count: '{{ item.Count }}'
      StartTime: '{{ item.StartTime }}'
      EndTime: '{{ item.EndTime }}'
- discovery_id: aws.backup.list_backup_plan_versions
  calls:
  - action: list_backup_plans
    params:
      MaxResults: 1000
    save_as: response
  emit:
    items_for: '{{ response.BackupPlansList }}'
    as: item
    item:
      BackupPlanArn: '{{ item.BackupPlanArn }}'
      BackupPlanId: '{{ item.BackupPlanId }}'
      CreationDate: '{{ item.CreationDate }}'
      DeletionDate: '{{ item.DeletionDate }}'
      VersionId: '{{ item.VersionId }}'
      BackupPlanName: '{{ item.BackupPlanName }}'
      CreatorRequestId: '{{ item.CreatorRequestId }}'
      LastExecutionDate: '{{ item.LastExecutionDate }}'
      AdvancedBackupSettings: '{{ item.AdvancedBackupSettings }}'
- discovery_id: aws.backup.list_scan_jobs
  calls:
  - action: list_backup_job_summaries
    save_as: response
  emit:
    items_for: '{{ response.BackupJobSummaries }}'
    as: item
    item:
      Region: '{{ item.Region }}'
      AccountId: '{{ item.AccountId }}'
      State: '{{ item.State }}'
      ResourceType: '{{ item.ResourceType }}'
      MessageCategory: '{{ item.MessageCategory }}'
      Count: '{{ item.Count }}'
      StartTime: '{{ item.StartTime }}'
      EndTime: '{{ item.EndTime }}'
- discovery_id: aws.backup.get_backup_vault_access_policy
  for_each: aws.backup.list_backup_vaults
  calls:
  - action: get_backup_vault_access_policy
    params:
      BackupVaultName: '{{ item.BackupVaultName }}'
    save_as: response
    on_error: continue
  emit: {}
- discovery_id: aws.backup.list_recovery_points_by_resource
  calls:
  - action: list_backup_jobs
    save_as: response
  emit:
    items_for: '{{ response.BackupJobs }}'
    as: item
    item:
      AccountId: '{{ item.AccountId }}'
      BackupJobId: '{{ item.BackupJobId }}'
      BackupVaultName: '{{ item.BackupVaultName }}'
      BackupVaultArn: '{{ item.BackupVaultArn }}'
      VaultType: '{{ item.VaultType }}'
      VaultLockState: '{{ item.VaultLockState }}'
      RecoveryPointArn: '{{ item.RecoveryPointArn }}'
      RecoveryPointLifecycle: '{{ item.RecoveryPointLifecycle }}'
      EncryptionKeyArn: '{{ item.EncryptionKeyArn }}'
      IsEncrypted: '{{ item.IsEncrypted }}'
      ResourceArn: '{{ item.ResourceArn }}'
      CreationDate: '{{ item.CreationDate }}'
      CompletionDate: '{{ item.CompletionDate }}'
      State: '{{ item.State }}'
      StatusMessage: '{{ item.StatusMessage }}'
      PercentDone: '{{ item.PercentDone }}'
      BackupSizeInBytes: '{{ item.BackupSizeInBytes }}'
      IamRoleArn: '{{ item.IamRoleArn }}'
      CreatedBy: '{{ item.CreatedBy }}'
      ExpectedCompletionDate: '{{ item.ExpectedCompletionDate }}'
- discovery_id: aws.backup.list_backup_selections
  calls:
  - action: list_backup_plans
    save_as: response
  emit:
    items_for: '{{ response.BackupPlansList }}'
    as: item
    item:
      BackupPlanArn: '{{ item.BackupPlanArn }}'
      BackupPlanId: '{{ item.BackupPlanId }}'
      CreationDate: '{{ item.CreationDate }}'
      DeletionDate: '{{ item.DeletionDate }}'
      VersionId: '{{ item.VersionId }}'
      BackupPlanName: '{{ item.BackupPlanName }}'
      CreatorRequestId: '{{ item.CreatorRequestId }}'
      LastExecutionDate: '{{ item.LastExecutionDate }}'
      AdvancedBackupSettings: '{{ item.AdvancedBackupSettings }}'
- discovery_id: aws.backup.list_backup_vaults
  calls:
  - action: list_backup_vaults
    params:
      MaxResults: 1000
    save_as: response
  emit:
    items_for: '{{ response.BackupVaultList }}'
    as: item
    item:
      BackupVaultName: '{{ item.BackupVaultName }}'
      BackupVaultArn: '{{ item.BackupVaultArn }}'
      VaultType: '{{ item.VaultType }}'
      VaultState: '{{ item.VaultState }}'
      CreationDate: '{{ item.CreationDate }}'
      EncryptionKeyArn: '{{ item.EncryptionKeyArn }}'
      CreatorRequestId: '{{ item.CreatorRequestId }}'
      NumberOfRecoveryPoints: '{{ item.NumberOfRecoveryPoints }}'
      Locked: '{{ item.Locked }}'
      MinRetentionDays: '{{ item.MinRetentionDays }}'
      MaxRetentionDays: '{{ item.MaxRetentionDays }}'
      LockDate: '{{ item.LockDate }}'
      EncryptionKeyType: '{{ item.EncryptionKeyType }}'
- discovery_id: aws.backup.list_report_plans
  calls:
  - action: list_report_plans
    params:
      MaxResults: 1000
    save_as: response
  emit:
    items_for: '{{ response.ReportPlans }}'
    as: item
    item:
      ReportPlanArn: '{{ item.ReportPlanArn }}'
      ReportPlanName: '{{ item.ReportPlanName }}'
      ReportPlanDescription: '{{ item.ReportPlanDescription }}'
      ReportSetting: '{{ item.ReportSetting }}'
      ReportDeliveryChannel: '{{ item.ReportDeliveryChannel }}'
      DeploymentStatus: '{{ item.DeploymentStatus }}'
      CreationTime: '{{ item.CreationTime }}'
      LastAttemptedExecutionTime: '{{ item.LastAttemptedExecutionTime }}'
      LastSuccessfulExecutionTime: '{{ item.LastSuccessfulExecutionTime }}'
- discovery_id: aws.backup.list_backup_jobs
  calls:
  - action: list_backup_jobs
    params:
      MaxResults: 1000
    save_as: response
  emit:
    items_for: '{{ response.BackupJobs }}'
    as: item
    item:
      AccountId: '{{ item.AccountId }}'
      BackupJobId: '{{ item.BackupJobId }}'
      BackupVaultName: '{{ item.BackupVaultName }}'
      BackupVaultArn: '{{ item.BackupVaultArn }}'
      VaultType: '{{ item.VaultType }}'
      VaultLockState: '{{ item.VaultLockState }}'
      RecoveryPointArn: '{{ item.RecoveryPointArn }}'
      RecoveryPointLifecycle: '{{ item.RecoveryPointLifecycle }}'
      EncryptionKeyArn: '{{ item.EncryptionKeyArn }}'
      IsEncrypted: '{{ item.IsEncrypted }}'
      ResourceArn: '{{ item.ResourceArn }}'
      CreationDate: '{{ item.CreationDate }}'
      CompletionDate: '{{ item.CompletionDate }}'
      State: '{{ item.State }}'
      StatusMessage: '{{ item.StatusMessage }}'
      PercentDone: '{{ item.PercentDone }}'
      BackupSizeInBytes: '{{ item.BackupSizeInBytes }}'
      IamRoleArn: '{{ item.IamRoleArn }}'
      CreatedBy: '{{ item.CreatedBy }}'
      ExpectedCompletionDate: '{{ item.ExpectedCompletionDate }}'
checks:
- rule_id: aws.backup.backupjob.alert_destinations_configured
  for_each: aws.backup.get_backup_vault_notifications
  conditions:
    all:
    - var: item.BackupVaultEvents
      op: exists
      value: null
    - var: item.SNSTopicArn
      op: exists
      value: null
- rule_id: aws.backup.backupjob.alert_rules_for_job_failures_configured
  for_each: aws.backup.get_backup_vault_notifications
  conditions:
    var: item.BackupVaultEvents
    op: in
    value:
    - BACKUP_JOB_FAILED
- rule_id: aws.backup.backupjob.alert_rules_for_sla_breach_configured
  for_each: aws.backup.list_copy_jobs
  conditions:
    all:
    - var: item.BackupJobs.MessageCategory
      op: equals
      value: SLA_BREACH
    - var: item.BackupJobs.StatusMessage
      op: exists
      value: null
- rule_id: aws.backup.backupjob.alerts_for_backup_failures_configured
  for_each: aws.backup.get_backup_vault_notifications
  conditions:
    var: item.BackupVaultEvents
    op: in
    value:
    - BACKUP_JOB_FAILED
- rule_id: aws.backup.backupjob.alerts_for_replication_lag_configured
  for_each: aws.backup.list_copy_jobs
  conditions:
    all:
    - var: item.BackupJobs.MessageCategory
      op: equals
      value: ReplicationLag
    - var: item.BackupJobs.StatusMessage
      op: exists
      value: null
- rule_id: aws.backup.backupjob.alerts_for_rpo_rto_breach_configured
  for_each: aws.backup.list_copy_jobs
  conditions:
    all:
    - var: item.BackupJobs.MessageCategory
      op: equals
      value: RPO_RTO_BREACH
    - var: item.BackupJobs.StatusMessage
      op: exists
      value: null
- rule_id: aws.backup.backupjob.backup_metrics_export_enabled
  for_each: aws.backup.describe_backup_job
  conditions:
    all:
    - var: item.BackupJobs.RecoveryPointLifecycle.DeleteAfterDays
      op: exists
      value: null
    - var: item.BackupJobs.RecoveryPointLifecycle.MoveToColdStorageAfterDays
      op: exists
      value: null
- rule_id: aws.backup.backupjob.backup_results_storage_encrypted_and_private
  for_each: aws.backup.list_recovery_points_by_backup_vault
  conditions:
    all:
    - var: item.BackupJobs.IsEncrypted
      op: equals
      value: 'true'
    - var: item.BackupJobs.BackupVaultName
      op: exists
      value: null
- rule_id: aws.backup.backupjob.execution_roles_least_privilege
  for_each: aws.backup.list_restore_testing_selections
  conditions:
    var: item.BackupJobs.IamRoleArn
    op: exists
    value: null
- rule_id: aws.backup.backupjob.logging_enabled
  for_each: aws.backup.list_restore_testing_selections
  conditions:
    all:
    - var: item.BackupJobs.IamRoleArn
      op: exists
      value: null
    - var: item.BackupJobs.StatusMessage
      op: exists
      value: null
- rule_id: aws.backup.backupjob.network_private_only_configured
  for_each: aws.backup.list_restore_jobs_by_protected_resource
  conditions:
    all:
    - var: item.BackupJobs.ResourceType
      op: equals
      value: AWS::EC2::Instance
    - var: item.BackupJobs.IamRoleArn
      op: exists
      value: null
- rule_id: aws.backup.backupjob.role_least_privilege
  for_each: aws.backup.list_restore_testing_selections
  conditions:
    var: item.IamRoleArn
    op: exists
    value: null
- rule_id: aws.backup.backupplan.auth_roles_least_privilege
  for_each: aws.backup.list_restore_testing_selections
  conditions:
    var: item.BackupJobs.IamRoleArn
    op: exists
    value: null
- rule_id: aws.backup.backupplan.backup_admins_mfa_required
  for_each: aws.backup.list_backup_plan_versions
  conditions:
    var: item.BackupPlansList.AdvancedBackupSettings
    op: exists
    value: null
- rule_id: aws.backup.backupplan.backup_approvals_required_for_changes
  for_each: aws.backup.list_backup_plan_versions
  conditions:
    var: item.BackupPlansList.AdvancedBackupSettings
    op: exists
    value: null
- rule_id: aws.backup.backupplan.backup_cross_region_replication_encrypted
  for_each: aws.backup.list_recovery_points_by_backup_vault
  conditions:
    all:
    - var: item.BackupJobs.IsEncrypted
      op: equals
      value: 'true'
    - var: item.BackupJobs.State
      op: equals
      value: COMPLETED
- rule_id: aws.backup.backupplan.backup_ec2_resources_included_configured
  for_each: aws.backup.list_restore_jobs_by_protected_resource
  conditions:
    all:
    - var: item.BackupPlansList.AdvancedBackupSettings.ResourceType
      op: equals
      value: EC2
    - var: item.BackupPlansList.AdvancedBackupSettings
      op: exists
      value: null
- rule_id: aws.backup.backupplan.backup_job_success_rate_minimum
  for_each: aws.backup.list_scan_jobs
  conditions:
    all:
    - var: item.State
      op: equals
      value: COMPLETED
    - var: item.CompletionDate
      op: exists
      value: null
- rule_id: aws.backup.backupplan.backup_keys_access_least_privilege
  for_each: aws.backup.list_backup_plan_versions
  conditions:
    all:
    - var: item.BackupPlansList.BackupPlanArn
      op: exists
      value: null
    - var: item.BackupPlansList.AdvancedBackupSettings
      op: exists
      value: null
- rule_id: aws.backup.backupplan.backup_plan_configured
  for_each: aws.backup.list_backup_plan_versions
  conditions:
    all:
    - var: item.BackupPlanArn
      op: exists
      value: null
    - var: item.AdvancedBackupSettings
      op: exists
      value: null
- rule_id: aws.backup.backupplan.backup_plans_configured
  for_each: aws.backup.list_backup_plan_versions
  conditions:
    all:
    - var: item.AdvancedBackupSettings
      op: exists
      value: null
    - var: item.CreationDate
      op: exists
      value: null
- rule_id: aws.backup.backupplan.backup_resource_discovery_synced_configured
  for_each: aws.backup.list_backup_plan_versions
  conditions:
    all:
    - var: item.BackupPlansList.AdvancedBackupSettings
      op: exists
      value: null
    - var: item.BackupPlansList.CreationDate
      op: exists
      value: null
- rule_id: aws.backup.backupplan.backup_retention_minimum_configured
  for_each: aws.backup.list_backup_plan_versions
  conditions:
    var: item.BackupPlansList.AdvancedBackupSettings
    op: exists
    value: null
- rule_id: aws.backup.backupplan.backup_storage_encrypted_and_private
  for_each: aws.backup.list_recovery_points_by_backup_vault
  conditions:
    all:
    - var: item.BackupVaultList.IsEncrypted
      op: equals
      value: 'true'
    - var: item.BackupVaultList.VaultType
      op: equals
      value: PRIVATE
- rule_id: aws.backup.backupplan.backup_vault_rbac_least_privilege
  for_each: aws.backup.get_backup_vault_access_policy
  conditions:
    var: item.Policy
    op: exists
    value: null
- rule_id: aws.backup.backupplan.change_audit_logging_enabled
  for_each: aws.backup.list_backup_plan_versions
  conditions:
    var: item.BackupPlansList.AdvancedBackupSettings
    op: exists
    value: null
- rule_id: aws.backup.backupplan.encryption_in_transit_tls_required
  for_each: aws.backup.list_recovery_points_by_backup_vault
  conditions:
    all:
    - var: item.BackupJobs.IsEncrypted
      op: equals
      value: 'true'
    - var: item.BackupJobs.EncryptionKeyArn
      op: exists
      value: null
- rule_id: aws.backup.backupplan.failed_jobs_alerting_enabled
  for_each: aws.backup.get_backup_vault_notifications
  conditions:
    var: item.BackupVaultEvents
    op: in
    value: BACKUP_JOB_FAILED
- rule_id: aws.backup.backupplan.lag_monitoring_alerts_enabled
  for_each: aws.backup.get_backup_vault_notifications
  conditions:
    var: item.BackupVaultEvents
    op: exists
    value: null
- rule_id: aws.backup.backupplan.last_backup_recency_within_days
  for_each: aws.backup.list_backup_plan_versions
  conditions:
    all:
    - var: item.BackupPlansList.LastExecutionDate
      op: exists
      value: null
    - var: item.BackupPlansList.AdvancedBackupSettings
      op: exists
      value: null
- rule_id: aws.backup.backupplan.no_public_access_to_backup_vault_configured
  for_each: aws.backup.list_recovery_points_by_resource
  conditions:
    var: item.BackupVaultList.VaultType
    op: equals
    value: PRIVATE
- rule_id: aws.backup.backupplan.policy_assignment_complete
  for_each: aws.backup.list_backup_selections
  conditions:
    all:
    - var: item.BackupPlansList.BackupPlanId
      op: exists
      value: null
    - var: item.BackupPlansList.AdvancedBackupSettings
      op: exists
      value: null
- rule_id: aws.backup.backupplan.retention_days_minimum
  for_each: aws.backup.list_backup_vaults
  conditions:
    var: item.MinRetentionDays
    op: greater_than
    value: '1'
- rule_id: aws.backup.backupplan.unprotected_assets_alerting_enabled
  for_each: aws.backup.get_backup_vault_notifications
  conditions:
    var: item.BackupVaultEvents
    op: in
    value:
    - BACKUP_JOB_FAILED
    - BACKUP_JOB_COMPLETED
- rule_id: aws.backup.backupvault.backup_cross_region_replication_enabled
  for_each: aws.backup.list_copy_jobs
  conditions:
    all:
    - var: item.DestinationBackupVaultArn
      op: exists
      value: null
    - var: item.State
      op: equals
      value: COMPLETED
- rule_id: aws.backup.backupvault.backup_destination_private_only_configured
  for_each: aws.backup.list_backup_vaults
  conditions:
    all:
    - var: item.BackupVaultList.Locked
      op: equals
      value: 'true'
    - var: item.BackupVaultList.MinRetentionDays
      op: greater_than
      value: '1'
- rule_id: aws.backup.backupvault.backup_immutable_or_worm_enabled_if_supported
  for_each: aws.backup.list_backup_vaults
  conditions:
    all:
    - var: item.BackupVaultList.Locked
      op: equals
      value: 'true'
    - var: item.BackupVaultList.VaultType
      op: equals
      value: WORM
- rule_id: aws.backup.backupvault.backup_schedule_defined_min_frequency_configured
  for_each: aws.backup.list_backup_vaults
  conditions:
    all:
    - var: item.BackupVaultList.MinRetentionDays
      op: exists
      value: null
    - var: item.BackupVaultList.MaxRetentionDays
      op: exists
      value: null
- rule_id: aws.backup.backupvault.backup_storage_immutability_enabled
  for_each: aws.backup.list_backup_vaults
  conditions:
    all:
    - var: item.BackupVaultList.Locked
      op: equals
      value: 'true'
    - var: item.BackupVaultList.MinRetentionDays
      op: exists
      value: null
- rule_id: aws.backup.backupvault.backup_vault_configured
  for_each: aws.backup.list_backup_vaults
  conditions:
    all:
    - var: item.BackupVaultList.MinRetentionDays
      op: greater_than
      value: '1'
    - var: item.BackupVaultList.MaxRetentionDays
      op: greater_than
      value: '0'
- rule_id: aws.backup.backupvault.backup_vaults_exist_configured
  for_each: aws.backup.list_recovery_points_by_resource
  conditions:
    all:
    - var: item.BackupVaultList.BackupVaultName
      op: exists
      value: null
    - var: item.BackupVaultList.MinRetentionDays
      op: greater_than
      value: '1'
- rule_id: aws.backup.backupvault.cmk_cmek_key_configured
  for_each: aws.backup.list_recovery_points_by_resource
  conditions:
    var: item.EncryptionKeyArn
    op: exists
    value: null
- rule_id: aws.backup.backupvault.encryption_at_rest_enabled
  for_each: aws.backup.list_recovery_points_by_resource
  conditions:
    all:
    - var: item.BackupVaultList.EncryptionKeyArn
      op: exists
      value: null
    - var: item.BackupVaultList.EncryptionKeyType
      op: in
      value:
      - AWS_KMS
      - AWS_MANAGED
- rule_id: aws.backup.backupvault.encryption_in_transit_tls_min_1_2_configured
  for_each: aws.backup.list_recovery_points_by_resource
  conditions:
    var: item.BackupVaultList.EncryptionKeyArn
    op: exists
    value: null
- rule_id: aws.backup.backupvault.key_policy_least_privilege
  for_each: aws.backup.get_backup_vault_access_policy
  conditions:
    var: item.Policy
    op: exists
    value: null
- rule_id: aws.backup.backupvault.key_rotation_enabled
  for_each: aws.backup.list_recovery_points_by_resource
  conditions:
    all:
