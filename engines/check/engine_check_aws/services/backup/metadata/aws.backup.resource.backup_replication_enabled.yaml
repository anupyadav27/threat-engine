remediation: 'Enable versioning for backup resource:


  1. Open BACKUP console

  2. Select the resource

  3. Go to Properties > Versioning

  4. Enable versioning

  5. Configure retention policies

  6. Set up lifecycle rules (optional)

  7. Save changes


