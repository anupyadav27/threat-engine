version: '1.0'
provider: aws
service: savingsplans
services:
  client: savingsplans
  module: boto3.client
discovery:
- discovery_id: aws.savingsplans.describe_savings_plans
  calls:
  - action: describe_savings_plans
    save_as: response
    params:
      MaxResults: 1000
  emit:
    items_for: '{{ response.savingsPlans }}'
    as: item
checks:
- rule_id: aws.savingsplans.savingsplan.savingsplans_approval_workflow_required
  for_each: aws.savingsplans.describe_savings_plans
  conditions:
    var: item.state
    op: equals
    value: active
- rule_id: aws.savingsplans.savingsplan.purchase_permissions_restricted
  for_each: aws.savingsplans.describe_savings_plans
  conditions:
    all:
    - var: item.state
      op: equals
      value: active
    - var: item.tags
      op: exists
      value: null
- rule_id: aws.savingsplans.savingsplan.billing_admins_mfa_required
  for_each: aws.savingsplans.describe_savings_plans
  conditions:
    var: item.state
    op: equals
    value: active
