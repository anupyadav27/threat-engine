version: '1.0'
provider: aws
service: autoscaling
services:
  client: autoscaling
  module: boto3.client
discovery:
- discovery_id: aws.autoscaling.describe_auto_scaling_groups
  calls:
  - action: describe_auto_scaling_groups
    save_as: response
    params:
      MaxResults: 1000
  emit:
    items_for: '{{ response.AutoScalingGroups }}'
    as: item
