description: Ensures AWS KAFKA cluster enforces encryption in transit using TLS 1.2
  or higher protocols. Unencrypted network traffic is vulnerable to man-in-the-middle
  attacks, packet sniffing, and session hijacking, exposing sensitive data during
  transmission.
