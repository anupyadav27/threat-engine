version: '1.0'
provider: aws
service: ec2
discovery:
- discovery_id: aws.eip.addresss
  calls:
  - action: list_eips
    fields:
    - Eips
    params:
      MaxResults: 1000
  emit:
    items_for: list_eips_response[]
checks:
- rule_id: aws.eip.address.address_enabled
  for_each: aws.eip.addresss
  conditions:
    var: item.compliant
    op: equals
    value: true
