  - encryption_at_rest
  - sensitive_data_protection
  priority: medium
  impact:
    gdpr: Article 32 - Encryption requirement for personal data
    pci: Requirement 3.4 - Render PAN unreadable via encryption
    hipaa: §164.312(a)(2)(iv) - Encryption of ePHI at rest
  sensitive_data_context: "Encryption is mandatory for all resources containing:\n\
    \    - PII (personally identifiable information)\n    - PCI data (credit card\
    \ information)\n    - PHI (protected health information)\n    - Financial records"
description: Verifies that AWS GLACIER vault has encryption at rest enabled using
  AWS KMS customer managed keys or AWS managed keys. Unencrypted data at rest is vulnerable
  to unauthorized access if physical storage media is compromised, AWS credentials
  are leaked, or insider threats occur.
references:
- https://docs.aws.amazon.com/wellarchitected/latest/security-pillar/welcome.html
remediation: "Enable encryption for glacier vault:\n\n1. Open GLACIER console\n2.\
  \ Select the vault\n3. Navigate to Properties/Configuration > Encryption\n4. Enable\
  \ encryption\n5. Choose encryption key:\n   - AWS managed key (default)\n   - Customer\
  \ managed key (KMS) for enhanced control\n6. Save changes\n\nAWS CLI:\naws glacier\
  \ modify-vault --vault-id <id> --encrypted --kms-key-id <key-id>\n\nSecurity Best\
  \ Practices:\n• Use customer-managed KMS keys for sensitive data\n• Enable automatic\
  \ key rotation\n• Implement proper key access policies\n• Audit key usage regularly"
