version: '1.0'
provider: aws
service: accessanalyzer
services:
  client: accessanalyzer
  module: boto3.client
discovery:
- discovery_id: aws.accessanalyzer.get_access_preview
  for_each: aws.accessanalyzer.list_access_previews
  calls:
  - action: get_access_preview
    params:
      accessPreviewId: '{{ item.id }}'
      analyzerArn: '{{ item.analyzerArn }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.accessPreview }}'
- discovery_id: aws.accessanalyzer.get_finding
  for_each: aws.accessanalyzer.list_findings
  calls:
  - action: get_finding
    params:
      analyzerArn: '{{ item.analyzerArn }}'
      id: '{{ item.id }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.finding }}'
- discovery_id: aws.accessanalyzer.get_generated_policy
  for_each: aws.accessanalyzer.list_policy_generations
  calls:
  - action: get_generated_policy
    params:
      jobId: '{{ item.jobId }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.jobDetails }}'
- discovery_id: aws.accessanalyzer.list_analyzers
  calls:
  - action: list_analyzers
    save_as: response
  emit:
    as: item
    items_for: '{{ response.analyzers }}'
    item:
      arn: '{{ item.arn }}'
      name: '{{ item.name }}'
      type: '{{ item.type }}'
      createdAt: '{{ item.createdAt }}'
      lastResourceAnalyzed: '{{ item.lastResourceAnalyzed }}'
      lastResourceAnalyzedAt: '{{ item.lastResourceAnalyzedAt }}'
      tags: '{{ item.tags }}'
      status: '{{ item.status }}'
      statusReason: '{{ item.statusReason }}'
      configuration: '{{ item.configuration }}'
- discovery_id: aws.accessanalyzer.get_analyzer
  for_each: aws.accessanalyzer.list_analyzers
  calls:
  - action: get_analyzer
    params:
      analyzerName: '{{ item.name }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.analyzer }}'
- discovery_id: aws.accessanalyzer.list_findings
  for_each: aws.accessanalyzer.list_analyzers
  calls:
  - action: list_findings
    params:
      analyzerArn: '{{ item.arn }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.findings }}'
- discovery_id: aws.accessanalyzer.list_findings_v2
  for_each: aws.accessanalyzer.list_analyzers
  calls:
  - action: list_findings_v2
    params:
      analyzerArn: '{{ item.arn }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.findings }}'
- discovery_id: aws.accessanalyzer.list_policy_generations
  calls:
  - action: list_policy_generations
    save_as: response
  emit:
    as: item
    items_for: '{{ response.policyGenerations }}'
    item:
      jobId: '{{ item.jobId }}'
      principalArn: '{{ item.principalArn }}'
      status: '{{ item.status }}'
      startedOn: '{{ item.startedOn }}'
      completedOn: '{{ item.completedOn }}'
- discovery_id: aws.accessanalyzer.list_access_previews
  for_each: aws.accessanalyzer.list_analyzers
  calls:
  - action: list_access_previews
    params:
      analyzerArn: '{{ item.arn }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.accessPreviews }}'
- discovery_id: aws.accessanalyzer.list_access_preview_findings
  for_each: aws.accessanalyzer.list_access_previews
  calls:
  - action: list_access_preview_findings
    params:
      accessPreviewId: '{{ item.id }}'
      analyzerArn: '{{ item.analyzerArn }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.findings }}'
- discovery_id: aws.accessanalyzer.get_analyzed_resource
  for_each: aws.accessanalyzer.list_findings
  calls:
  - action: get_analyzed_resource
    params:
      analyzerArn: '{{ item.analyzerArn }}'
      resourceArn: '{{ item.resource }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.resource }}'
checks:
- rule_id: aws.accessanalyzer.resource.access_analyzer_enabled
  for_each: aws.accessanalyzer.list_analyzers
  conditions:
    var: item.status
    op: equals
    value: ACTIVE
- rule_id: aws.accessanalyzer.resource.access_analyzer_enabled_without_findings
  for_each: aws.accessanalyzer.list_analyzers
  conditions:
    all:
    - var: item.status
      op: equals
      value: ACTIVE
    - var: item.statusReason
      op: not_exists
      value: null
