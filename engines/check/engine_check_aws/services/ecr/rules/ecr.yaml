version: '1.0'
provider: aws
service: ecr
services:
  client: ecr
  module: boto3.client
discovery:
- discovery_id: aws.ecr.describe_registry
  calls:
  - action: describe_registry
    save_as: response
  emit:
    item:
      replicationConfiguration: '{{ response.replicationConfiguration }}'
      registryId: '{{ response.registryId }}'
- discovery_id: aws.ecr.describe_repositories
  calls:
  - action: describe_repositories
    save_as: response
  emit:
    items_for: '{{ response.repositories }}'
    as: item
    item:
      repositoryArn: '{{ item.repositoryArn }}'
      registryId: '{{ item.registryId }}'
      repositoryName: '{{ item.repositoryName }}'
      repositoryUri: '{{ item.repositoryUri }}'
      createdAt: '{{ item.createdAt }}'
      imageTagMutability: '{{ item.imageTagMutability }}'
      imageScanningConfiguration: '{{ item.imageScanningConfiguration }}'
      encryptionConfiguration: '{{ item.encryptionConfiguration }}'
- discovery_id: aws.ecr.get_lifecycle_policy
  for_each: aws.ecr.describe_repositories
  calls:
  - action: get_lifecycle_policy
    params:
      repositoryName: '{{ item.repositoryName }}'
    save_as: response
    on_error: continue
  emit: {}
- discovery_id: aws.ecr.get_repository_policy
  for_each: aws.ecr.describe_repositories
  calls:
  - action: get_repository_policy
    params:
      repositoryName: '{{ item.repositoryName }}'
    save_as: response
  emit: {}
- discovery_id: aws.ecr.get_registry_scanning_configuration
  calls:
  - action: get_registry_scanning_configuration
    save_as: response
  emit:
    item:
      scanningConfiguration: '{{ response.scanningConfiguration }}'
      registryId: '{{ response.registryId }}'
checks:
- rule_id: aws.ecr.imagescan.ecr_agents_or_scanners_deployed_configured
  for_each: aws.ecr.get_registry_scanning_configuration
  conditions:
    var: item.scanningConfiguration.rules
    op: exists
    value: null
- rule_id: aws.ecr.imagescan.ecr_results_export_destination_encrypted
  for_each: aws.ecr.describe_repositories
  conditions:
    any:
    - var: item.encryptionConfiguration.encryptionType
      op: equals
      value: AES256
    - var: item.encryptionConfiguration.encryptionType
      op: equals
      value: KMS
- rule_id: aws.ecr.imagescan.scope_includes_all_asset_groups_configured
  for_each: aws.ecr.get_registry_scanning_configuration
  conditions:
    var: item.scanningConfiguration.rules
    op: exists
    value: null
- rule_id: aws.ecr.lifecyclepolicy.ecr_unused_or_old_tags_expire_configured
  for_each: aws.ecr.get_lifecycle_policy
  conditions:
    var: item.lifecyclePolicyText
    op: exists
    value: null
- rule_id: aws.ecr.lifecyclepolicy.policy_storage_encrypted
  for_each: aws.ecr.get_lifecycle_policy
  conditions:
    var: item.lifecyclePolicyText
    op: exists
    value: null
- rule_id: aws.ecr.replication_configuration.ecr_cross_region_encrypted
  for_each: aws.ecr.describe_registry
  conditions:
    var: item.replicationConfiguration.rules
    op: exists
    value: null
- rule_id: aws.ecr.replication_configuration.ecr_destinations_least_privilege
  for_each: aws.ecr.describe_registry
  conditions:
    var: item.replicationConfiguration.rules
    op: exists
    value: null
- rule_id: aws.ecr.repositories_not_publicly_accessible.repositories_not_publicly_accessible_configured
  for_each: aws.ecr.get_repository_policy
  conditions:
    var: item.policyText
    op: exists
    value: null
- rule_id: aws.ecr.repository.ecr_image_scanning_enabled
  for_each: aws.ecr.describe_repositories
  conditions:
    var: item.imageScanningConfiguration.scanOnPush
    op: equals
    value: true
- rule_id: aws.ecr.repository.immutable_tags_or_signing_enforced
  for_each: aws.ecr.describe_repositories
  conditions:
    var: item.imageTagMutability
    op: equals
    value: IMMUTABLE
- rule_id: aws.ecr.repository.repo_private_or_access_restricted
  for_each: aws.ecr.get_repository_policy
  conditions:
    var: item.policyText
    op: exists
    value: null
- rule_id: aws.ecr.repository_policy.ecr_no_wildcard_admin_configured
  for_each: aws.ecr.get_repository_policy
  conditions:
    var: item.policyText
    op: exists
    value: null
- rule_id: aws.ecr.repository_policy.no_public_pull_push_configured
  for_each: aws.ecr.get_repository_policy
  conditions:
    var: item.policyText
    op: exists
    value: null
- rule_id: aws.ecr.resource.ecr_image_scan_on_push_enabled
  for_each: aws.ecr.get_registry_scanning_configuration
  conditions:
    var: item.scanningConfiguration.scanType
    op: exists
    value: null
- rule_id: aws.ecr.resource.ecr_repository_scan_on_push_enabled
  for_each: aws.ecr.describe_repositories
  conditions:
    var: item.imageScanningConfiguration.scanOnPush
    op: equals
    value: true
- rule_id: aws.ecr.resource.repository_encryption_enabled
  for_each: aws.ecr.describe_repositories
  conditions:
    any:
    - var: item.encryptionConfiguration.encryptionType
      op: equals
      value: AES256
    - var: item.encryptionConfiguration.encryptionType
      op: equals
      value: KMS
