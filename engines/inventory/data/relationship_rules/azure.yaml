# Azure relationship rules — single source of truth (no hardcoding in Python)
# Run load_relationship_rules_to_db.py to sync to resource_relationship_rules table
# Fields use ARM API response structure (snake_case nested paths)
# resource_type format: microsoft.{namespace}/{resource} (lowercase ARM format)

csp: azure

rules:
  # ── Virtual Machine ──────────────────────────────────────────────────────────
  - from_resource_type: microsoft.compute/virtualmachines
    relation_type: attached_to
    to_resource_type: microsoft.network/networkinterfaces
    source_field: "properties.networkProfile.networkInterfaces"
    source_field_item: "id"
    target_uid_pattern: "{id}"

  - from_resource_type: microsoft.compute/virtualmachines
    relation_type: attached_to
    to_resource_type: microsoft.compute/disks
    source_field: "properties.storageProfile.osDisk.managedDisk.id"
    target_uid_pattern: "{id}"

  - from_resource_type: microsoft.compute/virtualmachines
    relation_type: attached_to
    to_resource_type: microsoft.compute/disks
    source_field: "properties.storageProfile.dataDisks"
    source_field_item: "managedDisk.id"
    target_uid_pattern: "{id}"

  - from_resource_type: microsoft.compute/virtualmachines
    relation_type: uses
    to_resource_type: microsoft.managedidentity/userassignedidentities
    source_field: "identity.userAssignedIdentities"
    source_field_item: "id"
    target_uid_pattern: "{id}"

  - from_resource_type: microsoft.compute/virtualmachines
    relation_type: contained_by
    to_resource_type: microsoft.resources/resourcegroups
    source_field: "resourceGroup"
    target_uid_pattern: "/subscriptions/{subscriptionId}/resourceGroups/{resourceGroup}"

  - from_resource_type: microsoft.compute/virtualmachines
    relation_type: member_of
    to_resource_type: microsoft.compute/availabilitysets
    source_field: "properties.availabilitySet.id"
    target_uid_pattern: "{id}"

  - from_resource_type: microsoft.compute/virtualmachines
    relation_type: uses
    to_resource_type: microsoft.compute/proximityplacementgroups
    source_field: "properties.proximityPlacementGroup.id"
    target_uid_pattern: "{id}"

  # ── Network Interface ─────────────────────────────────────────────────────────
  - from_resource_type: microsoft.network/networkinterfaces
    relation_type: contained_by
    to_resource_type: microsoft.network/virtualnetworks/subnets
    source_field: "properties.ipConfigurations"
    source_field_item: "properties.subnet.id"
    target_uid_pattern: "{id}"

  - from_resource_type: microsoft.network/networkinterfaces
    relation_type: attached_to
    to_resource_type: microsoft.network/networksecuritygroups
    source_field: "properties.networkSecurityGroup.id"
    target_uid_pattern: "{id}"

  - from_resource_type: microsoft.network/networkinterfaces
    relation_type: attached_to
    to_resource_type: microsoft.network/publicipaddresses
    source_field: "properties.ipConfigurations"
    source_field_item: "properties.publicIPAddress.id"
    target_uid_pattern: "{id}"

  - from_resource_type: microsoft.network/networkinterfaces
    relation_type: contained_by
    to_resource_type: microsoft.resources/resourcegroups
    source_field: "resourceGroup"
    target_uid_pattern: "/subscriptions/{subscriptionId}/resourceGroups/{resourceGroup}"

  # ── Virtual Network ───────────────────────────────────────────────────────────
  - from_resource_type: microsoft.network/virtualnetworks
    relation_type: contains
    to_resource_type: microsoft.network/virtualnetworks/subnets
    source_field: "properties.subnets"
    source_field_item: "id"
    target_uid_pattern: "{id}"

  - from_resource_type: microsoft.network/virtualnetworks
    relation_type: peers_with
    to_resource_type: microsoft.network/virtualnetworks
    source_field: "properties.virtualNetworkPeerings"
    source_field_item: "properties.remoteVirtualNetwork.id"
    target_uid_pattern: "{id}"

  - from_resource_type: microsoft.network/virtualnetworks
    relation_type: contained_by
    to_resource_type: microsoft.resources/resourcegroups
    source_field: "resourceGroup"
    target_uid_pattern: "/subscriptions/{subscriptionId}/resourceGroups/{resourceGroup}"

  # ── Subnet ────────────────────────────────────────────────────────────────────
  - from_resource_type: microsoft.network/virtualnetworks/subnets
    relation_type: attached_to
    to_resource_type: microsoft.network/networksecuritygroups
