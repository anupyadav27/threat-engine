# AWS relationship rules — single source of truth (no hardcoding in Python)
# Run load_relationship_rules_to_db.py to sync to resource_relationship_rules table

csp: aws

rules:
  - from_resource_type: ec2.instance
    relation_type: attached_to
    to_resource_type: ec2.security-group
    source_field: "SecurityGroups"
    source_field_item: "GroupId"
    target_uid_pattern: "arn:aws:ec2:{region}:{account_id}:security-group/{GroupId}"

  - from_resource_type: ec2.instance
    relation_type: contained_by
    to_resource_type: ec2.subnet
    source_field: "SubnetId"
    target_uid_pattern: "arn:aws:ec2:{region}:{account_id}:subnet/{SubnetId}"

  - from_resource_type: ec2.instance
