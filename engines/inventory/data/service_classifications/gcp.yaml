# =============================================================================

csp: gcp

classifications:

  # ── Identity ──
  - resource_type: iam.googleapis.com/ServiceAccount
    display_name: GCP Service Account
    scope: global
    category: identity
    subcategory: service_account
    service_model: SaaS
    managed_by: customer
    access_pattern: internal
    is_container: false
    container_parent: account
    diagram_priority: 1
    csp_category: IAM & Admin
