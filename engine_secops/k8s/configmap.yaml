apiVersion: v1
kind: ConfigMap
metadata:
  name: secops-scanner-config
  namespace: secops-engine
data:
  SCAN_INPUT_PATH: "/app/scan_input"
  SCAN_OUTPUT_PATH: "/app/scan_output"
  PYTHONUNBUFFERED: "1"
  S3_BUCKET: "cspm-lgtech"
  S3_PREFIX: "secops"
  S3_REGION: "ap-south-1"  # Mumbai region
  SYNC_INTERVAL: "60"  # Sync every 60 seconds
  AWS_REGION: "ap-south-1"

