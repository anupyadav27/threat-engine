version: '3.8'

services:
  scanner-api:
    build:
      context: .
      dockerfile: Dockerfile
    image: secops-scanner:latest
    container_name: secops-scanner
    ports:
      - "8000:8000"
    volumes:
      # Mount input folder (Jenkins clones repos here)
      - ./scan_input:/app/scan_input
      # Mount output folder (scan results saved here)
      - ./scan_output:/app/scan_output
    environment:
      - SCAN_INPUT_PATH=/app/scan_input
      - SCAN_OUTPUT_PATH=/app/scan_output
      - PYTHONUNBUFFERED=1
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - scanner-network

networks:
  scanner-network:
    driver: bridge

