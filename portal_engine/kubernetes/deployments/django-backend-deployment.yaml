apiVersion: apps/v1
kind: Deployment
metadata:
  name: django-backend
  namespace: cspm
  labels:
    app: cspm
    component: django-backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: cspm
      component: django-backend
  template:
    metadata:
      labels:
        app: cspm
        component: django-backend
    spec:
      serviceAccountName: cspm-service-account
      containers:
      - name: django-backend
        image: yadavanup84/cspm-django-backend:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8000
          name: http
        command: ["gunicorn"]
        args: ["cspm.wsgi:application", "--bind", "0.0.0.0:8000", "--workers", "2", "--timeout", "120"]
        env:
        - name: DB_HOST
          valueFrom:
            secretKeyRef:
              name: database-secret
              key: DB_HOST
        - name: DB_USER
          valueFrom:
            secretKeyRef:
              name: database-secret
              key: DB_USER
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: database-secret
              key: DB_PASSWORD
        - name: DB_NAME
          valueFrom:
            secretKeyRef:
              name: database-secret
              key: DB_NAME
        - name: DB_PORT
          valueFrom:
            configMapKeyRef:
              name: cspm-config
              key: DB_PORT
        - name: DB_SCHEMA
          valueFrom:
            configMapKeyRef:
              name: cspm-config
              key: DB_SCHEMA
        - name: DB_SSLMODE
          valueFrom:
            configMapKeyRef:
              name: cspm-config
              key: DB_SSLMODE
        - name: SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: database-secret
              key: SECRET_KEY
        - name: DEBUG
          valueFrom:
            configMapKeyRef:
              name: django-config
              key: DEBUG
        - name: ALLOWED_HOSTS
          valueFrom:
            configMapKeyRef:
              name: django-config
              key: ALLOWED_HOSTS
        - name: FRONTEND_URL
          valueFrom:
            configMapKeyRef:
              name: django-config
              key: FRONTEND_URL
        - name: ACCESS_TOKEN_LIFETIME_MINUTES
          valueFrom:
            configMapKeyRef:
              name: django-config
              key: ACCESS_TOKEN_LIFETIME_MINUTES
        - name: REFRESH_TOKEN_LIFETIME_DAYS
          valueFrom:
            configMapKeyRef:
              name: django-config
              key: REFRESH_TOKEN_LIFETIME_DAYS
        - name: DJANGO_SETTINGS_MODULE
          value: "cspm.settings"
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "250m"
        startupProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 5
          periodSeconds: 5
          timeoutSeconds: 5
          failureThreshold: 60
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 60
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 20
          periodSeconds: 5
          timeoutSeconds: 5
          failureThreshold: 6
        volumeMounts:
        - name: secrets-store
          mountPath: /mnt/secrets-store
          readOnly: true
      initContainers:
      - name: migrate
        image: yadavanup84/cspm-django-backend:latest
        command: ["python", "manage.py", "migrate", "--noinput"]
        env:
        - name: DB_HOST
          valueFrom:
            secretKeyRef:
              name: database-secret
              key: DB_HOST
        - name: DB_USER
          valueFrom:
            secretKeyRef:
              name: database-secret
              key: DB_USER
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: database-secret
              key: DB_PASSWORD
        - name: DB_NAME
          valueFrom:
            secretKeyRef:
              name: database-secret
              key: DB_NAME
        - name: DB_PORT
          valueFrom:
            configMapKeyRef:
              name: cspm-config
              key: DB_PORT


      volumes:
      - name: secrets-store
        csi:
          driver: secrets-store.csi.k8s.io
          readOnly: true
          volumeAttributes:
            secretProviderClass: "cspm-database-secrets"
