apiVersion: v1
kind: ConfigMap
metadata:
  name: cspm-config
  namespace: cspm
  labels:
    app: cspm
data:
  # Database Configuration (PostgreSQL)
  DB_NAME: "cspm"
  DB_PORT: "5432"
  DB_SCHEMA: "public"
  DB_SSLMODE: "require"
  
  # AWS Services
  AWS_REGION: "ap-south-1"
  SECRETS_MANAGER_PREFIX: "threat-engine"
  SECRETS_MANAGER_KMS_KEY_ID: "alias/threat-engine-secrets"
  PLATFORM_AWS_ACCOUNT_ID: "588989875114"
  
  # API Configuration
  API_HOST: "0.0.0.0"
  API_PORT: "8000"
  LOG_LEVEL: "INFO"
  
  # Scheduler
  SCHEDULER_INTERVAL_SECONDS: "60"
  
  # Engine URLs (ClusterIP for internal communication)
  AWS_ENGINE_URL: "http://aws-compliance-engine.threat-engine-engines.svc.cluster.local"
  AZURE_ENGINE_URL: "http://azure-compliance-engine.threat-engine-engines.svc.cluster.local"
  GCP_ENGINE_URL: "http://gcp-compliance-engine.threat-engine-engines.svc.cluster.local"
  ALICLOUD_ENGINE_URL: "http://alicloud-compliance-engine.threat-engine-engines.svc.cluster.local"
  OCI_ENGINE_URL: "http://oci-compliance-engine.threat-engine-engines.svc.cluster.local"
  IBM_ENGINE_URL: "http://ibm-compliance-engine.threat-engine-engines.svc.cluster.local"
  YAML_RULE_BUILDER_URL: "http://yaml-rule-builder.threat-engine-engines.svc.cluster.local"

