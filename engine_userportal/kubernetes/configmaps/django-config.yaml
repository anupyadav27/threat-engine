apiVersion: v1
kind: ConfigMap
metadata:
  name: django-config
  namespace: cspm
  labels:
    app: cspm
    component: django-backend
data:
  # Django Settings
  DEBUG: "False"
  ALLOWED_HOSTS: "*"
  FRONTEND_URL: "http://localhost:3000"
  
  # Token Settings
  ACCESS_TOKEN_LIFETIME_MINUTES: "15"
  REFRESH_TOKEN_LIFETIME_DAYS: "7"
  
  # Database (will be overridden by Secret)
  DB_SCHEMA: "public"
  
  # CORS
  CORS_ALLOWED_ORIGINS: "http://localhost:3000"

