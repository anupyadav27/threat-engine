apiVersion: v1
kind: Service
metadata:
  name: onboarding-api
  namespace: cspm
  labels:
    app: cspm
    component: onboarding-api
spec:
  type: ClusterIP
  ports:
  - port: 8000
    targetPort: 8000
    protocol: TCP
    name: http
  selector:
    app: cspm
    component: onboarding-api

---
apiVersion: v1
kind: Service
metadata:
  name: onboarding-api-external
  namespace: cspm
  labels:
    app: cspm
    component: onboarding-api
spec:
  type: LoadBalancer
  ports:
  - port: 80
    targetPort: 8000
    protocol: TCP
    name: http
  selector:
    app: cspm
    component: onboarding-api

