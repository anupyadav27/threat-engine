apiVersion: v1
kind: Service
metadata:
  name: django-backend
  namespace: cspm
  labels:
    app: cspm
    component: django-backend
spec:
  type: ClusterIP
  ports:
  - port: 8000
    targetPort: 8000
    protocol: TCP
    name: http
  selector:
    app: cspm
    component: django-backend

---
apiVersion: v1
kind: Service
metadata:
  name: django-backend-external
  namespace: cspm
  labels:
    app: cspm
    component: django-backend
spec:
  type: LoadBalancer
  ports:
  - port: 80
    targetPort: 8000
    protocol: TCP
    name: http
  selector:
    app: cspm
    component: django-backend

