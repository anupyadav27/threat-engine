apiVersion: apps/v1
kind: Deployment
metadata:
  name: onboarding-api
  namespace: cspm
  labels:
    app: cspm
    component: onboarding-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: cspm
      component: onboarding-api
  template:
    metadata:
      labels:
        app: cspm
        component: onboarding-api
    spec:
      serviceAccountName: cspm-service-account
      containers:
      - name: onboarding-api
        image: yadavanup84/cspm-onboarding-api:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8000
          name: http
        env:
        - name: DB_HOST
          valueFrom:
            secretKeyRef:
              name: database-secret
              key: DB_HOST
        - name: DB_USER
          valueFrom:
            secretKeyRef:
              name: database-secret
              key: DB_USER
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: database-secret
              key: DB_PASSWORD
        - name: DB_NAME
          valueFrom:
            secretKeyRef:
              name: database-secret
              key: DB_NAME
        - name: DB_PORT
          valueFrom:
            configMapKeyRef:
              name: cspm-config
              key: DB_PORT
        - name: AWS_REGION
          valueFrom:
            configMapKeyRef:
              name: cspm-config
              key: AWS_REGION
        - name: SECRETS_MANAGER_PREFIX
          valueFrom:
            configMapKeyRef:
              name: cspm-config
              key: SECRETS_MANAGER_PREFIX
        - name: SECRETS_MANAGER_KMS_KEY_ID
          valueFrom:
            configMapKeyRef:
              name: cspm-config
              key: SECRETS_MANAGER_KMS_KEY_ID
        - name: PLATFORM_AWS_ACCOUNT_ID
          valueFrom:
            configMapKeyRef:
              name: cspm-config
              key: PLATFORM_AWS_ACCOUNT_ID
        - name: API_HOST
          valueFrom:
            configMapKeyRef:
              name: cspm-config
              key: API_HOST
        - name: API_PORT
          valueFrom:
            configMapKeyRef:
              name: cspm-config
              key: API_PORT
        - name: LOG_LEVEL
          valueFrom:
            configMapKeyRef:
              name: cspm-config
              key: LOG_LEVEL
        - name: AWS_ENGINE_URL
          valueFrom:
            configMapKeyRef:
              name: cspm-config
              key: AWS_ENGINE_URL
        - name: AZURE_ENGINE_URL
          valueFrom:
            configMapKeyRef:
              name: cspm-config
              key: AZURE_ENGINE_URL
        - name: GCP_ENGINE_URL
          valueFrom:
            configMapKeyRef:
              name: cspm-config
              key: GCP_ENGINE_URL
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "200m"
        livenessProbe:
          httpGet:
            path: /api/v1/health
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /api/v1/health
            port: 8000
          initialDelaySeconds: 10
          periodSeconds: 5
        volumeMounts:
        - name: secrets-store
          mountPath: /mnt/secrets-store
          readOnly: true
      volumes:
      - name: secrets-store
        csi:
          driver: secrets-store.csi.k8s.io
          readOnly: true
          volumeAttributes:
            secretProviderClass: "cspm-database-secrets"

