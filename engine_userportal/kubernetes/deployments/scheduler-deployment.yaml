apiVersion: apps/v1
kind: Deployment
metadata:
  name: scheduler-service
  namespace: cspm
  labels:
    app: cspm
    component: scheduler
spec:
  replicas: 1
  selector:
    matchLabels:
      app: cspm
      component: scheduler
  template:
    metadata:
      labels:
        app: cspm
        component: scheduler
    spec:
      serviceAccountName: cspm-service-account
      containers:
      - name: scheduler
        image: yadavanup84/cspm-scheduler:latest
        imagePullPolicy: Always
        env:
        - name: DB_HOST
          valueFrom:
            secretKeyRef:
              name: database-secret
              key: DB_HOST
        - name: DB_USER
          valueFrom:
            secretKeyRef:
              name: database-secret
              key: DB_USER
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: database-secret
              key: DB_PASSWORD
        - name: DB_NAME
          valueFrom:
            secretKeyRef:
              name: database-secret
              key: DB_NAME
        - name: DB_PORT
          valueFrom:
            configMapKeyRef:
              name: cspm-config
              key: DB_PORT
        - name: AWS_REGION
          valueFrom:
            configMapKeyRef:
              name: cspm-config
              key: AWS_REGION
        - name: SECRETS_MANAGER_PREFIX
          valueFrom:
            configMapKeyRef:
              name: cspm-config
              key: SECRETS_MANAGER_PREFIX
        - name: SECRETS_MANAGER_KMS_KEY_ID
          valueFrom:
            configMapKeyRef:
              name: cspm-config
              key: SECRETS_MANAGER_KMS_KEY_ID
        - name: SCHEDULER_INTERVAL_SECONDS
          valueFrom:
            configMapKeyRef:
              name: cspm-config
              key: SCHEDULER_INTERVAL_SECONDS
        - name: LOG_LEVEL
          valueFrom:
            configMapKeyRef:
              name: cspm-config
              key: LOG_LEVEL
        resources:
          requests:
            memory: "128Mi"
            cpu: "50m"
          limits:
            memory: "256Mi"
            cpu: "100m"
        volumeMounts:
        - name: secrets-store
          mountPath: /mnt/secrets-store
          readOnly: true
      volumes:
      - name: secrets-store
        csi:
          driver: secrets-store.csi.k8s.io
          readOnly: true
          volumeAttributes:
            secretProviderClass: "cspm-database-secrets"

