apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: cspm-database-secrets
  namespace: cspm
spec:
  provider: aws
  secretObjects:
  - secretName: database-secret
    type: Opaque
    data:
    - objectName: "DB_HOST"
      key: "DB_HOST"
    - objectName: "DB_USER"
      key: "DB_USER"
    - objectName: "DB_PASSWORD"
      key: "DB_PASSWORD"
    - objectName: "DB_NAME"
      key: "DB_NAME"
    - objectName: "SECRET_KEY"
      key: "SECRET_KEY"
  parameters:
    objects: |
      - objectName: "cspm/database-credentials"
        objectType: "secretsmanager"
        jmesPath:
          - path: "DB_HOST"
            objectAlias: "DB_HOST"
          - path: "DB_USER"
            objectAlias: "DB_USER"
          - path: "DB_PASSWORD"
            objectAlias: "DB_PASSWORD"
          - path: "DB_NAME"
            objectAlias: "DB_NAME"
          - path: "SECRET_KEY"
            objectAlias: "SECRET_KEY"
