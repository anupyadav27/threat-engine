version: '1.0'
provider: aws
service: codeartifact
services:
  client: codeartifact
  module: boto3.client
discovery:
- discovery_id: aws.codeartifact.list_domains
  calls:
  - action: list_domains
    save_as: response
  emit:
    items_for: '{{ response.domains }}'
    as: item
    item:
      name: '{{ item.name }}'
      owner: '{{ item.owner }}'
      arn: '{{ item.arn }}'
      status: '{{ item.status }}'
- discovery_id: aws.codeartifact.list_repositories_in_domain
  for_each: aws.codeartifact.list_domains
  calls:
  - action: list_repositories_in_domain
    params:
      domain: '{{ item.name }}'
    save_as: response
  emit:
    items_for: '{{ response.repositories }}'
    as: item
- discovery_id: aws.codeartifact.describe_repository
  for_each: aws.codeartifact.list_repositories_in_domain
  calls:
  - action: describe_repository
    params:
      domain: '{{ item.domainName }}'
      repository: '{{ item.name }}'
    save_as: response
  emit: {}
checks:
- rule_id: aws.codeartifact.resource.packages_external_public_publishing_disabled
  for_each: aws.codeartifact.describe_repository
  conditions:
    var: item.externalConnections
    op: equals
    value: []
