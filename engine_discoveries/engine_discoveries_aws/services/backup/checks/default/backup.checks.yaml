version: '1.0'
provider: aws
service: backup
checks:
- rule_id: aws.backup.backupjob.alert_destinations_configured
  for_each: aws.backup.get_backup_vault_notifications
  conditions:
    all:
    - var: item.BackupVaultEvents
      op: exists
      value: null
    - var: item.SNSTopicArn
      op: exists
      value: null
- rule_id: aws.backup.backupjob.alert_rules_for_job_failures_configured
  for_each: aws.backup.get_backup_vault_notifications
  conditions:
    var: item.BackupVaultEvents
    op: in
    value:
    - BACKUP_JOB_FAILED
- rule_id: aws.backup.backupjob.alert_rules_for_sla_breach_configured
  for_each: aws.backup.list_copy_jobs
  conditions:
    all:
    - var: item.BackupJobs.MessageCategory
      op: equals
      value: SLA_BREACH
    - var: item.BackupJobs.StatusMessage
      op: exists
      value: null
- rule_id: aws.backup.backupjob.alerts_for_backup_failures_configured
  for_each: aws.backup.get_backup_vault_notifications
  conditions:
    var: item.BackupVaultEvents
    op: in
    value:
    - BACKUP_JOB_FAILED
- rule_id: aws.backup.backupjob.alerts_for_replication_lag_configured
  for_each: aws.backup.list_copy_jobs
  conditions:
    all:
    - var: item.BackupJobs.MessageCategory
      op: equals
      value: ReplicationLag
    - var: item.BackupJobs.StatusMessage
      op: exists
      value: null
- rule_id: aws.backup.backupjob.alerts_for_rpo_rto_breach_configured
  for_each: aws.backup.list_copy_jobs
  conditions:
    all:
    - var: item.BackupJobs.MessageCategory
      op: equals
      value: RPO_RTO_BREACH
    - var: item.BackupJobs.StatusMessage
      op: exists
      value: null
- rule_id: aws.backup.backupjob.backup_metrics_export_enabled
  for_each: aws.backup.describe_backup_job
  conditions:
    all:
    - var: item.BackupJobs.RecoveryPointLifecycle.DeleteAfterDays
      op: exists
      value: null
    - var: item.BackupJobs.RecoveryPointLifecycle.MoveToColdStorageAfterDays
      op: exists
      value: null
- rule_id: aws.backup.backupjob.backup_results_storage_encrypted_and_private
  for_each: aws.backup.list_recovery_points_by_backup_vault
  conditions:
    all:
    - var: item.BackupJobs.IsEncrypted
      op: equals
      value: 'true'
    - var: item.BackupJobs.BackupVaultName
      op: exists
      value: null
- rule_id: aws.backup.backupjob.execution_roles_least_privilege
  for_each: aws.backup.list_restore_testing_selections
  conditions:
    var: item.BackupJobs.IamRoleArn
    op: exists
    value: null
- rule_id: aws.backup.backupjob.logging_enabled
  for_each: aws.backup.list_restore_testing_selections
  conditions:
    all:
    - var: item.BackupJobs.IamRoleArn
      op: exists
      value: null
    - var: item.BackupJobs.StatusMessage
      op: exists
      value: null
- rule_id: aws.backup.backupjob.network_private_only_configured
  for_each: aws.backup.list_restore_jobs_by_protected_resource
  conditions:
    all:
    - var: item.BackupJobs.ResourceType
      op: equals
      value: AWS::EC2::Instance
    - var: item.BackupJobs.IamRoleArn
      op: exists
      value: null
- rule_id: aws.backup.backupjob.role_least_privilege
  for_each: aws.backup.list_restore_testing_selections
  conditions:
    var: item.IamRoleArn
    op: exists
    value: null
- rule_id: aws.backup.backupplan.auth_roles_least_privilege
  for_each: aws.backup.list_restore_testing_selections
  conditions:
    var: item.BackupJobs.IamRoleArn
    op: exists
    value: null
- rule_id: aws.backup.backupplan.backup_admins_mfa_required
  for_each: aws.backup.list_backup_plan_versions
  conditions:
    var: item.BackupPlansList.AdvancedBackupSettings
    op: exists
    value: null
- rule_id: aws.backup.backupplan.backup_approvals_required_for_changes
  for_each: aws.backup.list_backup_plan_versions
  conditions:
    var: item.BackupPlansList.AdvancedBackupSettings
    op: exists
    value: null
- rule_id: aws.backup.backupplan.backup_cross_region_replication_encrypted
  for_each: aws.backup.list_recovery_points_by_backup_vault
  conditions:
    all:
    - var: item.BackupJobs.IsEncrypted
      op: equals
      value: 'true'
    - var: item.BackupJobs.State
      op: equals
      value: COMPLETED
- rule_id: aws.backup.backupplan.backup_ec2_resources_included_configured
  for_each: aws.backup.list_restore_jobs_by_protected_resource
  conditions:
    all:
    - var: item.BackupPlansList.AdvancedBackupSettings.ResourceType
      op: equals
      value: EC2
    - var: item.BackupPlansList.AdvancedBackupSettings
      op: exists
      value: null
- rule_id: aws.backup.backupplan.backup_job_success_rate_minimum
  for_each: aws.backup.list_scan_jobs
  conditions:
    all:
    - var: item.State
      op: equals
      value: COMPLETED
    - var: item.CompletionDate
      op: exists
      value: null
- rule_id: aws.backup.backupplan.backup_keys_access_least_privilege
  for_each: aws.backup.list_backup_plan_versions
  conditions:
    all:
    - var: item.BackupPlansList.BackupPlanArn
      op: exists
      value: null
    - var: item.BackupPlansList.AdvancedBackupSettings
      op: exists
      value: null
- rule_id: aws.backup.backupplan.backup_plan_configured
  for_each: aws.backup.list_backup_plan_versions
  conditions:
    all:
    - var: item.BackupPlanArn
      op: exists
      value: null
    - var: item.AdvancedBackupSettings
      op: exists
      value: null
- rule_id: aws.backup.backupplan.backup_plans_configured
  for_each: aws.backup.list_backup_plan_versions
  conditions:
    all:
    - var: item.AdvancedBackupSettings
      op: exists
      value: null
    - var: item.CreationDate
      op: exists
      value: null
- rule_id: aws.backup.backupplan.backup_resource_discovery_synced_configured
  for_each: aws.backup.list_backup_plan_versions
  conditions:
    all:
    - var: item.BackupPlansList.AdvancedBackupSettings
      op: exists
      value: null
    - var: item.BackupPlansList.CreationDate
      op: exists
      value: null
- rule_id: aws.backup.backupplan.backup_retention_minimum_configured
  for_each: aws.backup.list_backup_plan_versions
  conditions:
    var: item.BackupPlansList.AdvancedBackupSettings
    op: exists
    value: null
- rule_id: aws.backup.backupplan.backup_storage_encrypted_and_private
  for_each: aws.backup.list_recovery_points_by_backup_vault
  conditions:
    all:
    - var: item.BackupVaultList.IsEncrypted
      op: equals
      value: 'true'
    - var: item.BackupVaultList.VaultType
      op: equals
      value: PRIVATE
- rule_id: aws.backup.backupplan.backup_vault_rbac_least_privilege
  for_each: aws.backup.get_backup_vault_access_policy
  conditions:
    var: item.Policy
    op: exists
    value: null
- rule_id: aws.backup.backupplan.change_audit_logging_enabled
  for_each: aws.backup.list_backup_plan_versions
  conditions:
    var: item.BackupPlansList.AdvancedBackupSettings
    op: exists
    value: null
- rule_id: aws.backup.backupplan.encryption_in_transit_tls_required
  for_each: aws.backup.list_recovery_points_by_backup_vault
  conditions:
    all:
    - var: item.BackupJobs.IsEncrypted
      op: equals
      value: 'true'
    - var: item.BackupJobs.EncryptionKeyArn
      op: exists
      value: null
- rule_id: aws.backup.backupplan.failed_jobs_alerting_enabled
  for_each: aws.backup.get_backup_vault_notifications
  conditions:
    var: item.BackupVaultEvents
    op: in
    value: BACKUP_JOB_FAILED
- rule_id: aws.backup.backupplan.lag_monitoring_alerts_enabled
  for_each: aws.backup.get_backup_vault_notifications
  conditions:
    var: item.BackupVaultEvents
    op: exists
    value: null
- rule_id: aws.backup.backupplan.last_backup_recency_within_days
  for_each: aws.backup.list_backup_plan_versions
  conditions:
    all:
    - var: item.BackupPlansList.LastExecutionDate
      op: exists
      value: null
    - var: item.BackupPlansList.AdvancedBackupSettings
      op: exists
      value: null
- rule_id: aws.backup.backupplan.no_public_access_to_backup_vault_configured
  for_each: aws.backup.list_recovery_points_by_resource
  conditions:
    var: item.BackupVaultList.VaultType
    op: equals
    value: PRIVATE
- rule_id: aws.backup.backupplan.policy_assignment_complete
  for_each: aws.backup.list_backup_selections
  conditions:
    all:
    - var: item.BackupPlansList.BackupPlanId
      op: exists
      value: null
    - var: item.BackupPlansList.AdvancedBackupSettings
      op: exists
      value: null
- rule_id: aws.backup.backupplan.retention_days_minimum
  for_each: aws.backup.list_backup_vaults
  conditions:
    var: item.MinRetentionDays
    op: greater_than
    value: '1'
- rule_id: aws.backup.backupplan.unprotected_assets_alerting_enabled
  for_each: aws.backup.get_backup_vault_notifications
  conditions:
    var: item.BackupVaultEvents
    op: in
    value:
    - BACKUP_JOB_FAILED
    - BACKUP_JOB_COMPLETED
- rule_id: aws.backup.backupvault.backup_cross_region_replication_enabled
  for_each: aws.backup.list_copy_jobs
  conditions:
    all:
    - var: item.DestinationBackupVaultArn
      op: exists
      value: null
    - var: item.State
      op: equals
      value: COMPLETED
- rule_id: aws.backup.backupvault.backup_destination_private_only_configured
  for_each: aws.backup.list_backup_vaults
  conditions:
    all:
    - var: item.BackupVaultList.Locked
      op: equals
      value: 'true'
    - var: item.BackupVaultList.MinRetentionDays
      op: greater_than
      value: '1'
- rule_id: aws.backup.backupvault.backup_immutable_or_worm_enabled_if_supported
  for_each: aws.backup.list_backup_vaults
  conditions:
    all:
    - var: item.BackupVaultList.Locked
      op: equals
      value: 'true'
    - var: item.BackupVaultList.VaultType
      op: equals
      value: WORM
- rule_id: aws.backup.backupvault.backup_schedule_defined_min_frequency_configured
  for_each: aws.backup.list_backup_vaults
  conditions:
    all:
    - var: item.BackupVaultList.MinRetentionDays
      op: exists
      value: null
    - var: item.BackupVaultList.MaxRetentionDays
      op: exists
      value: null
- rule_id: aws.backup.backupvault.backup_storage_immutability_enabled
  for_each: aws.backup.list_backup_vaults
  conditions:
    all:
    - var: item.BackupVaultList.Locked
      op: equals
      value: 'true'
    - var: item.BackupVaultList.MinRetentionDays
      op: exists
      value: null
- rule_id: aws.backup.backupvault.backup_vault_configured
  for_each: aws.backup.list_backup_vaults
  conditions:
    all:
    - var: item.BackupVaultList.MinRetentionDays
      op: greater_than
      value: '1'
    - var: item.BackupVaultList.MaxRetentionDays
      op: greater_than
      value: '0'
- rule_id: aws.backup.backupvault.backup_vaults_exist_configured
  for_each: aws.backup.list_recovery_points_by_resource
  conditions:
    all:
    - var: item.BackupVaultList.BackupVaultName
      op: exists
      value: null
    - var: item.BackupVaultList.MinRetentionDays
      op: greater_than
      value: '1'
- rule_id: aws.backup.backupvault.cmk_cmek_key_configured
  for_each: aws.backup.list_recovery_points_by_resource
  conditions:
    var: item.EncryptionKeyArn
    op: exists
    value: null
- rule_id: aws.backup.backupvault.encryption_at_rest_enabled
  for_each: aws.backup.list_recovery_points_by_resource
  conditions:
    all:
    - var: item.BackupVaultList.EncryptionKeyArn
      op: exists
      value: null
    - var: item.BackupVaultList.EncryptionKeyType
      op: in
      value:
      - AWS_KMS
      - AWS_MANAGED
- rule_id: aws.backup.backupvault.encryption_in_transit_tls_min_1_2_configured
  for_each: aws.backup.list_recovery_points_by_resource
  conditions:
    var: item.BackupVaultList.EncryptionKeyArn
    op: exists
    value: null
- rule_id: aws.backup.backupvault.key_policy_least_privilege
  for_each: aws.backup.get_backup_vault_access_policy
  conditions:
    var: item.Policy
    op: exists
    value: null
- rule_id: aws.backup.backupvault.key_rotation_enabled
  for_each: aws.backup.list_recovery_points_by_resource
  conditions:
    all:
    - var: item.BackupVaultList.EncryptionKeyArn
      op: exists
      value: null
    - var: item.BackupVaultList.EncryptionKeyType
      op: equals
      value: KMS
- rule_id: aws.backup.recoverypoint.agent_to_service_tls_required
  for_each: aws.backup.list_restore_jobs_by_protected_resource
  conditions:
    all:
    - var: item.RecoveryPoints.Status
      op: equals
      value: COMPLETED
    - var: item.RecoveryPoints.IsEncrypted
      op: equals
      value: 'true'
- rule_id: aws.backup.recoverypoint.backup_min_telemtry_required_no_pii
  for_each: aws.backup.describe_backup_job
  conditions:
    all:
    - var: item.RecoveryPoints.Lifecycle.DeleteAfterDays
      op: exists
      value: null
    - var: item.RecoveryPoints.Status
      op: equals
      value: COMPLETED
- rule_id: aws.backup.recoverypoint.backup_point_encrypted
  for_each: aws.backup.list_recovery_points_by_backup_vault
  conditions:
    var: item.RecoveryPoints.IsEncrypted
    op: equals
    value: 'true'
- rule_id: aws.backup.recoverypoint.backup_volumes_encrypted
  for_each: aws.backup.list_recovery_points_by_backup_vault
  conditions:
    all:
    - var: item.RecoveryPoints.IsEncrypted
      op: equals
      value: 'true'
    - var: item.RecoveryPoints.Lifecycle.DeleteAfterDays
      op: exists
      value: null
- rule_id: aws.backup.recoverypoint.encryption_at_rest_cmek_if_supported
  for_each: aws.backup.list_recovery_points_by_backup_vault
  conditions:
    all:
    - var: item.RecoveryPoints.IsEncrypted
      op: equals
      value: 'true'
    - var: item.RecoveryPoints.EncryptionKeyArn
      op: exists
      value: null
- rule_id: aws.backup.recoverypoint.private_network_only_configured
  for_each: aws.backup.list_restore_jobs_by_protected_resource
  conditions:
    all:
    - var: item.RecoveryPoints.BackupVaultArn
      op: exists
      value: null
    - var: item.RecoveryPoints.ResourceArn
      op: exists
      value: null
- rule_id: aws.backup.recoverypoint.recovery_point_retention_configured
  for_each: aws.backup.describe_backup_job
  conditions:
    var: item.RecoveryPoints.Lifecycle.DeleteAfterDays
    op: exists
    value: null
- rule_id: aws.backup.recoverypoint.security_groups_restrictive_configured
  for_each: aws.backup.list_restore_jobs_by_protected_resource
  conditions:
    all:
    - var: item.RecoveryPoints.Status
      op: equals
      value: COMPLETED
    - var: item.RecoveryPoints.IsEncrypted
      op: equals
      value: 'true'
- rule_id: aws.backup.reportplan.backup_plans_configured
  for_each: aws.backup.list_report_plans
  conditions:
    all:
    - var: item.ReportPlanName
      op: exists
      value: null
    - var: item.ReportSetting
      op: exists
      value: null
    - var: item.ReportDeliveryChannel
      op: exists
      value: null
- rule_id: aws.backup.reportplan.backup_report_plan_configured
  for_each: aws.backup.list_report_plans
  conditions:
    all:
    - var: item.ReportPlans.ReportPlanArn
      op: exists
      value: null
    - var: item.ReportPlans.ReportSetting
      op: exists
      value: null
    - var: item.ReportPlans.ReportDeliveryChannel
      op: exists
      value: null
- rule_id: aws.backup.resource.backup_enabled_for_ec2
  for_each: aws.backup.list_restore_jobs_by_protected_resource
  conditions:
    all:
    - var: item.BackupJobs.ResourceType
      op: equals
      value: EC2
    - var: item.BackupJobs.State
      op: equals
      value: COMPLETED
    - var: item.BackupJobs.RecoveryPointLifecycle.DeleteAfterDays
      op: greater_than
      value: '30'
- rule_id: aws.backup.resource.backup_recovery_point_encrypted
  for_each: aws.backup.list_recovery_points_by_backup_vault
  conditions:
    var: item.RecoveryPoints.IsEncrypted
    op: equals
    value: 'true'
- rule_id: aws.backup.resource.backup_replication_enabled
  for_each: aws.backup.list_backup_jobs
  conditions:
    all:
    - var: item.BackupOptions
      op: exists
      value: null
    - var: item.RecoveryPointLifecycle.DeleteAfterDays
      op: exists
      value: null
- rule_id: aws.backup.resource.backup_vaults_encrypted
  for_each: aws.backup.list_recovery_points_by_backup_vault
  conditions:
    var: item.BackupVaultList.IsEncrypted
    op: equals
    value: 'true'
- rule_id: aws.backup.resource.encryption_enabled
  for_each: aws.backup.list_recovery_points_by_backup_vault
  conditions:
    var: item.IsEncrypted
    op: equals
    value: 'true'
- rule_id: aws.backup.resource.vault_encryption_enabled
  for_each: aws.backup.list_recovery_points_by_backup_vault
  conditions:
    var: item.BackupVaultList.IsEncrypted
    op: equals
    value: 'true'
- rule_id: aws.backup.restorejob.backup_logs_and_artifacts_encrypted
  for_each: aws.backup.list_restore_jobs_by_protected_resource
  conditions:
    all:
    - var: item.RestoreJobs.BackupVaultArn
      op: exists
      value: null
    - var: item.RestoreJobs.IsParent
      op: equals
      value: 'true'
- rule_id: aws.backup.restorejob.cross_account_restore_blocked_by_policy_configured
  for_each: aws.backup.list_restore_jobs_by_protected_resource
  conditions:
    all:
    - var: item.AccountId
      op: exists
      value: null
    - var: item.SourceResourceArn
      op: exists
      value: null
- rule_id: aws.backup.restorejob.from_encrypted_backups_only
  for_each: aws.backup.list_restore_jobs_by_protected_resource
  conditions:
    all:
    - var: item.RestoreJobs.RecoveryPointArn
      op: exists
      value: null
    - var: item.RestoreJobs.BackupVaultArn
      op: exists
      value: null
- rule_id: aws.backup.restorejob.role_least_privilege
  for_each: aws.backup.list_restore_testing_selections
  conditions:
    var: item.IamRoleArn
    op: exists
    value: null
