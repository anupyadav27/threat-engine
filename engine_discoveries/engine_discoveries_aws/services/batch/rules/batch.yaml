version: '1.0'
provider: aws
service: batch
services:
  client: batch
  module: boto3.client
discovery:
- discovery_id: aws.batch.describe_compute_environments
  calls:
  - action: describe_compute_environments
    save_as: response
  emit:
    items_for: '{{ response.computeEnvironments }}'
    as: item
    item:
      computeEnvironmentName: '{{ item.computeEnvironmentName }}'
      computeEnvironmentArn: '{{ item.computeEnvironmentArn }}'
      unmanagedvCpus: '{{ item.unmanagedvCpus }}'
      ecsClusterArn: '{{ item.ecsClusterArn }}'
      tags: '{{ item.tags }}'
      type: '{{ item.type }}'
      state: '{{ item.state }}'
      status: '{{ item.status }}'
      statusReason: '{{ item.statusReason }}'
      computeResources: '{{ item.computeResources }}'
      serviceRole: '{{ item.serviceRole }}'
      updatePolicy: '{{ item.updatePolicy }}'
      eksConfiguration: '{{ item.eksConfiguration }}'
      containerOrchestrationType: '{{ item.containerOrchestrationType }}'
      uuid: '{{ item.uuid }}'
      context: '{{ item.context }}'
- discovery_id: aws.batch.describe_job_queues
  calls:
  - action: describe_job_queues
    save_as: response
  emit:
    items_for: '{{ response.jobQueues }}'
    as: item
    item:
      jobQueueName: '{{ item.jobQueueName }}'
      jobQueueArn: '{{ item.jobQueueArn }}'
      state: '{{ item.state }}'
      schedulingPolicyArn: '{{ item.schedulingPolicyArn }}'
      status: '{{ item.status }}'
      statusReason: '{{ item.statusReason }}'
      priority: '{{ item.priority }}'
      computeEnvironmentOrder: '{{ item.computeEnvironmentOrder }}'
      serviceEnvironmentOrder: '{{ item.serviceEnvironmentOrder }}'
      jobQueueType: '{{ item.jobQueueType }}'
      tags: '{{ item.tags }}'
      jobStateTimeLimitActions: '{{ item.jobStateTimeLimitActions }}'
checks:
- rule_id: aws.batch.compute_environment.batch_uses_approved_launch_template_configured
  for_each: aws.batch.describe_compute_environments
  conditions:
    var: item.computeResources
    op: exists
    value: null
- rule_id: aws.batch.compute_environment.instance_profile_least_privilege
  for_each: aws.batch.describe_compute_environments
  conditions:
    all:
    - var: item.computeResources
      op: exists
      value: null
    - var: item.serviceRole
      op: exists
      value: null
- rule_id: aws.batch.compute_environment.no_public_ip_assigned_configured
  for_each: aws.batch.describe_compute_environments
  conditions:
    var: item.computeResources
    op: exists
    value: null
- rule_id: aws.batch.compute_environment.volumes_encrypted
  for_each: aws.batch.describe_compute_environments
  conditions:
    var: item.computeResources
    op: exists
    value: null
- rule_id: aws.batch.jobqueue.batch_uses_approved_launch_template_configured
  for_each: aws.batch.describe_job_queues
  conditions:
    var: item.computeEnvironmentOrder
    op: exists
    value: null
- rule_id: aws.batch.jobqueue.instance_profile_least_privilege
  for_each: aws.batch.describe_job_queues
  conditions:
    all:
    - var: item.jobQueueArn
      op: exists
      value: null
    - var: item.tags
      op: exists
      value: null
- rule_id: aws.batch.jobqueue.no_public_ip_assigned_configured
  for_each: aws.batch.describe_job_queues
  conditions:
    var: item.computeEnvironmentOrder
    op: equals
    value: []
- rule_id: aws.batch.jobqueue.volumes_encrypted
  for_each: aws.batch.describe_job_queues
  conditions:
    var: item.tags
    op: exists
    value: null

