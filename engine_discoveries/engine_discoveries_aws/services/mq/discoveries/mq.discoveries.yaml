version: '1.0'
provider: aws
service: mq
services:
  client: mq
  module: boto3.client
discovery:
- discovery_id: aws.mq.list_brokers
  calls:
  - action: list_brokers
    save_as: response
    params:
      MaxResults: 1000
  emit:
    items_for: '{{ response.BrokerSummaries }}'
    as: item
- discovery_id: aws.mq.describe_broker
  for_each: aws.mq.list_brokers
  calls:
  - action: describe_broker
    params:
      BrokerId: '{{ item.BrokerId }}'
      MaxResults: 1000
    save_as: response
  emit: {}
