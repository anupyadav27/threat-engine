version: '1.0'
provider: aws
service: account
services:
  client: account
  module: boto3.client
discovery:
- discovery_id: aws.account.get_contact_information
  calls:
  - action: get_contact_information
    save_as: response
  emit: {}
- discovery_id: aws.account.get_alternate_contact_security
  calls:
  - action: get_alternate_contact
    params:
      AlternateContactType: SECURITY
    save_as: response
    on_error: continue
  emit: {}
- discovery_id: aws.account.get_alternate_contact_billing
  calls:
  - action: get_alternate_contact
    params:
      AlternateContactType: BILLING
    save_as: response
    on_error: continue
  emit: {}
- discovery_id: aws.account.get_alternate_contact_operations
  calls:
  - action: get_alternate_contact
    params:
      AlternateContactType: OPERATIONS
    save_as: response
    on_error: continue
  emit: {}
