version: '1.0'
provider: aws
service: sns
services:
  client: sns
  module: boto3.client
discovery:
- discovery_id: aws.sns.list_topics
  calls:
  - action: list_topics
    params:
      MaxResults: 1000
    save_as: response
  emit:
    items_for: '{{ response.Topics }}'
    as: item
- discovery_id: aws.sns.get_topic_attributes
  for_each: aws.sns.list_topics
  calls:
  - action: get_topic_attributes
    params:
      TopicArn: '{{ item.TopicArn }}'
    save_as: response
  emit: {}
- discovery_id: aws.sns.list_subscriptions
  calls:
  - action: list_subscriptions
    params:
      MaxResults: 1000
    save_as: response
  emit:
    items_for: '{{ response.Subscriptions }}'
    as: item
- discovery_id: aws.sns.get_subscription_attributes
  for_each: aws.sns.list_subscriptions
  calls:
  - action: get_subscription_attributes
    params:
      SubscriptionArn: '{{ item.SubscriptionArn }}'
    save_as: response
  emit: {}
checks:
- rule_id: aws.sns.topic.destinations_configured
  for_each: aws.sns.get_topic_attributes
  conditions:
    all:
    - var: item.Policy
      op: exists
      value: null
    - var: item.DeliveryPolicy
      op: exists
      value: null
- rule_id: aws.sns.resource.topics_kms_encryption_at_rest_enabled
  for_each: aws.sns.get_topic_attributes
  conditions:
    any:
    - var: item.KmsMasterKeyId
      op: exists
      value: null
    - var: item.KmsMasterKeyId
      op: equals
      value: alias/aws/sns
- rule_id: aws.sns.topics_not_publicly_accessible.topics_not_publicly_accessible_configured
  for_each: aws.sns.get_topic_attributes
  conditions:
    all:
    - var: item.Policy
      op: exists
      value: null
    - var: item.Policy
      op: contains
      value: '"Effect":"Deny"'
- rule_id: aws.sns.topic.no_public_webhooks_without_auth_configured
  for_each: aws.sns.get_topic_attributes
  conditions:
    all:
    - var: item.Policy
      op: exists
      value: null
    - var: item.Policy
      op: contains
      value: AWS:SourceArn
- rule_id: aws.sns.topic.policy_exists_for_critical_severity_configured
  for_each: aws.sns.get_topic_attributes
  conditions:
    var: item.Policy
    op: exists
    value: null
- rule_id: aws.sns.subscription.no_public_webhooks_configured
  for_each: aws.sns.list_subscriptions
  conditions:
    all:
    - var: item.Protocol
      op: equals
      value: https
    - var: item.Endpoint
      op: not_equals
      value: http://
- rule_id: aws.sns.subscription.oncall_contacts_verified
  for_each: aws.sns.list_subscriptions
  conditions:
    all:
    - var: item.SubscriptionArn
      op: exists
      value: null
    - var: item.Owner
      op: exists
      value: null
- rule_id: aws.sns.topic.endpoints_authenticated_configured
  for_each: aws.sns.get_topic_attributes
  conditions:
    all:
    - var: item.Policy
      op: exists
      value: null
    - var: item.EffectiveDeliveryPolicy
      op: exists
      value: null
- rule_id: aws.sns.subscription.sns_subscription_destinations_configured
  for_each: aws.sns.list_subscriptions
  conditions:
    all:
    - var: item.Endpoint
      op: exists
      value: null
    - var: item.Protocol
      op: in
      value:
      - http
      - https
      - email
      - email-json
      - sms
      - sqs
      - application
      - lambda
- rule_id: aws.sns.topic.destinations_authenticated_configured
  for_each: aws.sns.get_topic_attributes
  conditions:
    all:
    - var: item.Policy
      op: exists
      value: null
    - var: item.EffectiveDeliveryPolicy
      op: exists
      value: null
- rule_id: aws.sns.subscription.endpoints_authenticated_configured
  for_each: aws.sns.list_subscriptions
  conditions:
    all:
    - var: item.Endpoint
      op: exists
      value: null
    - var: item.Protocol
      op: in
      value:
      - https
      - email-json
      - application
- rule_id: aws.sns.subscription.change_audit_logging_enabled
  for_each: aws.sns.get_subscription_attributes
  conditions:
    var: item.Policy
    op: exists
    value: null
- rule_id: aws.sns.subscription.message_encryption_in_transit_configured
  for_each: aws.sns.list_subscriptions
  conditions:
    all:
    - var: item.Protocol
      op: in
      value:
      - https
      - wss
    - var: item.Endpoint
      op: exists
      value: null
- rule_id: aws.sns.topic_subscription_configured.topic_subscription_configured_configured
  for_each: aws.sns.list_subscriptions
  conditions:
    all:
    - var: item.SubscriptionArn
      op: exists
      value: null
    - var: item.Protocol
      op: in
      value:
      - https
      - email
      - sqs
      - lambda
- rule_id: aws.sns.subscription.policy_exists_for_critical_severity_configured
  for_each: aws.sns.get_subscription_attributes
  conditions:
    var: item.Policy
    op: exists
    value: null
- rule_id: aws.sns.topic.destinations_access_least_privilege
  for_each: aws.sns.get_topic_attributes
  conditions:
    all:
    - var: item.Policy
      op: exists
      value: null
    - var: item.Policy
      op: contains
      value: '"Effect":"Allow"'
- rule_id: aws.sns.topic.change_audit_logging_enabled
  for_each: aws.sns.get_topic_attributes
  conditions:
    var: item.Policy
    op: exists
    value: null
- rule_id: aws.sns.topic.critical_alarms_enabled
  for_each: aws.sns.get_topic_attributes
  conditions:
    var: item.Policy
    op: exists
    value: null
- rule_id: aws.sns.topic.oncall_contacts_verified
  for_each: aws.sns.get_topic_attributes
  conditions:
    var: item.Policy
    op: exists
    value: null
- rule_id: aws.sns.topics.kms_encryption_at_rest_enabled
  for_each: aws.sns.get_topic_attributes
  conditions:
    all:
    - var: item.KmsMasterKeyId
      op: exists
      value: null
    - var: item.KmsMasterKeyId
      op: not_equals
      value: ''
- rule_id: aws.sns.topic.no_public_webhooks_configured
  for_each: aws.sns.get_topic_attributes
  conditions:
    var: item.Policy
    op: not_equals
    value: null
- rule_id: aws.sns.topic.channels_configured
  for_each: aws.sns.get_topic_attributes
  conditions:
    all:
    - var: item.KmsMasterKeyId
      op: exists
      value: null
    - var: item.Policy
      op: exists
      value: null
- rule_id: aws.sns.topic.message_encryption_in_transit_configured
  for_each: aws.sns.get_topic_attributes
  conditions:
    var: item.EffectiveDeliveryPolicy
    op: exists
    value: null
- rule_id: aws.sns.topic.alarm_actions_configured
  for_each: aws.sns.get_topic_attributes
  conditions:
    all:
    - var: item.Policy
      op: exists
      value: null
    - var: item.Policy
      op: not_equals
      value: ''
