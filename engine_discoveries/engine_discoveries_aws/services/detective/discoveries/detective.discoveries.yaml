version: '1.0'
provider: aws
service: detective
services:
  client: detective
  module: boto3.client
discovery:
- discovery_id: aws.detective.list_graphs
  calls:
  - action: list_graphs
    params:
      MaxResults: 1000
    on_error: continue
    save_as: response
  emit:
    items_for: '{{ response.GraphList }}'
    as: item
- discovery_id: aws.detective.list_members
  calls:
  - action: list_invitations
    params:
      MaxResults: 1000
    on_error: continue
    save_as: response
  emit:
    items_for: '{{ response.Invitations }}'
    as: item
