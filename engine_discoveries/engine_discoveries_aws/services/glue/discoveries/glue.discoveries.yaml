version: '1.0'
provider: aws
service: glue
services:
  client: glue
  module: boto3.client
discovery:
- discovery_id: aws.glue.get_column_statistics_task_run
  for_each: aws.glue.get_databases
  calls:
  - action: list_column_statistics_task_runs
    params:
      DatabaseName: '{{ item.Name }}'
      MaxResults: 1000
    save_as: response
  emit:
    items_for: '{{ response.ColumnStatisticsTaskRunList }}'
    as: item
- discovery_id: aws.glue.get_data_catalog_encryption_settings
  calls:
  - action: get_data_catalog_encryption_settings
    save_as: response
  emit: {}
- discovery_id: aws.glue.get_catalogs
  calls:
  - action: get_catalogs
    save_as: response
  emit: {}
- discovery_id: aws.glue.get_classifiers
  calls:
  - action: get_classifiers
    save_as: response
  emit: {}
- discovery_id: aws.glue.get_connections
  calls:
  - action: get_connections
    save_as: response
  emit: {}
- discovery_id: aws.glue.get_crawlers
  calls:
  - action: get_crawlers
    save_as: response
  emit: {}
- discovery_id: aws.glue.get_databases
  calls:
  - action: get_databases
    save_as: response
  emit:
    items_for: '{{ response.DatabaseList }}'
    as: item
- discovery_id: aws.glue.get_jobs
  calls:
  - action: get_jobs
    save_as: response
  emit: {}
- discovery_id: aws.glue.get_tables
  for_each: aws.glue.get_databases
  calls:
  - action: get_tables
    params:
      DatabaseName: '{{ item.Name }}'
    save_as: response
  emit:
    items_for: '{{ response.TableList }}'
    as: item
