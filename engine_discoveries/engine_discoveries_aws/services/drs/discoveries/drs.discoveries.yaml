version: '1.0'
provider: aws
service: drs
services:
  client: drs
  module: boto3.client
discovery:
- discovery_id: aws.drs.describe_launch_configuration_templates
  calls:
  - action: describe_launch_configuration_templates
    save_as: response
    params:
      MaxResults: 1000
  emit:
    items_for: '{{ response.items }}'
    as: item
