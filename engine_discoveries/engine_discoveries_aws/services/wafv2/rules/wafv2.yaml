version: '1.0'
provider: aws
service: wafv2
services:
  client: wafv2
  module: boto3.client
discovery:
- discovery_id: aws.wafv2.list_web_acls
  calls:
  - action: list_web_acls
    params:
      Scope: REGIONAL
    save_as: response
  emit:
    items_for: '{{ response.WebACLs }}'
    as: item
    item:
      Name: '{{ item.Name }}'
      Id: '{{ item.Id }}'
      ARN: '{{ item.ARN }}'
      Description: '{{ item.Description }}'
      LockToken: '{{ item.LockToken }}'
- discovery_id: aws.wafv2.list_rule_groups
  calls:
  - action: list_rule_groups
    params:
      Scope: REGIONAL
    save_as: response
  emit:
    items_for: '{{ response.RuleGroups }}'
    as: item
    item:
      Name: '{{ item.Name }}'
      Id: '{{ item.Id }}'
      ARN: '{{ item.ARN }}'
      Description: '{{ item.Description }}'
      LockToken: '{{ item.LockToken }}'
- discovery_id: aws.wafv2.list_ip_sets
  calls:
  - action: list_ip_sets
    params:
      Scope: REGIONAL
    save_as: response
  emit:
    items_for: '{{ response.IPSets }}'
    as: item
    item:
      Name: '{{ item.Name }}'
      Id: '{{ item.Id }}'
      ARN: '{{ item.ARN }}'
      Description: '{{ item.Description }}'
      LockToken: '{{ item.LockToken }}'
      IPAddressVersion: '{{ item.IPAddressVersion }}'
- discovery_id: aws.wafv2.list_logging_configurations
  calls:
  - action: list_logging_configurations
    params:
      Scope: REGIONAL
    save_as: response
  emit:
    items_for: '{{ response.LoggingConfigurations }}'
    as: item
    item:
      ResourceArn: '{{ item.ResourceArn }}'
      LogDestinationConfigs: '{{ item.LogDestinationConfigs }}'
      RedactedFields: '{{ item.RedactedFields }}'
      ManagedByFirewallManager: '{{ item.ManagedByFirewallManager }}'
- discovery_id: aws.wafv2.list_tags_for_resource
  calls:
  - action: list_tags_for_resource
    save_as: response
  emit:
    items_for: '{{ response.TagInfoForResource }}'
    as: item
    item:
      ResourceARN: '{{ item.ResourceARN }}'
      TagList: '{{ item.TagList }}'
- discovery_id: aws.wafv2.list_regex_pattern_sets
  calls:
  - action: list_regex_pattern_sets
    params:
      Scope: REGIONAL
    save_as: response
  emit:
    items_for: '{{ response.RegexPatternSets }}'
    as: item
    item:
      Name: '{{ item.Name }}'
      Id: '{{ item.Id }}'
      Description: '{{ item.Description }}'
      LockToken: '{{ item.LockToken }}'
      ARN: '{{ item.ARN }}'
checks:
- rule_id: aws.wafv2.rule.wafv2_references_valid_ip_or_regex_sets_only_configured
  for_each: aws.wafv2.list_web_acls
  conditions:
    var: item.ARN
    op: exists
    value: null
- rule_id: aws.wafv2.rulegroup.wafv2_unique_priorities_configured
  for_each: aws.wafv2.list_rule_groups
  conditions:
    var: item.ARN
    op: exists
    value: null
- rule_id: aws.wafv2.rulegroup.wafv2_no_permit_all_rule_configured
  for_each: aws.wafv2.list_rule_groups
  conditions:
    var: item.ARN
    op: exists
    value: null
- rule_id: aws.wafv2.rulegroup.wafv2_references_only_approved_managed_sets_where_used_configured
  for_each: aws.wafv2.list_rule_groups
  conditions:
    var: item.ARN
    op: exists
    value: null
- rule_id: aws.wafv2.ipset.wafv2_not_empty_configured
  for_each: aws.wafv2.list_ip_sets
  conditions:
    var: item.ARN
    op: exists
    value: null
- rule_id: aws.wafv2.webacl.wafv2_attached_to_cdn_configured
  for_each: aws.wafv2.list_web_acls
  conditions:
    all:
    - var: item.ARN
      op: exists
      value: null
    - var: item.Name
      op: exists
      value: null
- rule_id: aws.wafv2.ipset.wafv2_used_by_at_least_one_rule_configured
  for_each: aws.wafv2.list_ip_sets
  conditions:
    all:
    - var: item.ARN
      op: exists
      value: null
    - var: item.Id
      op: exists
      value: null
- rule_id: aws.wafv2.resource.webacl_logging_enabled
  for_each: aws.wafv2.list_logging_configurations
  conditions:
    all:
    - var: item.ResourceArn
      op: exists
      value: null
    - var: item.LogDestinationConfigs
      op: exists
      value: null
- rule_id: aws.wafv2.resource.webacl_rule_logging_enabled
  for_each: aws.wafv2.list_logging_configurations
  conditions:
    var: item.ResourceArn
    op: exists
    value: null
- rule_id: aws.wafv2.webacl.wafv2_ip_rate_limit_rules_configured_if_supported
  for_each: aws.wafv2.list_web_acls
  conditions:
    var: item.ARN
    op: exists
    value: null
- rule_id: aws.wafv2.regexpatternset.wafv2_no_overly_broad_patterns_configured
  for_each: aws.wafv2.list_regex_pattern_sets
  conditions:
    var: item.ARN
    op: exists
    value: null
- rule_id: aws.wafv2.rulegroup.wafv2_visibility_config_enabled
  for_each: aws.wafv2.list_web_acls
  conditions:
    var: item.ARN
    op: exists
    value: null
- rule_id: aws.wafv2.rule.wafv2_has_effective_action_not_count_only_configured
  for_each: aws.wafv2.list_web_acls
  conditions:
    var: item.ARN
    op: exists
    value: null
- rule_id: aws.wafv2.webacl.wafv2_managed_rule_sets_enabled
  for_each: aws.wafv2.list_web_acls
  conditions:
    var: item.ARN
    op: exists
    value: null
- rule_id: aws.wafv2.rule.wafv2_priority_unique_within_web_acl_configured
  for_each: aws.wafv2.list_web_acls
  conditions:
    var: item.ARN
    op: exists
    value: null
- rule_id: aws.wafv2.regexpatternset.wafv2_not_empty_configured
  for_each: aws.wafv2.list_web_acls
  conditions:
    var: item.ARN
    op: exists
    value: null
- rule_id: aws.wafv2.ipset.wafv2_cross_account_sharing_restricted
  for_each: aws.wafv2.list_ip_sets
  conditions:
    var: item.ARN
    op: not_equals
    value: null
- rule_id: aws.wafv2.webacl.wafv2_block_actions_not_count_only_configured
  for_each: aws.wafv2.list_web_acls
  conditions:
    var: item.ARN
    op: exists
    value: null
- rule_id: aws.wafv2.ipset.wafv2_cidrs_valid_and_minimized_configured
  for_each: aws.wafv2.list_ip_sets
  conditions:
    var: item.ARN
    op: exists
    value: null
- rule_id: aws.wafv2.webacl.logging_enabled
  for_each: aws.wafv2.list_logging_configurations
  conditions:
    all:
    - var: item.ResourceArn
      op: exists
      value: null
    - var: item.LogDestinationConfigs
      op: exists
      value: null
- rule_id: aws.wafv2.regexpatternset.wafv2_used_by_at_least_one_rule_configured
  for_each: aws.wafv2.list_regex_pattern_sets
  conditions:
    var: item.ARN
    op: exists
    value: null
