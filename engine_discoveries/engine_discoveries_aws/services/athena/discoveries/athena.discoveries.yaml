version: '1.0'
provider: aws
service: athena
services:
  client: athena
  module: boto3.client
discovery:
- discovery_id: aws.athena.list_work_groups
  calls:
  - action: list_work_groups
    save_as: response
    params:
      MaxResults: 1000
  emit:
    items_for: '{{ response.WorkGroups }}'
    as: item
- discovery_id: aws.athena.get_work_group
  for_each: aws.athena.list_work_groups
  calls:
  - action: get_work_group
    params:
      WorkGroup: '{{ item.Name }}'
    save_as: response
    on_error: continue
  emit: {}
