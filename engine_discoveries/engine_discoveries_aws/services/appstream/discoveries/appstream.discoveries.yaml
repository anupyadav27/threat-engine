version: '1.0'
provider: aws
service: appstream
services:
  client: appstream
  module: boto3.client
discovery:
- discovery_id: aws.appstream.describe_fleets
  calls:
  - action: describe_fleets
    params:
      MaxResults: 1000
    on_error: continue
    save_as: response
  emit:
    items_for: '{{ response.Fleets }}'
    as: item
