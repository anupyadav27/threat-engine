version: '1.0'
provider: aws
service: appstream
services:
  client: appstream
  module: boto3.client
discovery:
- discovery_id: aws.appstream.describe_fleets
  calls:
  - action: describe_fleets
    params:
      MaxResults: 1000
    on_error: continue
    save_as: response
  emit:
    items_for: '{{ response.Fleets }}'
    as: item
checks:
- rule_id: aws.appstream.resource.fleet_default_internet_access_disabled
  for_each: aws.appstream.describe_fleets
  conditions:
    var: item.EnableDefaultInternetAccess
    op: equals
    value: 'false'
