version: '1.0'
provider: aws
service: ebs
services:
  client: ec2
  module: boto3.client
discovery:
- discovery_id: aws.ec2.describe_snapshots
  calls:
  - action: describe_snapshots
    params:
      OwnerIds:
      - self
      MaxResults: 1000
    save_as: response
  emit:
    items_for: '{{ response.Snapshots }}'
    as: item
- discovery_id: aws.ec2.describe_volumes
  calls:
  - action: describe_volumes
    save_as: response
    params:
      MaxResults: 1000
  emit:
    items_for: '{{ response.Volumes }}'
    as: item
checks:
- rule_id: aws.ebs.snapshot.ebs_cmk_cmek_configured
  for_each: aws.ec2.describe_snapshots
  conditions:
    all:
    - var: item.Encrypted
      op: equals
      value: true
    - var: item.KmsKeyId
      op: exists
      value: null
- rule_id: aws.ebs.snapshot.ebs_cross_region_copy_encrypted
  for_each: aws.ec2.describe_snapshots
  conditions:
    all:
    - var: item.Encrypted
      op: equals
      value: true
    - var: item.KmsKeyId
      op: exists
      value: null
- rule_id: aws.ebs.snapshot.ebs_s_encrypted
  for_each: aws.ec2.describe_snapshots
  conditions:
    var: item.Encrypted
    op: equals
    value: true
- rule_id: aws.ebs.snapshot.encryption_at_rest_enabled
  for_each: aws.ec2.describe_snapshots
  conditions:
    var: item.Encrypted
    op: equals
    value: true
- rule_id: aws.ebs.snapshot.not_public_configured
  for_each: aws.ec2.describe_snapshots
  conditions:
    var: item.CreateVolumePermissions
    op: not_exists
    value: null
- rule_id: aws.ebs.snapshot.s_not_public_configured
  for_each: aws.ec2.describe_snapshots
  conditions:
    all:
    - var: item.SnapshotId
      op: exists
      value: null
    - var: item.Encrypted
      op: equals
      value: true
- rule_id: aws.ebs.snapshot.snapshots_encrypted
  for_each: aws.ec2.describe_snapshots
  conditions:
    var: item.Encrypted
    op: equals
    value: true
- rule_id: aws.ebs.snapshot.snapshots_not_public_configured
  for_each: aws.ec2.describe_snapshots
  conditions:
    var: item.CreateVolumePermissions
    op: not_exists
    value: null
- rule_id: aws.ebs.volume.backup_configured
  for_each: aws.ec2.describe_volumes
  conditions:
    all:
    - var: item.VolumeId
      op: exists
      value: null
    - var: item.Tags
      op: exists
      value: null
- rule_id: aws.ebs.volume.ebs_cmk_cmek_configured
  for_each: aws.ec2.describe_volumes
  conditions:
    all:
    - var: item.Encrypted
      op: equals
      value: true
    - var: item.KmsKeyId
      op: exists
      value: null
- rule_id: aws.ebs.volume.encryption_at_rest_enabled
  for_each: aws.ec2.describe_volumes
  conditions:
    var: item.Encrypted
    op: equals
    value: true
- rule_id: aws.ebs.volume.snapshots_encrypted
  for_each: aws.ec2.describe_snapshots
  conditions:
    var: item.Encrypted
    op: equals
    value: true
- rule_id: aws.ebs.volume.snapshots_not_public_configured
  for_each: aws.ec2.describe_snapshots
  conditions:
    all:
    - var: item.SnapshotId
      op: exists
      value: null
    - var: item.Encrypted
      op: equals
      value: true
