version: '1.0'
provider: aws
service: ebs
services:
  client: ec2
  module: boto3.client
discovery:
- discovery_id: aws.ec2.describe_snapshots
  calls:
  - action: describe_snapshots
    params:
      OwnerIds:
      - self
      MaxResults: 1000
    save_as: response
  emit:
    items_for: '{{ response.Snapshots }}'
    as: item
- discovery_id: aws.ec2.describe_volumes
  calls:
  - action: describe_volumes
    save_as: response
    params:
      MaxResults: 1000
  emit:
    items_for: '{{ response.Volumes }}'
    as: item
