version: '1.0'
provider: aws
service: efs
services:
  client: efs
  module: boto3.client
discovery:
- discovery_id: aws.efs.describe_file_systems
  calls:
  - action: describe_file_systems
    save_as: response
  emit:
    items_for: '{{ response.FileSystems }}'
    as: item
    item:
      OwnerId: '{{ item.OwnerId }}'
      CreationToken: '{{ item.CreationToken }}'
      FileSystemId: '{{ item.FileSystemId }}'
      FileSystemArn: '{{ item.FileSystemArn }}'
      CreationTime: '{{ item.CreationTime }}'
      LifeCycleState: '{{ item.LifeCycleState }}'
      Name: '{{ item.Name }}'
      NumberOfMountTargets: '{{ item.NumberOfMountTargets }}'
      SizeInBytes: '{{ item.SizeInBytes }}'
      PerformanceMode: '{{ item.PerformanceMode }}'
      Encrypted: '{{ item.Encrypted }}'
      KmsKeyId: '{{ item.KmsKeyId }}'
      ThroughputMode: '{{ item.ThroughputMode }}'
      ProvisionedThroughputInMibps: '{{ item.ProvisionedThroughputInMibps }}'
      AvailabilityZoneName: '{{ item.AvailabilityZoneName }}'
      AvailabilityZoneId: '{{ item.AvailabilityZoneId }}'
      Tags: '{{ item.Tags }}'
      FileSystemProtection: '{{ item.FileSystemProtection }}'
- discovery_id: aws.efs.describe_mount_targets
  for_each: aws.efs.describe_file_systems
  calls:
  - action: describe_mount_targets
    params:
      FileSystemId: '{{ item.FileSystemId }}'
    save_as: response
  emit:
    items_for: '{{ response.MountTargets }}'
    as: item
- discovery_id: aws.efs.describe_backup_policy
  for_each: aws.efs.describe_file_systems
  calls:
  - action: describe_backup_policy
    params:
      FileSystemId: '{{ item.FileSystemId }}'
    save_as: response
  emit: {}
- discovery_id: aws.efs.describe_access_points
  calls:
  - action: describe_access_points
    save_as: response
  emit:
    items_for: '{{ response.AccessPoints }}'
    as: item
    item:
      ClientToken: '{{ item.ClientToken }}'
      Name: '{{ item.Name }}'
      Tags: '{{ item.Tags }}'
      AccessPointId: '{{ item.AccessPointId }}'
      AccessPointArn: '{{ item.AccessPointArn }}'
      FileSystemId: '{{ item.FileSystemId }}'
      PosixUser: '{{ item.PosixUser }}'
      RootDirectory: '{{ item.RootDirectory }}'
      OwnerId: '{{ item.OwnerId }}'
      LifeCycleState: '{{ item.LifeCycleState }}'
checks:
- rule_id: aws.efs.encryption.at_rest_enabled
  for_each: aws.efs.describe_file_systems
  conditions:
    var: item.Encrypted
    op: equals
    value: 'true'
- rule_id: aws.efs.filesystem.encryption_at_rest_enabled
  for_each: aws.efs.describe_file_systems
  conditions:
    var: item.Encrypted
    op: equals
    value: 'true'
- rule_id: aws.efs.resource.encryption_at_rest_enabled
  for_each: aws.efs.describe_file_systems
  conditions:
    var: item.Encrypted
    op: equals
    value: 'true'
- rule_id: aws.efs.filesystem.kms_key_policy_least_privilege
  for_each: aws.efs.describe_file_systems
  conditions:
    all:
    - var: item.Encrypted
      op: equals
      value: 'true'
    - var: item.KmsKeyId
      op: exists
      value: null
- rule_id: aws.efs.have.backup_enabled
  for_each: aws.efs.describe_backup_policy
  conditions:
    var: item.Status
    op: equals
    value: ENABLED
- rule_id: aws.efs.resource.backup_enabled
  for_each: aws.efs.describe_backup_policy
  conditions:
    var: item.Status
    op: equals
    value: ENABLED
- rule_id: aws.efs.filesystem.snapshots_enabled
  for_each: aws.efs.describe_file_systems
  conditions:
    var: item.FileSystemProtection
    op: exists
    value: null
- rule_id: aws.efs.resource.multi_az_enabled
  for_each: aws.efs.describe_file_systems
  conditions:
    var: item.NumberOfMountTargets
    op: greater_than_or_equal
    value: 1
- rule_id: aws.efs.filesystem.private_network_only_configured
  for_each: aws.efs.describe_mount_targets
  conditions:
    all:
    - var: item.SubnetId
      op: exists
      value: null
    - var: item.VpcId
      op: exists
      value: null
- rule_id: aws.efs.not_publicly_accessible.not_publicly_accessible_configured
  for_each: aws.efs.describe_mount_targets
  conditions:
    all:
    - var: item.SubnetId
      op: exists
      value: null
    - var: item.VpcId
      op: exists
      value: null
- rule_id: aws.efs.user.identity_and_root_directory_enforced
  for_each: aws.efs.describe_access_points
  conditions:
    all:
    - var: item.PosixUser
      op: exists
      value: null
    - var: item.RootDirectory
      op: exists
      value: null
