version: '1.0'
provider: aws
service: storagegateway
services:
  client: storagegateway
  module: boto3.client
discovery:
- discovery_id: aws.storagegateway.list_volumes
  calls:
  - action: list_volumes
    save_as: response
  emit:
    items_for: '{{ response.VolumeInfos }}'
    as: item
    item:
      VolumeARN: '{{ item.VolumeARN }}'
      VolumeId: '{{ item.VolumeId }}'
      GatewayARN: '{{ item.GatewayARN }}'
      GatewayId: '{{ item.GatewayId }}'
      VolumeType: '{{ item.VolumeType }}'
      VolumeSizeInBytes: '{{ item.VolumeSizeInBytes }}'
      VolumeAttachmentStatus: '{{ item.VolumeAttachmentStatus }}'
- discovery_id: aws.storagegateway.list_gateways
  calls:
  - action: list_gateways
    save_as: response
  emit:
    items_for: '{{ response.Gateways }}'
    as: item
    item:
      GatewayARN: '{{ item.GatewayARN }}'
      GatewayId: '{{ item.GatewayId }}'
      GatewayName: '{{ item.GatewayName }}'
      GatewayOperationalState: '{{ item.GatewayOperationalState }}'
      GatewayType: '{{ item.GatewayType }}'
- discovery_id: aws.storagegateway.describe_tape_archives
  calls:
  - action: describe_tape_archives
    save_as: response
  emit:
    items_for: '{{ response.TapeArchives }}'
    as: item
    item:
      TapeARN: '{{ item.TapeARN }}'
      TapeBarcode: '{{ item.TapeBarcode }}'
      TapeCreatedDate: '{{ item.TapeCreatedDate }}'
      TapeSizeInBytes: '{{ item.TapeSizeInBytes }}'
      CompletionTime: '{{ item.CompletionTime }}'
      RetrievedTo: '{{ item.RetrievedTo }}'
      TapeStatus: '{{ item.TapeStatus }}'
      TapeUsedInBytes: '{{ item.TapeUsedInBytes }}'
      KMSKey: '{{ item.KMSKey }}'
      PoolId: '{{ item.PoolId }}'
      Worm: '{{ item.Worm }}'
      RetentionStartDate: '{{ item.RetentionStartDate }}'
      PoolEntryDate: '{{ item.PoolEntryDate }}'
- discovery_id: aws.storagegateway.list_file_shares
  calls:
  - action: list_file_shares
    save_as: response
  emit:
    items_for: '{{ response.FileShareInfoList }}'
    as: item
    item:
      FileShareARN: '{{ item.FileShareARN }}'
      FileShareId: '{{ item.FileShareId }}'
      FileShareStatus: '{{ item.FileShareStatus }}'
      FileShareType: '{{ item.FileShareType }}'
      GatewayARN: '{{ item.GatewayARN }}'
- discovery_id: aws.storagegateway.describe_nfs_file_shares
  for_each: aws.storagegateway.list_file_shares
  calls:
  - action: describe_nfs_file_shares
    params:
      FileShareARNList:
      - '{{ item.FileShareARN }}'
    save_as: response
    on_error: continue
  emit:
    items_for: '{{ response.NFSFileShareInfoList }}'
    as: item
checks:
- rule_id: aws.storagegateway.volume.snapshots_encrypted
  for_each: aws.storagegateway.list_volumes
  conditions:
    all:
    - var: item.VolumeARN
      op: exists
      value: null
    - var: item.VolumeId
      op: exists
      value: null
- rule_id: aws.storagegateway.volume.kms_key_policy_least_privilege
  for_each: aws.storagegateway.list_volume_recovery_points
  conditions:
    var: item.VolumeARN
    op: exists
    value: null
- rule_id: aws.storagegateway.gateway.snapshots_enabled
  for_each: aws.storagegateway.list_volume_recovery_points
  conditions:
    var: item.VolumeARN
    op: exists
    value: null
- rule_id: aws.storagegateway.volume.encryption_at_rest_enabled
  for_each: aws.storagegateway.list_volume_recovery_points
  conditions:
    var: item.VolumeARN
    op: exists
    value: null
- rule_id: aws.storagegateway.volume.snapshots_enabled
  for_each: aws.storagegateway.list_volume_recovery_points
  conditions:
    var: item.VolumeARN
    op: exists
    value: null
- rule_id: aws.storagegateway.gateway.private_network_only_configured
  for_each: aws.storagegateway.list_gateways
  conditions:
    all:
    - var: item.GatewayARN
      op: exists
      value: null
    - var: item.GatewayOperationalState
      op: equals
      value: ACTIVE
- rule_id: aws.storagegateway.gateway.kms_key_policy_least_privilege
  for_each: aws.storagegateway.list_gateways
  conditions:
    var: item.GatewayARN
    op: exists
    value: null
- rule_id: aws.storagegateway.volume.storagegateway_cmk_cmek_configured
  for_each: aws.storagegateway.describe_tape_archives
  conditions:
    var: item.KMSKey
    op: exists
    value: null
- rule_id: aws.storagegateway.resource.fileshare_encryption_enabled
  for_each: aws.storagegateway.describe_nfs_file_shares
  conditions:
    var: item.KMSEncrypted
    op: equals
    value: true
- rule_id: aws.storagegateway.gateway.encryption_at_rest_enabled
  for_each: aws.storagegateway.list_gateways
  conditions:
    all:
    - var: item.GatewayARN
      op: exists
      value: null
    - var: item.GatewayType
      op: exists
      value: null
    - var: item.GatewayOperationalState
      op: equals
      value: ACTIVE
- rule_id: aws.storagegateway.volume.private_network_only_configured
  for_each: aws.storagegateway.list_volume_recovery_points
  conditions:
    all:
    - var: item.VolumeType
      op: equals
      value: gp2
    - var: item.VolumeAttachmentStatus
      op: equals
      value: attached
