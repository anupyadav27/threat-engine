version: '1.0'
provider: aws
service: backupsearch
services:
  client: backupsearch
  module: boto3.client
discovery:
- discovery_id: aws.backupsearch.list_search_jobs
  calls:
  - action: list_search_jobs
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.SearchJobs }}'
- discovery_id: aws.backupsearch.list_search_result_export_jobs
  calls:
  - action: list_search_result_export_jobs
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.ExportJobs }}'
- discovery_id: aws.backupsearch.get_search_job
  for_each: aws.backupsearch.list_search_jobs
  calls:
  - action: get_search_job
    save_as: response
    on_error: continue
    params:
      searchJobSearchJobIdentifier: '{{ item.searchJobSearchJobIdentifier }}'
  emit:
    as: item
    items_for: '{{ response.SearchScopeSummary }}'
- discovery_id: aws.backupsearch.list_search_job_backups
  for_each: aws.backupsearch.list_search_jobs
  calls:
  - action: list_search_job_backups
    save_as: response
    on_error: continue
    params:
      searchJobSearchJobIdentifier: '{{ item.searchJobSearchJobIdentifier }}'
  emit:
    as: item
    items_for: '{{ response.Results }}'
- discovery_id: aws.backupsearch.get_search_result_export_job
  for_each: aws.backupsearch.list_search_result_export_jobs
  calls:
  - action: get_search_result_export_job
    save_as: response
    on_error: continue
    params:
      exportJobExportJobIdentifier: '{{ item.exportJobExportJobIdentifier }}'
  emit:
    as: item
    items_for: '{{ response.ExportSpecification }}'
- discovery_id: aws.backupsearch.list_search_job_results
  for_each: aws.backupsearch.list_search_jobs
  calls:
  - action: list_search_job_results
    save_as: response
    on_error: continue
    params:
      searchJobSearchJobIdentifier: '{{ item.searchJobSearchJobIdentifier }}'
  emit:
    as: item
    items_for: '{{ response.Results }}'
checks: []
