version: '1.0'
provider: aws
service: kafkaconnect
services:
  client: kafkaconnect
  module: boto3.client
discovery:
- discovery_id: aws.kafkaconnect.list_connectors
  calls:
  - action: list_connectors
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.connectors }}'
- discovery_id: aws.kafkaconnect.list_worker_configurations
  calls:
  - action: list_worker_configurations
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.workerConfigurations }}'
- discovery_id: aws.kafkaconnect.list_custom_plugins
  calls:
  - action: list_custom_plugins
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.customPlugins }}'
- discovery_id: aws.kafkaconnect.describe_custom_plugin
  for_each: aws.kafkaconnect.list_custom_plugins
  calls:
  - action: describe_custom_plugin
    save_as: response
    on_error: continue
    params:
      customPluginCustomPluginArn: '{{ item.customPluginCustomPluginArn }}'
  emit:
    as: item
    items_for: '{{ response.latestRevision }}'
- discovery_id: aws.kafkaconnect.list_connector_operations
  for_each: aws.kafkaconnect.list_connectors
  calls:
  - action: list_connector_operations
    save_as: response
    on_error: continue
    params:
      connectorConnectorArn: '{{ item.connectorConnectorArn }}'
  emit:
    as: item
    items_for: '{{ response.connectorOperations }}'
- discovery_id: aws.kafkaconnect.describe_connector_operation
  for_each: aws.kafkaconnect.list_connector_operations
  calls:
  - action: describe_connector_operation
    save_as: response
    on_error: continue
    params:
      connectorOperationConnectorOperationArn: '{{ item.connectorOperationConnectorOperationArn
        }}'
  emit:
    as: item
    items_for: '{{ response.operationSteps }}'
- discovery_id: aws.kafkaconnect.describe_connector
  for_each: aws.kafkaconnect.list_connectors
  calls:
  - action: describe_connector
    save_as: response
    on_error: continue
    params:
      connectorConnectorArn: '{{ item.connectorConnectorArn }}'
  emit:
    as: item
    items_for: '{{ response.plugins }}'
- discovery_id: aws.kafkaconnect.describe_worker_configuration
  for_each: aws.kafkaconnect.list_worker_configurations
  calls:
  - action: describe_worker_configuration
    save_as: response
    on_error: continue
    params:
      workerConfigurationWorkerConfigurationArn: '{{ item.workerConfigurationWorkerConfigurationArn
        }}'
  emit:
    as: item
    items_for: '{{ response.latestRevision }}'
checks: []
