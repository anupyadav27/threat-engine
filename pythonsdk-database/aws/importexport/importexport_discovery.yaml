version: '1.0'
provider: aws
service: importexport
services:
  client: importexport
  module: boto3.client
discovery:
- discovery_id: aws.importexport.list_jobs
  calls:
  - action: list_jobs
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.Jobs }}'
- discovery_id: aws.importexport.get_status
  for_each: aws.importexport.list_jobs
  calls:
  - action: get_status
    save_as: response
    on_error: continue
    params:
      jobJobId: '{{ item.jobJobId }}'
  emit:
    as: item
    items_for: '{{ response.ArtifactList }}'
checks: []
