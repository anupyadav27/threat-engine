version: '1.0'
provider: aws
service: codebuild
services:
  client: codebuild
  module: boto3.client
discovery:
- discovery_id: aws.codebuild.list_source_credentials
  calls:
  - action: list_source_credentials
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.sourceCredentialsInfos }}'
- discovery_id: aws.codebuild.list_curated_environment_images
  calls:
  - action: list_curated_environment_images
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.platforms }}'
- discovery_id: aws.codebuild.list_shared_projects
  calls:
  - action: list_shared_projects
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.projects }}'
- discovery_id: aws.codebuild.get_report_group_trend
  calls:
  - action: get_report_group_trend
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.rawData }}'
- discovery_id: aws.codebuild.describe_code_coverages
  for_each: aws.codebuild.get_report_group_trend
  calls:
  - action: describe_code_coverages
    save_as: response
    on_error: continue
    params:
      testCasReportArn: '{{ item.testCasReportArn }}'
  emit:
    as: item
    items_for: '{{ response.codeCoverages }}'
- discovery_id: aws.codebuild.describe_test_cases
  for_each: aws.codebuild.get_report_group_trend
  calls:
  - action: describe_test_cases
    save_as: response
    on_error: continue
    params:
      testCasReportArn: '{{ item.testCasReportArn }}'
  emit:
    as: item
    items_for: '{{ response.testCases }}'
- discovery_id: aws.codebuild.get_resource_policy
  calls:
  - action: get_resource_policy
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.policy }}'
checks: []
