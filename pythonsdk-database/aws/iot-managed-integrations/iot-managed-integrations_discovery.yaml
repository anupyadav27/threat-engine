version: '1.0'
provider: aws
service: iot-managed-integrations
services:
  client: iot-managed-integrations
  module: boto3.client
discovery:
- discovery_id: aws.iot-managed-integrations.list_managed_things
  calls:
  - action: list_managed_things
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.Items }}'
- discovery_id: aws.iot-managed-integrations.list_account_associations
  calls:
  - action: list_account_associations
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.Items }}'
- discovery_id: aws.iot-managed-integrations.list_cloud_connectors
  calls:
  - action: list_cloud_connectors
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.Items }}'
- discovery_id: aws.iot-managed-integrations.list_ota_tasks
  calls:
  - action: list_ota_tasks
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.Tasks }}'
- discovery_id: aws.iot-managed-integrations.get_default_encryption_configuration
  calls:
  - action: get_default_encryption_configuration
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.configurationStatus }}'
- discovery_id: aws.iot-managed-integrations.list_destinations
  calls:
  - action: list_destinations
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.DestinationList }}'
- discovery_id: aws.iot-managed-integrations.list_provisioning_profiles
  calls:
  - action: list_provisioning_profiles
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.Items }}'
- discovery_id: aws.iot-managed-integrations.list_event_log_configurations
  calls:
  - action: list_event_log_configurations
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.EventLogConfigurationList }}'
- discovery_id: aws.iot-managed-integrations.list_connector_destinations
  calls:
  - action: list_connector_destinations
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.ConnectorDestinationList }}'
- discovery_id: aws.iot-managed-integrations.list_device_discoveries
  calls:
  - action: list_device_discoveries
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.Items }}'
- discovery_id: aws.iot-managed-integrations.list_notification_configurations
  calls:
  - action: list_notification_configurations
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.NotificationConfigurationList }}'
- discovery_id: aws.iot-managed-integrations.get_hub_configuration
  calls:
  - action: get_hub_configuration
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.HubTokenTimerExpirySettingInSeconds }}'
- discovery_id: aws.iot-managed-integrations.list_managed_thing_account_associations
  calls:
  - action: list_managed_thing_account_associations
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.Items }}'
- discovery_id: aws.iot-managed-integrations.get_custom_endpoint
  calls:
  - action: get_custom_endpoint
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.EndpointAddress }}'
- discovery_id: aws.iot-managed-integrations.get_runtime_log_configuration
  for_each: aws.iot-managed-integrations.list_managed_thing_account_associations
  calls:
  - action: get_runtime_log_configuration
    save_as: response
    on_error: continue
    params:
      itemManagedThingId: '{{ item.itemManagedThingId }}'
  emit:
    as: item
    items_for: '{{ response.RuntimeLogConfigurations }}'
- discovery_id: aws.iot-managed-integrations.list_discovered_devices
  calls:
  - action: list_discovered_devices
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.Items }}'
- discovery_id: aws.iot-managed-integrations.get_schema_version
  for_each: aws.iot-managed-integrations.list_cloud_connectors
  calls:
  - action: get_schema_version
    save_as: response
    on_error: continue
    params:
      itemType: '{{ item.itemType }}'
  emit:
    as: item
    items_for: '{{ response.Schema }}'
- discovery_id: aws.iot-managed-integrations.get_managed_thing_capabilities
  calls:
  - action: get_managed_thing_capabilities
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.CapabilityReport }}'
- discovery_id: aws.iot-managed-integrations.get_ota_task
  calls:
  - action: get_ota_task
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.Target }}'
- discovery_id: aws.iot-managed-integrations.get_ota_task_configuration
  calls:
  - action: get_ota_task_configuration
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.PushConfig }}'
- discovery_id: aws.iot-managed-integrations.get_managed_thing_state
  for_each: aws.iot-managed-integrations.list_managed_thing_account_associations
  calls:
  - action: get_managed_thing_state
    save_as: response
    on_error: continue
    params:
      itemManagedThingId: '{{ item.itemManagedThingId }}'
  emit:
    as: item
    items_for: '{{ response.Endpoints }}'
- discovery_id: aws.iot-managed-integrations.get_managed_thing_connectivity_data
  calls:
  - action: get_managed_thing_connectivity_data
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.ManagedThingId }}'
- discovery_id: aws.iot-managed-integrations.list_managed_thing_schemas
  calls:
  - action: list_managed_thing_schemas
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.Items }}'
- discovery_id: aws.iot-managed-integrations.get_cloud_connector
  calls:
  - action: get_cloud_connector
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.EndpointConfig }}'
- discovery_id: aws.iot-managed-integrations.get_connector_destination
  calls:
  - action: get_connector_destination
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.AuthConfig }}'
- discovery_id: aws.iot-managed-integrations.list_ota_task_executions
  calls:
  - action: list_ota_task_executions
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.ExecutionSummaries }}'
checks: []
