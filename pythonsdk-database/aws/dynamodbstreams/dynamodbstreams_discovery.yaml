version: '1.0'
provider: aws
service: dynamodbstreams
services:
  client: dynamodbstreams
  module: boto3.client
discovery:
- discovery_id: aws.dynamodbstreams.list_streams
  calls:
  - action: list_streams
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.Streams }}'
- discovery_id: aws.dynamodbstreams.describe_stream
  for_each: aws.dynamodbstreams.list_streams
  calls:
  - action: describe_stream
    save_as: response
    on_error: continue
    params:
      streamStreamArn: '{{ item.streamStreamArn }}'
  emit:
    as: item
    items_for: '{{ response.StreamDescription }}'
- discovery_id: aws.dynamodbstreams.get_shard_iterator
  for_each: aws.dynamodbstreams.list_streams
  calls:
  - action: get_shard_iterator
    save_as: response
    on_error: continue
    params:
      streamStreamArn: '{{ item.streamStreamArn }}'
  emit:
    as: item
    items_for: '{{ response.ShardIterator }}'
- discovery_id: aws.dynamodbstreams.get_records
  for_each: aws.dynamodbstreams.get_shard_iterator
  calls:
  - action: get_records
    save_as: response
    on_error: continue
    params:
      shardIteratorShardIterator: '{{ item.shardIteratorShardIterator }}'
  emit:
    as: item
    items_for: '{{ response.Records }}'
checks: []
