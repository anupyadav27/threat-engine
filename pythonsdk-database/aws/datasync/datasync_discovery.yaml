version: '1.0'
provider: aws
service: datasync
services:
  client: datasync
  module: boto3.client
discovery:
- discovery_id: aws.datasync.list_agents
  calls:
  - action: list_agents
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.Agents }}'
- discovery_id: aws.datasync.list_tasks
  calls:
  - action: list_tasks
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.Tasks }}'
- discovery_id: aws.datasync.list_task_executions
  calls:
  - action: list_task_executions
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.TaskExecutions }}'
- discovery_id: aws.datasync.list_locations
  calls:
  - action: list_locations
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.Locations }}'
- discovery_id: aws.datasync.describe_agent
  for_each: aws.datasync.list_agents
  calls:
  - action: describe_agent
    save_as: response
    on_error: continue
    params:
      agentAgentArn: '{{ item.agentAgentArn }}'
  emit:
    as: item
    items_for: '{{ response.PrivateLinkConfig }}'
- discovery_id: aws.datasync.describe_task
  for_each: aws.datasync.list_tasks
  calls:
  - action: describe_task
    save_as: response
    on_error: continue
    params:
      taskTaskArn: '{{ item.taskTaskArn }}'
  emit:
    as: item
    items_for: '{{ response.SourceNetworkInterfaceArns }}'
- discovery_id: aws.datasync.describe_task_execution
  for_each: aws.datasync.describe_task
  calls:
  - action: describe_task_execution
    save_as: response
    on_error: continue
    params:
      TaskExecutionArn: '{{ item.taskExecutionArn }}'
  emit:
    as: item
    items_for: '{{ response.Excludes }}'
- discovery_id: aws.datasync.describe_location_hdfs
  for_each: aws.datasync.describe_task
  calls:
  - action: describe_location_hdfs
    save_as: response
    on_error: continue
    params:
      LocationArn: '{{ item.locationArn }}'
  emit:
    as: item
    items_for: '{{ response.NameNodes }}'
- discovery_id: aws.datasync.describe_location_object_storage
  for_each: aws.datasync.describe_task
  calls:
  - action: describe_location_object_storage
    save_as: response
    on_error: continue
    params:
      LocationArn: '{{ item.locationArn }}'
  emit:
    as: item
    items_for: '{{ response.AgentArns }}'
- discovery_id: aws.datasync.describe_location_efs
  for_each: aws.datasync.describe_task
  calls:
  - action: describe_location_efs
    save_as: response
    on_error: continue
    params:
      LocationArn: '{{ item.locationArn }}'
  emit:
    as: item
    items_for: '{{ response.Ec2Config }}'
checks: []
