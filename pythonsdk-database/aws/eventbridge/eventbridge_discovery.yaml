version: '1.0'
provider: aws
service: eventbridge
services:
  client: eventbridge
  module: boto3.client
discovery:
- discovery_id: aws.eventbridge.list_replays
  calls:
  - action: list_replays
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.Replays }}'
- discovery_id: aws.eventbridge.describe_event_bus
  calls:
  - action: describe_event_bus
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.DeadLetterConfig }}'
checks: []
