version: '1.0'
provider: aws
service: kafka
services:
  client: kafka
  module: boto3.client
discovery:
- discovery_id: aws.kafka.list_clusters
  calls:
  - action: list_clusters
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.ClusterInfoList }}'
- discovery_id: aws.kafka.list_clusters_v2
  calls:
  - action: list_clusters_v2
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.ClusterInfoList }}'
- discovery_id: aws.kafka.list_replicators
  calls:
  - action: list_replicators
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.Replicators }}'
- discovery_id: aws.kafka.list_configurations
  calls:
  - action: list_configurations
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.Configurations }}'
- discovery_id: aws.kafka.list_vpc_connections
  calls:
  - action: list_vpc_connections
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.VpcConnections }}'
- discovery_id: aws.kafka.list_kafka_versions
  calls:
  - action: list_kafka_versions
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.KafkaVersions }}'
- discovery_id: aws.kafka.get_compatible_kafka_versions
  calls:
  - action: get_compatible_kafka_versions
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.CompatibleKafkaVersions }}'
- discovery_id: aws.kafka.list_cluster_operations
  for_each: aws.kafka.list_clusters
  calls:
  - action: list_cluster_operations
    save_as: response
    on_error: continue
    params:
      clusterInfoListClusterArn: '{{ item.clusterInfoListClusterArn }}'
  emit:
    as: item
    items_for: '{{ response.ClusterOperationInfoList }}'
- discovery_id: aws.kafka.list_nodes
  for_each: aws.kafka.list_clusters
  calls:
  - action: list_nodes
    save_as: response
    on_error: continue
    params:
      clusterInfoListClusterArn: '{{ item.clusterInfoListClusterArn }}'
  emit:
    as: item
    items_for: '{{ response.NodeInfoList }}'
- discovery_id: aws.kafka.describe_replicator
  for_each: aws.kafka.list_replicators
  calls:
  - action: describe_replicator
    save_as: response
    on_error: continue
    params:
      replicatorReplicatorArn: '{{ item.replicatorReplicatorArn }}'
  emit:
    as: item
    items_for: '{{ response.ReplicationInfoList }}'
- discovery_id: aws.kafka.list_topics
  for_each: aws.kafka.list_clusters
  calls:
  - action: list_topics
    save_as: response
    on_error: continue
    params:
      clusterInfoListClusterArn: '{{ item.clusterInfoListClusterArn }}'
  emit:
    as: item
    items_for: '{{ response.Topics }}'
- discovery_id: aws.kafka.describe_topic_partitions
  for_each: aws.kafka.list_clusters
  calls:
  - action: describe_topic_partitions
    save_as: response
    on_error: continue
    params:
      clusterInfoListClusterArn: '{{ item.clusterInfoListClusterArn }}'
      topicTopicName: '{{ item.topicTopicName }}'
  emit:
    as: item
    items_for: '{{ response.Partitions }}'
- discovery_id: aws.kafka.describe_cluster
  for_each: aws.kafka.list_clusters
  calls:
  - action: describe_cluster
    save_as: response
    on_error: continue
    params:
      clusterInfoListClusterArn: '{{ item.clusterInfoListClusterArn }}'
  emit:
    as: item
    items_for: '{{ response.ClusterInfo }}'
- discovery_id: aws.kafka.describe_cluster_operation_v2
  calls:
  - action: describe_cluster_operation_v2
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.ClusterOperationInfo }}'
- discovery_id: aws.kafka.describe_vpc_connection
  for_each: aws.kafka.list_configurations
  calls:
  - action: describe_vpc_connection
    save_as: response
    on_error: continue
    params:
      configurationArn: '{{ item.configurationArn }}'
  emit:
    as: item
    items_for: '{{ response.SecurityGroups }}'
- discovery_id: aws.kafka.describe_topic
  for_each: aws.kafka.list_clusters
  calls:
  - action: describe_topic
    save_as: response
    on_error: continue
    params:
      clusterInfoListClusterArn: '{{ item.clusterInfoListClusterArn }}'
      topicTopicName: '{{ item.topicTopicName }}'
  emit:
    as: item
    items_for: '{{ response.TopicArn }}'
- discovery_id: aws.kafka.list_client_vpc_connections
  for_each: aws.kafka.list_clusters
  calls:
  - action: list_client_vpc_connections
    save_as: response
    on_error: continue
    params:
      clusterInfoListClusterArn: '{{ item.clusterInfoListClusterArn }}'
  emit:
    as: item
    items_for: '{{ response.ClientVpcConnections }}'
- discovery_id: aws.kafka.list_configuration_revisions
  for_each: aws.kafka.list_configurations
  calls:
  - action: list_configuration_revisions
    save_as: response
    on_error: continue
    params:
      configurationArn: '{{ item.configurationArn }}'
  emit:
    as: item
    items_for: '{{ response.Revisions }}'
checks: []
