- discovery_id: aws.customer-profiles.list_object_type_attributes
  for_each: aws.customer-profiles.list_domains
  calls:
  - action: list_object_type_attributes
    save_as: response
    on_error: continue
    params:
      itemDomainName: '{{ item.itemDomainName }}'
