  emit:
    as: item
    items_for: '{{ response.Items }}'
- discovery_id: aws.customer-profiles.get_segment_membership
  for_each: aws.customer-profiles.list_domains
  calls:
  - action: get_segment_membership
    save_as: response
    on_error: continue
    params:
      itemDomainName: '{{ item.itemDomainName }}'
      itemSegmentDefinitionName: '{{ item.itemSegmentDefinitionName }}'
      matchProfileIds: '{{ item.matchProfileIds }}'
  emit:
    as: item
    items_for: '{{ response.Profiles }}'
- discovery_id: aws.customer-profiles.get_segment_estimate
  for_each: aws.customer-profiles.list_domains
  calls:
  - action: get_segment_estimate
    save_as: response
    on_error: continue
    params:
      itemDomainName: '{{ item.itemDomainName }}'
  emit:
    as: item
    items_for: '{{ response.DomainName }}'
- discovery_id: aws.customer-profiles.get_segment_definition
  for_each: aws.customer-profiles.list_domains
  calls:
  - action: get_segment_definition
    save_as: response
    on_error: continue
    params:
      itemDomainName: '{{ item.itemDomainName }}'
      itemSegmentDefinitionName: '{{ item.itemSegmentDefinitionName }}'
  emit:
    as: item
    items_for: '{{ response.SegmentGroups }}'
- discovery_id: aws.customer-profiles.list_workflows
  for_each: aws.customer-profiles.list_domains
  calls:
  - action: list_workflows
    save_as: response
    on_error: continue
    params:
      itemDomainName: '{{ item.itemDomainName }}'
  emit:
    as: item
    items_for: '{{ response.Items }}'
- discovery_id: aws.customer-profiles.list_event_triggers
  for_each: aws.customer-profiles.list_domains
  calls:
  - action: list_event_triggers
    save_as: response
    on_error: continue
    params:
      itemDomainName: '{{ item.itemDomainName }}'
  emit:
