    items_for: '{{ response.Items }}'
- discovery_id: aws.customer-profiles.get_event_trigger
  for_each: aws.customer-profiles.list_domains
  calls:
  - action: get_event_trigger
    save_as: response
    on_error: continue
    params:
      itemDomainName: '{{ item.itemDomainName }}'
      itemEventTriggerName: '{{ item.itemEventTriggerName }}'
  emit:
