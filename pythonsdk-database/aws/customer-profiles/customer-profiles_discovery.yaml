version: '1.0'
provider: aws
service: customer-profiles
services:
  client: customer-profiles
  module: boto3.client
discovery:
- discovery_id: aws.customer-profiles.list_domains
  calls:
  - action: list_domains
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.Items }}'
- discovery_id: aws.customer-profiles.list_profile_object_type_templates
  calls:
  - action: list_profile_object_type_templates
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.Items }}'
- discovery_id: aws.customer-profiles.get_domain
  for_each: aws.customer-profiles.list_domains
  calls:
  - action: get_domain
    save_as: response
    on_error: continue
    params:
      itemDomainName: '{{ item.itemDomainName }}'
  emit:
    as: item
    items_for: '{{ response.Stats }}'
- discovery_id: aws.customer-profiles.list_integrations
  for_each: aws.customer-profiles.list_domains
  calls:
  - action: list_integrations
    save_as: response
    on_error: continue
    params:
      itemDomainName: '{{ item.itemDomainName }}'
  emit:
    as: item
    items_for: '{{ response.Items }}'
- discovery_id: aws.customer-profiles.list_identity_resolution_jobs
  for_each: aws.customer-profiles.list_domains
  calls:
  - action: list_identity_resolution_jobs
    save_as: response
    on_error: continue
    params:
      itemDomainName: '{{ item.itemDomainName }}'
  emit:
    as: item
    items_for: '{{ response.IdentityResolutionJobsList }}'
- discovery_id: aws.customer-profiles.get_upload_job
  for_each: aws.customer-profiles.list_identity_resolution_jobs
  calls:
  - action: get_upload_job
    save_as: response
    on_error: continue
    params:
      identityResolutionJobsListJobId: '{{ item.identityResolutionJobsListJobId }}'
      itemDomainName: '{{ item.itemDomainName }}'
  emit:
    as: item
    items_for: '{{ response.ResultsSummary }}'
- discovery_id: aws.customer-profiles.get_profile_object_type
  for_each: aws.customer-profiles.list_domains
  calls:
  - action: get_profile_object_type
    save_as: response
    on_error: continue
    params:
      itemDomainName: '{{ item.itemDomainName }}'
      itemObjectTypeName: '{{ item.itemObjectTypeName }}'
  emit:
    as: item
    items_for: '{{ response.ObjectTypeName }}'
- discovery_id: aws.customer-profiles.get_matches
  for_each: aws.customer-profiles.list_domains
  calls:
  - action: get_matches
    save_as: response
    on_error: continue
    params:
      itemDomainName: '{{ item.itemDomainName }}'
  emit:
    as: item
    items_for: '{{ response.Matches }}'
- discovery_id: aws.customer-profiles.get_identity_resolution_job
  for_each: aws.customer-profiles.list_identity_resolution_jobs
  calls:
  - action: get_identity_resolution_job
    save_as: response
    on_error: continue
    params:
      identityResolutionJobsListJobId: '{{ item.identityResolutionJobsListJobId }}'
      itemDomainName: '{{ item.itemDomainName }}'
  emit:
    as: item
    items_for: '{{ response.AutoMerging }}'
- discovery_id: aws.customer-profiles.list_event_streams
  for_each: aws.customer-profiles.list_domains
  calls:
  - action: list_event_streams
    save_as: response
    on_error: continue
    params:
      itemDomainName: '{{ item.itemDomainName }}'
  emit:
    as: item
    items_for: '{{ response.Items }}'
- discovery_id: aws.customer-profiles.get_workflow
  for_each: aws.customer-profiles.list_domains
  calls:
  - action: get_workflow
    save_as: response
    on_error: continue
    params:
      itemDomainName: '{{ item.itemDomainName }}'
      itemWorkflowId: '{{ item.itemWorkflowId }}'
  emit:
    as: item
    items_for: '{{ response.Attributes }}'
- discovery_id: aws.customer-profiles.list_profile_history_records
  for_each: aws.customer-profiles.list_domains
  calls:
  - action: list_profile_history_records
    save_as: response
    on_error: continue
    params:
      itemDomainName: '{{ item.itemDomainName }}'
  emit:
    as: item
    items_for: '{{ response.ProfileHistoryRecords }}'
- discovery_id: aws.customer-profiles.list_calculated_attributes_for_profile
  for_each: aws.customer-profiles.list_domains
  calls:
  - action: list_calculated_attributes_for_profile
    save_as: response
    on_error: continue
    params:
      itemDomainName: '{{ item.itemDomainName }}'
  emit:
    as: item
    items_for: '{{ response.Items }}'
- discovery_id: aws.customer-profiles.get_calculated_attribute_definition
  for_each: aws.customer-profiles.list_calculated_attributes_for_profile
  calls:
  - action: get_calculated_attribute_definition
    save_as: response
    on_error: continue
    params:
      itemCalculatedAttributeName: '{{ item.itemCalculatedAttributeName }}'
      itemDomainName: '{{ item.itemDomainName }}'
  emit:
    as: item
    items_for: '{{ response.Filter }}'
- discovery_id: aws.customer-profiles.list_domain_layouts
  for_each: aws.customer-profiles.list_domains
  calls:
  - action: list_domain_layouts
    save_as: response
    on_error: continue
    params:
      itemDomainName: '{{ item.itemDomainName }}'
  emit:
    as: item
    items_for: '{{ response.Items }}'
- discovery_id: aws.customer-profiles.get_auto_merging_preview
  for_each: aws.customer-profiles.get_identity_resolution_job
  calls:
  - action: get_auto_merging_preview
    save_as: response
    on_error: continue
    params:
      autoMergingConflictResolution: '{{ item.autoMergingConflictResolution }}'
      autoMergingConsolidation: '{{ item.autoMergingConsolidation }}'
      itemDomainName: '{{ item.itemDomainName }}'
  emit:
    as: item
    items_for: '{{ response.DomainName }}'
- discovery_id: aws.customer-profiles.get_upload_job_path
  for_each: aws.customer-profiles.list_identity_resolution_jobs
  calls:
  - action: get_upload_job_path
    save_as: response
    on_error: continue
    params:
      identityResolutionJobsListJobId: '{{ item.identityResolutionJobsListJobId }}'
      itemDomainName: '{{ item.itemDomainName }}'
  emit:
    as: item
    items_for: '{{ response.Url }}'
- discovery_id: aws.customer-profiles.get_event_stream
  for_each: aws.customer-profiles.list_domains
  calls:
  - action: get_event_stream
    save_as: response
    on_error: continue
    params:
      itemDomainName: '{{ item.itemDomainName }}'
      itemEventStreamName: '{{ item.itemEventStreamName }}'
  emit:
    as: item
    items_for: '{{ response.DestinationDetails }}'
- discovery_id: aws.customer-profiles.get_domain_layout
  for_each: aws.customer-profiles.list_domains
  calls:
  - action: get_domain_layout
    save_as: response
    on_error: continue
    params:
