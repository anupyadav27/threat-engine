version: '1.0'
provider: aws
service: datazone
services:
  client: datazone
  module: boto3.client
discovery:
- discovery_id: aws.datazone.list_domains
  calls:
  - action: list_domains
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.items }}'
checks: []
