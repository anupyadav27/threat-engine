version: '1.0'
provider: aws
service: codecatalyst
services:
  client: codecatalyst
  module: boto3.client
discovery:
- discovery_id: aws.codecatalyst.get_user_details
  calls:
  - action: get_user_details
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.primaryEmail }}'
- discovery_id: aws.codecatalyst.list_spaces
  calls:
  - action: list_spaces
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.items }}'
- discovery_id: aws.codecatalyst.list_access_tokens
  calls:
  - action: list_access_tokens
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.items }}'
checks: []
