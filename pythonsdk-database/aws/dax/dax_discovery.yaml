version: '1.0'
provider: aws
service: dax
services:
  client: dax
  module: boto3.client
discovery:
- discovery_id: aws.dax.describe_clusters
  calls:
  - action: describe_clusters
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.Clusters }}'
- discovery_id: aws.dax.describe_default_parameters
  calls:
  - action: describe_default_parameters
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.Parameters }}'
- discovery_id: aws.dax.describe_subnet_groups
  calls:
  - action: describe_subnet_groups
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.SubnetGroups }}'
- discovery_id: aws.dax.describe_events
  calls:
  - action: describe_events
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.Events }}'
- discovery_id: aws.dax.describe_parameter_groups
  calls:
  - action: describe_parameter_groups
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.ParameterGroups }}'
- discovery_id: aws.dax.list_tags
  calls:
  - action: list_tags
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.Tags }}'
checks: []
