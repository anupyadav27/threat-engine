version: '1.0'
provider: aws
service: bcm-pricing-calculator
services:
  client: bcm-pricing-calculator
  module: boto3.client
discovery:
- discovery_id: aws.bcm-pricing-calculator.list_workload_estimates
  calls:
  - action: list_workload_estimates
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.items }}'
- discovery_id: aws.bcm-pricing-calculator.list_bill_scenarios
  calls:
  - action: list_bill_scenarios
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.items }}'
- discovery_id: aws.bcm-pricing-calculator.get_preferences
  calls:
  - action: get_preferences
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.managementAccountRateTypeSelections }}'
- discovery_id: aws.bcm-pricing-calculator.list_bill_estimate_line_items
  calls:
  - action: list_bill_estimate_line_items
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.items }}'
- discovery_id: aws.bcm-pricing-calculator.list_bill_estimate_commitments
  calls:
  - action: list_bill_estimate_commitments
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.items }}'
- discovery_id: aws.bcm-pricing-calculator.list_workload_estimate_usage
  calls:
  - action: list_workload_estimate_usage
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.items }}'
- discovery_id: aws.bcm-pricing-calculator.get_bill_estimate
  calls:
  - action: get_bill_estimate
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.billInterval }}'
- discovery_id: aws.bcm-pricing-calculator.list_bill_scenario_usage_modifications
  calls:
  - action: list_bill_scenario_usage_modifications
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.items }}'
- discovery_id: aws.bcm-pricing-calculator.list_bill_scenario_commitment_modifications
  calls:
  - action: list_bill_scenario_commitment_modifications
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.items }}'
checks: []
