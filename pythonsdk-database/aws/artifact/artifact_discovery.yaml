version: '1.0'
provider: aws
service: artifact
services:
  client: artifact
  module: boto3.client
discovery:
- discovery_id: aws.artifact.list_reports
  calls:
  - action: list_reports
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.reports }}'
- discovery_id: aws.artifact.list_customer_agreements
  calls:
  - action: list_customer_agreements
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.customerAgreements }}'
- discovery_id: aws.artifact.get_account_settings
  calls:
  - action: get_account_settings
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.accountSettings }}'
- discovery_id: aws.artifact.get_report_metadata
  calls:
  - action: get_report_metadata
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.reportDetails }}'
checks: []
