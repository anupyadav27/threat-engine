version: '1.0'
provider: aws
service: batch
services:
  client: batch
  module: boto3.client
discovery:
- discovery_id: aws.batch.describe_job_definitions
  calls:
  - action: describe_job_definitions
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.jobDefinitions }}'
- discovery_id: aws.batch.describe_compute_environments
  calls:
  - action: describe_compute_environments
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.computeEnvironments }}'
- discovery_id: aws.batch.describe_job_queues
  calls:
  - action: describe_job_queues
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.jobQueues }}'
- discovery_id: aws.batch.list_jobs
  calls:
  - action: list_jobs
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.jobSummaryList }}'
- discovery_id: aws.batch.list_service_jobs
  calls:
  - action: list_service_jobs
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.jobSummaryList }}'
- discovery_id: aws.batch.describe_service_environments
  calls:
  - action: describe_service_environments
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.serviceEnvironments }}'
- discovery_id: aws.batch.list_consumable_resources
  calls:
  - action: list_consumable_resources
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.consumableResources }}'
- discovery_id: aws.batch.list_scheduling_policies
  calls:
  - action: list_scheduling_policies
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.schedulingPolicies }}'
- discovery_id: aws.batch.describe_service_job
  for_each: aws.batch.list_jobs
  calls:
  - action: describe_service_job
    save_as: response
    on_error: continue
    params:
      jobSummaryListJobId: '{{ item.jobSummaryListJobId }}'
  emit:
    as: item
    items_for: '{{ response.attempts }}'
- discovery_id: aws.batch.list_jobs_by_consumable_resource
  calls:
  - action: list_jobs_by_consumable_resource
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.jobs }}'
- discovery_id: aws.batch.describe_jobs
  for_each: aws.batch.list_jobs_by_consumable_resource
  calls:
  - action: describe_jobs
    save_as: response
    on_error: continue
    params:
      frontOfQueueJobs: '{{ item.frontOfQueueJobs }}'
  emit:
    as: item
    items_for: '{{ response.jobs }}'
- discovery_id: aws.batch.describe_scheduling_policies
  calls:
  - action: describe_scheduling_policies
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.schedulingPolicies }}'
- discovery_id: aws.batch.get_job_queue_snapshot
  for_each: aws.batch.describe_service_job
  calls:
  - action: get_job_queue_snapshot
    save_as: response
    on_error: continue
    params:
      jobJobQueue: '{{ item.jobJobQueue }}'
  emit:
    as: item
    items_for: '{{ response.frontOfQueue }}'
checks: []
