version: '1.0'
provider: aws
service: codedeploy
services:
  client: codedeploy
  module: boto3.client
discovery:
- discovery_id: aws.codedeploy.list_tags_for_resource
  calls:
  - action: list_tags_for_resource
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.Tags }}'
checks: []
