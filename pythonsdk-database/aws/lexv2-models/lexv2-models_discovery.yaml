    on_error: continue
    params:
      botAliasHistoryEventBotVersion: '{{ item.botAliasHistoryEventBotVersion }}'
      botLocaleSummaryLocaleId: '{{ item.botLocaleSummaryLocaleId }}'
      botSummaryBotId: '{{ item.botSummaryBotId }}'
      intentSummaryIntentId: '{{ item.intentSummaryIntentId }}'
  emit:
    as: item
    items_for: '{{ response.slotSummaries }}'
- discovery_id: aws.lexv2-models.describe_slot_type
  for_each: aws.lexv2-models.list_imports
