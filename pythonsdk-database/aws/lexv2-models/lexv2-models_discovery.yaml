      botLocaleSummaryLocaleId: '{{ item.botLocaleSummaryLocaleId }}'
      botSummaryBotId: '{{ item.botSummaryBotId }}'
      intentSummaryIntentId: '{{ item.intentSummaryIntentId }}'
      slotSummarySlotId: '{{ item.slotSummarySlotId }}'
  emit:
    as: item
    items_for: '{{ response.valueElicitationSetting }}'
- discovery_id: aws.lexv2-models.list_aggregated_utterances
