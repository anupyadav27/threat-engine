version: '1.0'
provider: aws
service: lexv2-models
services:
  client: lexv2-models
  module: boto3.client
discovery:
- discovery_id: aws.lexv2-models.list_imports
  calls:
  - action: list_imports
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.importSummaries }}'
- discovery_id: aws.lexv2-models.list_test_sets
  calls:
  - action: list_test_sets
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.testSets }}'
- discovery_id: aws.lexv2-models.list_test_executions
  calls:
  - action: list_test_executions
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.testExecutions }}'
- discovery_id: aws.lexv2-models.list_exports
  calls:
  - action: list_exports
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.exportSummaries }}'
- discovery_id: aws.lexv2-models.list_bots
  calls:
  - action: list_bots
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.botSummaries }}'
- discovery_id: aws.lexv2-models.list_utterance_analytics_data
  for_each: aws.lexv2-models.list_imports
  calls:
  - action: list_utterance_analytics_data
    save_as: response
    on_error: continue
    params:
      botSummaryBotId: '{{ item.botSummaryBotId }}'
  emit:
    as: item
    items_for: '{{ response.utterances }}'
- discovery_id: aws.lexv2-models.describe_bot_locale
  for_each: aws.lexv2-models.list_imports
  calls:
  - action: describe_bot_locale
    save_as: response
    on_error: continue
    params:
      botAliasHistoryEventBotVersion: '{{ item.botAliasHistoryEventBotVersion }}'
      botLocaleSummaryLocaleId: '{{ item.botLocaleSummaryLocaleId }}'
      botSummaryBotId: '{{ item.botSummaryBotId }}'
  emit:
    as: item
    items_for: '{{ response.failureReasons }}'
- discovery_id: aws.lexv2-models.describe_bot
  for_each: aws.lexv2-models.list_imports
  calls:
  - action: describe_bot
    save_as: response
    on_error: continue
    params:
      botSummaryBotId: '{{ item.botSummaryBotId }}'
  emit:
    as: item
    items_for: '{{ response.botMembers }}'
- discovery_id: aws.lexv2-models.describe_bot_alias
  for_each: aws.lexv2-models.list_utterance_analytics_data
  calls:
  - action: describe_bot_alias
    save_as: response
    on_error: continue
    params:
      botAliasReplicaSummaryBotAliasId: '{{ item.botAliasReplicaSummaryBotAliasId
        }}'
      botSummaryBotId: '{{ item.botSummaryBotId }}'
  emit:
    as: item
    items_for: '{{ response.botAliasHistoryEvents }}'
- discovery_id: aws.lexv2-models.list_intents
  for_each: aws.lexv2-models.list_imports
  calls:
  - action: list_intents
    save_as: response
    on_error: continue
