version: '1.0'
provider: aws
service: lakeformation
services:
  client: lakeformation
  module: boto3.client
discovery:
- discovery_id: aws.lakeformation.get_data_lake_settings
  calls:
  - action: get_data_lake_settings
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.DataLakeSettings }}'
- discovery_id: aws.lakeformation.list_data_cells_filter
  calls:
  - action: list_data_cells_filter
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.DataCellsFilters }}'
- discovery_id: aws.lakeformation.list_permissions
  calls:
  - action: list_permissions
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.PrincipalResourcePermissions }}'
- discovery_id: aws.lakeformation.list_resources
  calls:
  - action: list_resources
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.ResourceInfoList }}'
- discovery_id: aws.lakeformation.list_transactions
  calls:
  - action: list_transactions
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.Transactions }}'
- discovery_id: aws.lakeformation.list_lf_tag_expressions
  calls:
  - action: list_lf_tag_expressions
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.LFTagExpressions }}'
- discovery_id: aws.lakeformation.list_lf_tags
  calls:
  - action: list_lf_tags
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.LFTags }}'
- discovery_id: aws.lakeformation.describe_lake_formation_identity_center_configuration
  calls:
  - action: describe_lake_formation_identity_center_configuration
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.ShareRecipients }}'
- discovery_id: aws.lakeformation.get_data_lake_principal
  calls:
  - action: get_data_lake_principal
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.Identity }}'
- discovery_id: aws.lakeformation.list_table_storage_optimizers
  for_each: aws.lakeformation.list_data_cells_filter
  calls:
  - action: list_table_storage_optimizers
    save_as: response
    on_error: continue
    params:
      dataCellsFilterDatabaseName: '{{ item.dataCellsFilterDatabaseName }}'
      dataCellsFilterTableName: '{{ item.dataCellsFilterTableName }}'
  emit:
    as: item
    items_for: '{{ response.StorageOptimizerList }}'
- discovery_id: aws.lakeformation.get_work_units
  calls:
  - action: get_work_units
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.WorkUnitRanges }}'
- discovery_id: aws.lakeformation.get_query_statistics
  calls:
  - action: get_query_statistics
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.ExecutionStatistics }}'
- discovery_id: aws.lakeformation.get_table_objects
  for_each: aws.lakeformation.list_data_cells_filter
  calls:
  - action: get_table_objects
    save_as: response
    on_error: continue
    params:
      dataCellsFilterDatabaseName: '{{ item.dataCellsFilterDatabaseName }}'
      dataCellsFilterTableName: '{{ item.dataCellsFilterTableName }}'
  emit:
    as: item
    items_for: '{{ response.Objects }}'
- discovery_id: aws.lakeformation.describe_resource
  for_each: aws.lakeformation.list_resources
  calls:
  - action: describe_resource
    save_as: response
    on_error: continue
    params:
      resourceInfoListResourceArn: '{{ item.resourceInfoListResourceArn }}'
  emit:
    as: item
    items_for: '{{ response.ResourceInfo }}'
- discovery_id: aws.lakeformation.get_query_state
  calls:
  - action: get_query_state
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.Error }}'
checks: []
