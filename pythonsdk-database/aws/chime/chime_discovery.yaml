version: '1.0'
provider: aws
service: chime
services:
  client: chime
  module: boto3.client
discovery:
- discovery_id: aws.chime.list_phone_numbers
  calls:
  - action: list_phone_numbers
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.PhoneNumbers }}'
- discovery_id: aws.chime.list_accounts
  calls:
  - action: list_accounts
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.Accounts }}'
- discovery_id: aws.chime.list_phone_number_orders
  calls:
  - action: list_phone_number_orders
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.PhoneNumberOrders }}'
- discovery_id: aws.chime.get_global_settings
  calls:
  - action: get_global_settings
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.BusinessCalling }}'
- discovery_id: aws.chime.get_phone_number_settings
  calls:
  - action: get_phone_number_settings
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.CallingName }}'
- discovery_id: aws.chime.list_users
  for_each: aws.chime.list_accounts
  calls:
  - action: list_users
    save_as: response
    on_error: continue
    params:
      accountAccountId: '{{ item.accountAccountId }}'
  emit:
    as: item
    items_for: '{{ response.Users }}'
- discovery_id: aws.chime.list_bots
  for_each: aws.chime.list_accounts
  calls:
  - action: list_bots
    save_as: response
    on_error: continue
    params:
      accountAccountId: '{{ item.accountAccountId }}'
  emit:
    as: item
    items_for: '{{ response.Bots }}'
- discovery_id: aws.chime.get_retention_settings
  for_each: aws.chime.list_accounts
  calls:
  - action: get_retention_settings
    save_as: response
    on_error: continue
    params:
      accountAccountId: '{{ item.accountAccountId }}'
  emit:
    as: item
    items_for: '{{ response.RetentionSettings }}'
- discovery_id: aws.chime.list_rooms
  for_each: aws.chime.list_accounts
  calls:
  - action: list_rooms
    save_as: response
    on_error: continue
    params:
      accountAccountId: '{{ item.accountAccountId }}'
  emit:
    as: item
    items_for: '{{ response.Rooms }}'
- discovery_id: aws.chime.list_room_memberships
  for_each: aws.chime.list_accounts
  calls:
  - action: list_room_memberships
    save_as: response
    on_error: continue
    params:
      accountAccountId: '{{ item.accountAccountId }}'
      roomRoomId: '{{ item.roomRoomId }}'
  emit:
    as: item
    items_for: '{{ response.RoomMemberships }}'
- discovery_id: aws.chime.get_events_configuration
  for_each: aws.chime.list_accounts
  calls:
  - action: get_events_configuration
    save_as: response
    on_error: continue
    params:
      accountAccountId: '{{ item.accountAccountId }}'
      botBotId: '{{ item.botBotId }}'
  emit:
    as: item
    items_for: '{{ response.EventsConfiguration }}'
- discovery_id: aws.chime.list_supported_phone_number_countries
  for_each: aws.chime.list_phone_numbers
  calls:
  - action: list_supported_phone_number_countries
    save_as: response
    on_error: continue
    params:
      phoneNumberOrderProductType: '{{ item.phoneNumberOrderProductType }}'
  emit:
    as: item
    items_for: '{{ response.PhoneNumberCountries }}'
- discovery_id: aws.chime.get_account_settings
  for_each: aws.chime.list_accounts
  calls:
  - action: get_account_settings
    save_as: response
    on_error: continue
    params:
      accountAccountId: '{{ item.accountAccountId }}'
  emit:
    as: item
    items_for: '{{ response.AccountSettings }}'
- discovery_id: aws.chime.get_phone_number
  for_each: aws.chime.list_phone_numbers
  calls:
  - action: get_phone_number
    save_as: response
    on_error: continue
    params:
      phoneNumberPhoneNumberId: '{{ item.phoneNumberPhoneNumberId }}'
  emit:
    as: item
    items_for: '{{ response.PhoneNumber }}'
- discovery_id: aws.chime.get_user_settings
  for_each: aws.chime.list_accounts
  calls:
  - action: get_user_settings
    save_as: response
    on_error: continue
    params:
      accountAccountId: '{{ item.accountAccountId }}'
      botUserId: '{{ item.botUserId }}'
  emit:
    as: item
    items_for: '{{ response.UserSettings }}'
checks: []
