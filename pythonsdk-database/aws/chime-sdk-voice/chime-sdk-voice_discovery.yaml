version: '1.0'
provider: aws
service: chime-sdk-voice
services:
  client: chime-sdk-voice
  module: boto3.client
discovery:
- discovery_id: aws.chime-sdk-voice.list_phone_numbers
  calls:
  - action: list_phone_numbers
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.PhoneNumbers }}'
- discovery_id: aws.chime-sdk-voice.list_voice_connectors
  calls:
  - action: list_voice_connectors
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.VoiceConnectors }}'
- discovery_id: aws.chime-sdk-voice.list_sip_rules
  calls:
  - action: list_sip_rules
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.SipRules }}'
- discovery_id: aws.chime-sdk-voice.list_phone_number_orders
  calls:
  - action: list_phone_number_orders
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.PhoneNumberOrders }}'
- discovery_id: aws.chime-sdk-voice.list_sip_media_applications
  calls:
  - action: list_sip_media_applications
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.SipMediaApplications }}'
- discovery_id: aws.chime-sdk-voice.list_voice_connector_groups
  calls:
  - action: list_voice_connector_groups
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.VoiceConnectorGroups }}'
- discovery_id: aws.chime-sdk-voice.list_voice_profile_domains
  calls:
  - action: list_voice_profile_domains
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.VoiceProfileDomains }}'
- discovery_id: aws.chime-sdk-voice.get_global_settings
  calls:
  - action: get_global_settings
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.VoiceConnector }}'
- discovery_id: aws.chime-sdk-voice.list_proxy_sessions
  for_each: aws.chime-sdk-voice.list_voice_connectors
  calls:
  - action: list_proxy_sessions
    save_as: response
    on_error: continue
    params:
      voiceConnectorVoiceConnectorId: '{{ item.voiceConnectorVoiceConnectorId }}'
  emit:
    as: item
    items_for: '{{ response.ProxySessions }}'
- discovery_id: aws.chime-sdk-voice.get_voice_connector_termination
  for_each: aws.chime-sdk-voice.list_voice_connectors
  calls:
  - action: get_voice_connector_termination
    save_as: response
    on_error: continue
    params:
      voiceConnectorVoiceConnectorId: '{{ item.voiceConnectorVoiceConnectorId }}'
  emit:
    as: item
    items_for: '{{ response.Termination }}'
- discovery_id: aws.chime-sdk-voice.get_voice_connector_proxy
  for_each: aws.chime-sdk-voice.list_voice_connectors
  calls:
  - action: get_voice_connector_proxy
    save_as: response
    on_error: continue
    params:
      voiceConnectorVoiceConnectorId: '{{ item.voiceConnectorVoiceConnectorId }}'
  emit:
    as: item
    items_for: '{{ response.Proxy }}'
- discovery_id: aws.chime-sdk-voice.list_voice_profiles
  for_each: aws.chime-sdk-voice.list_voice_profile_domains
  calls:
  - action: list_voice_profiles
    save_as: response
    on_error: continue
    params:
      voiceProfileDomainVoiceProfileDomainId: '{{ item.voiceProfileDomainVoiceProfileDomainId
        }}'
  emit:
    as: item
    items_for: '{{ response.VoiceProfiles }}'
- discovery_id: aws.chime-sdk-voice.get_voice_connector_streaming_configuration
  for_each: aws.chime-sdk-voice.list_voice_connectors
  calls:
  - action: get_voice_connector_streaming_configuration
    save_as: response
    on_error: continue
    params:
      voiceConnectorVoiceConnectorId: '{{ item.voiceConnectorVoiceConnectorId }}'
  emit:
    as: item
    items_for: '{{ response.StreamingConfiguration }}'
- discovery_id: aws.chime-sdk-voice.list_supported_phone_number_countries
  for_each: aws.chime-sdk-voice.list_phone_numbers
  calls:
  - action: list_supported_phone_number_countries
    save_as: response
    on_error: continue
    params:
      phoneNumberOrderProductType: '{{ item.phoneNumberOrderProductType }}'
  emit:
    as: item
    items_for: '{{ response.PhoneNumberCountries }}'
- discovery_id: aws.chime-sdk-voice.get_voice_connector_origination
  for_each: aws.chime-sdk-voice.list_voice_connectors
  calls:
  - action: get_voice_connector_origination
    save_as: response
    on_error: continue
    params:
      voiceConnectorVoiceConnectorId: '{{ item.voiceConnectorVoiceConnectorId }}'
  emit:
    as: item
    items_for: '{{ response.Origination }}'
- discovery_id: aws.chime-sdk-voice.get_voice_connector_external_systems_configuration
  for_each: aws.chime-sdk-voice.list_voice_connectors
  calls:
  - action: get_voice_connector_external_systems_configuration
    save_as: response
    on_error: continue
    params:
      voiceConnectorVoiceConnectorId: '{{ item.voiceConnectorVoiceConnectorId }}'
  emit:
    as: item
    items_for: '{{ response.ExternalSystemsConfiguration }}'
- discovery_id: aws.chime-sdk-voice.get_voice_connector_termination_health
  for_each: aws.chime-sdk-voice.list_voice_connectors
  calls:
  - action: get_voice_connector_termination_health
    save_as: response
    on_error: continue
    params:
      voiceConnectorVoiceConnectorId: '{{ item.voiceConnectorVoiceConnectorId }}'
  emit:
    as: item
    items_for: '{{ response.TerminationHealth }}'
- discovery_id: aws.chime-sdk-voice.list_tags_for_resource
  calls:
  - action: list_tags_for_resource
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.Tags }}'
- discovery_id: aws.chime-sdk-voice.get_voice_connector_logging_configuration
  for_each: aws.chime-sdk-voice.list_voice_connectors
  calls:
  - action: get_voice_connector_logging_configuration
    save_as: response
    on_error: continue
    params:
      voiceConnectorVoiceConnectorId: '{{ item.voiceConnectorVoiceConnectorId }}'
  emit:
    as: item
    items_for: '{{ response.LoggingConfiguration }}'
- discovery_id: aws.chime-sdk-voice.get_sip_media_application_alexa_skill_configuration
  for_each: aws.chime-sdk-voice.list_sip_media_applications
  calls:
  - action: get_sip_media_application_alexa_skill_configuration
    save_as: response
    on_error: continue
    params:
      sipMediaApplicationSipMediaApplicationId: '{{ item.sipMediaApplicationSipMediaApplicationId
        }}'
  emit:
    as: item
    items_for: '{{ response.SipMediaApplicationAlexaSkillConfiguration }}'
- discovery_id: aws.chime-sdk-voice.get_phone_number
  for_each: aws.chime-sdk-voice.list_phone_numbers
  calls:
  - action: get_phone_number
    save_as: response
    on_error: continue
    params:
      phoneNumberPhoneNumberId: '{{ item.phoneNumberPhoneNumberId }}'
  emit:
    as: item
    items_for: '{{ response.PhoneNumber }}'
- discovery_id: aws.chime-sdk-voice.get_voice_profile_domain
  for_each: aws.chime-sdk-voice.list_voice_profile_domains
  calls:
  - action: get_voice_profile_domain
    save_as: response
    on_error: continue
    params:
      voiceProfileDomainVoiceProfileDomainId: '{{ item.voiceProfileDomainVoiceProfileDomainId
        }}'
  emit:
    as: item
    items_for: '{{ response.VoiceProfileDomain }}'
- discovery_id: aws.chime-sdk-voice.get_voice_connector_emergency_calling_configuration
  for_each: aws.chime-sdk-voice.list_voice_connectors
  calls:
  - action: get_voice_connector_emergency_calling_configuration
    save_as: response
    on_error: continue
    params:
      voiceConnectorVoiceConnectorId: '{{ item.voiceConnectorVoiceConnectorId }}'
  emit:
    as: item
    items_for: '{{ response.EmergencyCallingConfiguration }}'
- discovery_id: aws.chime-sdk-voice.get_sip_media_application_logging_configuration
  for_each: aws.chime-sdk-voice.list_sip_media_applications
  calls:
  - action: get_sip_media_application_logging_configuration
    save_as: response
    on_error: continue
    params:
      sipMediaApplicationSipMediaApplicationId: '{{ item.sipMediaApplicationSipMediaApplicationId
        }}'
  emit:
    as: item
    items_for: '{{ response.SipMediaApplicationLoggingConfiguration }}'
checks: []
