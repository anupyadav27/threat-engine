version: '1.0'
provider: aws
service: lex-models
services:
  client: lex-models
  module: boto3.client
discovery:
- discovery_id: aws.lex-models.get_migrations
  calls:
  - action: get_migrations
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.migrationSummaries }}'
- discovery_id: aws.lex-models.get_bots
  calls:
  - action: get_bots
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.bots }}'
- discovery_id: aws.lex-models.get_intents
  calls:
  - action: get_intents
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.intents }}'
- discovery_id: aws.lex-models.get_slot_types
  calls:
  - action: get_slot_types
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.slotTypes }}'
- discovery_id: aws.lex-models.get_builtin_intents
  calls:
  - action: get_builtin_intents
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.intents }}'
- discovery_id: aws.lex-models.get_intent
  for_each: aws.lex-models.get_bots
  calls:
  - action: get_intent
    save_as: response
    on_error: continue
    params:
      botName: '{{ item.botName }}'
      botVersion: '{{ item.botVersion }}'
  emit:
    as: item
    items_for: '{{ response.slots }}'
- discovery_id: aws.lex-models.get_migration
  for_each: aws.lex-models.get_migrations
  calls:
  - action: get_migration
    save_as: response
    on_error: continue
    params:
      migrationSummaryMigrationId: '{{ item.migrationSummaryMigrationId }}'
  emit:
    as: item
    items_for: '{{ response.alerts }}'
- discovery_id: aws.lex-models.get_bot_alias
  for_each: aws.lex-models.get_bots
  calls:
  - action: get_bot_alias
    save_as: response
    on_error: continue
    params:
      botName: '{{ item.botName }}'
  emit:
    as: item
    items_for: '{{ response.conversationLogs }}'
- discovery_id: aws.lex-models.get_bot
  for_each: aws.lex-models.get_bots
  calls:
  - action: get_bot
    save_as: response
    on_error: continue
    params:
      botName: '{{ item.botName }}'
  emit:
    as: item
    items_for: '{{ response.intents }}'
- discovery_id: aws.lex-models.get_slot_type
  for_each: aws.lex-models.get_bots
  calls:
  - action: get_slot_type
    save_as: response
    on_error: continue
    params:
      botName: '{{ item.botName }}'
      botVersion: '{{ item.botVersion }}'
  emit:
    as: item
    items_for: '{{ response.enumerationValues }}'
- discovery_id: aws.lex-models.get_bot_aliases
  for_each: aws.lex-models.get_bots
  calls:
  - action: get_bot_aliases
    save_as: response
    on_error: continue
    params:
      botName: '{{ item.botName }}'
  emit:
    as: item
    items_for: '{{ response.BotAliases }}'
- discovery_id: aws.lex-models.get_export
  for_each: aws.lex-models.get_bots
  calls:
  - action: get_export
    save_as: response
    on_error: continue
    params:
      botName: '{{ item.botName }}'
      botVersion: '{{ item.botVersion }}'
  emit:
    as: item
    items_for: '{{ response.name }}'
- discovery_id: aws.lex-models.get_utterances_view
  for_each: aws.lex-models.get_bots
  calls:
  - action: get_utterances_view
    save_as: response
    on_error: continue
    params:
      botName: '{{ item.botName }}'
  emit:
    as: item
    items_for: '{{ response.utterances }}'
- discovery_id: aws.lex-models.list_tags_for_resource
  calls:
  - action: list_tags_for_resource
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.tags }}'
checks: []
