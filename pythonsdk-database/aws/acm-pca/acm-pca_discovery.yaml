version: '1.0'
provider: aws
service: acm-pca
services:
  client: acm-pca
  module: boto3.client
discovery:
- discovery_id: aws.acm-pca.list_certificate_authorities
  calls:
  - action: list_certificate_authorities
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.CertificateAuthorities }}'
- discovery_id: aws.acm-pca.list_permissions
  for_each: aws.acm-pca.list_certificate_authorities
  calls:
  - action: list_permissions
    save_as: response
    on_error: continue
    params:
      CertificateAuthorityArn: '{{ item.certificateAuthorityArn }}'
  emit:
    as: item
    items_for: '{{ response.Permissions }}'
- discovery_id: aws.acm-pca.list_tags
  for_each: aws.acm-pca.list_certificate_authorities
  calls:
  - action: list_tags
    save_as: response
    on_error: continue
    params:
      CertificateAuthorityArn: '{{ item.certificateAuthorityArn }}'
  emit:
    as: item
    items_for: '{{ response.Tags }}'
- discovery_id: aws.acm-pca.get_certificate
  for_each: aws.acm-pca.list_certificate_authorities
  calls:
  - action: get_certificate
    save_as: response
    on_error: continue
    params:
      CertificateAuthorityArn: '{{ item.certificateAuthorityArn }}'
  emit:
    as: item
    items_for: '{{ response.Certificate }}'
- discovery_id: aws.acm-pca.get_certificate_authority_csr
  for_each: aws.acm-pca.list_certificate_authorities
  calls:
  - action: get_certificate_authority_csr
    save_as: response
    on_error: continue
    params:
      CertificateAuthorityArn: '{{ item.certificateAuthorityArn }}'
  emit:
    as: item
    items_for: '{{ response.Csr }}'
checks: []
