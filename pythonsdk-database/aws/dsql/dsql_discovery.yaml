version: '1.0'
provider: aws
service: dsql
services:
  client: dsql
  module: boto3.client
discovery:
- discovery_id: aws.dsql.list_clusters
  calls:
  - action: list_clusters
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.clusters }}'
- discovery_id: aws.dsql.get_cluster
  for_each: aws.dsql.list_clusters
  calls:
  - action: get_cluster
    save_as: response
    on_error: continue
    params:
      clusterIdentifier: '{{ item.clusterIdentifier }}'
  emit:
    as: item
    items_for: '{{ response.multiRegionProperties }}'
- discovery_id: aws.dsql.get_cluster_policy
  for_each: aws.dsql.list_clusters
  calls:
  - action: get_cluster_policy
    save_as: response
    on_error: continue
    params:
      clusterIdentifier: '{{ item.clusterIdentifier }}'
  emit:
    as: item
    items_for: '{{ response.policy }}'
checks: []
