version: '1.0'
provider: aws
service: evidently
services:
  client: evidently
  module: boto3.client
discovery:
- discovery_id: aws.evidently.list_projects
  calls:
  - action: list_projects
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.projects }}'
- discovery_id: aws.evidently.list_segments
  calls:
  - action: list_segments
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.segments }}'
checks: []
