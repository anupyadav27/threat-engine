version: '1.0'
provider: aws
service: cloudwatch
services:
  client: cloudwatch
  module: boto3.client
discovery:
- discovery_id: aws.cloudwatch.describe_alarms
  calls:
  - action: describe_alarms
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.CompositeAlarms }}'
- discovery_id: aws.cloudwatch.describe_anomaly_detectors
  calls:
  - action: describe_anomaly_detectors
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.AnomalyDetectors }}'
- discovery_id: aws.cloudwatch.describe_alarm_history
  calls:
  - action: describe_alarm_history
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.AlarmHistoryItems }}'
- discovery_id: aws.cloudwatch.list_metric_streams
  calls:
  - action: list_metric_streams
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.Entries }}'
- discovery_id: aws.cloudwatch.describe_insight_rules
  calls:
  - action: describe_insight_rules
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.InsightRules }}'
- discovery_id: aws.cloudwatch.list_dashboards
  calls:
  - action: list_dashboards
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.DashboardEntries }}'
- discovery_id: aws.cloudwatch.list_metrics
  calls:
  - action: list_metrics
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.Metrics }}'
- discovery_id: aws.cloudwatch.describe_alarms_for_metric
  for_each: aws.cloudwatch.describe_anomaly_detectors
  calls:
  - action: describe_alarms_for_metric
    save_as: response
    on_error: continue
    params:
      anomalyDetectorMetricName: '{{ item.anomalyDetectorMetricName }}'
      anomalyDetectorNamespace: '{{ item.anomalyDetectorNamespace }}'
  emit:
    as: item
    items_for: '{{ response.MetricAlarms }}'
- discovery_id: aws.cloudwatch.get_metric_statistics
  for_each: aws.cloudwatch.describe_anomaly_detectors
  calls:
  - action: get_metric_statistics
    save_as: response
    on_error: continue
    params:
      anomalyDetectorMetricName: '{{ item.anomalyDetectorMetricName }}'
      anomalyDetectorNamespace: '{{ item.anomalyDetectorNamespace }}'
      metricAlarmPeriod: '{{ item.metricAlarmPeriod }}'
  emit:
    as: item
    items_for: '{{ response.Datapoints }}'
- discovery_id: aws.cloudwatch.get_metric_data
  calls:
  - action: get_metric_data
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.MetricDataResults }}'
- discovery_id: aws.cloudwatch.describe_alarm_contributors
  for_each: aws.cloudwatch.describe_alarms
  calls:
  - action: describe_alarm_contributors
    save_as: response
    on_error: continue
    params:
      alarmHistoryItemAlarmName: '{{ item.alarmHistoryItemAlarmName }}'
  emit:
    as: item
    items_for: '{{ response.AlarmContributors }}'
- discovery_id: aws.cloudwatch.get_metric_stream
  for_each: aws.cloudwatch.list_metric_streams
  calls:
  - action: get_metric_stream
    save_as: response
    on_error: continue
    params:
      insightRulName: '{{ item.insightRulName }}'
  emit:
    as: item
    items_for: '{{ response.IncludeFilters }}'
- discovery_id: aws.cloudwatch.get_dashboard
  for_each: aws.cloudwatch.list_dashboards
  calls:
  - action: get_dashboard
    save_as: response
    on_error: continue
    params:
      dashboardEntryDashboardName: '{{ item.dashboardEntryDashboardName }}'
  emit:
    as: item
    items_for: '{{ response.DashboardArn }}'
- discovery_id: aws.cloudwatch.get_insight_rule_report
  for_each: aws.cloudwatch.describe_alarms_for_metric
  calls:
  - action: get_insight_rule_report
    save_as: response
    on_error: continue
    params:
      metricAlarmPeriod: '{{ item.metricAlarmPeriod }}'
  emit:
    as: item
    items_for: '{{ response.KeyLabels }}'
checks: []
