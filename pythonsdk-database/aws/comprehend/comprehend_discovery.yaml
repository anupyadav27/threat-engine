version: '1.0'
provider: aws
service: comprehend
services:
  client: comprehend
  module: boto3.client
discovery:
- discovery_id: aws.comprehend.list_document_classifiers
  calls:
  - action: list_document_classifiers
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.DocumentClassifierPropertiesList }}'
- discovery_id: aws.comprehend.list_entity_recognizers
  calls:
  - action: list_entity_recognizers
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.EntityRecognizerPropertiesList }}'
- discovery_id: aws.comprehend.list_entities_detection_jobs
  calls:
  - action: list_entities_detection_jobs
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.EntitiesDetectionJobPropertiesList }}'
- discovery_id: aws.comprehend.list_pii_entities_detection_jobs
  calls:
  - action: list_pii_entities_detection_jobs
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.PiiEntitiesDetectionJobPropertiesList }}'
- discovery_id: aws.comprehend.list_topics_detection_jobs
  calls:
  - action: list_topics_detection_jobs
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.TopicsDetectionJobPropertiesList }}'
- discovery_id: aws.comprehend.list_events_detection_jobs
  calls:
  - action: list_events_detection_jobs
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.EventsDetectionJobPropertiesList }}'
- discovery_id: aws.comprehend.list_endpoints
  calls:
  - action: list_endpoints
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.EndpointPropertiesList }}'
- discovery_id: aws.comprehend.list_datasets
  calls:
  - action: list_datasets
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.DatasetPropertiesList }}'
- discovery_id: aws.comprehend.list_flywheels
  calls:
  - action: list_flywheels
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.FlywheelSummaryList }}'
- discovery_id: aws.comprehend.list_entity_recognizer_summaries
  calls:
  - action: list_entity_recognizer_summaries
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.EntityRecognizerSummariesList }}'
- discovery_id: aws.comprehend.list_document_classifier_summaries
  calls:
  - action: list_document_classifier_summaries
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.DocumentClassifierSummariesList }}'
- discovery_id: aws.comprehend.list_flywheel_iteration_history
  for_each: aws.comprehend.list_document_classifiers
  calls:
  - action: list_flywheel_iteration_history
    save_as: response
    on_error: continue
    params:
      documentClassificationJobPropertiesListFlywheelArn: '{{ item.documentClassificationJobPropertiesListFlywheelArn
        }}'
  emit:
    as: item
    items_for: '{{ response.FlywheelIterationPropertiesList }}'
- discovery_id: aws.comprehend.describe_flywheel
  for_each: aws.comprehend.list_document_classifiers
  calls:
  - action: describe_flywheel
    save_as: response
    on_error: continue
    params:
      documentClassificationJobPropertiesListFlywheelArn: '{{ item.documentClassificationJobPropertiesListFlywheelArn
        }}'
  emit:
    as: item
    items_for: '{{ response.FlywheelProperties }}'
- discovery_id: aws.comprehend.list_tags_for_resource
  calls:
  - action: list_tags_for_resource
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.Tags }}'
- discovery_id: aws.comprehend.describe_document_classifier
  for_each: aws.comprehend.list_document_classifiers
  calls:
  - action: describe_document_classifier
    save_as: response
    on_error: continue
    params:
      documentClassificationJobPropertiesListDocumentClassifierArn: '{{ item.documentClassificationJobPropertiesListDocumentClassifierArn
        }}'
  emit:
    as: item
    items_for: '{{ response.DocumentClassifierProperties }}'
- discovery_id: aws.comprehend.describe_entity_recognizer
  for_each: aws.comprehend.list_entity_recognizers
  calls:
  - action: describe_entity_recognizer
    save_as: response
    on_error: continue
    params:
      entitiesDetectionJobPropertiesListEntityRecognizerArn: '{{ item.entitiesDetectionJobPropertiesListEntityRecognizerArn
        }}'
  emit:
    as: item
    items_for: '{{ response.EntityRecognizerProperties }}'
- discovery_id: aws.comprehend.describe_entities_detection_job
  for_each: aws.comprehend.list_entities_detection_jobs
  calls:
  - action: describe_entities_detection_job
    save_as: response
    on_error: continue
    params:
      documentClassificationJobPropertiesListJobId: '{{ item.documentClassificationJobPropertiesListJobId
        }}'
  emit:
    as: item
    items_for: '{{ response.EntitiesDetectionJobProperties }}'
- discovery_id: aws.comprehend.describe_document_classification_job
  for_each: aws.comprehend.list_entities_detection_jobs
  calls:
  - action: describe_document_classification_job
    save_as: response
    on_error: continue
    params:
      documentClassificationJobPropertiesListJobId: '{{ item.documentClassificationJobPropertiesListJobId
        }}'
  emit:
    as: item
    items_for: '{{ response.DocumentClassificationJobProperties }}'
- discovery_id: aws.comprehend.describe_sentiment_detection_job
  for_each: aws.comprehend.list_entities_detection_jobs
  calls:
  - action: describe_sentiment_detection_job
    save_as: response
    on_error: continue
    params:
      documentClassificationJobPropertiesListJobId: '{{ item.documentClassificationJobPropertiesListJobId
        }}'
  emit:
    as: item
    items_for: '{{ response.SentimentDetectionJobProperties }}'
- discovery_id: aws.comprehend.describe_key_phrases_detection_job
  for_each: aws.comprehend.list_entities_detection_jobs
  calls:
  - action: describe_key_phrases_detection_job
    save_as: response
    on_error: continue
    params:
      documentClassificationJobPropertiesListJobId: '{{ item.documentClassificationJobPropertiesListJobId
        }}'
  emit:
    as: item
    items_for: '{{ response.KeyPhrasesDetectionJobProperties }}'
- discovery_id: aws.comprehend.describe_pii_entities_detection_job
  for_each: aws.comprehend.list_entities_detection_jobs
  calls:
  - action: describe_pii_entities_detection_job
    save_as: response
    on_error: continue
    params:
      documentClassificationJobPropertiesListJobId: '{{ item.documentClassificationJobPropertiesListJobId
        }}'
  emit:
    as: item
    items_for: '{{ response.PiiEntitiesDetectionJobProperties }}'
- discovery_id: aws.comprehend.describe_topics_detection_job
  for_each: aws.comprehend.list_entities_detection_jobs
  calls:
  - action: describe_topics_detection_job
    save_as: response
    on_error: continue
    params:
      documentClassificationJobPropertiesListJobId: '{{ item.documentClassificationJobPropertiesListJobId
        }}'
  emit:
    as: item
    items_for: '{{ response.TopicsDetectionJobProperties }}'
- discovery_id: aws.comprehend.describe_targeted_sentiment_detection_job
  for_each: aws.comprehend.list_entities_detection_jobs
  calls:
  - action: describe_targeted_sentiment_detection_job
    save_as: response
    on_error: continue
    params:
      documentClassificationJobPropertiesListJobId: '{{ item.documentClassificationJobPropertiesListJobId
        }}'
  emit:
    as: item
    items_for: '{{ response.TargetedSentimentDetectionJobProperties }}'
- discovery_id: aws.comprehend.describe_dominant_language_detection_job
  for_each: aws.comprehend.list_entities_detection_jobs
  calls:
  - action: describe_dominant_language_detection_job
    save_as: response
    on_error: continue
    params:
      documentClassificationJobPropertiesListJobId: '{{ item.documentClassificationJobPropertiesListJobId
        }}'
  emit:
    as: item
    items_for: '{{ response.DominantLanguageDetectionJobProperties }}'
- discovery_id: aws.comprehend.describe_endpoint
  for_each: aws.comprehend.list_endpoints
  calls:
  - action: describe_endpoint
    save_as: response
    on_error: continue
    params:
      endpointPropertiesListEndpointArn: '{{ item.endpointPropertiesListEndpointArn
        }}'
  emit:
    as: item
    items_for: '{{ response.EndpointProperties }}'
- discovery_id: aws.comprehend.describe_events_detection_job
  for_each: aws.comprehend.list_entities_detection_jobs
  calls:
  - action: describe_events_detection_job
    save_as: response
    on_error: continue
    params:
      documentClassificationJobPropertiesListJobId: '{{ item.documentClassificationJobPropertiesListJobId
        }}'
  emit:
    as: item
    items_for: '{{ response.EventsDetectionJobProperties }}'
- discovery_id: aws.comprehend.describe_dataset
  for_each: aws.comprehend.list_datasets
  calls:
  - action: describe_dataset
    save_as: response
    on_error: continue
    params:
      datasetPropertiesListDatasetArn: '{{ item.datasetPropertiesListDatasetArn }}'
  emit:
    as: item
    items_for: '{{ response.DatasetProperties }}'
checks: []
