version: '1.0'
provider: aws
service: aiops
services:
  client: aiops
  module: boto3.client
discovery:
- discovery_id: aws.aiops.list_investigation_groups
  calls:
  - action: list_investigation_groups
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.investigationGroups }}'
- discovery_id: aws.aiops.get_investigation_group_policy
  calls:
  - action: get_investigation_group_policy
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.investigationGroupArn }}'
checks: []
