version: '1.0'
provider: aws
service: bcm-recommended-actions
services:
  client: bcm-recommended-actions
  module: boto3.client
discovery:
- discovery_id: aws.bcm-recommended-actions.list_recommended_actions
  calls:
  - action: list_recommended_actions
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.recommendedActions }}'
checks: []
