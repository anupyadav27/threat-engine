version: '1.0'
provider: aws
service: kinesisvideostreams
services:
  client: kinesisvideostreams
  module: boto3.client
discovery:
- discovery_id: aws.kinesisvideostreams.describe_mapped_resource_configuration
  calls:
  - action: describe_mapped_resource_configuration
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.MappedResourceConfigurationList }}'
- discovery_id: aws.kinesisvideostreams.describe_image_generation_configuration
  calls:
  - action: describe_image_generation_configuration
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.ImageGenerationConfiguration }}'
- discovery_id: aws.kinesisvideostreams.describe_signaling_channel
  calls:
  - action: describe_signaling_channel
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.ChannelInfo }}'
- discovery_id: aws.kinesisvideostreams.describe_edge_configuration
  calls:
  - action: describe_edge_configuration
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.EdgeConfig }}'
- discovery_id: aws.kinesisvideostreams.describe_media_storage_configuration
  calls:
  - action: describe_media_storage_configuration
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.MediaStorageConfiguration }}'
- discovery_id: aws.kinesisvideostreams.describe_notification_configuration
  calls:
  - action: describe_notification_configuration
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.NotificationConfiguration }}'
- discovery_id: aws.kinesisvideostreams.describe_stream_storage_configuration
  calls:
  - action: describe_stream_storage_configuration
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.StreamStorageConfiguration }}'
- discovery_id: aws.kinesisvideostreams.describe_stream
  calls:
  - action: describe_stream
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.StreamInfo }}'
checks: []
