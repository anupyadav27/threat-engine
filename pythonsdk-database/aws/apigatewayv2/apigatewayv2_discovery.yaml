- discovery_id: aws.apigatewayv2.get_integration
  for_each: aws.apigatewayv2.get_apis
  calls:
  - action: get_integration
    save_as: response
    on_error: continue
    params:
      ApiId: '{{ item.apiId }}'
      itemIntegrationId: '{{ item.itemIntegrationId }}'
  emit:
    as: item
    items_for: '{{ response.TlsConfig }}'
- discovery_id: aws.apigatewayv2.get_routing_rule
  for_each: aws.apigatewayv2.get_domain_names
  calls:
  - action: get_routing_rule
    save_as: response
    on_error: continue
    params:
      itemDomainName: '{{ item.itemDomainName }}'
      routingRulRoutingRuleId: '{{ item.routingRulRoutingRuleId }}'
  emit:
    as: item
    items_for: '{{ response.Actions }}'
- discovery_id: aws.apigatewayv2.get_model_template
  for_each: aws.apigatewayv2.get_apis
  calls:
  - action: get_model_template
    save_as: response
    on_error: continue
    params:
      ApiId: '{{ item.apiId }}'
      itemModelId: '{{ item.itemModelId }}'
  emit:
    as: item
    items_for: '{{ response.Value }}'
checks: []
