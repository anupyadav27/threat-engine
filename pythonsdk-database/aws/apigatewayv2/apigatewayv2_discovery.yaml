      itemPortalProductId: '{{ item.itemPortalProductId }}'
  emit:
    as: item
    items_for: '{{ response.DisplayOrder }}'
- discovery_id: aws.apigatewayv2.get_deployments
  for_each: aws.apigatewayv2.get_apis
  calls:
  - action: get_deployments
    save_as: response
    on_error: continue
    params:
      ApiId: '{{ item.apiId }}'
  emit:
    as: item
    items_for: '{{ response.Items }}'
- discovery_id: aws.apigatewayv2.get_integration_responses
  for_each: aws.apigatewayv2.get_apis
