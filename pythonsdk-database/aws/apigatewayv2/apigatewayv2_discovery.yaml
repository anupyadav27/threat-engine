  calls:
  - action: get_models
    save_as: response
    on_error: continue
    params:
      ApiId: '{{ item.apiId }}'
  emit:
    as: item
    items_for: '{{ response.Items }}'
- discovery_id: aws.apigatewayv2.get_route_responses
  for_each: aws.apigatewayv2.get_apis
  calls:
  - action: get_route_responses
    save_as: response
    on_error: continue
    params:
      ApiId: '{{ item.apiId }}'
      itemRouteId: '{{ item.itemRouteId }}'
  emit:
    as: item
    items_for: '{{ response.Items }}'
- discovery_id: aws.apigatewayv2.get_api_mappings
  for_each: aws.apigatewayv2.get_domain_names
  calls:
  - action: get_api_mappings
    save_as: response
    on_error: continue
    params:
      itemDomainName: '{{ item.itemDomainName }}'
  emit:
    as: item
    items_for: '{{ response.Items }}'
- discovery_id: aws.apigatewayv2.list_product_pages
  for_each: aws.apigatewayv2.list_portal_products
  calls:
  - action: list_product_pages
    save_as: response
    on_error: continue
    params:
      itemPortalProductId: '{{ item.itemPortalProductId }}'
  emit:
    as: item
    items_for: '{{ response.Items }}'
- discovery_id: aws.apigatewayv2.get_stage
  for_each: aws.apigatewayv2.get_apis
  calls:
  - action: get_stage
    save_as: response
    on_error: continue
    params:
      ApiId: '{{ item.apiId }}'
      itemStageName: '{{ item.itemStageName }}'
  emit:
    as: item
    items_for: '{{ response.AccessLogSettings }}'
- discovery_id: aws.apigatewayv2.get_product_page
  for_each: aws.apigatewayv2.list_portal_products
  calls:
