version: '1.0'
provider: aws
service: apigatewayv2
services:
  client: apigatewayv2
  module: boto3.client
discovery:
- discovery_id: aws.apigatewayv2.get_apis
  calls:
  - action: get_apis
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.Items }}'
- discovery_id: aws.apigatewayv2.list_portals
  calls:
  - action: list_portals
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.Items }}'
- discovery_id: aws.apigatewayv2.get_vpc_links
  calls:
  - action: get_vpc_links
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.Items }}'
- discovery_id: aws.apigatewayv2.get_domain_names
  calls:
  - action: get_domain_names
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.Items }}'
- discovery_id: aws.apigatewayv2.list_portal_products
  calls:
  - action: list_portal_products
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.Items }}'
- discovery_id: aws.apigatewayv2.get_integrations
  for_each: aws.apigatewayv2.get_apis
  calls:
  - action: get_integrations
    save_as: response
    on_error: continue
    params:
      ApiId: '{{ item.apiId }}'
  emit:
    as: item
    items_for: '{{ response.Items }}'
- discovery_id: aws.apigatewayv2.get_routes
  for_each: aws.apigatewayv2.get_apis
  calls:
  - action: get_routes
    save_as: response
    on_error: continue
    params:
      ApiId: '{{ item.apiId }}'
  emit:
    as: item
    items_for: '{{ response.Items }}'
- discovery_id: aws.apigatewayv2.get_domain_name
  for_each: aws.apigatewayv2.get_domain_names
  calls:
  - action: get_domain_name
    save_as: response
    on_error: continue
    params:
      itemDomainName: '{{ item.itemDomainName }}'
  emit:
    as: item
    items_for: '{{ response.DomainNameConfigurations }}'
- discovery_id: aws.apigatewayv2.get_stages
  for_each: aws.apigatewayv2.get_apis
  calls:
  - action: get_stages
    save_as: response
    on_error: continue
    params:
      ApiId: '{{ item.apiId }}'
  emit:
    as: item
    items_for: '{{ response.Items }}'
- discovery_id: aws.apigatewayv2.get_authorizers
  for_each: aws.apigatewayv2.get_apis
  calls:
  - action: get_authorizers
    save_as: response
    on_error: continue
    params:
      ApiId: '{{ item.apiId }}'
  emit:
    as: item
    items_for: '{{ response.Items }}'
- discovery_id: aws.apigatewayv2.list_product_rest_endpoint_pages
  for_each: aws.apigatewayv2.list_portal_products
  calls:
  - action: list_product_rest_endpoint_pages
    save_as: response
    on_error: continue
    params:
      itemPortalProductId: '{{ item.itemPortalProductId }}'
  emit:
    as: item
    items_for: '{{ response.Items }}'
- discovery_id: aws.apigatewayv2.list_routing_rules
  for_each: aws.apigatewayv2.get_domain_names
  calls:
  - action: list_routing_rules
    save_as: response
    on_error: continue
    params:
      itemDomainName: '{{ item.itemDomainName }}'
  emit:
    as: item
    items_for: '{{ response.RoutingRules }}'
- discovery_id: aws.apigatewayv2.get_portal_product
