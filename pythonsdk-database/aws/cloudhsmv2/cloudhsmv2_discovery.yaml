version: '1.0'
provider: aws
service: cloudhsmv2
services:
  client: cloudhsmv2
  module: boto3.client
discovery:
- discovery_id: aws.cloudhsmv2.describe_clusters
  calls:
  - action: describe_clusters
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.Clusters }}'
- discovery_id: aws.cloudhsmv2.describe_backups
  calls:
  - action: describe_backups
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.Backups }}'
- discovery_id: aws.cloudhsmv2.list_tags
  calls:
  - action: list_tags
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.TagList }}'
checks: []
