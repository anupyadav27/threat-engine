version: '1.0'
provider: aws
service: accessanalyzer
services:
  client: accessanalyzer
  module: boto3.client
discovery:
- discovery_id: aws.accessanalyzer.list_analyzers
  calls:
  - action: list_analyzers
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.analyzers }}'
- discovery_id: aws.accessanalyzer.list_policy_generations
  calls:
  - action: list_policy_generations
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.policyGenerations }}'
- discovery_id: aws.accessanalyzer.list_findings
  for_each: aws.accessanalyzer.list_analyzers
  calls:
  - action: list_findings
    save_as: response
    on_error: continue
    params:
      analyzerArn: '{{ item.arn }}'
  emit:
    as: item
    items_for: '{{ response.findings }}'
- discovery_id: aws.accessanalyzer.get_finding_v2
  for_each: aws.accessanalyzer.list_findings
  calls:
  - action: get_finding_v2
    save_as: response
    on_error: continue
    params:
      id: '{{ item.id }}'
      analyzerArn: '{{ item.arn }}'
  emit:
    as: item
    items_for: '{{ response.findingDetails }}'
- discovery_id: aws.accessanalyzer.list_access_preview_findings
  for_each: aws.accessanalyzer.list_findings
  calls:
  - action: list_access_preview_findings
    save_as: response
    on_error: continue
    params:
      accessPreviewId: '{{ item.id }}'
      analyzerArn: '{{ item.arn }}'
  emit:
    as: item
    items_for: '{{ response.findings }}'
- discovery_id: aws.accessanalyzer.get_access_preview
  for_each: aws.accessanalyzer.list_findings
  calls:
  - action: get_access_preview
    save_as: response
    on_error: continue
    params:
      accessPreviewId: '{{ item.id }}'
      analyzerArn: '{{ item.arn }}'
  emit:
    as: item
    items_for: '{{ response.accessPreview }}'
- discovery_id: aws.accessanalyzer.get_finding_recommendation
  for_each: aws.accessanalyzer.list_findings
  calls:
  - action: get_finding_recommendation
    save_as: response
    on_error: continue
    params:
      id: '{{ item.id }}'
      analyzerArn: '{{ item.arn }}'
  emit:
    as: item
    items_for: '{{ response.recommendedSteps }}'
- discovery_id: aws.accessanalyzer.get_findings_statistics
  for_each: aws.accessanalyzer.list_analyzers
  calls:
  - action: get_findings_statistics
    save_as: response
    on_error: continue
    params:
      analyzerArn: '{{ item.arn }}'
  emit:
    as: item
    items_for: '{{ response.findingsStatistics }}'
- discovery_id: aws.accessanalyzer.get_analyzed_resource
  for_each: aws.accessanalyzer.list_analyzers
  calls:
  - action: get_analyzed_resource
    save_as: response
    on_error: continue
    params:
      analyzerArn: '{{ item.arn }}'
      resource: '{{ item.resource }}'
  emit:
    as: item
    items_for: '{{ response.resource }}'
- discovery_id: aws.accessanalyzer.get_generated_policy
  for_each: aws.accessanalyzer.list_policy_generations
  calls:
  - action: get_generated_policy
    save_as: response
    on_error: continue
    params:
      jobId: '{{ item.jobId }}'
  emit:
    as: item
    items_for: '{{ response.jobDetails }}'
- discovery_id: aws.accessanalyzer.list_archive_rules
  for_each: aws.accessanalyzer.list_analyzers
  calls:
  - action: list_archive_rules
    save_as: response
    on_error: continue
    params:
      analyzerName: '{{ item.name }}'
  emit:
    as: item
    items_for: '{{ response.archiveRules }}'
- discovery_id: aws.accessanalyzer.get_finding
  for_each: aws.accessanalyzer.list_findings
  calls:
  - action: get_finding
    save_as: response
    on_error: continue
    params:
      id: '{{ item.id }}'
      analyzerArn: '{{ item.arn }}'
  emit:
    as: item
    items_for: '{{ response.finding }}'
- discovery_id: aws.accessanalyzer.get_analyzer
  for_each: aws.accessanalyzer.list_analyzers
  calls:
  - action: get_analyzer
    save_as: response
    on_error: continue
    params:
      analyzerName: '{{ item.name }}'
  emit:
    as: item
    items_for: '{{ response.analyzer }}'
- discovery_id: aws.accessanalyzer.get_archive_rule
  for_each: aws.accessanalyzer.list_analyzers
  calls:
  - action: get_archive_rule
    save_as: response
    on_error: continue
    params:
      analyzerName: '{{ item.name }}'
      ruleName: '{{ item.ruleName }}'
  emit:
    as: item
    items_for: '{{ response.archiveRule }}'
checks: []
