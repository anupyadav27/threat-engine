version: '1.0'
provider: aws
service: billing
services:
  client: billing
  module: boto3.client
discovery:
- discovery_id: aws.billing.list_billing_views
  calls:
  - action: list_billing_views
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.billingViews }}'
- discovery_id: aws.billing.get_billing_view
  for_each: aws.billing.list_billing_views
  calls:
  - action: get_billing_view
    save_as: response
    on_error: continue
    params:
      billingViewArn: '{{ item.billingViewArn }}'
  emit:
    as: item
    items_for: '{{ response.billingView }}'
- discovery_id: aws.billing.list_tags_for_resource
  calls:
  - action: list_tags_for_resource
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.resourceTags }}'
checks: []
