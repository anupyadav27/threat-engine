version: '1.0'
provider: aws
service: bedrock-agent
services:
  client: bedrock-agent
  module: boto3.client
discovery:
- discovery_id: aws.bedrock-agent.list_flows
  calls:
  - action: list_flows
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.flowSummaries }}'
- discovery_id: aws.bedrock-agent.list_agents
  calls:
  - action: list_agents
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.agentSummaries }}'
- discovery_id: aws.bedrock-agent.list_knowledge_bases
  calls:
  - action: list_knowledge_bases
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.knowledgeBaseSummaries }}'
- discovery_id: aws.bedrock-agent.get_agent
  for_each: aws.bedrock-agent.list_agents
  calls:
  - action: get_agent
    save_as: response
    on_error: continue
    params:
      agentSummaryAgentId: '{{ item.agentSummaryAgentId }}'
  emit:
    as: item
    items_for: '{{ response.agent }}'
- discovery_id: aws.bedrock-agent.get_prompt
  calls:
  - action: get_prompt
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.variants }}'
- discovery_id: aws.bedrock-agent.get_flow
  calls:
  - action: get_flow
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.validations }}'
- discovery_id: aws.bedrock-agent.list_agent_collaborators
  for_each: aws.bedrock-agent.get_agent
  calls:
  - action: list_agent_collaborators
    save_as: response
    on_error: continue
    params:
      agentAgentVersion: '{{ item.agentAgentVersion }}'
      agentSummaryAgentId: '{{ item.agentSummaryAgentId }}'
  emit:
    as: item
    items_for: '{{ response.agentCollaboratorSummaries }}'
- discovery_id: aws.bedrock-agent.get_knowledge_base
  for_each: aws.bedrock-agent.list_knowledge_bases
  calls:
  - action: get_knowledge_base
    save_as: response
    on_error: continue
    params:
      knowledgeBaseSummaryKnowledgeBaseId: '{{ item.knowledgeBaseSummaryKnowledgeBaseId
        }}'
  emit:
    as: item
    items_for: '{{ response.knowledgeBase }}'
- discovery_id: aws.bedrock-agent.list_agent_aliases
  for_each: aws.bedrock-agent.list_agents
  calls:
  - action: list_agent_aliases
    save_as: response
    on_error: continue
    params:
      agentSummaryAgentId: '{{ item.agentSummaryAgentId }}'
  emit:
    as: item
    items_for: '{{ response.agentAliasSummaries }}'
- discovery_id: aws.bedrock-agent.get_agent_alias
  for_each: aws.bedrock-agent.list_agent_aliases
  calls:
  - action: get_agent_alias
    save_as: response
    on_error: continue
    params:
      agentAliaAgentAliasId: '{{ item.agentAliaAgentAliasId }}'
      agentSummaryAgentId: '{{ item.agentSummaryAgentId }}'
  emit:
    as: item
    items_for: '{{ response.agentAlias }}'
- discovery_id: aws.bedrock-agent.get_flow_alias
  calls:
  - action: get_flow_alias
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.routingConfiguration }}'
- discovery_id: aws.bedrock-agent.list_agent_action_groups
  for_each: aws.bedrock-agent.get_agent
  calls:
  - action: list_agent_action_groups
    save_as: response
    on_error: continue
    params:
      agentAgentVersion: '{{ item.agentAgentVersion }}'
      agentSummaryAgentId: '{{ item.agentSummaryAgentId }}'
  emit:
    as: item
    items_for: '{{ response.actionGroupSummaries }}'
- discovery_id: aws.bedrock-agent.get_agent_action_group
  for_each: aws.bedrock-agent.list_agent_action_groups
  calls:
  - action: get_agent_action_group
    save_as: response
    on_error: continue
    params:
      agentActionGroupActionGroupId: '{{ item.agentActionGroupActionGroupId }}'
      agentAgentVersion: '{{ item.agentAgentVersion }}'
      agentSummaryAgentId: '{{ item.agentSummaryAgentId }}'
  emit:
    as: item
    items_for: '{{ response.agentActionGroup }}'
- discovery_id: aws.bedrock-agent.get_flow_version
  for_each: aws.bedrock-agent.get_flow_alias
  calls:
  - action: get_flow_version
    save_as: response
    on_error: continue
    params:
      routingConfigurationFlowVersion: '{{ item.routingConfigurationFlowVersion }}'
  emit:
    as: item
    items_for: '{{ response.definition }}'
- discovery_id: aws.bedrock-agent.get_agent_knowledge_base
  for_each: aws.bedrock-agent.get_agent
  calls:
  - action: get_agent_knowledge_base
    save_as: response
    on_error: continue
    params:
      agentAgentVersion: '{{ item.agentAgentVersion }}'
      agentSummaryAgentId: '{{ item.agentSummaryAgentId }}'
      knowledgeBaseSummaryKnowledgeBaseId: '{{ item.knowledgeBaseSummaryKnowledgeBaseId
        }}'
  emit:
    as: item
    items_for: '{{ response.agentKnowledgeBase }}'
- discovery_id: aws.bedrock-agent.list_data_sources
  for_each: aws.bedrock-agent.list_knowledge_bases
  calls:
  - action: list_data_sources
    save_as: response
    on_error: continue
    params:
      knowledgeBaseSummaryKnowledgeBaseId: '{{ item.knowledgeBaseSummaryKnowledgeBaseId
        }}'
  emit:
    as: item
    items_for: '{{ response.dataSourceSummaries }}'
- discovery_id: aws.bedrock-agent.get_data_source
  for_each: aws.bedrock-agent.list_data_sources
  calls:
  - action: get_data_source
    save_as: response
    on_error: continue
    params:
      dataSourceDataSourceId: '{{ item.dataSourceDataSourceId }}'
      knowledgeBaseSummaryKnowledgeBaseId: '{{ item.knowledgeBaseSummaryKnowledgeBaseId
        }}'
  emit:
    as: item
    items_for: '{{ response.dataSource }}'
- discovery_id: aws.bedrock-agent.list_ingestion_jobs
  for_each: aws.bedrock-agent.list_data_sources
  calls:
  - action: list_ingestion_jobs
    save_as: response
    on_error: continue
    params:
      dataSourceDataSourceId: '{{ item.dataSourceDataSourceId }}'
      knowledgeBaseSummaryKnowledgeBaseId: '{{ item.knowledgeBaseSummaryKnowledgeBaseId
        }}'
  emit:
    as: item
    items_for: '{{ response.ingestionJobSummaries }}'
- discovery_id: aws.bedrock-agent.get_knowledge_base_documents
  for_each: aws.bedrock-agent.list_data_sources
  calls:
  - action: get_knowledge_base_documents
    save_as: response
    on_error: continue
    params:
      dataSourceDataSourceId: '{{ item.dataSourceDataSourceId }}'
      knowledgeBaseSummaryKnowledgeBaseId: '{{ item.knowledgeBaseSummaryKnowledgeBaseId
        }}'
  emit:
    as: item
    items_for: '{{ response.documentDetails }}'
checks: []
