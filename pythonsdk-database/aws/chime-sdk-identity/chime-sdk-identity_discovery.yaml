version: '1.0'
provider: aws
service: chime-sdk-identity
services:
  client: chime-sdk-identity
  module: boto3.client
discovery:
- discovery_id: aws.chime-sdk-identity.list_app_instances
  calls:
  - action: list_app_instances
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.AppInstances }}'
- discovery_id: aws.chime-sdk-identity.describe_app_instance
  for_each: aws.chime-sdk-identity.list_app_instances
  calls:
  - action: describe_app_instance
    save_as: response
    on_error: continue
    params:
      appInstancAppInstanceArn: '{{ item.appInstancAppInstanceArn }}'
  emit:
    as: item
    items_for: '{{ response.AppInstance }}'
- discovery_id: aws.chime-sdk-identity.get_app_instance_retention_settings
  for_each: aws.chime-sdk-identity.list_app_instances
  calls:
  - action: get_app_instance_retention_settings
    save_as: response
    on_error: continue
    params:
      appInstancAppInstanceArn: '{{ item.appInstancAppInstanceArn }}'
  emit:
    as: item
    items_for: '{{ response.AppInstanceRetentionSettings }}'
- discovery_id: aws.chime-sdk-identity.list_app_instance_users
  for_each: aws.chime-sdk-identity.list_app_instances
  calls:
  - action: list_app_instance_users
    save_as: response
    on_error: continue
    params:
      appInstancAppInstanceArn: '{{ item.appInstancAppInstanceArn }}'
  emit:
    as: item
    items_for: '{{ response.AppInstanceUsers }}'
- discovery_id: aws.chime-sdk-identity.list_app_instance_user_endpoints
  for_each: aws.chime-sdk-identity.list_app_instance_users
  calls:
  - action: list_app_instance_user_endpoints
    save_as: response
    on_error: continue
    params:
      appInstanceUserAppInstanceUserArn: '{{ item.appInstanceUserAppInstanceUserArn
        }}'
  emit:
    as: item
    items_for: '{{ response.AppInstanceUserEndpoints }}'
- discovery_id: aws.chime-sdk-identity.describe_app_instance_user_endpoint
  for_each: aws.chime-sdk-identity.list_app_instance_users
  calls:
  - action: describe_app_instance_user_endpoint
    save_as: response
    on_error: continue
    params:
      appInstanceUserAppInstanceUserArn: '{{ item.appInstanceUserAppInstanceUserArn
        }}'
      appInstanceUserEndpointEndpointId: '{{ item.appInstanceUserEndpointEndpointId
        }}'
  emit:
    as: item
    items_for: '{{ response.AppInstanceUserEndpoint }}'
- discovery_id: aws.chime-sdk-identity.list_tags_for_resource
  for_each: aws.chime-sdk-identity.describe_app_instance_user_endpoint
  calls:
  - action: list_tags_for_resource
    save_as: response
    on_error: continue
    params:
      appInstanceUserEndpointResourceArn: '{{ item.appInstanceUserEndpointResourceArn
        }}'
  emit:
    as: item
    items_for: '{{ response.Tags }}'
- discovery_id: aws.chime-sdk-identity.describe_app_instance_user
  for_each: aws.chime-sdk-identity.list_app_instance_users
  calls:
  - action: describe_app_instance_user
    save_as: response
    on_error: continue
    params:
      appInstanceUserAppInstanceUserArn: '{{ item.appInstanceUserAppInstanceUserArn
        }}'
  emit:
    as: item
    items_for: '{{ response.AppInstanceUser }}'
- discovery_id: aws.chime-sdk-identity.list_app_instance_bots
  for_each: aws.chime-sdk-identity.list_app_instances
  calls:
  - action: list_app_instance_bots
    save_as: response
    on_error: continue
    params:
      appInstancAppInstanceArn: '{{ item.appInstancAppInstanceArn }}'
  emit:
    as: item
    items_for: '{{ response.AppInstanceBots }}'
- discovery_id: aws.chime-sdk-identity.describe_app_instance_bot
  for_each: aws.chime-sdk-identity.list_app_instance_bots
  calls:
  - action: describe_app_instance_bot
    save_as: response
    on_error: continue
    params:
      appInstanceBotAppInstanceBotArn: '{{ item.appInstanceBotAppInstanceBotArn }}'
  emit:
    as: item
    items_for: '{{ response.AppInstanceBot }}'
- discovery_id: aws.chime-sdk-identity.describe_app_instance_admin
  for_each: aws.chime-sdk-identity.list_app_instances
  calls:
  - action: describe_app_instance_admin
    save_as: response
    on_error: continue
    params:
      appInstancAppInstanceArn: '{{ item.appInstancAppInstanceArn }}'
  emit:
    as: item
    items_for: '{{ response.AppInstanceAdmin }}'
checks: []
