version: '1.0'
provider: aws
service: directconnect
services:
  client: directconnect
  module: boto3.client
discovery:
- discovery_id: aws.directconnect.describe_virtual_interfaces
  calls:
  - action: describe_virtual_interfaces
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.virtualInterfaces }}'
- discovery_id: aws.directconnect.describe_connections
  calls:
  - action: describe_connections
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.connections }}'
- discovery_id: aws.directconnect.describe_lags
  calls:
  - action: describe_lags
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.lags }}'
- discovery_id: aws.directconnect.describe_interconnects
  calls:
  - action: describe_interconnects
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.interconnects }}'
- discovery_id: aws.directconnect.describe_direct_connect_gateway_associations
  calls:
  - action: describe_direct_connect_gateway_associations
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.directConnectGatewayAssociations }}'
- discovery_id: aws.directconnect.list_virtual_interface_test_history
  calls:
  - action: list_virtual_interface_test_history
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.virtualInterfaceTestHistory }}'
- discovery_id: aws.directconnect.describe_direct_connect_gateway_attachments
  calls:
  - action: describe_direct_connect_gateway_attachments
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.directConnectGatewayAttachments }}'
- discovery_id: aws.directconnect.describe_direct_connect_gateway_association_proposals
  calls:
  - action: describe_direct_connect_gateway_association_proposals
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.directConnectGatewayAssociationProposals }}'
- discovery_id: aws.directconnect.describe_direct_connect_gateways
  calls:
  - action: describe_direct_connect_gateways
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.directConnectGateways }}'
- discovery_id: aws.directconnect.describe_locations
  calls:
  - action: describe_locations
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.locations }}'
- discovery_id: aws.directconnect.describe_customer_metadata
  calls:
  - action: describe_customer_metadata
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.agreements }}'
- discovery_id: aws.directconnect.describe_virtual_gateways
  calls:
  - action: describe_virtual_gateways
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.virtualGateways }}'
- discovery_id: aws.directconnect.describe_router_configuration
  for_each: aws.directconnect.describe_virtual_interfaces
  calls:
  - action: describe_router_configuration
    save_as: response
    on_error: continue
    params:
      directConnectGatewayAttachmentVirtualInterfaceId: '{{ item.directConnectGatewayAttachmentVirtualInterfaceId
        }}'
  emit:
    as: item
    items_for: '{{ response.router }}'
- discovery_id: aws.directconnect.describe_connection_loa
  for_each: aws.directconnect.describe_virtual_interfaces
  calls:
  - action: describe_connection_loa
    save_as: response
    on_error: continue
    params:
      connectionConnectionId: '{{ item.connectionConnectionId }}'
  emit:
    as: item
    items_for: '{{ response.loa }}'
- discovery_id: aws.directconnect.describe_tags
  calls:
  - action: describe_tags
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.resourceTags }}'
checks: []
