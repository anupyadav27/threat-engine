version: '1.0'
provider: aws
service: globalaccelerator
services:
  client: globalaccelerator
  module: boto3.client
discovery:
- discovery_id: aws.globalaccelerator.list_accelerators
  calls:
  - action: list_accelerators
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.Accelerators }}'
- discovery_id: aws.globalaccelerator.list_cross_account_attachments
  calls:
  - action: list_cross_account_attachments
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.CrossAccountAttachments }}'
- discovery_id: aws.globalaccelerator.list_byoip_cidrs
  calls:
  - action: list_byoip_cidrs
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.ByoipCidrs }}'
- discovery_id: aws.globalaccelerator.list_custom_routing_port_mappings
  for_each: aws.globalaccelerator.list_accelerators
  calls:
  - action: list_custom_routing_port_mappings
    save_as: response
    on_error: continue
    params:
      acceleratorAcceleratorArn: '{{ item.acceleratorAcceleratorArn }}'
  emit:
    as: item
    items_for: '{{ response.PortMappings }}'
- discovery_id: aws.globalaccelerator.describe_endpoint_group
  for_each: aws.globalaccelerator.list_custom_routing_port_mappings
  calls:
  - action: describe_endpoint_group
    save_as: response
    on_error: continue
    params:
      endpointGroupEndpointGroupArn: '{{ item.endpointGroupEndpointGroupArn }}'
  emit:
    as: item
    items_for: '{{ response.EndpointGroup }}'
- discovery_id: aws.globalaccelerator.list_listeners
  for_each: aws.globalaccelerator.list_accelerators
  calls:
  - action: list_listeners
    save_as: response
    on_error: continue
    params:
      acceleratorAcceleratorArn: '{{ item.acceleratorAcceleratorArn }}'
  emit:
    as: item
    items_for: '{{ response.Listeners }}'
- discovery_id: aws.globalaccelerator.describe_custom_routing_accelerator_attributes
  for_each: aws.globalaccelerator.list_accelerators
  calls:
  - action: describe_custom_routing_accelerator_attributes
    save_as: response
    on_error: continue
    params:
      acceleratorAcceleratorArn: '{{ item.acceleratorAcceleratorArn }}'
  emit:
    as: item
    items_for: '{{ response.AcceleratorAttributes }}'
- discovery_id: aws.globalaccelerator.list_tags_for_resource
  calls:
  - action: list_tags_for_resource
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.Tags }}'
- discovery_id: aws.globalaccelerator.describe_accelerator
  for_each: aws.globalaccelerator.list_accelerators
  calls:
  - action: describe_accelerator
    save_as: response
    on_error: continue
    params:
      acceleratorAcceleratorArn: '{{ item.acceleratorAcceleratorArn }}'
  emit:
    as: item
    items_for: '{{ response.Accelerator }}'
- discovery_id: aws.globalaccelerator.list_custom_routing_port_mappings_by_destination
  for_each: aws.globalaccelerator.list_custom_routing_port_mappings
  calls:
  - action: list_custom_routing_port_mappings_by_destination
    save_as: response
    on_error: continue
    params:
      crossAccountResourcEndpointId: '{{ item.crossAccountResourcEndpointId }}'
  emit:
    as: item
    items_for: '{{ response.DestinationPortMappings }}'
- discovery_id: aws.globalaccelerator.list_custom_routing_endpoint_groups
  for_each: aws.globalaccelerator.list_listeners
  calls:
  - action: list_custom_routing_endpoint_groups
    save_as: response
    on_error: continue
    params:
      listenerListenerArn: '{{ item.listenerListenerArn }}'
  emit:
    as: item
    items_for: '{{ response.EndpointGroups }}'
checks: []
