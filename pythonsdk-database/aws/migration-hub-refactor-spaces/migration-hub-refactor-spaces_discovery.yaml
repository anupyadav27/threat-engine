version: '1.0'
provider: aws
service: migration-hub-refactor-spaces
services:
  client: migration-hub-refactor-spaces
  module: boto3.client
discovery:
- discovery_id: aws.migration-hub-refactor-spaces.list_environments
  calls:
  - action: list_environments
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.EnvironmentSummaryList }}'
- discovery_id: aws.migration-hub-refactor-spaces.get_service
  calls:
  - action: get_service
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.Error }}'
- discovery_id: aws.migration-hub-refactor-spaces.get_application
  calls:
  - action: get_application
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.ApiGatewayProxy }}'
- discovery_id: aws.migration-hub-refactor-spaces.get_route
  calls:
  - action: get_route
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.Methods }}'
- discovery_id: aws.migration-hub-refactor-spaces.list_environment_vpcs
  calls:
  - action: list_environment_vpcs
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.EnvironmentVpcList }}'
- discovery_id: aws.migration-hub-refactor-spaces.get_resource_policy
  calls:
  - action: get_resource_policy
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.Policy }}'
checks: []
