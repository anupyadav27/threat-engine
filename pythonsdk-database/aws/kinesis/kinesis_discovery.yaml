version: '1.0'
provider: aws
service: kinesis
services:
  client: kinesis
  module: boto3.client
discovery:
- discovery_id: aws.kinesis.describe_stream_summary
  calls:
  - action: describe_stream_summary
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.StreamDescriptionSummary }}'
- discovery_id: aws.kinesis.describe_stream
  calls:
  - action: describe_stream
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.StreamDescription }}'
- discovery_id: aws.kinesis.describe_stream_consumer
  calls:
  - action: describe_stream_consumer
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.ConsumerDescription }}'
- discovery_id: aws.kinesis.list_shards
  calls:
  - action: list_shards
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.Shards }}'
- discovery_id: aws.kinesis.describe_account_settings
  calls:
  - action: describe_account_settings
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.MinimumThroughputBillingCommitment }}'
- discovery_id: aws.kinesis.describe_limits
  calls:
  - action: describe_limits
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.ShardLimit }}'
- discovery_id: aws.kinesis.list_tags_for_stream
  calls:
  - action: list_tags_for_stream
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.Tags }}'
- discovery_id: aws.kinesis.get_records
  calls:
  - action: get_records
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.Records }}'
- discovery_id: aws.kinesis.get_resource_policy
  calls:
  - action: get_resource_policy
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.Policy }}'
checks: []
