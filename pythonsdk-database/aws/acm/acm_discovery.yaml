version: '1.0'
provider: aws
service: acm
services:
  client: acm
  module: boto3.client
discovery:
- discovery_id: aws.acm.list_certificates
  calls:
  - action: list_certificates
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.CertificateSummaryList }}'
- discovery_id: aws.acm.get_account_configuration
  calls:
  - action: get_account_configuration
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.ExpiryEvents }}'
- discovery_id: aws.acm.describe_certificate
  for_each: aws.acm.list_certificates
  calls:
  - action: describe_certificate
    save_as: response
    on_error: continue
    params:
      certificateSummaryListCertificateArn: '{{ item.certificateSummaryListCertificateArn
        }}'
  emit:
    as: item
    items_for: '{{ response.Certificate }}'
- discovery_id: aws.acm.list_tags_for_certificate
  for_each: aws.acm.list_certificates
  calls:
  - action: list_tags_for_certificate
    save_as: response
    on_error: continue
    params:
      certificateSummaryListCertificateArn: '{{ item.certificateSummaryListCertificateArn
        }}'
  emit:
    as: item
    items_for: '{{ response.Tags }}'
- discovery_id: aws.acm.get_certificate
  for_each: aws.acm.list_certificates
  calls:
  - action: get_certificate
    save_as: response
    on_error: continue
    params:
      certificateSummaryListCertificateArn: '{{ item.certificateSummaryListCertificateArn
        }}'
  emit:
    as: item
    items_for: '{{ response.Certificate }}'
checks: []
