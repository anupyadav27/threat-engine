version: '1.0'
provider: aws
service: macie
services:
  client: macie
  module: boto3.client
discovery:
- discovery_id: aws.macie.get_reveal_configuration
  calls:
  - action: get_reveal_configuration
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.configuration }}'
- discovery_id: aws.macie.describe_buckets
  calls:
  - action: describe_buckets
    save_as: response
    on_error: continue
  emit:
