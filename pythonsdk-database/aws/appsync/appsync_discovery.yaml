version: '1.0'
provider: aws
service: appsync
services:
  client: appsync
  module: boto3.client
discovery:
- discovery_id: aws.appsync.list_graphql_apis
  calls:
  - action: list_graphql_apis
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.graphqlApis }}'
- discovery_id: aws.appsync.list_apis
  calls:
  - action: list_apis
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.apis }}'
- discovery_id: aws.appsync.list_domain_names
  calls:
  - action: list_domain_names
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.domainNameConfigs }}'
- discovery_id: aws.appsync.list_data_sources
  for_each: aws.appsync.list_graphql_apis
  calls:
  - action: list_data_sources
    save_as: response
    on_error: continue
    params:
      apiApiId: '{{ item.apiApiId }}'
  emit:
    as: item
    items_for: '{{ response.dataSources }}'
- discovery_id: aws.appsync.list_functions
  for_each: aws.appsync.list_graphql_apis
  calls:
  - action: list_functions
    save_as: response
    on_error: continue
    params:
      apiApiId: '{{ item.apiApiId }}'
  emit:
    as: item
    items_for: '{{ response.functions }}'
- discovery_id: aws.appsync.get_api_cache
  for_each: aws.appsync.list_graphql_apis
  calls:
  - action: get_api_cache
    save_as: response
    on_error: continue
    params:
      apiApiId: '{{ item.apiApiId }}'
  emit:
    as: item
    items_for: '{{ response.apiCache }}'
- discovery_id: aws.appsync.list_resolvers_by_function
  for_each: aws.appsync.list_graphql_apis
  calls:
  - action: list_resolvers_by_function
    save_as: response
    on_error: continue
    params:
      apiApiId: '{{ item.apiApiId }}'
      functionConfigurationFunctionId: '{{ item.functionConfigurationFunctionId }}'
  emit:
    as: item
    items_for: '{{ response.resolvers }}'
- discovery_id: aws.appsync.list_channel_namespaces
  for_each: aws.appsync.list_graphql_apis
  calls:
  - action: list_channel_namespaces
    save_as: response
    on_error: continue
    params:
      apiApiId: '{{ item.apiApiId }}'
  emit:
    as: item
    items_for: '{{ response.channelNamespaces }}'
- discovery_id: aws.appsync.list_source_api_associations
  for_each: aws.appsync.list_graphql_apis
  calls:
  - action: list_source_api_associations
    save_as: response
    on_error: continue
    params:
      apiApiId: '{{ item.apiApiId }}'
  emit:
    as: item
    items_for: '{{ response.sourceApiAssociationSummaries }}'
- discovery_id: aws.appsync.get_source_api_association
  for_each: aws.appsync.list_source_api_associations
  calls:
  - action: get_source_api_association
    save_as: response
    on_error: continue
    params:
      sourceApiAssociationAssociationId: '{{ item.sourceApiAssociationAssociationId
        }}'
  emit:
    as: item
    items_for: '{{ response.sourceApiAssociation }}'
- discovery_id: aws.appsync.get_api_association
  for_each: aws.appsync.list_domain_names
  calls:
  - action: get_api_association
    save_as: response
    on_error: continue
    params:
      domainNameConfigDomainName: '{{ item.domainNameConfigDomainName }}'
  emit:
    as: item
    items_for: '{{ response.apiAssociation }}'
- discovery_id: aws.appsync.list_api_keys
  for_each: aws.appsync.list_graphql_apis
  calls:
  - action: list_api_keys
    save_as: response
    on_error: continue
    params:
      apiApiId: '{{ item.apiApiId }}'
  emit:
    as: item
    items_for: '{{ response.apiKeys }}'
- discovery_id: aws.appsync.get_graphql_api
  for_each: aws.appsync.list_graphql_apis
  calls:
  - action: get_graphql_api
    save_as: response
    on_error: continue
    params:
      apiApiId: '{{ item.apiApiId }}'
  emit:
    as: item
    items_for: '{{ response.graphqlApi }}'
- discovery_id: aws.appsync.get_api
  for_each: aws.appsync.list_graphql_apis
  calls:
  - action: get_api
    save_as: response
    on_error: continue
    params:
      apiApiId: '{{ item.apiApiId }}'
  emit:
    as: item
    items_for: '{{ response.api }}'
- discovery_id: aws.appsync.get_domain_name
  for_each: aws.appsync.list_domain_names
  calls:
  - action: get_domain_name
    save_as: response
    on_error: continue
    params:
      domainNameConfigDomainName: '{{ item.domainNameConfigDomainName }}'
  emit:
    as: item
    items_for: '{{ response.domainNameConfig }}'
- discovery_id: aws.appsync.get_data_source_introspection
  calls:
  - action: get_data_source_introspection
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.introspectionResult }}'
- discovery_id: aws.appsync.get_schema_creation_status
  for_each: aws.appsync.list_graphql_apis
  calls:
  - action: get_schema_creation_status
    save_as: response
    on_error: continue
    params:
      apiApiId: '{{ item.apiApiId }}'
  emit:
    as: item
    items_for: '{{ response.status }}'
- discovery_id: aws.appsync.get_graphql_api_environment_variables
  for_each: aws.appsync.list_graphql_apis
  calls:
  - action: get_graphql_api_environment_variables
    save_as: response
    on_error: continue
    params:
      apiApiId: '{{ item.apiApiId }}'
  emit:
    as: item
    items_for: '{{ response.environmentVariables }}'
checks: []
