version: '1.0'
provider: aws
service: elasticbeanstalk
services:
  client: elasticbeanstalk
  module: boto3.client
discovery:
- discovery_id: aws.elasticbeanstalk.describe_environments
  calls:
  - action: describe_environments
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.Environments }}'
- discovery_id: aws.elasticbeanstalk.describe_platform_version
  calls:
  - action: describe_platform_version
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.PlatformDescription }}'
- discovery_id: aws.elasticbeanstalk.describe_configuration_options
  calls:
  - action: describe_configuration_options
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.Options }}'
- discovery_id: aws.elasticbeanstalk.describe_instances_health
  calls:
  - action: describe_instances_health
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.InstanceHealthList }}'
- discovery_id: aws.elasticbeanstalk.describe_application_versions
  calls:
  - action: describe_application_versions
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.ApplicationVersions }}'
- discovery_id: aws.elasticbeanstalk.describe_events
  calls:
  - action: describe_events
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.Events }}'
- discovery_id: aws.elasticbeanstalk.describe_environment_managed_action_history
  calls:
  - action: describe_environment_managed_action_history
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.ManagedActionHistoryItems }}'
- discovery_id: aws.elasticbeanstalk.describe_applications
  calls:
  - action: describe_applications
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.Applications }}'
- discovery_id: aws.elasticbeanstalk.describe_environment_resources
  calls:
  - action: describe_environment_resources
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.EnvironmentResources }}'
- discovery_id: aws.elasticbeanstalk.describe_environment_managed_actions
  calls:
  - action: describe_environment_managed_actions
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.ManagedActions }}'
- discovery_id: aws.elasticbeanstalk.list_platform_branches
  calls:
  - action: list_platform_branches
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.PlatformBranchSummaryList }}'
- discovery_id: aws.elasticbeanstalk.describe_account_attributes
  calls:
  - action: describe_account_attributes
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.ResourceQuotas }}'
- discovery_id: aws.elasticbeanstalk.describe_configuration_settings
  for_each: aws.elasticbeanstalk.describe_environments
  calls:
  - action: describe_configuration_settings
    save_as: response
    on_error: continue
    params:
      ApplicationName: '{{ item.applicationName }}'
  emit:
    as: item
    items_for: '{{ response.ConfigurationSettings }}'
- discovery_id: aws.elasticbeanstalk.list_tags_for_resource
  calls:
  - action: list_tags_for_resource
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.ResourceTags }}'
checks: []
