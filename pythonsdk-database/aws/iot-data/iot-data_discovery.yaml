version: '1.0'
provider: aws
service: iot-data
services:
  client: iot-data
  module: boto3.client
discovery:
- discovery_id: aws.iot-data.list_retained_messages
  calls:
  - action: list_retained_messages
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.retainedTopics }}'
checks: []
