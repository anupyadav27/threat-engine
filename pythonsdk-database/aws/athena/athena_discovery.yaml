version: '1.0'
provider: aws
service: athena
services:
  client: athena
  module: boto3.client
discovery:
- discovery_id: aws.athena.list_capacity_reservations
  calls:
  - action: list_capacity_reservations
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.CapacityReservations }}'
- discovery_id: aws.athena.list_work_groups
  calls:
  - action: list_work_groups
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.WorkGroups }}'
- discovery_id: aws.athena.list_data_catalogs
  calls:
  - action: list_data_catalogs
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.DataCatalogsSummary }}'
- discovery_id: aws.athena.list_engine_versions
  calls:
  - action: list_engine_versions
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.EngineVersions }}'
- discovery_id: aws.athena.list_application_dpu_sizes
  calls:
  - action: list_application_dpu_sizes
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.ApplicationDPUSizes }}'
- discovery_id: aws.athena.list_table_metadata
  for_each: aws.athena.list_data_catalogs
  calls:
  - action: list_table_metadata
    save_as: response
    on_error: continue
    params:
      dataCatalogsSummaryCatalogName: '{{ item.dataCatalogsSummaryCatalogName }}'
  emit:
    as: item
    items_for: '{{ response.TableMetadataList }}'
- discovery_id: aws.athena.list_tags_for_resource
  calls:
  - action: list_tags_for_resource
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.Tags }}'
- discovery_id: aws.athena.get_capacity_assignment_configuration
  for_each: aws.athena.list_capacity_reservations
  calls:
  - action: get_capacity_assignment_configuration
    save_as: response
    on_error: continue
    params:
      CapacityReservationName: '{{ item.capacityReservationName }}'
  emit:
    as: item
    items_for: '{{ response.CapacityAssignmentConfiguration }}'
- discovery_id: aws.athena.get_database
  for_each: aws.athena.list_data_catalogs
  calls:
  - action: get_database
    save_as: response
    on_error: continue
    params:
      dataCatalogsSummaryCatalogName: '{{ item.dataCatalogsSummaryCatalogName }}'
  emit:
    as: item
    items_for: '{{ response.Database }}'
- discovery_id: aws.athena.get_resource_dashboard
  calls:
  - action: get_resource_dashboard
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.Url }}'
checks: []
