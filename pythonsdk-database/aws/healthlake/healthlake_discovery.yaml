version: '1.0'
provider: aws
service: healthlake
services:
  client: healthlake
  module: boto3.client
discovery:
- discovery_id: aws.healthlake.list_fhir_datastores
  calls:
  - action: list_fhir_datastores
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.DatastorePropertiesList }}'
- discovery_id: aws.healthlake.list_fhir_import_jobs
  for_each: aws.healthlake.list_fhir_datastores
  calls:
  - action: list_fhir_import_jobs
    save_as: response
    on_error: continue
    params:
      datastorePropertiesListDatastoreId: '{{ item.datastorePropertiesListDatastoreId
        }}'
  emit:
    as: item
    items_for: '{{ response.ImportJobPropertiesList }}'
- discovery_id: aws.healthlake.describe_fhir_export_job
  for_each: aws.healthlake.list_fhir_datastores
  calls:
  - action: describe_fhir_export_job
    save_as: response
    on_error: continue
    params:
      datastorePropertiesListDatastoreId: '{{ item.datastorePropertiesListDatastoreId
        }}'
      exportJobPropertyJobId: '{{ item.exportJobPropertyJobId }}'
  emit:
    as: item
    items_for: '{{ response.ExportJobProperties }}'
- discovery_id: aws.healthlake.list_tags_for_resource
  calls:
  - action: list_tags_for_resource
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.Tags }}'
- discovery_id: aws.healthlake.describe_fhir_import_job
  for_each: aws.healthlake.list_fhir_datastores
  calls:
  - action: describe_fhir_import_job
    save_as: response
    on_error: continue
    params:
      datastorePropertiesListDatastoreId: '{{ item.datastorePropertiesListDatastoreId
        }}'
      exportJobPropertyJobId: '{{ item.exportJobPropertyJobId }}'
  emit:
    as: item
    items_for: '{{ response.ImportJobProperties }}'
- discovery_id: aws.healthlake.describe_fhir_datastore
  for_each: aws.healthlake.list_fhir_datastores
  calls:
  - action: describe_fhir_datastore
    save_as: response
    on_error: continue
    params:
      datastorePropertiesListDatastoreId: '{{ item.datastorePropertiesListDatastoreId
        }}'
  emit:
    as: item
    items_for: '{{ response.DatastoreProperties }}'
checks: []
