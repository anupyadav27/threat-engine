version: '1.0'
provider: aws
service: cloudfront-keyvaluestore
services:
  client: cloudfront-keyvaluestore
  module: boto3.client
discovery:
- discovery_id: aws.cloudfront-keyvaluestore.list_keys
  calls:
  - action: list_keys
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.Items }}'
- discovery_id: aws.cloudfront-keyvaluestore.describe_key_value_store
  calls:
  - action: describe_key_value_store
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.ItemCount }}'
checks: []
