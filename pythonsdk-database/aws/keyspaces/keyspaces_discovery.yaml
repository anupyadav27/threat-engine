version: '1.0'
provider: aws
service: keyspaces
services:
  client: keyspaces
  module: boto3.client
discovery:
- discovery_id: aws.keyspaces.list_keyspaces
  calls:
  - action: list_keyspaces
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.keyspaces }}'
- discovery_id: aws.keyspaces.get_type
  for_each: aws.keyspaces.list_keyspaces
  calls:
  - action: get_type
    save_as: response
    on_error: continue
    params:
      keyspacKeyspaceName: '{{ item.keyspacKeyspaceName }}'
  emit:
    as: item
    items_for: '{{ response.fieldDefinitions }}'
- discovery_id: aws.keyspaces.get_keyspace
  for_each: aws.keyspaces.list_keyspaces
  calls:
  - action: get_keyspace
    save_as: response
    on_error: continue
    params:
      keyspacKeyspaceName: '{{ item.keyspacKeyspaceName }}'
  emit:
    as: item
    items_for: '{{ response.replicationGroupStatuses }}'
- discovery_id: aws.keyspaces.list_tags_for_resource
  for_each: aws.keyspaces.list_keyspaces
  calls:
  - action: list_tags_for_resource
    save_as: response
    on_error: continue
    params:
      keyspacResourceArn: '{{ item.keyspacResourceArn }}'
  emit:
    as: item
    items_for: '{{ response.tags }}'
- discovery_id: aws.keyspaces.list_tables
  for_each: aws.keyspaces.list_keyspaces
  calls:
  - action: list_tables
    save_as: response
    on_error: continue
    params:
      keyspacKeyspaceName: '{{ item.keyspacKeyspaceName }}'
  emit:
    as: item
    items_for: '{{ response.tables }}'
- discovery_id: aws.keyspaces.get_table
  for_each: aws.keyspaces.list_keyspaces
  calls:
  - action: get_table
    save_as: response
    on_error: continue
    params:
      keyspacKeyspaceName: '{{ item.keyspacKeyspaceName }}'
      tablTableName: '{{ item.tablTableName }}'
  emit:
    as: item
    items_for: '{{ response.replicaSpecifications }}'
- discovery_id: aws.keyspaces.get_table_auto_scaling_settings
  for_each: aws.keyspaces.list_keyspaces
  calls:
  - action: get_table_auto_scaling_settings
    save_as: response
    on_error: continue
    params:
      keyspacKeyspaceName: '{{ item.keyspacKeyspaceName }}'
      tablTableName: '{{ item.tablTableName }}'
  emit:
    as: item
    items_for: '{{ response.replicaSpecifications }}'
checks: []
