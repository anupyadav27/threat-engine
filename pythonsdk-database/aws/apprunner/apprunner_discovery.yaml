version: '1.0'
provider: aws
service: apprunner
services:
  client: apprunner
  module: boto3.client
discovery:
- discovery_id: aws.apprunner.list_vpc_connectors
  calls:
  - action: list_vpc_connectors
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.VpcConnectors }}'
- discovery_id: aws.apprunner.list_auto_scaling_configurations
  calls:
  - action: list_auto_scaling_configurations
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.AutoScalingConfigurationSummaryList }}'
- discovery_id: aws.apprunner.list_services
  calls:
  - action: list_services
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.ServiceSummaryList }}'
- discovery_id: aws.apprunner.list_connections
  calls:
  - action: list_connections
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.ConnectionSummaryList }}'
- discovery_id: aws.apprunner.list_observability_configurations
  calls:
  - action: list_observability_configurations
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.ObservabilityConfigurationSummaryList }}'
- discovery_id: aws.apprunner.list_vpc_ingress_connections
  calls:
  - action: list_vpc_ingress_connections
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.VpcIngressConnectionSummaryList }}'
- discovery_id: aws.apprunner.describe_service
  for_each: aws.apprunner.list_services
  calls:
  - action: describe_service
    save_as: response
    on_error: continue
    params:
      serviceSummaryListServiceArn: '{{ item.serviceSummaryListServiceArn }}'
  emit:
    as: item
    items_for: '{{ response.Service }}'
- discovery_id: aws.apprunner.describe_auto_scaling_configuration
  for_each: aws.apprunner.list_auto_scaling_configurations
  calls:
  - action: describe_auto_scaling_configuration
    save_as: response
    on_error: continue
    params:
      autoScalingConfigurationSummaryListAutoScalingConfigurationArn: '{{ item.autoScalingConfigurationSummaryListAutoScalingConfigurationArn
        }}'
  emit:
    as: item
    items_for: '{{ response.AutoScalingConfiguration }}'
- discovery_id: aws.apprunner.describe_vpc_ingress_connection
  for_each: aws.apprunner.list_vpc_ingress_connections
  calls:
  - action: describe_vpc_ingress_connection
    save_as: response
    on_error: continue
    params:
      vpcIngressConnectionSummaryListVpcIngressConnectionArn: '{{ item.vpcIngressConnectionSummaryListVpcIngressConnectionArn
        }}'
  emit:
    as: item
    items_for: '{{ response.VpcIngressConnection }}'
- discovery_id: aws.apprunner.list_operations
  for_each: aws.apprunner.list_services
  calls:
  - action: list_operations
    save_as: response
    on_error: continue
    params:
      serviceSummaryListServiceArn: '{{ item.serviceSummaryListServiceArn }}'
  emit:
    as: item
    items_for: '{{ response.OperationSummaryList }}'
- discovery_id: aws.apprunner.describe_custom_domains
  for_each: aws.apprunner.list_services
  calls:
  - action: describe_custom_domains
    save_as: response
    on_error: continue
    params:
      serviceSummaryListServiceArn: '{{ item.serviceSummaryListServiceArn }}'
  emit:
    as: item
    items_for: '{{ response.CustomDomains }}'
- discovery_id: aws.apprunner.list_tags_for_resource
  calls:
  - action: list_tags_for_resource
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.Tags }}'
- discovery_id: aws.apprunner.describe_observability_configuration
  for_each: aws.apprunner.list_observability_configurations
  calls:
  - action: describe_observability_configuration
    save_as: response
    on_error: continue
    params:
      observabilityConfigurationSummaryListObservabilityConfigurationArn: '{{ item.observabilityConfigurationSummaryListObservabilityConfigurationArn
        }}'
  emit:
    as: item
    items_for: '{{ response.ObservabilityConfiguration }}'
checks: []
