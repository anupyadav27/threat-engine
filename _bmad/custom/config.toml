# Team-level overrides — committed to repo, never overwritten by installer.
# See _bmad/config.toml for all configurable keys.

[core]
project_name = "threat-engine"
user_name = "Anup"

[modules.bmm]
# Planning artifacts go into existing .claude/planning folder
planning_artifacts = "{project-root}/.claude/planning"
# Agents load project knowledge from .claude/
project_knowledge = "{project-root}/.claude"
