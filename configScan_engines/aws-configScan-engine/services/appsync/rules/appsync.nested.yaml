version: '1.0'
provider: aws
service: appsync
services:
  client: appsync
  module: boto3.client
discovery:
- discovery_id: aws.appsync.list_graphql_apis
  calls:
  - action: list_graphql_apis
    save_as: response
    params:
      MaxResults: 1000
  emit:
    items_for: '{{ response.graphqlApis }}'
    as: item
checks:
- rule_id: aws.appsync.field.level_logging_enabled
  for_each: aws.appsync.list_graphql_apis
  conditions:
    var: item.logConfig
    op: exists
    value: null
- rule_id: aws.appsync.resource.field_level_logging_enabled
  for_each: aws.appsync.list_graphql_apis
  conditions:
    var: item.logConfig
    op: exists
    value: null
