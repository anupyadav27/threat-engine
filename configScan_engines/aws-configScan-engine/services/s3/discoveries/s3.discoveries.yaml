version: '1.0'
provider: aws
service: s3
services:
  client: s3
  module: boto3.client
discovery:
- discovery_id: aws.s3.list_buckets
  calls:
  - action: list_buckets
    save_as: response
    on_error: continue
    params:
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.Buckets }}'
    item:
      BucketArn: '{{ item.BucketArn }}'
      BucketRegion: '{{ item.BucketRegion }}'
      CreationDate: '{{ item.CreationDate }}'
      Name: '{{ item.Name }}'
- discovery_id: aws.s3.list_object_versions
  for_each: aws.s3.list_buckets
  calls:
  - action: list_object_versions
    save_as: response
    on_error: continue
    params:
      Bucket: '{{ item.Name }}'
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.Versions }}'
    item:
      ChecksumAlgorithm: '{{ item.ChecksumAlgorithm }}'
      ChecksumType: '{{ item.ChecksumType }}'
      ETag: '{{ item.ETag }}'
      IsLatest: '{{ item.IsLatest }}'
      Key: '{{ item.Key }}'
      LastModified: '{{ item.LastModified }}'
      Owner: '{{ item.Owner }}'
      RestoreStatus: '{{ item.RestoreStatus }}'
      Size: '{{ item.Size }}'
      StorageClass: '{{ item.StorageClass }}'
      VersionId: '{{ item.VersionId }}'
- discovery_id: aws.s3.get_object
  for_each: aws.s3.list_buckets
  calls:
  - action: get_object
    save_as: response
    on_error: continue
    params:
      Bucket: '{{ item.tagSetKey }}'
  emit:
    as: item
    items_for: '{{ response.Body }}'
- discovery_id: aws.s3.get_bucket_lifecycle_configuration
  for_each: aws.s3.list_buckets
  calls:
  - action: get_bucket_lifecycle_configuration
    save_as: response
    on_error: continue
    params:
      Bucket: '{{ item.Name }}'
  emit:
    as: item
    items_for: '{{ response.Rules }}'
    item:
      AbortIncompleteMultipartUpload: '{{ item.AbortIncompleteMultipartUpload }}'
      Expiration: '{{ item.Expiration }}'
      Filter: '{{ item.Filter }}'
      ID: '{{ item.ID }}'
      NoncurrentVersionExpiration: '{{ item.NoncurrentVersionExpiration }}'
      NoncurrentVersionTransitions: '{{ item.NoncurrentVersionTransitions }}'
      Prefix: '{{ item.Prefix }}'
      Status: '{{ item.Status }}'
      Transitions: '{{ item.Transitions }}'
- discovery_id: aws.s3.list_bucket_inventory_configurations
  for_each: aws.s3.list_buckets
  calls:
  - action: list_bucket_inventory_configurations
    save_as: response
    on_error: continue
    params:
      Bucket: '{{ item.Name }}'
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.InventoryConfigurationList }}'
    item:
      Destination: '{{ item.Destination }}'
      Filter: '{{ item.Filter }}'
      Id: '{{ item.Id }}'
      IncludedObjectVersions: '{{ item.IncludedObjectVersions }}'
      IsEnabled: '{{ item.IsEnabled }}'
      OptionalFields: '{{ item.OptionalFields }}'
      Schedule: '{{ item.Schedule }}'
- discovery_id: aws.s3.get_bucket_cors
  for_each: aws.s3.list_buckets
  calls:
  - action: get_bucket_cors
    save_as: response
    on_error: continue
    params:
      Bucket: '{{ item.Name }}'
  emit:
    as: item
    items_for: '{{ response.CORSRules }}'
    item:
      AllowedHeaders: '{{ item.AllowedHeaders }}'
      AllowedMethods: '{{ item.AllowedMethods }}'
      AllowedOrigins: '{{ item.AllowedOrigins }}'
      ExposeHeaders: '{{ item.ExposeHeaders }}'
      ID: '{{ item.ID }}'
      MaxAgeSeconds: '{{ item.MaxAgeSeconds }}'
- discovery_id: aws.s3.get_bucket_acl
  for_each: aws.s3.list_buckets
  calls:
  - action: get_bucket_acl
    save_as: response
    on_error: continue
    params:
      Bucket: '{{ item.Name }}'
  emit:
    as: item
    items_for: '{{ response.Grants }}'
    item:
      Grantee: '{{ item.Grantee }}'
      Permission: '{{ item.Permission }}'
- discovery_id: aws.s3.get_bucket_logging
  for_each: aws.s3.list_buckets
  calls:
  - action: get_bucket_logging
    save_as: response
    on_error: continue
    params:
      Bucket: '{{ item.Name }}'
  emit:
    as: item
    items_for: '{{ response.LoggingEnabled }}'
    item:
      TargetBucket: '{{ item.TargetBucket }}'
      TargetGrants: '{{ item.TargetGrants }}'
      TargetObjectKeyFormat: '{{ item.TargetObjectKeyFormat }}'
      TargetPrefix: '{{ item.TargetPrefix }}'
- discovery_id: aws.s3.get_public_access_block
  for_each: aws.s3.list_buckets
  calls:
  - action: get_public_access_block
    save_as: response
    on_error: continue
    params:
      Bucket: '{{ item.Name }}'
  emit:
    as: item
    items_for: '{{ response.PublicAccessBlockConfiguration }}'
    item:
      BlockPublicAcls: '{{ item.BlockPublicAcls }}'
      BlockPublicPolicy: '{{ item.BlockPublicPolicy }}'
      IgnorePublicAcls: '{{ item.IgnorePublicAcls }}'
      RestrictPublicBuckets: '{{ item.RestrictPublicBuckets }}'
- discovery_id: aws.s3.list_multipart_uploads
  for_each: aws.s3.list_buckets
  calls:
  - action: list_multipart_uploads
    save_as: response
    on_error: continue
    params:
      Bucket: '{{ item.Name }}'
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.Uploads }}'
    item:
      ChecksumAlgorithm: '{{ item.ChecksumAlgorithm }}'
      ChecksumType: '{{ item.ChecksumType }}'
      Initiated: '{{ item.Initiated }}'
      Initiator: '{{ item.Initiator }}'
      Key: '{{ item.Key }}'
      Owner: '{{ item.Owner }}'
      StorageClass: '{{ item.StorageClass }}'
      UploadId: '{{ item.UploadId }}'
- discovery_id: aws.s3.get_object_acl
  for_each: aws.s3.list_buckets
  calls:
  - action: get_object_acl
    save_as: response
    on_error: continue
    params:
      Bucket: '{{ item.tagSetKey }}'
  emit:
    as: item
    items_for: '{{ response.Grants }}'
    item:
      Grantee: '{{ item.Grantee }}'
      Permission: '{{ item.Permission }}'
- discovery_id: aws.s3.get_bucket_notification
  for_each: aws.s3.list_buckets
  calls:
  - action: get_bucket_notification
    save_as: response
    on_error: continue
    params:
      Bucket: '{{ item.Name }}'
  emit:
    as: item
    items_for: '{{ response.TopicConfiguration }}'
    item:
      Event: '{{ item.Event }}'
      Events: '{{ item.Events }}'
      Id: '{{ item.Id }}'
      Topic: '{{ item.Topic }}'
- discovery_id: aws.s3.get_bucket_metadata_table_configuration
  for_each: aws.s3.list_buckets
  calls:
  - action: get_bucket_metadata_table_configuration
    save_as: response
    on_error: continue
    params:
      Bucket: '{{ item.Name }}'
  emit:
    as: item
    items_for: '{{ response.GetBucketMetadataTableConfigurationResult }}'
    item:
      Error: '{{ item.Error }}'
      MetadataTableConfigurationResult: '{{ item.MetadataTableConfigurationResult }}'
      Status: '{{ item.Status }}'
- discovery_id: aws.s3.get_object_retention
  for_each: aws.s3.list_buckets
  calls:
  - action: get_object_retention
    save_as: response
    on_error: continue
    params:
      Bucket: '{{ item.tagSetKey }}'
  emit:
    as: item
    items_for: '{{ response.Retention }}'
    item:
      Mode: '{{ item.Mode }}'
      RetainUntilDate: '{{ item.RetainUntilDate }}'
- discovery_id: aws.s3.get_bucket_lifecycle
  for_each: aws.s3.list_buckets
  calls:
  - action: get_bucket_lifecycle
    save_as: response
    on_error: continue
    params:
      Bucket: '{{ item.Name }}'
  emit:
    as: item
    items_for: '{{ response.Rules }}'
    item:
      AbortIncompleteMultipartUpload: '{{ item.AbortIncompleteMultipartUpload }}'
      Expiration: '{{ item.Expiration }}'
      ID: '{{ item.ID }}'
      NoncurrentVersionExpiration: '{{ item.NoncurrentVersionExpiration }}'
      NoncurrentVersionTransition: '{{ item.NoncurrentVersionTransition }}'
      Prefix: '{{ item.Prefix }}'
      Status: '{{ item.Status }}'
      Transition: '{{ item.Transition }}'
- discovery_id: aws.s3.get_bucket_website
  for_each: aws.s3.list_buckets
  calls:
  - action: get_bucket_website
    save_as: response
    on_error: continue
    params:
      Bucket: '{{ item.Name }}'
  emit:
    as: item
    items_for: '{{ response.RoutingRules }}'
    item:
      Condition: '{{ item.Condition }}'
      Redirect: '{{ item.Redirect }}'
- discovery_id: aws.s3.get_bucket_metadata_configuration
  for_each: aws.s3.list_buckets
  calls:
  - action: get_bucket_metadata_configuration
    save_as: response
    on_error: continue
    params:
      Bucket: '{{ item.Name }}'
  emit:
    as: item
    items_for: '{{ response.GetBucketMetadataConfigurationResult }}'
    item:
      MetadataConfigurationResult: '{{ item.MetadataConfigurationResult }}'
- discovery_id: aws.s3.get_object_lock_configuration
  for_each: aws.s3.list_buckets
  calls:
  - action: get_object_lock_configuration
    save_as: response
    on_error: continue
    params:
      Bucket: '{{ item.Name }}'
  emit:
    as: item
    items_for: '{{ response.ObjectLockConfiguration }}'
    item:
      ObjectLockEnabled: '{{ item.ObjectLockEnabled }}'
      Rule: '{{ item.Rule }}'
- discovery_id: aws.s3.list_parts
  for_each: aws.s3.list_buckets
  calls:
  - action: list_parts
    save_as: response
    on_error: continue
    params:
      Bucket: '{{ item.uploadUploadId }}'
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.Parts }}'
    item:
      ChecksumCRC32: '{{ item.ChecksumCRC32 }}'
      ChecksumCRC32C: '{{ item.ChecksumCRC32C }}'
      ChecksumCRC64NVME: '{{ item.ChecksumCRC64NVME }}'
      ChecksumSHA1: '{{ item.ChecksumSHA1 }}'
      ChecksumSHA256: '{{ item.ChecksumSHA256 }}'
      ETag: '{{ item.ETag }}'
      LastModified: '{{ item.LastModified }}'
      PartNumber: '{{ item.PartNumber }}'
      Size: '{{ item.Size }}'
- discovery_id: aws.s3.get_object_attributes
  for_each: aws.s3.list_buckets
  calls:
  - action: get_object_attributes
    save_as: response
    on_error: continue
    params:
      Bucket: '{{ item.tagSetKey }}'
  emit:
    as: item
    items_for: '{{ response.Checksum }}'
    item:
      ChecksumCRC32: '{{ item.ChecksumCRC32 }}'
      ChecksumCRC32C: '{{ item.ChecksumCRC32C }}'
      ChecksumCRC64NVME: '{{ item.ChecksumCRC64NVME }}'
      ChecksumSHA1: '{{ item.ChecksumSHA1 }}'
      ChecksumSHA256: '{{ item.ChecksumSHA256 }}'
      ChecksumType: '{{ item.ChecksumType }}'
- discovery_id: aws.s3.list_bucket_intelligent_tiering_configurations
  for_each: aws.s3.list_buckets
  calls:
  - action: list_bucket_intelligent_tiering_configurations
    save_as: response
    on_error: continue
    params:
      Bucket: '{{ item.Name }}'
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.IntelligentTieringConfigurationList }}'
    item:
      Filter: '{{ item.Filter }}'
      Id: '{{ item.Id }}'
      Status: '{{ item.Status }}'
      Tierings: '{{ item.Tierings }}'
- discovery_id: aws.s3.get_bucket_notification_configuration
  for_each: aws.s3.list_buckets
  calls:
  - action: get_bucket_notification_configuration
    save_as: response
    on_error: continue
    params:
      Bucket: '{{ item.Name }}'
  emit:
    as: item
    items_for: '{{ response.TopicConfigurations }}'
    item:
      Events: '{{ item.Events }}'
      Filter: '{{ item.Filter }}'
      Id: '{{ item.Id }}'
      TopicArn: '{{ item.TopicArn }}'
- discovery_id: aws.s3.list_bucket_analytics_configurations
  for_each: aws.s3.list_buckets
  calls:
  - action: list_bucket_analytics_configurations
    save_as: response
    on_error: continue
    params:
      Bucket: '{{ item.Name }}'
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.AnalyticsConfigurationList }}'
    item:
      Filter: '{{ item.Filter }}'
      Id: '{{ item.Id }}'
      StorageClassAnalysis: '{{ item.StorageClassAnalysis }}'
- discovery_id: aws.s3.get_object_tagging
  for_each: aws.s3.list_buckets
  calls:
  - action: get_object_tagging
    save_as: response
    on_error: continue
    params:
      Bucket: '{{ item.tagSetKey }}'
  emit:
    as: item
    items_for: '{{ response.TagSet }}'
    item:
      Key: '{{ item.Key }}'
      Value: '{{ item.Value }}'
- discovery_id: aws.s3.get_bucket_replication
  for_each: aws.s3.list_buckets
  calls:
  - action: get_bucket_replication
    save_as: response
    on_error: continue
    params:
      Bucket: '{{ item.Name }}'
  emit:
    as: item
    items_for: '{{ response.ReplicationConfiguration }}'
    item:
      Role: '{{ item.Role }}'
      Rules: '{{ item.Rules }}'
- discovery_id: aws.s3.get_bucket_policy
  for_each: aws.s3.list_buckets
  calls:
  - action: get_bucket_policy
    save_as: response
    on_error: continue
    params:
      Bucket: '{{ item.Name }}'
  emit:
    as: item
    items_for: '{{ response.Policy }}'
- discovery_id: aws.s3.get_bucket_policy_status
  for_each: aws.s3.list_buckets
  calls:
  - action: get_bucket_policy_status
    save_as: response
    on_error: continue
    params:
      Bucket: '{{ item.Name }}'
  emit:
    as: item
    items_for: '{{ response.PolicyStatus }}'
    item:
      IsPublic: '{{ item.IsPublic }}'
- discovery_id: aws.s3.get_bucket_request_payment
  for_each: aws.s3.list_buckets
  calls:
  - action: get_bucket_request_payment
    save_as: response
    on_error: continue
    params:
      Bucket: '{{ item.Name }}'
  emit:
    as: item
    items_for: '{{ response.Payer }}'
