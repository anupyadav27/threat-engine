version: '1.0'
provider: aws
service: account
services:
  client: account
  module: boto3.client
discovery:
- discovery_id: aws.account.get_contact_information
  calls:
  - action: get_contact_information
    save_as: response
  emit: {}
- discovery_id: aws.account.get_alternate_contact_security
  calls:
  - action: get_alternate_contact
    params:
      AlternateContactType: SECURITY
    save_as: response
    on_error: continue
  emit: {}
- discovery_id: aws.account.get_alternate_contact_billing
  calls:
  - action: get_alternate_contact
    params:
      AlternateContactType: BILLING
    save_as: response
    on_error: continue
  emit: {}
- discovery_id: aws.account.get_alternate_contact_operations
  calls:
  - action: get_alternate_contact
    params:
      AlternateContactType: OPERATIONS
    save_as: response
    on_error: continue
  emit: {}
checks:
- rule_id: aws.account.contact.current_details_configured
  for_each: aws.account.get_contact_information
  conditions:
    all:
    - var: item.AddressLine1
      op: exists
      value: null
    - var: item.PhoneNumber
      op: exists
      value: null
- rule_id: aws.account.contact.details_separate_security_billing_operations_configured
  for_each: aws.account.get_alternate_contact_security
  conditions:
    all:
    - var: item.AlternateContactType
      op: equals
      value: SECURITY
    - var: item.EmailAddress
      op: exists
      value: null
    - var: item.Name
      op: exists
      value: null
    - var: item.PhoneNumber
      op: exists
      value: null
- rule_id: aws.account.resource.security_contact_complete
  for_each: aws.account.get_contact_information
  conditions:
    all:
    - var: item.AddressLine1
      op: exists
      value: null
    - var: item.PhoneNumber
      op: exists
      value: null
    - var: item.FullName
      op: exists
      value: null
- rule_id: aws.account.resource.security_contact_configured
  for_each: aws.account.get_contact_information
  conditions:
    all:
    - var: item.AddressLine1
      op: exists
      value: null
    - var: item.PhoneNumber
      op: exists
      value: null
- rule_id: aws.account.security.contact_information_configured
  for_each: aws.account.get_contact_information
  conditions:
    all:
    - var: item.AddressLine1
      op: exists
      value: null
    - var: item.PhoneNumber
      op: exists
      value: null
