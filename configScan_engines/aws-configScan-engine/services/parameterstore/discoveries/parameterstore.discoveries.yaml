version: '1.0'
provider: aws
service: parameterstore
services:
  client: ssm
  module: boto3.client
discovery:
- discovery_id: aws.ssm.describe_parameters
  calls:
  - action: describe_parameters
    save_as: response
    params:
      MaxResults: 1000
  emit:
    items_for: '{{ response.Parameters }}'
    as: item
