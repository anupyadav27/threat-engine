version: '1.0'
provider: azure
service: alertsmanagement
services:
  client: alertsmanagement
  module: azure.mgmt.alertsmanagement
discovery:
- discovery_id: azure.alertsmanagement.alerts.get_summary
  calls:
  - action: get_summary
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.id }}'
- discovery_id: azure.alertsmanagement.smartgroups.get_all
  calls:
  - action: get_all
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
- discovery_id: azure.alertsmanagement.alerts.get_summary
  calls:
  - action: get_summary
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.id }}'
checks: []
