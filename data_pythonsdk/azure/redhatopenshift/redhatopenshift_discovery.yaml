version: '1.0'
provider: azure
service: redhatopenshift
services:
  client: redhatopenshift
  module: azure.mgmt.redhatopenshift
discovery:
- discovery_id: azure.redhatopenshift.openshiftclusters.list
  calls:
  - action: list
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
- discovery_id: azure.redhatopenshift.openshiftclusters.list_by_resource_group
  calls:
  - action: list_by_resource_group
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
- discovery_id: azure.redhatopenshift.openshiftversions.list
  calls:
  - action: list
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
- discovery_id: azure.redhatopenshift.machinepools.list
  calls:
  - action: list
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
checks: []
