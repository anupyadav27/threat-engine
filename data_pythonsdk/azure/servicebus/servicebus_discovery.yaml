version: '1.0'
provider: azure
service: servicebus
services:
  client: servicebus
  module: azure.mgmt.servicebus.v2022_10_01_preview
discovery:
- discovery_id: azure.servicebus.namespaces.list
  calls:
  - action: list
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
- discovery_id: azure.servicebus.namespaces.list_by_resource_group
  calls:
  - action: list_by_resource_group
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
- discovery_id: azure.servicebus.disasterrecoveryconfigs.list
  calls:
  - action: list
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
- discovery_id: azure.servicebus.namespaces.check_name_availability
  calls:
  - action: check_name_availability
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.message }}'
checks: []
