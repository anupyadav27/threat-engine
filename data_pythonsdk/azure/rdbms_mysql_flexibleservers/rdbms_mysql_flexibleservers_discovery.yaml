version: '1.0'
provider: azure
service: rdbms_mysql_flexibleservers
services:
  client: rdbms_mysql_flexibleservers
  module: azure.mgmt.rdbms.mysql_flexibleservers
discovery:
- discovery_id: azure.rdbms_mysql_flexibleservers.servers.list
  calls:
  - action: list
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
- discovery_id: azure.rdbms_mysql_flexibleservers.servers.list_by_resource_group
  calls:
  - action: list_by_resource_group
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
- discovery_id: azure.rdbms_mysql_flexibleservers.locationbasedcapabilities.list
  calls:
  - action: list
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
- discovery_id: azure.rdbms_mysql_flexibleservers.locationbasedcapabilities.list
  calls:
  - action: list
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
- discovery_id: azure.rdbms_mysql_flexibleservers.checknameavailabilitywithoutlocation.execute
  calls:
  - action: execute
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.message }}'
- discovery_id: azure.rdbms_mysql_flexibleservers.checkvirtualnetworksubnetusage.execute
  calls:
  - action: execute
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.location }}'
- discovery_id: azure.rdbms_mysql_flexibleservers.getprivatednszonesuffix.execute
  calls:
  - action: execute
    save_as: response
    on_error: continue
