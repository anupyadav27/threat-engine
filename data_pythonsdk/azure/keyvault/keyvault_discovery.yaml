version: '1.0'
provider: azure
service: keyvault
services:
  client: keyvault
  module: azure.mgmt.keyvault
discovery:
- discovery_id: azure.keyvault.mhsmprivateendpointconnections.list_by_resource
  calls:
  - action: list_by_resource
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
- discovery_id: azure.keyvault.keys.list
  calls:
  - action: list
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
- discovery_id: azure.keyvault.managedhsms.check_mhsm_name_availability
  calls:
  - action: check_mhsm_name_availability
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.name_available }}'
- discovery_id: azure.keyvault.managedhsmkeys.create_if_not_exist
  calls:
  - action: create_if_not_exist
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.properties }}'
checks: []
