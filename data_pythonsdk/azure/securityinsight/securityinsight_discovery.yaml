version: '1.0'
provider: azure
service: securityinsight
services:
  client: securityinsight
  module: azure.mgmt.securityinsight
discovery:
- discovery_id: azure.securityinsight.alertruletemplates.list
  calls:
  - action: list
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
checks: []
