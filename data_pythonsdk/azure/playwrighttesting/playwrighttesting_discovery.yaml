version: '1.0'
provider: azure
service: playwrighttesting
services:
  client: playwrighttesting
  module: azure.mgmt.playwrighttesting
discovery:
- discovery_id: azure.playwrighttesting.list
  calls:
  - action: list
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
- discovery_id: azure.playwrighttesting.list
  calls:
  - action: list
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
- discovery_id: azure.playwrighttesting.accounts.check_name_availability
  calls:
  - action: check_name_availability
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.name_available }}'
- discovery_id: azure.playwrighttesting.accountquotas.list_by_account
  calls:
  - action: list_by_account
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
checks: []
