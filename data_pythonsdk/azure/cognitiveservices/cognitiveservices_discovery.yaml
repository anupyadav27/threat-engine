version: '1.0'
provider: azure
service: cognitiveservices
services:
  client: cognitiveservices
  module: azure.mgmt.cognitiveservices
discovery:
- discovery_id: azure.cognitiveservices.accounts.list
  calls:
  - action: list
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
