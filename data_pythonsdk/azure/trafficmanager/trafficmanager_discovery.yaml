version: '1.0'
provider: azure
service: trafficmanager
services:
  client: trafficmanager
  module: azure.mgmt.trafficmanager
discovery:
- discovery_id: azure.trafficmanager.profiles.list_by_resource_group
  calls:
  - action: list_by_resource_group
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
- discovery_id: azure.trafficmanager.profiles.list_by_subscription
  calls:
  - action: list_by_subscription
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
- discovery_id: azure.trafficmanager.profiles.check_traffic_manager_relative_dns_name_availability
  calls:
  - action: check_traffic_manager_relative_dns_name_availability
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.name }}'
- discovery_id: azure.trafficmanager.geographichierarchies.get_default
  calls:
  - action: get_default
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.id }}'
- discovery_id: azure.trafficmanager.trafficmanagerusermetricskeys.create_or_update
  calls:
  - action: create_or_update
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.id }}'
- discovery_id: azure.trafficmanager.geographichierarchies.get_default
  calls:
  - action: get_default
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.id }}'
- discovery_id: azure.trafficmanager.trafficmanagerusermetricskeys.delete
  calls:
  - action: delete
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.operation_result }}'
checks: []
