version: '1.0'
provider: azure
service: automation
services:
  client: automation
  module: azure.mgmt.automation
discovery:
- discovery_id: azure.automation.automationaccount.list
  calls:
  - action: list
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
checks: []
