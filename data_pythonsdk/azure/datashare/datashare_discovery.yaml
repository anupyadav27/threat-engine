version: '1.0'
provider: azure
service: datashare
services:
  client: datashare
  module: azure.mgmt.datashare
discovery:
- discovery_id: azure.datashare.consumerinvitations.reject_invitation
  calls:
  - action: reject_invitation
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.id }}'
- discovery_id: azure.datashare.consumerinvitations.reject_invitation
  calls:
  - action: reject_invitation
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.id }}'
- discovery_id: azure.datashare.list
  calls:
  - action: list
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
checks: []
