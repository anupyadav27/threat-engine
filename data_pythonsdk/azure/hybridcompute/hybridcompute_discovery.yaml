version: '1.0'
provider: azure
service: hybridcompute
services:
  client: hybridcompute
  module: azure.mgmt.hybridcompute
discovery:
- discovery_id: azure.hybridcompute.machines.list_by_subscription
  calls:
  - action: list_by_subscription
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
- discovery_id: azure.hybridcompute.licenses.begin_validate_license
  calls:
  - action: begin_validate_license
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
- discovery_id: azure.hybridcompute.licenses.list_by_subscription
  calls:
  - action: list_by_subscription
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
- discovery_id: azure.hybridcompute.privatelinkscopes.list
  calls:
  - action: list
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
- discovery_id: azure.hybridcompute.extensionmetadata.list
  calls:
  - action: list
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
checks: []
