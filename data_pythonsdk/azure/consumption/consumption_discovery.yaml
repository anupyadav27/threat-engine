version: '1.0'
provider: azure
service: consumption
services:
  client: consumption
  module: azure.mgmt.consumption
discovery:
- discovery_id: azure.consumption.charges.list
  calls:
  - action: list
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
- discovery_id: azure.consumption.reservationrecommendations.list
  calls:
  - action: list
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
checks: []
