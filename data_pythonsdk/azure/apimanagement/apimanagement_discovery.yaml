version: '1.0'
provider: azure
service: apimanagement
services:
  client: apimanagement
  module: azure.mgmt.apimanagement
discovery:
- discovery_id: azure.apimanagement.apimanagementservice.list
  calls:
  - action: list
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
- discovery_id: azure.apimanagement.apigateway.list
  calls:
  - action: list
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
- discovery_id: azure.apimanagement.apigateway.list_by_resource_group
  calls:
  - action: list_by_resource_group
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
- discovery_id: azure.apimanagement.apimanagementskus.list
  calls:
  - action: list
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
- discovery_id: azure.apimanagement.deletedservices.list_by_subscription
  calls:
  - action: list_by_subscription
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
- discovery_id: azure.apimanagement.deletedservices.list_by_subscription
  calls:
  - action: list_by_subscription
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
- discovery_id: azure.apimanagement.apimanagement.list
  calls:
  - action: list
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
- discovery_id: azure.apimanagement.apimanagementservice.get_domain_ownership_identifier
  calls:
  - action: get_domain_ownership_identifier
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.domain_ownership_identifier }}'
checks: []
