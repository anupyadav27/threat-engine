version: '1.0'
provider: azure
service: notificationhubs
services:
  client: notificationhubs
  module: azure.mgmt.notificationhubs
discovery:
- discovery_id: azure.notificationhubs.namespaces.check_availability
  calls:
  - action: check_availability
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.id }}'
- discovery_id: azure.notificationhubs.namespaces.check_availability
  calls:
  - action: check_availability
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.id }}'
- discovery_id: azure.notificationhubs.namespaces.list_all
  calls:
  - action: list_all
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
checks: []
