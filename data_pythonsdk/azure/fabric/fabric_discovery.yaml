version: '1.0'
provider: azure
service: fabric
services:
  client: fabric
  module: azure.mgmt.fabric
discovery:
- discovery_id: azure.fabric.list
  calls:
  - action: list
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
- discovery_id: azure.fabric.list
  calls:
  - action: list
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
- discovery_id: azure.fabric.fabriccapacities.list_skus
  calls:
  - action: list_skus
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
- discovery_id: azure.fabric.fabriccapacities.list_by_subscription
  calls:
  - action: list_by_subscription
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
- discovery_id: azure.fabric.fabriccapacities.check_name_availability
  calls:
  - action: check_name_availability
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.name_available }}'
checks: []
