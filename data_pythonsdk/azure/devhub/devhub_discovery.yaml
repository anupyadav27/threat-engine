version: '1.0'
provider: azure
service: devhub
services:
  client: devhub
  module: azure.mgmt.devhub
discovery:
- discovery_id: azure.devhub.workflow.list
  calls:
  - action: list
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
- discovery_id: azure.devhub.workflow.list_by_resource_group
  calls:
  - action: list_by_resource_group
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
- discovery_id: azure.devhub.list
  calls:
  - action: list
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
- discovery_id: azure.devhub.devhubmgmtclientmixin.list_git_hub_o_auth
  calls:
  - action: list_git_hub_o_auth
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
- discovery_id: azure.devhub.devhubmgmtclientmixin.git_hub_o_auth_callback
  calls:
  - action: git_hub_o_auth_callback
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.id }}'
- discovery_id: azure.devhub.devhubmgmtclientmixin.git_hub_o_auth
  calls:
  - action: git_hub_o_auth
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.auth_url }}'
checks: []
