version: '1.0'
provider: azure
service: hanaonazure
services:
  client: hanaonazure
  module: azure.mgmt.hanaonazure
discovery:
- discovery_id: azure.hanaonazure.sapmonitors.list
  calls:
  - action: list
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
checks: []
