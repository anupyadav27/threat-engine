version: '1.0'
provider: azure
service: recoveryservicesbackup
services:
  client: recoveryservicesbackup
  module: azure.mgmt.recoveryservicesbackup
discovery:
- discovery_id: azure.recoveryservicesbackup.protectionintent.validate
  calls:
  - action: validate
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.status }}'
- discovery_id: azure.recoveryservicesbackup.backupengines.list
  calls:
  - action: list
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
- discovery_id: azure.recoveryservicesbackup.featuresupport.validate
  calls:
  - action: validate
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.support_status }}'
checks: []
