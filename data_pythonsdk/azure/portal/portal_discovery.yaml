version: '1.0'
provider: azure
service: portal
services:
  client: portal
  module: azure.mgmt.portal
discovery:
- discovery_id: azure.portal.tenantconfigurations.list
  calls:
  - action: list
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
checks: []
