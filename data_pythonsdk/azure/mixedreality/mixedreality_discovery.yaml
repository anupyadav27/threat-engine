version: '1.0'
provider: azure
service: mixedreality
services:
  client: mixedreality
  module: azure.mgmt.mixedreality
discovery:
- discovery_id: azure.mixedreality.list
  calls:
  - action: list
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
- discovery_id: azure.mixedreality.mixedrealityclientmixin.check_name_availability_local
  calls:
  - action: check_name_availability_local
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.name_available }}'
checks: []
