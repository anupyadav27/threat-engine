version: '1.0'
provider: azure
service: rdbms_mariadb
services:
  client: rdbms_mariadb
  module: azure.mgmt.rdbms.mariadb
discovery:
- discovery_id: azure.rdbms_mariadb.servers.list
  calls:
  - action: list
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
- discovery_id: azure.rdbms_mariadb.servers.list_by_resource_group
  calls:
  - action: list_by_resource_group
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
- discovery_id: azure.rdbms_mariadb.locationbasedperformancetier.list
  calls:
  - action: list
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
- discovery_id: azure.rdbms_mariadb.checknameavailability.execute
  calls:
  - action: execute
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.message }}'
checks: []
