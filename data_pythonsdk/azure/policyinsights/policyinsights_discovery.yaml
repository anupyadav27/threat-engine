version: '1.0'
provider: azure
service: policyinsights
services:
  client: policyinsights
  module: azure.mgmt.policyinsights
discovery:
- discovery_id: azure.policyinsights.policystates.summarize_for_policy_set_definition
  calls:
  - action: summarize_for_policy_set_definition
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
- discovery_id: azure.policyinsights.policyevents.list_query_results_for_resource
  calls:
  - action: list_query_results_for_resource
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
- discovery_id: azure.policyinsights.remediations.list_for_resource_group
  calls:
  - action: list_for_resource_group
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
- discovery_id: azure.policyinsights.list
  calls:
  - action: list
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
- discovery_id: azure.policyinsights.list
  calls:
  - action: list
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
- discovery_id: azure.policyinsights.policyrestrictions.check_at_subscription_scope
  calls:
  - action: check_at_subscription_scope
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.field_restrictions }}'
checks: []
