version: '1.0'
provider: azure
service: videoanalyzer
services:
  client: videoanalyzer
  module: azure.mgmt.videoanalyzer
discovery:
- discovery_id: azure.videoanalyzer.videoanalyzers.list_by_subscription
  calls:
  - action: list_by_subscription
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
- discovery_id: azure.videoanalyzer.videoanalyzers.list_by_subscription
  calls:
  - action: list_by_subscription
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
- discovery_id: azure.videoanalyzer.accesspolicies.list
  calls:
  - action: list
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
checks: []
