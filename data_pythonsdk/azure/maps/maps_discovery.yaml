version: '1.0'
provider: azure
service: maps
services:
  client: maps
  module: azure.mgmt.maps
discovery:
- discovery_id: azure.maps.accounts.list_by_resource_group
  calls:
  - action: list_by_resource_group
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
- discovery_id: azure.maps.accounts.list_by_subscription
  calls:
  - action: list_by_subscription
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
- discovery_id: azure.maps.maps.list_operations
  calls:
  - action: list_operations
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
checks: []
