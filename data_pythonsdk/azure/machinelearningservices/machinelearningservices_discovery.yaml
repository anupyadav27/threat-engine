version: '1.0'
provider: azure
service: machinelearningservices
services:
  client: machinelearningservices
  module: azure.mgmt.machinelearningservices
discovery:
- discovery_id: azure.machinelearningservices.quotas.update
  calls:
  - action: update
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
- discovery_id: azure.machinelearningservices.quotas.update
  calls:
  - action: update
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
- discovery_id: azure.machinelearningservices.quotas.list
  calls:
  - action: list
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
- discovery_id: azure.machinelearningservices.virtualmachinesizes.list
  calls:
  - action: list
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.aml_compute }}'
checks: []
