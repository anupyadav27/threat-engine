version: '1.0'
provider: azure
service: datadog
services:
  client: datadog
  module: azure.mgmt.datadog
discovery:
- discovery_id: azure.datadog.monitors.list_by_resource_group
  calls:
  - action: list_by_resource_group
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
- discovery_id: azure.datadog.monitors.list_by_resource_group
  calls:
  - action: list_by_resource_group
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
- discovery_id: azure.datadog.marketplaceagreements.list
  calls:
  - action: list
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
- discovery_id: azure.datadog.marketplaceagreements.create_or_update
  calls:
  - action: create_or_update
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.id }}'
- discovery_id: azure.datadog.creationsupported.list
  calls:
  - action: list
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
checks: []
