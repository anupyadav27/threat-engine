version: '1.0'
provider: azure
service: dns
services:
  client: dns
  module: azure.mgmt.dns
discovery:
- discovery_id: azure.dns.zones.list
  calls:
  - action: list
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
- discovery_id: azure.dns.zones.list_by_resource_group
  calls:
  - action: list_by_resource_group
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
- discovery_id: azure.dns.dnsresourcereference.get_by_target_resources
  calls:
  - action: get_by_target_resources
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.dns_resource_references }}'
checks: []
