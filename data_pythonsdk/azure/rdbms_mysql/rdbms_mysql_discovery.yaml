version: '1.0'
provider: azure
service: rdbms_mysql
services:
  client: rdbms_mysql
  module: azure.mgmt.rdbms.mysql
discovery:
- discovery_id: azure.rdbms_mysql.servers.list
  calls:
  - action: list
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
- discovery_id: azure.rdbms_mysql.servers.list_by_resource_group
  calls:
  - action: list_by_resource_group
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
- discovery_id: azure.rdbms_mysql.locationbasedperformancetier.list
  calls:
  - action: list
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
- discovery_id: azure.rdbms_mysql.checknameavailability.execute
  calls:
  - action: execute
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.message }}'
checks: []
