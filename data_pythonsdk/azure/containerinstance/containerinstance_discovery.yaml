version: '1.0'
provider: azure
service: containerinstance
services:
  client: containerinstance
  module: azure.mgmt.containerinstance
discovery:
- discovery_id: azure.containerinstance.containergroups.list
  calls:
  - action: list
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
- discovery_id: azure.containerinstance.containergroups.list_by_resource_group
  calls:
  - action: list_by_resource_group
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
- discovery_id: azure.containerinstance.location.list_capabilities
  calls:
  - action: list_capabilities
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
- discovery_id: azure.containerinstance.location.list_usage
  calls:
  - action: list_usage
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
- discovery_id: azure.containerinstance.location.list_usage
  calls:
  - action: list_usage
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
- discovery_id: azure.containerinstance.containergroups.list
  calls:
  - action: list
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
- discovery_id: azure.containerinstance.location.list_cached_images
  calls:
  - action: list_cached_images
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
checks: []
