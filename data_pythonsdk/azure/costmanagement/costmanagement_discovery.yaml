version: '1.0'
provider: azure
service: costmanagement
services:
  client: costmanagement
  module: azure.mgmt.costmanagement
discovery:
- discovery_id: azure.costmanagement.views.list
  calls:
  - action: list
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
- discovery_id: azure.costmanagement.scheduledactions.list
  calls:
  - action: list
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
- discovery_id: azure.costmanagement.alerts.list
  calls:
  - action: list
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
- discovery_id: azure.costmanagement.benefitrecommendations.list
  calls:
  - action: list
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
- discovery_id: azure.costmanagement.benefitutilizationsummaries.list_by_savings_plan_id
  calls:
  - action: list_by_savings_plan_id
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
- discovery_id: azure.costmanagement.benefitutilizationsummaries.list_by_savings_plan_order
  calls:
  - action: list_by_savings_plan_order
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
- discovery_id: azure.costmanagement.pricesheet.begin_download
  calls:
  - action: begin_download
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
- discovery_id: azure.costmanagement.scheduledactions.check_name_availability
  calls:
  - action: check_name_availability
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.name_available }}'
checks: []
