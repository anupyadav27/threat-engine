version: '1.0'
provider: azure
service: workloadmonitor
services:
  client: workloadmonitor
  module: azure.mgmt.workloadmonitor
discovery:
- discovery_id: azure.workloadmonitor.healthmonitors.list
  calls:
  - action: list
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
- discovery_id: azure.workloadmonitor.healthmonitors.list
  calls:
  - action: list
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
checks: []
