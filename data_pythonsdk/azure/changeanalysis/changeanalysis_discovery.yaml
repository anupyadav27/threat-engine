version: '1.0'
provider: azure
service: changeanalysis
services:
  client: changeanalysis
  module: azure.mgmt.changeanalysis
discovery:
- discovery_id: azure.changeanalysis.changes.list_changes_by_subscription
  calls:
  - action: list_changes_by_subscription
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
checks: []
