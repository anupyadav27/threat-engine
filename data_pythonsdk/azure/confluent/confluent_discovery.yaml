version: '1.0'
provider: azure
service: confluent
services:
  client: confluent
  module: azure.mgmt.confluent
discovery:
- discovery_id: azure.confluent.root.list_by_subscription
  calls:
  - action: root.list_by_subscription
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: azure.confluent.marketplaceagreements.list
  calls:
  - action: list
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
- discovery_id: azure.confluent.marketplaceagreements.list
  calls:
  - action: list
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
- discovery_id: azure.confluent.marketplaceagreements.create
  calls:
  - action: create
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.id }}'
- discovery_id: azure.confluent.organization.list
  calls:
  - action: list
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
checks: []
