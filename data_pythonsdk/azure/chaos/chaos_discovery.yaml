version: '1.0'
provider: azure
service: chaos
services:
  client: chaos
  module: azure.mgmt.chaos
discovery:
- discovery_id: azure.chaos.experiments.list
  calls:
  - action: list
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
- discovery_id: azure.chaos.experiments.list_all
  calls:
  - action: list_all
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
- discovery_id: azure.chaos.targettypes.list
  calls:
  - action: list
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
- discovery_id: azure.chaos.experiments.list_all
  calls:
  - action: list_all
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
checks: []
