version: '1.0'
provider: azure
service: managedservices
services:
  client: managedservices
  module: azure.mgmt.managedservices
discovery:
- discovery_id: azure.managedservices.registrationassignments.list
  calls:
  - action: list
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
- discovery_id: azure.managedservices.marketplaceregistrationdefinitions.list
  calls:
  - action: list
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
checks: []
