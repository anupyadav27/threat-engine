version: '1.0'
provider: azure
service: servicelinker
services:
  client: servicelinker
  module: azure.mgmt.servicelinker
discovery:
- discovery_id: azure.servicelinker.linker.list
  calls:
  - action: list
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
checks: []
