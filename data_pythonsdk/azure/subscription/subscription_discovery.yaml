version: '1.0'
provider: azure
service: subscription
services:
  client: subscription
  module: azure.mgmt.subscription
discovery:
- discovery_id: azure.subscription.subscriptions.list
  calls:
  - action: list
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
- discovery_id: azure.subscription.subscriptions.list_locations
  calls:
  - action: list_locations
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
- discovery_id: azure.subscription.subscription.accept_ownership_status
  calls:
  - action: accept_ownership_status
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.subscription_id }}'
- discovery_id: azure.subscription.alias.list
  calls:
  - action: list
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
- discovery_id: azure.subscription.subscriptionpolicy.list_policy_for_tenant
  calls:
  - action: list_policy_for_tenant
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
- discovery_id: azure.subscription.subscription.accept_ownership_status
  calls:
  - action: accept_ownership_status
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.subscription_id }}'
- discovery_id: azure.subscription.subscriptionpolicy.add_update_policy_for_tenant
  calls:
  - action: add_update_policy_for_tenant
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.id }}'
- discovery_id: azure.subscription.alias.list
  calls:
  - action: list
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
- discovery_id: azure.subscription.tenants.list
  calls:
  - action: list
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
checks: []
