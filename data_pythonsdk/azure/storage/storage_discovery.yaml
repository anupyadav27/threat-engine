version: '1.0'
provider: azure
service: storage
services:
  client: storage
  module: azure.mgmt.storage
discovery:
- discovery_id: azure.storage.storageaccounts.list_by_resource_group
  calls:
  - action: list_by_resource_group
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
