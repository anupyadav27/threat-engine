version: '1.0'
provider: azure
service: storageactions
services:
  client: storageactions
  module: azure.mgmt.storageactions
discovery:
- discovery_id: azure.storageactions.list
  calls:
  - action: list
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
- discovery_id: azure.storageactions.list
  calls:
  - action: list
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
- discovery_id: azure.storageactions.storagetasks.begin_update
  calls:
  - action: begin_update
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
- discovery_id: azure.storageactions.storagetaskassignment.list
  calls:
  - action: list
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
- discovery_id: azure.storageactions.storagetasks.preview_actions
  calls:
  - action: preview_actions
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.properties }}'
checks: []
