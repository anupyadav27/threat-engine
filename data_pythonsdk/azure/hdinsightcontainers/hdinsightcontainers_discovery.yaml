version: '1.0'
provider: azure
service: hdinsightcontainers
services:
  client: hdinsightcontainers
  module: azure.mgmt.hdinsightcontainers
discovery:
- discovery_id: azure.hdinsightcontainers.clusterpools.list_by_resource_group
  calls:
  - action: list_by_resource_group
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
- discovery_id: azure.hdinsightcontainers.clusterpools.list_by_subscription
  calls:
  - action: list_by_subscription
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
- discovery_id: azure.hdinsightcontainers.clusteravailableupgrades.list
  calls:
  - action: list
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
- discovery_id: azure.hdinsightcontainers.availableclusterpoolversions.list_by_location
  calls:
  - action: list_by_location
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
- discovery_id: azure.hdinsightcontainers.availableclusterversions.list_by_location
  calls:
  - action: list_by_location
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
- discovery_id: azure.hdinsightcontainers.locations.check_name_availability
  calls:
  - action: check_name_availability
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.name_available }}'
checks: []
