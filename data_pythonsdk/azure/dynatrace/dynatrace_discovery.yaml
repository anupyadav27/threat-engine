version: '1.0'
provider: azure
service: dynatrace
services:
  client: dynatrace
  module: azure.mgmt.dynatrace
discovery:
- discovery_id: azure.dynatrace.monitors.list_by_resource_group
  calls:
  - action: list_by_resource_group
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
- discovery_id: azure.dynatrace.monitors.list_by_subscription_id
  calls:
  - action: list_by_subscription_id
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
- discovery_id: azure.dynatrace.list
  calls:
  - action: list
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
- discovery_id: azure.dynatrace.monitors.get_marketplace_saa_s_resource_details
  calls:
  - action: get_marketplace_saa_s_resource_details
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.marketplace_saa_s_resource_id }}'
checks: []
