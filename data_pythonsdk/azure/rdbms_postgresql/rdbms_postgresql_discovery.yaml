version: '1.0'
provider: azure
service: rdbms_postgresql
services:
  client: rdbms_postgresql
  module: azure.mgmt.rdbms.postgresql
discovery:
- discovery_id: azure.rdbms_postgresql.servers.list
  calls:
  - action: list
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
- discovery_id: azure.rdbms_postgresql.servers.list_by_resource_group
  calls:
  - action: list_by_resource_group
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
- discovery_id: azure.rdbms_postgresql.locationbasedperformancetier.list
  calls:
  - action: list
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
- discovery_id: azure.rdbms_postgresql.locationbasedperformancetier.list
  calls:
  - action: list
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
- discovery_id: azure.rdbms_postgresql.checknameavailability.execute
  calls:
  - action: execute
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.message }}'
checks: []
