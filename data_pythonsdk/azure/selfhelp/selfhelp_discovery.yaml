version: '1.0'
provider: azure
service: selfhelp
services:
  client: selfhelp
  module: azure.mgmt.selfhelp
discovery:
- discovery_id: azure.selfhelp.discoverysolution.list
  calls:
  - action: list
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
- discovery_id: azure.selfhelp.discoverysolution.list
  calls:
  - action: list
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
- discovery_id: azure.selfhelp.discoverysolution.list
  calls:
  - action: list
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
- discovery_id: azure.selfhelp.diagnostics.check_name_availability
  calls:
  - action: check_name_availability
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.name_available }}'
checks: []
