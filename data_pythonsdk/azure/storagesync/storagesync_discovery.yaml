version: '1.0'
provider: azure
service: storagesync
services:
  client: storagesync
  module: azure.mgmt.storagesync
discovery:
- discovery_id: azure.storagesync.list
  calls:
  - action: list
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
- discovery_id: azure.storagesync.storagesyncservices.check_name_availability
  calls:
  - action: check_name_availability
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.name_available }}'
checks: []
