version: '1.0'
provider: azure
service: digitaltwins
services:
  client: digitaltwins
  module: azure.mgmt.digitaltwins
discovery:
- discovery_id: azure.digitaltwins.digitaltwins.list
  calls:
  - action: list
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
- discovery_id: azure.digitaltwins.digitaltwins.list_by_resource_group
  calls:
  - action: list_by_resource_group
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
- discovery_id: azure.digitaltwins.digitaltwinsendpoint.list
  calls:
  - action: list
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
- discovery_id: azure.digitaltwins.digitaltwins.check_name_availability
  calls:
  - action: check_name_availability
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.name_available }}'
checks: []
