version: '1.0'
provider: azure
service: education
services:
  client: education
  module: azure.mgmt.education
discovery:
- discovery_id: azure.education.studentlabs.list_all
  calls:
  - action: list_all
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
- discovery_id: azure.education.grants.list_all
  calls:
  - action: list_all
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
- discovery_id: azure.education.grants.list_all
  calls:
  - action: list_all
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
- discovery_id: azure.education.grants.list
  calls:
  - action: list
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
checks: []
