version: '1.0'
provider: azure
service: privatedns
services:
  client: privatedns
  module: azure.mgmt.privatedns
discovery:
- discovery_id: azure.privatedns.privatezones.list
  calls:
  - action: list
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
- discovery_id: azure.privatedns.privatezones.list_by_resource_group
  calls:
  - action: list_by_resource_group
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
checks: []
