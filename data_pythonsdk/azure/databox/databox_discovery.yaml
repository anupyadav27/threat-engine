version: '1.0'
provider: azure
service: databox
services:
  client: databox
  module: azure.mgmt.databox
discovery:
- discovery_id: azure.databox.jobs.list
  calls:
  - action: list
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
- discovery_id: azure.databox.jobs.list_by_resource_group
  calls:
  - action: list_by_resource_group
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
- discovery_id: azure.databox.service.list_available_skus_by_resource_group
  calls:
  - action: list_available_skus_by_resource_group
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
- discovery_id: azure.databox.jobs.list
  calls:
  - action: list
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
- discovery_id: azure.databox.service.region_configuration
  calls:
  - action: region_configuration
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.schedule_availability_response }}'
- discovery_id: azure.databox.service.validate_address
  calls:
  - action: validate_address
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.validation_type }}'
- discovery_id: azure.databox.service.validate_inputs_by_resource_group
  calls:
  - action: validate_inputs_by_resource_group
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.status }}'
checks: []
