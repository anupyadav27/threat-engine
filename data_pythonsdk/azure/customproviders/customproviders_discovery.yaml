version: '1.0'
provider: azure
service: customproviders
services:
  client: customproviders
  module: azure.mgmt.customproviders
discovery:
- discovery_id: azure.customproviders.customresourceprovider.list_by_resource_group
  calls:
  - action: list_by_resource_group
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
checks: []
