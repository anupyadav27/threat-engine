version: '1.0'
provider: azure
service: vmwarecloudsimple
services:
  client: vmwarecloudsimple
  module: azure.mgmt.vmwarecloudsimple
discovery:
- discovery_id: azure.vmwarecloudsimple.dedicatedcloudnodes.list_by_resource_group
  calls:
  - action: list_by_resource_group
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
- discovery_id: azure.vmwarecloudsimple.virtualmachines.list_by_subscription
  calls:
  - action: list_by_subscription
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
- discovery_id: azure.vmwarecloudsimple.dedicatedcloudnodes.list_by_subscription
  calls:
  - action: list_by_subscription
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
- discovery_id: azure.vmwarecloudsimple.dedicatedcloudservices.list_by_subscription
  calls:
  - action: list_by_subscription
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
- discovery_id: azure.vmwarecloudsimple.customizationpolicies.list
  calls:
  - action: list
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
checks: []
