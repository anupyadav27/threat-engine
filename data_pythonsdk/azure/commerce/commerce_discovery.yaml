version: '1.0'
provider: azure
service: commerce
services:
  client: commerce
  module: azure.mgmt.commerce
discovery:
- discovery_id: azure.commerce.usageaggregates.list
  calls:
  - action: list
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
checks: []
