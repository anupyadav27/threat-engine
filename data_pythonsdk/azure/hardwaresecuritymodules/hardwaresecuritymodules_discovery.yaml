version: '1.0'
provider: azure
service: hardwaresecuritymodules
services:
  client: hardwaresecuritymodules
  module: azure.mgmt.hardwaresecuritymodules
discovery:
- discovery_id: azure.hardwaresecuritymodules.list
  calls:
  - action: list
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
- discovery_id: azure.hardwaresecuritymodules.list
  calls:
  - action: list
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
- discovery_id: azure.hardwaresecuritymodules.dedicatedhsm.begin_create_or_update
  calls:
  - action: begin_create_or_update
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
- discovery_id: azure.hardwaresecuritymodules.cloudhsmclusters.list_by_subscription
  calls:
  - action: list_by_subscription
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
- discovery_id: azure.hardwaresecuritymodules.dedicatedhsm.list_outbound_network_dependencies_endpoints
  calls:
  - action: list_outbound_network_dependencies_endpoints
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
- discovery_id: azure.hardwaresecuritymodules.privateendpointconnections.list_by_cloud_hsm_cluster
  calls:
  - action: list_by_cloud_hsm_cluster
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
checks: []
