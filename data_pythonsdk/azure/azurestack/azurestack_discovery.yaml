version: '1.0'
provider: azure
service: azurestack
services:
  client: azurestack
  module: azure.mgmt.azurestack
discovery:
- discovery_id: azure.azurestack.cloudmanifestfile.list
  calls:
  - action: list
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.id }}'
- discovery_id: azure.azurestack.cloudmanifestfile.list
  calls:
  - action: list
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.id }}'
- discovery_id: azure.azurestack.linkedsubscriptions.list_by_subscription
  calls:
  - action: list_by_subscription
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
checks: []
