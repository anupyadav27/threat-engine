version: '1.0'
provider: azure
service: authorization
services:
  client: authorization
  module: azure.mgmt.authorization.v2018_01_01_preview
discovery:
- discovery_id: azure.authorization.roleassignments.list
  calls:
  - action: list
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
- discovery_id: azure.authorization.providermetadata.list
  calls:
  - action: list
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
- discovery_id: azure.authorization.permissions.list_for_resource
  calls:
  - action: list_for_resource
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
checks: []
