version: '1.0'
provider: azure
service: servicenetworking
services:
  client: servicenetworking
  module: azure.mgmt.servicenetworking
discovery:
- discovery_id: azure.servicenetworking.list
  calls:
  - action: list
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
- discovery_id: azure.servicenetworking.list
  calls:
  - action: list
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
- discovery_id: azure.servicenetworking.frontendsinterface.begin_create_or_update
  calls:
  - action: begin_create_or_update
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
checks: []
