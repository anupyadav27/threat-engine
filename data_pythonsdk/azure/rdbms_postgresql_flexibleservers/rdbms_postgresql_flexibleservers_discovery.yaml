version: '1.0'
provider: azure
service: rdbms_postgresql_flexibleservers
services:
  client: rdbms_postgresql_flexibleservers
  module: azure.mgmt.rdbms.postgresql_flexibleservers
discovery:
- discovery_id: azure.rdbms_postgresql_flexibleservers.servers.list
  calls:
  - action: list
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
- discovery_id: azure.rdbms_postgresql_flexibleservers.servers.list_by_resource_group
  calls:
  - action: list_by_resource_group
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
- discovery_id: azure.rdbms_postgresql_flexibleservers.locationbasedcapabilities.execute
  calls:
  - action: execute
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
- discovery_id: azure.rdbms_postgresql_flexibleservers.list
  calls:
  - action: list
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
- discovery_id: azure.rdbms_postgresql_flexibleservers.checknameavailability.execute
  calls:
  - action: execute
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.message }}'
- discovery_id: azure.rdbms_postgresql_flexibleservers.virtualnetworksubnetusage.execute
  calls:
  - action: execute
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.location }}'
checks: []
