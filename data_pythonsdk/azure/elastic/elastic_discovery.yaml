version: '1.0'
provider: azure
service: elastic
services:
  client: elastic
  module: azure.mgmt.elastic
discovery:
- discovery_id: azure.elastic.monitors.list_by_resource_group
  calls:
  - action: list_by_resource_group
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
- discovery_id: azure.elastic.monitors.list_by_resource_group
  calls:
  - action: list_by_resource_group
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
- discovery_id: azure.elastic.alltrafficfilters.list
  calls:
  - action: list
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.rulesets }}'
- discovery_id: azure.elastic.organizations.get_api_key
  calls:
  - action: get_api_key
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.properties }}'
checks: []
