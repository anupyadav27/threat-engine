version: '1.0'
provider: azure
service: botservice
services:
  client: botservice
  module: azure.mgmt.botservice
discovery:
- discovery_id: azure.botservice.bots.list_by_resource_group
  calls:
  - action: list_by_resource_group
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
- discovery_id: azure.botservice.bots.list_by_resource_group
  calls:
  - action: list_by_resource_group
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
- discovery_id: azure.botservice.bots.list
  calls:
  - action: list
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
- discovery_id: azure.botservice.bots.get_check_name_availability
  calls:
  - action: get_check_name_availability
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.valid }}'
checks: []
