version: '1.0'
provider: azure
service: mobilenetwork
services:
  client: mobilenetwork
  module: azure.mgmt.mobilenetwork
discovery:
- discovery_id: azure.mobilenetwork.mobilenetworks.list_by_resource_group
  calls:
  - action: list_by_resource_group
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
- discovery_id: azure.mobilenetwork.packetcorecontrolplanes.list_by_subscription
  calls:
  - action: list_by_subscription
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
- discovery_id: azure.mobilenetwork.mobilenetworks.list_by_subscription
  calls:
  - action: list_by_subscription
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
- discovery_id: azure.mobilenetwork.simgroups.list_by_subscription
  calls:
  - action: list_by_subscription
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
- discovery_id: azure.mobilenetwork.packetcorecontrolplaneversions.list
  calls:
  - action: list
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
- discovery_id: azure.mobilenetwork.list
  calls:
  - action: list
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
checks: []
