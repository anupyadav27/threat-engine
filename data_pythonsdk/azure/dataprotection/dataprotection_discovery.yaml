version: '1.0'
provider: azure
service: dataprotection
services:
  client: dataprotection
  module: azure.mgmt.dataprotection
discovery:
- discovery_id: azure.dataprotection.dataprotection.list
  calls:
  - action: list
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
- discovery_id: azure.dataprotection.backupvaults.get_in_subscription
  calls:
  - action: get_in_subscription
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
- discovery_id: azure.dataprotection.backupinstances.begin_trigger_cross_region_restore
  calls:
  - action: begin_trigger_cross_region_restore
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
- discovery_id: azure.dataprotection.backupinstances.list
  calls:
  - action: list
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
- discovery_id: azure.dataprotection.backupvaults.check_name_availability
  calls:
  - action: check_name_availability
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.message }}'
- discovery_id: azure.dataprotection.backupinstances.get_backup_instance_operation_result
  calls:
  - action: get_backup_instance_operation_result
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.properties }}'
- discovery_id: azure.dataprotection.dppresourceguardproxy.unlock_delete
  calls:
  - action: unlock_delete
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.unlock_delete_expiry_time }}'
- discovery_id: azure.dataprotection.root.check_feature_support
  calls:
  - action: root.check_feature_support
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
checks: []
