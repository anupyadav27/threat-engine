version: '1.0'
provider: azure
service: iotcentral
services:
  client: iotcentral
  module: azure.mgmt.iotcentral
discovery:
- discovery_id: azure.iotcentral.apps.list_by_subscription
  calls:
  - action: list_by_subscription
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
- discovery_id: azure.iotcentral.apps.check_name_availability
  calls:
  - action: check_name_availability
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.name_available }}'
checks: []
