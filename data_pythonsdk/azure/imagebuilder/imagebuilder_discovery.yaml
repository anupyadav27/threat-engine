version: '1.0'
provider: azure
service: imagebuilder
services:
  client: imagebuilder
  module: azure.mgmt.imagebuilder
discovery:
- discovery_id: azure.imagebuilder.virtualmachineimagetemplates.list
  calls:
  - action: list
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
- discovery_id: azure.imagebuilder.virtualmachineimagetemplates.list_by_resource_group
  calls:
  - action: list_by_resource_group
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
- discovery_id: azure.imagebuilder.list
  calls:
  - action: list
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
checks: []
