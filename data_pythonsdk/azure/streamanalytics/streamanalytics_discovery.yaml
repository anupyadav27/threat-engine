version: '1.0'
provider: azure
service: streamanalytics
services:
  client: streamanalytics
  module: azure.mgmt.streamanalytics
discovery:
- discovery_id: azure.streamanalytics.subscriptions.list_quotas
  calls:
  - action: list_quotas
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
- discovery_id: azure.streamanalytics.subscriptions.list_quotas
  calls:
  - action: list_quotas
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
- discovery_id: azure.streamanalytics.clusters.list_by_subscription
  calls:
  - action: list_by_subscription
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
checks: []
