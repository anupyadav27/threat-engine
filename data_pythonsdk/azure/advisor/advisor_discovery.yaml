version: '1.0'
provider: azure
service: advisor
services:
  client: advisor
  module: azure.mgmt.advisor
discovery:
- discovery_id: azure.advisor.configurations.list_by_subscription
  calls:
  - action: list_by_subscription
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
checks: []
