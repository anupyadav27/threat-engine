version: '1.0'
provider: azure
service: resourcehealth
services:
  client: resourcehealth
  module: azure.mgmt.resourcehealth
discovery:
- discovery_id: azure.resourcehealth.events.list_by_single_resource
  calls:
  - action: list_by_single_resource
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
- discovery_id: azure.resourcehealth.events.list_by_tenant_id
  calls:
  - action: list_by_tenant_id
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
- discovery_id: azure.resourcehealth.metadata.list
  calls:
  - action: list
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
- discovery_id: azure.resourcehealth.emergingissues.list
  calls:
  - action: list
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
- discovery_id: azure.resourcehealth.availabilitystatuses.list_by_subscription_id
  calls:
  - action: list_by_subscription_id
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
- discovery_id: azure.resourcehealth.childresources.list
  calls:
  - action: list
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
- discovery_id: azure.resourcehealth.childavailabilitystatuses.list
  calls:
  - action: list
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
- discovery_id: azure.resourcehealth.availabilitystatuses.get_by_resource
  calls:
  - action: get_by_resource
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.id }}'
- discovery_id: azure.resourcehealth.availabilitystatuses.list
  calls:
  - action: list
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
checks: []
