version: '1.0'
provider: azure
service: storagemover
services:
  client: storagemover
  module: azure.mgmt.storagemover
discovery:
- discovery_id: azure.storagemover.agents.list
  calls:
  - action: list
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
- discovery_id: azure.storagemover.endpoints.list
  calls:
  - action: list
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
- discovery_id: azure.storagemover.endpoints.create_or_update
  calls:
  - action: create_or_update
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.properties }}'
- discovery_id: azure.storagemover.jobdefinitions.start_job
  calls:
  - action: start_job
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.job_run_resource_id }}'
checks: []
