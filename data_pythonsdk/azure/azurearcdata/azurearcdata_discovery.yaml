version: '1.0'
provider: azure
service: azurearcdata
services:
  client: azurearcdata
  module: azure.mgmt.azurearcdata
discovery:
- discovery_id: azure.azurearcdata.datacontrollers.list_in_subscription
  calls:
  - action: list_in_subscription
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
checks: []
