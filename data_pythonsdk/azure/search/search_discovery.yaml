version: '1.0'
provider: azure
service: search
services:
  client: search
  module: azure.mgmt.search
discovery:
- discovery_id: azure.search.services.list_by_subscription
  calls:
  - action: list_by_subscription
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
- discovery_id: azure.search.services.list_by_subscription
  calls:
  - action: list_by_subscription
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
- discovery_id: azure.search.usages.list_by_subscription
  calls:
  - action: list_by_subscription
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
- discovery_id: azure.search.list
  calls:
  - action: list
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
checks: []
