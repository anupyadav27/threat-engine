version: '1.0'
provider: azure
service: relay
services:
  client: relay
  module: azure.mgmt.relay
discovery:
- discovery_id: azure.relay.namespaces.list
  calls:
  - action: list
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
- discovery_id: azure.relay.namespaces.check_name_availability
  calls:
  - action: check_name_availability
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.message }}'
checks: []
