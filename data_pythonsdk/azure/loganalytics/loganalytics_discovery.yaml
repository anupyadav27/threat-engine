version: '1.0'
provider: azure
service: loganalytics
services:
  client: loganalytics
  module: azure.mgmt.loganalytics
discovery:
- discovery_id: azure.loganalytics.deletedworkspaces.list
  calls:
  - action: list
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
- discovery_id: azure.loganalytics.workspaces.list_by_resource_group
  calls:
  - action: list_by_resource_group
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
- discovery_id: azure.loganalytics.clusters.list
  calls:
  - action: list
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
- discovery_id: azure.loganalytics.clusters.list
  calls:
  - action: list
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
- discovery_id: azure.loganalytics.querypacks.list
  calls:
  - action: list
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
- discovery_id: azure.loganalytics.querypacks.create_or_update_without_name
  calls:
  - action: create_or_update_without_name
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.id }}'
- discovery_id: azure.loganalytics.clusters.list
  calls:
  - action: list
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
checks: []
