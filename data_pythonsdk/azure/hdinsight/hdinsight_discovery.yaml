version: '1.0'
provider: azure
service: hdinsight
services:
  client: hdinsight
  module: azure.mgmt.hdinsight
discovery:
- discovery_id: azure.hdinsight.locations.list_billing_specs
  calls:
  - action: list_billing_specs
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.vm_sizes }}'
- discovery_id: azure.hdinsight.locations.list_usages
  calls:
  - action: list_usages
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
- discovery_id: azure.hdinsight.locations.list_usages
  calls:
  - action: list_usages
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
- discovery_id: azure.hdinsight.clusters.list
  calls:
  - action: list
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
- discovery_id: azure.hdinsight.locations.get_capabilities
  calls:
  - action: get_capabilities
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.versions }}'
- discovery_id: azure.hdinsight.locations.get_azure_async_operation_status
  calls:
  - action: get_azure_async_operation_status
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.status }}'
checks: []
