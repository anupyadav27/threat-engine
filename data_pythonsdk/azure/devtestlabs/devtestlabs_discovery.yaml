version: '1.0'
provider: azure
service: devtestlabs
services:
  client: devtestlabs
  module: azure.mgmt.devtestlabs
discovery:
- discovery_id: azure.devtestlabs.globalschedules.list_by_subscription
  calls:
  - action: list_by_subscription
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
checks: []
