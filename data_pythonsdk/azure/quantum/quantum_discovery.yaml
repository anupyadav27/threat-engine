version: '1.0'
provider: azure
service: quantum
services:
  client: quantum
  module: azure.mgmt.quantum
discovery:
- discovery_id: azure.quantum.workspaces.list_by_subscription
  calls:
  - action: list_by_subscription
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
- discovery_id: azure.quantum.workspaces.list_by_subscription
  calls:
  - action: list_by_subscription
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
- discovery_id: azure.quantum.offerings.list
  calls:
  - action: list
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
checks: []
