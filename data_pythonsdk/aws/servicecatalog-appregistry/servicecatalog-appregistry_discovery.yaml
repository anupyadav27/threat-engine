version: '1.0'
provider: aws
service: servicecatalog-appregistry
services:
  client: servicecatalog-appregistry
  module: boto3.client
discovery:
- discovery_id: aws.servicecatalog-appregistry.list_attribute_groups
  calls:
  - action: list_attribute_groups
    save_as: response
    on_error: continue
    params:
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.attributeGroups }}'
- discovery_id: aws.servicecatalog-appregistry.get_configuration
  calls:
  - action: get_configuration
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.configuration }}'
- discovery_id: aws.servicecatalog-appregistry.get_application
  for_each: aws.servicecatalog-appregistry.list_attribute_groups
  calls:
  - action: get_application
    save_as: response
    on_error: continue
    params:
      application: '{{ item.applicationId }}'
  emit:
    as: item
    items_for: '{{ response.integrations }}'
- discovery_id: aws.servicecatalog-appregistry.list_associated_resources
  for_each: aws.servicecatalog-appregistry.list_attribute_groups
  calls:
  - action: list_associated_resources
    save_as: response
    on_error: continue
    params:
      application: '{{ item.applicationId }}'
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.resources }}'
checks: []
