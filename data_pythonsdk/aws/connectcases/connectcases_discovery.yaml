version: '1.0'
provider: aws
service: connectcases
services:
  client: connectcases
  module: boto3.client
discovery:
- discovery_id: aws.connectcases.list_domains
  calls:
  - action: list_domains
    save_as: response
    on_error: continue
    params:
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.domains }}'
- discovery_id: aws.connectcases.get_template
  for_each: aws.connectcases.list_domains
  calls:
  - action: get_template
    save_as: response
    on_error: continue
    params:
      domainId: '{{ item.domainDomainId }}'
  emit:
    as: item
    items_for: '{{ response.requiredFields }}'
- discovery_id: aws.connectcases.get_case_audit_events
  for_each: aws.connectcases.list_domains
  calls:
  - action: get_case_audit_events
    save_as: response
    on_error: continue
    params:
      caseId: '{{ item.domainDomainId }}'
  emit:
    as: item
    items_for: '{{ response.auditEvents }}'
- discovery_id: aws.connectcases.list_case_rules
  for_each: aws.connectcases.list_domains
  calls:
  - action: list_case_rules
    save_as: response
    on_error: continue
    params:
      domainId: '{{ item.domainDomainId }}'
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.caseRules }}'
- discovery_id: aws.connectcases.get_case_event_configuration
  for_each: aws.connectcases.list_domains
  calls:
  - action: get_case_event_configuration
    save_as: response
    on_error: continue
    params:
      domainId: '{{ item.domainDomainId }}'
  emit:
    as: item
    items_for: '{{ response.eventBridge }}'
- discovery_id: aws.connectcases.list_fields
  for_each: aws.connectcases.list_domains
  calls:
  - action: list_fields
    save_as: response
    on_error: continue
    params:
      domainId: '{{ item.domainDomainId }}'
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.fields }}'
- discovery_id: aws.connectcases.list_layouts
  for_each: aws.connectcases.list_domains
  calls:
  - action: list_layouts
    save_as: response
    on_error: continue
    params:
      domainId: '{{ item.domainDomainId }}'
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.layouts }}'
- discovery_id: aws.connectcases.get_case
  for_each: aws.connectcases.list_domains
  calls:
  - action: get_case
    save_as: response
    on_error: continue
    params:
      caseId: '{{ item.domainDomainId }}'
  emit:
    as: item
    items_for: '{{ response.fields }}'
- discovery_id: aws.connectcases.list_field_options
  for_each: aws.connectcases.list_domains
  calls:
  - action: list_field_options
    save_as: response
    on_error: continue
    params:
      domainId: '{{ item.domainDomainId }}'
      fieldId: '{{ item.fieldId }}'
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.options }}'
- discovery_id: aws.connectcases.get_layout
  for_each: aws.connectcases.list_domains
  calls:
  - action: get_layout
    save_as: response
    on_error: continue
    params:
      domainId: '{{ item.layoutLayoutId }}'
  emit:
    as: item
    items_for: '{{ response.content }}'
- discovery_id: aws.connectcases.get_domain
  for_each: aws.connectcases.list_domains
  calls:
  - action: get_domain
    save_as: response
    on_error: continue
    params:
      domainId: '{{ item.domainDomainId }}'
  emit:
    as: item
    items_for: '{{ response.domainId }}'
checks: []
