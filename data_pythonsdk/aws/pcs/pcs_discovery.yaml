version: '1.0'
provider: aws
service: pcs
services:
  client: pcs
  module: boto3.client
discovery:
- discovery_id: aws.pcs.list_clusters
  calls:
  - action: list_clusters
    save_as: response
    on_error: continue
    params:
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.clusters }}'
- discovery_id: aws.pcs.get_compute_node_group
  calls:
  - action: get_compute_node_group
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.computeNodeGroup }}'
- discovery_id: aws.pcs.get_cluster
  calls:
  - action: get_cluster
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.cluster }}'
- discovery_id: aws.pcs.get_queue
  calls:
  - action: get_queue
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.queue }}'
checks: []
