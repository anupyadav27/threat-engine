version: '1.0'
provider: aws
service: s3vectors
services:
  client: s3vectors
  module: boto3.client
discovery:
- discovery_id: aws.s3vectors.get_index
  calls:
  - action: get_index
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.index }}'
- discovery_id: aws.s3vectors.get_vector_bucket
  calls:
  - action: get_vector_bucket
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.vectorBucket }}'
- discovery_id: aws.s3vectors.list_vectors
  calls:
  - action: list_vectors
    save_as: response
    on_error: continue
    params:
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.vectors }}'
- discovery_id: aws.s3vectors.get_vector_bucket_policy
  calls:
  - action: get_vector_bucket_policy
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.policy }}'
checks: []
