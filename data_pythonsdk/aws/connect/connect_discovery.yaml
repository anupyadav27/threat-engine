version: '1.0'
provider: aws
service: connect
services:
  client: connect
  module: boto3.client
discovery:
- discovery_id: aws.connect.list_instances
  calls:
  - action: list_instances
    save_as: response
    on_error: continue
    params:
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.InstanceSummaryList }}'
- discovery_id: aws.connect.list_phone_numbers_v2
  calls:
  - action: list_phone_numbers_v2
    save_as: response
    on_error: continue
    params:
      MaxResults: 1000
  emit:
