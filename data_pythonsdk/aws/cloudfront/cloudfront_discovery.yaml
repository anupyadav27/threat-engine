version: '1.0'
provider: aws
service: cloudfront
services:
  client: cloudfront
  module: boto3.client
discovery:
- discovery_id: aws.cloudfront.list_distribution_tenants_by_customization
  calls:
  - action: list_distribution_tenants_by_customization
    save_as: response
    on_error: continue
    params:
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.DistributionTenantList }}'
- discovery_id: aws.cloudfront.list_connection_groups
  calls:
  - action: list_connection_groups
    save_as: response
    on_error: continue
