version: '1.0'
provider: aws
service: chime-sdk-messaging
services:
  client: chime-sdk-messaging
  module: boto3.client
discovery:
- discovery_id: aws.chime-sdk-messaging.get_messaging_session_endpoint
  calls:
  - action: get_messaging_session_endpoint
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.Endpoint }}'
- discovery_id: aws.chime-sdk-messaging.list_channel_messages
  calls:
  - action: list_channel_messages
    save_as: response
    on_error: continue
    params:
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.ChannelMessages }}'
- discovery_id: aws.chime-sdk-messaging.describe_channel
  calls:
  - action: describe_channel
    save_as: response
    on_error: continue
    params:
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.Channel }}'
- discovery_id: aws.chime-sdk-messaging.get_channel_message_status
  for_each: aws.chime-sdk-messaging.list_channel_messages
  calls:
  - action: get_channel_message_status
    save_as: response
    on_error: continue
    params:
      ChannelArn: '{{ item.channelMessageMessageId }}'
  emit:
    as: item
    items_for: '{{ response.Status }}'
- discovery_id: aws.chime-sdk-messaging.describe_channel_membership_for_app_instance_user
  calls:
  - action: describe_channel_membership_for_app_instance_user
    save_as: response
    on_error: continue
    params:
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.ChannelMembership }}'
- discovery_id: aws.chime-sdk-messaging.get_messaging_streaming_configurations
  calls:
  - action: get_messaging_streaming_configurations
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.StreamingConfigurations }}'
- discovery_id: aws.chime-sdk-messaging.get_channel_message
  for_each: aws.chime-sdk-messaging.list_channel_messages
  calls:
  - action: get_channel_message
    save_as: response
    on_error: continue
    params:
      ChannelArn: '{{ item.channelMessageMessageId }}'
  emit:
    as: item
    items_for: '{{ response.ChannelMessage }}'
- discovery_id: aws.chime-sdk-messaging.describe_channel_flow
  for_each: aws.chime-sdk-messaging.describe_channel
  calls:
  - action: describe_channel_flow
    save_as: response
    on_error: continue
    params:
      ChannelFlowArn: '{{ item.channelChannelFlowArn }}'
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.ChannelFlow }}'
- discovery_id: aws.chime-sdk-messaging.describe_channel_moderator
  calls:
  - action: describe_channel_moderator
    save_as: response
    on_error: continue
    params:
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.ChannelModerator }}'
- discovery_id: aws.chime-sdk-messaging.list_tags_for_resource
  for_each: aws.chime-sdk-messaging.get_messaging_streaming_configurations
  calls:
  - action: list_tags_for_resource
    save_as: response
    on_error: continue
    params:
      ResourceARN: '{{ item.streamingConfigurationResourceArn }}'
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.Tags }}'
- discovery_id: aws.chime-sdk-messaging.list_sub_channels
  calls:
  - action: list_sub_channels
    save_as: response
    on_error: continue
    params:
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.SubChannels }}'
- discovery_id: aws.chime-sdk-messaging.list_channel_memberships
  calls:
  - action: list_channel_memberships
    save_as: response
    on_error: continue
    params:
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.ChannelMemberships }}'
checks: []
