version: '1.0'
provider: aws
service: storagegateway
services:
  client: storagegateway
  module: boto3.client
discovery:
- discovery_id: aws.storagegateway.describe_tape_archives
  calls:
  - action: describe_tape_archives
    save_as: response
    on_error: continue
    params:
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.TapeArchives }}'
- discovery_id: aws.storagegateway.list_cache_reports
  calls:
  - action: list_cache_reports
    save_as: response
    on_error: continue
    params:
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.CacheReportList }}'
- discovery_id: aws.storagegateway.list_gateways
  calls:
  - action: list_gateways
    save_as: response
    on_error: continue
    params:
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.Gateways }}'
- discovery_id: aws.storagegateway.list_volumes
  calls:
  - action: list_volumes
    save_as: response
    on_error: continue
    params:
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.VolumeInfos }}'
- discovery_id: aws.storagegateway.list_tape_pools
  calls:
  - action: list_tape_pools
    save_as: response
    on_error: continue
    params:
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.PoolInfos }}'
- discovery_id: aws.storagegateway.list_file_shares
  calls:
  - action: list_file_shares
    save_as: response
    on_error: continue
    params:
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.FileShareInfoList }}'
- discovery_id: aws.storagegateway.list_file_system_associations
  calls:
  - action: list_file_system_associations
    save_as: response
    on_error: continue
    params:
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.FileSystemAssociationSummaryList }}'
- discovery_id: aws.storagegateway.list_automatic_tape_creation_policies
  calls:
  - action: list_automatic_tape_creation_policies
    save_as: response
    on_error: continue
    params:
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.AutomaticTapeCreationPolicyInfos }}'
- discovery_id: aws.storagegateway.describe_smb_file_shares
  calls:
  - action: describe_smb_file_shares
    save_as: response
    on_error: continue
    params:
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.SMBFileShareInfoList }}'
- discovery_id: aws.storagegateway.describe_storedi_scsi_volumes
  calls:
  - action: describe_storedi_scsi_volumes
    save_as: response
    on_error: continue
    params:
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.StorediSCSIVolumes }}'
- discovery_id: aws.storagegateway.list_local_disks
  for_each: aws.storagegateway.list_gateways
  calls:
  - action: list_local_disks
    save_as: response
    on_error: continue
    params:
      GatewayARN: '{{ item.automaticTapeCreationPolicyInfoGatewayArn }}'
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.Disks }}'
- discovery_id: aws.storagegateway.describe_bandwidth_rate_limit_schedule
  for_each: aws.storagegateway.list_gateways
  calls:
  - action: describe_bandwidth_rate_limit_schedule
    save_as: response
    on_error: continue
    params:
      GatewayARN: '{{ item.automaticTapeCreationPolicyInfoGatewayArn }}'
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.BandwidthRateLimitIntervals }}'
- discovery_id: aws.storagegateway.describe_vtl_devices
  for_each: aws.storagegateway.list_gateways
  calls:
  - action: describe_vtl_devices
    save_as: response
    on_error: continue
    params:
      GatewayARN: '{{ item.automaticTapeCreationPolicyInfoGatewayArn }}'
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.VTLDevices }}'
- discovery_id: aws.storagegateway.describe_nfs_file_shares
  calls:
  - action: describe_nfs_file_shares
    save_as: response
    on_error: continue
    params:
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.NFSFileShareInfoList }}'
- discovery_id: aws.storagegateway.describe_maintenance_start_time
  for_each: aws.storagegateway.list_gateways
  calls:
  - action: describe_maintenance_start_time
    save_as: response
    on_error: continue
    params:
      GatewayARN: '{{ item.automaticTapeCreationPolicyInfoGatewayArn }}'
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.SoftwareUpdatePreferences }}'
- discovery_id: aws.storagegateway.describe_gateway_information
  for_each: aws.storagegateway.list_gateways
  calls:
  - action: describe_gateway_information
    save_as: response
    on_error: continue
    params:
      GatewayARN: '{{ item.automaticTapeCreationPolicyInfoGatewayArn }}'
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.GatewayNetworkInterfaces }}'
- discovery_id: aws.storagegateway.describe_file_system_associations
  calls:
  - action: describe_file_system_associations
    save_as: response
    on_error: continue
    params:
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.FileSystemAssociationInfoList }}'
- discovery_id: aws.storagegateway.describe_tapes
  for_each: aws.storagegateway.list_gateways
  calls:
  - action: describe_tapes
    save_as: response
    on_error: continue
    params:
      GatewayARN: '{{ item.automaticTapeCreationPolicyInfoGatewayArn }}'
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.Tapes }}'
- discovery_id: aws.storagegateway.list_volume_recovery_points
  for_each: aws.storagegateway.list_gateways
  calls:
  - action: list_volume_recovery_points
    save_as: response
    on_error: continue
    params:
      GatewayARN: '{{ item.automaticTapeCreationPolicyInfoGatewayArn }}'
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.VolumeRecoveryPointInfos }}'
- discovery_id: aws.storagegateway.list_tags_for_resource
  calls:
  - action: list_tags_for_resource
    save_as: response
    on_error: continue
    params:
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.Tags }}'
- discovery_id: aws.storagegateway.describe_working_storage
  for_each: aws.storagegateway.list_gateways
  calls:
  - action: describe_working_storage
    save_as: response
    on_error: continue
    params:
      GatewayARN: '{{ item.automaticTapeCreationPolicyInfoGatewayArn }}'
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.DiskIds }}'
- discovery_id: aws.storagegateway.describe_cache_report
  for_each: aws.storagegateway.list_cache_reports
  calls:
  - action: describe_cache_report
    save_as: response
    on_error: continue
    params:
      CacheReportARN: '{{ item.cacheReportListCacheReportArn }}'
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.CacheReportInfo }}'
- discovery_id: aws.storagegateway.describe_tape_recovery_points
  for_each: aws.storagegateway.list_gateways
  calls:
  - action: describe_tape_recovery_points
    save_as: response
    on_error: continue
    params:
      GatewayARN: '{{ item.automaticTapeCreationPolicyInfoGatewayArn }}'
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.TapeRecoveryPointInfos }}'
- discovery_id: aws.storagegateway.describe_smb_settings
  for_each: aws.storagegateway.list_gateways
  calls:
  - action: describe_smb_settings
    save_as: response
    on_error: continue
    params:
      GatewayARN: '{{ item.automaticTapeCreationPolicyInfoGatewayArn }}'
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.SMBLocalGroups }}'
- discovery_id: aws.storagegateway.describe_upload_buffer
  for_each: aws.storagegateway.list_gateways
  calls:
  - action: describe_upload_buffer
    save_as: response
    on_error: continue
    params:
      GatewayARN: '{{ item.automaticTapeCreationPolicyInfoGatewayArn }}'
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.DiskIds }}'
- discovery_id: aws.storagegateway.describe_cache
  for_each: aws.storagegateway.list_gateways
  calls:
  - action: describe_cache
    save_as: response
    on_error: continue
    params:
      GatewayARN: '{{ item.automaticTapeCreationPolicyInfoGatewayArn }}'
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.DiskIds }}'
checks: []
