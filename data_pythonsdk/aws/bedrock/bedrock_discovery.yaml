      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.modelCopyJobSummaries }}'
- discovery_id: aws.bedrock.list_prompt_routers
  calls:
  - action: list_prompt_routers
    save_as: response
    on_error: continue
    params:
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.promptRouterSummaries }}'
- discovery_id: aws.bedrock.list_foundation_models
  calls:
  - action: list_foundation_models
    save_as: response
    on_error: continue
    params:
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.modelSummaries }}'
- discovery_id: aws.bedrock.list_enforced_guardrails_configuration
  calls:
  - action: list_enforced_guardrails_configuration
    save_as: response
    on_error: continue
    params:
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.guardrailsConfig }}'
- discovery_id: aws.bedrock.list_guardrails
  calls:
  - action: list_guardrails
    save_as: response
    on_error: continue
    params:
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.guardrails }}'
- discovery_id: aws.bedrock.list_inference_profiles
  calls:
  - action: list_inference_profiles
    save_as: response
    on_error: continue
    params:
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.inferenceProfileSummaries }}'
- discovery_id: aws.bedrock.list_custom_models
  calls:
  - action: list_custom_models
    save_as: response
    on_error: continue
    params:
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.modelSummaries }}'
- discovery_id: aws.bedrock.list_model_import_jobs
  calls:
  - action: list_model_import_jobs
    save_as: response
    on_error: continue
    params:
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.modelImportJobSummaries }}'
- discovery_id: aws.bedrock.list_automated_reasoning_policies
  calls:
  - action: list_automated_reasoning_policies
    save_as: response
    on_error: continue
    params:
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.automatedReasoningPolicySummaries }}'
- discovery_id: aws.bedrock.list_custom_model_deployments
  calls:
  - action: list_custom_model_deployments
    save_as: response
    on_error: continue
    params:
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.modelDeploymentSummaries }}'
- discovery_id: aws.bedrock.get_model_invocation_logging_configuration
  calls:
  - action: get_model_invocation_logging_configuration
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.loggingConfig }}'
- discovery_id: aws.bedrock.list_marketplace_model_endpoints
  calls:
  - action: list_marketplace_model_endpoints
    save_as: response
    on_error: continue
    params:
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.marketplaceModelEndpoints }}'
- discovery_id: aws.bedrock.list_imported_models
  calls:
  - action: list_imported_models
    save_as: response
    on_error: continue
    params:
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.modelSummaries }}'
- discovery_id: aws.bedrock.get_use_case_for_model_access
  calls:
  - action: get_use_case_for_model_access
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.formData }}'
- discovery_id: aws.bedrock.get_model_customization_job
  calls:
  - action: get_model_customization_job
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.validationMetrics }}'
- discovery_id: aws.bedrock.list_automated_reasoning_policy_test_cases
  for_each: aws.bedrock.list_automated_reasoning_policies
  calls:
  - action: list_automated_reasoning_policy_test_cases
    save_as: response
    on_error: continue
    params:
      policyArn: '{{ item.automatedReasoningPolicySummaryPolicyArn }}'
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.testCases }}'
- discovery_id: aws.bedrock.get_imported_model
  calls:
  - action: get_imported_model
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.modelDataSource }}'
- discovery_id: aws.bedrock.get_marketplace_model_endpoint
  for_each: aws.bedrock.list_marketplace_model_endpoints
  calls:
  - action: get_marketplace_model_endpoint
    save_as: response
    on_error: continue
    params:
      endpointArn: '{{ item.marketplaceModelEndpointEndpointArn }}'
  emit:
    as: item
    items_for: '{{ response.marketplaceModelEndpoint }}'
- discovery_id: aws.bedrock.list_foundation_model_agreement_offers
  for_each: aws.bedrock.list_model_invocation_jobs
  calls:
  - action: list_foundation_model_agreement_offers
    save_as: response
    on_error: continue
    params:
      modelId: '{{ item.modelSummaryModelId }}'
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.offers }}'
- discovery_id: aws.bedrock.get_model_copy_job
  for_each: aws.bedrock.list_model_invocation_jobs
  calls:
  - action: get_model_copy_job
    save_as: response
    on_error: continue
    params:
      jobArn: '{{ item.jobSummaryJobArn }}'
  emit:
    as: item
    items_for: '{{ response.targetModelTags }}'
- discovery_id: aws.bedrock.list_automated_reasoning_policy_build_workflows
  for_each: aws.bedrock.list_automated_reasoning_policies
  calls:
  - action: list_automated_reasoning_policy_build_workflows
    save_as: response
    on_error: continue
    params:
      policyArn: '{{ item.automatedReasoningPolicySummaryPolicyArn }}'
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.automatedReasoningPolicyBuildWorkflowSummaries }}'
- discovery_id: aws.bedrock.get_automated_reasoning_policy_annotations
  for_each: aws.bedrock.list_automated_reasoning_policy_build_workflows
  calls:
  - action: get_automated_reasoning_policy_annotations
    save_as: response
    on_error: continue
    params:
      policyArn: '{{ item.automatedReasoningPolicySummaryPolicyArn }}'
  emit:
    as: item
    items_for: '{{ response.annotations }}'
- discovery_id: aws.bedrock.list_automated_reasoning_policy_test_results
  for_each: aws.bedrock.list_automated_reasoning_policy_build_workflows
  calls:
  - action: list_automated_reasoning_policy_test_results
    save_as: response
    on_error: continue
    params:
      policyArn: '{{ item.automatedReasoningPolicySummaryPolicyArn }}'
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.testResults }}'
- discovery_id: aws.bedrock.get_automated_reasoning_policy_next_scenario
  for_each: aws.bedrock.list_automated_reasoning_policy_build_workflows
  calls:
  - action: get_automated_reasoning_policy_next_scenario
    save_as: response
    on_error: continue
    params:
      policyArn: '{{ item.automatedReasoningPolicySummaryPolicyArn }}'
  emit:
    as: item
    items_for: '{{ response.scenario }}'
- discovery_id: aws.bedrock.get_automated_reasoning_policy_build_workflow_result_assets
  for_each: aws.bedrock.list_automated_reasoning_policy_build_workflows
  calls:
  - action: get_automated_reasoning_policy_build_workflow_result_assets
    save_as: response
    on_error: continue
    params:
      policyArn: '{{ item.automatedReasoningPolicySummaryPolicyArn }}'
  emit:
    as: item
    items_for: '{{ response.buildWorkflowAssets }}'
- discovery_id: aws.bedrock.get_model_invocation_job
  calls:
  - action: get_model_invocation_job
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.inputDataConfig }}'
- discovery_id: aws.bedrock.get_model_import_job
  calls:
  - action: get_model_import_job
    save_as: response
    on_error: continue
  emit:
