version: '1.0'
provider: aws
service: bedrock
services:
  client: bedrock
  module: boto3.client
discovery:
- discovery_id: aws.bedrock.list_model_invocation_jobs
  calls:
  - action: list_model_invocation_jobs
    save_as: response
    on_error: continue
    params:
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.invocationJobSummaries }}'
- discovery_id: aws.bedrock.list_provisioned_model_throughputs
  calls:
  - action: list_provisioned_model_throughputs
    save_as: response
    on_error: continue
    params:
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.provisionedModelSummaries }}'
- discovery_id: aws.bedrock.list_evaluation_jobs
  calls:
  - action: list_evaluation_jobs
    save_as: response
    on_error: continue
    params:
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.jobSummaries }}'
- discovery_id: aws.bedrock.list_model_customization_jobs
  calls:
  - action: list_model_customization_jobs
    save_as: response
    on_error: continue
    params:
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.modelCustomizationJobSummaries }}'
- discovery_id: aws.bedrock.list_model_copy_jobs
  calls:
