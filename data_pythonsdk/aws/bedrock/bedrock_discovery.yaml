  calls:
  - action: get_foundation_model_availability
    save_as: response
    on_error: continue
    params:
      modelId: '{{ item.modelSummaryModelId }}'
  emit:
    as: item
    items_for: '{{ response.agreementAvailability }}'
checks: []
