version: '1.0'
provider: aws
service: resource-groups
services:
  client: resource-groups
  module: boto3.client
discovery:
- discovery_id: aws.resource-groups.list_tag_sync_tasks
  calls:
  - action: list_tag_sync_tasks
    save_as: response
    on_error: continue
    params:
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.TagSyncTasks }}'
- discovery_id: aws.resource-groups.get_group
  calls:
  - action: get_group
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.Group }}'
- discovery_id: aws.resource-groups.get_group_configuration
  calls:
  - action: get_group_configuration
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.GroupConfiguration }}'
- discovery_id: aws.resource-groups.get_account_settings
  calls:
  - action: get_account_settings
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.AccountSettings }}'
- discovery_id: aws.resource-groups.get_group_query
  calls:
  - action: get_group_query
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.GroupQuery }}'
- discovery_id: aws.resource-groups.list_group_resources
  calls:
  - action: list_group_resources
    save_as: response
    on_error: continue
    params:
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.Resources }}'
- discovery_id: aws.resource-groups.list_grouping_statuses
  for_each: aws.resource-groups.get_group
  calls:
  - action: list_grouping_statuses
    save_as: response
    on_error: continue
    params:
      Group: '{{ item.groupName }}'
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.GroupingStatuses }}'
- discovery_id: aws.resource-groups.get_tag_sync_task
  for_each: aws.resource-groups.list_tag_sync_tasks
  calls:
  - action: get_tag_sync_task
    save_as: response
    on_error: continue
    params:
      TaskArn: '{{ item.tagSyncTaskTaskArn }}'
  emit:
    as: item
    items_for: '{{ response.ResourceQuery }}'
checks: []
