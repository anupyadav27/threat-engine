version: '1.0'
provider: aws
service: redshift
services:
  client: redshift
  module: boto3.client
discovery:
- discovery_id: aws.redshift.describe_clusters
  calls:
  - action: describe_clusters
    save_as: response
    on_error: continue
    params:
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.Clusters }}'
