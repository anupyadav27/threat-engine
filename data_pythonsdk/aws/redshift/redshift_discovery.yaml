    items_for: '{{ response.AuthenticationProfiles }}'
- discovery_id: aws.redshift.describe_cluster_parameters
  for_each: aws.redshift.describe_cluster_parameter_groups
  calls:
  - action: describe_cluster_parameters
    save_as: response
    on_error: continue
    params:
      ParameterGroupName: '{{ item.parameterGroupParameterGroupName }}'
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.Parameters }}'
- discovery_id: aws.redshift.describe_partners
  for_each: aws.redshift.describe_clusters
  calls:
  - action: describe_partners
    save_as: response
    on_error: continue
    params:
      AccountId: '{{ item.clusterDbRevisionClusterIdentifier }}'
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.PartnerIntegrationInfoList }}'
- discovery_id: aws.redshift.describe_resize
  for_each: aws.redshift.describe_clusters
  calls:
