version: '1.0'
provider: aws
service: dynamodb
services:
  client: dynamodb
  module: boto3.client
discovery:
- discovery_id: aws.dynamodb.list_backups
  calls:
  - action: list_backups
    save_as: response
    on_error: continue
    params:
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.BackupSummaries }}'
- discovery_id: aws.dynamodb.list_imports
  calls:
  - action: list_imports
    save_as: response
    on_error: continue
    params:
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.ImportSummaryList }}'
- discovery_id: aws.dynamodb.list_contributor_insights
  calls:
  - action: list_contributor_insights
    save_as: response
    on_error: continue
    params:
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.ContributorInsightsSummaries }}'
- discovery_id: aws.dynamodb.describe_endpoints
  calls:
  - action: describe_endpoints
    save_as: response
    on_error: continue
    params:
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.Endpoints }}'
- discovery_id: aws.dynamodb.list_exports
  calls:
  - action: list_exports
    save_as: response
    on_error: continue
    params:
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.ExportSummaries }}'
- discovery_id: aws.dynamodb.list_global_tables
  calls:
  - action: list_global_tables
    save_as: response
    on_error: continue
    params:
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.GlobalTables }}'
- discovery_id: aws.dynamodb.describe_limits
  calls:
  - action: describe_limits
    save_as: response
    on_error: continue
    params:
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.AccountMaxReadCapacityUnits }}'
- discovery_id: aws.dynamodb.describe_table
  for_each: aws.dynamodb.list_backups
  calls:
  - action: describe_table
    save_as: response
    on_error: continue
    params:
      TableName: '{{ item.backupSummaryTableName }}'
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.Table }}'
- discovery_id: aws.dynamodb.describe_export
  for_each: aws.dynamodb.list_exports
  calls:
  - action: describe_export
    save_as: response
    on_error: continue
    params:
      ExportArn: '{{ item.exportSummaryExportArn }}'
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.ExportDescription }}'
- discovery_id: aws.dynamodb.describe_global_table_settings
  for_each: aws.dynamodb.list_global_tables
  calls:
  - action: describe_global_table_settings
    save_as: response
    on_error: continue
    params:
      GlobalTableName: '{{ item.globalTablGlobalTableName }}'
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.ReplicaSettings }}'
- discovery_id: aws.dynamodb.describe_import
  for_each: aws.dynamodb.list_imports
  calls:
  - action: describe_import
    save_as: response
    on_error: continue
    params:
      ImportArn: '{{ item.importSummaryListImportArn }}'
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.ImportTableDescription }}'
- discovery_id: aws.dynamodb.describe_kinesis_streaming_destination
  for_each: aws.dynamodb.list_backups
  calls:
  - action: describe_kinesis_streaming_destination
    save_as: response
    on_error: continue
    params:
      TableName: '{{ item.backupSummaryTableName }}'
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.KinesisDataStreamDestinations }}'
- discovery_id: aws.dynamodb.describe_backup
  for_each: aws.dynamodb.list_backups
  calls:
  - action: describe_backup
    save_as: response
    on_error: continue
    params:
      BackupArn: '{{ item.backupSummaryBackupArn }}'
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.BackupDescription }}'
- discovery_id: aws.dynamodb.describe_global_table
  for_each: aws.dynamodb.list_global_tables
  calls:
  - action: describe_global_table
    save_as: response
    on_error: continue
    params:
      GlobalTableName: '{{ item.globalTablGlobalTableName }}'
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.GlobalTableDescription }}'
- discovery_id: aws.dynamodb.list_tags_of_resource
  calls:
  - action: list_tags_of_resource
    save_as: response
    on_error: continue
    params:
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.Tags }}'
- discovery_id: aws.dynamodb.get_item
  for_each: aws.dynamodb.list_backups
  calls:
  - action: get_item
    save_as: response
    on_error: continue
    params:
      TableName: '{{ item.tagKey }}'
  emit:
    as: item
    items_for: '{{ response.ConsumedCapacity }}'
- discovery_id: aws.dynamodb.describe_time_to_live
  for_each: aws.dynamodb.list_backups
  calls:
  - action: describe_time_to_live
    save_as: response
    on_error: continue
    params:
      TableName: '{{ item.backupSummaryTableName }}'
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.TimeToLiveDescription }}'
- discovery_id: aws.dynamodb.describe_continuous_backups
  for_each: aws.dynamodb.list_backups
  calls:
  - action: describe_continuous_backups
    save_as: response
    on_error: continue
    params:
      TableName: '{{ item.backupSummaryTableName }}'
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.ContinuousBackupsDescription }}'
- discovery_id: aws.dynamodb.get_resource_policy
  calls:
  - action: get_resource_policy
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.Policy }}'
checks: []
