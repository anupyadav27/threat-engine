version: '1.0'
provider: aws
service: budgets
services:
  client: budgets
  module: boto3.client
discovery:
- discovery_id: aws.budgets.describe_budgets
  calls:
  - action: describe_budgets
    save_as: response
    on_error: continue
    params:
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.Budgets }}'
- discovery_id: aws.budgets.describe_budget_actions_for_account
  calls:
  - action: describe_budget_actions_for_account
    save_as: response
    on_error: continue
    params:
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.Actions }}'
- discovery_id: aws.budgets.describe_notifications_for_budget
  for_each: aws.budgets.describe_budgets
  calls:
  - action: describe_notifications_for_budget
    save_as: response
    on_error: continue
    params:
      AccountId: '{{ item.budgetBudgetName }}'
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.Notifications }}'
- discovery_id: aws.budgets.describe_budget_action_histories
  for_each: aws.budgets.describe_budget_actions_for_account
  calls:
  - action: describe_budget_action_histories
    save_as: response
    on_error: continue
    params:
      AccountId: '{{ item.budgetBudgetName }}'
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.ActionHistories }}'
- discovery_id: aws.budgets.describe_subscribers_for_notification
  for_each: aws.budgets.describe_budgets
  calls:
  - action: describe_subscribers_for_notification
    save_as: response
    on_error: continue
    params:
      AccountId: '{{ item.budgetBudgetName }}'
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.Subscribers }}'
- discovery_id: aws.budgets.list_tags_for_resource
  calls:
  - action: list_tags_for_resource
    save_as: response
    on_error: continue
    params:
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.ResourceTags }}'
- discovery_id: aws.budgets.describe_budget
  for_each: aws.budgets.describe_budgets
  calls:
  - action: describe_budget
    save_as: response
    on_error: continue
    params:
      AccountId: '{{ item.budgetBudgetName }}'
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.Budget }}'
- discovery_id: aws.budgets.describe_budget_performance_history
  for_each: aws.budgets.describe_budgets
  calls:
  - action: describe_budget_performance_history
    save_as: response
    on_error: continue
    params:
      AccountId: '{{ item.budgetBudgetName }}'
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.BudgetPerformanceHistory }}'
- discovery_id: aws.budgets.describe_budget_notifications_for_account
  calls:
  - action: describe_budget_notifications_for_account
    save_as: response
    on_error: continue
    params:
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.BudgetNotificationsForAccount }}'
checks: []
