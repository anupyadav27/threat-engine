version: '1.0'
provider: aws
service: cognito
services:
  client: cognito
  module: boto3.client
discovery:
- discovery_id: aws.cognito.get_user_pool_mfa_config
  calls:
  - action: get_user_pool_mfa_config
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.SmsMfaConfiguration }}'
- discovery_id: aws.cognito.get_user_auth_factors
  calls:
  - action: get_user_auth_factors
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.UserMFASettingList }}'
- discovery_id: aws.cognito.get_user
  calls:
  - action: get_user
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.UserMFASettingList }}'
- discovery_id: aws.cognito.list_groups
  calls:
  - action: list_groups
    save_as: response
    on_error: continue
    params:
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.Groups }}'
- discovery_id: aws.cognito.describe_resource_server
  calls:
  - action: describe_resource_server
    save_as: response
    on_error: continue
    params:
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.ResourceServer }}'
- discovery_id: aws.cognito.describe_managed_login_branding
  calls:
  - action: describe_managed_login_branding
    save_as: response
    on_error: continue
    params:
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.ManagedLoginBranding }}'
- discovery_id: aws.cognito.describe_risk_configuration
  calls:
  - action: describe_risk_configuration
    save_as: response
    on_error: continue
    params:
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.RiskConfiguration }}'
- discovery_id: aws.cognito.list_user_import_jobs
  calls:
  - action: list_user_import_jobs
    save_as: response
    on_error: continue
    params:
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.UserImportJobs }}'
- discovery_id: aws.cognito.list_devices
  calls:
  - action: list_devices
    save_as: response
    on_error: continue
    params:
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.Devices }}'
- discovery_id: aws.cognito.get_log_delivery_configuration
  calls:
  - action: get_log_delivery_configuration
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.LogDeliveryConfiguration }}'
- discovery_id: aws.cognito.get_csv_header
  calls:
  - action: get_csv_header
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.CSVHeader }}'
- discovery_id: aws.cognito.list_user_pool_clients
  calls:
  - action: list_user_pool_clients
    save_as: response
    on_error: continue
    params:
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.UserPoolClients }}'
- discovery_id: aws.cognito.get_identity_provider_by_identifier
  calls:
  - action: get_identity_provider_by_identifier
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.IdentityProvider }}'
- discovery_id: aws.cognito.list_terms
  calls:
  - action: list_terms
    save_as: response
    on_error: continue
    params:
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.Terms }}'
- discovery_id: aws.cognito.get_signing_certificate
  calls:
  - action: get_signing_certificate
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.Certificate }}'
- discovery_id: aws.cognito.get_ui_customization
  calls:
  - action: get_ui_customization
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.UICustomization }}'
- discovery_id: aws.cognito.describe_user_pool_domain
  calls:
  - action: describe_user_pool_domain
    save_as: response
    on_error: continue
    params:
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.DomainDescription }}'
checks: []
