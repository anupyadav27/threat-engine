version: '1.0'
provider: aws
service: wellarchitected
services:
  client: wellarchitected
  module: boto3.client
discovery:
- discovery_id: aws.wellarchitected.list_share_invitations
  calls:
  - action: list_share_invitations
    save_as: response
    on_error: continue
    params:
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.ShareInvitationSummaries }}'
- discovery_id: aws.wellarchitected.list_workloads
  calls:
  - action: list_workloads
    save_as: response
    on_error: continue
    params:
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.WorkloadSummaries }}'
- discovery_id: aws.wellarchitected.list_lenses
  calls:
  - action: list_lenses
    save_as: response
    on_error: continue
    params:
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.LensSummaries }}'
- discovery_id: aws.wellarchitected.list_profiles
  calls:
  - action: list_profiles
    save_as: response
    on_error: continue
    params:
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.ProfileSummaries }}'
- discovery_id: aws.wellarchitected.list_review_templates
  calls:
  - action: list_review_templates
    save_as: response
    on_error: continue
    params:
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.ReviewTemplates }}'
- discovery_id: aws.wellarchitected.list_profile_notifications
  calls:
  - action: list_profile_notifications
    save_as: response
    on_error: continue
    params:
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.NotificationSummaries }}'
- discovery_id: aws.wellarchitected.get_global_settings
  calls:
  - action: get_global_settings
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.JiraConfiguration }}'
- discovery_id: aws.wellarchitected.get_profile_template
  calls:
  - action: get_profile_template
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.ProfileTemplate }}'
- discovery_id: aws.wellarchitected.list_notifications
  calls:
  - action: list_notifications
    save_as: response
    on_error: continue
    params:
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.NotificationSummaries }}'
- discovery_id: aws.wellarchitected.get_workload
  for_each: aws.wellarchitected.list_share_invitations
  calls:
  - action: get_workload
    save_as: response
    on_error: continue
    params:
      WorkloadId: '{{ item.notificationSummaryWorkloadId }}'
  emit:
    as: item
    items_for: '{{ response.Workload }}'
- discovery_id: aws.wellarchitected.list_answers
  for_each: aws.wellarchitected.list_lenses
  calls:
  - action: list_answers
    save_as: response
    on_error: continue
    params:
      WorkloadId: '{{ item.notificationSummaryWorkloadId }}'
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.AnswerSummaries }}'
- discovery_id: aws.wellarchitected.get_review_template_answer
  for_each: aws.wellarchitected.list_answers
  calls:
  - action: get_review_template_answer
    save_as: response
    on_error: continue
    params:
      TemplateArn: '{{ item.reviewTemplatTemplateArn }}'
  emit:
    as: item
    items_for: '{{ response.Answer }}'
- discovery_id: aws.wellarchitected.get_consolidated_report
  calls:
  - action: get_consolidated_report
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.Metrics }}'
- discovery_id: aws.wellarchitected.get_milestone
  for_each: aws.wellarchitected.list_answers
  calls:
  - action: get_milestone
    save_as: response
    on_error: continue
    params:
      WorkloadId: '{{ item.notificationSummaryWorkloadId }}'
  emit:
    as: item
    items_for: '{{ response.Milestone }}'
- discovery_id: aws.wellarchitected.get_review_template_lens_review
  for_each: aws.wellarchitected.list_lenses
  calls:
  - action: get_review_template_lens_review
    save_as: response
    on_error: continue
    params:
      TemplateArn: '{{ item.reviewTemplatTemplateArn }}'
  emit:
    as: item
    items_for: '{{ response.LensReview }}'
- discovery_id: aws.wellarchitected.get_profile
  for_each: aws.wellarchitected.list_share_invitations
  calls:
  - action: get_profile
    save_as: response
    on_error: continue
    params:
      ProfileArn: '{{ item.notificationSummaryProfileArn }}'
  emit:
    as: item
    items_for: '{{ response.Profile }}'
- discovery_id: aws.wellarchitected.get_lens
  for_each: aws.wellarchitected.list_lenses
  calls:
  - action: get_lens
    save_as: response
    on_error: continue
    params:
      LensAlias: '{{ item.lensSummaryLensAlias }}'
  emit:
    as: item
    items_for: '{{ response.Lens }}'
- discovery_id: aws.wellarchitected.list_workload_shares
  for_each: aws.wellarchitected.list_share_invitations
  calls:
  - action: list_workload_shares
    save_as: response
    on_error: continue
    params:
      WorkloadId: '{{ item.notificationSummaryWorkloadId }}'
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.WorkloadShareSummaries }}'
- discovery_id: aws.wellarchitected.list_lens_review_improvements
  for_each: aws.wellarchitected.list_lenses
  calls:
  - action: list_lens_review_improvements
    save_as: response
    on_error: continue
    params:
      WorkloadId: '{{ item.notificationSummaryWorkloadId }}'
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.ImprovementSummaries }}'
- discovery_id: aws.wellarchitected.list_milestones
  for_each: aws.wellarchitected.list_share_invitations
  calls:
  - action: list_milestones
    save_as: response
    on_error: continue
    params:
      WorkloadId: '{{ item.notificationSummaryWorkloadId }}'
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.MilestoneSummaries }}'
- discovery_id: aws.wellarchitected.get_lens_version_difference
  for_each: aws.wellarchitected.list_lenses
  calls:
  - action: get_lens_version_difference
    save_as: response
    on_error: continue
    params:
      LensAlias: '{{ item.lensSummaryLensAlias }}'
  emit:
    as: item
    items_for: '{{ response.VersionDifferences }}'
checks: []
