version: '1.0'
provider: aws
service: panorama
services:
  client: panorama
  module: boto3.client
discovery:
- discovery_id: aws.panorama.list_devices
  calls:
  - action: list_devices
    save_as: response
    on_error: continue
    params:
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.Devices }}'
- discovery_id: aws.panorama.list_application_instances
  calls:
  - action: list_application_instances
    save_as: response
    on_error: continue
    params:
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.ApplicationInstances }}'
- discovery_id: aws.panorama.list_nodes
  calls:
  - action: list_nodes
    save_as: response
    on_error: continue
    params:
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.Nodes }}'
- discovery_id: aws.panorama.list_package_import_jobs
  calls:
  - action: list_package_import_jobs
    save_as: response
    on_error: continue
    params:
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.PackageImportJobs }}'
- discovery_id: aws.panorama.list_node_from_template_jobs
  calls:
  - action: list_node_from_template_jobs
    save_as: response
    on_error: continue
    params:
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.NodeFromTemplateJobs }}'
- discovery_id: aws.panorama.list_devices_jobs
  calls:
  - action: list_devices_jobs
    save_as: response
    on_error: continue
    params:
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.DeviceJobs }}'
- discovery_id: aws.panorama.describe_application_instance
  for_each: aws.panorama.list_application_instances
  calls:
  - action: describe_application_instance
    save_as: response
    on_error: continue
    params:
      ApplicationInstanceId: '{{ item.applicationInstancApplicationInstanceId }}'
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.RuntimeContextStates }}'
- discovery_id: aws.panorama.list_application_instance_node_instances
  for_each: aws.panorama.list_application_instances
  calls:
  - action: list_application_instance_node_instances
    save_as: response
    on_error: continue
    params:
      ApplicationInstanceId: '{{ item.applicationInstancApplicationInstanceId }}'
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.NodeInstances }}'
- discovery_id: aws.panorama.describe_node
  for_each: aws.panorama.list_nodes
  calls:
  - action: describe_node
    save_as: response
    on_error: continue
    params:
      NodeId: '{{ item.nodNodeId }}'
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.NodeInterface }}'
- discovery_id: aws.panorama.describe_node_from_template_job
  for_each: aws.panorama.list_package_import_jobs
  calls:
  - action: describe_node_from_template_job
    save_as: response
    on_error: continue
    params:
      JobId: '{{ item.deviceJobJobId }}'
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.JobTags }}'
- discovery_id: aws.panorama.describe_device
  for_each: aws.panorama.list_devices
  calls:
  - action: describe_device
    save_as: response
    on_error: continue
    params:
      DeviceId: '{{ item.devicDeviceId }}'
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.AlternateSoftwares }}'
- discovery_id: aws.panorama.describe_package_import_job
  for_each: aws.panorama.list_package_import_jobs
  calls:
  - action: describe_package_import_job
    save_as: response
    on_error: continue
    params:
      JobId: '{{ item.deviceJobJobId }}'
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.JobTags }}'
- discovery_id: aws.panorama.describe_application_instance_details
  for_each: aws.panorama.list_application_instances
  calls:
  - action: describe_application_instance_details
    save_as: response
    on_error: continue
    params:
      ApplicationInstanceId: '{{ item.applicationInstancApplicationInstanceId }}'
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.ManifestOverridesPayload }}'
checks: []
