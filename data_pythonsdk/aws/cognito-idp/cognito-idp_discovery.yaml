version: '1.0'
provider: aws
service: cognito-idp
services:
  client: cognito-idp
  module: boto3.client
discovery:
- discovery_id: aws.cognito-idp.list_user_pools
  calls:
  - action: list_user_pools
    save_as: response
    on_error: continue
    params:
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.UserPools }}'
- discovery_id: aws.cognito-idp.describe_user_pool
  for_each: aws.cognito-idp.list_user_pools
  calls:
  - action: describe_user_pool
    save_as: response
    on_error: continue
    params:
      UserPoolId: '{{ item.userPoolId }}'
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.UserPool }}'
- discovery_id: aws.cognito-idp.list_user_import_jobs
  for_each: aws.cognito-idp.list_user_pools
  calls:
