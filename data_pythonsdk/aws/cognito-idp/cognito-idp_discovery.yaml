    save_as: response
    on_error: continue
    params:
      UserPoolId: '{{ item.userPoolId }}'
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.UserImportJobs }}'
- discovery_id: aws.cognito-idp.describe_user_pool_domain
  for_each: aws.cognito-idp.describe_user_pool
  calls:
  - action: describe_user_pool_domain
    save_as: response
    on_error: continue
    params:
      Domain: '{{ item.userPoolDomain }}'
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.DomainDescription }}'
