version: '1.0'
provider: aws
service: iotsitewise
services:
  client: iotsitewise
  module: boto3.client
discovery:
- discovery_id: aws.iotsitewise.list_asset_models
  calls:
  - action: list_asset_models
    save_as: response
    on_error: continue
    params:
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.assetModelSummaries }}'
- discovery_id: aws.iotsitewise.list_assets
  calls:
  - action: list_assets
    save_as: response
    on_error: continue
    params:
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.assetSummaries }}'
- discovery_id: aws.iotsitewise.list_portals
  calls:
  - action: list_portals
    save_as: response
    on_error: continue
    params:
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.portalSummaries }}'
- discovery_id: aws.iotsitewise.list_computation_models
  calls:
  - action: list_computation_models
    save_as: response
    on_error: continue
    params:
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.computationModelSummaries }}'
- discovery_id: aws.iotsitewise.describe_storage_configuration
  calls:
  - action: describe_storage_configuration
    save_as: response
    on_error: continue
    params:
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.multiLayerStorage }}'
- discovery_id: aws.iotsitewise.list_time_series
  calls:
  - action: list_time_series
    save_as: response
    on_error: continue
    params:
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.TimeSeriesSummaries }}'
- discovery_id: aws.iotsitewise.list_gateways
  calls:
  - action: list_gateways
    save_as: response
    on_error: continue
    params:
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.gatewaySummaries }}'
- discovery_id: aws.iotsitewise.list_access_policies
  calls:
  - action: list_access_policies
    save_as: response
    on_error: continue
    params:
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.accessPolicySummaries }}'
- discovery_id: aws.iotsitewise.describe_default_encryption_configuration
  calls:
  - action: describe_default_encryption_configuration
    save_as: response
    on_error: continue
    params:
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.configurationStatus }}'
- discovery_id: aws.iotsitewise.get_asset_property_value_history
  calls:
  - action: get_asset_property_value_history
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.assetPropertyValueHistory }}'
- discovery_id: aws.iotsitewise.get_asset_property_value
  calls:
  - action: get_asset_property_value
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.propertyValue }}'
- discovery_id: aws.iotsitewise.describe_logging_options
  calls:
  - action: describe_logging_options
    save_as: response
    on_error: continue
    params:
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.loggingOptions }}'
- discovery_id: aws.iotsitewise.describe_asset
  for_each: aws.iotsitewise.list_time_series
  calls:
  - action: describe_asset
    save_as: response
    on_error: continue
    params:
      assetId: '{{ item.timeSeriesSummaryAssetId }}'
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.assetProperties }}'
- discovery_id: aws.iotsitewise.list_executions
  calls:
  - action: list_executions
    save_as: response
    on_error: continue
    params:
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.executionSummaries }}'
- discovery_id: aws.iotsitewise.describe_asset_model
  for_each: aws.iotsitewise.list_assets
  calls:
  - action: describe_asset_model
    save_as: response
    on_error: continue
    params:
      assetModelId: '{{ item.assetSummaryAssetModelId }}'
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.assetModelProperties }}'
- discovery_id: aws.iotsitewise.describe_dataset
  calls:
  - action: describe_dataset
    save_as: response
    on_error: continue
    params:
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.datasetSource }}'
- discovery_id: aws.iotsitewise.describe_gateway
  for_each: aws.iotsitewise.list_gateways
  calls:
  - action: describe_gateway
    save_as: response
    on_error: continue
    params:
      gatewayId: '{{ item.gatewaySummaryGatewayId }}'
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.gatewayCapabilitySummaries }}'
- discovery_id: aws.iotsitewise.list_asset_model_properties
  for_each: aws.iotsitewise.list_assets
  calls:
  - action: list_asset_model_properties
    save_as: response
    on_error: continue
    params:
      assetModelId: '{{ item.assetSummaryAssetModelId }}'
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.assetModelPropertySummaries }}'
- discovery_id: aws.iotsitewise.describe_asset_model_composite_model
  for_each: aws.iotsitewise.list_asset_model_properties
  calls:
  - action: describe_asset_model_composite_model
    save_as: response
    on_error: continue
    params:
      assetModelId: '{{ item.assetSummaryAssetModelId }}'
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.assetModelCompositeModelPath }}'
- discovery_id: aws.iotsitewise.list_actions
  calls:
  - action: list_actions
    save_as: response
    on_error: continue
    params:
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.actionSummaries }}'
- discovery_id: aws.iotsitewise.list_asset_relationships
  for_each: aws.iotsitewise.list_time_series
  calls:
  - action: list_asset_relationships
    save_as: response
    on_error: continue
    params:
      assetId: '{{ item.timeSeriesSummaryAssetId }}'
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.assetRelationshipSummaries }}'
- discovery_id: aws.iotsitewise.list_computation_model_data_binding_usages
  calls:
  - action: list_computation_model_data_binding_usages
    save_as: response
    on_error: continue
    params:
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.dataBindingUsageSummaries }}'
- discovery_id: aws.iotsitewise.describe_execution
  for_each: aws.iotsitewise.list_executions
  calls:
  - action: describe_execution
    save_as: response
    on_error: continue
    params:
      executionId: '{{ item.executionSummaryExecutionId }}'
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.targetResource }}'
- discovery_id: aws.iotsitewise.describe_computation_model
  for_each: aws.iotsitewise.describe_execution
  calls:
  - action: describe_computation_model
    save_as: response
    on_error: continue
    params:
      computationModelId: '{{ item.targetResourceComputationModelId }}'
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.actionDefinitions }}'
- discovery_id: aws.iotsitewise.list_asset_properties
  for_each: aws.iotsitewise.list_time_series
  calls:
  - action: list_asset_properties
    save_as: response
    on_error: continue
    params:
      assetId: '{{ item.timeSeriesSummaryAssetId }}'
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.assetPropertySummaries }}'
- discovery_id: aws.iotsitewise.describe_asset_composite_model
  for_each: aws.iotsitewise.list_asset_properties
  calls:
  - action: describe_asset_composite_model
    save_as: response
    on_error: continue
    params:
      assetId: '{{ item.timeSeriesSummaryAssetId }}'
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.assetCompositeModelPath }}'
- discovery_id: aws.iotsitewise.describe_dashboard
  calls:
  - action: describe_dashboard
    save_as: response
    on_error: continue
    params:
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.dashboardId }}'
- discovery_id: aws.iotsitewise.describe_project
  for_each: aws.iotsitewise.describe_dashboard
  calls:
  - action: describe_project
    save_as: response
    on_error: continue
    params:
      projectId: '{{ item.projectIdProjectId }}'
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.projectId }}'
- discovery_id: aws.iotsitewise.describe_portal
  for_each: aws.iotsitewise.describe_project
  calls:
  - action: describe_portal
    save_as: response
    on_error: continue
    params:
      portalId: '{{ item.portalStatuPortalId }}'
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.portalStatus }}'
checks: []
