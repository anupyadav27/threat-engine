version: '1.0'
provider: aws
service: schemas
services:
  client: schemas
  module: boto3.client
discovery:
- discovery_id: aws.schemas.list_discoverers
  calls:
  - action: list_discoverers
    save_as: response
    on_error: continue
    params:
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.Discoverers }}'
- discovery_id: aws.schemas.list_registries
  calls:
  - action: list_registries
    save_as: response
    on_error: continue
    params:
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.Registries }}'
- discovery_id: aws.schemas.get_resource_policy
  calls:
  - action: get_resource_policy
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.Policy }}'
- discovery_id: aws.schemas.describe_schema
  calls:
  - action: describe_schema
    save_as: response
    on_error: continue
    params:
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.Content }}'
- discovery_id: aws.schemas.list_schemas
  calls:
  - action: list_schemas
    save_as: response
    on_error: continue
    params:
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.Schemas }}'
- discovery_id: aws.schemas.get_code_binding_source
  calls:
  - action: get_code_binding_source
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.Body }}'
checks: []
