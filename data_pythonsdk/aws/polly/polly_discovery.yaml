version: '1.0'
provider: aws
service: polly
services:
  client: polly
  module: boto3.client
discovery:
- discovery_id: aws.polly.list_speech_synthesis_tasks
  calls:
  - action: list_speech_synthesis_tasks
    save_as: response
    on_error: continue
    params:
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.SynthesisTasks }}'
- discovery_id: aws.polly.describe_voices
  calls:
  - action: describe_voices
    save_as: response
    on_error: continue
    params:
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.Voices }}'
- discovery_id: aws.polly.list_lexicons
  calls:
  - action: list_lexicons
    save_as: response
    on_error: continue
    params:
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.Lexicons }}'
- discovery_id: aws.polly.get_lexicon
  for_each: aws.polly.describe_voices
  calls:
  - action: get_lexicon
    save_as: response
    on_error: continue
    params:
      Name: '{{ item.voicName }}'
  emit:
    as: item
    items_for: '{{ response.Lexicon }}'
checks: []
