version: '1.0'
provider: aws
service: route53profiles
services:
  client: route53profiles
  module: boto3.client
discovery:
- discovery_id: aws.route53profiles.list_profile_associations
  calls:
  - action: list_profile_associations
    save_as: response
    on_error: continue
    params:
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.ProfileAssociations }}'
- discovery_id: aws.route53profiles.list_profiles
  calls:
  - action: list_profiles
    save_as: response
    on_error: continue
    params:
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.ProfileSummaries }}'
- discovery_id: aws.route53profiles.get_profile_resource_association
  calls:
  - action: get_profile_resource_association
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.ProfileResourceAssociation }}'
- discovery_id: aws.route53profiles.get_profile
  for_each: aws.route53profiles.list_profile_associations
  calls:
  - action: get_profile
    save_as: response
    on_error: continue
    params:
      ProfileId: '{{ item.profileAssociationProfileId }}'
  emit:
    as: item
    items_for: '{{ response.Profile }}'
checks: []
