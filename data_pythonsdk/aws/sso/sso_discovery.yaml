version: '1.0'
provider: aws
service: sso
services:
  client: sso
  module: boto3.client
discovery:
- discovery_id: aws.sso.list_accounts
  calls:
  - action: list_accounts
    save_as: response
    on_error: continue
    params:
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.accountList }}'
- discovery_id: aws.sso.list_account_roles
  for_each: aws.sso.list_accounts
  calls:
  - action: list_account_roles
    save_as: response
    on_error: continue
    params:
      accessToken: '{{ item.roleListAccountId }}'
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.roleList }}'
- discovery_id: aws.sso.get_role_credentials
  for_each: aws.sso.list_accounts
  calls:
  - action: get_role_credentials
    save_as: response
    on_error: continue
    params:
      roleName: '{{ item.roleListRoleName }}'
  emit:
    as: item
    items_for: '{{ response.roleCredentials }}'
checks: []
