version: '1.0'
provider: aws
service: s3outposts
services:
  client: s3outposts
  module: boto3.client
discovery:
- discovery_id: aws.s3outposts.list_endpoints
  calls:
  - action: list_endpoints
    save_as: response
    on_error: continue
    params:
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.Endpoints }}'
- discovery_id: aws.s3outposts.list_outposts_with_s3
  calls:
  - action: list_outposts_with_s3
    save_as: response
    on_error: continue
    params:
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.Outposts }}'
checks: []
