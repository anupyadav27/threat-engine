version: '1.0'
provider: aws
service: pinpoint-sms-voice
services:
  client: pinpoint-sms-voice
  module: boto3.client
discovery:
- discovery_id: aws.pinpoint-sms-voice.get_configuration_set_event_destinations
  calls:
  - action: get_configuration_set_event_destinations
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.EventDestinations }}'
checks: []
