version: '1.0'
provider: aws
service: timestream
services:
  client: timestream
  module: boto3.client
discovery:
- discovery_id: aws.timestream.describe_endpoints
  calls:
  - action: describe_endpoints
    save_as: response
    on_error: continue
    params:
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.Endpoints }}'
- discovery_id: aws.timestream.describe_account_settings
  calls:
  - action: describe_account_settings
    save_as: response
    on_error: continue
    params:
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.QueryCompute }}'
checks: []
