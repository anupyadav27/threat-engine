version: '1.0'
provider: aws
service: connect-contact-lens
services:
  client: connect-contact-lens
  module: boto3.client
discovery:
- discovery_id: aws.connect-contact-lens.list_realtime_contact_analysis_segments
  calls:
  - action: list_realtime_contact_analysis_segments
    save_as: response
    on_error: continue
    params:
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.Segments }}'
checks: []
