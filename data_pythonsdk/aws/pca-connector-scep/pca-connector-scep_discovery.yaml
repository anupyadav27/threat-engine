version: '1.0'
provider: aws
service: pca-connector-scep
services:
  client: pca-connector-scep
  module: boto3.client
discovery:
- discovery_id: aws.pca-connector-scep.list_connectors
  calls:
  - action: list_connectors
    save_as: response
    on_error: continue
    params:
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.Connectors }}'
- discovery_id: aws.pca-connector-scep.get_connector
  for_each: aws.pca-connector-scep.list_connectors
  calls:
  - action: get_connector
    save_as: response
    on_error: continue
    params:
      ConnectorArn: '{{ item.connectorArn }}'
  emit:
    as: item
    items_for: '{{ response.Connector }}'
- discovery_id: aws.pca-connector-scep.get_challenge_metadata
  calls:
  - action: get_challenge_metadata
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.ChallengeMetadata }}'
checks: []
