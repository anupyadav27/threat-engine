version: '1.0'
provider: aws
service: networkfirewall
services:
  client: networkfirewall
  module: boto3.client
discovery:
- discovery_id: aws.networkfirewall.describe_rule_group_metadata
  calls:
  - action: describe_rule_group_metadata
    save_as: response
    on_error: continue
    params:
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.StatefulRuleOptions }}'
- discovery_id: aws.networkfirewall.describe_firewall
  calls:
  - action: describe_firewall
    save_as: response
    on_error: continue
    params:
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.Firewall }}'
- discovery_id: aws.networkfirewall.describe_rule_group_summary
  calls:
  - action: describe_rule_group_summary
    save_as: response
    on_error: continue
    params:
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.Summary }}'
- discovery_id: aws.networkfirewall.describe_logging_configuration
  calls:
  - action: describe_logging_configuration
    save_as: response
    on_error: continue
    params:
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.LoggingConfiguration }}'
- discovery_id: aws.networkfirewall.describe_proxy
  calls:
  - action: describe_proxy
    save_as: response
    on_error: continue
    params:
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.Proxy }}'
- discovery_id: aws.networkfirewall.describe_proxy_rule_group
  calls:
  - action: describe_proxy_rule_group
    save_as: response
    on_error: continue
    params:
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.ProxyRuleGroup }}'
- discovery_id: aws.networkfirewall.describe_rule_group
  calls:
  - action: describe_rule_group
    save_as: response
    on_error: continue
    params:
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.RuleGroup }}'
- discovery_id: aws.networkfirewall.describe_tls_inspection_configuration
  calls:
  - action: describe_tls_inspection_configuration
    save_as: response
    on_error: continue
    params:
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.TLSInspectionConfiguration }}'
- discovery_id: aws.networkfirewall.list_analysis_reports
  calls:
  - action: list_analysis_reports
    save_as: response
    on_error: continue
    params:
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.AnalysisReports }}'
- discovery_id: aws.networkfirewall.describe_firewall_policy
  calls:
  - action: describe_firewall_policy
    save_as: response
    on_error: continue
    params:
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.FirewallPolicyResponse }}'
- discovery_id: aws.networkfirewall.describe_proxy_configuration
  calls:
  - action: describe_proxy_configuration
    save_as: response
    on_error: continue
    params:
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.ProxyConfiguration }}'
- discovery_id: aws.networkfirewall.describe_resource_policy
  calls:
  - action: describe_resource_policy
    save_as: response
    on_error: continue
    params:
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.Policy }}'
checks: []
