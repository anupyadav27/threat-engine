version: '1.0'
provider: aws
service: mq
services:
  client: mq
  module: boto3.client
discovery:
- discovery_id: aws.mq.list_configurations
  calls:
  - action: list_configurations
    save_as: response
    on_error: continue
    params:
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.Configurations }}'
- discovery_id: aws.mq.list_brokers
  calls:
  - action: list_brokers
    save_as: response
    on_error: continue
    params:
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.BrokerSummaries }}'
- discovery_id: aws.mq.describe_broker_instance_options
  calls:
  - action: describe_broker_instance_options
    save_as: response
    on_error: continue
    params:
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.BrokerInstanceOptions }}'
- discovery_id: aws.mq.describe_broker_engine_types
  calls:
  - action: describe_broker_engine_types
    save_as: response
    on_error: continue
    params:
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.BrokerEngineTypes }}'
- discovery_id: aws.mq.describe_broker
  for_each: aws.mq.list_brokers
  calls:
  - action: describe_broker
    save_as: response
    on_error: continue
    params:
      BrokerId: '{{ item.brokerSummaryBrokerId }}'
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.PendingSecurityGroups }}'
- discovery_id: aws.mq.list_users
  for_each: aws.mq.list_brokers
  calls:
  - action: list_users
    save_as: response
    on_error: continue
    params:
      BrokerId: '{{ item.brokerSummaryBrokerId }}'
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.Users }}'
- discovery_id: aws.mq.describe_user
  for_each: aws.mq.list_brokers
  calls:
  - action: describe_user
    save_as: response
    on_error: continue
    params:
      Username: '{{ item.userUsername }}'
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.Groups }}'
- discovery_id: aws.mq.describe_configuration
  for_each: aws.mq.list_configurations
  calls:
  - action: describe_configuration
    save_as: response
    on_error: continue
    params:
      ConfigurationId: '{{ item.configurationId }}'
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.LatestRevision }}'
- discovery_id: aws.mq.describe_configuration_revision
  for_each: aws.mq.list_configurations
  calls:
  - action: describe_configuration_revision
    save_as: response
    on_error: continue
    params:
      ConfigurationId: '{{ item.configurationId }}'
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.ConfigurationId }}'
checks: []
