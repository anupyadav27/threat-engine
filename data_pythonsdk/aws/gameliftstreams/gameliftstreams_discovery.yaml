version: '1.0'
provider: aws
service: gameliftstreams
services:
  client: gameliftstreams
  module: boto3.client
discovery:
- discovery_id: aws.gameliftstreams.list_stream_groups
  calls:
  - action: list_stream_groups
    save_as: response
    on_error: continue
    params:
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.Items }}'
- discovery_id: aws.gameliftstreams.list_stream_sessions_by_account
  calls:
  - action: list_stream_sessions_by_account
    save_as: response
    on_error: continue
    params:
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.Items }}'
- discovery_id: aws.gameliftstreams.list_applications
  calls:
  - action: list_applications
    save_as: response
    on_error: continue
    params:
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.Items }}'
- discovery_id: aws.gameliftstreams.get_stream_group
  calls:
  - action: get_stream_group
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.LocationStates }}'
checks: []
