version: '1.0'
provider: aws
service: route53resolver
services:
  client: route53resolver
  module: boto3.client
discovery:
- discovery_id: aws.route53resolver.list_resolver_endpoints
  calls:
  - action: list_resolver_endpoints
    save_as: response
    on_error: continue
    params:
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.ResolverEndpoints }}'
- discovery_id: aws.route53resolver.list_resolver_rules
  calls:
  - action: list_resolver_rules
    save_as: response
    on_error: continue
    params:
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.ResolverRules }}'
- discovery_id: aws.route53resolver.list_firewall_rule_group_associations
  calls:
  - action: list_firewall_rule_group_associations
    save_as: response
    on_error: continue
    params:
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.FirewallRuleGroupAssociations }}'
- discovery_id: aws.route53resolver.list_outpost_resolvers
  calls:
  - action: list_outpost_resolvers
    save_as: response
    on_error: continue
    params:
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.OutpostResolvers }}'
- discovery_id: aws.route53resolver.list_resolver_query_log_configs
  calls:
  - action: list_resolver_query_log_configs
    save_as: response
    on_error: continue
    params:
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.ResolverQueryLogConfigs }}'
- discovery_id: aws.route53resolver.list_resolver_query_log_config_associations
  calls:
  - action: list_resolver_query_log_config_associations
    save_as: response
    on_error: continue
    params:
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.ResolverQueryLogConfigAssociations }}'
- discovery_id: aws.route53resolver.list_resolver_rule_associations
  calls:
  - action: list_resolver_rule_associations
    save_as: response
    on_error: continue
    params:
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.ResolverRuleAssociations }}'
- discovery_id: aws.route53resolver.list_firewall_configs
  calls:
  - action: list_firewall_configs
    save_as: response
    on_error: continue
    params:
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.FirewallConfigs }}'
- discovery_id: aws.route53resolver.list_resolver_configs
  calls:
  - action: list_resolver_configs
    save_as: response
    on_error: continue
    params:
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.ResolverConfigs }}'
- discovery_id: aws.route53resolver.list_resolver_dnssec_configs
  calls:
  - action: list_resolver_dnssec_configs
    save_as: response
    on_error: continue
    params:
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.ResolverDnssecConfigs }}'
- discovery_id: aws.route53resolver.list_firewall_rules
  for_each: aws.route53resolver.list_firewall_rule_group_associations
  calls:
  - action: list_firewall_rules
    save_as: response
    on_error: continue
    params:
      FirewallRuleGroupId: '{{ item.firewallRuleGroupAssociationFirewallRuleGroupId }}'
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.FirewallRules }}'
- discovery_id: aws.route53resolver.list_resolver_endpoint_ip_addresses
  for_each: aws.route53resolver.list_resolver_rules
  calls:
  - action: list_resolver_endpoint_ip_addresses
    save_as: response
    on_error: continue
    params:
      ResolverEndpointId: '{{ item.resolverRulResolverEndpointId }}'
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.IpAddresses }}'
- discovery_id: aws.route53resolver.list_tags_for_resource
  calls:
  - action: list_tags_for_resource
    save_as: response
    on_error: continue
    params:
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.Tags }}'
- discovery_id: aws.route53resolver.get_firewall_rule_group
  for_each: aws.route53resolver.list_firewall_rule_group_associations
  calls:
  - action: get_firewall_rule_group
    save_as: response
    on_error: continue
    params:
      FirewallRuleGroupId: '{{ item.firewallRuleGroupAssociationFirewallRuleGroupId }}'
  emit:
    as: item
    items_for: '{{ response.FirewallRuleGroup }}'
- discovery_id: aws.route53resolver.get_firewall_domain_list
  for_each: aws.route53resolver.list_firewall_rules
  calls:
  - action: get_firewall_domain_list
    save_as: response
    on_error: continue
    params:
      FirewallDomainListId: '{{ item.firewallRulFirewallDomainListId }}'
  emit:
    as: item
    items_for: '{{ response.FirewallDomainList }}'
- discovery_id: aws.route53resolver.get_resolver_dnssec_config
  for_each: aws.route53resolver.list_resolver_query_log_config_associations
  calls:
  - action: get_resolver_dnssec_config
    save_as: response
    on_error: continue
    params:
      ResourceId: '{{ item.firewallConfigResourceId }}'
  emit:
    as: item
    items_for: '{{ response.ResolverDNSSECConfig }}'
- discovery_id: aws.route53resolver.get_resolver_config
  for_each: aws.route53resolver.list_resolver_query_log_config_associations
  calls:
  - action: get_resolver_config
    save_as: response
    on_error: continue
    params:
      ResourceId: '{{ item.firewallConfigResourceId }}'
  emit:
    as: item
    items_for: '{{ response.ResolverConfig }}'
- discovery_id: aws.route53resolver.get_firewall_config
  for_each: aws.route53resolver.list_resolver_query_log_config_associations
  calls:
  - action: get_firewall_config
    save_as: response
    on_error: continue
    params:
      ResourceId: '{{ item.firewallConfigResourceId }}'
  emit:
    as: item
    items_for: '{{ response.FirewallConfig }}'
checks: []
