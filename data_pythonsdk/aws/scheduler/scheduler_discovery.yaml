version: '1.0'
provider: aws
service: scheduler
services:
  client: scheduler
  module: boto3.client
discovery:
- discovery_id: aws.scheduler.list_schedules
  calls:
  - action: list_schedules
    save_as: response
    on_error: continue
    params:
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.Schedules }}'
- discovery_id: aws.scheduler.get_schedule
  for_each: aws.scheduler.list_schedules
  calls:
  - action: get_schedule
    save_as: response
    on_error: continue
    params:
      Name: '{{ item.scheduleGroupName }}'
  emit:
    as: item
    items_for: '{{ response.FlexibleTimeWindow }}'
- discovery_id: aws.scheduler.list_tags_for_resource
  calls:
  - action: list_tags_for_resource
    save_as: response
    on_error: continue
    params:
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.Tags }}'
checks: []
