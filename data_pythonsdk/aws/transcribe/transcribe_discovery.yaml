version: '1.0'
provider: aws
service: transcribe
services:
  client: transcribe
  module: boto3.client
discovery:
- discovery_id: aws.transcribe.list_transcription_jobs
  calls:
  - action: list_transcription_jobs
    save_as: response
    on_error: continue
    params:
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.TranscriptionJobSummaries }}'
- discovery_id: aws.transcribe.list_medical_transcription_jobs
  calls:
  - action: list_medical_transcription_jobs
    save_as: response
    on_error: continue
    params:
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.MedicalTranscriptionJobSummaries }}'
- discovery_id: aws.transcribe.list_language_models
  calls:
  - action: list_language_models
    save_as: response
    on_error: continue
    params:
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.Models }}'
- discovery_id: aws.transcribe.list_call_analytics_jobs
  calls:
  - action: list_call_analytics_jobs
    save_as: response
    on_error: continue
    params:
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.CallAnalyticsJobSummaries }}'
- discovery_id: aws.transcribe.list_medical_scribe_jobs
  calls:
  - action: list_medical_scribe_jobs
    save_as: response
    on_error: continue
    params:
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.MedicalScribeJobSummaries }}'
- discovery_id: aws.transcribe.list_call_analytics_categories
  calls:
  - action: list_call_analytics_categories
    save_as: response
    on_error: continue
    params:
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.Categories }}'
- discovery_id: aws.transcribe.list_vocabularies
  calls:
  - action: list_vocabularies
    save_as: response
    on_error: continue
    params:
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.Vocabularies }}'
- discovery_id: aws.transcribe.list_vocabulary_filters
  calls:
  - action: list_vocabulary_filters
    save_as: response
    on_error: continue
    params:
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.VocabularyFilters }}'
- discovery_id: aws.transcribe.get_transcription_job
  for_each: aws.transcribe.list_transcription_jobs
  calls:
  - action: get_transcription_job
    save_as: response
    on_error: continue
    params:
      TranscriptionJobName: '{{ item.transcriptionJobSummaryTranscriptionJobName }}'
  emit:
    as: item
    items_for: '{{ response.TranscriptionJob }}'
- discovery_id: aws.transcribe.get_medical_scribe_job
  for_each: aws.transcribe.list_medical_scribe_jobs
  calls:
  - action: get_medical_scribe_job
    save_as: response
    on_error: continue
    params:
      MedicalScribeJobName: '{{ item.medicalScribeJobSummaryMedicalScribeJobName }}'
  emit:
    as: item
    items_for: '{{ response.MedicalScribeJob }}'
- discovery_id: aws.transcribe.list_tags_for_resource
  calls:
  - action: list_tags_for_resource
    save_as: response
    on_error: continue
    params:
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.Tags }}'
- discovery_id: aws.transcribe.get_call_analytics_job
  for_each: aws.transcribe.list_call_analytics_jobs
  calls:
  - action: get_call_analytics_job
    save_as: response
    on_error: continue
    params:
      CallAnalyticsJobName: '{{ item.callAnalyticsJobSummaryCallAnalyticsJobName }}'
  emit:
    as: item
    items_for: '{{ response.CallAnalyticsJob }}'
- discovery_id: aws.transcribe.get_call_analytics_category
  for_each: aws.transcribe.list_call_analytics_categories
  calls:
  - action: get_call_analytics_category
    save_as: response
    on_error: continue
    params:
      CategoryName: '{{ item.categoryCategoryName }}'
  emit:
    as: item
    items_for: '{{ response.CategoryProperties }}'
checks: []
