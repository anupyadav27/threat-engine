version: '1.0'
provider: aws
service: devops-guru
services:
  client: devops-guru
  module: boto3.client
discovery:
- discovery_id: aws.devops-guru.get_cost_estimation
  calls:
  - action: get_cost_estimation
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.Costs }}'
- discovery_id: aws.devops-guru.list_monitored_resources
  calls:
  - action: list_monitored_resources
    save_as: response
    on_error: continue
    params:
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.MonitoredResourceIdentifiers }}'
- discovery_id: aws.devops-guru.describe_service_integration
  calls:
  - action: describe_service_integration
    save_as: response
    on_error: continue
    params:
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.ServiceIntegration }}'
- discovery_id: aws.devops-guru.describe_account_health
  calls:
  - action: describe_account_health
    save_as: response
    on_error: continue
    params:
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.OpenReactiveInsights }}'
- discovery_id: aws.devops-guru.describe_feedback
  calls:
  - action: describe_feedback
    save_as: response
    on_error: continue
    params:
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.InsightFeedback }}'
- discovery_id: aws.devops-guru.list_notification_channels
  calls:
