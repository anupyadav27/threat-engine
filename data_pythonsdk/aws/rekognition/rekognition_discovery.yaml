version: '1.0'
provider: aws
service: rekognition
services:
  client: rekognition
  module: boto3.client
discovery:
- discovery_id: aws.rekognition.list_media_analysis_jobs
  calls:
  - action: list_media_analysis_jobs
    save_as: response
    on_error: continue
    params:
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.MediaAnalysisJobs }}'
- discovery_id: aws.rekognition.describe_projects
  calls:
  - action: describe_projects
    save_as: response
    on_error: continue
    params:
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.ProjectDescriptions }}'
- discovery_id: aws.rekognition.list_stream_processors
  calls:
  - action: list_stream_processors
    save_as: response
    on_error: continue
    params:
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.StreamProcessors }}'
- discovery_id: aws.rekognition.describe_project_versions
  for_each: aws.rekognition.describe_projects
  calls:
  - action: describe_project_versions
    save_as: response
    on_error: continue
    params:
      ProjectArn: '{{ item.projectDescriptionProjectArn }}'
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.ProjectVersionDescriptions }}'
- discovery_id: aws.rekognition.get_segment_detection
  for_each: aws.rekognition.list_media_analysis_jobs
  calls:
  - action: get_segment_detection
    save_as: response
    on_error: continue
    params:
      JobId: '{{ item.mediaAnalysisJobJobId }}'
  emit:
    as: item
    items_for: '{{ response.VideoMetadata }}'
- discovery_id: aws.rekognition.list_faces
  calls:
  - action: list_faces
    save_as: response
    on_error: continue
    params:
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.Faces }}'
- discovery_id: aws.rekognition.get_content_moderation
  for_each: aws.rekognition.list_media_analysis_jobs
  calls:
  - action: get_content_moderation
    save_as: response
    on_error: continue
    params:
      JobId: '{{ item.mediaAnalysisJobJobId }}'
  emit:
    as: item
    items_for: '{{ response.ModerationLabels }}'
- discovery_id: aws.rekognition.list_project_policies
  for_each: aws.rekognition.describe_projects
  calls:
  - action: list_project_policies
    save_as: response
    on_error: continue
    params:
      ProjectArn: '{{ item.projectDescriptionProjectArn }}'
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.ProjectPolicies }}'
- discovery_id: aws.rekognition.get_face_search
  for_each: aws.rekognition.list_media_analysis_jobs
  calls:
  - action: get_face_search
    save_as: response
    on_error: continue
    params:
      JobId: '{{ item.mediaAnalysisJobJobId }}'
  emit:
    as: item
    items_for: '{{ response.Persons }}'
- discovery_id: aws.rekognition.get_face_liveness_session_results
  calls:
  - action: get_face_liveness_session_results
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.AuditImages }}'
- discovery_id: aws.rekognition.get_label_detection
  for_each: aws.rekognition.list_media_analysis_jobs
  calls:
  - action: get_label_detection
    save_as: response
    on_error: continue
    params:
      JobId: '{{ item.mediaAnalysisJobJobId }}'
  emit:
    as: item
    items_for: '{{ response.Labels }}'
- discovery_id: aws.rekognition.get_celebrity_recognition
  for_each: aws.rekognition.list_media_analysis_jobs
  calls:
  - action: get_celebrity_recognition
    save_as: response
    on_error: continue
    params:
      JobId: '{{ item.mediaAnalysisJobJobId }}'
  emit:
    as: item
    items_for: '{{ response.Celebrities }}'
- discovery_id: aws.rekognition.get_text_detection
  for_each: aws.rekognition.list_media_analysis_jobs
  calls:
  - action: get_text_detection
    save_as: response
    on_error: continue
    params:
      JobId: '{{ item.mediaAnalysisJobJobId }}'
  emit:
    as: item
    items_for: '{{ response.TextDetections }}'
- discovery_id: aws.rekognition.describe_dataset
  calls:
  - action: describe_dataset
    save_as: response
    on_error: continue
    params:
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.DatasetDescription }}'
- discovery_id: aws.rekognition.list_dataset_labels
  calls:
  - action: list_dataset_labels
    save_as: response
    on_error: continue
    params:
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.DatasetLabelDescriptions }}'
- discovery_id: aws.rekognition.get_media_analysis_job
  for_each: aws.rekognition.list_media_analysis_jobs
  calls:
  - action: get_media_analysis_job
    save_as: response
    on_error: continue
    params:
      JobId: '{{ item.mediaAnalysisJobJobId }}'
  emit:
    as: item
    items_for: '{{ response.OperationsConfig }}'
- discovery_id: aws.rekognition.describe_stream_processor
  for_each: aws.rekognition.list_stream_processors
  calls:
  - action: describe_stream_processor
    save_as: response
    on_error: continue
    params:
      Name: '{{ item.streamProcessorName }}'
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.RegionsOfInterest }}'
- discovery_id: aws.rekognition.list_users
  calls:
  - action: list_users
    save_as: response
    on_error: continue
    params:
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.Users }}'
- discovery_id: aws.rekognition.get_celebrity_info
  calls:
  - action: get_celebrity_info
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.Urls }}'
checks: []
