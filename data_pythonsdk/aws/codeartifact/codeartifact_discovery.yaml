version: '1.0'
provider: aws
service: codeartifact
services:
  client: codeartifact
  module: boto3.client
discovery:
- discovery_id: aws.codeartifact.list_repositories
  calls:
  - action: list_repositories
    save_as: response
    on_error: continue
    params:
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.repositories }}'
- discovery_id: aws.codeartifact.list_domains
  calls:
  - action: list_domains
    save_as: response
    on_error: continue
    params:
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.domains }}'
checks: []
