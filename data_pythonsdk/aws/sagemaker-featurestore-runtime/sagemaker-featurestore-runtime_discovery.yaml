version: '1.0'
provider: aws
service: sagemaker-featurestore-runtime
services:
  client: sagemaker-featurestore-runtime
  module: boto3.client
discovery:
- discovery_id: aws.sagemaker-featurestore-runtime.get_record
  calls:
  - action: get_record
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.Record }}'
checks: []
