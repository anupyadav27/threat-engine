version: '1.0'
provider: aws
service: accessanalyzer
services:
  client: accessanalyzer
  module: boto3.client
discovery:
- discovery_id: aws.accessanalyzer.list_analyzers
  calls:
  - action: list_analyzers
    save_as: response
    on_error: continue
    params:
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.analyzers }}'
    item:
      arn: '{{ item.arn }}'
      configuration: '{{ item.configuration }}'
      createdAt: '{{ item.createdAt }}'
      lastResourceAnalyzed: '{{ item.lastResourceAnalyzed }}'
      lastResourceAnalyzedAt: '{{ item.lastResourceAnalyzedAt }}'
      name: '{{ item.name }}'
      status: '{{ item.status }}'
      statusReason: '{{ item.statusReason }}'
      tags: '{{ item.tags }}'
      type: '{{ item.type }}'
- discovery_id: aws.accessanalyzer.list_policy_generations
  calls:
  - action: list_policy_generations
    save_as: response
    on_error: continue
    params:
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.policyGenerations }}'
    item:
      completedOn: '{{ item.completedOn }}'
      jobId: '{{ item.jobId }}'
      principalArn: '{{ item.principalArn }}'
      startedOn: '{{ item.startedOn }}'
      status: '{{ item.status }}'
- discovery_id: aws.accessanalyzer.list_findings
  for_each: aws.accessanalyzer.list_analyzers
  calls:
  - action: list_findings
    save_as: response
    on_error: continue
    params:
      analyzerArn: '{{ item.arn }}'
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.findings }}'
    item:
      action: '{{ item.action }}'
      analyzedAt: '{{ item.analyzedAt }}'
      condition: '{{ item.condition }}'
      createdAt: '{{ item.createdAt }}'
      error: '{{ item.error }}'
      id: '{{ item.id }}'
      isPublic: '{{ item.isPublic }}'
      principal: '{{ item.principal }}'
      resource: '{{ item.resource }}'
      resourceControlPolicyRestriction: '{{ item.resourceControlPolicyRestriction }}'
      resourceOwnerAccount: '{{ item.resourceOwnerAccount }}'
      resourceType: '{{ item.resourceType }}'
      sources: '{{ item.sources }}'
      status: '{{ item.status }}'
      updatedAt: '{{ item.updatedAt }}'
- discovery_id: aws.accessanalyzer.get_finding_v2
  for_each: aws.accessanalyzer.list_findings
  calls:
  - action: get_finding_v2
    save_as: response
    on_error: continue
    params:
      id: '{{ item.id }}'
      analyzerArn: '{{ item.arn }}'
  emit:
    as: item
    items_for: '{{ response.findingDetails }}'
    item:
      externalAccessDetails: '{{ item.externalAccessDetails }}'
      internalAccessDetails: '{{ item.internalAccessDetails }}'
      unusedIamRoleDetails: '{{ item.unusedIamRoleDetails }}'
      unusedIamUserAccessKeyDetails: '{{ item.unusedIamUserAccessKeyDetails }}'
      unusedIamUserPasswordDetails: '{{ item.unusedIamUserPasswordDetails }}'
      unusedPermissionDetails: '{{ item.unusedPermissionDetails }}'
- discovery_id: aws.accessanalyzer.list_access_preview_findings
  for_each: aws.accessanalyzer.list_findings
  calls:
  - action: list_access_preview_findings
    save_as: response
    on_error: continue
    params:
      accessPreviewId: '{{ item.id }}'
      analyzerArn: '{{ item.arn }}'
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.findings }}'
    item:
      action: '{{ item.action }}'
      changeType: '{{ item.changeType }}'
      condition: '{{ item.condition }}'
      createdAt: '{{ item.createdAt }}'
      error: '{{ item.error }}'
      existingFindingId: '{{ item.existingFindingId }}'
      existingFindingStatus: '{{ item.existingFindingStatus }}'
      id: '{{ item.id }}'
      isPublic: '{{ item.isPublic }}'
      principal: '{{ item.principal }}'
      resource: '{{ item.resource }}'
      resourceControlPolicyRestriction: '{{ item.resourceControlPolicyRestriction }}'
      resourceOwnerAccount: '{{ item.resourceOwnerAccount }}'
      resourceType: '{{ item.resourceType }}'
      sources: '{{ item.sources }}'
      status: '{{ item.status }}'
- discovery_id: aws.accessanalyzer.get_access_preview
  for_each: aws.accessanalyzer.list_findings
  calls:
  - action: get_access_preview
    save_as: response
    on_error: continue
    params:
      accessPreviewId: '{{ item.id }}'
      analyzerArn: '{{ item.arn }}'
  emit:
    as: item
    items_for: '{{ response.accessPreview }}'
    item:
      analyzerArn: '{{ item.analyzerArn }}'
      configurations: '{{ item.configurations }}'
      createdAt: '{{ item.createdAt }}'
      id: '{{ item.id }}'
      status: '{{ item.status }}'
      statusReason: '{{ item.statusReason }}'
- discovery_id: aws.accessanalyzer.get_finding_recommendation
  for_each: aws.accessanalyzer.list_findings
  calls:
  - action: get_finding_recommendation
    save_as: response
    on_error: continue
    params:
      id: '{{ item.id }}'
      analyzerArn: '{{ item.arn }}'
  emit:
    as: item
    items_for: '{{ response.recommendedSteps }}'
    item:
      unusedPermissionsRecommendedStep: '{{ item.unusedPermissionsRecommendedStep }}'
- discovery_id: aws.accessanalyzer.get_findings_statistics
  for_each: aws.accessanalyzer.list_analyzers
  calls:
  - action: get_findings_statistics
    save_as: response
    on_error: continue
    params:
      analyzerArn: '{{ item.arn }}'
  emit:
    as: item
    items_for: '{{ response.findingsStatistics }}'
    item:
      externalAccessFindingsStatistics: '{{ item.externalAccessFindingsStatistics }}'
      internalAccessFindingsStatistics: '{{ item.internalAccessFindingsStatistics }}'
      unusedAccessFindingsStatistics: '{{ item.unusedAccessFindingsStatistics }}'
- discovery_id: aws.accessanalyzer.get_analyzed_resource
  for_each: aws.accessanalyzer.list_analyzers
  calls:
  - action: get_analyzed_resource
    save_as: response
    on_error: continue
    params:
      analyzerArn: '{{ item.resource }}'
  emit:
    as: item
    items_for: '{{ response.resource }}'
    item:
      actions: '{{ item.actions }}'
      analyzedAt: '{{ item.analyzedAt }}'
      createdAt: '{{ item.createdAt }}'
      error: '{{ item.error }}'
      isPublic: '{{ item.isPublic }}'
      resourceArn: '{{ item.resourceArn }}'
      resourceOwnerAccount: '{{ item.resourceOwnerAccount }}'
      resourceType: '{{ item.resourceType }}'
      sharedVia: '{{ item.sharedVia }}'
      status: '{{ item.status }}'
      updatedAt: '{{ item.updatedAt }}'
- discovery_id: aws.accessanalyzer.get_generated_policy
  for_each: aws.accessanalyzer.list_policy_generations
  calls:
  - action: get_generated_policy
    save_as: response
    on_error: continue
    params:
      jobId: '{{ item.jobId }}'
  emit:
    as: item
    items_for: '{{ response.jobDetails }}'
    item:
      completedOn: '{{ item.completedOn }}'
      jobError: '{{ item.jobError }}'
      jobId: '{{ item.jobId }}'
      startedOn: '{{ item.startedOn }}'
      status: '{{ item.status }}'
- discovery_id: aws.accessanalyzer.list_archive_rules
  for_each: aws.accessanalyzer.list_analyzers
  calls:
  - action: list_archive_rules
    save_as: response
    on_error: continue
    params:
      analyzerName: '{{ item.name }}'
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.archiveRules }}'
    item:
      createdAt: '{{ item.createdAt }}'
      filter: '{{ item.filter }}'
      ruleName: '{{ item.ruleName }}'
      updatedAt: '{{ item.updatedAt }}'
- discovery_id: aws.accessanalyzer.get_finding
  for_each: aws.accessanalyzer.list_findings
  calls:
  - action: get_finding
    save_as: response
    on_error: continue
    params:
      id: '{{ item.id }}'
      analyzerArn: '{{ item.arn }}'
  emit:
    as: item
    items_for: '{{ response.finding }}'
    item:
      action: '{{ item.action }}'
      analyzedAt: '{{ item.analyzedAt }}'
      condition: '{{ item.condition }}'
      createdAt: '{{ item.createdAt }}'
      error: '{{ item.error }}'
      id: '{{ item.id }}'
      isPublic: '{{ item.isPublic }}'
      principal: '{{ item.principal }}'
      resource: '{{ item.resource }}'
      resourceControlPolicyRestriction: '{{ item.resourceControlPolicyRestriction }}'
      resourceOwnerAccount: '{{ item.resourceOwnerAccount }}'
      resourceType: '{{ item.resourceType }}'
      sources: '{{ item.sources }}'
      status: '{{ item.status }}'
      updatedAt: '{{ item.updatedAt }}'
- discovery_id: aws.accessanalyzer.get_analyzer
  for_each: aws.accessanalyzer.list_analyzers
  calls:
  - action: get_analyzer
    save_as: response
    on_error: continue
    params:
      analyzerName: '{{ item.name }}'
  emit:
    as: item
    items_for: '{{ response.analyzer }}'
    item:
      arn: '{{ item.arn }}'
      configuration: '{{ item.configuration }}'
      createdAt: '{{ item.createdAt }}'
      lastResourceAnalyzed: '{{ item.lastResourceAnalyzed }}'
      lastResourceAnalyzedAt: '{{ item.lastResourceAnalyzedAt }}'
      name: '{{ item.name }}'
      status: '{{ item.status }}'
      statusReason: '{{ item.statusReason }}'
      tags: '{{ item.tags }}'
      type: '{{ item.type }}'
- discovery_id: aws.accessanalyzer.get_archive_rule
  for_each: aws.accessanalyzer.list_analyzers
  calls:
  - action: get_archive_rule
    save_as: response
    on_error: continue
    params:
      analyzerName: '{{ item.name }}'
      ruleName: '{{ item.ruleName }}'
  emit:
    as: item
    items_for: '{{ response.archiveRule }}'
    item:
      createdAt: '{{ item.createdAt }}'
      filter: '{{ item.filter }}'
      ruleName: '{{ item.ruleName }}'
      updatedAt: '{{ item.updatedAt }}'
checks: []
