version: '1.0'
provider: aws
service: waf
services:
  client: waf
  module: boto3.client
discovery:
- discovery_id: aws.waf.list_activated_rules_in_rule_group
  calls:
  - action: list_activated_rules_in_rule_group
    save_as: response
    on_error: continue
    params:
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.ActivatedRules }}'
- discovery_id: aws.waf.list_logging_configurations
  calls:
  - action: list_logging_configurations
    save_as: response
    on_error: continue
    params:
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.LoggingConfigurations }}'
- discovery_id: aws.waf.list_subscribed_rule_groups
  calls:
  - action: list_subscribed_rule_groups
    save_as: response
    on_error: continue
    params:
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.RuleGroups }}'
- discovery_id: aws.waf.list_rules
  calls:
  - action: list_rules
    save_as: response
    on_error: continue
    params:
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.Rules }}'
- discovery_id: aws.waf.list_ip_sets
  calls:
  - action: list_ip_sets
    save_as: response
    on_error: continue
    params:
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.IPSets }}'
- discovery_id: aws.waf.list_sql_injection_match_sets
  calls:
  - action: list_sql_injection_match_sets
    save_as: response
    on_error: continue
    params:
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.SqlInjectionMatchSets }}'
- discovery_id: aws.waf.list_geo_match_sets
  calls:
  - action: list_geo_match_sets
    save_as: response
    on_error: continue
    params:
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.GeoMatchSets }}'
- discovery_id: aws.waf.list_regex_match_sets
  calls:
  - action: list_regex_match_sets
    save_as: response
    on_error: continue
    params:
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.RegexMatchSets }}'
- discovery_id: aws.waf.list_regex_pattern_sets
  calls:
  - action: list_regex_pattern_sets
    save_as: response
    on_error: continue
    params:
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.RegexPatternSets }}'
- discovery_id: aws.waf.list_size_constraint_sets
  calls:
  - action: list_size_constraint_sets
    save_as: response
    on_error: continue
    params:
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.SizeConstraintSets }}'
- discovery_id: aws.waf.list_xss_match_sets
  calls:
  - action: list_xss_match_sets
    save_as: response
    on_error: continue
    params:
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.XssMatchSets }}'
- discovery_id: aws.waf.list_byte_match_sets
  calls:
  - action: list_byte_match_sets
    save_as: response
    on_error: continue
    params:
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.ByteMatchSets }}'
- discovery_id: aws.waf.list_web_ac_ls
  calls:
  - action: list_web_ac_ls
    save_as: response
    on_error: continue
    params:
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.WebACLs }}'
- discovery_id: aws.waf.get_change_token
  calls:
  - action: get_change_token
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.ChangeToken }}'
- discovery_id: aws.waf.get_sampled_requests
  for_each: aws.waf.list_activated_rules_in_rule_group
  calls:
  - action: get_sampled_requests
    save_as: response
    on_error: continue
    params:
      WebAclId: '{{ item.webAclWebAclId }}'
  emit:
    as: item
    items_for: '{{ response.SampledRequests }}'
- discovery_id: aws.waf.get_rate_based_rule
  for_each: aws.waf.list_activated_rules_in_rule_group
  calls:
  - action: get_rate_based_rule
    save_as: response
    on_error: continue
    params:
      RuleId: '{{ item.activatedRulRuleId }}'
  emit:
    as: item
    items_for: '{{ response.Rule }}'
- discovery_id: aws.waf.get_web_acl
  for_each: aws.waf.list_web_ac_ls
  calls:
  - action: get_web_acl
    save_as: response
    on_error: continue
    params:
      WebACLId: '{{ item.webAclWebAclId }}'
  emit:
    as: item
    items_for: '{{ response.WebACL }}'
- discovery_id: aws.waf.get_rule
  for_each: aws.waf.list_activated_rules_in_rule_group
  calls:
  - action: get_rule
    save_as: response
    on_error: continue
    params:
      RuleId: '{{ item.activatedRulRuleId }}'
  emit:
    as: item
    items_for: '{{ response.Rule }}'
- discovery_id: aws.waf.get_size_constraint_set
  for_each: aws.waf.list_size_constraint_sets
  calls:
  - action: get_size_constraint_set
    save_as: response
    on_error: continue
    params:
      SizeConstraintSetId: '{{ item.sizeConstraintSetSizeConstraintSetId }}'
  emit:
    as: item
    items_for: '{{ response.SizeConstraintSet }}'
- discovery_id: aws.waf.get_ip_set
  for_each: aws.waf.list_ip_sets
  calls:
  - action: get_ip_set
    save_as: response
    on_error: continue
    params:
      IPSetId: '{{ item.ipSetIpSetId }}'
  emit:
    as: item
    items_for: '{{ response.IPSet }}'
- discovery_id: aws.waf.get_xss_match_set
  for_each: aws.waf.list_xss_match_sets
  calls:
  - action: get_xss_match_set
    save_as: response
    on_error: continue
    params:
      XssMatchSetId: '{{ item.xssMatchSetXssMatchSetId }}'
  emit:
    as: item
    items_for: '{{ response.XssMatchSet }}'
- discovery_id: aws.waf.get_regex_pattern_set
  for_each: aws.waf.list_regex_pattern_sets
  calls:
  - action: get_regex_pattern_set
    save_as: response
    on_error: continue
    params:
      RegexPatternSetId: '{{ item.regexPatternSetRegexPatternSetId }}'
  emit:
