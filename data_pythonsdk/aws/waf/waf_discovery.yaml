    items_for: '{{ response.ByteMatchSet }}'
- discovery_id: aws.waf.get_sql_injection_match_set
  for_each: aws.waf.list_sql_injection_match_sets
  calls:
  - action: get_sql_injection_match_set
    save_as: response
    on_error: continue
    params:
      SqlInjectionMatchSetId: '{{ item.sqlInjectionMatchSetSqlInjectionMatchSetId }}'
  emit:
    as: item
    items_for: '{{ response.SqlInjectionMatchSet }}'
- discovery_id: aws.waf.get_geo_match_set
  for_each: aws.waf.list_geo_match_sets
  calls:
  - action: get_geo_match_set
    save_as: response
    on_error: continue
    params:
      GeoMatchSetId: '{{ item.geoMatchSetGeoMatchSetId }}'
  emit:
    as: item
    items_for: '{{ response.GeoMatchSet }}'
- discovery_id: aws.waf.get_regex_match_set
  for_each: aws.waf.list_regex_match_sets
  calls:
  - action: get_regex_match_set
    save_as: response
    on_error: continue
    params:
      RegexMatchSetId: '{{ item.regexMatchSetRegexMatchSetId }}'
  emit:
    as: item
    items_for: '{{ response.RegexMatchSet }}'
- discovery_id: aws.waf.get_change_token_status
  for_each: aws.waf.get_change_token
  calls:
  - action: get_change_token_status
    save_as: response
    on_error: continue
    params:
      ChangeToken: '{{ item.changeToken }}'
  emit:
    as: item
    items_for: '{{ response.ChangeTokenStatus }}'
- discovery_id: aws.waf.get_permission_policy
  for_each: aws.waf.list_logging_configurations
  calls:
  - action: get_permission_policy
    save_as: response
    on_error: continue
    params:
      ResourceArn: '{{ item.loggingConfigurationResourceArn }}'
  emit:
    as: item
    items_for: '{{ response.Policy }}'
checks: []
