    items_for: '{{ response.RegexPatternSet }}'
- discovery_id: aws.waf.get_byte_match_set
  for_each: aws.waf.list_byte_match_sets
  calls:
  - action: get_byte_match_set
    save_as: response
    on_error: continue
    params:
