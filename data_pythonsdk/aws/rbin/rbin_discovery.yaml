version: '1.0'
provider: aws
service: rbin
services:
  client: rbin
  module: boto3.client
discovery:
- discovery_id: aws.rbin.list_rules
  calls:
  - action: list_rules
    save_as: response
    on_error: continue
    params:
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.Rules }}'
- discovery_id: aws.rbin.get_rule
  for_each: aws.rbin.list_rules
  calls:
  - action: get_rule
    save_as: response
    on_error: continue
    params:
      Identifier: '{{ item.rulIdentifier }}'
  emit:
    as: item
    items_for: '{{ response.ResourceTags }}'
- discovery_id: aws.rbin.list_tags_for_resource
  calls:
  - action: list_tags_for_resource
    save_as: response
    on_error: continue
    params:
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.Tags }}'
checks: []
