version: '1.0'
provider: aws
service: secretsmanager
services:
  client: secretsmanager
  module: boto3.client
discovery:
- discovery_id: aws.secretsmanager.list_secrets
  calls:
  - action: list_secrets
    save_as: response
    on_error: continue
    params:
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.SecretList }}'
- discovery_id: aws.secretsmanager.get_random_password
  calls:
  - action: get_random_password
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.RandomPassword }}'
- discovery_id: aws.secretsmanager.describe_secret
  calls:
  - action: describe_secret
    save_as: response
    on_error: continue
    params:
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.ExternalSecretRotationMetadata }}'
- discovery_id: aws.secretsmanager.list_secret_version_ids
  calls:
  - action: list_secret_version_ids
    save_as: response
    on_error: continue
    params:
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.Versions }}'
- discovery_id: aws.secretsmanager.get_resource_policy
  calls:
  - action: get_resource_policy
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.ARN }}'
checks: []
