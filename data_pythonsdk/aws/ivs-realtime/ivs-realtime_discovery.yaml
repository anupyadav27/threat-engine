version: '1.0'
provider: aws
service: ivs-realtime
services:
  client: ivs-realtime
  module: boto3.client
discovery:
- discovery_id: aws.ivs-realtime.list_compositions
  calls:
  - action: list_compositions
    save_as: response
    on_error: continue
    params:
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.compositions }}'
- discovery_id: aws.ivs-realtime.list_ingest_configurations
  calls:
  - action: list_ingest_configurations
    save_as: response
    on_error: continue
    params:
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.ingestConfigurations }}'
- discovery_id: aws.ivs-realtime.list_storage_configurations
  calls:
  - action: list_storage_configurations
    save_as: response
    on_error: continue
    params:
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.storageConfigurations }}'
- discovery_id: aws.ivs-realtime.list_stages
  calls:
  - action: list_stages
    save_as: response
    on_error: continue
    params:
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.stages }}'
- discovery_id: aws.ivs-realtime.get_ingest_configuration
  for_each: aws.ivs-realtime.list_compositions
  calls:
  - action: get_ingest_configuration
    save_as: response
    on_error: continue
    params:
      arn: '{{ item.compositionArn }}'
  emit:
    as: item
    items_for: '{{ response.ingestConfiguration }}'
- discovery_id: aws.ivs-realtime.get_composition
  for_each: aws.ivs-realtime.list_compositions
  calls:
  - action: get_composition
    save_as: response
    on_error: continue
    params:
      arn: '{{ item.compositionArn }}'
  emit:
    as: item
    items_for: '{{ response.composition }}'
- discovery_id: aws.ivs-realtime.get_stage
  for_each: aws.ivs-realtime.list_compositions
  calls:
  - action: get_stage
    save_as: response
    on_error: continue
    params:
      arn: '{{ item.compositionArn }}'
  emit:
    as: item
    items_for: '{{ response.stage }}'
- discovery_id: aws.ivs-realtime.get_public_key
  for_each: aws.ivs-realtime.list_compositions
  calls:
  - action: get_public_key
    save_as: response
    on_error: continue
    params:
      arn: '{{ item.compositionArn }}'
  emit:
    as: item
    items_for: '{{ response.publicKey }}'
- discovery_id: aws.ivs-realtime.get_encoder_configuration
  for_each: aws.ivs-realtime.list_compositions
  calls:
  - action: get_encoder_configuration
    save_as: response
    on_error: continue
    params:
      arn: '{{ item.compositionArn }}'
  emit:
    as: item
    items_for: '{{ response.encoderConfiguration }}'
- discovery_id: aws.ivs-realtime.list_stage_sessions
  for_each: aws.ivs-realtime.list_compositions
  calls:
  - action: list_stage_sessions
    save_as: response
    on_error: continue
    params:
      stageArn: '{{ item.compositionStageArn }}'
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.stageSessions }}'
- discovery_id: aws.ivs-realtime.get_participant
  for_each: aws.ivs-realtime.list_compositions
  calls:
  - action: get_participant
    save_as: response
    on_error: continue
    params:
      stageArn: '{{ item.stageSessionSessionId }}'
  emit:
    as: item
    items_for: '{{ response.participant }}'
- discovery_id: aws.ivs-realtime.list_participant_events
  for_each: aws.ivs-realtime.list_compositions
  calls:
  - action: list_participant_events
    save_as: response
    on_error: continue
    params:
      stageArn: '{{ item.stageSessionSessionId }}'
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.events }}'
- discovery_id: aws.ivs-realtime.get_stage_session
  for_each: aws.ivs-realtime.list_compositions
  calls:
  - action: get_stage_session
    save_as: response
    on_error: continue
    params:
      stageArn: '{{ item.stageSessionSessionId }}'
  emit:
    as: item
    items_for: '{{ response.stageSession }}'
checks: []
