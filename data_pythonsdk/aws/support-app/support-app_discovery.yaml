version: '1.0'
provider: aws
service: support-app
services:
  client: support-app
  module: boto3.client
discovery:
- discovery_id: aws.support-app.list_slack_channel_configurations
  calls:
  - action: list_slack_channel_configurations
    save_as: response
    on_error: continue
    params:
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.slackChannelConfigurations }}'
- discovery_id: aws.support-app.list_slack_workspace_configurations
  calls:
  - action: list_slack_workspace_configurations
    save_as: response
    on_error: continue
    params:
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.slackWorkspaceConfigurations }}'
- discovery_id: aws.support-app.get_account_alias
  calls:
  - action: get_account_alias
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.accountAlias }}'
checks: []
