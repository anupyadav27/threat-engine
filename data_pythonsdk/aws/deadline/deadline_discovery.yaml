version: '1.0'
provider: aws
service: deadline
services:
  client: deadline
  module: boto3.client
discovery:
- discovery_id: aws.deadline.list_monitors
  calls:
  - action: list_monitors
    save_as: response
    on_error: continue
    params:
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.monitors }}'
- discovery_id: aws.deadline.list_available_metered_products
  calls:
  - action: list_available_metered_products
    save_as: response
    on_error: continue
    params:
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.meteredProducts }}'
- discovery_id: aws.deadline.list_license_endpoints
  calls:
  - action: list_license_endpoints
    save_as: response
    on_error: continue
    params:
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.licenseEndpoints }}'
- discovery_id: aws.deadline.list_farms
  calls:
  - action: list_farms
    save_as: response
    on_error: continue
    params:
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.farms }}'
- discovery_id: aws.deadline.get_sessions_statistics_aggregation
  for_each: aws.deadline.list_farms
  calls:
  - action: get_sessions_statistics_aggregation
    save_as: response
    on_error: continue
    params:
      farmId: '{{ item.farmFarmId }}'
  emit:
    as: item
    items_for: '{{ response.statistics }}'
- discovery_id: aws.deadline.get_fleet
  for_each: aws.deadline.list_farms
