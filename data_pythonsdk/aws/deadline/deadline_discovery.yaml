  emit:
    as: item
    items_for: '{{ response.sessionActions }}'
- discovery_id: aws.deadline.list_limits
  for_each: aws.deadline.list_farms
  calls:
  - action: list_limits
    save_as: response
    on_error: continue
    params:
      farmId: '{{ item.farmFarmId }}'
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.limits }}'
- discovery_id: aws.deadline.list_budgets
