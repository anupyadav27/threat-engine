version: '1.0'
provider: aws
service: workmail
services:
  client: workmail
  module: boto3.client
discovery:
- discovery_id: aws.workmail.list_organizations
  calls:
  - action: list_organizations
    save_as: response
    on_error: continue
    params:
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.OrganizationSummaries }}'
- discovery_id: aws.workmail.list_mobile_device_access_rules
  for_each: aws.workmail.list_organizations
  calls:
  - action: list_mobile_device_access_rules
    save_as: response
    on_error: continue
    params:
      OrganizationId: '{{ item.organizationSummaryOrganizationId }}'
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.Rules }}'
- discovery_id: aws.workmail.list_access_control_rules
  for_each: aws.workmail.list_organizations
  calls:
