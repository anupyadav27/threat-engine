version: '1.0'
provider: aws
service: workspaces-instances
services:
  client: workspaces-instances
  module: boto3.client
discovery:
- discovery_id: aws.workspaces-instances.list_workspace_instances
  calls:
  - action: list_workspace_instances
    save_as: response
    on_error: continue
    params:
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.WorkspaceInstances }}'
- discovery_id: aws.workspaces-instances.list_instance_types
  calls:
  - action: list_instance_types
    save_as: response
    on_error: continue
    params:
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.InstanceTypes }}'
- discovery_id: aws.workspaces-instances.list_regions
  calls:
  - action: list_regions
    save_as: response
    on_error: continue
    params:
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.Regions }}'
- discovery_id: aws.workspaces-instances.get_workspace_instance
  for_each: aws.workspaces-instances.list_workspace_instances
  calls:
  - action: get_workspace_instance
    save_as: response
    on_error: continue
    params:
      WorkspaceInstanceId: '{{ item.workspaceInstancWorkspaceInstanceId }}'
  emit:
    as: item
    items_for: '{{ response.WorkspaceInstanceErrors }}'
- discovery_id: aws.workspaces-instances.list_tags_for_resource
  for_each: aws.workspaces-instances.list_workspace_instances
  calls:
  - action: list_tags_for_resource
    save_as: response
    on_error: continue
    params:
      WorkspaceInstanceId: '{{ item.workspaceInstancWorkspaceInstanceId }}'
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.Tags }}'
checks: []
