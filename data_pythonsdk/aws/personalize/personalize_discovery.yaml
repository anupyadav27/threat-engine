version: '1.0'
provider: aws
service: personalize
services:
  client: personalize
  module: boto3.client
discovery:
- discovery_id: aws.personalize.list_recommenders
  calls:
  - action: list_recommenders
    save_as: response
    on_error: continue
    params:
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.recommenders }}'
- discovery_id: aws.personalize.list_batch_inference_jobs
  calls:
  - action: list_batch_inference_jobs
    save_as: response
