version: '1.0'
provider: aws
service: swf
services:
  client: swf
  module: boto3.client
discovery:
- discovery_id: aws.swf.list_closed_workflow_executions
  calls:
  - action: list_closed_workflow_executions
    save_as: response
    on_error: continue
    params:
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.executionInfos }}'
- discovery_id: aws.swf.get_workflow_execution_history
  for_each: aws.swf.list_closed_workflow_executions
  calls:
  - action: get_workflow_execution_history
    save_as: response
    on_error: continue
    params:
      domain: '{{ item.executionInfoExecution }}'
  emit:
    as: item
    items_for: '{{ response.events }}'
- discovery_id: aws.swf.describe_workflow_type
  for_each: aws.swf.list_closed_workflow_executions
  calls:
  - action: describe_workflow_type
    save_as: response
    on_error: continue
    params:
      domain: '{{ item.executionInfoWorkflowType }}'
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.typeInfo }}'
- discovery_id: aws.swf.list_domains
  calls:
  - action: list_domains
    save_as: response
    on_error: continue
    params:
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.domainInfos }}'
- discovery_id: aws.swf.list_tags_for_resource
  calls:
  - action: list_tags_for_resource
    save_as: response
    on_error: continue
    params:
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.tags }}'
- discovery_id: aws.swf.describe_domain
  for_each: aws.swf.list_domains
  calls:
  - action: describe_domain
    save_as: response
    on_error: continue
    params:
      name: '{{ item.domainInfoName }}'
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.domainInfo }}'
- discovery_id: aws.swf.list_activity_types
  calls:
  - action: list_activity_types
    save_as: response
    on_error: continue
    params:
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.typeInfos }}'
checks: []
