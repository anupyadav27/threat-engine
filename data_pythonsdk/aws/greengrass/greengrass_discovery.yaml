version: '1.0'
provider: aws
service: greengrass
services:
  client: greengrass
  module: boto3.client
discovery:
- discovery_id: aws.greengrass.list_device_definitions
  calls:
  - action: list_device_definitions
    save_as: response
    on_error: continue
    params:
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.Definitions }}'
- discovery_id: aws.greengrass.list_bulk_deployments
  calls:
  - action: list_bulk_deployments
    save_as: response
    on_error: continue
    params:
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.BulkDeployments }}'
- discovery_id: aws.greengrass.get_service_role_for_account
  calls:
  - action: get_service_role_for_account
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.AssociatedAt }}'
- discovery_id: aws.greengrass.list_bulk_deployment_detailed_reports
  for_each: aws.greengrass.list_bulk_deployments
  calls:
  - action: list_bulk_deployment_detailed_reports
    save_as: response
    on_error: continue
    params:
      BulkDeploymentId: '{{ item.bulkDeploymentBulkDeploymentId }}'
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.Deployments }}'
- discovery_id: aws.greengrass.get_function_definition_version
  calls:
  - action: get_function_definition_version
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.Definition }}'
- discovery_id: aws.greengrass.get_connectivity_info
  calls:
  - action: get_connectivity_info
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.ConnectivityInfo }}'
- discovery_id: aws.greengrass.get_bulk_deployment_status
  for_each: aws.greengrass.list_bulk_deployments
  calls:
  - action: get_bulk_deployment_status
    save_as: response
    on_error: continue
    params:
      BulkDeploymentId: '{{ item.bulkDeploymentBulkDeploymentId }}'
  emit:
    as: item
    items_for: '{{ response.ErrorDetails }}'
- discovery_id: aws.greengrass.get_subscription_definition_version
  calls:
  - action: get_subscription_definition_version
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.Definition }}'
- discovery_id: aws.greengrass.get_core_definition_version
  calls:
  - action: get_core_definition_version
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.Definition }}'
- discovery_id: aws.greengrass.get_device_definition_version
  calls:
  - action: get_device_definition_version
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.Definition }}'
- discovery_id: aws.greengrass.get_connector_definition_version
  calls:
  - action: get_connector_definition_version
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.Definition }}'
- discovery_id: aws.greengrass.get_resource_definition_version
  calls:
  - action: get_resource_definition_version
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.Definition }}'
- discovery_id: aws.greengrass.get_logger_definition_version
  calls:
  - action: get_logger_definition_version
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.Definition }}'
- discovery_id: aws.greengrass.get_thing_runtime_configuration
  calls:
  - action: get_thing_runtime_configuration
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.RuntimeConfiguration }}'
checks: []
