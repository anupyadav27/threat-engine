version: '1.0'
provider: aws
service: translate
services:
  client: translate
  module: boto3.client
discovery:
- discovery_id: aws.translate.list_parallel_data
  calls:
  - action: list_parallel_data
    save_as: response
    on_error: continue
    params:
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.ParallelDataPropertiesList }}'
- discovery_id: aws.translate.list_text_translation_jobs
  calls:
  - action: list_text_translation_jobs
    save_as: response
    on_error: continue
    params:
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.TextTranslationJobPropertiesList }}'
- discovery_id: aws.translate.list_terminologies
  calls:
  - action: list_terminologies
    save_as: response
    on_error: continue
    params:
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.TerminologyPropertiesList }}'
- discovery_id: aws.translate.list_languages
  calls:
  - action: list_languages
    save_as: response
    on_error: continue
    params:
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.Languages }}'
- discovery_id: aws.translate.list_tags_for_resource
  calls:
  - action: list_tags_for_resource
    save_as: response
    on_error: continue
    params:
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.Tags }}'
- discovery_id: aws.translate.get_parallel_data
  for_each: aws.translate.list_parallel_data
  calls:
  - action: get_parallel_data
    save_as: response
    on_error: continue
    params:
      Name: '{{ item.parallelDataPropertiesListName }}'
  emit:
    as: item
    items_for: '{{ response.ParallelDataProperties }}'
- discovery_id: aws.translate.describe_text_translation_job
  for_each: aws.translate.list_text_translation_jobs
  calls:
  - action: describe_text_translation_job
    save_as: response
    on_error: continue
    params:
      JobId: '{{ item.textTranslationJobPropertiesListJobId }}'
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.TextTranslationJobProperties }}'
- discovery_id: aws.translate.get_terminology
  for_each: aws.translate.list_parallel_data
  calls:
  - action: get_terminology
    save_as: response
    on_error: continue
    params:
      Name: '{{ item.parallelDataPropertiesListName }}'
  emit:
    as: item
    items_for: '{{ response.TerminologyProperties }}'
checks: []
