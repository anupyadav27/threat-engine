version: '1.0'
provider: aws
service: location
services:
  client: location
  module: boto3.client
discovery:
- discovery_id: aws.location.list_trackers
  calls:
  - action: list_trackers
    save_as: response
    on_error: continue
    params:
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.Entries }}'
- discovery_id: aws.location.list_maps
  calls:
  - action: list_maps
    save_as: response
    on_error: continue
    params:
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.Entries }}'
- discovery_id: aws.location.list_route_calculators
  calls:
  - action: list_route_calculators
    save_as: response
    on_error: continue
    params:
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.Entries }}'
- discovery_id: aws.location.list_keys
  calls:
  - action: list_keys
    save_as: response
    on_error: continue
    params:
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.Entries }}'
- discovery_id: aws.location.list_geofence_collections
  calls:
  - action: list_geofence_collections
    save_as: response
    on_error: continue
    params:
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.Entries }}'
- discovery_id: aws.location.list_place_indexes
  calls:
  - action: list_place_indexes
    save_as: response
    on_error: continue
    params:
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.Entries }}'
- discovery_id: aws.location.get_place
  for_each: aws.location.list_place_indexes
  calls:
  - action: get_place
    save_as: response
    on_error: continue
    params:
      IndexName: '{{ item.entryIndexName }}'
  emit:
    as: item
    items_for: '{{ response.Place }}'
- discovery_id: aws.location.describe_key
  for_each: aws.location.list_keys
  calls:
  - action: describe_key
    save_as: response
    on_error: continue
    params:
      KeyName: '{{ item.entryKeyName }}'
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.Restrictions }}'
- discovery_id: aws.location.list_device_positions
  for_each: aws.location.list_trackers
  calls:
  - action: list_device_positions
    save_as: response
    on_error: continue
    params:
      TrackerName: '{{ item.entryTrackerName }}'
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.Entries }}'
- discovery_id: aws.location.describe_map
  for_each: aws.location.list_maps
  calls:
  - action: describe_map
    save_as: response
    on_error: continue
    params:
      MapName: '{{ item.entryMapName }}'
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.Configuration }}'
- discovery_id: aws.location.describe_geofence_collection
  for_each: aws.location.list_geofence_collections
  calls:
  - action: describe_geofence_collection
    save_as: response
    on_error: continue
    params:
      CollectionName: '{{ item.entryCollectionName }}'
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.CollectionName }}'
- discovery_id: aws.location.list_geofences
  for_each: aws.location.list_geofence_collections
  calls:
  - action: list_geofences
    save_as: response
    on_error: continue
    params:
      CollectionName: '{{ item.entryCollectionName }}'
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.Entries }}'
- discovery_id: aws.location.get_geofence
  for_each: aws.location.list_geofence_collections
  calls:
  - action: get_geofence
    save_as: response
    on_error: continue
    params:
      CollectionName: '{{ item.entryGeofenceId }}'
  emit:
    as: item
    items_for: '{{ response.Geometry }}'
- discovery_id: aws.location.describe_place_index
  for_each: aws.location.list_place_indexes
  calls:
  - action: describe_place_index
    save_as: response
    on_error: continue
    params:
      IndexName: '{{ item.entryIndexName }}'
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.DataSourceConfiguration }}'
- discovery_id: aws.location.get_device_position_history
  for_each: aws.location.list_device_positions
  calls:
  - action: get_device_position_history
    save_as: response
    on_error: continue
    params:
      TrackerName: '{{ item.entryTrackerName }}'
  emit:
    as: item
    items_for: '{{ response.DevicePositions }}'
- discovery_id: aws.location.get_map_sprites
  for_each: aws.location.list_maps
  calls:
  - action: get_map_sprites
    save_as: response
    on_error: continue
    params:
      MapName: '{{ item.entryMapName }}'
  emit:
    as: item
    items_for: '{{ response.Blob }}'
checks: []
