version: '1.0'
provider: aws
service: servicediscovery
services:
  client: servicediscovery
  module: boto3.client
discovery:
- discovery_id: aws.servicediscovery.list_services
  calls:
  - action: list_services
    save_as: response
    on_error: continue
    params:
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.Services }}'
- discovery_id: aws.servicediscovery.list_namespaces
  calls:
  - action: list_namespaces
    save_as: response
    on_error: continue
    params:
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.Namespaces }}'
- discovery_id: aws.servicediscovery.list_operations
  calls:
  - action: list_operations
    save_as: response
    on_error: continue
    params:
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.Operations }}'
- discovery_id: aws.servicediscovery.get_operation
  calls:
  - action: get_operation
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.Operation }}'
- discovery_id: aws.servicediscovery.get_instance
  calls:
  - action: get_instance
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.Instance }}'
- discovery_id: aws.servicediscovery.list_tags_for_resource
  calls:
  - action: list_tags_for_resource
    save_as: response
    on_error: continue
    params:
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.Tags }}'
- discovery_id: aws.servicediscovery.get_service
  for_each: aws.servicediscovery.list_services
  calls:
  - action: get_service
    save_as: response
    on_error: continue
    params:
      Id: '{{ item.namespacId }}'
  emit:
    as: item
    items_for: '{{ response.Service }}'
- discovery_id: aws.servicediscovery.get_service_attributes
  calls:
  - action: get_service_attributes
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.ServiceAttributes }}'
checks: []
