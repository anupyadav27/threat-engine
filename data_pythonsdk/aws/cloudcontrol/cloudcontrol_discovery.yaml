version: '1.0'
provider: aws
service: cloudcontrol
services:
  client: cloudcontrol
  module: boto3.client
discovery:
- discovery_id: aws.cloudcontrol.list_resource_requests
  calls:
  - action: list_resource_requests
    save_as: response
    on_error: continue
    params:
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.ResourceRequestStatusSummaries }}'
- discovery_id: aws.cloudcontrol.get_resource_request_status
  for_each: aws.cloudcontrol.list_resource_requests
  calls:
  - action: get_resource_request_status
    save_as: response
    on_error: continue
    params:
      RequestToken: '{{ item.resourceRequestStatusSummaryRequestToken }}'
  emit:
    as: item
    items_for: '{{ response.HooksProgressEvent }}'
- discovery_id: aws.cloudcontrol.get_resource
  for_each: aws.cloudcontrol.list_resource_requests
  calls:
  - action: get_resource
    save_as: response
    on_error: continue
    params:
      TypeName: '{{ item.resourceRequestStatusSummaryTypeName }}'
  emit:
    as: item
    items_for: '{{ response.ResourceDescription }}'
checks: []
