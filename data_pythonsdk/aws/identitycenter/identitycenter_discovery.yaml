version: '1.0'
provider: aws
service: identitycenter
services:
  client: identitycenter
  module: boto3.client
discovery:
- discovery_id: aws.identitycenter.list_accounts
  calls:
  - action: list_accounts
    save_as: response
    on_error: continue
    params:
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.accountList }}'
checks: []
