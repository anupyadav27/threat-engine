version: '1.0'
provider: aws
service: lightsail
services:
  client: lightsail
  module: boto3.client
discovery:
- discovery_id: aws.lightsail.get_relational_databases
  calls:
  - action: get_relational_databases
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.relationalDatabases }}'
