version: '1.0'
provider: aws
service: repostspace
services:
  client: repostspace
  module: boto3.client
discovery:
- discovery_id: aws.repostspace.list_spaces
  calls:
  - action: list_spaces
    save_as: response
    on_error: continue
    params:
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.spaces }}'
- discovery_id: aws.repostspace.get_space
  for_each: aws.repostspace.list_spaces
  calls:
  - action: get_space
    save_as: response
    on_error: continue
    params:
      spaceId: '{{ item.spacSpaceId }}'
  emit:
    as: item
    items_for: '{{ response.userAdmins }}'
- discovery_id: aws.repostspace.list_channels
  for_each: aws.repostspace.list_spaces
  calls:
  - action: list_channels
    save_as: response
    on_error: continue
    params:
      spaceId: '{{ item.spacSpaceId }}'
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.channels }}'
- discovery_id: aws.repostspace.get_channel
  for_each: aws.repostspace.list_channels
  calls:
  - action: get_channel
    save_as: response
    on_error: continue
    params:
      spaceId: '{{ item.spacSpaceId }}'
  emit:
    as: item
    items_for: '{{ response.spaceId }}'
checks: []
