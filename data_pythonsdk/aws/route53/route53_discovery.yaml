version: '1.0'
provider: aws
service: route53
services:
  client: route53
  module: boto3.client
discovery:
- discovery_id: aws.route53.list_traffic_policy_instances
  calls:
  - action: list_traffic_policy_instances
    save_as: response
    on_error: continue
    params:
      MaxItems: '100'
  emit:
    as: item
    items_for: '{{ response.TrafficPolicyInstances }}'
- discovery_id: aws.route53.list_hosted_zones_by_name
  calls:
  - action: list_hosted_zones_by_name
    save_as: response
    on_error: continue
    params:
      MaxItems: '100'
  emit:
    as: item
    items_for: '{{ response.HostedZones }}'
- discovery_id: aws.route53.get_geo_location
  calls:
  - action: get_geo_location
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.GeoLocationDetails }}'
- discovery_id: aws.route53.list_health_checks
  calls:
  - action: list_health_checks
    save_as: response
    on_error: continue
    params:
      MaxItems: '100'
  emit:
    as: item
    items_for: '{{ response.HealthChecks }}'
- discovery_id: aws.route53.list_traffic_policies
  calls:
  - action: list_traffic_policies
    save_as: response
    on_error: continue
    params:
      MaxItems: '100'
  emit:
    as: item
    items_for: '{{ response.TrafficPolicySummaries }}'
- discovery_id: aws.route53.list_cidr_collections
  calls:
  - action: list_cidr_collections
    save_as: response
    on_error: continue
    params:
      MaxItems: '100'
  emit:
    as: item
    items_for: '{{ response.CidrCollections }}'
- discovery_id: aws.route53.list_query_logging_configs
  calls:
  - action: list_query_logging_configs
    save_as: response
    on_error: continue
    params:
      MaxItems: '100'
  emit:
    as: item
    items_for: '{{ response.QueryLoggingConfigs }}'
- discovery_id: aws.route53.list_reusable_delegation_sets
  calls:
  - action: list_reusable_delegation_sets
    save_as: response
    on_error: continue
    params:
      MaxItems: '100'
  emit:
    as: item
    items_for: '{{ response.DelegationSets }}'
- discovery_id: aws.route53.get_hosted_zone_count
  calls:
  - action: get_hosted_zone_count
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.HostedZoneCount }}'
- discovery_id: aws.route53.get_checker_ip_ranges
  calls:
  - action: get_checker_ip_ranges
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.CheckerIpRanges }}'
- discovery_id: aws.route53.get_traffic_policy_instance_count
  calls:
  - action: get_traffic_policy_instance_count
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.TrafficPolicyInstanceCount }}'
- discovery_id: aws.route53.get_health_check_count
  calls:
  - action: get_health_check_count
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.HealthCheckCount }}'
- discovery_id: aws.route53.get_dnssec
  for_each: aws.route53.list_traffic_policy_instances
  calls:
  - action: get_dnssec
    save_as: response
    on_error: continue
    params:
      HostedZoneId: '{{ item.queryLoggingConfigHostedZoneId }}'
  emit:
    as: item
    items_for: '{{ response.KeySigningKeys }}'
- discovery_id: aws.route53.list_resource_record_sets
  for_each: aws.route53.list_traffic_policy_instances
  calls:
  - action: list_resource_record_sets
    save_as: response
    on_error: continue
    params:
      HostedZoneId: '{{ item.queryLoggingConfigHostedZoneId }}'
      MaxItems: '100'
  emit:
    as: item
    items_for: '{{ response.ResourceRecordSets }}'
- discovery_id: aws.route53.get_traffic_policy
  for_each: aws.route53.list_traffic_policy_instances
  calls:
  - action: get_traffic_policy
    save_as: response
    on_error: continue
    params:
      Id: '{{ item.cidrCollectionVersion }}'
  emit:
    as: item
    items_for: '{{ response.TrafficPolicy }}'
- discovery_id: aws.route53.get_reusable_delegation_set_limit
  for_each: aws.route53.list_traffic_policies
  calls:
  - action: get_reusable_delegation_set_limit
    save_as: response
    on_error: continue
    params:
      Type: '{{ item.trafficPolicySummaryType }}'
  emit:
    as: item
    items_for: '{{ response.Limit }}'
- discovery_id: aws.route53.list_vpc_association_authorizations
  for_each: aws.route53.list_traffic_policy_instances
  calls:
  - action: list_vpc_association_authorizations
    save_as: response
    on_error: continue
    params:
      HostedZoneId: '{{ item.queryLoggingConfigHostedZoneId }}'
      MaxItems: '100'
  emit:
    as: item
    items_for: '{{ response.VPCs }}'
- discovery_id: aws.route53.get_health_check_status
  for_each: aws.route53.list_resource_record_sets
  calls:
  - action: get_health_check_status
    save_as: response
    on_error: continue
    params:
      HealthCheckId: '{{ item.resourceRecordSetHealthCheckId }}'
  emit:
    as: item
    items_for: '{{ response.HealthCheckObservations }}'
- discovery_id: aws.route53.list_cidr_blocks
  calls:
  - action: list_cidr_blocks
    save_as: response
    on_error: continue
    params:
      MaxItems: '100'
  emit:
    as: item
    items_for: '{{ response.CidrBlocks }}'
- discovery_id: aws.route53.get_change
  for_each: aws.route53.list_traffic_policy_instances
  calls:
  - action: get_change
    save_as: response
    on_error: continue
    params:
      Id: '{{ item.cidrCollectionId }}'
  emit:
    as: item
    items_for: '{{ response.ChangeInfo }}'
- discovery_id: aws.route53.list_hosted_zones_by_vpc
  for_each: aws.route53.list_vpc_association_authorizations
  calls:
  - action: list_hosted_zones_by_vpc
    save_as: response
    on_error: continue
    params:
      VPCId: '{{ item.vpcVpcRegion }}'
      MaxItems: '100'
  emit:
    as: item
    items_for: '{{ response.HostedZoneSummaries }}'
checks: []
