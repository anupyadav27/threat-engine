version: '1.0'
provider: aws
service: guardduty
services:
  client: guardduty
  module: boto3.client
discovery:
- discovery_id: aws.guardduty.list_malware_scans
  calls:
  - action: list_malware_scans
    save_as: response
    on_error: continue
    params:
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.Scans }}'
- discovery_id: aws.guardduty.list_invitations
  calls:
  - action: list_invitations
    save_as: response
    on_error: continue
    params:
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.Invitations }}'
- discovery_id: aws.guardduty.list_organization_admin_accounts
  calls:
  - action: list_organization_admin_accounts
    save_as: response
    on_error: continue
    params:
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.AdminAccounts }}'
- discovery_id: aws.guardduty.get_organization_statistics
  calls:
  - action: get_organization_statistics
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.OrganizationDetails }}'
- discovery_id: aws.guardduty.list_malware_protection_plans
  calls:
  - action: list_malware_protection_plans
    save_as: response
    on_error: continue
    params:
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.MalwareProtectionPlans }}'
- discovery_id: aws.guardduty.get_invitations_count
  calls:
  - action: get_invitations_count
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.InvitationsCount }}'
- discovery_id: aws.guardduty.get_malware_scan
  for_each: aws.guardduty.list_malware_scans
  calls:
  - action: get_malware_scan
    save_as: response
    on_error: continue
    params:
      ScanId: '{{ item.scanScanId }}'
  emit:
    as: item
    items_for: '{{ response.ScannedResources }}'
- discovery_id: aws.guardduty.get_findings
  for_each: aws.guardduty.get_malware_scan
  calls:
  - action: get_findings
    save_as: response
    on_error: continue
    params:
      DetectorId: '{{ item.scanDetectorId }}'
  emit:
    as: item
    items_for: '{{ response.Findings }}'
- discovery_id: aws.guardduty.describe_malware_scans
  for_each: aws.guardduty.get_malware_scan
  calls:
  - action: describe_malware_scans
    save_as: response
    on_error: continue
    params:
      DetectorId: '{{ item.scanDetectorId }}'
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.Scans }}'
- discovery_id: aws.guardduty.get_findings_statistics
  for_each: aws.guardduty.get_malware_scan
  calls:
  - action: get_findings_statistics
    save_as: response
    on_error: continue
    params:
      DetectorId: '{{ item.scanDetectorId }}'
  emit:
    as: item
    items_for: '{{ response.FindingStatistics }}'
- discovery_id: aws.guardduty.get_usage_statistics
  for_each: aws.guardduty.get_malware_scan
  calls:
  - action: get_usage_statistics
    save_as: response
    on_error: continue
    params:
      DetectorId: '{{ item.scanDetectorId }}'
  emit:
    as: item
    items_for: '{{ response.UsageStatistics }}'
- discovery_id: aws.guardduty.get_malware_protection_plan
  for_each: aws.guardduty.list_malware_protection_plans
  calls:
  - action: get_malware_protection_plan
    save_as: response
    on_error: continue
    params:
      MalwareProtectionPlanId: '{{ item.malwareProtectionPlanMalwareProtectionPlanId }}'
  emit:
    as: item
    items_for: '{{ response.StatusReasons }}'
- discovery_id: aws.guardduty.describe_organization_configuration
  for_each: aws.guardduty.get_malware_scan
  calls:
  - action: describe_organization_configuration
    save_as: response
    on_error: continue
    params:
      DetectorId: '{{ item.scanDetectorId }}'
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.Features }}'
- discovery_id: aws.guardduty.list_members
  for_each: aws.guardduty.get_malware_scan
  calls:
  - action: list_members
    save_as: response
    on_error: continue
    params:
      DetectorId: '{{ item.scanDetectorId }}'
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.Members }}'
- discovery_id: aws.guardduty.get_filter
  for_each: aws.guardduty.get_malware_scan
  calls:
  - action: get_filter
    save_as: response
    on_error: continue
    params:
      DetectorId: '{{ item.scanDetectorId }}'
  emit:
    as: item
    items_for: '{{ response.FindingCriteria }}'
- discovery_id: aws.guardduty.list_coverage
  for_each: aws.guardduty.get_malware_scan
  calls:
  - action: list_coverage
    save_as: response
    on_error: continue
    params:
      DetectorId: '{{ item.scanDetectorId }}'
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.Resources }}'
- discovery_id: aws.guardduty.list_publishing_destinations
  for_each: aws.guardduty.get_malware_scan
  calls:
  - action: list_publishing_destinations
    save_as: response
    on_error: continue
    params:
      DetectorId: '{{ item.scanDetectorId }}'
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.Destinations }}'
- discovery_id: aws.guardduty.describe_publishing_destination
  for_each: aws.guardduty.list_publishing_destinations
  calls:
  - action: describe_publishing_destination
    save_as: response
    on_error: continue
    params:
      DetectorId: '{{ item.scanDetectorId }}'
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.DestinationProperties }}'
- discovery_id: aws.guardduty.get_malware_scan_settings
  for_each: aws.guardduty.get_malware_scan
  calls:
  - action: get_malware_scan_settings
    save_as: response
    on_error: continue
    params:
      DetectorId: '{{ item.scanDetectorId }}'
  emit:
    as: item
    items_for: '{{ response.ScanResourceCriteria }}'
- discovery_id: aws.guardduty.get_coverage_statistics
  for_each: aws.guardduty.get_malware_scan
  calls:
  - action: get_coverage_statistics
    save_as: response
    on_error: continue
    params:
      DetectorId: '{{ item.scanDetectorId }}'
  emit:
    as: item
    items_for: '{{ response.CoverageStatistics }}'
- discovery_id: aws.guardduty.get_master_account
  for_each: aws.guardduty.get_malware_scan
  calls:
  - action: get_master_account
    save_as: response
    on_error: continue
    params:
      DetectorId: '{{ item.scanDetectorId }}'
  emit:
    as: item
    items_for: '{{ response.Master }}'
- discovery_id: aws.guardduty.get_trusted_entity_set
  for_each: aws.guardduty.get_malware_scan
  calls:
  - action: get_trusted_entity_set
    save_as: response
    on_error: continue
    params:
      DetectorId: '{{ item.scanDetectorId }}'
  emit:
    as: item
    items_for: '{{ response.Name }}'
- discovery_id: aws.guardduty.get_remaining_free_trial_days
  for_each: aws.guardduty.get_malware_scan
  calls:
  - action: get_remaining_free_trial_days
    save_as: response
    on_error: continue
    params:
      DetectorId: '{{ item.scanDetectorId }}'
  emit:
    as: item
    items_for: '{{ response.Accounts }}'
- discovery_id: aws.guardduty.get_member_detectors
  for_each: aws.guardduty.get_malware_scan
  calls:
  - action: get_member_detectors
    save_as: response
    on_error: continue
    params:
      DetectorId: '{{ item.scanDetectorId }}'
  emit:
    as: item
    items_for: '{{ response.MemberDataSourceConfigurations }}'
checks: []
