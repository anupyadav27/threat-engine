version: '1.0'
provider: aws
service: sts
services:
  client: sts
  module: boto3.client
discovery:
- discovery_id: aws.sts.get_session_token
  calls:
  - action: get_session_token
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.Credentials }}'
- discovery_id: aws.sts.get_caller_identity
  calls:
  - action: get_caller_identity
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.UserId }}'
checks: []
