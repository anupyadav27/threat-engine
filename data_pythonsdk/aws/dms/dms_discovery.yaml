  calls:
  - action: describe_replication_instance_task_logs
    save_as: response
    on_error: continue
    params:
      ReplicationInstanceArn: '{{ item.connectionReplicationInstanceArn }}'
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.ReplicationInstanceTaskLogs }}'
- discovery_id: aws.dms.describe_refresh_schemas_status
  for_each: aws.dms.describe_endpoints
  calls:
  - action: describe_refresh_schemas_status
    save_as: response
    on_error: continue
    params:
      EndpointArn: '{{ item.connectionEndpointArn }}'
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.RefreshSchemasStatus }}'
- discovery_id: aws.dms.describe_schemas
  for_each: aws.dms.describe_endpoints
  calls:
  - action: describe_schemas
    save_as: response
    on_error: continue
    params:
      EndpointArn: '{{ item.connectionEndpointArn }}'
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.Schemas }}'
checks: []
