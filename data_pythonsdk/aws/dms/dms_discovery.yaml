    save_as: response
    on_error: continue
    params:
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.IndividualAssessmentNames }}'
- discovery_id: aws.dms.describe_table_statistics
  for_each: aws.dms.describe_replication_tasks
  calls:
  - action: describe_table_statistics
    save_as: response
    on_error: continue
    params:
      ReplicationTaskArn: '{{ item.replicationTaskAssessmentResultReplicationTaskArn }}'
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.TableStatistics }}'
- discovery_id: aws.dms.describe_endpoint_settings
  for_each: aws.dms.describe_endpoint_types
  calls:
  - action: describe_endpoint_settings
    save_as: response
    on_error: continue
    params:
      EngineName: '{{ item.engineName }}'
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.EndpointSettings }}'
- discovery_id: aws.dms.describe_metadata_model_assessments
