version: '1.0'
provider: aws
service: fargate
services:
  client: fargate
  module: boto3.client
discovery:
- discovery_id: aws.fargate.describe_capacity_providers
  calls:
  - action: describe_capacity_providers
    save_as: response
    on_error: continue
    params:
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.capacityProviders }}'
- discovery_id: aws.fargate.list_account_settings
  calls:
  - action: list_account_settings
    save_as: response
    on_error: continue
    params:
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.settings }}'
- discovery_id: aws.fargate.describe_clusters
  calls:
  - action: describe_clusters
    save_as: response
    on_error: continue
    params:
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.clusters }}'
- discovery_id: aws.fargate.create_cluster
  calls:
  - action: create_cluster
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.cluster }}'
checks: []
