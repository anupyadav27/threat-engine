version: '1.0'
provider: aws
service: mturk
services:
  client: mturk
  module: boto3.client
discovery:
- discovery_id: aws.mturk.list_reviewable_hi_ts
  calls:
  - action: list_reviewable_hi_ts
    save_as: response
    on_error: continue
    params:
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.HITs }}'
- discovery_id: aws.mturk.list_qualification_requests
  calls:
  - action: list_qualification_requests
    save_as: response
    on_error: continue
    params:
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.QualificationRequests }}'
- discovery_id: aws.mturk.list_bonus_payments
  calls:
  - action: list_bonus_payments
    save_as: response
    on_error: continue
    params:
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.BonusPayments }}'
- discovery_id: aws.mturk.get_account_balance
  calls:
  - action: get_account_balance
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.AvailableBalance }}'
- discovery_id: aws.mturk.get_assignment
  for_each: aws.mturk.list_bonus_payments
  calls:
  - action: get_assignment
    save_as: response
    on_error: continue
    params:
      AssignmentId: '{{ item.bonusPaymentAssignmentId }}'
  emit:
    as: item
    items_for: '{{ response.Assignment }}'
- discovery_id: aws.mturk.get_qualification_type
  for_each: aws.mturk.list_qualification_requests
  calls:
  - action: get_qualification_type
    save_as: response
    on_error: continue
    params:
      QualificationTypeId: '{{ item.qualificationRequestQualificationTypeId }}'
  emit:
    as: item
    items_for: '{{ response.QualificationType }}'
- discovery_id: aws.mturk.list_workers_with_qualification_type
  for_each: aws.mturk.list_qualification_requests
  calls:
  - action: list_workers_with_qualification_type
    save_as: response
    on_error: continue
    params:
      QualificationTypeId: '{{ item.qualificationRequestQualificationTypeId }}'
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.Qualifications }}'
- discovery_id: aws.mturk.list_review_policy_results_for_hit
  for_each: aws.mturk.list_reviewable_hi_ts
  calls:
  - action: list_review_policy_results_for_hit
    save_as: response
    on_error: continue
    params:
      HITId: '{{ item.hitHitId }}'
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.AssignmentReviewPolicy }}'
checks: []
