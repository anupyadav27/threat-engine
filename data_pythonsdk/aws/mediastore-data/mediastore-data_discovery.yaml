version: '1.0'
provider: aws
service: mediastore-data
services:
  client: mediastore-data
  module: boto3.client
discovery:
- discovery_id: aws.mediastore-data.list_items
  calls:
  - action: list_items
    save_as: response
    on_error: continue
    params:
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.Items }}'
- discovery_id: aws.mediastore-data.get_object
  calls:
  - action: get_object
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.Body }}'
checks: []
