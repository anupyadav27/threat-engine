version: '1.0'
provider: aws
service: workspaces-web
services:
  client: workspaces-web
  module: boto3.client
discovery:
- discovery_id: aws.workspaces-web.list_portals
  calls:
  - action: list_portals
    save_as: response
    on_error: continue
    params:
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.portals }}'
- discovery_id: aws.workspaces-web.list_user_settings
  calls:
  - action: list_user_settings
    save_as: response
    on_error: continue
    params:
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.userSettings }}'
- discovery_id: aws.workspaces-web.list_data_protection_settings
  calls:
  - action: list_data_protection_settings
    save_as: response
    on_error: continue
    params:
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.dataProtectionSettings }}'
- discovery_id: aws.workspaces-web.list_ip_access_settings
  calls:
  - action: list_ip_access_settings
    save_as: response
    on_error: continue
    params:
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.ipAccessSettings }}'
- discovery_id: aws.workspaces-web.list_session_loggers
  calls:
  - action: list_session_loggers
    save_as: response
    on_error: continue
    params:
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.sessionLoggers }}'
- discovery_id: aws.workspaces-web.list_network_settings
  calls:
  - action: list_network_settings
    save_as: response
    on_error: continue
    params:
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.networkSettings }}'
- discovery_id: aws.workspaces-web.list_user_access_logging_settings
  calls:
  - action: list_user_access_logging_settings
    save_as: response
    on_error: continue
    params:
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.userAccessLoggingSettings }}'
- discovery_id: aws.workspaces-web.list_browser_settings
  calls:
  - action: list_browser_settings
    save_as: response
    on_error: continue
    params:
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.browserSettings }}'
- discovery_id: aws.workspaces-web.get_browser_settings
  for_each: aws.workspaces-web.list_portals
  calls:
  - action: get_browser_settings
    save_as: response
    on_error: continue
    params:
      browserSettingsArn: '{{ item.browserSettingBrowserSettingsArn }}'
  emit:
    as: item
    items_for: '{{ response.browserSettings }}'
- discovery_id: aws.workspaces-web.list_sessions
  calls:
  - action: list_sessions
    save_as: response
    on_error: continue
    params:
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.sessions }}'
- discovery_id: aws.workspaces-web.list_trust_store_certificates
  for_each: aws.workspaces-web.list_portals
  calls:
  - action: list_trust_store_certificates
    save_as: response
    on_error: continue
    params:
      trustStoreArn: '{{ item.portalTrustStoreArn }}'
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.certificateList }}'
- discovery_id: aws.workspaces-web.list_identity_providers
  for_each: aws.workspaces-web.list_portals
  calls:
  - action: list_identity_providers
    save_as: response
    on_error: continue
    params:
      portalArn: '{{ item.portalPortalArn }}'
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.identityProviders }}'
- discovery_id: aws.workspaces-web.get_portal
  for_each: aws.workspaces-web.list_portals
  calls:
  - action: get_portal
    save_as: response
    on_error: continue
    params:
      portalArn: '{{ item.portalPortalArn }}'
  emit:
    as: item
    items_for: '{{ response.portal }}'
- discovery_id: aws.workspaces-web.get_session
  for_each: aws.workspaces-web.list_sessions
  calls:
  - action: get_session
    save_as: response
    on_error: continue
    params:
      portalId: '{{ item.sessionSessionId }}'
  emit:
    as: item
    items_for: '{{ response.session }}'
- discovery_id: aws.workspaces-web.get_trust_store_certificate
  for_each: aws.workspaces-web.list_trust_store_certificates
  calls:
  - action: get_trust_store_certificate
    save_as: response
    on_error: continue
    params:
      trustStoreArn: '{{ item.portalTrustStoreArn }}'
  emit:
    as: item
    items_for: '{{ response.certificate }}'
- discovery_id: aws.workspaces-web.get_network_settings
  for_each: aws.workspaces-web.list_portals
  calls:
  - action: get_network_settings
    save_as: response
    on_error: continue
    params:
      networkSettingsArn: '{{ item.networkSettingNetworkSettingsArn }}'
  emit:
    as: item
    items_for: '{{ response.networkSettings }}'
- discovery_id: aws.workspaces-web.list_tags_for_resource
  calls:
  - action: list_tags_for_resource
    save_as: response
    on_error: continue
    params:
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.tags }}'
- discovery_id: aws.workspaces-web.get_data_protection_settings
  for_each: aws.workspaces-web.list_portals
  calls:
  - action: get_data_protection_settings
    save_as: response
    on_error: continue
    params:
      dataProtectionSettingsArn: '{{ item.dataProtectionSettingDataProtectionSettingsArn }}'
  emit:
    as: item
    items_for: '{{ response.dataProtectionSettings }}'
- discovery_id: aws.workspaces-web.get_ip_access_settings
  for_each: aws.workspaces-web.list_portals
  calls:
  - action: get_ip_access_settings
    save_as: response
    on_error: continue
    params:
      ipAccessSettingsArn: '{{ item.ipAccessSettingIpAccessSettingsArn }}'
  emit:
    as: item
    items_for: '{{ response.ipAccessSettings }}'
- discovery_id: aws.workspaces-web.get_session_logger
  for_each: aws.workspaces-web.list_portals
  calls:
  - action: get_session_logger
    save_as: response
    on_error: continue
    params:
      sessionLoggerArn: '{{ item.portalSessionLoggerArn }}'
  emit:
    as: item
    items_for: '{{ response.sessionLogger }}'
- discovery_id: aws.workspaces-web.get_identity_provider
  for_each: aws.workspaces-web.list_identity_providers
  calls:
  - action: get_identity_provider
    save_as: response
    on_error: continue
    params:
      identityProviderArn: '{{ item.identityProviderIdentityProviderArn }}'
  emit:
    as: item
    items_for: '{{ response.identityProvider }}'
checks: []
