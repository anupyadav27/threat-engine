version: '1.0'
provider: aws
service: workflows
services:
  client: workflows
  module: boto3.client
discovery:
- discovery_id: aws.workflows.list_executions
  calls:
  - action: list_executions
    save_as: response
    on_error: continue
    params:
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.executions }}'
- discovery_id: aws.workflows.list_state_machines
  calls:
  - action: list_state_machines
    save_as: response
    on_error: continue
    params:
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.stateMachines }}'
- discovery_id: aws.workflows.list_activities
  calls:
  - action: list_activities
    save_as: response
    on_error: continue
    params:
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.activities }}'
- discovery_id: aws.workflows.get_execution_history
  calls:
  - action: get_execution_history
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.events }}'
checks: []
