version: '1.0'
provider: aws
service: stepfunctions
services:
  client: stepfunctions
  module: boto3.client
discovery:
- discovery_id: aws.stepfunctions.list_executions
  calls:
  - action: list_executions
    save_as: response
    on_error: continue
    params:
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.executions }}'
- discovery_id: aws.stepfunctions.list_state_machines
  calls:
  - action: list_state_machines
    save_as: response
    on_error: continue
    params:
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.stateMachines }}'
- discovery_id: aws.stepfunctions.list_activities
  calls:
  - action: list_activities
    save_as: response
    on_error: continue
    params:
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.activities }}'
- discovery_id: aws.stepfunctions.get_execution_history
  for_each: aws.stepfunctions.list_executions
  calls:
  - action: get_execution_history
    save_as: response
    on_error: continue
    params:
      executionArn: '{{ item.executionExecutionArn }}'
  emit:
    as: item
    items_for: '{{ response.events }}'
- discovery_id: aws.stepfunctions.describe_map_run
  for_each: aws.stepfunctions.list_executions
  calls:
  - action: describe_map_run
    save_as: response
    on_error: continue
    params:
      mapRunArn: '{{ item.executionMapRunArn }}'
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.itemCounts }}'
- discovery_id: aws.stepfunctions.describe_state_machine
  for_each: aws.stepfunctions.list_executions
  calls:
  - action: describe_state_machine
    save_as: response
    on_error: continue
    params:
      stateMachineArn: '{{ item.executionStateMachineArn }}'
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.loggingConfiguration }}'
- discovery_id: aws.stepfunctions.describe_execution
  for_each: aws.stepfunctions.list_executions
  calls:
  - action: describe_execution
    save_as: response
    on_error: continue
    params:
      executionArn: '{{ item.executionExecutionArn }}'
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.inputDetails }}'
- discovery_id: aws.stepfunctions.describe_activity
  for_each: aws.stepfunctions.list_activities
  calls:
  - action: describe_activity
    save_as: response
    on_error: continue
    params:
      activityArn: '{{ item.activityActivityArn }}'
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.encryptionConfiguration }}'
- discovery_id: aws.stepfunctions.list_tags_for_resource
  calls:
  - action: list_tags_for_resource
    save_as: response
    on_error: continue
    params:
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.tags }}'
- discovery_id: aws.stepfunctions.describe_state_machine_alias
  for_each: aws.stepfunctions.list_executions
  calls:
  - action: describe_state_machine_alias
    save_as: response
    on_error: continue
    params:
      stateMachineAliasArn: '{{ item.executionStateMachineAliasArn }}'
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.routingConfiguration }}'
checks: []
