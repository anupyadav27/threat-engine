version: '1.0'
provider: aws
service: elastic
services:
  client: elastic
  module: boto3.client
discovery:
- discovery_id: aws.elastic.get_compatible_elasticsearch_versions
  calls:
  - action: get_compatible_elasticsearch_versions
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.CompatibleElasticsearchVersions }}'
- discovery_id: aws.elastic.describe_packages
  calls:
  - action: describe_packages
    save_as: response
    on_error: continue
    params:
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.PackageDetailsList }}'
- discovery_id: aws.elastic.describe_outbound_cross_cluster_search_connections
  calls:
  - action: describe_outbound_cross_cluster_search_connections
    save_as: response
    on_error: continue
    params:
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.CrossClusterSearchConnections }}'
- discovery_id: aws.elastic.describe_reserved_elasticsearch_instances
  calls:
  - action: describe_reserved_elasticsearch_instances
    save_as: response
    on_error: continue
    params:
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.ReservedElasticsearchInstances }}'
- discovery_id: aws.elastic.describe_reserved_elasticsearch_instance_offerings
  calls:
  - action: describe_reserved_elasticsearch_instance_offerings
    save_as: response
    on_error: continue
    params:
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.ReservedElasticsearchInstanceOfferings }}'
- discovery_id: aws.elastic.describe_elasticsearch_domains
  calls:
  - action: describe_elasticsearch_domains
    save_as: response
    on_error: continue
    params:
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.DomainStatusList }}'
checks: []
