version: '1.0'
provider: aws
service: amplifyuibuilder
services:
  client: amplifyuibuilder
  module: boto3.client
discovery:
- discovery_id: aws.amplifyuibuilder.list_tags_for_resource
  calls:
  - action: list_tags_for_resource
    save_as: response
    on_error: continue
    params:
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.tags }}'
checks: []
