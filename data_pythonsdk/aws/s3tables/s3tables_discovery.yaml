version: '1.0'
provider: aws
service: s3tables
services:
  client: s3tables
  module: boto3.client
discovery:
- discovery_id: aws.s3tables.get_table
  calls:
  - action: get_table
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.namespace }}'
- discovery_id: aws.s3tables.list_table_buckets
  calls:
  - action: list_table_buckets
    save_as: response
    on_error: continue
    params:
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.tableBuckets }}'
- discovery_id: aws.s3tables.get_table_bucket_encryption
  for_each: aws.s3tables.list_table_buckets
  calls:
  - action: get_table_bucket_encryption
    save_as: response
    on_error: continue
    params:
      tableBucketARN: '{{ item.tableBucketArn }}'
  emit:
    as: item
    items_for: '{{ response.encryptionConfiguration }}'
- discovery_id: aws.s3tables.get_table_bucket_metrics_configuration
  for_each: aws.s3tables.list_table_buckets
  calls:
  - action: get_table_bucket_metrics_configuration
    save_as: response
    on_error: continue
    params:
      tableBucketARN: '{{ item.tableBucketArn }}'
  emit:
    as: item
    items_for: '{{ response.tableBucketARN }}'
- discovery_id: aws.s3tables.get_table_maintenance_job_status
  for_each: aws.s3tables.get_table
  calls:
  - action: get_table_maintenance_job_status
    save_as: response
    on_error: continue
    params:
      tableBucketARN: '{{ item.tableBucketName }}'
  emit:
    as: item
    items_for: '{{ response.tableARN }}'
- discovery_id: aws.s3tables.get_table_bucket_policy
  for_each: aws.s3tables.list_table_buckets
  calls:
  - action: get_table_bucket_policy
    save_as: response
    on_error: continue
    params:
      tableBucketARN: '{{ item.tableBucketArn }}'
  emit:
    as: item
    items_for: '{{ response.resourcePolicy }}'
checks: []
