version: '1.0'
provider: aws
service: qapps
services:
  client: qapps
  module: boto3.client
discovery:
- discovery_id: aws.qapps.list_library_items
  calls:
  - action: list_library_items
    save_as: response
    on_error: continue
    params:
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.libraryItems }}'
- discovery_id: aws.qapps.list_q_app_session_data
  calls:
  - action: list_q_app_session_data
    save_as: response
    on_error: continue
    params:
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.sessionData }}'
- discovery_id: aws.qapps.get_library_item
  for_each: aws.qapps.list_library_items
  calls:
  - action: get_library_item
    save_as: response
    on_error: continue
    params:
      instanceId: '{{ item.libraryItemLibraryItemId }}'
  emit:
    as: item
    items_for: '{{ response.categories }}'
- discovery_id: aws.qapps.list_q_apps
  calls:
  - action: list_q_apps
    save_as: response
    on_error: continue
    params:
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.apps }}'
- discovery_id: aws.qapps.describe_q_app_permissions
  for_each: aws.qapps.list_library_items
  calls:
  - action: describe_q_app_permissions
    save_as: response
    on_error: continue
    params:
      instanceId: '{{ item.libraryItemAppId }}'
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.permissions }}'
- discovery_id: aws.qapps.get_q_app_session_metadata
  calls:
  - action: get_q_app_session_metadata
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.sharingConfiguration }}'
checks: []
