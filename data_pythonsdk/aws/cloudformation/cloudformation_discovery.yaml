    items_for: '{{ response.StackId }}'
- discovery_id: aws.cloudformation.describe_type_registration
  calls:
  - action: describe_type_registration
    save_as: response
    on_error: continue
    params:
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.ProgressStatus }}'
checks: []
