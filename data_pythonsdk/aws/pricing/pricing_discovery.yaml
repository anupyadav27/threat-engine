version: '1.0'
provider: aws
service: pricing
services:
  client: pricing
  module: boto3.client
discovery:
- discovery_id: aws.pricing.describe_services
  calls:
  - action: describe_services
    save_as: response
    on_error: continue
    params:
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.Services }}'
- discovery_id: aws.pricing.get_attribute_values
  for_each: aws.pricing.describe_services
  calls:
  - action: get_attribute_values
    save_as: response
    on_error: continue
    params:
      ServiceCode: '{{ item.servicServiceCode }}'
  emit:
    as: item
    items_for: '{{ response.AttributeValues }}'
checks: []
