version: '1.0'
provider: aws
service: s3control
services:
  client: s3control
  module: boto3.client
discovery:
- discovery_id: aws.s3control.list_access_grants
  calls:
  - action: list_access_grants
    save_as: response
    on_error: continue
    params:
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.AccessGrantsList }}'
- discovery_id: aws.s3control.list_access_points_for_directory_buckets
  calls:
  - action: list_access_points_for_directory_buckets
    save_as: response
    on_error: continue
    params:
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.AccessPointList }}'
- discovery_id: aws.s3control.get_bucket_lifecycle_configuration
  for_each: aws.s3control.list_access_points_for_directory_buckets
  calls:
  - action: get_bucket_lifecycle_configuration
    save_as: response
    on_error: continue
    params:
      AccountId: '{{ item.routBucket }}'
  emit:
    as: item
    items_for: '{{ response.Rules }}'
- discovery_id: aws.s3control.get_storage_lens_configuration
  calls:
  - action: get_storage_lens_configuration
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.StorageLensConfiguration }}'
- discovery_id: aws.s3control.list_jobs
  calls:
  - action: list_jobs
    save_as: response
    on_error: continue
    params:
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.Jobs }}'
- discovery_id: aws.s3control.describe_job
  for_each: aws.s3control.list_jobs
  calls:
  - action: describe_job
    save_as: response
    on_error: continue
    params:
      AccountId: '{{ item.jobJobId }}'
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.Job }}'
- discovery_id: aws.s3control.get_access_point_for_object_lambda
  for_each: aws.s3control.list_access_points_for_directory_buckets
  calls:
  - action: get_access_point_for_object_lambda
    save_as: response
    on_error: continue
    params:
      AccountId: '{{ item.accessPointName }}'
  emit:
    as: item
    items_for: '{{ response.PublicAccessBlockConfiguration }}'
- discovery_id: aws.s3control.get_access_grants_instance
  calls:
  - action: get_access_grants_instance
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.AccessGrantsInstanceArn }}'
- discovery_id: aws.s3control.get_access_point_configuration_for_object_lambda
  for_each: aws.s3control.list_access_points_for_directory_buckets
  calls:
  - action: get_access_point_configuration_for_object_lambda
    save_as: response
    on_error: continue
    params:
      AccountId: '{{ item.accessPointName }}'
  emit:
    as: item
    items_for: '{{ response.Configuration }}'
- discovery_id: aws.s3control.get_data_access
  for_each: aws.s3control.list_access_grants
  calls:
  - action: get_data_access
    save_as: response
    on_error: continue
    params:
      AccountId: '{{ item.accessGrantsListPermission }}'
  emit:
    as: item
    items_for: '{{ response.Credentials }}'
- discovery_id: aws.s3control.get_multi_region_access_point
  for_each: aws.s3control.list_access_points_for_directory_buckets
  calls:
  - action: get_multi_region_access_point
    save_as: response
    on_error: continue
    params:
      AccountId: '{{ item.accessPointName }}'
  emit:
    as: item
    items_for: '{{ response.AccessPoint }}'
- discovery_id: aws.s3control.list_regional_buckets
  calls:
  - action: list_regional_buckets
    save_as: response
    on_error: continue
    params:
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.RegionalBucketList }}'
- discovery_id: aws.s3control.list_access_grants_locations
  calls:
  - action: list_access_grants_locations
    save_as: response
    on_error: continue
    params:
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.AccessGrantsLocationsList }}'
- discovery_id: aws.s3control.get_job_tagging
  for_each: aws.s3control.list_jobs
  calls:
  - action: get_job_tagging
    save_as: response
    on_error: continue
    params:
      AccountId: '{{ item.jobJobId }}'
  emit:
    as: item
    items_for: '{{ response.Tags }}'
- discovery_id: aws.s3control.get_access_point_scope
  for_each: aws.s3control.list_access_points_for_directory_buckets
  calls:
  - action: get_access_point_scope
    save_as: response
    on_error: continue
    params:
      AccountId: '{{ item.accessPointName }}'
  emit:
    as: item
    items_for: '{{ response.Scope }}'
- discovery_id: aws.s3control.get_multi_region_access_point_policy
  for_each: aws.s3control.list_access_points_for_directory_buckets
  calls:
  - action: get_multi_region_access_point_policy
    save_as: response
    on_error: continue
    params:
      AccountId: '{{ item.accessPointName }}'
  emit:
    as: item
    items_for: '{{ response.Policy }}'
- discovery_id: aws.s3control.get_access_grant
  for_each: aws.s3control.list_access_grants
  calls:
  - action: get_access_grant
    save_as: response
    on_error: continue
    params:
      AccountId: '{{ item.accessGrantsListAccessGrantId }}'
  emit:
    as: item
    items_for: '{{ response.Grantee }}'
- discovery_id: aws.s3control.list_storage_lens_groups
  calls:
  - action: list_storage_lens_groups
    save_as: response
    on_error: continue
    params:
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.StorageLensGroupList }}'
- discovery_id: aws.s3control.get_access_point
  for_each: aws.s3control.list_access_points_for_directory_buckets
  calls:
  - action: get_access_point
    save_as: response
    on_error: continue
    params:
      AccountId: '{{ item.accessPointName }}'
  emit:
    as: item
    items_for: '{{ response.VpcConfiguration }}'
- discovery_id: aws.s3control.list_access_points_for_object_lambda
  calls:
  - action: list_access_points_for_object_lambda
    save_as: response
    on_error: continue
    params:
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.ObjectLambdaAccessPointList }}'
- discovery_id: aws.s3control.get_multi_region_access_point_policy_status
  for_each: aws.s3control.list_access_points_for_directory_buckets
  calls:
  - action: get_multi_region_access_point_policy_status
    save_as: response
    on_error: continue
    params:
      AccountId: '{{ item.accessPointName }}'
  emit:
    as: item
    items_for: '{{ response.Established }}'
- discovery_id: aws.s3control.get_bucket_replication
  for_each: aws.s3control.list_access_points_for_directory_buckets
  calls:
  - action: get_bucket_replication
    save_as: response
    on_error: continue
    params:
      AccountId: '{{ item.routBucket }}'
  emit:
    as: item
    items_for: '{{ response.ReplicationConfiguration }}'
checks: []
