version: '1.0'
provider: aws
service: pipes
services:
  client: pipes
  module: boto3.client
discovery:
- discovery_id: aws.pipes.list_pipes
  calls:
  - action: list_pipes
    save_as: response
    on_error: continue
    params:
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.Pipes }}'
- discovery_id: aws.pipes.describe_pipe
  for_each: aws.pipes.list_pipes
  calls:
  - action: describe_pipe
    save_as: response
    on_error: continue
    params:
      Name: '{{ item.pipName }}'
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.SourceParameters }}'
checks: []
