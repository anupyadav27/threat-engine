version: '1.0'
provider: aws
service: directoryservice
services:
  client: directoryservice
  module: boto3.client
discovery:
- discovery_id: aws.directoryservice.describe_directories
  calls:
  - action: describe_directories
    save_as: response
    on_error: continue
    params:
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.DirectoryDescriptions }}'
- discovery_id: aws.directoryservice.get_directory_limits
  calls:
  - action: get_directory_limits
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.DirectoryLimits }}'
- discovery_id: aws.directoryservice.describe_trusts
  calls:
  - action: describe_trusts
    save_as: response
    on_error: continue
    params:
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.Trusts }}'
- discovery_id: aws.directoryservice.describe_snapshots
  calls:
  - action: describe_snapshots
    save_as: response
    on_error: continue
    params:
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.Snapshots }}'
- discovery_id: aws.directoryservice.describe_event_topics
  calls:
  - action: describe_event_topics
    save_as: response
    on_error: continue
    params:
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.EventTopics }}'
checks: []
