version: '1.0'
provider: aws
service: amplify
services:
  client: amplify
  module: boto3.client
discovery:
- discovery_id: aws.amplify.list_apps
  calls:
  - action: list_apps
    save_as: response
    on_error: continue
    params:
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.apps }}'
- discovery_id: aws.amplify.list_branches
  for_each: aws.amplify.list_apps
  calls:
  - action: list_branches
    save_as: response
    on_error: continue
    params:
      appId: '{{ item.appAppId }}'
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.branches }}'
- discovery_id: aws.amplify.list_jobs
  for_each: aws.amplify.list_apps
  calls:
  - action: list_jobs
    save_as: response
    on_error: continue
    params:
      appId: '{{ item.branchBranchName }}'
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.jobSummaries }}'
- discovery_id: aws.amplify.list_domain_associations
  for_each: aws.amplify.list_apps
  calls:
  - action: list_domain_associations
    save_as: response
    on_error: continue
    params:
      appId: '{{ item.appAppId }}'
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.domainAssociations }}'
- discovery_id: aws.amplify.list_webhooks
  for_each: aws.amplify.list_apps
  calls:
  - action: list_webhooks
    save_as: response
    on_error: continue
    params:
      appId: '{{ item.appAppId }}'
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.webhooks }}'
- discovery_id: aws.amplify.list_backend_environments
  for_each: aws.amplify.list_apps
  calls:
  - action: list_backend_environments
    save_as: response
    on_error: continue
    params:
      appId: '{{ item.appAppId }}'
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.backendEnvironments }}'
- discovery_id: aws.amplify.get_job
  for_each: aws.amplify.list_apps
  calls:
  - action: get_job
    save_as: response
    on_error: continue
    params:
      appId: '{{ item.jobSummaryJobId }}'
  emit:
    as: item
    items_for: '{{ response.job }}'
- discovery_id: aws.amplify.list_artifacts
  for_each: aws.amplify.list_apps
  calls:
  - action: list_artifacts
    save_as: response
    on_error: continue
    params:
      appId: '{{ item.jobSummaryJobId }}'
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.artifacts }}'
- discovery_id: aws.amplify.get_branch
  for_each: aws.amplify.list_apps
  calls:
  - action: get_branch
    save_as: response
    on_error: continue
    params:
      appId: '{{ item.branchBranchName }}'
  emit:
    as: item
    items_for: '{{ response.branch }}'
- discovery_id: aws.amplify.get_app
  for_each: aws.amplify.list_apps
  calls:
  - action: get_app
    save_as: response
    on_error: continue
    params:
      appId: '{{ item.appAppId }}'
  emit:
    as: item
    items_for: '{{ response.app }}'
- discovery_id: aws.amplify.get_domain_association
  for_each: aws.amplify.list_apps
  calls:
  - action: get_domain_association
    save_as: response
    on_error: continue
    params:
      appId: '{{ item.domainAssociationDomainName }}'
  emit:
    as: item
    items_for: '{{ response.domainAssociation }}'
- discovery_id: aws.amplify.get_webhook
  for_each: aws.amplify.list_webhooks
  calls:
  - action: get_webhook
    save_as: response
    on_error: continue
    params:
      webhookId: '{{ item.webhookWebhookId }}'
  emit:
    as: item
    items_for: '{{ response.webhook }}'
- discovery_id: aws.amplify.get_backend_environment
  for_each: aws.amplify.list_apps
  calls:
  - action: get_backend_environment
    save_as: response
    on_error: continue
    params:
      appId: '{{ item.backendEnvironmentEnvironmentName }}'
  emit:
    as: item
    items_for: '{{ response.backendEnvironment }}'
checks: []
