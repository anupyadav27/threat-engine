version: '1.0'
provider: aws
service: kinesisanalytics
services:
  client: kinesisanalytics
  module: boto3.client
discovery:
- discovery_id: aws.kinesisanalytics.list_applications
  calls:
  - action: list_applications
    save_as: response
    on_error: continue
    params:
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.ApplicationSummaries }}'
- discovery_id: aws.kinesisanalytics.describe_application
  for_each: aws.kinesisanalytics.list_applications
  calls:
  - action: describe_application
    save_as: response
    on_error: continue
    params:
      ApplicationName: '{{ item.applicationSummaryApplicationName }}'
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.ApplicationDetail }}'
- discovery_id: aws.kinesisanalytics.list_tags_for_resource
  calls:
  - action: list_tags_for_resource
    save_as: response
    on_error: continue
    params:
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.Tags }}'
checks: []
