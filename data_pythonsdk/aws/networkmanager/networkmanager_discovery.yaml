    save_as: response
    on_error: continue
    params:
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.OrganizationStatus }}'
- discovery_id: aws.networkmanager.get_devices
  for_each: aws.networkmanager.describe_global_networks
  calls:
  - action: get_devices
    save_as: response
    on_error: continue
    params:
      GlobalNetworkId: '{{ item.globalNetworkGlobalNetworkId }}'
  emit:
    as: item
    items_for: '{{ response.Devices }}'
