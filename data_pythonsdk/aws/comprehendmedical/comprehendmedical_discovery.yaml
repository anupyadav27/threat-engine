version: '1.0'
provider: aws
service: comprehendmedical
services:
  client: comprehendmedical
  module: boto3.client
discovery:
- discovery_id: aws.comprehendmedical.list_phi_detection_jobs
  calls:
  - action: list_phi_detection_jobs
    save_as: response
    on_error: continue
    params:
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.ComprehendMedicalAsyncJobPropertiesList }}'
- discovery_id: aws.comprehendmedical.describe_snomedct_inference_job
  for_each: aws.comprehendmedical.list_phi_detection_jobs
  calls:
  - action: describe_snomedct_inference_job
    save_as: response
    on_error: continue
    params:
      JobId: '{{ item.comprehendMedicalAsyncJobPropertiesListJobId }}'
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.ComprehendMedicalAsyncJobProperties }}'
checks: []
