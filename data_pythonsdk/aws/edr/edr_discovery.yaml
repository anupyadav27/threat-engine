version: '1.0'
provider: aws
service: edr
services:
  client: edr
  module: boto3.client
discovery:
- discovery_id: aws.edr.list_cases
  calls:
  - action: list_cases
    save_as: response
    on_error: continue
    params:
      maxResults: 1000
  emit:
    as: item
    items_for: '{{ response.items }}'
- discovery_id: aws.edr.list_memberships
  calls:
  - action: list_memberships
    save_as: response
    on_error: continue
    params:
      maxResults: 1000
  emit:
    as: item
    items_for: '{{ response.items }}'
checks: []
