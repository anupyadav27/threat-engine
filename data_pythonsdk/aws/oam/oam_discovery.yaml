version: '1.0'
provider: aws
service: oam
services:
  client: oam
  module: boto3.client
discovery:
- discovery_id: aws.oam.list_links
  calls:
  - action: list_links
    save_as: response
    on_error: continue
    params:
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.Items }}'
- discovery_id: aws.oam.list_sinks
  calls:
  - action: list_sinks
    save_as: response
    on_error: continue
    params:
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.Items }}'
- discovery_id: aws.oam.list_attached_links
  calls:
  - action: list_attached_links
    save_as: response
    on_error: continue
    params:
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.Items }}'
- discovery_id: aws.oam.get_sink_policy
  calls:
  - action: get_sink_policy
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.Policy }}'
checks: []
