version: '1.0'
provider: aws
service: resiliencehub
services:
  client: resiliencehub
  module: boto3.client
discovery:
- discovery_id: aws.resiliencehub.list_app_assessments
  calls:
  - action: list_app_assessments
    save_as: response
    on_error: continue
    params:
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.assessmentSummaries }}'
- discovery_id: aws.resiliencehub.list_recommendation_templates
  calls:
  - action: list_recommendation_templates
    save_as: response
    on_error: continue
    params:
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.recommendationTemplates }}'
- discovery_id: aws.resiliencehub.list_apps
  calls:
  - action: list_apps
    save_as: response
    on_error: continue
    params:
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.appSummaries }}'
- discovery_id: aws.resiliencehub.list_suggested_resiliency_policies
  calls:
  - action: list_suggested_resiliency_policies
    save_as: response
    on_error: continue
    params:
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.resiliencyPolicies }}'
- discovery_id: aws.resiliencehub.list_resource_grouping_recommendations
  calls:
  - action: list_resource_grouping_recommendations
    save_as: response
    on_error: continue
    params:
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.groupingRecommendations }}'
- discovery_id: aws.resiliencehub.list_test_recommendations
  for_each: aws.resiliencehub.list_app_assessments
  calls:
  - action: list_test_recommendations
    save_as: response
    on_error: continue
    params:
      assessmentArn: '{{ item.assessmentSummaryAssessmentArn }}'
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.testRecommendations }}'
- discovery_id: aws.resiliencehub.describe_app_version_resource
  for_each: aws.resiliencehub.list_app_assessments
  calls:
