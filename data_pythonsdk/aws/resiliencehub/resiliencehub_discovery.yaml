      appArn: '{{ item.assessmentSummaryAppVersion }}'
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.physicalResource }}'
- discovery_id: aws.resiliencehub.list_app_assessment_compliance_drifts
