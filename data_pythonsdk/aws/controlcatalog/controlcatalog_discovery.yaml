version: '1.0'
provider: aws
service: controlcatalog
services:
  client: controlcatalog
  module: boto3.client
discovery:
- discovery_id: aws.controlcatalog.list_controls
  calls:
  - action: list_controls
    save_as: response
    on_error: continue
    params:
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.Controls }}'
- discovery_id: aws.controlcatalog.list_common_controls
  calls:
  - action: list_common_controls
    save_as: response
    on_error: continue
    params:
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.CommonControls }}'
- discovery_id: aws.controlcatalog.list_control_mappings
  calls:
  - action: list_control_mappings
    save_as: response
    on_error: continue
    params:
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.ControlMappings }}'
- discovery_id: aws.controlcatalog.get_control
  for_each: aws.controlcatalog.list_control_mappings
  calls:
  - action: get_control
    save_as: response
    on_error: continue
    params:
      ControlArn: '{{ item.controlMappingControlArn }}'
  emit:
    as: item
    items_for: '{{ response.GovernedResources }}'
checks: []
