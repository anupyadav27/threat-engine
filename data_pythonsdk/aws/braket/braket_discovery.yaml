version: '1.0'
provider: aws
service: braket
services:
  client: braket
  module: boto3.client
discovery:
- discovery_id: aws.braket.get_job
  calls:
  - action: get_job
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.inputDataConfig }}'
- discovery_id: aws.braket.get_device
  calls:
  - action: get_device
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.deviceQueueInfo }}'
- discovery_id: aws.braket.get_quantum_task
  calls:
  - action: get_quantum_task
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.associations }}'
checks: []
