version: '1.0'
provider: aws
service: managedblockchain-query
services:
  client: managedblockchain-query
  module: boto3.client
discovery:
- discovery_id: aws.managedblockchain-query.list_token_balances
  calls:
  - action: list_token_balances
    save_as: response
    on_error: continue
    params:
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.tokenBalances }}'
- discovery_id: aws.managedblockchain-query.list_asset_contracts
  calls:
  - action: list_asset_contracts
    save_as: response
    on_error: continue
    params:
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.contracts }}'
- discovery_id: aws.managedblockchain-query.get_asset_contract
  for_each: aws.managedblockchain-query.list_asset_contracts
  calls:
  - action: get_asset_contract
    save_as: response
    on_error: continue
    params:
      contractIdentifier: '{{ item.contractContractIdentifier }}'
  emit:
    as: item
    items_for: '{{ response.contractIdentifier }}'
- discovery_id: aws.managedblockchain-query.get_transaction
  for_each: aws.managedblockchain-query.get_asset_contract
  calls:
  - action: get_transaction
    save_as: response
    on_error: continue
    params:
      network: '{{ item.contractIdentifierNetwork }}'
  emit:
    as: item
    items_for: '{{ response.transaction }}'
- discovery_id: aws.managedblockchain-query.list_filtered_transaction_events
  for_each: aws.managedblockchain-query.get_asset_contract
  calls:
  - action: list_filtered_transaction_events
    save_as: response
    on_error: continue
    params:
      network: '{{ item.contractIdentifierNetwork }}'
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.events }}'
- discovery_id: aws.managedblockchain-query.get_token_balance
  for_each: aws.managedblockchain-query.list_token_balances
  calls:
  - action: get_token_balance
    save_as: response
    on_error: continue
    params:
      tokenIdentifier: '{{ item.tokenBalancTokenIdentifier }}'
  emit:
    as: item
    items_for: '{{ response.ownerIdentifier }}'
checks: []
