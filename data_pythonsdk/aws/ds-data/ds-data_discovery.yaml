version: '1.0'
provider: aws
service: ds-data
services:
  client: ds-data
  module: boto3.client
discovery:
- discovery_id: aws.ds-data.list_group_members
  calls:
  - action: list_group_members
    save_as: response
    on_error: continue
    params:
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.Members }}'
checks: []
