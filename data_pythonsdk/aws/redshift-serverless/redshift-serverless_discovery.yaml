version: '1.0'
provider: aws
service: redshift-serverless
services:
  client: redshift-serverless
  module: boto3.client
discovery:
- discovery_id: aws.redshift-serverless.list_workgroups
  calls:
  - action: list_workgroups
    save_as: response
    on_error: continue
    params:
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.workgroups }}'
- discovery_id: aws.redshift-serverless.get_snapshot
  calls:
  - action: get_snapshot
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.snapshot }}'
- discovery_id: aws.redshift-serverless.list_table_restore_status
  calls:
  - action: list_table_restore_status
    save_as: response
    on_error: continue
    params:
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.tableRestoreStatuses }}'
- discovery_id: aws.redshift-serverless.list_namespaces
  calls:
  - action: list_namespaces
    save_as: response
    on_error: continue
    params:
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.namespaces }}'
- discovery_id: aws.redshift-serverless.list_endpoint_access
  calls:
  - action: list_endpoint_access
    save_as: response
    on_error: continue
    params:
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.endpoints }}'
- discovery_id: aws.redshift-serverless.list_reservations
  calls:
  - action: list_reservations
    save_as: response
    on_error: continue
    params:
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.reservationsList }}'
- discovery_id: aws.redshift-serverless.list_usage_limits
  calls:
  - action: list_usage_limits
    save_as: response
    on_error: continue
    params:
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.usageLimits }}'
- discovery_id: aws.redshift-serverless.list_reservation_offerings
  calls:
  - action: list_reservation_offerings
    save_as: response
    on_error: continue
    params:
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.reservationOfferingsList }}'
- discovery_id: aws.redshift-serverless.list_snapshot_copy_configurations
  calls:
  - action: list_snapshot_copy_configurations
    save_as: response
    on_error: continue
    params:
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.snapshotCopyConfigurations }}'
- discovery_id: aws.redshift-serverless.list_recovery_points
  calls:
  - action: list_recovery_points
    save_as: response
    on_error: continue
    params:
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.recoveryPoints }}'
- discovery_id: aws.redshift-serverless.list_managed_workgroups
  calls:
  - action: list_managed_workgroups
    save_as: response
    on_error: continue
    params:
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.managedWorkgroups }}'
- discovery_id: aws.redshift-serverless.get_credentials
  calls:
  - action: get_credentials
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.dbPassword }}'
- discovery_id: aws.redshift-serverless.list_tracks
  calls:
  - action: list_tracks
    save_as: response
    on_error: continue
    params:
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.tracks }}'
- discovery_id: aws.redshift-serverless.list_scheduled_actions
  calls:
  - action: list_scheduled_actions
    save_as: response
    on_error: continue
    params:
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.scheduledActions }}'
- discovery_id: aws.redshift-serverless.get_scheduled_action
  for_each: aws.redshift-serverless.list_scheduled_actions
  calls:
  - action: get_scheduled_action
    save_as: response
    on_error: continue
    params:
      scheduledActionName: '{{ item.scheduledActionScheduledActionName }}'
  emit:
    as: item
    items_for: '{{ response.scheduledAction }}'
- discovery_id: aws.redshift-serverless.get_resource_policy
  for_each: aws.redshift-serverless.list_usage_limits
  calls:
  - action: get_resource_policy
    save_as: response
    on_error: continue
    params:
      resourceArn: '{{ item.usageLimitResourceArn }}'
  emit:
    as: item
    items_for: '{{ response.resourcePolicy }}'
- discovery_id: aws.redshift-serverless.list_tags_for_resource
  for_each: aws.redshift-serverless.list_usage_limits
  calls:
  - action: list_tags_for_resource
    save_as: response
    on_error: continue
    params:
      resourceArn: '{{ item.usageLimitResourceArn }}'
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.tags }}'
- discovery_id: aws.redshift-serverless.get_track
  for_each: aws.redshift-serverless.list_workgroups
  calls:
  - action: get_track
    save_as: response
    on_error: continue
    params:
      trackName: '{{ item.trackTrackName }}'
  emit:
    as: item
    items_for: '{{ response.track }}'
checks: []
