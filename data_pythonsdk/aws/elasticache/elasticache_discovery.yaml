version: '1.0'
provider: aws
service: elasticache
services:
  client: elasticache
  module: boto3.client
discovery:
- discovery_id: aws.elasticache.describe_cache_clusters
  calls:
  - action: describe_cache_clusters
    save_as: response
    on_error: continue
    params:
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.CacheClusters }}'
- discovery_id: aws.elasticache.describe_replication_groups
  calls:
  - action: describe_replication_groups
    save_as: response
    on_error: continue
    params:
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.ReplicationGroups }}'
- discovery_id: aws.elasticache.describe_snapshots
  calls:
  - action: describe_snapshots
    save_as: response
    on_error: continue
    params:
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.Snapshots }}'
- discovery_id: aws.elasticache.describe_update_actions
  calls:
  - action: describe_update_actions
    save_as: response
    on_error: continue
    params:
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.UpdateActions }}'
- discovery_id: aws.elasticache.describe_serverless_caches
  calls:
  - action: describe_serverless_caches
    save_as: response
    on_error: continue
    params:
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.ServerlessCaches }}'
- discovery_id: aws.elasticache.describe_global_replication_groups
  calls:
  - action: describe_global_replication_groups
    save_as: response
    on_error: continue
    params:
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.GlobalReplicationGroups }}'
- discovery_id: aws.elasticache.describe_reserved_cache_nodes
  calls:
  - action: describe_reserved_cache_nodes
    save_as: response
    on_error: continue
    params:
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.ReservedCacheNodes }}'
- discovery_id: aws.elasticache.describe_service_updates
  calls:
  - action: describe_service_updates
    save_as: response
    on_error: continue
    params:
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.ServiceUpdates }}'
- discovery_id: aws.elasticache.describe_users
  calls:
  - action: describe_users
    save_as: response
    on_error: continue
    params:
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.Users }}'
- discovery_id: aws.elasticache.describe_user_groups
  calls:
  - action: describe_user_groups
    save_as: response
    on_error: continue
    params:
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.UserGroups }}'
- discovery_id: aws.elasticache.describe_serverless_cache_snapshots
  calls:
  - action: describe_serverless_cache_snapshots
    save_as: response
    on_error: continue
    params:
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.ServerlessCacheSnapshots }}'
- discovery_id: aws.elasticache.describe_reserved_cache_nodes_offerings
  calls:
  - action: describe_reserved_cache_nodes_offerings
    save_as: response
    on_error: continue
    params:
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.ReservedCacheNodesOfferings }}'
- discovery_id: aws.elasticache.describe_cache_subnet_groups
  calls:
  - action: describe_cache_subnet_groups
    save_as: response
    on_error: continue
    params:
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.CacheSubnetGroups }}'
- discovery_id: aws.elasticache.describe_cache_security_groups
  calls:
  - action: describe_cache_security_groups
    save_as: response
    on_error: continue
    params:
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.CacheSecurityGroups }}'
- discovery_id: aws.elasticache.describe_cache_parameter_groups
  calls:
  - action: describe_cache_parameter_groups
    save_as: response
    on_error: continue
    params:
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.CacheParameterGroups }}'
- discovery_id: aws.elasticache.describe_cache_engine_versions
  calls:
  - action: describe_cache_engine_versions
    save_as: response
    on_error: continue
    params:
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.CacheEngineVersions }}'
- discovery_id: aws.elasticache.describe_events
  calls:
  - action: describe_events
    save_as: response
    on_error: continue
    params:
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.Events }}'
- discovery_id: aws.elasticache.describe_cache_parameters
  for_each: aws.elasticache.describe_snapshots
  calls:
  - action: describe_cache_parameters
    save_as: response
    on_error: continue
    params:
      CacheParameterGroupName: '{{ item.cacheParameterGroupCacheParameterGroupName }}'
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.Parameters }}'
- discovery_id: aws.elasticache.list_tags_for_resource
  calls:
  - action: list_tags_for_resource
    save_as: response
    on_error: continue
    params:
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.TagList }}'
checks: []
