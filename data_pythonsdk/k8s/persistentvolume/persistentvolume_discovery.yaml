version: '1.0'
provider: k8s
service: persistentvolume
services:
  client: persistentvolume
  module: kubernetes.client
discovery:
- discovery_id: k8s.persistentvolume.get
  calls:
  - action: get
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
checks: []
