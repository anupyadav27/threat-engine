version: '1.0'
provider: k8s
service: persistentvolumeclaim
services:
  client: persistentvolumeclaim
  module: kubernetes.client
discovery:
- discovery_id: k8s.persistentvolumeclaim.list
  calls:
  - action: list
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
checks: []
