version: '1.0'
provider: alicloud
service: ram
services:
  client: ram
  module: aliyunsdkram
discovery:
- discovery_id: alicloud.ram.GetAccessKeyLastUsed
  calls:
  - action: GetAccessKeyLastUsed
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
