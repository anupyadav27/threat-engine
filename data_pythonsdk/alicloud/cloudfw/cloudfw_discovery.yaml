version: '1.0'
provider: alicloud
service: cloudfw
services:
  client: cloudfw
  module: aliyunsdkcloudfw
discovery:
- discovery_id: alicloud.cloudfw.DescribeDefaultIPSConfig
  calls:
  - action: DescribeDefaultIPSConfig
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
