version: '1.0'
provider: alicloud
service: vpc
services:
  client: vpc
  module: aliyunsdkvpc
discovery:
- discovery_id: alicloud.vpc.DescribeBgpPeers
  calls:
  - action: DescribeBgpPeers
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.vpc.DescribeBgpNetworks
  calls:
  - action: DescribeBgpNetworks
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.vpc.Describe95Traffic
  calls:
  - action: Describe95Traffic
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.vpc.DescribeAccessPoints
  calls:
  - action: DescribeAccessPoints
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.vpc.DescribeBgpGroups
  calls:
  - action: DescribeBgpGroups
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
checks: []
