version: '1.0'
provider: alicloud
service: oss
services:
  client: oss
  module: oss2
discovery:
- discovery_id: alicloud.oss.DescribeRegionsResult
  calls:
  - action: DescribeRegionsResult
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.oss.GetAccessPointResult
  calls:
  - action: GetAccessPointResult
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.oss.GetAsyncFetchTaskResult
