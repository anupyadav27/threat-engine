version: '1.0'
provider: alicloud
service: ims
services:
  client: ims
  module: aliyunsdkims
discovery:
- discovery_id: alicloud.ims.GetDirectory
  calls:
  - action: GetDirectory
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.ims.GetGroup
  calls:
  - action: GetGroup
