version: '1.0'
provider: alicloud
service: kms
services:
  client: kms
  module: aliyunsdkkms
discovery:
- discovery_id: alicloud.kms.DescribeKey
  calls:
  - action: DescribeKey
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.kms.DescribeCertificate
  calls:
  - action: DescribeCertificate
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.kms.DescribeAccountKmsStatus
  calls:
  - action: DescribeAccountKmsStatus
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.kms.DescribePolicy
  calls:
  - action: DescribePolicy
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.kms.DescribeSecret
  calls:
  - action: DescribeSecret
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.kms.DescribeKeyVersion
  calls:
  - action: DescribeKeyVersion
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.kms.DescribeNetworkRule
  calls:
  - action: DescribeNetworkRule
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.kms.DescribeApplicationAccessPoint
  calls:
  - action: DescribeApplicationAccessPoint
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.kms.DescribeRegions
  for_each: alicloud.kms.describe_key
  calls:
  - action: DescribeRegions
    save_as: response
    on_error: continue
    params:
      RegionId: '{{ item.RegionId }}'
  emit:
    as: item
    items_for: '{{ response }}'
checks: []
