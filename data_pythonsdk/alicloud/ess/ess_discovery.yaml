version: '1.0'
provider: alicloud
service: ess
services:
  client: ess
  module: aliyunsdkess
discovery:
- discovery_id: alicloud.ess.DescribeElasticStrength
  calls:
  - action: DescribeElasticStrength
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.ess.DescribeLifecycleHooks
  calls:
  - action: DescribeLifecycleHooks
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.ess.DescribeLifecycleActions
  calls:
  - action: DescribeLifecycleActions
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.ess.DescribeEciScalingConfigurations
  calls:
  - action: DescribeEciScalingConfigurations
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.ess.DescribeLimitation
  calls:
  - action: DescribeLimitation
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.ess.DescribeNotificationTypes
  calls:
  - action: DescribeNotificationTypes
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.ess.DescribePatternTypes
  calls:
  - action: DescribePatternTypes
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.ess.DescribeAlarms
  calls:
  - action: DescribeAlarms
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.ess.DescribeNotificationConfigurations
  calls:
  - action: DescribeNotificationConfigurations
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.ess.DescribeRegions
  for_each: alicloud.ess.describe_elastic_strength
  calls:
  - action: DescribeRegions
    save_as: response
    on_error: continue
    params:
      RegionId: '{{ item.RegionId }}'
  emit:
    as: item
    items_for: '{{ response }}'
checks: []
