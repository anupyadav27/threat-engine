version: '1.0'
provider: alicloud
service: alb
services:
  client: alb
  module: aliyunsdkalb
discovery:
- discovery_id: alicloud.alb.DescribeZones
  calls:
  - action: DescribeZones
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.alb.GetHealthCheckTemplateAttribute
  calls:
  - action: GetHealthCheckTemplateAttribute
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
checks: []
