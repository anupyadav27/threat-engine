version: '1.0'
provider: alicloud
service: actiontrail
services:
  client: actiontrail
  module: aliyunsdkactiontrail
discovery:
- discovery_id: alicloud.actiontrail.DescribeTrails
  calls:
  - action: DescribeTrails
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.actiontrail.GetTrailStatus
  calls:
  - action: GetTrailStatus
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
