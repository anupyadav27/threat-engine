version: '1.0'
provider: ibm
service: resource_controller
services:
  client: resource_controller
  module: ResourceControllerV2
discovery:
- discovery_id: ibm.resource_controller.list-reclamations
  calls:
  - action: list-reclamations
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.items }}'
- discovery_id: ibm.resource_controller.list-resource-bindings
  calls:
  - action: list-resource-bindings
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.items }}'
- discovery_id: ibm.resource_controller.list-resource-aliases
  calls:
  - action: list-resource-aliases
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.items }}'
- discovery_id: ibm.resource_controller.list-resource-instances
  calls:
  - action: list-resource-instances
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.items }}'
- discovery_id: ibm.resource_controller.list-resource-keys
  calls:
  - action: list-resource-keys
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.items }}'
- discovery_id: ibm.resource_controller.get-authenticator
  calls:
  - action: get-authenticator
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.item }}'
- discovery_id: ibm.resource_controller.get-http-client
  calls:
  - action: get-http-client
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.item }}'
- discovery_id: ibm.resource_controller.get-enable-gzip-compression
  calls:
  - action: get-enable-gzip-compression
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.item }}'
checks: []
