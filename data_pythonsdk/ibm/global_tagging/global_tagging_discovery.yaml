version: '1.0'
provider: ibm
service: global_tagging
services:
  client: global_tagging
  module: GlobalTaggingV1
discovery:
- discovery_id: ibm.global_tagging.list-tags
  calls:
  - action: list-tags
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.items }}'
- discovery_id: ibm.global_tagging.get-http-client
  calls:
  - action: get-http-client
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.item }}'
- discovery_id: ibm.global_tagging.get-authenticator
  calls:
  - action: get-authenticator
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.item }}'
- discovery_id: ibm.global_tagging.get-enable-gzip-compression
  calls:
  - action: get-enable-gzip-compression
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.item }}'
checks: []
