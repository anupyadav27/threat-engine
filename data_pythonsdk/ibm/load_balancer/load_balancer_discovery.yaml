version: '1.0'
provider: ibm
service: load_balancer
services:
  client: load_balancer
  module: ibm_cloud_sdk.load_balancer
discovery:
- discovery_id: ibm.load_balancer.get-load-balancer
  calls:
  - action: get-load-balancer
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: ibm.load_balancer.list-load-balancers
  calls:
  - action: list-load-balancers
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
checks: []
