version: '1.0'
provider: ibm
service: resource_manager
services:
  client: resource_manager
  module: ResourceManagerV2
discovery:
- discovery_id: ibm.resource_manager.list-quota-definitions
  calls:
  - action: list-quota-definitions
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.items }}'
- discovery_id: ibm.resource_manager.list-resource-groups
  calls:
  - action: list-resource-groups
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.items }}'
- discovery_id: ibm.resource_manager.get-http-client
  calls:
  - action: get-http-client
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.item }}'
- discovery_id: ibm.resource_manager.get-authenticator
  calls:
  - action: get-authenticator
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.item }}'
- discovery_id: ibm.resource_manager.get-enable-gzip-compression
  calls:
  - action: get-enable-gzip-compression
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.item }}'
checks: []
