version: '1.0'
provider: ibm
service: key_protect
services:
  client: key_protect
  module: ibm_cloud_sdk.key_protect
discovery:
- discovery_id: ibm.key_protect.get-key
  calls:
  - action: get-key
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: ibm.key_protect.list-keys
  calls:
  - action: list-keys
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
checks: []
