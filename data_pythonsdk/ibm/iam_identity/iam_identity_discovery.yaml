version: '1.0'
provider: ibm
service: iam_identity
services:
  client: iam_identity
  module: IamIdentityV1
discovery:
- discovery_id: ibm.iam_identity.list-api-keys
  calls:
  - action: list-api-keys
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.items }}'
- discovery_id: ibm.iam_identity.list-account-settings-assignments
  calls:
  - action: list-account-settings-assignments
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.items }}'
- discovery_id: ibm.iam_identity.list-account-settings-templates
  calls:
