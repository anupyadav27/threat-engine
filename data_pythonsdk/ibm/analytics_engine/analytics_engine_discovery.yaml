version: '1.0'
provider: ibm
service: analytics_engine
services:
  client: analytics_engine
  module: ibm_cloud_sdk.analytics_engine
discovery:
- discovery_id: ibm.analytics_engine.get-cluster
  calls:
  - action: get-cluster
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: ibm.analytics_engine.list-clusters
  calls:
  - action: list-clusters
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
checks: []
