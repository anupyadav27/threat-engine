version: '1.0'
provider: ibm
service: direct_link
services:
  client: direct_link
  module: ibm_cloud_sdk.direct_link
discovery:
- discovery_id: ibm.direct_link.get-connection
  calls:
  - action: get-connection
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: ibm.direct_link.list-connections
  calls:
  - action: list-connections
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
checks: []
