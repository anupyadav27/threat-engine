version: '1.0'
provider: ibm
service: data_virtualization
services:
  client: data_virtualization
  module: ibm_cloud_sdk.data_virtualization
discovery:
- discovery_id: ibm.data_virtualization.get-table
  calls:
  - action: get-table
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: ibm.data_virtualization.list-tables
  calls:
  - action: list-tables
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: ibm.data_virtualization.query-data
  calls:
  - action: query-data
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
checks: []
