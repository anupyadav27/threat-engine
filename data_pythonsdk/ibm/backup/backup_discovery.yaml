version: '1.0'
provider: ibm
service: backup
services:
  client: backup
  module: ibm_cloud_sdk.backup
discovery:
- discovery_id: ibm.backup.get-backup
  calls:
  - action: get-backup
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: ibm.backup.list-backups
  calls:
  - action: list-backups
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
checks: []
