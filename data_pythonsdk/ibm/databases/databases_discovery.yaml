version: '1.0'
provider: ibm
service: databases
services:
  client: databases
  module: ibm_cloud_sdk.databases
discovery:
- discovery_id: ibm.databases.get-backup
  calls:
  - action: get-backup
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: ibm.databases.get-deployment
  calls:
  - action: get-deployment
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: ibm.databases.list-backups
  calls:
  - action: list-backups
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: ibm.databases.list-deployments
  calls:
  - action: list-deployments
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
checks: []
