version: '1.0'
provider: ibm
service: monitoring
services:
  client: monitoring
  module: ibm_cloud_sdk.monitoring
discovery:
- discovery_id: ibm.monitoring.get-metric
  calls:
  - action: get-metric
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: ibm.monitoring.list-metrics
  calls:
  - action: list-metrics
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: ibm.monitoring.query-metrics
  calls:
  - action: query-metrics
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
checks: []
