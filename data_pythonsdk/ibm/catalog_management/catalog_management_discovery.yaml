version: '1.0'
provider: ibm
service: catalog_management
services:
  client: catalog_management
  module: CatalogManagementV1
discovery:
- discovery_id: ibm.catalog_management.list-catalogs
  calls:
  - action: list-catalogs
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.items }}'
- discovery_id: ibm.catalog_management.get-authenticator
  calls:
  - action: get-authenticator
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.item }}'
- discovery_id: ibm.catalog_management.get-catalog-account-audit
  calls:
  - action: get-catalog-account-audit
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.item }}'
- discovery_id: ibm.catalog_management.get-catalog-account-filters
  calls:
  - action: get-catalog-account-filters
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.item }}'
- discovery_id: ibm.catalog_management.get-http-client
  calls:
  - action: get-http-client
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.item }}'
- discovery_id: ibm.catalog_management.get-catalog-account
  calls:
  - action: get-catalog-account
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.item }}'
- discovery_id: ibm.catalog_management.get-enable-gzip-compression
  calls:
  - action: get-enable-gzip-compression
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.item }}'
- discovery_id: ibm.catalog_management.get-consumption-offerings
  calls:
  - action: get-consumption-offerings
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.item }}'
checks: []
