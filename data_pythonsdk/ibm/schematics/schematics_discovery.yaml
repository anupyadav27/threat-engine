version: '1.0'
provider: ibm
service: schematics
services:
  client: schematics
  module: SchematicsV1
discovery:
- discovery_id: ibm.schematics.list-inventories
  calls:
  - action: list-inventories
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.items }}'
