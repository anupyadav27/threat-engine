version: '1.0'
provider: ibm
service: continuous_delivery
services:
  client: continuous_delivery
  module: ibm_cloud_sdk.continuous_delivery
discovery:
- discovery_id: ibm.continuous_delivery.get-pipeline
  calls:
  - action: get-pipeline
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: ibm.continuous_delivery.list-pipelines
  calls:
  - action: list-pipelines
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
checks: []
