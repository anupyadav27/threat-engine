version: '1.0'
provider: ibm
service: secrets_manager
services:
  client: secrets_manager
  module: ibm_cloud_sdk.secrets_manager
discovery:
- discovery_id: ibm.secrets_manager.get-secret
  calls:
  - action: get-secret
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: ibm.secrets_manager.list-secrets
  calls:
  - action: list-secrets
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
checks: []
