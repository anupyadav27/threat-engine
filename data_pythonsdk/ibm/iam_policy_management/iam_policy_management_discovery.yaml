version: '1.0'
provider: ibm
service: iam_policy_management
services:
  client: iam_policy_management
  module: IamPolicyManagementV1
discovery:
- discovery_id: ibm.iam_policy_management.list-roles
  calls:
  - action: list-roles
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.items }}'
- discovery_id: ibm.iam_policy_management.get-http-client
  calls:
  - action: get-http-client
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.item }}'
- discovery_id: ibm.iam_policy_management.get-authenticator
  calls:
  - action: get-authenticator
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.item }}'
- discovery_id: ibm.iam_policy_management.get-enable-gzip-compression
  calls:
  - action: get-enable-gzip-compression
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.item }}'
checks: []
