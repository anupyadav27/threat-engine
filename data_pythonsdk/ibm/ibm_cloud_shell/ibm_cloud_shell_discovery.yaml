version: '1.0'
provider: ibm
service: ibm_cloud_shell
services:
  client: ibm_cloud_shell
  module: IbmCloudShellV1
discovery:
- discovery_id: ibm.ibm_cloud_shell.get-http-client
  calls:
  - action: get-http-client
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.item }}'
- discovery_id: ibm.ibm_cloud_shell.get-authenticator
  calls:
  - action: get-authenticator
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.item }}'
- discovery_id: ibm.ibm_cloud_shell.get-enable-gzip-compression
  calls:
  - action: get-enable-gzip-compression
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.item }}'
checks: []
