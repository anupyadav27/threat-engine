version: '1.0'
provider: ibm
service: internet_services
services:
  client: internet_services
  module: ibm_cloud_sdk.internet_services
discovery:
- discovery_id: ibm.internet_services.get-service
  calls:
  - action: get-service
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: ibm.internet_services.list-services
  calls:
  - action: list-services
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
checks: []
