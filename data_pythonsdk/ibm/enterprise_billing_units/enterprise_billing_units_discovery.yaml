version: '1.0'
provider: ibm
service: enterprise_billing_units
services:
  client: enterprise_billing_units
  module: EnterpriseBillingUnitsV1
discovery:
- discovery_id: ibm.enterprise_billing_units.list-billing-units
  calls:
  - action: list-billing-units
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.items }}'
- discovery_id: ibm.enterprise_billing_units.get-http-client
  calls:
  - action: get-http-client
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.item }}'
- discovery_id: ibm.enterprise_billing_units.get-authenticator
  calls:
  - action: get-authenticator
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.item }}'
- discovery_id: ibm.enterprise_billing_units.get-enable-gzip-compression
  calls:
  - action: get-enable-gzip-compression
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.item }}'
checks: []
