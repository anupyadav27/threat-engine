version: '1.0'
provider: ibm
service: event_notifications
services:
  client: event_notifications
  module: ibm_cloud_sdk.event_notifications
discovery:
- discovery_id: ibm.event_notifications.get-topic
  calls:
  - action: get-topic
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: ibm.event_notifications.list-topics
  calls:
  - action: list-topics
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
checks: []
