version: '1.0'
provider: ibm
service: watson_discovery
services:
  client: watson_discovery
  module: ibm_cloud_sdk.watson_discovery
discovery:
- discovery_id: ibm.watson_discovery.get-collection
  calls:
  - action: get-collection
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: ibm.watson_discovery.get-environment
  calls:
  - action: get-environment
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: ibm.watson_discovery.list-collections
  calls:
  - action: list-collections
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: ibm.watson_discovery.list-environments
  calls:
  - action: list-environments
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
checks: []
