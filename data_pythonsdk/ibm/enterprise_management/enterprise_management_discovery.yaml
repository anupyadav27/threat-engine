version: '1.0'
provider: ibm
service: enterprise_management
services:
  client: enterprise_management
  module: EnterpriseManagementV1
discovery:
- discovery_id: ibm.enterprise_management.list-accounts
  calls:
  - action: list-accounts
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.items }}'
- discovery_id: ibm.enterprise_management.list-account-groups
  calls:
  - action: list-account-groups
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.items }}'
- discovery_id: ibm.enterprise_management.list-enterprises
  calls:
  - action: list-enterprises
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.items }}'
- discovery_id: ibm.enterprise_management.get-http-client
  calls:
  - action: get-http-client
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.item }}'
- discovery_id: ibm.enterprise_management.get-authenticator
  calls:
  - action: get-authenticator
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.item }}'
- discovery_id: ibm.enterprise_management.get-enable-gzip-compression
  calls:
  - action: get-enable-gzip-compression
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.item }}'
checks: []
