version: '1.0'
provider: ibm
service: account
services:
  client: account
  module: ibm_cloud_sdk.account
discovery:
- discovery_id: ibm.account.get-account
  calls:
  - action: get-account
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: ibm.account.list-accounts
  calls:
  - action: list-accounts
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
checks: []
