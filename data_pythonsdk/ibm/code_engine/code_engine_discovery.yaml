version: '1.0'
provider: ibm
service: code_engine
services:
  client: code_engine
  module: ibm_cloud_sdk.code_engine
discovery:
- discovery_id: ibm.code_engine.get-app
  calls:
  - action: get-app
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: ibm.code_engine.get-job
  calls:
  - action: get-job
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: ibm.code_engine.get-project
  calls:
  - action: get-project
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: ibm.code_engine.list-apps
  calls:
  - action: list-apps
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: ibm.code_engine.list-jobs
  calls:
  - action: list-jobs
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: ibm.code_engine.list-projects
  calls:
  - action: list-projects
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
checks: []
