version: '1.0'
provider: oci
service: management_agent
services:
  client: management_agent
  module: oci.management_agent
discovery:
- discovery_id: oci.management_agent.get_auto_upgradable_config
  calls:
  - action: get_auto_upgradable_config
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.management_agent.get_management_agent
  calls:
  - action: get_management_agent
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.management_agent.get_management_agent_install_key_content
  calls:
  - action: get_management_agent_install_key_content
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.management_agent.get_named_credential
  calls:
  - action: get_named_credential
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.management_agent.get_data_source
  calls:
  - action: get_data_source
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.management_agent.get_management_agent_install_key
  calls:
  - action: get_management_agent_install_key
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.management_agent.get_work_request
  calls:
  - action: get_work_request
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.management_agent.get_named_credentials_metadatum
  calls:
  - action: get_named_credentials_metadatum
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.management_agent.list_management_agent_images
  for_each: oci.management_agent.get_auto_upgradable_config
  calls:
  - action: list_management_agent_images
    save_as: response
    on_error: continue
    params:
      compartment_id: '{{ item.compartment_id }}'
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.management_agent.list_data_sources
  for_each: oci.management_agent.get_auto_upgradable_config
  calls:
  - action: list_data_sources
    save_as: response
    on_error: continue
    params:
      compartment_id: '{{ item.compartment_id }}'
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.management_agent.list_work_request_errors
  for_each: oci.management_agent.get_auto_upgradable_config
  calls:
  - action: list_work_request_errors
    save_as: response
    on_error: continue
    params:
      compartment_id: '{{ item.compartment_id }}'
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.management_agent.list_availability_histories
  for_each: oci.management_agent.get_auto_upgradable_config
  calls:
  - action: list_availability_histories
    save_as: response
    on_error: continue
    params:
      compartment_id: '{{ item.compartment_id }}'
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.management_agent.list_management_agent_plugins
  for_each: oci.management_agent.get_auto_upgradable_config
  calls:
  - action: list_management_agent_plugins
    save_as: response
    on_error: continue
    params:
      compartment_id: '{{ item.compartment_id }}'
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.management_agent.list_work_request_logs
  for_each: oci.management_agent.get_auto_upgradable_config
  calls:
  - action: list_work_request_logs
    save_as: response
    on_error: continue
    params:
      compartment_id: '{{ item.compartment_id }}'
  emit:
    as: item
    items_for: '{{ response }}'
checks: []
