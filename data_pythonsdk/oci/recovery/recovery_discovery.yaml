version: '1.0'
provider: oci
service: recovery
services:
  client: recovery
  module: oci.recovery
discovery:
- discovery_id: oci.recovery.get_protection_policy
  calls:
  - action: get_protection_policy
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.recovery.get_recovery_service_subnet
  calls:
  - action: get_recovery_service_subnet
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.recovery.get_protected_database
  calls:
  - action: get_protected_database
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.recovery.get_work_request
  calls:
  - action: get_work_request
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.recovery.list_work_request_errors
  for_each: oci.recovery.get_protection_policy
  calls:
  - action: list_work_request_errors
    save_as: response
    on_error: continue
    params:
      compartment_id: '{{ item.compartment_id }}'
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.recovery.list_protected_databases
  for_each: oci.recovery.get_protection_policy
  calls:
  - action: list_protected_databases
    save_as: response
    on_error: continue
    params:
      compartment_id: '{{ item.compartment_id }}'
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.recovery.list_work_request_logs
  for_each: oci.recovery.get_protection_policy
  calls:
  - action: list_work_request_logs
    save_as: response
    on_error: continue
    params:
      compartment_id: '{{ item.compartment_id }}'
  emit:
    as: item
    items_for: '{{ response }}'
checks: []
