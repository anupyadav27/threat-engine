version: '1.0'
provider: oci
service: network_load_balancer
services:
  client: network_load_balancer
  module: oci.network_load_balancer
discovery:
- discovery_id: oci.network_load_balancer.get_backend_set_health
  calls:
  - action: get_backend_set_health
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.network_load_balancer.get_backend_operational_status
  calls:
  - action: get_backend_operational_status
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.network_load_balancer.get_health_checker
  calls:
  - action: get_health_checker
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.network_load_balancer.get_backend_health
  calls:
  - action: get_backend_health
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.network_load_balancer.get_listener
  calls:
  - action: get_listener
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.network_load_balancer.get_backend
  calls:
  - action: get_backend
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.network_load_balancer.get_backend_set
  calls:
  - action: get_backend_set
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.network_load_balancer.get_network_load_balancer_health
  calls:
  - action: get_network_load_balancer_health
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.network_load_balancer.get_work_request
  calls:
  - action: get_work_request
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.network_load_balancer.get_network_load_balancer
  calls:
  - action: get_network_load_balancer
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.network_load_balancer.list_work_request_errors
  for_each: oci.network_load_balancer.get_backend_set_health
  calls:
  - action: list_work_request_errors
    save_as: response
    on_error: continue
    params:
      compartment_id: '{{ item.compartment_id }}'
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.network_load_balancer.list_network_load_balancers_protocols
  for_each: oci.network_load_balancer.get_backend_set_health
  calls:
  - action: list_network_load_balancers_protocols
    save_as: response
    on_error: continue
    params:
      compartment_id: '{{ item.compartment_id }}'
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.network_load_balancer.list_work_request_logs
  for_each: oci.network_load_balancer.get_backend_set_health
  calls:
  - action: list_work_request_logs
    save_as: response
    on_error: continue
    params:
      compartment_id: '{{ item.compartment_id }}'
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.network_load_balancer.list_network_load_balancers_policies
  for_each: oci.network_load_balancer.get_backend_set_health
  calls:
  - action: list_network_load_balancers_policies
    save_as: response
    on_error: continue
    params:
      compartment_id: '{{ item.compartment_id }}'
  emit:
    as: item
    items_for: '{{ response }}'
checks: []
