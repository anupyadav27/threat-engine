version: '1.0'
provider: oci
service: block_storage
services:
  client: block_storage
  module: oci.core
discovery:
- discovery_id: oci.block_storage.get_boot_volume_replica
  calls:
  - action: get_boot_volume_replica
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.block_storage.get_boot_volume_kms_key
  calls:
  - action: get_boot_volume_kms_key
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.block_storage.get_volume_kms_key
  calls:
  - action: get_volume_kms_key
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.block_storage.get_volume_group_backup
  calls:
  - action: get_volume_group_backup
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.block_storage.get_boot_volume
  calls:
  - action: get_boot_volume
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.block_storage.get_volume_group
  calls:
  - action: get_volume_group
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.block_storage.get_block_volume_replica
  calls:
  - action: get_block_volume_replica
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.block_storage.get_volume
  calls:
  - action: get_volume
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.block_storage.get_volume_backup_policy
  calls:
  - action: get_volume_backup_policy
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.block_storage.get_volume_backup_policy_assignment
  calls:
  - action: get_volume_backup_policy_assignment
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.block_storage.get_volume_backup_policy_asset_assignment
  calls:
  - action: get_volume_backup_policy_asset_assignment
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.block_storage.get_boot_volume_backup
  calls:
  - action: get_boot_volume_backup
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.block_storage.get_volume_group_replica
  calls:
  - action: get_volume_group_replica
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.block_storage.get_volume_backup
  calls:
  - action: get_volume_backup
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.block_storage.list_boot_volumes
  for_each: oci.block_storage.get_boot_volume_replica
  calls:
  - action: list_boot_volumes
    save_as: response
    on_error: continue
    params:
      compartment_id: '{{ item.compartment_id }}'
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.block_storage.list_volumes
  for_each: oci.block_storage.get_boot_volume_replica
  calls:
  - action: list_volumes
    save_as: response
    on_error: continue
    params:
      compartment_id: '{{ item.compartment_id }}'
  emit:
    as: item
    items_for: '{{ response }}'
checks: []
