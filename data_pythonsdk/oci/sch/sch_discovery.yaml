version: '1.0'
provider: oci
service: sch
services:
  client: sch
  module: oci.sch
discovery:
- discovery_id: oci.sch.get_service_connector
  calls:
  - action: get_service_connector
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.sch.get_work_request
  calls:
  - action: get_work_request
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.sch.list_work_request_errors
  for_each: oci.sch.get_service_connector
  calls:
  - action: list_work_request_errors
    save_as: response
    on_error: continue
    params:
      compartment_id: '{{ item.compartment_id }}'
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.sch.list_work_request_logs
  for_each: oci.sch.get_service_connector
  calls:
  - action: list_work_request_logs
    save_as: response
    on_error: continue
    params:
      compartment_id: '{{ item.compartment_id }}'
  emit:
    as: item
    items_for: '{{ response }}'
checks: []
