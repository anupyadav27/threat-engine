version: '1.0'
provider: oci
service: certificates_management
services:
  client: certificates_management
  module: oci.certificates_management
discovery:
- discovery_id: oci.certificates_management.get_certificate_version
  calls:
  - action: get_certificate_version
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.certificates_management.get_certificate_authority_version
  calls:
  - action: get_certificate_authority_version
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.certificates_management.get_association
  calls:
  - action: get_association
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.certificates_management.get_certificate_authority
  calls:
  - action: get_certificate_authority
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.certificates_management.get_certificate
  calls:
  - action: get_certificate
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.certificates_management.get_ca_bundle
  calls:
  - action: get_ca_bundle
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.certificates_management.list_ca_bundles
  for_each: oci.certificates_management.get_certificate_version
  calls:
  - action: list_ca_bundles
    save_as: response
    on_error: continue
    params:
      compartment_id: '{{ item.compartment_id }}'
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.certificates_management.list_certificates
  for_each: oci.certificates_management.get_certificate_version
  calls:
  - action: list_certificates
    save_as: response
    on_error: continue
    params:
      compartment_id: '{{ item.compartment_id }}'
  emit:
    as: item
    items_for: '{{ response }}'
checks: []
