version: '1.0'
provider: oci
service: management_dashboard
services:
  client: management_dashboard
  module: oci.management_dashboard
discovery:
- discovery_id: oci.management_dashboard.get_management_dashboard
  calls:
  - action: get_management_dashboard
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.management_dashboard.get_management_saved_search
  calls:
  - action: get_management_saved_search
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.management_dashboard.get_oob_management_saved_search
  calls:
  - action: get_oob_management_saved_search
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.management_dashboard.get_oob_management_dashboard
  calls:
  - action: get_oob_management_dashboard
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
checks: []
