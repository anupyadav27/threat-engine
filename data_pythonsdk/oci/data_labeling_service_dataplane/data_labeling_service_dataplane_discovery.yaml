version: '1.0'
provider: oci
service: data_labeling_service_dataplane
services:
  client: data_labeling_service_dataplane
  module: oci.data_labeling_service_dataplane
discovery:
- discovery_id: oci.data_labeling_service_dataplane.get_record_content
  calls:
  - action: get_record_content
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.data_labeling_service_dataplane.get_record
  calls:
  - action: get_record
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.data_labeling_service_dataplane.get_dataset
  calls:
  - action: get_dataset
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.data_labeling_service_dataplane.get_annotation
  calls:
  - action: get_annotation
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.data_labeling_service_dataplane.get_record_preview_content
  calls:
  - action: get_record_preview_content
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
checks: []
