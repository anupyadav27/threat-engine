version: '1.0'
provider: oci
service: streaming
services:
  client: streaming
  module: oci.streaming
discovery:
- discovery_id: oci.streaming.get_group
  calls:
  - action: get_group
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.streaming.get_messages
  calls:
  - action: get_messages
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
checks: []
