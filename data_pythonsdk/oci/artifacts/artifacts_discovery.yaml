version: '1.0'
provider: oci
service: artifacts
services:
  client: artifacts
  module: oci.artifacts
discovery:
- discovery_id: oci.artifacts.get_container_repository
  calls:
  - action: get_container_repository
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.artifacts.get_container_configuration
  calls:
  - action: get_container_configuration
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.artifacts.get_repository
  calls:
  - action: get_repository
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.artifacts.get_container_image_signature
  calls:
  - action: get_container_image_signature
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.artifacts.get_container_image
  calls:
  - action: get_container_image
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.artifacts.get_generic_artifact_by_path
  calls:
  - action: get_generic_artifact_by_path
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.artifacts.get_generic_artifact
  calls:
  - action: get_generic_artifact
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.artifacts.list_container_images
  for_each: oci.artifacts.get_container_repository
  calls:
  - action: list_container_images
    save_as: response
    on_error: continue
    params:
      compartment_id: '{{ item.compartment_id }}'
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.artifacts.list_container_image_signatures
  for_each: oci.artifacts.get_container_repository
  calls:
  - action: list_container_image_signatures
    save_as: response
    on_error: continue
    params:
      compartment_id: '{{ item.compartment_id }}'
  emit:
    as: item
    items_for: '{{ response }}'
checks: []
