version: '1.0'
provider: oci
service: desktops
services:
  client: desktops
  module: oci.desktops
discovery:
- discovery_id: oci.desktops.get_desktop_pool
  calls:
  - action: get_desktop_pool
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.desktops.get_work_request
  calls:
  - action: get_work_request
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.desktops.get_desktop
  calls:
  - action: get_desktop
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.desktops.list_desktop_pool_desktops
  for_each: oci.desktops.get_desktop_pool
  calls:
  - action: list_desktop_pool_desktops
    save_as: response
    on_error: continue
    params:
      compartment_id: '{{ item.compartment_id }}'
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.desktops.list_work_request_errors
  for_each: oci.desktops.get_desktop_pool
  calls:
  - action: list_work_request_errors
    save_as: response
    on_error: continue
    params:
      compartment_id: '{{ item.compartment_id }}'
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.desktops.list_desktop_pool_volumes
  for_each: oci.desktops.get_desktop_pool
  calls:
  - action: list_desktop_pool_volumes
    save_as: response
    on_error: continue
    params:
      compartment_id: '{{ item.compartment_id }}'
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.desktops.list_work_request_logs
  for_each: oci.desktops.get_desktop_pool
  calls:
  - action: list_work_request_logs
    save_as: response
    on_error: continue
    params:
      compartment_id: '{{ item.compartment_id }}'
  emit:
    as: item
    items_for: '{{ response }}'
checks: []
