version: '1.0'
provider: oci
service: mngdmac
services:
  client: mngdmac
  module: oci.mngdmac
discovery:
- discovery_id: oci.mngdmac.get_mac_order
  calls:
  - action: get_mac_order
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.mngdmac.get_work_request
  calls:
  - action: get_work_request
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.mngdmac.list_work_request_errors
  for_each: oci.mngdmac.get_mac_order
  calls:
  - action: list_work_request_errors
    save_as: response
    on_error: continue
    params:
      compartment_id: '{{ item.compartment_id }}'
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.mngdmac.list_work_request_logs
  for_each: oci.mngdmac.get_mac_order
  calls:
  - action: list_work_request_logs
    save_as: response
    on_error: continue
    params:
      compartment_id: '{{ item.compartment_id }}'
  emit:
    as: item
    items_for: '{{ response }}'
checks: []
