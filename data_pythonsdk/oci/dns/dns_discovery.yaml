version: '1.0'
provider: oci
service: dns
services:
  client: dns
  module: oci.dns
discovery:
- discovery_id: oci.dns.get_resolver_endpoint
  calls:
  - action: get_resolver_endpoint
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.dns.get_steering_policy_attachment
  calls:
  - action: get_steering_policy_attachment
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.dns.get_zone_content
  calls:
  - action: get_zone_content
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.dns.get_zone
  calls:
  - action: get_zone
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.dns.get_domain_records
  calls:
  - action: get_domain_records
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.dns.get_view
  calls:
  - action: get_view
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.dns.get_rr_set
  calls:
  - action: get_rr_set
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.dns.get_resolver
  calls:
  - action: get_resolver
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.dns.get_zone_records
  calls:
  - action: get_zone_records
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.dns.get_tsig_key
  calls:
  - action: get_tsig_key
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.dns.get_steering_policy
  calls:
  - action: get_steering_policy
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.dns.list_zone_transfer_servers
  for_each: oci.dns.get_resolver_endpoint
  calls:
  - action: list_zone_transfer_servers
    save_as: response
    on_error: continue
    params:
      compartment_id: '{{ item.compartment_id }}'
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.dns.list_zones
  for_each: oci.dns.get_resolver_endpoint
  calls:
  - action: list_zones
    save_as: response
    on_error: continue
    params:
      compartment_id: '{{ item.compartment_id }}'
  emit:
    as: item
    items_for: '{{ response }}'
checks: []
