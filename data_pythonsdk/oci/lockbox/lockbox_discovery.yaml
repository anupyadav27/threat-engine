version: '1.0'
provider: oci
service: lockbox
services:
  client: lockbox
  module: oci.lockbox
discovery:
- discovery_id: oci.lockbox.get_approval_template
  calls:
  - action: get_approval_template
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.lockbox.get_access_materials
  calls:
  - action: get_access_materials
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.lockbox.get_lockbox
  calls:
  - action: get_lockbox
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.lockbox.get_access_request_internal
  calls:
  - action: get_access_request_internal
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.lockbox.get_access_request
  calls:
  - action: get_access_request
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.lockbox.get_work_request
  calls:
  - action: get_work_request
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.lockbox.list_approval_templates
  for_each: oci.lockbox.get_approval_template
  calls:
  - action: list_approval_templates
    save_as: response
    on_error: continue
    params:
      compartment_id: '{{ item.compartment_id }}'
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.lockbox.list_work_request_errors
  for_each: oci.lockbox.get_approval_template
  calls:
  - action: list_work_request_errors
    save_as: response
    on_error: continue
    params:
      compartment_id: '{{ item.compartment_id }}'
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.lockbox.list_work_request_logs
  for_each: oci.lockbox.get_approval_template
  calls:
  - action: list_work_request_logs
    save_as: response
    on_error: continue
    params:
      compartment_id: '{{ item.compartment_id }}'
  emit:
    as: item
    items_for: '{{ response }}'
checks: []
