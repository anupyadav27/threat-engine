version: '1.0'
provider: oci
service: vn_monitoring
services:
  client: vn_monitoring
  module: oci.vn_monitoring
discovery:
- discovery_id: oci.vn_monitoring.get_path_analyzer_test
  calls:
  - action: get_path_analyzer_test
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.vn_monitoring.get_work_request
  calls:
  - action: get_work_request
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.vn_monitoring.get_path_analysis
  calls:
  - action: get_path_analysis
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.vn_monitoring.list_work_request_errors
  for_each: oci.vn_monitoring.get_path_analyzer_test
  calls:
  - action: list_work_request_errors
    save_as: response
    on_error: continue
    params:
      compartment_id: '{{ item.compartment_id }}'
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.vn_monitoring.list_work_request_results
  for_each: oci.vn_monitoring.get_path_analyzer_test
  calls:
  - action: list_work_request_results
    save_as: response
    on_error: continue
    params:
      compartment_id: '{{ item.compartment_id }}'
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.vn_monitoring.list_work_request_logs
  for_each: oci.vn_monitoring.get_path_analyzer_test
  calls:
  - action: list_work_request_logs
    save_as: response
    on_error: continue
    params:
      compartment_id: '{{ item.compartment_id }}'
  emit:
    as: item
    items_for: '{{ response }}'
checks: []
