version: '1.0'
provider: oci
service: jms_java_downloads
services:
  client: jms_java_downloads
  module: oci.jms_java_downloads
discovery:
- discovery_id: oci.jms_java_downloads.get_java_license_acceptance_record
  calls:
  - action: get_java_license_acceptance_record
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.jms_java_downloads.get_java_download_report_content
  calls:
  - action: get_java_download_report_content
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.jms_java_downloads.get_java_license
  calls:
  - action: get_java_license
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.jms_java_downloads.get_java_download_report
  calls:
  - action: get_java_download_report
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.jms_java_downloads.get_java_download_token
  calls:
  - action: get_java_download_token
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.jms_java_downloads.get_work_request
  calls:
  - action: get_work_request
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.jms_java_downloads.list_work_request_errors
  for_each: oci.jms_java_downloads.get_java_license_acceptance_record
  calls:
  - action: list_work_request_errors
    save_as: response
    on_error: continue
    params:
      compartment_id: '{{ item.compartment_id }}'
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.jms_java_downloads.list_java_licenses
  for_each: oci.jms_java_downloads.get_java_license_acceptance_record
  calls:
  - action: list_java_licenses
    save_as: response
    on_error: continue
    params:
      compartment_id: '{{ item.compartment_id }}'
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.jms_java_downloads.list_java_download_records
  for_each: oci.jms_java_downloads.get_java_license_acceptance_record
  calls:
  - action: list_java_download_records
    save_as: response
    on_error: continue
    params:
      compartment_id: '{{ item.compartment_id }}'
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.jms_java_downloads.list_work_request_logs
  for_each: oci.jms_java_downloads.get_java_license_acceptance_record
  calls:
  - action: list_work_request_logs
    save_as: response
    on_error: continue
    params:
      compartment_id: '{{ item.compartment_id }}'
  emit:
    as: item
    items_for: '{{ response }}'
checks: []
