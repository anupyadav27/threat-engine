version: '1.0'
provider: oci
service: distributed_database
services:
  client: distributed_database
  module: oci.distributed_database
discovery:
- discovery_id: oci.distributed_database.get_work_request
  calls:
  - action: get_work_request
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.distributed_database.list_work_request_errors
  for_each: oci.distributed_database.get_work_request
  calls:
  - action: list_work_request_errors
    save_as: response
    on_error: continue
    params:
      compartment_id: '{{ item.compartment_id }}'
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.distributed_database.list_work_request_logs
  for_each: oci.distributed_database.get_work_request
  calls:
  - action: list_work_request_logs
    save_as: response
    on_error: continue
    params:
      compartment_id: '{{ item.compartment_id }}'
  emit:
    as: item
    items_for: '{{ response }}'
checks: []
