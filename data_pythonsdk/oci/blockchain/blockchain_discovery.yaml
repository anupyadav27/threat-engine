version: '1.0'
provider: oci
service: blockchain
services:
  client: blockchain
  module: oci.blockchain
discovery:
- discovery_id: oci.blockchain.get_osn
  calls:
  - action: get_osn
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.blockchain.get_blockchain_platform
  calls:
  - action: get_blockchain_platform
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.blockchain.get_work_request
  calls:
  - action: get_work_request
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.blockchain.get_peer
  calls:
  - action: get_peer
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.blockchain.list_blockchain_platform_patches
  for_each: oci.blockchain.get_osn
  calls:
  - action: list_blockchain_platform_patches
    save_as: response
    on_error: continue
    params:
      compartment_id: '{{ item.compartment_id }}'
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.blockchain.list_work_request_errors
  for_each: oci.blockchain.get_osn
  calls:
  - action: list_work_request_errors
    save_as: response
    on_error: continue
    params:
      compartment_id: '{{ item.compartment_id }}'
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.blockchain.list_work_request_logs
  for_each: oci.blockchain.get_osn
  calls:
  - action: list_work_request_logs
    save_as: response
    on_error: continue
    params:
      compartment_id: '{{ item.compartment_id }}'
  emit:
    as: item
    items_for: '{{ response }}'
checks: []
