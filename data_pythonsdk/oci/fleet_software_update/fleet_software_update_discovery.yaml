version: '1.0'
provider: oci
service: fleet_software_update
services:
  client: fleet_software_update
  module: oci.fleet_software_update
discovery:
- discovery_id: oci.fleet_software_update.get_fsu_discovery
  calls:
  - action: get_fsu_discovery
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.fleet_software_update.get_fsu_action
  calls:
  - action: get_fsu_action
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.fleet_software_update.get_fsu_collection_target
  calls:
  - action: get_fsu_collection_target
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.fleet_software_update.get_fsu_cycle
  calls:
  - action: get_fsu_cycle
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.fleet_software_update.get_fsu_job
  calls:
  - action: get_fsu_job
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.fleet_software_update.get_fsu_action_output_content
  calls:
  - action: get_fsu_action_output_content
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.fleet_software_update.get_fsu_collection
  calls:
  - action: get_fsu_collection
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.fleet_software_update.get_work_request
  calls:
  - action: get_work_request
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.fleet_software_update.get_fsu_job_output_content
  calls:
  - action: get_fsu_job_output_content
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.fleet_software_update.list_work_request_errors
  for_each: oci.fleet_software_update.get_fsu_discovery
  calls:
  - action: list_work_request_errors
    save_as: response
    on_error: continue
    params:
      compartment_id: '{{ item.compartment_id }}'
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.fleet_software_update.list_fsu_discovery_targets
  for_each: oci.fleet_software_update.get_fsu_discovery
  calls:
  - action: list_fsu_discovery_targets
    save_as: response
    on_error: continue
    params:
      compartment_id: '{{ item.compartment_id }}'
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.fleet_software_update.list_fsu_cycles
  for_each: oci.fleet_software_update.get_fsu_discovery
  calls:
  - action: list_fsu_cycles
    save_as: response
    on_error: continue
    params:
      compartment_id: '{{ item.compartment_id }}'
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.fleet_software_update.list_work_request_logs
  for_each: oci.fleet_software_update.get_fsu_discovery
  calls:
  - action: list_work_request_logs
    save_as: response
    on_error: continue
    params:
      compartment_id: '{{ item.compartment_id }}'
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.fleet_software_update.list_fsu_job_outputs
  for_each: oci.fleet_software_update.get_fsu_discovery
  calls:
  - action: list_fsu_job_outputs
    save_as: response
    on_error: continue
    params:
      compartment_id: '{{ item.compartment_id }}'
  emit:
    as: item
    items_for: '{{ response }}'
checks: []
