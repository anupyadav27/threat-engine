version: '1.0'
provider: oci
service: autoscaling
services:
  client: autoscaling
  module: oci.autoscaling
discovery:
- discovery_id: oci.autoscaling.get_auto_scaling_policy
  calls:
  - action: get_auto_scaling_policy
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.autoscaling.get_auto_scaling_configuration
  calls:
  - action: get_auto_scaling_configuration
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
checks: []
