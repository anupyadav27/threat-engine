version: '1.0'
provider: oci
service: functions
services:
  client: functions
  module: oci.functions
discovery:
- discovery_id: oci.functions.get_application
  calls:
  - action: get_application
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.functions.get_pbf_listing_version
  calls:
  - action: get_pbf_listing_version
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.functions.get_function
  calls:
  - action: get_function
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.functions.get_pbf_listing
  calls:
  - action: get_pbf_listing
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.functions.list_triggers
  for_each: oci.functions.get_application
  calls:
  - action: list_triggers
    save_as: response
    on_error: continue
    params:
      compartment_id: '{{ item.compartment_id }}'
  emit:
    as: item
    items_for: '{{ response }}'
checks: []
