version: '1.0'
provider: oci
service: integration
services:
  client: integration
  module: oci.integration
discovery:
- discovery_id: oci.integration.get_integration_instance
  calls:
  - action: get_integration_instance
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.integration.get_work_request
  calls:
  - action: get_work_request
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.integration.list_integration_instances
  for_each: oci.integration.get_integration_instance
  calls:
  - action: list_integration_instances
    save_as: response
    on_error: continue
    params:
      compartment_id: '{{ item.compartment_id }}'
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.integration.list_work_request_errors
  for_each: oci.integration.get_integration_instance
  calls:
  - action: list_work_request_errors
    save_as: response
    on_error: continue
    params:
      compartment_id: '{{ item.compartment_id }}'
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.integration.list_work_request_logs
  for_each: oci.integration.get_integration_instance
  calls:
  - action: list_work_request_logs
    save_as: response
    on_error: continue
    params:
      compartment_id: '{{ item.compartment_id }}'
  emit:
    as: item
    items_for: '{{ response }}'
checks: []
