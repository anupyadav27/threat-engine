version: '1.0'
provider: oci
service: ai_document
services:
  client: ai_document
  module: oci.ai_document
discovery:
- discovery_id: oci.ai_document.get_processor_job
  calls:
  - action: get_processor_job
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.ai_document.get_model_type
  calls:
  - action: get_model_type
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.ai_document.get_project
  calls:
  - action: get_project
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.ai_document.get_model
  calls:
  - action: get_model
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.ai_document.get_work_request
  calls:
  - action: get_work_request
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.ai_document.list_work_request_errors
  for_each: oci.ai_document.get_processor_job
  calls:
  - action: list_work_request_errors
    save_as: response
    on_error: continue
    params:
      compartment_id: '{{ item.compartment_id }}'
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.ai_document.list_work_request_logs
  for_each: oci.ai_document.get_processor_job
  calls:
  - action: list_work_request_logs
    save_as: response
    on_error: continue
    params:
      compartment_id: '{{ item.compartment_id }}'
  emit:
    as: item
    items_for: '{{ response }}'
checks: []
