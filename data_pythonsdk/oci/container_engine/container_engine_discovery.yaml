version: '1.0'
provider: oci
service: container_engine
services:
  client: container_engine
  module: oci.container_engine
discovery:
- discovery_id: oci.container_engine.get_virtual_node_pool
  calls:
  - action: get_virtual_node_pool
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.container_engine.get_node_pool
  calls:
  - action: get_node_pool
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.container_engine.get_cluster_migrate_to_native_vcn_status
  calls:
  - action: get_cluster_migrate_to_native_vcn_status
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.container_engine.get_node_pool_options
  calls:
  - action: get_node_pool_options
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.container_engine.get_credential_rotation_status
  calls:
  - action: get_credential_rotation_status
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.container_engine.get_workload_mapping
  calls:
  - action: get_workload_mapping
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.container_engine.get_cluster_options
  calls:
  - action: get_cluster_options
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.container_engine.get_cluster
  calls:
  - action: get_cluster
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.container_engine.get_addon
  calls:
  - action: get_addon
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.container_engine.get_virtual_node
  calls:
  - action: get_virtual_node
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.container_engine.get_work_request
  calls:
  - action: get_work_request
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.container_engine.list_work_request_errors
  for_each: oci.container_engine.get_virtual_node_pool
  calls:
  - action: list_work_request_errors
    save_as: response
    on_error: continue
    params:
      compartment_id: '{{ item.compartment_id }}'
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.container_engine.list_pod_shapes
  for_each: oci.container_engine.get_virtual_node_pool
  calls:
  - action: list_pod_shapes
    save_as: response
    on_error: continue
    params:
      compartment_id: '{{ item.compartment_id }}'
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.container_engine.list_addon_options
  for_each: oci.container_engine.get_virtual_node_pool
  calls:
  - action: list_addon_options
    save_as: response
    on_error: continue
    params:
      compartment_id: '{{ item.compartment_id }}'
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.container_engine.list_work_request_logs
  for_each: oci.container_engine.get_virtual_node_pool
  calls:
  - action: list_work_request_logs
    save_as: response
    on_error: continue
    params:
      compartment_id: '{{ item.compartment_id }}'
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.container_engine.list_virtual_nodes
  for_each: oci.container_engine.get_virtual_node_pool
  calls:
  - action: list_virtual_nodes
    save_as: response
    on_error: continue
    params:
      compartment_id: '{{ item.compartment_id }}'
  emit:
    as: item
    items_for: '{{ response }}'
checks: []
