version: '1.0'
provider: oci
service: osp_gateway
services:
  client: osp_gateway
  module: oci.osp_gateway
discovery:
- discovery_id: oci.osp_gateway.get_subscription
  calls:
  - action: get_subscription
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
checks: []
