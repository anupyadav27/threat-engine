version: '1.0'
provider: oci
service: audit
services:
  client: audit
  module: oci.audit
discovery:
- discovery_id: oci.audit.get_configuration
  calls:
  - action: get_configuration
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.audit.list_events
  for_each: oci.audit.get_configuration
  calls:
  - action: list_events
    save_as: response
    on_error: continue
    params:
      compartment_id: '{{ item.compartment_id }}'
  emit:
    as: item
    items_for: '{{ response }}'
checks: []
