version: '1.0'
provider: oci
service: object_storage
services:
  client: object_storage
  module: oci.object_storage
discovery:
- discovery_id: oci.object_storage.get_bucket
  calls:
  - action: get_bucket
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.object_storage.get_namespace_metadata
  calls:
  - action: get_namespace_metadata
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.object_storage.get_replication_policy
  calls:
  - action: get_replication_policy
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.object_storage.get_namespace
  calls:
  - action: get_namespace
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.object_storage.get_retention_rule
  calls:
  - action: get_retention_rule
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.object_storage.get_object_lifecycle_policy
  calls:
  - action: get_object_lifecycle_policy
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.object_storage.get_preauthenticated_request
  calls:
  - action: get_preauthenticated_request
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.object_storage.get_object
  calls:
  - action: get_object
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.object_storage.get_work_request
  calls:
  - action: get_work_request
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.object_storage.get_private_endpoint
  calls:
  - action: get_private_endpoint
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.object_storage.list_multipart_upload_parts
  for_each: oci.object_storage.get_bucket
  calls:
  - action: list_multipart_upload_parts
    save_as: response
    on_error: continue
    params:
      compartment_id: '{{ item.compartment_id }}'
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.object_storage.list_retention_rules
  for_each: oci.object_storage.get_bucket
  calls:
  - action: list_retention_rules
    save_as: response
    on_error: continue
    params:
      compartment_id: '{{ item.compartment_id }}'
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.object_storage.list_work_request_errors
  for_each: oci.object_storage.get_bucket
  calls:
  - action: list_work_request_errors
    save_as: response
    on_error: continue
    params:
      compartment_id: '{{ item.compartment_id }}'
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.object_storage.list_replication_sources
  for_each: oci.object_storage.get_bucket
  calls:
  - action: list_replication_sources
    save_as: response
    on_error: continue
    params:
      compartment_id: '{{ item.compartment_id }}'
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.object_storage.list_object_versions
  for_each: oci.object_storage.get_bucket
  calls:
  - action: list_object_versions
    save_as: response
    on_error: continue
    params:
      compartment_id: '{{ item.compartment_id }}'
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.object_storage.list_work_request_logs
  for_each: oci.object_storage.get_bucket
  calls:
  - action: list_work_request_logs
    save_as: response
    on_error: continue
    params:
      compartment_id: '{{ item.compartment_id }}'
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.object_storage.list_multipart_uploads
  for_each: oci.object_storage.get_bucket
  calls:
  - action: list_multipart_uploads
    save_as: response
    on_error: continue
    params:
      compartment_id: '{{ item.compartment_id }}'
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.object_storage.list_buckets
  for_each: oci.object_storage.get_bucket
  calls:
  - action: list_buckets
    save_as: response
    on_error: continue
    params:
      compartment_id: '{{ item.compartment_id }}'
  emit:
    as: item
    items_for: '{{ response }}'
checks: []
