version: '1.0'
provider: oci
service: data_flow
services:
  client: data_flow
  module: oci.data_flow
discovery:
- discovery_id: oci.data_flow.get_run
  calls:
  - action: get_run
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.data_flow.get_application
  calls:
  - action: get_application
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.data_flow.get_pool
  calls:
  - action: get_pool
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.data_flow.get_statement
  calls:
  - action: get_statement
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.data_flow.get_run_log
  calls:
  - action: get_run_log
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.data_flow.get_sql_endpoint
  calls:
  - action: get_sql_endpoint
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.data_flow.get_work_request
  calls:
  - action: get_work_request
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.data_flow.get_private_endpoint
  calls:
  - action: get_private_endpoint
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.data_flow.list_work_request_errors
  for_each: oci.data_flow.get_run
  calls:
  - action: list_work_request_errors
    save_as: response
    on_error: continue
    params:
      compartment_id: '{{ item.compartment_id }}'
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.data_flow.list_work_request_logs
  for_each: oci.data_flow.get_run
  calls:
  - action: list_work_request_logs
    save_as: response
    on_error: continue
    params:
      compartment_id: '{{ item.compartment_id }}'
  emit:
    as: item
    items_for: '{{ response }}'
checks: []
