version: '1.0'
provider: oci
service: osub_usage
services:
  client: osub_usage
  module: oci.osub_usage
discovery:
- discovery_id: oci.osub_usage.get_computed_usage
  calls:
  - action: get_computed_usage
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.osub_usage.list_computed_usages
  for_each: oci.osub_usage.get_computed_usage
  calls:
  - action: list_computed_usages
    save_as: response
    on_error: continue
    params:
      compartment_id: '{{ item.compartment_id }}'
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.osub_usage.list_computed_usage_aggregateds
  for_each: oci.osub_usage.get_computed_usage
  calls:
  - action: list_computed_usage_aggregateds
    save_as: response
    on_error: continue
    params:
      compartment_id: '{{ item.compartment_id }}'
  emit:
    as: item
    items_for: '{{ response }}'
checks: []
