version: '1.0'
provider: oci
service: bds
services:
  client: bds
  module: oci.bds
discovery:
- discovery_id: oci.bds.get_node_backup
  calls:
  - action: get_node_backup
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.bds.get_software_update
  calls:
  - action: get_software_update
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
