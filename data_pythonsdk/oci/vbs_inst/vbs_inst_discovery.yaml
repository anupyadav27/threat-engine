version: '1.0'
provider: oci
service: vbs_inst
services:
  client: vbs_inst
  module: oci.vbs_inst
discovery:
- discovery_id: oci.vbs_inst.get_vbs_instance
  calls:
  - action: get_vbs_instance
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.vbs_inst.get_work_request
  calls:
  - action: get_work_request
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.vbs_inst.list_vbs_instances
  for_each: oci.vbs_inst.get_vbs_instance
  calls:
  - action: list_vbs_instances
    save_as: response
    on_error: continue
    params:
      compartment_id: '{{ item.compartment_id }}'
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.vbs_inst.list_work_request_errors
  for_each: oci.vbs_inst.get_vbs_instance
  calls:
  - action: list_work_request_errors
    save_as: response
    on_error: continue
    params:
      compartment_id: '{{ item.compartment_id }}'
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.vbs_inst.list_work_request_logs
  for_each: oci.vbs_inst.get_vbs_instance
  calls:
  - action: list_work_request_logs
    save_as: response
    on_error: continue
    params:
      compartment_id: '{{ item.compartment_id }}'
  emit:
    as: item
    items_for: '{{ response }}'
checks: []
