version: '1.0'
provider: oci
service: file_storage
services:
  client: file_storage
  module: oci.file_storage
discovery:
- discovery_id: oci.file_storage.get_replication
  calls:
  - action: get_replication
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.file_storage.get_export_set
  calls:
  - action: get_export_set
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.file_storage.get_file_system
  calls:
  - action: get_file_system
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.file_storage.get_snapshot
  calls:
  - action: get_snapshot
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.file_storage.get_export
  calls:
  - action: get_export
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.file_storage.get_outbound_connector
  calls:
  - action: get_outbound_connector
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.file_storage.get_quota_rule
  calls:
  - action: get_quota_rule
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.file_storage.get_filesystem_snapshot_policy
  calls:
  - action: get_filesystem_snapshot_policy
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.file_storage.get_replication_target
  calls:
  - action: get_replication_target
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.file_storage.get_mount_target
  calls:
  - action: get_mount_target
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.file_storage.list_quota_rules
  for_each: oci.file_storage.get_replication
  calls:
  - action: list_quota_rules
    save_as: response
    on_error: continue
    params:
      compartment_id: '{{ item.compartment_id }}'
  emit:
    as: item
    items_for: '{{ response }}'
checks: []
