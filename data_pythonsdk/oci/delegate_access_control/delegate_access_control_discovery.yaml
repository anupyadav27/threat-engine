version: '1.0'
provider: oci
service: delegate_access_control
services:
  client: delegate_access_control
  module: oci.delegate_access_control
discovery:
- discovery_id: oci.delegate_access_control.get_work_request
  calls:
  - action: get_work_request
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.delegate_access_control.list_work_request_errors
  for_each: oci.delegate_access_control.get_work_request
  calls:
  - action: list_work_request_errors
    save_as: response
    on_error: continue
    params:
      compartment_id: '{{ item.compartment_id }}'
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.delegate_access_control.list_work_request_logs
  for_each: oci.delegate_access_control.get_work_request
  calls:
  - action: list_work_request_logs
    save_as: response
    on_error: continue
    params:
      compartment_id: '{{ item.compartment_id }}'
  emit:
    as: item
    items_for: '{{ response }}'
checks: []
