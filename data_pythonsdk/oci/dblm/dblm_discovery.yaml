version: '1.0'
provider: oci
service: dblm
services:
  client: dblm
  module: oci.dblm
discovery:
- discovery_id: oci.dblm.get_vulnerability_scan
  calls:
  - action: get_vulnerability_scan
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.dblm.get_work_request
  calls:
  - action: get_work_request
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.dblm.get_patch_management
  calls:
  - action: get_patch_management
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.dblm.get_vulnerability
  calls:
  - action: get_vulnerability
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.dblm.list_aggregated_vulnerability_data
  for_each: oci.dblm.get_vulnerability_scan
  calls:
  - action: list_aggregated_vulnerability_data
    save_as: response
    on_error: continue
    params:
      compartment_id: '{{ item.compartment_id }}'
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.dblm.list_databases
  for_each: oci.dblm.get_vulnerability_scan
  calls:
  - action: list_databases
    save_as: response
    on_error: continue
    params:
      compartment_id: '{{ item.compartment_id }}'
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.dblm.list_work_request_errors
  for_each: oci.dblm.get_vulnerability_scan
  calls:
  - action: list_work_request_errors
    save_as: response
    on_error: continue
    params:
      compartment_id: '{{ item.compartment_id }}'
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.dblm.list_notifications
  for_each: oci.dblm.get_vulnerability_scan
  calls:
  - action: list_notifications
    save_as: response
    on_error: continue
    params:
      compartment_id: '{{ item.compartment_id }}'
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.dblm.list_vulnerability_resources
  for_each: oci.dblm.get_vulnerability_scan
  calls:
  - action: list_vulnerability_resources
    save_as: response
    on_error: continue
    params:
      compartment_id: '{{ item.compartment_id }}'
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.dblm.list_work_request_logs
  for_each: oci.dblm.get_vulnerability_scan
  calls:
  - action: list_work_request_logs
    save_as: response
    on_error: continue
    params:
      compartment_id: '{{ item.compartment_id }}'
  emit:
    as: item
    items_for: '{{ response }}'
checks: []
