version: '1.0'
provider: oci
service: psa
services:
  client: psa
  module: oci.psa
discovery:
- discovery_id: oci.psa.get_private_service_access
  calls:
  - action: get_private_service_access
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.psa.get_psa_work_request
  calls:
  - action: get_psa_work_request
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.psa.list_psa_services
  for_each: oci.psa.get_private_service_access
  calls:
  - action: list_psa_services
    save_as: response
    on_error: continue
    params:
      compartment_id: '{{ item.compartment_id }}'
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.psa.list_private_service_accesses
  for_each: oci.psa.get_private_service_access
  calls:
  - action: list_private_service_accesses
    save_as: response
    on_error: continue
    params:
      compartment_id: '{{ item.compartment_id }}'
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.psa.list_psa_work_request_logs
  for_each: oci.psa.get_private_service_access
  calls:
  - action: list_psa_work_request_logs
    save_as: response
    on_error: continue
    params:
      compartment_id: '{{ item.compartment_id }}'
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.psa.list_psa_work_request_errors
  for_each: oci.psa.get_private_service_access
  calls:
  - action: list_psa_work_request_errors
    save_as: response
    on_error: continue
    params:
      compartment_id: '{{ item.compartment_id }}'
  emit:
    as: item
    items_for: '{{ response }}'
checks: []
