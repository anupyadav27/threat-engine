version: '1.0'
provider: oci
service: ai_vision
services:
  client: ai_vision
  module: oci.ai_vision
discovery:
- discovery_id: oci.ai_vision.get_stream_group
  calls:
  - action: get_stream_group
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.ai_vision.get_vision_private_endpoint
  calls:
  - action: get_vision_private_endpoint
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.ai_vision.get_image_job
  calls:
  - action: get_image_job
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.ai_vision.get_model
  calls:
  - action: get_model
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.ai_vision.get_stream_source
  calls:
  - action: get_stream_source
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.ai_vision.get_video_job
  calls:
  - action: get_video_job
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.ai_vision.get_project
  calls:
  - action: get_project
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.ai_vision.get_work_request
  calls:
  - action: get_work_request
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.ai_vision.get_stream_job
  calls:
  - action: get_stream_job
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.ai_vision.get_document_job
  calls:
  - action: get_document_job
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.ai_vision.list_stream_sources
  for_each: oci.ai_vision.get_stream_group
  calls:
  - action: list_stream_sources
    save_as: response
    on_error: continue
    params:
      compartment_id: '{{ item.compartment_id }}'
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.ai_vision.list_work_request_errors
  for_each: oci.ai_vision.get_stream_group
  calls:
  - action: list_work_request_errors
    save_as: response
    on_error: continue
    params:
      compartment_id: '{{ item.compartment_id }}'
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.ai_vision.list_work_request_logs
  for_each: oci.ai_vision.get_stream_group
  calls:
  - action: list_work_request_logs
    save_as: response
    on_error: continue
    params:
      compartment_id: '{{ item.compartment_id }}'
  emit:
    as: item
    items_for: '{{ response }}'
checks: []
