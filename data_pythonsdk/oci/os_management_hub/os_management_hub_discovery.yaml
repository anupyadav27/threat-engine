version: '1.0'
provider: oci
service: os_management_hub
services:
  client: os_management_hub
  module: oci.os_management_hub
discovery:
- discovery_id: oci.os_management_hub.get_work_request
  calls:
  - action: get_work_request
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.os_management_hub.list_work_request_errors
  for_each: oci.os_management_hub.get_work_request
  calls:
  - action: list_work_request_errors
    save_as: response
    on_error: continue
    params:
      compartment_id: '{{ item.compartment_id }}'
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.os_management_hub.list_work_request_logs
  for_each: oci.os_management_hub.get_work_request
  calls:
  - action: list_work_request_logs
    save_as: response
    on_error: continue
    params:
      compartment_id: '{{ item.compartment_id }}'
  emit:
    as: item
    items_for: '{{ response }}'
checks: []
