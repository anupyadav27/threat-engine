version: '1.0'
provider: oci
service: email
services:
  client: email
  module: oci.email
discovery:
- discovery_id: oci.email.get_email_domain
  calls:
  - action: get_email_domain
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.email.get_suppression
  calls:
  - action: get_suppression
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.email.get_dkim
  calls:
  - action: get_dkim
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.email.get_email_return_path
  calls:
  - action: get_email_return_path
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.email.get_sender
  calls:
  - action: get_sender
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.email.get_work_request
  calls:
  - action: get_work_request
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.email.get_email_configuration
  calls:
  - action: get_email_configuration
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.email.get_email_ip_pool
  calls:
  - action: get_email_ip_pool
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.email.list_work_request_errors
  for_each: oci.email.get_email_domain
  calls:
  - action: list_work_request_errors
    save_as: response
    on_error: continue
    params:
      compartment_id: '{{ item.compartment_id }}'
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.email.list_email_outbound_ips
  for_each: oci.email.get_email_domain
  calls:
  - action: list_email_outbound_ips
    save_as: response
    on_error: continue
    params:
      compartment_id: '{{ item.compartment_id }}'
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.email.list_work_request_logs
  for_each: oci.email.get_email_domain
  calls:
  - action: list_work_request_logs
    save_as: response
    on_error: continue
    params:
      compartment_id: '{{ item.compartment_id }}'
  emit:
    as: item
    items_for: '{{ response }}'
checks: []
