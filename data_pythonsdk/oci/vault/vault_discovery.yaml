version: '1.0'
provider: oci
service: vault
services:
  client: vault
  module: oci.vault
discovery:
- discovery_id: oci.vault.get_secret
  calls:
  - action: get_secret
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.vault.get_secret_version
  calls:
  - action: get_secret_version
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
checks: []
