version: '1.0'
provider: oci
service: analytics
services:
  client: analytics
  module: oci.analytics
discovery:
- discovery_id: oci.analytics.get_private_access_channel
  calls:
  - action: get_private_access_channel
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.analytics.get_work_request
  calls:
  - action: get_work_request
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.analytics.get_analytics_instance
  calls:
  - action: get_analytics_instance
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.analytics.list_analytics_instances
  for_each: oci.analytics.get_private_access_channel
  calls:
  - action: list_analytics_instances
    save_as: response
    on_error: continue
    params:
      compartment_id: '{{ item.compartment_id }}'
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.analytics.list_work_request_errors
  for_each: oci.analytics.get_private_access_channel
  calls:
  - action: list_work_request_errors
    save_as: response
    on_error: continue
    params:
      compartment_id: '{{ item.compartment_id }}'
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.analytics.list_work_request_logs
  for_each: oci.analytics.get_private_access_channel
  calls:
  - action: list_work_request_logs
    save_as: response
    on_error: continue
    params:
      compartment_id: '{{ item.compartment_id }}'
  emit:
    as: item
    items_for: '{{ response }}'
checks: []
