version: '1.0'
provider: oci
service: events
services:
  client: events
  module: oci.events
discovery:
- discovery_id: oci.events.get_rule
  calls:
  - action: get_rule
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.events.list_rules
  for_each: oci.events.get_rule
  calls:
  - action: list_rules
    save_as: response
    on_error: continue
    params:
      compartment_id: '{{ item.compartment_id }}'
  emit:
    as: item
    items_for: '{{ response }}'
checks: []
