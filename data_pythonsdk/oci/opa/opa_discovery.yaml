version: '1.0'
provider: oci
service: opa
services:
  client: opa
  module: oci.opa
discovery:
- discovery_id: oci.opa.get_opa_instance
  calls:
  - action: get_opa_instance
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.opa.get_work_request
  calls:
  - action: get_work_request
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.opa.list_opa_instances
  for_each: oci.opa.get_opa_instance
  calls:
  - action: list_opa_instances
    save_as: response
    on_error: continue
    params:
      compartment_id: '{{ item.compartment_id }}'
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.opa.list_work_request_errors
  for_each: oci.opa.get_opa_instance
  calls:
  - action: list_work_request_errors
    save_as: response
    on_error: continue
    params:
      compartment_id: '{{ item.compartment_id }}'
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.opa.list_work_request_logs
  for_each: oci.opa.get_opa_instance
  calls:
  - action: list_work_request_logs
    save_as: response
    on_error: continue
    params:
      compartment_id: '{{ item.compartment_id }}'
  emit:
    as: item
    items_for: '{{ response }}'
checks: []
