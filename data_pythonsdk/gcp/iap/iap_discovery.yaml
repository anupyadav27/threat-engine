version: '1.0'
provider: gcp
service: iap
services:
  client: iap
  module: googleapiclient.discovery.build('iap', 'v1')
discovery:
- discovery_id: gcp.iap.v1.get_iap_settings
  calls:
  - action: get_iap_settings
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
checks: []
