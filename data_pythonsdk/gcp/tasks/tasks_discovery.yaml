version: '1.0'
provider: gcp
service: tasks
services:
  client: tasks
  module: googleapiclient.discovery.build('tasks', 'v1')
discovery:
- discovery_id: gcp.tasks.tasks.list
  calls:
  - action: list
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
checks: []
