version: '1.0'
provider: gcp
service: blogger
services:
  client: blogger
  module: googleapiclient.discovery.build('blogger', 'v1')
discovery:
- discovery_id: gcp.blogger.blogs.get_by_url
  calls:
  - action: get_by_url
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
checks: []
