version: '1.0'
provider: gcp
service: calendar
services:
  client: calendar
  module: googleapiclient.discovery.build('calendar', 'v1')
discovery:
- discovery_id: gcp.calendar.acl.get
  calls:
  - action: get
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
checks: []
