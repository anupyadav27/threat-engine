version: '1.0'
provider: gcp
service: libraryagent
services:
  client: libraryagent
  module: googleapiclient.discovery.build('libraryagent', 'v1')
discovery:
- discovery_id: gcp.libraryagent.shelves.list
  calls:
  - action: list
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
checks: []
