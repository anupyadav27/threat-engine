version: '1.0'
provider: gcp
service: analytics
services:
  client: analytics
  module: googleapiclient.discovery.build('analytics', 'v1')
discovery:
- discovery_id: gcp.analytics.provisioning.create_account_ticket
  calls:
  - action: create_account_ticket
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: gcp.analytics.provisioning.create_account_tree
  calls:
  - action: create_account_tree
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
checks: []
