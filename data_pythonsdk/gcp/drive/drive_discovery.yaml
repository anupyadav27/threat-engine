version: '1.0'
provider: gcp
service: drive
services:
  client: drive
  module: googleapiclient.discovery.build('drive', 'v1')
discovery:
- discovery_id: gcp.drive.apps.list
  calls:
  - action: list
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
checks: []
