version: '1.0'
provider: gcp
service: cloudsearch
services:
  client: cloudsearch
  module: googleapiclient.discovery.build('cloudsearch', 'v1')
discovery:
- discovery_id: gcp.cloudsearch.stats.get_index
  calls:
  - action: get_index
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
checks: []
