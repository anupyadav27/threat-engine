version: '1.0'
provider: gcp
service: deploymentmanager
services:
  client: deploymentmanager
  module: googleapiclient.discovery.build('deploymentmanager', 'v1')
discovery:
- discovery_id: gcp.deploymentmanager.deployments.list
  calls:
  - action: list
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
checks: []
