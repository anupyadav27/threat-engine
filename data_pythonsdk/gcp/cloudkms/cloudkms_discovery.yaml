version: '1.0'
provider: gcp
service: cloudkms
services:
  client: cloudkms
  module: googleapiclient.discovery.build('cloudkms', 'v1')
discovery:
- discovery_id: gcp.cloudkms.projects.locations.list
  calls:
  - action: projects.locations.list
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: gcp.cloudkms.projects.get_kaj_policy_config
  calls:
  - action: get_kaj_policy_config
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: gcp.cloudkms.organizations.get_kaj_policy_config
  calls:
  - action: get_kaj_policy_config
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: gcp.cloudkms.folders.get_autokey_config
  calls:
  - action: get_autokey_config
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
checks: []
