version: '1.0'
provider: gcp
service: bigtableadmin
services:
  client: bigtableadmin
  module: googleapiclient.discovery.build('bigtableadmin', 'v1')
discovery:
- discovery_id: gcp.bigtableadmin.projects.instances.get
  calls:
  - action: projects.instances.get
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: gcp.bigtableadmin.operations.get
  calls:
  - action: get
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: gcp.bigtableadmin.projects.locations.list
  calls:
  - action: projects.locations.list
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
checks: []
