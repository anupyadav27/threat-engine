version: '1.0'
provider: gcp
service: licensing
services:
  client: licensing
  module: googleapiclient.discovery.build('licensing', 'v1')
discovery:
- discovery_id: gcp.licensing.licenseAssignments.list_for_product
  calls:
  - action: list_for_product
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
checks: []
