version: '1.0'
provider: gcp
service: serviceusage
services:
  client: serviceusage
  module: googleapiclient.discovery.build('serviceusage', 'v1')
discovery:
- discovery_id: gcp.serviceusage.services.list
  calls:
  - action: list
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: gcp.serviceusage.operations.list
  calls:
  - action: list
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
checks: []
