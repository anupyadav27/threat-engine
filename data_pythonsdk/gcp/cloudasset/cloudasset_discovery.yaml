version: '1.0'
provider: gcp
service: cloudasset
services:
  client: cloudasset
  module: googleapiclient.discovery.build('cloudasset', 'v1')
discovery:
- discovery_id: gcp.cloudasset.v1.batch_get_assets_history
  calls:
  - action: batch_get_assets_history
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
checks: []
