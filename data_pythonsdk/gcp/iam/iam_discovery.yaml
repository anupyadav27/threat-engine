version: '1.0'
provider: gcp
service: iam
services:
  client: iam
  module: googleapiclient.discovery.build('iam', 'v1')
discovery:
- discovery_id: gcp.iam.organizations.roles.list
  calls:
  - action: organizations.roles.list
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: gcp.iam.roles.list
  calls:
  - action: roles.list
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: gcp.iam.projects.roles.get
  calls:
  - action: projects.roles.get
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: gcp.iam.projects.serviceAccounts.list
  calls:
  - action: projects.serviceAccounts.list
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: gcp.iam.locations.workforcePools.list
  calls:
  - action: locations.workforcePools.list
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
checks: []
