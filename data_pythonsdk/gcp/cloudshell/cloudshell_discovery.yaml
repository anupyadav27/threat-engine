version: '1.0'
provider: gcp
service: cloudshell
services:
  client: cloudshell
  module: googleapiclient.discovery.build('cloudshell', 'v1')
discovery:
- discovery_id: gcp.cloudshell.operations.get
  calls:
  - action: get
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
checks: []
