version: '1.0'
provider: gcp
service: content
services:
  client: content
  module: googleapiclient.discovery.build('content', 'v1')
discovery:
- discovery_id: gcp.content.shippingsettings.getsupportedcarriers
  calls:
  - action: getsupportedcarriers
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
checks: []
