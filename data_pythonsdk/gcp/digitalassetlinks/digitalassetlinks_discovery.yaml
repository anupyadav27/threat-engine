version: '1.0'
provider: gcp
service: digitalassetlinks
services:
  client: digitalassetlinks
  module: googleapiclient.discovery.build('digitalassetlinks', 'v1')
discovery:
- discovery_id: gcp.digitalassetlinks.statements.list
  calls:
  - action: list
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
checks: []
