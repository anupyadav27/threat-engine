version: '1.0'
provider: gcp
service: gamesConfiguration
services:
  client: gamesConfiguration
  module: googleapiclient.discovery.build('gamesConfiguration', 'v1')
discovery:
- discovery_id: gcp.gamesConfiguration.achievementConfigurations.get
  calls:
  - action: get
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
checks: []
