version: '1.0'
provider: gcp
service: discovery
services:
  client: discovery
  module: googleapiclient.discovery.build('discovery', 'v1')
discovery:
- discovery_id: gcp.discovery.apis.get_rest
  calls:
  - action: get_rest
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
checks: []
