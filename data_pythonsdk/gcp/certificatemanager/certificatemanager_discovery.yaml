version: '1.0'
provider: gcp
service: certificatemanager
services:
  client: certificatemanager
  module: googleapiclient.discovery.build('certificatemanager', 'v1')
discovery:
- discovery_id: gcp.certificatemanager.projects.locations.get
  calls:
  - action: projects.locations.get
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
checks: []
