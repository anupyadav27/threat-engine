version: '1.0'
provider: gcp
service: classroom
services:
  client: classroom
  module: googleapiclient.discovery.build('classroom', 'v1')
discovery:
- discovery_id: gcp.classroom.invitations.get
  calls:
  - action: get
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
checks: []
