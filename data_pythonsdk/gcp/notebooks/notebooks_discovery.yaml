version: '1.0'
provider: gcp
service: notebooks
services:
  client: notebooks
  module: googleapiclient.discovery.build('notebooks', 'v1')
discovery:
- discovery_id: gcp.notebooks.projects.locations.get
  calls:
  - action: projects.locations.get
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
checks: []
