version: '1.0'
provider: gcp
service: indexing
services:
  client: indexing
  module: googleapiclient.discovery.build('indexing', 'v1')
discovery:
- discovery_id: gcp.indexing.urlNotifications.get_metadata
  calls:
  - action: get_metadata
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
checks: []
