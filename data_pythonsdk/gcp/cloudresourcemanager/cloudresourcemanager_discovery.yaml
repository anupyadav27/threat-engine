version: '1.0'
provider: gcp
service: cloudresourcemanager
services:
  client: cloudresourcemanager
  module: googleapiclient.discovery.build('cloudresourcemanager', 'v1')
discovery:
- discovery_id: gcp.cloudresourcemanager.organizations.get
  calls:
  - action: get
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: gcp.cloudresourcemanager.operations.get
  calls:
  - action: get
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: gcp.cloudresourcemanager.liens.get
  calls:
  - action: get
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: gcp.cloudresourcemanager.projects.get
  calls:
  - action: get
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: gcp.cloudresourcemanager.folders.getEffectiveOrgPolicy
  calls:
  - action: folders.getEffectiveOrgPolicy
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
checks: []
