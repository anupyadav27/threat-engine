version: '1.0'
provider: gcp
service: cloudfunctions
services:
  client: cloudfunctions
  module: googleapiclient.discovery.build('cloudfunctions', 'v1')
discovery:
- discovery_id: gcp.cloudfunctions.operations.get
  calls:
  - action: get
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: gcp.cloudfunctions.projects.locations.list
  calls:
  - action: projects.locations.list
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
checks: []
