version: '1.0'
provider: gcp
service: vault
services:
  client: vault
  module: googleapiclient.discovery.build('vault', 'v1')
discovery:
- discovery_id: gcp.vault.operations.get
  calls:
  - action: get
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
checks: []
