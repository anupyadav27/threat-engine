version: '1.0'
provider: gcp
service: policytroubleshooter
services:
  client: policytroubleshooter
  module: googleapiclient.discovery.build('policytroubleshooter', 'v1')
discovery:
- discovery_id: gcp.policytroubleshooter.iam.troubleshoot
  calls:
  - action: troubleshoot
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
checks: []
