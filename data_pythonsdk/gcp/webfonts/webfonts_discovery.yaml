version: '1.0'
provider: gcp
service: webfonts
services:
  client: webfonts
  module: googleapiclient.discovery.build('webfonts', 'v1')
discovery:
- discovery_id: gcp.webfonts.webfonts.list
  calls:
  - action: list
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
checks: []
