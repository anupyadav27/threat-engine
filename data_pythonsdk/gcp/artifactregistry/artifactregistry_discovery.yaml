version: '1.0'
provider: gcp
service: artifactregistry
services:
  client: artifactregistry
  module: googleapiclient.discovery.build('artifactregistry', 'v1')
discovery:
- discovery_id: gcp.artifactregistry.projects.locations.get
  calls:
  - action: projects.locations.get
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: gcp.artifactregistry.projects.getProjectSettings
  calls:
  - action: getProjectSettings
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
checks: []
