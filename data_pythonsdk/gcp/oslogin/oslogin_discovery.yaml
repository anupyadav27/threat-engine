version: '1.0'
provider: gcp
service: oslogin
services:
  client: oslogin
  module: googleapiclient.discovery.build('oslogin', 'v1')
discovery:
- discovery_id: gcp.oslogin.users.get_login_profile
  calls:
  - action: get_login_profile
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
checks: []
