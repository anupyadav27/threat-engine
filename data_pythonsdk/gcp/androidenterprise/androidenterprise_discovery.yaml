version: '1.0'
provider: gcp
service: androidenterprise
services:
  client: androidenterprise
  module: googleapiclient.discovery.build('androidenterprise', 'v1')
discovery:
- discovery_id: gcp.androidenterprise.installs.list
  calls:
  - action: list
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
checks: []
