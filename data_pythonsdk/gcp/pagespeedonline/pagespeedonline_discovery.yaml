version: '1.0'
provider: gcp
service: pagespeedonline
services:
  client: pagespeedonline
  module: googleapiclient.discovery.build('pagespeedonline', 'v1')
discovery:
- discovery_id: gcp.pagespeedonline.pagespeedapi.runpagespeed
  calls:
  - action: runpagespeed
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
checks: []
