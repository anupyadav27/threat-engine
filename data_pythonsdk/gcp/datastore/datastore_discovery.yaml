version: '1.0'
provider: gcp
service: datastore
services:
  client: datastore
  module: googleapiclient.discovery.build('datastore', 'v1')
discovery:
- discovery_id: gcp.datastore.lookup
  calls:
  - action: lookup
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
checks: []
