version: '1.0'
provider: gcp
service: accessapproval
services:
  client: accessapproval
  module: googleapiclient.discovery.build('accessapproval', 'v1')
discovery:
- discovery_id: gcp.accessapproval.projects.approvalRequests.get
  calls:
  - action: projects.approvalRequests.get
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: gcp.accessapproval.organizations.approvalRequests.list
  calls:
  - action: organizations.approvalRequests.list
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: gcp.accessapproval.folders.approvalRequests.get
  calls:
  - action: folders.approvalRequests.get
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: gcp.accessapproval.projects.get_access_approval_settings
  calls:
  - action: get_access_approval_settings
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: gcp.accessapproval.folders.get_service_account
  calls:
  - action: get_service_account
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: gcp.accessapproval.organizations.get_access_approval_settings
  calls:
  - action: get_access_approval_settings
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
checks: []
