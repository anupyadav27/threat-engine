version: '1.0'
provider: gcp
service: clouderrorreporting
services:
  client: clouderrorreporting
  module: googleapiclient.discovery.build('clouderrorreporting', 'v1')
discovery:
- discovery_id: gcp.clouderrorreporting.projects.delete_events
  calls:
  - action: delete_events
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
checks: []
