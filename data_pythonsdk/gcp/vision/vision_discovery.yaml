version: '1.0'
provider: gcp
service: vision
services:
  client: vision
  module: googleapiclient.discovery.build('vision', 'v1')
discovery:
- discovery_id: gcp.vision.operations.list
  calls:
  - action: list
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
checks: []
