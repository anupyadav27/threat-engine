version: '1.0'
provider: gcp
service: apigee
services:
  client: apigee
  module: googleapiclient.discovery.build('apigee', 'v1')
discovery:
- discovery_id: gcp.apigee.organizations.list
  calls:
  - action: list
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
checks: []
