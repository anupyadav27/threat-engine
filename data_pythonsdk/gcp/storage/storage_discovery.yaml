version: '1.0'
provider: gcp
service: storage
services:
  client: storage
  module: googleapiclient.discovery.build('storage', 'v1')
discovery:
- discovery_id: gcp.storage.buckets.list
  calls:
  - action: list
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: gcp.storage.objects.list
  calls:
