version: '1.0'
provider: gcp
service: cloudscheduler
services:
  client: cloudscheduler
  module: googleapiclient.discovery.build('cloudscheduler', 'v1')
discovery:
- discovery_id: gcp.cloudscheduler.projects.locations.list
  calls:
  - action: projects.locations.list
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
checks: []
