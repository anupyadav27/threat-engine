version: '1.0'
provider: gcp
service: toolresults
services:
  client: toolresults
  module: googleapiclient.discovery.build('toolresults', 'v1')
discovery:
- discovery_id: gcp.toolresults.projects.get_settings
  calls:
  - action: get_settings
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
checks: []
