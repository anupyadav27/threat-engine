version: '1.0'
provider: gcp
service: factchecktools
services:
  client: factchecktools
  module: googleapiclient.discovery.build('factchecktools', 'v1')
discovery:
- discovery_id: gcp.factchecktools.pages.list
  calls:
  - action: list
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
checks: []
