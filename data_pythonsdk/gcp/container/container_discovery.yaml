version: '1.0'
provider: gcp
service: container
services:
  client: container
  module: googleapiclient.discovery.build('container', 'v1')
discovery:
- discovery_id: gcp.container.projects.locations.getServerConfig
  calls:
  - action: projects.locations.getServerConfig
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: gcp.container.projects.zones.getServerconfig
  calls:
  - action: projects.zones.getServerconfig
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
checks: []
