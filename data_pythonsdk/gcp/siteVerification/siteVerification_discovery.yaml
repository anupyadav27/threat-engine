version: '1.0'
provider: gcp
service: siteVerification
services:
  client: siteVerification
  module: googleapiclient.discovery.build('siteVerification', 'v1')
discovery:
- discovery_id: gcp.siteVerification.webResource.get_token
  calls:
  - action: get_token
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
checks: []
