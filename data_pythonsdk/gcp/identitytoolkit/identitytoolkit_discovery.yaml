version: '1.0'
provider: gcp
service: identitytoolkit
services:
  client: identitytoolkit
  module: googleapiclient.discovery.build('identitytoolkit', 'v1')
discovery:
- discovery_id: gcp.identitytoolkit.relyingparty.get_public_keys
  calls:
  - action: get_public_keys
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
checks: []
