version: '1.0'
provider: gcp
service: reseller
services:
  client: reseller
  module: googleapiclient.discovery.build('reseller', 'v1')
discovery:
- discovery_id: gcp.reseller.resellernotify.getwatchdetails
  calls:
  - action: getwatchdetails
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
checks: []
