version: '1.0'
provider: gcp
service: texttospeech
services:
  client: texttospeech
  module: googleapiclient.discovery.build('texttospeech', 'v1')
discovery:
- discovery_id: gcp.texttospeech.voices.list
  calls:
  - action: list
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
checks: []
