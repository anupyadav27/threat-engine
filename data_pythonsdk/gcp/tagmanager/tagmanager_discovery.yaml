version: '1.0'
provider: gcp
service: tagmanager
services:
  client: tagmanager
  module: googleapiclient.discovery.build('tagmanager', 'v1')
discovery:
- discovery_id: gcp.tagmanager.accounts.get
  calls:
  - action: get
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
checks: []
