version: '1.0'
provider: gcp
service: testing
services:
  client: testing
  module: googleapiclient.discovery.build('testing', 'v1')
discovery:
- discovery_id: gcp.testing.testEnvironmentCatalog.get
  calls:
  - action: get
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
checks: []
