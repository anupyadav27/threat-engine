version: '1.0'
provider: gcp
service: appengine
services:
  client: appengine
  module: googleapiclient.discovery.build('appengine', 'v1')
discovery:
- discovery_id: gcp.appengine.apps.domainMappings.get
  calls:
  - action: apps.domainMappings.get
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: gcp.appengine.apps.locations.get
  calls:
  - action: apps.locations.get
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: gcp.appengine.apps.services.get
  calls:
  - action: apps.services.get
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: gcp.appengine.apps.authorizedDomains.list
  calls:
  - action: apps.authorizedDomains.list
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: gcp.appengine.apps.operations.get
  calls:
  - action: apps.operations.get
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: gcp.appengine.apps.authorizedCertificates.get
  calls:
  - action: apps.authorizedCertificates.get
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: gcp.appengine.apps.get
  calls:
  - action: get
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
checks: []
