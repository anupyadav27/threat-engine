version: '1.0'
provider: gcp
service: gmail
services:
  client: gmail
  module: googleapiclient.discovery.build('gmail', 'v1')
discovery:
- discovery_id: gcp.gmail.users.get_profile
  calls:
  - action: get_profile
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
checks: []
