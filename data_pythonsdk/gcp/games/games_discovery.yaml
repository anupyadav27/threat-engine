version: '1.0'
provider: gcp
service: games
services:
  client: games
  module: googleapiclient.discovery.build('games', 'v1')
discovery:
- discovery_id: gcp.games.scores.list
  calls:
  - action: list
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
checks: []
