version: '1.0'
provider: gcp
service: translate
services:
  client: translate
  module: googleapiclient.discovery.build('translate', 'v1')
discovery:
- discovery_id: gcp.translate.projects.get_supported_languages
  calls:
  - action: get_supported_languages
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
checks: []
