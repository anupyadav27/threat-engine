version: '1.0'
provider: gcp
service: cloudbilling
services:
  client: cloudbilling
  module: googleapiclient.discovery.build('cloudbilling', 'v1')
discovery:
- discovery_id: gcp.cloudbilling.services.list
  calls:
  - action: list
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
checks: []
