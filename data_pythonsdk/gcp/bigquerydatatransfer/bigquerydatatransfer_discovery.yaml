version: '1.0'
provider: gcp
service: bigquerydatatransfer
services:
  client: bigquerydatatransfer
  module: googleapiclient.discovery.build('bigquerydatatransfer', 'v1')
discovery:
- discovery_id: gcp.bigquerydatatransfer.projects.enroll_data_sources
  calls:
  - action: enroll_data_sources
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
checks: []
