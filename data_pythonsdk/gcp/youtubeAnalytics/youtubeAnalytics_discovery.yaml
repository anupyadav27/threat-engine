version: '1.0'
provider: gcp
service: youtubeAnalytics
services:
  client: youtubeAnalytics
  module: googleapiclient.discovery.build('youtubeAnalytics', 'v1')
discovery:
- discovery_id: gcp.youtubeAnalytics.groups.list
  calls:
  - action: list
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
checks: []
