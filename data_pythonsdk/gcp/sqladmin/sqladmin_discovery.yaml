version: '1.0'
provider: gcp
service: sqladmin
services:
  client: sqladmin
  module: googleapiclient.discovery.build('sqladmin', 'v1')
discovery:
- discovery_id: gcp.sqladmin.backupRuns.list
  calls:
  - action: list
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: gcp.sqladmin.operations.list
  calls:
  - action: list
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: gcp.sqladmin.instances.list
