version: '1.0'
provider: gcp
service: datacatalog
services:
  client: datacatalog
  module: googleapiclient.discovery.build('datacatalog', 'v1')
discovery:
- discovery_id: gcp.datacatalog.lookup
  calls:
  - action: lookup
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
checks: []
