version: '1.0'
provider: gcp
service: sheets
services:
  client: sheets
  module: googleapiclient.discovery.build('sheets', 'v1')
discovery:
- discovery_id: gcp.sheets.spreadsheets.get_by_data_filter
  calls:
  - action: get_by_data_filter
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
checks: []
