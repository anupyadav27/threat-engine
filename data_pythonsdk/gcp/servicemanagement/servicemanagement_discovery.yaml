version: '1.0'
provider: gcp
service: servicemanagement
services:
  client: servicemanagement
  module: googleapiclient.discovery.build('servicemanagement', 'v1')
discovery:
- discovery_id: gcp.servicemanagement.services.get
  calls:
  - action: get
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
checks: []
