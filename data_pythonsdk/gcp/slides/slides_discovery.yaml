version: '1.0'
provider: gcp
service: slides
services:
  client: slides
  module: googleapiclient.discovery.build('slides', 'v1')
discovery:
- discovery_id: gcp.slides.presentations.get
  calls:
  - action: get
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
checks: []
