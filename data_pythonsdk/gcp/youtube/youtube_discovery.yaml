version: '1.0'
provider: gcp
service: youtube
services:
  client: youtube
  module: googleapiclient.discovery.build('youtube', 'v1')
discovery:
- discovery_id: gcp.youtube.playlistImages.list
  calls:
  - action: list
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
checks: []
