version: '1.0'
provider: gcp
service: homegraph
services:
  client: homegraph
  module: googleapiclient.discovery.build('homegraph', 'v1')
discovery:
- discovery_id: gcp.homegraph.agentUsers.delete
  calls:
  - action: delete
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: gcp.homegraph.devices.query
  calls:
  - action: query
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: gcp.homegraph.devices.report_state_and_notification
  calls:
  - action: report_state_and_notification
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: gcp.homegraph.devices.request_sync
  calls:
  - action: request_sync
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: gcp.homegraph.devices.sync
  calls:
  - action: sync
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
checks: []
