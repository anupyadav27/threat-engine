version: '1.0'
provider: gcp
service: oauth2
services:
  client: oauth2
  module: googleapiclient.discovery.build('oauth2', 'v1')
discovery:
- discovery_id: gcp.oauth2.userinfo.get
  calls:
  - action: get
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
checks: []
