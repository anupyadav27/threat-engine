version: '1.0'
provider: gcp
service: groupsmigration
services:
  client: groupsmigration
  module: googleapiclient.discovery.build('groupsmigration', 'v1')
discovery:
- discovery_id: gcp.groupsmigration.archive.insert
  calls:
  - action: insert
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
checks: []
