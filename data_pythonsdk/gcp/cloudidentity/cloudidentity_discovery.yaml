version: '1.0'
provider: gcp
service: cloudidentity
services:
  client: cloudidentity
  module: googleapiclient.discovery.build('cloudidentity', 'v1')
discovery:
- discovery_id: gcp.cloudidentity.groups.memberships.list
  calls:
  - action: groups.memberships.list
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: gcp.cloudidentity.inboundSamlSsoProfiles.list
  calls:
  - action: list
    save_as: response
    on_error: continue
  emit:
