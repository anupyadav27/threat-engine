version: '1.0'
provider: gcp
service: videointelligence
services:
  client: videointelligence
  module: googleapiclient.discovery.build('videointelligence', 'v1')
discovery:
- discovery_id: gcp.videointelligence.videos.annotate
  calls:
  - action: annotate
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
checks: []
