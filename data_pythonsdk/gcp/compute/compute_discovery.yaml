version: '1.0'
provider: gcp
service: compute
services:
  client: compute
  module: googleapiclient.discovery.build('compute', 'v1')
discovery:
- discovery_id: gcp.compute.regionNetworkEndpointGroups.list_network_endpoints
  calls:
  - action: list_network_endpoints
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
checks: []
