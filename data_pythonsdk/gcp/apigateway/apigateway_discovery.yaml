version: '1.0'
provider: gcp
service: apigateway
services:
  client: apigateway
  module: googleapiclient.discovery.build('apigateway', 'v1')
discovery:
- discovery_id: gcp.apigateway.projects.locations.get
  calls:
  - action: projects.locations.get
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
checks: []
