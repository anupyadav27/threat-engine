version: '1.0'
provider: gcp
service: spanner
services:
  client: spanner
  module: googleapiclient.discovery.build('spanner', 'v1')
discovery:
- discovery_id: gcp.spanner.projects.instanceConfigOperations.list
  calls:
  - action: projects.instanceConfigOperations.list
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: gcp.spanner.projects.instances.list
  calls:
  - action: projects.instances.list
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: gcp.spanner.projects.instanceConfigs.get
  calls:
  - action: projects.instanceConfigs.get
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: gcp.spanner.scans.list
  calls:
  - action: list
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
checks: []
