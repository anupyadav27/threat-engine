version: '1.0'
provider: gcp
service: servicedirectory
services:
  client: servicedirectory
  module: googleapiclient.discovery.build('servicedirectory', 'v1')
discovery:
- discovery_id: gcp.servicedirectory.projects.locations.list
  calls:
  - action: projects.locations.list
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
checks: []
