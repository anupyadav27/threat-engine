version: '1.0'
provider: gcp
service: gamesManagement
services:
  client: gamesManagement
  module: googleapiclient.discovery.build('gamesManagement', 'v1')
discovery:
- discovery_id: gcp.gamesManagement.applications.list_hidden
  calls:
  - action: list_hidden
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
checks: []
