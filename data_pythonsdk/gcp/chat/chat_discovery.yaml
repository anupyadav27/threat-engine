version: '1.0'
provider: gcp
service: chat
services:
  client: chat
  module: googleapiclient.discovery.build('chat', 'v1')
discovery:
- discovery_id: gcp.chat.customEmojis.get
  calls:
  - action: get
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
checks: []
