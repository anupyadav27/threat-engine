version: '1.0'
provider: gcp
service: customsearch
services:
  client: customsearch
  module: googleapiclient.discovery.build('customsearch', 'v1')
discovery:
- discovery_id: gcp.customsearch.cse.list
  calls:
  - action: list
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
checks: []
