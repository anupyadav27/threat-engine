version: '1.0'
provider: gcp
service: sasportal
services:
  client: sasportal
  module: googleapiclient.discovery.build('sasportal', 'v1')
discovery:
- discovery_id: gcp.sasportal.customers.list
  calls:
  - action: list
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
checks: []
