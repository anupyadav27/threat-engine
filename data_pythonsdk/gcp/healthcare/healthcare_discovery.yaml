version: '1.0'
provider: gcp
service: healthcare
services:
  client: healthcare
  module: googleapiclient.discovery.build('healthcare', 'v1')
discovery:
- discovery_id: gcp.healthcare.projects.locations.get
  calls:
  - action: projects.locations.get
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
checks: []
