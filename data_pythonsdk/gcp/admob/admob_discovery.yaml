version: '1.0'
provider: gcp
service: admob
services:
  client: admob
  module: googleapiclient.discovery.build('admob', 'v1')
discovery:
- discovery_id: gcp.admob.accounts.list
  calls:
  - action: list
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
checks: []
