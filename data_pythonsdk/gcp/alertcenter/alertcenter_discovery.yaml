version: '1.0'
provider: gcp
service: alertcenter
services:
  client: alertcenter
  module: googleapiclient.discovery.build('alertcenter', 'v1')
discovery:
- discovery_id: gcp.alertcenter.alerts.get_metadata
  calls:
  - action: get_metadata
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
checks: []
