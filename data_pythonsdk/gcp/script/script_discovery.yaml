version: '1.0'
provider: gcp
service: script
services:
  client: script
  module: googleapiclient.discovery.build('script', 'v1')
discovery:
- discovery_id: gcp.script.processes.list_script_processes
  calls:
  - action: list_script_processes
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
checks: []
