version: '1.0'
provider: gcp
service: acceleratedmobilepageurl
services:
  client: acceleratedmobilepageurl
  module: googleapiclient.discovery.build('acceleratedmobilepageurl', 'v1')
discovery:
- discovery_id: gcp.acceleratedmobilepageurl.ampUrls.batch_get
  calls:
  - action: batch_get
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
checks: []
