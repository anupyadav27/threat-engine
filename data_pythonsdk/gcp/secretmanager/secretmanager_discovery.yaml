version: '1.0'
provider: gcp
service: secretmanager
services:
  client: secretmanager
  module: googleapiclient.discovery.build('secretmanager', 'v1')
discovery:
- discovery_id: gcp.secretmanager.projects.secrets.list
  calls:
  - action: projects.secrets.list
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: gcp.secretmanager.projects.locations.get
  calls:
  - action: projects.locations.get
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
checks: []
