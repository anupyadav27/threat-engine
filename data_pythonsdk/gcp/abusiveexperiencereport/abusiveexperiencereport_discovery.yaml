version: '1.0'
provider: gcp
service: abusiveexperiencereport
services:
  client: abusiveexperiencereport
  module: googleapiclient.discovery.build('abusiveexperiencereport', 'v1')
discovery:
- discovery_id: gcp.abusiveexperiencereport.sites.get
  calls:
  - action: get
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
checks: []
