remediation: 'Enable KMS encryption for S3 bucket:

  1. S3 console > Bucket > Properties > Default encryption

  2. Select "AWS Key Management Service key (SSE-KMS)"

  3. Choose a KMS key (customer-managed or AWS-managed)

  4. Save changes

