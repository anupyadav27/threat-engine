version: '1.0'
provider: aws
service: apigateway
services:
  client: apigateway
  module: boto3.client
discovery:
- discovery_id: aws.apigateway.get_api_keys
  calls:
  - action: get_api_keys
    save_as: response
  emit:
    items_for: '{{ response.items }}'
    as: item
    item:
      id: '{{ item.id }}'
      value: '{{ item.value }}'
      name: '{{ item.name }}'
      customerId: '{{ item.customerId }}'
      description: '{{ item.description }}'
      enabled: '{{ item.enabled }}'
      createdDate: '{{ item.createdDate }}'
      lastUpdatedDate: '{{ item.lastUpdatedDate }}'
      stageKeys: '{{ item.stageKeys }}'
      tags: '{{ item.tags }}'
- discovery_id: aws.apigateway.get_authorizers
  for_each: '{{ aws.apigateway.get_rest_apis }}'
  calls:
  - action: get_authorizers
    params:
      restApiId: '{{ item.id }}'
    save_as: response
  emit:
    items_for: '{{ response.items }}'
    as: item
    item:
      restApiId: '{{ item.restApiId }}'
      id: '{{ item.id }}'
      name: '{{ item.name }}'
      type: '{{ item.type }}'
      providerARNs: '{{ item.providerARNs }}'
      authType: '{{ item.authType }}'
      authorizerUri: '{{ item.authorizerUri }}'
      authorizerCredentials: '{{ item.authorizerCredentials }}'
      identitySource: '{{ item.identitySource }}'
      identityValidationExpression: '{{ item.identityValidationExpression }}'
      authorizerResultTtlInSeconds: '{{ item.authorizerResultTtlInSeconds }}'
- discovery_id: aws.apigateway.get_domain_names
  calls:
  - action: get_domain_names
    save_as: response
  emit:
    items_for: '{{ response.items }}'
    as: item
    item:
      domainName: '{{ item.domainName }}'
      domainNameId: '{{ item.domainNameId }}'
      domainNameArn: '{{ item.domainNameArn }}'
      certificateName: '{{ item.certificateName }}'
      certificateArn: '{{ item.certificateArn }}'
      certificateUploadDate: '{{ item.certificateUploadDate }}'
      regionalDomainName: '{{ item.regionalDomainName }}'
      regionalHostedZoneId: '{{ item.regionalHostedZoneId }}'
      regionalCertificateName: '{{ item.regionalCertificateName }}'
      regionalCertificateArn: '{{ item.regionalCertificateArn }}'
      distributionDomainName: '{{ item.distributionDomainName }}'
      distributionHostedZoneId: '{{ item.distributionHostedZoneId }}'
      endpointConfiguration: '{{ item.endpointConfiguration }}'
      domainNameStatus: '{{ item.domainNameStatus }}'
      domainNameStatusMessage: '{{ item.domainNameStatusMessage }}'
      securityPolicy: '{{ item.securityPolicy }}'
      endpointAccessMode: '{{ item.endpointAccessMode }}'
      tags: '{{ item.tags }}'
      mutualTlsAuthentication: '{{ item.mutualTlsAuthentication }}'
      ownershipVerificationCertificateArn: '{{ item.ownershipVerificationCertificateArn
        }}'
- discovery_id: aws.apigateway.get_request_validators
  for_each: '{{ aws.apigateway.get_rest_apis }}'
  calls:
  - action: get_request_validators
    params:
      restApiId: '{{ item.id }}'
    save_as: response
  emit:
    items_for: '{{ response.items }}'
    as: item
    item:
      restApiId: '{{ item.restApiId }}'
      id: '{{ item.id }}'
      name: '{{ item.name }}'
      validateRequestBody: '{{ item.validateRequestBody }}'
      validateRequestParameters: '{{ item.validateRequestParameters }}'
- discovery_id: aws.apigateway.get_domain_name
  for_each: '{{ aws.apigateway.get_domain_names }}'
  calls:
  - action: get_domain_name
    params:
      domainName: '{{ item.domainName }}'
    save_as: response
  emit:
    item:
      domainName: '{{ item.domainName }}'
      types: '{{ response.endpointConfiguration.types }}'
      ipAddressType: '{{ response.endpointConfiguration.ipAddressType }}'
      vpcEndpointIds: '{{ response.endpointConfiguration.vpcEndpointIds }}'
- discovery_id: aws.apigateway.get_rest_apis
  calls:
  - action: get_rest_apis
    save_as: response
  emit:
    items_for: '{{ response.items }}'
    as: item
    item:
      id: '{{ item.id }}'
      name: '{{ item.name }}'
      description: '{{ item.description }}'
      createdDate: '{{ item.createdDate }}'
      version: '{{ item.version }}'
      warnings: '{{ item.warnings }}'
      binaryMediaTypes: '{{ item.binaryMediaTypes }}'
      endpointConfiguration: '{{ item.endpointConfiguration }}'
      policy: '{{ item.policy }}'
      tags: '{{ item.tags }}'
      disableExecuteApiEndpoint: '{{ item.disableExecuteApiEndpoint }}'
      rootResourceId: '{{ item.rootResourceId }}'
      apiKeySource: '{{ item.apiKeySource }}'
      endpointAccessMode: '{{ item.endpointAccessMode }}'
      apiStatus: '{{ item.apiStatus }}'
      apiStatusMessage: '{{ item.apiStatusMessage }}'
- discovery_id: aws.apigateway.get_resources
  for_each: '{{ aws.apigateway.get_rest_apis }}'
  calls:
  - action: get_resources
    params:
      restApiId: '{{ item.id }}'
    save_as: response
  emit:
    items_for: '{{ response.items }}'
    as: item
    item:
      restApiId: '{{ item.restApiId }}'
      id: '{{ item.id }}'
      parentId: '{{ item.parentId }}'
      pathPart: '{{ item.pathPart }}'
      path: '{{ item.path }}'
      resourceMethods: '{{ item.resourceMethods }}'
- discovery_id: aws.apigateway.get_method
  for_each: '{{ aws.apigateway.get_resources }}'
  calls:
  - action: get_method
    params:
      restApiId: '{{ item.restApiId }}'
      resourceId: '{{ item.id }}'
      httpMethod: GET
    save_as: response
  emit:
    item:
      restApiId: '{{ item.restApiId }}'
      resourceId: '{{ item.id }}'
      httpMethod: '{{ response.httpMethod }}'
      authorizationType: '{{ response.authorizationType }}'
      authorizerId: '{{ response.authorizerId }}'
      apiKeyRequired: '{{ response.apiKeyRequired }}'
      requestValidatorId: '{{ response.requestValidatorId }}'
      operationName: '{{ response.operationName }}'
      requestParameters: '{{ response.requestParameters }}'
      requestModels: '{{ response.requestModels }}'
      methodResponses: '{{ response.methodResponses }}'
      methodIntegration: '{{ response.methodIntegration }}'
      authorizationScopes: '{{ response.authorizationScopes }}'
- discovery_id: aws.apigateway.get_stages
  for_each: '{{ aws.apigateway.get_rest_apis }}'
  calls:
  - action: get_stages
    params:
      restApiId: '{{ item.id }}'
    save_as: response
  emit:
    items_for: '{{ response.item }}'
    as: stage_item
    item:
      restApiId: '{{ item.id }}'
      deploymentId: '{{ stage_item.deploymentId }}'
      clientCertificateId: '{{ stage_item.clientCertificateId }}'
      stageName: '{{ stage_item.stageName }}'
      description: '{{ stage_item.description }}'
      cacheClusterEnabled: '{{ stage_item.cacheClusterEnabled }}'
      cacheClusterSize: '{{ stage_item.cacheClusterSize }}'
      cacheClusterStatus: '{{ stage_item.cacheClusterStatus }}'
      methodSettings: '{{ stage_item.methodSettings }}'
      variables: '{{ stage_item.variables }}'
      documentationVersion: '{{ stage_item.documentationVersion }}'
      accessLogSettings: '{{ stage_item.accessLogSettings }}'
      canarySettings: '{{ stage_item.canarySettings }}'
      tracingEnabled: '{{ stage_item.tracingEnabled }}'
      webAclArn: '{{ stage_item.webAclArn }}'
      tags: '{{ stage_item.tags }}'
      createdDate: '{{ stage_item.createdDate }}'
      lastUpdatedDate: '{{ stage_item.lastUpdatedDate }}'
- discovery_id: aws.apigateway.get_stage
  for_each: '{{ aws.apigateway.get_stages }}'
  calls:
  - action: get_stage
    params:
      restApiId: '{{ item.restApiId }}'
      stageName: '{{ item.stageName }}'
    save_as: response
  emit:
    item:
      restApiId: '{{ item.restApiId }}'
      stageName: '{{ item.stageName }}'
      format: '{{ response.accessLogSettings.format }}'
      destinationArn: '{{ response.accessLogSettings.destinationArn }}'
      cacheClusterEnabled: '{{ response.cacheClusterEnabled }}'
- discovery_id: aws.apigateway.get_usage_plans
  calls:
  - action: get_usage_plans
    save_as: response
  emit:
    items_for: '{{ response.items }}'
    as: item
    item:
      id: '{{ item.id }}'
      name: '{{ item.name }}'
      description: '{{ item.description }}'
      apiStages: '{{ item.apiStages }}'
      throttle: '{{ item.throttle }}'
      quota: '{{ item.quota }}'
      productCode: '{{ item.productCode }}'
      tags: '{{ item.tags }}'
