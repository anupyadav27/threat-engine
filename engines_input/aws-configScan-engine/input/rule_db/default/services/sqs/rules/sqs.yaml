version: '1.0'
provider: aws
service: sqs
services:
  client: sqs
  module: boto3.client
discovery:
- discovery_id: aws.sqs.list_queues
  calls:
  - action: list_queues
    save_as: response
  emit:
    items_for: '{{ response.QueueUrls }}'
    as: queue_url
    item:
      QueueUrl: '{{ queue_url }}'
- discovery_id: aws.sqs.get_queue_attributes
  for_each: aws.sqs.list_queues
  calls:
  - action: get_queue_attributes
    params:
      QueueUrl: '{{ item.QueueUrl }}'
    save_as: response
  emit:
    item:
      QueueUrl: '{{ item.QueueUrl }}'
      QueueArn: '{{ response.Attributes.QueueArn }}'
      Policy: '{{ response.Attributes.Policy }}'
      RedrivePolicy: '{{ response.Attributes.RedrivePolicy }}'
      KmsMasterKeyId: '{{ response.Attributes.KmsMasterKeyId }}'
      SqsManagedSseEnabled: '{{ response.Attributes.SqsManagedSseEnabled }}'
