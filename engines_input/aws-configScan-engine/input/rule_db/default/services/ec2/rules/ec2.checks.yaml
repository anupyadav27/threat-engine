    - var: item.SecurityGroupRules.ToPort
      op: equals
      value: '5432'
    - var: item.SecurityGroupRules.CidrIpv4
      op: equals
      value: 0.0.0.0/0
- rule_id: aws.ec2.instance.port_rdp_exposed_to_internet_configured
