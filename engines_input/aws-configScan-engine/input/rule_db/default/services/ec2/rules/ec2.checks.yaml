    - var: item.FromPort
      op: equals
      value: '9092'
    - var: item.ToPort
      op: equals
      value: '9092'
    - var: item.CidrIpv4
      op: equals
      value: 0.0.0.0/0
- rule_id: aws.ec2.instance.port_kerberos_exposed_to_internet_configured
  for_each: aws.ec2.describe_security_group_rules
  conditions:
    all:
    - var: item.IpProtocol
      op: equals
      value: tcp
    - var: item.FromPort
      op: equals
      value: '88'
    - var: item.ToPort
      op: equals
      value: '88'
    - var: item.CidrIpv4
      op: equals
      value: 0.0.0.0/0
- rule_id: aws.ec2.instance.port_ldap_exposed_to_internet_configured
  for_each: aws.ec2.describe_security_group_rules
  conditions:
    all:
    - var: item.IpProtocol
      op: equals
      value: tcp
    - var: item.FromPort
      op: equals
      value: '389'
    - var: item.ToPort
      op: equals
      value: '389'
    - var: item.CidrIpv4
      op: equals
      value: 0.0.0.0/0
- rule_id: aws.ec2.instance.port_memcached_exposed_to_internet_configured
  for_each: aws.ec2.describe_security_group_rules
  conditions:
    all:
    - var: item.IpProtocol
      op: equals
      value: tcp
    - var: item.FromPort
      op: equals
      value: '11211'
    - var: item.ToPort
      op: equals
      value: '11211'
    - var: item.CidrIpv4
      op: equals
