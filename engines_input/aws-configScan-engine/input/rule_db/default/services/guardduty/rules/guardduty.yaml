version: '1.0'
provider: aws
service: guardduty
services:
  client: guardduty
  module: boto3.client
discovery:
- discovery_id: aws.guardduty.list_detectors
  calls:
  - action: list_detectors
    save_as: response
  emit:
    items_for: '{{ response.DetectorIds }}'
    as: item
    item:
      DetectorId: '{{ item }}'
- discovery_id: aws.guardduty.get_detector
  for_each: aws.guardduty.list_detectors
  calls:
  - action: get_detector
    params:
      DetectorId: '{{ item.DetectorId }}'
    save_as: response
  emit:
    item:
      DetectorId: '{{ item.DetectorId }}'
      Status: '{{ response.Status }}'
      FindingPublishingFrequency: '{{ response.FindingPublishingFrequency }}'
      ServiceRole: '{{ response.ServiceRole }}'
      CreatedAt: '{{ response.CreatedAt }}'
      UpdatedAt: '{{ response.UpdatedAt }}'
      DataSources: '{{ response.DataSources }}'
      Features: '{{ response.Features }}'
- discovery_id: aws.guardduty.describe_organization_configuration
  for_each: aws.guardduty.list_detectors
  calls:
  - action: describe_organization_configuration
    params:
      DetectorId: '{{ item.DetectorId }}'
    save_as: response
  emit:
    item:
      DetectorId: '{{ item.DetectorId }}'
      AutoEnable: '{{ response.AutoEnable }}'
      MemberAccountLimitReached: '{{ response.MemberAccountLimitReached }}'
      DataSources: '{{ response.DataSources }}'
      Features: '{{ response.Features }}'
