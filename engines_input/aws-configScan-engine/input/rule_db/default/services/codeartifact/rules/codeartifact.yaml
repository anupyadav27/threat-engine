version: '1.0'
provider: aws
service: codeartifact
services:
  client: codeartifact
  module: boto3.client
discovery:
- discovery_id: aws.codeartifact.list_domains
  calls:
  - action: list_domains
    save_as: response
  emit:
    items_for: '{{ response.domains }}'
    as: item
    item:
      name: '{{ item.name }}'
      owner: '{{ item.owner }}'
      arn: '{{ item.arn }}'
      status: '{{ item.status }}'
- discovery_id: aws.codeartifact.list_repositories_in_domain
  for_each: aws.codeartifact.list_domains
  calls:
  - action: list_repositories_in_domain
    params:
      domain: '{{ item.name }}'
    save_as: response
  emit:
    items_for: '{{ response.repositories }}'
    as: item
    item:
      name: '{{ item.name }}'
      administratorAccount: '{{ item.administratorAccount }}'
      domainName: '{{ item.domainName }}'
      domainOwner: '{{ item.domainOwner }}'
      arn: '{{ item.arn }}'
      description: '{{ item.description }}'
      createdTime: '{{ item.createdTime }}'
- discovery_id: aws.codeartifact.describe_repository
  for_each: aws.codeartifact.list_repositories_in_domain
  calls:
  - action: describe_repository
    params:
      domain: '{{ item.domainName }}'
      repository: '{{ item.name }}'
    save_as: response
  emit:
    item:
      name: '{{ response.repository.name }}'
      administratorAccount: '{{ response.repository.administratorAccount }}'
      domainName: '{{ response.repository.domainName }}'
      domainOwner: '{{ response.repository.domainOwner }}'
      arn: '{{ response.repository.arn }}'
      description: '{{ response.repository.description }}'
      upstreams: '{{ response.repository.upstreams }}'
      externalConnections: '{{ response.repository.externalConnections }}'
      createdTime: '{{ response.repository.createdTime }}'
