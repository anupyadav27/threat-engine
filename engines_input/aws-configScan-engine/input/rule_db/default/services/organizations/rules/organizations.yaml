version: '1.0'
provider: aws
service: organizations
services:
  client: organizations
  module: boto3.client
discovery:
- discovery_id: aws.organizations.list_targets_for_policy
  calls:
  - action: list_policies
    params:
      Filter: SERVICE_CONTROL_POLICY
    save_as: response
  emit:
    items_for: '{{ response.Policies }}'
    as: item
    item:
      Id: '{{ item.Id }}'
      Arn: '{{ item.Arn }}'
      Name: '{{ item.Name }}'
      Description: '{{ item.Description }}'
      Type: '{{ item.Type }}'
      AwsManaged: '{{ item.AwsManaged }}'
- discovery_id: aws.organizations.list_outbound_responsibility_transfers
  calls:
  - action: list_accounts
    save_as: response
  emit:
    items_for: '{{ response.Accounts }}'
    as: item
    item:
      Id: '{{ item.Id }}'
      Arn: '{{ item.Arn }}'
      Email: '{{ item.Email }}'
      Name: '{{ item.Name }}'
      Status: '{{ item.Status }}'
      State: '{{ item.State }}'
      JoinedMethod: '{{ item.JoinedMethod }}'
      JoinedTimestamp: '{{ item.JoinedTimestamp }}'
- discovery_id: aws.organizations.describe_organization
  calls:
  - action: describe_organization
    save_as: response
  emit:
    item:
      Id: '{{ response.Organization.Id }}'
      Arn: '{{ response.Organization.Arn }}'
      FeatureSet: '{{ response.Organization.FeatureSet }}'
      MasterAccountArn: '{{ response.Organization.MasterAccountArn }}'
      MasterAccountId: '{{ response.Organization.MasterAccountId }}'
      MasterAccountEmail: '{{ response.Organization.MasterAccountEmail }}'
      AvailablePolicyTypes: '{{ response.Organization.AvailablePolicyTypes }}'
- discovery_id: aws.organizations.list_policies_for_target
  calls:
  - action: list_policies
    params:
      Filter: SERVICE_CONTROL_POLICY
    save_as: response
  emit:
    items_for: '{{ response.Policies }}'
    as: item
    item:
      Id: '{{ item.Id }}'
      Arn: '{{ item.Arn }}'
      Name: '{{ item.Name }}'
      Description: '{{ item.Description }}'
      Type: '{{ item.Type }}'
      AwsManaged: '{{ item.AwsManaged }}'
- discovery_id: aws.organizations.describe_account
  for_each: aws.organizations.list_accounts
  calls:
  - action: describe_account
    params:
      AccountId: '{{ item.Id }}'
    save_as: response
  emit:
    item:
      Id: '{{ response.Account.Id }}'
      Arn: '{{ response.Account.Arn }}'
      Email: '{{ response.Account.Email }}'
      Name: '{{ response.Account.Name }}'
      Status: '{{ response.Account.Status }}'
      State: '{{ response.Account.State }}'
      JoinedMethod: '{{ response.Account.JoinedMethod }}'
      JoinedTimestamp: '{{ response.Account.JoinedTimestamp }}'
- discovery_id: aws.organizations.list_roots
  calls:
  - action: list_roots
    save_as: response
  emit:
    items_for: '{{ response.Roots }}'
    as: item
    item:
      Id: '{{ item.Id }}'
      Arn: '{{ item.Arn }}'
      Name: '{{ item.Name }}'
      PolicyTypes: '{{ item.PolicyTypes }}'
- discovery_id: aws.organizations.list_accounts_with_invalid_effective_policy
  calls:
  - action: list_accounts
    save_as: response
  emit:
    items_for: '{{ response.Accounts }}'
    as: item
    item:
      Id: '{{ item.Id }}'
      Arn: '{{ item.Arn }}'
      Email: '{{ item.Email }}'
      Name: '{{ item.Name }}'
      Status: '{{ item.Status }}'
      State: '{{ item.State }}'
      JoinedMethod: '{{ item.JoinedMethod }}'
      JoinedTimestamp: '{{ item.JoinedTimestamp }}'
- discovery_id: aws.organizations.list_accounts
  calls:
  - action: list_accounts
    save_as: response
  emit:
    items_for: '{{ response.Accounts }}'
    as: item
    item:
      Id: '{{ item.Id }}'
      Arn: '{{ item.Arn }}'
      Email: '{{ item.Email }}'
      Name: '{{ item.Name }}'
      Status: '{{ item.Status }}'
      State: '{{ item.State }}'
      JoinedMethod: '{{ item.JoinedMethod }}'
      JoinedTimestamp: '{{ item.JoinedTimestamp }}'
- discovery_id: aws.organizations.describe_effective_policy
  for_each: aws.organizations.list_accounts
  calls:
  - action: describe_effective_policy
    params:
      PolicyType: SERVICE_CONTROL_POLICY
      TargetId: '{{ item.Id }}'
    save_as: response
    on_error: continue
  emit:
    item:
      AccountId: '{{ item.Id }}'
      PolicyContent: '{{ response.EffectivePolicy.PolicyContent }}'
      LastUpdatedTimestamp: '{{ response.EffectivePolicy.LastUpdatedTimestamp }}'
      TargetId: '{{ response.EffectivePolicy.TargetId }}'
      PolicyType: '{{ response.EffectivePolicy.PolicyType }}'
