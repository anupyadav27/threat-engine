apiVersion: apps/v1
kind: Deployment
metadata:
  name: onboarding-api
  namespace: threat-engine-engines
  labels:
    app: onboarding-api
    tier: api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: onboarding-api
  template:
    metadata:
      labels:
        app: onboarding-api
        tier: api
    spec:
      serviceAccountName: aws-compliance-engine-sa  # Use IRSA for AWS access
      containers:
      - name: onboarding
        image: yadavanup84/threat-engine-onboarding-api:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8000
          name: http
        env:
        # AWS Services Configuration
        - name: AWS_REGION
          valueFrom:
            configMapKeyRef:
              name: platform-config
              key: aws-region
        - name: SECRETS_MANAGER_PREFIX
          valueFrom:
            configMapKeyRef:
              name: platform-config
              key: secrets-manager-prefix
        - name: SECRETS_MANAGER_KMS_KEY_ID
          valueFrom:
            configMapKeyRef:
              name: platform-config
              key: secrets-manager-kms-key-id
              optional: true
        - name: PLATFORM_AWS_ACCOUNT_ID
          valueFrom:
            configMapKeyRef:
              name: platform-config
              key: aws-account-id
        # DynamoDB Table Names (optional)
        - name: DYNAMODB_TENANTS_TABLE
          valueFrom:
            configMapKeyRef:
              name: platform-config
              key: dynamodb-tenants-table
        - name: DYNAMODB_PROVIDERS_TABLE
          valueFrom:
            configMapKeyRef:
              name: platform-config
              key: dynamodb-providers-table
        - name: DYNAMODB_ACCOUNTS_TABLE
          valueFrom:
            configMapKeyRef:
              name: platform-config
              key: dynamodb-accounts-table
        - name: DYNAMODB_SCHEDULES_TABLE
          valueFrom:
            configMapKeyRef:
              name: platform-config
              key: dynamodb-schedules-table
        - name: DYNAMODB_EXECUTIONS_TABLE
          valueFrom:
            configMapKeyRef:
              name: platform-config
              key: dynamodb-executions-table
        - name: DYNAMODB_SCAN_RESULTS_TABLE
          valueFrom:
            configMapKeyRef:
              name: platform-config
              key: dynamodb-scan-results-table
        # Logging
        - name: LOG_LEVEL
          valueFrom:
            configMapKeyRef:
              name: platform-config
              key: log-level
        - name: AWS_ENGINE_URL
          value: "http://aws-compliance-engine.threat-engine-engines.svc.cluster.local"
        - name: AZURE_ENGINE_URL
          value: "http://azure-compliance-engine.threat-engine-engines.svc.cluster.local"
        - name: GCP_ENGINE_URL
          value: "http://gcp-compliance-engine.threat-engine-engines.svc.cluster.local"
        - name: ALICLOUD_ENGINE_URL
          value: "http://alicloud-compliance-engine.threat-engine-engines.svc.cluster.local"
        - name: YAML_RULE_BUILDER_URL
          value: "http://yaml-rule-builder.threat-engine-engines.svc.cluster.local"
        # Database Configuration (PostgreSQL)
        - name: DATABASE_URL
          valueFrom:
            configMapKeyRef:
              name: platform-config
              key: database-url
        # Scheduler Configuration (integrated)
        - name: SCHEDULER_INTERVAL_SECONDS
          value: "60"
        # Engine polling (full scans can take a long time)
        - name: ENGINE_SCAN_POLL_INTERVAL_SECONDS
          value: "10"
        - name: ENGINE_SCAN_MAX_WAIT_SECONDS
          value: "7200"
        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "1Gi"
            cpu: "1000m"
        livenessProbe:
          httpGet:
            path: /api/v1/health
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /api/v1/health
            port: 8000
          initialDelaySeconds: 10
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: onboarding-api
  namespace: threat-engine-engines
  labels:
    app: onboarding-api
spec:
  type: ClusterIP
  ports:
  - port: 80
    targetPort: 8000
    protocol: TCP
    name: http
  selector:
    app: onboarding-api

