apiVersion: apps/v1
kind: Deployment
metadata:
  name: admin-backend-deployment
  namespace: cspm
  labels:
    app: admin-backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: admin-backend
  template:
    metadata:
      labels:
        app: admin-backend
    spec:
      containers:
      - name: admin-backend
        image: engine-adminportal:latest
        ports:
        - containerPort: 8001
        env:
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: database-secret
              key: url
        - name: DB_NAME
          valueFrom:
            secretKeyRef:
              name: database-secret
              key: name
        - name: DB_USER
          valueFrom:
            secretKeyRef:
              name: database-secret
              key: user
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: database-secret
              key: password
        - name: DB_HOST
          valueFrom:
            secretKeyRef:
              name: database-secret
              key: host
        - name: DB_PORT
          value: "5432"
        - name: REDIS_URL
          value: "redis://redis-service:6379/1"
        - name: CELERY_BROKER_URL
          value: "redis://redis-service:6379/0"
        - name: CELERY_RESULT_BACKEND
          value: "redis://redis-service:6379/0"
        - name: ADMIN_SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: admin-secret
              key: secret-key
        - name: DEBUG
          value: "False"
        - name: ALLOWED_HOSTS
          value: "*"
        - name: CONFIGSCAN_AWS_URL
          value: "http://aws-configscan-engine:8000"
        - name: CONFIGSCAN_AZURE_URL
          value: "http://azure-configscan-engine:8000"
        - name: CONFIGSCAN_GCP_URL
          value: "http://gcp-configscan-engine:8000"
        - name: CONFIGSCAN_ALICLOUD_URL
          value: "http://alicloud-configscan-engine:8000"
        - name: CONFIGSCAN_OCI_URL
          value: "http://oci-configscan-engine:8000"
        - name: CONFIGSCAN_IBM_URL
          value: "http://ibm-configscan-engine:8000"
        - name: COMPLIANCE_ENGINE_URL
          value: "http://compliance-engine:8000"
        - name: THREAT_ENGINE_URL
          value: "http://threat-engine:8000"
        - name: INVENTORY_ENGINE_URL
          value: "http://inventory-engine:8000"
        - name: DATASEC_ENGINE_URL
          value: "http://datasec-engine:8000"
        - name: ONBOARDING_ENGINE_URL
          value: "http://onboarding-engine:8000"
        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "1Gi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health/
            port: 8001
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health/
            port: 8001
          initialDelaySeconds: 10
          periodSeconds: 5
