# Alembic configuration for Threat Engine multi-database migrations.
#
# Usage (single engine):
#   alembic -x engine=check upgrade head
#   alembic -x engine=inventory upgrade head
#   alembic -x engine=check current
#   alembic -x engine=check history
#   alembic -x engine=inventory downgrade -1
#
# Usage (all engines at once):
#   python alembic/migrate_all.py
#
# Stamp existing production DB without running migrations:
#   ALEMBIC_ENGINE=check alembic stamp head
#
# Create a new migration (replace ENGINE and NAME):
#   alembic -x engine=check revision -m "add_new_column"
#   -> creates: alembic/versions/check/<rev>_add_new_column.py

[alembic]
script_location = alembic
prepend_sys_path = .
version_path_separator = os

# sqlalchemy.url is set dynamically in env.py from environment variables.
# Do NOT set it here — the URL depends on which engine is being migrated.

[post_write_hooks]
# Optional: auto-format new migration files
# hooks = black
# black.type = console_scripts
# black.entrypoint = black

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
