version: '1.0'
provider: aws
service: cloudformation
services:
  client: cloudformation
  module: boto3.client
discovery:
- discovery_id: aws.cloudformation.list_stacks_for_events
  calls:
  - action: list_stacks
    params:
      StackStatusFilter:
      - CREATE_COMPLETE
      - UPDATE_COMPLETE
      - ROLLBACK_COMPLETE
      MaxResults: 1000
    save_as: response
  emit:
    items_for: '{{ response.StackSummaries }}'
    as: item
- discovery_id: aws.cloudformation.describe_stack_events
  for_each: aws.cloudformation.list_stacks_for_events
  on_error: continue
  calls:
  - action: describe_stack_events
    params:
      StackName: '{{ item.StackName }}'
      MaxResults: 1000
    save_as: response
  emit:
    items_for: '{{ response.StackEvents }}'
    as: item
- discovery_id: aws.cloudformation.describe_stacks
  calls:
  - action: describe_stacks
    save_as: response
    params:
      MaxResults: 1000
  emit: {}
- discovery_id: aws.cloudformation.list_stacks
  calls:
  - action: describe_stacks
    save_as: response
    params:
      MaxResults: 1000
  emit: {}
checks:
- rule_id: aws.cloudformation.stack.change_audit_logging_enabled
  for_each: aws.cloudformation.describe_stack_events
  conditions:
    all:
    - var: item.ResourceStatus
      op: exists
      value: null
    - var: item.ResourceStatusReason
      op: exists
      value: null
    - var: item.Timestamp
      op: exists
      value: null
- rule_id: aws.cloudformation.stack.cloudformation_approvals_required_for_changes
  for_each: aws.cloudformation.describe_stacks
  conditions:
    all:
    - var: item.Capabilities
      op: in
      value: CAPABILITY_NAMED_IAM
    - var: item.Capabilities
      op: in
      value: CAPABILITY_AUTO_EXPAND
- rule_id: aws.cloudformation.stack.cloudformation_storage_encrypted_and_private
  for_each: aws.cloudformation.list_stacks
  conditions:
    all:
    - var: item.StackStatus
      op: equals
      value: CREATE_COMPLETE
    - var: item.EnableTerminationProtection
      op: equals
      value: true
