version: '1.0'
provider: aws
service: ssm
services:
  client: ssm
  module: boto3.client
discovery:
- discovery_id: aws.ssm.describe_patch_groups
  calls:
  - action: describe_patch_groups
    save_as: response
  emit:
    items_for: '{{ response.Mappings }}'
    as: item
    item:
      PatchGroup: '{{ item.PatchGroup }}'
      BaselineIdentity: '{{ item.BaselineIdentity }}'
- discovery_id: aws.ssm.describe_patch_baselines
  calls:
  - action: describe_patch_baselines
    params:
      Filters:
      - Key: OWNER
        Values:
        - Self
    save_as: response
  emit:
    items_for: '{{ response.BaselineIdentities }}'
    as: item
    item:
      BaselineId: '{{ item.BaselineId }}'
      BaselineName: '{{ item.BaselineName }}'
      OperatingSystem: '{{ item.OperatingSystem }}'
      BaselineDescription: '{{ item.BaselineDescription }}'
      DefaultBaseline: '{{ item.DefaultBaseline }}'
- discovery_id: aws.ssm.describe_maintenance_windows
  calls:
  - action: describe_maintenance_windows
    save_as: response
  emit:
    items_for: '{{ response.WindowIdentities }}'
    as: item
    item:
      WindowId: '{{ item.WindowId }}'
      Name: '{{ item.Name }}'
      Description: '{{ item.Description }}'
      Enabled: '{{ item.Enabled }}'
      Duration: '{{ item.Duration }}'
      Cutoff: '{{ item.Cutoff }}'
      Schedule: '{{ item.Schedule }}'
      ScheduleTimezone: '{{ item.ScheduleTimezone }}'
      ScheduleOffset: '{{ item.ScheduleOffset }}'
      EndDate: '{{ item.EndDate }}'
      StartDate: '{{ item.StartDate }}'
      NextExecutionTime: '{{ item.NextExecutionTime }}'
- discovery_id: aws.ssm.describe_maintenance_window_schedule
  for_each: aws.ssm.describe_maintenance_windows
  calls:
  - action: describe_maintenance_window_schedule
    params:
      WindowId: '{{ item.WindowId }}'
    save_as: response
    on_error: continue
  emit:
    items_for: '{{ response.ScheduledWindowExecutions }}'
    as: item
- discovery_id: aws.ssm.list_resource_compliance_summaries
  calls:
  - action: list_compliance_items
    save_as: response
  emit:
    items_for: '{{ response.ComplianceItems }}'
    as: item
    item:
      ComplianceType: '{{ item.ComplianceType }}'
      ResourceType: '{{ item.ResourceType }}'
      ResourceId: '{{ item.ResourceId }}'
      Id: '{{ item.Id }}'
      Title: '{{ item.Title }}'
      Status: '{{ item.Status }}'
      Severity: '{{ item.Severity }}'
      ExecutionSummary: '{{ item.ExecutionSummary }}'
      Details: '{{ item.Details }}'
- discovery_id: aws.ssm.list_commands
  calls:
  - action: describe_automation_executions
    save_as: response
  emit:
    items_for: '{{ response.AutomationExecutionMetadataList }}'
    as: item
    item:
      AutomationExecutionId: '{{ item.AutomationExecutionId }}'
      DocumentName: '{{ item.DocumentName }}'
      DocumentVersion: '{{ item.DocumentVersion }}'
      AutomationExecutionStatus: '{{ item.AutomationExecutionStatus }}'
      ExecutionStartTime: '{{ item.ExecutionStartTime }}'
      ExecutionEndTime: '{{ item.ExecutionEndTime }}'
      ExecutedBy: '{{ item.ExecutedBy }}'
      LogFile: '{{ item.LogFile }}'
      Outputs: '{{ item.Outputs }}'
      Mode: '{{ item.Mode }}'
      ParentAutomationExecutionId: '{{ item.ParentAutomationExecutionId }}'
      CurrentStepName: '{{ item.CurrentStepName }}'
      CurrentAction: '{{ item.CurrentAction }}'
      FailureMessage: '{{ item.FailureMessage }}'
      TargetParameterName: '{{ item.TargetParameterName }}'
      Targets: '{{ item.Targets }}'
      TargetMaps: '{{ item.TargetMaps }}'
      ResolvedTargets: '{{ item.ResolvedTargets }}'
      MaxConcurrency: '{{ item.MaxConcurrency }}'
      MaxErrors: '{{ item.MaxErrors }}'
- discovery_id: aws.ssm.list_nodes
  calls:
  - action: list_documents
    save_as: response
  emit:
    items_for: '{{ response.DocumentIdentifiers }}'
    as: item
    item:
      Name: '{{ item.Name }}'
      CreatedDate: '{{ item.CreatedDate }}'
      DisplayName: '{{ item.DisplayName }}'
      Owner: '{{ item.Owner }}'
      VersionName: '{{ item.VersionName }}'
      PlatformTypes: '{{ item.PlatformTypes }}'
      DocumentVersion: '{{ item.DocumentVersion }}'
      DocumentType: '{{ item.DocumentType }}'
      SchemaVersion: '{{ item.SchemaVersion }}'
      DocumentFormat: '{{ item.DocumentFormat }}'
      TargetType: '{{ item.TargetType }}'
      Tags: '{{ item.Tags }}'
      Requires: '{{ item.Requires }}'
      ReviewStatus: '{{ item.ReviewStatus }}'
      Author: '{{ item.Author }}'
- discovery_id: aws.ssm.describe_automation_executions
  calls:
  - action: describe_automation_executions
    save_as: response
  emit:
    items_for: '{{ response.AutomationExecutionMetadataList }}'
    as: item
    item:
      AutomationExecutionId: '{{ item.AutomationExecutionId }}'
      DocumentName: '{{ item.DocumentName }}'
      DocumentVersion: '{{ item.DocumentVersion }}'
      AutomationExecutionStatus: '{{ item.AutomationExecutionStatus }}'
      ExecutionStartTime: '{{ item.ExecutionStartTime }}'
      ExecutionEndTime: '{{ item.ExecutionEndTime }}'
      ExecutedBy: '{{ item.ExecutedBy }}'
      LogFile: '{{ item.LogFile }}'
      Outputs: '{{ item.Outputs }}'
      Mode: '{{ item.Mode }}'
      ParentAutomationExecutionId: '{{ item.ParentAutomationExecutionId }}'
      CurrentStepName: '{{ item.CurrentStepName }}'
      CurrentAction: '{{ item.CurrentAction }}'
      FailureMessage: '{{ item.FailureMessage }}'
      TargetParameterName: '{{ item.TargetParameterName }}'
      Targets: '{{ item.Targets }}'
      TargetMaps: '{{ item.TargetMaps }}'
      ResolvedTargets: '{{ item.ResolvedTargets }}'
      MaxConcurrency: '{{ item.MaxConcurrency }}'
      MaxErrors: '{{ item.MaxErrors }}'
- discovery_id: aws.ssm.list_documents
  calls:
  - action: list_documents
    params:
      Filters:
      - Key: Owner
        Values:
        - Self
      MaxResults: 50
    save_as: response
  emit:
    items_for: '{{ response.DocumentIdentifiers }}'
    as: item
    item:
      Name: '{{ item.Name }}'
      CreatedDate: '{{ item.CreatedDate }}'
      DisplayName: '{{ item.DisplayName }}'
      Owner: '{{ item.Owner }}'
      VersionName: '{{ item.VersionName }}'
      PlatformTypes: '{{ item.PlatformTypes }}'
      DocumentVersion: '{{ item.DocumentVersion }}'
      DocumentType: '{{ item.DocumentType }}'
      SchemaVersion: '{{ item.SchemaVersion }}'
      DocumentFormat: '{{ item.DocumentFormat }}'
      TargetType: '{{ item.TargetType }}'
      Tags: '{{ item.Tags }}'
      Requires: '{{ item.Requires }}'
      ReviewStatus: '{{ item.ReviewStatus }}'
      Author: '{{ item.Author }}'
- discovery_id: aws.ssm.list_associations
  calls:
  - action: list_associations
    save_as: response
  emit:
    items_for: '{{ response.Associations }}'
    as: item
    item:
      Name: '{{ item.Name }}'
      InstanceId: '{{ item.InstanceId }}'
      AssociationId: '{{ item.AssociationId }}'
      AssociationVersion: '{{ item.AssociationVersion }}'
      DocumentVersion: '{{ item.DocumentVersion }}'
      Targets: '{{ item.Targets }}'
      LastExecutionDate: '{{ item.LastExecutionDate }}'
      Overview: '{{ item.Overview }}'
      ScheduleExpression: '{{ item.ScheduleExpression }}'
      AssociationName: '{{ item.AssociationName }}'
- discovery_id: aws.ssm.list_document_versions
  for_each: aws.ssm.list_associations
  calls:
  - action: describe_association
    params:
      AssociationId: '{{ item.AssociationId }}'
      InstanceId: '{{ item.InstanceId }}'
      Name: '{{ item.Name }}'
    save_as: response
    on_error: continue
  emit: {}
checks:
- rule_id: aws.ssm.managed.ssm_compliant_patching_configured
  for_each: aws.ssm.describe_patch_groups
  conditions:
    all:
    - var: item.PatchGroup
      op: exists
      value: null
    - var: item.BaselineIdentity.BaselineId
      op: exists
      value: null
- rule_id: aws.ssm.patchbaseline.ssm_required_controls_present
  for_each: aws.ssm.describe_patch_baselines
  conditions:
    all:
    - var: item.OperatingSystem
      op: equals
      value: WINDOWS
    - var: item.DefaultBaseline
      op: equals
      value: 'true'
- rule_id: aws.ssm.patchbaseline.ssm_approval_rules_configured
  for_each: aws.ssm.describe_patch_baselines
  conditions:
    all:
    - var: item.BaselineId
      op: exists
      value: null
    - var: item.DefaultBaseline
      op: equals
      value: 'true'
- rule_id: aws.ssm.patchbaseline.ssm_baseline_defined_for_os_families_configured
  for_each: aws.ssm.describe_patch_baselines
  conditions:
    all:
    - var: item.OperatingSystem
      op: exists
      value: null
    - var: item.OperatingSystem
      op: in
      value:
      - WINDOWS
      - AMAZON_LINUX
      - AMAZON_LINUX_2
      - UBUNTU
      - REDHAT_ENTERPRISE_LINUX
      - SUSE
      - CENTOS
      - DEBIAN
      - ORACLE_LINUX
      - MACOS
- rule_id: aws.ssm.maintenance_window.ssm_window_configured
  for_each: aws.ssm.describe_maintenance_windows
  conditions:
    all:
    - var: item.Enabled
      op: equals
      value: 'true'
    - var: item.Schedule
      op: exists
      value: null
    - var: item.Duration
      op: greater_than
      value: '1'
    - var: item.Cutoff
      op: greater_than
      value: '0'
- rule_id: aws.ssm.patchgroup.ssm_approval_rules_configured
  for_each: aws.ssm.describe_patch_groups
  conditions:
    all:
    - var: item.PatchGroup
      op: exists
      value: null
    - var: item.BaselineIdentity
      op: exists
      value: null
- rule_id: aws.ssm.restapi.public_access_restricted
  for_each: aws.ssm.describe_maintenance_windows
  conditions:
    var: item.Enabled
    op: equals
    value: 'true'
- rule_id: aws.ssm.patchbaseline.ssm_exemptions_have_expiry_and_owner_configured
  for_each: aws.ssm.describe_patch_baselines
  conditions:
    all:
    - var: item.BaselineId
      op: exists
      value: null
    - var: item.BaselineName
      op: exists
      value: null
- rule_id: aws.ssm.maintenance_window.execution_roles_least_privilege
  for_each: aws.ssm.describe_maintenance_window_schedule
  conditions:
    all:
    - var: item.WindowId
      op: exists
      value: null
    - var: item.Name
      op: exists
      value: null
- rule_id: aws.ssm.baseline.ssm_conformance_pack_deployed_configured
  for_each: aws.ssm.list_resource_compliance_summaries
  conditions:
    all:
    - var: item.ComplianceType
      op: equals
      value: ConformancePackCompliance
    - var: item.Status
      op: equals
      value: COMPLIANT
- rule_id: aws.ssm.automation.ssm_storage_encrypted_and_private
  for_each: aws.ssm.list_commands
  conditions:
    all:
    - var: item.DocumentName
      op: exists
      value: null
    - var: item.DocumentVersion
      op: exists
      value: null
    - var: item.AutomationExecutionStatus
      op: in
      value:
      - Success
      - InProgress
- rule_id: aws.ssm.document.ssm_storage_encrypted_and_private
  for_each: aws.ssm.list_nodes
  conditions:
    var: item.Owner
    op: equals
    value: Self
- rule_id: aws.ssm.automation.remediation_roles_least_privilege
  for_each: aws.ssm.describe_automation_executions
  conditions:
    all:
    - var: item.AutomationExecutionStatus
      op: equals
      value: Success
    - var: item.DocumentName
      op: exists
      value: null
    - var: item.ExecutedBy
      op: exists
      value: null
- rule_id: aws.ssm.automation.ssm_artifacts_encrypted_and_private
  for_each: aws.ssm.list_commands
  conditions:
    all:
    - var: item.DocumentName
      op: exists
      value: null
    - var: item.DocumentVersion
      op: exists
      value: null
    - var: item.AutomationExecutionStatus
      op: in
      value:
      - Success
      - InProgress
      - Pending
- rule_id: aws.ssm.automation.change_audit_logging_enabled
  for_each: aws.ssm.describe_automation_executions
  conditions:
    all:
    - var: item.AutomationExecutionStatus
      op: equals
      value: Success
    - var: item.DocumentName
      op: equals
      value: AWS-EnableSSMLogging
- rule_id: aws.ssm.document.change_audit_logging_enabled
  for_each: aws.ssm.list_documents
  conditions:
    all:
    - var: item.DocumentType
      op: equals
      value: Command
    - var: item.ReviewStatus
      op: equals
      value: Approved
- rule_id: aws.ssm.patchbaseline.ssm_maintenance_windows_configured
  for_each: aws.ssm.describe_maintenance_window_schedule
  conditions:
    all:
    - var: item.WindowId
      op: exists
      value: null
    - var: item.Name
      op: exists
      value: null
- rule_id: aws.ssm.automation.execution_roles_least_privilege
  for_each: aws.ssm.describe_automation_executions
  conditions:
    all:
    - var: item.AutomationExecutionId
      op: exists
      value: null
    - var: item.AutomationExecutionStatus
      op: equals
      value: Success
- rule_id: aws.ssm.document.rbac_least_privilege
  for_each: aws.ssm.list_nodes
  conditions:
    all:
    - var: item.Owner
      op: equals
      value: Self
    - var: item.Tags
      op: equals
      value: []
- rule_id: aws.ssm.automation.versioning_and_immutability_enabled
  for_each: aws.ssm.list_document_versions
  conditions:
    all:
    - var: item.DocumentVersion
      op: exists
      value: null
    - var: item.DocumentVersion
      op: not_equals
      value: default
- rule_id: aws.ssm.automation.rbac_least_privilege
  for_each: aws.ssm.list_commands
  conditions:
    all:
    - var: item.DocumentName
      op: exists
      value: null
    - var: item.AutomationExecutionStatus
      op: in
      value:
      - Success
      - InProgress
      - Pending
    - var: item.ExecutedBy
      op: exists
      value: null
- rule_id: aws.ssm.patchgroup.ssm_baseline_defined_for_os_families_configured
  for_each: aws.ssm.describe_patch_groups
  conditions:
    all:
    - var: item.PatchGroup
      op: exists
      value: null
    - var: item.BaselineIdentity
      op: exists
      value: null
- rule_id: aws.ssm.patchgroup.ssm_maintenance_windows_configured
  for_each: aws.ssm.describe_maintenance_window_schedule
  conditions:
    var: item.WindowId
    op: exists
    value: null
- rule_id: aws.ssm.baseline.ssm_parameters_configured
  for_each: aws.ssm.describe_patch_baselines
  conditions:
    all:
    - var: item.BaselineId
      op: exists
      value: null
    - var: item.BaselineName
      op: exists
      value: null
    - var: item.OperatingSystem
      op: exists
      value: null
- rule_id: aws.ssm.document.ssm_secrets_encrypted
  for_each: aws.ssm.list_document_versions
  conditions:
    all:
    - var: item.DocumentFormat
      op: equals
      value: JSON
    - var: item.DocumentType
      op: equals
      value: Command
    - var: item.Name
      op: equals
      value: AWS-RunDocument
