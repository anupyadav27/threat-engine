version: '1.0'
provider: aws
service: vpcflowlogs
services:
  client: ec2
  module: boto3.client
discovery:
- discovery_id: aws.ec2.describe_flow_logs
  calls:
  - action: describe_flow_logs
    save_as: response
    params:
      MaxResults: 1000
  emit:
    items_for: '{{ response.FlowLogs }}'
    as: item
