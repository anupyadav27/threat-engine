version: '1.0'
provider: aws
service: ecr
services:
  client: ecr
  module: boto3.client
discovery:
- discovery_id: aws.ecr.describe_registry
  calls:
  - action: describe_registry
    save_as: response
    params:
      MaxResults: 1000
  emit: {}
- discovery_id: aws.ecr.describe_repositories
  calls:
  - action: describe_repositories
    save_as: response
    params:
      MaxResults: 1000
  emit:
    items_for: '{{ response.repositories }}'
    as: item
    item:
      repositoryName: '{{ item.repositoryName }}'
      repositoryArn: '{{ item.repositoryArn if item.repositoryArn is defined else \"\" }}'
      registryId: '{{ item.registryId if item.registryId is defined else \"\" }}'
      encryptionConfiguration: '{{ item.encryptionConfiguration if item.encryptionConfiguration is defined else {} }}'
      resource_arn: '{{ item.repositoryArn if item.repositoryArn is defined else \"\" }}'
- discovery_id: aws.ecr.get_lifecycle_policy
  for_each: aws.ecr.describe_repositories
  calls:
  - action: get_lifecycle_policy
    params:
      repositoryName: '{{ item.repositoryName }}'
    save_as: response
    on_error: continue
  emit: {}
- discovery_id: aws.ecr.get_repository_policy
  for_each: aws.ecr.describe_repositories
  calls:
  - action: get_repository_policy
    params:
      repositoryName: '{{ item.repositoryName }}'
    save_as: response
  emit: {}
- discovery_id: aws.ecr.get_registry_scanning_configuration
  calls:
  - action: get_registry_scanning_configuration
    save_as: response
  emit: {}
