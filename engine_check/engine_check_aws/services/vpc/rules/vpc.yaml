      Tags: '{{ item.Tags }}'
      SubnetArn: '{{ item.SubnetArn }}'
      OutpostArn: '{{ item.OutpostArn }}'
      EnableDns64: '{{ item.EnableDns64 }}'
      Ipv6Native: '{{ item.Ipv6Native }}'
      PrivateDnsNameOptionsOnLaunch: '{{ item.PrivateDnsNameOptionsOnLaunch }}'
      BlockPublicAccessStates: '{{ item.BlockPublicAccessStates }}'
      Type: '{{ item.Type }}'
