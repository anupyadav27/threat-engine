checks:
- rule_id: aws.vpc.subnet.dns_hostnames_and_support_configured
  for_each: aws.ec2.describe_subnets
  conditions:
    all:
    - var: item.MapCustomerOwnedIpOnLaunch
      op: equals
      value: 'true'
    - var: item.AssignIpv6AddressOnCreation
      op: equals
      value: 'true'
- rule_id: aws.vpc.customergateway.flow_logging_enabled
  for_each: aws.ec2.describe_account_attributes
  conditions:
    all:
    - var: item.AttributeName
      op: equals
      value: vpcFlowLogs
    - var: item.AttributeValues
      op: exists
      value: null
- rule_id: aws.vpc.internetgateway.flow_logging_enabled
  for_each: aws.ec2.describe_egress_only_internet_gateways
  conditions:
    all:
    - var: item.Attachments
      op: exists
      value: null
    - var: item.OwnerId
      op: exists
      value: null
- rule_id: aws.vpc.vpcendpoint.dns_hostnames_and_support_configured
  for_each: aws.ec2.describe_vpc_endpoint_service_configurations
  conditions:
    all:
    - var: item.ServiceState
      op: equals
      value: Available
    - var: item.PrivateDnsName
      op: exists
      value: null
- rule_id: aws.vpc.subnet.flow_logging_enabled
  for_each: aws.ec2.describe_flow_logs
  conditions:
    all:
    - var: item.ResourceId
      op: exists
      value: null
    - var: item.ResourceId
      op: contains
      value: subnet
    - var: item.FlowLogStatus
      op: equals
      value: ACTIVE
- rule_id: aws.vpc.vpc.flow_logging_enabled
  for_each: aws.ec2.describe_flow_logs
  conditions:
    var: item.FlowLogStatus
    op: equals
    value: ACTIVE
- rule_id: aws.vpc.securitygroup.security_closed_ports_restricted
  for_each: aws.ec2.describe_security_group_rules
  conditions:
    all:
    - var: item.FromPort
      op: not_equals
      value: null
    - var: item.ToPort
      op: not_equals
      value: null
    - var: item.IpProtocol
      op: not_equals
      value: '-1'
- rule_id: aws.vpc.networkacl.network_dns_hostnames_and_support_configured
  for_each: aws.ec2.describe_ipam_resource_discoveries
  conditions:
    all:
    - var: item.IsDefault
      op: equals
      value: 'true'
    - var: item.OwnerId
      op: exists
      value: null
- rule_id: aws.vpc.customergateway.api_dns_hostnames_and_support_configured
  for_each: aws.vpc.describe_customer_gateways
  conditions:
    all:
    - var: item.State
      op: equals
      value: available
    - var: item.Type
      op: equals
      value: ipsec.1
- rule_id: aws.vpc.resource.flow_log_active_rejects_enabled
  for_each: aws.ec2.describe_flow_logs
  conditions:
    all:
    - var: item.LogDestinationType
      op: equals
      value: cloud-watch-logs
    - var: item.TrafficType
      op: equals
      value: REJECT
- rule_id: aws.vpc.vpnconnection.flow_logging_enabled
  for_each: aws.ec2.describe_account_attributes
  conditions:
    all:
    - var: item.AttributeName
      op: equals
      value: vpc-flow-logs
    - var: item.AttributeValues
      op: exists
      value: null
- rule_id: aws.vpc.securitygroup.route_tables_no_unintended_internet_paths_configured
  for_each: aws.ec2.describe_nat_gateways
  conditions:
    all:
    - var: item.NatGatewayId
      op: not_equals
      value: null
    - var: item.RouteTableId
      op: not_equals
      value: null
- rule_id: aws.vpc.nacl_ingress_restricted_ports_22_3389.nacl_ingress_restricted_ports_22_3389_configured
  for_each: aws.ec2.describe_security_group_rules
  conditions:
    all:
    - var: item.FromPort
      op: not_equals
      value: '22'
    - var: item.ToPort
      op: not_equals
      value: '22'
    - var: item.FromPort
      op: not_equals
      value: '3389'
    - var: item.ToPort
      op: not_equals
      value: '3389'
- rule_id: aws.vpc.resource.endpoint_multi_az_enabled
  for_each: aws.ec2.describe_vpc_endpoint_service_configurations
  conditions:
    all:
    - var: item.ServiceType
      op: equals
      value: Interface
    - var: item.AvailabilityZoneIds
      op: exists
      value: null
- rule_id: aws.vpc.network_interface.flow_logging_enabled
  for_each: aws.ec2.list_snapshots_in_recycle_bin
  conditions:
    var: item.Description
    op: equals
    value: cloud-watch-logs
- rule_id: aws.vpc.internetgateway.api_dns_hostnames_and_support_configured
  for_each: aws.ec2.describe_ipam_resource_discoveries
  conditions:
    all:
    - var: item.IsDefault
      op: equals
      value: 'true'
    - var: item.OwnerId
      op: exists
      value: null
- rule_id: aws.vpc.routetable.s_no_unintended_internet_paths_configured
  for_each: aws.ec2.describe_nat_gateways
  conditions:
    all:
    - var: item.RouteTableId
      op: not_equals
      value: null
    - var: item.VpcId
      op: not_equals
      value: null
- rule_id: aws.vpc.resource.endpoint_for_ec2_enabled
  for_each: aws.ec2.describe_vpc_endpoint_service_configurations
  conditions:
    all:
    - var: item.ServiceName
      op: equals
      value: com.amazonaws.ec2
    - var: item.ServiceState
      op: equals
      value: Available
- rule_id: aws.vpc.network_interface.network_dns_hostnames_and_support_configured
  for_each: aws.ec2.describe_carrier_gateways
  conditions:
    all:
    - var: item.VpcId
      op: exists
      value: null
    - var: item.State
      op: equals
      value: available
- rule_id: aws.vpc.routetable.dns_hostnames_and_support_configured
  for_each: aws.ec2.describe_carrier_gateways
  conditions:
