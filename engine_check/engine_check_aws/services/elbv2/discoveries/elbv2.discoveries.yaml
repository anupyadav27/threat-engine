version: '1.0'
provider: aws
service: elbv2
services:
  client: elbv2
  module: boto3.client
discovery:
- discovery_id: aws.elbv2.describe_listeners
  for_each: aws.elbv2.describe_load_balancers
  calls:
  - action: describe_listeners
    params:
      LoadBalancerArn: '{{ item.LoadBalancerArn }}'
      MaxResults: 1000
    save_as: response
  emit:
    items_for: '{{ response.Listeners }}'
    as: item
    # capture ListenerArn to allow discovering rules for each listener
    item:
      ListenerArn: '{{ item.ListenerArn }}'
- discovery_id: aws.elbv2.describe_load_balancer_attributes
  for_each: aws.elbv2.describe_load_balancers
  calls:
  - action: describe_load_balancer_attributes
    params:
      LoadBalancerArn: '{{ item.LoadBalancerArn }}'
      MaxResults: 1000
    save_as: response
  emit:
    items_for: '{{ response.Attributes }}'
    as: item
- discovery_id: aws.elbv2.describe_load_balancers
  calls:
  - action: describe_load_balancers
    save_as: response
    params:
      MaxResults: 1000
  emit:
    items_for: '{{ response.LoadBalancers }}'
    as: item
- discovery_id: aws.elbv2.describe_target_groups
  calls:
  - action: describe_target_groups
    save_as: response
    params:
      MaxResults: 1000
  emit:
    items_for: '{{ response.TargetGroups }}'
    as: item
    # capture TargetGroupArn/TargetType for further target health queries
    item:
      TargetGroupArn: '{{ item.TargetGroupArn }}'
      TargetGroupName: '{{ item.TargetGroupName if item.TargetGroupName is defined else \"\" }}'
      TargetType: '{{ item.TargetType if item.TargetType is defined else \"instance\" }}'

# Discover rules for listeners so we can map LoadBalancer -> TargetGroup via Rules->Actions->TargetGroupArn
- discovery_id: aws.elbv2.describe_rules
  for_each: aws.elbv2.describe_listeners
  calls:
  - action: describe_rules
    params:
      ListenerArn: '{{ item.ListenerArn }}'
      MaxResults: 1000
    save_as: response
  emit:
    items_for: '{{ response.Rules }}'
    as: item
    item:
      RuleArn: '{{ item.RuleArn }}'
      Actions: '{{ item.Actions }}'

# Discover target health for each target group to map target-group -> instances/lambdas
- discovery_id: aws.elbv2.describe_target_health
  for_each: aws.elbv2.describe_target_groups
  calls:
  - action: describe_target_health
    params:
      TargetGroupArn: '{{ item.TargetGroupArn }}'
    save_as: response
  emit:
    items_for: '{{ response.TargetHealthDescriptions }}'
    as: item
    item:
      Target: '{{ item.Target }}'
      TargetHealth: '{{ item.TargetHealth }}'
