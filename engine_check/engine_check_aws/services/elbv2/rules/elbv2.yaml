version: '1.0'
provider: aws
service: elbv2
services:
  client: elbv2
  module: boto3.client
discovery:
- discovery_id: aws.elbv2.describe_listeners
  for_each: aws.elbv2.describe_load_balancers
  calls:
  - action: describe_listeners
    params:
      LoadBalancerArn: '{{ item.LoadBalancerArn }}'
    save_as: response
  emit:
    items_for: '{{ response.Listeners }}'
    as: item
- discovery_id: aws.elbv2.describe_load_balancer_attributes
  for_each: aws.elbv2.describe_load_balancers
  calls:
  - action: describe_load_balancer_attributes
    params:
      LoadBalancerArn: '{{ item.LoadBalancerArn }}'
    save_as: response
  emit:
    items_for: '{{ response.Attributes }}'
    as: item
- discovery_id: aws.elbv2.describe_load_balancers
  calls:
  - action: describe_load_balancers
    save_as: response
  emit:
    items_for: '{{ response.LoadBalancers }}'
    as: item
    item:
      LoadBalancerArn: '{{ item.LoadBalancerArn }}'
      DNSName: '{{ item.DNSName }}'
      CanonicalHostedZoneId: '{{ item.CanonicalHostedZoneId }}'
      CreatedTime: '{{ item.CreatedTime }}'
      LoadBalancerName: '{{ item.LoadBalancerName }}'
      Scheme: '{{ item.Scheme }}'
      VpcId: '{{ item.VpcId }}'
      State: '{{ item.State }}'
      Type: '{{ item.Type }}'
      AvailabilityZones: '{{ item.AvailabilityZones }}'
      SecurityGroups: '{{ item.SecurityGroups }}'
      IpAddressType: '{{ item.IpAddressType }}'
      CustomerOwnedIpv4Pool: '{{ item.CustomerOwnedIpv4Pool }}'
      EnforceSecurityGroupInboundRulesOnPrivateLinkTraffic: '{{ item.EnforceSecurityGroupInboundRulesOnPrivateLinkTraffic }}'
      EnablePrefixForIpv6SourceNat: '{{ item.EnablePrefixForIpv6SourceNat }}'
      IpamPools: '{{ item.IpamPools }}'
- discovery_id: aws.elbv2.describe_target_groups
  calls:
  - action: describe_target_groups
    save_as: response
  emit:
    items_for: '{{ response.TargetGroups }}'
    as: item
    item:
      TargetGroupArn: '{{ item.TargetGroupArn }}'
      TargetGroupName: '{{ item.TargetGroupName }}'
      Protocol: '{{ item.Protocol }}'
      Port: '{{ item.Port }}'
      VpcId: '{{ item.VpcId }}'
      HealthCheckProtocol: '{{ item.HealthCheckProtocol }}'
      HealthCheckPort: '{{ item.HealthCheckPort }}'
      HealthCheckEnabled: '{{ item.HealthCheckEnabled }}'
      HealthCheckIntervalSeconds: '{{ item.HealthCheckIntervalSeconds }}'
      HealthCheckTimeoutSeconds: '{{ item.HealthCheckTimeoutSeconds }}'
      HealthyThresholdCount: '{{ item.HealthyThresholdCount }}'
      UnhealthyThresholdCount: '{{ item.UnhealthyThresholdCount }}'
      HealthCheckPath: '{{ item.HealthCheckPath }}'
      Matcher: '{{ item.Matcher }}'
      LoadBalancerArns: '{{ item.LoadBalancerArns }}'
      TargetType: '{{ item.TargetType }}'
      ProtocolVersion: '{{ item.ProtocolVersion }}'
      IpAddressType: '{{ item.IpAddressType }}'
checks:
- rule_id: aws.elbv2.insecure_ssl_ciphers.insecure_ssl_ciphers_configured
  for_each: aws.elbv2.describe_listeners
  conditions:
    all:
    - var: item.SslPolicy
      op: exists
      value: null
- rule_id: aws.elbv2.listener.cipher_policy_secure_configured
  for_each: aws.elbv2.describe_listeners
  conditions:
    all:
    - var: item.SslPolicy
      op: exists
      value: null
- rule_id: aws.elbv2.loadbalancer.deletion_protection_enabled
  for_each: aws.elbv2.describe_load_balancer_attributes
  conditions:
    all:
    - var: item.Key
      op: equals
      value: deletion_protection.enabled
    - var: item.Value
      op: equals
      value: 'true'
- rule_id: aws.elbv2.loadbalancer.listener_tls_min_1_2_configured
  for_each: aws.elbv2.describe_listeners
  conditions:
    all:
    - var: item.SslPolicy
      op: in
      value:
      - ELBSecurityPolicy-TLS-1-2-2017-01
      - ELBSecurityPolicy-TLS-1-2-Ext-2018-06
- rule_id: aws.elbv2.loadbalancer.waf_attached_if_supported
  for_each: aws.elbv2.describe_load_balancers
  conditions:
    all:
    - var: item.LoadBalancerArn
      op: exists
      value: null
    - var: item.Type
      op: equals
      value: application
- rule_id: aws.elbv2.targetgroup.elbv2_targets_in_private_subnets_configured
  for_each: aws.elbv2.describe_target_groups
  conditions:
    all:
    - var: item.VpcId
      op: exists
      value: null
    - var: item.TargetType
      op: equals
      value: ip
- rule_id: aws.elbv2.wafaclattached.waf_acl_enabled
  for_each: aws.elbv2.describe_load_balancers
  conditions:
    all:
    - var: item.LoadBalancerArn
      op: exists
      value: null
- rule_id: aws.elbv2.alb_https_redirect.elbv2_alb_https_redirect_configured
  for_each: aws.elbv2.describe_listeners
  conditions:
    all:
    - var: item.DefaultActions
      op: exists
      value: null
    - var: item.Protocol
      op: equals
      value: HTTP
- rule_id: aws.elbv2.deletion_protection.deletion_protection_configured
  for_each: aws.elbv2.describe_load_balancer_attributes
  conditions:
    all:
    - var: item.Key
      op: equals
      value: deletion_protection.enabled
    - var: item.Value
      op: equals
      value: 'true'
- rule_id: aws.elbv2.group.security_check_health_check_enabled
  for_each: aws.elbv2.describe_target_groups
  conditions:
    var: item.HealthCheckEnabled
    op: equals
    value: true
- rule_id: aws.elbv2.internetfacing.elbv2_internet_facing_configured
  for_each: aws.elbv2.describe_load_balancers
  conditions:
    var: item.Scheme
    op: equals
    value: internet-facing
- rule_id: aws.elbv2.isinmultipleaz.elbv2_is_in_multiple_az_configured
  for_each: aws.elbv2.describe_load_balancers
  conditions:
    var: item.AvailabilityZones
    op: exists
    value: null
- rule_id: aws.elbv2.listener.tls_min_1_2_configured
  for_each: aws.elbv2.describe_listeners
  conditions:
    all:
    - var: item.SslPolicy
      op: exists
      value: null
    - var: item.Protocol
      op: in
      value:
      - HTTPS
      - TLS
- rule_id: aws.elbv2.loadbalancer.access_logs_enabled
  for_each: aws.elbv2.describe_load_balancer_attributes
  conditions:
    all:
    - var: item.Key
      op: equals
      value: access_logs.s3.enabled
    - var: item.Value
      op: equals
      value: 'true'
- rule_id: aws.elbv2.loadbalancer.valid_certificate_enabled
  for_each: aws.elbv2.describe_listeners
  conditions:
    all:
    - var: item.Certificates
      op: exists
      value: null
    - var: item.Protocol
      op: in
      value:
      - HTTPS
      - TLS
- rule_id: aws.elbv2.logging.access_logging_enabled
  for_each: aws.elbv2.describe_load_balancer_attributes
  conditions:
    all:
    - var: item.Key
      op: equals
      value: access_logs.s3.enabled
    - var: item.Value
      op: equals
      value: 'true'
- rule_id: aws.elbv2.resource.logging_enabled
  for_each: aws.elbv2.describe_load_balancer_attributes
  conditions:
    all:
    - var: item.Key
      op: equals
      value: access_logs.s3.enabled
    - var: item.Value
      op: equals
      value: 'true'
- rule_id: aws.elbv2.targetgroup.health_checks_tls_if_supported_configured
  for_each: aws.elbv2.describe_target_groups
  conditions:
    all:
    - var: item.HealthCheckEnabled
      op: equals
      value: true
    - var: item.HealthCheckProtocol
      op: in
      value:
      - HTTPS
      - TLS
