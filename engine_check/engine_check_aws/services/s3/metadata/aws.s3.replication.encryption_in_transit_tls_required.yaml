rule_id: aws.s3.replication.encryption_in_transit_tls_required
service: s3
resource: replication
requirement: Encryption in Transit
title: 'S3 replication: Encryption In Transit Tls Required'
scope: s3.replication.encryption
domain: data_protection_and_privacy
subcategory: encryption_at_rest
rationale: Ensures s3 replication has encryption in transit tls required properly
  configured for security compliance.
data_security:
