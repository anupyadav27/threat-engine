version: '1.0'
provider: aws
service: appsync
services:
  client: appsync
  module: boto3.client
discovery:
- discovery_id: aws.appsync.list_graphql_apis
  calls:
  - action: list_graphql_apis
    save_as: response
    params:
      MaxResults: 1000
  emit:
    items_for: '{{ response.graphqlApis }}'
    as: item
