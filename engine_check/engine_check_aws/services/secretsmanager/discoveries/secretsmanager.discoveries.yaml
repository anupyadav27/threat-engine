version: '1.0'
provider: aws
service: secretsmanager
services:
  client: secretsmanager
  module: boto3.client
discovery:
- discovery_id: aws.secretsmanager.list_secrets
  calls:
  - action: list_secrets
    params:
      MaxResults: 1000
    save_as: response
  emit:
    items_for: '{{ response.SecretList }}'
    as: item

- discovery_id: aws.secretsmanager.describe_secret
  for_each: aws.secretsmanager.list_secrets
  calls:
  - action: describe_secret
    params:
      SecretId: '{{ item.ARN if item.ARN is defined else item.Name }}'
    save_as: response
    on_error: continue
  emit:
    item:
      SecretId: '{{ response.ARN if response.ARN is defined else response.Name if response.Name is defined else \"\" }}'
      SecretArn: '{{ response.ARN if response.ARN is defined else response.Name if response.Name is defined else \"\" }}'
      Name: '{{ response.Name if response.Name is defined else \"\" }}'
      KmsKeyId: '{{ response.KmsKeyId if response.KmsKeyId is defined else (response.get(\"KmsKeyId\") if response.get(\"KmsKeyId\") is defined else \"\") }}'
      RotationEnabled: '{{ response.RotationEnabled if response.RotationEnabled is defined else false }}'
      resource_arn: '{{ response.ARN if response.ARN is defined else response.Name if response.Name is defined else \"\" }}'
