version: '1.0'
provider: aws
service: guardduty
services:
  client: guardduty
  module: boto3.client
discovery:
- discovery_id: aws.guardduty.list_detectors
  calls:
  - action: list_detectors
    params:
      MaxResults: 1000
    on_error: continue
    save_as: response
  emit:
    items_for: '{{ response.DetectorIds }}'
    as: item
- discovery_id: aws.guardduty.get_detector
  for_each: aws.guardduty.list_detectors
  calls:
  - action: get_detector
    params:
      DetectorId: '{{ item.DetectorId }}'
    save_as: response
  emit: {}
- discovery_id: aws.guardduty.describe_organization_configuration
  for_each: aws.guardduty.list_detectors
  calls:
  - action: describe_organization_configuration
    params:
      DetectorId: '{{ item.DetectorId }}'
      MaxResults: 1000
    save_as: response
  emit: {}
