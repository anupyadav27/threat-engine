version: '1.0'
provider: aws
service: lakeformation
checks:
- rule_id: aws.lakeformation.data_lake_settings.rbac_least_privilege
  for_each: aws.lakeformation.get_data_lake_settings
  conditions:
    all:
    - var: item.DataLakeAdmins
      op: equals
      value: []
    - var: item.CreateDatabaseDefaultPermissions
      op: equals
      value: []
    - var: item.CreateTableDefaultPermissions
      op: equals
      value: []
- rule_id: aws.lakeformation.data_lake_settings.change_audit_logging_enabled
  for_each: aws.lakeformation.get_data_lake_settings
  conditions:
    var: item.Parameters
    op: exists
    value: null
- rule_id: aws.lakeformation.data_lake_settings.mfa_required
  for_each: aws.lakeformation.get_data_lake_settings
  conditions:
    var: item.DataLakeAdmins
    op: exists
    value: null
