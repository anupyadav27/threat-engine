version: '1.0'
provider: aws
service: keyspaces
services:
  client: keyspaces
  module: boto3.client
discovery:
- discovery_id: aws.keyspaces.list_keyspaces
  calls:
  - action: list_keyspaces
    save_as: response
    params:
      MaxResults: 1000
  emit:
    items_for: '{{ response.keyspaces }}'
    as: item
