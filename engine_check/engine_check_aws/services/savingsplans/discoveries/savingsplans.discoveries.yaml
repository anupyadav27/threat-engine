version: '1.0'
provider: aws
service: savingsplans
services:
  client: savingsplans
  module: boto3.client
discovery:
- discovery_id: aws.savingsplans.describe_savings_plans
  calls:
  - action: describe_savings_plans
    save_as: response
    params:
      MaxResults: 1000
  emit:
    items_for: '{{ response.savingsPlans }}'
    as: item
