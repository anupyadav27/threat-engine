version: '1.0'
provider: aws
service: backup
services:
  client: backup
  module: boto3.client
discovery:
- discovery_id: aws.backup.get_backup_vault_notifications
  for_each: aws.backup.list_backup_vaults
  calls:
  - action: get_backup_vault_notifications
    params:
      BackupVaultName: '{{ item.BackupVaultName }}'
    save_as: response
    on_error: continue
  emit: {}
- discovery_id: aws.backup.list_copy_jobs
  calls:
  - action: list_backup_job_summaries
    save_as: response
    params:
      MaxResults: 1000
  emit:
    items_for: '{{ response.BackupJobSummaries }}'
    as: item
- discovery_id: aws.backup.describe_backup_job
  for_each: aws.backup.list_backup_jobs
  calls:
  - action: describe_backup_job
    params:
      BackupJobId: '{{ item.BackupJobId }}'
      MaxResults: 1000
    save_as: response
    on_error: continue
  emit: {}
- discovery_id: aws.backup.list_recovery_points_by_backup_vault
  calls:
  - action: list_backup_jobs
    save_as: response
    params:
      MaxResults: 1000
  emit:
    items_for: '{{ response.BackupJobs }}'
    as: item
- discovery_id: aws.backup.list_restore_testing_selections
  calls:
  - action: list_backup_jobs
    save_as: response
    params:
      MaxResults: 1000
  emit:
    items_for: '{{ response.BackupJobs }}'
    as: item
- discovery_id: aws.backup.list_restore_jobs_by_protected_resource
  calls:
  - action: list_backup_job_summaries
    save_as: response
    params:
      MaxResults: 1000
  emit:
    items_for: '{{ response.BackupJobSummaries }}'
    as: item
- discovery_id: aws.backup.list_backup_plan_versions
  calls:
  - action: list_backup_plans
    params:
      MaxResults: 1000
    save_as: response
  emit:
    items_for: '{{ response.BackupPlansList }}'
    as: item
- discovery_id: aws.backup.list_scan_jobs
  calls:
  - action: list_backup_job_summaries
    save_as: response
    params:
      MaxResults: 1000
  emit:
    items_for: '{{ response.BackupJobSummaries }}'
    as: item
- discovery_id: aws.backup.get_backup_vault_access_policy
  for_each: aws.backup.list_backup_vaults
  calls:
  - action: get_backup_vault_access_policy
    params:
      BackupVaultName: '{{ item.BackupVaultName }}'
    save_as: response
    on_error: continue
  emit: {}
- discovery_id: aws.backup.list_recovery_points_by_resource
  calls:
  - action: list_backup_jobs
    save_as: response
    params:
      MaxResults: 1000
  emit:
    items_for: '{{ response.BackupJobs }}'
    as: item
- discovery_id: aws.backup.list_backup_selections
  calls:
  - action: list_backup_plans
    save_as: response
    params:
      MaxResults: 1000
  emit:
    items_for: '{{ response.BackupPlansList }}'
    as: item
- discovery_id: aws.backup.list_backup_vaults
  calls:
  - action: list_backup_vaults
    params:
      MaxResults: 1000
    save_as: response
  emit:
    items_for: '{{ response.BackupVaultList }}'
    as: item
- discovery_id: aws.backup.list_report_plans
  calls:
  - action: list_report_plans
    params:
      MaxResults: 1000
    save_as: response
  emit:
    items_for: '{{ response.ReportPlans }}'
    as: item
- discovery_id: aws.backup.list_backup_jobs
  calls:
  - action: list_backup_jobs
    params:
      MaxResults: 1000
    save_as: response
  emit:
    items_for: '{{ response.BackupJobs }}'
    as: item
