version: '1.0'
provider: aws
service: rds
services:
  client: rds
  module: boto3.client
discovery:
- discovery_id: aws.rds.describe_db_security_groups
  calls:
  - action: describe_db_security_groups
    save_as: response
    params:
      MaxRecords: 1000
  emit:
    items_for: '{{ response.DBSecurityGroups }}'
    as: item
- discovery_id: aws.rds.describe_d_b_cluster_automated_backups
  calls:
  - action: describe_db_cluster_automated_backups
    save_as: response
    params:
      MaxRecords: 1000
  emit:
    items_for: '{{ response.DBClusterAutomatedBackups }}'
    as: item
- discovery_id: aws.rds.describe_d_b_clusters
  calls:
  - action: describe_db_clusters
    save_as: response
    params:
      MaxRecords: 1000
  emit:
    items_for: '{{ response.DBClusters }}'
    as: item
- discovery_id: aws.rds.describe_option_groups
  calls:
  - action: describe_option_groups
    save_as: response
    params:
      MaxRecords: 1000
  emit:
    items_for: '{{ response.OptionGroupsList }}'
    as: item
- discovery_id: aws.rds.describe_d_b_parameter_groups
  calls:
  - action: describe_db_parameter_groups
    save_as: response
    params:
      MaxRecords: 1000
  emit:
    items_for: '{{ response.DBParameterGroups }}'
    as: item
- discovery_id: aws.rds.describe_d_b_instances
  calls:
  - action: describe_db_instances
    save_as: response
    params:
      MaxRecords: 1000
  emit:
    items_for: '{{ response.DBInstances }}'
    as: item
- discovery_id: aws.rds.describe_d_b_instance_automated_backups
  calls:
  - action: describe_db_instance_automated_backups
    save_as: response
    params:
      MaxRecords: 1000
  emit:
    items_for: '{{ response.DBInstanceAutomatedBackups }}'
    as: item
- discovery_id: aws.rds.describe_d_b_snapshots
  calls:
  - action: describe_db_snapshots
    save_as: response
    params:
      MaxRecords: 1000
  emit:
    items_for: '{{ response.DBSnapshots }}'
    as: item
- discovery_id: aws.rds.describe_reserved_d_b_instances
  calls:
  - action: describe_reserved_db_instances
    save_as: response
    params:
      MaxRecords: 1000
  emit:
    items_for: '{{ response.ReservedDBInstances }}'
    as: item
- discovery_id: aws.rds.describe_option_group_options
  calls:
  - action: describe_db_snapshot_tenant_databases
    save_as: response
    params:
      MaxRecords: 1000
  emit:
    items_for: '{{ response.DBSnapshotTenantDatabases }}'
    as: item
- discovery_id: aws.rds.describe_db_cluster_snapshots
  calls:
  - action: describe_db_cluster_snapshots
    params:
      MaxRecords: 1000
      IncludeShared: false
      IncludePublic: false
    on_error: continue
    save_as: response
  emit:
    items_for: '{{ response.DBClusterSnapshots }}'
    as: item
- discovery_id: aws.rds.describe_d_b_cluster_parameters
  for_each: aws.rds.describe_d_b_clusters
  calls:
  - action: describe_db_cluster_parameters
    params:
      DBClusterParameterGroupName: '{{ item.DBClusterParameterGroup }}'
      MaxRecords: 1000
    save_as: response
  emit:
    items_for: '{{ response.Parameters }}'
    as: item
- discovery_id: aws.rds.describe_blue_green_deployments
  calls:
  - action: describe_blue_green_deployments
    save_as: response
    params:
      MaxRecords: 1000
  emit: {}
checks:
- rule_id: aws.rds.securitygroup.security_egress_restricted
  for_each: aws.rds.describe_db_security_groups
  conditions:
    all:
    - var: item.EC2SecurityGroups.EC2SecurityGroupName
      op: exists
      value: null
    - var: item.IPRanges.CIDRIP
      op: not_equals
      value: 0.0.0.0/0
- rule_id: aws.rds.instance.storage_encrypted
  for_each: aws.rds.describe_d_b_cluster_automated_backups
  conditions:
    var: item.StorageEncrypted
    op: equals
    value: 'true'
- rule_id: aws.rds.instance.public_access_disabled
  for_each: aws.rds.describe_d_b_clusters
  conditions:
    var: item.PubliclyAccessible
    op: equals
    value: 'false'
- rule_id: aws.rds.securitygroup.security_only_required_ports_open_restricted
  for_each: aws.rds.describe_db_security_groups
  conditions:
    all:
    - var: item.IPRanges.CIDRIP
      op: not_equals
      value: 0.0.0.0/0
    - var: item.IPRanges.CIDRIP
      op: exists
      value: null
- rule_id: aws.rds.snapshot.not_publicly_shared_configured
  for_each: aws.rds.describe_d_b_clusters
  conditions:
    var: item.PubliclyAccessible
    op: equals
    value: 'false'
- rule_id: aws.rds.cluster.public_access_disabled
  for_each: aws.rds.describe_d_b_clusters
  conditions:
    var: item.PubliclyAccessible
    op: equals
    value: 'false'
- rule_id: aws.rds.optiongroup.insecure_extensions_not_enabled
  for_each: aws.rds.describe_option_groups
  conditions:
    var: item.Options.OptionName
    op: not_equals
    value:
    - insecure_extension_1
    - insecure_extension_2
- rule_id: aws.rds.parametergroup.insecure_features_disabled_if_applicable_configured
  for_each: aws.rds.describe_d_b_parameter_groups
  conditions:
    all:
    - var: item.DBParameterGroupName
      op: exists
      value: null
    - var: item.DBParameterGroupFamily
      op: exists
      value: null
- rule_id: aws.rds.resource.dynamodb_table_encryption_enabled
  for_each: aws.rds.describe_d_b_cluster_automated_backups
  conditions:
    var: item.StorageEncrypted
    op: equals
    value: 'true'
- rule_id: aws.rds.instance.iam_authentication_enabled
  for_each: aws.rds.describe_d_b_cluster_automated_backups
  conditions:
    var: item.IAMDatabaseAuthenticationEnabled
    op: equals
    value: 'true'
- rule_id: aws.rds.instance.auto_minor_version_upgrade_configured
  for_each: aws.rds.describe_d_b_clusters
  conditions:
    var: item.AutoMinorVersionUpgrade
    op: equals
    value: 'true'
- rule_id: aws.rds.instance.backup_encrypted
  for_each: aws.rds.describe_d_b_cluster_automated_backups
  conditions:
    all:
    - var: item.BackupRetentionPeriod
      op: greater_than
      value: '1'
    - var: item.StorageEncrypted
      op: equals
      value: 'true'
- rule_id: aws.rds.instance.enhanced_monitoring_enabled
  for_each: aws.rds.describe_d_b_instances
  conditions:
    var: item.EnhancedMonitoringResourceArn
    op: exists
    value: null
- rule_id: aws.rds.instance.encryption_at_rest_enabled
  for_each: aws.rds.describe_d_b_cluster_automated_backups
  conditions:
    var: item.StorageEncrypted
    op: equals
    value: 'true'
- rule_id: aws.rds.instance.integration_cloudwatch_logs_configured
  for_each: aws.rds.describe_d_b_clusters
  conditions:
    all:
    - var: item.EnabledCloudwatchLogsExports
      op: exists
      value: null
    - var: item.EnabledCloudwatchLogsExports
      op: not_equals
      value: []
- rule_id: aws.rds.dbuser.approved_list_of_superusers_only_configured
  for_each: aws.rds.describe_d_b_cluster_automated_backups
  conditions:
    var: item.MasterUsername
    op: in
    value:
    - admin
    - superuser
    - root
- rule_id: aws.rds.instance.performance_insights_enabled
  for_each: aws.rds.describe_d_b_clusters
  conditions:
    var: item.PerformanceInsightsEnabled
    op: equals
    value: 'true'
- rule_id: aws.rds.dbuser.no_unused_or_default_superusers_configured
  for_each: aws.rds.describe_d_b_cluster_automated_backups
  conditions:
    all:
    - var: item.MasterUsername
      op: not_equals
      value: admin
    - var: item.MasterUsername
      op: not_equals
      value: root
    - var: item.MasterUsername
      op: not_equals
      value: rdsadmin
- rule_id: aws.rds.instance.security_configuration_review_configured
  for_each: aws.rds.describe_d_b_cluster_automated_backups
  conditions:
    all:
    - var: item.StorageEncrypted
      op: equals
      value: 'true'
    - var: item.IAMDatabaseAuthenticationEnabled
      op: equals
      value: 'true'
    - var: item.PubliclyAccessible
      op: equals
      value: 'false'
- rule_id: aws.rds.instance.deletion_protection_enabled
  for_each: aws.rds.describe_d_b_clusters
  conditions:
    var: item.DeletionProtection
    op: equals
    value: 'true'
- rule_id: aws.rds.snapshots.public_access_configured
  for_each: aws.rds.describe_d_b_clusters
  conditions:
    var: item.PubliclyAccessible
    op: equals
    value: 'false'
- rule_id: aws.rds.cluster.encryption_at_rest_cmek_configured
  for_each: aws.rds.describe_d_b_cluster_automated_backups
  conditions:
    all:
    - var: item.StorageEncrypted
      op: equals
      value: 'true'
    - var: item.KmsKeyId
      op: exists
      value: null
- rule_id: aws.rds.backup_retention_period.backup_retention_period_configured
  for_each: aws.rds.describe_d_b_cluster_automated_backups
  conditions:
    var: item.BackupRetentionPeriod
    op: greater_than
    value: '1'
- rule_id: aws.rds.instance.backup_enabled
  for_each: aws.rds.describe_d_b_cluster_automated_backups
  conditions:
    all:
    - var: item.BackupRetentionPeriod
      op: greater_than
      value: '1'
    - var: item.BackupRetentionPeriod
      op: exists
      value: null
- rule_id: aws.rds.cluster.multi_az_configured
  for_each: aws.rds.describe_d_b_clusters
  conditions:
    var: item.MultiAZ
    op: equals
    value: 'true'
- rule_id: aws.rds.reserved_instance.billing_admins_mfa_required
  for_each: aws.rds.describe_d_b_clusters
  conditions:
    var: item.MultiAZ
    op: equals
    value: 'true'
- rule_id: aws.rds.snapshot.encryption_at_rest_enabled
  for_each: aws.rds.describe_d_b_instance_automated_backups
  conditions:
    var: item.Encrypted
    op: equals
    value: 'true'
- rule_id: aws.rds.snapshot.cross_account_sharing_restricted
  for_each: aws.rds.describe_d_b_snapshots
  conditions:
    all:
    - var: item.DBSnapshotArn
      op: exists
      value: null
    - var: item.DBSnapshotAttributesResult.DBSnapshotAttributes.AttributeName
      op: equals
      value: restore
    - var: item.DBSnapshotAttributesResult.DBSnapshotAttributes.AttributeValues
      op: equals
      value: []
- rule_id: aws.rds.reserved_instance.purchase_permissions_restricted
  for_each: aws.rds.describe_reserved_d_b_instances
  conditions:
    var: item.OfferingType
    op: not_equals
    value: No Upfront
- rule_id: aws.rds.clustersnapshot.not_publicly_shared_configured
  for_each: aws.rds.describe_d_b_clusters
  conditions:
    var: item.PubliclyAccessible
    op: equals
    value: 'false'
- rule_id: aws.rds.snapshot.storage_encrypted
  for_each: aws.rds.describe_d_b_instance_automated_backups
  conditions:
    var: item.Encrypted
    op: equals
    value: 'true'
- rule_id: aws.rds.reserved_instance.instance_approval_workflow_required
  for_each: aws.rds.describe_reserved_d_b_instances
  conditions:
    var: item.ReservedDBInstancesOfferingId
    op: exists
    value: null
- rule_id: aws.rds.resource.snapshots_encrypted
  for_each: aws.rds.describe_d_b_instance_automated_backups
  conditions:
    var: item.Encrypted
    op: equals
    value: 'true'
- rule_id: aws.rds.cluster.audit_logging_enabled
  for_each: aws.rds.describe_d_b_clusters
  conditions:
    var: item.EnabledCloudwatchLogsExports
    op: contains
    value: audit
- rule_id: aws.rds.cluster.iam_or_managed_identity_auth_enabled_if_supported
  for_each: aws.rds.describe_d_b_cluster_automated_backups
  conditions:
    var: item.IAMDatabaseAuthenticationEnabled
    op: equals
    value: 'true'
- rule_id: aws.rds.cluster.storage_encrypted
  for_each: aws.rds.describe_d_b_cluster_automated_backups
  conditions:
    var: item.StorageEncrypted
    op: equals
    value: 'true'
- rule_id: aws.rds.cluster.private_networking_enforced
  for_each: aws.rds.describe_option_group_options
  conditions:
    all:
    - var: item.DBSubnetGroup.Subnets.SubnetAvailabilityZone.Name
      op: exists
      value: null
    - var: item.DBSubnetGroup.Subnets.SubnetIdentifier
      op: exists
      value: null
    - var: item.DBSubnetGroup.VpcId
      op: exists
      value: null
    - var: item.DBClusterMembers.DBInstanceIdentifier
      op: exists
      value: null
- rule_id: aws.rds.securitygroup.security_no_0_ingress_on_db_ports_configured
  for_each: aws.rds.describe_db_security_groups
  conditions:
    all:
    - var: item.IPRanges.CIDRIP
      op: not_equals
      value: 0.0.0.0/0
    - var: item.IPRanges.CIDRIP
      op: exists
      value: null
- rule_id: aws.rds.cluster.deletion_protection_enabled
  for_each: aws.rds.describe_d_b_clusters
  conditions:
    var: item.DeletionProtection
    op: equals
    value: 'true'
- rule_id: aws.rds.instance.no_public_access_configured
  for_each: aws.rds.describe_d_b_clusters
  conditions:
    var: item.PubliclyAccessible
    op: equals
    value: 'false'
- rule_id: aws.rds.parametergroup.audit_logging_enabled
  for_each: aws.rds.describe_d_b_parameter_groups
  conditions:
    all:
    - var: item.DBParameterGroupName
      op: exists
      value: null
    - var: item.DBParameterGroupFamily
      op: exists
      value: null
- rule_id: aws.rds.optiongroup.only_approved_extensions_enabled
  for_each: aws.rds.describe_option_groups
  conditions:
    var: item.Options.OptionName
    op: in
    value:
    - APPROVED_EXTENSION_1
    - APPROVED_EXTENSION_2
- rule_id: aws.rds.snapshot.cross_region_copy_encrypted
  for_each: aws.rds.describe_d_b_clusters
  conditions:
    all:
    - var: item.CopyTagsToSnapshot
      op: equals
      value: 'true'
    - var: item.KmsKeyId
      op: exists
      value: null
- rule_id: aws.rds.cluster.encryption_at_rest_enabled
  for_each: aws.rds.describe_d_b_cluster_automated_backups
  conditions:
    var: item.StorageEncrypted
    op: equals
    value: 'true'
- rule_id: aws.rds.subnetgroup.private_subnets_only_configured
  for_each: aws.rds.describe_option_group_options
  conditions:
    all:
    - var: item.Subnets.SubnetAvailabilityZone.Name
      op: exists
      value: null
    - var: item.Subnets.SubnetIdentifier
      op: exists
      value: null
    - var: item.Subnets.SubnetStatus
      op: equals
      value: Active
- rule_id: aws.rds.clustersnapshot.snapshot_cross_account_sharing_restricted
  for_each: aws.rds.describe_db_cluster_snapshots
  conditions:
    all:
    - var: item.DBClusterSnapshotAttributesResult.DBClusterSnapshotAttributes.AttributeName
      op: equals
      value: restore
    - var: item.DBClusterSnapshotAttributesResult.DBClusterSnapshotAttributes.AttributeValues
      op: equals
      value: []
- rule_id: aws.rds.dbuser.iam_auth_preferred_configured
  for_each: aws.rds.describe_d_b_cluster_automated_backups
  conditions:
    var: item.IAMDatabaseAuthenticationEnabled
    op: equals
    value: 'true'
- rule_id: aws.rds.parametergroup.require_ssl_configured
  for_each: aws.rds.describe_d_b_cluster_parameters
  conditions:
    all:
    - var: item.ParameterName
      op: equals
      value: rds.force_ssl
    - var: item.ParameterValue
      op: equals
      value: '1'
- rule_id: aws.rds.cluster.require_tls_in_transit_configured
  for_each: aws.rds.describe_d_b_clusters
  conditions:
    var: item.EnabledCloudwatchLogsExports
    op: contains
    value: audit
- rule_id: aws.rds.instance.multi_az_configured
  for_each: aws.rds.describe_d_b_clusters
  conditions:
    var: item.MultiAZ
    op: equals
    value: 'true'
- rule_id: aws.rds.cluster.copy_tags_to_snapshots_configured
  for_each: aws.rds.describe_d_b_clusters
  conditions:
    var: item.CopyTagsToSnapshot
    op: equals
    value: 'true'
- rule_id: aws.rds.clustersnapshot.snapshot_cross_region_copy_encrypted
  for_each: aws.rds.describe_d_b_clusters
  conditions:
    all:
    - var: item.CopyTagsToSnapshot
      op: equals
      value: 'true'
    - var: item.KmsKeyId
      op: exists
      value: null
- rule_id: aws.rds.instance.iam_or_managed_identity_auth_enabled_if_supported
  for_each: aws.rds.describe_d_b_cluster_automated_backups
  conditions:
    any:
    - var: item.IAMDatabaseAuthenticationEnabled
      op: equals
      value: 'true'
    - var: item.DBInstanceArn
      op: exists
      value: null
- rule_id: aws.rds.instance.inside_vpc_configured
  for_each: aws.rds.describe_d_b_cluster_automated_backups
  conditions:
    var: item.DBSubnetGroup.VpcId
    op: exists
    value: null
- rule_id: aws.rds.instance.deletion_protection_configured
  for_each: aws.rds.describe_d_b_clusters
  conditions:
    var: item.DeletionProtection
    op: equals
    value: 'true'
- rule_id: aws.rds.instance.require_tls_in_transit_configured
  for_each: aws.rds.describe_d_b_instances
  conditions:
    all:
    - var: item.DBInstanceStatus
      op: equals
      value: available
    - var: item.DBInstanceIdentifier
      op: exists
      value: null
    - var: item.DBParameterGroups
      op: exists
      value: null
- rule_id: aws.rds.clustersnapshot.encryption_at_rest_enabled
  for_each: aws.rds.describe_d_b_cluster_automated_backups
  conditions:
    var: item.StorageEncrypted
    op: equals
    value: 'true'
- rule_id: aws.rds.snapshot.not_public_configured
  for_each: aws.rds.describe_blue_green_deployments
  conditions:
    var: item.Status
    op: equals
    value: available
- rule_id: aws.rds.instance.transport_encrypted
  for_each: aws.rds.describe_d_b_cluster_automated_backups
  conditions:
    var: item.IAMDatabaseAuthenticationEnabled
    op: equals
    value: 'true'
- rule_id: aws.rds.cluster.integration_cloudwatch_logs_configured
  for_each: aws.rds.describe_d_b_clusters
  conditions:
    all:
    - var: item.EnabledCloudwatchLogsExports
      op: exists
      value: null
    - var: item.EnabledCloudwatchLogsExports
      op: not_equals
      value: []
- rule_id: aws.rds.instance.copy_tags_to_snapshots_configured
  for_each: aws.rds.describe_d_b_clusters
  conditions:
    var: item.CopyTagsToSnapshot
    op: equals
    value: 'true'
- rule_id: aws.rds.snapshots_public_access.snapshots_public_access_configured
  for_each: aws.rds.describe_blue_green_deployments
  conditions:
    var: item.Status
    op: equals
    value: available
