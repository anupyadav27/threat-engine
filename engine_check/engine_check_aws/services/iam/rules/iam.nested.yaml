  for_each: aws.iam.list_groups_for_user
  conditions:
    var: item.Groups
    op: not_equals
    value: null
- rule_id: aws.iam.role.trust_principals_allowlist_only_configured
  for_each: aws.iam.get_role
  conditions:
    var: item.Principal.AWS
    op: in
    value:
    - arn:aws:iam::123456789012:root
    - arn:aws:iam::098765432109:role/ExampleRole
- rule_id: aws.iam.instanceprofile.no_admin_star_policies_configured
  for_each: aws.iam.list_attached_user_policies
  conditions:
    all:
    - var: item.Roles.AssumeRolePolicyDocument.Statement.Effect
      op: equals
      value: Allow
    - var: item.Roles.AssumeRolePolicyDocument.Statement.Action
      op: equals
      value: sts:AssumeRole
    - var: item.Roles.AssumeRolePolicyDocument.Statement.Principal.Service
      op: equals
      value: ec2.amazonaws.com
    - var: item.Roles.AttachedManagedPolicies.PolicyArn
      op: not_equals
      value: arn:aws:iam::aws:policy/AdministratorAccess
- rule_id: aws.iam.role.creation_monitored
  for_each: aws.iam.list_roles
  conditions:
    all:
    - var: item.RoleName
      op: exists
      value: null
    - var: item.AssumeRolePolicyDocument
      op: exists
      value: null
- rule_id: aws.iam.policy.no_policies_without_constraints_configured
  for_each: aws.iam.list_policies
  conditions:
    all:
    - var: item.AttachmentCount
      op: greater_than
      value: '0'
    - var: item.PolicyVersionList.Document.Statement.Effect
      op: equals
      value: Allow
    - var: item.PolicyVersionList.Document.Statement.Condition
      op: exists
      value: null
