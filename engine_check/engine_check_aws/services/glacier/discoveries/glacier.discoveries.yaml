version: '1.0'
provider: aws
service: glacier
services:
  client: glacier
  module: boto3.client
discovery:
- discovery_id: aws.glacier.get_data_retrieval_policy
  calls:
  - action: get_data_retrieval_policy
    params:
      accountId: '-'
    save_as: response
  emit: {}
- discovery_id: aws.glacier.list_vaults
  calls:
  - action: list_vaults
    params:
      accountId: '-'
      MaxResults: 1000
    save_as: response
  emit:
    items_for: '{{ response.VaultList }}'
    as: item
- discovery_id: aws.glacier.describe_vault
  for_each: aws.glacier.list_vaults
  calls:
  - action: describe_vault
    params:
      accountId: '-'
      vaultName: '{{ item.VaultName }}'
      MaxResults: 1000
    save_as: response
  emit: {}
- discovery_id: aws.glacier.get_vault_access_policy
  for_each: aws.glacier.list_vaults
  calls:
  - action: get_vault_access_policy
    params:
      accountId: '-'
      vaultName: '{{ item.VaultName }}'
    save_as: response
  emit: {}
- discovery_id: aws.glacier.get_vault_lock
  for_each: aws.glacier.list_vaults
  calls:
  - action: get_vault_lock
    params:
      accountId: '-'
      vaultName: '{{ item.VaultName }}'
    save_as: response
  emit: {}
