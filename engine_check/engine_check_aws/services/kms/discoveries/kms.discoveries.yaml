version: '1.0'
provider: aws
service: kms
services:
  client: kms
  module: boto3.client
discovery:
- discovery_id: aws.kms.list_keys
  calls:
  - action: list_keys
    save_as: response
    params:
      MaxResults: 1000
  emit:
    items_for: '{{ response.Keys }}'
    as: item
- discovery_id: aws.kms.describe_key
  for_each: aws.kms.list_keys
  calls:
  - action: describe_key
    params:
      KeyId: '{{ item.KeyId }}'
      MaxResults: 1000
    save_as: response
  emit: {}
- discovery_id: aws.kms.get_key_rotation_status
  for_each: aws.kms.list_keys
  calls:
  - action: get_key_rotation_status
    params:
      KeyId: '{{ item.KeyId }}'
    save_as: response
  emit: {}
- discovery_id: aws.kms.get_key_policy
  for_each: aws.kms.list_keys
  calls:
  - action: get_key_policy
    params:
      KeyId: '{{ item.KeyId }}'
      PolicyName: default
    save_as: response
  emit: {}
- discovery_id: aws.kms.list_aliases
  calls:
  - action: list_aliases
    params:
      MaxResults: 1000
    save_as: response
  emit:
    items_for: '{{ response.Aliases }}'
    as: item
- discovery_id: aws.kms.list_grants
  for_each: aws.kms.list_keys
  calls:
  - action: list_grants
    params:
      KeyId: '{{ item.KeyId }}'
      MaxResults: 1000
    save_as: response
  emit:
    items_for: '{{ response.Grants }}'
    as: item
