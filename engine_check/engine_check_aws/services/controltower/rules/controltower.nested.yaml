version: '1.0'
provider: aws
service: controltower
services:
  client: controltower
  module: boto3.client
discovery:
- discovery_id: aws.controltower.list_enabled_controls
  calls:
  - action: list_enabled_controls
    save_as: response
    params:
      MaxResults: 1000
  emit:
    items_for: '{{ response.enabledControls }}'
    as: item
- discovery_id: aws.controltower.get_enabled_control
  for_each: aws.controltower.list_enabled_controls
  on_error: continue
  calls:
  - action: get_enabled_control
    params:
      enabledControlIdentifier: '{{ item.arn }}'
    save_as: response
  emit: {}
checks:
- rule_id: aws.controltower.enrollment.block_leave_org_by_policy_configured
  for_each: aws.controltower.list_enabled_controls
  conditions:
    all:
    - var: item.controlIdentifier
      op: equals
      value: aws.controltower.enrollment.block_leave_org_by_policy_configured
    - var: item.statusSummary
      op: equals
      value: ENABLED
- rule_id: aws.controltower.enrollment.controltower_all_accounts_enrolled_in_org_configured
  for_each: aws.controltower.list_enabled_controls
  conditions:
    all:
    - var: item.controlIdentifier
      op: equals
      value: controltower_all_accounts_enrolled_in_org_configured
    - var: item.statusSummary
      op: equals
      value: ENABLED
- rule_id: aws.controltower.enrollment.controltower_scps_enabled
  for_each: aws.controltower.list_enabled_controls
  conditions:
    all:
    - var: item.controlIdentifier
      op: exists
      value: null
    - var: item.statusSummary
      op: equals
      value: ENABLED
- rule_id: aws.controltower.enrollment.restrict_region_usage_by_policy_where_required
  for_each: aws.controltower.get_enabled_control
  conditions:
    all:
    - var: item.targetRegions
      op: exists
      value: null
    - var: item.controlIdentifier
      op: equals
      value: aws.controltower.enrollment.restrict_region_usage_by_policy_where_required
- rule_id: aws.controltower.landingzone.block_leave_org_by_policy_configured
  for_each: aws.controltower.list_enabled_controls
  conditions:
    all:
    - var: item.controlIdentifier
      op: equals
      value: aws.controltower.landingzone.block_leave_org_by_policy_configured
    - var: item.statusSummary
      op: equals
      value: ENABLED
- rule_id: aws.controltower.landingzone.controltower_all_accounts_enrolled_in_org_configured
  for_each: aws.controltower.list_enabled_controls
  conditions:
    all:
    - var: item.controlIdentifier
      op: exists
      value: null
    - var: item.statusSummary
      op: equals
      value: ENABLED
- rule_id: aws.controltower.landingzone.controltower_scps_enabled
  for_each: aws.controltower.list_enabled_controls
  conditions:
    all:
    - var: item.controlIdentifier
      op: exists
      value: null
    - var: item.statusSummary
      op: equals
      value: ENABLED
- rule_id: aws.controltower.landingzone.restrict_region_usage_by_policy_where_required
  for_each: aws.controltower.get_enabled_control
  conditions:
    all:
    - var: item.targetRegions
      op: exists
      value: null
    - var: item.controlIdentifier
      op: equals
      value: aws.controltower.landingzone.restrict_region_usage_by_policy_where_required
